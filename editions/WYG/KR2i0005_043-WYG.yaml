body:
  text: 十六國春秋卷四十三後燕録一慕容垂上慕容垂字叔仁一作道明小字阿六敦皝第五子母蘭淑儀所生也垂少岐嶷有器量豁達大度身長七尺四寸手垂過膝皝甚寵愛常目而謂諸弟曰此兒闊達好竒終能破人家或能成人家故名之曰霸字道業將以為世子羣臣諫而止然寵遇猶踰於世子雋故雋弗能平之年十三為偏將所在征伐勇冠三軍以滅宇文之功封都鄉侯石虎來伐既還猶有兼并之志遣將軍鄧恒率衆數萬屯於樂安營攻取之備垂戍徒河與恒相持恒憚而不敢侵垂好遊畋嘗因獵墜馬折前兩齒更名為􅆙外以慕郤􅆙為名内實惡而改之尋以其應䜟文乃去夬更名為垂虎死趙魏大亂垂謂雋曰時來易失赴機在速兼弱攻昧今其時也雋以新遭大喪不許慕輿根言於雋曰王子之言千載一時機不可失雋乃從之遂平中原以垂為前鋒都督累戰有大功雋既尅幽州欲盡坑其降卒垂諫曰弔伐之義先代常典今方平中原宜綏懷以徳坑戮之刑不可為王師之先聲雋從之及雋僭稱尊號拜黄門侍郎出為安東將軍北冀州刺史鎮常山元璽三年封為吴王徙治信都遷侍中右禁將軍録留臺事徙鎮龍城大得東北之和一作利字尋遷鎮東將軍平州刺史征南大將軍荆兖二州牧有聲梁楚之南再為司隸校尉王公已下莫不屏跡暐既嗣位太原王恪為太宰甚器重之常謂暐曰吳王將相之才十倍於臣先帝以長㓜之次以臣先之臣死之後願陛下委政吳王可謂親賢兼舉矣暐不能從建熙十年晉大司馬桓温率衆來伐諸軍皆潰垂以車騎大將軍敗温於枋頭威名大振太傅上庸王評深忌疾之及垂所奏將士應䝉殊賞者皆抑而不行垂數以為言與評廷争嫌隙愈深評遂與太后可足渾氏共謀誅之太宰恪之子楷及垂舅蘭建知之以告垂曰先發制人但除上庸王評及樂安王臧餘無能為矣垂曰骨肉相殘而首亂於國吾有死而已不忍為也頃之二人又以告曰内意已決不可不蚤發垂曰必不可彌縫吾寧避之於外耳餘非所議也冬十一月辛卯朔垂請畋於大陸因微服出鄴將趨龍城至邯鄲少子麟素不為垂所愛逃還以狀告垂左右多亡叛太傅評白暐暐遣西平公强率精騎追之及於范陽世子令斷後强不敢逼日暮垂乃散騎滅迹傍南山復還鄴隠於趙之顯原陵俄有獵者數百騎四面而來抗之則不敵逃之則無路不知所為會獵者鷹皆飛颺衆騎散去垂乃殺白馬以祭天且盟從者令言於垂曰太傅忌賢嫉能搆事以來人尤忿恨今鄴城之中莫知尊處如嬰兒之念母夷夏同之若順衆心襲其無備取之如指掌耳事定之後革弊簡能大匡朝政以輔主上安國存家功之大者也今日之便誠不可失願給騎數人足以辦之垂曰如汝之謀事成誠為大福不成悔之何及不如西奔可以萬全子馬奴潛謀逃歸殺之行至河陽為津吏所禁斬之而濟遂自洛陽與段夫人世子令令弟寶農隆兄子楷舅蘭建郎中令高弼俱奔於秦留妃可足渾氏於鄴乙泉戍主吳歸追及於閿鄉令擊之而退初秦苻堅自恪卒後陰有圖燕之志憚垂威名不敢發及聞垂至大喜郊迎執手曰天生賢傑必相與共成大事此自然之數也要當與卿共定天下告成岱宗然後還卿本朝世封幽州使卿去國不失為子之孝歸朕不失事君之忠不亦美乎垂謝曰覊旅之臣免死為幸本邦之榮非所敢望堅復愛世子令及楷等之才皆厚禮之賞賜巨萬每進見屬目覩之闗中士民素聞垂父子名皆向慕之堅相王猛惡垂雄略言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制不如早除之堅曰吾方收攬英雄以清四海奈何殺之且其始來吾已推誠納之矣匹夫猶不可棄言況萬乘乎乃以垂為冠軍將軍封賓徒侯一作賔都食華陰之五百戸王猛伐燕軍於長安請令㕘其軍事以為鄉導將行造垂飲酒從容謂曰吾將擴清東夏或為東川之别卿將何以為贈使我覩物思人垂即脫佩刀遺之猛至洛陽賂垂所親金熙使詐為垂使者詭傳垂語於令曰吾父子來此以逃死也今王猛疾人如讐讒毁日甚秦王雖外遇甚厚其心難知大丈夫逃死而卒不免將為天下笑吾聞東朝比來始更悔悟主后相尤吾今東還故遣告汝吾已行矣便可速發令疑之躊躇終日又不可覆審乃將舊騎詐為出獵遂奔樂安王臧於石門猛表令叛狀垂懼而出走至藍田追騎獲之堅引見於東堂慰勞之曰卿國家失和委身投朕賢子心不忘本猶懐首丘亦各其志不足深咎然燕之將亡非令所能存惜其徒入虎口耳書不云乎父父子子罪不相及卿何為過懼而狼狽如是乎於是復垂爵位恩待如初及堅擒暐垂隨堅入鄴宫收集諸子對之悲慟見其公卿大夫及故􅒼吏殊有慍色前郎中令高弼私於垂曰大王以命世之才遭無妄之運迍邅棲伏艱亦至矣天啓嘉會靈命蹔遷此乃鴻漸之始龍變之初深願仁慈有以慰之且夫髙世之略必懷遺俗之䂓方當網漏吞舟以𢎞苞養之義收納舊臣以成為山之功奈何以一怒捐之竊為大王不取也垂深納之垂在秦朝歴位京兆尹進封泉州侯所在征伐皆有大功後堅敗於淮南諸軍皆潰惟垂所將三萬人獨全堅以千餘騎奔之世子寶言於垂曰家國傾喪皇綱廢弛至尊明命著之圖籙當隆中興之業建少康之功但時運未至故韜光俟奮耳今天厭亂徳凶衆土崩可謂乾啓神機授之於我是天借之便以復燕祚千載一時不可失也宜承皇天之意因而取之且夫立大功者不顧小節行大仁者不念小惠秦既蕩覆二京竊辱神器仇恥之深莫甚於此願不以意氣微恩忘社稷之重五木之祥今其至矣垂曰汝言是也然彼以赤心投命於我若之何害之天茍棄之圖之多便不若保䕶其危以報徳徐俟其釁而後圖之既不負夙心且可以義取天下初寶在長安與韓黄李根等因讌以樗蒱為戲寶危坐整容誓之曰世云樗蒱有神豈虚言哉若富貴可期頻得三盧於是三擲盡盧寶拜而受賜故云五木之祥垂弟奮威將軍徳亦進曰夫隣國相吞有自來矣秦强而并燕秦弱而圖之此為報仇雪恥非負夙心也昔鄧祁侯不納三甥之言終為楚滅吴王夫差違子胥之諫取禍勾踐前事之不忘後事之師表也願不棄湯武之成蹤追韓信之敗迹乘彼土崩恭行天罰斬逆氐復宗祀建中興繼洪烈天下大機弗宜失也兄奈何得而不取釋數萬之衆授干將之柄是却天時而待後害非至計也語曰當斷不斷反受其亂願兄勿疑垂曰吾昔為太傅所不容置身無所逃死於秦秦王以國士遇我恩禮備至後為王猛所賣無以自明復見昭亮國士之禮毎深報徳之分未一若秦運必窮厯數歸我者授首之便何慮無之吾當懷集闗東以復先業耳闗西之地會非吾有自當有擾之者君子不怗亂不為禍先且可觀之冠軍㕘軍趙秋亦力勸之親黨多勸垂殺堅垂皆不從悉以兵屬堅農謂垂曰尊不迫人於險其義聲足以感動天地農聞秘記曰燕復興當在河陽夫取果於未熟與自落者不過早晚旬日之間然其難易美惡相去逺矣垂心善其言行至澠池言於堅曰王師不利他境之民或因此輕重請奉詔書輯寧朔裔且龍鄴舊都陵墓所在乞過展拜以申罔極因張國威刑以安戎狄堅許之權翼諫曰國家新破四方皆有離心宜徵集名將置之京師固根本鎮枝葉且垂爪牙名將勇略過人所謂今之韓白又世豪東夏志不為人下頃者避禍歸誠非慕徳而來列地百里未可以滿其欲冠軍之號豈足以稱其心譬如養鷹饑則附人飽便高颺每聞風飈之起常有凌霄之志惟宜急其覊靽豈可解縱任其所欲哉堅曰卿言是也但朕已許之匹夫猶重信況萬乘之王乎若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往不見其來闗東之亂垂其首乎堅不聴遣將軍李蠻閔亮尹國帥衆三千送垂翼夜私遣壯士邀垂於河橋南空舍中擊之垂是夜夢行路路窮顧見孔子墓傍墓有八覺而惡之召占夢者占之曰行路窮道盡不可行也孔子名丘八以配丘此兵字也路必有伏兵深宜慎之垂以為然遂自涼馬臺結草筏而渡使典軍程同衣已衣乘已馬與童僕趨河橋伏兵發同馳馬獲免垂至安陽遣㕘軍田山一作生修箋於長樂公苻丕堅又遣驍騎將軍石越戍鄴驃騎將軍張蚝戍并州時丕先已在鄴聞其北來疑其欲為亂謀襲擊之其侍郎天水姜讓諫曰垂反形未著而殿下擅殺之非臣子之義不如待以上賓之禮嚴兵衞之密表情狀聴勅而後圖之未為晚也丕從之及至身自迎之館之於鄴西垂具說淮南敗狀趙秋勸垂於坐取丕因據鄴起兵垂不從垂於是潛與燕之故臣謀復燕祚會秦平原公符暉告丁零翟斌聚衆四千謀逼洛陽堅驛書繼至使垂督兵討之石越言於丕曰王師新敗民心未安負罪亡匿之徒思亂者衆故丁零一唱旬日之中衆已數萬此其驗也慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎傅翼也丕曰垂在鄴如藉虎卧蛟常恐為肘腋之患今逺之於外不猶愈乎且翟斌凶勃必不肯為垂下使兩虎相斃吾從而制之此卞莊子之術也丕謂垂曰翟斌兄弟因王師小失敢肆凶勃子母之軍殆難為敵非冠軍英略莫可滅之相煩一行可乎垂曰下官殿下之鷹犬敢不惟命是聴乃大賜金帛一無所受惟請舊田園丕許之配以羸兵二千及鎧仗之敝者又遣廣武將軍符飛龍率氐騎一千為垂之副丕私戒飛龍曰卿王室肺腑年秩雖卑其實帥也垂為三軍之統卿為謀垂之主用兵制勝之權防微杜貳之略委之於卿卿其行矣勉之垂請入鄴城拜廟丕弗許乃潛服而入亭吏禁之垂怒斬吏燒亭而去中子農及兄子楷紹弟子宙皆為苻丕所留石越言於丕曰垂之在燕破國亂家及投命聖朝䝉超常之遇而敢輕侮方鎮殺吏燒亭反形已露終為亂階將老兵疲可因此除之丕曰淮南之敗衆散親離而垂侍衞聖躬此功不可忘也越曰垂尚不忠於燕安肯盡忠於我乎且垂亡虜也主上寵同功舊不能銘澤誓忠而首謀為亂失今不擊必為後害丕不從越退而告人曰公父子好存小仁不顧大計吾屬終當為鮮卑虜矣垂至安陽之湯池閔亮李蠻自鄴來以丕與飛龍謀告垂垂因激怒其衆曰吾盡忠於苻氏而彼專欲圖吾父子吾雖欲已得乎乃託言兵少停河内募兵旬日之間有衆八千苻暉遣使讓垂使進兵簡書相尋垂謂飛龍曰今冦賊不逺當晝止夜行襲其不意飛龍以為然壬午夜垂遣世子寶將兵居前少子隆勒兵從已令氐兵五人為伍陰與寶約聞鼔聲前後合擊氐兵及飛龍盡殺之㕘佐家在西者皆遣還并以書遺堅言所以殺飛龍之故時慕容鳳及燕之故臣燕郡王騰遼西段延等聞翟斌起兵各帥部曲屬之會苻暉使平武侯毛當率衆討斌鳳曰鳳今將雪先人之恥請為將軍斬此氐奴乃擐甲直進丁零之衆隨之大敗秦兵斬毛當進攻雲凌臺戍尅之收萬餘人甲仗癸未垂濟河焚橋召募逺近衆至三萬留遼東鮮卑可足渾譚集兵於河内之沙城遣田山如鄴密告農等起兵相應時日已暮農與楷及宙留宿鄴中紹先出至蒲池盜丕駿馬數百以待甲申晦農宙將數十騎微服出鄴奔於列人楷紹奔於辟陽十六國春秋卷四十三
