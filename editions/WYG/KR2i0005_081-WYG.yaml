body:
  text: 十六國春秋卷八十一後涼錄一吕光吕光字世明略陽氐人也父婆樓佐命苻堅官至太尉光以石氏建武四年生於枋頭夜有神光舉家異之故遂以光為名年十嵗與諸兄弟遊戲邑里好為戰陣之法羣童咸推為主割土處中部分詳平羣童歎服不好讀書惟樂鷹馬及長連結賢豪好施待士身長八尺四寸目重瞳子左肘生肉印性沈重質略一作朴寛大有度量喜怒不形于色時人莫之識唯王猛布衣時見而異之曰此非凡人也言之於苻堅舉賢良除美陽令夷夏愛服鄰境肅清遷鷹揚將軍從征張平戰於銅壁刺平養子蚝中之自是威名大著苻雙反于秦州堅將楊成世為雙將茍興所敗光與王鑒討之鑒欲速戰光曰興初破成世奸氣漸長宜持重以俟其敝興乘勝輕來糧竭必退退而擊之可以破也二旬而興退諸將不知所為光曰揆其奸計必攻榆眉若得榆眉據城斷路資儲復贍非國之利也宜速進師若興攻城尤須赴救若其奔也彼糧既盡可以滅之鑒從之果敗興軍從王猛平慕容暐封都亭侯苻重鎮洛陽表光為長史及重謀反堅聞之曰長史吕光忠孝方正必不與之同謀馳使命光收重檻車送之尋入為太子右率甚見親重蜀人李焉一作烏聚衆二萬攻逼益州以光為破虜將軍率兵討滅之遷步兵校尉苻洛反光又擊平之拜驍騎將軍秦建元十九年春正月堅既尅平山東士馬強盛遂有圗西域之志乃以光為使持節都督西域征討諸軍事率將軍姜飛彭晃杜進康盛一作隆等總步兵七萬鐵騎五千討西域以隴西董方馮翊郭抱武威賈䖍𢎞農楊頴為四府將佐堅太子宏執光手曰君器相非凡必有大福宜深保重行至高昌聞堅寇晉光欲更須後命部將杜進曰節下受任金方赴機宜速有何不了而更留乎冬十二月光進及流沙三百餘里無水將士失色光曰吾聞李廣利精誠𤣥感飛泉湧出吾等豈獨無感致乎皇天必將有濟諸君不足憂也俄而大雨平地水深三尺進兵焉耆其王泥流率其傍國請降惟龜兹王帛純帛一作白拒命不降光軍其城南五里為一營深溝高壘廣設疑兵以木為人被之以甲羅列壘上將為持久之計帛純驅徙城外人入於城中附庸侯王各嬰城自守至是光左肘肉印隠起成字文曰巨霸營外夜有一黑物大如斷堤動揺有頭角目光若電及明而雲霧四塞遂不復見旦視其處南北五里東西二十餘步鱗甲隠於地所昭然猶在光笑曰黑龍也俄而雲起西北暴風滅其迹杜進言於光曰龍者神獸人君利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽顯所致願將軍勉之以成大慶光有喜色遂進軍攻龜兹城其夜夢金象飛越城外光曰此謂佛神去之胡必亡矣攻城益急帛純乃傾國財寳重賂于獪胡以求救獪胡王遣其弟呐龍侯將馗率騎二十餘萬并引温宿尉須等諸國王及諸胡内外合七十餘萬人來救胡便弓馬善矛矟鎧如連鏁射不可入又以革索為羂策馬擲人多有中者衆甚憚之諸將咸欲每營結陳案兵拒之光曰彼衆我寡營又相逺勢分力散非良策也於是遷營相接按陣為鈎鏁之法精騎為遊軍彌縫其闕戰於城西大敗之斬首萬餘級帛純收其珍寳遁走王侯降者三十餘國光入其城城有三重廣輪與長安城等城中塔廟千數又以種田畜牧為業男女皆剪髪垂項宫室壯麗煥若神居光乃大饗將士賦詩言志命參軍京兆段業著龜兹宫賦以記之胡人奢侈厚於養生家有蒲桃酒或至千斛經十年不敗士卒淪沒酒藏者相繼又有千斛蒲桃士卒取實來離宫别館傍盡種之因得其樂器有箜篌琵琶五絃笙笛簫觱篥毛圓鼔都曇鼔答臘鼔腰鼓羯雞婁鼔鐘鼔其等十五種為一部工二十人歌曲有善善摩尼解曲婆迦兒舞曲有天殊勒監曲諸國憚光威名貢欵屬路光撫寧西域威恩甚著桀黠胡王昔所未賔者不逺萬里望風歸附上漢所賜節傳光皆表而易之立帛純弟震為龜兹王撫其遺衆建元二十年秋八月光上疏奏捷於堅堅知光平西域以為使持節散騎常侍都督玉門已西諸軍事安西將軍西域校尉進封順鄉侯増邑一千户道絶不通建元二十一年春正月光既平龜兹以龜兹饒樂遂有留居之志始獲天竺沙門鳩摩羅什先是光軍未至什謂龜兹王曰國運衰矣當有勍敵目下從東方來宜恭承之勿抗其鋒純不從至是果敗光未測什智量見其年少乃以凡人戲之強妻以龜兹王女拒而不受光曰道士之操不踰光父何所固辭因飲以醇酒同閉密室什既被逼遂虧其節或令騎牛及乘惡馬欲使墮落什嘗懐忍辱曽無愠色光還中路置軍山下將士已休什曰不可在此必見狼狽宜徙軍隴上光不納夜果大雨洪潦暴起水深數丈死者數千人遂深異之光欲畱王西國什謂光曰此凶亡之地不可淹留推運揆數將軍宜速東歸中路自有福地可居光乃大饗文武博議進止衆咸請還光乃從之三月光以駝二萬餘頭致外國珍寶及竒伎異戲殊禽怪獸千有餘品駿馬萬餘匹而還秋九月光自龜兹還至宜禾秦涼州刺史梁熙謀閉境拒之高昌太守楊翰言於熙曰吕光新破西域兵強氣鋭其鋒不可當也度其事意必有異圖且今闗中擾亂京師存亡未知自河已西迄于流沙地方萬里帶甲十萬鼎峙之勢實在今日若光出流沙其勢難敵高梧一作高桐谷口險阻之要宜先守之而奪其水彼既窮渇自然投戈如其以逺不守伊吾之闗亦可拒也若度此二阨雖有子房之策無所施矣地有所必争真此機也熙不從美水令犍為楊一作張綂説熙曰主上傾國南討覆敗而還慕容垂擅兵河北泓沖寇逼京師丁零雜虜跋扈闗洛州郡姦豪所在風扇王綱弛絶人懐利己今吕光廻師其志難測將軍何以抗之熙曰誠深憂之未知計之所出綂曰光雄果勇毅智略過人今擁思歸之士乘戰勝之氣其鋒未易當也一云今以蕩西域之威擁歸師之鋭鋒若猛火之盛於原弗可敵也將軍世受殊恩忠誠夙著立勲王室宜在今日行唐公洛上之從弟勇冠一時為將軍計者莫若奉為盟主以收攝衆望推忠義以總帥羣豪則光雖至不敢有異心也資其精鋭東兼毛興西連王綂楊璧合四州之衆掃凶逆於諸夏寧帝室於闗中此桓文之舉也熙又弗從乃殺洛於西海光聞楊翰之謀懼不敢進杜進諌曰梁熙文雅有餘機鑒不足終不能納翰之謀也願將軍不足憂之聞其上下未同宜在速進進而不捷請受過言之誅光從之進至高昌楊翰以郡迎降及至玉門梁熙傳檄責光擅命還師遣子鷹揚將軍𦙍與振威將軍南安姚皓别駕衞翰率衆五萬拒光於酒泉燉煌太守姚静晉昌太守李純以郡迎降光報檄涼州責熙無赴難之誠數其遏歸師之罪遣彭晃杜進姜飛等為前鋒擊𦙍戰于安彌大敗之𦙍輕將麾下數百騎逃奔杜進追而擒之於是西山胡夷皆來欵附武威太守彭濟執熙請迎光乃殺熙涼州郡縣望風奔降獨建威將軍西郡太守索泮奮威將軍酒泉太守宋皓城守不下攻而執之並為光所殺光遂入姑臧自領涼州刺史䕶羌校尉表杜進為輔國將軍武威太守封武始侯其餘將佐封拜有差主簿尉祐姦佞傾險見棄前朝與彭濟同謀執熙光深見寵任乃譖誅姚皓及天水尹景等名士十餘人逺近頗以此失望人懐離貳光尋擢祐為寧逺將軍金城太守祐次允吾襲據外城以叛祐從弟隨據鸇陰起兵應之光遣將軍魏真討隨隨敗奔祐光將姜飛又擊敗祐衆祐奔據興城扇動百姓夷夏多從之飛司馬張象叅軍郭雅謀殺飛應祐發覺迯奔太安元年春正月初苻堅之敗張天錫南奔其世子大豫為長水校尉略陽王穆所匿堅還長安穆將大豫俱奔河西依秃髮思復鞬思復鞬送之魏安至是魏安人焦松齊肅張濟等起兵數千迎大豫為主攻拔昌松郡執太守王世強二月光遣輔國將軍杜進擊之進等敗績大豫遂進逼姑臧求決勝負王穆諫曰吕光糧豐城固甲兵精鋭逼之非利不如席卷嶺西厲兵積粟然後東向而争不及朞年光可平也大豫不從乃自號撫軍將軍涼州牧改元鳳凰以王穆為長史傳檄郡縣使穆求救於隴西諸郡建康太守李隰祁連都尉嚴純及閻襲等起兵應之有衆三萬保據楊塢夏四月大豫自揚塢進屯姑臧城西王穆率衆三萬及秃髪思復鞬子奚干一作于等陣於城南光出擊大破之斬奚干等二萬餘級光謂諸將曰大豫若用王穆之言恐未可平也諸將皆曰大豫豈不及此耶皇天欲贊成明公八百之業故令大豫迷於良算耳光大悦賞賜金帛有差是時堅子丕以光為車騎大將軍涼州牧領䕶西羌大都督酒泉公使者沒於後秦不能達秋九月光始聞苻堅為姚萇所害奮袂哀號三軍縞素大臨於城南傳檄諸州期孟冬大舉偽諡堅曰文昭皇帝長吏百石以上服斬縗三月庶人哭泣三日冬十月光大赦境内建元太安十一月羣僚勸進光曰長蛇未殄方掃除國難不宜進位元台張大豫自西郡入臨洮驅略百姓五千餘家保據俱城光將彭晃徐靈攻破之大豫奔廣武穆奔建康廣武人執大豫送之斬於姑臧市十二月光自稱使持節侍中中外大都督督隴右河西諸軍事大將軍領䕶匈奴中郎將涼州牧酒泉公太安二年春正月姑臧大風折木從申至辰遣中郎房晷至晉昌祀風穴羅什謂光曰不祥之風當有奸叛然不勞自定也秋八月甘露降於逍遥園白鷰翔于酒泉衆鷰成列而從之時王穆襲據酒泉自稱大將軍涼州牧光以郭黁讖言改昌松郡為東張掖郡冬十二月涼州大饑糓價踴貴斗米直錢五百文人相食死者大半光西平太守康寧自稱匈奴王殺河湟太守強禧阻兵以叛光屢遣兵討之不剋别將徐靈與張掖太守彭晃謀叛光遣將討靈靈奔於晃晃東結康寧西通王穆光欲自擊晃諸將皆曰今康寧在南阻兵伺隙若大駕西行寧必乘虚出於嶺左晃穆未平康寧復至進退狼狽勢必大危光曰事勢寔如卿言然我今不往是坐待其來也晃穆共相唇齒寧又同惡相濟若三寇連兵東西交至則城外皆非吾有大事去矣今晃叛逆始爾寧穆與之情契未宻及其倉卒取之為易且隆替命也卿勿復言乃自率步騎三萬倍道兼行既至攻之二旬晃將寇顗斬闗納光遂拔其城誅彭晃初王穆之起兵也遣使招燉煌處士郭瑀瑀歎曰臨河救溺不卜命之短長脈病三年不豫絶其飱饋魯連在趙義不結舌況人將左袵吾安忍不救之乃與同郡索嘏起兵五千運粟三萬石以餉穆穆以瑀為太府左長史軍師將軍嘏為燉煌太守瑀雖居元佐而口詠黄老冀功成世定追伯成之蹤既而穆惑於讒間忌嘏威名率衆伐嘏瑀諫曰昔漢定天下然後誅功臣今事業未建而誅之立見麋鹿遊于此庭矣穆不從瑀出城大哭舉手謝城曰吾不復見汝矣還而引被覆面不與人言不食七日輿疾而歸旦夕祈死夜夢乘青龍上天至屋而止寤而歎曰龍飛在天今止於屋屋之為字尸下至也龍飛屋上尸至吾其死也古之君子不卒内寢況吾正士乎遂還酒泉南山赤崖閣飲氣而卒光聞穆之伐嘏謂諸將曰二虜相攻此成擒也將攻之諸將咸以為不可光曰取亂侮亡武之善經不可以憚累征之勞而失永逸之機也遂率步騎二萬攻酒泉克之進次涼興穆引師東還路中衆散穆單騎奔騂馬騂馬令郭文斬首送之龜兹國使至獻寶貨竒珍汗血馬光臨正殿設㑹文武博戲太安三年春正月光信讒言殺武威太守杜進他日與羣僚讌酒酣語及政事時刑法峻重恭軍京兆叚業進曰嚴刑重憲非明王之義也光曰商鞅之法至峻而兼諸侯吴起之術無親而楚以霸何也業曰起喪其身鞅亡其家皆殘酷之致也明公受天眷命方開建大業景行堯舜猶懼不濟奈何欲以商申之末法臨道義之神州豈此州士女所望於明公哉光改容謝之於是下令責躬乃崇寛簡之政是年燉煌太守宋歆送同心梨陳平仲涼州記作陳沖得玉璽獻之博三寸長四寸直看無文字向日視之字在腹中有三十四字言光當王又白雀巢於陽川令蓋敏屋光下令諸臣為之賦時獻詩及賦者凡百餘人麟嘉元年春正月張掖金澤縣有麟見百獸皆從光以為己瑞於是羣僚奉表請崇進名號遂以晉孝武太元十四年二月僭即三河王位於南郊置百官自丞郎已下猶攝州縣事大赦境内改元麟嘉光妻石氏子紹弟德世自仇池來至姑臧光迎於城東大饗羣臣立石氏為王妃子紹為世子讌羣臣於内苑新堂遣市璽玉於于闐冬十月遣弟左將軍他子武賁中郎將纂討北虜匹勤於三巖山大破之是年造刀一口銘其背曰麟嘉長三尺六寸麟嘉二年秋九月太廟新成追尊高祖為敬公曾祖為恭公祖為宣公父為景昭王母為昭烈妃中書侍郎楊頴上疏請依三代故事追尊吕望為始祖永為不遷之廟光從之是嵗焉耆國王龍熙遣子入侍張掖督郵傅曜考覈郡縣而丘池令尹興殺之投諸空井曜見夢於光曰臣張掖郡小吏案校諸縣而丘池令尹興贓狀狼藉懼臣言之殺臣投於南亭空井中臣衣服形狀如是光寤而猶見久之乃滅遣使覆之如夢光怒殺興麟嘉三年春二月著作郎段業以光未能揚清激濁使賢愚殊貫因療疾于天梯山作表志詩九歎七諷十六篇以諷之光覽之而悅署業為建康太守冬十月金城王乞伏乾歸遣南羌彭奚念入攻白土都尉孫峙退奔興城光遣兵乘虚伐金城乾歸聞之引兵而去光亦引還麟嘉四年秋八月光遣南中郎將方及弟右將軍寶振威將軍楊範強弩將軍竇茍攻乞伏乾歸於金城方屯河北寶進師濟河為乾歸所敗寶及將士死者萬餘人光又遣武賁中郎將纂及竇茍率步騎五千南攻彭奚念戰于盤夷纂大敗而歸光遂率兵親討復遣纂及揚武將軍略陽楊軌建中將軍沮渠羅仇建武將軍梁恭軍於左南奚念大懼乃於白土津累石為堤以水自固遣精兵一萬拒守河津光遣將軍王寶潛趣上津夜渡湟河光濟自石堤攻剋枹罕奚念單騎奔甘松光振旅而還麟嘉五年春正月初光徙西海郡人於諸郡至是謡曰朔馬心何悲念舊心中勞燕雀何徘徊意欲還故巢頃之遂相扇動復徙之於河西樂都秋七月羣議以高昌雖在西垂地居形勝外接胡虜易生翻覆宜遣子弟鎮之光以子覆為使持節鎮西將軍都督玉門已西諸軍西域大都䕶鎮高昌命大臣子弟隨之麟嘉六年春正月光遣使拜秃髮烏孤假節冠軍大將軍河西鮮卑大都綂廣武郡侯夏六月光帥衆十萬伐西秦王乞伏乾歸乾歸遣使稱藩以子勑勃為質光引兵還勑勃西秦錄作勃勃龍飛元年夏六月五龍見於浩亹羣臣咸賀勸光稱尊光於是以晉太元二十一年僭即天王位大赦境内殊死已下改元龍飛備置郡司立世子紹為太子封庶長子纂為太原公秦州刺史弟延為天水公𢎞為常山公其餘子弟為公侯者十七人署中書令王詳為尚書左僕射著作郎段業等五人為尚書又遣使拜秃髪烏孤為征南大將軍益州牧左賢王冬十月西秦涼州牧乞伏軻彈與秦州牧乞伏益州不平彈率衆來奔光下書曰乾歸狼子野心前後反覆朕方東清秦趙勒銘㑹稽豈令豎子鴟峙洮南且其兄弟内相離間可乘之機無過今也其勅中外戒嚴朕當親討龍飛二年春正月光大舉攻西秦師次於長最乾歸羣下請東奔成紀以避之乾歸曰軍之勝敗在于巧拙不在衆寡光兵雖衆而無法其弟延勇而無謀不足憚也且其精兵盡在延所延敗光自走矣二月光使太原公纂率楊軌竇茍等步騎三萬攻金城乾歸率衆二萬來救光遣將軍王寶等率騎五千邀之乾歸懼而不進遂拔金城執太守衞鞬鞬瞋目謂光曰吾寧守節斷頭誓不為降虜也光義而免之光又遣將軍梁恭金石生與秦州刺史沒奕干以甲卒萬餘出陽武下峽攻其東天水公延以枹罕之衆攻臨洮武始河闗皆剋之乾歸因大震泣歎曰死中求生正在今日也乃縱反間紿延云乾歸衆潰東奔成紀延欲引輕騎追之司馬耿稚諫曰乾歸雄勇過人權略難測破王廣剋楊定皆羸師以誘之雖蕞爾小國亦不可輕也困獸猶鬭況乾歸安肯望風自潰乎且告者視高而色動必有奸計今宜整步陳而前使步騎相接徐俟後軍畢集然後擊之可一戰滅也延不從進與乾歸相遇戰敗死之耿稚及將軍姜顯收集散卒還屯枹罕光亦引兵還于姑臧夏四月初張掖臨松盧水胡沮渠羅仇匈奴沮渠王之後也世為部帥光以羅仇為尚書從伐西秦及延敗死羅仇弟三河太守沮渠麴粥謂羅仇曰主上荒耄信讒今軍敗將死正其猜忌智勇之時也吾兄弟素為所憚與其經死溝瀆孰若勒兵向西平出苕藋奮臂大呼涼州不足定也羅仇曰理如汝言但吾家累世忠孝為一方所歸寧人負我無我負人也未幾光果殺羅仇及麴粥羅仇弟子蒙遜求帥喪還塟鄉里諸部㑹塟者萬人蒙遜哭謂衆曰吕主昬荒無道多殺不辜吾家上世雄視河西今欲與諸部雪二父之恥復上世之業何如衆多從之遂殺光䕶軍馬邃攻拔臨松郡屯據金山大為百姓之患蒙遜從兄男成先為光將守晉昌聞蒙遜起兵逃奔貲虜扇動諸夷衆至數千進攻福祿建安將軍寧戎䕶軍趙策擊敗之男成退奔樂涫五月光遣太原公纂率衆二萬擊敗蒙遜於忽谷酒泉太守壘澄率將軍趙策趙陵步騎萬餘討男成於樂涫戰敗澄策死之男成進攻建康遣人説建康太守段業曰吕氏政衰權臣擅命刑罰失中人不堪役一州之地叛者連城瓦解之形昭然在目百姓嗷然無所依附府君奈何以葢世之才欲立忠於垂亡之國乎男成等既唱大義欲屈府君俯臨鄙州使塗炭之餘獲來蘇之惠何如業不從相持二旬外救不至郡人高逵史惠等言於業曰今孤城獨立臺無救援府君雖心過田單而地非即墨宜思高算轉禍為福業先與光侍中房晷僕射王詳不平懼不自容乃許之自稱大都督龍驤大將軍涼州牧建康公光命太原公纂將兵五萬討業時謂業等烏合纂有威聲勢必克全光以問羅什什曰觀察此行未見其利既而蒙遜進屯臨洮為業聲援戰於合離纂兵大敗秋八月光散騎常侍西平郭黁以光年老知其將敗遂與僕射王詳起兵作亂詳為内應事發光乃誅詳黁遂據東苑以叛民間皆言聖人舉兵事無不成從之者甚衆黁以為代吕者王乃推王乞基為主光馳使召纂討黁纂將還諸將勸纂曰段業聞師迴必躡軍後若潛師夜還庶無後患也纂曰業雖憑城阻衆無雄略之才若夜潛還適足張其奸志耳乃遣使告業曰郭黁作亂吾今還都卿能決者可早出戰遂棄大軍先將輕騎引還業亦不敢出纂司馬楊綂謂其從兄桓曰郭黁明善天文起兵其當有以京城之外非復朝廷之有纂今還都復何所補請除纂勒兵推兄為盟主西襲吕𢎞據張掖號令諸郡亦千載一時也桓怒曰吾聞臣子之事君親有隕無二吾為吕氏臣安榮其祿危不能救豈可復増其難乎吕氏若亡吾為𢎞演矣綂懼至番禾奔歸于黁黁遣軍邀纂于白石纂大敗光西安太守石元良率步騎五千赴難與纂共擊黁軍破之遂入姑臧涼人張捷宋生等招集戎夏三千餘人反於休屠城與黁共以書牋招誘後將軍楊軌推為盟主軌性粗直不慮黁之傾危河西太守程肇諫曰將軍之與吕王可謂臭味是同今欲釋同心託異𩔖背龍頭從蛇尾非將軍之高算也願將軍熟思之軌不從乃自稱大將軍涼州牧西平公纂擊黁將王斐于城西大破之黁勢漸衰遣使請救于秃髪烏孤九月烏孤使弟驃騎利鹿孤帥騎五千援黁冬十一月光遺楊軌書曰自羌胡不靖郭黁叛逆南藩安否音問兩絶行人風傳云卿擁逼百姓為黁唇齒卿雅志忠貞有史魚之操鑒察成敗逺侔古人豈宜聽納姦邪以虧大美凌霜不彫者松柏也臨難不移者君子也何圖松柏彫於微霜而雞鳴已於風雨郭黁巫卜小數時或誤中考之大理率多虚謬朕宰化寡方澤不逮逺致世事紛紜百城離叛戮力一心同濟巨海者望之於卿也今中倉積粟數百千萬東人戰士一當百餘入則言笑晏晏出則步武涼州吞黁咀業綽有餘暇但與卿形雖君臣心過父子朕欲全卿名節不使貽笑將來卿三思之軌不答龍飛三年春二月楊軌以司馬郭緯為西平相率步騎二萬北赴郭黁秃髪傉檀亦率騎一萬助之軌至姑臧營於城北三月太原公纂將兵擊軌郭黁帥衆來救纂敗引還段業使沮渠蒙遜攻西郡執其太守吕純純光之弟子也於是晉昌燉煌等郡並降於業夏六月楊軌自恃士馬之盛議欲與光大決成敗黁每以天文裁止之常山公𢎞鎮張掖業使輔國將軍沮渠男成及酒泉太守王徳來攻光遣太原公纂迎之軌謀于衆曰吕𢎞精兵一萬若與纂合則敵強我弱養獸不討將為後患乃與秃髪利鹿孤共邀纂纂與戰大破之軌奔王乞基郭黁聞軌敗東走魏安降於乞伏乾歸常山公𢎞為業所攻引兵棄張掖東走業將兵追𢎞𢎞擊敗之業遂城西安以别將臧莫孩為太守太原公纂又擊敗之冬十月建武將軍李鸞以興城降於秃髪烏孤龍飛四年夏五月太子紹太原公纂將兵伐段業業乞救於秃髪烏孤烏孤遣驃騎利鹿孤及楊軌救之紹以業等軍盛欲從三門闗挾山而東纂曰挾山示弱取敗之道不如結陣衝之彼必憚我而不戰也紹乃引軍而南業案兵不動紹等亦引而還秋九月光寢疾冬十二月光疾甚立太子紹為天王自號太上皇帝以太原公纂為太尉常山公𢎞為司徒謂紹曰吾疾病唯増恐將不濟今國家多難三寇闚􅎿迭伺國隙吾歿之後使纂綂六軍𢎞管朝政汝恭已無為委重二兄庶幾可濟若内相猜貳釁起蕭牆則晉趙之變旦夕至矣又謂纂𢎞曰永業才非撥亂直以立嫡有常猥居元首今外有強寇人心未寧汝兄弟緝穆則祚流萬世若内自相圖則禍不旋踵纂𢎞泣曰不敢有異心又執纂手戒之曰汝性粗暴深為吾憂開基既難守成不易善輔永業勿聽讒言是日光卒時晉安帝隆安三年也光年六十三在位十四年偽諡懿武皇帝廟號太祖墓號高陵十六國春秋卷八十一
