body:
  text: 十六國春秋卷七十前凉録一張軌張軌字士彦安定烏氏人漢常山王耳十七世孫也家世孝亷以儒學著聞祖烈魏外黄令父温為太官令母隴西辛氏軌少好學明經有器量姿儀典則與同郡皇甫謐字士安友善隠於宜陽女几山太始初受叔父錫官五品中書監張華與軌論經義及政事損益甚器重之謂安定中正為蔽善抑才乃美為之談以為二品之精衛将軍楊珧辟為掾除太子舎人與京兆杜預以聽注易遣之太康中為尚書郎太子洗馬中庶子累遷散騎常侍征西將軍司馬軌以晉室多難隂圖保據河西追竇融故事筮之遇泰之觀軌投筴大喜曰霸者之兆乃求為凉州公卿亦舉軌才堪御逺永寧初出為持節䕶羗校尉凉州刺史於時鮮卑反叛冦盗縱横軌到官即討破之斬首萬級威著西州化行河右課農桑拔賢才以宋配隂充汜瑗隂澹為股肱謀主置崇文祭酒位視别駕徴九郡胄子五百人立學校以教之春秋行鄉射之禮秘書監繆世徴少府摯虞夜觀星象相與言曰天下方亂避難之國唯凉土耳張凉州德量不恒殆其人乎河間成都二王之難遣兵三千東赴京師初漢末金城人陽成逺殺太守以叛郡人馬忠赴屍號哭嘔血而死張掖人呉詠為䕶羗校尉馬賢所辟後為太尉龎參掾參賢相誣罪應死各引詠為證詠計理無兩直遂自刎而死參賢慚悔自相和釋軌皆祭其墓而封其子孫永興中鮮卑若羅拔能皆為冦軌遣司馬宋配擊之斬拔能俘十餘萬口威名大振惠帝西略軌遣使貢其方物加號安西将軍封安樂鄉侯邑千戸光熈元年冬十一月惠帝崩軌遣長史北宮純司馬張纂别駕隂監奉表京師是嵗大城姑臧其城本匈奴所築也南北七里東西三里地有龍形故名卧龍城漢末博士燉煌侯瑾謂其門人曰後城西泉水當竭有雙闕起其上與東門相望中有霸者出焉至魏嘉平中郡官果起學舘築雙闕於泉上與東門正相望又有客相印曰祚傳子孫長有西夏闗洛傾䧟凉土獨全至是張氏遂霸河西今之甘州永嘉元年春正月東𦍑校尉韓稚殺秦州刺史張輔軌少府司馬楊𦙍言於軌曰韓稚擅殺刺史明公杖鉞一方宜懲不恪此亦春秋之義諸侯相滅亡桓公不能救則桓公恥之軌從焉遣中督䕶汜瑗帥衆二萬討稚先遺稚書曰今王綱紛撓牧守宜戮力勤王適得雍州檄云卿稱兵内侮吾董任一方義在伐叛武旅三萬駱驛繼發伐木之感心豈可言古之行師全國為上卿若单馬軍門者當與卿共平世難也稚得書乃詣軍門降遣太府主簿令狐亞聘南陽王司焉模模甚悦遺軌以帝所賜劍謂軌曰自隴以西征伐斷割悉以相委如此劍矣永嘉二年夏五月王彌帥衆冦洛陽軌遣督䕶北宮純張纂馬魴隂濬等帥州軍入衛京師純等募勇士千餘人突陳擊彌破之又敗劉聰於河東帝嘉其忠進封西平郡公軌辭不受時京師為之歌曰凉州大馬横行天下凉州鴟苕冦賊消鴟苕翩翩怖殺人永嘉三年冬十月辛酉北宮純等夜帥勇士千餘人攻漢壁斬淵征虜將軍呼延顥永嘉四年冬十一月黄龍出於臨羗河發水昇天身長十餘丈張掖臨松山後魏太和中置臨松郡故城在此山下有石如張掖字掖字漸磨滅粗可識而張字分明又有文曰初祚天下西方安萬年又蘭池送𤣥石大如丸破之中有必字青㸃白文書之又姑臧送𤣥石白㸃如星成二十八宿嘉麥一莖九穗生於姑臧於時天下既亂所在使命莫有至者獨軌遣使貢獻嵗時不替朝廷嘉之屢降璽書慰勞永嘉五年軌患風疾口不能言使子茂攝州事别駕麴晁欲專威福遣使詣長安告南陽王司馬模稱軌廢疾不堪視事請以秦州刺史賈龕代之龕將受之其兄讓龕曰張凉州一時名士威著西土汝何德以代之也龕乃止隴西内史晉昌張越凉州大族䜟言張氏霸凉自以才力應之志在凉州遂託疾歸河西隂圖代軌乃與兄酒泉太守張鎮及西平太守曹祛謀圖為輔車之勢宻遣使詣京師鎮祛等上䟽更請刺史未報先移檄廢軌以軍司馬杜耽攝州事使耽表越為刺史軌下令曰吾在州八年不能靖綏區域又值中州喪亂秦隴倒懸加以疾患委篤實思歛迹避賢但負荷重任未便輙遂不圖諸人横興此變是不明吾心也吾視去貴州如脱屣耳欲遣主簿尉髦奉表詣闕便速脂轄將歸老宜陽長史王融參軍孟暢蹋折鎮檄排閣入諫曰普室多故人神塗炭實頼明公撫寧西夏張鎮兄弟敢肆凶逆宜聲其罪而戮之不可坐成其志也軌黙然融等遂出戒嚴武威太守張琠遣子坦馳詣京師表曰魏尚安邊而獲戾充國盡忠而被遣皆前史之所譏今日之明鍳也順陽之為劉陶守闕者十人刺史之蒞臣州若慈母之於赤子百姓之愛臣軌若旱苖之得膏雨伏聞信惑流言當有遷代民情嗷嗷如失父母今戎夷猾夏不宜騷動一方會軌子實來自京師遂以實為中督䕶將兵討鎮遣鎮外甥太府主簿令狐亞先徃喻鎮曰舅何不審安危明成敗主公河西著德兵馬如雲此猶烈火已焚待江河之水溺於洪流望越人之助其何及哉今數萬之軍已臨近境惟全老親存門戸輸誠歸官必保萬全之福鎮流涕曰人誤我也乃委罪功曹魯連而斬之詣實歸罪實南討曹祛走之朝廷得鎮䟽以侍中袁瑜為凉州刺史治中隂澹率數十人馳詣長安皆割耳於盤上訴軌之被誣南陽王司馬模表請停瑜會張坦至自京師亦上表留軌朝廷優詔勞軌依模所表且命誅曹祛軌大悦赦州内殊死已下命實帥尹貟宋配步騎三萬討祛張越奔鄴别遣從事田逈王豐帥騎八百自姑臧西南出石驢據長寧袪遣麴晁拒之戰於黄阪實詭道出浩亹戰於破羗斬袪及牙門田囂遣治中張閬送義兵五千及郡國秀孝貢計器甲方物歸於京師令有司可推詳立州已來清貞德素嘉遯遺榮髙才碩學著述經史臨危殉義殺身為君忠諌而嬰禍專對而釋患權智雄勇為時除難謟佞誤主傷䧟忠良者具狀以聞州中父老莫不相慶光禄大夫傅袛太常摯虞遺軌書告以京師饑匱軌即遣參軍杜勲獻馬五百疋㲜布三萬疋冬十一月帝遣使者進拜軌鎮西将軍都督隴右諸軍事封霸城侯尋進車騎大将軍開府辟召儀同三司策命未至而劉曜攻䧟長安一作王彌遂逼洛陽遷帝於平陽軌遣将軍張斐北宫純郭敷等率精騎五千徃衞京師及京都䧟斐等皆沒於賊中州避難來者日月相繼軌乃上表請合秦雍流移人於姑臧西北置武興郡統武興大城烏支襄武晏然新鄣平狄司監等縣又分西平界置晉興郡統晉興枹罕永固臨津臨鄣廣昌大夏遂興罕唐左南等縣以居之永嘉六年春三月太府主簿馬魴言於軌曰四海傾覆乘輿未返明公以全州之力徑造平陽翼戴晉室必當萬里風披有征無戰未審何憚不為此舉軌曰是孤心也㑹聞秦王司馬業入闗乃馳檄闗中曰主上搆危遷幸非所普天分崩率土喪氣秦王天挺聖德神武應期世祖之孫王今為長凡我晉人食土之𩔖龜筮克從幽明同欵宜簡令辰奉登皇位今遣前鋒督䕶宋配帥歩騎二萬徑趨長安翼衞乘輿折衝左右西中郎将實率中軍三萬武威太守張琠帥胡騎二萬駱驛繼發仲秋中旬㑹於臨晉秋九月秦王為皇太子遣使拜軌驃騎大將軍儀同三司進位司空封西平公邑三千戸固辭不受金城太守胡朂叛遣督䕶宋毅治中令狐瀏討之濟河中流白魚入船瀏曰魚鱗物虜必解甲歸我矣朂請降軌宥之秦州刺史裴苞東羗校尉貫興據險斷絶使命實與宋配等擊破之西平王叔與曹袪餘黨麴儒等刼前福禄令麴恪為主執太守趙彛東應裴苞實廽師討之斬儒等左督䕶隂預復與苞戰於狭西大敗之枹奔桑凶塢是嵗枹罕令嚴羗妾産一龍一鷲鷲尋飛去龍十五日雷雨迎之大風吹㧞張掖郡大樹經宿還立故處皇太子遣使重申前授固辭左司馬竇濤言於軌曰曲阜周旦弗辭營丘齊望承命所以明國憲勵殊勲天下崩亂皇輿幸遷州雖僻逺不忘匡衞故朝廷傾懐嘉命屢集宜從朝㫖以副群心軌不從初實平麴儒徙元惡六百餘家治中令狐瀏曰夫除惡人猶農夫之去草令絶其根勿使能滋今宜悉徙以絶後患實不納儒黨果叛實進平之建興元年夏四月愍帝即位於長安遣使詔軌曰朕以寡昧纂承大統未能梟除凶逆奉迎梓宫枕戈含寃肝心碎裂惟爾凉州刺史張軌乃心王室旌旗連絡萬里星赴進次汧隴便當恊力濟難恢復神州故遣中常侍蘓馬拜爾為鎮西大将軍開府儀同三司加侍中封西平郡公軌固讓不受太府參軍索輔言於軌曰古以金貝皮幣為貨息糓帛量度之耗二漢制五銖錢通易不滯泰始一作治中河西荒廢不用錢幣裂疋以為叚數縑布既壊市易又難徒壊女工不任衣用弊之甚也今中州雖亂此方安全宜從五銖以濟通變之㑹軌納之立制凖布用錢錢遂大行人頼其利是時西胡致金胡餅皆弗䔉作竒狀前趙劉曜冦北地軌又遣參軍麴陶領三千人衞長安建興二年春二月帝遣大鴻臚辛攀拜軌侍中太尉凉州牧西平公軌又固辭朝廷以軌年老多病拜子實為撫軍大将軍副凉州刺史夏五月軌寢疾遺令曰吾無德於人今疾病彌留殆将命也文武将佐咸當𢎞盡忠䂓務安百姓上思報國下以寧家素棺薄𦵏無藏金玉善相安遜以聽朝㫖表立子實為世子己丑薨於正寝年六十在位十三年撰易義十卷𦵏昭陵冊贈侍中太尉賜諡曰武穆私諡武公初軌風病積年二子代行州事閉絶音問莫能知者軌頗識天文毎州内有賊輿疾仰觀曰無能為害終如其言及祚僣號追諡武王廟號太宗十六國春秋卷七十
