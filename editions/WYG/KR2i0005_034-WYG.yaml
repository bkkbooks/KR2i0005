body:
  text: 十六國春秋卷三十四前秦録二苻健苻健字建業洪第三子也初母𦍑氏夢感大羆而孕生之夜洪又夢族曹氏指健謂之曰是兒興家門可以吾名字之於是名羆字世建後避石虎外祖張羆之名故改焉及長雄果便弓馬好施予善事人甚為石虎父子所親愛歴位翼軍校尉鎭軍將軍虎雖外禮苻氏心實忌之乃陰殺其諸兄而不害健也永和六年洪死健嗣位代綂其衆乃去大都督大將軍三秦王之號稱晉官爵遣叔父安告喪於京師且請朝命秋八月京兆杜洪竊據長安自稱晉征北將軍雍州刺史以馮翊張琚為司馬戎夏雄儁多歸附之健密圖闗中懼洪知之乃偽受石祗官爵以趙俱為河内太守戍温牛夷為綏集將軍戍懷密繕宫室於枋頭課所部種麥示無西意有知而不種者健殺之以狥既而自稱晉征西大將軍開府都督闗中諸軍事雍州刺史以武威賈𤣥碩為左長史略陽梁安為右長史叚純為左司馬辛牢為右司馬京兆王魚安定程肱胡文等為軍諮祭酒悉衆而西以魚遵為前鋒行至盟津起浮橋以濟遣弟輔國將軍雄帥步騎五千人入自潼闗兄子揚武將軍菁帥衆七千人自軹闗入河東臨别執菁手曰若事不㨗汝死河北我死河南不及黄泉無相見也濟訖焚橋自統大衆隨雄而進杜洪聞之與健書侮嫚之以司馬張琚弟光一作先字為征虜將軍帥衆萬三千逆戰於潼闗之北光兵大敗走還長安健雖戰勝猶修箋於洪并送名馬珍寶請至長安上尊號洪曰幣重言甘誘我也乃悉召闗中之衆來拒健聞而筮之遇泰之臨健曰小往大來吉亨昔往東而小今還西而大吉孰大焉諸君知否此則漢祖屠秦之機也是時衆星夾河西流占者以為百姓西遷之象健遂率軍進次赤水據其城以抗洪洪弟郁勸洪迎健洪不從郁率所部來降健遣雄略地渭北氐酋毛受屯高陵徐磋屯好畤羗酋白犢屯黄白衆各數萬皆斬洪使遣子來降苻菁魚遵所過城邑無不降附洪懼固守長安九月菁與張光戰於渭北之陰槃擒之三輔郡縣堡壁悉降冬十月健長驅至長安杜洪張琚奔司竹十一月甲午入都長安以民心思晉乃遣叅軍杜山伯詣建康獻㨗并修好於大司馬桓温於是秦雍夷夏皆來歸附趙梁州刺史石寧獨據上邽不下十二月雄進兵撃斬之皇始元年春正月健軍師將軍左長史賈𤣥碩等請依劉備稱漢中王故事表健為侍中大都督闗中諸軍事大將軍大單于秦王健怒曰吾豈堪為秦王耶且晉使未返我官位輕重非汝曹所知也既而密使梁安諷𤣥碩等上尊號健偽讓再三然後許之丙辰僭即天皇位於南郊紀事本末作天王大單于國號大秦大赦境内改元皇始繕宗廟社稷置百官於長安追尊父洪為武惠皇帝廟號太祖尊母姜氏為皇太后立妻强氏為天皇后子萇為太子靚為平原公生為淮南公覿為長樂公方為高陽公碩為北平公騰為淮陽公栁為晉公桐為汝南公庾為魏公武為燕公幼為趙公以雄為都督中外諸軍事丞相領車騎大將軍雍州牧東海公菁為衞大將軍平昌公宿衞二宫雷弱兒為太尉毛貴為司空略陽姜伯周伯周健之舅也為尚書令梁楞為左僕射王墮為右僕射魚遵為太子太師强平平王后之弟也為太傅叚純為太保略陽呂婆樓為散騎常侍趙并州刺史張平遣使來降健署為大將軍冀州牧三月健置司𨽻校尉官分遣使者問民疾苦搜羅雋異寛重歛之稅弛離宫之禁罷無用之器去侈靡之服凡趙之苛政不便於民者悉除之夏四月杜洪張琚遣使招晉梁州刺史司馬勲勲率步騎三萬自漢中入秦川健禦之於五丈原勲屢戰皆敗退歸南鄭健以中書令賈𤣥碩始者不上尊號銜之使人告𤣥碩與司馬勲通并其諸子皆殺之是年野蠶成繭野禾被原百姓採野繭而衣野粟而食闗西家給人足皇始二年春正月丞相雄等固請健正尊號宜依漢晉兼皇王之美不可過自謙沖同趙之初號健從之僭即皇帝位於太極殿大赦境内諸公皆進爵為王且言單于所以統一百蠻非天子所宜領以授太子萇立五等之封以次進之司馬勲既還漢中杜洪張琚屯宜秋洪自以右族輕琚且知勲憚琚兵强因說勲曰不殺張琚闗中非國家有也勲乃偽請琚於坐殺之琚弟光走池陽合衆攻勲勲頻戰不利杜洪遂自立為秦王改元建昌署置百官夏四月以張遇為征東大將軍豫州牧五月健率步騎二萬攻杜洪於宜秋斬之還登石安原而嘆曰美哉斯原也悵然有終焉之志六月甲申健還長安晉鎭西將軍謝尚攻豫州牧張遇於許昌遇遣使請救健遣丞相東海王雄衞大將軍平昌王菁率衆掠地闗東并帥步騎二萬援之丁亥與尚戰於潁水之誡橋尚等敗績奔還淮南死者萬五千人雄乘勝逐北至於壘門殺傷過半秋七月雄徙遇及陳潁許洛之民五萬餘戸歸於闗中或作長安以右衞將軍楊羣為豫州刺史鎭許昌八月健以雷弱兒為大司馬毛貴為太尉張遇為司空冬十月謝尚遣冠軍將軍王俠攻許昌克之豫州刺史楊羣退屯𢎞農十二月丞相雄攻王擢於隴上敗之擢單馬奔凉州雄還屯隴東初有童謡曰十斗二升沙誰為王擢家至是而擢敗皇始三年春正月下書曰其自公卿已下歲舉賢良方正孝亷清才多略博學秀才異行各一人或獻書規諫或靣陳朕過其悉以聞勿拘貴賤二月張重華遣將軍張𢎞宋修㑹王擢帥步騎萬五千來伐雄與菁率衆拒之大敗凉兵於龍黎斬首萬二千級獲𢎞修送長安王擢棄秦州奔姑臧健以領軍將軍願為秦州刺史鎭上邽三月西域胡劉康詐稱劉曜子聚衆於平陽偽稱晉王夏四月左衞將軍飛討擒之五月王擢復帥衆二萬攻上邽秦州郡縣多應之願戰敗奔長安六月左衞將軍飛攻氐王楊初於仇池為初所敗丞相雄平昌王菁帥步騎四萬屯於隴東初張遇自許昌來奔健納遇繼母韓氏為昭儀數于衆中謂遇曰卿吾假子也遇慙恨因雄等精兵在外陰結闗中豪傑欲滅苻氏以雍州歸晉秋七月遇與中黄門劉晃謀夜襲健晃約開門以待之㑹健使晃出外晃固辭不得已而行遇不知引兵至門門不開事覺伏誅於是孔特起池陽劉珍夏侯顯起鄠喬秉起雍胡陽赤起司竹呼延毒起灞城衆數萬人各遣使詣晉大司馬征西將軍桓温中軍將軍殷浩請救八月以左僕射魚遵為司空九月丞相雄帥衆二萬還長安遣平昌王菁略地上洛置荆州於豐陽縣以步兵校尉金城郭敬為荆州刺史引南金竒貨弓竿漆蠟通闗市來逺商於是國用充足異賄盈積矣冬十月丞相雄與清河王法及左衞將軍飛分討孔特等健兄子輔國將軍黄眉自洛陽來奔十一月雄克池陽斬孔特十二月清河王法與左衞將軍飛克鄠斬劉珍夏侯顯皇始四年春正月辛酉丞相雄克司竹胡陽赤奔灞城依呼延毒二月乙丑晉大司馬桓温統步騎四萬發江陵水軍自襄陽入均口至南鄉步兵自浙川趨武闗命司馬勲出子午道趨長安三月温遣别將攻上洛獲荆州刺史郭敬進撃青埿城破之冊府元龜作温遣京兆太守薛珍擊青埿城破之司馬勲掠秦西鄙涼秦州刺史王擢攻陳倉以應温健遣太子萇丞相雄淮南王生平昌王菁北平王碩帥衆五萬拒温於嶢栁城愁思堆長安志云後因名桓公堆夏四月己亥戰於藍田淮南王生單騎突陳出入以十數殺温將應誕劉泓士卒死者甚衆温督軍力戰萇衆大敗丞相雄與温别將桓沖戰於白鹿原為沖所敗温遂轉戰而前壬寅進至灞上萇等退屯城南健與老弱六千固守長安小城悉發精兵三萬為遊軍遣大司馬雷弱兒等與萇合兵拒温三輔郡縣争持牛酒迎降於温温撫諭居民使安堵復業男女夾路觀之耆老有感泣者曰不圖今日復覩官軍健别遣雄帥騎七千馳襲司馬勲於子午谷破之勲退屯女媧堡五月王擢㧞陳倉殺健扶風内史毛難丞相雄復與桓沖戰於白鹿原沖師敗績死者萬餘人初温恃秦麥熟以為軍資而健悉芟麥清野以待之軍糧不屬士卒乏食六月丁丑温徙闗中三千餘户而還呼延毒帥衆一萬從温萇等又追撃之比至潼闗温軍屢敗失亡萬計丞相雄擊司馬勲王擢於陳倉勲奔漢中擢奔略陽遂攻喬秉於雍丙申雄卒太子萇攻秉於雍八月斬之闗中悉平以光禄大夫趙俱為洛州刺史鎭宜陽先是月奄填星在輿鬼占者曰秦有兵革之象㑹温來伐至是而退健賞拒温之功以雷弱兒為丞相毛貴為太傅魚遵為太尉淮南王生為中軍大將軍平昌王菁為司空其年西虜乞没渾邪遣子入侍健於是置來賔館於平朔門以懷逺人起靈䑓於杜門與百姓約法三章薄賦卑宫垂心政事數延公卿咨講治道承趙人苛虐奢侈之後易以寛簡節儉崇禮耆老修尚儒學秦人大悦太子萇拒桓温為流矢所中冬十月萇卒諡曰獻哀十一月王擢帥衆來降健以擢為尚書以上將軍啖鐡為秦州刺史健叔父武都王安自晉還為姚襄所虜以為洛州刺史十二月安自襄亡歸健以安為大司馬驃騎大將軍并州刺史鎭蒲阪是歲闗中大饑米一斗直布一疋皇始五年春二月蝗䖝大起自華澤西至隴山食百草無遺牛馬相噉毛虎狼食人行路斷絶健自蠲百姓租稅減膳徹懸素服避正殿新平有長人見長五丈語於百姓張靖曰苻氏應天受命今當太平外面者歸中而安泰問其姓名弗答俄而不見新平令以聞健以為妖妄詔靖繋獄㑹大雨霖河渭汎溢蒲坂津監宼登於河中得大􅄚一隻長七尺三寸足跡稱屐指長尺餘文深一寸健嘆曰覆載之中何所不有張靖所見定不差也赦之夏四月河内太守王㑹黎陽太守韓高以郡叛降於燕立淮南王生為太子以司空平昌王菁為太尉尚書令王墮為司空司𨽻校尉梁楞為尚書令六月丙子健寢疾庚辰平昌王菁勒兵入東宫將殺太子生而自立時生侍疾西宫菁以健為己卒攻東掖門健聞變登端門陳兵自衞衆見健惶懼皆舍仗逃散健執菁數而殺之餘無所問壬午以大司馬武都王安都督中外諸軍事甲申健引太師魚遵丞相雷弱兒太傅毛貴司空王墮尚書令梁楞左僕射梁安右僕射叚純吏部尚書辛牢等嘱以後事受遺輔政健謂太子生曰六夷酋帥及大臣執權者若不從汝命宜漸除之乙酉薨於太極前殿在位五年年四十九一作三十九葬原陵諡曰明皇帝廟號世宗永興初追尊曰景明皇帝號高祖十六國春秋卷三十四
