body:
  text: 十六國春秋卷七十三前凉録四張重華張重華字泰臨一作太林駿之第二子也寛和懿重沉毅少言父卒時年十六普永和二年夏六月右長史任處上重華為使持節大都督大將軍太尉䕶羗校尉凉州牧西平公假凉王大赦境内建元永樂尊嫡母嚴氏為太王太后居永訓宫生母馬氏為王太后居永夀宫輕賦歛除關税省園囿恤貧窮遣使奉章於石虎未幾虎遣將軍王擢襲武街執䕶軍曹權胡宣等徙七千餘戸於雍州虎又遣梁州刺史麻秋將軍孫伏都等侵冦不輟進軍武威金城太守張冲降之縣令燉煌車濟守節不屈伏劍而死進陷大夏大夏䕶軍梁式執太守宋晏以城應之遺書誘致宛戍都尉宋矩矩乃自刎凉州振動重華悉發境内兵使征南將軍裴恒將之以禦趙兵恒壁於廣武乆而不戰欲以時日弊之復遣宋輯為之後繼濟河次於金城將决大戰乃有黒虹下於營中懼而遁歸牧府相司馬張耽言於重華曰臣聞國以兵為强以將為主主將者存亡之機吉凶所係故燕任樂毅剋平全齊及任騎刼喪七十城之地是以古之明君靡不慎於將相也今之所要在於軍師然議者舉將多推宿舊未必妙盡精才也且韓信之舉非舊名也穰苴之信非舊將也吕蒙之進非舊勲也魏延之用非舊德也蓋明王之舉舉無常人才之所堪則授以大事今彊冦在郊諸將不進人情騷動危機稍逼主簿謝艾兼資文武明識兵略若授以斧鉞委以專征必能折衝禦侮殱殄凶𩔖重華乃召艾問以討冦方略艾曰昔耿弇不欲以賊遺君父黄權願以萬人當冦乞假臣兵七千為殿下吞王擢麻秋等重華大悦拜艾為中堅將軍給歩騎五千一作七千使擊之艾進與秋戰大破之斬秋將綦母安等俘斬萬五千級秋七月有司議遣司兵趙長迎秋於西郊謝艾以春秋之義國有大喪省蒐狩之禮宜待踰年别駕從事索遐議曰禮天子崩諸侯薨未殯五祀不行既殯而行之魯宣三年天王崩不廢郊祀今王綂承大位百揆維新宜在璿璣玉衡以齊七政立秋萬物將成殺氣之始其於王事杖麾誓衆釁鼓禮神所以討逆除暴成功濟務寧宗廟社稷致天下之福不可廢也重華從之永和三年夏四月麻秋進攻枹罕晉昌一作陽太守郎坦以城大難守欲奔外城武威一作城太守張悛曰棄外城則衆心動大事去矣不可以動衆心寧戎校尉張據從悛言固守大城秋率衆八萬圍塹數重雲梯電一作抛車地突百道皆通於内城中亦起雲梯電車穿地應之殺傷秋衆數萬石虎復遣别將劉渾等率歩騎二萬㑹之郎坦恨言之不從教軍士李嘉潜與秋通引賊千餘人上城西北隅據督宋脩張𢎞辛挹郭普等拒之短兵接戰殺二百餘人趙兵乃退據斬李嘉以狥燒其攻具秋退保大夏謂諸將曰我用兵於五都之間攻城略地徃無不㨗及登秦隴謂有征無戰豈悟南襲仇池破軍殺將築城長最疋馬不歸及攻此城傷兵挫鋭殆天所賛非人力也虎聞而嘆曰吾以偏師定九州今以九州之力困於枹罕真所謂彼有人焉未可圖也乃以中書監石寧為征西將軍帥并司州兵二萬餘人為秋等後繼重華將宋秦等帥戸二萬降於趙復以謝艾為使持節軍師將軍率歩騎三萬進次臨河秋以三萬衆來拒事具艾傳艾遣别將張瑁從左南縁河而截其後趙軍乃退艾乗勝追擊復大破之斬秋將杜勲汲魚俘斬一萬三千級秋匹馬奔大夏夏五月秋與石寧復率衆十二萬據枹罕進屯河南遣劉寧王擢略地晉興廣武武街越洪池嶺至於曲栁重華使將軍牛旋拒之退守枹罕姑臧大振重華議欲親出拒之謝艾固諫以為不可别駕從事索遐進曰賊衆甚盛漸逼京畿君者國之鎮也不可以親動左長史謝艾文武兼資國之方召宜委以推轂之任殿下居中作鎮授以策略小賊不足平也重華納之乃以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍率歩騎二萬拒之别將楊康敗劉寧於沙阜寧退屯金城秋七月石虎復遣征西將軍孫伏都將軍劉渾率歩騎二萬㑹麻秋軍長驅濟河來擊遂城長最艾軍進次神烏王擢與艾前鋒戰敗退遁河南八月戊午艾進擊秋大破之秋遁歸金城艾還討叛虜斯國一作骨真等萬餘落皆破平之斬首千餘級俘擒二千八百戸獲牛羊十餘萬頭麻秋又襲擊重華將張瑁瑁敗失軍三千餘人枹罕䕶軍李逹帥衆七千奔降於趙自河以南氐𦍑皆附之冬十月乙丑康獻皇后詔遣侍御史俞歸至凉州授重華侍中大都督督隴右闗中諸軍事大將軍凉州刺史䕶𦍑校尉假節西平公歸至姑臧重華方謀為凉王以位號未稱怒不受詔羣僚共上重華為丞相凉王領雍秦凉三州牧使所親信人沈猛私謂歸曰我家主公奕世忠於晉室今曾不如鮮卑何也臺加慕容皝為燕王而主公甫授州主大將軍何以勸有功忠義之臣乎明臺今宜移河右共勸州主為凉王大夫出使茍利社稷專之可也歸對曰吾子失言王者之制異姓不得稱王九州之内重爵不得過公漢髙一時分王異姓尋皆誅滅蓋權時之宜非舊體也故王陵曰非劉氏而王者天下共伐之至於戎狄不從此例春秋時呉楚稱王而諸侯不以為非者蓋蠻夷畜之也假令齊魯稱王諸侯豈不四面伐之聖上以貴公忠賢故爵以上公位以方伯寵榮極矣鮮卑北狄豈足為比哉何子失問也且吾又聞之有殊勲絶世者亦有不世之賞今貴公始繼世而便為王設貴公率河右之衆南平巴蜀東掃趙魏修復舊都以迎天子返洛陽天子復以何爵何位可以加賞乎幸三思之猛具宣歸言乃止永和四年重華自以連破勍敵怠政事希接賔客司直索遐諫曰殿下承四聖之業當昇平之㑹荷當今之重任憂率土之塗炭宜躬親萬幾開延英乂夙夜乹乹勉於庶政自頃内外囂然皆云去賊投誠者應即撫慰而彌日不接國老朝賢當虛已引納詢訪政事比多經旬積朔不留意接之文奏入内歴月不省廢替見務注情於奕棋之間繾綣左右小臣之娯不存將相逺大之略至使親臣不言朝吏杜口愚臣所以廻惶憂懼忘寢與食也今王室如燬百姓倒懸正是殿下銜胆茹辛厲心之日深願垂心朝政延納直言周爰五美以成六德捐彼近習弭塞外聲修政聴朝使下觀化重華覽之大悦優文荅謝然不之改也是年天竺國重譯來貢其樂器有鳯首箜篌琵琶五絃笛銅鼓毛圓都曇銅鼔等九種為一部工十二人歌曲有沙石疆舞曲又有天曲永和五年秋九月凉州官屬復上重華為丞相凉王雍秦凉三州牧重華好與羣小遊戯屢出錢帛以賜左右寵臣又喜博奕頗廢政事從事一作徵士索振諫曰先王寢不安席志平天下故繕甲兵積資實大業未就懐恨九泉殿下遭巨冦於諒闇之中賴重餌以挫勍敵今遺燼尚廣倉廩虛竭金帛之費所宜慎之豈可輕有虛耗以與無功之人乎昔世祖即位躬親萬幾章奏詣闕報不終日故能隆中興之業定萬世之功今章奏停滯動經時月下情不得上達沈寃困於囹圄殆非明王之事也臣竊未安重華善之永和六年春二月重華讌羣僚於閑豫堂講論經義永和七年冬十二月石虎西中郎將王擢屯結隴上為秦苻雄所破率衆來奔重華厚寵之以為征虜將軍秦州刺史假節永和八年春二月重華遣將軍張𢎞宋脩一作宗愍等率歩騎萬五千㑹王擢伐秦秦苻健遣衛將軍苻碩禦之戰於龍黎擢等大敗沒軍士三千餘虜張𢎞宋脩等王擢棄秦州单騎奔還姑臧重華痛之素服為戰亡吏士舉哀號慟各遣吊問其家夏五月重華復遣王擢率衆二萬伐上邽秦州郡縣多應之秦將苻碩戰敗奔長安重華因遣使上䟽請伐秦曰季龍自斃遺燼遊魂取亂侮亡覩機則發臣今遣前鋒都督裴恒帥歩騎七萬遥出隴上以俟聖朝赫然之勢山東騷擾不足厝懐長安膏腴宜速平蕩臣守任西荒山川悠逺大誓六軍不及聴受之末猛將鷹揚不豫告成之次瞻雲望日孤憤義傷弹劍慷慨中情藴結秋七月康獻皇后詔進重華為凉州牧永和九年秋九月重華欲誅西河相張祚厩馬四十匹其夜悉無後尾冬十月無雲而雷聲皆東南引日暴出如火中有三足烏形見分明五日乃止十一月己未重華寢疾臨春坊遣左長史馬岌册拜子靈耀一作耀靈為世子大赦境内殊死已下丁卯薨於平章殿年二十四載記作二十七在位八年載記作十一年葬顯陵私謚曰昭公及祚僣號追謚桓王廟號闕祖穆帝賜謚曰敬烈張靈耀張靈耀字元舒重華子也年纔十嵗立為世子嗣事稱大司馬大將軍䕶𦍑校尉凉州刺史凉州牧西平公伯父長寧侯祚有勇力吏幹而性傾巧善承内外初與重華寵臣右長史趙長尉緝等結異姓兄弟都尉張據及謝艾上言權幸用事公室將危宜盡逐長等重華不納及疾甚手令徴艾長等秘而不宣重華既卒長等矯稱遺令以祚為使持節都督中外諸軍事撫軍大將軍輔政長等建議以為時難未夷宜立長君靈耀冲幼請立長寧侯祚祚先烝重華母馬氏乃宻説馬氏遂從長議廢靈耀為寧凉侯而立祚尋為宋混等所攻乃使楊秋胡將靈耀於東苑拉其腰而殺之埋之於沙坑私諡曰哀公張祚張祚字太伯小字螽斯駿之庶長子也􅀶學雄武有政事之才駿之二十一年拜延興太守封長寧侯重華薨子靈耀嗣及靈耀見害祚遂自立稱大都督大將軍䕶𦍑校尉凉州牧凉公祚既得志恣為滛虐通重華妃裴氏自閣内媵妾及駿重華子女未嫁無不滛亂國人士相視以目咸賦牆茨之詩永和十年春正月祚從趙長尉緝等議僣即王位於謙光殿載記作帝位立宗廟置百官郊祀天地用天子禮樂下書曰昔金行失馭凶暴横行石羯氐羗咸懐竊璽我武公以神武撥亂保寧西夏貢欵勤王旬朔不絶四祖承光忠誠彌著徃受晉禪天下所知謙冲遜讓四十年於茲矣今中原喪亂華夷無主羣后僉以九州之望無所依歸神祗岳瀆㒺所慿係逼孤攝行大綂以一四海之心辭不獲已勉從衆議待掃穢二京蕩清周魏然後迎帝舊都謝罪天闕思與兆庶同茲更始乃改建興四十二年為和平元年大赦殊死已下賜鰥寡糓帛加文武爵各一級收酒泉太守謝艾殺之追尊曾祖軌為武王祖寔為昭王從祖茂為成王父駿為文王弟重華為桓王立妻辛氏為王后又立妻叱干氏為王后子泰和為太子弟天錫為長寧王子庭堅為建康王重華少子𤣥靚一作𤣥靖又作天靚為凉武侯改燉煌郡為商州其夜天有光如車蓋聲若雷霆震動城邑明日大風㧞木黒氣一作風晝闇災異屢見而祚滛虐愈甚尚書馬岌以切諫坐免官郎中丁琪復諫曰自我先公累執忠節逺宗呉㑹持盈守謙五十餘載蒼生所以鵠企西望四海所以注心大凉皇天垂賛士庶效死者正以先公道髙彭昆忠踰西伯萬里通䖍守節不二故能以一州之衆抗崩天之虜師徒嵗起人不告疲陛下雖以大聖雄姿纂戎鴻緒勲德未髙於先公而行革命之事臣竊未見其可華夷所以歸繫大凉義兵所以千里嚮赴者以陛下能奉晉室故也今既自專大髙競則一隅之地何以當中國之師城峻衝生負乘致冦惟陛下圖之祚大怒斬之於闕下遣别將和昊伐驪靬戎於南山大敗而還冬十月晉太尉桓温入闗秦州刺史王擢時鎮隴西馳使於祚言温善用兵勢在難測祚既震懼且慮擢之反噬乃召馬岌復位而與之謀宻遣親信人刺擢事竟不克祚益懼遂大聚衆聲言東征實欲西保燉煌㑹温還而止更遣平東將軍秦州刺史牛霸司兵張芳率三千人擊擢破之十一月擢帥衆奔秦永和十一年即祚和平二年也祚廢諸神祀山川枯竭置五都尉司人姦過禁四品以下不得衣繒帛庶人不得畜奴婢乘車馬百姓怨憤國中仲夏雨雪降霜殺苖稼果實行人凍死祚宗人河州刺史張瓘時鎮枹罕士衆強盛祚猜忌之遣别將易揣張玲帥歩騎萬三千以襲之又廣徴兵三十餘道入擊南山諸種夷時張掖人王鸞頗知神道言於祚曰軍不可行出必不還凉國將有大變并陳祚三不道祚大怒叱鸞為妖言沮衆斬之以狥三軍乃發鸞臨刑曰我死不二十日兵敗於外王死於内必矣祚族滅之有神降於𤣥武殿自稱𤣥𡨕與人交語祚日夜祈之神言與之福利祚甚信之衆知祚必敗而凶暴彌甚上下憤憾秋七月祚又遣張掖太守索孚代瓘鎮枹罕使瓘討叛胡瓘聞之斬孚起兵玲等濟河未畢又為瓘兵所破揣单騎奔走瓘兵躡之祚衆震懼瓘遣兵傳檄州郡欲廢祚以侯還第復立靈耀先是驍騎將軍燉煌宋混兄修素與祚有隙祚疑之至是大懼八月混與弟澄等西奔招合夷晉衆至萬餘人遂以應瓘還向姑臧九月次於武始大澤混等為靈耀發哀閏月進至姑臧祚收瓘弟琚及子嵩將殺之琚嵩聞之募市人數百揚聲言張祚無道我兄大軍已至城東敢有舉手者夷三族祚登神雀觀琚嵩殺祚守門卒死者四百餘人斬西門闗納混等領軍將軍趙長開宫門應之長等懼罪入閣呼重華母馬氏出謙光殿拜靈耀庶弟𤣥靚為主混遂長驅入殿中大呼稱萬嵗祚以長等破混也下觀勞之見混等乃案劍殿上大呼叱左右力戰祚素失衆心莫肯為之鬭者長奮槊刺祚中頰祚奔入萬秋閣為厨士徐黒所殺混等梟其首宣示中外暴尸道左城内咸稱萬嵗以庶人禮葬之并殺其二子祚立三年而亡易揣等引兵入殿收長等殺之瓘入姑臧遂立重華少子𤣥靚為大都督大將軍凉王自為凉州牧行大將軍事天錫即位備禮改葬祚於愍陵追謚威王封子庭堅為金澤侯十六國春秋卷七十三
