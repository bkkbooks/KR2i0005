body:
  text: 十六國春秋卷三十前燕録八吐谷渾吐谷渾者本遼東鮮卑慕容廆之庶兄因氏其字以為首𩔖之種號也故謂之野虜父徒河渉歸有二子長曰吐谷渾少曰若洛廆廆代統部落為慕容氏渾庶長廆正嫡父在時分戸一千七百與渾以𨽻之渾與廆二部俱牧馬馬鬬相傷廆怒徑遣使讓渾曰先公處分與兄弟異部牧馬奈何不相逺異而令馬有鬬傷渾怒曰馬是六畜食草飲水春氣動發所以致鬭鬭在於馬何至怒及於人若欲逺别甚易恐後㑹為難耳今當去汝萬里之外矣遂擁馬西行廆悔之遣長史乙那婁馮追謝之渾曰我乃祖以來樹徳遼右先公常稱卜筮之言云我二子皆當强盛祚流後世我孽子也理無並大今因馬而别殆天意乎諸君試驅馬令東馬若東還我當相隨去矣婁馮遣從者二千騎擁馬東出數百歩輙悲鳴西走如是者數十次婁馮曰此非人事也遂不復還西附隂山而居嘗謂其部落曰我兄弟俱當享國廆及曾𤣥纔百餘年耳我𤣥孫已後庶其昌乎永嘉之亂始度隴西止於枹罕而後子孫據有西零已西甘松之界西至於洮水南極於白蘭地方數千里鮮卑謂兄為阿干廆追思之為之作阿干歌嵗暮窮思常歌之渾有子六十人長子吐延嗣吐延年少有大志身長七尺八寸有勇力雄姿魁傑羌虜憚之號曰項羽性俶倘不羣嘗慷慨謂羣下曰大丈夫生不在中國當髙皇光武之代與韓彭吳鄧並驅中原定天下決雌雄使名垂竹帛而潛竄窮山隔閉殊俗不聞禮教於上京不得䇿名於天府生與麋鹿同羣死作氊裘異鬼雖偷觀日月獨不愧於心乎負其智勇性尤猜忌不恤下吏為帛城羌酋姜聰所刺將死乃抽劒召其將紇拔泥使輔長子葉延曰豎子刺吾吾之過也上負先公下愧士女所以控制諸羌者以吾故也吾氣絶棺歛訖便速去保白蘭地既險逺土俗懦弱未易控御葉延小兒欲授餘人恐倉卒不能相制今以葉延付汝竭股肱之力以輔成之孺子得力吾無恨也抽劒而死葉延年十嵗常縛草為人號曰姜聰哭而射之號天而泣不中瞑目大呼要中乃止其母謂之曰逆賊姜聰諸將已屠膾之矣汝年小何為朝夕自苦如此葉延泣曰誠知射草人無益於先讐所以如此者留罔極之心耳性至孝母病五日不食葉延亦不食長而沉毅好問天地造化帝王年厯司馬薄洛隣曰臣等不學實未審三王何父之子五帝誰母所生延曰自羲皇以來符命𤣥象昭焉著見而卿等面墻何其鄙哉語曰夏虫不知冬冰良不虚也又曰吾公孫之子案禮云公孫之子得以王父字為氏吾祖始自昌黎光宅於此乃自號其國曰吐谷渾尊祖之義也葉延卒子辟奚立慕容翰慕容翰字元邕廆之庶長子也性雄豪多權略猨臂善射膂力過人廆甚竒之委以折衝之任所在征伐屢立戰功威聲大振逺近憚之為建威將軍鎮遼東髙句驪不敢為冦尤善撫接愛儒學自士大夫至於卒伍莫不樂而從焉為皝所深忌及廆死翰乃歎曰吾受事於先公不敢不盡力幸賴先公之靈所向有功此乃天贊吾國非人力也而人謂吾之所辦以為雄才難制吾豈可坐而待禍邪遂與其子出奔段遼遼素聞其才冀收其用深加愛敬栁城之戰段蘭欲乘勝深入翰慮成本國之害詭説於蘭曰夫為將當務慎重審已量敵若非萬全不可輕動今雖挫其前鋒一作偏師未能屈其大勢皝多權詐好為潛伏若悉國中之衆自將以拒我我懸軍深入衆寡不敵此危道也且受命之日正求此㨗若違命貪進萬一取敗功名俱喪何以返命蘭曰此已成擒無有歸理卿正慮遂滅卿國耳今千年在東若進而得志吾將迎之以為國嗣終不負卿使宗廟不祀也翰曰吾投身相依無復還理國之存亡於我何有但欲為大國之計且相為惜功名耳乃命所部欲獨還蘭遂不進後石虎征遼皝親帥三軍攻掠令支以北諸城遼議欲追之翰知皝躬自總戎戰必克勝乃謂遼曰今趙兵南至方對大敵當併力禦之而更與燕鬭不宜以小小為事燕王自將而來其士馬精鋭且兵者㐫器戰者危慮萬一失利將何以禦南敵乎蘭怒曰吾前聽卿誑説致成今日之患吾不復墮卿計中矣乃悉將見衆追之皝設伏以俟蘭果大敗翰雖處仇國因事立忠皆此𩔖也蘭既敗還不敢出戰遼遂帥妻子宗族豪石千餘家棄令支奔宻雲山將行執翰手而泣曰不用卿言自取亡敗我固甘心令卿失所深以為愧翰遂北奔宇文氏宇文逸豆歸忌翰才名翰乃陽狂酣飲或卧自便利或被髪歌呼拜跪乞食宇文舉國賤之不復省録以故得往來自遂山川形便皆黙記之時皝亦以翰初非叛亂以嫌疑出奔雖在他國常潛為燕計乃遣商人王車通市於宇文部以窺翰翰見車無言撫膺頷之而已車還以白皝曰翰欲來也復使車迎之翰彎弓三石餘矢尤長大皝為之造可手弓矢使車埋於道旁而宻告之翰竊逸豆歸名馬攜其二子過取弓矢逃歸逸豆歸遣勁騎百餘追之翰遥謂追者曰吾既思戀而歸既得上馬必無反面吾向日陽愚以誑汝吾之弧矢汝曹足知否無為相逼徒自取死追騎輕之直突而前翰曰吾處汝國久矣誓一作恨不欲殺汝汝可百歩豎汝刀吾射中者汝便宜反若不中者可來前也追騎解刀豎之翰一發便中刀鐶追騎乃散既至皝甚加禮遇仍署建威將軍乃言於皝曰宇文强盛日久屢為國患今逸豆歸簒竊得國羣情不附加之性識庸暗將帥非才國無防衛軍無部伍臣久在其國悉其地形雖逺附疆羯聲勢不接無益救援今若擊之百舉百克然髙句驪去國宻邇常有闚􅎿之志彼知宇文既亡禍將及已必乘虚深入掩吾不備若少留兵則不足以守多留兵則不足以行此心腹之患也宜先除之觀其勢力一舉可克宇文自守之虜必不能逺來爭利既取句驪還取宇文如返手耳二國既平利盡東海國富兵强無返顧之憂然後中原乃可圖也皝曰善遂將兵擊髙句驪句驪有二道北道平濶南道嶮狹衆欲從北道翰曰虜以常情料之必謂大軍從北道當重北而輕南王宜帥鋭兵從南道擊之出其不意丸都不足取也别遣偏師出北道縱有蹉跌其腹心已潰四支無能為也皝從之自將勁兵四萬出南道乃以翰為前鋒髙句驪自將弱卒以禦翰軍戰於木底遂大敗之因引而還㑹宇文逸豆歸遣其相莫淺渾將兵來冦皝復使翰出擊破之渾僅以身免盡俘其衆後皝自將伐逸豆歸以翰為前鋒歸遣渉夜干將兵逆戰皝遣使謂翰曰渉夜干勇冠三軍宜小避之翰曰歸之精鋭已盡於此今若克之則歸可不勞兵而滅夜干雖有虚名實易與耳不宜縱敵以挫兵氣進戰斬之翰為流矢所中卧病積時不出後疾漸差於其家中騎馬自試或有人告翰稱病而私習騎乘疑為非常皝雖藉翰勇略然中心素忌之遂賜翰死翰臨死謂使者曰翰懷疑出奔罪不容誅不能以骸骨委於賊庭故歸罪有司天慈曲愍不即肆之朝市今日之死亦已晩矣此句一作翰之生也但逆胡跨據神州中原未平翰常克心自誓志吞醜虜欲為國家蕩一區夏上成先王遺㫖下謝山海之責此志不遂沒有遺恨命也奈何仰一作飲藥而死翰子鉤為樂陵太守與青州刺史朱禿共治厭次鉤自恃宗室每陵侮禿秃不勝忿襲鉤殺之南奔段龕慕容仁慕容仁字元愷小字千年廆之少子皝同母弟也有勇略屢立戰功深得士心為征虜將軍鎮平郭其季弟昭為廣武將軍亦有才藝並有寵於廆皝素不平之咸和八年夏五月廆死仁自平郭來奔喪私謂昭曰吾等素驕多無禮於嗣君嗣君剛嚴無罪猶可畏况有罪乎昭曰吾輩皆體正嫡於國有分兄素得士心我在内未為所疑伺其間隙除之不難兄趣舉兵以來我為内應事成之日與我遼東男子舉事不克則死不能效建威偷生異域也仁曰善遂還平郭閏月仁舉兵而西或以仁昭之謀告皝皝未之信遣使按驗仁兵已至黄水一作已至險瀆知事已露遂殺使者還據平郭皝賜昭死乃以𤣥莵太守髙詡為廣武將軍將兵五千與庶弟建武幼稚廣威軍寜逺汗司馬佟夀等討仁戰於汶城北皝兵大敗軍士皆沒於仁襄平令王永前大司農孫機等舉遼東城叛應之仁自稱車騎將軍平州刺史遼東公段遼及鮮卑諸部皆與仁遥相應援仁以司馬翟楷領東夷校尉前平州别駕龎鑒領遼東相皝自帥軍討仁至於襄平遂攻拔之翟楷龎鑒單騎遁走居就新昌皆降仁固守平郭皝欲悉坑遼東民髙詡諫曰遼東之叛實非本圖直畏仁凶威不得不從今元惡猶存始克此城遽加夷滅則未下之城無歸善之路矣皝乃止仁又遣兵襲新昌督䕶王寓出撃走之段氏宇文氏各遣使詣仁館於平郭城皝帳下督張英將百餘騎間道潛行掩擊之斬宇文氏使十餘人生擒段氏使以歸皝復謀討仁髙詡進曰仁叛棄君親人神共怒前此海未常凍自仁反已來連年凍者三矣且仁專備陸道天其或者欲使吾乘冰以襲之也皝從之羣僚皆言渉冰危事不若從陸道皝曰吾計已決敢沮者斬乃帥其弟軍師評等自昌黎東踐冰而進凡三百餘里至櫪林口舎輜重輕兵趣平郭去城七里候騎以告仁狼狽出戰先是張英之俘二使也仁恨不窮追及皝之至仁以為復遣偏師輕出冦抄不虞皝之自來謂左右曰今兹來也當不使其疋馬得返矣乃悉衆陣於城之西北廣威軍帥所部降皝仁衆沮動皝因縱擊大破之仁敗走帳下皆叛遂生擒之皝先斬其帳下之叛者然後賜仁死丁衡游毅孫機等皆仁所信用也執而斬之王永自殺幼稚佟夀郭充翟楷龎鑒皆東走幼稚中道而還皝兵追及楷鑒殺之夀充奔髙句驪自餘吏民為仁所詿誤者皆赦之遼東遂平慕容恪慕容恪字𤣥恭皝第四子髙貴人所生也幼而謹厚深沉有大度髙氏無寵皝未之竒也年十五身長八尺七寸容貌魁傑雄毅嚴重每所言及輙經綸世務皝始奇之授以孫吴兵數後從征伐臨機多竒䇿使鎮遼東恩威甚著髙句驪憚之不敢為冦皝使恪與􅖡俱伐扶餘􅖡居中指授而已恪身冒矢石摧鋒而進所向輙潰皝臨終謂􅖡曰今中原未一方建大事恪智勇俱濟汝其任之及􅖡嗣立彌加親厚屢立大功中山之㨗軍令嚴明秋毫不犯但遷其將帥土豪數千家而已餘皆安堵如故冉閔敗執恪進屯常山儁命移鎮中山元璽三年封太原王拜侍中假節大都督大將軍錄尚書累遷大司馬儁寢疾引恪與司徒評屬以後事遂總攝朝政暐初嗣位新遭大喪誅夷狼籍内外恟懼恪舉止如常人不見其有憂色每出入往還一人歩從或説以宜自嚴備恪曰人情方懼且當安重以靜鎮之奈何復自驚擾衆將何仰由是人心稍定恪雖總大任而朝廷之禮兢兢嚴謹每事必與評議之未嘗專決虚心待士諮詢善道量才授任人不踰位朝廷清肅進止有常罷朝歸第盡心色養手不釋卷官屬臣僚或有過失不顯其狀隨宜他叙不令失倫惟以此為貶時人以為大愧再有小過自相責曰爾復欲望宰公遷官邪自是庶僚化徳莫敢犯者建康初聞􅖡死皆以為中原可圖桓温曰慕容恪尚在所憂方為大耳後攻洛陽略地至崤澠關中大震軍還乃定恪為將不尚威嚴專用恩信撫御士卒務綜大要不為苛令使人人得便安軍士有犯法者宻縱舎之捕斬賊首以令軍營平時寛縱似若可犯然警備嚴宻敵至莫能近者故未嘗敗恪初有疾以暐幼弱政不在己評性多猜忌恐大司馬之任不當其人謂暐兄樂安王臧曰今南有遺晉西有强秦二冦並懐進取之志顧我未有隙耳夫國之廢興係於輔相大司馬總統六軍不可任非其人若能推才任忠和同協盟則四海且不足圖二冦豈能為患哉吾以常才猥受先帝顧托之命每欲掃平關隴蕩一甌吳庶嗣成先帝遺志謝憂責於當年而疾固彌留恐此志不遂所以沒有餘恨也吾死之後若以親疎次第言之大司馬之任不以授汝當以授冲汝曹雖才識明敏然皆年少未堪多難吳王天資英傑經略超世汝曹若能推以授之必能混一四海區區外冦不足憚也慎無冒利忘害不以國家為意也又以語評月餘疾篤暐親視之問以後事恪曰臣聞報恩莫大於薦賢賢者雖在板築猶可為相而况國之懿藩吳王文武兼資管蕭之亞陛下若任之以大政國其可安不然秦晉必有闚􅎿之計言終而卒國中皆痛惜之追諡曰桓王文明段氏皝后段氏鮮卑人本單于段國之女也初進為夫人晉咸康初皝即王位冊拜為王后及儁稱尊追諡曰文明皇后配饗於太祖後垂僭立尊生母蘭氏為文昭皇后欲遷段氏於别室而以蘭氏配饗詔百官議之皆以為當然博士劉詳董謐議以為堯母為帝嚳妃位次第三不以貴陵姜嫄明聖王之道以至公為先文昭后宜立别廟垂怒逼之詳謐曰上所欲為無問於臣臣按經奉禮不敢有二垂乃不復問諸儒卒遷段后而以蘭氏配饗太祖景昭可足渾氏儁后可足渾氏尚書令豫章公翼之從姊也􅖡元璽二年立為皇后暐嗣位尊為皇太后頗預朝政性尤猜忌垂為吳王威名素著太后甚忌之其妃段氏自以貴姓不尊事太后太后銜憾誣以巫蠱拷掠致死事具段氏傳及垂枋頭之㨗威名益著太后愈不平之遂與太傅評宻謀誅垂垂懼奔秦俄而太后卒追諡曰景昭皇后配饗於烈祖及垂即偽位以可足渾氏謀傾社稷不宜從祀乃尊昭儀段氏為景徳皇后配饗烈祖而追廢可足渾后十六國春秋卷三十
