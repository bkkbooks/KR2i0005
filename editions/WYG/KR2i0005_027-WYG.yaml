body:
  text: 十六國春秋卷二十七前燕錄五慕容儁下元璽二年春二月庚子立妻可足渾氏為皇后世子曄為皇太子皆自龍城遷於薊宮初石虎使人探䇿於華山得王版文曰歲在申酉不絶如綫歲在壬子真人乃見及此燕人咸以儁之應也羣下言大燕受命上承先一作光紀黑精之君運厯傳屬代金行之后宜行夏之時服周之冕旗幟尚黑牲牡尚𤣥從之其隨行文武諸藩使人及登號之日者悉増位三級派河之師守鄴之軍下及戰士賞賜各有差臨陣戰亡者將士加贈二等士卒復其子孫殿中舊人隨才擢叙晉寧朔將軍榮胡以彭城魯郡叛降於儁趙故衞尉常山李犢聚衆數千反於普壁壘儁遣衞將軍恪率衆討降之遂東擊呂護於魯口三月拔之護遁走遣前將軍悦綰追及於野王護使弟奉表請降乃以護為河内太守故趙樂陵朱秃平原杜能清河丁嬈陽平孫原各擁兵分據城邑至是皆來請降儁以秃為青州刺史能為平原太守嬈為立節將軍原一作元為兗州刺史各留撫其營冬十二月衞將軍恪撫軍將軍軍左將軍彪一作彭等屢薦給事黄門侍郎霸有命世之才宜總大任遂以霸為使持節安東將軍北冀州刺史鎮常山是年儁遣使聘魏元璽三年春二月姚襄遣使來降儁以評為鎮南將軍都督秦雍益梁江楊荆徐兗豫十州河南諸軍事鎮洛水疆為前鋒都督荆徐二州緣淮諸軍事進據河南夏四月戍申封撫軍將軍軍為襄陽王左將軍彪一作彭為武昌王衞將軍恪為大司馬侍中大都督錄尚書封太原王鎮南將軍評為司徒驃騎將軍封上庸王安東將軍霸為吳王左賢王友為范陽王前鋒都督疆為洛陽王散騎常侍厲為下邳王散騎常侍宜為廬江王寧北將軍度為樂浪王又封弟桓為宜都王逯一作逮為臨賀王徽為河間王龍為歴陽王納為北海王秀為蘭陵王嶽為安豐王德為梁公黙為始安公僂為南康公又封子臧一作咸為樂安王亮為渤海王温為帶方王涉為漁陽王暐為中山王以尚書令陽騖為司空仍守尚書令命冀州刺史吳王霸徙治信都更名曰垂尋遷侍中錄留臺事鎮龍城大得東北之和儁忌之復召垂還秋七月丙戌儁大調兵衆因發詔之日遂號曰丙戌舉九月儁如龍城是年魏昭成帝遣使報聘於燕元璽四年夏四月儁自和龍還薊城先是幽冀之人以儁為東遷互相驚擾所在屯結羣下請討之儁曰羣小以朕東巡故相聚為亂耳今朕既至尋當自定不足討也然不虞之備亦不可以不為於是令内外戒嚴五月秦河内太守王㑹黎陽太守韓高以郡來降晉蘭陵太守孫黑濟北太守高柱建興太守高瓮各以郡叛降於儁初儁車騎將軍范陽公劉寧屯據蕕城降於苻氏至此率户二千詣薊歸罪儁赦之仍拜後將軍儁給事黄門侍郎申𦙍上言曰夫名尊禮重先王之制冠冕之式代或不同漢以蕭曹之功有殊羣辟故履劍上殿入朝不趨世無其功則禮宜闕至於東宮體此為儀魏晉因循制不納舄今皇嗣過謙準同百僚禮卑逼下有違朝式太子有統天之重而與諸王齊冠逺遊非所以辨章貴賤也祭享朝慶禮宜正服衮衣九文冠冕九旒又仲冬長至太隂數終黄鍾産氣綿微於下此月閉闗息旅后不省方禮記曰是月也事欲静君子齊戒去聲色惟周官有天子之南郊從八龍之説或以有事至靈非朝享之節故有樂作之禮王者慎微禮從其重前來二至闕鼓不宜有設今之鏗鏘蓋以常儀二至之禮事殊餘節猥動金聲驚越神氣施之宣養實為未盡又朝服雖是古禮絳構始於秦漢迄於今代遂相仍準朔望正旦乃具衮舄禮諸侯旅見天子不得終事者三雨沾服失容其在一焉今或朝日天雨未有定儀禮貴適時不在過恭近以地濕不得納舄而以衮襈改履案稱朝服所以服之而朝一體之間上下二制或廢或存實乖禮意大燕受命侔蹤虞夏諸所施行宜損益定之以為皇代永制儁曰履劍不趨下太常叅議太子服衮冕冠九旒超級逼上未可行也冠服何容一施一廢皆可詳定復下書曰周禮冠冕禮制君臣略同中世以來亦無常禮今特制燕平上冠悉賜廷尉以下使曕冠思事刑斷詳平諸公冠悉顔褁屈竹錦纒作公字以代梁處施之金琪令僕尚書置瑱而已中秘監令别施珠瑱庶能敬慎威儀示民軌則冬十一月段蘭之子龕初因冉閔之亂擁衆東屯廣固自號齊王稱藩於晉襲儁將榮國於郎山敗之因遺儁書抗中表之儀非儁稱帝儁覧之甚怒遣太原王恪為征討大都督撫軍將軍陽騖為副以討之儁以龕方強盛謂恪曰若龕遣軍拒河不得渡者可直取呂護而還恪分遣諸軍先至河上具舟檝以觀龕志趣龕弟羆驍勇有智謀言於龕曰慕容恪善用兵加其衆旅既盛恐不可抗也若聽其濟河頓兵城下雖復乞降恐終不聽王但固守羆請帥精銳拒之於河幸而戰㨗王可率大衆馳來追擊使虜疋馬無返若其不㨗遽請出降猶不失為千户侯也龕不從羆固請不已龕怒殺之十二月高句驪王釗遣使詣儁納質修貢以請其母許之遣殿中將軍刁龕送釗母周氏歸國釗復遣使謝恩貢其方物以釗為錄營諸軍事征束大將軍營州刺史封樂浪公王如故元璽五年春正月恪引兵濟河未至廣固二百餘里段龕率衆三萬來拒丙戌遇於淄水之南與戰大敗之遂執其弟欽斬右長史袁範等龕友辟閭蔚被創恪聞其賢遣人求之蔚已死士卒降者數千人龕脱走還城固守恪遂進圍之二月恪招撫段龕諸城己丑龕所署徐州刺史陽郡一作都公王騰及索頭單于薛雲舉衆來降恪命騰以故職還屯陽郡夏五月以尚書左丞鞠殷為東萊太守章武太守鮮于亮為齊郡太守秋七月丙子太子曄卒偽諡獻懷冬十月恪圍龕於廣固先是諸將勸恪宜急攻之恪曰用兵之道有宜緩以克敵有宜急而取之若彼我勢均外有強援慮腹背之患者須急攻之以速大利如我強彼弱無援於外力足制之者當覊縻守之以侍其斃兵法十圍五攻正謂此也龕恩結賊黨衆未離心濟南之戰非不鋭也但龕用之無術以致敗耳今憑阻天險上下戮力攻守勢倍軍之常法若其促攻不過數旬克之必矣但恐傷吾士衆自有事中外兵不暫息吾每念之不覺忘寢奈何輕殘民命乎當持久以取之不必求功之速也諸將皆曰非所及也軍中聞之人人咸悦於是築室反耕嚴固圍壘齊民爭運糧以餽燕軍龕嬰城自固樵採路絶城中人相食龕悉衆出戰恪破之於圍裏先分騎屯諸門龕身自衝盪僅而得入一作出餘兵皆没城中喪氣莫有固志乃遣其屬段藴詣晉請救晉遣北中郎将荀羡將兵隨藴救之次於琅邪憚恪之強遷延不進㑹陽郡公王騰寇鄄城一作郫城羡遂襲攻陽郡霖雨城壞騰為羡所獲殺之十一月丙子恪克廣固龕面縛出降并執朱秃送薊恪撫安新民遂定齊地以龕為伏順將軍徙鮮卑胡羯三千餘户於薊留鎮南將軍塵鎮廣固恪因振旅而還荀羡聞龕已敗退還下邳留太山太守諸葛攸高平太守劉莊將三千人守琅邪叅軍譙國戴逯等將二千人守太山燕守將慕容蘭屯汴城羡進擊之斬蘭而去十二月雋遣行人請婚於魏許之光壽元年春正月儁徵幽州刺史乙逸為左光祿大夫時晉升平元年也二月癸丑復立次子中山王暐為太子大赦境内殊死已下改元光壽夏五月戊寅儁遣撫軍將軍垂中軍將軍䖍與護軍將軍平熙等率歩騎八萬討丁零敕勒於塞北大破之俘斬十餘萬級獲馬十三萬疋牛羊億餘萬是月遣使奉納禮幣於魏六月儁殺段龕坑其徒三千餘人匈奴單于賀賴頭率部落三萬五千口來降儁拜為寧西將軍雲中郡公處之代郡平舒城冬十月晉太山太守諸葛攸來攻東郡入武陽儁遣大司馬恪統司空陽騖及樂安王臧率兵拒之晉師敗績攸走還太山北中郎將謝萬時據梁宋懼而遁走恪遂進兵渡河略地河南汝潁譙沛皆䧟分置守宰而還進據上黨冠軍將軍河内太守馮鴦以衆叛歸於儁盡䧟河北之地冬十一月癸酉自薊徙都於鄴十二月乙巳儁入鄴宮大赦境内殊死已下繕修宮殿復作銅雀臺廷尉常煒上言大燕雖革命創制至於朝廷銓謨亦多因循魏晉惟祖父不殮葬者獨不聽官身清朝斯誠王教之首不刋之式然禮貴適時世或損益是以高祖制三章之法秦人安之自頃中州喪亂遭兵積年或遇傾城之敗覆軍之禍坑師沈卒往往而然孤孫㷀子十室而九兼三方岳峙父子異邦存亡吉凶杳成天外或便假一時或依嬴博之制孝子糜身無補順孫心喪靡及雖招魂虚葬以申一作叙罔極之情又禮無招葬之文令不此載若斯之流抱琳琅而無申懷英才而不齒誠可痛也恐非明揚側陋務盡時珍之道吳起二陳之儔終將無所展其才幹漢祖何由免於平城之圍郅支之首何以懸於漢闕謹按戊辰詔書蕩清瑕穢與天下更始以明惟新之慶五六年間尋相違伐則天之體臣竊未安儁曰煒宿德碩儒練明刑法覽其所陳良足錄也今六合未寧喪亂未巳又正當􅊧奇拔異之秋未可才行兼舉且除此條聽大同一作衆更議使昌黎遼東二郡營起廆廟范陽燕郡構皝廟以護軍平熙領將作大匠監造二廟秦苻堅平州刺史劉特率户五千來降河間李黑聚衆千餘攻略州郡殺棗彊令衞顔儁長樂太守傅顔討斬之以吳王垂為東夷校尉平州刺史鎮遼東初廆有駿馬曰赭白有奇相逸力石虎來攻棘城皝將出避難欲乗之馬悲鳴踶齧人莫能近皝曰此馬見異先朝孤常仗之濟難今不欲出者蓋先君之旨也乃止虎㝷奔退皝益奇之至是年四十九歲矣而駿逸不虧儁比之鮑氏驄命鑄銅以圖其像親為銘贊鐫勒其旁置之薊城東掖門是歲像成而馬死光壽二年春初河内太守上黨馮鴦自稱太守附於張平平屢言之儁以平故乃赦其罪署為京兆太守既而與呂護隂通建康時平跨有新興雁門西河太原上黨上郡之地壘壁三百餘所胡晉十餘萬户拜置征鎮為燕鼎峙之勢儁遣司徒上庸王評討鴦不克三月甲戌復遣領軍將軍慕輿根將兵助評攻鴦根欲急攻之評曰鴦壁堅不如且緩之根曰不然公至城下經月未嘗交鋒賊謂國家力止於此遂相固結冀幸萬一根兵初至形勢方振賊衆駭懼恐有離心計慮未定從而攻之無不克者遂急攻之鴦與其黨果相猜忌鴦奔野王依呂護盡降其黨三月儁常山寺王母祠前大樹自拔乃於根下得璧七十珪七十三光色精奇有異常玉儁以為嶽神之命遣尚書郎叚勤用太牢祀之每祀有一虎往來祠側性頗馴狎而不害於物是月攻䧟冀州諸郡夏五月遼西獲黒兎秋九月張平與故趙將李歴高昌等初因冉閔之亡竝率其所部稱藩於儁遣子入侍既而投欵建康結援苻堅竝受爵位羈縻自固雖貢使不絶而誠節未盡儁遣上庸王評討張平於并州司空陽騖討髙昌於東燕樂安王臧攻李歴於濮陽騖攻昌别將於黎陽拔之歴奔滎陽昌奔東陵載紀作邵陵其衆皆降并州壁壘降者百餘所署尚書右僕射悦綰為安西將軍領護匃奴中郎將并州刺史以撫之平所署征西將軍諸葛驤鎮北將軍蘇象寧東將軍喬庶鎮南將軍石賢等率壘壁百三十六一作八來降儁皆復其官爵平率衆三千奔平陽遣使乞降冬十月儁殺尚書郎鮮卑段勤以其隂貳於晉也其弟思遂奔於晉晉太山太守諸葛攸復率衆攻東郡儁遣大司馬恪等拒之各引而還儁復圖入寇兼欲經略闗西十二月令州郡校閲見丁精覈一作覆隱漏率户留一丁餘悉發為兵欲使步卒滿一百五十萬期來春大集將進臨洛陽為三方節度武邑劉貴上書極陳百姓凋弊發兵非法恐人不堪命必致土崩之變并陳時政不便於時者十有三事儁覽而悦之下公卿博議事多納用乃改令三五發兵寛戎備一周悉令明年季冬赴集鄴都時調發繁數官司各遣使者道路旁午郡縣苦之太尉領中書監封奕請自今非軍期嚴急不得遣使自餘賦發皆責成州郡其郡司所遣殫督在外者一切攝還儁從之是歲晉北中郎將荀羡攻山荏拔之斬太山太守賈堅鎮南將軍青州刺史塵遣司馬悦明救之晉師敗績復取山荏遂以堅子活為任城太守光壽三年春二月儁立小學於顯賢里以教胄子三月封子泓為濟北王冲為中山王其餘弟侄分封有差遂讌羣臣於蒲池酒酣賦詩因談經史論及周太子晉􅏰然流涕顧謂羣臣曰昔魏武追痛倉舒孫權悼登無已孤常謂二主緣愛稱竒無大雅之體才子難得自景先之亡以來孤鬂髪中白始知二王有以而然卿等謂景先定何如也孤今悼之得無貽怪將來邪司徒長史李績對曰獻懷太子之在東宮臣為中庻子既忝近侍聖質志業臣實不敢不知臣聞道備無愆其惟聖人乎先太子大德有八未見其闕也儁曰卿言過矣然試言之績曰至孝自天性與道合一也聰敏慧悟機思若流二也沈毅好斷理詣無幽三也疾諛量物雅悦直言四也好學愛賢不恥下問五也英姿邁古藝業超時六也虚襟恭讓尊師重道七也輕財好施勤恤民隱八也儁曰卿雖褒譽然此兒若在吾死無憂也吾既不能追蹤唐虞官天下以禪有德近模三王以世傳授景茂幼冲器業未舉卿以為何如時太子暐侍側績曰皇太子天姿岐嶷聖敬日躋雖八德已聞而二闕未補雅好游畋娛心絲竹此其所以為損耳儁顧謂暐曰伯陽之言藥石之惠也汝宜誡之暐甚不平因問高年疾苦孤寡不能自存者賜糓帛有差己丑儁夜寢夢石虎齧其寤而遂痛惡之命發其棺求尸不獲購以百金莫知之也鄴女子李莵知而告之水經注云後宮嬖妾知而告之言虎葬於東苑一作東明觀下於是掘焉下度三泉得其棺剖棺出尸尸僵不腐儁蹋而罵之曰死胡安敢夢生天子也遣御史中尉楊約數其殘酷之罪而鞭之投於漳水尸倚橋柱不流及秦滅燕王猛為之誅李莵收而葬之秋七月晉平北將軍高昌為儁所逼力不能拒自白馬奔於滎陽八月晉太山太守諸葛攸率水陸二萬來伐入自石門屯於河渚攸部將匡超進據嵩㠂蕭館屯於新柵又遣督護徐冏率水軍三千泛舟上下為東西聲勢儁遣上庸王評長樂太守傅顔等統步騎五萬戰於東阿攸兵大敗冬十月儁寇東河晉遣西中郎將謝萬次下蔡北中郎將郄曇次高平率師來拒萬矜豪傲物但以笑詠自高未嘗撫衆乃召集諸將一無所言直以如意指四坐云諸將皆勁卒諸將益恨之既而萬率衆入渦潁以援洛陽曇以病退屯彭城萬以燕兵大盛故曇退即引兵還衆遂驚潰萬狼狽單騎遁歸塞北七國賀蘭涉勒等皆降十二月辛酉儁寢疾謂大司馬太原王恪曰吾所患惙然當恐不濟修短命也復何所恨但二寇未除景茂冲幼慮其未堪家國多難吾欲逺追宋宣公以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘刑措臣實何人敢干正統儁怒曰兄弟之間豈虚飾邪恪曰陛下若以臣堪荷天下之任者寧不能輔少主乎儁喜曰汝若行周公之事吾復何憂李績清方忠亮堪任大事汝善遇之乃召吳王垂還鄴時所徵郡國兵悉集鄴城盜賊互起每夜攻刼晨昏斷行於是寛常賦設奇禁盜賊有相告者賜奉車都尉捕誅賊首木穀禾等百餘人乃止建熙元年春正月癸巳儁疾少差大閲兵於鄴欲使大司馬恪司空陽騖將之入寇既而疾篤乃召恪騖及司徒評領軍將軍慕輿根等受遺詔輔政甲午儁薨於應福殿時晉升平四年也先是月犯太白在昴占曰人君死一曰趙地有兵至是而儁卒時年五十三在位十二年葬於龍陵偽諡景昭皇帝廟號烈祖儁雅好文籍性嚴重慎威儀未嘗以慢服臨朝雖閒居晏然亦無懈怠之色云十六國春秋卷二十七
