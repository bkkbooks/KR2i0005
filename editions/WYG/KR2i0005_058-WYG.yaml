body:
  text: 十六國春秋卷五十八後秦録六姚興下𢎞始十三年春正月興子廣平公弼有寵於興委以朝政天水姜紀遂傾心謟附之紀本吕氏叛臣阿諛姦詐好間人之親戚時弼為雍州刺史權鎮安定紀宻與弼謀令傾心亊常山公顯黨樹左右以求入朝興遂徴弼為尚書令侍中大將軍既居左右虚襟引納收結朝士勢傾東宫國人惡之㑹興以勃勃乾歸作亂西北傉檀䝉遜擅兵河右疇咨將帥之臣欲得重將鎮撫二方隴東太守郭播言於興曰嶺北二州鎮戸皆數萬若得文武之才以綏撫之足以靖塞姦路興曰吾每思得亷頗李牧鎮撫四方便宜行事然任非其人恒致負敗卿試舉之播曰清潔善撫邊則平陸子王元始雄武多竒畧則建威王煥賞罰必行臨敵不顧則奮武彭蚝興曰蚝令行禁止則有之非綏邊之才也始煥年少吾未知其為人播曰廣平公弼才兼文武宜督鎮一方願陛下逺鑒前車近悟覆轍興不從乃以太常索稜為太尉領隴西内史乞伏乾歸感而悅之遣使送所掠守宰謝罪乞降興以勃勃之難權宜許之遣鴻臚署乾歸征西大將軍河州牧河南王及其子熾磐鎮西將軍左賢王平昌公興如三原顧謂羣臣曰古人有言闗東出相闗西出將三秦饒雋異汝潁多竒士吾應天明命跨據中原自流沙已東淮漢已北未嘗不傾已招求冀匡不逮然明不照下弗感懸魚至於智效一官行著一善吾厯級而進之不使有後門之歎卿等宜明揚側陋相助為吾舉之可也右僕射梁喜對曰奉㫖求賢弗敢休倦未見弼亮大才王佐之器可謂世之乏賢興曰自古帝王之興莫不將則孫吴相兼蕭鄧終不採將於往賢求相於後哲隨時任才皆能制治卿自識拔不明旁求不至奈何厚誣四海乎羣臣咸悅太史令任猗言於興曰白氣出於北方東西竟天五百里當有破軍殺將流血之徴也二月安逺將軍姚詳鎮杏城為赫連勃勃所逼糧盡矢竭委守南奔至於大蘓勃勃平北將軍鹿奕干要之衆盡潰散遂為所執死之興遣衛大將軍常山公顯迎詳顯聞詳敗留屯杏城遂以顯為都督安定嶺北二鎮諸軍事潁川太守平都自許昌來朝言於興曰劉裕敢懐奸計屯聚芍陂有擾邊之心宜遣燒之以散其謀興曰裕甚輕弱安敢窺吾邊疆茍有奸心不在其身其在子孫乎召尚書楊佛嵩謂之曰吴兒不自知乃有非分之意待至孟冬當遣卿帥精騎三萬燒其積聚嵩曰陛下若任臣以此役者當從肥口濟淮直趨夀春舉大衆以屯城縱輕騎以掠野使淮南蕭條兵粟俱了足令吴兒俯仰回惶神爽飛越興大悅㑹客星入東井所在地震前後一百五十六公卿抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚無謂也朕當考躬省已以思宋景之義公等何愆宜悉冠履以復厥位𢎞始十四年夏四月西秦乞伏乾歸為部下所殺其子熾磐新立羣臣咸勸興取之興曰乾歸先已返善方當懐撫因䘮伐之非朕之本心也冬十月仇池公楊盛阻兵謀叛侵擾祁山遣建威將軍趙琨率騎五千為前鋒立節將軍姚伯夀統歩卒為之後繼前將軍恢左將軍文宗出自鷲峽鎮西將軍秦州刺史嵩出自羊頭峽右衛將軍胡翼度從隂宻出汧城分道討盛興將輕騎五千自雍赴之與諸將㑹於隴口天水太守王松怱言於嵩曰先王神略無方威武絶世冠軍徐洛生猛毅兼人佐命夾輔再入仇池無功而還非楊氏智勇所能全也直是地勢嶮固使之然耳今以趙琨之衆使君之威凖之先朝實未見成功使君具悉形便何不表聞嵩不從盛率衆與琨相持伯夀畏懼弗進琨衆寡不敵為盛所敗興斬伯夀引兵而還嵩乃具陳松怱之言興善之賞帛百疋遂以楊佛嵩為都督嶺北討虜諸軍事安逺將軍雍州刺史率嶺北見兵討赫連勃勃發數日興謂羣臣曰佛嵩驍猛果銳每臨敵對冦不可制抑吾每節之配兵不過五千人今衆旅既多遇賊必敗且去已逺追之不及吾深憂之將若之何其下咸以為不然未㡬果為勃勃所執絶吭而死𢎞始十五年春正月興立昭儀齊氏為皇后下書以故丞相緒太宰碩徳太傅旻大司馬崇司徒尹緯等二十四人配享於萇廟興以大臣屢䘮令所司更詳臨赴之制所司白興依故事東堂發哀興不從每大臣死皆親臨之三月庚午遣使至魏復修和好夏四月太尉索稜以隴西降西秦乞伏熾磐劉裕以西陽太守朱齡石為益州刺史帥師討譙縱于成都秋七月平之斬縱傳首建康𢎞始十六年夏五月貳原氐𦍑仇常叛興遣後將軍歛成鎮軍將軍彭白狼北中郎將洛都討之成等為常所敗甚懼詣趙興太守姚穆歸罪穆欲送殺之成恐奔赫連勃勃興遣東平公紹與廣平公弼率禁衛諸軍鎮撫嶺北遼東侯彌姐亭地率其部人南居隂宻刼掠百姓弼收亭地送之殺其衆七百餘人徙二千餘戸於鄭城興寢疾妖賊李宏反於貳原仇常復以兵應之興輿疾往討斬常執宏而還徙常部人五百餘戸於許昌左將軍文宗有寵於太子泓廣平公弼深嫉忌之誣文宗有怨言以侍御史亷桃生為証興怒賜文宗死自是羣臣累足不敢復言弼之短弼寵愛方隆所欲施行無不信納乃以嬖人天水尹冲為給事黄門侍郎唐盛為治書侍御史興左右機要皆其黨人漸欲廣樹爪牙彌縫其闕右僕射梁喜侍中任謙京兆尹尹昭乘間言於興曰父子之際人所難言然君臣之義不薄於父子臣等理不容黙並后匹嫡未始不傾國亂家廣平公弼姦兇無狀潛有陵奪之心陛下寵之太過假其威權傾險無頼之徒莫不輻輳其側市巷諷議皆言陛下將有廢立之計誠如此者臣等有死而已不敢奉詔興曰安得有此喜等復曰若無之則陛下愛弼適所以禍之願去其左右減其威權非但弼有泰山之安社稷宗廟亦有磐石之固矣興黙然不應大司農竇温司徒左長史王弼皆密疏勸興立弼為太子興雖不從亦不責也興疾篤太子泓以兵屯於東華門侍疾於諮議堂廣平公弼潛謀為亂招集黨與數千人披甲伏於其第候興死欲殺泓自立撫軍將軍東平公紹及侍中任謙右僕射梁喜冠軍將軍姚讃京兆尹尹昭輔國將軍歛曼嵬並典禁兵宿衛於内姚裕遣使告上庸公懿於蒲坂并密信諸兄在藩鎮者論弼逆狀懿流涕告將士曰上今寢疾臣子所宜冠履不整而廣平公弼擁兵私第不忠於儲宫正是孤狥義亡身之日諸君皆忠烈之士亦當與孤同狥斯舉將士聞之莫不奮怒攘袂曰惟殿下所為生死不敢有二於是盡赦囚徒散布帛數萬疋賜其將士建牙誓衆將赴長安鎮東將軍豫州牧陳留公洸治兵於洛陽平西將軍平原公諶治兵於雍皆欲赴長安討弼㑹興疾瘳升前殿朝見羣臣征虜將軍劉羗泣言於興曰陛下寢疾數旬奈何忽有此事興曰朕過庭無訓使諸子不睦愧於四海卿等各陳所懐以安社稷京兆尹尹昭曰廣平公弼恃寵不䖍阻兵懐貳自宜寘之刑書以明憲典陛下若含忍未便加法者且可削奪威權使散居藩國以紓闚􅎿之禍全天性之恩興謂右僕射梁喜曰卿以為何如喜曰臣之愚見如昭所陳興以弼文武兼才未忍致法免其尚書令以將軍公就第上庸公懿等聞興疾瘳各罷兵還鎮陳留公洸及弟平原公諶等皆抗表罪弼請致之刑法興不許時魏遣使來聘且請婚於興㑹平陽太守姚成都入朝興謂之曰卿久處東藩與魏隣接應悉彼事形今來求婚吾已許之終能分災共患逺相接援否成都曰魏自柴壁克㨗以來戎甲未曾損失士馬桓桓師旅充盛今修和親兼以婚姻之好豈但分災共患而已實亦永安之福也興大悅遣散騎常侍尚書吏部郎嚴康報聘并致方物懿洸宣諶皆來入朝使裕言於興曰懿等今悉在外欲有所陳興曰汝等正欲論弼事耳吾已知之不復煩見也裕曰弼茍有可論陛下所宜垂聽若懿等言違大義便當肆之刑辟奈何逆拒之於是引見懿等於諮議堂宣流涕曰先帝以大聖起基陛下以神武定業方隆七百之祚為萬世之羙安可使弼謀傾社稷宜委之有司肅明刑憲臣等敢以死請興曰吾自處之非汝等所憂也撫軍東曹屬姜虬上疏曰廣平公弼懐奸積年謀禍有嵗傾䧟羣豎為之畫足釁成逆著取嗤戎裔昔文王之化刑于寡妻今聖朝之亂起自愛子雖欲含忍其瑕掩蔽其罪而逆黨猶繁扇惑不已弼之亂心何由可革宜斥散凶徒以絶禍端興以虬表示梁喜曰天下之人莫不以吾兒為口實將何以處之喜曰信如虬言陛下宜早裁决一旦禍機竊發悔之晩矣興黙然不忍誅弼免官而已太子詹事王周亦虚襟引士樹黨東宫弼惡之每䂓䧟害周抗志確然不為之屈興嘉其守正以為中書監𢎞始十七年春二月晉荆州刺史司馬休之據江陵雍州刺史魯宗之據襄陽與劉裕相攻遣使求援興遣征虜將軍姚成王及建義將軍司馬國璠率騎八千赴之成王進次南陽司馬休之等為劉裕所敗引歸休之遂與魯宗之及譙王司馬文思新蔡王司馬道賜寜朔將軍梁州刺史馬敬輔國將軍竟陵太守魯軌寜朔將軍南陽太守魯範來奔三月廣平公弼恨宣之毁已遂譛宣於興㑹宣司馬權丕至長安興責丕以不能匡輔將誅之丕性傾巧因誣宣罪狀以求自免興大怒遣使就杏城收宣下獄使弼將三萬人鎮秦州京兆尹尹昭言於興曰廣平公與皇太子不平今擁强兵於外陛下一旦不諱臣恐社稷必危小不忍亂大謀者陛下之謂也興弗納復以弼為中軍大將軍配兵三千屯於渭北赫連勃勃攻杏城興遣弼救之至冠泉而杏城䧟守將姚逵死之興如北地弼次於三樹遣弼及輔國將軍歛曼嵬向新平興還長安秋九月赫連勃勃遣其將赫連建帥衆冦貳縣遂入平凉守將姚恢與建戰於五井平凉太守姚周都為建所獲進兵新平廣平公弼討之戰於龍尾堡大破之擒建送於長安初勃勃攻彭雙方於石堡方力戰拒守積年不能克至是聞建敗引師而去司馬休之等至長安興謂之曰劉裕崇奉晉帝豈便有闕乎休之曰臣前下都琅邪王徳文泣謂臣曰劉裕供御主上克薄珍竒以事勢推之方為社稷之憂未可測也乃署休之為鎮軍將軍揚州刺史宗之等並有拜授揚武將軍安鄉侯康宦驅掠白鹿原氐胡數百家奔上洛上洛太守宋林拒之商洛人黄金等起兵攻宦宦率衆歸罪興赦之復其爵位時白虹貫日熒惑在瓠𤓰星中一夜忽然三失不知所在後八十日出於東井留守盤旋是嵗大旱赤地昆明池水竭童謡訛言國内諠擾有術士言於興曰將有不祥之事終當自消時興藥動廣平公弼稱疾不朝聚兵於第興聞之怒甚收弼黨殿中侍御史唐盛孫元等殺之太子泓言於興曰臣誠不肖不能緝諧兄弟致弼搆造是非仰慙天日此皆臣之罪也陛下若以臣為社稷之憂除臣而國家安願賜臣死若垂天性之恩不忍加臣刑戮者乞聽臣守藩興惨然改容召姚讃梁喜尹昭歛曼嵬於諮議堂密謀收弼東平公紹時屯兵雍城馳遣告之數日不决弼黨洶懼興慮其為變乃收弼囚之中曹窮治黨與將殺之泓流涕固請乃止興謂梁喜曰太子天性平和心少猜忌必能容納羣賢保全吾子於是赦弼黨與蘭臺令張泉夕言於興曰熒惑入東井旬紀而返未餘月復來守心王者惡之宜修仁虚已以答天譴興納之冬十月壬子興遣散騎常侍姚敞等送女西平公主於魏太宗拓跋嗣以后禮納之鑄金人不成乃以為夫人而寵遇甚厚𢎞始十八年春正月正旦興朝羣臣於太極前殿沙門賀僧慟泣不能自勝衆咸怪之賀僧者莫知其所從來言事皆有効驗興甚神禮之嘗與隠士數人預於燕㑹興使魯宗之將兵冦襄陽未至而卒其子輔國將軍軌引兵攻晉晉雍州刺史趙倫之擊敗之二月興如華隂使太子泓監國入居西宫興疾篤遂還長安泓欲出迎宫臣諫曰今主上疾篤奸臣在側廣平公弼希冀非常變故難測今殿下若出進則不得見主上退則有弼等一作不測之禍安所歸乎自宜深抑情理以寜社稷泓曰臣子聞君父疾篤而端居不出何以自安對曰全身以安社稷孝之大者也泓從之乃止迎於黄龍門樽下弼黨見興升輿咸懐危懼黄門侍郎尹冲等先謀欲因泓出害之尚書姚沙彌謂冲曰若太子有備不來迎侍當奉乘輿直趨廣平公第宿衛將士聞乘輿所在自當來奔誰與太子共守乎且吾屬以廣平公之故已䧟身於逆節將何所自容今奉乘輿南幸因以舉事是仗大義非但救廣平公之禍吾屬前罪亦可申雪冲等不從欲隨興入宫作亂復未知興之存亡疑而不發興既入宫命太子泓録尚書事使東平公紹及右衛將軍胡翼度典兵禁中防制内外遣殿中上將軍歛曼嵬收弼第中甲仗納之武庫興疾轉篤其妹南安長公主問疾不應興少子耕兒出告其兄南陽公愔曰上已崩矣宜速决計愔即與其黨尹冲姚武伯等率甲士攻端門歛曼嵬勒兵拒戰胡翼度率禁兵閉四門愔等遣壯士登門縁屋而入及於馬道泓侍疾在諮議堂遣歛曼嵬率殿中兵登武庫拒戰太子右衛率姚和都帥東宫兵入屯馬道南愔等既不得進遂燒端門興力疾臨前殿賜弼死禁兵見興喜躍貫甲爭進赴賊賊衆駭擾和都勒東宫兵自後擊之愔等奔潰逃於驪山其黨建康公吕隆奔雍尹冲及弟尹泓奔於建康興引紹及讚梁喜尹昭歛曼嵬等入内􅃦受遺詔輔政明日遂卒時晉義熈十二年也年五十一在位二十二年偽謚文桓皇帝廟號髙祖葬於偶陵先是魏太史奏熒惑在瓠𤓰中忽亡不知所在於法當入危亡之國先為童謡妖言然後行其禍罰太宗召名儒十餘人使與太史議熒惑所詣崔浩對曰按春秋左氏傳神降於莘以其至之日推知其物庚午之夕辛未之朝天有隂雲熒惑之亡當在二日庚之與午皆主於秦辛為西夷今姚興據長安熒惑必入秦矣衆皆怒曰天上失星人間安知所詣浩笑而不應後八十餘日熒惑出東井留守勾已久之乃去秦大旱昆明池竭童謡訛言國人不安間一嵗而秦亡衆乃服浩之精妙十六國春秋卷五十八
