body:
  text: 十六國春秋卷五十五後秦録三姚萇姚萇字景茂弋仲有子四十二人萇第二十四子也少聰敏一作哲多權略廓落任率不修行業諸兄皆竒之隨襄征伐每參大謀初襄冦洛陽夢萇服衮衣升御座諸酋長皆侍立因謂諸將佐曰吾夢如此此兒志度不恒或能大起吾族甚器異之襄死萇帥諸弟奔降於苻生苻堅嗣立以萇為揚武將軍轉左衛將軍隴東汲郡河東武都武威巴西扶風七郡太守寧幽兗三州刺史復為揚武將軍歩兵校尉潞川之戰累有殊功封益都侯邑三百戸苻堅冦晉以萇為龍驤將軍都督益梁二州諸軍事堅謂萇曰朕本以龍驤建業龍驤之號未嘗假人今特以相授山南之事一以委卿卿其勉之堅左將軍竇衝曰王者無戲言此將不祥之徴也惟陛下察之堅黙然淮南之敗萇奔歸長安慕容泓起兵叛堅堅遣子衛大將軍苻叡討之署萇為司馬叡既敗死萇遣龍驤長史趙都叅軍姜協詣堅謝罪堅怒殺之萇懼奔於渭北遂如馬牧於是西州豪傑尹詳趙曜王欽盧牛雙狄廣張乾龎演等紏扇羌豪帥其戸口歸萇者五萬餘家咸推萇為盟主萇將拒之校尉尹緯說曰今百六之數既臻秦亡之兆已見以將軍威靈命世必能匡濟時艱故豪傑驅馳咸同推仰明公宜降心從議以副羣望不可坐觀沈溺而不拯救之萇從之遂自稱大將軍大單于萬年秦王大赦境内殊死已下建元白雀稱制行事以尹詳龎演為左右長史南安姚晃及尹緯為左右司馬天水狄伯支焦䖍梁希龎魏任謙為從事中郎姜訓閻遵為掾屬王據焦世蔣秀尹延年牛雙張乾為叅軍王欽盧姚方成王破虜楊難尹嵩裴騎趙曜狄廣党刪等為將帥夏四月慕容冲與苻堅相攻冲衆甚盛萇將西上恐冲遏之遣使通和以子崇為質於冲五月萇進屯北地厲兵積粟以觀時變先是苻堅徙晉人李詳等數千户於敷陸至是來降華隂北地新平安定羌胡降者十餘萬户六月堅自帥歩騎二萬擊萇軍於趙氏塢使䕶軍將軍楊璧等分道來攻萇兵屢敗斬萇弟鎮軍將軍尹買軍中無井士卒有渇死者㑹天大雨營中水深三尺繞營百歩之外寸餘而已萇軍復振帥衆七萬擊秦堅復遣楊璧等來拒為萇所敗獲璧及左將軍徐成鎮軍將軍毛盛等將吏數十人皆禮而遣之冬十月萇聞慕容冲攻長安㑹羣僚議進趨之計皆曰大王宜先取長安建立根本然後經營四方以制天下萇曰不然燕因懐舊之士以起兵若功成事㨗咸有東歸之思安能久固秦川吾當移屯嶺北廣收資實須秦敝燕廻然後垂拱取之兵不血刄坐定天下此卞莊得二之義也乃留長子興守北地使寧北將軍姚穆守同官川自將其衆攻新平新平太守茍輔欲降之遼西太守馮傑等諫曰昔田單以一城全齊今秦之州鎮猶連城過百奈何遽為叛臣乎輔喜曰此吾志也但恐久而無救郡人横被無辜諸君能爾吾豈顧生哉於是憑城固守萇為土山地道輔亦於内為之或戰地下或戰山上萇衆死者萬餘人輔乃詐降開門誘萇萇將入城覺之而返輔伏兵邀擊幾為所獲死者復萬餘人堅寜朔將軍宋方帥騎三千從雲中將赴長安萇自二縣邀擊破之方單騎奔免司馬田晃帥其餘衆來降白雀二年春正月萇留諸將攻新平克之因引兵擊安定擒秦安西將軍苻珍嶺北諸城悉來降附夏四月茍輔帥民五千口出城萇圍而坑之男女無遺六月苻堅為慕容冲所逼走入五將山冲入長安司隷校尉權翼尚書趙遷大鴻臚皇甫覆光禄大夫薛讃扶風太守段鏗等文武數百人來奔秋七月萇自故縣如新平聞堅在五將山遣驍騎將軍吴忠率騎圍之堅兵皆散走忠遂執之送詣新平幽於别室萇使求𫝊國璽堅瞋目叱之復遣右司馬尹緯說堅求禪代堅不許乃遣人縊堅於新平佛寺冬十月慕容冲遣尚書令車騎大將軍髙葢帥衆五萬來侵戰於新平南大破之葢帥麾下數千來降拜散騎常侍建初元年春正月萇如安定三月慕容冲帥衆東下長安空虚前滎陽太守髙陵趙糓等招杏城盧水胡郝奴帥户四千入於長安郝奴稱帝以糓為丞相渭北皆應之扶風王麟有衆數千堡據馬嵬奴遣弟多攻之夏四月萇自安定伐麟破之麟奔漢中萇執多而進攻奴奴懼請降拜鎮北將軍六谷大都督五月萇僭即皇帝位於長安大赦境内殊死已下改元建初國號大秦改長安為常安時晉太元十一年也追尊父弋仲為景元皇帝母曰徳皇后謚兄襄為魏武王立妻虵氏為皇后子興為皇太子署寘百官萇自謂以火徳承苻氏木行服色如漢氏承周故事徙安定五千餘戸於長安起殿於祋祤故城西北七十五里鳯游鄉上又有御泉池水遂宴羣臣於殿内秋七月苻丕遣平凉太守金熈安定都尉沒奕干與萇左將軍姚方成戰於孫丘谷方成兵敗萇以弟征虜將軍緒為司隷校尉鎮長安自將至安定擊熈等大破之八月萇弟碩徳統所部羌居隴上聞萇起兵自稱征西將軍聚衆於冀城以應之以兄孫詳為安逺將軍據隴城從孫訓為安西將軍據南安之赤亭與秦秦州刺史王統相持萇自安定引兵㑹碩徳攻統天水屠各略陽羌胡應之者二萬餘家秦略陽太守王皮來降九月王統以秦州來降因享將士於上邽拜碩徳為使持節都督隴右諸軍事征西將軍秦州刺史領䕶東羌校尉鎮上邽南安人吉成詵晉書作古成詵說萇散金帛招賢士萇說之拜尚書郎冬十月萇還安定修徳政布恵化省非急之費以救時敝閭閻之士有毫介之善者皆顯異之十一月萇復如秦州為苻登所敗語在登𫝊是年造二刀長七尺一銘曰雌一銘曰雄隷書有冦即鳴又造一刀銘曰中山長三尺七寸𨽻書建初二年春正月徙秦州豪傑三萬户於安定夏四月征西將軍碩徳為楊定所逼退屯涇陽定與苻纂共攻之戰於涇陽碩徳大敗萇自隂宻救之纂退保敷陸秋七月苻登軍於瓦亭萇攻拔彭沛穀堡穀奔杏城萇還隂宻以太子興鎮長安遂與登相拒八月登馮翊太守蘭櫝與苻師奴離貳慕容永乘釁攻之櫝遣使請救萇將赴之尚書令姚旻左僕射尹緯諫曰苻登近在瓦亭將乘虚襲吾後陛下未宜輕舉萇曰苻登衆盛非旦夕可至且登遲重少决每失時機聞吾自行正當廣集兵資必不敢輕軍深入比兩月間吾必一作已字破賊而還登雖至無能為也九月進次泥源一作渥源師奴率衆來拒大戰破之盡俘其衆屠各董成等皆降冬十月萇進擊慕容永於河西永走蘭櫝復列兵拒守萇攻之十二月擒櫝收其士馬遂如杏城左將軍姚方成攻拔登秦州刺史徐成執之以歸萇乃掘苻堅屍鞭撻無數裸剥衣裳薦之以棘坎土而埋之建初三年春正月萇軍武都與苻登相持慕容永征西將軍王宣率衆來降初闗西豪傑以苻氏既終萇雄畧葢世天下之事可旦夕而定萇既與登相持屢戰互有勝負逺近咸懐去就之計惟征虜將軍齊難冠軍將軍徐洛生輔國將軍劉郭單冠威將軍彌姐婆觸龍驤將軍趙惡地鎮北將軍梁國兒等守忠不貳並留子弟守營供繼軍糧身將精卒隨萇征伐時諸營既多故號萇軍為大營大營之號自此始也冬十月萇還安定苻登率衆萬餘圍萇四面大哭萇命營中哭以應之登衆乃退十一月天大雪萇下書深自責罰散後宫文綺珍寳以供戎事身食一味妻不重綵將帥死王事者加秩二等士卒戰沒皆有褒贈立太學禮先賢之後建初四年春正月萇以登頻戰輒勝謂堅之神助亦於軍中立堅神主而禱之曰往年新平之禍臣行襄之命非萇之罪臣兄襄從陜北渡假路求西狐死首丘欲暫見鄉里陛下與苻黄眉要路拒擊不遂而沒襄勅臣行弑非臣罪也苻登陛下踈屬尚欲復讐况臣為兄報恥於情理何負且陛下假臣龍驤之號詔臣曰朕以龍驤建業卿其勉之眀詔昭然言猶在耳陛下雖過世為神豈假手於苻登而圖臣忘前征時言耶今為陛下立神像可歸休於此勿追計臣過聽臣至誠也登進師來攻既而昇樓遥謂萇曰自古及今安有臣弑君而反立像求福望有益乎因大呼曰弑君賊姚萇何不自出吾與汝决之何為枉害無辜萇憚而不應萇自立堅神像戰未有利軍中每夜驚恐乃嚴鼓斬像首以送登夏四月萇與苻登戰數敗乃遣子中軍將軍崇襲大界登要擊之敗於安丘秋七月登攻右將軍吴忠等於平凉忠等敗績八月登進據茍頭原攻逼安定諸將勸萇决戰萇曰與窮冦競勝兵家之下吾將以計取之乃留尚書令姚旻守安定夜襲登輜重於大界拔之諸將欲因登駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止萇以安定地狹且逼苻登使征西將軍碩徳鎮安定徙安定三千餘户於隂宻遣弟征南將軍靖鎮之冬十月立社稷於長安百姓年七十已上有徳行者拜為中大夫嵗賜牛酒十二月雷惡地帥衆來降拜為鎮東將軍建初五年春正月萇攻苻登扶風太守齊益男於新羅堡克之益男敗走登遂攻萇天水太守張業生於隴東萇還救之登乃引去夏四月登將魏褐飛自稱大將軍衝天王帥氐胡數萬人攻安北將軍姚當成於杏城雷惡地復叛應之攻鎮東將軍姚漢得於李潤萇議將討之諸將皆曰陛下不憂六十里苻登乃憂六百里魏褐飛何也萇曰登非可卒殄吾城亦非登所能卒圖惡地智畧非常人也若南引褐飛東結董成通典作咸甘言羙說以成姦計得杏城李潤而據之控制逺近相為羽翼長安東北非復吾有乃潛引精兵一千六百赴之褐飛惡地衆至數萬氐胡赴之者首尾不絶萇每見一軍至輒有喜色羣臣怪而問之萇曰褐飛等扇誘司志種𩔖甚繁吾雖克其渠帥餘黨未易猝滅今烏集而至吾得乘勝席卷一舉而覆其巢穴東北無復憂一作餘也褐飛等見萇兵少悉衆來攻萇固壘不戰示之以弱潛遣中軍將軍崇率精騎數百出其不意以乘其後褐飛兵遂擾亂萇遣鎮逺將軍王超平逺將軍譚亮率歩騎追擊飛衆大潰斬褐飛及將士萬餘惡地請降萇待之如初惡地每謂人曰吾自謂智畧傑出一時校數諸雄如吾之徒皆應跨據一方虎嘯千里而每遇姚公智力摧屈固其分也惡地猛毅清肅不可干以非分嶺北諸豪皆敬憚之萇命姚當成於所營之地每栅孔中蒔樹一根以或作一字旌戰功嵗餘問之當成曰營地太小已廣之矣萇曰吾自束髪已來與人戰鬬未嘗如此之快以千六百人破三萬衆國之事業由此克舉小乃為竒大何足貴貳城胡曹寅王逹獻馬三千匹以寅為鎮北將軍并州刺史逹為鎮逺將軍金城太守萇性簡率羣下有過或面加辱罵太常權翼言曰陛下宏逹自任不修小節駕御羣雄包羅俊異棄嫌録善有髙祖之量然輕慢之風所宜除也萇曰吾之性也吾於舜之羙未有片焉漢祖之短已收其一若不聞讜言安知過也南羌竇鴦率戸五千來降拜安西將軍萇下書有復私讐者皆誅之將吏亡滅者各隨所親以立後賑給長育之秋七月鄭縣荀曜晉書作茍曜聚衆數千來附萇以曜為鎮東將軍豫州刺史建初六年夏四月萇與苻登相持鎮東將軍荀曜擁衆一萬據逆萬堡宻信引登至於馬頭原五月萇率衆逆戰為登所敗右將軍吴忠死之萇復收衆前戰征西將軍碩徳謂諸將曰主上慎於輕戰每欲以計取之今戰旣失利而更前逼賊必有由也萇聞而謂碩徳曰登用兵遲緩不識虚實今輕兵直進逕據吾東此必荀曜豎子與之連結也事久變成其禍難測所以速戰者欲使豎子謀之未就好之未深散敗其事耳進戰果大破之登退屯於郿其兗州刺史强金槌以新平來降萇將輕騎數百入槌營羣下諫之萇曰槌既去登又欲圖我將安所歸且彼初來欵附宜推心以相結吾復以不信疑之何以御物乎羣氐果有異謀槌不從而止以其子逹為質冬十二月萇如隂宻攻苻登勅太子興曰荀曜好姦多變將為國害聞吾北行必來見汝汝執誅之曜果見興於長安興遣尹緯讓而誅之萇敗登於安定城東萇寘酒髙㑹諸將皆曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂垂過膝人望而畏之一也當十萬之衆與天下争衡望麾而進前無横陣二也談古知今講論道義駕馭英雄收羅儁異三也董帥大衆上下咸悅人盡死力履險若夷四也所以得建立功業驅䇿羣賢者正望算畧中有片長耳羣臣咸稱萬嵗建初七年春正月萇下書令留臺諸鎮各寘學官勿有所廢考試優劣隨才擢叙二月苻登驃騎將軍没奕干率戸六千來降拜使持節車騎將軍髙平公三月萇寢疾命征西將軍碩徳鎮李潤左僕射尹緯守長安召太子興詣行營征南將軍方成言於興曰今冦賊未滅上復寢疾王綂苻𦙍等皆有部曲終為人患宜盡除之興於是誅苻𦙍王綂王廣毛盛徐成乃赴召及至萇怒曰王綂兄弟皆吾州里無他逺志徐成等昔在秦朝並為名將天下少定吾方用之奈何輒更誅害令人䘮氣秋八月萇疾小瘳下書兵吏從征伐戸在大營者世世復其家無所復豫建初八年秋七月苻登攻竇衝於野人堡衝求救於萇萇議擊之尹緯言於萇曰太子仁厚之稱著於遐邇而英畧未著宜遣太子親行擊之可以漸廣威武防闚􅎿之原萇從之乃戒興曰賊徒知汝轉近必相驅入堡聚而掩之無不克矣比至胡空堡衝圍自解登聞興向胡空堡引還興因襲擊平凉大獲而歸咸如萇䇿使興還鎮長安下書除妖謗之言及姦穢有相劾舉者皆以其罪罪之八月晉平逺將軍䕶氐校尉楊佛嵩率胡屬三千餘户來降晉龍驤將軍楊佺期及趙睦追之九月萇遣中軍將軍崇帥兵赴佛嵩大敗晉師斬趙睦以佛嵩為鎮東將軍冬十月萇如長安至於新支堡疾篤輿疾而進夢苻堅將天官使者鬼兵數百突入營中萇懼走入宫宫人迎萇刺鬼誤中萇隂鬼相謂曰正中死處拔矛出血石餘寢而驚悸遂患隂腫迎醫刺之出血如夢乃發狂言或稱臣或稱萇殺陛下者臣兄襄非臣之罪願不枉臣十二月己亥至長安召太尉旻尚書左僕射晃右僕射尹緯將軍姚大目尚書狄伯支等入禁中受遺詔輔政萇曰吾氣力轉㣲將不能復臨天下卿等善相吾子勉成大業謂太子興曰有毁此諸公者慎勿受之汝撫骨肉以仁接大臣以禮待物以信遇民以恩四者不失吾無恨矣晃涕泣問取苻登之䇿萇曰今大業垂成興才智足辦奚所復問庚子萇卒於永安宫時年六十四在位八年偽諡武昭皇帝廟號太祖葬稱原陵初萇為左衛將軍隨楊安伐蜀晝寢水旁上有神光煥然左右異之遊至梓潼嶺見一神人謂之曰君早還秦秦無主其在君乎萇請其姓氏曰張惡子也言訖不見至是果據秦稱帝即其地立張相公廟祠之十六國春秋卷五十五
