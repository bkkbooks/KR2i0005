body:
  text: 十六國春秋卷二十八前燕録六慕容暐上慕容暐字景茂􅖡之第三子也元璽元年封為中山王尋立為皇太子光夀四年春正月甲午􅖡薨羣臣欲立太原王恪恪曰國有儲君非吾節也於是立暐遂以晉升平四年僭即皇帝位大赦境内殊死已下改元建熙二月尊母可足渾氏為皇太后以太原王恪為太宰録尚書行周公事專掌百揆上庸王評為太傅陽騖為太保慕輿根為太師㕘輔朝政自餘文武諸臣拜授各有差暐既庸弱國事皆委之於恪慕輿根自恃先朝勲舊心不服恪潛欲為亂詳具根𫝊恪與評宻謀奏根罪狀使右衞將軍傅顔收根於内省誅之并其妻子黨與大赦境内殊死已下三月己夘葬􅖡於龍陵時所徴郡國兵以燕朝多難互相驚動擅自散歸自鄴以南道路斷塞太宰恪以吳王垂為使持節征南將軍都督河南諸軍事兖州牧荆州刺史鎮梁國之蠡臺孫希泳之子也為并州刺史傅顔為護軍將軍帥騎二萬觀兵河南臨淮而還境内乃安夏四月以單男為雁門太守冬十一月太宰恪欲以李績為右僕射暐不許恪屢以為請暐曰萬機之事皆委之叔父伯陽一人暐請獨裁出為章武太守績遂以憂死建熙二年春正月乙丑辰時月在危宿奄太白占之曰天下靡散二月平陽人舉郡來降暐以建威將軍段剛為太守遣督護韓苞將兵共守平陽方士丁進有寵於暐欲求媚於太宰恪説恪令殺太傅評恪大怒奏收進殺之三月􅖡所署寧南將軍河南太守吕護據野王潛通於晉晉拜護為前將軍冀州刺史護欲引兵襲鄴事覺太宰恪將兵五萬冠軍將軍皇甫真將兵萬人共討之兵至野王護嬰城自守護軍將軍傅末波一作顔言於恪曰護窮冦假合王師既臨上下喪氣曾不敢闚兵中路展其螗螂之心此則士卒攝魂敗亡之道也殿下前以廣固天險守易攻難故為長久之計今賊形便不與往同宜急攻之以省大費恪曰護老賊經變多矣觀其守備未易卒平頃攻黎陽多殺精鋭卒不能拔自取困辱今圈一作圍之窮城樵採路絶内無蓄積外無救援我深溝髙壘坐而守之休養將卒以重官美貨離間其黨事淹勢窮其釁易動於我不勞而冦賊日弊不過十日取之必矣此為兵不血刃坐以制勝也何必多殺士卒以求旦夕之功乎乃築長圍守之夏四月桓温以其弟黃門郎桓豁將兵取許昌破鎮南將軍塵秋七月恪圍野王數月護遣其將張興率勁卒七千出戰傅末波擊斬之城中日蹙皇甫真戒部將曰護勢窮奔突必擇虚隙而投之吾所部士卒多羸器甲不精宜深為之備乃多課櫓楯親察行夜者護食盡果夜悉精鋭趨真所部突圍不得出恪引兵擊之護衆死傷殆盡棄妻子奔滎陽凡經六月而野王潰恪存撫降民給其廩食徙士人將帥於鄴自餘各隨所樂以護叅軍廣平梁琛為中書著作郎并州刺史張平叛襲平陽殺叚剛韓苞又攻雁門殺太守單男既而為秦所攻復詣燕謝罪以求救恪以平反覆不許冬十月吕護復自滎陽叛歸於暐暐赦之以為廣州刺史仍領寧南將軍十二月大赦建熙三年春正月豫州刺史孫興上疏請攻洛陽曰晉將陳祐弊卒千餘介守孤城不足取也暐從其言遣護軍將軍傅末波一作顔與寧南將軍吕護率衆進據河隂二月末波北襲敇勒大獲而還護攻陥小壘進逼洛陽三月乙酉晉輔國將軍河南太守戴施奔於宛冠軍將軍陳祐告急夏五月丁巳大司馬桓溫遣北中郎將庾希及竟陵太守鄧遐率舟師三千人助祐守洛陽六月護退守小平津中流矢卒鄧遐進屯新城庾希部將何謙及暐將劉則戰於檀邱則衆敗還秋七月征東叅軍劉㧞刺殺征東將軍冀州刺史范陽王友於信都八月將軍叚崇收軍北渡屯於野王庾希自下邳退鎮山陽冬十一月魏昭成帝以女妻暐暐亦納女於帝以備後宫建熙四年夏四月暐遣寧東將軍忠攻滎陽滎陽太守劉逺奔魯陽癸夘忠進㧞宻城逺奔於江陵冬十月遣鎮南將軍塵攻陳留太守袁披於長平汝南太守朱斌承虚來襲許昌克之建熙五年春正月丙辰祀於南郊大赦二月暐復遣太傅評龍驤將軍李洪略地河南頴川太守李福戰死評遂侵汝南汝南太守朱斌奔於夀春進圍陳郡陳郡太守朱輔嬰城固守大司馬桓温遣江夏相劉岵來援評等引還夏四月甲辰暐復遣李洪攻許昌敗晉兵於懸瓠朱斌奔於淮南朱輔退保彭城洪遂㧞許昌汝南陳郡徙萬餘戸於幽冀二州暐遣鎮南將軍塵留屯許昌秋七月遣太尉封奕侍中慕輿龍詣龍城徙宗廟及所留百官於鄴都八月太宰恪謀取洛陽先遣人招納士民逺近諸塢皆來歸附乃使司馬悦希軍於盟津豫州刺史孫興分戍成皋為之聲援九月悦希引兵略河南諸城盡取之冬十月封奕等迎神主於和龍初暐委政太宰恪專受經於博士王歡一作王勸助教尚鋒秘書監一作郎杜詮並以明經講論左右至是通諸經祀孔子於東堂以歡為國子祭酒鋒國子博士詮散騎侍郎其執經侍講者皆有拜授建熙六年春二月太宰恪吳王垂攻逼洛陽恪謂諸將曰卿等常患吾不攻今洛陽城髙而兵弱易克也勿更畏懦而怠惰遂進攻之三月㧞金城寧朔將軍竺瑶奔於襄陽執冠軍長史揚武將軍沈勁勁字世堅吳興武康人父充與王敦搆逆衆敗而逃為部將吳儒所殺勁當坐誅鄉人錢舉匿之得免後竟殺儒以報仇勁少有節操哀父死於非命志欲立勲雪恥年三十餘以刑家不得仕而止至是恪逼洛陽冠軍陳祐守兵不過二千勁自表求配祐効力詔補長史令自募壯士得千餘人以行屢以少擊衆摧破燕軍洛陽糧盡援絶祐自度不得守乃以救許昌為名留勁五百人守之身率衆奔新城一作陸渾勁喜曰吾志欲致命今其時矣為恪所執勁神氣自若恪竒而將宥之中軍將軍慕輿䖍曰勁雖竒士觀其志度終不為人用今若赦之必為後患遂殺之恪略地至崤􆂢關中大震秦苻堅自將屯陜城以備之恪以左中郎將筑為假節征虜將軍洛州刺史鎮金墉吳王垂為都督荆揚洛徐兖豫雍益凉秦等十州諸軍事征南大將軍荆州牧配兵一萬鎮魯陽恪遂還鄴謂僚屬曰吾前平廣固不能濟辟閭蔚今定洛陽使沈勁為戮雖皆非本心然身為元帥實有愧於四海夏四月壬午太尉武平匡公封奕卒以司空陽騖為太尉侍中光禄大夫皇甫真為司空領中書監建熙七年春二月時境内多水旱太宰大司馬恪太傅司徒評並稽首歸政上章綬請遜位還第曰臣以朽闇器非經國過荷先帝㧞擢之恩又蒙陛下殊常之遇猥以輕才竊位宰禄不能上諧隂陽下釐庶政致使水旱愆和彞倫失序轅弱任重夕惕惟憂臣聞王者則天建國辨方正位司必量才官惟徳舉台傅之重㕘理三光茍非其人則靈曜為虧尸禄貽殃負乘招悔由來常道未之或差夫以姬旦之勲聖猶近則二公不悦逺則管蔡流言况臣等寵緣戚榮官非才授而可久㸃天官塵蔽賢路是以中年拜表披陳丹欵聖恩齒舊未忍遐棄奄冉偷榮愆責彌厚自待罪台司嵗餘辰紀沗冒宰衡七載於兹雖乃心經略而思不周務至令二方干紀䟦扈未庭同文之詠有慙盛漢深乖先帝付托之䂓甚違陛下垂拱之義臣雖不敏竊聞君子之言敢忘虞廷避賢之美輙循兩疏知止之分謹送太宰大司馬太傅司徒章綬惟垂詔一作昭許暐曰朕以不天早傾乹覆先帝所托惟在二公二公懿親碩徳勲髙魯衛翼贊王室輔導朕躬宣慈惠和坐而待旦䖍誠夕惕美亦至矣抑亦二公之力也今關右有未賔之氐江吴有遺燼之虜方賴謀猷混寧六合豈宜虚已謙冲以違委任之重王其割二疏獨善之小以成公旦補衮之大恪評等固請致政暐曰夫建徳者必以終善為名位命者則以功成為效二公與先帝開搆洪基膺天明命將廓夷羣醜紹復隆周之業一作迹今災𤯝横流乾光墜曜朕以𦕈躬猥荷大業不能上成先帝遺志致使二虜遊魂所以功未成也豈宜冲退且古之王者不以天下為榮憂四海若荷擔然後仁讓之風行則比屋而可封今道化未純鯨鯢未殄宗廟之重非惟朕躬二公所憂也當思所以寧濟兆庶靖難敦風垂美將來侔蹤周漢不宜崇餙常節以違至公遂斷其讓表恪評乃止夏五月暐下書曰朕以寡徳蒞政多違亢陽三時光隂錯緒農植之辰而零雨莫降其令有司徹樂大官以菜食常供祭奠既而澍雨秋九月鎮律郎郭欽奏議以暐承石虎水為木徳從之冬十月遣撫軍將軍下邳王厲冦兖州攻晉太山太守諸葛攸攸奔淮南㧞兖魯髙平諸郡置守宰而還十二月晉南陽督護趙億叛據宛城以郡來降暐遣南中郎將趙槃一作盤自魯陽戍之建熙八年春二月撫軍將軍下邳王厲鎮北將軍宜都王桓襲敇勒夏四月鎮南將軍塵攻竟陵太守羅崇一作宗擊破之太宰大司馬太原王恪有疾言於暐曰吳王垂將相之才十倍於臣先帝以長幼之次故臣得先之臣死之後願陛下舉國以聽吳王五月壬辰恪疾篤暐親視之囑以後事言終而卒六月晉右將軍荆州刺史桓豁竟陵太守羅崇攻宛城㧞之趙億走趙槃退歸魯陽豁遣輕騎追槃及於雉城大戰破之槃為豁所執因失宛城秋七月下邳王厲等破敕勒獲馬牛數萬頭初厲兵過魏代地犯其祭田昭成帝率衆伐之暐遣平北將軍武强公慕輿埿以幽州兵戍雲中八月昭成攻雲中埿棄城走振威將軍慕輿賀辛戰沒冬十二月甲子太尉陽騖卒以司空皇甫真為太尉侍中光禄大夫李洪為司空建熙九年春二月以車騎將軍中山王冲為大司馬冲暐之弟也以荆州刺史吳王垂為侍中車騎大將軍儀同三司秦苻堅將苻庾據陜城來降請兵應接時有圖䜟曰燕馬當飲渭水堅恐暐乘釁入關大懼乃盡精鋭以守華隂暐羣下議欲遣兵救庾因圖關右太傅評素無經略又受苻氏間貨阻其議曰秦大國也今雖有難未易可圖朝廷雖明未如先帝吾等智略又非太宰之比但可閉關息旅保寧疆場足矣平秦非吾事也魏尹征南將軍范陽王徳上疏曰先帝應天順時受命革代方以文徳懷逺志平六合神功未就奄忽升遐昔周文既沒武王嗣興伏惟陛下則天比徳揆聖齊功闢崇軋基纂成先志逆氐僭據關隴號同王者惡積禍盈自相疑戮釁起蕭墻國分為四投誠請援前後相繼豈非㐫運將終數歸有道兼弱攻昧取亂侮亡機之上也今秦土四分可謂弱矣時來運集天贊我也天與不取反受其殃吳越之事足以觀矣宜應天人建牧野之旗命皇甫真引并冀之衆徑趨蒲坂吳王垂引許洛之兵馳解庾圍太傅評總京師虎旅為二軍後繼傳檄三輔示以禍福明立購賞獲城即侯㣲功必録此則鬱槩待時之雄抱志未伸之桀必嶽峙灞上雲屯隴下天羅既張内外勢合區區僭豎不走則降渾一之基於此乎在願陛下獨斷聖慮無訪二公暐覽表大悦將從之羣下又多請救陜因圖關中者評固執不許乃止苻庾知評暐之無逺略恐救師不至乃遺吳王垂及皇甫真牋曰苻堅王猛皆人傑也謀為燕患久矣今不乘機取之恐異日燕之君臣將有甬東之悔矣垂得書私於真曰方今為人患者必在於秦主上富於春秋未能留心政事觀太傅識度豈能及苻堅王猛乎真曰然吾雖知之如言不用何秋八月時王公貴戚多占民為䕃戸國之戸口少於私家倉庫空竭用度不足尚書左僕射悦綰言於暐曰太傅政尚寛和百姓多有隱附傳曰惟有徳者可以寛臨其衆其次莫如猛今諸軍營戸三分共貫風教陵弊威綱不舉宜悉罷軍封以實天府肅明法令以清四海暐納之綰既定朝制朝野震懼出戸二十餘萬冬十一月左僕射悦綰卒十二月有神降於鄴自稱相汝一作湘女有聲與人接欵數日而去十六國春秋卷二十八
