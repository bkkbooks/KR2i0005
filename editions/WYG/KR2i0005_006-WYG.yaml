body:
  text: 十六國春秋卷六前趙錄六劉曜中光初四年夏五月終南山崩長安人劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂䘮嗚呼嗚呼赤牛奮靷其盡乎時羣臣咸賀以為勒滅之徵曜大悅齋七日而後受之於太廟水經註作於龍門河水中得一玉璽文曰云云曜以為天錫神璽齋九日而受於太廟大赦境内以終為奉瑞大夫中書監領國子祭酒劉均進曰臣聞國主山川故山崩川竭國君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其灾也如是今朝臣皆言祥瑞臣獨言非誠上忤聖㫖下違衆議然臣不達大理竊所未同何則玉之於山石也猶君之於臣下山崩石壊象國傾人亂皇亡皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌大今趙都於秦雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也咢者嵗之次名作咢也言嵗馭作咢酉之年當有敗軍殺將之事困謂困敦嵗在子之年名𤣥囂亦在子之次言嵗馭於子國當䘮亡赤牛奮靷謂赤奮若在丑之嵗名也牛謂牽牛東北維之宿丑之分也言嵗在於丑當滅亡盡無復遺也此其誡悟蒸蒸欲陛下勤修徳化以禳之耳縱為嘉祥尚願陛下夕惕而荅書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾奏均狂言瞽說誣妄一作罔祥瑞請依大不敬論曜曰此之灾瑞誠不可不深戒朕之不徳收均忠恵多矣何罪之有乎光初五年春正月鎮北將軍并州牧安定王策獻玉璽一枚文曰趙盛二月曜親征氐羌楊難敵難敵率衆來拒前鋒撃敗之退保仇池諸氐羌多降於曜曜復討故晉王司馬保部將楊韜於南安韜懼與隴西太守梁勛來降皆封列侯使侍中安昌子喬豫率甲士五千遷韜等及隴西萬餘户於長安進攻仇池會軍中大疫曜亦寢疾議欲班師恐難敵躡其後乃以尚書郎王擴一作王獷為光國中郎將使至仇池諭以禍福難敵遣使稱藩曜大悦署難敵為使持節侍中假黄鉞都督益寧南秦梁凉巴六州隴上西域諸軍事上大將軍益寧南秦三州牧領䕶南氐校尉寧羌中郎將武都王子弟為公侯列將二千石者十五人秦州刺史陳安請朝於曜曜以疾篤不許安怒以曜為卒大掠而去曜疾甚乘馬輿而還使别將呼延寔及長史魯憑監輜重於後安邀獲之遂欲留用寔不肯屈被殺憑亦死之安遣其弟集及將軍張明等率步騎三萬一作二萬進攻曜曜衛軍將軍呼延瑜逆擊斬之悉俘其衆安懼馳還上邽曜至自南安安使將軍劉烈趙罕襲􅛪城克之西州一作隴上氐羌悉歸附安安士馬雄盛有衆十餘萬自稱使持節大都督假黄鉞大將軍雍凉秦梁四州牧凉王以趙募為相國休屠王石武以桑城來降曜大悅署為使持節都督秦州隴上雜夷諸軍事平西大將軍秦州刺史封酒泉王夏四月甲午曜后羊氏卒偽諡獻文皇后羊氏内有特寵外㕘朝政生三子熙襲闌曜始禁無官者不聽乘馬祿八百石已上婦女乃得衣錦繡自季秋農功畢乃聽飲酒非宗廟社稷之祭不得殺牛犯者皆以死論曜臨太學引試學生之上第者拜郎中武功男子蘇撫陜男子伍長平竝化為女子石言於陜若言勿東者十二月曜將葬其父及妻親往粟邑以䂓度之負土為墳其下周圍二里上髙百尺作者繼以脂燭怨呼之聲盈於道路游子逺諫曰臣聞聖主明王忠臣孝子之於終葬也棺足周身槨足周棺藏足周槨而已不封不樹為無窮之計伏惟陛下聖慈幽被神鑒洞逺每以清儉恤下為先社稷資儲為本今二陵之費至以億計計六萬夫百日作所用六百萬工二陵皆下錮一作洞三泉上崇百尺積石為山增土為阜周廻二里發掘古塜以千百數督追役徒繼以脂燭役夫呼嗟氣塞天地暴骸原野哭聲盈衢臣竊謂無益於光帝先后而徒䘮國家之儲力陛下脫仰尋堯舜之軌者則功不盈百萬費亦過千計下無怨骨上無怨人先帝先后有太山之安陛下饗舜禹周公之美惟陛下察焉曜不納乃使征東大將軍岳等率騎一萬迎父及弟暉䘮於太原疫氣大行死者十三四又遣將作大匠勲胡元增永呉一作垣顯平二陵髙九十尺塚前石人若有言慎聲胡元親聞之上洛男子張盧死二十七日有盜發其塚者盧遂得蘇曜葬父墓號永恒陵葬妻羊氏墓號顯平陵大赦境内殊死已下賜人爵二級孤老貧病不能自存者帛各有差光初六年夏六月陳安攻曜征西將軍劉貢於南安休屠王石武自桑城引兵趨上邽以解南安之圍安聞之懼馳歸上邽遇於𤓰田武以衆寡不敵奔保張春故壘安引軍追武曰叛逆胡奴要當生縛此奴然後斬劉貢耳武閉闗拒之貢敗安後軍俘斬萬餘級安馳還赴救貢逆擊敗之俄而武騎大至安衆大潰收餘騎八千奔保隴城貢乃留武督後衆躬先士卒戰輒敗之遂圍安於隴城秋七月大雨霖震曜父墓門屋大風飄發曜父寢堂於垣外五十餘步曜避正殿素服哭於東堂五日乃使子鎮軍將軍襲太常梁胥等繕復之松栢衆木植已成林至是悉枯死光初七年春正月天裂廣一丈餘長五十丈時四方交戰兵革相尋署大司馬雅為太宰加劍履上殿入朝不趨讚拜不名給千兵百騎甲仗百人入殿增班劍六十人前後鼓吹各二部三月曜親征陳安圍隴城别遣兵圍上邽安頻出挑戰屢擊敗之斬獲八千餘級右軍將軍劉幹攻平襄克之隴上諸縣悉降曲赦隴右殊死已下惟陳安趙募不在赦例安留楊伯支姜冲兒等守隴城自率精騎數百突圍而出欲引上邽平襄之衆還解隴城之圍安既出知上邽被圍平襄已敗乃南走陜中曜使將軍平先丘中伯率勁騎追安頻戰敗之俘斬四百餘級安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八虵矛近則刀矛俱發輒害五六人逺則雙帶鞬服左右馳射而走平先亦壯徤絶人勇㨗如飛與安搏戰三交遂奪其虵矛而退㑹日暮雨甚安棄馬與左右五六人步踰山嶺匿於溪澗翼日尋之不知所在會連雨始霽安遣其將石容覘曜兵曜輔威將軍呼延清紀事本末作呼延青人獲之拷問安所在容卒不肯言清遂殺容乃尋其徑迹獲安於澗曲斬之曜大悅楊伯支斬姜冲兒以隴城降别將宋亭斬趙募以上邽降徙秦州大姓楊姜諸族二千餘户於長安氐羌悉下竝送質任以赤亭羌酋姚弋仲為平西將軍封平襄公邑於隴上時征東大將軍岳與凉州刺史張茂相持於河上曜自隴上西擊凉州遣將軍劉咸攻韓璞於冀城呼延晏攻寧羌䕶軍隂鑒於桑壁親帥戎卒二十八萬五千軍於河上列營百餘里金鼓之聲振地河水為沸自古軍旅之盛未有斯比張茂臨河諸戍皆望風奔遁臨洮人翟楷石琮等逐令長以應曜曜又揚聲欲百道俱濟直抵姑臧凉州大震人無固志茂遣平虜將軍陳珍帥步騎一千五百救韓璞曜諸將佐咸欲速濟曜曰吾軍勢雖盛不踰魏武之東也然畏威而來者三分有二中軍宿衛皆已疲老其實難用張氏以吾新平陳安師徒殷盛以形勢言之非彼五郡之衆所能抗也必怖而歸命受制稱藩吾復何求今但案甲勿動以吾威聲振之若出中旬張茂之表不至者吾為負卿矣茂懼果遣使稱藩獻馬一千五百疋牛三千頭羊十萬口黄金三百八十斤銀七百斤女伎二十人及諸珍寳珠玉方域美貨不可勝紀曜大悅使大鴻臚田崧拜茂使持節假黄鉞侍中都督凉南北秦梁益巴漢隴右西域雜夷匈奴諸軍事太師領大司馬凉州牧西域大都䕶䕶氐羌校尉凉王加九錫曜至自河西氐羌楊難敵聞陳安死内懐危懼與弟堅頭南奔漢中鎮西將軍厚追擊之獲其輜重千餘輛士女六千餘人還之仇池曜以大鴻臚田崧為鎮南大將軍益州刺史鎮仇池以征東大將軍廣平王岳為侍中都督中外諸軍事進封中山王初靳準之亂曜世子𦙍沒於黑匿郁鞠部陳安既敗𦙍自言於郁鞠郁鞠大驚禮而歸之曜對𦙍悲慟嘉郁鞠忠欵署使持節散騎常侍忠義大將軍左賢王封𦙍為永安王署侍中衛大將軍都督二宫禁衛諸軍開府儀同三司錄尚書事領太子太傅時有鳳皇將五子翔於故未央殿五日悲鳴不食皆死是年前潁丘太守郎宣北平太守楊平邑振等共修徐水廟舊碑刻石樹頌焉光初八年春正月石勒遣司州刺史石生攻冦河南太守尹平死之生掠五千餘户而去夏四月曜遣使拜凉州牧張駿上大將軍凉州牧凉王贈其父太宰成烈王十六國春秋卷六
