body:
  text: 十六國春秋卷六十九夏録四胡義周胡義周安定臨涇人也博渉經史尤善屬文初仕秦姚泓為黄門侍郎以文章著稱泓滅遂仕於勃勃為秘書監勃勃作綂萬城義周為之銘頌其功德曰夫庸大德盛者必建不刋之業道積慶隆者必享無疆之祚昔在陶唐數終厄運我皇祖大禹以至聖之資當經綸之會鑿龍門而闢伊闕疏三江而決九河夷一元之窮災拯六合之沈溺鴻績侔於天地神功邁於造化故二儀降祉三靈叶贊揖讓受終光啟有夏傳世二十歴載四百賢辟相承哲王繼軌徽猷冠於𤣥古高範煥乎疇昔而道無常夷數或屯險王桀不綱網漏殷氏用一作遂字使金暉絶於中天神轡輟於促路然純曜未渝慶綿萬祀龍飛漠南鳳峙朔北長轡逺馭則西罩崑山之外宻網遐張則東絙滄海之表爰始逮今二千餘載雖三綂迭制於崤函五德革運於伊洛秦雍成簒弑之墟周豫為爭奪之藪而幽朔謐爾主有常尊於上海岱晏然岱一作代物無異望於下故能控弦之衆百有餘萬躍馬長驅鼓行秦趙使中原疲於奔命諸夏不得高枕為日久矣是以偏師蹔擬涇陽摧隆周之鋒赫斯一奮平城挫漢祖之銳雖覇王繼蹤猶朝日之升扶桑升或作照英豪接踵若夕月之澄濛汜澄或作登自開闢已來未始聞也非夫卜世與乾坤比長鴻基與山嶽齊固孰能本枝於千葉重光於萬祀履寒霜而踰榮䝉重氛而彌耀者哉於是𤣥符告徴大猷有會我皇誕命世之期應天縱之運仰協天休俯順時望龍昇北京則義風蓋於九區鳳翔天域則威聲格於八表屬姦雄鼎峙之秋當羣􅇯嶽立之際昧旦臨朝日旰忘膳運籌命將舉無遺䇿親御六戎則有征無戰故偽秦以三世之資喪䰟於闗隴河源望旗而委質北虜欽風而納欵德音著於柔服威刑張一作彰於伐叛文教與武功並宣爼豆與干戈俱運五稔之間道風𢎞著暨乎七載而王猷允協乃逺惟周文啟經始之基近詳山川究形勝之地遂營起都城開建京邑背名山而面洪流左河津而右重塞髙隅隠日崇墉際雲石郭天池周緜千里其為獨守之形險絶之狀固以逺邁於咸陽超美於周洛若乃廣五郊之義尊七廟之制崇左社之規建右稷之禮御太一以繕明堂模帝座而營露寢閶闔披霄而山亭象魏排虛而岳峙華林靈沼崇臺秘室通房連閣馳道苑園可以䕃映萬邦光覆四海莫不鬱然並建森然畢備若紫微之帶皇穹閬風之跨后土然宰司鼎臣羣黎士庻僉以為重威之式有闕前王於是延王爾之竒工命班輸之妙匠搜文梓於鄧林採繡石於恒嶽九域貢以金銀八方獻其瓌寳親運神竒叅制規矩營離宫於路寢之南起别殿於永安之北高構千尋崇基萬仞𤣥棟鏤榥若騰虹之揚眉飛簷舒咢似翔鵬之矯翼二序既啟而五時之座開四隅陳設而一御之位建温宫膠葛涼殿崢嶸絡以隋珠綷以金鏡雖曦望互昇於表而中無晝夜之殊隂陽迭更於外而内無寒暑之别故善目者不能為其名博辯者不能究其稱斯蓋神明之所規模非人工之所經制若乃尋名以求𩔖跡狀以效真據質以究名形疑妙出雖如來須彌之寳塔帝釋忉利之神宫尚未足以喻其麗方其飾矣昔周宣考室而詠於詩人閟宫有侐而頌聲是作況乃太微肇制清都啟建軌一文昌舊章惟始咸秩百神賔享萬國羣生開其耳目天下詠其來蘇亦何得不播之管弦刋之金石哉乃樹銘都邑敷讚碩美俾皇風振於來葉聖庸垂乎不朽其辭曰於赫靈祚配乾比隆巍巍大禹堂堂聖功仁被蒼生德格𤣥穹帝錫𤣥珪揖讓受終哲王繼軌光闡徽風道無常夷數或不競金精南邁天輝北映靈祉踰昌世業彌盛惟祖惟父克廣休命如彼日月連光接鏡𤣥符瑞德乾運有歸誕鍾我后應圖龍飛落落神武恢恢聖姿名教内敷羣妖外夷化光四表威截九圍封畿之制王者常經乃延輸爾肇建帝京土包上壤地跨勝形庶民子來不日而成崇臺霄峙秀闕雲亭千榭連隅萬閣接屛晃若晨曦昭如列星離宫既作别宇云施爰構崇明仰凖乾儀懸甍風閱飛軒雲垂温室嵯峨層城參差楹雕虬獸節鏤龍螭瑩以寳璞飾以珍竒稱因褒著名由實揚偉哉皇室盛矣厥章義高靈臺美隆未央邁軌三五貽則覇王永世垂範億載彌光皆義周之辭也又有虵祠碑諸文頗行於世其子方回仕勃勃中書侍郎王買德王買德初仕秦姚興鎮北叅軍勃勃克貳城買德率衆來奔勃勃謂之曰朕大禹之後世居幽朔祖宗重輝常與漢魏為敵國中世不競受制於人逮朕不肖不能紹興先構國破家亡流離漂虜今將應運而興思復大禹之業卿以為何如買德曰自皇晉失統神器南移羣雄岳峙人懷問鼎況陛下奕葉載德重光朔野神武超於漢皇聖畧邁於魏祖而不於天啟之機建成大業乎今秦政雖衰藩國猶固深願且蓄力待時詳而後舉勃勃善之即拜為軍師中郎將後勃勃欲因西秦乞伏熾磐之䘮議率衆討之買德諫曰明王之行師也軌物以德不以暴且熾磐我之與國新遭大䘮吾不能恤今反伐之豈所謂乘理而動上感靈和之義乎茍恃衆力因人喪難匹夫且猶恥為況萬乘乎勃勃曰甚善微卿朕安聞此言乎其後劉裕滅秦姚泓遂據長安留子義真守之勃勃謂買德曰朕將進圖長安卿試言其方畧買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生闗中形勝之地而以弱才小兒鎮之非經逺之規也狼狽而歸正欲急成簒事耳無暇有意於中原此天以闗中賜陛下機不可失陛下以順伐逆義貫幽顯百姓以君命望陛下義旗之至以日為歲矣青泥上洛南北之衝要宜先置遊兵斷其去來之路然後杜潼闗塞崤峽絶其水陸之道徐傳檄長安申布恩澤三輔父老皆壺漿以迎王師義真獨坐空城逃竄無所一旬之間必面縛麾下所謂兵不血刅不戰而定也勃勃曰善遂以買德為撫軍右長史南斷青泥而自率衆攻㧞長安義真敗走買德獲其寧朔將軍傅𢎞之輔國將軍蒯恩及司馬毛修之勃勃遂入長安大饗將士舉觴謂買德曰卿往日之言一期而驗可謂􅄸無遺䇿矣雖宗廟社稷之靈亦卿謀獻之力也此觴所集非卿而誰拜都官尚書加冠軍將軍封河陽侯趙逸趙逸字思羣天水人也十世祖融漢光禄大夫父昌石勒時為黄門侍郎逸好學夙成仕姚興歴中書侍郎為興將齊難軍司馬從征勃勃難敗逸為勃勃所虜拜著作郎世祖平統萬見逸所為文譽勃勃太過怒曰此豎無道安得為此言乎作者誰也其速推之司徒崔浩進曰文士褒貶多過其實彼之謬述亦猶子雲之美新皇王之道固宜容之世祖乃止後仕於魏逸兄温字思恭博學有高名仕姚泓天水太守泓敗没于氐王楊難當韋𤣥韋𤣥字祖思京兆人也隠居養志恬澹寡欲博渉經史尤善屬文姚興備禮致之見興不拜興亦重其志操厚為之禮劉裕辟為相國掾宋臺通直郎亦不就勃勃克長安遣使徴為太子庶子既至恭懼過禮欲以逭禍勃勃大怒曰吾以國士徴汝汝奈何以非𩔖處我汝昔不拜姚興今何為獨拜我我今未死汝猶不以我為帝王吾死之後汝輩㺯筆當置吾於何地耶遂殺之張淵張淵不知何處人明占候曉内外星分自云嘗事苻堅堅欲南征淵勸不行堅不從果敗遂仕姚興父子為靈臺令泓滅入仕赫連勃勃復任淵為太史令世祖平統萬淵與徐辨俱見獲淵因觀星嘗作觀象賦其詞曰陟秀峯以遐眺望靈象於九霄覩紫宫之環周嘉帝座之獨標瞻華蓋之䕃藹何虛中之迢迢觀閣道之穹窿想靈駕之電飄爾乃縱目逺覽傍極四維北鑒璣衡南覩太微三台皦皦以雙列皇座冏冏以垂暉虎賁執銳於前階常陳屯聚于後闈遂回情旋首次目文昌仰見造父爰及玊良傅說登天而騎尾奚仲托精於津陽織女朗列於河湄牽牛煥然而舒光五車亭柱於畢隂兩河俠井而相望灼灼羣位落落幽紀設官分職罔不悉置儲貳副天廷延三吏論道納言各有攸司將相論次以衛守九卿珠連而内侍天街分中外之境四七列九土之異左則天紀槍棓一作梧攝提大角二咸防奢七公理獄庫樓炯炯以著明騎官騰驤而奮足天市建肆於房心帝座磥落而電燭于前則老人天社清廟所居明堂配帝靈臺考符丈人極陽而恍惚子孫嘒嘒於參隅天狗接狼以吠守野雞伺晨於參墟右則少㣲軒轅皇后之位嬪御相次尊卑有秩御宫典儀女史執筆内平秉禮以伺邪天牢禁姦而察失于後則有車府傳舎匏𤓰天津扶匡照曜麗珠珮珍人星麗𤣥以閑逸哭泣連屬而趨墳河鼓震雷以􅗟磕螣蛇蟠縈而輪􅌲於是周章髙眄還旋辰極既覿鈎陳中禁復覩天帝休息漸臺可升離宫可即酒旗建醇醪之旌女牀列􅆼窕之色輦道屈曲以微煥附路立于雲閣之側其列星之表五車之間乃有咸池鴻沼玉井天淵建樹百果竹林在焉江河炳著于上穹素氣霏霏其帶天神龜曜甲于清泠龍魚摛光以暎連又有南門鼓吹器府之官奏彼絲竹為帝娯懽熊羆綿絡於天際虎豹倐煜而暉爛弧精引弓以持滿狼星揺動於霄端其外則燕秦齊趙列國之名雷電霹靂雨落雲征陳車䇿駕于氐南天駟逞歩於太清園苑周回以曲列倉廪區别而殊形内則尚書大理太乙天乙之宫柱下著述傳示無窮六甲候大帝之所須内厨進御膳於皇躬天船横漢以普濟積水候災於其中隂陽播洪施以恤不足四輔翼皇極而闡𤣥風恢恢太虛寥寥帝庭五座並設爰集神靈乃命熒惑伺彼驕盈執法刺舉於南端五侯議疑于水衡金火時出以成緯七宿匡衛而為經暐􅁮昱其並曜粲若三春之榮覩夫天官之羅布故作則於華京及其災異之興出無常所歸邪繽紛飛流電舉妖星起則殃及晉平蛇乘龍則禍連周楚或取證於逢公或推變于衛午乃有欽明光被填逆水府洪波滔天功隆大禹此則冥數之大運非治綱之失緒蓋象外之妙不可以粗理尋重𤣥之内難以熒燎覩至於精靈所感迅踰駭嚮荆軻慕丹則白虹貫日而不徹衛生畫䇿則太白食昴而摛朗魯陽指麾而曜靈為之廻駕嚴陵來遊而客氣著於乾象斯皆至感動於神祗誠應效於既往爾乃四氣鱗次斗建辰移雖無聲言三光是知星中定於昏明影度以之不差測水旱於未然占方來之安危隂精乘箕則大風暮鼓西南入畢則淫雨滂沱譬如晉鐘之應銅山風雲之從班螭若夫㝠車潛駕時乘六虬大儀廻運萬象俱流北斗俄其西傾羣星忽以匿幽望舒縱轡以騁度靈輪浹旦而過周爾乃凝神逺矚矖目八荒察之天象視之渺茫狀若混元之未判别又似浮海而覩滄浪幽遐逈以希夷寸眸焉能究其旁于是乎夜對山水棲心髙鏡逺尋終古悠然獨詠美景星之繼晝大唐堯之德盛嘉黄星之靡錯明虞舜之無競疇吕尚之宵夢善登輔而翊聖欽管仲之察微見虛危而知命歎熒惑之舎心髙宋景之守政壯漢祖之入秦竒五緯之聚映爾乃厯象既周相佯巖際尋圖籍之所紀著星變乎書契覽前代之將淪咸譴告于昏世桀斬諫以星孛紂酖荒而致彗恒不見以周衰枉蛇行而秦滅諒人事之有由豈妖灾之虛設誠庸主之難悛故明君之所察堯無為猶觀象而況德非乎先哲胡淵胡淵安定臨涇人也仕勃勃給事黄門侍郎父畧仕秦姚興渤海公逵平北諮議參軍魏平統萬淵以降欵之功賜爵武始侯後拜為河州刺史費峻費峻代人也仕勃勃為寧東將軍護羗校尉後率衆歸魏韓耆韓耆字黄耉安定安武人也仕勃勃為并州刺史後歸仕魏十六國春秋卷六十九
