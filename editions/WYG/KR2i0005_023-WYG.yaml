body:
  text: 十六國春秋卷二十三前燕録一慕容廆慕容廆字奕落瓌鮮卑人也本出於昌黎之棘城昔髙辛氏遊於海濱留少子厭次以君北夷遂世居遼左邑於紫濛之野號曰東胡其後與匈奴並盛控弦之士二十餘萬風俗官號與匈奴畧同秦漢之際為匈奴所敗分保鮮卑山因以為號其十一世祖乾歸者乾歸述異記作乾羅見神著金銀襦鎧乗白馬金銀鞍勒自天而墜鮮卑神之推為君長曽祖莫護跋魏初帥諸部落大人自塞外入居遼西從司馬懿討公孫淵有功拜率義王始建王府一作國於棘城之北時燕代少年多冠步揺冠跋見而好之乃歛髪襲冠諸部因呼之為步揺其後音訛為慕容遂以慕容為氏祖木延左賢王從母丘儉征高驪有功加號大都督左賢王父涉歸一名奕落韓以全柳城之勲進拜鮮卑單于遷邑遼東北於是漸變胡風自云慕二儀之德繼三光之容即以慕容為姓廆幼而魁岸美姿貌身長八尺雄傑有大度晉安北将軍張華雅有知人之鑒廆童丱時徃謁之華甚歎異謂曰君長必為命世之器定難濟時者也因以所服冠一作幘簪遺之以結殷勤晉武帝太康二年冬涉歸始寇昌黎安北将軍嚴詢敗走之斬獲萬計太康四年涉歸卒弟耐一作刪簒立将謀殺廆廆年十五出避難追者急乃走匿於遼東徐郁家入其屋以席自障追者入屋發視竟無所見遂得免難太康五年國人殺耐迎廆立之代領部落初涉歸與宇文鮮卑素有隙廆將修先君之怨表請討之武帝弗許廆怒入寇遼西殺掠甚衆帝遣幽州諸軍討之戰於肥如廆衆大敗自後復掠昌黎每歲不絶太康六年又率衆東伐扶餘扶餘王依慮自殺子弟走保沃沮廆夷其國城驅掠萬餘人而還太康七年廆寇遼東故扶餘王依慮子依羅求率見人還復舊國請援於東夷校尉何龕龕遣督護一作郵賈沉将兵救之廆遣其將孫丁率騎邀之於路沉力戰斬丁遂復扶餘國爾後廆每掠其種人賣於中國帝又以官物贖還禁市扶餘之口太康十年夏四月廆謀於衆曰吾先公以來世奉中國且華夷理殊強弱固别豈宜與晉國競乎何為不和以害吾百姓乃遣使詣晉乞降帝嘉之拜鮮卑都督五月廆謁見東夷校尉何龕抗士大夫禮巾衣詣門龕嚴軍以見之廆乃改服戎衣而入人問其故廆曰主人不以禮待客客何為哉龕聞之甚慚彌加敬憚時東胡宇文氏鮮卑叚氏部落以廆威德日廣懼有并吞之計因為寇掠徃來不絶廆卑辭厚幣以撫之鮮卑叚國單于階以女妻廆生皝仁昭元康四年廆以遼東僻逺徙於徒河之青山後又以大棘城即帝顓頊之墟所謂紫䝉之邑也復移居之乃教以農桑法制同於上國永寧中燕垂大水廆開倉振給幽方獲濟天子聞而嘉之褒賜命服太安初鮮卑宇文單于莫圭部衆強盛遣其弟屈雲寇邊雲别帥素怒延一無怒字攻掠諸部廆親擊敗之素怒延恥之復率衆十萬圍廆於棘城衆咸震懼人無拒志廆曰素怒延雖犬羊蟻聚然軍無法制已在吾計中矣諸君但為力戰無所憂也乃躬貫甲胄馳馬出擊素怒延大敗之追奔百里俘斬萬餘人遼東孟暉先没於宇文部帥其衆數千餘家來降廆署為建威将軍以其臣慕輿句勤恪廉靖使掌府庫句心計黙識不案簿書始終無漏以慕輿河明敏精審使典獄訟覆訊清允永嘉初廆自稱鮮卑大單于時魏昭帝名祿官卒弟穆帝名猗盧總攝三部先是昭帝之世廆為東部之患昭帝遣弟左賢王普根擊走之至是與廆通好永嘉三年遼東太守龐本以私憾殺東夷校尉李臻詔以渤海封釋代之釋收斬本永嘉五年初東夷校尉李臻之死也遼東附塞鮮卑素喜連木丸津等託為臻報讐實欲因而為亂遂攻䧟諸縣殺掠士民屢敗郡兵太守袁謙頻戰失利東夷校尉封釋懼不能討請與連和連津不從百姓失業流亡歸廆者日月相繼廆給廩遣還願留者即撫存之廆庶子鷹揚将軍翰言於廆曰求諸侯莫如勤王自古有為之君莫不尊天子以從民望成大業者也今連津跋扈王師覆敗蒼生屠膾豈甚此乎豎子外以龐本為名内實幸災為寇封使君以誅本請和而毒害滋深遼東傾没垂以二紀中原離亂神州屢敗勤王仗義今其時也大單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼東下則并吞二部忠義彰於本朝私利歸於吾國此則吾霸王之基也一云鴻漸之始也終可以得志於諸侯廆笑曰孺子乃能及此乎遂率騎東擊連津以翰為前鋒破斬之盡併二部之衆得所掠民三千餘家徙之棘城立遼東郡而歸晉懷帝䝉塵於平陽王浚承制以廆為散騎常侍冠軍将軍前鋒大都督大單于廆以非王命所授拒而不受廆復遣翰攻段疾陸眷取徒河新城至陽樂引兵而還翰因鎮徒河壁青山時兩京傾覆幽冀淪䧟中國流民避亂者多北依王浚浚不能存撫又法政不立士民徃徃逃去叚氏兄弟專尚武勇不禮士大夫惟廆刑政修明虚懷引撫流亡士庶多襁負歸之廆乃舉其英俊隨才授任以河東裴嶷代郡魯昌盧江黄泓北平陽耽為謀主北海逢羡廣平遊邃北平方䖍渤海封抽西河宋奭及裴開為股肱渤海封奕平原宋該蘭陵繆愷昌黎劉斌安定皇甫岌岌弟真及抽子裕竝典機要遼東張統據樂浪帶方二城與高句驪王乙弗利相攻連年不解樂浪王遵説統帥其民千餘家歸廆廆為之置樂浪郡以統為太守遵叅軍事建興中王浚為石勒所殺幽州喪亂㑹稽朱左車魯國孔纂泰山胡母翼自薊逃奔昌黎悉來依廆中國流民歸廆者數萬家廆乃立郡以統流民冀州人為冀陽郡豫州人為成周郡青州人為營丘郡并州人為唐國郡愍帝遣使拜廆鎮軍将軍昌黎遼東二郡公晉元帝建武元年春三月元帝承制拜廆假節散騎常侍都督遼左雜夷流民諸軍事龍驤将軍大單于昌黎公廆讓公爵不受征虜将軍魯昌説廆曰今兩京傾没天子䝉塵琅邪王承制江東實人命所係明公雖雄據海朔跨總一方而諸部猶怙衆稱兵未遵道化者蓋以官非王命又自以為強故也今宜通使琅邪勸承大統然後敷宣帝命以討有罪誰敢不從處士遼東髙詡曰霸王之資非義不濟今晉室雖微人心猶附宜遣使江東示有所尊然後仗大義以征諸部不患無辭矣廆從之遣長史王濟浮海詣建康勸進太興元年春三月元帝即尊位遣謁者陶遼重申前命授廆龍驤将軍大單于昌黎公廆固辭公爵不受以游邃為龍驤長史劉翔為主簿命邃創定府朝儀法長史裴嶷言於廆曰晉室微弱介居江表威德不能及逺中原之亂非明公不能拯也今諸部雖各擁兵然皆頑愚相聚宜以漸并取以為西討之資廆曰君言大非孤所及也然君中朝名德不以孤僻陋而教誨之是天以君賜孤而祐其國也乃以嶷為長史委以軍國之任諸部弱小者稍稍擊取之太興二年廆封畧漸廣進據棘城晉平州刺史東夷校尉崔毖自以中州士望懷集流亡而士民多歸於廆心不平之數遣使招附莫有赴者意廆拘留之乃隂結高向驪及宇文氏叚國氏等謀滅廆以分其地毖所親渤海高瞻力諫不從於是三國合兵來伐諸将請擊之廆曰彼信崔毖虚説欲邀一時之利軍勢初合其鋒甚鋭幸我速戰若逆擊之落其計矣不可與戰當固守以待之彼烏合而來耳既無統一莫相歸服久必携貳一則疑吾與毖譎而覆之二則三國自相猜忌待其人情沮惑然後擊之破之必矣三國進攻棘城廆閉門自守遣使獨以牛酒犒宇文大人聲言於衆曰崔毖昨有使至二國疑宇文氏與廆有謀各引兵歸宇文大人悉獨官曰二國雖歸我當獨兼其國何用人為率衆數十萬逼城連營四十里廆使召其子翰於徒河翰遣使謂廆曰悉獨官舉國為寇彼衆我寡易以計勝難以力勝今城中之衆足以禦寇翰請為奇兵於外伺其間而擊之内外俱奮使彼震駭不知所備破之必矣若合兵為一彼得專意攻城無復他慮非䇿之得者也且示衆以怯恐士氣不戰先自沮矣廆猶懷疑貳遼東韓壽言於廆曰悉獨官有憑陵之志将驕卒惰軍不堅密若奇兵卒起犄其無備必破之䇿也乃聽翰留徒河悉獨官聞之曰翰素名驍果今不入城或能為患當先取之城不足憂也遂分遣數千騎襲翰翰潛知之詐為叚氏使者逆於道曰慕容翰久為吾患聞當擊之吾已嚴兵相待宜速進也使者既去翰即出城設伏以待之宇文氏之騎見使者大喜馳行不復設備進入伏中翰奮擊盡獲之乗勝徑進遣間使語廆出兵大戰廆使子皝與長史裴嶷将精鋭為前鋒自將大兵繼後悉獨官自恃其衆初不設備見廆兵至方率衆逆戰前鋒始交翰將千騎從旁直衝其營縱火焚之衆皆振擾不知所為遂大敗之悉獨官僅以身免盡俘其衆於其營候獲皇帝玉璽三紐崔毖聞之懼廆之仇已使兄子燾一作濤詣棘城偽賀廆㑹三國使者亦至請和曰非吾本意崔平州教我耳廆将燾示以攻圍之處臨之以兵曰汝叔父教三國滅我何以詐來賀我乎燾懼首服廆乃遣燾歸謂毖曰降者上䇿走者下䇿也引兵隨之毖與數十騎棄家室奔髙句驪悉降其衆廆以子仁為征虜将軍鎮遼東宮府市里安堵如故高句驪將如奴子據于河城寇掠遼東廆遣樂浪太守張統掩擊擒之俘其衆千餘家徙崔燾高瞻韓恒石琮等於棘城待以客禮尋以高瞻為將軍瞻稱疾篤不就廆頗不平之竟以憂卒宋詼勸廆獻㨗江東廆使詼為表令裴嶷奉之并所獲三璽詣建康獻之高句驪數寇遼東廆遣建威將軍翰征虜將軍仁伐之句驪王乙弗利逆來求盟翰仁乃還太興三年春三月裴嶷至自建康盛稱廆之威德賢俊皆為之用朝廷始重之乃遣使隨嶷拜廆監平州諸軍事安北將軍平州刺史増邑一千户太興四年冬十二月加廆使持節都督幽平二州東夷諸軍事車騎將軍平州牧進封遼東郡公邑一萬户侍中單于竝如故遣謁者即授印綬丹書鐵劵承制海東命備官司置平州守宰廆於是備置僚屬立子皝為世子作東樓以裴嶷游邃為長史裴開為司馬韓壽為别駕楊耽為軍諮祭酒崔燾為主簿黄泓鄭林參軍事以朱左車孔纂胡母翼等夙德清望請為賓友以平原劉讚儒學該通引為東庠祭酒命皝與國胄束脩受業廆覽政之暇亦親臨聽之於是路有頌聲禮讓興矣徙翰鎮遼東仁鎮平郭翰撫安民夷甚有威惠仁亦次之永昌元年冬十二月叚末波初統其國而不修備廆遣世子皝襲之入令支掠其居民千餘家及名馬寳物而還晉明帝太寧元年春二月廆以長史裴嶷為遼東相太寧二年秋七月晉遣使者加廆邑五千户重申前好太寧三年春三月石勒遣使通和廆拒之送其使於建康勒怒加宇文乞得歸一作龜官爵使之擊廆廆遣皝拒之以遼東相裴嶷為右部都督率索頭叚國為右翼命征虜仁自平郭趣伯林為左翼乞得歸屯保澆水固壘不戰遣兄子悉拔雄襲仁於伯林仁逆擊悉拔雄斬之悉虜其衆乗勝與皝攻乞得歸大敗之乞得歸棄軍走皝仁入其國城使輕兵追乞得歸過三百里而還盡獲其國重器畜産以百萬計徙其民數萬户以歸先是海出大龜枯死於平郭至是而乞得歸敗其東部大人逸豆歸逐而殺之因自立為主冬十一月廆與叚氏方睦為叚牙謀使之徙都牙從之即去令支國人不樂叚疾陸眷之孫遼欲奪其位以徙都為牙罪十二月帥國人攻牙殺之自立叚氏自務勿塵以來日益強盛其地西接漁陽東界遼水所統胡晉三萬餘户控弦四五萬晉成帝咸和元年秋九月遣使拜廆侍中位特進餘悉如故咸和二年春二月廆遣使詣建康固辭爵位優詔不許咸和三年冬十二月己卯後趙石勒殺趙主劉曜咸和四年春正月趙石虎取長安冬十二月羗酋姜聰殺吐谷渾王吐延吐延廆之庶兄吐谷渾子也延死其子葉延立保於白蘭山自號其國曰吐谷渾咸和五年春晉又遣使加廆開府儀同三司固辭不受廆嘗從容言曰獄者人命之所懸也不可以不慎賢人君子國家之基也不可以不敬稼穡者民生之本也不可以不急酒色便佞亂德之甚也不可以不戒乃著為家令數千言以申其旨咸和六年秋僚屬宋詼等議以廆立功一隅位卑任重等差無别不足以鎮華夷共表請進廆官爵叅軍韓恒駁曰夫立功者患信義不著不患名位不高桓文有匡復之功不先求禮命以令諸侯宜繕甲兵除凶逆功成之後九錫自至比於要君以求寵不亦榮乎廆不悦出恒為新昌令於是遣使與太尉陶侃箋曰明公使君轂下振德耀威撫寧方夏勞心文武士馬無恙欽高仰止注情彌久王塗險逺隔以燕越每瞻江湄延首遐外天降艱難禍害屢臻舊都不守奄為虜庭使皇輿遷幸假勢吳楚大晉啓基祚流萬世天命未改𤣥象著明是以義烈之士深懷憤踴猥以功薄受國殊寵上不能掃除羣羯下不能身赴國難仍縱賊臣屢逼京輦王敦倡禍於前蘇峻肆毒於後凶暴過於董卓惡逆甚於傕汜普天率土誰不同忿深怪文武之士過荷朝榮不能滅中原之寇刷天下之恥君侯植根江陽發曜荆衡仗葉公之權有包胥之志而令白公伍員得極其暴竊為丘明恥之區區楚國子重之徒猶恥君弱臣強臣不及先大夫厲已戒衆以服陳鄭越之種蠡尚能弼佐勾踐取威黄池況今吳土英賢比肩不聞輔翼聖主陵江北伐以義聲之直討逆暴之羯檄命舊都之士招懷存本之人豈不因風振落頓坂走輪哉且孫氏之初以長沙之衆摧破董卓志匡漢室雖中罹寇害雅志不遂原其誠心乃忽身命及權據揚越外仗周張内憑顧陸拒魏赤壁克取襄陽自兹以降世主相襲咸能侵逼徐豫令魏朝旰忘食不知今之江表為賢儁匿智藏其勇畧耶將呂䝉凌統高蹤曠世哉況今凶羯逆暴中州人士逼迫勢促顛沛之危甚於累卵假號之彊衆心所去敵有釁矣易可震蕩王郎袁術雖自詐偽皆基淺根微禍不旋踵此皆君侯之所見聞者也王司徒清虚寡欲善於全已昔曹參亦崇此道著畫一之稱庾公居元舅之尊處申伯之任超然高蹈明智之權廆於寇難之際受大晉累世之恩自恨絶域無益聖朝徒繋心萬里望風懷憤今海内之望足為楚漢輕重者惟在君侯若戮力盡心悉五州之衆據兖豫之郊使向義之士倒戈釋甲則羯寇必滅國恥必除廆在一方敢不竭命孤軍輕進不足使勒畏首畏尾則懷舊之士欲為内應無由自發故也故逺陳寫言不盡宣廆使者遭風没海廆復更寫前箋并齎東夷校尉封抽行遼東相韓矯等三十餘人疏上侃府曰自古有國有家鮮不極盛而衰自大晉龍興克平㟭㑹神武之畧邁蹤前史惠皇之末后黨搆難禍結京畿釁成公族遂使羯逆乗虚傾覆諸夏舊都淪滅山陵掘毁人神悲悼幽明發憤昔玁狁之強匈奴之盛未有如今日羯逆之暴跨躡華夷盜稱尊號者也天授有晉挺拔英傑車騎將軍慕容廆自弱冠蒞國忠於王室明允恭肅志在立勲屬海内分崩皇輿遷幸元皇中興初創大業肅祖繼統蕩平江外廆雖限以山海隔以羯寇翹首引領係心京師常假寤寢憂國忘身貢篚相尋連舟載路馬不税駕動成義舉今羯寇滔天怙其醜𩔖樹基趙魏跨畧燕齊廆雖率義衆誅討大逆然管仲相齊猶曰寵不足以御下況廆輔翼王室有匡伯之功而位卑爵輕九命未加非所以寵異藩翰敦奨殊勲者也方今詔命隔絶王路嶮逺貢使往來動彌年載今燕之舊壤北周沙漠東盡樂浪西暨代土南極冀方而悉為虜庭非復國家之域將佐等以為宜逺尊周室近準漢初進封廆為燕王行大将軍事上以總統諸部下以割損賊境使冀州之民望風向化廆得祗承詔命率合諸國奉辭夷逆以成桓文之功茍利社稷專之可也而廆固執謙光守節彌高每詔所加讓動積年非將佐等所能敦逼今區區所陳不欲茍相崇重而愚情至心實為國計侃荅廆書云當今揚淮鋭勇飛廉超驥收屈盧必䧟之矛集鮫犀不入之盾惟在足下復答抽等書其畧曰車騎將軍憂國忘身貢篚載路羯賊求和執使送之西伐段國北擊塞外逺綏索頭荒服獻欵惟北部未賓屢遣征討又知東方官號高下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為國一作官摧勒然忠義竭誠見於辭表今騰箋上聽可否遲速當在天臺也咸和七年春三月趙王石勒遣使復修前好廆拒而不納咸和八年夏五月甲申晉帝紀作乙未廆薨於文德殿葬於青山時年六十五在位四十九年帝遣使者䇿贈車騎大将軍開府儀同三司諡曰襄公皝為燕王追諡武宣王及儁僭號改諡武宣皇帝廟號高祖十六國春秋卷二十三
