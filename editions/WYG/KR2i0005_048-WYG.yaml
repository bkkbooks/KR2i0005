body:
  text: 十六國春秋卷四十八後燕録六慕容熙慕容熙字道文小字長生垂之少子也燕二年生於長山建興八年封河間王永康初隨寶奔龍城拜司隸校尉段速骨之難諸王多被其害熙素為高陽王崇所親愛故得獨免蘭汗之簒以熙為遼東公備燕之宗祀如把宋故事長樂元年盛初即位降爵為公拜都督中外諸軍事驃騎大將軍尚書左僕射領中領軍從征高句驪契丹皆勇冠諸將盛曰叔父雄果英壯有世祖之風但𢎞略不如耳及盛死中壘將軍抜冗從僕射郭仲白太后丁氏以為國家多難宜立長君時羣望皆在盛弟司徒尚書令平原公元而熙素得幸於丁氏丁氏遂廢太子定密迎熙入宫明旦羣臣入朝始知有變因上表勸進於熙熙以讓元元固讓熙遂以晉隆安五年秋八月癸巳僭即尊位誅大臣段璣秦興等竝夷三族甲午大赦丙申平原公元以嫌疑賜死元字道光寳之第四子也閏月辛酉葬盛於興平陵丁氏送葬未還中領軍提步軍校尉張佛等謀立故太子定事覺伏誅定亦賜死丙寅大赦改元光始改北燕臺為大單于臺置左右輔位次尚書冬十二月乙卯魏虎威將軍宿庫干庫一作沓率衆來伐攻令支乙丑中領軍宇文拔救之壬午宿庫干拔令支而戍之光始二年春正月丁丑熙遣平冦將軍拔攻遼西拔令支戍宿庫干等拒戰失利退走執魏遼西太守那頡遂以拔為幽州刺史鎮令支以中堅將軍遼西陽豪為本郡太守丁亥以章武公淵為尚書令博陵公䖍為尚書左僕射尚書王騰為右僕射二月甲戌大赦夏五月高句驪攻宿軍平州刺史歸棄城走冬十月熙納故中山尹苻謨長女為貴人幼女為貴嬪而貴嬪尤有寵丁太后怨恚謀欲廢熙事覺逼令自殺諡曰獻幽皇后十一月戊辰殺淵及信辛未狩於北原石城令高和與尚方兵於後作亂殺司隸校尉張顯入掠宫殿取庫兵脅營署閉門乘城拒熙熙率騎馳還和衆皆投仗開門盡誅反者惟和走免甲戌大赦光始三年春正月熙引見州郡及單于北一作八部耆舊於東宫問民間疾苦司隸部民劉瓚對問稱㫖拜帶方太守是月大治宫室夏四月立貴人苻氏為昭儀五月大築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑内基廣五百步峯高十七丈冬十二月戊申熙尊垂之貴嬪段氏為皇太后段氏熙之慈母也己酉立貴嬪苻氏為皇后大赦殊死以下辛亥以衞尉悦真為青州刺史鎮新城光禄大夫衞駒為并州刺史鎮凡城光始四年夏四月熙於龍騰苑起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又鑿曲光海清涼浄作池季夏盛暑士卒暍死幾萬餘人擬鄴之鳳陽門又作𢎞光門累級九重熙逰於城南止大柳樹下若有人呼曰大王且止熙惡之伐其樹乃有蛇長丈餘從樹中而出秋七月苻昭儀有疾卒諡曰愍皇后贈苻謨太宰追諡文獻公九月熙北襲契丹大破之冬十二月高句驪冦燕郡殺掠百餘人光始五年春正月熙伐高句驪苻后從行戊申至遼東攻之不克會大雨雪士卒凍死者甚衆熙乃引歸秋八月遼西太守邵顔有罪亡命為盜九月中常侍郭仲討斬之冬十二月熙襲契丹光始六年春正月熙與苻后至陘北畏契丹之衆將還苻后弗聴戊申遂棄輜重輕兵襲高句驪二月軍行三千餘里士馬俱疲凍死者屬路攻木底城不克而還夕陽公雲傷於矢且畏熙政之虐遂以疾去官夏五月寶諸子博陵公䖍上黨公昭皆以嫌疑賜死乃大城肥如及宿軍以仇尼倪為鎮東大將軍管州刺史鎮宿軍上庸公懿為鎮西大將軍冀州刺史鎮肥如建始元年春正月辛丑朔大赦改元建始三月太史丞梁延年夢月化為五白龍夢中占之曰月臣也龍君也月化為龍當有臣為君者寤而告人曰國苻其將盡乎夏四月癸丑苻后死熙哭之悲慟若喪考妣狊苻后録丁酉去太后段氏尊號出居外宫五月壬戌尚書郎苻進謀反伏誅進定之子也秋七月癸亥熙葬苻后於徽平陵甲子大赦初中衞將軍馮跋左衞將軍張興先皆坐事亡奔至是以熙政殘虐與從兄萬泥等二十二人結盟推夕陽公雲為主發尚方徒五千餘人分屯四門跋弟乳陳等帥衆攻𢎞光門鼔譟而進禁衞皆散走遂入宫授甲閉門拒守中黄門趙洛生等奔告於熙熙曰此鼠盜耳何能為朕還當誅之乃置后柩於南苑收髪貫甲馳還赴難夜至龍城攻北門不克宿於門外乙丑熙退入龍騰苑尚方兵禇頭踰城從熙自稱營兵同心效順惟俟軍至熙聞之驚走而出左右莫敢迫熙從溝下潛匿良久左右怪其不還相與尋之惟得衣冠不知所適中領軍拔謂中常侍郭仲曰大事垂㨗而帝無故自驚深可怪也然城内企遲至必成功不可稽留吾當先往趣城卿留待帝得帝速來若帝未還吾得如意安撫城中徐迎未晚乃分將壯士二十餘人登北城將士謂熙至皆投仗請降既而熙久不至拔兵無後繼衆心疑懼復下城赴苑遂皆潰散拔為城中人所殺丙寅熙㣲服逃隠於林中為人所執送於雲雲數而殺之及其諸子同殯城北初童謡曰一束藁兩頭然禿頭小兒來滅燕藁字上有草下有木兩頭然則草木俱盡而成高字雲父名拔小字秃頭有三子而雲季也熙竟為雲所滅終如謡言時年三十二一作二十三在位七年雲葬之於苻氏墓偽諡昭文皇帝垂以晉孝武帝太元九年嵗在甲申僭立至熙四世凡二十四年以安帝義熙三年嵗在丁未滅十六國春秋卷四十八
