body:
  text: 十六國春秋卷五十三後秦録一姚弋仲姚弋仲南安赤亭羗人也其先有虞氏之苗裔昔禹封舜少子於西戎世為羌酋其後燒當雄於洮罕之間當七世孫填虞漢中元末冦擾西州為揚虛侯馬武所敗徙出塞北虞九世孫遷郍率種人内附漢朝嘉之假冠軍將軍西羌校尉歸順王處之於安南赤亭郍元孫柯廻為魏征晉書作鎮西將軍助魏將絆姜維於沓水以功假綏戎校尉西羌都督廻生弋仲少而聰猛英果雄毅不營産業唯以收恤為務衆皆畏而親之永嘉之亂東徙榆眉戎夏襁負隨之者數十萬人自稱雍州刺史䕶羌校尉扶風公劉曜平陳安以弋仲為平西將軍封平襄侯邑於隴上及石虎克上邽弋仲說之曰明公擁晉書作握兵十萬功髙一時正是行權立䇿之日隴上多豪秦風猛勁道隆後服徳洿先叛宜徙隴上豪强虛其心腹以實畿甸虎納之啓勒以弋仲行安西將軍六夷左都督後豫州刺史祖約奔勒勒禮待之弋仲上疏曰祖約殘賊晉朝逼殺太后不忠於主而陛下寵之臣恐姦亂之萌此其始矣勒善之後竟誅約勒死虎遂執權思弋仲之言乃徙秦雍豪傑於闗東弋仲率部衆數萬遷清河之灄頭拜奮武將軍西羌大都督封襄平縣公虎既廢宏自立弋仲稱疾不賀虎累召之乃至或作赴正色謂虎曰奈何把臂受托而反奪之乎虎懼其强正而不之責虎永興元年遷使持節十部六夷大都督冠軍大將軍弋仲性清儉鯁直不修威儀屢獻讜言無所廻避虎甚重之朝之大議靡不參决公卿以下皆憚而推下之武城左尉虎寵姬之弟也曾入弋仲營擾其部衆弋仲執而數之曰爾為禁衛逼脅我為大臣目所親見不可縱也命左右斬之尉叩頭流血左右固請乃止其剛直不回皆此𩔖也虎末年謫戍梁犢反敗李農於滎陽遂東掠陳留諸郡虎大懼馳使召之弋仲率其衆八千餘人屯於南郊輕騎至鄴乃求見虎虎病不時引見入領軍省以己所食食之弋仲怒不食曰召我擊賊當面授方畧豈來覓食耶且吾不知主上存亡若一見我雖死無恨左右言之虎引見弋仲讓之曰兒死晉書有來字愁耶乃至於疾小兒晉書作兒小時不能使好人輔相至令相殺兒自有過責其下人太甚故相聚反耳且汝病久所立兒小若不差天下必亂當先憂此不煩憂賊也犢等因思歸之心共為姦盗所行殘賊此成晉書作或禽耳老羌為汝效死前鋒一舉了之弋仲性狷直人無貴賤皆汝之虎亦不之責乃於坐授使持節侍中征西大將軍賜以鎧馬弋仲曰汝看老羌堪破賊否遂被甲跨馬於庭中䇿馬南馳不辭而出與石斌等擊犢於滎陽大破之斬犢首而還討其餘黨盡滅之虎以功命劔履上殿入朝不趨進封西平郡公冉閔之亂弋仲據灄頭擁衆數萬不附於閔弋仲子曜武將軍益武衛將軍若帥禁兵數千斬闗奔灄頭弋仲率衆攻閔次於混橋隂有據闗右之志遣其子襄帥衆五萬擊蒲洪洪逆擊破之及石祗稱尊號於襄國以弋仲為右丞相待以殊禮閔攻圍襄國百餘日祗危急乃遣中軍將軍張春乞師於弋仲弋仲遣子襄帥騎二萬八千救祗戒之曰冉閔棄仁背義屠滅石氏我受人厚恩當為復仇老病不能自行汝才十倍於閔若不梟擒以來不須復見我也自是弋仲遣使與燕連和告於慕容儁儁遣禦難將軍悅綰將兵三萬㑹襄襄擊閔於長蘆澤大破之而歸弋仲怒襄之不擒閔也杖之一百弋仲部曲馬何羅博學有文才張豺之輔石世也背弋仲歸豺豺以為尚書郎豺敗復歸弋仲咸勸殺之弋仲曰正是招才納竒之日當收其力用不足害之以為參軍其寛恕如此石祗為劉顯所殺弋仲復與燕連和常誡諸子曰我本以晉室大亂石氏待我厚故欲討其賊臣以報其徳今石氏已滅中原無主自古以來未有𦍑人作天子者我死之後汝便歸晉家當竭力臣節無為不義之事乃遣使降晉晉永和七年拜弋仲為使持節六夷大都督督江淮諸軍事車騎大將軍開府儀同三司大單于封髙陵郡公八年春卒年七十三弋仲薨後柩為苻生所得生以王禮葬之於天水冀縣及萇僣位追諡景元皇帝廟號始祖墓曰髙陵寘園邑五百家十六國春秋卷五十三
