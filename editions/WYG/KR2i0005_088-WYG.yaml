body:
  text: 十六國春秋卷八十八南凉録一秃髪烏孤秃髪烏孤河西鮮卑人其先與魏同出八世祖匹孤率其部衆自塞北遷於河西其地東至麥田牽屯西至濕羅南至澆河北接大漠匹孤卒子夀闐立初夀闐之在孕其母胡掖氏夢一老父被髪左袵乗白馬謂曰爾夫雖西移終當東返至涼必生貴男言終胎動而寤後因寢而産於被中乃以秃髪為號其俗謂被覆之義夀闐卒孫樹機能立壯果雄健兼多謀畧晉泰始中殺秦州刺史胡烈於萬斛堆敗涼州刺史蘇愉於金山咸寧中又殺涼州刺史楊欣於丹嶺於是盡有涼州之地武帝為之旰食後為馬隆所敗部民没骨殺之以降從弟務丸代立丸死孫推斤立斤年一百一十死子思復鞬立部衆稍盛烏孤即思復鞬之長子也晉孝武太元十九年思復鞬死烏孤嗣立雄勇有大志與大將紛陀謀復欲規取涼州紛陀曰明公必欲得涼州宜先務農桑修隣好禮賢俊明政刑然後乃可烏孤從之三河王呂光遣使署為假節冠軍大将軍河西鮮卑大都統廣武縣侯烏孤謂諸将曰呂氏逺來假授當可受否衆咸曰我士馬衆多何為屬人烏孤将從之石眞若畱不對烏孤曰卿畏吕光耶何黙無言也石真若留曰吾根本未固理宜隨時呂光德刑修明境内無虞若致死於我大小不敵後雖悔之将何所及不如受以驕之俟釁而動蔑不濟矣烏孤乃受之太元二十年秋七月烏孤討乙弗折掘等諸部皆破降之冬十月遣别將石亦干築㢘川堡而都之烏孤登㢘川大山泣而不言石亦干進曰臣聞主憂臣辱主辱臣死大王所爲不樂者將非吕光乎光年已衰老師徒屢敗今我以士馬之盛保㨿大川乃可以一擊百光何足懼也烏孤曰光之衰老亦吾所知但我祖宗以德懐逺殊俗憚威盧陵契汗萬里委順及吾承業諸部背叛邇旣乖違逺何以附是以泣耳别將苻渾曰大王何不振旅誓衆以討其罪烏孤從之遂大興師諸部皆來降附廣武趙振少好竒略聞烏孤在亷川棄家從之烏孤喜曰吾得趙生大事濟矣拜爲左司馬三河王吕光進封烏孤爲廣武郡公十二月烏孤又討意云鮮卑大破之太元二十一年夏六月時魏皇始元年也吕光復遣使署烏孤爲征南大將軍益州牧左賢王烏孤謂使者曰吕王昔以專征之威遂有此州不能以德懷逺惠安黎庻諸子貪淫三甥暴虐郡縣土崩下無生賴吾安可違天下之心受不義之爵帝王之起豈有常哉無道則滅有德則昌吾將順天人之望爲天下主乃畱其鼓吹羽儀謝其使而遣之太初元年春正月烏孤自稱大都督大將軍大單于西平王大赦境内殊死已下建元太初耀兵廣武進攻涼金城克之光遣將軍竇茍來擊戰於街亭涼兵大敗秋七月涼散騎常侍太常西平郭黁叛據東苑太原公吕纂擊破之黁遣使乞援九月烏孤使弟驃騎將軍利鹿孤帥騎五千赴之冬十月河南鮮卑吐秣等十二部大人皆來歸附太初二年春二月涼後將軍略陽楊軌以司馬郭緯爲西平相率歩騎三萬北赴郭黁烏孤遣弟車騎將軍傉檀率騎一萬助軌軌至姑臧營於城北夏六月軌自恃其衆欲與吕光决戰光使太原公纂來迎軌與驃騎將軍利鹿孤共邀擊之爲纂所敗秋九月軌南奔㢘川收集夷夏衆至萬餘王乞基謂軌曰秃髪氏才高而兵盛且乞基之主也不如歸之軌乃遣使降於烏孤尋爲𦍑酋梁饑所敗西奔僊海襲乙弗鮮卑而㨿其地烏孤謂羣臣曰楊軌王乞基歸誠於我卿等不速救使爲𦍑人所覆孤甚愧之平西將軍渾屯曰梁饑無經逺大畧兼以軍無紀律多所殘殺可一戰擒也冬十月饑進攻西平西平人田𤣥明執太守郭倖而代之以拒饑遣子爲質於烏孤烏孤欲救之羣臣憚饑兵強多以爲疑左司馬趙振曰楊軌新敗吕氏方强洪池以北未可冀也嶺南五郡庻幾可取大王若無開拓之志振不敢言若欲經營四方此機不可失也使𦍑得西平華夷振動非我之利也烏孤喜曰吾亦欲乘時立功安能坐守窮谷乎乃謂羣臣曰梁饑若得西平保㨿山河不可復制饑雖驍猛軍令不整此易擒耳遂進擊饑大破之饑退屯龍支堡烏孤進攻拔之饑單騎奔澆河俘斬數萬以田𤣥明爲西平内史樂都太守田瑶湟河太守張稠澆河太寸王稚皆以郡降嶺南𦍑胡數萬餘落莫不歸附十一月楊軌王乞基帥户數萬來奔十二月烏孤更稱武威王署弟利鹿孤爲驃騎大將軍西平公傉檀爲車騎大將軍廣武公其宗族子弟爲公侯者二十餘人文武百官進位有差太初三年春正月烏孤徙治樂都遣西平公利鹿孤鎮安夷廣武公傉檀鎮西平叔父素渥鎮湟河若留鎮澆河從弟替引鎮嶺南洛囘鎭㢘川從叔吐若流鎮浩亹以楊軌爲賓客金石生時連珍四夷之豪雋隂訓郭倖西州之德望楊統楊貞衞殷麴承明一作丞郭黄郭奮史暠鹿嵩文武之秀傑梁昶韓疋張昶郭韶中州之才令金樹薛翹趙振王忠趙晁蘇霸秦雍之世門皆内居顯位外宰郡縣隨才授任咸得其宜烏孤從容謂羣臣曰隴右河西區區數郡地耳因其兵亂分裂遂至十餘國乾歸擅命河南叚業阻兵張掖虐氐假息偷㨿姑臧吾藉父兄遣烈思欲廓清西夏兼弱攻昧三者何先楊統進曰乞伏氏本吾之部落終當歸命叚氏書生才非經世權臣擅命制不由己千里伐人糧運懸絶且結好於我許以分灾共患乘其危弊攻之不義吕光衰耋嗣紹冲闇二子纂𢎞雖頗有才而内相猜忌若天威臨之必應鋒瓦解宜遣車騎鎮浩亹鎮北㨿㢘川乘虛迭出多方以誤之救右則擊其左救左則擊其右彼必疲於奔命人不得安其農業兼弱攻昧於是乎在不出三年可以坐定姑臧姑臧旣㧞則二㓂不待兵戈自然歸附矣烏孤曰善遂隂有吞併之志二月造刀一口狹小長二尺五寸青色匠人云當作之時夢見一老人朱衣被髪云吾是太乙神故來㸔爾作刀且云若有敵至刀必自鳴後歸突厥可汗處夏四月北涼王叚業爲吕纂所侵遣使求救烏孤遣驃騎大將軍利鹿孤及楊軌救之纂懼燒氐池張掖穀麥而去六月署利鹿孤爲涼州牧徙鎭西平召車騎大將軍傉檀入録府國事秋八月烏孤因酒醉走馬馬倒傷脅笑曰幾使呂光父子大喜俄而患甚顧謂羣臣曰方難未靖宜立長君言終而死在位三年僞諡武王廟號烈祖弟涼州牧西平公利鹿孤嗣立秃髪利鹿孤秃髪利鹿孤烏孤第二弟也初爲驃騎大將軍西平公尋遷涼州牧烏孤死國人共立之遂以晉隆安三年僭即僞位赦其境内殊死已下徙治西平使記室監麴梁明聘於叚業業曰貴主先王創業啟運功高先世宜爲國之太祖有子何以不立梁明曰有子羗奴先王之命也業曰昔成王弱齡周召作宰漢昭八歳金霍夾輔雖嗣子幼冲而二叔休明左提右挈不亦可乎梁明曰宋宣能以國讓春秋美之孫伯符委事仲謀終開有吳之業且兄終弟及此殷湯之制也亦聖人之格言萬世之通式何必𦙍已爲是紹兄爲非業曰美哉使乎之義也乃厚遣之利鹿孤聞呂光死遣建節將軍金樹平逺將軍蘇翹率騎五千屯於昌松漠口建和元年春正月大赦境内殊死已下改元建和下令曰孤以寡昧謬膺統緒思所以𢎞濟艱難經畧區宇者必藉股肱之力自今二千石令長清髙有惠化者其皆封亭侯闗内侯延耆老以訪政事夏四月涼王吕纂帥衆來伐利鹿孤使弟廣武公傉檀拒之纂士馬精銳進渡三堆三軍擾懼傉檀下馬㨿胡床而坐以安衆心徐乃貫甲與纂交戰敗之斬首二千餘級五月楊軌田𤣥明濳謀叛逆事洩殺之六月呂纂西擊叚業傉檀聞之率衆一萬乗虛襲姑臧纂弟緯守南北城以自固傉檀置酒朱明門上鳴鐘鼓以饗將士耀兵於青陽門虜八千餘戸而歸秋七月乞伏乾歸爲秦所敗率騎數百奔於允吾遣使乞降利鹿孤使廣武公傉檀迎之處之晋興待以上賓之禮乾歸遣子謙等質於西平鎮北將軍俱延利鹿孤之弟也言於利鹿孤曰乾歸本吾之屬國妄自尊立今勢窮歸命非其欵誠若逃奔東秦必引師西侵非我利也不如徙置乙弗之間防其越逸之路利鹿孤曰吾方𢎞信義以收天下彼窮來歸我而逆疑其心何以勸來者四海將謂我不可以誠信托也秋八月乞伏乾歸南奔枹罕遂降於秦利鹿孤謂俱延曰不用卿言乾歸果叛卿爲吾行也延率兵追之至河不及而還建和二年春正月龍見於長寧麒麟遊於綏羗利鹿孤欲自稱尊於是羣臣皆勸之安國將軍鍮勿崘進曰昔我先君肇自幽朔被髪左袵無冠帶之儀逐水草遷徙無城郭室廬故能抗衡中夏雄視沙漠今舉大號誠順天心然建都立邑難以避患儲蓄倉庫啟敵人心且首兵始號事必無成陳勝項籍前鑒不逺宜置晉人於諸城課農桑以供軍需帥國人以習戰射若東西有變弱則乗之强則避之此乆安之良䇿也虗名無實徒足爲世之質的將安用之利鹿孤曰安國之言是也乃更稱河西王署廣武公傉檀爲都督中外諸軍事涼州牧録尚書事三月傉檀率師伐呂隆大敗之徙二千餘戸而歸獲隆右僕射楊桓拜爲左司馬夏六月利鹿孤謂羣臣曰吾無經濟之才沗承統嗣自負乗在位三載於茲雖夙夜惟寅思𢎞道化而刑政未能允中風俗尚多凋敝戎車屢駕無闢境之功務進賢良而下猶淹滯豈所任非才將吾不明所致也二三君子其極言無諱吾將覽焉祠部郎中西曹從事史暠對曰王者行師全國爲上破國次之拯溺救焚東征西怨今陛下命將出征往無不捷然不以綏寧爲先唯以徙民爲務民安土重遷故多離叛此所以斬將克城而地不加廣也今取士㧞才必先弓馬文章學藝視爲無用之條非所以來逺人垂不朽也孔子曰不學禮無以立宜建學校開庠序選耆德碩儒以訓胄子利鹿孤善之於是以田𤣥冲趙誕爲博士祭酒使教胄子秋七月秦隴西公姚碩德自金城濟河直趨廣武利鹿孤攝廣武守軍以避之軍至姑臧利鹿孤遣使入貢於秦初涼將姜紀降於利鹿孤廣武公傉檀與論兵畧甚愛重之坐則連席出則同車每常談論以夜繼晝利鹿孤謂傉檀曰姜紀信有羙才然視候非常必不肯久留於此不如殺之紀若入秦必爲人患傉檀曰臣以布衣之交待紀紀必不相負也八月紀將數十騎奔秦時利鹿孤雖僭僞位尚稱臣於秦楊桓兄經佐命姚萇早死興聞桓有德望遣使徴之利鹿孤不敢留餞於城東爲之流涕以遣之冬十月河西王沮渠蒙遜遣子奚念來質利鹿孤不受徵其弟建忠將軍挐蒙遜不與虜其弟鄯善茍子遂遣使稱臣入朝奉貢許以挐爲質乃還其所掠十二月呂超攻焦朗朗遣其弟子嵩爲質以請迎利鹿孤遣廣武公傉檀赴之比至超巴退朗閉門拒之傉檀怒將攻之昌松侯俱延諫曰安土重遷人之常情朗孤城無食今年不降後年自服何必多殺士卒以攻之若其不捷彼必去從他國棄州境士民以資敵國非計也不如以善言諭之傉檀從之乃與朗連和耀兵姑臧壁於胡坑堡傉檀知超必來斫營蓄火以待其夜超果遣中壘將軍王集帥精兵來襲傉檀徐嚴不起集入壘中内外皆起火光燭天照耀如晝乃縱兵追擊斬集及甲首三百餘級呂隆大懼僞與傉檀通好請於苑内結盟傉檀信之遣俱延入盟伏兵出擊俱延失馬歩走陵江將軍郭祖力戰拒之俱延得免傉檀怒遂攻隆昌松太守孟禕於顯美隆遣廣武茍安國寧逺石可率五百騎來援憚傉檀之强遷延不進因而遁去建和三年春正月傉檀攻㧞顯美執孟禕而數之以其不早降禕曰禕荷吕氏厚恩分符守土若明公甫至而歸命恐獲罪於執事矣惟明公圖之傉檀大悅拜爲左司馬固辭乞歸乃義而釋之徙顯美麗靬二千餘戸而還二月吕隆爲沮渠䝉遜所逼遣使乞師利鹿孤引羣臣議之尚書左丞婆衍崙曰今姑臧饑荒殘弊榖石萬錢野無青草資食無取蒙遜千里行師糧運不繼使二寇相殘以乗其釁若䝉遜㧞姑臧亦不能守適可爲吾取之不宜救也傉檀曰崘知其一未知其二姑臧今雖虛敝地居形勝河西一都之㑹不可使䝉遜㨿之宜在速救利鹿孤曰車騎之言吾之心也遂遣傉檀率騎一萬救之至昌松而蒙遜已退乃徙涼澤叚冢五百餘戸而歸中散騎常侍張融言於利鹿孤曰焦朗兄弟叛㨿魏安濳通姚氏數爲反覆失今不取後必為朝廷憂乃遣傉檀討之朗靣縳出降傉檀送之於西平徙其民於樂都三月利鹿孤寢疾遺令曰昔我諸兄弟𫝊位非子者蓋以泰伯三讓周道以興故也我武王踐祚實厯垂諸樊之終能克昌家業者其在車騎乎吾寢疾惙頓是將不濟内外多虞國機務廣其令車騎嗣業經緯百揆以成先王之志言終而卒時晉元興元年也在位三年僞諡康王葬於西平之東南弟傉檀嗣立十六國春秋卷八十八
