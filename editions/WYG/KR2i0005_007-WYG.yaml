body:
  text: 十六國春秋卷七前趙錄七劉曜下光初九年春三月曜立劉氏為皇后遣將軍康平冦魏興及南陽石勒將石他自雁門出上郡襲安國將軍北羌王盆句除俘三千餘落獲牛馬羊百餘萬而去曜大怒投袂而起即日次於渭城遣中山王岳追之曜進次富平為岳聲援岳及石他戰於河濵敗之斬他及其甲士一千五百級赴河死者五千餘人悉收所虜振旅而歸楊難敵自漢中還襲仇池克之殺鎮南大將軍田崧夏五月石勒將石生屯洛陽冦略河南司州刺史李矩潁川太守郭黙軍數敗又乏食遣使降曜曜遣中山王岳攻石生於洛陽配以近郡甲士五千宿衛精卒一萬濟自孟津鎮東將軍呼延謨率荆司之衆自崤澠而東欲會矩黙共攻石生岳克孟津石梁二戍斬獲五千餘級進圍石生於金墉勒遣石虎率步騎四萬入自成臯闗岳陳兵以待之戰於洛西岳師敗績身中流矢退保石梁虎作塹栅列圍遏絶内外岳衆饑甚殺馬以食將士呼延謨為虎所殺曜自將出救虎帥騎三萬來拒曜前軍將軍劉黑撃虎將石聰於八特阪大破之曜次於金谷夜中無故大驚士卒潰散乃退如澠池夜又驚潰遂歸長安六月虎㧞石梁岳被執并執將佐八十餘人及氐羌三千餘人皆送襄國坑士卒九千人遂攻王騰於并州執騰殺之坑士卒七千餘人曜至自澠池素服郊次哭七日乃入城因憤恚成疾秋九月武功豕生犬上邽馬生牛及諸妖變不可勝紀曜命公卿各舉博識直言之士一人司空劉均舉㕘軍臺産曜親臨東堂遣中黄門䇿問之産極言其故曜覽而嘉之引見東堂訪以政事得失産流涕歔欷具陳灾變之禍政化之闕辭甚懇至曜改容禮之即拜博士祭酒諫議大夫領太史令其後所言皆驗曜彌敬重嵗中三遷歴位尚書光祿大夫太子少師位特進署永安王𦙍為大司馬拜大單于徙封南陽王以漢陽諸郡十三為國置單于臺於渭城置左右賢王以下皆以胡羯鮮卑氐羌豪傑為之光初十年春二月曜疾瘳曲赦長安殊死已下署汝南王咸為太尉錄尚書事光祿大夫綏為大司徒卜泰為大司空夏四月曜后劉氏卒偽諡獻烈皇后以后叔父昶為使持節侍中大司徒錄尚書事進封河南郡公封昶妻張氏為慈鄉君冬十月曜遣將軍黄秀帛成冦酇晉平北將軍魏該率衆奔襄陽光初十一年春正月曜追念皇后劉氏憶其臨終之言乃立劉皚女芳為皇后二月署驃騎將軍述為大司徒昶為太保召公卿已下子弟有勇幹者為親御郎被甲乘鎧馬動止自隨以充折衝之任尚書郝述都水使者支當等固諫曜大怒鴆而殺之是月曜夜夢三人金面丹唇東向逡廵不言而退曜拜而履其跡時晉咸和二年也旦召公卿已下議之朝臣咸賀以為吉祥惟太史令任義進曰三者歴運統之極也東為震位王者之始次也金為兌位物衰落也丹唇不言事之畢也逡廵揖讓退舍之道也為之拜者屈伏於人也履跡而行慎勿出疆也東井秦之分也五車趙之分也秦兵必大起亡主䘮師留敗趙地逺至三年近七百日其應不逺願陛下思而防之曜大懼於是躬親二郊飾繕神祠望秩山川靡不周遍大赦殊死已下復百姓稅租之半秋七月曜將黄秀等冦酇順陽太守帥衆奔襄陽光初十二年夏五月長安自春不雨至於五月曜遣武衛將軍朗率騎三萬襲楊難敵於仇池弗克掠三千餘户而歸凉州張駿聞曜為石勒所敗乃去曜官號遣張閬竇濤辛巖宋輯辛晏等率衆數萬會韓璞攻掠秦州諸郡曜遣南陽王𦙍率步騎四萬撃之夾洮相持七十餘日冠軍將軍呼延那雞率親御郎二千騎絶其運路𦙍濟師逼之璞軍大潰還奔凉州𦙍追及於令居斬級二萬張閬辛晏率衆來降曜皆拜將軍封列侯遂略河南地光初十三年秋七月石勒遣石虎率衆二萬出軹闗來攻河東應之者五十餘縣進次蒲阪曜將東救蒲阪懼張駿楊難敵乘虛來襲遣河間王述發氐羌之衆屯於秦州曜盡中外精銳水陸赴之自衛闗北濟虎懼引師而退追之八月及於髙候大戰破之斬將軍石瞻枕尸一百餘里收其資仗以萬億計虎奔朝歌遂濟自大陽攻石生於金墉决千金堤一作堨以灌之滎陽野王皆降襄國大震分遣諸將攻討汲郡河内諸郡冬十二月石勒自率衆來拒陳於洛西曜自恃連勝不撫士卒專與嬖臣飲博左右或諫曜怒以為妖言斬之時與石虎對軍大風㧞樹昏霧四塞聞虎進據石門續知勒自率大衆已濟河始議增滎陽戍杜黄馬闗俄而洛水候者與勒前鋒交戰擒羯送之曜問曰大胡自來邪其衆㡬何羯曰大胡自來軍勢甚盛不可當也曜色變使攝金墉之圍陳於洛西衆十餘萬南北十餘里勒望見之喜謂左右曰可以賀我矣乃帥步騎四萬入洛陽城虎引步騎三萬自城北而西攻曜中軍石堪石聰等各以精騎八千自城西而北擊曜前鋒曜性少而酗酒末年尤甚至是將戰飲酒數斗常乘赤馬無故蹋頓乃乘小馬比出復飲酒斗餘至西陽門撝陣就平石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜於冰上被創十餘通中者三為堪所執勒遂大破曜軍斬首五萬餘級下令曰所欲擒者一人耳今已獲之其勅將士抑鋒止銳縱其歸命之路曜見勒曰石王頗憶重門之盟否勒使徐光謂曜曰今日之事天使其然復云何邪乃幽曜於河南丞廨乙酉勒班師使征東將軍石邃將兵衛送襄國曜創甚載以馬輿使金創醫李永與同載療之北苑市三老孫機上禮求見曜勒許之機進酒於曜曰僕谷王闗右稱帝皇當持重保土疆輕用兵敗洛陽祚運窮天所亡開大分持一觴曜曰何以健邪當為翁滿飲勒聞之悽然改容曰亡國之人足令老叟數之已亥舎曜於襄國永豐小城給其妓妾嚴兵圍守遣岳震等乘馬從男女衣㡊以見曜曜曰吾謂卿等久為灰土石王仁厚乃全宥至今邪而我殺石他負盟之甚今日之禍自其分耳留宴終日而去勒使曜與太子熙書諭令速降曜但勅熙與諸大臣匡維社稷勿以吾易慮也勒見而惡之久之為勒所殺明年春正月太子熙一作毗聞曜被擒大懼與大司馬南陽王𦙍及太尉汝南王咸等議欲西保秦州尚書胡勲曰今雖䘮主國尚全完將士情一未有離叛且可并力拒險力不能拒走未晚也𦙍怒以為沮衆斬之遂率百官奔上邽汝隂王厚安定王䇿皆棄郡奔遁闗中擾亂將軍蔣英辛恕擁衆數十萬據長安遣使招勒勒遣石生率洛陽之衆赴之秋八月南陽王𦙍率衆數萬自上邽趨長安隴東武都安定新平北地扶風始平諸郡夷夏皆起兵應𦙍𦙍次仲橋石生嬰城固守勒使石虎率騎二萬來援九月戰於義渠為虎所敗死者五千餘人𦙍奔上邽虎乘勝追戰枕尸千里攻圍上邽城潰執太子熙南陽王𦙍并將相諸王等及諸卿校公侯以下三千餘人皆殺之徙其臺省文武闗東流民秦雍大族九千餘人於襄國又坑王公等及五郡屠各五千餘人於洛陽曜在位十三年而敗自劉淵以晉恵帝永興元年嵗在乙丑僭號西河至曜三世凡三十有五年以晉成帝咸和四年嵗在己丑滅十六國春秋卷七
