body:
  text: 十六國春秋卷二十一後趙錄十一佛圖澄佛國澄天竺人也本姓帛氏一作白少出家清真務學誦經數百萬言妙通𤣥術善解文義與諸學生論辨疑滯暗若符契無能屈者晉永嘉四年適洛陽自云四百有餘嵗志𢎞大法常服氣自養能積日不食善誦神一作經咒役使鬼神以麻油雜菌芝塗于掌中千里外事徹見掌中皆如面對亦能令潔齋者見之腹旁有孔以絮塞之每夜讀書則拔絮出光照于一室嘗齋時平旦臨溪從孔中引出腸胃洗濯還納腹中又能聽鈴音以言吉凶莫不竒騐澄欲於洛陽立寺值劉曜冦斥洛陽擾亂乃潛伏草野以觀時變石勒屯葛阪性多殘殺沙門遇害者甚衆澄憫之乃杖策詣勒大將郭黒畧畧素奉佛法澄至畧從受五戒奉弟子禮以其有道術進之于勒勒試之果騐甚重之於是中州胡晉悉來奉事時有痼疾世莫能治澄為醫療應時廖損隂施黙益不可勝紀勒欲試澄夜冠胄衣甲執刀而立遣人告澄曰夜來不知大將軍所在使人始至未及有言澄逆問曰平居無寇何故夜嚴勒益敬之勒後因忿欲害諸道士并欲苦澄澄潛避畧舍語弟子曰若將軍信至問吾所在報云不知所之既而使至覔澄不得使還報勒勒驚曰吾有惡意向之捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造之勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬耳襄國城塹水源在城西北五里團丸祠下其水暴竭勒問澄何以致水澄曰今當勑龍勒字世龍謂澄嘲已答曰正以龍不能致水故相問耳澄曰此是誠言非戲也水泉之源必有神龍居之今往𠡠語取水水必可得乃與弟子法首等數人至泉源上其源故處乆已乾燥坼如車轍從者心疑恐水難得澄坐繩牀燒安息香咒願數百言如此三日水泫然微流有一小龍長五六寸随水來出諸人競往視之澄曰龍有毒勿臨其上有頃水乃大至隍塹皆滿澄閉目端坐嘆曰後三日當有一小人驚動此下既而襄國人薛合有二子既小且驕輕弄鮮卑奴奴忿抽刀刺殺其弟執兄於室以刀擬心若人入室便欲加手謂合曰送我還國我活汝兒不然則共死于此内外驚愕莫不往觀勒自往視之謂薛合曰送奴以全卿子誠為善事此法一聞方為後患卿且寛情國有常憲命人取奴奴逆殺兒而死時劉聰死曜襲偽位遣弟中山王岳來攻勒遣石虎率衆拒之大戰洛西岳敗退保石梁塢虎堅柵守之澄時在襄國與弟子自官寺至中寺始入寺門忽歎曰劉岳可憫弟子法祚問其故澄曰昨日亥時岳已被執果如所言勒既平曜稱趙天王行皇帝事石葱將叛澄誡勒曰今年葱中有蟲食之必害人可令百姓無食葱也勒班告境内無得食俄而石葱叛走勒益加尊重有事必諮而後行號大和尚勒諸子多送佛寺中養之每至四月八日勒親詣寺灌佛為兒發願勒死石虎廢𢎞自立徙都鄴城尤傾心事澄乃下書曰和尚國之大寳榮爵不加髙禄不受榮禄匪顧何以旌徳從此以往宜衣以綾錦乗以雕輦朝㑹引見常侍御史悉助舉輿升陛太子諸公扶翼而前主者唱大和尚坐者皆起以彰其尊勑司空李農朝夕問候起居太子諸公五日一朝表朕敬焉一云尊敬莫與為比時支道林在京師聞之乃曰澄公其以季龍為海鷗鳥耶時澄止鄴城内寺中弟子徧于郡國嘗乗板輦於大水上坐遣弟子法常至襄國㑹法佐從襄國還相遇於梁基城下共宿對車夜談言及和尚比旦各去佐入見澄澄逆笑曰昨夜爾與法常交車共說汝師耶先民有言不曰敬乎幽而不改不曰慎乎獨而不易幽獨者敬慎之本爾不識乎佐愕然愧謝於是國人相語曰莫起惡心和尚知汝澄之所在無敢向其方面涕唾便利者後郭黒畧將兵攻長安北山墮羌伏中時澄在堂上坐弟子法常在側澄慘然改容曰郭公今有厄乃唱云衆僧咒願澄又自咒願須臾曰若東南出者活餘向則因復更咒願有頃曰脫矣畧還自說墮羌圍中東南走馬乏正遇帳下人推馬與之曰公乗此馬小人乗公馬濟與不濟任命也畧得其馬故得走免推檢時日果驗晉軍出淮西隴北凡城皆被侵逼三方告急人情危擾虎瞋曰吾奉佛供僧更致外寇佛無神矣明旦澄入見曰陛下前身係為大商經罽賔寺時設大㑹㑹有六十羅漢吾其一也有得道者曰此檀越報盡當受雞身乃王晉地今陛下為天子豈非奉法供僧而致耶疆場侵噬有國之常何為怨謗三寳夜興毒念乎虎乃悔謝澄嘗遣弟子向西域市香既行澄曰掌中見買香弟子在某處被刼垂死因燒香呪願遥救䕶之弟子後還云某月某日於某處為賊所刼垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而去虎嘗問澄佛法不殺朕為天下主非刑殺無以肅清海内違戒殺生忍違佛戒澄曰帝王事佛在恭儉慈仁顯暢法道不為暴虐不殺無辜至于兇愚無賴化之不悛者其可不罰乎但殺不可濫刑不可不恤身若暴虐恣意殺害非罪雖復傾財事佛無解禍殃願陛下省欲興慈廣及一切則佛教永興福祚方逺虎雖不能從而為益不少尚書張良張離等家富事佛各起大塔澄曰事佛在清浄無欲慈矜為心君雖崇飾寺塔而貪悋未巳游獵無度積聚不窮方受現世之罪何福報之可希離等後被殺戮黄河中舊不生黿忽有得者以獻澄見而歎曰桓温入河其不乆乎温字元子後果如言澄甞與虎共升中堂一作臺澄曰變變幽州當大灾仍取酒噀之乆而笑曰救已得矣虎遣騐之云爾日火從四門起西南有黒雲來驟雨滅之雨頗有酒氣建武十四年冬十一月澄還寺視佛象曰悵恨不得莊嚴獨語曰得三年乎自答不得又曰得二年一年百日一月乎自答不得遂無復言還房謂弟子法祚曰戊申嵗禍亂漸萌己酉石氏當滅及其未亂先從去矣即遣人辭虎曰物理必遷身命非保貧道燄幻之軀化期已及既荷恩殊重故逆以仰聞虎愴然曰不聞和尚有疾忽爾告終即自出宮詣寺而慰喻焉澄謂虎曰出生入死道之常也修短分定無由増損但道重行全徳貴不怠茍徳行無虧雖死如生違而獲延非其所願然意有未盡者國家心存佛理建寺度僧當蒙休祉而布政猛烈淫刑酷濫顯違聖典幽背法戒不自懲革終無福祐若降心易慮恵此下民則國祚衣長道俗慶賴畢命就盡没無遺恨先是建武十一年虎造紫陌浮橋於漳水上為澄先造生墓於紫陌至是虎悲慟嗚咽知其必死即為鑿壙塋墳十二月八日戊子卒於鄴宮寺百官皆來殯殮以澄生所服錫杖銀鉢内置棺中為其理石作棺𦵏之為之立祠後天大旱虎詣澄祠日稽顙曝露其日有二白龍降於祠下於是雨沛千里後有沙門自雍州來見澄入闗又郭門吏報曰見澄擕一履去虎命掘塚視之惟有一履與一石而無尸虎大惡之歎曰石者朕也𦵏我而去其能乆乎因而遇疾明年虎死石氏大亂單道開單道開姓孟燉煌人也少懐棲隐常衣麤褐或贈以繒服皆不著不畏寒暑冬袒夏温晝夜不卧絶糓餌柏實柏實難得復服松脂後服細石子一吞數枚數日一服或時多少噉薑椒如此七年阜陵太守遣馬迎開開辭能步行三百里路一日早至性好山居而山樹諸神或見異形試之初無懼色建武十二年從西平來日行七百里至南安度一童子為沙彌年十四禀受教法行亦及開時太史奏虎云有仙人星現當有髙士入境虎𠡠州郡有異人至即令啟聞其年冬十一月秦州刺史上表送開至鄴虎令佛圖澄與語不能屈初止鄴西沙門法綝祠中後徙臨漳昭徳寺於房内造重閣髙八九丈於上編營為禪室如十斛羅大常坐其中虎資給甚厚開皆以恵施於時人士皆來諮問開都不言乃為說偈云我矜一切苦出家為利世利世須學明學明能斷惡山逺糧粒難作斯斷食計非是求仙侶幸勿相𫝊說開日服鎮守藥數丸大如桐子藥有松蜜薑桂茯苓之氣復飲荼蘇一二升而已自云能療目疾石韜就之治療着藥小痛韜甚憚而終得其效就療者頗騐視其行動狀若有神佛圖澄曰此道士觀國興衰若去者當有大災至太寧元年開與弟子南渡許昌虎子弟相殺鄴中大饑至晉升平初遂往建業後至南海入羅浮山獨處茅茨蕭然物外年百餘嵗卒於山舍𠡠弟子以尸置石穴中弟子乃移入石室有康泓者昔在北間聞弟子叙述開在中山每有神仙去來遥心敬悒及從役南海親與相見側席鑽仰禀聞備至廼為之𫝊讚曰蕭哉若人飄然絶塵外軌小乗内暢法身𤣥象暉曜髙步是遵一作臻飱茹芝英流浪岩津晉興寧元年陳郡袁宏為南海太守與弟頴叔及沙門支法防共登羅浮山至石室口見開尸骸如生香火瓦器猶存宏曰法師業行殊羣正當如蟬蛻耳乃為之讚曰物儁招竒徳不孤立遼遼幽人望巖凱入飄飄靈仙兹焉遊集遺履在林千載一襲道進道進佛圖澄弟子也學通内外為虎所重一日澄遣進詣虎啓事因言及隐士事謂進曰有楊軻者朕之民也徵之十年不恭王命故往省視傲然而卧朕雖不徳君臨萬邦乗輿所向天沸地涌雖未能令木石屈膝何匹夫而長傲耶昔太公之齊先誅華士太公賢哲豈其謬乎進曰昔舜優蒲衣禹造伯成魏式干木漢美莊光管寧不應曹氏皇甫不屈晉代二主四君共嘉其節將欲激勵貪競以峻清風顧陛下逺遵舜禹之徳勿斆太公用刑君舉必書豈可令趙史遂無隐遁之𫝊乎虎恱其言即遣軻還其所止差一家供給之進還具以白澄澄曰汝言善也但軻命有所懸矣麻襦麻襦不知何許人亦莫得其氏族姓名虎時在魏縣市中乞丐但着麻襦布裳人遂稱之麻襦言語卓越狀若狂病乞得米糓不食輒散置大路云飼天馬趙興太守籍抜收送詣虎先是佛圖澄謂虎曰國東二百里某月某日當送一非常人勿殺之也如期果至虎與共語了無異言惟道陛下當終一柱殿下虎不解此語令送詣澄麻襦謂澄曰昔在光和中㑹奄至今日西戎受𤣥命絶厯終有期金離消於壤邊荒不能遵驅除靈期迹莫己巳之懿裔苗葉繁其来方積休期於何期永以歎之澄曰天迴運極否將不支九木水為難無可以術寧𤣥哲雖存世莫能基必頽九遊閻浮利擾擾多此患行登凌雲子㑹於虛遊間澄與麻襦講論終日人莫能解有竊聼者惟得此數言推計似如數百年事虎遣驛馬送還本縣既出城外辭能步行云我當有所過未得便發君至合口橋可留見待使人如言馳去未至合口而麻襦已先至橋上考其行步有若飛也後慕容儁發虎屍投於漳水倚橋柱不流時人以為一柱殿下即謂此也晉元帝嗣位江左亦以為天馬之應云徐忡徐忡東莞人仕勒為外兵郎有女令首聰敏好學言論清綺雅性虚淡不樂人間從容閒净以佛法自娛不願求聘父曰汝應外屬何得如此女曰端心集道絶想人外毁譽不動㢘正自足何必三從然後為禮父曰汝欲獨善一身何能兼濟父母女曰立身行道方欲度脫一切何况二親耶忡以問佛圖澄澄曰君歸家潔齋三日竟可來忡從之澄以臙脂磨麻油傅忡右掌令忡視之見一沙門在大衆中說法形狀似女具以白澄澄曰是君女先身出家益物往事如此若從其志方當榮拔六親令身富貴生死大苦向得其邉忡還許之女便剪髪從澄及浄檢尼受戒立建賢寺澄以勒所遺剪花納七條衣及象鼻澡灌與之得覽羣籍經目必誦思致淵深神照詳逺一時道衆莫不宗焉因其出家者二百餘人又造五寺立精舍匪憚勤苦皆得修立虎甚敬之擢忡為黄門侍郎清和太守十六國春秋卷二十一
