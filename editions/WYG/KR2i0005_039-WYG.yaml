body:
  text: 十六國春秋卷三十九前秦録八苻丕苻丕字永叔堅之長庶子少而聰慧好學博綜經史堅與之言將略嘉之命鄧𦍑教以兵法文武才幹亞于苻融堅以為征東將軍冀州牧封長樂公丕為將善收士卒情出鎮于鄴東夏安之堅敗歸長安丕為慕容垂所逼自鄴奔枋頭建元二十一年丕帥衆三萬自枋頭將歸鄴城晉龍驤將軍檀𤣥撃之戰於谷口𤣥兵敗績丕復入鄴城將收兵趙魏西赴長安會王猛子幽州刺史王永平州刺史苻冲帥幽并人衆擊慕容垂頻為垂將帯方太守平視等所敗乃遣昌黎太守宋敞焚燒和龍薊城宫室率衆三萬進屯壺關遣使招丕丕乃去鄴帥男女六萬餘口進如潞川驃騎將軍張蚝并州刺史王騰迎之入據晉陽王永留冲守壺關自帥騎一萬會丕于晉陽始知長安不守堅為姚萇所殺乃發䘮于晉陽三軍縞素僭即皇帝位立堅行廟大赦改建元二十一年為太安元年九月置百官以張蚝為侍中司空封上黨郡公王永為使持節侍中都督中外諸軍事車騎大將軍尚書令司徒録尚書事進封清河公王騰為散騎常侍中軍大將軍司𨽻校尉陽平郡公苻冲為左光禄大夫尚書左僕射封西平王俱石子為衛將軍濮陽公又以左長史楊輔為尚書右僕射濟陽公右長史王亮為䕶軍將軍彭城公强益耳梁暢為侍中徐義為吏部尚書並封縣公自餘封授各有差立妃楊氏為皇后子寜為皇太子壽為長樂王鏘為平原王懿為渤海王㫤為濟北王是月安西將軍吕光自西域還師至于宜禾堅凉州刺史梁熙謀閉境拒之高昌太守楊翰切諫弗聽乃以子𦙍為鷹揚將軍率衆五萬拒光于酒泉燉煌太守姚靜晉昌太守李純以郡降光𦙍與光戰於安彌為光所敗武威太守彭濟執熙迎光光殺之建威將軍西郡太守索泮奮威將軍都督洪池已南諸軍事酒泉太守宋皓等並為光所殺尚書令魏昌公纂自關中奔晉陽丕拜纂太尉進封東海王阜城侯定高城男紹高邑侯謨重合侯亮聞丕即位皆自河北遣使謝罪中山太守王兗本新平氐也固守博陵不附慕容垂十一月丕以兖為平東將軍平州刺史定為征東將軍冀州牧紹為鎮東將軍都督冀州諸軍事謨為征北將軍幽州牧亮為鎮北將軍都督幽并二州諸軍事並進爵郡公左將軍竇衝秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定皆據隴右遣使招丕請討姚萇丕大悦以定為驃騎大將軍雍州牧衝為征西大將軍梁州牧綂鎮西大將軍興車騎大將軍璧征南大將軍廣安西大將軍並開府儀同三司加散騎常侍進位州牧於是王永宣檄州郡曰大行皇帝背棄萬乘社稷無主征東大將軍長樂公丕先帝元子聖武自天受命荆南威鎭衡海分陜東都道被夷夏仁澤光于宇宙德聲侔于下武永與司空蚝等謹順天人之望以季秋吉辰奉公紹承大綂銜哀即事棲谷總戎枕戈待旦志雪大耻慕容垂為封豕于關東泓冲繼凶于京邑致乘輿播越宗社淪傾𦍑賊姚萇我之牧士乘釁淊天親為大逆有生之巨賊也永累葉受恩世荷將相不與驪山之戎滎澤之狄共戴皇天同履厚土諸牧伯公侯或宛沛宗臣或四七勲舊豈忍舍破國之醜豎縱弑君之逆賊乎主上龍飛九五實協天心靈祥庥瑞史不輟書投戈效義之士幾三十餘萬少康光武之功可旬朔而成今以衛將軍俱石子為前軍師司空張蚝為中軍都督武將猛士風烈雷震志殄元兇義無他顧永謹奉乘輿恭行天罸君臣始終之義在三忘軀之誠戮力同之以建晉鄭之美時慕容麟攻王兗于博陵城中糧盡矢竭功曹張猗踰城出聚衆應麟十二月麟㧞博陵執兖及固安侯鑒並殺之昌黎太守宋敞帥烏桓索頭之衆救兖不及而還丕以敞為平州刺史太安二年春正月丕復以王永為司徒錄尚書事徐義為尚書令加右光禄大夫二月益州牧王廣還自成都奔其兄秦州牧王綂及長安不守廣攻河州牧毛興于枹罕興遣建節將軍臨清伯衛平帥其宗人一千七百夜襲廣軍大破之三月綂復遣兵助廣攻興興嬰城固守夏四月毛興襲撃王廣敗之廣奔秦州為隴西鮮卑匹蘭所執送于姚萇興復欲攻王綂于上邽枹罕諸氐皆厭苦兵革疲不堪命乃殺興推衛平為使持節安西將軍河州刺史遣使請命于丕五月丕大赦以衛平為撫軍將軍河州刺史吕光為車騎大將軍凉州牧酒泉公使者皆没于姚萇不能逹六月征東將軍定鎭東將軍紹征北將軍謨鎭北將軍亮等復降于垂丕以都督中外諸事司徒尚書王永為左丞相太尉東海王纂為大司馬司空張蚝為太尉尚書令徐義為司空司𨽻校尉王騰為驃騎大將軍儀同三司尚書左僕射冲為車騎大將軍尚書令儀同三司衛將軍俱石子為衛大將軍尚書左僕射領官皆如故永又傳檄州郡曰昔夏有窮夷之難少康起焉王莽毒殺平帝世祖重光漢道百六之運何代無之天降䘮亂𦍑胡猾夏先帝晏駕賊庭京師鞠為戎穴神州蕭條生靈塗炭天未亡秦社稷有奉主上聖德恢𢎞道侔光武所在宅心天人歸属必當隆中興之功復配天之美姚萇殘虐慕容垂凶暴所過滅戸夷烟毁發邱墓毒徧存亡痛纒幽顯雖黄巾之害於九州赤眉之暴於四海方之二虜未為甚也今素秋將及行師令辰公侯牧守壘主鄉豪或戮力國家乃心王室各帥所綂以孟冬上旬會大駕于臨晉於是天水姜延馮翊宼明河東王昭新平張晏京兆杜敏扶風馬朗建忠將軍高平牧官都尉扶風王敏等咸承檄起兵各有衆數萬遣使應丕皆就拜將軍封列侯冠軍將軍鄧景羌之子也擁衆五千據彭池與竇衝為首尾以擊姚萇丕以景為京兆尹秋七月平凉太守金熙安定北部都尉鮮卑沒奕干帥鄯善王胡員叱䕶𦍑中郎將梁茍奴等與萇左將軍姚方成鎭遠將軍强京戰于孫邱谷大敗之枹罕諸氐以衛平衰老難與成功議欲廢之而憚其宗强連日不决氐有啖青者謂諸將曰大事宜定東討姚萇不可沉吟猶豫一旦事發反為人害諸君但請衛公會集衆將青為諸君决之衆咸以為然會七夕大宴青抽劒而前曰今天下大亂豺狼塞路吾曹今日休戚同之非賢明之主莫可濟難也衛公朽耄不足以成大事宜返初服以避賢路狄道長苻登雖王室疎属而志略雄明請共立之以赴大駕諸君若有不同者便下異議乃奮劍攘袂將斬異已者衆皆從之莫敢仰視於是推登為使持節都督隴右諸軍事撫軍大將軍雍河二州牧略陽公帥衆五萬東下隴攻㧞南安遣使請命于丕八月丕以登為征西大將軍開府儀同三司南安王持節及州牧都督皆因其所稱而授之又以徐義為右丞相留王騰守晉陽右僕射楊輔戍壺關率衆四萬進屯平陽九月王綂以秦州降于姚萇慕容永以丕至平陽恐不自固乃遣使求假道東歸丕弗許下書曰鮮卑慕容永乃我之騎將首亂京師禍傾社稷豕凶繼逆方請逃歸是而可忍孰不可忍其遣左丞相王永及東海王纂帥禁衛虎旅夾而攻之以衛大將軍俱石子為前鋒都督十月與慕容永戰于襄陵永及石子大敗皆死之初纂來自長安麾下壯士三千餘人丕猜忌之衆皆離散及永之敗懼為纂所殺帥騎數千南奔東垣謀襲洛陽晉桓石民遣揚威將軍馮該自陜邀撃敗之殺丕執太子寜長樂王壽及左僕射王孚吏部尚書苟操等送于京師朝廷赦而不誅歸之于宏纂與其弟尚書水平侯師奴率丕餘衆數萬走據杏城其餘王公百官皆没于慕容永丕在位二年登稱尊號偽諡哀平皇帝十六國春秋卷三十九
