body:
  text: 十六國春秋卷十九後趙錄九石閔石閔字永曽小字棘奴虎之養孫也父瞻字𢎞武本姓冉名良魏郡内黄人其先漢黎陽騎都督累世牙門勒破乞活陳午獲瞻時年十二長而勇悍便弓馬臨陣不顧勒竒之曰此兒壯徤可嘉命虎子之驍猛多力所向無前歴位將兵都尉左積射將軍封西華侯髙侯之戰敗死于陣閔時甚㓜聰慧異常臨事果銳虎撫之如孫及長身長八尺善謀策勇力過人拜建節將軍徙封修成侯歴位北中郎將游撃將軍虎之敗于昌黎閔軍獨全由此功名大顯及敗梁犢之後威聲彌振晉永和六年閔既殺鑒司徒申鍾司空郎闓等四十八人共上尊號閔固讓李農農以死固辭閔曰吾屬故晉人也今晉室猶存請與諸君分割州郡各稱牧守公侯奉表迎晉天子還都洛陽何如尚書胡睦進曰陛下聖徳應天宜登大位晉氏衰微逺竄江表豈能總馭英雄混一四海乎閔曰胡尚書之言可謂識機知命矣于是僭即皇帝位于南郊大赦境内殊死已下改元曰永興閔欲滅去二石之號下令曰孔子曰死姓而王七月者七十有三國繼趙冉䜟書炳然且德星鎮魏宜改國號曰魏復姓冉氏追尊祖隆元皇帝考曕烈祖髙皇帝尊母王氏為皇太后妻董氏為皇后子智為皇太子封子𦙍為太原王明為彭城王裕為武興王以司馬李農為太宰領太尉錄尚書事封齊王農諸子皆封為縣公文武進位三等封爵有差遣使者持節赦諸軍屯皆不從新興王祗聞鑒之死僭稱尊號于襄國改元永寜以汝隂王琨為相國六夷據州郡擁兵者皆應之以姚弋仲為右丞相親趙王待以殊禮夏四月祗遣汝隂王琨及張舉王朗將兵十萬伐魏閔遣使臨江告晉曰逆胡亂中原今已誅之若能共討者可遣軍來也朝廷不應閔誅李農及其三子并尚書令王謨侍中王衍及中常侍嚴震趙昇等五月晉盧江太守袁真攻魏合肥執南蠻校尉桑坦遷其百姓而還六月汝隂王琨率衆伐鄴進據邯戰祗鎮南將軍劉國自繁陽㑹之閔遣衛將軍王泰率兵迎撃琨衆敗績死者萬餘人琨歸邯鄲劉國還屯繁陽秋八月苻健率衆自枋頭入闗與張賀度段勤劉國靳豚等㑹于昌城將共攻鄴閔遣尚書左僕射劉羣為行臺都督使其將王泰崔通周成等帥步騎十二萬次于黄城閔躬統精卒八萬繼之戰于蒼亭賀度等大敗死者二萬八千人追斬靳豚于隂安鄉盡俘其衆振旅而歸閔戎卒三十餘萬旌旗鉦鼓緜亘百餘里雖石氏之盛無以過也閔至自蒼亭行飲至之禮清定九流凖才授任儒學後門多蒙顯擢於時翕然方之為魏晉之初遣使備禮徴隴西人辛謐謐字處道少有志尚博學善屬文工草𨽻書為時楷法性恬靜不妄交遊長安既陷没於劉聰聰拜為大中大夫不就勒虎之世竝不應辟命雖處䘮亂之日頽然髙邁視榮利蔑如也至是閔復徴之謐遺閔書曰昔許由辭堯以天下讓之全其清髙之節伯夷去國子推逃賞皆顯史牒𫝊之無窮此往而不返者也然賢人君子雖居廟堂之上無異於山林之中斯窮理盡性之妙豈有識之者耶是故不嬰於禍難者非為避之但冥心至趣而與吉㑹爾謐聞物極則變冬夏是也致髙則危累碁是也君王功已成矣而久處之非所以顧萬全逺危亡之禍也宜因兹大㨗歸身本朝必有許由伯夷之亷享喬松之夀永為世輔豈不美乎因不食而卒冬十一月閔率步騎十萬攻祗于襄國署子太原王𦙍為大單于驃騎大將軍以降胡一千配之為麾下光禄大夫韋謏諫曰今降胡數千接之如舊誠是招誘之恩然胡羯本為仇敵今之欵附茍存性命爾或有刺客變起須臾敗而悔之何所及也古人有言一夫不可狃而况千乎願誅屏降胡去單于之號深思聖王苞桑之誡也閔志在綏撫銳于澄定聞言大怒遂誅之并殺其子伯陽永興二年春正月閔攻圍襄國百餘日為土山地道築室返耕祗急廹大懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容儁許送𫝊國璽中軍將軍張春請救於姚弋仲三月汝隂王琨自冀州救祗弋仲復遣子襄率騎三萬八千至自聶一作隔頭儁遣將軍恱綰率騎三萬至自龍城三方合勁卒十餘萬閔遣車騎將軍胡睦拒襄于長蘆將軍孫威拒琨于黄丘兵皆敗績士卒畧盡睦威單騎而還琨等軍且至閔將出撃衛將軍王泰諌曰今襄國未平外救雲集若我出戰腹背受敵此危道也不若固壘以挫其勢一作銳徐伺其釁而撃之且陛下親臨行陣如失萬全則大事去矣請慎無出臣請率諸將為陛下滅之閔將止道士法饒進曰陛下圍襄國經年無尺寸之功今賊自至又避不撃將何以使將士乎且太白入昴當殺胡王百戰百剋不可失也閔攘袂大言曰吾戰决矣敢沮衆者斬乃悉衆出與姚襄戰琨及恱綰適以兵至去閔軍數里疏布騎卒曳柴揚塵閔軍望之恟懼襄琨綰等三面攻之祗衝其後閔軍大敗潛還襄國行宮與十餘騎奔鄴降胡栗特康等執大單于𦙍及左僕射劉琦等送于祗盡殺之司空璞尚書令徐機車騎將軍胡睦侍中李綝中書監盧諶少府王鬰尚書劉欽劉休等及諸將士死者凡十餘萬人于是人物殱盡盗賊蜂起司冀大饑人自相食時閔已潛還人無知者内外恟恟訛言閔已敗没射聲校尉張艾請閔親郊以安衆心閔從之訛言乃息遂誅法饒父子支解之初閔之為丞相也盡散倉庫以樹私恩與羌胡相攻無月不戰所徙青雍幽荆四州之民及氐羌胡蠻數百萬口以趙法禁不行各還本土道路交錯互相殺掠饑疫死亡其能達者十有二三諸夏紛亂無復耕者閔悔之追贈韋謏大司徒時段末波之子立義將軍段勤鳩集胡羯得萬餘人保在人山自稱趙王閔遣將撃敗之徙于繹幕祗遣其將劉顯帥衆七萬攻鄴次于明光宮去鄴二十三里閔懼召衛將軍王泰欲與之謀泰恚前謀之不從辭以瘡甚閔親臨問之固稱疾篤閔怒還宮謂左右曰巴奴乃公豈假汝為命耶要將先滅羣胡却斬王泰乃盡衆而戰大敗顯軍追奔及于陽平斬首三萬餘級顯懼宻遣使請降求殺祗以自效閔振旅而歸㑹有告王泰招集秦人將奔闗中閔怒誅泰夷其三族夏四月劉顯殺祗及丞相樂安王炳太保張舉太宰趙鹿等十餘人𫝊首于鄴送質請命閔拜顯大將軍大單于單州牧祗炳皆虎之庶子也驃騎將軍清河王寧奔栢人閔命焚祗首于通衢五月祗兖州刺史劉啟以鄄城歸晉秋七月劉顯復率衆攻鄴閔撃敗之八月閔兖州刺史魏統豫州牧張遇荆州刺史樂𢎞皆以城歸晉平南將軍髙棠征虜將軍呂䕶執洛州刺史鄭系以三河歸晉慕容彪攻陷中山殺閔寧北將軍白同幽州刺史劉凖降燕趙郡太守李邽亦以郡降燕時有雲黄赤色起東北長百餘丈一白鳥從雲間西南去占者惡之趙故將周成屯廪丘髙昌屯野王樂立屯許昌李歴屯衛國皆相次歸晉是年魏昭成帝什翼犍謂羣下曰石胡衰滅冉閔肆禍中州紛擾莫有􅋌救吾將親率六軍廓定四海乃𠡠諸部各帥所統以俟大期諸部大人諌曰今中州大亂誠宜進取如聞豪傑竝起不可一舉而定若或留連經歴嵗稔恐無永逸之利或有虧損之憂乃止永興三年春正月劉顯僭帝號于襄國率衆伐常山常山太守蘇彦告急于閔閔留大將軍蔣幹等使輔太子智守鄴親率騎八千救之顯所署大司馬清河王寜以棗强降閔收其餘衆撃顯敗之于常山追奔至襄國顯大將軍曹伏駒開門為内應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其民于鄴汝隂王琨以其妻妾奔晉斬于建康市石氏遂絶顯領軍將軍紀路率衆千餘斬闗奔枋頭三月閔既克襄國因遊食常山中山諸郡立義將軍段勤聚胡羯萬餘人保據繹幕自稱趙帝夏四月甲子慕容儁已剋幽薊畧地至冀州閔率騎撃之與慕容恪遇于魏昌城閔大將軍董閏車騎將軍張温諫曰鮮卑乗勝氣勁其鋒不可當且彼衆我寡宜請避之以溢其氣俟其驕惰然後濟師以撃之便可擒一作㨗也閔怒曰吾成師以出將平幽州斬慕容儁今遇恪而避之人謂我何司徒劉茂特進郎闓相謂曰吾君此行必不返矣吾等何為坐待戮辱皆自殺閔素有勇名所將兵又精銳燕衆憚之進與恪遇十戰皆敗之恪乃簡善射鮮卑勇而無剛者五千以鐵鎻連其馬為方陣而前閔所乗赤馬曰朱龍日行千里閔左仗雙刅矛右執鉤㦸順風撃之斬鮮卑三百餘級望見大幢知其為中軍直衝之俄而燕騎大至從旁夾撃大破之圍之數周閔衆寡不敵躍馬潰圍東奔二十餘里朱龍忽斃為恪所擒殺僕射劉羣并執董閏張温等送之于薊儁立閔而問之曰汝奴僕下才何自妄稱天子閔曰天下大亂爾曹鮮卑桀驁不馴尚欲篡逆我一時英雄何為不可作帝王耶儁怒鞭之三百復送之龍城閔子操奔魯口五月慕容評率衆攻鄴劉寧及弟崇帥胡騎三千奔晉陽蘇彦棄常山奔新興鄴中大饑人相食虎時宮人被食畧盡冉智尚幼蔣幹遣侍中繆嵩詹事劉猗奉表歸晉且乞師于西中郎將謝尚時晉建威將軍濮陽太守戴施自倉垣次于棘津止猗不聴進責其𫝊國璽猗使嵩還鄴復命幹謂尚已敗慮不能救己猶豫不許六月施遣參軍何融率壯士百餘人入鄴登三臺助戍譎之曰今凶寇在外道路梗澁璽亦未敢送也須得璽當遣單使馳白天子耳卿且出以付我天子聞璽已在吾所知卿等至誠必遣重軍相救并厚相餉幹以為然出璽付之施因宣言使何融迎糧隂令懐璽馳還枋頭尚遣振武將軍胡彬率騎三百迎璽致諸京師秋八月長水校尉馬願龍騰將軍田香開門降評施融蔣幹懸縋而下奔于倉垣評送閔后董氏太子智太尉申鍾司空條攸中書監聶熊司𨽻校尉籍羆中書令李垣及諸王公卿士于薊尚書令王簡左僕射張乾右僕射郎肅皆自殺辛􅆗閔至龍城告廆皝廟斬于遏陘山山左右七里草木悉枯㑹大旱蝗出大起自五月不雨至于十二月儁謂閔為災遣使祀之諡曰武悼天王其日大雪是嵗永和八年也十六國春秋卷十九
