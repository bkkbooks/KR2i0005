body:
  text: 十六國春秋卷六十三南燕錄一慕容德慕容德字𤣥明皝之少子也皝每對諸宫人言婦人懷孕夢日入懷必生貴子德母公孫夫人方姙夢日入其臍中獨喜而不敢言咸康二年晝寢而生德左右以告方寤而起皝曰此兒易生似鄭莊公長必有大德遂以德為名年十二而皝薨哀毁過禮年十八身長八尺二寸姿貌雄異額上有日月兩角足下有偃月重文博觀羣史性清慎多才藝以兄儁元璽初封梁公歴幽州刺史左衛將軍及暐建熙初進號安北將軍改封范陽王入為魏尹加散騎常侍時秦苻堅跨據長安其將苻雙據陜以叛苻柳起兵枹罕將應之德勸暐乘釁討堅見暐傳言辭慷慨識者知其有逺畧暐竟不能用太史令黄泓善相謂德曰殿下相法當先為人臣然後為人君但恐下官入地不得見殿下昇天耳德曰若如公言不敢忘報德兄垂甚器異之因共論軍國大謀言必切至垂謂之曰汝器識長進非復呉下阿䝉也枋頭之役以征南將軍與垂擊敗晉師垂奔苻堅德坐與垂善免官秦滅燕徙於長安及秦伐凉德請從征自效後堅以德為張掖太守數嵗免歸堅以兵臨江淮垂請德為副乃拜奮威將軍堅之敗也與夫人張氏相失暐將護致之德正色謂暐曰昔楚莊滅陳納巫臣之諫而棄夏姬此不祥之人惑亂人主戎事不邇女器秦之喪師當由於此宜掩目而過奈何將衛之也暐不從德馳馬而去之還次滎陽言於暐曰昔句踐棲於㑹稽終獲呉國聖人相時而動百舉百全天將悔禍故使秦師喪敗宜乘其弊以復社稷暐亦不納德乃從垂如鄴垂稱尊號以德為車騎大將軍司𨽻校尉復封范陽王居中鎮衛參斷政事久之遷司徒垂欲攻慕容永於長子惟德議與垂同後克之垂臨終敕太子寳曰鄴是舊都宜委范陽王寳既嗣位拜為使持節都督冀兗青徐荆豫六州諸軍事特進車騎大將軍冀州牧領南蠻校尉鎮鄴都罷留臺以都督專總南夏永康初魏將拓䟦章後燕作拓䟦儀攻鄴德遣南安王青等夜擊破之魏兵退次新城青等請追擊之别駕韓􅒲進曰古人先決勝廟堂然後攻戰今魏不可擊者四燕不宜動者三魏懸軍逺入利在野戰一不可擊也深入近畿頓兵死地二不可擊也前鋒既敗後陣方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不宜動也動而不勝衆心難固二不宜動也城郭未修敵來無備三不宜動也此皆兵家所忌不如深溝高壘以逸待勞彼千里餽糧野無所掠久則三軍靡資攻則衆旅多斃師老釁生詳而圖之可以捷矣德曰韓别駕之言良平之䇿也乃召青等還師魏又遣遼西公賀賴盧率騎二萬與章圍鄴德遣參軍劉藻請救於秦并參母兄之問而秦師不至鄴中恟懼於是二字一作徳字親饗戰士厚加撫接人感其恩皆樂為致死㑹章盧内相乖貳各引軍潛遁章司馬丁建率衆來降言章師老可擊德遣桂林王鎮南安王青帥騎七千追破章軍人心始固及魏師入中山寳出奔於薊開封公詳又僭稱偽號㑹劉藻自秦而至秦太史令高魯遣其甥王景暉隨藻送玉璽一紐先是姚興皇初中嵗在丁酉於長安渭濵得赤玉璽上有文字曰天命燕至是而魯送之并圖䜟秘文曰有德者昌無德者亡德受天命柔而復剛又有謠曰大風蓬勃揚塵埃八井三刀卒起來四海鼎沸中山頽惟有德人據三臺於是羣臣議以詳僭號中山魏師盛於冀州未審寳之存亡因勸德即尊號德不從㑹慕容達自龍城奔鄴稱寳猶存羣議乃止寳尋進德為丞相領冀州牧承制南夏公侯牧守皆聽封拜兄子趙王麟自義臺奔鄴因說德曰中山既没魏必乘勝攻鄴鄴中雖糧儲素積然城大難固且人情恇懼不可以戰宜及魏軍未至擁衆南渡就魯陽王和據滑臺聚兵積榖阻河自守伺釁而動計之上也魏雖㧞中山勢不能久留不過抄掠而返人不樂徙理自生變然後振威以援之魏則内外受敵使戀舊之士有所依憑廣開恩信招集遺黎一舉取之河北庶可復也㑹兄子魯陽王和亦遣使勸德南徙德乃許之元年春正月魏太祖既克中山遣衛王儀一作元儀率騎三萬攻鄴㧞之遂入鄴城收其倉庫分賜將士德自鄴率衆四萬三千戸車二萬七千乘將徙滑臺遇風船没水經註作既無舟楫魏兵垂至衆心惶懼議欲退保黎陽德不從其夕流澌冰合遂於夜中南渡黎陽訖旦魏兵追至而冰亦潛消若有神焉鄴令韓範一作軌言於德曰光武渡滹沱河澌流一作冰自合大王濟河天橋自成靈命所扶徴兆已見德大悅遂改黎陽津為天橋津及至滑臺景星見於尾箕漳水得白玉其狀若璽趙王麟等九十八人上言今中土傾陷龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以係宗廟謹上皇帝尊號德許之令曰假順來議且以燕元故事統符行帝制而已於是德用兄垂故事改永康三年稱元年大赦境内殊死已下署置百官拜趙王麟為司空領尚書令南海王法為中軍將軍慕輿㧞為尚書左僕射丁通為尚書右僕射自餘文武封授各有差初河間有麟見麟以為已瑞及此潛謀為亂事覺賜死二月魏廣川太守賀賴盧殺冀州刺史王輔驅勒守兵抄掠平陽頓丘諸郡遂南渡河奔附於德德以賴盧為并州刺史封廣甯王夏四月先是寳自龍城南奔至黎陽遣中黄門令趙思告北地王鍾德之從弟也曰上以二月得丞相表即時南征至乙連㑹長上作亂今失據來此王亟呼丞相奉迎鍾本首議勸德稱尊聞而惡之執思付獄馳使白狀德謂羣臣曰卿等前以社稷大計勸吾攝政吾亦以嗣帝播越一作奔亡民神曠主故勉從羣議以繫衆心今天方悔禍嗣帝得還吾將具駕奉迎謝罪行闕然後角巾私第卿等以為何如黄門侍郎張華進曰夫争奪之世非雄才不振縱横之時豈懦夫能濟嗣帝闇弱不能紹隆先統陛下若蹈匹婦之節捨天授之業威權一去身首不保況社稷其得血食乎何退讓之有德曰吾以古人逆取順守其道未足所以中路徘徊悵然未決耳慕輿護曰嗣帝不達時宜委棄國都自取敗亡不堪多難亦已明矣昔蒯瞶出奔衛輒不納春秋是之以子拒父猶可況以父拒子乎今趙思之言未明虛實臣請為殿下馳往詗之德流涕遣護護率壯士數百隨思而北聲言迎衛實謀弑之初寳遣思詣鍾於後見採樵者言德已攝位稱制懼而北奔護至無所見執思以歸德以思閑習典故欲留用之思曰昔闗羽見重曹公猶不忘先主之恩思雖刑餘賤隸荷國榮寵一作寵靈犬馬有心而況人乎乞還就上以明貞節貞一作微德固留之思怒曰周室衰微晉鄭夾輔漢有七國之難實賴梁王殿下親則叔父位為上台不能率先羣后以匡王室而幸根本之傾為趙王倫之事思雖不能如申包胥之存楚猶慕龔君賔不生於莽世也德慚而斬之秋八月丙子晉南陽太守閭丘羡寧朔將軍鄧啟方率衆二萬來伐師次管城德遣中軍將軍南海王法撫軍將軍魯陽王和等拒之啟方等敗績單馬走免德怒法不窮追斬其撫軍司馬靳瓌冬十月太極端門並就以張剛為材官將軍上方令時銅官令王瓚得古銅鍾四枚於山穴獻之列於太極殿前賜瓚爵闗内侯一作闗外侯二年春三月秦苻登既為姚興所滅其弟廣帥部落三千來降德拜廣為冠軍將軍處之乞活堡會熒惑守東井或言秦當復興廣乃自稱秦王招集亡命攻破北地王鍾時德始都滑臺介於晉魏之間土無十城衆不過萬鍾既敗走反側之徒多去德而附廣德乃留魯陽王和守滑臺自率衆討廣斬之先是寳之至黎陽也和長史李辯勸和納寳和不從辯懼謀洩乃潛引晉軍至管城冀德親帥師於後作亂會德不出愈不自安及德討廣辯又勸和反和不從辯怒殺和以滑臺降魏求援於行臺尚書和䟦䟦率輕騎自鄴赴之既至辯復悔之閉門拒守䟦使尚書郎鄧暉說之辯乃開門内䟦䟦悉收德宫人府庫時將士家屬悉在城内德聞之遣將士三千騎攻䟦䟦率衆迎擊騎兵敗績䟦又擊破桂陽王鎮俘斬虜獲千餘人陳潁之民多附於魏德欲攻滑臺韓範言於德曰魏師已入城據國成資向也魏為客吾為主人今也吾為客魏為主人客主之勢翻然復異人情危懼不可復戰不如先據一方為闗中之基然後畜力而圖計之上也德乃止德右衛將軍雲斬李辯率將士家屬二萬餘口自滑臺出奔於德三軍慶悅德謀於衆曰苻廣雖平而撫軍失據進有强敵退無所依計將安出給事黄門侍郎中書令張華進曰彭城楚之舊都阻山帶河一作川地嶮人殷可攻而取之以為基本北地王鍾慕輿護封逞韓􅒲等固勸攻滑臺尚書潘聰進曰滑臺四通八達之地非帝王之居且北通大魏西接强秦此二國者未可高枕而待之彭城土曠人稀平夷無嶮且晉之舊鎮必拒王師未易可取又宻邇江淮水路通浚秋夏霖潦千里為湖乘舟而戰者我之所短呉之所長今雖克之非久安之計也青齊沃壤號曰東秦土方二千里精兵十餘萬右有山河之固左有負海之饒可謂用武之國三齊豪傑蓄志以俟孰不思得明主以立尺寸之功廣固城者曹嶷之所營山形嶮峻足為帝王之都辟閭渾昔為燕臣後負國恩勒兵潛據今宜遣辯士馳說於前大兵繼踵於後彼必翻然向化如其守迷不服大軍臨之自然瓦解既據其地然後閉闗養銳伺釁而動此乃陛下之闗中河内也德猶豫未決齊州沙門僧朗素善占候德因使牙門蘇撫訪其所適朗報曰山野絶俗之士不應預聞朝議但有待之累非有托無以立陛下今既聞之檀越敬覽三䇿潘尚書之議可謂興邦之䇿矣且今嵗之初彗星起於奎婁遂掃虛危彗者除舊更新之象奎婁為魯之分野虛危為齊之分野宜先定兗州巡撫琅邪待秋風戒節然後北轉臨齊此天道也撫又宻問以年世朗以周易筮之曰燕衰庚戌年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈闗人哉撫不敢言以吉還報德大悅三月德引師而南五月入薛城兗州北鄙諸郡縣悉降置守宰以撫之存問髙年軍無私掠百姓安之牛酒屬路秋八月德遣使諭幽州刺史齊郡太守辟閭渾欲下之渾不從遣北地王鍾率歩騎二萬擊之德進據琅邪徐兗之民歸附者十餘萬戸自琅邪引兵而北迎者四萬餘人以南海王法為兗州刺史鎮梁父進克莒城守將任安委城而退以潘聰為徐州刺史鎮莒城北地王鍾傳檄青州諸郡曰隆替有時義列昔經困艱啟聖事彰中籙是以宣王龍飛於危周光武鳳起於絶漢斯葢厯數大期帝王之興廢也自我永康多難長鯨逸網華夏四分黎元五裂逆賊辟渾閭父蔚昔同段龕阻亂淄川太宰東征勦絶凶命渾於覆巢之下得䝉全卵之施曾微犬馬識養之心復襲凶父樂禍之志盜據東秦逺附呉越割剥黎元委輸南海皇上應期大命再集矜彼營丘暫阻王畧故以七州之衆二十餘萬巡省岱宗問罪齊魯昔韓信以裨將伐齊有征無戰耿弇以偏師討步克不移朔況以萬乘之師掃一隅之冦傾山碎卵方之非異孤以不才忝荷先驅都督元戎一十二萬皆烏桓突騎三河猛士奮劒與夕火爭光揮戈與秋月競色以此攻城何城不克以此衆戰何敵不平昔竇融以河西歸漢榮被於後裔彭寵盜逆漁陽身死於奴隸近則曹嶷䟦扈見禽於後趙段龕干紀取滅於前朝此非古今之吉凶已然之成敗乎渾若先迷後悟榮寵有加如其敢抗王師敗滅必無遺燼稷下之雄岱北之士有能斬送渾首者賞同佐命脱履機不發必玉石俱摧先是蘭汗之亂吏部尚書封孚南奔辟閭渾渾表為渤海太守德至莒城孚乃出降德大喜曰朕平青州不以為慶喜得卿耳遂委以機宻渾聞德將至徙八千餘家入守廣固遣司馬崔誕率千餘人戍薄荀平原太守張豁戍柳泉誕豁承檄皆遣子來降渾懼攜妻子奔魏德遣射聲校尉劉剛追斬於莒城渾少子道秀自詣請與父俱死德曰父雖不忠而子能孝特赦之殺其參軍張瑛德遂入廣固是年德為僧朗建神通寺於齊州仍遺書於朗曰敬問太山朗和尚遭家多難災禍屢臻昔在建興王室西越賴武王中興神武御世大啟東夏拯㧞區域遐邇蒙蘇天下幸甚天未忘災武王即宴永康之始東傾西蕩京華播越每思靈闕屏營飲淚朕以寡德生在亂兵遺民未幾繼承大統幸和尚大恩神祗葢護今使使者送絹百疋并假東齊王奉髙山荏二縣封給書不盡意稱朕心焉朗荅書曰陛下龍飛統御百國天地融溢皇澤載賴善逢高鑒惠濟黔首蕩平之期何憂不一陛下信向三寳恩㫖殊隆貧道味靜深山豈臨此位且領民戸興造靈刹所崇像福㝠報有歸建平元年春正月癸酉德定都於廣固遂以晉隆安四年僭即皇帝位於南郊大赦境内殊死已下改元為建平元年又詔曰漢宣憫吏民犯諱故改名朕今增一備字以為二名庶開臣子避諱之路於是更名備德叙賞其下有差設行廟於宫南遣使奉䇿告成追諡燕王暐曰幽皇帝以北地王鍾為司徒慕輿㧞為司空封孚為左僕射慕輿護為右僕射遣度支尚書封愷中書侍郎封逞觀省風俗所在大饗將士立妻段氏為皇后建立學宫簡公卿已下子弟及二品士門二百餘人為太學生每月朔親臨試之作申池以為遊戱是年造刀四口銘其背曰建平隸書建平二年冬十月徐州刺史潘聰青州刺史鞠仲來朝讌於延賢殿酒酣笑謂羣臣曰朕雖薄德恭已南面而朝諸侯在上不驕夕惕於位可方自古何等主也鞠仲曰陛下中興之聖主少康光武之儔也備德顧命左右賜仲帛千疋仲以賜多為讓備德曰卿知調朕朕不知調卿邪卿飾對非實故朕亦以虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戱言忠臣無妄對今日之論上下相欺可謂君臣俱失備德大悅賜範絹五十疋自是昌言競進直士盈朝矣備德遣從事中郎杜𢎞如長安問母兄消息詳具𢎞傳建平三年春三月備德如齊城登營丘望見晏嬰冢顧謂左右曰禮大夫不逼城𦵏平仲古之賢人達禮者也而生居近市死𦵏近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢則賢矣豈不知高其梁豐其禮葢政在家門故儉以矯世存居湫隘卒豈擇地而𦵏乎所以不逺門者猶冀悟平生意也備德悅之遂以謨從至漢城夏四月以太牢祀漢城陽景王廟讌庶老於申池北登社首山東望鼎足因目牛山而歎曰古無不死悽然有終焉之志遂問謨以齊之山川丘陵賢哲舊事謨歴對詳辯畫地成圖備德深嘉之拜尚書郎立冶於商山置鹽官於烏常澤以廣軍國之資建平四年春二月夜地震在棲之雞皆驚擾飛散三月備德故吏趙融自長安來始具母兄凶問備德號慟吐血因而寢疾動經旬餘幾於不振會前尚書右丞孫黙一作曹黙自冀州來奔以白酒解之乃瘳拜黙為御史中丞封永熙侯是時司隸校尉慕容達因之謀反遣牙門皇璆率衆攻端門殿中帥一作師侯赤眉開門應之中黄門孫進扶備德踰城隠於進舎段宏等聞宫中有變勒兵屯四門備德入宫誅赤眉等達懼而奔魏夏四月南海王法及魏師戰於濟北之標榆谷魏師敗績五月初備德優遷徙之民使之長復不役民緣此迭相䕃冒或百室合戸或千丁共籍以避課役尚書韓􅒲上疏曰二冦逋誅國恥未雪闗西為豺狼之藪揚越為鴟鴞之林二京社稷鞠為丘墟四祖園陵蓁而不守豈非義夫憤憾之日烈士忘身之秋而皇室多難威畧未振是使長蛇弗剪封豕假息人懷憤慨常謂一日之安不可以永久終朝之逸無卒嵗之憂陛下中興大業務在遵養矜遷氓之失土假長復而不役愍黎庶之息肩貴因循而不擾斯可以保寧於營丘難以經措於秦越今羣凶僭逆實繁有徒據我三方伺國瑕釁深宜審量虛實大校成敗養兵厲甲廣農積糧進為雪恥討冦之資退為山河萬全之固而百姓因秦晉之弊迭相䕃冒或百室合戸或千丁共籍依托城社不懼燻燒公避課役擅為姦宄損風毁憲法所不容但檢令未宣弗可加戮今宜隠實黎氓正其編貫庶上增皇朝理物之明下益軍國兵資之用若䝉採納冀禆山海雖遇商鞅之刑悅綰之害所不辭也備德從之遣車騎將軍桂陽王鎮率騎三千緣邊嚴防備百姓逃竄以􅒲為使持節散騎常侍行臺尚書廵郡縣隠實得䕃戸五萬八千􅒲公廉正直所在野次人不擾害備德大集諸生親臨䇿試既而饗讌登高逺矚顧謂尚書魯邃曰齊魯固多君子當昔全盛之時梓慎巴生淳于鄒田之徒䕃修檐臨清沼馳朱輪佩長劒恣非馬之雄辭奮談天之逸辯指麾則紅紫成章俛仰則丘陵生韻至於今日荒草頽墳氣消烟滅永言千載能不依然邃荅曰昔武王封比干之墓漢祖祭信陵之墳皆留心賢哲每懷往事陛下慈深二主澤被九泉若使彼而有知寧不銜荷矣秋九月高雅之等表請伐桓𤣥先是𤣥將行簒逆誅不附己者冀州刺史劉軌襄城太守司馬休之征虜將軍劉敬宣寧朔將軍一作廣陵相高雅之江都長張誕並内不自安皆奔於備德至是雅之等言於備德曰縱未能廓清呉會亦可收江北之地中書侍郎韓􅒲載記作韓範亦上疏曰夫帝王之道必崇經畧有其時無其人則𢎞濟之功或闕有其人無其時則英武之志不伸至於能成王業者惟人時合也自晉國内難七載於兹桓𤣥簒逆虐踰董卓神怒人怨其殃積矣可乘之機莫過此也以陛下之神武經而緯之驅樂奮之卒接厭亂之機譬猶聲發響應形動影隨未足比其易也且江淮南北戸口無幾公私戎馬不過數百守備之事葢亦微矣若以步騎一萬建雷霆之舉卷甲長驅指臨江會必望旗草偃壺漿屬路跨地數千衆踰十萬可以西并强秦北抗大魏拓境開疆保寧社稷正在今日如使後機失會豪傑復起梟除桓𤣥更修德政遐邇既寧物無異望豈惟建康難屠江北亦不可冀機過患生憂必至矣天與不取悔將何及惟陛下覽之備德曰自頃數􅄤百六宏綱暫弛遂令姦逆亂華舊京墟穢每尋否運憤慨兼懷昔少康以一旅之衆復夏配天況朕據三齊之地藉五州之衆敎之以軍旅訓之以禮讓上下知義人思自奮繕甲俟釁為日久矣但欲先定中原掃除逋㜸然後宣布淳風經理九服飲馬長江懸旌隴坂此志未遂且韜戈耳今日之事其令公卿詳議之咸以桓𤣥新得志未可圖乃止於是講武於城西歩兵三十七萬馬騎一作鐵騎五萬三千疋車一萬七千乘周亘山澤旌旗彌漫鉦鼓之聲振動天地備德登高望之顧謂劉軌高雅之曰昔郤克忿齊子胥怨楚終能暢其剛烈名流千載卿等既知投身有道當使無慙昔人也雅之等頓首荅曰幸䝉陛下天覆之恩大造之澤存亡繼絶實在聖時雖則萬隕何以上報建平五年春三月備德以劉軌為司空甚寵任之劉敬宣素曉天文知必有興復晉室者尋夢丸土服之既覺喜曰丸者桓也桓既吞矣吾復本土乎遂與高雅之結青州大姓諸省封及鮮卑豪帥免逵謀殺備德推司馬休之為主克日垂發雅之欲邀軌同謀敬宣曰劉公衰老吾觀其有安齊之志必不動不可告也雅之以為不然卒告軌軌果不從謀頗洩乃相與殺軌南奔雅之為追騎所執殺之敬宣與休之至淮泗間遂歸劉裕備德聞桓𤣥敗乃以桂陽王鎮為前將軍北地王鍾為大都督配以步卒二萬騎五千克期欲取江南會備德寢疾於是罷兵建平六年夏四月先是備德迎其兄子超於長安超潛變姓名逃歸行至梁父鎮南長史悅壽以告兗州刺史南海王法法曰昔漢有卜者詐稱衛太子今安知非此𩔖也乃不禮之備德聞超至大喜遣騎三百出迎及至封為北海王拜侍中驃騎大將軍司隸校尉秋九月汝水忽竭水經註作女水水有神化隆則水生政薄則津竭備德甚惡之冬十一月備德寢疾北海王超請禱之備德曰人主之命長短在天非汝水所能制也固請不許是夜備德夢其父皝曰汝既無子何不早立超為太子不爾惡人生心寤而告其妻曰先帝神明所敕觀此夢意吾將死矣戊午引見羣臣於東陽殿議立超為皇太子俄而地震百僚驚恐竄越失位備德亦不自安輿輦還宫至夜其疾益甚呼段后公主及超申以後事大赦境内殊死已下子為人後者人爵二級乃執超手曰若得至曉更見公卿顧托以汝死無所恨舉目視公主欲有所言竟遂不能段后大呼曰今召中書作詔立超可乎備德開目頷之乃立超為皇太子是夕薨於顯安殿一作堂即晉義熙元年也時年七十在帝位六年乃為十餘柩夜分出四門潛𦵏山谷竟不知其尸之所在虛𦵏於東陽陵偽諡獻武皇帝廟號世宗十六國春秋卷六十三
