body:
  text: 十六國春秋卷九十三西凉録三李恂李恂字士誠歆之弟暠第六子也為燉煌太守歆為沮渠䝉遜所殺恂與兄翻等自燉煌奔於北山䝉遜以索嗣之子元緒行燉煌太守元緒麄險好殺大失人和郡人宋承一作朱承張𢎞等以恂在郡有惠政密信招恂恂遂率千騎入於燉煌元緒東奔涼興承等推恂為冠軍將軍涼州刺史改元永建䝉遜遣世子德政率衆二萬攻之恂閉門不戰攻之不下䝉遜乃自率衆來攻三靣起堤引水灌城恂遣壯士一千連版為橋潛欲決堤䝉遜勒兵逆戰承等開門出降恂先殺其妻子自殺䝉遜遂屠其城李翻李翻字士舉小字武彊暠少子也歴驍騎將軍祈連晉昌酒泉三郡太守翻子寳字懐素小字衍孫沈雅有度量驍勇善撫接伯父歆爲沮渠䝉遜所滅父翻奔於北山䝉遜乃徙寳於姑臧歳餘隨勇唐契北奔伊吾臣於蠕蠕遺民歸附者稍至二千寳傾身接禮甚得衆心皆樂爲用每希報雪其後魏世祖遣將討沮渠無諱於燉煌無諱捐城遁走寳自伊吾率流人及虜騎南襲燉煌㨿之修繕城府規復先業遣弟懷逹奉表歸魏世祖嘉其忠欵拜懷逹散騎常侍燉煌太守别遣使授寳為使持節侍中都督西垂諸軍事鎭西大將軍開府儀同三司領䕶西戎校尉沙州牧燉煌公仍鎮燉煌承制假授玉門已西甚著威惠於西土百姓懐之在燉煌三年因入朝遂留京師徙爲鎮南將軍并州刺史轉鎭北將軍魏太安五年卒謚曰宣公有六子冲最知名歴顯位暠妻尹氏尹氏天水冀人尹文之女也幼而好學清辨有志節初適扶風馬元正元正卒爲暠繼室自以再醮之故三年不言撫前妻子踰於已生暠之創業謀謨經略多所賛毘故西州喭曰李尹王燉煌及暠死子歆嗣位尊爲太后河西王沮渠䝉遜來伐先引兵攻秦浩亹歆欲乗虛襲張掖尹氏謂歆曰汝新造之國地狹民希自守猶懼不足何暇伐人度德量力春秋之義先王臨終遺令殷勤戒汝深愼用兵保境安民以俟天時言猶在耳奈何棄之況䝉遜驍武善於用兵汝非其敵觀其數年以來經謀規略常有兼并之志且天時人事似欲歸之汝國雖小足為善政修德養民静以俟之彼若昏暴民將歸汝若其休明汝將事之豈得輕爲舉動僥冀非望以吾觀之非但喪師殆將亡國歆不能聽為䝉遜所敗歆曰吾違老母明勑逺取敗辱不殺此胡復何靣目見我母也勒兵進戰遂大敗死䝉遜入姑臧見尹氏而勞之尹氏曰李氏爲胡所滅知復何言或謂尹氏曰今母子之命在人掌握奈何倨傲之且國亡子死曽無憂色何也尹氏曰存亡死生皆有天命奈何更如凡人爲兒女子之悲耶吾一老婦人國亡家破豈可復惜餘生爲人臣妾惟速死爲幸耳䝉遜嘉而赦之娶其女爲茂䖍婦及世祖以妹武威公主妻茂䖍尹氏與女遷居酒泉頃之女卒尹氏撫之不哭曰汝國破家亡今死晩矣茂䖍之弟無諱鎭酒泉每謂尹氏曰后諸孫在伊吾后欲就之乎尹氏未測其意紿之曰吾子孫漂蕩託身異域餘生無幾便當死此不復作氈裘鬼也未幾濳奔伊吾無諱遣騎追及之尹氏謂追騎曰沮渠酒泉許吾北歸何為復追汝取吾首以往終不復還矣追騎遂不敢逼引還尹氏至於伊吾年七十五卒宋繇宋繇字體業燉煌人也曾祖配祖悌世仕張軌子孫父僚爲張𤣥靚龍驤將軍武興太守繇生而僚爲張邕所殺五歳喪母事伯母張氏以孝聞八歳而張氏卒居喪過禮繇少而有志尚喟然謂妹夫張彥曰門戸傾覆負荷在繇不銜膽自勵何以繼承先業遂隨彥至酒泉從師就學閉戸讀書晝夜不輟博通經史諸子羣言莫不綜覽呂光舉爲秀才除郎中後奔叚業拜散騎常侍繇以業無經濟遠略西奔於暠歴從事中郎尋加折衝將軍轉右將軍領燉煌䕶軍左長史受遺輔政及歆嗣位遷武衞將軍廣夏太守位至通顯家無餘財雅好儒學雖在兵旅講誦不廢每聞儒士在門常倒屣出迎停寢政事引談經籍尤明㫁決事無淹滯沮渠䝉遜平酒泉於繇室得書數千卷鹽米十餘斛而已䝉遜嘆曰孤不喜得李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任䝉遜死以子茂䖍托之茂䖍以繇為左丞送其妹興平公主於魏世祖拜繇爲河西王右丞相賜爵清水公加安逺將軍魏并涼州從茂䖍至魏卒劉昞劉昞字彥明燉煌人也父寳字子玉以儒學見稱昞年十四就博士郭瑀學時瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂改設一席於坐前謂諸弟子曰吾有一女年向長成欲覓一快壻誰坐此席者吾當婚焉昞遂奮衣來坐神志肅然曰向聞先生欲求快女壻昞其人也遂以女妻之昞後隱居酒泉不應州郡辟命弟子受業者常數百人武昭王暠徴爲儒林祭酒從事中郎暠雅好文典書史穿落者親自補治昞時侍側前請代暠暠曰躬自執者欲人重此典籍吾與卿相値何異孔明之會𤣥德遷撫夷護軍雖有政務手不釋卷暠謂之曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱焉昞何人斯敢不如此昞以三史文繁著略記百三十篇八十四卷涼書十卷燉煌實錄二十卷方言三卷靖恭堂銘一卷并著周易韓子人物志黄石公三略並行於世後䝉遜平酒泉拜祕書郎中築陸沈觀於西苑躬往禮焉號𤣥處先生北涼錄自有傳唐繇唐繇晉昌宜安人也以涼土喪亂民無所歸推暠霸於河右以寧一方及涼亡繇子和與兄契携其甥武昭王孫寳避難伊吾招集人衆二千餘家臣於蠕蠕蠕蠕以契爲伊吾王經二十餘年和與契遣使降魏遂爲蠕蠕所逼擁部衆至髙昌蠕蠕復遣部帥阿若討之至白力城和先攻髙昌契與阿若戰敗没和收餘衆奔前部王國時沮渠安周屯横截城和攻㧞之斬安周兄子樹後又從伊洛擊髙寧白力二城尅之遣使奉表歸魏辛淵辛淵字子深隴西狄道人也四世祖怡晉幽州刺史寜朔將軍淵仕暠爲驍騎將軍歆亦善遇之歆與沮渠䝉遜戰於蓼泉軍敗失馬淵以所乗馬授歆而身死於難遂以義烈見稱於西土云其後子孫仕魏俱至顯官隂仲逹隂仲逹武威姑臧人也祖訓字處道仕暠爲武威太守父華字季文仕姑臧令仲逹以文學知名西土十六國春秋卷九十三
