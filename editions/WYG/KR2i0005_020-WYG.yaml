body:
  text: 十六國春秋卷二十後趙錄十石肇石􅒊勒之昆弟也勒既貴顯􅒊在軍中不能自達軍士共送詣勒勒哀之拜建威將軍以肇無才力每髙選參佐輔之輔或作補為聘廣川劉典兄女肇甚懼之後拜長樂太守治官每入門動稱阿劉教可爾不可爾時人以為􅅓謠石堪石堪本田氏子數有戰功勒養以為子冒姓石氏太和三年封彭城王𢎞嗣位虎總攝朝政府僚舊佐悉居禁要太后劉氏謂堪曰先帝甫爾晏駕丞相便相陵藉如此恐皇祚之滅殆不復乆真可謂養虎自害者也王將何以圖之堪曰先帝舊臣皆被疎斥軍旅不復由人宮省之内無所措籌臣請出兖州據廪丘挾南陽王恢為盟主宣太后令于諸牧守征鎮令各率義兵同討暴逆庶㡬猶有濟也劉氏曰今事急矣便可速發恐事淹變生堪許諾乃微服輕騎襲兖州失期不剋南奔譙城虎遣其將郭泰追撃之獲于城父送之襄國炙而殺之石生石生勒之養子也為衛將軍司州刺史轉雍州刺史領兵三千鎮洛金墉城太和三年封河東王勒死虎専擅朝政生殺予奪悉自操之生乃起兵闗中以討虎為名自稱秦州刺史虎遣前鋒大都督石挺擊之生遣將軍郭機帥鮮卑部衆二萬為前鋒来拒自統大軍為之後繼進次蒲阪機與挺戰于潼闗挺敗死虎退屯澠池鮮卑宻與虎通因進擊生生時據蒲阪不知挺之死也懼單馬奔長安虎進師入闗攻圍長安生不能守乃去長安欲至隴上士卒盡散遂入雞頭山為其部下所害山在鄠縣東石聰石聰本晉人也冒姓石氏仕勒為汲郡内史先是石生攻晉將郭誦於陽翟生敗退守康城聰馳救之俘虜二千餘人進攻夀晉不剋遂剋逡遒阜陵掠五千餘人而還有功拜奉車都尉及𢎞嗣立聰與譙郡太守彭彪等各遣使詣晉請降晉司馬孔坦與聰書曰華狄道乖南北逈邈瞻河企宋每懐饑渴數㑹陽九天禍晉國姦兇猾夏乗釁肆虐我徳雖衰天命未改乾符啟再集之慶中興應靈期之㑹百六之艱既過惟新之美日隆而神州振蕩遺黎波散誓命戎狄之首跼蹐豺狼之穴朝廷每臨寐永歎痛心疾首天罰既集罪人斯隕王旅未加自相魚肉豈非人怨神怒天降其災蘭艾同焚賢愚共歎矜哀勿喜我后之仁大赦曠廓惟虎是討彭譙使至粗具動静知將軍忿疾醜𩔖翻然同舉承問欣豫慶若在己何知㡬之先覺介石之易悟哉引領來儀怪無聲息將軍出自名族誕育洪胄遭世多故國傾家覆生離親屬假養異𩔖雖逼偽寵將亦何賴聞之者或猶有悼况身嬰之能不憤慨非我族𩔖其心必異誠反族歸正之秋圖義建功之日也若將軍喻納往言宣之同盟率闗右之衆輔河南之卒申威趙魏為國前驅雖竇融之保河西黥布之破項羽比諸古人一作今未足為喻聖上寛明宰輔𢎞納雖射鉤之隙賞之故行雍齒之恨侯之列國况二三子無曩人之嫌而遇天啟之㑹當如影嚮有何遲疑今六軍戒嚴水陸齊進熊羆踊躍齕噬争先鋒鏑一交玊石同碎雖復後悔嗟何及矣僕以不才世荷國寵雖實不敏誠為行李之主區區之衷還信所具夫機事不先鮮不後悔自求多福惟將軍圖之因遣督䕶喬球將兵救聰未至虎追擊之為虎所殺石邃石邃字大淵小字阿鐵虎之長子母鄭氏所生也少而雄慧及長驍勇虎深愛之勒署為左衛將軍都督中軍事遷征東將軍轉冀州刺史加散騎常侍封齊王及𢎞嗣位虎為丞相魏王拜邃為魏太子加使持節侍中大都督督中外諸軍大將軍錄尚書事虎僭稱天王冊立為天王皇太子使省可尚書奏事邃保母劉芝初以巫術進既養邃有深寵通賄賂預言論權傾朝廷親貴多出其門因封芝為宜城君虎每顧左右曰司馬家父子兄弟自相殘滅故使朕得至此若其不然吾豈有今日如朕當有殺阿鐵理否左右皆曰陛下父慈子孝何言至是也邃有一子在襄國佛圖澄語邃曰小阿彌比當得病可往迎之邃即馳信往視果已得病太醫殷騰及外國道士自言能治澄語弟子法牙曰正使聖人復出不愈此病况此等乎後三日而死邃信澄彌篤邃自總百揆之後荒耽酒色驕恣無道不堪儲嗣或盤遊于田懸管而入或夜出于宮臣家淫其妻妾粧飾宮人美婌者斬首洗血置于盤上與賔客𫝊共視之又内諸比丘尼有姿色者與其交䙝而殺之合牛羊肉煮而食之亦賜左右欲以識其味甞奏事忤㫖虎笞責之邃甚愠恨將圖篡逆私謂内豎曰和尚神通廣大倘發吾謀敗乃事矣明日來者當先除之澄月望將入覲虎謂弟子僧慧曰昨夜天神呼我曰明日若入還勿過人倘有所過汝當止我澄入必過邃邃知澄入要候甚乆澄將上南臺慧引衣止之澄曰事不得止既入坐未定便起邃固留不住所謀遂寢邃于是謂無窮長生中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對邃稱疾不視事潛與宦臣文武五百餘騎宴于顔别舍因謂顔等曰我欲至冀州殺河間公有不從者斬顔叩頭固諌不聽行數里騎皆逃散邃亦昏醉而歸虎聞邃有疾將往視之佛圖澄言曰陛下不宜數往東宮虎思澄言而止既而瞑目大言曰我為天下主父子不相信乎乃遣所親信女尚書往覘之邃母鄭氏聞之亦私遣中人切責邃怒皆殺之虎聞大怒收顔等詰問顔具言始末誅顔等三十餘人幽邃于東宮既而赦之引見于太武東堂邃朝而不謝俄頃便出虎遣使謂之曰太子應入朝中宮何以便去邃徑出不顧虎怒益甚乃廢邃為庶人其夜殺之并其妻張氏及男女二十六人同埋于一棺之中誅東宮黨與二百餘人廢鄭氏為東海太妃先是佛圖澄常歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容箴虎虎不能解未㡬事發其言始悟石斌石斌虎之庶子母齊氏所生本娼也以賤故不甚寵愛勒取以為兒愛之甚重忽暴病死三日將殯勒嘆曰朕聞虢太子死扁鵲能生之今大和尚國中之神人可急往告必能致福乃令人告佛圖澄澄取楊枝沾水灑而呪之因執斌手曰可起矣斌乃蘇活有頃平復建平元年署為左衛將軍封太原王𢎞嗣位徙封章武王及虎僭稱天王諸王皆降爵為公遂為章武公累遷大司馬都督邉郡幽州牧改封燕公斌淫酒荒獵常懸管而入羣兇凑聚因以肆暴征北將軍張賀度以邉防宜警屢裁諌之斌怒辱賀度虎聞大怒遣主書禮儀持節監之斌行意自若儀持法呵禁斌怒殺之又欲殺賀度賀度嚴衛馳白先是佛圖澄戒虎曰天神昨夜言疾收馬還至秋齊當癰爛虎不解此語即遣諸處牧馬送還至是賀度告斌于虎虎𠡠尚書張離持節帥騎召斌鞭之三百殺其所生母齊氏虎彎弓稔矢自視行斌罰罰輕乃手殺五人一作五百澄諌曰心不可縱死不可生禮不殺親以傷恩也何有天子手自行罰乎乃止免官歸第誅其親任十餘人未㡬復以為使持節侍中大司馬錄尚書事虎既誅宣議欲立斌為太子張豺諌止之乃立世為太子進斌爵為王尋遷大都督督中外諸軍事帥精騎一萬斬梁犢於滎陽東虎既寢疾遷丞相錄尚書事與張豺等受遺輔政劉后懼斌之輔政將圖害世乃與張豺謀誅之斌時在襄國不知虎疾遣使詐謂斌曰主上疾已漸愈王須獵者可小停也斌素嗜酒耽獵遂遊畋縱飲劉氏矯詔稱斌無忠孝之心免斌官以王歸第使豺弟雄等率龍騰五百人守之未㡬復使雄矯詔殺之石樸一作璞石樸字𤣥真渤海南皮人晉大司馬苞之曾孫也為人謹厚無他材藝洛陽之亂没於石氏勒以樸與己同姓俱出河北引為宗室寵待彌隆虎嗣立累遷侍中時虎跨據河北士馬强盛凉州刺史張駿憚之遣别駕從事馬詵來朝辭㫖蹇傲虎大怒欲殺詵樸曰今國家所當先除者遺晉也區區河右不足為意今靳馬詵必征張駿則南討之師勢分為二建康君臣復延數年之命矣勝之不為武不克為四夷所笑不如因而厚之彼若改圖謝罪率其臣職則我又何求迷而不悟討之未晚也乃止虎後作役非時百姓愁苦樸又上疏言今者天文錯亂百姓凋敝而又大興苦役非明主惜民之所宜也詞甚切直虎不納冉閔之世歴位司空羌胡之亂為軍士所殺勒母王氏勒母王氏初勒被鬻於平原與王氏相失晉大將軍劉琨得之及勒貴後琨遣使送之于勒劉聰僭位拜勒為上黨公進封王氏為上黨國太夫人未㡬病死潛窆山谷莫詳其所勒後備九命之禮虚𦵏于襄國追諡元昭皇太后勒后劉氏勒后劉氏侍中劉閏中妹復一作别部胡人也勒納之于胡門美色有徳寵張禆反于襄城后拔劍斬之勒賴后而濟后性敏慧多幹畧理國之務佐勒建功業有呂氏輔漢之風然嚴整婉容性不妬忌尤過之也初封上黨國夫人建平元年立為皇后勒死𢎞即位尊為皇太后虎専權擅政徙居崇訓宮劉氏憂之與彭城王堪謀徴兵討虎謀洩虎廢而殺之鄭氏鄭氏名櫻桃晉冗從僕射鄭世達家妓也在衆猥妓中虎數歎其貌於太妃太妃給之甚見寵惑生太子邃及東海王宣彭城王遵虎為魏王稱鄭氏為魏王后及即天王位立為天王皇后太子邃既以讒暴伏誅鄭氏遂廢為東海太妃性甚讒妬先是虎拔中山聘征北將軍郭榮之妹為妻至相敬待無兒鄭氏讒而殺之更納清河崔氏女鄭氏生男崔求養鄭不許一月猝病死鄭又讒崔謂妾多養胡子虎時踞胡床于庭中大怒索弓箭崔聞欲殺之徒跣至前訴曰公勿枉殺妾乞聽妾言虎不聽但言促還座無預卿事崔便走去未至虎于後射之崔中腰而死其後虎死石氏大亂遵乃廢世自立尊鄭氏為皇太后尋為冉閔所殺陳氏陳氏别駕陳逵之妹也才色甚美髪長七尺虎甚嬖之遂以為夫人寵冠後宮十六國春秋卷二十
