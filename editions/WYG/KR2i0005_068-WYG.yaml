body:
  text: 十六國春秋卷六十八夏錄三赫連定赫連定小字直獖勃勃之第五子也凶暴無賴鳳翔元年封平原公雍州牧鎮長安既而率衆赴安定進爵為王遷大將軍領司徒昌為魏所敗定遂收其餘衆數萬還據平涼遂僣即皇帝位大赦境内殊死已下改承光四年為勝光元年進征南大將軍白蘭王吐谷渾慕璝為開府儀同三司河南王魏宜城王奚斤自以為元帥而昌為偏禆所擒功不在己深恥之乃舎輜重齎三日糧輕騎追定於平涼娥清欲循水而還斤不從自北道邀其走路至馬髦嶺定軍將遁會魏小將有罪亡歸於定具告其實定知魏軍食少無水乃設伏於隴山彈箏谷分兵邀斤前後夾擊之魏兵大潰斤及娥清劉拔皆為定所擒士卒死者六七千人丘堆守輜重在安定聞斤敗棄輜重奔長安尋與高涼王禮棄長安偕奔蒲坂定復取長安世祖大怒命建節將軍西平公安頡持節斬丘堆代將其衆鎮蒲坂以拒之夏四月定遣使請和於魏世祖以詔諭之使降勝光二年春正月定弟酒泉公雋自平涼奔魏夏五月定欲復取統萬引兵東至侯尼城不敢進而還冬十月畋於隂槃定少􅇯暴無賴不為勃勃所知乃登苛藍山苛一作可望統萬而泣曰先帝若以朕承大業者豈有今日之事乎使天假朕年當與卿諸人建季興之業俄而有羣狐百數鳴於定旁定令射之一無所獲定惡之曰所見亦大不臧咄咄天道復何言哉勝光三年春三月壬寅世祖封昌為秦王秋九月己丑定遣弟謂以代伐魏鄜城魏平西將軍始平公隗歸等率衆來擊擒别將王章殺萬餘人謂以代遁還定自將數萬人邀擊隗歸於鄜城東留弟上谷公社干廣陽公度洛孤守平涼遣使詣宋求和乃與劉義隆約合兵滅魏遥分河北自恒山以東屬宋恒山以西屬夏義隆遣將到彦之率衆冦河南為定聲援世祖聞之乃攝河南三鎮北渡彦之遂列守南岸至於衡闗冬十月世祖治兵將謀伐定羣臣咸諫曰劉義隆兵猶在河中舎之西行前冦己未必可克而義隆乘虚來襲則失東州矣世祖疑焉以問崔浩浩曰劉義隆與赫連定同惡相濟一作招連結馮跋牽引蝚蠕規肆逆志一作心字虛聲唱和義隆望定進定待義隆前皆莫敢先入以臣觀之有似連雞不得俱飛無能為害也臣始謂義隆軍來當屯住河中兩道北上東道向冀州西道衝鄴如此則陛下自當致討不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此而觀儜兒情見此不過欲固河自守免死為幸無北渡意也赫連定殘根易摧擬之必仆克定之後東出潼闗席卷而前則威振南極江淮以北無立草矣聖䇿獨發非愚近所及願陛下西行勿疑甲辰世祖如統萬進軍平涼次於涇南遣安西將軍古弼與侍中張黎攻平涼以衛兵將軍王斤鎮蒲坂十一月乙酉世祖進攻平涼定上谷公社干等嬰城固守世祖使其兄昌招諭之不下乃使安西將軍古弼等將兵趨安定定自鄜城還安定將歩騎二萬北救平涼與弼等相遇弼偽退以誘之定追擊之世祖使高車勑勒馳擊定定遂大敗斬首數千級定還走登鶉觚原方陣以自固魏軍四面圍之數日斷其水道定不得水人馬饑渴丁酉引軍下鶉觚原魏武衛將軍丘眷擊破之定衆大敗死者萬餘人定中重創單馬遁走收其餘衆掠民五萬戸西奔上邽世祖獲其弟丹楊公烏視拔武陵公秃骨及公侯將士以下百餘人是日弼等乘勝進攻安定定從兄東平公乙升棄城奔長安驅掠數千家西奔上邽己亥世祖入安定獲乞伏熾磐質子及定車旗簿其生口財畜班賜將士各有差十二月西秦畧陽太守楊顯以郡降定丁卯定上谷公社干廣陽公度洛孤面縛出降遂克平涼收其珍寳闗中侯豆代田得奚斤娥清等獻於世祖世祖以定后賜代田命斤膝行執酒以奉代田謂斤曰全汝生者代田也賜代田爵井陘侯加散騎常侍右衛將軍領内都幢將定所署長安臨晉武功守將皆走闗中悉入於魏世祖留巴東公延普鎮安定以鎮西將軍缺鎮長安壬申世祖東還勝光四年春正月定擊西秦將姚獻敗之遂遣叔父北平公韋代帥騎一萬攻南安乞伏暮末窮蹙輿櫬出降夏六月定殺暮末及其宗族五百餘人定畏魏軍之逼擁秦民十餘萬口自冶城濟河欲擊河西王沮渠䝉遜而奪其地河南王吐谷渾慕璝因戎狄之東面以爭天下遣益州刺史慕利延寧州刺史拾寅帥衆三萬乘其半濟邀擊之執定以歸秋八月慕璝遣侍郎謝大寧奉表於魏請送赫連定己丑世祖以慕璝為大將軍西秦王其明年春三月壬申慕璝送定至魏世祖殺之是魏延和元年也初勃勃僭號龍昇嵗在丁未至定滅亡嵗在辛未凡二十五年十六國春秋卷六十八
