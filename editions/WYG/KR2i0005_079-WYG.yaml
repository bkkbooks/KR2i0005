body:
  text: 十六國春秋卷七十九蜀錄四李輔李輔字𤣥政慕之長子特兄也鋭勇有武幹初益州刺史趙廞殺其弟威寇將軍庠及其子𢎞等慮特等為變乃命輔與特驤俱為督將安慰其衆及特承制拜為驃騎將軍官桑之敗為益州刺史羅尚所殺雄即王位追諡齊烈王子忠嗣李庠李庠字𤣥序特第三弟也少以氣烈為鄉里所稱仕郡督郵主簿當官皆以美績著聞元康四年察孝亷不就後以善騎射舉良將亦不就州郡以庠才兼文武舉房異一作秀異固以疾辭州郡不聽以其名上聞中䕶軍切徵不得已而應之拜中軍都騎督弓馬便捷膂力過人時論方之鮮卑文鴦洛陽方亂稱疾去官性在任俠好濟人難以是州黨莫不附之與六郡流民避難梁益道路有疾病饑厄者常營䕶隠䘏賑施貧乏大収衆心初至蜀益州刺史趙廞敬異之一作深器與論兵法無不稱善每謂所親曰李𤣥序葢亦一時之闗張也以為冠軍將軍及特有異志委以心膂之任表為部曲督使招合六郡壯勇至萬餘人以討叛羌功表為威寇將軍假赤幢曲蓋封陽泉亭侯賜錢百萬馬四十匹廞忌害其能誣以大逆殺之被殺之日六郡士庶莫不流涕時年五十五雄即成都王位追諡梁武王李驤李驤字𤣥龍慕之少子特弟也驍鋭武幹與諸兄弟等初殺縣令屯聚樂鄉起兵應特特承制拜驍騎將軍每從征伐屢立戰功特死雄立益州刺史羅尚數攻郫城雄使朴泰誘尚襲郫城約為内應尚信之泰要發火遣隗伯諸軍攻郫驤設伏於外以長梯上伯軍伯軍見火起争縁梯上驤因放兵擊之大破尚軍遂攻犍為斷尚糧道殺太守龔恢及功曹楊渙進攻益州殺别駕許延延妻杜氏有美色驤欲納以為妻杜氏號哭守夫尸罵曰汝軰逆賊無道死有先後寧當久活我杜家女豈為賊妻也何不速殺我驤怒遂殺之雄即王位以驤為太傅晉永嘉四年梓潼内史譙登據涪城時羅尚死長沙太守皮素代為益州進治三闗驤急攻登素勅張順楊顯救登尚子宇恨登不供其軍實素怒宇欲治其罪為宇所殺建平都尉暴重殺宇巴郡大亂不果救登驤於是攻登益急登兵窮士饑遂生得之送之於雄雄乃殺登巴西梓潼盡為雄有矣其後雄梁州刺史李鳳叛於巴西驤以太傅行大將軍討斬之轉攻越嶲及朱提獲太守李釗進都督中外諸軍事大將軍領中䕶軍西夷校尉錄尚書總統以玉衡二十年冬卒追贈相國諡曰漢獻王及夀僭即帝位追尊諡曰獻皇帝李蕩李蕩字仲平特次子也好學有容觀特承制拜鎮軍將軍特初稱制晉河間王司馬顒遣督䕶衙博討之進屯梓潼朝廷復遣廣漢太守張微軍於徳陽南夷校尉李毅又遣叟兵五千助益州刺史羅尚尚遣督䕶張龜軍於繁城三道並進以攻特營特使蕩與雄襲博特躬擊張龜龜衆大敗蕩又與博接戰連日博亦敗績死者大半蕩追博至漢徳博走葭萌蕩轉掠巴西巴西郡丞毛植五官襄珍以郡迎降蕩撫懐初附百姓安之進攻葭萌博又逺遁其衆悉降遂拔梓潼巴西郡特於是進攻張微微依高據險與特相持連日時特與蕩分為二營微候特營空虚遣步兵循山攻之特逆戰不利山險窘迫衆不知所為羅凖任道皆勸引退特量蕩必來故不許微衆至稍多山道至狹唯可一二人行蕩軍不得前謂司馬王幸曰父在深冦之中是我死日也乃衣重鎧持長矛大呼直前推鋒必死殺千餘人微衆來相救蕩軍皆殊死戰無不一以當百微衆遂潰拔特于重圍之中特欲釋微還涪蕩與王幸進曰微軍連戰士卒傷殘智勇俱困宜因其弊一戰擒之若舍而寛之微養病收亡餘衆更合圖之未易也特從之復進攻微微潰圍而走蕩率水陸追之殺之於巴西生擒其子存以微喪還之其後二年官兵殺特于官桑蕩與雄共保北營羅尚遣督䕶張龜何沖左汜等軍繁城涪陵藥紳等起兵應尚蕩攻紳破之左汜率衆乘虚襲營氐符成隗伯時在營中叛以應汜營垂欲破㑹蕩破紳還適與汜遇遂大破之成伯將其黨突出詣尚蕩策馬追擊中矛而死雄秘不發喪以安衆心及雄即成都王位追贈廣漢壯文公李始李始字伯起特長子雄異母兄也特承制拜武威將軍雄既僭位累遷太保加折衝將軍善撫士衆衆多歸之時人為之語曰欲養老屬太保及期之殺班也以始為征東大將軍代建寧王越鎮江陽始先欲附夀謀共討期夀不從始怒說期取夀期又不許後夀用龔壯計襲破成都期自殺始亦被誅并其兄弟十餘人李琀稚玝李琀蕩長子也次稚次都又次玝初琀為侍中中領軍稚以安東將軍屯晉夀武都氐楊難敵來奔稚受其賂遺縱還武都難敵恃險驕慢多為不法攻走陰平太守羅演演稚之舅也稚自悔失計白兄琀亟欲請討雄許之乃遣琀與稚及將軍樂次費佗李乾等由白水橋進攻下辨征東將軍夀督琀弟玝攻陰平難敵遣軍來拒夀玝不得進而琀稚徑至下辨武街難敵斷其歸道四面攻之深入無繼皆為氐衆所殺士卒死者數千人琀有才望志尚雄欲傳以為嗣及聞其死深痛悼之不食數日言必流涕雄死班嗣偽位玝與期越咸來奔喪玝勸班遣越還鎮并出期為梁州刺史班猶豫未許反遣玝還鎮涪城期越竟弑班于臨次并殺其兄領軍都玝遂奔晉厯巴郡襄陽宜都太守龍驤將軍永和三年從征西至於山陽戰死李安李安字武龍少養於外家羅氏元康元年避地入蜀從特征伐以勇烈聞特遂子之驍騎將軍驤引為帳下督䕶數有戰功甚見信愛羅尚遣符成隗伯攻郫城驤逆戰不利被傷落馬臥未能起士衆皆散惟安與任囘在左右隗伯帥數千騎來叱安曰武龍吾所取有人卿宜避我去安瞋目呵之曰吾不相與因躍馬直前刺之伯逡巡而退李離李離特妹婿含之子也初為梓潼太守朝廷遣建平太守孫阜進次徳陽含勸流降阜離聞之因與雄謀襲阜軍阜軍敗績流深竒之委以重任雄即成都王位進為太尉事無鉅細悉以任之永嘉初闗中流民鄧定訇氐等掠漢冬辰勢以叛巴西太守張燕遣牙門武肇漢國郡丞宣定圍之鄧定等求援于雄雄遣離與李璜等帥兵入漢中赴援太守杜孟治聞離至命燕釋圍保城離至先破武肇營次攻宣定復破之燕懼將百騎走離等復大破之州軍皆散孟治開門退走離盡徙漢中民於蜀遂屯據梓潼其後部將天水訇琦張金茍等叛殺之送離母子於羅尚尚斬以狥遂分其室羅氏特妻羅氏略陽人僕射羅演之妹也生蕩與雄時蕩等屯北營羅尚遣牙門左汜黄誾來攻營中氐符成隗伯叛應之羅氏擐甲拒戰伯手刅傷其面羅氏奮擊不輟氣烈益壯蕩還得免雄稱成都王尊為王太后及即帝位尊為皇太后以雄玉衡元年卒雄信巫覡之言多有忌諱至欲不塟司空趙肅切諫雄乃從之又欲申三年之禮羣臣多諫弗納太傅驤謂司空上官惇曰今方難未靖一作彌吾欲固請不聽主上終諒闇君以為何如惇曰三年之喪自天子達于庶人故孔子曰何必高宗古之人皆然但漢魏以來天下多難宗廟至重不可久曠故釋縗絰至哀而已驤曰任囘方至此人决於行事且上嘗難違其言待其至當與俱請及至同囘入見驤免冠流涕固請公除雄號泣不許囘跪而進曰今王業初建凢百草創一日無主天下惶惶昔武王素甲觀兵晉襄墨經從戎豈所願哉為天下屈已故也願陛下割情從權永隆天保遂強扶雄起釋服親政雄涕泣從之任氏雄妻任氏天水人僕射任顔之姊也以建興元年立為王后任氏無子有妾子十五人長子越次子霸第四子期皆為任氏所養諸子保約等期既僭立尊為皇太后拜兄越相國大將軍錄尚書事封建寧王仲兄霸鎮南大將軍弟保鎮西大將軍約等皆有拜授其後盡為夀所殺任氏亦以憂憤死閻氏夀妻閻氏略陽人閻彧之族女也一云天水人以漢興元年立為皇后閻氏無子夀納李鳳女生勢及廣閻氏子之勢後嗣位尊為皇太后署廣為大將軍封漢王廣以勢無子求為太弟勢不許疑馬當等與廣有異謀收當等殺之遣兵襲廣於涪城貶為臨卭矦廣尋自殺十六國春秋卷七十九
