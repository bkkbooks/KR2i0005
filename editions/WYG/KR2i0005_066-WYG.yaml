body:
  text: 十六國春秋卷六十六夏錄一赫連勃勃赫連勃勃字屈孑魏書云屈孑本名勃勃太宗改其名曰屈孑北人言屈孑者卑下也曾祖鐵弗劉虎南單于苗裔右賢王去卑之孫北部帥劉猛之從子劉淵之族也居於新興虒意之北北人謂父為鮮卑母為鐵弗因以母號為姓猛死子副崙奔魏虎父誥汁爰世領南落誥汁爰一名訓兠兠字或作兒字汁爰死虎遂代焉虎一名烏洛孤始臣附於魏自以衆落稍多舉兵外叛平文帝諱鬱律與晉并州刺史劉琨共討之虎走據朔方歸附劉聰聰以虎宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川將復渡河侵魏西部平文帝逆擊大破之逐出塞表昭成諱什翼犍初虎又寇西部帝遣軍逆討又大破之虎尋死子務桓代領部落遣使附魏務桓一名豹子招集部落復為諸部之雄石虎建武中遣使就拜平北將軍右賢王丁零單于務桓死弟閼陋頭代立其後務桓子悉勿祈逐閼陋頭而自立悉勿祈死弟衛辰代立衛辰務桓之第三子也狡猾多變既立之後入居塞内昭成以女妻之後通於秦苻堅以為左賢王遣使詣堅請求田地春去秋來堅許之後掠秦邊民五十餘口為奴婢以獻於堅堅讓歸之尋復背堅專心歸魏舉兵伐秦堅遣其將鄧羌討擒之衛辰復降於秦堅自至朔方署為夏陽公統其部落衛辰以堅還復其國復附於堅雖於魏貢使不絶而誠敬有乖魏因討破之收其部落十有六七衛辰走奔於秦堅送還朔方遣兵戍守遂以衛辰為鄉導寇魏南境魏師敗績因分國人為二部自河以西屬之劉衛辰自河以東屬之劉庫仁堅復以衛辰為西單于督攝河西諸虜屯代來城秦末國亂遂有朔方之地控弦之士三萬八千慕容永據長子拜衛辰使持節都督河西諸軍事大將軍朔州牧朔方王姚萇亦遣使結好拜衛辰使持節都督北朔雜夷諸軍事大將軍大單于幽州牧河西王後衛辰遣子力俟提魏書作直力鞮寇魏南部其衆八九萬太祖諱珪軍士五六千人為其所圍乃以車為方營且戰且前大破之於鐵岐山南力俟提單騎而走獲牛馬二十餘萬乘勝逐北自五原金津南渡河徑造代來居民駭亂部落奔潰遂入衛辰所居悅䟦城衛辰父子驚遁乃分遣諸將輕騎追之陳留公元䖍南至白鹽池虜衛辰家屬將軍伊謂至木根山擒力俟提盡并其衆衛辰單騎遁走為其部下所殺先是河水赤如血衛辰惡之及衛辰之亡誅其族黨並投之於河勃勃衛辰第三子也奔於叱干部帥叱干他斗伏魏書作薛于部大悉伏送勃勃於魏他斗伏兄子阿利先戍大洛川聞將送勃勃乃馳諫曰鳥雀投人尚宜濟免況勃勃國破家亡歸命於我縱不能救猶宜任其所奔今執而送之深非仁者之舉他斗伏懼為魏所責弗從阿利潛遣勁勇簒勃勃於路送之於秦秦髙平公破多羅没奕干以女妻之勃勃身長八尺五寸腰帶十圍性尤辯慧魁岸美丰儀姚興見而竒之深加禮敬拜驍騎將軍加奉車都尉常叅軍國大議寵遇踰於勲舊尋遷安逺將軍封陽川侯使助没奕干鎮高平議以貳城朔方雜夷及衛辰部衆三萬配之使為伐魏偵候興弟邕固諫以為不可乃止頃之復以勃勃為持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方會太祖歸所虜秦將唐小方於秦興議請歸賀狄干仍送良馬千疋以贖狄伯支太祖許之勃勃聞秦復與魏通而怒乃謀叛秦時河西鮮卑柔然可汗社崙獻馬八千疋於秦濟河至大城勃勃掠取之悉集其衆三萬餘人偽獵於高平川因襲殺没奕干而并其衆衆至數萬龍昇元年夏六月勃勃僭號大夏天王大單于大赦境内殊死已下建元龍昇署置百官自以匈奴夏后氏之苗裔國稱大夏時晉義熈二年也以長兄右地代為丞相封代公次兄力俟提為大將軍封魏公叱干阿利為御史大夫封梁公弟阿利羅引為征南將軍司𨽻校尉若門為尚書令叱以鞬為征西將軍尚書左僕射乙斗一作升為征北將軍尚書右僕射其餘授任各以次差冬十月勃勃討鮮卑薛干等三部破之降其衆以萬數進攻秦三城已北諸戍斬秦將楊丕姚石生等諸將諫固險不從又復言於勃勃曰陛下將欲經營宇内南取長安宜先固根本使人心有所憑係然後大業可成高平山川險固土田沃饒可以定都勃勃曰卿知其一未知其二吾大業草創士衆未多姚興亦一時之雄且其諸將用命闗中未可圖也我今專固一城彼必併力於我衆寡非敵亡可立俟不如以雲騎風馳出其不意救前則擊後救後則擊前使彼疲於奔命我則遊食自若不及十年嶺北河東盡為我有待姚興死後徐取長安姚泓凡弱小兒擒之方畧已在吾計中矣昔軒轅氏亦遷居無常二十餘年豈獨我乎於是掠取嶺北嶺北諸城門不敢晝啟十一月勃勃初僭號求婚於秃髪傉檀傉檀不許勃勃大怒率騎二萬伐之自楊非至於支陽三百餘里殺傷萬餘人驅掠二萬七千口牛馬羊數十萬頭而還傉檀率衆追之其將焦朗謂傉檀曰勃勃天姿雄鷔御軍齊整通典作齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不若從温圍北渡趨萬斛堆阻水結營制其咽喉百戰百勝之術也别將賀連怒曰勃勃以死亡之餘率烏合之衆犯順結仇幸有大功今牛羊塞路財寳若山窘敝之餘人懐貪競不能督勵士衆以抗我也我以大軍臨之彼必土崩瓦解奈何引軍避之示敵以弱我衆氣銳宜在速追傉檀曰吾追計決矣沮衆者斬勃勃聞而大喜乃於陽武下陜鑿陵埋車以塞路傉檀遣善射者射之中勃勃左臂勃勃勒衆逆戰大破傉檀於百井追奔八十餘里殺傷士衆萬計斬其大將十餘人積人頭而封之以為京觀號曰髑髏臺還於嶺北又敗秦將張佛生於青石原俘斬五千七百人龍昇二年夏五月秦遣將齊難等率衆二萬來伐秋七月勃勃聞秦兵旦夕將至退保河西齊難以去勃勃既逺縱兵野掠勃勃全軍覆之一云潛師襲之俘獲七千餘人收其戎馬兵仗難引軍退走勃勃復追擊於木城㧞之擒難俘其將士萬有三千戎馬萬疋於是嶺北夷夏降附者以數萬計勃勃皆拜置守宰以撫之龍昇三年夏四月勃勃率騎二萬攻秦入高國及於五井掠取平涼雜胡七千餘戸以配後軍進屯依力川秋九月秦姚興自率兵來伐至貳城遣安逺將軍姚詳等分督租運勃勃候秦軍未集乘虛奄襲興大懼遣其將姚文宗拒戰勃勃偽退設伏以待之興遣别將姚榆生等來追伏兵夾擊皆擒之興將王奚聚羗胡三千餘戸於勑竒堡勃勃進攻之堰斷其水堡人窘迫執奚出降奚不肯屈遂自刎死復攻秦將王洛生或作金洛生於黄石岡彌姐豪地一作亭地於我羅城皆㧞之徙七千餘戸於大城以丞相右地代領幽州牧以鎮之龍昇四年春三月遣尚書胡金纂率騎二萬攻平涼姚興率兵來救金纂力戰而死勃勃又遣兄子左將軍羅提率歩騎一萬攻秦北中郎將姚廣都於定陽㧞之擒廣都坑將士四千餘人以女弱為軍賞拜廣都為太常進攻秦隴又破白崖堡遂趨清水秦將畧陽太守姚壽都棄城奔上邽徙其民萬六千戸於大城姚興自安定來追至壽渠川不克而退是嵗齊難姚廣都謀叛皆誅之龍昇五年春正月秦安北將軍姚詳棄貳城屯杏川勃勃逼之糧盡委守南奔大蘇勃勃遣平東將軍鹿奕干要擊執之盡俘其衆詳至勃勃數而斬之龍昇六年春二月勃勃率騎三萬南攻安定破秦尚書楊佛嵩於青石北原降其衆三萬五千獲戎馬二萬疋進攻秦將党智隆於東鄉降之署智隆為光祿勲徙三千餘戸於貳城秦鎮北參軍王買德來奔勃勃問以滅秦之䇿買德曰秦德雖衰藩鎮猶固願且蓄力以待之勃勃善之拜為軍師中郎將夏六月勃勃欲因河南王乞伏乾歸之喪率兵攻熾磐王買德曰熾磐吾之與國新遭大喪吾不能恤而又伐之匹夫且猶恥為況萬乘乎勃勃乃止冬十月秦姚興以楊佛嵩為安逺將軍雍州刺史帥嶺北見兵來擊嵩敗死之鳳翔元年春三月大赦境内殊死已下改元鳳翔水經註作龍昇七年以叱干阿利領將作大匠發嶺北夷夏十萬餘戸改築都城於朔方水之北黑水之南名曰統萬城下書曰古人制起城邑或因山水或以義立名今都城已建萬堵斯作克成弗逺宜有美名朕方綂一天下君臨萬邦可以綂萬為名阿利性尤工巧然殘忍刻暴視民如草芥乃蒸土加功以錐刺之錐入一寸即殺作人而并築之刺之不入即殺行錐者勃勃以為忠故委以營繕之任又使造五兵之器銳利尤甚乃咸百鍊既成呈之工匠必有死者射甲不入即斬弓人如其入也則斬鎧匠又造百鍊剛刀五口背上為龍雀大環兼以金鏤作一龍形長三尺九寸號曰大夏龍雀銘其背曰古之利器呉楚湛盧大夏龍雀名冠神都可以懐逺可以柔邇如風靡草威服九域世甚珍之復鑄銅為一大鼓及飛㢘翁仲銅駝龍虎之形皆以黄金飾之列於宫殿之前凡殺工匠數千餘人以是器物莫不精麗又鑿淥漣池於三交夏五月雨魚於統萬時興役尤煩民不堪命勃勃恥姓鐵弗乃改為赫連氏其年下書曰朕之皇祖自北遷幽朔改姓姒氏音殊中國故從母氏為劉子而從母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之夫帝王者係天為子其為徽赫實與天連今改姓曰赫連氏庶協皇天之意永享無窮大慶係天之尊不可令支庶同之其非正統者皆以鐵伐為氏庶朕宗族子孫剛銳如鐵皆堪伐人也冬十二月立夫人梁氏為王后子璝一作墳為太子封子延為陽平公昌為太原公倫為酒泉公定為平原公滿為河南公安為中山公鳳翔二年春正月勃勃侵魏河東蒲子鳳翔三年春三月勃勃攻秦將姚逵於杏城二旬㧞之執逵及别將姚大用姚安和姚利僕尹敵等坑士卒二萬人夏五月勃勃遣御史中丞烏洛孤與河西王沮渠䝉遜結盟其辭曰自金晉數終禍纒九服趙魏為長蛇之墟秦隴為豺狼之穴二都神京鞠為茂草蠢爾羣生㒺知憑賴上天悔禍運屬二家封疆宻邇道會義親宜敦和好𢎞康世難爰自終古有國有家非盟誓無以昭神祗之心非斷金無以定終始之好然晉楚之成呉蜀之約咸口血未乾而尋背之今我二家契殊曩日言未終而有篤愛之心音一交而懷傾蓋之顧息風塵之警同克濟之誠戮力矢心共濟六合若天下有事則雙振義旗區域既清則並敦魯衛夷險相赴交易有無爰及子孫永崇斯好䝉遜遣弟湟河太守沮渠漢平來盟秋九月勃勃遣赫連建將兵擊秦執平涼太守姚周都遂入新平秦廣平公姚弼與戰於龍尾堡建敗被禽鳳翔四年夏六月勃勃聞秦將姚嵩與氐王楊盛相持率騎四萬襲擊上邽未至嵩與盛戰於竹嶺嵩敗死勃勃遂進攻上邽二旬克之殺秦秦州刺史姚平都一作軍都及將士五千人因毁其城轉攻隂宻又殺秦將姚良子及將士萬餘人以子太原公昌為使持節前將軍雍州刺史鎮隂宻秦征北將軍姚恢棄安定奔還長安安定人胡儼華韜率戸五萬據城來降勃勃署儼為侍中韜為尚書留鎮東將軍羊茍兒配以鮮卑五千鎮之進攻秦鎮西將軍姚諶於雍城謀委鎮奔長安勃勃據雍進掠郿城秦遣東平公姚紹及征虜將軍尹昭一作伊昭等將歩騎五萬來拒勃勃退如安定胡儼閉門拒之襲殺茍兒及所將鮮卑復以城降秦紹等進攻勃勃於馬鞍阪破之追至朝那不及而去勃勃引歸杏城復遣兄子提南侵池陽秦車騎將軍姚裕前將軍彭白狼建義將軍虵𤣥率衆追擊提敗遁還秋七月勃勃聞太尉劉裕伐秦笑謂羣臣曰劉裕伐秦水陸並進且裕有高世之畧姚泓豈能自固吾驗以天時人事必當克之且其兄弟内叛安能拒人裕既尅長安利在速返不能久留正可留子弟及諸將守闗中待裕發軫吾取之如拾遺耳不足復勞吾士馬也於是秣馬厲兵休養士卒鳳翔五年春三月勃勃進據安定秦嶺北鎮戍郡縣皆降遂盡有嶺北之地秋九月劉裕滅秦入於長安遣使遺勃勃書請通和好約為兄弟勃勃命中書侍郎皇甫徽為報書而隂誦之召裕使前口授舎人為書封以答裕裕覽其書而竒之使者又言勃勃儀容瓌偉英武絶人裕歎曰吾所不如也冬十月勃勃還綂萬十一月太尉裕留次子桂陽公義真為都督雍梁秦三州諸軍事安西將軍領雍東秦二州刺史鎮長安以諮議叅軍王修為長史王鎮惡為司馬領馮翊太守沈田子毛德祖皆為中兵叅軍仍以田子領扶風太守德祖領秦州刺史天水太守傅𢎞之為雍州治中從事十二月庚子裕發長安自洛入河開汴渠以歸閏月勃勃聞裕東歸大喜具買德傳乃以太子璝都督前鋒諸軍事領撫軍大將軍率騎二萬南向長安前將軍太原公昌屯兵潼闗以軍師中郎將王買德為撫軍右長史南伐青泥自率大軍為之後繼昌武元年春正月太子璝至渭陽闗中士民降者屬路劉義真遣龍驤將軍扶風一作始平太守沈田子率衆逆戰璝擊敗之退屯劉廻堡遣使還報司馬王鎮惡鎮惡對田子使謂長史王修曰劉公以十嵗兒付吾等當共思戮力今擁兵不進虜何由得平乎使者還以告田子田子甚懼遂與鎮惡不平初裕將東還田子及傅𢎞之屢言於裕曰鎮惡家在闗中不可保信裕曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳勿復多言又私謂田子曰鍾會不得遂其亂者以有衛瓘故也語曰猛虎不如羣狐卿等十餘人何懼王鎮惡故二人常有猜心至是鎮惡與田子俱出北地師於涇上以拒夏兵軍中訛言鎮惡欲盡殺南人以數十人送義真南還因據闗中反辛亥田子請鎮惡出城俱會於寧朔將軍傅𢎞之一作建威將軍壘計事田子求屏人語使其宗人沈敬仁斬之幕下矯稱受太尉令誅之𢎞之奔告義真義真與王修被甲登横門以察其變俄而田子帥數十人來至言鎮惡反修執田子數以專戮斬之以冠軍將軍毛修之代鎮惡為安西司馬夏四月傅𢎞之大破璝於渭陽一作池陽又破之於寡婦津一作渡斬獲甚衆璝兵退遁秋九月劉義真年少賜與左右無節王修每裁抑之左右皆怨譖修於義真曰王鎮惡欲反故沈田子殺之修殺田子是亦欲反也義真信之使左右劉乞殺修由是人情離駭莫相統一悉召外軍入長安城閉門拒守闗中郡縣悉降於璝璝夜襲擊長安不克勃勃進據咸陽長安樵採路絶太尉裕聞之大懼使輔國將軍蒯恩如長安召義真東鎮洛陽以相國右司馬朱齡石為都督闗中諸軍事右將軍雍州刺史代鎮長安裕謂齡石曰卿至可勑義真輕裝速發既出闗然後可徐行若闗右必不可守當與義真俱歸也又命中書侍郎朱超石慰勞河洛冬十一月齡石至長安義真將士貪縱大掠而東多載寳貨子女方軌徐行至於㶚上雍州别駕韋華降於勃勃百姓共逐齡石而迎勃勃入長安齡石乃焚燒長安宫殿奔於潼闗璝率衆三萬追擊義真傅𢎞之謂義真曰公處分亟進今多將輜重一日行不過十里虜追騎且至將何以待之宜棄車輕行乃可以免義真不從俄而璝兵大至傅𢎞之蒯恩斷後力戰連日至於青泥北𢎞之躬貫甲胄氣冠三軍衆寡不敵皆為撫軍長史王買德所擒司馬毛修之與義真相失亦為買德所獲義真行在前會日暮璝兵不窮追故得免左右盡散獨逃草中中兵叅軍段宏單騎追尋緣道呼之義真識其聲出就之曰君非段中兵耶身在此行矣必不兩全可刎身頭以南使家公絶望宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無􅄸畧然丈夫不經此何以知艱難勃勃欲降傅𢎞之𢎞之不屈時天大寒勃勃裸之𢎞之呌罵而死士卒死傷者不可勝計遂積人頭為京觀號曰髑髏臺於是大饗將士於長安舉觴以謝王買德拜買德都官尚書加冠軍將軍封河陽侯十二月晉龍驤將軍王敬先戍於潼闗之曹公故壘朱齡石往從之朱超石至蒲坂聞齡石所在亦奔投之太原公昌進攻敬壘斷其水道衆渴不能戰城且䧟齡石謂超石曰弟兄俱死異域使老親何以為心爾求間道亡歸我死此無恨矣超石泣曰人誰不死寧忍今日辭兄去乎遂與敬及右軍叅軍劉欽之皆被執送於長安勃勃殺之勃勃既破闗中斬戮無數時有沙門曇始亦遇其害而刅不能傷勃勃異之遂赦沙門於是羣臣勸進勃勃曰朕無撥亂之才不能𢎞濟兆庶自枕戈寢甲十有二年而四海未同遺冦尚熾不知何以謝責當年垂之來葉將明揚側陋以王位讓之然後歸老朔方琴書卒嵗皇帝之號豈朕薄德所膺羣臣固請乃許之遂築壇於㶚上僭即皇帝位大赦境内殊死已下改元昌武文武百官進位各有差魏太宗與崔浩論近世君臣因問浩曰屈丏何如浩曰屈丏家國夷滅一身孤寄為姚氏封殖不思樹黨强隣報仇雪恥乃結忿于蠕蠕背德于姚興橛豎小人無大經畧正可殘暴終為人所滅耳太宗大悅屈丏前作屈孑真興元年春正月勃勃遣將軍叱奴侯提率歩騎二萬攻晉并州刺史毛德祖於蒲坂德祖不能禦全軍歸洛陽以侯提為并州刺史鎮蒲坂勃勃歸於長安二月徴隠士韋𤣥𤣥既至懼而禮拜甚過勃勃怒而殺之羣臣請都長安勃勃曰朕豈不知長安累帝舊都山河四塞沃饒險固但荆呉僻逺勢不能為人之患東魏與我風俗畧同壤境隣接自統萬去魏境裁數百餘里朕在長安統萬必危恐有不守之憂若在統萬彼終不敢濟河而西諸卿特未見及此耳羣下咸曰非所及也乃於長安置南臺以太子璝領大將軍雍州牧録南臺尚書事鎮長安勃勃因田於三交至淥漣池遂還萬統以宫殿大成赦其境内殊死已下又改元真興刻石都南命秘書監胡義周頌紀功徳勃勃好自矜大名其四門南曰朝宋門東曰招魏門西曰服涼門北曰平朔門勃勃遣騎三千攻魏河西魏遣散騎常侍丘堆自并州與故秦遊擊將軍王洛生等來拒奔還夏四月吐谷渾覔地聚衆六千於弱水南遣使來降勃勃拜為弱水護軍真興二年夏五月雨魚於統萬冬十月起冲天臺於統萬南山欲登之以望長安追尊髙祖誥汁爰為元皇帝曾祖虎為景皇帝祖務桓為宣皇帝父衛辰為桓皇帝廟號太祖母苻氏為桓文皇后真興三年真興四年真興五年真興六年冬十二月勃勃將廢太子璝為秦王而立少子酒泉公倫為太子璝聞將廢已自長安率衆七萬北伐倫倫率騎三萬拒之戰於高平為璝所敗倫死之勃勃中子太原公昌率騎一萬襲殺璝遂併其衆八萬五千歸於統萬勃勃大悅立昌為太子勃勃性凶暴好殺視民如草芥無順守之規常居城上置弓劍於側有所嫌忌便手自殺之羣臣忤視者鑿其目笑者決其唇諫者謂之誹謗先絶其舌而後斬之夷夏􅅝然人無生賴真興七年夏六月太廟崩陷秋七月勃勃寢疾既而疾甚輦昇永安殿召羣臣屬以後事八月癸卯卒時年四十五在位十九年偽諡武烈皇帝葬嘉平陵廟號世祖勃勃僭立十三年而宋氏受禪以元嘉二年死是魏世祖始光二年也十六國春秋卷六十六
