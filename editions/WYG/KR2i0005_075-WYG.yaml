body:
  text: 十六國春秋卷七十五前凉録六張肅張肅寔之叔父也為建威將軍西海太守劉曜逼長安肅聞京師危迫請為先鋒入援寔以肅年老弗許肅曰狐死首丘心不忘本鍾儀在晉楚弁南音肅受晉寵剖符列位羯逆滔天朝廷傾覆肅晏安方裔難至不奮何以為人臣寔曰門戸受重恩自當合族效死忠衛社稷以申先公之志但叔父春秋已髙􅂔力衰竭軍旅之事非耆耄之所堪也乃止及聞長安不守愍帝蒙塵悲憤而卒張瓘張瓘祚宗人也為河州刺史士衆強盛祚猜忌之宻遣兵圖瓘瓘率衆拒之殺祚於萬秋閣遂入姑臧立𤣥靚為凉王自為凉州牧瓘性猜惡賞罰皆以愛憎無復綱紀郎中殷邭陳損益諫瓘瓘曰虎生三日自能食肉不須人教也由是人情不附莫有言者後又謀廢𤣥靚而自立事未遂間與𤣥靚同車出城城西橋梁牢壯而三梁忽摧折又數見祚來部從鎧甲舉手指瓘云氐奴要當截汝頭瓘甚惡之乃日日散錢帛於人以樹私惠而都街殺人朝夕不絶思為亂者十室而九東苑大冡上忽有流水城北大澤地忽火燃廣延數里乃殺宿嫌牛旋等以應水火之變刺史舊事正旦放鳥瓘所放出手輙死有􅔏來巢廣夏門弹逐不去自徃看之宋混遣弟澄即於巢所害瓘瓘臨命語澄曰汝荷婚姻而反為逆皇天后土必當照之我自可死當令汝暨我矣乃先殺妻子三十口而自殺先是太白守輿鬼占者以為州分當有暴兵瓘欲誅諸宋以厭之而瓘竟為澄等所殺嚴氏嚴氏重華之嫡母也少有志操率下嚴厲慷慨有丈夫之節重華嗣立尊為太王太后居於永訓宫及天錫僣位仍尊為太王太后天錫滛昏驕恣不恤民務又不朝於永訓宫從事張慮輿櫬切諫且求大覲天錫不納太后尋以憂卒馬氏馬氏重華所生母也羙姿儀初為駿昭儀重華嗣位尊為王太后居於永夀宫會重華卒遺命冊拜世子靈耀為嗣其庶兄長寧侯祚先與馬氏蒸滛乃宻説馬氏以靈耀幼冲須立長君馬氏從之祚遂僣立滛虐不道族人河州刺史瓘起兵誅討領軍趙長等懼罪乃入閣呼馬氏出謙光殿立𤣥靚為主而殺之遂尊為太王太后晉興元年卒閻氏薛氏天錫妾閻氏薛氏並不知何許人因色並有殊寵天錫寢疾謂之曰汝二人將何以報我我死之後豈可更為人妻乎皆曰尊若不諱妾請效死於前供掃灑於地下耳誓無他志也疾篤二姬皆自刎及疾瘳天錫追悼之以夫人禮葬焉宋配或作宋醜宋配字仲業燉煌人也慷慨有大志清素敦朴不好華競形狀短小體有麟甲軌任為謀主鮮卑若羅拔能為冦軌以配為司馬率兵擊之斬拔能俘虜十餘萬屢立戰功及劉曜入冦京都傾䧟軌復以配為前鋒督䕶帥歩騎二萬徑至長安翼衛乘輿折衝左右仕至西平太守宋混宋混字𤣥一燉煌人仕重華驍騎將軍張瓘之誅祚也混起兵應之及瓘擅政苛虐任情乃欲謀誅諸宋廢𤣥靚自立混知之與弟澄率衆誅瓘𤣥靚以混為驃騎大將軍尚書令輔政混書寢見瓘從屋而下奄入柱中其柱狀若火燒掘之則無所見乃大驚怖因而寢疾𤣥靚及祖母馬氏徃省之曰將軍萬一不幸寡婦孤兒將何以託欲以林宗繼將軍可乎混曰臣子林宗幼弱不堪大任殿下倘未棄臣臣弟澄政事頗愈於臣但恐其懦緩機事不稱耳殿下策厲而使之可也混戒澄及諸子曰吾家受國大恩當以死報無恃勢位以自驕人又見朝士皆戒之以忠貞及卒行路之人為之流涕宋澄宋澄字𤣥安混之弟也混死澄代為領軍將軍輔政時以旱祈雨帶石山澄欲登之左右曰世人云登此山者家破身亡澄曰安有此也策馬登之馬倒傷足御史房屋柱自燃燋折或曰柱之為字也左木右主宋字含木木燋宋破而主存災之大也宜防之又所乘馬五疋在厩中一夜髦尾盡秃人曰尾之為字也上尸下毛髦尾盡秃毛去尸存絶滅之徴也澄曰吉凶在天知可如何澄後燃燈油忽變為血二嵗小兒作為老公呼曰宋澄斫汝頭又城東水中出火未及一年司馬張邕惡澄専擅起兵殺之盡誅宋氏先是謡曰滅宋者田土子邕一名野至是而應焉宋矩宋矩字處規燉煌人也慷慨有志節仕重華為宛戍都尉石虎遣麻秋等攻大夏大夏䕶軍梁彧一作式執太守宋晏以城應之秋遣晏以書致矩矩既至謂秋曰辭父事君當立功與義茍功義不立當守名節矩終不肯背主覆宗偷生於世也乃先殺妻子自刎而死秋曰義士也命吏人葬之重華嘉其誠節贈振威將軍宋纎宋纎字令文一作艾燉煌效糓人也少有逺操沈靜不與世交隠居酒泉南山明究經緯弟子受業三千餘人不應州郡辟命惟與隂顒齊好友善張祚時太守楊宣􅀞其像於閣上出入視之作頌曰為枕何石為潄何流身不可見名不可求酒泉太守馬岌髙尚之士也具威儀鳴鐃鼔造馬纎髙樓一作扄鎻重門拒而不見岌嘆曰名可聞而身不可見徳可仰而形不可覩吾今而後知先生人中之龍也銘詩於石壁曰丹崖百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纎明究經緯著論語及為詩頌數萬言年八十篤學不倦祚後遣使者張興辟為太子少傅興逼喻甚切纎喟然嘆曰徳非荘生才非干木何敢稽停明命遂隨興至姑臧祚遣太子大和以執友禮造之纎稱疾不見贈遺一皆不受尋遷太子太傅頃之上疏曰臣受生方外心慕太古生不喜存死不悲歿素有遺屬屬諸知識在山投山臨水投水處澤露形在人親士聲聞書數勿告我家今當命終乞如素願遂不食而卒時年八十二謚曰𤣥虚先生汜瑗汜瑗字伯玉燉煌人也與同郡宋配陳琠遇相者於路相者曰三人皆二千石然汜生腹有逆風當以兵死而無後瑗仕軌為中督䕶東𦍑校尉韓稚殺秦州刺史張輔舉兵謀叛瑗率衆二萬討稚乃先遺稚書令其速降稚遂率衆迎降未幾瑗為亂兵所殺汜勝晉書作汜騰汜勝字無忌燉煌人舉孝亷除中郎值天下亂乃去官還鄉里太守張閟造之閉門不見禮遺一無所受嘆曰生於亂世貴而能貧乃可以免家財五十萬悉散之於宗族柴門灌園以琴書自娯軌徴為府司馬固辭不受曰門一杜其可開乎病兩月而卒汜褘汜褘字休臧燉煌人為福禄令剛直不事上府酒泉太守馬漢遣督郵張休祖劾之休祖謂褘曰君不聞寧逢三千頭虎不逢張休祖乎褘怒以印繫肘而就縛縛訖發印以告事聞休祖坐不解印擅縛令長以大不敬論褘左遷居延令後仕寔為左長史汜昭汜昭字嗣先燉煌人也辟州主簿志在理枉申滯有人於夜中投昭以黄金者昭責而遣之其人大慙而退辛攀辛攀字懐逺隴西狄道人也父晉尚書郎兄鑒曠弟寳迅皆以才識著名秦雍為之諺曰三龍一門金友玉昆攀年七嵗隨父在京師北地程曉攀之親友目攀而笑曰犁牛騂犢孺子之謂攀曰戯及人親非雅訓也曉及賓客大竒異之建安三年為晉大鴻臚使涼遂留仕軌辛慿辛憑字士彦隴西狄道人也仕茂為燉煌太守惟有一子髦至狄道省墓遇枹罕䕶軍辛晏反叛為晏所執慿勸茂討晏茂曰髦在彼如何慿曰人臣奉主豈顧子乎茂曰子純臣也乃賜爵闗内侯辛理辛理隴西人綝弟也羙容貎軌欲奪其妻以寡妹妻之理割鼻自誓軌不能強大怒徙為燉煌太守䕶𦍑校尉遂以憂死江瓊江瓊字孟琚陳留濟川人初仕晉為馮翊太守善蟲篆詁訓永嘉之亂棄官西奔遂仕於軌子孫因居涼土世傳家業王横王横太原晉陽人仕軌為叅軍晉室之亂遂奔於武威之姑臧子孫因世居焉張世度張世度燉煌人也幼以孝讓著稱遊學京師遇中州大疫鄉人宗族死於京師者十餘人世度年十六收恤殯𦵏識者嘉之索孚索孚字國明燉煌人善射十中八九或謂之曰射有法乎孚曰射之為法猶人主之治天下也射者弓有強弱矢有銖兩弓不合度矢不端直主雖逢蒙不能以中才不稱官萬務荒怠雖以堯舜之君亦無以治也駿辟為叅軍時駿議治石田孚諫曰凡為治者動不逆天機作不破地徳昔后稷之播百糓不墾磐石禹決江河不逆流勢今欲徙石為田運土植糓計所損用畆盈百石所收不過三石而已竊所未安駿怒出為伊吾都尉累遷至張掖太守後河州刺史張瓘鎮枹罕士衆强盛祚猜忌之乃以孚代鎮枹罕為瓘所殺索襲索襲字偉祖燉煌人虚靖好學州郡屢徴不就舉孝亷賢良方正皆以疾辭游思隂陽之術著天文地理十餘篇多所啟發不交當世或獨語獨笑或長嘆涕泣或請問不言茂時燉煌太守一作武威隂澹造之與言終日樂而忘反出而嘆曰索先生碩徳名儒真可以諮大義澹欲行鄉射之禮請襲為三老曰今四表寧輯將行鄉射之禮先生年耆望重道冠一時養老之義實繫儒賢既樹非梧桐而希鸞鳯降翼器謝曹公而冀盖公枉駕誠非所謂也然夫子至聖有召即赴孟軻大徳無聘不至盖欲𢎞闡大猷敷明道化故也今之相屈遵道崇教非有爵位意者或可然乎㑹病卒時年七十九澹素服㑹𦵏贈錢二萬澹曰世人之所有餘者富貴也目之所好者五色也耳之所玩者五音也而先生棄衆人之所收收衆人之所棄味無味於怳惚之際兼重𤣥於衆妙之内宅不彌畆而忘忽九州形居塵俗而棲心天外雖黔婁之髙逺荘光之不願蔑以過之乃謚曰𤣥居先生索丞索丞字伯夷燉煌人善鼓筝悲歌能使喜者墮淚改調易謳能使戚者起舞當時之人號曰雍門調索苞索苞燉煌人有文武材藝舉孝亷除郎中毎征伐尅敵勇冠三軍時人比之闗羽宋澄於金城為歩𦍑三千人所圍窮守孤違埀當破沒苞以車騎五千奮劍􅊳陣徑入與澄對坐搥頭拊掌大笑𦍑皆佩楯耀刃四面直前苞謂澄曰君但安心觀我擊之乃徐彄弓接矢繞搥射之莫不應弦而倒皆䧟楯通中立殺三十餘人創夷者百計𦍑即散走稱神索紞索紞字叔徹燉煌人少游京師受業太學愽綜經籍遂為通儒明隂陽天文善術數占候知中國將亂避世而歸鄉人從紞占問吉凶門中如市紞曰攻乎異端戒在害已無為多事多事多患遂詭言虛説無騐乃止唯以占夢為無悔吝乃不逆問者孝亷令狐策夢立氷上與氷下人語紞曰氷上為陽氷下為隂隂陽事也如君所夢迨氷未泮婚姻事也君在氷上與氷下人語為陽語隂媒介事也君當為人作媒氷泮而婚成策曰老夫耄矣不為媒也㑹太守田豹因策為子求鄉人張公徴女恰至仲春而成婚郡主簿張宅夢走馬上山還繞舎三周但見松柏不知門處紞曰馬為離離為火火禍也人上山為凶字但見松柏墓門像也不知門處為無門也三周三期也君後三年必有大禍宅果與寔妻弟賈摹謀反伏誅黄平問紞曰我昨夜夢舎中馬舞數十人向馬拍手此何祥也紞曰馬者火也舞為火起向馬拍手救火人也平未歸而火作郡功曹張邈常奉使晉州夢狼噉一脚紞曰脚肉被噉為却字㑹東虜反遂不果行宋桶夢内中有一人著赤衣桶一手把兩杖極打之紞占曰内中有人是肉字也肉色赤也兩杖箸象也極打之飽食肉也過三日過三家皆得食肉矣凡所占夢莫不終騐太守隂澹命紞為西閣祭酒紞辭曰少無山林之操遊學京師交結時賢希申鄙藝㑹中國不靖欲養志終年老亦至矣不求聞逹又少不習勤老無吏幹濛汜之年弗敢聞命澹以束帛禮之月致羊酒年七十五卒於家如君所夣一作士如歸妻索綏索綏字士艾燉煌人父戢晉司徒綏家貧好學幼舉孝亷為記室祭酒母喪去官又舉秀才為儒林祭酒駿命西曹掾集閣内外事付綏著涼春秋五十卷又作六夷頌命𫝊十餘篇以著述之功封平樂亭侯初綏夢東有二角書詣綏大角朽敗小角有題韋嚢角佩一在前一在後以問索紞紞曰大角朽敗腐棺木也小角有題題所詣一在前前凶也一在後後背也當有凶背之問時綏父在東居三日而凶問果至重華時讌羣臣於閑豫堂講論經義顧問綏曰孔子婦誰家女老􅔶父字為何四皓既輔太子住乎還山乎綏曰孔子婦姓丌官氏女老􅔶父名乹字元泉貽則無耳一目不明孤单年七十二無妻與隣人益夀氏老女野合懐胎八十年乃生老子四皓還不臣尚未悉重華曰卿不知乎四皓死於長安今長安有四皓墓為不還山也𤣥靚僭號五年夏六月大旱令諸祈雨之官皆詠雲漢詩綏曰雲漢陳周宣之羙非祈旱之文昔周鼎之出漢吾丘不賀今辭與事違恐非致澤之意也𤣥靚乃止索充索充燉煌人充夣天上有二棺落於充前以問索紞紞曰棺者職也當有京師貴人舉君二官者頻再遷俄而司徒書属太守使舉充太守先署守功曹既舉孝亷充後夢見一虜脱上衣來詣充紞曰虜去上半下半男字也又屬隂𩔖君婦當生男終如其言隂澹隂澹燉煌人弱冠才行忠烈州請為治中從事澹割身訴枉軌任為股肱叅與機宻轉督䕶叅軍武威太守軌保涼州澹之力居多澹嘗從索紞求占夢書紞曰昔入太學因一父老為主人其人無所不知又匿名姓有似隠者紞因從父老問占夢之術審測而説實無書也卒不與及駿嗣位澹弟鑒為鎮軍將軍駿以隂氏門宗强盛而功多也遂忌害之乃諷其主簿魏纂誣鑒謀反逼令自殺於是大失人情既而駿病見鑒為祟遂死其後三年纂亦病見鑒在側亦死張諮張諮燉煌人也仕軌為著作郎撰涼記八卷多記軌事張斌張斌一作賦文字洪茂燉煌人作蒲蔔酒賦文致甚羙初舉孝亷夢竪竿中天以問索紞紞曰此未字也既而果停張植張植仕駿為西域校尉與奮威將軍牛霸蠻騎校尉張冲從沙州刺史楊宣征西域時值六月至於流沙無水士卒渇甚死者過半植乃剪髪肉袒徒跣升壇慟泣祈雨俄而雲起西北雨水成川乃殺所乘馬祭天而去遂平西域以功拜西域都尉重華時石虎使王擢麻秋等攻武威進次金城太守張冲告急植復與奮威牛霸率騎救之城䧟引還李弇李弇字子完隴西狄道人也弇本名良又妻姓梁駿乃戯之曰卿名良妻姓梁夫妻相同稱子孫將何以目其舅氏昔耿弇以少年立功立事吾今頼卿有同於耿氏乃改名曰弇仕至武衛將軍天水太守封安世亭侯其孫暠王有涼土遂為西涼王常據一作張璩常據字元琰燉煌人也年十四拜奉車都尉從梁肅征隴右與王擢遇於邢崗相拒十餘日據銜枚宻擊遂大破之由是顯名遷寧戎校尉麻秋之攻枹罕也據固守大城秋率衆圍城上西北隅據使宋􅁱等拒之短兵接戰俘斬二百餘人秋衆乃退重華時仕為騎都尉性直敢言見長寧侯祚與寵臣趙長等結異姓兄弟謀將為亂心不平之重華末年有螽斯蟲集安昌門外縁壁逆行據因諫曰螽斯是祚小字今乃逆行災之大者願請出祚以安涼土重華曰子孫繁昌之徴何為災也吾昨夢祚攝位方委以周八之事使輔幼子君是何言也及重華卒祚果殺靈耀涼州大亂天錫嗣位遷為征東將軍秦苻堅使姚萇等攻涼據率衆三萬軍洪池欲先擊姚萇須天錫命㑹萇率甲士三萬為前驅與據戰於洪池據兵敗績馬為亂兵所殺其属董儒授之以馬據曰吾三督諸軍再秉節鉞八將禁旅十總外兵寵任極矣今卒困於此此吾之死地也尚安之乎乃就帳免胄西向稽首伏劍而死馬岌馬岌仕茂為叅軍劉曜自隴上率兵來擊涼州大振岌勸茂親出拒之乃出次石頭曜衆引退及駿嗣位轉為涼州刺史酒泉太守岌上言酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山此山上有石室王母堂珠璣鏤飾煥若神宫禹貢崑崙在臨江之西即此明矣宜立西王母祠以禆朝廷無疆之福駿從之乃為立祠祀之重華時為左長史祚既即位累遷尚書時災異屢見而祚滛虐滋甚岌以切諌免官後祚慮秦降將王擢反噬乃召岌復位而與之謀宻遣人刺擢事竟不克為擢所殺張冲張冲字長思燉煌人家財巨萬悉以散之鄉閭時人為之謡曰推財不疑張長思趙將麻秋進軍武威冲為金城太守衆寡不敵遂以城降秋童巽童巽字子舉􅀶學有才太守京兆諒舉巽上掾歴主簿功曹諒後卒官巽衰絰送喪道遇冦虜衆皆散走巽以身蔽柩慟哭嘔血賊欲破棺巽叩頭救請頭破血流賊義而釋之由是顯名車濟車濟字萬度燉煌人也果毅有大量仕重華為金城令石虎將麻秋攻䧟武威金城太守張冲降之濟守節不為秋屈秋必欲降之臨之以兵濟辭色不撓曰吾雖才非龎徳而受任同之身可殺志不可移乃伏劍而死秋嘉其忠節以禮𦵏之後重華迎致其喪親臨慟哭贈宜禾都尉謝艾謝艾燉煌人仕重華為主簿兼資文武明識兵略麻秋入冦涼州艾自許破敵乃以為中堅將軍帥歩騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟者邀也六􅀶得梟者勝今梟鳴牙中剋敵之兆於是進戰遂大破之封為福禄伯既而以艾為使持節軍師將軍率歩騎三萬進次臨河逆擊麻秋艾乘軺車戴一作冠白帢鳴鼓而行秋遥覩而怒曰艾年少書生冠服如此輕我也命黒矟龍驤三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡床指麾處分秋等以為伏兵發也懼不敢進又遣將縁河截其後秋軍敗走艾乘勝追擊復大破之斬秋將杜勲汲魚俘斬一萬三千級秋单馬奔大夏以功遷太府左長史進封福禄縣侯食邑五千戸帛八千匹麻秋復據枹罕有衆十二萬進屯河南使王擢略地晉興艾復為持節都督征討諸軍事率歩騎二萬拒之艾建牙旗盟將士有西北風吹旌旗東南指軍正將軍任遐曰風為號令今旌旗指敵天所賛也破之必矣乃宻令與陽初曰今遣舎人孔章持口論要宻將軍可差心腹人詣致珊瑚鞭勒一具遺王擢使王擢狐疑於將軍父子事得施矣軍次神烏王擢與艾前鋒戰敗退遁河南艾遂進擊秋秋遁歸金城艾乃為表獻晉帝云登三緯地乘六御天靖掃妖氛廓清異𩔖重華以艾枹罕之功甚寵遇之左右疾其賢共相􅉲毁出為酒泉太守重華寢疾嬖臣趙長等與長寧侯祚結異姓兄弟艾上疏言權倖用事公室將危乞聽臣入侍且言長寧侯祚及趙長等將為亂宜盡逐長等既而疾甚手令徴艾為衛將軍監中外諸軍事輔政長等匿而不宣祚既僣立追恨殺之先是涼州大風㧞木黄霧下塵識者以為任非其人之象㑹重華信譛出艾未幾身死嗣子見殺是其應也張頎張頎仕天錫為西域校尉天錫僣位元年頎以舊怨殺麴儉儉臨刑具言取之後頎見白狗以刀斫之不中頎便倒地不起左右見儉在傍遂暴卒郭荷郭荷字承休略陽人也六世祖整漢安順之世公府八辟五徴皆不應命自整及荷世以經學致位荷明究羣籍善史書不就州郡之命祚遣使者以安車束帛徴為愽士祭酒使者迫而致之及至署為太子友荷上疏乞還祚許之遣安車蒲輪送還張掖東山年八十四卒謚曰𤣥徳先生祁嘉祁嘉字孔賓酒泉人也少清貧好學年二十餘夜忽聞牎中有聲呼曰祁孔賓祁孔賓隠去來隠去來脩飾人世間甚苦不可諧所得未毛銖所喪如山崖旦而逃去西至燉煌依學宫誦書貧無衣食為書生厮養以自給遂愽通經傳精究大義西遊海渚教授門生百餘人重華徴為儒林祭酒性和裕教訓不倦依孝經作二九神經在朝卿士郡縣守令彭和正等受業獨拜床下者二千餘人天錫謂為先生而不名之竟以夀終張存張存燉煌人善針存有奴好逃亡存宿行針縮奴脚不得動欲使别更以針解之十六國春秋卷七十五
