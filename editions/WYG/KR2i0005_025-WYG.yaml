body:
  text: 十六國春秋卷二十五前燕錄三慕容皝下咸康六年春正月高句驪王釗遣世子來朝初段遼之敗也建威將軍翰奔於宇文逸豆歸自以威名夙振終不保全乃陽狂恣酒被髮歌呼歸信而不禁以故得周遊自任至於山川形便攻戰要路莫不練之皝遣商人王車隂使察翰翰見車無言撫膺而已車還以白皝曰翰欲來也乃遣車遺翰弓矢翰因以逃歸皝大悦賜遇甚厚秋八月皝自以雖稱燕王未受晉命乃遣長史劉翔一作祥下同叅軍鞠運獻㨗京師兼言權假之意并請刻期大舉討平中原又聞庾亮薨弟冰翼繼為將相乃表曰臣究觀前代昏明之主皆能親賢竝建則政致昇平若親黨后族必有傾辱之禍是以周之申伯號稱賢舅以其身藩於外不握朝權降及秦昭足為令主委信二舅幾至亂國逮於漢武推重田蚡萬機之要無不決之及蚡死後切齒追恨成帝闇弱不能自立内惑艷妻外恣五舅卒令王莽坐取帝位每覽斯事孰不痛惋設使舅氏賢若穰侯王鳯則但聞有二臣不聞有二主若其不才則有竇憲梁冀之禍凡此成敗亦既昭然茍能易軌可無覆墜陛下命世天挺當隆晉道而遭國多難殷憂備嬰追述往事至今焚灼迹其所由實因故司空亮居元舅之尊勢業之重執政裁下輕侮邊將故令蘇峻祖約不勝其忿遂致敗國至令太后發憤一旦升遐若社稷不靈人神無助豺狼之心當可極邪前事不忘後事之表而中書監左將軍冰等内執樞機外擁上將昆弟竝列人臣莫儔陛下深敦渭陽冰等自宜引領臣常謂世主若欲榮顯舅氏何不封以藩國豐其禄賜限其勢利使上無偏優下無私論如此榮辱何從而生噂􅊱何辭而起往者惟亮一人宿有名望尚致召變況今居之者素無聞焉且人情易惑難以户告縱令陛下無私於彼天下之人誰謂不私乎臣與冰等名位殊班出處懸邈又國之戚昵理應降悦以適事㑹臣獨矯抗此言者上為陛下退為冰計疾茍容之臣坐鑒得失顛而不扶焉用彼相昔徐福陳霍氏之戒宣帝不從至令忠臣更為逆族良由察之不審防之無漸臣今所陳可謂防漸矣但恐陛下不明臣之忠不用臣之計事過之日更處焦爛之後耳王章劉向每上封事未嘗不指斥王氏故令二子或死或刑谷永張禹依回一作違不對故容身茍免取譏於世臣被髮殊俗位為上將夙夜惟憂罔知所報惟當外殄寇讐内盡忠規陳力輸誠以答國恩臣若不言誰當言者又與冰書曰君以椒房之親舅氏之昵總據樞機出内王命兼擁列將州司之位昆弟網羅顯布畿甸自秦漢以來隆赫之極豈有若此者乎以吾觀之若功就事舉必享申伯之名如或不立不免梁竇之迹矣每觀史傳未嘗不寵恣母族使執權亂朝先有殊世之勲尋有負乗之累所謂愛之適足以為害吾嘗忿歴代之主不盡防萌終寵之術何不業以一土之封令藩國相承如周之齊陳如此則永保南面之尊復何黜辱之憂乎竇武何進虚已好善天下歸心雖為閹豎所危天下嗟痛猶有能履以不驕圖國亡身故也方今四海有倒懸之急中夏逋僭逆之寇家有漉血之怨人有復讐之憾寧得安枕逍遙雅談卒歲吾雖寡德過䝉先帝列將之授以數郡之人尚欲并吞强虜是以自頃及今交鋒接刃一時務農三時用武而猶師徒不頓倉有餘粟敵人日畏我境日廣況乃王者之威堂堂之勢豈可同年而語哉九月皝將圖石氏謂諸將曰石虎自以安樂諸城防守重複薊城南北必不設備今若詭路出其不意冀之北土可盡破也冬十月皝親率驍騎二萬出􅝡螉塞襲趙戍將當道者皆擒之長驅至於薊城趙幽州刺史石光擁兵數萬閉城拒守不敢出戰遂破武遂津入於高陽所過焚燒積聚掠徙幽冀三萬餘户而還咸康七年春正月皝以柳城之北龍山之南一作西字福地也使唐國内史陽裕等築龍城搆門闕宮殿廟園廟園一作宗廟籍田遂改柳城為龍城縣時棘城黒石谷黒石谷三字一作里字有大石自立而行二月乙卯長史劉翔等至建康成帝引見問慕容鎮軍平安對曰臣受遣之日朝服拜章翔為皝求大將軍假燕王章璽朝議以為故事大將軍不處邊自漢魏以來不封異姓為王所求不可許翔曰自劉石搆亂長江以北謭為戎藪未聞中華公卿之胄有一人能攘臂操戈摧破凶殘者也獨慕容鎮軍父子竭力心存本朝以寡擊衆屢殄强敵使石虎畏懼悉徙邊陲之民散居三魏蹙國千里以薊城為北境功烈如此而惜海北之地不以為封邑何哉昔漢高祖不愛王爵於韓彭故能成其帝業項羽刓印不忍授卒用危亡吾之至心非茍欲尊其所事竊惜聖朝疎忠義之國使四海無所勸慕耳尚書諸葛恢翔之妹一作姊夫也獨主異議以為夷狄相攻中國之利惟名與器不可輕許乃謂翔曰借使慕容鎮軍能除石虎乃是復得一石虎也朝廷何賴焉翔曰􅄔婦猶知恤宗周之隕今晉室阽危君位侔元凱曽無憂國之心邪向使靡鬲之功不立則少康何以祀夏桓文之戰不㨗則周室皆為左袵矣慕容鎮軍枕戈待旦志殄兇逆而君更唱邪惑之言忌間忠臣四海所以未一良由君輩耳翔留建康歲餘衆議終不決翔乃説中常侍彧𢎞曰石虎苞八州之地帶甲百萬志吞江漢自索頭宇文暨諸小國無不臣服惟慕容鎮軍翼戴天子精貫白日而更不獲殊禮之命竊恐天下移心解體無復南向者矣公孫淵無尺寸之益於吳吳主封為燕王加以九錫今慕容鎮軍屢摧賊鋒威振秦隴虎比遣重使甘言厚幣欲授以曜威大將軍遼西王慕容鎮軍惡其非正却而不受今朝廷乃矜惜虚名沮抑忠順豈社稷之長計乎後雖悔之恐無及已𢎞為之入言於帝帝意亦欲許之皝又書與庾冰責其兄弟秉權不能為國雪恥冰見書甚懼以其絶逺非所能制遂與何充等奏聽皝稱燕王時庾翼答書與皝云鄧伯山昔送此犀皮兩襠鎧一領雖不能精好謂是異物故復致之乙卯成帝使兼大鴻臚郭悕一作希持節拜皝使持節侍中大將軍大都督河北諸軍事幽州牧大單于燕王備物典䇿皆從殊禮又以世子儁為假節安北將軍東夷校尉左賢王賜軍資器械以千萬計又封諸功臣百餘人以翔為代郡太守封臨泉鄉侯加員外散騎常侍翔固辭不受翔疾江南士大夫以驕奢酬縱相尚嘗因朝貴宴集謂何充等曰四海板蕩奄踰三紀宗廟為墟黎民塗炭斯乃廟堂焦慮之時忠臣畢命之秋也而諸君晏安江沱肆情縱欲以奢靡為榮以傲誕為賢蹇諤之言不聞征伐之功不立將何以尊主濟民乎充等甚慙及翔北還棘城公卿餞之翔曰昔少康資一旅以滅有窮句踐憑㑹稽以報強吳蔓艸猶宜早除況寇讐乎今石虎李壽志相吞噬王師縱未能澄清北方且當從事巴蜀一旦石虎先人舉事併壽而有之據形便之地以臨東南雖有智者不能善其後矣中䕶軍謝廣曰是吾心也秋七月郭悕劉翔等至燕皝以翔為東夷校尉領大將軍長史以唐國内史陽裕為左司馬典書令李洪為右司馬中尉鄭林為軍諮祭酒九月皝以恪為渡遼將軍鎮平郭平郭自翰仁之後諸將軍無能繼者及恪至撫舊懷新屢破高句驪兵句驪畏之不敢入寇冬十二月皝遣使聘魏并薦其宗女咸康八年夏六月石虎率衆來伐皝大破之秋七月丁卯皝營龍城新殿昌黎大棘縣城河岸崩出鐵築頭一千一百七十四枚永樂民郭陵見之詣皝言狀以是日到皝曰經始營殿鐵築具出神人允協之應也遂賜陵爵闗内侯冬十月皝遷都龍城大赦境内十一月皝親帥勁卒四萬入自南陜以伐宇文高句驪使建威將軍翰及平狄將軍霸為前鋒别遣長史王寓等勒衆萬五千從北道而進高句驪王釗謂皝軍之從北路也乃遣弟武統精鋭五萬拒北道躬率嬴兵以防南陜翰等先至與釗戰於木底皝以大衆繼之左常侍鮮于亮與數騎先犯高句驪陣所向摧䧟句驪陣動大衆因而乗之句驪大敗左長史韓壽斬其將阿佛和度加諸軍乗勝追之遂入丸都釗單馬遁走輕車將軍慕輿埿追獲其母周氏及妻而還㑹王寓等戰於北道軍皆敗没由是皝不復窮追遣使招釗釗不出皝將還韓壽曰高句驪之地不可戍守今其主亡民散潛伏山谷大軍既去必復鳩聚收其餘燼猶足為患請載其父尸囚其生母而歸俟其束身自歸然後返之撫以恩信䇿之上也皝從之掘釗父乙弗利墓載其尸并其母妻收其府庫累世珍寳掠男女五萬餘口焚其宮室毁丸都城而還晉康帝建元元年春二月高句驪王釗遣其弟稱臣於皝貢方物以千數乃還其父尸猶留其母為質宇文逸豆歸遣其相國莫淺渾將兵來伐諸將爭欲擊之皝不許渾以皝為憚之荒酒縱獵不復設備皝曰渾奢怠已甚今則可一戰矣遣翰帥騎擊之渾大敗僅以身免盡俘其衆秋七月昭成帝復求婚於皝皝使納馬千疋為禮昭成不與又倨慢無子壻禮八月皝遣世子儁帥前軍師將軍評等伐之昭成率衆遁走評等無所見而還冬十月皝躬巡郡縣勸課農桑復大起龍城宮闕建元二年春正月皝與左司馬高詡謀伐宇文逸豆歸詡曰伐之必克然不利於將皝遂親帥騎二萬伐之以翰為前鋒將軍劉佩副之分命廣威将軍軍渡遼將軍恪平狄將軍霸及折衝將軍慕輿根將兵三道竝進逸豆歸遣驍將南羅大涉奕干紀事本末作涉夜干將精兵拒翰皝遣人馳謂翰曰奕干雄悍勇冠三軍宜小避之待虜勢驕然後取也翰曰逸豆歸掃其國内精鋭以屬涉奕干奕干素有勇名一國所賴也今若克之其國不攻自潰矣且吾熟知奕干之為人徒有虚名實易與耳不宜縱敵以挫吾兵氣於是進戰翰自出衝陣奕干出應之霸從旁邀擊遂斬奕干宇文士卒見奕干死不戰而潰燕兵乗勝逐之遂克其都城逸豆歸逺遁死漠北宇文氏由是散亡皝悉收其畜産資貨闢地千餘里徙其部民五萬餘落於昌黎改涉奕干所居城為威德城使弟左將軍彪戍之而還高詡劉佩皆中流矢卒初逸豆歸事趙甚謹貢獻屬路及皝伐逸豆歸石虎使右將軍白勝并州刺史王霸自甘松出救之比至宇文氏已亡因攻威德城不克而還彪追擊破之皝行飲至之禮論功行賞各有差翰與宇文戰為流矢所中臥病積時不出後漸差於家試馬或告翰欲為變乃賜翰死詳具翰傳二月昭成帝遣其大人長孫秩迎后於燕夏四月趙平北將軍尹農率衆寇凡城不克而去秋七月皝遣使奉聘求交婚於魏昭成許之九月以烈帝韓翳槐女妻之晉穆帝永和元年春正月皝以牧牛給貧家使佃苑中公收其八二分入私自有牛而無地者亦佃苑中公收其七三分入私皝記室叅軍封裕諫曰臣聞聖王之宰國也薄賦而藏於百姓分之以三等之田十一而税之寒者衣之飢者食之使家給人足雖水旱而不為災者何也高選農官務盡勸課人治周田百畝亦不假牛力力田者受旌顯之賞惰農者有不齒之罰又量事置官量官置人使官必稱須人不虚位度歲入多少裁而祿之供百僚之外藏之太倉三年之耕餘一年之粟以斯而積公用於何不足水旱其如百姓何雖務農之令屢發二千石令長莫有志勤在公鋭盡地力一作利者故漢祖知其如此以墾田不實徵殺二千石以十數是以明章之世號次昇平自永嘉喪亂百姓流亡中原蕭索千里無烟飢寒流隕相繼溝壑武宣王以神武聖略保全一方威以殄姦德以懷逺故九州之人塞表殊俗襁負萬里若赤子之歸慈父流人之多於舊土十倍有餘人殷地狹故無田者十有三四殿下以殷聖之資克廣先業南摧強趙東滅句驪北取宇文拓境三千里増民十萬户繼武闡廣之功有高西伯宜悉罷諸苑以業流人人至而無資産者賜之以牧牛不當更收重税也且以殿下之人用殿下之牛牛非殿下之有將何在哉善藏者藏於百姓若斯而已矣邇者則深副樂土之望戎旗南指之日中國之人皆將壺飱奉迎石虎誰與居乎且魏晉雖道消之世猶削百姓不至於七八特官牛田者官得六分百姓得四分私牛而官田者與官中分百姓安之人皆悦樂臣猶曰非明王之道而況増乎且水旱之厄堯湯所不免王者宜濬治溝澮循鄭白西門史起溉灌之法旱則決溝為雨水則入於溝瀆上無雲漢之憂下無昏墊之患句驪百濟及宇文段部之民皆兵勢所徙非如中國慕義而至咸有思歸之心今戸垂十萬狹凑都城恐方為國家深患宜分其兄弟宗屬徙於西境撫之以恩檢之以法使不得散在居人知國之虚實今中原未平資畜宜廣官司猥多游食不少一夫不耕歲受其飢必取於耕者而食之一人食一人之力游食數萬損亦如之安可以家給人足治致昇平殿下降覽古今之事多矣政之巨患莫甚於斯其有經畧出世才稱時求者自可隨須致一作置之列位非此已徃其耕而食蠶而衣亦天之道也殿下聖性寛明思言若渇故人盡蒭蕘有犯無隱前者叅軍王憲大夫劉明立竭忠獻欵以貢至言雖頗有逆鱗意在無責主者奏以妖言犯上致之於法殿下慈𢎞包納恕其大辟猶削黜禁錮不齒於朝其言是也殿下固宜納之如其非也宜亮其狂狷罪諫臣而求直言亦猶北行趨越必不得其所志矣右長史宋該等阿媚茍容輕劾諫士已無骨鯁嫉人有之掩蔽耳目不忠之甚四業者國之所資教學者有國盛事習戰務農尤其本也百工商賈特其末耳宜量軍國所須置其員數已外歸之於農教之戰法學者三年無成亦宜歸之於農不可徒充大員以塞聰儁之路臣之所言當也時速施行非也登加罪戮使天下知朝廷從善如流罰惡不掩王憲劉明忠臣也願宥忤鱗之愆收其藥石之效皝乃下令曰覽封記室之諫孤實懼焉君以黎元為國黎元以穀為命然則農者國之本也而二千石令長不遵孟春之令惰農弗勸宜以尤不修闢者措之刑法肅厲屬城主者明詳推檢具狀以聞苑囿悉可罷之以給百姓無田業者貧者全無資産不能自存各賜牧牛一頭若私有餘力樂取官牛墾官田者竝依晉魏舊法溝洫溉灌有益官私主者量造務盡水陸之勢中州未平兵難不息勲誠既多官未可減俟克平兇醜徐更議之百工商賈數四佐與列將速定大員餘者還農學生不任訓教者亦除員祿夫人臣闗言於人主至難也妖妄不經之事皆應蕩然不問擇其善者而從之王憲劉明雖罪應禁黜亦由孤之無大量也可悉復本官仍居諫司封生蹇蹇深得王臣之體詩不云乎無言不酬其錫錢五萬宣示内外有欲陳孤過失者不拘貴賤勿有所諱皝雅好文學嘗親臨庠序勸以講授考校學徒至千餘人頗有妄濫者故封裕及之二月有黒龍白龍各一見於龍山皝親率羣僚觀之去龍二百餘步祭以太牢二龍交首嬉翔解角而去皝大悦還宮赦其境内殊死已下號所居新宮曰和龍宮立龍翔佛寺於山上賜大臣子弟為官學生者號高門生立東庠於舊宮以行鄉飲之禮每月臨觀考試優劣親造太上章以代急就又著典誡十五篇竝以教胄子冬十月皝以古者諸侯即位各稱元年於是始不用晉年號自稱十二年十一月渡遼將軍恪攻高句驪拔南蘇置戍而還平狄將軍霸戍徒河時趙將鄧恒將兵數萬屯樂安將為攻取之計畏霸終不敢犯十三年皝遣世子儁及廣威軍渡遼恪折衝慕輿根三將軍率騎萬七千襲扶餘儁居中指授軍事皆以任恪遂拔扶餘虜其王𤣥及部衆五萬餘口而還皝署𤣥為鎮軍將軍以女妻之十四年春正月皝親臨東庠考試學生其通經秀異者擢充近侍夏五月戊申晉遣使進皝為安北大將軍餘悉如故冬十月饗羣臣於承乾殿右長史宋諺一作該性貪賜布百疋令自負而歸以愧其心皝以久旱丐百姓田租罷成周冀陽營丘等郡以渤海郡為興集縣河間郡為寧集縣廣平魏郡為興平縣束萊北海郡為育黎縣吳郡為吳縣前數郡字一作人字悉𨽻燕國十五年秋七月皝畋於西鄙將濟河見一父老乗白馬舉手麾皝曰此非獵所王宜還也秘之不言遂濟河連日大獲八月皝復見白兎馳馬射之馬倒墜於石上被傷乃説所見輦而還宮遂有疾未幾疾甚引世子儁屬以後事曰今中原未平方經建世務委賢任哲此其時也恪智勇兼濟才堪任重汝其委之以成吾志又曰陽士秋志行高潔忠幹貞固可托大事汝善待之九月丙申薨於承乾殿時年五十二在位十五年冬十月葬於龍山儁僭偽號追諡文明皇帝廟號太祖陵曰龍平十六國春秋卷二十五
