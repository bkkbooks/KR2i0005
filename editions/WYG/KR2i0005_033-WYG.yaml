body:
  text: 十六國春秋巻三十三前秦録一苻洪苻洪字廣世略陽臨渭氐人也其先葢有扈氏之苖裔子孫强盛世居武都為西戎酋長始其家池中生蒲長五丈五節狀如竹時咸異之謂之蒲家因以氏焉父懷歸為部落小帥母姜氏因寢産洪驚覺而寤先是隴右大雨霖百姓苦之謡曰雨若不止洪水必起故因名之曰洪年十二而父卒代為部帥好施多權略驍武善騎射属劉氏之亂乃散千金招延俊傑訪安危變通之術戎晉襁負奔之宗人蒲光蒲突遂共推為盟主劉曜僭號長安遣使拜平逺將軍不受自稱䕶氐校尉秦州刺史略陽公光等逼洪歸曜曜以洪為寧西將軍率義侯及曜敗於洛陽洪率部人西保隴山進為氐主石虎將兵攻上邽洪詣虎降虎大恱親出迎之拜冠軍將軍委以西方之事監六夷諸軍事涇陽伯趙建平四年石生起兵闗中洪遂西結張駿自稱晉北平將軍雍州刺史虎既滅生洪率户三萬下隴東如馮翊說虎徙闗中豪傑及羗戎以實東方曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之拜洪䕶氐校尉徙秦雍及氐羗十餘萬戸於闗東遷龍驤將軍流民都督處於枋頭從征叚遼有功遷光烈將軍進爵為侯尋拜使持節都督六夷諸軍事冠軍大將軍進封西平郡公其部下賜爵闗内侯者二千餘人以洪為闗内領侯冉閔言於虎曰蒲洪雄果得將士死力其諸子皆有非常之才且握強兵五萬屯據近畿宜密除之以安社稷虎曰吾方倚其父子以取吳蜀奈何殺之待之愈厚佛圖澄亦言於虎曰觀蒲氏有王氣請急除之虎隂欲殺洪洪稱疾不朝梁犢之亂虎遣洪以車騎將軍從燕王石斌討之遂平梁犢進為侍中車騎大將軍開府儀同三司都督雍秦州諸軍事雍州刺史改封本國略陽郡公㑹虎卒石遵即位閔又言於遵曰蒲洪人傑也今以洪鎭闗中臣恐秦雍之地非復國家之有此雖先帝臨終之命然陛下踐祚自宜改圖遵從之罷洪都督餘並如前洪怨之乃歸枋頭遣使降晉後石鍳殺遵所在兵起秦雍流民相率西歸路由枋頭共推洪為主衆至十餘萬洪子健在鄴斬闗出奔枋頭鍳懼洪之逼也欲以計遣之乃以洪為都督闗中諸軍事征西大將軍雍州牧領秦州刺史洪㑹官属議應受與否主簿程朴請且與趙連和如列國分境而治洪怒曰吾不堪為天子耶而云列國乎引朴斬之永和六年朝廷規復中原以洪為氐王使持節征北大將軍都督河北諸軍事冀州刺史廣川郡公健為假節右將軍監河北征討前鋒諸軍事襄國公時姚弋仲亦有圖據闗中之志恐洪先之遣子襄帥衆五萬伐洪洪迎撃破之斬獲三萬餘級於是安定梁楞等並率闗西民望說洪曰今胡運將終中原喪亂明公神武必成大業繼蹤周漢宜稱尊號以副四海之望洪亦以䜟文有草付應王又孫堅之生背有草付字遂改姓苻氏自稱大都督大將軍大單于三秦王以南安雷弱兒為輔國將軍安定梁楞為前將軍領左長史馮翊魚遵為後將軍領右長史京兆叚陵為左將軍領左司馬王墮為右將軍領右司馬天水趙俱隴西牛夷北地辛牢皆為從事中郎氐酋毛貴為單于輔相洪謂博士胡文曰孤率衆十萬居形勝之地冉閔慕容儁可指辰而殄姚襄父子克之在吾數中孤取天下有易於漢祖初石虎以麻秋鎭枹罕冉閔之亂秋率衆歸鄴洪使子龍驤將軍雄逆撃獲之以為軍師將軍秋因說洪曰冉閔石祗方相持中原之亂未可平也不如先取闗中基業已固然後東征天下誰敢敵之洪深然之既而秋因宴鴆洪欲并其衆世子健收秋斬之洪臨死謂健曰吾所以未入闗者以為中原可指時而定今不幸為䜿子所困中州非汝兄弟所能辦闗中周漢舊都形勝之國進可以一同天下退不失保全秦雍吾死之後便可鼓行而西言終而卒年六十六健僣偽位追諡曰惠武皇帝廟號太祖十六國春秋卷三十三
