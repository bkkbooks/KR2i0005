body:
  text: 十六國春秋卷四十九後燕録七慕容雲慕容雲字子雨寶之養子高句驪之支庶也皝破高句驪徙於青山由是世為燕臣祖父高和自云高陽氏之苗裔故以高為氏雲深沈有局量厚重寡言時人莫知咸以為愚唯中衞將軍長樂馮跋竒其志度與之為友寶之為太子也雲以武藝給事侍東宫永康初拜侍御郎襲敗會軍寶遂子之賜姓慕容氏拜建威將軍封夕陽公及熙嗣位雲以熙政之虐稱疾去官其後因熙出葬苻氏馮跋與從兄萬泥左衞將軍張興及苻進餘黨結盟共襲殺熙跋素與雲善乃推雲為主因詣雲告之雲懼曰吾嬰疾歴年卿等所知願更圖之跋逼曰慕容氏世衰河間昏虐惑妖淫之女而逆亂天常百姓不堪其害思亂者十室而九人神共怒此天亡之時也公自高氏名家何能為他養子機運難遘千載一時公焉得辭扶之而出雲曰吾疾苦日久廢絶世務卿今興建大事謬見推逼所以徘徊非為身也實惟否徳不足以濟元元故耳跋等强之雲遂以晉義熙三年秋七月乙丑僭即天王位復姓高氏大赦境内殊死以下改元正始國仍號大燕八月署馮跋為侍中都督督中外諸軍事征北大將軍開府儀同三司錄尚書事封武興公馮萬泥為尚書令馮乳陳為中軍將軍馮素弗為昌黎尹撫軍大將軍馮𢎞為征東大將軍孫護為尚書左僕射張興為輔國大將軍務銀提為司隸校尉封伯子男鄉亭侯者五十餘人士卒賞賜榖帛有差熙之羣僚復其爵位正始二年春正月立妻李氏為天王后子彭城為太子越騎校尉慕輿良謀叛伏誅三月庚申葬熙及苻后於徽平陵高句驪遣使來聘且叙宗親雲遣侍御史李拔報之夏四月大赦境内五月以尚書令馮萬泥為幽冀二州牧鎮肥如中軍將軍馮乳陳為并州刺史鎮白狼撫軍大將軍馮素弗為司隸校尉司隸校尉務銀提為尚書令秋七月封慕容歸為遼東公使主燕祀立燕之宗廟社稷正始三年冬十月雲自以無功徳而居大位内懷危懼常蓄養壯士以為腹心爪牙寵臣離班桃仁專典禁兵賞賜以巨萬計衣食起居皆與之同而班仁志願無厭猶有怨憾戊辰雲臨東堂班仁懷劒執紙而入稱有所啓拔劍擊雲雲以几拒班仁從旁擊雲雲遂被殺馮跋遷雲屍于東宫偽諡惠懿皇帝十六國春秋卷四十九
