body:
  text: 十六國春秋卷九十九北燕錄二馮𢎞馮𢎞字文通䟦之季弟也髙雲簒位拜征東大將軍領中領軍封汲郡公太平元年進位征北大將軍尚書右僕射尋遷驃騎大將軍改封中山公仍為領軍内掌禁衞外總朝政遷尚書令司徒錄尚書事䟦死遂僭即天王位太興元年春正月壬午朔大赦境内殊死已下改元太與文武百官叩門入者遷級二等二月立夫人慕容氏為王后太興二年春正月立慕容后之子王仁一無王字為太子封嫡妃王氏子崇為長樂公崇母弟朗為廣平公邈為樂陵公夏五月魏世祖諱燾治兵南郊將謀伐燕六月有鼠集於城西闐滿數里地中西行至水在前者銜馬尾一作矢後者迭相銜尾而渡識者以為民遷之象又有狼夜繞城羣嘷如是終嵗庚寅世祖來伐命太子諱晃錄尚書事秋七月己未世祖至濡水庚申遣安東將軍宣城公奚斤發幽州民及密雲丁零萬餘人運攻具出南道會於和龍南伐神高世祖至遼西𢎞遣侍御史崔聘奉牛酒犒師己巳世祖至和龍石城太守李崇建徳太守王融等十郡並率衆迎降世祖發其民三萬穿圍塹以守和龍八月甲戌𢎞使數萬人出城挑戰魏昌黎公邱與河間公齊等逆擊破之死者萬餘人𢎞尚書高紹率萬餘家堡羌胡以自固己卯世祖攻紹辛巳斬之平東將軍賀多羅攻帶方太守慕容𤣥於猴固撫軍大將軍永昌王健攻建徳驃騎大將軍樂平王丕攻冀陽皆㧞之虜獲生口班賜將士各有差九月乙卯世祖引師西還營丘成周遼東樂浪帶方𤣥莵六郡皆降世祖徙其民四萬餘戸于幽州開倉以賑貸之尚書郭緣勸𢎞送欵獻女於魏乞為附庸保守宗廟𢎞曰負舋一作釁在前忿形已露降附取死不如守志更圖所適也冬十一月乙巳𢎞黜長樂公崇使鎮肥如十二月己丑崇遣弟樂陵公邈如魏請舉郡降世祖拜崇假節侍中都督幽平二州東夷諸軍事車騎大將軍領䕶東夷校尉幽平二州牧封遼西王𢎞聞之使别將封羽率衆圍崇於遼西太興三年春正月乙卯世祖遣撫軍大將軍永昌王健督諸軍救遼西二月崇母弟朗入朝於魏夏六月世祖遣撫軍大將軍永昌王健左僕射安原督諸軍擊和龍征南將軍樓勃别將五千騎圍凡城凡城守將封羽以城迎降世祖徙其民三千餘戸於陰密秋八月崇上表於魏請求説降其父世祖不許太興四年春正月戊戌𢎞遣給事黄門侍郎伊臣請和於魏世祖不許三月辛巳𢎞遣尚書髙顒上表稱藩請罪於魏乞以季女充奉掖庭世祖許之乃徵太子王仁入朝𢎞送使者于什門還魏什門在燕二十一年不屈節世祖下詔褒稱曰什門奉使和龍狂豎肆虐勇志壯厲不為屈節雖昔蘇武何以加之夏六月𢎞不遣太子王仁質魏散騎常侍劉滋一作訓諫曰昔劉禪有重山之險孫皓有長江之阻皆為晉擒何則强弱之勢異也今我弱於吳蜀而魏强於晉氏雖結婚通和而未遣侍子不從其欲魏若大舉將有危亡之禍願亟遣太子以恭大國之命然後修政事撫百姓收離散賑饑窮勸農桑省賦役庶大業危而更安社稷可以永保𢎞大怒殺之辛亥世祖遣撫軍大將軍永昌王健與征西大將軍司空汝陰公長孫道生侍中安西將軍建興公古弼等督諸軍來伐𢎞嬰城固守健等収其禾稼徙民數千戸於雲中太興五年春正月𢎞數為魏所攻遣使詣建康稱藩奉貢於宋癸酉宋封𢎞為燕王江南謂之黄龍國三月癸亥𢎞遣大將軍湯一作渴燭入貢於魏辭以太子王仁有疾故未之遣夏四月𢎞遣右衞將軍孫徳乞師於建康六月戊申世祖遣驍騎大將軍樂平王丕鎮東大將軍徒河屈垣等率騎四萬來伐秋七月己卯樂平王丕等至和龍𢎞以牛酒犒軍獻甲三千屈垣責其不送侍子掠男女六千餘口冬十二月魏復率衆來伐𢎞日就蹙削上下危懼太常楊㟭勸𢎞請罪乞降速送太子入侍𢎞曰吾未忍為此且姑置之若事急則東依髙麗以圖後舉㟭曰魏舉天下之衆擊一隅之地以臣愚見勢如土崩理無不克且髙麗夷狄難以信期始雖相親終恐為變若不早裁悔將無及𢎞不聴密遣尚書陽伊求迎於髙麗太興六年春二月戊子𢎞遣使入貢於魏請送侍子世祖不許將舉兵討之壬辰遣使者十餘輩詣東方髙麗等諸國告諭之三月𢎞所居端門無故自崩辛未世祖遣侍中安西將軍建興公古弼征南將軍東平公娥清一作鵝青率精騎一萬攻白狼城平州刺史元嬰率遼西諸軍會之夏四月古弼等克白狼城𢎞迫急復遣使求迎於高麗高麗王璉遣大將葛居盧一作葛蔓盧孟光等率衆數萬隨陽伊至和龍來迎髙麗屯於臨川𢎞欲東奔民多難之𢎞大臣單于右輔古泥及尚書令郭生因民心之憚遷開城門納魏兵魏兵疑古泥譎詐不敢入城生遂勒兵攻𢎞𢎞引髙麗兵入自東門與生戰於闕下生中流矢死葛居盧孟光既入和龍城命軍士脫其弊褐取燕武庫精仗以給之城内皆髙麗軍大肆摽掠五月乙卯𢎞率和龍見户東徙焚燒宫殿火一旬不滅令婦人披甲居中陽伊等勒精兵居外葛居盧孟光率騎殿後方軌而進前後八十餘里古弼部將高茍子率騎欲追擊𢎞弼因酒醉㧞刃止之故𢎞得逃去魏之將士皆怨弼不擊世祖聞之怒檻車徵弼及娥清至平城皆黜為門卒戊午世祖遣散騎常侍封撥使髙麗諭令送𢎞秋九月髙麗不送𢎞於魏遣使奉表稱藩乞與馮𢎞俱奉王化世祖以髙麗故違詔㫖議擊之初𢎞至遼東髙麗王遣使勞之曰龍城王馮君爰適野次士馬勞乎𢎞慙怒稱制答讓之髙麗王乃處之於平郭尋徙北豐𢎞素侮髙麗政刑賞罰猶如其國髙麗王奪其侍人取其太子王仁為質𢎞忿怒之遣使上表求迎於建康詔遣使者王白駒等迎之并令高麗資遣高麗王不欲𢎞南來遣别將孫潄高仇等殺𢎞於北豐子孫同時死者十餘人偽諡𢎞曰昭成皇帝自馮䟦太平元年嵗在己酉至𢎞滅亡之嵗嵗在丙子凡二十八年十六國春秋卷九十九
