body:
  text: 十六國春秋卷十四後趙録四石𢎞石𢎞字大雅勒之第二子也幼有孝行以恭謹自守受經於杜嘏誦律於續咸勒曰今世非承平不可專以文業教也於是使劉徴任潘授以兵書王陽教之擊刺立為世子領中領軍尋署衛將軍使領開府辟召後鎮鄴勒僭位立為太子虚襟愛士好為文詠其所親昵莫非儒素勒謂中書令徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以𤣥黙守之聖人之後必有勝殘去殺者天之道也勒甚悦光因説曰皇太子仁孝温恭中山王雄暴多詐陛下一旦不諱臣恐社稷非太子所有也宜漸奪中山王威權使太子早㕘朝政勒納之左僕射程遐言於勒曰中山王勇悍機畧羣臣莫及觀其志度自陛下之外視之蔑如兼以專征歳乆威振内外性又殘賊安忍無賴諸子並長皆預兵權陛下在自當無他恐其怏怏不可輔少主也宜早除之以便大計勒曰今天下未平兵難未巳大雅沖幼宜任彊輔中山王佐命功臣親同魯衛方當委以伊霍之任何至如卿所言也卿正恐輔幼主之日不得獨擅帝舅之權爾吾亦當㕘卿於顧命勿過懼也遐泣曰臣所慮者至公陛下乃以私計拒之豈明主開襟納説忠臣必盡之義乎中山王雖為皇太后所養非陛下天屬不可以親義期也仗陛下神規微建鷹犬之效陛下酬其父子恩榮亦已足矣而志願無極魏任司馬懿父子終於鼎祚淪移以此而觀中山豈將來有益者乎臣因縁多幸託𤓰葛於東宫臣而不竭言於陛下更誰言之陛下若不除中山臣已見社稷不復血食矣勒不聴遐退告徐光曰主上向言如是太子必危將若之何光曰中山王常切齒於吾二人恐非但國危亦將為家禍當為安國寧家之計不可坐而受禍也他日光復乗間言於勒曰陛下廓平八州帝有海内而陛下神色若有不怡者何也勒曰今吳蜀未平書軌不一司馬家猶不絶于丹陽吾恐後世謂吾不應符籙不以吾為受命之主每一思之不覺見於神色光曰臣以陛下為憂腹心之患而何暇更憂四支乎何則魏承漢運為正朔帝王劉備雖紹興巴蜀亦不可謂漢不滅也吳雖跨據江東豈有虧魏美陛下包括二都平蕩八州彼司馬家兒復何異𤣥徳李氏亦猶孫權帝王之統不在陛下竟欲安歸此四支之輕患爾中山王藉陛下指授神畧所向輒克天下皆言其英武亞于陛下兼其殘暴多姦見利忘義無伊霍之忠父子並據權位勢傾王室觀其耿耿常有不滿之心近于東宫侍讌有輕皇太子之色陛下隠忍容之臣恐陛下萬年之後宗社必生荆棘此腹心之重疾也惟陛下圖之勒黙然而竟不從及勒死虎執太子𢎞使臨軒收程遐徐光下廷尉召其子􅃉將兵入宫宿衛文武靡不奔散𢎞大懼自陳劣弱不堪重寄乃讓位于虎虎曰君薨而世子立理之常也臣安敢奸之𢎞泣涕固讓虎怒曰若其不堪重任天下自當有大義何足預論遂以晉咸和八年逼立之大赦改元曰延熈文武百寮進位一等誅程遐徐光八月𢎞策拜虎為丞相魏王大單于加九錫以魏郡等十三郡為國總攝百揆虎偽固讓乆乃受命赦其境内殊死已下立妻鄭氏為魏王后子􅃉為魏太子加使持節侍中大都督中外諸軍事大將軍録尚書事次子宣為使持節車騎大將軍冀州刺史封河間王韜為前鋒將軍司𨽻校尉封樂安王遵齊王鑒代王苞樂平王徙太原王斌為章武王勒文武舊臣皆補左右丞相閒任虎之府僚舊昵悉署臺省禁要更命太子宫曰崇訓宫勒妻劉氏已下皆徙居之簡勒宫人美淑及車馬珍寳服御之上者皆入丞相府署鎮軍將軍􅇪安領左僕射尚書郭殷為右僕射劉氏與彭城王堪密謀堪請出兖州據廪丘挾南陽王恢為盟主宣太后詔討虎事洩虎炙殺堪徴恢還襄國因廢劉氏尋逼殺之尊𢎞母程氏為皇太后冬十月河東王生鎮闗中朗鎮洛陽起兵于二鎮以討丞相虎生自稱秦州刺史遣使降晉虎留子􅃉守襄國統步騎七萬攻朗于金墉城潰獲朗刖而斬之進攻長安以挺為前鋒大都督生遣將軍郭權率鮮卑涉璝部衆二萬為前鋒拒之生統大軍繼發次于蒲阪權與挺戰于潼闗敗績挺及丞相左長史劉隗皆死虎退奔澠池枕屍三百餘里鮮卑密通于虎背生而擊之生時停蒲阪不知挺已死懼單馬奔長安郭權復收衆三千與鎮西將軍越騎校尉石廣相持于渭汭生遂去長安潛於雞頭山將軍蔣英據長安拒守虎聞生之奔也進師入闗遂攻長安旬餘拔之斬蔣英等徙秦州華戎十餘萬户於闗東生部下斬生以降權奔隴右虎分遣諸將屯于汧隴遣將軍麻秋討蒲洪洪率户二萬迎降虎拜洪光烈將軍䕶羌校尉洪至長安説虎宜徙闗中豪傑及氐羌内實京師虎從之徙雍秦民及氐羌十餘萬户于闗東以洪為龍驤將軍流民都督使居枋頭以羌帥姚弋仲為奮武將軍西羌大都督使帥其衆徙居清河之灄頭虎還襄國大赦諷𢎞命已建魏臺一如魏武輔漢故事十二月郭權以生敗據上邽歸晉延熈二年春正月晉成帝詔以郭權為鎮一作征西將軍秦一作雍州刺史于是京兆新平扶風馮翊北地皆起兵應之𢎞鎮西將軍石廣復與權戰敗績三月虎遣將軍郭敖及子章武王斌等率步騎四萬討權于郿次于華隂夏四月上邽豪族殺權以降徙秦州三萬餘户于青并二州諸郡南羌氐楊難敵等送任通和長安人陳良夫奔黑羌招誘北羌四角王簿句大等侵擾北地馮翊與章武王斌相持樂安王韜等率騎犄句大之後與斌夾擊敗之句大奔馬蘭山郭敖等乗勝追擊懸軍深入為羌所敗死者十有七八斌等收軍還于三城虎聞而大怒遣使殺郭敖秦王宏頗有怨言虎幽之于别室冬十月𢎞自齎璽綬親詣魏宫諭禪位之意虎曰帝王大業天下自當有議何為自論此耶𢎞流涕還宫對太后程氏曰先帝種真無復遺矣于是尚書奏魏臺請依唐虞禪讓故事虎曰𢎞愚暗居喪無禮不可以君臨天下一作君萬國便當廢之何禪讓也十一月遣郭殷持節入宫廢𢎞為海陽王𢎞安步就車容色自若謂羣臣曰庸昧不堪纂承大統顧慙羣后此亦天命去矣又何言百官莫不流涕宫人慟哭羣臣皆詣魏臺請進虎曰皇帝者盛徳之稱非所敢當且可稱居攝趙天王遂以晉咸康元年幽𢎞及太后程氏并秦王宏南陽王恢於崇訓宫未幾密遣人賊殺之是時西羌大都督姚弋仲稱疾不賀虎累馳召之及至正色謂虎曰弋仲常謂大王命世英雄奈何把臂受托而返奪之耶虎曰吾豈樂此哉顧海陽年少恐不能了家事故代之爾心雖不平然察其誠實亦不之罪也𢎞在位二年時年二十二十六國春秋卷十四
