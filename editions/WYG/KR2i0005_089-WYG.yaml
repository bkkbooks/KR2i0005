body:
  text: 十六國春秋卷八十九南凉録二秃髪傉檀秃髪傉檀烏孤第三弟也少機警有才畧其父思復鞬甚見愛重常謂諸子曰傉檀明識幹藝非汝曹所及也故諸兄不以傳子而傳於弟利鹿孤在位垂拱而已軍國大事皆委於傉檀利鹿孤卒傉檀襲位更稱涼王還居樂都改元𢎞昌初乞伏乾歸之歸晉興也以世子熾磐為質後熾磐逃歸為追騎所執利鹿孤欲殺之傉檀曰臣子逃歸君父振古通義故魏武善闗羽之奔秦昭恕頃襄之逝熾磐雖逃叛孝心可嘉無足深責宜加全宥以𢎞海岳之量乃赦之至是熾磐又奔允街傉檀乃歸其妻子冬十月傉檀攻呂安於姑臧十二月秦姚興遣使拜傉檀車騎將軍廣武公秦建節將軍王松忽帥騎助吕隆守姑臧傉檀弟文眞擊而虜之傉檀怒遣使謝罪送還長安𢎞昌二年春正月傉檀大城樂都秋七月傉檀復出兵攻呂隆於姑臧秦姚興遣左僕射齊難等帥騎迎隆傉檀攝昌松魏安二戍以避之八月秦涼州刺史王尚遣主簿宗敞來聘傉檀厚禮而遣之𢎞昌三年春二月傉檀畏秦之彊又密圖姑臧乃去年號罷尚書丞郎官遣尚書闗尚一作叅軍關尚聘於秦興謂尚曰車騎投誠獻欵爲國藩屏而擅興兵衆輙造大城爲臣之道固若是乎尚曰王侯設險以守其國先王之制也所以安人衞衆預備不虞車騎僻在遐藩密邇勍寇南則逆𦍑未賔西則􅂪遜跋扈蓋爲國家重門之防不圖陛下忽以爲嫌興笑曰卿言是也冬十月傉檀遣鎮南將軍文支討南𦍑西虜大破之上表於秦求領涼州興不許乃加散騎常侍増食邑二千戸𢎞昌四年𢎞昌五年夏六月傉檀帥師伐沮渠蒙遜次於氐池蒙遜嬰城固守芟其禾苖至赤泉而還獻馬三千疋羊三萬口於秦秦主興以爲忠署爲使持節都督河右諸軍事車騎大將軍領䕶匈奴中郎將凉州刺史常侍公如故鎮姑臧今之西寧因徵王尚還長安涼州人申屠英等二百餘人遣主簿胡威詣長安留尚興弗許威流涕固請興悔之使西平車普馳止王尚又遣使諭傉檀㑹傉檀已率歩騎三萬進次五澗普先以狀告之傉檀遽逼遣尚尚出自清陽門傉檀入自涼風門宗敞以别駕送尚還長安敞因薦本州名士十餘人於傉檀詳具敞傳傉檀嘉納之乃大饗文武將士於謙光殿班賜金馬各有差傉檀復遣西曹從事史暠聘秦姚興謂暠曰車騎坐定涼州衣錦本國其德我乎暠曰車騎積德河西少播英問王威未接投誠萬里陛下官方任才量功授職􅂜倫之常何德之有興曰朕不以州授車騎者車騎何從得之暠曰使河西雲擾呂氏顛狽者實由車騎兄弟傾其本根陛下雖鴻羅遐被涼州猶在天網之外故征西以周召之重力屈姑臧齊難以王旅之盛勢挫張掖王尚孤城獨守外逼羣狄陛下不連兵十年殫竭中國涼州未易取也今以虚名假人内收大利乃知妙算自天聖與道合雖云遷授盖亦時宜興悦其言拜暠為騎都尉秋八月傉檀讌羣臣於宣德堂酒酣仰視而歎孟褘極言切諫詳狊褘傳傉檀嘉納之以鎮南將軍興城侯文支鎮姑臧自還於樂都傉檀雖受制於秦然車服禮儀皆如王者九月傉檀遣使與西涼李暠修結和好冬十月傉檀偽逰澆河襲徙西平湟河諸羗三萬餘户於武興番禾武威昌松四郡徵集戎夏之兵五萬餘人大閲於方亭十一月遷都於姑臧𢎞昌六年秋七月傉檀復貳於秦遣使邀乞伏熾磐熾磐不應斬其使送長安九月傉檀將五萬餘人伐沮渠􅂪遜入自西陜􅂪遜率衆來拒戰於均石傉檀敗績乃率騎二萬運糓四萬石以給西郡復爲蒙遜所擊西郡太守楊綂以日勒降之冬十月秦河州刺史彭奚念來奔夏主赫連勃勃遣使求婚傉檀不許十一月勃勃率騎二萬來攻戰於陽武一作支陽殺傷萬計及驅掠二萬餘口牛馬羊數十萬而去傉檀欲率衆追之焦朗曰勃勃天姿雄健御軍嚴整未可輕也今因抄掠之資率思歸之士人自爲戰難與争鋒不如從溫圍北渡趣萬斛堆阻水結營扼其咽喉百戰百勝之術也别將賀連怒曰勃勃敗亡之餘烏合之衆奈何避之示之以弱宜急追之傉檀從之勃勃先於陽武下峽鑿凌埋車以塞路勒兵逆擊復爲所敗追奔八十餘里殺傷更以萬計名臣勇將死者十六七傉檀與數騎奔南山幾爲追騎所得傉檀懼東西宼至乃徙三百里内百姓皆入於姑臧國人駭怨屠各成七兒因百姓之擾率其屬三百人叛於北城推梁貴爲盟主貴閉門不應一夕聚衆至數千人殿中都尉張猛大言於衆曰主上陽武之敗盖恃衆故也責躬悔過明君之義諸君何故遽從此小人爲不義之事乎殿内武旅正爾相尋目前之危悔將何及衆聞之咸奔散七兒逃至晏然殿中騎將白路等追斬之軍諮祭酒梁裒輔國司馬邊憲等七人濳謀叛逆悉誅之嘉平元年夏五月秦以傉檀外有陽武之敗内有邊梁之亂欲乗釁而取之遣尚書郎韋宗來聘因以觀釁傉檀與宗論六國縱横之規三家戰争之略逺言天命廢興近述人事成敗機變無窮辭致清辯宗退而歎曰命世大才經綸名教者不必華宗夏士撥煩理亂澄清濟世者不必八索九丘吾乃今知九州之外五經之表載記作五經之外􅃣冕之表復自有人車騎神機秀發信一代之偉人由余日磾豈足爲多也宗還長安言於與曰涼州雖殘弊之後風化未頽傉檀機詐多方憑山河之固未可圖也興曰劉勃勃以烏合之衆尚能破之况吾舉天下之兵以加之何足剋也宗曰不然形移勢變反覆萬端載記作終始殊途陵人者易敗自守者難攻陽武之役傉檀以輕勃勃致敗今我以大軍臨之彼必自固求全臣竊料羣臣才略無傉檀之右者右一作疋雖以天威臨之亦未敢保其必勝也興曰子何慮之過也不聽乃遣中軍將軍廣平公姚弼及後軍歛成等率歩騎三萬來伐又遣衛大將軍常山公姚顯率騎二萬為弼等後繼因遣傉檀書云今遣尚書左僕射齊難討勃勃懼其西逸故令弼等於河西邀之傉檀以爲然遂不設備弼等濟自金城進次漠口昌松太守蘓覇嬰城拒之弼遣人諭以禍福令其速降覇曰汝違負盟誓伐委順之藩天地有靈將不佑汝吾寧為凉鬼何降之有弼攻䧟之遂斬覇長驅至姑臧傉檀嬰城固守因出竒兵擊弼乃大破之弼退屯西苑城中人王鍾宋鍾王娥等宻爲内應候人執其使送之傉檀欲誅首謀者而赦其餘前軍將軍伊力延候曰今强敵在外内有奸豎兵交勢踧禍難不輕不悉坑之何以懲後載記作宜悉坑之以安内外傉檀從之殺五千餘人以婦女爲軍賞命諸郡縣悉驅牛羊於野次歛成縱兵抄掠傉檀遣鎮北大將軍俱延鎮軍將軍敬歸等十將率騎分襲秦兵復大破之斬首七千餘級姚弼固壘不出傉檀攻之未剋乃㫁水上流欲以持乆斃之秋九月雨甚堰壊弼軍得水復振姚顯至高平聞弼敗倍道赴之軍勢益盛顯遣善射將孟欽等五人挑戰於涼風門弦未及發傉檀材官將軍宋益等馳擊斬之顯乃委罪歛成遣使謝傉檀慰撫河外引師而去傉檀亦遣使者徐宿詣秦謝罪冬十一月傉檀復稱涼王即位於南郊大赦境内殊死已下改元嘉平署置百官立夫人折掘氏爲王后世子虎臺爲太子錄尚書事左長史趙鼂爲尚書左僕射右長史郭倖爲尚書右僕射鎮北大將軍俱延爲太尉鎮軍將軍敬歸爲司𨽻校尉成公緒爲大司農自餘封授各有差嘉平二年春正月以次子明德歸為中郎將領昌松太守歸雋爽聰悟傉檀甚寵之年始十三命爲髙昌殿賦援筆立成影不移漏傉檀覽而嘉之擬之曹子建嘉平三年夏四月遣左將軍枯木駙馬都尉胡康伐沮渠蒙遜掠臨松人千餘戸而歸蒙遜大怒率騎五千來伐至於顯美方亭破車盖鮮卑徙數千戸而還太尉俱延率兵追擊􅂪遜復大敗歸是月傉檀將親帥五萬騎伐蒙遜太史令景保及左僕射趙晁切諫傉檀不聽保固諍之傉檀大怒鏁保而行戰於窮泉爲􅂪遜所敗單馬奔還保遂見擒旣而逸歸傉檀謝之曰卿孤之蓍龜也封爲安亭侯蒙遜進圍姑臧姑臧百姓懲東苑之戮悉皆驚散疊掘麥田車盖諸部盡降於蒙遜傉檀懼遣使請和􅂪遜許之乃遣司𨽻校尉敬歸及子他爲質歸至胡阬逃還他爲追兵所執蒙遜徙其衆八千餘戶而去右衞將軍折掘竒鎮㨿石驢山以叛傉檀懼爲蒙遜所滅且慮嶺南爲竒鎮所剋乃遷於樂都留大司農成公緒守姑臧傉檀纔出城魏安人焦諶王侯等閉門作亂收合三千餘家保㨿南城諶推焦朗爲大都督龍驤大將軍而自稱涼州刺史降於􅂪遜司𨽻校尉敬歸討竒鎮於石驢山戰敗死之􅂪遜因剋姑臧之威乗勝來伐傉檀遣安北將軍叚茍左將軍雲連乗虗出番禾以襲其後徙三千餘家於西平嘉平四年春二月􅂪遜攻圍樂都三旬不克遣使謂傉檀曰若以寵子爲質吾當還師傉檀曰去否任卿兵勢卿違盟無信何質以供䝉遜怒築室返耕為持乆之計羣臣固請乃以子安周一作保周爲質蒙遜引歸吐谷渾樹洛干率衆來伐傉檀遣太子虎臺拒之爲樹洛干所敗傉檀又欲北伐蒙遜邯川䕶軍孟愷諫曰蒙遜新并姑臧凶勢方盛且宜固守伺釁不可妄動傉檀不從五道俱進至番禾苕藋苕徙聊切藋徙弔切掠五千餘户將軍屈右進曰陛下轉戰千里前無完陣徙户資財盈溢衢路今旣獲利宜倍道旋師早度嶮峻蒙遜善於用兵士衆習戰若輕軍卒至出吾慮表大敵外逼徙户内攻此危道也衞尉伊力延曰我軍勢方盛將士勇氣自倍彼步我騎勢不相及若倍道旋師必捐棄資財示人以弱計之左也屈右出而告其諸弟曰吾言不用天命也此吾兄弟死地俄而昏霧風雨蒙遜引軍大至傉檀敗走進圍樂都傉檀嬰城固守遣使請和以子染干爲質䝉遜引兵而去秋七月河南王乞伏乾歸遣子平昌公熾磐及中軍將軍審䖍來伐八月兵濟河南傉檀遣太子虎臺逆戰敗於嶺南熾磐虜牛馬十餘萬民二千餘户而去嘉平五年夏五月乞伏乾歸遣熾磐襲白土三河太守吳隂率衆降之嘉平六年春三月傉檀遣安西將軍紇勃耀兵西境䝉遜侵西平徙户掠牛馬而去邯川人衞章等謀殺䕶軍孟愷南啟乞伏熾磐郭越止之曰孟君寛以惠下何罪而殺之吾寜違衆而死不敢負君以生乃宻告之愷誘章等飲酒殺四十餘人愷懼熾磐軍至馳告文支文支遣將軍疋珍赴之熾磐軍到城聞珍將至引之而去夏四月􅂪遜進攻樂都二旬不剋鎭南將軍文支以湟河迎降􅂪遜徙五千餘户於姑臧尋復率衆來伐傉檀以太尉俱延爲質蒙遜引去嘉平七年春唾契汗乙弗等皆叛傉檀議欲西討之䕶軍孟愷諫曰今連年不收上下饑敝南逼熾磐北迫蒙遜百姓騷動下不安業令逺征雖剋必有後患不如結盟熾磐通糴濟難慰撫雜部以廣軍資畜力繕兵俟時而動易曰其亡其亡繫於苞桑惟陛下圖之傉檀曰孤將畧地卿無沮衆謂太子虎臺曰今不種多年内外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮惟在熾磐然熾磐名㣲兵少易以討禦吾不過一月自足周旋汝謹守樂都無使失墜乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾磐聞之帥歩騎二萬乘虚來襲虎臺嬰城固守熾磐四靣攻之西曹從事中郎尉肅言於虎臺曰今外城廣大難以固守殿下不若聚國人守内城肅等率諸晉人拒戰於外如或不捷猶足自存虎臺曰蕞爾小賊旦夕當走卿何過慮之深虎臺懼晋人之有二心也乃悉召豪望有勇謀者閉之於内孟愷泣進曰熾磐不道乗虗内侮國家危於累卵人神共憤愷等進欲報恩退顧妻子人思效死豈有二乎今事已急而殿下乃疑之如是耶虎臺曰吾豈不知君之忠篤實懼餘人脫生慮表願君等安之耳一旬城潰熾磐入樂都遣平逺乞伏犍䖍帥騎五千追傉檀徙虎臺及文武百姓於枹罕安西將軍樊尼自西平奔告傉檀傉檀泣謂衆曰今樂都為熾磐所陷男夫盡殺婦女賞軍雖欲還歸實無所赴卿等能與吾藉乙弗之資取契汗以贖妻子者是所望也不爾即歸熾磐便爲奴僕矣豈忍見妻子在他懐抱中也遂引師而西衆多離叛遣鎭北將軍叚茍追之茍亦不還於是將士皆散惟中軍將軍紇勃後軍將軍洛肱安西將軍樊尼散騎侍郎隂利鹿不去傉檀曰蒙遜熾磐昔皆委質於吾今而歸之不亦鄙哉四海之廣匹夫無所容身何其痛乎旣乃歎曰蒙遜與吾名齊年比熾磐姻好少年俱其所忌勢皆不濟與其聚而同死不若分而或全樊尼吾長兄之子宗部所寄吾衆在北者戸垂一萬䝉遜方招懐遐邇存亡繼絶汝其從之紇勃洛肱亦與尼俱行吾年老矣所適不容寜見妻子而死遂歸於熾磐大臣親戚悉皆棄去惟隂利鹿隨之夏六月傉檀至西平熾磐遣使郊迎以上賔之禮待之初樂都之潰諸城皆降獨鎭軍尉賢政固守浩亹熾磐遣虎臺以手書諭之賢政執正不下旣聞傉檀至左南乃降秋七月熾磐以傉檀爲驃騎大將軍封左南公歳餘爲熾磐所鴆左右勸傉檀解藥傉檀曰吾病豈宜療耶遂死時年五十一在位十三年僞諡景王虎臺後亦爲熾磐所殺傉檀少子保周臘子破𦍑俱延子覆龍烏孤孫承鉢利鹿孤孫副周皆奔於河西王沮渠蒙遜乆之歸魏魏以保周爲張掖王覆龍爲酒泉公破羗爲西平公副周爲永平公承鉢爲昌松公保周後叛討誅之自烏孤以晉安帝隆安元年歳在丁酉僭號太初至傉檀三世凡十九年以安帝義熈十年歳在乙卯滅十六國春秋卷八十九
