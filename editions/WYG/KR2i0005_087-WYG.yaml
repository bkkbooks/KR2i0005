body:
  text: 十六國春秋卷八十七西秦録三乞伏益州乞伏益州乾歸之弟也乾歸時為前將軍秦州牧楊定之死也天水姜乳襲據上邽乾歸遣益州帥騎六千討之左僕射邊芮民部尚書王松夀言於乾歸曰益州以懿弟之親屢有戰功狃於累勝常有驕色若其遇冦必將易之且未宜專任示有所先乾歸曰益州驍勇善御衆諸將莫有及之者但恐其專擅耳若以重佐輔之當無慮也於是以平北將軍韋䖍為長史散騎常侍左禁將軍務和為司馬至大寒嶺益州恃勝自矜不為部陳聽将士觧甲逰畋縱飲令曰敢言軍事者斬䖍等諫曰王以将軍親重故委以專征之任庻能摧彼凶暴以副具瞻賊已垂逼奈何觧甲自寛宴安酖毒竊為将軍危之益州曰乳以烏合之衆今聞吾至理應遠竄乃與吾决戰者斯成擒耳吾自揣之有方郷等不足慮也既而乳率衆逆擊益州果敗乾歸曰孤違蹇叔以至於此將士何爲孤之罪也皆赦之後復率衆攻涼㧞支陽鸇武允吾三郡虜衆萬餘又與武衞慕兀等率騎伐吐谷渾破視羆於度周川質其子宕豈引兵而還封平遠侯尋卒乞伏曇逹乞伏曇逹熾磐之弟也仕爲秦州牧鎭東將軍鎭譚郊封襄武侯與平東將軍王松壽帥騎一萬討破休官權小郎吕破胡於白石川虜其男女萬餘口進㨿白石城休官降者萬餘人後顯親休官權小成吕奴迦等叛保白坑曇逹謂將士曰昔伯珪憑嶮卒有滅宗之禍韓約肆暴終受覆族之誅今小成等逆命白坑宜在除滅王者之師有征無戰粤爾輿人戮力勉之衆咸㧞劍大呼於是率衆攻白坑斬小成奴迦及首級四千七百隴右悉降後又帥衆討降南羗彌姐康薄於赤水沮渠䝉遜來攻石泉曇逹與别將出連䖍率騎五千救之䝉遜引還尋與王松壽率步騎一萬攻姚艾於上邽進㨿蒲水大破之遂屯大利破黄石大羗二戍遷尚書令轉為左丞相尋遷都督枹罕以東諸軍事征東大將軍秦州牧鎭南安復徵爲左丞相征東大將軍鎮枹罕赫連勃勃遣征南大將軍呼盧古率騎二萬來伐曇逹率衆擊之戰於嵻㟍山敗績諸羗執送勃勃邉氏乾歸妻邉氏金城人左長史邉芮之妹也乾歸僭立遂以太初元年立爲王后及乾歸奔降於秦降號太妃旣而返政復爲王后秃髪氏王后禿髪氏傉檀之女太子虎臺之妹也傉檀旣降熾磐納爲王后拜傉檀爲左南公甚禮遇之虎臺亦被優寵未幾令人鴆殺傉檀河西王蒙遜遣人誘虎臺許以畨禾西安二郡處之且借之兵使伐秦報其父讐復取故地虎臺隂許之事覺熾磐以后弟之故待之如初后宻與虎臺謀曰秦本我之仇讐雖以婚姻之故待之如此盖時宜耳先王之薨又非天命遺令不治者欲全濟子孫故也爲人子者豈可臣妾於仇讐而不思報復乎乃與武衞將軍越質洛城謀弑熾磐后妹爲熾磐左夫人有寵知其謀而告之熾磐殺后及虎臺等十餘人秃髮氏左夫人秃髮氏利鹿孤之宗女也先是熾磐爲質於凉利鹿孤妻之熾磐後奔允街秃髪傉檀復遣歸之遂爲左夫人有寵於熾磐讒殺其姐及虎臺後秃髪氏與暮末弟軻殊羅私通暮末知而禁之軻殊羅懼遂與叔父什寅謀殺暮末奉沮渠興國以奔河西使秃髮氏盗門鑰於内鑰誤門不得開門者以告暮末収其黨與盡殺之而赦軻殊羅什寅鞭之什寅曰我負汝死不負汝鞭暮末怒刳其腹投屍於河水秃髪氏乃自殺叚暉叚暉字長祚武威姑臧人漢太尉熲八世孫也身長八尺餘師事歐陽湯湯甚器愛之有一童子與暉同志居二年童子辭歸從暉請馬暉戱作木馬與之童子甚悅謝暉曰吾太山府君子也奉敕逰學今將欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以爲好言終便乗木馬騰空而去暉乃自知必將貴也遂仕乞伏熾磐爲散騎常侍從征沮渠蒙遜湟河太守沮渠漢平漢平出降司馬隗仁勒壯士百餘據城自守熾磐進擊之衆寡不敵遂為所擒熾磐欲斬之暉諫曰仁臨難履危奮不顧命忠之至也乃宥之遷暉輔國大將軍凉州刺史御史大夫西海侯暮末即位國政衰亂暉與子承根奔吐谷慕璝後遂歸魏常垣常垣河内温人魏太常卿林五世孫也父珍苻堅南安太守因世亂遂居凉州垣仕乞伏世為鎮逺將軍大夏鎮將顯羙侯翟瑥翟瑥武始人仕乾歸為冠軍將軍初氐王楊定率步騎四萬来伐乾歸謂諸將曰楊定以勇虐聚衆窮兵逞欲兵猶火也不戢將自焚定之此役殆天以之資我也於是遣凉州牧乞伏軻彈秦州牧乞伏益州立義將軍詰歸拒之以瑥為冠軍將軍右司馬前鋒始交益州為定所敗軻彈詰歸欲引而還瑥奮劍諫曰主上以神武之資開基隴右東征西討靡不席捲威振秦梁聲光巴漢將軍以維城之重受閫外之寄當宣力致命輔寧國家今秦州雖敗二軍尚全奈何不思赴救望風奔散何面目以見主上乎昔項羽斬卿子以寜楚胡建戮監軍以成功將軍之所聞也瑥誠才非古人獨不能以便宜斬將軍乎軻彈謝曰向所以未赴秦州者未知衆心何如耳敗不相救軍罰所先果能若是敢自愛死乃率騎赴之益州詰歸亦勒衆而進大敗定兵斬定及首級一萬七千轉吏部尚書定州刺史俄遷晉興太守鎮枹罕焦遺子華楷焦遺南安人乾歸時仕為太子太師與參軍國大謀乾歸曰焦生非特名儒乃王佐之才也謂熾磐曰汝事之當如事吾也因命熾磐拜遺於床下遺子華至孝遺曽病甚冬中思食𤓰華忽夣人謂之曰聞爾父思𤓰故送助飬汝從此進之華跪受寤而𤓰果在手香美非常遺食之而病愈乾歸欲以女妻之辭曰凡娶妻者欲與之共事二親也今以王姬之貴下嫁蓬茅之士誠非其匹臣懼其闕於中饋非所願也乾歸曰卿之所行古人之事孤女不足以強卿乃以華爲尚書民部郎遺後遷安南將軍都督八郡諸軍事廣甯太守暮末末年南安諸𦍑共推遺爲主遺不從遂刼遺族子亮叛攻南安暮末擊破之遺殺亮出降進號鎮國將軍次子楷仕爲太子司直暮末降夏楷奔廣甯泣謂其父遺曰大人荷國寵靈居藩鎮重任今本朝顛覆豈得不帥見衆唱大義以殄㓂仇遺曰今主上已陷賊庭吾非愛死而忘義顧以大兵追之是趣絶其命也不如擇王族之賢者奉以爲主而伐之庻有濟也楷乃築壇誓衆二旬之間赴者萬餘人㑹遺病卒楷不能獨舉事亡奔於河西辛進辛進字國都隴西人也仕熾磐至尚書初為散騎常侍從熾磐逰於後園凌霄觀進彈飛鳥誤中暮末之母傷其面及暮末即位問傷母面之由母以狀告暮末大怒即日收進殺之并其五族二十七人十六國春秋卷八十七
