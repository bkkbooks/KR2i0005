body:
  text: 十六國春秋卷八十三後涼錄三吕隆吕隆字永基光弟右將軍寶之子也美姿貌善騎射光末年拜北部䕶軍稍歴顯位聲稱並著超既殺纂讓位於隆隆有難色超曰今如乘龍上天豈得中下隆遂以晉安帝隆安五年春二月僭即天王位超先以番禾得小鼎以為神瑞大赦境内殊死以下改元神鼎追尊父寶為文皇帝母衞氏為皇太后妻楊氏為皇后以弟超有佐命之勲拜使持節侍中都督中外諸軍事輔國大將軍司隸校尉錄尚書事封安定公二月右僕射楊桓奔河西利鹿孤任為左司馬利鹿孤率衆來攻隆與戰敗績掠其民二千餘户而去夏五月隆殘虐無度多殺豪望以立威名内外囂然人不自保魏安人焦朗遣使説秦隴西公姚碩德曰吕氏因秦之亂制命此州自武皇棄世兄弟相攻德刑不恤殘暴是先饑饉流亡死者過半唯泣訴昊天而精誠無感伏惟明公道邁前賢任尊分陜宜兼弱攻昧經略此方救生靈之沈溺布徽政於玉門簒奪之際為功不難不可失也乃遣妻子為質碩徳遂率步騎六萬來伐秋七月碩德自金城渡河直趨廣武至姑臧隆遣輔國大將軍超龍驤將軍邈等出戰大敗遁還邈為碩德所擒所失萬計隆收集離散嬰城固守巴西公他率東苑之衆二萬五千降秦閏月時熒惑犯帝座有雀羣鬭於太廟死者數萬姑臧受圍累月東方之人在城中者多謀外叛將軍魏益多又唱動羣心乃謀殺隆超事發誅之連坐死者三百餘家於是羣臣表求與秦通和隆弗許安定公超諌曰通塞有時艱泰相襲孫權屈身於魏譙周勸主迎降豈非大丈夫哉勢屈故也天錫承七世之資樹恩百載武旅十萬謀士盈朝秦師臨境識者導以見機若愎諌自專社稷為墟前鑒不逺我之元龜何憚尺書單使不以危易安且令卑辭以退敵敵去之後内修德政廢興由人何損大略隆曰吾雖常人屬當國家之重不能嗣守成基保安社稷乃以太祖之業委之於人復何面目見先帝于地下乎超曰應龍以屈伸為靈聖人以知機為美今連兵積嵗糧儲内竭強寇外逼百姓嗷嗷無餬口之計一作寄假使張陳韓白亦復無如之何陛下當思權變屈伸割區區常慮若卜世未窮何憂舊業之不復茍天命去矣亦可以保全宗族不然坐守困窮終將何如隆乃從之九月遣使請降于秦秦遣鴻臚桓敦拜隆為使持節鎮西大將軍都督河西諸軍事涼州刺史建康公優詔嘉美之于是遣母弟愛子文武舊臣慕容筑楊頴史難閻松等五十餘家入秦為質碩德乃還冬十二月安定公超攻姜紀不剋遂攻焦朗於魏安朗遣弟子嵩為質於河西王利鹿孤利鹿孤遣傉檀來援比至超已退傉檀乃耀兵姑臧壁於胡阬超夜遣中壘將軍王集帥精騎二千斫營傉檀縱兵逆擊集被殺失兵士三百餘人隆懼偽與傉檀通好請於苑内結盟傉檀遣鎮北俱延入盟延疑有伏毁苑牆而出伏兵擊之延失馬步還傉檀怒遂攻昌松太守孟褘於顯美隆遣廣武將軍茍安國寧逺將軍石可率騎五百救之安國等憚傉檀之強遁還傉檀遂剋顯美執孟褘而去神鼎二年春二月興遣兼散騎常侍席確來觀虚實因徵隆弟超為質沮渠蒙遜率衆來伐隆遣使求救於河西王利鹿孤利鹿孤遣車騎大將軍傉檀率衆一萬救之未至隆擊敗之蒙遜請與結盟留糓萬餘斛以賑饑人是時姑臧大饑糓價踴貴斗米直錢五千文人相食餓死者十餘萬口城門晝閉樵採路絶百姓請出城乞為傭作奴婢者日有數百隆惡其沮動衆心盡坑之積尸盈於路衢戸絶者十有九焉冬十月河西王傉檀復攻隆於姑臧神鼎三年秋七月河西王傉檀及沮渠蒙遜互出兵來攻隆以二寇之逼念姑臧終無以自存乃遣超率騎二百多齎珍寶請迎於秦姚興遂遣徐難等率步騎四萬來迎軍至姑臧隆素車白馬迎於道旁難以司馬王尚行涼州刺史配兵三千權鎮姑臧分置守宰以戍倉松番禾二城隆使吕𦙍告光廟曰陛下往運神略開建西夏德被蒼生威振遐裔枝嗣不臧迭相簒弑二虜交逼將歸東京謹與陛下奉訣於此歔欷慟泣酸感興軍隆遂率宗族僚屬及民一萬户隨難東遷既至長安興以隆為散騎常侍尚書公如故超為安定太守文武三十餘人皆擢叙之初郭黁常言代吕者王故其起兵先推王詳後推王乞基及隆東遷王尚卒代之終如黁言其後隆坐與姚興子廣平公弼謀反為興所殺吕光以孝武太元十一年嵗在丙戌據涼州十五年至隆滅亡嵗在癸卯凡十八年以安帝元興二年滅十六國春秋卷八十三
