body:
  text: 十六國春秋卷三十一前燕録九裴嶷開裴嶷字文冀河東聞喜人也父昶晉司𨽻校尉嶷清方有才幹器畧魁偉累遷中書侍郎轉給事黄門郎滎陽太守屬天下亂嶷兄武先為𤣥莵太守嶷遂求為昌黎太守至郡久之武卒嶷被徴乃將武子開以喪俱南過廆廆敬禮之及去厚加資送行達遼西道路梗塞嶷欲北還就廆開曰鄉里在南奈何北行且等為流寓今段氏强慕容氏弱何必去此而就彼也嶷曰中國喪亂今往就之是相率而入虎口也且道路遼逺何由可達若俟其清通又非嵗月可冀今欲求托足之地豈可不慎擇其人汝觀諸段豈有逺畧且能待國士乎慕容公修仁行義有伯王之志加以國富民安今往從之髙可以立功名下可以庇宗族汝何疑焉開從之乃與投廆既至廆大喜時諸流寓之士見廆草創並懐去就嶷首定名分為羣士啓行廆甚悦之以為長史委以軍國之謀嶷言於廆曰晉室衰㣲介居江表中原之亂非明公不能拯也今諸部雖各擁兵然皆頑愚相聚宜以漸并取為西討之資廆深善之及悉獨官冦逼城下外内騷動廆問計於嶷嶷曰悉獨官雖擁大衆軍無號令衆無部陣若簡精兵乘其無備坐成擒耳廆以為然遂陷冦營威徳甚振遣使獻㨗於建康妙簡行人令嶷將命初朝廷以廆僻在荒逺猶以邊裔之豪處之嶷既使至盛言廆之威畧四海英賢並為其用朝廷始重之嶷將還帝欲留嶷謂嶷曰卿中朝名臣當留江東朕别詔龍驤送卿家屬嶷辭曰臣少蒙國恩出入省闥因事逺寄投迹遐荒今遭開泰得覩朝廷復賜恩詔侍奉輦轂於臣之私實為厚幸但以舊京淪沒山陵穿毁名臣宿將莫能雪恥獨慕容龍驤越在遐表竭忠王室慷慨之誠義感天地方掃平中壤奉迎皇輿故遣使臣萬里歸誠今若留臣不返必謂朝廷以其僻陋而棄之孤其向義之心使懈體於討賊此㣲臣之所甚惜區區忘身為國貪還返命耳帝曰卿言是也乃遣嶷還廆後謂羣僚曰裴長史名重中朝而降屈於此豈非天以授孤也遷為遼東相轉樂浪太守武子開字士先與嶷同歸仕廆任為車騎司馬才畧深逺屢進竒䇿於廆事多納用尋轉軍諮祭酒游邃游邃廣平人也與逢羡宋奭皆嘗為昌黎太守中國喪亂遂與黄泓俱避地於薊後歸仕廆為龍驤長史創定朝儀初王浚屢以手書招其兄畼畼欲赴之邃曰彭祖刑政不修華戎離叛以邃度之必不能久兄且盤桓以俟之耳畼曰彭祖忍而多疑頃者流民北來命所在殺之今手書殷勤我稽留不往將累及卿且亂世宗族宜分以冀遺種邃從之畼竟歸浚與浚俱沒於石勒邃子泓仕為居就令髙瞻子開商髙瞻字子前渤海蓚人也少而英爽有俊才身長八尺二寸光熙中調補尚書郎永嘉之亂還鄉里乃與父老議曰今皇綱不振兵革雲擾此郡沃壤憑固河海若兵荒嵗儉必為冦庭非圖安之所王彭祖先在幽薊據燕代之資兵强國富可以託也諸君以為何如衆咸稱善遂與叔父隱率數千家北徙幽州既而以王浚政令無恒乃北依崔毖隨毖如遼東毖與三國宻謀伐廆瞻固諫以為不可毖不從及毖奔敗瞻隨衆降廆廆署為將軍瞻稱疾不赴廆敬其姿器數臨候之撫其心曰君之疾在此不在他也今晉室喪亂天子播越四海分崩蒼生紛擾莫知所係孤欲與諸君匡復帝室剪鯨豕於二京迎天子於吳㑹廓清八表侔勲古烈此孤之心也孤之願也君中州望族冠冕之餘宜痛心疾首枕戈待旦以同斯願奈何以華夷之異介然疎之哉且大禹出於西羌文王生於東夷立功立事惟問志畧何如耳豈以殊俗不可降心乎瞻仍辭疾篤不起廆頗不平又與龍驤主簿宋該有隙該隂勸廆除之廆不從瞻聞其言彌不自安遂以憂卒瞻長子開仕儁為昌黎太守時土豪封放與趙故太尉劉凖聚衆自守不附於􅖡􅖡遣開討之開至渤海凖放迎降遂署為幕府㕘軍從太原王恪征冉閔於襄國恪皆騎兵而閔多歩卒開説恪以誘致平地擊之閔遂敗走開被重創而卒開弟商剛毅嚴重好學有事幹為􅖡范陽太守聞兄開戰沒悲哭歐血病不能起扶杖乃行􅖡召見之商涕泣不勝儁顧謂左右曰自古友于之愛未有如商者也即日拜昌黎太守商泣辭曰臣兄亡於此郡臣故不忍為之􅖡愍而改授遼西劉瓚一作讚劉瓚字彦真平原人也經學該通為世純儒性甚清貞非禮不動弟子從之受業者常數百餘人廆重其徳學引為東庠祭酒使太子皝師事之陽裕陽裕字士倫右北平無終人也少孤兄弟皆早亡單㷀獨立雖宗族無能識者惟叔父躭幼而竒之曰此兒非惟吾門之標秀乃佐時之良器也刺史和演辟為主簿王浚領州轉治中從事忌而不能任石勒克薊城問棗嵩曰幽州人士誰最可者嵩曰燕國劉翰徳素長者北平陽裕幹事之方勒曰若如君言王公何以不任嵩曰王公由不能任所以為明公擒耳勒方欲任之裕乃㣲服潛遁令支時鮮卑單于段疾陸眷為晉驃騎大將軍遼西公雅好人物虚心延裕裕謂友人成泮曰仲尼喜佛肸之召以匏𤓰自喻伊尹亦稱何事非君何使非民聖賢尚如此况吾曹乎眷今召吾豈徒然哉泮曰今華夏分崩九州幅裂軌迹所及易水而已欲偃蹇考槃以待通者俟河之清也人夀幾何古人以為白駒之歎少游有云郡掾足以䕃後况國相乎卿追蹤伊孔抑亦知幾其神也裕乃應之拜郎中令中軍將軍處上卿位厯事段氏五主甚見親重其後段遼與皝相攻裕諫曰臣聞親仁善鄰國之寳也慕容與國世為婚媾且皝令徳之主不宜連兵搆怨凋殘百姓臣恐禍害之興將由於此願兩追前失通好一作欵如初使國家有泰山之安蒼生蒙息肩之惠遼不從出為燕郡太守北平相及石虎攻遼長驅入薊裕帥其民數千家登燕山以自固諸將恐其為後患急欲攻之虎曰裕儒生矜惜名節恥於迎降耳無能為也遂過之既克令支裕詣軍門降虎讓之曰卿昔為奴虜走今為士人來豈識知天命將逃遁無地邪對曰臣昔事王公不能匡濟逃於段氏復不能全今陛下天網髙張羅絡一作籠絡四海幽薊豪傑莫不向風如臣比肩無所獨愧生死之命惟陛下制之虎悦其言即拜北平太守徴為尚書左丞段遼之請迎於虎也裕以左丞一多相字為征東將軍麻秋司馬秋敗裕為皝軍所執送之於皝皝素聞裕名命釋其囚拜郎中令遷大將軍左司馬東破髙句驪北滅宇文歸皆預其謀皝甚器重之及遷都龍城一作和龍裕雅有巧思所制城池宫閣皆裕為之䂓模裕既仕皝日近寵秩在舊人之右性謙恭清儉剛簡慈篤雖厯居朝端有若布衣士大夫流亡覉絶者莫不經營收葬存恤孤遺士無賢不肖皆傾身以待之是以所在推仰初范陽盧諶每稱之曰吾及晉之清平厯觀朝士多矣忠清簡毅篤信義烈如陽士倫者實亦未幾也及死皝甚悼之比葬三臨時年六十一陽騖陽騖字士秋右北平無終人也其父躭清直沈敏仕為遼西太守慕容翰攻段氏於陽樂破而獲之廆甚敬禮用為謀主官至東夷校尉母李氏博學有母儀皝常升堂拜之騖少清素好學器識沈逺起家為平州别駕屢獻安時强國之䇿事多聽用廆甚竒之及皝即位遷左長史東西征伐㕘謀帷幄封建寧公皝臨終謂􅖡曰陽士秋士行髙潔忠幹貞固可託大事汝善待之􅖡將圖中原騖制勝之功亞於太原王恪暐既嗣立申以師傅之禮親遇日隆及為太尉慨然而歎曰昔常林徐邈先代名臣猶以鼎足任重終辭三事以吾虚薄何徳以堪之固求罷職辭甚懇至暐優容不許騖厯事四朝年耆望重自太原王恪以下皆禮拜之而騖謙恭謹厚過於少時戒束子孫雖朱紫羅列無敢違犯其法度者性尤儉約好施無倦位為台保爵為郡公常乘敝車瘠牛卒無殮財人士莫不痛惜之諡曰敬其子瑶秦苻堅時王猛薦為著作佐郎尋厯顯官封奕封奕字子專渤海蓚人也其祖釋仕晉東夷校尉遼東附塞鮮卑素喜連等入邊為冦攻掠郡縣釋不能討廆擊斬之遂平遼東會釋疾病奕時尚幼乃以屬之於廆釋卒廆召奕與語悦之曰竒士也補小郡督釋子冀州主簿悛幽州㕘軍抽咸來奔喪廆見之曰此家抎抎千斤犍也以道不通喪不得還皆留仕廆廆以抽為長史悛為㕘軍未幾復以奕為軍諮祭酒軍國機要悉以委之皝既嗣位其弟仁東據平郭以叛遼東郡縣多懐疑二皝遣奕慰撫之道路梗塞奕乃引還因討鮮卑木提於白狼克之段遼入冦栁城守將不能自固奕率衆救之城垂沒奕整陣力戰賴以得全遷右司馬尋擊宇文逸豆歸大獲而還其别部大人皆下之進鎮軍左長史遂與諸將佐勸皝稱燕王奕進位相國封武平侯討平冉閔在相位十五年政務之暇留心講論接引後進如若不及喜怒不形於色􅖡即帝位進為太尉領中書監復十餘年遂為定䇿元勲及暐之世欲徙龍城宗廟社稷及所留百官家屬必得耆徳大臣迎之乃遣奕與侍中慕輿龍往迎既至暐親率羣臣謁於道左奕以暐建熙六年卒諡曰匡公宋該宋該字𢎞宣一作宜𢎞平原人也與同郡劉翔杜羣先依王浚又依段氏皆以為不足託帥諸流寓同歸於廆廆舉為龍驤主簿轉右長史廆初為車騎該等以廆立功一隅位卑任重等差無别不足以鎮華夷共表請進廆官爵朝廷不許一作朝議未定會皝嗣立乃燕羣臣於承乾殿以該性貪故賜布百餘疋令自負而歸重不能勝乃至僵頓以愧辱之後遷遼東内史得侍郎韓偏賄賂舉為孝亷皝下令曰夫孝亷者道徳沈敏貢之王庭偏往助叛徒迷固之罪至王威臨討憑城醜詈此則悖一作勃逆之甚者也奈何舉之剖符於朝何所取信該下吏可正四嵗刑偏行財祈進虧亂王典可免官禁錮終身韓恒一作常韓恒字景山灌津人也紀事本末作安平人父黙以學行顯名恒年十嵗能屬文師事同郡張載載竒之曰王佐才也身長八尺一寸博覽經籍無所不通永嘉之亂避地遼東依於崔毖廆既逐毖恒隨俘虜徙於棘城召見與語悦之拜㕘軍事咸和中宋該等建議表請廆為大將軍燕王之號廆將許之命羣僚博議咸以為宜如該議恒駁曰自羣胡乘間人嬰荼毒諸夏蕭條無復綱紀明公忠武篤敬一作篤誠憂勤社稷抗節孤危之中建功萬里之外終古勤王之義未之有也夫立功者患信義不著不患名位不髙故桓文有寧復一匡之功亦不先求禮命以令諸侯今宜繕甲兵候機會除羣兇清四海功成之後九錫自至且要君以求寵爵者非為臣之義也廆頗不平之出為新昌令及皝為鎮軍復㕘軍事遷營邱太守政化大行􅖡為大將軍徴拜諮議㕘軍尋加揚烈將軍􅖡既僭號將定五行次衆論紛紜恒時疾在龍城乃召决之恒未至而羣議以為燕宜承晉為水徳既而恒至言於儁曰趙有中原非惟人事天所命也天實與之而人奪之臣竊謂不可且大燕王迹始自於震於易震為青龍受命之初有龍見於都邑城龍為木徳幽契之符也􅖡初雖難改後終從恒議秘書監聶熊聞恒言歎曰不有君子國何以興其韓令君之謂乎後與李産俱傅東宫從太子曄入朝􅖡顧謂左右曰此二傅一代偉人未易繼也其見重如此恒初無傳乃見夢於予故遂紀之鮮于亮鮮于亮范陽人也初仕石虎為别將與麻秋帥衆迎段遼太原王恪擊敗之亮失馬歩縁山不能進因止端坐恪兵環之叱令起亮曰身是貴人義不為小人所屈汝曹能殺亟殺不能則去亮儀觀豐偉聲氣壯厲燕兵憚之不敢殺乃以白皝皝使人以馬迎之與語大悦拜為左常侍以崔毖之女妻之後皝自率大衆征髙句驪亮言於皝曰臣以俘虜蒙王國士之恩不可以不報今日是臣死日也願效死前驅遂與數十騎先犯髙句驪陣所向摧潰􅖡既嗣立復以亮為前鋒將軍伐趙攻拔薊城陷陣先登威名顯著以功遷揚威將軍厯章武齊郡二郡太守髙詡髙詡遼東人永嘉之亂避地隠居建武初廆自稱大單于詡乃杖䇿見之曰霸王之資非義不濟今晉室雖㣲人心猶附宜遣使江東示有所尊然後仗大義以征諸部誰敢不從此霸王之資也廆善之拜為郎中令皝嗣立遷𤣥菟太守以平征虜仁功封為汝隂侯轉左長史詡善天文皝常謂之曰卿有佳書而不見與何以為忠藎詡曰臣聞人君執要人臣執職執要者逸執職者勞是以后稷播種堯不與焉占候天文晨夜甚苦非至尊之所宜親殿下將焉用之也皝黙然及謀伐宇文逸豆歸詡乃進曰宇文强盛今不取必為國患伐之必克然不利於將出而告人曰吾往必不返然忠臣不避也將發不見其妻使人語以家事而行逸豆歸果大敗身為流矢所中卒乙逸乙逸平原人也仕為東夷護軍慕容仁之叛逸棄城奔還轉𤣥菟太守􅖡建留臺於龍都遷尚書專委留務尋遷幽州刺史被徴為左光禄大夫夫婦共載鹿車逸子璋隨從常數十騎服飾甚麗奉迎於道左逸大怒閉車不與言到城乃深責之璋猶不悛逸常憂其必敗而璋更被擢用頻厯顯位至中書令御史中丞逸乃歎曰吾少自修立克己守道僅能免罪璋不治節儉專為奢縱而更居清要此豈惟璋之沗幸實時世之陵夷也鞠殷鞠殷樂浪太守彭之子也彭初守樂浪趙石虎來伐境内多叛應之彭選壯士數百固守棘城城得不沒趙兵既退大加賞賜殷仕􅖡為尚書左丞太原王恪克廣固遷殷為東萊太守彭時為大長秋以書戒殷曰王彌曹嶷必有子孫汝善招撫勿尋舊怨以長亂源殷推求彌從子立嶷孫巖於中山請與相見深結意分彭復遣使遺以車馬衣服郡民大安張鴻張鴻范陽人也仕皝為黄門郎甚寵愛之鴻頤下忽生鬚三根長寸餘皝由是不悦乃遣出宫使看鵞鴨侯青侯青武邑人也一云朝那人仕儁將作大匠屯騎校尉機巧有筭略驍勇善騎射每從征伐先登陷陣􅖡常擬之張飛韓宰韓宰昌黎人也仕􅖡為謁者僕射揚威將軍子昞一作景降於魏張怖張怖字文祖清河武城人也為燕豫州刺史怖少孤貧隨母長於舅氏令其牧牛怖幼而好學事母以孝聞每日必於牧牛之暇採樵二束菜二本一以供母一以顧人書晝則折木葉學書夜則以所書者讀之成公都成公都晉興元吳人也都驍猛有勇力陽勇之戰陽勇疑誤年十八横矛大呼賊不敢當獨歩當時擬之方叔論者咸曰當求之於古造次無其比也十六國春秋卷三十一
