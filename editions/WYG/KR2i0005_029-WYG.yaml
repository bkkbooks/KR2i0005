body:
  text: 十六國春秋卷二十九前燕録七慕容暐下建熙十年夏四月立貴妃可足渾氏為皇后渾氏太后從弟尚書令豫章公翼女也六月晉大司馬桓温率徐兖二州刺史郄愔江州刺史南中郎將桓冲豫州刺史西中郎將袁真江夏相劉岵等歩騎五萬來伐温又遣建威將軍檀𤣥攻胡陸㧞之執寧東將軍忠進次金鄉時亢旱水道不通乃鑿儀陽道以通舟運自帥師次於合肥一云鑿鉅野三百餘里以通舟運自清水入河暐遣撫軍將軍下邳王厲為征討大都督帥歩騎八萬逆戰於黃墟厲兵大敗單騎奔還髙平太守徐翻舉郡降温温前鋒朱序鄧遐敗暐護軍將軍傅末波於林渚温軍大振暐復遣樂安王臧統諸軍拒温臧不能抗遣散騎常侍李鳳求救於秦秋七月戊寅温進屯武陽暐前兖州刺史孫元率其族黨起兵應之戊子遂至枋頭暐及太傅評大懼謀奔和龍吳王垂曰不然臣請擊之若其不㨗走未晩也乃以垂代樂安王臧為使持節南討大都督帥征南將軍范陽王徳等衆五萬拒温垂表司徒左長史申𦙍黃門侍郎封孚尚書郎悉羅騰皆以㕘軍從事暐又遣散騎樂嵩乞師於秦許賂以虎牢以西之地八月苻堅遣將軍茍池洛州刺史鄧羌帥騎二萬來援出自洛陽至於頴川又遣散騎侍郎姜撫報使於暐外為赴援内實觀隙隂有兼并之志矣封孚問於申𦙍曰温衆强士整乘流直進今大軍徒逡巡髙岸兵不接刄未見克殄之理事將何如𦙍曰以温今日聲勢似能有為在吾觀之必無成功何則晉室衰弱温專制其國晉之朝臣未必與之同心温之得志衆所不願也必將乖阻以敗其事又温驕而恃衆怯於應變大衆深入值可乘之㑹反更逍遥中流不出赴利欲望持久坐取全勝若糧廪愆懸情見勢屈必不戰自敗此自然之數也温以暐降人叚思為鄉導悉羅騰與温戰遂生擒思温使故趙將李述狥趙魏騰又與虎賁中郎將染干津共擊斬之温軍奪氣初温使豫州刺史袁真攻譙梁開石門以通水運真克譙梁而不能開石門水運路塞九月范陽王徳帥騎一萬蘭臺侍御史劉當侃之子也帥騎五千屯石門絶温糧漕豫州刺史李邽一作邦又帥州兵五千斷温糧道徳使將軍宙帥騎一千為前鋒與晉兵遇宙曰晉人輕剽怯於陥陳勇於乘退宜設餌以釣之乃使二百騎挑戰分餘騎為三伏挑戰者兵未交而走晉兵追之宙帥伏出擊死者甚衆丙申温頻戰不利糧儲復竭又聞秦兵將至焚舟棄輜重鎧甲自陸道奔還以毛虎生督東燕等四郡諸軍事領東燕太守温自東燕出倉垣經陳留鑿井而飲行七百餘里暐諸將爭欲追之吳王垂曰不可温初退惶恐必嚴設警備簡精鋭為後拒擊之未必得志不如緩之彼幸吾未至必晝夜疾趨俟其士衆力盡氣衰然後擊之無不克矣乃率八千騎徐行躡其後温果兼道而進數日垂謂諸將曰温可擊矣乃急追之辛丑及於襄邑范陽王徳帥勁卒四千從間道先温至襄邑東伏於澗中與垂前後夾擊温衆大敗斬首三萬級秦將茍池聞温班師邀擊於譙又大敗之死者復以萬計兖州刺史孫元據武陽拒暐暐左衞將軍孟髙討擒之冬十月己巳桓温收散卒屯山陽深恥喪敗乃歸罪於袁真真怨温誣已據夀春叛降於暐且乞師請援暐遣大鴻臚温統拜袁真為使持節散騎常侍都督淮南諸軍事征南大將軍領護南蠻校尉揚州刺史封宣城公燕秦既結好聘使數相來暐散騎侍郎太原郝晷給事黃門侍郎梁琛相繼如秦吳王垂自襄邑還鄴威名益振太傅評素不平之至是益忌垂所奏募將士忘身立效將軍孫葢等推鋒陥陣應蒙殊賞評皆抑而不行垂數以為言與評廷爭隙怨愈深太后可足渾氏又素惡垂毁其戰功與評宻謀誅之垂懼遂奔於秦范陽王徳素與垂善及車騎從事中郎髙泰等皆坐免官尚書右丞申紹言於評曰今吳王出奔外口藉藉宜徴王僚屬之賢者顯進之粗可消謗評曰誰可者紹曰髙泰其領袖也乃以泰為尚書郎先是暐使黃門侍郎梁琛聘秦秦留琛月餘乃遣歸琛兼程而進比至於鄴垂已奔秦琛言於評曰秦人日閲軍旅運粟陜東以琛觀之和必不久今吳王又往歸之秦必有窺釁之計宜早為之備評曰不然秦豈肯受叛人一作臣而敗和好哉琛曰鄰國相吞一作并有自來矣况今二國分據中原並稱大號理無俱存桓温之入冦彼以計相救非愛燕也若燕國有隙彼豈忘其本志哉評曰秦主何如人琛曰苻堅機明好斷納善如流又問王猛琛曰名不虚得王佐之才鋭於進取觀其君臣相得自謂千載一時桓温不足為慮終為人患者其惟王猛乎評皆不以為然琛又以告暐暐亦不然之以告皇甫真真深以為憂上疏陳其事曰苻堅雖聘使相尋托輔車為諭然抗均鄰敵勢同戰國實有闚上國之心非能慕樂徳義守信存和以崇久要也頃來行人累續兼師出洛川夷險要害具之耳目觀虚實以措姦圖聽風塵而伺國隙者冦之常也今吳王垂又往從之為其謀主伍員之禍不可不慮洛陽太原并州壺關諸城皆宜選將益兵以防未兆暐召太傅評謀之評曰秦國小力弱恃我為援且苻堅庶幾善道終不肯納叛臣之言絶二國之好不宜輕自驚擾以啓冦心卒不為備會秦遣黃門郎石越來聘太傅評示之以奢欲以誇燕之富盛尚書郎髙泰及太傅㕘軍河間劉靖言於評曰越言誕而視逺非求好乃觀釁也宜耀兵以示之用折其謀今乃示之以奢益為其所輕矣評不從泰遂謝病歸家是時外則晉師及苻堅交侵兵革不息内則太后可足渾氏侵撓國政評等貪昧無厭貨賂上流官非才舉羣下怨憤尚書左丞申紹上疏曰臣聞漢宣有言與朕共治天下者其惟良二千石乎是以特重此選必妙盡英才莫不拔自貢士厯資内外用能仁感猛獸惠致羣祥今之守宰率非其人或武臣出於行伍或貴戚生長綺紈既無聞鄉曲之選又不更朝廷之職加之黜陟無法貪惰者無刑戮之懼清修者無旌賞之勸百姓困弊侵賕無已兵士逋逃冦盗充斥綱頽紀紊莫相糾攝且吏多則政煩由來常患今之見戸不過漢之一大郡而備置百官加之新立軍號兼重有過往時虚假名位廢棄農桑公私驅擾人不聊生宜并官省職務勸農桑秦吳二虜僻僭一時尚能任道捐情肅諧偽部况大燕累聖重光君臨四海而可美政或虧取陵奸冦哉鄰之有善衆之所望我之不修彼之願也秦吳狡猾地居形勝非惟守境而已乃有吞噬之心中州豐實戸兼二冦弓馬之勁秦吳所憚雲騎風馳四方莫及比者赴敵後機兵不速濟何也皆由賦法靡恒役之非道郡縣守宰每於差調之際無不舎越殷强首先貧弱行留俱窘資贍無所人懷嗟怨遂致奔亡進闕一作關供國之饒退離蠶農之要兵豈在多貴於用命宜嚴制軍務精擇守宰復習兵教戰使偏伍有常從戎之外足營私業父兄有陟岵之觀子弟懷孔邇之顧雖赴水火何所不從節儉省費先王格謨去華敦實哲后恒憲故周公戒成王以豐財為本漢文以皂幃變俗孝景宫人弗過千餘魏武寵賜不盈十萬薄葬不墳儉以率下所以割肌膚之惠全百姓之力也今後宫之女四千有餘僮僕厮役過兼十倍一日之費價盈萬金綺縠羅紈嵗增常調戎器弗營奢玩是務帑藏空虚軍士無賴宰相王侯迭尚侈麗風靡之化積習成俗卧薪之諭未足甚焉宜罷浮華非要之役峻明㛰姻喪葬之條禁絶奢靡浮煩之事出傾宫之女均農商之額公卿以下以四海為家賞必當功罰必當罪如此則綱紀肅舉公私兩遂温猛之首可懸之白旗秦吳二主可禮之歸命豈特保境安民而已哉陛下若不逺追漢宗弋綈之模近崇先帝補衣之美臣恐頽風弊俗亦且改變靡途中興之歌無以軫之絃詠又索虜什翼􅛳昭成諱疲病昏悖雖乏貢御無能為患而勞兵逺戍有損無益况拓宇兼并不在一城控制戎狄懷之以徳魯陽上郡重山之外雲隂之北四百有餘而未可以覉服塞表為平冦之基徒孤危托落令善附内駭宜攝就并豫以臨二河東接漕轂擬之兵後重晉陽之戍増南藩之兵嚴戰守之備衒千金之餌蓄力待時可一舉而滅如其䖍劉送死俟入境而斷之可令疋馬不返非惟絶二國闚􅎿乃是戡殄之要惟陛下覽焉疏奏不省初暐許割虎牢已西賂秦晉兵既退暐又悔之謂秦人曰行人失辭有國有家者分災救患理之常也苻堅大怒遣輔國將軍王猛建威將軍梁成洛州刺史鄧羌帥歩騎三萬來伐十二月猛等進攻洛陽建熙十一年春正月王猛遺荆州刺史武威王筑書曰國家今已塞成皋之險杜盟津之路大駕虎旅百萬自軹關取鄴都金墉窮戍外無救援城下之師將軍所監豈三千敝卒所能支也筑以救兵不至大懼舉金墉降猛猛陳師受之暐遣衛大將軍樂安王臧城新樂破秦兵於石門執秦將楊猛進屯滎陽猛遣梁成鄧羌與臧戰於石門臧軍敗績死者萬餘遂相持於石門梁成又敗臧軍斬首三千餘級獲將軍楊璩猛遂留鄧羌鎮金墉以輔國司馬桓寅為𢎞農太守代羌戍陜城引師而去二月癸酉揚州刺史袁真卒陳郡太守朱輔立真子瑾為建威將軍豫州刺史以固夀陽一作夀春遣其子乾之及司馬㸑亮如鄴請命并乞援師暐以瑾為揚州刺史輔為荆州刺史遣軍援之夏四月辛未桓温使督護竺瑶矯陽之等率水軍擊袁瑾時暐軍已至瑶等與戰於武丘破之温率衆二萬自廣陵又至瑾嬰城固守温築長圍守之六月乙夘秦苻堅復遣輔國將軍王猛督鎮南將軍楊安等十將歩騎六萬來伐猛等兵於灞上秋七月猛進攻壺關安等進攻晉陽八月暐遣太傅上庸王評下邳王厲率中外精兵三十餘萬拒之猛安進屯潞州州郡盗賊大起鄴中又多怪異暐憂懼不知所為乃召散騎侍郎李鳳黃門侍郎梁琛中書侍郎樂嵩問曰秦兵衆寡何如今大軍既出猛等能戰否鳳對曰秦國小兵弱非王師之敵景略常才又非太傅之比不足憂也琛嵩曰不然兵書之義計敵能鬭當以算取之若冀敵不鬭非萬全之道也慶鄭有云秦衆雖少戰士倍我衆之多少非所問也且秦行師千里逺來為冦固戰是求吾當用謀以求勝豈可冀其不戰而已乎暐不悦王猛攻克壺關執上黨太守南安王越所過郡縣望風降附鄴中大震黃門侍郎封孚問司徒長史申𦙍曰事將何如𦙍歎曰鄴必亡矣吾屬今兹將為秦虜然越得嵗而吳亡之卒受其禍今福徳在燕秦雖得志而燕之復建不過一紀耳八月癸丑桓温擊袁瑾於夀陽滅之復取夀陽九月楊安攻晉陽晉陽兵多糧足固守不下王猛留屯騎校尉茍萇戍壺關率兵助安攻之乃為地道使虎牙將軍張蚝率壯士數百潛入城中大呼斬關納秦兵辛巳猛安入晉陽執并州刺史東海王莊太傅評畏猛不敢進屯於潞川冬十月辛亥猛留毛當戍晉陽進兵潞川與評相持評以猛懸軍深入利在速戰議以持久制之評為人貪鄙鄣固山泉鬻水與軍入絹一疋得水二石積錢帛如丘陵士卒怨憤莫有鬭志猛聞之笑曰慕容評真奴才也雖億兆之衆且不足畏况數十萬乎吾今破之必矣遂遣遊擊將軍郭慶帥騎五千夜從間道出評營後起火髙山燒評輜重火見鄴中暐懼遣侍中蘭伊讓評曰王髙祖之子也當以社稷宗廟為憂奈何不撫戰士而𣙜賣樵水專以貨殖為心乎府庫之積朕與王共之何憂於貧若冦兵冒進家國喪亡王持錢帛安所置之皮之不存毛將安傅錢帛可散之三軍以平冦凱旋為先也評大懼遣使詣猛請戰甲子猛陳於渭源軍皆踴躍破釡棄糧大呼競進評師敗績俘斬五萬餘人乘勝追撃所殺及降者又十萬餘人評單騎還鄴猛又追奔長驅至鄴十一月秦王苻堅自帥精鋭十萬赴猛七日而至長安初宜都王桓率衆萬餘屯沙亭為評後繼聞評敗引兵屯内黄堅使建武將軍鄧羌攻信都丁丑桓率鮮卑五千奔龍城戊寅散騎侍郎餘蔚等率扶餘髙句驪及上黨質子五百餘人夜開鄴北門以納秦兵暐與上庸王評樂安王臧定襄王淵左衞將軍孟髙殿中將軍艾朗等數十騎出奔昌黎堅使郭慶追之時道路艱難孟髙扶侍暐經護二王極其勤瘁又所在遇盗轉鬭而前數日行至福禄依冡解息盗二十餘人猝至皆挾弓矢髙持刀與戰殺傷數人髙力竭自度必死乃直前抱一賊頓擊於地大呼曰男兒窮矣餘賊從旁射髙殺之艾朗見髙獨戰亦還趣賊并死暐失馬歩走郭慶追及於髙陽部將巨武執暐將縛之暐曰汝何小人敢縛天子武曰我梁山巨武受詔縛賊何謂天子邪遂送暐於堅堅詰其不降而走之狀暐曰狐死首邱欲歸死於先人墳墓耳堅哀而赦之令還宫率文武出降郭慶進至龍城太傅上庸王評奔髙句驪髙句驪執評送於秦宜都王桓殺鎮東將軍渤海王亮并其衆奔遼東遼東太守韓稠先已降秦桓至不得入攻之不克郭慶遣將軍朱嶷擊之桓棄衆單走嶷獲而殺之諸州牧守及六夷渠帥盡降於秦十二月堅入鄴宫升正陽殿徙暐及后妃王公以下并鮮卑四萬餘戸於長安封暐新興郡侯邑五千戸尋拜尚書堅征臺城以暐為平南將軍别部都督淮南之敗隨堅還長安既而吳王垂攻苻丕於鄴中山王冲起兵關中暐謀殺堅以應之事發為堅所誅先是暐之六年二月丙子月奄熒惑在參占曰參魏地災當在燕至是而暐滅時年三十五在位十一年及徳僭稱尊號偽諡幽皇帝始廆以晉武帝太康六年嵗在乙巳稱公至暐四世晉海西公太和五年嵗在庚午滅凡八十五年十六國春秋卷二十九
