body:
  text: 十六國春秋卷三十七前秦録五苻堅中建元八年春二月以清河房曠為尚書左丞徴曠兄黙及清河崔逞燕國韓𦙍為尚書郎北平陽陟田勰陽瑶鶩之子也為著作佐郎郝晷為清河相皆闗東士望王猛所薦也冠軍將軍慕容垂言於堅曰臣叔父評燕之惡來軰也不宜復汚聖朝願陛下為燕戮之乃出評為范陽太守燕之諸王悉補邉郡三月詔闗東之民學通一經才成一蓺者所在郡縣以禮送之在官百石以上學不通一經才不成一蓺者罷遣還民復魏晉士籍使役有常其諸非正道典學一皆禁之自永嘉之亂庠序無聞及堅之僭頗留心儒學乃親臨太學考學生經義上第擢叙者八十三人堅以境内旱課百姓區種懼嵗不登省節榖帛之費大官後宫減常度三等百僚之秩以次降之是時有大風從西南來俄而晦㝠恒星皆見又有赤星見于西南太史令魏延言於堅曰於占西南國亾明年必當平蜀漢堅大悦命秦梁密謀戒嚴夏五月以高平徐攀為琅邪太守攀綂之少子以舊恩㧞之也六月癸酉冀州牧王猛入為丞相中書監尚書令太子太傅司𨽻校尉特進常侍持節將軍侯如故陽平公融為使持節都督六州諸軍事鎭東大將軍冀州牧融將發堅祖于灞東奏樂賦詩秋八月丞相王猛至長安復加都督中外諸軍事猛辭曰元相之重儲傅之尊端右事繁京牧任大總督戎機出納帝命文武兩寄巨細並闗以伊呂蕭曹之賢尚不能兼况臣猛之無似乎章三四上堅不許曰朕方混一四海非卿無可委者卿之不得辭宰相猶朕不得辭天下也猛既為相堅端拱于上百官總已於下軍國内外之事無不由之猛剛明清肅善惡著白放黜尸素顯㧞幽滯勸課農桑練習軍旅官必當才刑必當罪國富兵强戰無不克闗隴清宴百姓豐樂自長安至於諸州皆夾路樹槐栁二十里一亭四十里一驛旅行者取給於途工商貿販於道百姓歌之曰長安大街夾樹楊槐車頻秦書作两邉種槐下走朱輪上有鸞棲英彦雲集誨我萌黎堅勅太子宏及長樂公丕等曰汝事王公如事我也陽平公融在冀州高選綱紀以尚書郎房黙河間相申紹為治中别駕清河崔宏為州從事管記室融年少為政好新竒貴苛察申紹數規正導以寛和融雅敬之未能盡從後紹出為濟北太守融屢以過失聞數致譴譲乃自恨不用紹言融甞坐擅起學舍為有司所紏遣主簿李纂詣長安自理纂憂懼道卒復遣燕尚書郎高泰往事遂得釋詳具泰傳冬十一月都督北藩諸軍事鎭北大將軍開府儀同三司朔方桓侯梁平老卒建元九年春三月魏昭成帝復使燕鳯來聘夏四月天鼓鳴有彗星出於尾箕長十餘丈或名蚩尤旗經太微掃東井自夏及秋冬不滅太史令張猛言於堅曰尾箕燕之分野東井秦之分野今彗星起尾箕而掃東井害深禍大十年之後燕當滅秦二十年之後燕當為代所滅慕容暐父子兄弟亾虜也我之仇讐而布列朝廷貴盛莫二臣竊憂之宜剪除渠帥以寧皇秦若旦誅鮮卑不夕滅彗星者臣請受妖言之戮堅不納更以暐為尚書垂為京兆尹沖為平陽太守陽平公融聞之上疏曰臣聞東胡在燕厯數彌久逮於石亂遂據華夏跨有六州南面稱帝陛下爰命六師大舉征討勞卒頻年然後獲之本非慕義懐徳歸化而來今父子兄弟列官滿朝執權履職勢傾勞舊陛下親而幸之臣愚以為猛獸終不可飬狼子野心星變如此願少留意以思天戒臣居可言之地不容黙已詩曰兄弟急難朋友好合昔劉向以肺腑之親尚能極言况於臣乎堅報之曰汝為徳未充而懐是非立善未稱而名過其實詩云徳輶如毛人鮮克舉君子處高戒懼傾敗可不務乎今四海事曠兆庻未寧黎元應撫夷狄應和方將混六合為一家同有形於赤子汝宜息慮勿懐耿介天道助順夫惟修徳可以禳災茍能内求諸己何懼外患乎秋八月晉梁州刺史楊亮遣子廣襲仇池與梁州刺史楊安戰廣兵敗績沮水諸戍皆委城奔潰亮懼退守罄險水經注云亮以容裘谷嶮固難㧞保而居之九月安遂進㓂漢川冬十月堅使益州刺史王綂秘書監朱肜帥步騎二萬為前鋒出漢川㓂蜀前禁將軍毛當鷹揚將軍徐成帥步騎三萬出劍門㓂梁益梁州刺史楊亮帥巴獠萬衆來拒戰於青谷亮兵敗績奔固西城肜乘勝㧞漢中徐成攻劍閣克之楊安進攻梓潼晉奮威將軍西蠻校尉梓潼太守周􅡟固守涪城遣步騎數千送母妻自漢水趨江陵朱肜邀而獲之􅡟遂降安十一月安克梓潼晉荆州刺史桓豁遣江夏相竺瑶一作瑗救梁益瑶聞廣漢太守趙長戰死引兵而退揚武將軍益州刺史周仲孫勒兵拒肜等於綿竹聞毛當將至成都仲孫帥騎五千奔於南中安當進兵遂䧟梁益二州於是西南夷卬莋夜郎等皆來歸附堅以楊安為右大將軍益州牧鎭成都毛當為鎭西將軍梁州刺史鎭漢中姚萇為寧州刺史屯墊江王綂為南秦州刺史鎭仇池堅欲以周􅡟為尚書郎􅡟曰䝉國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不足為榮况郎官乎遂不仕自是每入見或箕踞而坐呼之為氐賊堅不悦後値元㑹儀衞甚盛堅問之曰晉家元㑹與此何如􅡟攘袂厲聲曰偏方崛起儀衞皆從簡畧何敢比擬天朝羣臣以􅡟不遜屢請誅之堅待之彌厚晉益州刺史領建平太守毛虎生率其子梓潼太守來伐至巴西糧盡退屯巴東是嵗鮮卑勃寒寇掠隴右堅使乞伏司繁討之勃寒請降遂使司繁鎭勇士川建元十年春三月侍中太尉建寧烈公李威卒夏四月堅下書曰巴夷險逆㓂亂益州招引吳軍為唇齒之勢特進鎭軍將軍䕶𦍑校尉鄧𦍑可帥甲士五萬星夜赴討五月蜀人張育楊光等起兵二萬以應巴獠晉益州刺史竺瑶威遠將軍桓石䖍帥衆三萬攻墊江寧州刺史姚萇帥兵拒之敗績退屯五城瑶與石䖍移屯巴東張育自號蜀王遣使稱藩於晉與巴獠酋帥張重尹萬等五萬餘人進圍成都六月育改元黑龍秋七月張育與張重等争權舉兵相攻鄧𦍑與楊安等襲撃育敗之育與楊光退屯綿竹八月鄧𦍑敗晉師於涪西九月楊安敗張重尹萬于成都南重死斬首二萬三千級鄧𦍑復撃張育楊光於綿竹皆斬之益州遂平𦍑勒銘於岷山而還冬十一月𦍑至自成都堅引見勞之增邑三千戸十二月有人入明光殿大呼謂堅曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見秘書監朱肜秘書侍郎略陽趙整固請誅鮮卑堅不聽建元十一年春正月長安大風宫中樹悉㧞遣使廵行四方觀風俗問政道明黜陟恤孤獨不能自存者賜糓帛有差以安車蒲輪徴隠士樂陵王歡一作觀又作勸見前燕傳為國子祭酒堅雅好文學英儒畢集純博之精莫如歡也終于太子少傅夏五月清河武侯王猛寢疾堅親為之祈南北郊及宗廟社稷分遣侍臣徧禱河岳諸神無不周備猛疾少瘳為之赦殊死已下猛上疏曰不圖陛下以臣之命而虧天地之徳開闢以來未之有也臣聞報德莫如盡言謹以垂没之命竊獻遺欵伏惟陛下威烈振乎八荒聲教光乎六合九州百郡十居其七平燕定蜀猶如拾芥夫善作者不必善成善始者不必善終是以古先哲王知功業之不易兢兢業業如臨深谷伏惟陛下追蹤前聖天下幸甚堅覽之悲慟秋七月堅親至猛第省疾問以後事猛曰晉雖僻處江南然正朔相承上下安和臣没之後願勿以晉為圖鮮卑𦍑虜我之仇讐終為人患宜漸除之以便社稷言終而卒年五十一比殮堅三臨哭之甚慟謂太子宏曰天不欲使我平一六合耶何奪我景略之速也葬之如漢霍光故事贈侍中丞相餘如故諡武侯朝禁巷哭三日冬十月下詔曰新喪賢輔百司或未稱朕心可置聽訟觀于未央南朕五日一臨以求民隱今天下雖未大定權可偃武修文以稱武侯雅㫖其尊崇儒教禁老莊圖䜟之學犯者棄市妙簡學生太子及公侯百僚之子皆就學受業中外四禁二衞四軍長上將士皆令受學二十人給一經生教讀音句後宫置典學立内司以教掖庭選閹人及女𨽻敏慧者詣博士授經尚書郎王佩讀䜟殺之學䜟者遂絶又置左右鎭郎及拂盖郎是年長安樵人于城内見金鼎走白堅堅遣載取到化為銅鼎入門又變成大鐸又有射師經嵩山望見松上有一隻白鳥似鵠而大至樹下又見一蛇長四五丈許上樹取鳥鳥欲飛蛇張口噏之鳥不得去繽紛一飡頃射師彀弓射三矢蛇落鳥得去去樹百餘步山邉整理羽毛須叟雲雷電發射師懼不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陣雲息電滅射師得免鳥亦飛去建元十二年春正月癸巳初高陵縣民穿井得龜大三尺六寸背文負八卦古字堅命作池飬之食之以粟後死藏其骨於太廟其夜廟丞高虜夣龜謂之曰我本出將歸江南遭時不遇隕命秦庭即有人夢中謂虜曰龜三千六百嵗而終終必妖興亾國之徴也二月下詔曰朕聞王者勞於求賢逸於得士斯言何其驗也往得丞相甞謂帝王易為自丞相違世鬢髪中白每一念之不覺酸慟今天下既無丞相或政教淪替可分遣侍臣周廵郡縣問民疾苦三月遣兵攻南鄉㧞之山蠻三萬戸來降夏四月下詔曰涼州刺史張天錫雖稱藩受位然臣道未純可遣使持節武衞將軍茍萇左將軍毛盛中書令梁熈步兵校尉姚萇等將兵臨河西遣尚書郎閻負梁殊銜命軍前下書徴天錫入朝若有違王命即進師撲討堅嚴飭鹵簿親餞萇等於城西賞行將士各有差是時步騎十三萬軍司叚鏗謂周􅡟曰以此衆戰誰能禦之􅡟曰戎狄以來未之有也堅又遣秦州刺史茍池河州刺史李辯涼州刺史王綂帥三州之衆為萇等後繼秋七月閻負梁殊至涼州天錫自以晉之列藩志在保境命軍士縛負殊射殺之遣龍驤將軍馬建帥衆二萬出拒八月梁熈姚萇王綂李辯濟自青石一作清石津攻其將梁粲一作濟於河㑹城䧟之甲申茍萇濟自石城津與梁熈等㑹攻纒宿城宿一作縮又陷之馬建懼自楊非一作川退還清塞天錫遣征東常據率衆三萬助馬建軍於洪池茍萇遣姚萇以甲卒三千挑戰涼州諸將勸據迎撃以挫其鋒據畏不敢動天錫又自率中軍五萬進次金昌城萇熈聞天錫來逼攻建益急建帥萬人來降遂進攻據辛夘戰于洪池據敗伏劔自殺癸巳萇軍進入清塞乘高列陳天錫又遣司兵趙充哲為前鋒與萇等戰於赤岸充哲大敗俘斬三萬八千級天錫懼奔還姑臧致牋請降甲午萇至姑臧天錫乘素車白馬面縛舁櫬降于軍門萇釋縛焚櫬送之長安郡縣悉降涼州平九月以梁熈為持節西中郎將涼州刺史領䕶西𦍑校尉鎭姑臧徙豪右七千餘户于闗中五品税金銀一萬三千斤以賞軍餘皆安堵如故遣使者以安車徴處士郭瑀定禮儀會瑀父喪而止姑臧太守辛章遣書生三百人就受業焉封天錫重光縣之東寧鄉二百戸號歸義侯拜比部尚書萇等將征天錫先為築第于長安至則居之以天錫晉興太守隴西彭和正為黄門侍郎治中從事武興蘓膺為燉煌太守張烈為尚書郎西平太守金城趙凝為金城太守高昌楊幹為高昌太守餘皆隨才擢叙梁熈清儉愛民河右安之又以天錫武威太守燉煌索泮為别駕宋皓為主簿西平郭䕶起兵來攻熈以皓為折衝將軍討平之冬十月劉衞辰為魏昭成帝所逼遣使求救堅遣安北將軍幽州刺史行唐公洛為北討大都督帥幽冀一作州兵十萬撃魏又遣後將軍并州刺史俱難鎭軍將軍鄧𦍑尚書趙遷御史中丞李柔前將軍朱肜前禁將軍張蚝右禁將軍郭慶帥歩騎二十萬東出和龍西出上郡皆與洛㑹以劉衞辰為鄉導洛菁之弟也初茍萇伐涼州遣楊武將軍馬暉建武將軍杜周帥八千騎西出恩宿邀張天錫走路期㑹姑臧暉等行澤中値水失期於法應斬有司奏徴下獄堅曰水春冬耗竭秋夏盛漲此乃萇量事失宜非暉等罪今天下方有事宜宥過責功命暉等廻赴北軍撃代以自贖衆咸以為萬里召將非所應速堅曰暉等喜於免死不可以常事疑也暉等果倍道疾驅遂及東軍十一月昭成帝使白部獨孤部來禦洛兵皆不勝復使南部大人劉庫仁將十萬騎禦之庫仁者衞辰之族昭成帝之甥也洛等與庫仁戰于石子嶺庫仁大敗奔遁弱水洛等逐之勢甚窮廹昭成帝時病不能自將乃帥諸部奔隂山之北高車雜種盡叛四面㓂抄不得芻牧復渡漠南洛兵稍退乃還十二月還至漠中帝病益篤繼嗣未定世子獻明帝諱寔早卒太祖諱珪獻明帝子尚幼諸子每夜執兵警衞以備秦兵其族子斤説庻長子寔君曰王將立慕容妃之子欲先殺汝故頃來諸子每夜戎服以兵遶廬帳伺便將發耳寔君信之旬有二日遂殺諸弟而弑帝國中大亂時太祖母賀氏以太祖走依賀訥是夜部人來告李柔張蚝勒兵趨之部衆逃潰遂平代地洛等振旅而還堅以帝庻子窋咄年長遷之長安使入太學讀書堅召燕鳯問代所以亂故鳯具以狀對堅曰天下之惡一也乃執寔君及斤至長安車裂之堅欲遷太祖於長安鳯以其㓜弱固請於堅曰代王初薨臣子亾叛遺孫㓜沖莫相輔立其别部大人劉庫仁勇而有智鐡弗衞辰狡猾多變皆不可獨任宜分諸部為二令此兩人綂之兩人素有深讐其勢莫敢先發俟其孫長乃引而立之是陛下施大惠於亾國使其子子孫孫永為不侵不叛之臣此安邉之良策也堅從之鳯尋辭堅東還堅下詔曰張天錫藉祖父之資承百年之業擅命河右叛據偏隅索頭世跨朔北中分區域東賔穢貊西引烏孫控弦百萬虎視雲中爰命兩師分討黠虜役不淹歲窮殄二兇俘降百萬闢土九千五帝之所未賔周漢之所未至莫不重譯來王懐風率職有司可速班功受爵戎士悉復之五嵗賜爵三級於是加行唐公洛征北將軍以鄧𦍑為并州刺史陽平國常侍晉載記曰堅既平涼州又遣其安北將軍幽州刺史苻洛為北討大都督率幽州兵十萬討代王涉翼犍又遣後軍俱離與鄧𦍑等率步騎二十萬東出和龍西出上郡與洛㑹于涉翼犍庭翼犍戰敗遁於弱水苻洛逐之勢窘廹退還隂山其子翼珪縛父請降洛等振旅而還封賞有差堅以翼犍荒俗未叅仁義令入太學以翼珪執父不孝遷之於蜀散其部落於漢􅥧邉故地立尉監行事官僚領押課之治業營生三五取丁優復三年無租税其渠帥嵗終令朝獻出入往來為之制限堅甞之太學召翼犍問曰中國以學飬性而人夀考漠北啗牛羊而人不夀何也翼犍不能荅又問卿種人有堪將者可召為國家用對曰漠北人能捕六畜善馳走逐水草而已何堪為將又問好學否對曰若不好學陛下用教臣何為堅善其對初堅既克涼州議討西障氐𦍑堅曰彼種落雜居不相綂一不能為中國大患宜先撫諭徴其租税若不從命然後討之乃使殿中將軍張旬前行宣慰庭中將軍張曷飛帥騎二萬七千隨之曷飛忿其恃嶮不服縱兵擊之大掠而歸堅怒其違命鞭之二百斬前鋒督䕶儲安以謝氐𦍑氐𦍑大恱降附貢獻者八萬三千餘落雍州士族先因亂流寓河西者皆聽還本州劉庫仁招撫離散恩信甚著奉事太祖恩勤周備不以廢興易意常謂諸子曰此兒有高天下之志必能恢隆祖業汝曹當謹遇之堅賞其功加廣武將軍給幢麾鼔盖劉衞辰耻在庫仁之下怒殺秦五原太守而叛庫仁撃衞辰破之追至隂山西北千餘里獲其妻子又西撃庫狄部徙其部落置之桑乾川久之堅以衞辰為西單于督攝河西雜𩔖屯代來城建元十三年春初堅以闗中水旱不時議依鄭白故事發王侯已下及豪望富室僮僕三萬人開涇水上源鑿山起堤通渠引瀆以溉岡一作舄鹵之田及是而成民賴其利以涼州新附復租賦一年為父後者賜爵一級孝弟力田爵二級孤寡高年糓帛有差女子百户牛酒大酺三日高句驪新羅西南夷皆遣使入朝趙故將作功曹熊邈屢為堅言石氏宫室器玩之盛堅以邈為將作長史領尚方丞大修舟艦兵器飾以金銀頗極精巧太史奏有星見於外國之分當有聖人入輔中國得之者昌堅曰朕聞西域有鳩摩羅什㐮國有釋道安神清氣足方欲致之以輔朕躬並遣求之習鑿齒以脚疾廢于里巷堅素聞其名與道安俱輿而致焉既見與語大恱之賜遺甚厚又以其蹇疾與諸鎭書曰昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳盖刺其蹇也俄以疾歸㐮陽是年晉郎中張禕使堅立在階下以手障額看堅堅問曰視天子不過衱衱交領也卿何慢朕答曰臣在南中聞長安氐為天子謂陛下頥上有角堅大笑建元十四年春二月堅遣征南大將軍都督征討諸軍事守尚書令長樂公丕武威將軍茍萇尚書司馬慕容暐帥歩騎七萬宼㐮陽以荆州刺史楊安帥樊鄧之衆為前鋒屯騎校尉征虜將軍始平石越帥精騎一萬出魯陽闗京兆尹慕容垂揚武將軍姚萇帥衆五萬出南鄉領軍將軍茍池右將軍毛當強弩將軍王顯帥勁卒四萬出武當繼進大㑹漢陽秦書作襄陽夏四月師次沔北晉南中郎將梁州刺史朱序監沔中諸軍鎭㐮陽以固北鄙序以丕軍無舟檝不以為虞既而石越帥騎五千浮渡漢水秦書作遊馬以渡序惶駭固守中城越攻陷外郛獲船百萬艘以濟餘軍丕帥諸將進攻中城遣茍池石越毛當以衆五萬屯江陵序母韓氏聞秦兵將至自登城履行至西北隅以為不固當先受弊遂領百餘婢并城中女丁於其角斜築城二十餘丈及丕至攻西北隅果潰衆便移固新城丕遂引退㐮陽人因謂此城為夫人城晉車騎將軍桓沖擁衆七萬為序聲援憚池等强不敢進保據上明丕欲急攻襄陽茍萇諫曰吾衆十倍於敵糗糧山積但稍遷漢沔之民内於許洛塞其運道絶其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂㧞南陽執太守鄭裔與丕㑹襄陽堅又遣别將宼彭城晉以將軍毛穆之假節監江北諸軍事鎭廣陵秋七月兖州刺史揚武將軍彭超越之弟也遣使上言于堅曰晉沛郡太守戴遂以卒數千戍彭城臣請帥精鋭五萬攻之願更遣重將討淮南諸城為征南棊刧之勢東西並進丹陽不足平也堅從之使都督東討諸軍事後將軍俱難帥右將軍毛當後禁將軍毛盛洛州刺史陵江邵保𦍑之從弟也等步騎七萬㓂淮隂一作陽盱眙八月彭超㓂彭城梁州刺史韋鍾宼魏興攻太守吉挹於西城晉右將軍毛虎生帥衆五萬鎭姑孰以禦之與俱難等相持于淮南九月梁州刺史梁熈遣使入西域稱揚堅之威徳并以綵繒賜諸國王於是朝獻者十有餘國冬十月大宛獻天馬千里駒皆汗血朱鬛五色鳯膺麟身及諸珍異五百餘種堅曰吾常慕漢文帝之返千里馬咨嗟美咏今所獻馬其悉返之庻克念前王彷彿古人矣乃命羣臣作止馬之詩而遣之示無欲也羣下以為盛徳之事逺同漢文於是獻詩者四百餘人堅與羣臣飲酒于釣臺以秘書監朱肜秦書作朱彤為酒正堅曰今日之飲酒當令人以極醉為限秘書侍郎趙整以堅頗好酒作酒徳之歌以諌之堅大恱命整書之以為酒戒自是宴羣臣禮飲而已十一月豫州刺史北海公重鎭洛陽謀反堅曰長史吕光忠正必不與之同也即命光収重檻車送長安赦之以公就第重洛之兄也十二月御史中丞李柔劾奏長樂公丕等擁衆十萬攻圍小城日費萬金久而無效請徴下廷尉堅曰丕等費廣無成實宜貶戮但師已久淹不可虚返其特原之令其功成贖罪因遣黄門侍郎韋華持節切譲丕等仍賜以劍曰來春不㨗者汝可自裁不足復持面見吾也時周􅡟宻與桓沖書言秦隂事又逃奔漢中為追騎所獲左右皆請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳赦而不問是嵗天鼓鳴建元十五年春正月丕等得詔惶恐衆咸疑懼莫知所為征南主簿河東王施進曰以大將軍英秀諸將勇鋭以攻小城何異洪爐燎羽毛所以緩攻欲以計制之若決一旦之機可指日而定今破㐮陽上明自遁復何所疑願請一旬之期以展三軍之勢如其不㨗施請為戮首丕乃命諸軍併力促圍攻之堅欲自率衆助丕詔陽平公融將闗東六州之衆㑹於壽春梁綂綂一作熈率河西之兵為後繼融諫曰陛下欲取江南固當博謀熟慮不可倉猝若止取㐮陽又豈足親勞大駕乎未有動天下之衆而為一城者所謂以隋侯之珠彈千仞之雀也綂亦諫曰晉主之暴未如孫皓江山險固易守難攻陛下必欲廓清江表亦不過分命將帥引闗東之兵南臨淮泗下梁益之卒東出巴峽又何必親屈鑾輅逺幸沮澤乎昔漢光武誅公孫述晉武帝擒孫皓未聞二帝自綂六師親執枹鼓蒙矢石也堅乃止晉以桓沖為車騎將軍都督豫江二州六郡諸軍事自京口遷鎭姑孰沖遣宣城内史朱序豫州刺史桓伊率衆向壽陽冠軍將軍南郡相淮南太守劉波一作江夏相劉奭帥衆八千汎舟沔泗乗虚致討以救襄陽又遣毛穆之游軍沔中波畏丕兵不敢進朱序出戰丕等屢敗序自恃連勝又以引退稍逺疑未能來不為設備二月㐮陽督䕶李伯䕶密遣其子送欵於丕約為内應丕命諸軍進攻之戊午克㐮陽執朱序送長安堅以序能守節拜度支尚書以李伯䕶為不忠斬之序欲逃歸潛至宜陽藏夏揆家堅疑揆収之序乃詣平原公暉自首堅喜而不問以為尚書將軍慕容越㧞順陽執太守譙國丁穆送至長安堅欲官之穆稱疾篤固辭不受以中壘將軍梁成為南中郎將都督荆揚州諸軍事荆州刺史領䕶南蠻校尉配兵一萬鎭㐮陽以征南府器仗給之并選其才望禮而臣之以前將軍張蚝為并州刺史晉兖州刺史謝𤣥帥衆萬餘救彭城遣東筦太守高衡後軍將軍何謙軍於泗口一作汭欲遣間使報龍驤將軍戴􅋟令知救至其道無由部曲將田泓請没水潛行以趨彭城𤣥遣之為秦所獲乃厚賂泓使云南軍已敗泓偽許之既而告城中曰南軍垂至我單行來報為賊所得勉之秦人殺之彭超圍彭城置輜重於留城謝𤣥乃揚聲遣何謙等帥衆萬餘向留城超聞之釋彭城圍引兵還保輜重謙馳進解彭城圍戴􅋟帥衆隨謙奔𤣥超遂據彭城留兖州治中徐褒守之南攻盱眙俱難既䧟淮隂留邵保戍之與超㑹師而南三月癸未晉右將軍毛武生帥衆三萬撃巴中以救魏興遣前鋒督䕶趙福將軍袁虞等將水軍一萬溯江而上進次巴西堅遣南巴校尉姜宇將軍張紹仇生等水陸五千拒之武生等為紹所敗俘斬七千餘人武生退屯巴東蜀人李焉一作烏聚衆二萬圍成都以應武生堅使破虜將軍呂光撃滅之夏四月戊申韋鍾攻梁州魏興太守吉挹遣衆拒之斬七百餘級鍾帥衆欲趨㐮陽挹又要撃之斬五千餘級鍾怒廻軍圍挹挹又屢挫其鋭其後堅軍繼至挹力不能抗城埀欲陷引刀欲自殺其友止之曰且茍存以展他計為計不立死未晚也挹不從友人逼奪其刀㑹鍾至執之挹不言不食而死堅嘆曰周孟威不屈於前丁彦逺潔已於後吉祖沖閉口而死何晉氏之多忠臣也遂㓂蜀漢進陷涪城梁州刺史楊亮益州刺史周仲孫並委城奔潰毛當王顯帥衆二萬自㐮陽而東㑹俱難彭超攻淮南五月乙丑難超陷盱眙執晉建威將軍高宻内史毛璪之一作藻之遂圍幽州刺史田洛于三阿衆共六萬去廣陵百里京都大震臨江列戍晉孝武帝遣征虜將軍謝石率水軍次涂中右衞將軍毛安之遊撃將軍王曇之淮南太守楊廣宣城内史丘準帥衆四萬次堂邑謝𤣥自廣陵救三阿毛當毛盛帥騎二萬襲堂邑安之等軍人相驚遂各潰散𤣥帥衆三萬次白馬塘俱難遣將軍都顔帥騎逆𤣥戰於塘西大敗斬顔六月丙子𤣥進兵至三阿與難超戰超等大敗退保盱眙戊子𤣥進次石梁帥衆五萬攻盱眙難超出戰復敗退屯淮隂何謙解田洛圍進次白馬又與難等合戰邵保戰死難超退屯淮北𤣥與何謙戴􅋟田洛共追之戰於君川難超復大敗𤣥叅軍劉牢之攻破浮航及白船督䕶諸葛侃單父令李都帥舟師乘潮而上夜焚淮橋又破其運艦難超相率北走僅以身免俱難歸罪彭超斬司馬栁渾堅聞之大怒秋七月檻車徴超下廷尉超乃自殺難削爵為庻人堅賞堂邑之功以毛當為平南將軍徐州刺史鎭彭城毛盛為平東將軍兖州刺史鎮胡陸王顯為平吳校尉揚州刺史戍下邳是嵗大饑建元十六年春正月堅復以北海公重為鎭北大將軍鎭薊二月起教武堂于渭城命太學生明隂陽兵法者教授諸將秘書監朱肜諫曰陛下東征西伐所向無敵四海之地什得其八雖江南未服盖不足言是宜稍偃武事増修文徳乃更始立學舍教人戰鬬之術殆非所以馴致升平也夫飬將之法譬之飬馬秣以高櫪習以戰馭長鞭策後金勒制前析施䂓矩任知進退且諸將皆百戰之餘何患不習于兵乃更使受教於諸生非所以强其志氣也此無益于實而有損于名惟陛下圖之堅乃止三月堅以行唐公洛為散騎常侍使持節都督寧益西南夷諸軍事征南大將軍益州牧領䕶西夷校尉鎮成都使自伊闗趨㐮陽泝漢而上洛雄勇多力而猛氣絶人堅深忌之故甞為邉牧自以有征伐之功而未賞及是遷也恚怒謀于衆曰孤於帝室至親也主上不能以將相任孤常擯孤于外既投之於西裔復不聽過京師此必有伏計令梁成沈孤于漢水耳不宜束手受命為追晉陽之事以匡社稷於諸君意何如幽州治中平䂓一作顔曰逆取順守湯武是也因禍為福桓文是也主上雖不為昏暴然窮兵黷武民思息肩者十室而九若明公神旗一建必率土雲從今跨據全燕地盡東海北總烏桓鮮卑東引句麗百濟控弦之士不減十萬奈何束手就縛蹈不測之禍乎洛攘袂大呼曰孤計決矣沮謀者斬於是自稱大都督秦王署置百官以平規為輔國將軍幽州刺史為之謀主分遣使者徴兵於鮮卑烏桓高句麗百濟及新一作薛羅休忍等諸國並不從洛懼而欲止平規曰且宜聲言受詔盡幽并之兵南出中山常山陽平公必郊迎於路因而執之進據冀州總闗東之衆以圖秦雍可使百姓不覺易主而大業指麾定矣洛從之夏四月洛帥衆七萬發和龍將圖長安於是闗中騷動盗賊並起堅遣使譲洛曰天下未一家兄弟匪他何為而反可還和龍當以幽州永為世封洛謂使者曰汝還白東海王幽州褊阨不足容萬乘須還王咸陽以承高祖之業若能迎駕潼闗者當位為上公爵歸本國堅大怒遣左將軍竇衝及步兵校尉吕光帥步騎四萬討之右將軍都貴馳傳詣鄴將冀州兵三萬為前鋒以陽平公融為征討大都督授之節度使屯騎校尉石越帥騎一萬自東萊出石逕浮海四百餘里襲和龍北海公重亦悉薊城之衆與洛㑹屯中山有衆十萬五月衝等與洛戰於中山洛兵大敗生擒洛及其將蘭殊送長安吕光追斬重於幽州石越襲和龍斬平規及其黨與百餘人幽州悉平堅赦蘭殊署為將軍徙洛于涼州之西海郡六月徴陽平公融為侍中中書監都督中外諸軍事車騎大將軍司𨽻校尉領宗正録尚書事以征南大將軍守尚書令長樂公丕為都督闗東諸軍事征東大將軍冀州牧堅以闗東地廣人殷且諸𦍑種𩔖繁滋思所以鎮静之秋七月引羣臣於東堂議曰凡我族𩔖支𦙍彌繁今欲分三原九嵕武都汧雍氐十五萬戸使諸宗親各領之散居要鎮不㤀舊徳為磐石之宗於諸君意何如皆曰此有周所以祚隆八百社稷之利也於是分四帥子弟三千戸以配長樂公丕鎮鄴如世封諸侯為新劵主以仇池氐酋射聲校尉楊膺為征東左司馬膺丕之妃兄也九嵕氐酋長水校尉齊午為右司馬午膺之妻父也各領一千五百戸為長樂世卿長樂國郎中令略陽垣敞為録事參軍侍講扶風韋幹為參軍事申紹為别駕堅送丕於灞上流涕而别諸戎子弟離其父兄者皆悲號哀慟酸感行人識者以為喪亂流離之象八月分幽州置平州以石越為平州刺史領䕶鮮卑中郎將鎮龍城大鴻臚韓𦙍領䕶赤河中郎將移烏丸府于代郡之平城中書令梁讜為安逺將軍幽州刺史鎮薊城撫軍將軍毛興為都督河秦二州諸軍事鎮西將軍河州刺史鎮枹罕長水校尉王騰為鷹揚將軍并州刺史領䕶匈奴中郎將鎮晉陽河并二州各配氐戸三千興騰本苻氏婚姻氐之崇望也平原公暉為都督豫洛荆南兖東豫揚六州諸軍事鎮東大將軍豫州牧鎮洛陽移洛州刺史治豐陽以鉅鹿公叡為安東大將軍雍州刺史鎮蒲阪各配氐戸三千二百冬十月以左禁將軍楊璧為秦州刺史尚書趙遷為洛州刺史南巴校尉姜宇為寧州刺史十二月以左將軍都貴為荆州刺史鎮彭城置東豫州以毛當為刺史鎮許昌是嵗高密内史毛璪之等二百餘人歸附于晉堅自平諸國之後國内殷實遂示人以侈懸珠簾於太極前殿以朝羣臣宫宇車乘器物服御悉以珠璣琅玕竒寶珍怪飾之又使熊邈造金銀細鎧金為綖以縲之尚書金部郎中裴元略諌曰臣聞堯舜茅茨周卑宫室故能致治和平慶垂八百始皇窮極奢麗嗣不及孫此萬古所以傳載也願陛下則采椽之不斵鄙瓊室而不居敷純風于天下流休範于無窮賤金玉貴五榖勤恤民隠勸課農桑捐無用之器棄難得之物敦至道以厲薄俗修文徳以懐逺人然後一軌九州同風天下刑措既登告成東岳蹤軒皇以齊美哂二漢之徒封臣之願也堅大悅曰非卿之忠何由聞朕過乎悉命去之以元略為諌議大夫是年有人持一銅斛於市賣之其形正員下向為斗横梁昻者為升低者為合梁一頭為籥籥同黄鍾可容半合邉有篆銘堅以問道安安曰此王莽時物自言出自舜皇龍戊辰改正即眞以同律量布之四方欲大小器鈞令天下取平焉堅乃勅學士内外有疑皆師于安故時人為之諺曰學不師安義不中難建元十七年春二月鄯善王及車師前部王皆來朝堅引見于太極前殿大宛獻汗血馬肅愼貢楛矢天竺獻火浣布𦍑抑摩獻羊六角二口四角八口新羅國獻美女國在百濟東其人多美髪髪長丈餘康居于闐及海東諸國凡六十有二王皆遣使貢其方物是時四夷賔服凑集闗中四方種人皆竒貌異色晉人為之題目謂胡人為側鼻東夷為廣面闊額北夷為匡脚南蠻為臐蹄方以𩔖名也其年自正月不雨至於六月堅徹樂減膳出宫女以迎和氣秋八月収起居注及著作所録而觀之見茍太后李威之事慙怒乃焚其書而大檢史官將加其罪著作郎趙泉車敬等已死乃止著作郎董裴一作斐雖更書時事然十不得一冬十一月荆州刺史都貴一作郝貴又作梁成遣㐮陽太守司馬閻振中兵參軍吳仲等帥衆二萬入宼竟陵留輜重於管城水陸輕進晉車騎將軍桓沖遣南平太守桓石䖍與弟衞軍參軍桓石民竟陵太守郭銓等水陸二萬拒之相持月餘十二月甲辰石䖍設計夜渡滶水既濟振等始覺襲撃之戰於滶水振等大敗退保管城石䖍乘勝進攻癸亥遂㧞管城斬振及仲大小將帥二十九人送于京師俘虜萬七千馬數百匹牛羊千頭裝鎧三百領貴以輕騎走保㐮陽堅遣左將軍竇衝率衆攻平陽太守張元熈于皇天塢河南太守楊佺期撃走之佺期自湖城入潼闗累戰皆㨗斬獲千計降九百餘家歸于洛陽十六國春秋卷三十七
