body:
  text: 十六國春秋卷四十五後燕録三慕容垂下建興元年春正月辛卯羣僚勸即尊號具典儀修郊燎之禮垂從之遂以晉太元十一年僭即帝位於南郊大赦境内殊死已下改元建興署置公卿百官繕修宗廟社稷於中山立世子寶為太子以左長史厙傉官偉右長史段崇龍驤將軍張崇中山尹封衡為吏部尚書范陽王徳為侍中都督中外諸軍事領司隸校尉撫軍將軍麟為衞大將軍其餘文武拜授有差三月追尊母蘭氏為文昭皇后遷皝后文明段氏於别室而以蘭氏配饗太祖博士劉詳董謐議以堯母妃位第三不以貴陵姜嫄明聖王之道以至公為先垂不從又以景昭可足渾氏傾覆社稷追廢之尊烈祖昭儀段氏為景徳皇后配享烈祖齊桓公命諸侯無以妾為妻夫之於妻猶不可以妾代之況子而可以易其母乎春秋所稱母以子貴者君母既没得以妾母為小君也至於享祀宗廟則成風終不得配莊公也君父之所為臣子必習而效之猶形聲之於影嚮也寳之逼殺其母由垂為之漸也堯舜之讓猶為之噲之禍況違禮而縱私者乎昔文姜得罪於桓公春秋不之廢可足渾氏雖有罪於前朝然小君之義成矣垂以私憾廢之乂立兄妾之無子者皆非禮也夏四月甲午封子農為遼西王麟為趙王隆為髙陽王丙申以范陽王徳為尚書令太原王楷為左僕射樂浪王溫為司隸校尉五月遣太原王楷趙王麟陳留王紹章武王宙等攻秦冀州牧苻定鎮東將軍苻紹幽州牧苻謨鎮北將軍苻亮楷先以書遺之陳示禍福定等悉降垂封定等皆為列侯曰以酬秦王之徳且擬三恪秋八月戊辰垂留太子寶守中山以趙王麟為尚書右僕射録留臺事庚午自率范陽王徳等南略地使高陽王隆東狥平原丁零鮮于乞保曲陽西山聞垂南伐出營望都剽掠居民麟出討之諸將皆曰殿下虚鎮逺征萬一無功而反虧損威重不如遣諸將討之麟曰乞聞大駕在外無所畏忌必不設備一舉可取不足憂也乃聲言至魯口夜迴趣乞比明至其營掩擊擒之冬十月垂擊破苻丕於河東丕走東垣晉揚威將軍馮該擊斬之甲申寺人吴深據清河反垂攻之不克乙酉進攻吳深壘抜之深單馬遁走垂進屯聊城之逢闗阪初垂太子洗馬太原温詳奔晉晉以為濟北太守屯東阿垂遣范陽王徳高陽王隆攻之詳遣從弟攀守河南岸子楷守碻磝來拒初魏拓跋窟咄為苻堅徙於長安因隨慕容永為新興太守其部人劉顯遣弟亢泥迎窟咄以兵隨之前逼南境賀染干侵魏北境以應窟咄太祖跖抜珪慮内難乃北踰陰山幸賀蘭部阻山為固遣行人安同長孫賀乞師於垂垂使趙王麟帥步騎隨同等救之麟軍未至魏衆驚擾北部大人叔孫普洛十三人及諸烏丸亡奔劉衞辰麟聞之先一作遽遣安同等歸魏人知燕軍在近衆心少安窟咄進屯高柳太祖引兵自弩山遷幸牛山屯於延水南出代谷與麟會於高柳擊之窟咄大敗奔劉衞辰衞辰殺之太祖悉收其衆以代人厙狄干為北部大人麟引兵還中山垂以太祖為西單于印綬封上谷公太祖不受是年又造刀二口長七尺一雌一雄若别處之其刀則鳴呉深復來降附建興二年春正月丁巳垂觀兵河上高陽王隆曰溫詳之徒皆白面書生烏合為羣徒恃長河以自固若大軍濟河必望旗震慄一作懼不待戰也垂從之戊午遣鎮北將軍蘭汗䕶軍將軍平幼於碻磝西四十里濟河隆以大衆陳於北岸温攀温楷果走趣平城幼追擊大破之詳夜將妻子奔彭城其衆三萬餘戸皆降秦冗從僕射光祚黄門侍郎封孚鉅鹿太守封勸皆來奔降垂以太原王楷為兖州刺史鎮東阿初安定人齊涉聚衆八千餘家據新栅來降垂拜涉為魏郡太守既而復叛連結張願願自率萬餘人進屯祝阿之瓮口招翟遼兵應涉高陽王隆言於垂曰新栅城固攻之未易猝抜若久頓兵於其城下張願擁率流民西領丁零為患方深願衆雖多然皆新附未能力鬭因其自至宜先擊之願父子恃其驍勇必不肯避去可一戰擒也願破則涉自不能存矣垂從之二月遣范陽王徳陳留王紹龍驤將軍張崇率歩騎二萬㑹隆擊願軍至斗城去瓮口二十餘里解鞍頓息願引軍奄至士衆驚擾徳因退走隆勒馬不動願子龜出陳隆遣左右王末逆擊斬之隆徐進戰願兵乃退徳行里餘復整兵還遂與隆合謂隆曰賊氣方鋭宜且緩之隆曰願乗人不備宜得大捷而吾士卒皆以懸隔河津勢迫之故人思自戰故能却之今賊不得利氣竭勢衰皆有進退之志不能齊奮宜亟擊之徳曰吾惟卿所為耳遂進戰於瓮口大破之斬首七千八百級願脫身保三布口隆等進軍歴城青徐兖州郡縣壘壁多降垂以陳留王紹為青州刺史鎮歴城徳等還師新栅人冬鸞執涉送之垂誅涉父子餘悉原之三月上谷人王敏殺太守封戢代郡人許謙逐太守賈閠各以郡附劉顯夏四月以樂浪王温為尚書右僕射垂自碻磝還中山慕容柔慕容盛慕容會來自長子庚辰為之大赦垂問盛曰長子人情如何為可取乎盛曰西軍擾擾人有東歸之志陛下惟當修仁政以俟之耳若大軍一臨必投戈而來若孝子之歸慈母也垂大悅癸未封柔為陽平王盛為長樂公會為清河公高平人翟暢執太守徐含逺以郡降翟遼垂謂諸將曰遼以一城之衆反覆二國之間不可不討五月以章武王宙監中外諸軍事輔太子寶守中山自率諸將南攻翟遼以太原王楷為前鋒遼之部衆皆燕趙之人楷至相率歸附遼懼請降垂至黎陽遼肉袒謝罪垂厚撫之以為徐州牧封河南公井陘人賈鮑招引北山丁零翟遥等五千餘人夜襲中山陷其外郛章武王宙以竒兵出其外太子寶鼔譟於内合擊大破之盡俘其衆惟遥鮑單馬走免劉顯地廣兵强雄於北方會其兄弟乖争魏長史張衮言於太祖曰顯志大意高希冀非望乃有參天貳地籠罩宇宙之規吳不并越將為後患今因其内釁宜速乘之若輕師獨進恐或越逸可遣使告慕容垂共相聲援東西齊舉勢必擒之然後總括英雄撫懐逺邇此千載一時不可失也太祖從之復遣行人安同乞師於垂垂使趙王麟率衆會之垂自黎陽還中山吳深殺清河太守丁國章武人王祖殺太守白欽渤海人張申據高城以叛命樂浪王温討之秋七月趙王麟討王敏於上谷斬之劉衞辰獻馬於垂劉顯掠之垂怒遣太原王楷將兵助趙王麟擊大破之顯奔馬邑西山太祖引兵會麟擊顯於彌澤又破之顯奔西燕麟悉收其部衆獲馬牛羊以千萬數八月垂立劉顯弟可泥為烏丸王撫其遺衆徙八千餘落於中山冬十月翟遼復叛遣兵與王祖張申冦掠清河平原太祖遣外朝大人王建使於垂建興三年春二月翟遼遣司馬眭瓊詣垂謝罪垂以其數反覆斬瓊以絶之遼怒自稱大魏天王改元建光署置百官時青州刺史陳留王紹為平原太守辟閭渾所逼退屯黄巾自固垂更以紹為徐州刺史渾蔚之子也初因苻氏亂據齊地降晉三月乙亥為太子寶起承蕐觀以寶錄尚書政事巨細悉以委之垂總大綱而已趙王麟擊許謙破之謙奔西燕遂廢代郡悉徙其民於龍城夏四月丁亥立夫人段氏為皇后又以太子寶領侍中大單于驃騎大將軍幽州牧追諡前妃段氏為成昭皇后五月翟遼徙屯滑臺秋七月遣䕶軍將軍平幼會章武王宙討吴深破之深走繹幕八月魏太祖密有圖燕之志遣九原公拓跋元儀奉使至中山垂詰之曰魏王何以不自來儀曰先王與燕竝事晉室世為兄弟今臣奉使於理未失理一作禮垂曰吾今威加四海豈得以昔日為比儀曰燕若不修徳禮欲以兵威自强此乃將帥之事非使臣所知也儀還言於太祖曰燕王衰老太子闇弱范陽王自負才氣非少主臣也燕王既沒内難必作於時乃可圖耳今則未可太祖乃止九月張申攻廣平王祖攻樂陵壬午高陽王隆將兵討之冬十月垂遣使報聘於魏十二月庚子太原王楷趙王麟將兵會高陽王隆於合一作魯口以擊張申王祖帥諸壘共救之夜犯燕軍楷等逆擊走之隆欲追之楷麟曰王祖老賊或詐走而設伏不如俟明隆曰此白地羣盜烏合而來邀幸一決非素有約束能一其進退也今失利而去衆莫為用乘勢追之不過數里可盡擒也申之所恃惟在於祖祖破則申降矣乃留楷麟守申壘隆與平幼分道擊之比明大獲而還懸所獲之首示申甲寅申懼出降祖亦歸罪建興四年春正月以陽平王柔鎮襄國遼西王農在龍城五年表請代還庚申召農還為侍中司隸校尉以高陽王隆為都督幽平二州諸軍事征北大將軍幽州牧建留臺於龍城以隆録留臺尚書事又以䕶軍將軍平幼為征北長史散騎常侍封孚為司馬竝兼留臺尚書夏四月以長樂公盛鎮薊城修繕舊宫翟遼冦滎陽執太守張卓五月清河民孔金斬吳深送首中山魏陳留公拓跋䖍使於垂時暐及諸宗室為苻堅所害者竝招魂葬之清河太守賀耕聚衆定陵以叛南應翟遼遼西王農討斬之毁定陵城進師入鄴以鄴城廣大難固築鳳陽門大道之東為隔城水經註云因鄴故宫建都中山小城之南更築隔城興復宫觀今府榭猶𫝊故制尚書郎婁會上疏曰三年之喪天下之達制兵荒殺禮遂以一切取士人心奔競茍求榮進至乃身冐縗經以赴時役豈必狥忠於國家亦昧利於其間也聖王設教不以顛沛而虧其道不以喪亂而變其化故能杜豪競之門塞奔波之路陛下鍾百王之季廓中興之業天下漸平兵革方偃誠宜蠲蕩瑕穢率由舊章吏曹一作遭大喪聴終三年之禮則四方知化人斯服禮垂不從范陽王徳趙王麟擊賀訥追奔至勿根山訥窮迫請降徙之上谷質其弟染于於中山冬十月乙酉樂浪王温為翟遼所襲死之垂遣使報聘於魏是年垂遣使遺沙門僧朗書曰皇帝敬問太山朗和尚澄神靈緒慈蔭百國凡在含生孰不䝉潤朕承藉纂統方夏事膺昔吴蜀不恭魏武含慨今二賊未平朕豈獲安又元戎克興狂掃暴亂至人靈通隨權指化願兵不血刃四海混伏委心歸依久敬何已今遣使者送官絹一百疋袈裟三領綿五十斤幸為咒願朗荅書於垂曰能仁御世英䂓遐邈光敷道化融濟四海貧道忝服道味習教山林豈惟詔㫖諮及國難王者膺期統有六合大能併小自是常倫若葵藿之傾太陽飛步之宗麟鳳皇澤載融羣生繫仰陛下高明何思不服貧道窮林䝉賜過分頓首復建興五年春三月垂遣趙王麟率衆至魏夏四月丙寅太祖會趙王麟於意辛山擊賀蘭紇突隣紇奚三部落大破之紇突隣紇奚皆降於魏秋八月太祖遣弟秦王拓跋觚使於垂九月北平吴柱聚衆千餘立沙門為天子攻破北平轉寇廣都入白狼城高陽王隆方葬其夫人郡縣守宰皆來會衆聞柱反請隆還城遣大兵討之隆曰今閭閻安業民不思亂柱等以詐謀惑愚夫誘脅相聚無能為也遂留葬訖遣北平太守廣都令先歸續遣安昌侯進將百餘騎趨白狼城柱衆聞之皆潰窮捕斬之建興六年春正月置行臺於薊加長樂公盛録行臺尚書事賀染干謀殺其兄訥訥知之舉兵相攻魏太祖遣使告於垂請為鄉導以討之二月甲戌垂遣趙王麟將兵擊訥鎮北將軍蘭汗帥龍城之衆擊染干夏四月蘭汗破染干於牛都六月甲辰趙王麟破賀訥於赤城擒之降其部落數萬垂命麟歸訥部落徙染干於中山麟歸言於垂曰臣觀拓跋諱舉動終為國患不若攝之還朝使其弟監國事垂不從秋七月壬申垂如范陽太祖復遣秦王觚獻馬於燕垂衰老子弟用事留觚以求良馬太祖弗與遂與燕絶使長史張衮求好於西燕王永永使大鴻臚鈞奉表於魏勸進尊號觚逃歸太子寶追獲之垂待之如初冬十月壬辰垂還中山與羣僚議討永太史令靳安言於垂曰彗星經尾箕之分燕當有野死之王不出五年其國必亡嵗在鶉火必克長子垂乃止安出而謂人曰此衆既并終不能久安意蓋知太祖之興也而不敢言翟遼既稱尊號有衆數萬屯於滑臺與垂累年相擊至是遼死子釗代立改元定鼎攻逼鄴城遼西王農擊走之十二月戊申垂如魯口建興七年春二月壬寅垂自魯口如河間渤海平原翟釗遣其將翟都侵館陶屯蘇康壘三月垂引兵南擊釗進逼蘇康壘夏四月翟都南走滑臺翟釗求救於西燕王永永謀於衆尚書郎渤海鮑遵曰使兩冦相敝吾乘其後此卞莊子之策也中書侍郎太原張騰曰强弱異勢何敝之有不如救之以成鼎峙之勢可引兵趣中山晝多疑兵夜多火炬彼必懼而還師我衝其前釗躡其後此天授之機不可失也永不從六月垂軍黎陽臨河欲濟翟釗列兵南岸以拒之諸將惡其兵精咸諫不宜濟河垂笑曰豎子何能為吾今為卿等殺之辛亥垂徙營就西津去黎陽西四十里為牛皮船百餘艘載疑兵列仗遡流而上釗先以大衆備黎陽見垂向西津乃棄營西拒垂遣中壘將軍桂陽王鎮率驍騎將軍國自黎陽津夜濟壁於河南比明而營成釗聞之亟還攻鎮等營垂命鎮等堅壁勿戰釗士卒往來疲渴攻營不能抜將引去鎮等引兵出戰遼西王農自西津濟河與鎮夾擊大破之釗走歸滑臺攜妻子率數百騎北濟河登白鹿山慿險自守兵不得進農曰釗無糧不能久居山中乃引兵還留騎候之釗果下山還兵掩擊盡擒其衆釗單騎奔長子永以釗為車騎大將軍兖州牧封東郡王嵗餘謀反永殺之釗所署清河崔宏新興張卓遼東䕫騰陽平路纂及郝晷崔逞皆來降附垂各隨才而用之所統七郡户三萬八千皆安堵如故以章武王宙為兖豫二州刺史鎮滑臺徙徐州流民七千餘戸於黎陽以彭城王脱垂之弟子也為徐州刺史鎮黎陽垂以崔蔭為宙司馬秋七月垂如鄴以太原王楷為冀州牧右光禄大夫餘蔚為右僕射冬十二月辛卯垂還中山以遼西王農為都督兖豫荆徐雍五州諸軍事鎮鄴建興八年春正月陽平孝王柔卒夏四月庚子垂加太子寶大單于以厙傉官偉為太尉范陽王徳為司徒太原王楷為司空陳留王紹為尚書右僕射五月立子熙為河間王朗為渤海王鑒為博陵王冬十月垂欲興師討永於長子諸將皆曰永未有釁頃年以來士卒疲於行陳居人不暇耕織瘡痍滿身哭泣盈路宜且撫士安民以俟時長子不足憂也范陽王徳曰不然昔三祖積徳遺訓在耳故陛下龍飛不謀而會雖由聖武亦緣舊愛燕趙之士樂為燕臣故也昔光武馳蘇茂之難不顧百官之疲夫豈不仁機急故耳兵法有不得已而用之者方今海内版蕩人百其心急之則得其用緩之各懷所私永既國之枝葉又僭舉位號扇動華夷惑民視聴致令羣豎縱横逐鹿不息宜先除之以一民心士卒雖疲庸得已乎垂笑謂諸將曰司徒議正與吾同二人同心其利斷金吾計決矣且吾投老扣囊底智足以克之不復留逆賊以累子孫也遂戒嚴十一月發中山步騎七萬遣鎮西將軍丹陽王纘龍驤將軍張崇出井陘攻永弟武鄉公友於晉陽征東將軍平視攻鎮東將軍段平於沙亭永遣尚書令刁雲車騎將軍北地王鍾率衆五萬屯潞川十二月垂至鄴建興九年春二月垂留清河公會鎮鄴發司冀青兗兵遣太原王楷出自塗口遼西王農出自壺闗垂自出沙亭擊永標榜所趣軍各就頓永聞之嚴兵分道拒守聚糧臺壁遣從子征東將軍小逸豆歸鎮東將軍王次多右將軍勒馬駒率衆萬餘戍之夏四月垂頓軍鄴之西南月餘不進永怪之以為太行道寛謂垂詭道伐之乃悉攝諸軍還杜太行軹闗惟留臺壁軍甲戌垂進師出􅇭口入自天一作木井闗五月丁巳月掩歲星在尾占曰燕國滅亡乙酉垂軍至于臺壁永遣太尉大逸豆歸帥衆來拒垂征東將軍平視擊破之小逸豆歸出戰遼西王農又擊破之斬勒馬駒及王次多遂圍臺壁永召太行軍還自率精兵五萬來拒阻河曲以自固馳使請戰北地王鍾震怖率衆來降永誅其妻子己亥垂列陣於臺壁之南分農楷軍為左右翼驍騎將軍國伏千騎於深澗下庚子與永合戰垂引軍偽退永追奔數里國發伏兵馳斷其後楷農夾擊之永師大敗斬首八千餘級奔還長子晉陽守將聞之棄城走丹陽王纘攻克晉陽六月垂進圍長子永欲奔後秦侍中蘭英曰昔石虎伐龍都太祖堅守不去卒成大燕之基今垂七十老翁厭苦兵革終不能頓兵連嵗以攻我也但當守城以備之耳永從之秋八月永困急遣子常山公𢎞等求救於雍州刺史郄恢并獻玉璽一紐晉出兵救之永恐晉兵不至又遣太子亮為質於晉平視追亮及於高都獲之永又告急於魏太祖遣陳留公䖍將軍庾岳帥騎五萬東渡河屯秀谷以救之時晉魏兵皆未至大逸豆歸部將賈韜等潛為内應開門納垂兵垂進兵入城永奔北門為前驅所獲垂數而戮之并斬其所署公卿已下刁雲大逸豆歸等四十餘人永所統新舊八郡戸七萬六千八百及乘輿服御圖書伎樂珍寶悉獲之於是品物具矣垂以丹陽王纘為平州刺史鎮晉陽宜都王鳳為雍州刺史鎮長子永尚書僕射昌黎屈遵尚書陽平王徳秘書監中山李先太子詹事渤海封則黄門郎太山胡母亮中書郎張騰燕郡公孫表皆隨才擢叙九月垂自長子如鄴冬十月垂東巡陽平平原命遼西王農濟河與鎮南將軍尹國畧地青兖一作河南農攻廩丘國攻陵城皆抜之農與平東太守韋簡戰於平陸簡死晉高平太守徐含逺遣使告急龍驤將軍劉牢之不能救於是高平太山琅邪諸郡皆委城奔潰農進師臨海徧置守宰而還十一月農敗晉辟閭渾於龍水遂入臨淄十二月垂召龍等還告捷於龍城秦姚興遣使來結好并送太子寶之子敏於垂垂封敏為河東公建興十年春正月垂遣散騎常侍封則報聘於秦遂自平原狩於廣川渤海長樂而歸夏五月太祖侵逼附塞諸郡甲戌垂遣太子寶及遼西王農與趙王麟等率步騎八萬自五原伐魏范陽王徳陳留王紹别將步騎一萬八千為寶後繼散騎常侍高湖切諫垂怒免其官爵六月癸丑太原元王楷卒秋七月魏張衮聞燕軍將至言於太祖曰燕狃於滑臺長子之捷竭國之資力以來有輕我之心宜羸形一作師以驕之乃可克也太祖從之悉徙部落畜產西渡河千餘里以避之寶軍至五原降魏别部三萬餘家收穄田百餘萬斛置黑城進師臨河造船為濟具太祖遣右司馬許謙乞師於秦八月太祖治兵於河南九月進師臨河築臺告津奮揚威武連旌沿河東西千有餘里太子寶列兵將濟暴風忽起漂其船數十艘泊南岸魏獲其甲士三百餘人皆釋而遣之寶之發中山也垂已有疾既至五原魏使人邀中山之路伺其使者盡執之寶數月不聞垂起居太祖使所執使者詭為辭臨河告之曰若父已死何不早歸寶等聞之憂恐以為信然士卒駭動往往聞言皆欲為變魏使陳留公拓跋䖍將騎五萬屯於河東要山截谷百餘里以絶其左東平公拓跋元儀將騎十萬屯於河北以承其後略陽公拓跋元遵將騎七萬塞其中山之路時秦姚興遣楊佛暠將兵救魏至是亦至寶初至幽州所乘車軸無故自折術士靳安以為大凶固勸令還寶怒不從至是問安安言於寶曰天時不利咎徵已集燕必大敗速去可免寶愈大恐安退告人曰吾輩皆當死於他鄉尸骸委於草野為烏鳥螻蟻所食不復得歸家矣燕魏相持積旬趙王麟將慕輿暠以垂為實死潛謀作亂奉麟為主事洩暠等皆死寶麟等内自猜疑冬十月辛未燒船夜遁時河冰未結寶以魏兵必不能渡不設斥候十一月己卯天暴風冰合魏引兵濟河留輜重選精鋭二萬餘騎急追之寶軍還次參合忽有大風黑氣狀若隄防或高或下自軍後來臨覆軍上沙門支曇猛言於寶曰風氣暴迅魏軍將至之候宜遣兵禦之寶以去魏軍已逺笑而不納曇猛固請不已麟怒曰以殿下神武師徒之盛足以威行沙漠索虜何敢逺來而曇猛妄言驚衆當斬以狥曇猛泣曰苻氏以百萬之師敗於淮南正由恃衆輕敵不信天道故也范陽王徳勸寶從曇猛言寶乃遣麟率衆三萬為後殿以禦非常麟以曇猛言為虚縱騎遊獵不肯設備俄而黄霧四塞日月晦明寶遣騎還伺魏兵騎行十餘里即解鞍寢卧魏兵晨夜兼行乙酉暮至㕘合寶軍在陂東營於蟠羊山南水上靳安言於寶曰今日西北風勁是追兵將至之應宜設警備兼行速去不然必危寶乃使人防後寶先不撫循軍無節度將士莫為盡心不覺大軍在近魏前驅斥候見燕軍營還告其夜太祖部分諸將掩覆燕軍諸將羅落為東西犄角之勢約勒士卒銜枚束馬口無聲潛進丙戌昧爽魏兵齊進日出登山下臨燕營燕軍晨將東引顧見軍至士卒大驚擾亂奔走魏縱兵擊之燕軍走赴氷人馬相騰躡有馬者皆蹶倒氷上自相壓死傷者萬數魏略陽公拓跋遵以兵邀其前燕兵四五萬人一時放仗斂手就禽其遺迸去者不過數千人而已太子寶等率數千騎奔免殺右僕射陳留悼王紹生禽魯陽王倭奴桂林王道成垂之弟子也濟陰公尹國北地王鍾世子葵安定王世子羊兒以下等文武將吏數千人獲寶寵妻及宫人兵甲輜重軍糧資財以巨萬計太祖簡擇俘衆之有才能者代郡太守廣川賈閏閏從弟驃騎長史昌黎太守彝太史郎遼東晁崇等留之其餘欲悉給衣糧遣還以招懷中州之人中部大人一作冠軍將軍王建曰燕衆强盛今傾國而來我幸而大捷不如悉殺之則其國空虚取之為易若獲寇而縱之無乃不可乎太祖謂諸將曰若從建言吾恐後南人創乂絶其向化之心非弔民伐罪之義也諸將咸以建言為然建又固執乃悉坑之十二月寶恥參合之敗屢言魏有可乘之機范陽王徳亦言於垂曰虜以參合之役有陵太子之心宜及陛下聖略摧其鋭志不然將為後患太史令曰太白夕没西方數日後見東方此為躁兵先舉者亡垂不從乃以清河公會録留臺事領幽州刺史代高陽王隆鎮龍城以陽城王蘭汗為北中郎將代長樂公盛鎮薊命隆盛悉引精兵還中山期以明年大舉擊魏建興十一年春正月高陽王隆引龍城之衆入中山軍容精整士氣稍振垂遣征東將軍平視發兵冀州二月視以博陵武邑長樂三郡兵反於魯口其從子冀州刺史平喜諫不聴視弟海陽令平翰起兵遼西以應之垂遣鎮東將軍餘嵩擊視嵩敗死之垂自將兵擊視軍至魯口視棄衆將妻子及喜等數十人走渡河垂引兵還翰率衆趨龍城清河公會遣東陽公根等擊翰破之翰走山南三月庚子垂留司徒范陽王徳守中山自率大衆密發踰青嶺經天門鑿山開道出魏不意直指雲中魏陳留公拓跋䖍部落三萬餘家先鎮平城垂次獵嶺以遼西王農高陽王隆為前鋒襲擊之時燕兵新敗皆畏魏强惟龍城兵勇鋭争先䖍素不設備徵兵未集閏月乙卯農等軍至平城乃覺䖍率麾下邀擊敗死遂抜平城收其部衆三萬餘人太祖欲出走諸部聞䖍死皆有二心垂至㕘合見往年戰處積骸如山設弔祭之禮水經注云設策弔之禮死者父子兄弟遂皆號哭六軍哀慟聲振山谷垂慚憤嘔血因而寢疾乘馬輿而進頓平城西北三十里水經註云四十里寶等至雲中聞垂疾皆引歸垂在平城或有叛者奔告於魏曰垂病已亡輿尸在軍魏又聞㕘合大哭以為信然乃進兵欲追之知平城已䧟而退還館陰山垂在平城積十日疾轉篤踰山結營聞魏兵將至乃築燕昌城以自固夏四月癸未垂至上谷之沮陽卒遺令曰方今禍難尚殷喪禮一從簡易朝終夕殯事訖成服三日之後釋服從政强冦伺隙秘勿發喪至京然後舉哀行服寶等遵行之丙申至中山戊戌發喪垂以太元二十一年死時年七十一在位十三年偽諡成武皇帝廟號世祖墓曰宣平陵十六國春秋卷四十五
