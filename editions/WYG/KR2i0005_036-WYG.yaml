body:
  text: 十六國春秋卷三十六前秦録四苻堅上苻堅字永固一字文玉或作名健弟雄之第二子也趙建武中洪從石虎徙鄴家於永貴里母茍氏甞遊漳水祈子於西門豹祠歸其夜夢與神交因而有孕十二月而生堅有神光之異自天燭其庭堅背有赤文隱起狀如篆文成字曰艸音草付臣又土王咸陽堅秘而莫之傳也姿貎魁傑臂埀過膝目有紫光祖洪見堅狀貎竒而愛之欲令頭堅腹軟字之曰堅頭堅或作肩年七歲聰敏好施舉止不踰䂓矩每侍洪側輒量洪舉措取予不失機候洪每謂健曰此兒姿貎瓌偉質性過人頭大鎭重身長任大足短安下非常相也趙光禄大夫司𨽻校尉高平徐統有知人之鍳遇堅於路異之執其手曰苻郎此官之御街小兒敢戲於此不畏司𨽻縛耶堅曰司𨽻縛犯罪者不縛小兒戲也統顧左右曰此兒有伯王之相左右怪之曰此兒狀貎甚醜而君以為貴相何異也統曰非爾等所及知也後又遇之統下車屏人密謂之曰苻郎骨相不恒後當大貴但恨僕老不及見如何堅曰若如公言不敢􅁯徳八歲請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成况汝戎狄異𩔖世知飲酒今乃求學耶欣而許之性至孝愽學多才埶年十一便有經略大志健之西入闗也次於曲沃夢天神遣使者赤冠朱衣命拜堅為龍驤將軍翼日乃為壇於曲沃以授之健泣謂堅曰汝祖昔受此號汝父次為之今若復為神明所命可不勉之堅揮劍捶馬志氣感厲士卒莫不憚服於是要結豪傑以圖緯世之宜吕婆樓强汪梁平老等皆有王佐之才傾身禮之以為股肱羽翼太原薛讃略陽權翼見而驚曰非常人也及生嗣位讃翼説堅曰主上猜忍暴虐中外離心有徳者昌無徳者殃天之道也神器甚重方今宜主秦祀者非殿下而誰願殿下順天人之心以行湯武之事勿使他姓得之堅以問尚書呂婆樓婆樓曰僕刀鐶上人耳不足以辦大事僕里舍有王猛其人謀略不世出殿下宜請而咨之堅因婆樓以招猛一見如舊友語及時事堅大悅自謂如劉𤣥徳之遇諸葛孔明也生既殘虐無度特進領御史中丞梁平老等亟以為言詳具平老傳堅遂與兄清河王法謀殺生既而以位譲法法曰汝嫡嗣且賢宜立堅曰兄年長宜立羣臣皆頓首固請堅從之永興元年夏六月堅去皇帝之號稱大秦天王即位於太極殿誅生佞臣中書監董榮左僕射趙韶等二十餘人大赦境内殊死以下遂以晉升平元年改元永興追諡父雄為文桓皇帝母茍氏為皇太后妃茍氏為皇后世子宏為皇太子以清河王法為使持節侍中都督中外諸軍丞相録尚書事東海公諸王皆降爵為公以從祖右光禄大夫永安公侯為太尉從兄晉公栁為車騎大將軍尚書令封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熈為廣平公叡為鉅鹿公漢陽李威為衛將軍尚書左僕射梁平老為右僕射强汪為領軍將軍仇騰為尚書領選席寶為丞相長史行太子詹事吕婆樓為司𨽻校尉王猛為中書侍郎八月復以薛讃為中書侍郎權翼為給事黄門侍郎與王猛並掌機密九月追復魚遵雷弱兒毛貴王墮梁楞梁安叚純辛牢等悉復本官以禮改葬之子孫存者皆隨才擢授大將軍冀州牧張平謀叛據新平雁門河西太原上黨上郡諸地壁壘三百餘夷夏十餘萬戸拜置征鎭欲與秦敵冬十月平帥衆掠境堅以晉公栁都督并冀州諸軍事加并州牧鎭蒲坂以禦之十一月丞相東海公法以疑忌賜死茍太后以法長且賢又得衆心懼終為變故遣殺之堅性友愛與法訣於東堂慟哭嘔血諡曰哀十二月堅行至尚書以文案不治免左丞程卓官以王猛代之於是修廢職繼絶世禮神祗課農桑立學校鰥寡孤獨高年不自存者賜糓帛有差其殊才異行孝友忠義徳業可稱者令所在以聞秦民大悅永興二年春二月堅自將討張平以驍騎將軍鄧羗為前鋒督䕶率騎五千據汾上平使養子張蚝禦之蚝多力趫㨗與羗相持旬餘莫能相勝三月堅至銅壁平悉衆出戰堅鷹揚將軍呂光刺蚝中之鄧羗擒蚝以獻平衆大潰懼而請降堅赦其罪署為右將軍蚝為虎賁中郎將徙平所部三千餘户於長安夏四月堅如雍祠五畤六月如河東祠后土秋八月自臨晉登龍門顧謂羣臣曰美哉山河之固婁敬有言闗中四塞之國眞不虚也權翼薛讃對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身竄南巢首懸白旗軀殘於犬戎國分於項籍者何也徳之不修故耳吳起有言在德不在險深願陛下追蹤唐虞懷逺以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸九月庚辰堅還長安以太尉永安公侯守尚書令賜為父後者爵一級鰥寡高年糓帛有差丏所過田租之半是秋大旱堅減膳徹樂金玉綺繡皆散之戎士命后妃以下悉去羅紈衣不曵地開山澤之利公私共之息兵養民旱不為災王猛日親幸用事宗親勲舊莫不嫉之諸氐紛紜競陳猛短堅恚甚慢罵或有鞭撻於殿庭者權翼進曰陛下宏達大度善馭英豪神武卓犖録功捨過有漢祖之風然慢易之言所宜除之堅笑曰朕之過也自是公卿以下見猛屏息甘露元年春正月起明堂禪南北郊祀其祖洪以配天宗祀其伯健於明堂以配上帝二月親耕藉田皇后茍氏親蠶於近郊平羗䕶軍高離據略陽叛永安公侯率衆討之未克而卒諡曰威夏四月驍騎將軍鄧羗秦州刺史啖鐡討平之五月堅如河東南遊霸陵顧謂羣臣曰漢祖起自布衣廓平四海佐命功臣孰為首乎權翼進曰漢書以蕭曹為功臣之冠堅曰漢祖與項羽爭天下困於京索之間身被七十瘡通中六七父母妻子為楚所困平城之下七日不火食賴陳平之謀太上妻子克全免匈奴之禍二相何得獨高也雖有人狗之喻豈黄中之言乎於是酣飲極歡命羣臣賦詩六月甘露降乃大赦境内殊死已下改元為甘露秋七月堅自河東還以驍騎將軍鄧羗為御史中丞八月下書曰咸陽内史王猛言彰出納所在著績有卧龍之才宜入贊百揆絲綸王言可徴拜侍中中書令領京兆尹特進光禄大夫強德健后之弟也酗酒豪横掠人財貨子女為百姓患猛下車収德奏未及報已陳尸於市堅馳使赦之不及猛與中丞鄧羗同志嫉惡無所顧忌數旬之間權豪貴戚殺戮刑免者二十餘人百僚震栗姦猾屏氣路不拾遺風化大行堅歎曰吾今始知天下之有法天子之為尊也乃以猛為吏部尚書尋遷太子詹事冬十一月轉左僕射餘官如故十二月以猛為輔國將軍司𨽻校尉居中宿衛僕射詹事侍中中書令領選如故猛上疏辭曰伏見散騎常侍陽平公融明德懿親光禄散騎西河任羣忠貞淑慎處士京兆朱肜博識聡辨並宜左右彌綸暉贊九棘愚臣庸鄙請避賢路堅曰機務俟才允属明哲朝野所望豈容致辤所舉融等尋别銓叙於是以融為侍中中書監左僕射任羣為光禄大夫領太子家令朱肜為尚書侍郎領太子庻子猛時年三十六歲中五遷權傾内外人有毁之者堅輒罪之於是羣臣莫敢復言以左僕射李威領䕶軍右僕射梁平老為使持節都督北垂諸軍事鎭北大將軍戍朔方之西丞相司馬賈雍為雲中䕶軍戍雲中之南遣使廵察四方及戎夷種落州部有高年孤寡不能自存長吏刑罰失中為百姓所苦清修疾惡勸課農桑有便於俗篤學至孝義烈力田者皆令條具以聞甘露二年春正月堅分司𨽻置雍州又分京兆為咸陽郡置渭南縣属京兆郡二月以河南公雙為都督雍河涼三州諸軍事征西大將軍雍州刺史改封趙公鎭安定封弟忠為河南公三月匈奴左賢王劉衞辰遣使來降請田内地春來秋返堅許之夏四月雲中䕶軍賈雍遣司馬徐斌率騎襲之因縱兵掠奪堅怒曰朕方修魏絳和戎之術不可以小利㤀大信昔荆吳之戰事興蠶婦澆𤓰之惠梁宋息兵夫怨不在大事不在小擾邉動衆非國之利也所獲資産其悉以歸之乃黜雍官以白衣領職遣使修和示之信義衞辰於是入居塞内貢獻相尋冬十月烏桓獨孤部鮮卑没奕于各帥衆數萬來降堅初欲處之塞内陽平公融諫曰戎狄異𩔖人面獸心不知仁義其稽顙内附實貪地利非懐德也不敢犯邉實憚兵威非感恩也今處之於塞内與民雜居彼窺郡縣虚實必為邉患不如徙之塞外以存荒服之義堅從之甘露三年春正月劉衞辰掠邉民五十餘口為奴婢來獻堅責之使歸所掠衛辰由是叛附於魏時猶稱代秋九月乙亥鳯凰集於東闕大赦境内百僚進位一級民因歌之曰鳯凰於飛其羽翼翼翊我聖后享齡萬億初堅將為赦與左僕射猛右僕射融宻議於露臺悉屏左右親為赦文猛融供進紙筆有一大蒼蝇入自牖間鳴聲甚大集於筆端驅而復來堅惡之久之乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂猛融曰禁中無耳屬之理事何從而洩於是勅内外推窮之咸言有一小人衣黒衣大呼於市曰官今大赦須臾不見堅嘆曰其向蒼蠅乎聲狀非常吾固惡之諺曰欲人勿知莫若勿為聲無細而弗聞事未形而必彰者其此之謂也冬十二月廣修學官詔郡國學生通一經已上充之公卿已下子孫並遣受業命牧守宰各舉孝弟力田清修廉直學為通儒才堪幹事者皆旌表之察其所舉得人者賞非其人者罰由是人莫敢妄舉而請託不行士皆自勵雖宗室外戚無才能者盡棄不用當是之時内外羣臣率皆稱職田疇修闢倉廪充盈盜賊屏息典章法物莫不悉備甘露四年夏五月堅親臨太學考諸生經義優劣品而第之問難五經博士多不能對堅謂博士王寔曰朕一月三臨太學黜陟幽明躬親奬勵㒺敢勌違庻幾周孔微言不由朕而墜漢之二武其可追乎寔曰自劉石擾覆華畿二都鞠為茂草諸生罕有或存墳籍滅而莫紀經淪學廢奄若秦皇陛下神武撥亂道隆虞夏開庠序之美𢎞儒教之風化盛隆周垂馨千祀漢之二武焉足論哉自是每月一臨太學諸生競相勸勵秋七月黄龍見於成紀梁山崩是年造刀一口用五千工銘曰神術𨽻書甘露五年白虎見於天水甘露六年夏六月遣大鴻臚拜張天錫為大將軍涼州牧西平公秋八月汝南公騰謀反伏誅騰生之弟也是時生弟晉公栁等猶有五人王猛言於堅曰不去五公終必為患堅不從屠各張㒺聚衆數千自稱大單于㓂掠郡縣堅以尚書鄧羗為建節將軍帥衆七千討平之九月命公國各署三卿并餘官皆聽自采辟獨為置郎中令富商趙掇丁妃鄒甕等家累千金車服之盛擬則王侯諸公競引之為國貳卿黄門侍郎安定程憲言於堅曰趙掇等皆商販醜䜿市郭小人車馬衣服僭同王者官齊君子為藩國列卿傷風敗俗有塵聖化宜肅明典法使清濁顯分堅乃下詔稱本欲使諸公延選英儒乃更猥濫如是其令有司推檢引掇等為國卿者皆降其爵自今國官皆委之銓衡自非命士已上不得乘車馬去京師百里内工商皂𨽻婦女不得服金銀錦繡犯者棄市於是平陽平昌九江陳留安樂五公皆降爵為侯建元元年春正月大赦境内殊死已下改元為建元雍州秀才叚鏗等對策上第拜吏部郎中孝廉通經者十餘人皆拜令長三月燕太宰慕容恪吳王慕容垂攻㧞洛陽略地至崤澠闗中大震堅親屯陜城以備之夏六月匈奴右賢王曹轂左賢王劉衞辰舉兵叛轂帥衆二萬攻杏城已南郡縣屯馬蘭山索虜烏延等亦叛堅而通於辰轂堅率中外精鋭討之使衞大將軍李威左僕射王猛輔太子宏留守長安以前將軍楊安鎭軍將軍毛盛為前鋒都督秋八月轂遣弟活拒戰於同川安大敗之斬首四千餘級轂懼請降徙其酋豪六千餘户於長安進撃烏延斬之建節將軍鄧羗討衞辰擒之於木根山九月堅自聰馬城如朔方廵撫諸夷冬十月征北將軍淮南公㓜帥杏城之衆乘虚襲長安李威撃斬之十一月堅還長安以李威守太尉加侍中以曹轂為雁門公劉衞辰為夏陽公各使綂其部落轂尋死分其部落貳城已西二萬餘落封其長子璽為駱川侯貳城已東二萬餘落封其小子寅為力川侯故號東西曹建元二年秦雍二州地震裂水泉湧出金像生毛長安大風震電壞屋殺人堅懼而愈修徳政夏五月魏昭成帝諱什翼犍時稱代王遣長史燕鳯詣秦通好或作入貢鳯字子章代人也少好學博綜經史明習隂陽䜟緯昭成帝素聞其名使人以禮迎之鳯不應聘乃命諸軍圍代城謂城中人曰燕鳯不出者吾將屠汝代人懼送鳯出之拜左長史參軍國事時堅遣牛恬聘魏魏令鳯報之堅問曰代王何如人鳯曰寛和仁愛經略高逺一時之雄主也常有并吞天下之志堅曰卿軰北人無剛甲利器敵弱則進敵强則退安能并兼耶鳯曰北人壯悍上馬持三仗驅馳若飛主上雄雋率服北土控弦百萬號令若一軍無輜重樵爨之苦輕行速㨗因敵取資此南方之所以疲敝而北方之所以常勝也堅曰彼國人馬實為多少鳯曰控弦之士四十餘萬見馬一百萬匹堅曰卿言人衆可爾説馬太多是虚辭耳鳯曰雲中川自東山至西河二百里北山至南山百有餘里每嵗孟秋馬常大集略為滿川以此推之使人之言猶當未盡鳯還堅厚加贈遺秋七月堅遣輔國將軍王猛前將軍楊安揚武將軍姚萇等帥衆二萬宼荆州攻南鄉郡晉荆州刺史桓豁救之八月軍於新野掠安一作漢陽民萬餘戸而還建元三年春二月羗歛岐叛堅自稱益州刺史帥部落四千餘家西依張天錫叛將李儼堅遣輔國將軍王猛隴西太守姜衡南安太守南安邵𦍑揚武將軍姚萇等帥衆萬七千討歛岐於略陽三月張天錫帥步騎三萬撃李儼攻克大夏武始二郡其征東將軍常據又敗儼兵於葵谷儼懼退守枹罕遣兄子純謝罪於堅且請救歛岐部落先属姚弋仲聞姚萇至皆降王猛攻破略陽歛岐奔白馬堅以萇為隴東太守夏四月堅使前將軍楊安建威將軍王撫帥騎二萬會王猛救儼猛遣邵𦍑追歛岐王撫守侯和姜衡守白石猛與楊安救枹罕與天錫將楊遹戰於枹罕東猛大破之俘斬萬七千級天錫遂引師西歸邵𦍑擒歛岐於白馬送之長安李儼將賀肫説儼曰以明公神武將士驍悍奈何束手于人王猛孤軍深入士卒疲弊且以我請救必不設備若乘其怠而撃之可以得志儼曰求救於人以免難難既免而撃之天下其謂我何不若固守以老之彼將自退乃憑城固守不納秦師猛白服乘輿從者數十人請與相見儼開門延之未及設備將士繼入遂執儼猛責儼以不即出迎儼以賀肫之謀告猛乃斬肫送儼歸長安堅以儼為光禄勲賜爵歸安侯以立忠將軍彭越為平西將軍涼州刺史鎭枹罕九月初淮南公㓜之反也征東大將軍并州牧晉公栁起兵蒲阪征西大將軍秦州刺史趙公雙起兵上邽皆與之通謀堅以雙母弟至親栁健之愛子隠而不問栁雙復與鎭東將軍洛州刺史魏公庾安西將軍雍州刺史燕公武作亂庾反於陜城武反於安定鎭東主簿南安姚眺諫曰明公以周召之親受方面之任國家有難當竭力除之况自為難乎庾不聽堅聞之徴栁等還長安冬十月栁據蒲阪雙據上邽庾據陜城武據安定皆舉兵向長安堅遣使諭之曰吾待卿等恩亦至矣何苦而反今止不徴卿宜罷兵各定其位一切如故各齧梨以為信皆不從堅阻兵自守十一月魏昭成帝撃劉衞辰時河冰未成乃以葦絙約澌俄然冰合猶未能固乃散葦於上冰草相結如浮橋焉衆軍利渉出其不意衞辰帥衆來奔堅送衞辰還朔方遣兵戍之建元四年春正月遣後將軍楊成世左將軍毛嵩討上邽輔國將軍王猛建節將軍鄧𦍑攻蒲阪前將軍楊安廣武將軍張蚝攻陜城堅命蒲阪之軍皆距城三十里堅壁勿戰俟秦雍已平然後并力取之二月魏公庾以陜城降燕請兵應接秦人大懼三月楊成世為趙公雙將茍興所敗毛嵩亦為燕公武所敗奔還堅復遣武衞將軍武都王鑒寧朔將軍呂光將軍馮翊郭將翟傉等帥中外精鋭三萬討之左衞將軍雅左禁將軍竇衝率羽林騎七千繼發夏四月雙武乘勝至於榆眉以茍興為前鋒鑒欲速戰光曰興新得志氣勢方鋭宜持重以待之彼糧盡必退退而撃之蔑不濟矣二旬而興退光曰興可撃矣遂追之興敗進撃雙武大破之斬獲萬五千級武棄安定與雙皆奔上邽鑒等進攻之晉公栁數出挑戰猛閉壘不應栁以猛為憚已五月留世子良守蒲阪率衆二萬西趨長安長安去蒲阪百餘里鄧𦍑帥精騎七千夜襲敗之栁引軍還猛又盡衆邀撃悉俘其卒栁與數百騎入於蒲阪猛𦍑進攻之秋七月鑒等攻克上邽斬趙公雙燕公武宥其妻子以左衞將軍雅為秦州刺史八月以長樂公丕為雍州刺史九月王猛等攻㧞蒲阪斬晉公栁及其妻子傳首長安猛屯蒲阪遣鄧𦍑與王鑒等㑹攻陜城冬十一月𦍑等㧞陜城獲魏公庾送於長安堅問其所以反對曰臣本無反心但以弟兄屢謀逆亂臣懼并死故謀反耳堅泣曰汝素長者固知非汝心也但高祖不可以無後乃賜庾死原其七子以長子襲魏公餘子皆封縣公以嗣越厲王及諸弟之無後者茍太后曰庾與雙俱反雙獨不得置後何也堅曰天下者高祖之天下高祖之子不可以無後至於仲羣不顧太后謀危宗廟天下之法不可私也以范陽公抑為征東大將軍并州刺史鎭蒲阪鄧𦍑為建武將軍洛州刺史鎭陜城擢姚眺為汲郡太守時仇池公楊世遣使稱臣遂以世為南秦州刺史是嵗池陽民某惑其婦言而欲殺母遂車載母辭詣親家乃入南山母曰汝詣親家何至是也兒曰老婢何言遂下母於溪谷之間脱衣將殺之初婦謂其夫曰不可不得中衣來也兒不欲自脱背坐厲聲令母自脱母曰我生飬汝至於今日汝信婦言枉殺我可不乞我此衣兒怒曰老婢復何言母呼曰天神山神當見此否言未卒聲忽見所持刀反貫其項而殺之投於山穴母乘車卻歸昏而反家婦為其夫還逆問曰得中衣來否母馳告隣人収其婦送官郡縣以聞堅驚曰宇宙之内乃有此事將非怪乎於是轘而殺之建元五年夏六月晉大司馬桓温帥師伐燕慕容暐遣散騎常侍李鳯求救於秦秋七月温進次枋頭暐衆屢敗又遣散騎侍郎樂嵩詣秦乞師請割武牢以西之地堅引羣臣議於東堂皆曰昔桓温伐我至灞上燕不救我今温伐燕我何救焉且燕不稱藩於我我何為救之猛宻言於堅曰燕雖强大慕容評非温敵也若舉兵山東進屯洛邑収幽冀之兵引并豫之粟觀兵崤澠則陛下大事去矣今不如與燕合兵退温温退燕亦病矣然後我承其弊而取之不亦善乎堅從之八月遣將軍茍池洛州刺史鄧𦍑帥歩騎二萬救燕出自洛陽趨潁川遣散騎侍郎姜撫報使於燕以王猛為尚書令九月茍池等邀撃温於譙大破之死者萬計温師敗績乃引而還燕秦結好使相往來燕散騎常侍郝晷給事黄門侍郎梁琛相繼來聘晷與王猛有舊猛接以平生問晷東方之事晷知燕之將亡隂欲自計頗洩其事琛至長安猛勸堅留琛堅不許詳具琛傳是月京兆尹王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝飬四曰民生在勤五曰教無偏黨六曰飬民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛討逆十曰易簡𢎞大堅納之以攸為諫議大夫冬十一月燕車騎將軍慕容垂避害來奔堅聞垂至大喜郊迎執手甚厚禮之賞賜鉅萬王猛言於堅曰慕容垂燕之戚属世雄東部寛仁惠下恩結士庻燕趙之間咸有奉戴之意觀其才略權智無方兼其諸子明毅有幹蓺人之傑也蛟龍猛獸非可馴之物若借以風雲將不可復制不如早除之堅曰吾方以義致英豪建不世之功且其初至吾告之至誠今而害之人將謂我何乃以垂為冠軍將軍封賔徒侯堅復遣黄門郎石越聘燕且索地於燕初燕人許割虎牢以西之地賂秦晉兵既退燕人悔之堅大怒遣輔國將軍王猛建威將軍梁成梁平老之子也建武將軍鄧𦍑帥步騎三萬伐燕以慕容垂為鄉導十二月猛等攻燕荆州刺史武威王慕容筑於洛陽建元六年春正月慕容垂世子令奔燕王猛遺慕容筑書曰國家今已塞成臯之險杜盟津之路大駕虎旅百萬自軹闗取鄴都金墉窮戍外無救援城下之師將軍所監豈三千弊卒所能支也筑懼以洛陽來降猛陳師而受之燕衛大將軍樂安王慕容臧率精卒十萬將觧筑圍自新樂進屯滎陽猛遣梁成鄧𦍑以精鋭萬人卷甲赴之大破臧於滎陽留𦍑鎭金墉以輔國司馬桓寅為𢎞農太守代𦍑戍陜城振旅而還堅以猛為司徒録尚書事進封平陽郡侯猛固辭曰今燕吳未平戎車方駕而始得一城即受三事之賞若克殄二㓂將何以加之堅曰茍不蹔抑朕心何以顯卿謙光之美已詔有司權聽所守封爵酬庸其勉從朕命遂寢司徒尚書之命三月堅以吏部尚書權翼為尚書右僕射夏四月復以王猛為司徒録尚書事猛固辭乃止五月慕容令襲燕龍城不克而死六月堅復遣王猛督鎭南將軍楊安虎牙將軍張蚝建武將軍鄧𦍑等十將率步騎六萬討平燕冀乙夘堅親送猛於灞上謂曰今授卿精兵委以重任當先破壺闗平上黨長驅取鄴此㨗濟之機所謂疾雷不及揜耳吾當親督萬衆繼卿星發舟車糧運水陸俱進卿勿以為後慮也猛曰臣庸劣孤生操無豪介蒙陛下恩榮内侍帷幄出總戎旅今杖威靈奉成算盪平殘胡如風掃葉臣雖不武克不淹時願不煩鑾軫冐犯霜露但願速勅所司部置鮮卑之所堅大悦秋七月王猛攻壺闗楊安攻晉陽八月燕太傅上庸王慕容評帥中外精卒四十一作三十餘萬來拒猛克壺闗執燕上黨太守南安王慕容越所過郡縣皆望風降附燕人大懼九月楊安進圍晉陽久之未下猛留屯騎校尉茍萇戍壺闗引兵助安攻晉陽因為地道遣張蚝帥壯士數百潛入城中大呼斬闗納秦兵辛巳猛安遂入晉陽執并州刺史東海王慕容莊太傅慕容評畏猛不敢進兵屯於潞川冬十一月辛亥猛留將軍武都毛當戍晉陽進次潞川與評相持壬戌猛遣將軍徐成覘燕軍形要期以日中及昏而返猛怒將斬之鄧𦍑固請得止猛覘知評賣水鬻薪不撫將士人思為亂有可乘之㑹笑謂楊安等曰慕容評眞奴才雖億兆之衆尚不足為慮况數十萬乎吾今兹破之必矣乃遣遊撃將軍郭慶以鋭卒五千夜從間道出評營後傍山起火燒其輜重火見鄴中暐懼遣侍中蘭伊譲評催之速戰評大懼遣使求戰甲子猛陳於渭源而誓衆曰王景略受國厚恩任兼内外今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明公之朝稱觴父母之室不亦美乎衆皆踴躍破釡棄糧大呼競進猛望燕兵之盛馳騎遣鄧𦍑往擊之詳具𦍑傳𦍑與徐成張蚝等跨馬運矛馳赴評軍出入數四旁若無人搴旗斬將殺傷甚衆戰及日中評師大敗俘斬五萬餘人乘勝追撃所殺及降者又十萬餘人評單騎奔鄴猛長驅而東丁夘進兵圍鄴猛上疏稱臣以甲子之日大殱醜𩔖賴陛下仁愛之志使六州士庻不覺易主自非守迷違命一無所害堅報之曰將軍役不踰時而元惡克舉勲高前古朕今親帥六師星馳電赴將軍其休飬將士以待朕至然後取之猛未至鄴鄴旁剽掠公行及至逺近帖服號令嚴明軍無私犯法簡政寛民安其業更相謂曰不圖今日復見太原王猛聞之嘆曰慕容𤣥恭信竒士也可謂古之遺愛矣乃設太牢以祭之十一月堅留李威輔太子宏守長安陽平公融鎭洛陽躬帥精鋭十萬向鄴七日而至安陽過舊閭引諸耆老語及祖父之事泫然流涕乃停信宿猛潛如安陽迎堅堅謂之曰昔周亞夫不出軍迎漢文將軍何以臨敵而棄軍乎猛曰臣每覽亞夫之事常謂前卻人主以此而為名將竊多之且臣奉陛下神算撃垂亾之虜若摧枯拉朽何足慮也監國冲幼鑾駕逺臨脱有不虞悔之何及陛下㤀臣灞上之言耶戊寅堅攻鄴㧞之慕容暐等出奔高陽遊撃將軍郭慶執而送之辛巳堅入鄴宫諸州牧守及六夷渠帥盡來降附閲其名籍凡得郡百五十七縣一千五百七十九户二百四十五萬八千六百六十九口九百九十八萬七千九百三十五郭慶窮追餘燼慕容評奔高句麗慶追至遼海句麗縛評送之堅散燕宫人珍寶分賜將士下詔大赦曰朕以寡徳猥承休命不能懐逺以徳柔服四維至使戎車屢駕有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始釋梁琛之囚除中書著作郎聞悅綰之忠恨不及見拜其子為郎中暐稱孟高艾朗之忠於堅堅命厚加歛葬亦拜其子為郎中以王猛為使持節都督闗東六州諸軍事車騎大將軍開府儀同三司冀州牧鎭鄴進爵清河郡侯悉以慕容評第中之物賜之加美妾五人上女妓十人中女妓三十人猛固辭堅曰昔魏絳和戎猶有絲竹之賞山甫翼周實受牡闕之錫卿今功超二子任過管葛安得辭也其敬受之無違朕命堅賞潞川之功賜楊安爵博平縣侯鄧𦍑為使持節征虜將軍散騎常侍安定太守賜爵眞定郡侯邑三千戸郭慶為持節都督幽州諸軍事揚武將軍幽州刺史鎭薊賜爵襄城郡侯其餘將士封賞各有差以京兆韋鍾為魏郡太守彭豹為陽平太守其餘州縣牧守令長皆因舊而授之以常山太守申紹為散騎侍郎使與散騎侍郎京兆韋儒俱為繡衣使者循行闗東州郡觀省風俗勸課農桑振恤窮困収葬死亾旌顯節行燕政有不便於民者皆變除之十二月遷慕容暐及后妃王公百官并鮮卑四萬餘戸於長安猛表留梁琛為主簿領記室督他日猛與僚属語及燕朝使者猛曰人心不同昔梁君至長安專美本朝樂君但言桓温軍盛郝君微説國弊參軍馮誕曰今三子皆為國臣敢問為臣之道何先猛曰郝君知幾為先誕曰然則明公賞丁公而誅季布也猛大笑堅自鄴如枋頭行飲至之禮歌勞止之詩以饗羣臣宴諸父老改枋頭為永昌縣復之終世甲寅還長安封慕容暐為新興侯慕容評為給事中皇甫眞為奉車都尉李洪為駙馬都尉皆奉朝請李邽為尚書封衡裕之子也為尚書郎慕容徳為張掖太守燕國平叡為宣威將軍悉羅騰為三署郎其餘封授各有差是嵗省雍州南秦州刺史仇池公楊世卒子纂自立始與秦絶建元七年春正月行禮于辟雍祀先師孔子太子及公侯卿大夫士之元子皆束修釋奠焉高平蘇通長樂劉祥並碩學耆儒尤精二禮堅以通為禮記祭酒居於東庠祥為儀禮祭酒處於西序堅每月朔旦率百僚親臨講論晉叛臣袁瑾朱輔固守壽春為大司馬桓温所圍遣使求救於堅堅以瑾為揚州刺史輔為交州刺史遣武衞將軍王鑒前將軍張蚝率步騎二萬救之温遣淮南太守桓伊南頓太守桓石䖍撃鑒蚝于石橋鑒蚝敗績失馬五百匹退屯愼城丁亥堅徙闗東豪傑及諸雜夷十五萬戸於闗中處烏丸雜𩔖於馮翊北地丁零翟斌於新安澠池徙陳留東阿萬戸以實青州諸因亂流移避仇逺徙欲還舊業者悉聽之二月以魏郡太守韋鍾為青州刺史中壘將軍梁成為兖州刺史射聲校尉徐成為并州刺史武衞將軍王鑒為豫州刺史左將軍彭越為徐州刺史太尉司馬皇甫覆為荆州刺史屯騎校尉天水姜宇為涼州刺史扶風内史王綂擢之子也為益州刺史秦州刺史西縣侯雅為使持節都督秦晉涼雍州諸軍事秦州牧吏部尚書楊安為使持節都督益梁州諸軍事梁州刺史復置雍州治蒲阪以長樂公丕為使持節征東大將軍雍州刺史又以闗東初平守令宜得人令王猛以便宜簡召英俊補六守令授訖言臺除正三月後將軍金城俱難攻晉蘭陵太守張閔子於桃山桓温遣兵來救不克而還楊世弟楊綂驍武得衆心起兵武都與楊纂爭分堅遣秦州牧西縣侯雅梁州刺史楊安益州刺史王綂并州刺史徐成及羽林左監朱肜揚武將軍姚萇帥步騎七萬先取仇池進圍寧益夏四月雅等次鷲峽仇池公楊纂帥衆五萬來拒晉梁州刺史𢎞農楊亮遣督䕶郭寶卜靖帥千餘騎助纂戰於峽中為雅所敗死者什三四寶等亦没纂収散兵遁走雅遂進攻仇池楊綂帥武都之衆來降纂將碩宻亦來降請為内應纂懼面縛出降雅釋其縛送之長安堅以王綂為平逺將軍南秦州刺史加楊安都督南秦州諸軍事鎭仇池先是王猛破張天錫於枹罕獲其將燉煌隂據及甲士五千人堅既東平六州西擒楊纂欲以徳懐逺且誇威河右遣據帥其甲士送還涼州使著作郎梁殊閻負送之因命王猛為書諭天錫曰昔貴先公稱藩於劉石者惟審於彊弱也今論涼土之力則損於往時語大秦之德則非二趙之匹而將軍翻然自絶無乃非宗廟之福也歟夫以秦之威旁振無外可以囘弱水使東流返江河使西注闗東既平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不逺宜深算妙慮自求多福無使六世之業一旦而墜地也天錫大懼遣使謝罪稱藩堅即署天錫使持節散騎常侍都督河右諸軍事驃騎大將軍開府儀同三司凉州刺史西域都督䕶西平公夏五月吐谷渾王辟奚葉延之子也聞楊纂降大懼遣使獻馬千匹金銀五百斤堅大恱拜辟奚為安逺將軍漒川侯秋七月七日堅如洛陽下書曰士死知己由來格謨故喬公一言魏祖追慟趙司𨽻高平徐統往在鄴都識朕於童稚每思其慇懃之言弗敢􅁯也可召其子孫詣行在所八月以光禄勲李儼為河州刺史鎭武始九月堅還長安歸安元侯李儼卒於上邽復以其子辯為河州刺史冬十月堅如鄴狩於西山親馳射獸遊獵旬餘樂而㤀返伶人王洛叩馬諫曰臣聞千金之子坐不垂堂萬乘之主行不履危故文帝馳車袁公止轡孝武好畋相如獻規陛下為百姓父母蒼生所係何可盤於遊畋以玷聖徳今久獵不歸若禍起須臾變生不測者其如宗廟何其如太后何堅曰善哉昔文公悟愆于虞人朕聞罪于王洛信吾過也為之罷獵還宫王猛因進言曰畋獵誠非急務王洛之言不可㤀也因賜洛帛百疋拜官箴左右自是遂不復獵十一月堅聞桓温廢海西公謂羣臣曰温前敗灞上後敗枋頭十五年間再傾國師六十嵗公舉動如此不能思愆自貶以謝百姓方更廢君以自悦將何以自容於四海乎諺曰怒其室而作色於父母其桓温之謂矣車騎大將軍王猛以六州任重言于堅請改授親賢及府選便宜輒已停寢别乞一州自效堅報曰朕之于卿義則君臣親踰骨肉雖復桓昭之有管樂𤣥徳之有孔明自謂踰之夫人主勞於求才逸於得士既以六州相委則朕無東顧之憂非所以為優崇乃朕自求安逸也夫取之不易守之亦難茍任非其人患生慮表豈獨朕之憂亦卿之責也故虚位台鼎而以分陜為先卿未照朕心殊乖素望新政俟才宜速銓補俟東方化洽當衮衣西歸仍遣侍中梁讜詣鄴諭㫖猛乃視事如故十二月以河州刺史李辯領晉興太守還鎭枹罕徙凉州治金城益州刺史王綂攻隴西鮮卑乞伏司繁於度堅山司繁帥衆三萬來拒至於苑川綂潛襲度堅山司繁部落五萬餘皆降於綂其衆聞妻子已降不戰而潰司繁無所歸亦詣統降堅以司繁為南單于留之長安以司繁從叔乞伏吐雷為勇士䕶軍撫其部衆是嵗唐水汎溢高岸崩頽安嶮城角之下有大積木交横如梁柱十六國春秋卷三十六
