body:
  text: 十六國春秋卷六十後秦録八姚嵩姚嵩興之弟也仕為鎮西將軍秦州刺史厯至司空封安成侯留心經典専精釋道興因賜以皇后所遺珠佛像嵩上表謝曰臣言奉珠像承是皇后遺屬所建禮覲之日永慕罔極伏惟感往增懐臣言先承陛下親營像事每注心延望遲冀暫一禮敬不悟聖恩垂及乃復與臣供養此像既工寳並重且於制作之理擬若神造中來所見珠像誠當竒妙然方之於此信復有間瞻奉踴躍實在無量夫受乾施者無報䝉恩隆者無謝雖欲仰陳愚誠亦復莫知所盡興又與嵩書曰吾曽以已所懐疏條摩訶衍諸義圖與什公評詳厥衷遂有哀故不復能斷理義未久什公尋復致變自爾䘮戎相繼無復意事遂忘棄之近以當遣使送像欲與卿作疏箱篋中忽得前所條本末今送示卿徐徐尋撫若於卿有所不足者便可致難也見卿來日並可以當言笑吾前試通聖人三逹觀以咨什公公尋有答今并送往諸此事皆是昔日之意如今都無情懐不知如何矣嵩上述佛義表曰臣言奉陛下所通諸義理味淵𤣥詞致清勝間詣踰於二篇妙盡侔乎中觀詠之翫之紙已致勞而心猶無厭真可謂當時之髙唱累劫之宗範也但臣頑闇思不叅𤣥然披尋之日真復詠歌弗暇不悟𢎞慈善誘乃欲令叅致問難敢忘愚鈍輒位叙所懐豈曰存難直欲咨所未悟耳臣言上通三世甚有深致既已逺契聖心兼復抑正衆說宗塗亹亹超絶常境欣悟之至益令賞味增深加為什公研覈該備實非愚臣所能稱盡正當銘之懐抱以為心要耳上通不住法住般若義云衆生之所以不階道者有著故也是以聖人之教恒以去著為事故言以不住般若雖復大聖𤣥鑒應照無際亦不可著著亦成患欲使行人忘彼我遺所寄汎若不繫之舟無所倚薄則當於理矣故聖人𤣥詣誠無不盡然至乎標位六度而以無著為宗取之於心誠如明誨即之於事脫有未極夫無著雖妙似若有不即真兩㝠有不即真兩㝠恐是心忘之謂耳竊尋𤣥教如更有以謹牒成言以攄愚見故經云施者受者財物不可得以無所捨法具足檀波羅蜜以此三事不可得故三者既㝠有無無當無當之理即同幻化以此而推恐不住之致非真忘彼我遺所寄而已詔云大道者以無為為宗若其無為復何所為耶至理淵談誠不容言然處在渉求之地不得不尋本以致悟不審明道之無為為當以何為體若以妙為宗者雖在帝先而非極若以無有為妙者必當有不無之因因稱俱未㝠詎是不二之道乎故論云無於無者必當有於有有無之相譬猶修短之相形耳無理雖𤣥將恐同彼斷常常猶不可况復斷耶然則有無之津乃是邊見之所存故中論云不破世諦故則不破真諦又論云諸法若實則無二諦諸法若空則無罪福若無罪福凡聖無判二茍無判道何所益由臣闇昧未悟宗極惟願仁慈重加誨諭詔云聖人之教𤣥通無涯致感多方不可作一途求不可以一理推故應麤以麤應細以細應理固然也所以放大光明見諸神變者此應十方諸大菩薩將紹尊位者耳若處俗接麤復容此事耶阿含經云釋氏之處天竺四十餘載衣服飲食受諸患痛與人不别經又云聖人亦入鹿馬而度脫之當在鹿馬豈異於鹿馬哉若不異鹿馬應世常流不待此神變明矣毎事要須自同於前物然後得行其化耳斯理之𤣥固非庸近所叅然不已之情猶欲言所未逹夫萬有不同精麤亦異應彼雖殊聖心恒一恒一故圓以應之不同故權以濟之雖鹿馬而未始乖其大雖現神變而未始遺其細故淨名經云如來或以光明而作佛事或以寂寞而作佛事顯黙雖異而終致不二然則於大小之間恐是互說耳如華手經初佛為徳藏放大光明令諸衆生普䝉其潤又思益經中網明所問如來三十三種光明一切遇者皆得利益法華經云佛放眉間相光亦使四衆八部咸皆生疑又云處暗衆生各得相見茍有其緣雖小必益茍無其因雖大或乖故般若經云若有衆生遇斯光者必得無上道又以神變令三惡衆生皆生天上以此而言至於光明神變之事似存平等敢緣慈願輒竭愚思若復哀矜重開導者豈直微臣獨受其賜興答書曰卿所問難引喻兼富理極致深實非庸淺所能具答今當為卿各以相酬耳卿引般若經云若有衆生遇斯光者必得無上道即經所言未聞有凡流而得見光明者如釋迦放大光明普照十方當斯之時經不言有詳品而得見其怪而異之者皆是普明之徒以斯言之定不為羣小也卿若以衆生為疑者百億菩薩豈非衆生之謂耶然經復云普明之詣釋迦皆與善男子善女人持諸華香來供養釋迦及致供養之徒自應普䝉其潤也但光明之作本不為善男子善女人所以得䝉餘波者其猶蠅附驥尾得至千里之舉耳卿又引神變令三惡衆生得生人天若在鹿為鹿在馬為馬而度脫之豈非神變之謂耶華手思益法華諸經所言若云放大光明自應與大品無異也若一一光明以應適前物此作非人天所通夫光明之與寂寞此直發意有參差其揆一也卿引經言施者受者財物不可得與不住法不住般若未有異二者直是始終之教也綂而言之俱是破著之語耳何者罪不罪施者受者及財物都不可得若都不可得復何所著是勸無所著明矣卿又問明道之無為為當同諸法之自空為妙空無以成極耶又引中論二諦之間言意所不及道之無為所寄耶吾意以為道止無為未詳所以宗也何者夫衆生之所以流轉生死者皆著欲故也若欲止於心即不復生死既不生死潛神𤣥漠與空合其體是名􅄺槃耳既曰􅄺槃復何容有名於其間哉夫道以無寄為宗若求寄所在恐乃惑之大者也吾所明無為不可為有者意事如隠尋求或當小難今更重伸前義卿所引中論即吾義宗諸法若不空則無二諦若不有亦無二諦此定明有無不相離何者若定言有則無以拔髙士若定明無則無以濟常流是以聖人有無兼抱而不捨者此之謂也然諸家通第一義廓然空寂無有聖人吾常以為殊大逕庭不近人情若無聖人知無者誰也嵩復上表答曰臣嵩言奉賜還詔誨諭周備伏尋之日欣躍無量陛下爰發徳音光闡幽極拓道義之門演如來之奥㝠宗隠而復彰𤣥扉掩而再敞文外之㫖可謂朗然幽燭矣夫理𤣥者不可以言稱事妙者固非常詞之所贊雖欲心口仰詠亦復罔知所盡由臣愚鈍而猥蒙陛下褒飾之羙誠復欣戴殊眷實増愧赧比仰味微言研咏彌至其為䝉悟豈惟過半之益但臣仍充外役無由親承音㫖毎望雲遐慨實在罔極不勝延係謹以申聞興復答書曰得表具一二吾常近之才加以多事昏塞觸事面墻不知道理安在為復以卿好樂𤣥法是以聊復孟浪以言之耳而來諭過羙益以不安嵩時出鎮上邽以泓永和元年與氐王楊盛相持為盛所殺姚緒姚緒弋仲子與萇同母弟故萇甚友愛之初為征虜將軍萇之至長安也署緒為司隷校尉鎮長安興嗣立徙鎮安定封晉王率衆攻新平河東太守栁恭安定太守秦茂等勢屈詣降因徙新平安定六千新戸以實蒲坂緒遂為并冀二州牧以鎮撫之興既降號緒與碩徳固讓王位降稱晉公𢎞始四年興發兵伐魏使緒綂河東見兵為前鋒節度興兵敗魏乘勝進攻蒲坂緒嬰城固守攻之不克乃引而去及興如河東緒出城迎之興見緒待以家人之禮班告境内及在朝文武立名不得犯叔父緒及碩徳名以彰殊禮興謙恭孝友事緒盡禮整服傾悚言則稱字車馬服玩先以奉緒而自服其次者國家大政必諮而後行累遷至丞相卒諡曰敬王配饗於萇廟姚碩徳姚碩徳弋仲子萇同母弟也萇起兵至安定碩徳所綂部羌屯於隴上自稱征西將軍率衆應萇與萇攻䧟登秦州刺史王綂拜使持節都督隴右諸軍事征西將軍秦州刺史領䕶東羌校尉鎮上邽萇死興秘不發䘮徙碩徳鎮隂密其將佐咸勸碩徳奔秦州觀望時勢碩徳不從遂往見興興優禮遣之進爵為隴西王討平凉將胡金豹於洛城進攻上邽姜乳乳率衆來降尋署秦州牧領䕶東羌校尉移鎮上邽後以興之降號固辭王爵遂以征西大將軍隴西公討乞伏乾歸軍無私掠百姓懐之又帥步騎六千討吕隆於姑臧攻圍累月城不即拔碩徳撫納夷夏分置守宰節食聚粟為持久計隆懼出降軍令嚴整秋毫無犯祭先賢禮名士西土悅之遂引兵還乃自上邽入朝興為之大赦及歸送之至雍而還甚見優禮厯位至太宰卒諡曰恭王配饗於萇廟姚紹姚紹萇庶母弟興叔父也為撫軍將軍封東平公興克洛陽署為都督山東諸軍事豫州牧權鎮洛陽興之伐魏紹以洛陽之衆會集平望敗績而歸及興寢疾紹典禁兵宿衛廣平公弼􅅗謀為亂稱疾不朝興聞之怒甚宻謀收弼紹為弼羽翼馳遣告之興力疾賜弼死既而泓嗣偽位推心宗事弗以為嫌復令總司戎政紹亦感而歸誠守忠不二所在立功厯位侍中司隷宗正尋進太宰大將軍大都督督中外諸軍事假黄鉞侍中司隷宗正節録並如故改封魯公先是紹嘗召胡僧問以國之休咎僧乃求麫為大胡餅形徑一丈僧坐在上先食正西次食正北又次食正南其所餘者卷而吞之訖便起去了無所言末年晉太尉劉裕來伐紹遣左長史姚洽屯軍河北欲以絶其糧道反為所敗洽等死之紹聞洽死忿恚發病嘔血而卒紹未亡時率衆攻函谷關厨人為紹炊飯氣蒸汗流輒便成血腥甚積日如此紹心惡之令勿復炊因乞食於諸軍後八十日而紹病死是年晉師北討掃定潁洛明年席卷豐鎬泓遂為劉裕所擒斬於建康市姚顯姚顯字子章興之弟也清秀明發才兼文武為縣令十餘年政無疵纇機務之暇賓客如雲謙虛𫝊受待士以布衣之禮或昏夜靜坐與賢士談論時政孜孜不倦初封常山公仕至尚書令轉司隷校尉衛軍大將軍累遷至太尉卒諡文成公姚冲姚冲萇之少子興弟也勇力善騎射興署為平北將軍使與征虜狄伯支等率騎攻赫連勃勃軍次嶺北冲欲囘襲長安伯支不從鴆殺之興自平凉如朝那聞冲謀逆以其弟中最少雄武絶人猶欲隠忍容之後軍將軍歛成泣謂興曰冲凶險不仁毎侍左右臣常寢不安席今復賊殺僚佐反形已露願早為之所興曰冲何能為也但輕害名將吾欲聲其罪於四海耳乃下書賜冲死遂以庶人之禮葬之姚詳姚詳萇兄襄之孫也仕萇為安逺將軍始平太守屯兵隴城興既嗣立秦苻登自六陌趨廢橋詳據馬嵬堡拒之興慮登衆之盛遣長史尹緯率步卒赴詳詳用緯計大破登於廢橋進屯金城㑹鮮卑薛勃叛於嶺北與雜胡共攻圍詳遂奔長安未幾徙鎮杏城復為赫連勃勃所逼糧盡南奔興遣衛大將軍姚顯救之軍敗詳為勃勃東平將軍鹿奕干所執因而遇害姚邕姚邕字子和小字黄兒興之弟也封濟南公𢎞始中興拜劉勃勃車騎將軍奉車都尉常叅軍事甚見寵遇邕言於興曰勃勃天性不仁難以親育陛下寵遇太甚臣竊惑之興曰勃勃有濟世之才吾方收其藝用與之共平天下有何不可奈何逆拒之遂署勃勃為安逺將軍使助没奕干鎮髙平邕固諌以為不可興曰卿何以知其為人邕曰勃勃奉上慢御衆殘貪猾不仁輕為去就寵之踰分恐終為邊害興不聽竟以勃勃為使持節安北將軍配以雜虜二萬鎮朔方未㡬侵掠嶺北興乃歎曰吾不用黄兒之言以至於此邕識鑒明慧尤善音樂皆能度其盈虚増改曲調世咸𫝊之號濟南新調姚和都姚和都興時仕為太子右衛將軍左兵尚書及泓嗣立轉給事黄門侍郎撰秦記十卷記姚萇時事姚黄眉姚黄眉興之子也其姊即魏太宗昭哀皇后泓滅黄眉歸仕於魏太宗厚禮待之賜爵隴西公尚陽翟公主拜駙馬都尉賜邑二百户世祖即位遷内都大官後拜太常卿卒贈雍州刺史隴西王謚曰獻黄眉寛和温厚希言得失故世祖特加禮異姚晃姚晃興之叔父也仕至尚書令左僕射萇没受遺輔政興立西宫命晃與元子監國政入居西宫太后虵氏虵氏略陽氏虵𤣥之從姑也萇白雀三年立為皇后萇死興嗣偽位尊為皇太后皇初四年虵氏寢疾未㡬而薨興哀毁過禮不親庻政羣臣請依漢魏故事既葬即吉尚書郎李嵩上疏曰三王異制五帝殊禮孝治天下先王之髙事也宜遵聖性以光孝道一作道訓既葬之後應素服臨朝率先天下仁孝之舉也左僕射尹緯駁曰帝王䘮制漢魏為凖嵩矯常越禮愆於軌度請付有司以専擅論既葬即吉乞依前議興曰嵩忠臣孝子有何罪乎尹僕射棄先王之令典而欲遵漢魏之權制豈所望於朝賢哉其一如嵩議興后張氏張氏羙容儀有淑徳初進為昭儀興甚寵之𢎞始五年立為皇后未㡬卒興后齊氏齊氏本洛陽氐左僕射齊難之妹也初為昭儀𢎞始十五年立為皇后十六國春秋卷六十
