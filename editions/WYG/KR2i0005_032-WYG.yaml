body:
  text: 十六國春秋卷三十二前燕録十李産子績李産字子喬范陽人也少剛毅有志格永嘉之亂豫州刺史同郡祖逖素好從橫擁部衆於南土力能自固産往依之㑹逖卒其弟約領逖之衆無綏御之才不為士卒所附産見約志趣異常謂所親曰吾以北方鼎沸故逺來就此冀全宗族今觀約所為有不可測之志吾託名姻親當早自為計無事復陷身於不義也爾曹不可以目前之利而忘久長之䇿乃率子弟十數人間行還鄉里仕於石氏為本郡太守及儁南征前鋒達郡界鄉人皆勸産降産曰夫受人之禄當同其安危今若捨此節以圖存義士將謂我何城潰始詣軍門請降􅖡嘲之曰卿受石氏寵任衣錦本鄉何故不能立功於時而反委質乎烈士處身固如是邪産泣曰誠知天命有歸非㣲臣所抗犬馬為主豈忘自效但以孤窮勢蹙致力無術僶俛歸死實非誠欵􅖡嘉其慷慨顧謂左右曰此真長者乃擢用之厯位尚書性剛正好直言每至進見未嘗不論朝政之得失同輩咸敬憚之􅖡亦重其儒雅前後固辭年老不堪理劇轉太子太傅謂子績曰以吾之才而致於此始者之願亦已過矣不可復以西夕之年取笑於來今也固辭而歸死於家産子績字伯陽少以風節知名清辯有辭理弱冠為郡功曹時石虎親征段遼師次范陽百姓飢儉軍供有闕虎大怒太守惶怖避匿績曰郡帶北裔與冦接壤疆場之間人懷危慮聞輿駕親戎將除殘賊雖嬰兒白首咸思効命非唯為國亦自求寧即使身膏草野猶甘為之敢有私吝而闕軍實但比年災儉家有菜色困敝力屈無所取濟逋廢之罪情在可矜虎見績年少有壯節嘉而恕之太守獲免幽州刺史王午辟為主簿及儁之南征績隨午奔魯口鄧恒謂午曰績鄉里在北父已降燕今雖在此終不為用方為人患午曰績於喪亂之中捐家立義情節之重雖古烈士無以過也乃以猜嫌害之竊恐燕趙之士聞之謂我直相聚為盜耳了無意識衆情一散不可復集坐自屠潰也恒乃止午猶恐諸將不與己同心或致非意乃資遣之績始辭午往見儁儁讓之曰卿不識天命棄朕邀名今日乃始來邪績曰臣聞豫讓報智伯仇稱於前史既官身所在何事非君陛下方𢎞唐虞之化臣實未謂歸順之晩也􅖡曰此亦事主之一節耳拜太子中庶子尋遷司徒長史與􅖡談論東宫詞甚切直暐時侍側甚不平之及即位太宰恪欲以績為尚書右僕射暐追憾績往言不許恪屢請之暐乃謂恪曰萬機之事委之叔父伯陽一人暐請獨裁遂出為章武太守以憂死黃泓黃泓字始長廬江人也晉書作魏郡斥丘人父沉善天文秘術泓從父受業精妙逾深兼博覽經史尤明禮易性甚忠勤非禮不動永嘉之亂與渤海髙瞻避地於薊一作幽州説瞻曰王浚昏虐終必無成宜思去就以圖久安慕容廆法政修明虚懷引納且䜟言真人出東北倘或是乎宜相與歸之同建事業瞻不從泓乃率宗族歸廆廆待以客禮引為㕘軍軍國之務動輒咨之泓止説成敗事皆如言廆常曰黃㕘軍國之仲翔也及皝嗣位遷左常侍領史官甚見親重石虎率衆來攻皝將走遼東泓曰賊有敗氣可無憂也不過二日必當奔潰宜嚴勒士馬為追擊之備皝曰今冦盛如此卿言必走孤未敢信泓曰殿下言盛者人事耳臣言必走者天時也胡走無疑及期果退皝益竒之儁即王位遷從事中郎冉閔之亂􅖡欲謀取中原訪之於泓泓勸􅖡行􅖡從之及僭偽號署為進謀將軍太史令闗内侯尋加奉車都尉西海太守領太史令開陽亭侯進封平舒縣五等伯常從左右諮決大事靈臺令許敦害其寵謟事上庸王評設異議以毁之乃以泓為太史靈臺諸署統加給事中泓待敦彌厚不以毁已易心暐敗以老歸家歎曰燕必中興其在吳矣一作吳人恨吾年過不及見耳年九十七卒後三年吳王垂果以興焉賈堅賈堅字世固渤海人也少尚氣節彎弓三石餘仕趙殿中督趙亡乃棄冉閔還鄉里擁部曲數千家以自固上庸王評狥渤海遣使招之堅終不降評與戰擒之􅖡愛其才赦而勿殺時年六十餘太原王恪聞其善射故親試之乃取一牛置百歩上召堅使射曰能中之乎堅曰少壯之時能令不中今老矣正可中之恪大笑乃射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰能復中乎堅曰所貴者以不中為竒中之何難一發中之觀者咸服其妙􅖡署為樂陵太守治涪城尋遷太山太守屯山荏晉將荀羡引兵擊之堅所將纔七百餘人羡兵十倍於堅堅將出戰諸將皆曰衆少不敵不如固守堅曰固守亦不能免不如戰也遂出戰身先士卒殺羡兵十餘人復還入城羡兵圍之堅歎曰吾自結髪立功名而每值窮阨豈非天乎與其屈辱而生不若守節而死乃謂諸將曰今危困至此計無所設卿等可去吾將止死將士皆泣曰府君不出衆亦俱死耳乃扶堅上馬堅曰我如欲逃必不相遣今當為卿曹決鬭若勢不能支卿等可趣去勿復顧我也乃開門直出羡兵四集堅立馬橋上左右射之皆應弦而倒羡兵衆多從塹下斫橋橋斷人馬俱陷生擒之遂失山荏羡謂堅曰君父祖世為晉臣奈何背本不降堅曰晉自棄中華非吾叛也民既無主强則附之一作强則托命既已事人安可改節吾束脩自立渉趙厯燕未嘗易志君何忽忽相謂降乎羡復責之堅罵曰豎子兒女御乃公羡怒執置雨中數日不食憤憾而卒子活復為任城太守慕輿根慕輿根榼盧城大人也善騎射嘗從皝行獵有一野羊立於懸崖之上皝命左右射之莫有中者根乃自募射一發而中皝甚竒之署帳下折衝將軍屢進竒略􅖡嗣位轉廣威將軍敗鄧恒於魯口斬蘇林於中山所在立功厯殿中領軍將軍􅖡卒受遺輔暐進位太師副贊朝政根性木强自恃先朝勲舊舉動倨傲心不服恪濳欲為亂乃言於恪曰今主上幼冲母后干政殿下宜慮楊駿諸葛元遜之變思有以自全且定天下者殿下之功也兄亡弟及古今成法俟畢山陵可廢主上為王殿下自踐尊位以建大燕無窮之福恪曰公醉邪何言之悖也吾與公受先帝遺詔云何而遽有此議昔曹臧吳札並於家難之際猶曰為君非吾節况今儲君嗣統四海無虞宰輔受遺奈何更有私議公忘先帝之言邪根大愧懼辭謝而退恪以告吳王垂垂勸恪殺之恪曰今新遭大喪二鄰伺隙山陵未建宰輔自相誅夷恐乖逺近之望且可忍之秘書監皇甫真言於恪曰根本庸豎過蒙先帝厚恩强參顧命而小人無識自國哀已來驕狠日甚將成禍亂明公今日居周公之地當為社稷深謀早為之所恪亦不聽根遂與武衞將軍慕輿干潛謀誅恪及評因而簒立入白太后及暐曰太宰太傅將謀不軌臣請帥禁兵誅之以安社稷太后將從之暐曰二公國之戚穆先帝選之託以孤􅄔必不肯爾安知非太師欲為亂也乃止根又思戀東土言於太后及暐曰今天下蕭條外冦非一國大憂深不如東還暐亦不納於是反形漸露恪聞之遂與太傅評宻奏根罪狀根乃伏誅并其妻子皆梟首東市李洪李洪平陽人也初帥流民入定陵未幾衆至數千壁於舞陽受王浚假署為雍州刺史後歸皝仕為大理厯内史右司馬石虎攻棘城洪弟普以為棘城必敗勸洪出避禍洪曰天道幽逺人事難知且當委任勿輕動以取悔普固請不已洪曰卿意見明審者當自行之吾受慕容氏大恩義無去就當效死於此耳與普流涕而訣普遂降於虎從虎南歸死於喪亂洪由是以忠篤著名從􅖡攻鄧恒於魯口出屯髙冢慕輿根擊恒部將鹿勃早洪徐整騎隊助之俘斬甚衆暐立轉龍驤將軍略地河南拔許昌汝南陳郡徙萬餘戸而還進位司空王猛克鄴隨暐入長安拜駙馬都尉奉朝請卒悦綰悦綰榼盧城大人也初仕皝為司馬石虎入冦遣征北張舉襲凡城皝以綰為禦難將軍授兵一千以守之及趙兵至將吏皆恐欲棄城走綰曰受命禦冦生死以之且憑城堅守一可敵百敢妄言惑衆者斬衆然後定綰身先士卒親冒矢石舉等竭力攻之經旬不克乃退虎死鄴中擾亂冉閔殄滅石氏石祇遣使求援儁遣綰將兵三萬㑹之鄴平引還遷前將軍追擊吕護於魯口有功進尚書右僕射尋署安西將軍領護匈奴中郎將并州刺史戍并州暐嗣位轉尚書左僕射綰見王公貴戚多為䕃戸言於暐曰今三方鼎峙各有吞併之心而太傅政尚寛和百姓多有隠附傳曰惟有徳者可以寛臨其次莫如猛今諸軍營戸三分共貫風教頽弊威綱不立至使民戸殫盡委輸無入吏斷常俸戰士絶廪官貸粟帛以自贍給既不可聞於鄰國且非所以為治宜一切罷斷諸䕃戸盡還郡縣肅明法紀以清四海暐納之使綰專治其事糾擿姦伏無敢隠匿出戸二十餘萬朝野怨怒太傅評大不平之綰先有疾乃自力釐校戸籍疾遂益亟而卒後苻堅滅燕聞綰之忠恨不得見乃拜其子為郎中皇甫真皇甫真字楚季安定朝那一作􅄼字人也其兄岌晉東夷校尉崔毖請為長史卑辭説諭終莫能致廆招之岌與真即時俱至並以文章才􅖡任居樞要真更以弱冠髙才擢拜遼東國侍郎皝嗣立遷平州别駕時内艱連年百姓勞瘁真議欲寛減賦税休息力役不合㫖免官後以破麻秋功拜奉車都尉守遼東營邱二郡皆有善政及􅖡即位入為典書令從輔國將軍恪等討擒冉閔即南圖拔鄴石氏舊都城内珍玩寳貨充溢真一無所取惟存恤人物收歛圖籍而已儁臨終真與恪等俱受顧命慕輿根將謀為亂真隂察知之請恪除根恪未忍顯其事俄而謀洩伏誅恪乃謝真曰不從君言幾成禍敗呂護之叛恪謀於朝曰逺人不服修文徳以來之今護宜以恩詔降不宜以兵戈取也真曰護九年之間三背主上揆其奸心凶悖未已明公方飲馬江湘勒銘劍閣况護蕞爾近畿而不梟戮宜以兵算取之不可復以文檄喻也恪從之真乃上疏輒以家奴婢五十口馬七十疋牛四十頭以供軍資拜冠軍將軍别部都護一作都督師還拜鎮西將軍并州刺史鎮護匈奴中郎將徴拜侍中光禄大夫遷司空領中書監累遷太尉侍中苻堅宻謀并燕欲覘其可否命西戎主簿郭辦潛結匈奴左賢王曹轂遣使詣鄴朝貢辦因為之副真兄腆及從子奮覆皆仕於秦辦既至鄴厯造公卿謂真曰僕本秦人家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知有素真怒曰臣無境外之交此言何以及吾君似姦人得無因縁假託乎白暐請窮治之太傅評不許辦還為堅言燕朝政無綱紀實可圖也鑒機識變惟皇甫真耳堅曰以六州之衆豈得不使有智士一人哉真亦秦人而燕用之固知關西多君子矣真性清儉寡慾不營産業飲酒至石餘不亂雅好屬文凡著詩賦四十餘篇王猛入鄴真望馬首拜之明日更見語乃卿猛猛曰昨拜今卿何恭慢之相違也真曰卿昨為賊朝是國士吾拜賊而卿國士何所怪也猛大嘉之謂權翼曰皇甫真故大器也從堅入關為奉車都尉奉朝請數嵗而卒梁琛梁琛廣平人也初為吕護參軍護敗遂仕慕容氏為中書著作郎轉給事黄門侍郎暐時琛以大鴻臚奉使於秦侍輦茍純副之琛至長安苻堅方畋於萬年欲引見琛琛曰秦使至燕燕之君臣朝服備禮灑掃宫庭然後敢見今秦王欲野見之使臣不敢聞命秦尚書郎辛勁謂琛曰賔客入境惟主人所以處之君焉得專制其禮且天子稱乘輿所至曰行在所居何常之有又春秋亦有遇見之禮何為不可乎琛曰晉室不綱靈祚歸徳二方承運俱受明命而桓温猖狂窺我王略燕危秦孤勢不獨立是以秦王同恤時患要結好援東朝君臣引領西望媿其不競以為隣憂西使之辱敬待有加今强冦既退交聘方始謂宜崇禮篤義以固二國之歡若忽慢使臣是卑燕也豈修好之義乎夫天子以四海為家故行曰乘輿止曰行在今海縣分裂天光分曜安得以乘輿行在為言哉禮不期而見曰遇葢因事權行其禮簡略豈平居容與之所為哉客使單行誠勢屈於主人然茍不以禮亦不敢從也一云琛曰天子以四海為家故可云然今靈命既分天光𣲖别勢匀義等理絶兹談况唇亡齒寒豈輔車之義乎故桓温冦境而貴朝同恤敝邑愧賴以為君憂秦人使燕未嘗餚乾不食爵盈不飲而敬恭待命享禮有加今虜冦已獲繼尋舊好㑹遇之禮豈其時乎遐賔小使誠勢屈於主然勞不以禮不敢聞命堅嘉琛有奉命之才乃為之改行宫百僚陪位然後延之如燕朝之儀事畢堅與之私宴問東方名臣為誰琛曰太傅上庸王評明徳茂一作懿親光輔王室車騎大將軍吳王垂雄略冠世秀邁絶倫内贊百揆外禦四國此二句一作折衝禦侮其餘諸臣或以文進或以武用官皆稱職野無遺賢雖周文多士漢武得人未有過也琛從兄奕先在秦為尚書郎㑹罷堅使典客館於奕舎琛語有司曰昔諸葛兄弟各處三國及瑾為吳聘蜀與諸葛亮惟公朝相見退無私面君子之志往賢盛事余竊慕之今使之即安私室所不敢也竟不館奕堅乃敕奕數來就邸舎與琛卧起間問東國起居琛曰今二國鼎據兄弟並蒙榮寵琛之在燕亦猶兄之在秦論其本心各有所在琛欲言東國之美恐非西國之所欲聞欲言其惡復非臣子所得論也兄何用問為堅聞而嘉之使太子延琛相見秦人欲使琛拜太子先諷之曰隣國之君猶其君也隣國之儲君亦何以異乎琛曰天子之子視元士欲其由賤登貴以塞盈心在國不臣其父之臣况隣國之臣乎且茍無純敬則禮有往來情豈忘恭但恐降屈為煩耳秦人不能對乃不果拜王猛勸堅留琛堅不許留秦月餘厚禮遣歸琛每應對不先告純純甚恨之及歸純言於暐曰琛在長安與王猛甚親善疑有異謀琛又數稱秦王堅及王猛之美且言秦將興師宜為之備已而秦果伐燕皆如琛言暐乃疑琛知其情㑹評為秦所敗遂收琛繋獄苻堅入鄴釋之除中書著作郎引見謂之曰卿昔言上庸王吳王皆將相竒才何為不能謀畫自取亡國琛曰天命廢興豈二人所能移也堅曰卿不能見幾而作虚稱燕美忠不自防反為身禍可謂智乎琛曰臣聞幾者動之㣲吉凶之先見者也如臣愚暗實所不及然為臣莫如忠為子莫如孝自非有一至之心者莫能保忠孝之始終是以古之烈士臨危不改見死不避以狥君親彼知幾者心達安危身擇去就不顧家國臣就使知之尚不忍為况非所及乎堅稱善久之王猛表為主簿領記室督公孫鳳公孫鳳字子鸞上谷人也隠居昌黎之九城山谷冬衣單布寢處土床夏每并食於一器久之蛆臭然後乃食彈琴吟咏陶然自得人咸異之莫能測也暐以安車徴之至鄴見暐不言不拜衣食舉動如在九城賔客造請少得與言數年病卒公孫永公孫永字子陽襄平人也少而好學恬淡虚靜隠於平郭南山不娶妻妾非身所墾植則不衣食之吟咏巖谷欣然自得年餘九十操尚不虧與公孫鳳俱被暐徴至鄴見暐不拜王公已下造之皆不與言雖經隆冬盛暑端然自若一嵗餘詐狂暐送之平郭後苻堅又將備禮徴之難其耆年路逺乃遣使者致問未至而永卒堅深悼之諡曰崇虚先生王歡王歡一作觀又作勸字君厚樂陵人也安貧樂道專精耽學不事産業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毁其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻邪時人聞者莫不􅅓笑歡守志彌篤遂為通儒暐襲偽位署為國子博士親就受經尋遷祭酒暐為苻堅所滅歡遂歸隠堅復徴為祭酒後以太子少傅卒悉羅騰悉羅騰字叔龍范陽涿鹿人也工圍碁究盡其妙獨步當時莫與為儔俄而北平樂抄少雋出與齊名騰仕暐為尚書郎桓温來伐為吳王垂參軍從事與温戰生擒叛人段思擊斬李述勇冠三軍及暐為秦所滅隨徙長安拜三署郎秦末年與暐潛謀殺堅堅召騰拷問具服遂見殺安屈安屈遼東胡人也其先祖曰世髙漢時以安息王侍子入洛厯魏至晉避地遼東因以家焉屈仕暐為殿中郎將劉洛劉洛中山浦隂縣人也縣差充征弟興私代復背軍逃歸縣以本名捕斬興詣郡自列稱逃是興身請代洛死洛又固陳已實正名宜從憲辟兄弟爭命詳刑有疑有司具以聞暐曰洛應征輒留興冒名逃役俱應極法但兄弟競死義情可嘉宜特原之十六國春秋卷三十二
