body:
  text: 十六國春秋卷七十六蜀錄一李特李特字𤣥休略陽臨渭人也祖世本巴西宕渠賨氏即廩君之苗裔昔巴郡南部蠻本行五姓皆出於武落鍾離山即今夷陵郡巴山縣時山崩有石穴二所一赤如丹一黑如漆有出於赤穴者名曰務相姓巴氏有出於黑穴者凡四姓樊氏曎氏一作曋一作媓又音審柏氏鄭氏五姓俱出迭相争焉未有君長俱事鬼神乃相與擲劍於石穴約能中者奉以為廪君四姓莫著而巴氏子務相劍獨懸焉衆皆歎服又以土為船彫畫之而浮水中曰若其船浮者以為廪君唯務相船又獨浮因共立之遂稱廪君乘其土船將其徒卒從一作當夷水而下至於鹽陽按今夷陵郡巴山縣清江水一名夷水鹽水有神女子止廪君曰此地廣大魚鹽所出願留共居與子俱生可止無行廪君曰吾當為君求廩地不能止也鹽神暮輙從廪君宿旦即飛去化為飛蟲諸蟲皆從其飛掩蔽日光天地晝晦廪君欲殺之不可復别又不知天地東西如此者十餘日廪君乃以青縷遺鹽神曰嬰此即宜與汝俱生弗爾且將去汝鹽女受而嬰之廪君至碭山上望膺有青縷者跪而射之中鹽神鹽神死諸蟲與俱飛者皆去天乃開朗一作明廪君復乘土船下及夷城夷城石岸嶮曲泉水亦曲望如穴狀廪君疑之歎曰我新從穴中出今又入此奈何岸即為崩廣三丈餘而階陛相乘廪君登之岸上有平石方一丈五寸一作長五尺廪君休其上投策計算皆著石焉因立城其旁有而居之四姓皆臣事之是時廪君死魂魄化而為白虎故巴氏以虎飲人血遂以人為祠其後種𩔖繁盛秦併天下以為黔中郡薄賦斂之口嵗出錢四十一作三十巴人呼賦為賨蔵宗切因謂之賨民焉漢高祖為漢王募賨民平定三秦既而不願出闗求還鄉里髙祖以其功復同豐沛不供賦稅更名其地為巴郡土有鹽鐵丹漆之利民用敦阜俗性剽勇好鬼巫又善歌舞高祖愛其舞詔樂府習之今巴渝舞是也漢末張魯居漢中以鬼道敎百姓賨民敬信多往奉之值天下大亂李氏自巴西之宕渠遷入漢中楊車坂抄掠行旅百姓患之號為楊車巴其後繁昌分為數十姓魏武尅漢中特祖父虎與杜朴胡約楊車李黑等按三國志作巴七姓夷朴胡賨邑侯杜濩舉巴夷民來附孫盛曰朴音浮濩音戸將五百餘家歸魏魏武嘉之拜虎等為將軍遷於略陽一云洛陽後徙闗内亦萬餘家散居隴右諸郡及三輔𢎞農所在北地復號之為巴氐特父慕為東羌獵將慕凡有五子輔特庠流驤皆驍鋭有武幹特少仕州郡見異當時身長八尺雄勇善騎射沈毅有大度晉惠帝元康中氐齊萬年反闗西擾亂天水略陽扶風始平諸郡皆被兵寇氐頻年大饑百姓流移就穀相與入漢川者數萬家特隨流民將入巴蜀道路有疾病困厄者特兄弟常營䕶振救之既至劍閣箕踞太息顧盼險阻曰劉禪有如此之地而面縛於人豈非庸才耶同移者閻彧音郁趙肅何巨李逺任回等咸歎異之初流民既至漢中上書以郡土連年軍荒求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劍閣苾至漢中受流民貨賂反為表白流民十餘萬口非漢中一郡所能振贍東下荆州水湍迅險又無舟船蜀有倉儲人復豐稔宜令就食朝廷從之由是開闗放入漢中布散梁州及三蜀界不可禁止永康元年冬十一月詔徵益州刺史趙廞音歆為大長秋以成都内史中山耿滕代廞為益州刺史折衝將軍因廞所服佩廞賈后之姻親也聞徵甚懼且以晉室衰弱而趙星黄占曰星黄者主陰懐異計蜀土四塞可以自安遂與犍為太守李苾汶山太守霍固西夷校尉陳總據成都叛潛有劉氏割據之志乃傾倉廪賑施流民以收衆心見特兄弟材武與已同郡黨𩔖皆巴西人率多勇壯厚䘏遇之以為爪牙特等憑恃廞勢聚衆專為劫盜蜀民患之滕數宻奏流民剛剽一作剛戅蜀人懦弱客主不能相制必為亂階宜遷還其本土不者與東三郡險地觀其情態漸不可長恐秦雍之禍更移於梁益矣又言倉廪空虚無以應敵萬一告急必貽聖朝西顧之憂廞聞而惡之時成都治少城益州治太城廞猶在太城未去益州被詔書已遣文武千餘人往迎滕滕以廞未出州故在郡廞募庠黨羅安王利等劫滕大敗於廣漢宣化亭殺傳詔者滕欲入州功曹陳恂諫曰今州郡並治兵構怨日深入城必有大禍不如安住少城以觀其變乃檄諸縣合村堡以備秦氐陳西夷行至且當待之不爾可退保犍為西渡江源以防非常滕不從是月遂率衆入城登西門廞遣親近代茂攻滕茂告之而去廞又遣兵逆擊與滕戰於西門滕敗死郡吏皆竄走惟陳恂面縛詣廞請滕喪廞義而許之廞又遣兵逆西夷校尉陳總總至江陽聞廞有異志主簿蜀郡趙模曰今州郡不協必生大變當速行赴之府是兵要助順討逆誰敢動者總更緣道停留比至南安魚涪津已遇廞軍模白總散財募士以拒戰若克州軍則州可得不克順流而退必無害也總曰趙益州忿耿侯故殺之與吾無嫌何為如此模曰今州起事必當殺君以立威雖不戰無益也言至垂涕總不聽衆遂自潰總逃草中模著總服格戰廞兵殺模見其非是更搜求得總殺之廞自稱大都督大將軍益州牧署置僚屬改易守令以武陽令蜀郡杜淑别駕張粲巴西張龜西夷司馬龔尼江源令犍為費逺等為左右長史司馬參軍召臨卭令涪陵許弇為牙門將召諸王官莫敢不往又以廣漢太守張微汶山太守楊邠成都令費立為軍諮祭酒永寧元年春正月庠與兄弟流驤帥妹婿李含天水任囘上官惇惇華陽國志作晶扶風李攀始平費佗氐符成隗伯董勝等以四千騎歸廞廞以庠為威寇將軍封陽泉亭侯委以心膂使招合六郡壯勇以斷北道庠本東羌良將且驍勇得衆心素曉軍法不用麾幟舉矛為行伍斬部下不用命者三人部陣肅然廞惡其齊整欲殺之而未言長史杜淑司馬張粲說廞曰傳云五大不在邊將軍起兵始爾而遽遣李庠握彊兵於外愚竊惑焉且非我族𩔖其心必異倒戈授人竊以為不可願將軍圖之廞斂容謝曰卿言正合吾意可謂起予者商此天使卿等成吾事也㑹庠在門請見廞大悅引見之庠欲觀廞意㫖再拜進曰今中國大亂無復綱紀晉室不可復興明公道格天地德被寰區湯武之事實在今日宜應天時順人心拯百姓於塗炭使物情知有所歸則天下可定非但庸蜀而已也廞怒曰此豈人臣所宜言令淑等議之淑粲因白廞以庠大逆不道當棄市遂於㑹所斬庠及其兄子𢎞宗族三十餘人皆見殺時特與流皆將兵在外廞慮其為變遣人撫慰之曰庠非所宜言罪應至死兄弟罪不相及復以特流為督將安慰衆心併以庠喪還特其夜特流徹衆歸綿竹廞遣故陰平令張衡外遷費恕因就綏納皆為特所殺廞牙門許弇求為巴東監軍杜淑張粲固執不許弇怒於廞閣下手刅淑粲淑粲左右復殺弇三人皆廞之心腹也廞由是遂衰又恐朝廷討已遣長史費逺蜀郡太守李苾督䕶常俊督萬餘人斷北道次綿竹之石亭特宻収兵得七千餘人夜襲逺等逺等大敗因放火燒之死者什八九遂進攻成都廞聞兵至驚懼不知所為費逺李苾及軍諮祭酒張微一作徽又音徵夜斬闗出奔文武盡散廞獨與妻子乘小船走至廣都為其部下朱竺所殺特入成都縱兵大掠殺西夷䕶軍姜發長史袁洽及廞所置守宰長吏遣牙門王角李基詣洛陽陳廞罪狀先是涼州刺史羅尚聞趙廞叛上表稱廞非雄才又蜀人不願為亂事終無成願往征之惠帝詔拜尚為平西將軍領䕶西夷校尉益州刺史督牙門王敦上庸都尉義歆蜀郡太守徐儉廣漢太守辛冉等率七千餘人入蜀特等聞尚來甚懼使弟驤於道奉迎并獻寶物尚悅以驤為騎督特流復以牛酒勞尚於綿竹王敦辛冉說尚曰特等流民専為盜賊急宜梟除可因㑹斬之不然後必為患尚不從冉先與特有舊因謂特曰故人相逢不吉當㐫矣特深自猜懼三月尚至成都初朝廷符下秦雍州凡流民入漢川者皆令所在召還又遣御史馮該張昌督之特兄輔素留略陽託言迎家既至蜀謂特曰中國方亂不足復還特以為然遂有雄據巴蜀之意累遣天水閻彧詣羅尚求權停至秋又納賂於尚及該尚該許之㑹朝廷論討趙廞功拜特宣威將軍封長洛一作樂鄉侯流奮威將軍封武陽鄉侯璽書下益州條列六郡流民與特協同討廞者將加功賞廣漢太守辛冉以非次見徵不願應召又欲以滅廞為己功乃寢朝命不以實上衆咸怨之尚又遣從事催督遣流民限七月上道特等固請求停至秋収時流民布在梁益為人傭力聞州郡偪遣人人愁怨不知所為且水潦方盛年穀未登無以為行資特復遣閻彧詣尚求停至冬辛冉及犍為太守李苾以為不可尚舉别駕蜀郡杜弢秀才彧為弢說逼移利害弢亦欲寛流民一年尚用冉苾之謀不從弢乃致秀才板出還家冉性貪暴欲殺流民首領取其資貨乃與苾白尚言流民前因趙廞之亂多所剽掠宜因移徙設闗以奪取之尚移檄令梓潼太守張演於諸要施闗搜索寶貨特兄弟數為流民請留流民皆感而恃之多相率歸特特乃結大營於綿竹以處流民且遣人詣辛冉求自寛冉大怒遣人分牓通衢購募特兄弟許以重賞特見之大懼悉取以歸與弟驤改其購云能送六郡酋豪李任閻趙楊上官及氐叟侯王一首者賞百疋流民既不樂移咸往歸特騁馬屬鞬同聲雲集旬月之間衆至二萬流亦聚衆數千人特復遣閻彧詣羅尚求申期彧既至見冉營柵衝要謀揜流民歎曰無寇而城讐必保焉民心方危今而速之亂將作矣又知冉苾意不可囘遂辭尚歸緜竹尚謂彧曰子且以吾意告諸流民今聽寛矣彧曰明公惑於奸説恐無寛理弱而不可輕者民也今促之不以理衆怒難犯恐為禍不淺尚曰然吾不欺子子其行矣彧至緜竹言於特曰尚雖云然未可必信也何者尚威信一作刑不立冉等各擁強兵一旦為變亦非尚所能制深宜為備特從之冬十月特分為二營特居北營流居東營繕甲厲兵戒嚴以待之冉苾相與謀曰羅侯貪而無斷日復一日令流民得展奸計李特兄弟並有雄才吾屬將為豎子虜矣宜為决計羅侯不足復問也乃遣廣漢都尉曽元牙門張顯劉並等潛帥步騎三萬襲特營羅尚聞之亦遣督䕶田佐助元特素知之元等至特安臥不動待其衆半入發伏擊之殺傷甚衆殺田佐曽元張顯傳首以示尚冉尚謂將佐曰此虜成去矣而廣漢不用吾言以張賊勢今若之何是時杜弢自湘中與監軍栁純書曰前諸人不能寛李特一年又不以徐士稚為汶山太守而屯故如此謂失之毫釐差以千里斯言有似然必以不杜漸為恨者流民初西當承詔書閉闗不入其次易代趙廞選宜内遣平西緜竹之㑹聽王敦之計少可以寧毫釐之差正彼之謂也於是六郡流民推特為主特命六郡民部曲督李含上邽令任臧始昌令閻彧諫議大夫李攀陳倉令李武陰平令李逺將兵都尉楊褒等上書請依梁統奉竇融故事推特行鎮北大將軍承制封拜流及兄輔弟驤皆號為將軍以相統鎮於是進兵攻辛冉於廣漢冉衆出戰特屢敗之尚遣李苾及費逺率衆救冉畏特不敢進冉智力俱困出奔德陽晉書作江陽特入據廣漢以李超為太守進兵攻尚於成都尚以書諭閻彧彧復書曰辛冉傾巧曽元小豎李叔平非將佐之才彧前為節下及杜景文論流徙之宜人懷桑梓孰不願之但往日初至隨糓傭賃一室五分復值秋潦乞須冬熟而信用讒搆終不見聼繩之太過竆鹿抵虎流民不肯延頸受刄以致為變即聴彧言寛使治嚴不過去秋九月盡集十月進道今還鄉里何有如此也彧又陳特兄弟立功王室以寧益土尚覽書知特等將有大志嬰城固守特乃自稱使持節大都督鎮北大將軍承制封拜一依竇融在河西故事兄輔為驃騎將軍弟驤為驍騎將軍弟流行鎮東大將軍號東督䕶長子始為武威將軍次子蕩為鎮軍將軍少子雄為前將軍李含為西夷校尉含長子國次子離任囘李恭上官晶李攀費佗等為將帥任臧上官惇楊褒楊珪王達麴歆等為爪牙李逺李博夕斌嚴檉上官琦李濤王懐等為僚屬閻彧為謀主何巨趙肅為腹心時羅尚貪殘日甚為百姓患而特與蜀民約法三章施捨賑貸禮賢拔滯軍政肅然蜀民大悦為之謡曰李特猶可羅尚殺我平西將軍反更為禍尚頻為特所敗乃阻長圍緣郫水作營壘自都安至犍為連延七百里與特相持因求救於梁寧二州及南夷校尉李毅太安元年春正月羅尚遣牙門夏厈攻特於立石失利夏四月征西將軍太尉河間王司馬顒遣督䕶衙博討特博進次梓潼朝廷復以前廣漢太守張微為廣漢太守軍於德陽南夷校尉李毅亦遣叟兵五千助尚尚遣督䕶張龜督四十牙門軍於繁城博潜遣㕘軍蒙紹誘特降尚遺􅀶書曰昔年得李流牋降心款款由時威帖得還為寇聞特誠於下吏而流驤七八千人來寇至日㐫奸之態詭譎不測不可不重以待之也博不從特使其子鎮軍將軍蕩等襲博而自將擊龜破之蕩敗博軍於陽沔梓潼太守張演委倉庫走巴西郡丞毛植五官襄珍舉郡降特蕩進攻博於葭萌博走其衆盡降羣下推特為益州牧都督梁益二州諸軍事大都督大將軍秋八月特攻破德陽殺郡守張微初特屢敗微軍未克議欲釋微還涪諸將進曰微軍連戰士卒傷滅知勇俱竭宜因其弊遂擒之若舍而寛之微養病収亡餘衆更合圖之未易也特從之復進攻微微潰圍走遣將水陸追之遂害微生擒微子存以微喪還之特以别駕騫碩為徳陽太守碩略地至巴郡之墊江初特之攻張微也使弟驍騎將軍驤與任囘李攀李恭屯軍毗橋以備羅尚尚遣軍挑戰驤擊破之尚又遣數千人出戰驤又破䧟之遂進攻成都大獲器械攻燒其門流進軍成都之北尚遣别將張興偽降於驤以觀虚實時驤軍不過二千人興夜歸白尚尚遣精勇萬人衘枚隨興夜襲驤營李攀逆戰死之驤及將士奔於流柵併力迴攻尚軍大破之尚軍擾亂失其器甲還者十二三先是衙博之敗朝廷更用許雄為梁州刺史征西將軍雄數遣軍攻特特䧟破之備險不得進河間王司馬顒欲遣監軍劉沈將兵西征以中國有事不果而南夷校尉李毅所遣傁兵亦數挫敗特勢轉盛於是建寧大姓李叡毛詵逐太守杜俊朱提大姓李猛逐太守雍約以兵應特衆各數萬南夷校尉李毅討破之斬詵李猛奉牋降毅而辭意不遜毅誘而殺之建初元年春正月朔特潜渡江擊破羅尚水上軍特從盎底渡黨徒從赤水渡入郫及水西南縁江守軍皆散走進冦成都蜀郡太守徐儉以少城降特入據之惟取馬以供軍餘無侵掠赦其境内改元建初特以李璜載記作瑾為蜀郡太守撫慰其衆尚據太城自守流進屯江西之檢上尚懼遣使求和蜀民危懼並結村塢送款於特特遣使安撫之乃以軍中糓少遣六郡流民分口入城且於諸塢就食壯勇督領村塢流言於特曰殿下神武已剋少城然諸塢新附人心未固且山藪窮荒糧仗不多宜錄州郡大姓子弟以為質任送付廣漢縶之二營收集猛鋭嚴為防衞又與司馬上官惇曰納降若待敵不可易也前將軍雄亦以為言特大怒曰大事已定但當安民何為更逆加疑忌之心使之離叛乎益州兵曹從事蜀郡任叡華陽國志作任督冊府作任明説尚曰特既㐫逆侵暴百姓又分散人衆在諸村塢就食驕怠無備殆天亡特之秋也晉書作是天亡之時也宜宻約諸塢刻期同發内外擊之破之必矣尚從之使叡夜縋出城宣告諸村塢期以二月十日同時討特手書隠語曰在彼揚水叡先偽詣特降究觀虚實特問城中人情何如叡曰糧儲已欲盡但餘貨帛耳因求出省家特與啟信叡還報尚尚如期出軍討特諸塢亦許一時赴㑹二月朝廷遣荆州刺史宋岱建平太守孫阜率水軍三萬救尚岱以阜為前鋒進次徳陽特遣蕩督蜀郡太守李璜助徳陽太守騫碩一作任臧拒阜阜等軍勢甚盛諸塢皆有二心尚遣大衆掩襲特營諸塢皆應之連戰二日衆少不敵特軍大敗収合餘衆引趣新繁尚軍引還特復追之轉戰三十餘里尚出大軍逆戰至於官桑特軍敗績斬特及李輔李逺皆焚其屍傳首洛陽特在位一年其子雄僣稱成都王追諡景王及稱尊號追諡曰景皇帝廟號始祖十六國春秋卷七十六
