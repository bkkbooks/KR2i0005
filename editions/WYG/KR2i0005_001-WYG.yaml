body:
  text: 十六國春秋卷一前趙錄一劉淵劉淵字元海新興匈奴中人先夏后氏之苗裔曰淳維世居北狄千有餘嵗至冒頓襲破東胡西走月氏降服丁零内侵燕代控弦之士四十餘萬漢祖患之使劉敬奉公主以妻冒頓約為兄弟故子孫遂冐母姓為劉氏建武初烏珠留若鞮單于子右奥鞬日逐王比自立為南單于入居西河美稷今離石左國城即單于所徙庭也後漢中平中詔發南匈奴兵配幽州牧劉虞討漁陽叛冦張純單于羌渠遣子左賢王於扶羅將騎詣幽州國人恐發兵無已於是右部䤈落反與屠各胡合凡十餘萬人攻殺羌渠而於扶羅以其衆留漢遂自立為持至尸逐侯單于屬董卓作亂冦掠太原河東屯於河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王豹即淵之父也建安末呼厨泉入朝於魏魏武因留之於鄴使右賢王去卑監其國單于嵗給綿絹錢糓如列侯子孫傳襲其號乃分其衆為五部以豹為左部帥其餘部帥皆以劉氏為之左部居太原兹氏右部居祁南部居蒲子北部居新興中部居大陵雖分屬五部然皆家於晉陽汾澗之濵與中國民雜居因選漢人為司馬以監督之豹妻呼延氏魏嘉平中祈子於龍門有一白魚一作大魚頂有一角或作二角軒鬐躍鱗至於祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢所見魚變為人左手持一物大如雞子光景非常授呼延氏曰此是日精服之生貴子寤以告豹豹曰吉徵也吾昔從邯鄲張冏母司徒氏相云吾當有貴子孫三世必大昌彷像相符矣自是十五月一作十三月而生淵淵生左手有文曰淵海遂以為名齠齔英慧七嵗遭母䘮號呌擗踊哀感旁人宗族部落咸共歎賞一作羡時司空太原王昶等聞而嘉之竝遣弔賻㓜而好學不舍晝夜師事上黨崔遊習毛詩京氏易馬氏尚書尤好春秋左氏傳孫吳兵法略皆誦之史漢諸子無不綜覽嘗謂同門生朱紀范隆等曰吾每觀書傳嘗耻隨陸無武絳灌無文道由人𢎞一物之不知固君子之耻也二生遇髙皇不能建封侯之業兩公屬文帝不能興庠序之美豈不惜哉於是文學武事竝皆工絶一作遂學武事妙絶於時及長猨臂善射膂力過人姿儀魁偉身長八尺四寸鬚一作髯長三尺餘當心有赤毫毛三根長三尺六寸屯留後作上黨崔懿之襄陵公師彧等皆善相人及見淵驚而相謂曰此人形貌非常吾所未見也於是深相崇敬推分結恩咸熙中淵為侍子在洛陽與東萊王彌憑結太原王渾渾虛襟友之命子濟拜焉文帝亦深待之泰始之後渾屢言之於武帝帝召與語悅之謂王濟曰劉淵容貌風儀機談鑒智雖由余日磾無以過也濟對曰淵容儀機鑒實如聖㫖然其文武才幹賢於二子逺矣陛下若任以東南之事吳會不足平也帝稱善孔恂楊珧駿之弟也進曰吾觀劉淵之才當今恐無其比陛下若輕其衆不足以集事若假之威權平吳之後恐其不復北渡也非我族𩔖其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝黙然及秦凉覆沒帝問將於上黨李熹熹曰陛下誠能發匈奴五部之衆假劉淵一將軍之號使將之而西樹機能之首可指期而梟也孔恂曰李公之言未盡殄患之理也熹勃然曰夫以匈奴之勁悍劉淵之曉兵奉宣聖威何不盡之有恂曰淵果能平凉州斬樹機能則凉州之難方更深耳蛟龍得雲雨非復池中物也帝乃止後王彌從洛陽東歸與淵言别淵餞之九曲之濵泣謂彌曰王渾李熹以鄉曲見知每相稱薦一作達讒間因之而進深非吾願適足為吾患耳因歔欷流涕時齊王司馬攸在九曲比聞而馳遣視之見淵在焉言於帝曰陛下不除劉淵臣恐并州不得久安王渾曰淵乃長者臣請為陛下保明之且大晉方以信懐殊俗奈何以無形之疑殺人侍子乎何徳度之不𢎞也帝曰渾言是也㑹父豹卒遂以淵代為左部帥太康末改帥為都尉拜為匈奴北部都尉淵明刑法禁姦邪輕財好施推誠接物五部豪傑無不歸之幽冀名儒後門一作侯門秀士不逺千里亦皆遊焉永熙元年冬十月楊駿輔政以淵為建威將軍匈奴五部大都督封漢光鄉侯元康末坐部人叛出塞免官永寧初成都王司馬穎鎮鄴表淵行寧朔將軍監五部軍事使將兵在鄴以淵子聰為積弩將軍太安中恵帝失御齊王冏長沙王乂與成都王穎等迭相殘廢州郡姦豪所在蜂起淵從祖故北部都尉右賢王劉宣等與族人竊議曰昔我先人與漢約為兄弟憂泰同之自漢亡以來魏晉代興我單于徒有虛號無復尺土自諸王侯降同編户今吾衆雖衰猶不減二萬奈何歛手受役奄過百年左賢王淵姿器絶人幹宇超世天若不欲恢崇單于必不虛生此人也况司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣乃相與起兵於離石共推淵為大單于淵時在鄴遂使其黨呼延攸詣鄴以謀告之淵白穎請歸㑹葬穎弗許淵令攸先歸告宣等使招集五部引㑹宜陽諸胡聲言應穎實欲叛之及穎為皇太弟以淵為太弟屯騎校尉恵帝伐穎次於蕩隂穎假淵輔國將軍都督北城守事及六軍敗績穎復以淵為冠軍將軍封盧奴伯既而并州刺史東瀛公騰安北將軍幽州刺史王浚遣烏桓騎攻穎於鄴穎師戰敗淵說穎曰今二鎮䟦扈衆十餘萬恐非宿衛及近郡士民所能禦也淵請為殿下還說五部鳩合義衆以赴國難穎曰五部之衆果可保發不縱能發之鮮卑烏丸勁速如風雲何易可當邪吾欲奉乘輿還洛陽避其鋒銳徐傳檄天下以順逆制之君意何如淵曰殿下武皇帝之子有大勲於王室威恵光洽四海欽風孰不願為殿下盡死力者何難發之有王浚豎子東瀛疎屬豈能與殿下争衡邪殿下一發鄴宫示弱於人洛陽可復至乎縱至洛陽威權不復在殿下也紙檄尺書誰為人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之淵請為殿下以二部摧東瀛三部梟王浚二豎之首可指日而懸矣穎大悅拜淵為北單于㕘丞相軍事時穎振武將軍王育說穎曰劉淵今去育請為殿下促之不然懼不復至也穎然之以育為破虜將軍使追之淵遂拘育以為右光祿大夫淵至左國城右賢王劉宣等上大單于之號二旬之間有衆五萬都於離石以子聰為鹿蠡王遣左於陸王劉宏率精騎五千㑹穎將王粹拒東瀛公騰粹已為騰所敗宏無及而歸王浚使將軍祈𢎞率鮮卑攻鄴穎敗挾天子南奔洛陽東瀛公騰乞師於魏桓帝姓拓跋諱猗㐌時為代公以擊淵桓帝與弟穆帝諱猗盧合兵擊淵於西河上黨大破之與騰盟於汾東而還桓帝使輔相衛雄段繁於參合陂西累石為亭樹碑以紀行焉淵聞穎去鄴歎曰不用吾言逆自奔潰真奴才也然吾與之有言矣不可以不救於是命右於陸王劉景左獨鹿王劉延年等率步騎二萬討鮮卑烏丸宣等固諫曰晉人無道奴隷御我是以右賢王猛不勝其憤屬晉綱未弛大事不遂右賢塗地單于之耻也今司馬氏父子兄弟自相魚肉此天厭晉徳授之於我單于積徳在躬為晉人所服方當興我邦族復呼韓邪之業鮮卑烏丸我之氣𩔖可以為援奈何拒之而拯仇逆今天假手於我不可違也違天不祥逆衆不濟天與不取反受其咎願單于勿疑淵曰善當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟徳所授耳今見衆十萬皆一當晉十鼓行而摧亂晉如拉枯耳上可成漢髙之業下不失為魏武何呼韓邪足道哉雖然晉人未必同我漢有天下世長恩徳結於民心是以昭烈崎嶇於一州之地而能抗衡於天下吾又漢氏之甥約為兄弟兄亡弟紹不亦可乎今且可稱漢追尊後主以懐民望宣等稽首曰非所及也乃遷都於左國城胡晉歸附者數萬元熙元年冬十月宣等上尊號淵曰今晉氏猶存四方未定可仰尊髙祖法且稱漢王權停皇帝之號待宇宙混一當更議之乃為壇於南郊僭即漢王位下令曰昔我太祖髙皇帝以神武應期廓開大業太宗孝文皇帝重以明徳昇平漢道世宗孝武皇帝拓土攘夷地過唐日中宗孝宣皇帝􅊧揚雋乂多士盈朝是我祖宗道邁三王功髙五帝故卜年倍於夏商卜世過於姬氏而元成多僻哀平短祚賊臣王莽淊天簒逆我世祖光武皇帝誕資聖武恢復鴻基祀漢配天不失舊物俾三光晦而復明神器幽而復顯顯宗孝明皇帝肅宗孝章皇帝累葉重暉炎光再闡自和安已後皇綱漸頽天步艱難國統頻絶黄巾海沸於神州一作人州羣閹毒流於四海董卓因之肆其狂悖曹操父子凶逆相尋故孝愍委棄萬乘一作國昭烈播越岷蜀冀否終有泰旋軫舊京何圖天未悔禍後帝窘辱自社稷淪䘮宗廟之不血食四十年於兹矣今天誘其𠂻悔禍皇漢使司馬氏父子兄弟迭相殘滅黎庶塗炭靡所控訴一作告孤今猥為羣公所推紹修三祖之業顧兹尫闇戰惶靡厝但以大耻未雪社稷無主銜胆棲冰勉從衆議乃赦其境内遂以晉永興元年建元元熙國號曰漢追尊安樂公禪為孝懐皇帝立漢髙祖以下三祖五宗神主而祭之立妻呼延氏為王后署置百官以右賢王宣為丞相崔遊為御史大夫左於陸王宏為太尉劉歡樂為尚書令范隆為大鴻臚朱紀為太常上黨崔懿之後部陳元達皆為黄門侍郎族子曜為建武將軍右於陸王景為前將軍其餘拜授各有差淵率衆攻東瀛公騰騰遣將軍聶𤣥擊之戰於大陵𤣥兵敗績騰懼帥并州二萬餘户下山東淵遂所在為冦攻擊郡縣騰復乞師於桓帝衛操勸桓帝助之桓帝率精騎數千救騰斬淵將綦母豚淵南走蒲子十二月淵遣建武將軍曜冦太原取泫氏屯留長子中都皆陷之又遣冠軍將軍喬晞攻西河取介休元熙二年春東瀛公騰遣司馬瑜周良石鮮等討淵次於離石城淵遣武牙將軍劉欽等六軍拒之瑜等四戰皆敗欽振旅而歸是嵗離石大饑遷於黎亭以就邸閣穀留太尉宏䕶軍將軍馬景守離石使大司農卜豫運糧給之元熙三年冬十二月淵以前將軍景為使持節征討大都督大將軍邀擊并州刺史劉琨於板橋為琨所敗琨進據晉陽淵侍中劉殷右光祿大夫王育進諫曰殿下自起兵已來漸已一周而顓守偏方王威未震誠能命將四出决機一戰一作擲梟劉琨定河東建帝號鼓行而南尅長安而都之以闗中之衆席卷洛陽如指掌耳此髙皇帝之所以創起鴻基尅殄彊楚者也淵悅曰此孤心也元熙四年春三月淵侵汲郡略有頓丘河内之地遂還離石與劉琨相去三百里琨宻遣間其部雜虜降琨者萬餘户落淵甚懼乃徙都蒲子河東平陽屬縣壘壁盡降時東萊王彌起兵青徐二州自稱征東大將軍攻殺二千石所在冦掠遣使來降淵拜彌鎮東大將軍青州刺史東萊郡公夏四月四部鮮卑陸逐延氐酋大單徵及石勒等竝相次來降淵悉署其官爵永鳳元年春正月淵遣撫軍將軍聰等十將南據太行輔漢將軍石勒等十將東下趙魏夏四月王彌帥衆冦掠青徐兗豫四州兗州刺史茍晞與之連戰不能克丁亥轉冦許昌太傅東海王越遣司馬王斌帥甲士五千人往衛京師五月彌入自轘轅敗官軍於伊北壬戌進至洛陽屯於津陽門司徒王衍帥衆禦之甲子衍與王斌等出戰彌敗歸淵淵遣侍中御史大夫郊迎及至拜司隷校尉加侍中特進秋七月甲辰淵進據河東攻冦蒲阪平陽太守宋抽棄郡奔京師河東太守路述戰死八月鳳凰集於蒲子丞相宣等六十四人上尊號冬十月甲戌僭即皇帝位於南郊大赦境内殊死已下改元永鳳仍稱國號曰漢時晉懐帝永嘉二年也十一月以世子和為大將軍撫軍將軍聰為車騎大將軍建武將軍曜為龍驤大將軍十二月乙亥以大將軍和為大司馬封梁王尚書令歡樂為大司徒封陳留王后父御史大夫呼延翼為大司空封雁門郡公聰為楚王乂為北海王曜為始安王景為汝隂王延年為江都王洋為長樂王賢為曲陽王其餘宗室以親疎為等悉封郡縣王異姓以勲謀為差悉封郡縣公侯是年造刀一口長三尺九寸文曰滅賊隷書河瑞元年春正月辛丑晉志作庚子朔熒惑犯紫㣲太史令宣于修之言於淵曰陛下雖龍興鳳翔奄受大命然遺晉未殄皇居仄陋紫宫之變猶鍾晉氏不出三年必尅洛陽蒲子崎嶇難以久安平陽氣象方昌兼以陶唐舊都願陛下上迎乾象下協坤祥請徙都之於是遷都平陽二月晉左積弩將軍朱誕來奔具陳洛陽孤弱勸淵攻之淵以誕為前鋒都督遣滅晉大將軍景為大都督將兵攻洛陽一作黎陽晉遣車騎將軍王堪將兵迎擊夏四月景敗堪於延津沈男女三萬餘人於河澗淵聞之怒曰景何面目復見朕乎且天道豈能容之吾所欲除者止司馬氏耳細民何罪黜景為平虜將軍淵以王彌為侍中都督征東大將軍青州牧與楚王聰共攻上黨圍壺闗以石勒為前鋒都督晉并州刺史劉琨遣䕶軍黄肅韓述來救聰敗述於西澗勒敗肅於封田皆殺之晉太傅越遣淮南内史王曠將軍施融曹超等將兵拒聰曠既濟河欲長驅而前融曰彼乘險間出我雖有百萬之衆猶是一軍獨受敵也且當阻水為固以量勢形然後圖之曠怒曰君欲沮衆邪融退曰彼善於用兵曠闇於事勢吾屬今必死矣曠等踰太行與聰遇戰於長平間曠兵大敗融超皆死遂破陳留長子斬獲萬九千級上黨太守龎淳以壺闗降五月汾水中得玉璽髙一寸二分方四寸文曰有新保之一作寳蓋王莽時物也得者因增淵海光三字而獻之淵以為已瑞乃大赦境内改元河瑞封子裕為齊王隆為魯王秋八月淵復遣楚王聰及征東大將軍王彌進攻洛陽始安王曜與趙固等為之後繼九月丙寅聰圍浚儀晉太傅越遣平北將軍曹武征虜將軍宋抽將軍彭黙等拒之丁丑為聰所敗太傅越入保京城聰等長驅至西明門越率兵禦之戰於宣陽門外大破之晉征西大將軍南陽王司馬模一作平昌公遣將軍淳于定吕毅等破劉芒蕩五斗叟竝斬之又遣車騎將軍王堪平北將軍曹武自長安討聰堪等敗績奔還京師聰自恃連勝怠不設備𢎞農太守垣延詐降夜襲聰軍聰大敗而還淵素服迎師冬十月復大發卒遣楚王聰始安王曜汝隂王景征東大將軍王彌等帥精騎五萬冦洛陽使大司空雁門剛穆公呼延翼率步騎繼之丙辰聰等至宜陽朝廷以漢兵新敗不意其復至大懼辛酉聰進屯西明門䕶軍賈𦙍北宫純等夜帥勇士千餘人薄之戰於大夏門斬聰征虜將軍呼延顥聰衆遂潰壬戌廻軍屯洛水尋進屯宣陽門曜屯上東門彌屯廣陽門景攻大夏門乙丑呼延翼為其部下所殺衆自大陽潰歸淵勅聰等還師聰表稱晉兵微弱不可以翼顥死故還師固請留攻洛陽淵許之戊寅聰親祈嵩嶽山令平晉將軍安陽哀王厲冠軍將軍呼延朗等督攝留軍晉太傅越遣㕘軍孫詢將軍丘光樓裒等率帳下勁卒三千自宣陽門乘虛出擊斬朗於陳聰聞而馳還厲懼聰之罪已也赴水而死王彌謂聰曰今軍既失利洛陽守備猶固運軍在陜糧食不支數日殿下不如與龍驤還平陽裹糧發卒徐為後舉下官當於兗豫之間收兵積穀伏聽嚴期不亦可乎聰自以請留未敢擅還宣于修之言於淵曰嵗在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵馳遣黄門郎傅詢召聰等還師十一月甲申楚王聰始安王曜歸於平陽王彌出師轘轅流民之在潁川襄城汝南南陽河南者數萬家素為居民所苦皆燒城邑殺二千石長吏以應彌乞活帥李惲薄盛等帥衆衛京師遂追擊彌戰於新汲彌師敗績於是攝蒲阪之戍還於平陽十二月淵以陳留王歡樂為太傅楚王聰為大司徒江都王延年為大司空長樂王洋為大司馬遣都䕶大將軍曲陽王賢與征北大將軍劉靈及安北大將軍趙固平北大將軍王桑東屯内黄王彌表左長史曹嶷行安東將軍東狥青州且迎其家屬淵許之河瑞二年春正月乙丑朔大赦境内立單徵女為皇后梁王和為皇太子封子乂為北海王遣兵分冦徐冀兗豫諸郡又遣曹嶷冦東平琅邪夏四月王浚遣天水將軍祁𢎞擊破劉靈於廣宗殺之秋七月楚王聰始安王曜平東大將軍石勒及安北大將軍趙固圍河内太守裴整於懐晉遣征虜將軍宋抽率兵救懐勒與平北大將軍王桑逆擊破之河内人執整以降淵以整為尚書左丞河内督將郭黙收整餘衆自為塢主庚午淵寢疾將為顧託之計辛未以陳留王歡樂為太宰長樂王洋為太傅江都王延年為太保楚王聰為大司馬大單于竝錄尚書事置單于臺於平陽西復以齊王裕為大司徒魯王隆為尚書令北海王乂為撫軍大將軍領司隷校尉始安王曜為征討大都督領單于左輔廷尉喬智明為冠軍大將軍領單于右輔左光祿大夫劉殷為左僕射右光祿大夫王育為右僕射任顗為吏部尚書朱紀為中書監䕶軍馬景領左衛將軍永安王安國領右衛將軍安昌王盛安邑王欽西陽王璿等皆領武衛將軍分與禁兵丁丑召太宰歡樂等入禁中受遺詔輔政己卯薨於光極殿時晉永嘉四年也淵在位七年太子和嗣立呼延攸等恨不參顧命乃謀殺聰聰自西明門斬和於西室九月辛未葬淵於永光陵諡曰光文皇帝廟號髙祖劉和劉和字𤣥泰淵后呼延氏所生聰第四弟也身長八尺雄毅美姿儀好學夙成習毛詩左氏春秋鄭氏易及為儲貳内多猜忌馭下無恩淵死嗣偽位宗正呼延攸翼之子也淵以其無才行終身不遷官侍中劉乘素不善於聰衛尉西昌王銳恨不㕘顧命乃相與謀說和曰先帝不惟輕重之勢而使三王總强兵於内大司馬握十萬勁卒屯於近郊陛下今便為寄主耳禍難未可測也願蚤為之計和即攸之甥也遂深然之辛巳夜召領武衛將軍安昌王盛安邑王欽及領左衛將軍馬景等告之盛曰先帝尚在殯宫四王未有逆節今忽一旦自相魚肉臣恐人不食陛下之餘且四海未定大業甫爾願陛下以上成先帝鴻基為志塞耳勿聽讒夫之言以疑兄弟詩云豈無他人不如我同父陛下既不信諸弟他人誰足信哉銳攸怒之曰今日之議理無有二領軍是何言乎於是命左右刃之盛既被殺欽懼曰惟陛下詔臣等以死奉之􅌸不濟矣相與盟於東堂壬午銳帥馬景攻楚王聰於單于臺攸率右衛將軍永安王安國攻齊王裕於司徒府侍中乘率武衛將軍安邑王欽攻魯王隆使尚書田宻武衛將軍西陽王璿攻北海王乂宻璿等挾乂斬闗奔聰聰命貫甲以待之銳既知聰之有備馳還與攸乘等㑹攻隆裕復懼安國欽有異志殺之是日斬裕癸未斬隆甲申聰攻西明門克之銳等奔入南宫前鋒隨之乙酉殺和於光極西室收銳攸乘梟首通衢十六國春秋卷一
