body:
  text: 十六國春秋卷五十四後秦録二姚襄姚襄字景國弋仲之第五子也年十七身長八尺五寸臂垂過膝雄武多才藝能明察善撫納士民敬愛之咸請為嗣弋仲以襄非長子不許請者日以數千乃授之兵石祗僣號署襄為使持節驃騎將軍領䕶烏桓校尉豫州刺史新昌公晉永和七年遣使拜持節平北大將軍都督并州諸軍事并州刺史即丘縣公晉書作平丘郡公八年春弋仲死襄祕不發䘮率戸六萬南攻陽平元城發干皆破之殺掠三千餘家屯於碻磝津以太原王亮為長史天水尹赤為司馬畧陽伏子成為左部帥南安歛岐為右部帥畧陽王黒郍為前部帥强白為後部帥太原薛讃畧陽權翼為參軍襄與秦兵戰敗亡三萬餘户南至滎陽始發䘮行服又與秦將髙昌李厯戰於麻田馬中流矢死襄弟萇下馬以授襄襄曰汝何以自免萇曰但令兄濟此豎子必不敢害萇㑹救至俱免夏四月襄帥衆歸晉送其五弟為質詔襄屯譙城襄單騎渡淮見安西將軍豫州刺史謝尚於夀春尚聞其名命去仗衛幅巾待之一面交欵歡若平生㑹鎮西將軍張遇反於許昌使其黨王恩據洛陽尚遂帥襄與遇戰於許昌之誡橋王師敗績襄少有髙名雄武冠世好學博通雅善談論英濟之稱著於南夏江東人士莫不重之徙屯厯陽以燕秦方强未有北伐之志乃夾淮廣興屯田訓勵將士永和九年冬十月中軍將軍揚州刺史殷浩在夀春憚襄威名㑹襄部曲有欲歸浩者襄殺之浩於是遂欲誅襄乃先囚襄諸弟頻遣刺客刺襄刺客皆以情告襄待之如舊浩潛遣安北將軍魏憬帥衆五千餘人襲襄襄斬憬并其餘衆浩愈惡之使龍驤將軍劉啟守譙遷襄於梁國蠡臺表授梁國内史既而魏氏子弟往來夀春襄益猜懼遣參軍權翼使浩浩曰身與姚平北共為王臣休戚同之平北每舉動自専甚失輔車之理豈所望也翼曰平北英姿絶世擁兵數萬逺歸晉室者以朝廷有道宰輔明哲故也今將軍輕信姦言自生疑貳愚謂猜嫌之端在此不在彼也浩曰平北姿性豪邁生殺自由縱放小人奪掠吾馬王臣之體固如是乎翼曰平北歸命聖朝豈肯妄殺無辜姦仇之人亦王法所不容也殺之何害浩曰然則掠馬何也翼曰將軍謂平北威武自强終為難制校兵練衆將懲不恪故取馬欲以自衛耳浩笑曰何至是也乃遣翼還先是浩師次夀春潛誘苻健大臣梁安雷弱兒等使殺健許以関右之任㑹健殺其大臣健兄子苻黄眉自洛陽西奔浩以安等事㨗意健已死請進屯洛陽修復陵園使襄為前鋒引兵北行時冠軍將軍劉洽鎮鹿臺建武將軍劉遯據倉垣浩將至詐令部衆夜遁隂伏甲以邀襄襄潛知之及明果遣謝萬追襄進次山桑襄縱兵逆擊浩兵大敗懼棄輜重走保譙城俘斬萬餘軍儲器械皆為襄所收掠士卒多亡叛襄使兄曜武將軍益守山桑壘復如淮南浩復遣龍驤將軍劉啓及王彬之攻益於山桑襄自淮南來援啓彬之皆敗死襄進據芍陂鼓行濟淮屯於盱眙招掠流民衆至七萬分置守宰勸課農桑遣使詣建康罪狀殷浩并自陳謝永和十年江西流民郭斁一作敞等千餘人執晉唐邑内史陳留劉任降於襄朝廷大震以吏部尚書周閔為中軍將軍屯中堂豫州刺史謝尚自洛陽還衛京師縁江備守襄將佐部曲皆北人咸勸襄北還襄從之方軌北行永和十一年春正月襄自稱大將軍大單于夏五月進攻外黄晉冠軍將軍髙季遣將邀擊之襄衆大敗遂收散卒勤恤撫之於是復振進據許昌將如河東以圖闗右永和十二年夏四月襄自許昌攻周成於洛陽月餘不尅長史王亮諫曰明公英略葢世兵强民附今頓兵堅城之下力屈威挫或為他冦所乘此危亡之道也宜還河北以宏逺畧襄曰洛陽雖小山河四塞之固亦是用武之地吾欲先據洛陽然後開建大業俄而亮卒襄哭之甚慟曰天將不欲成吾事乎王亮捨我去也秋七月丁邜太白犯鎮星在桞占曰當有大兵八月晉太尉征西大將軍桓温自江陵討襄己亥進次伊水上襄撤圍拒之匿精銳於水北林中遣使謂温曰承親帥王師以來襄今奉身歸命願勑三軍小却當拜伏道左温曰我自開復中原展敬山陵無豫君事欲來者便前相見在近無煩使人温司馬許遜曰不得見襄而有大功見襄走入太𤣥中温問曰太𤣥是何等也答曰南為丹野北為太𤣥襄必西北走也襄果距水而戰温結陳而前親被甲督戰襄衆大敗死者數千人部將張駿楊凝等皆為温所獲徙於尋陽襄帥麾下數千騎奔於洛陽北山如遜所言其夜百姓棄妻子隨襄者五千餘人出據陽鄉赴者又四千餘户襄勇而愛人雖屢戰敗衆知襄之所在輒扶老擕㓜奔馳歸赴軍中𫝊言襄病創已死許洛士女為温所得者無不北望揮涕襄西走温追之不及先是宏農楊亮歸襄襄待以客禮後自襄所奔温温問襄之為人亮曰神明器宇孫䇿之儔而雄武過之其見重如此襄奔平陽秦并州刺史尹赤復以衆降襄襄遂據平陽秦大將軍冀州牧張平擊敗之乃與平約為兄弟各罷兵晉升平元年春三月襄徙北屈將圖闗中夏四月自北屈進屯杏城遣從兄輔國將軍蘭略地鄜一作敷城遣兄曜武將軍益及左將軍王欽盧各將兵招集北羌胡及秦民歸之者五萬餘戸秦苻生遣苻飛龍拒戰蘭敗為飛龍所執襄引兵進據黄落生又遣衛大將軍苻黄眉平北將軍苻道龍龍驤將軍苻堅建節將軍鄧羌帥歩騎萬五千要之襄欲出戰沙門智通固諫曰去年太白犯鎮今嵗彗星復掃闗右不利出師宜勵兵收衆更思後舉襄曰二雄不並立冀天不棄徳以濟黎元吾計决矣惑衆者斬五月鄧羌帥其歩騎五千來壓壘門而陳襄怒悉衆出戰羌陽不勝而走襄遂長驅進擊戰於三原敗績為苻堅所殺時年二十七弟萇率其餘衆降生生以公禮葬襄及萇僭號追諡魏武王封襄孫延定為東城侯十六國春秋卷五十四
