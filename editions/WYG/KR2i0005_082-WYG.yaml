body:
  text: 十六國春秋卷八十二後涼錄二吕紹吕紹字永業光之嫡子也麟嘉元年與母石氏至自仇池遂立為世子光僭即天王位進為太子光死紹秘不發喪庶兄太原公纂乃排閣而入哭之盡哀拂衣欲出紹懼為纂所害以位讓之曰兄功高年長宜承大綂願兄勿疑纂曰臣雖年長陛下國家之冢嫡也臣安敢奸之不可以私愛而亂大倫紹固讓纂纂不許紹遂嗣偽位驍騎將軍吕超言於紹曰纂綂戎積年威震内外臨喪不哀步高視逺觀其舉止似亂常度恐成大變宜早除之以安社稷紹曰先帝顧命言猶在耳奈何棄之且兄弟至戚寧有此乎吾以弱年負荷大任方賴二兄以寧國家縱其圖我我視死如歸終不忍有此意也卿慎勿言超曰纂威名素著安忍無親今不圖之後必噬臍矣紹曰吾每念袁尚兄弟未嘗不痛心切齒忘寢與食寧坐而死豈忍行之超曰聖人稱知幾其神陛下臨機不斷臣見大事去矣既而纂見紹于湛露堂超執刀侍側目纂請収之紹不許纂遂與常山公𢎞率壯士數百攻紹紹登紫閣自殺追諡隠王先是光未亡時有鬼呌於都街曰兄弟相滅百姓弊徼吏尋視之則無所見其年光死紹立五日為纂所殺吕纂吕纂字永緒光之庶長子也母趙淑媛纂性粗暴少便弓馬好鷹犬苻堅時入太學不好讀書唯以交結公侯聲樂為務太安元年堅亂西奔上邽轉至姑臧拜虎賁中郎將秦州刺史封太原公先是光欲立𢎞為世子㑹聞紹在仇池乃止𢎞既有憾于紹遣尚書姜紀宻告纂曰先帝登遐主上闇弱未堪多難兄總攝内外威恩素著宜為社稷計不可狥小節也輙欲逺追廢昌邑之義以兄為中宗何如纂從之於是夜率壯士數百踰北城攻廣夏門𢎞率東苑之衆斫洪範門左衞將軍齊從守融明觀抽劍斫纂不中被擒紹遣武賁中郎開率禁兵拒戰于端門驍騎將軍虎率衆二千赴難衆素憚纂皆不戰自潰纂入自青角門升謙光殿紹自殺於紫閣超出奔廣武纂憚𢎞兵強以位讓𢎞𢎞曰向以紹弟也而承大綂衆心不順是以違先帝遺命而廢之慙負黄泉今復踰兄而立豈𢎞之本志乎復何面目以視息世間大兄長且賢威名振于二寇宜速即大位以安國家纂乃使𢎞出告衆曰先帝臨終受詔如此羣臣皆曰茍社稷有主誰敢違者遂僭即天王位大赦境内改元咸寧尊嫡母石氏為王太后生母趙氏為太后署常山公𢎞為使持節侍中大都督都督中外諸軍事大司馬車騎大將軍司隸校尉錄尚書事改封番禾郡公其餘封拜各有差叔父征東將軍方鎮廣武纂遣使謂方曰超實忠臣義勇可嘉但不識國家大體權變之宜方賴其忠節誕濟世難卿可以此意諭之超乃上疏陳罪纂復其爵位咸寧二年春三月大司馬番禾公𢎞自以功名崇重恐不為纂所容纂亦以𢎞功高地逼深忌嫉之𢎞以東苑之兵作亂刼尹文楊桓以為謀主請宗變俱行燮固辭之遂率兵攻纂纂遣將軍焦辨擊之𢎞衆潰出奔廣武纂縱兵大掠悉以東苑婦女賞軍𢎞之妻女亦為士卒所辱纂笑謂羣臣曰今日之戰何如侍中房晷對曰天禍涼室釁起戚藩先帝始崩隠王以幽逼致殂山陵甫訖大司馬以驚疑肆逆京邑流血昆弟接刅雖𢎞自取夷滅亦由陛下無棠棣之恩宜省己責躬以謝百姓而反縱兵大掠囚辱士女釁自𢎞起百姓何罪且𢎞妻陛下之弟婦𢎞女陛下之姪女也奈何使無賴小人汚辱為婢妾天地神明豈忍見此因歔欷悲泣纂改容謝之乃召𢎞妻及男女置於東宫厚撫之𢎞將奔秃髪利鹿孤道過廣武詣征東將軍方方見之大哭曰天下甚寛汝何為至此乃執𢎞繫獄馳使告纂纂遣力士康龍就拉殺之是月立妃楊氏為皇后以后父桓為散騎常侍尚書左僕射涼都尹封金城侯夏四月纂將伐秃髪利鹿孤中書令楊頴諌曰夫起師動衆必參之天人茍非其時聖賢所不為也利鹿孤上下用命國未有釁不可以伐今宜繕甲養鋭勸課農桑待可乘之機然後一舉蕩滅比年多事公私罄竭不深根固本恐為患將來願抑赫斯之怒思萬全之策纂不從遂帥衆度浩亹河利鹿孤遣弟傉檀來拒戰於三堆纂衆敗績失士卒二千餘人六月纂將西襲張掖尚書姜紀諫曰方今盛夏農事方殷百姓廢農所利者少所喪者多若師至嶺西虜必乘虚寇掠都下將若之何宜且迴師以為後計纂曰虜無大志聞吾西征正可自固耳今速襲之可以得志遂進圍張掖略地建康傉檀聞之帥萬騎襲姑臧纂弟隴西公緯憑北城以自固傉檀曜兵于青陽門虜掠八千餘户而去纂聞之引還秋九月征東將軍方率廣武民三千餘户奔利鹿孤是年有猪生子一身三頭又有龍出東廂井中到殿前蟠卧比旦失之纂以為美瑞號大殿為龍翔殿又有黑龍行于當陽九宫門改為龍興門鳩摩羅什獨以為灾言於纂曰比日潛龍出游豕妖見異龍者陰𩔖出入有時而今屢見則為災𤯝將有下人謀上之變宜克己修德以答天戒纂不納涼州一作即序不知何解人胡據一作胡安枚盜發張駿墓見駿貌如生得真珠簾箔雲母屏風琉璃榼白玉樽受三升赤玉簫紫玉笛珊瑚鞭馬瑙鍾黄金勒水陸竒珍不可勝紀纂誅據黨五十餘家遣使吊祭駿并繕修其墓咸寧三年春二月纂昏虐任情游田無度荒躭酒色不恤政事太常楊頴諌曰臣聞皇天降監惟德是與德由人𢎞天應以福故勃焉之美奄在聖躬大業已爾當以道守之廓靈基于日新邀洪福于萬世自陛下龍飛疆宇未闢﨑嶇二嶺之内綱維未振於九州陛下不兢兢夕惕經略四方以成先帝之遺志拯蒼生於荼毒一作蓼而更飲酒過度出入無恒宴安游盤之樂沈湎樽酒之間不以寇讐為慮臣竊危之糟丘酒池洛汭不返皆陛下之殷鑒臣蒙先帝夷險之恩故不敢避干將之戮纂謝曰朕之罪也不有直亮之臣誰匡邪僻之君然昏虐自任雖有此諌終不能改常與左右因醉騁馳遊獵或馬奔於坑塹之間殿中侍御史王回中書侍郎王儒控馬諌曰千金之子坐不垂堂萬乘之主清道而行奈何去輿輦之安冒奔馳之危銜橜之變動有不測之禍愚臣竊所未安敢以死争願陛下逺思逺思二字段龜龍涼州紀作宜憶袁盎攬轡之言不令臣等受譏千載纂不納纂番禾太守超擅擊鮮卑思盤思盤遣弟乞珍訴超於纂纂召超及思盤皆入朝超至姑臧大懼深自結於殿中監杜尚纂見超怒責之曰卿恃兄弟桓桓乃敢欺吾要當斬卿天下乃定超頓首曰不敢纂本以恐愒超實無意殺之因引超思盤及諸臣同讌於内殿超兄中領軍隆屢勸纂酒已至昏醉乘步輓車將超等遊禁内至琨華堂東閣車不得過纂親將竇川駱騰倚劍於壁推車過閣超取劍擊纂纂下車擒超超刺纂洞胷奔於宣德堂川騰與超格戰超殺之纂妻楊氏命禁兵討超杜尚止之皆納兵舍仗將軍魏益多斬取纂首以狥曰纂違先帝之命殺太子而自立荒躭酒獵昵近小人輕害忠良以百姓為草芥番禾太守超以骨肉至親懼社稷顛覆順人心而除之上以安宗廟下為太子報仇凡我士庶同兹休慶纂在位三年死纂未死時嘗與鳩摩羅什博戲或共圍棋殺羅什子曰斫胡奴頭羅什曰不能斫胡奴頭胡奴將斫人頭此言有為而纂不能悟光弟寶有子名超小字胡奴竟以殺纂終如什言隆簒位偽諡纂為靈皇帝墓號白石陵十六國春秋卷八十二
