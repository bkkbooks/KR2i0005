body:
  text: 十六國春秋後燕錄慕容垂字道明皝第五子小字阿六敦母蘭淑儀垂少有器度長七尺七寸手垂過膝皝甚寵之常曰此兒闊達好奇終能破人家或能成人家故名霸字道業因墜馬傷前二齒慕容雋即王位因改名𡙇外以慕郤𡙇為名內惡而改之尋以讖記之文夬以垂為名及雋僭稱尊號封吳王建熙十年以車騎大將軍敗桓溫于枋頭威名大震太傅上庸王評深忌之垂遂出奔秦苻堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹苻堅敗于淮南垂軍獨全堅以千餘騎奔之世子寶言于垂曰國家傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬堅垂至澠池言于堅曰王師不利壯境之民或因此輕重請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諫曰垂爪牙名將今之韓白且世豪東夏志不為人下頃以避禍歸誠非慕德而至也恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信況萬乘之主乎翼曰陛下重小信而輕忽社稷臣見往不見其還關東之變垂其首乎自涼馬臺結草筏而渡至安陽修箋于長樂公丕垂至館之于鄴西會苻暉告丁零翟斌聚眾四千謀逼洛陽丕于是配垂兵二千遣廣武將軍苻飛龍率氐騎一千為垂之副丕戒飛龍曰垂為三軍之統卿為垂謀之主苻暉告急簡書相尋垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋眾三萬至洛陽苻暉閉關門拒守不與文通翟斌率眾會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸軍之力得平關東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大將軍燕王承制行事翟斌為建義將軍封河南王弟德為范陽王眾至二十萬濟自石門長驅攻鄴慕容垂元年正月朝群寮于清陽宮以暐在長安依晉愍帝在平陽中宗稱王改年建武故事改秦建元為燕元元年立太子寶為燕太子攻拔鄴郡丕固守中城垂漸而圍之于魏郡肥鄉築新興以置輜重進師攻鄴開其西奔之路二年三月丕棄鄴奔并州以魯陽王和為南中郎將鎮鄴十二年垂定都中山建興元年正月群寮勸垂正尊號辛卯僭即皇帝位于南郊大赦改元建興立子寶為皇太子十年五月太子寶率眾八萬伐魏范陽王德為之後繼魏聞寶將至徙于河西寶臨河不敢濟引師還次于參合俄而魏軍大至三軍奔潰寶與德等數千騎奔免十一年三月垂大眾出參合大子寶出天門垂至參合見積骸如山設祭弔之死者父兄各皆號哭軍哀慟垂慚憤嘔血因而寢疾築燕昌城而還寶等至雲中聞垂疾皆引歸及垂于平城夏四月薨于上谷之俎陽年七十二諡武成皇帝廟號世祖慕容寶字道祜垂第四子元璽四年生于信都少輕果無志操好人從巳段后諫垂曰太子資質雍容柔而不斷非濟世之雄遼西高陽陛下嗣之賢者宜擇一樹之垂不納謂曰汝謂我為晉獻公乎建興十一年四月僭即皇帝位大赦改元為永康元年慕容寶寶遣將軍趙王麟逼段后曰常謂主上不能嗣守太統今竟能不宜早自裁以全段氏后怒曰汝兄弟上逼殺母豈能保守社稷吾豈惜死念國滅不久遂自殺八月立妃段氏為皇后濮陽公榮為皇太子二年正月魏使修和寶不許二月魏攻中山其夜尚書慕容皓謀殺寶立趙王麟寶與太子榮等萬騎就清河會于薊以開封公慕容詳守中山五月中山饑麟出據新市魏師戰于義臺敗績南奔魏入中山寶遣御史中丞兼鴻臚魯遂持節受司空范陽王德丞相冀州牧丞制南夏封公封侯牧守三年二月寶發龍城以撫軍慕容騰為前軍步騎三萬將南伐次于乙連長上段速骨宋赤眉因民之憚遠役殺司空樂浪王宙眾既幸亂投仗奔走寶馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寶還于薊寶欲北還盛等咸以汗忠款虛實未明宜就范陽王德寶從之乃自薊而南四月寶至鄴鄴中遺民固請留之寶不從南至黎陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超寶具申款誠忠節無差寶于是命發汗遣弟難率五百騎迎寶至龍城汗引寶入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌黎王年號青龍七月長樂公盛襲誅汗盛即位偽諡寶惠愍皇帝廟號烈祖慕容盛字道運寶之庶長子秦建元十年生于長安二十年苻堅誅慕容氏盛東奔既至垂問以西事畫地圖垂笑謂之曰昔魏武撫明帝之首遂乃侯之祖之愛孫有由來矣于是封長樂公建興六年領北中郎鎮薊進爵為王及寶為蘭汗所殺盛馳訃哀因潛結大眾謀討茌及江等斬之慕容盛建平元年七月告成宗廟大赦改元青龍謙損自卑不稱尊號以長樂王稱制諸王貶爵為公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僭即皇帝位正月朝群臣于承乾殿大赦改建平元年為長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右將軍慕容國謀率禁兵襲盛前將軍段機等因眾心阻動潛于禁中鼓譟大呼盛聞變率左右出戰眾皆披潰俄有一賊從闇中擊傷足遂取輦昇前殿召叔公河間公熙囑以後事熙未至而薨年二十九偽諡昭武皇帝廟號中宗慕容熙字道文一名長生垂之少子燕元二年生于長生建興八年封河間王永康初隨寶奔龍城拜司隸校尉長樂元年遷僕射中外都督領中領軍昌黎尹盛薨僭即皇位大赦改長樂三年為光始元年慕容熙二年正月熙引見州郡耆舊予言問以民間疾苦司隸部民劉瓚對問稱旨拜帶方太守是春大治宮室至四月立苻貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑內又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為苻昭儀鑿曲光海青涼池季夏暑熱士卒不得休息渴死者大半四年二月昭儀苻氏卒立苻貴嬪為皇后九月苻后遊畋熙從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之士卒為狼虎所害及凍死者五千餘人五年十月擬鄴之鳳陽作弘光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化為五白龍夢中占之曰月臣也龍君也月化為龍當有臣為君寤而告人曰國苻其將盡乎是月苻后起承華殿高弘光一倍負土於北門土與穀同價典軍杜靜載棺詣闕上書諫大怒斬之后嘗季夏思凍魚鱠冬須生地黃皆下有司切責不得加以大辟四月苻后崩熙悲號躃踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣于是僵仆絕息久而乃蘇服斬縗食粥百寮于宮內設位哭臨使有司按校哭者有淚以為忠孝無淚則加罪群臣震懼莫不含辛以為淚高陽王妃張氏熙之嫂也美姿容熙欲以為殉乃毀其襚鞾中有弊氈遂賜死三女叩頭求哀熙弗許營陵周輪數里下涸三泉內圖畫尚書八座之像熙曰善為之朕將隨后入此陵轜車高大毀北門而出中衛將軍馮跋左衛將軍張興先皆坐事亡奔以熙政之虐也與跋從兄萬泥等三十二人結盟推夕陽公慕容雲為主發尚方徒五千人分屯四門入宮受甲閉門拒守中黃門趙洛生奔告熙熙曰此鼠盜耳勝還當誅之乃收髮貫甲馳還赴難夜至龍城攻北門不剋遂入龍騰苑左右潰散熙微服逃于林中為人執送雲等殺之年三十二葬衡平陵諡曰昭文皇帝慕容雲字子雨寶之養子祖父高和句麗之支庶自云高陽氏之苗裔故以高為氏寶之為太子雲以武藝給侍東宮永康初拜侍御郎以疾去官及熙葬后馮跋詣之告以大謀雲懼跋等強之四月即天王位復姓高氏大赦改建始元年為正始元年國仍號大燕以馮跋為侍中都督中外諸軍錄尚書事武邑公慕容歸為遼東公立燕之宗社慕容雲三年冬十月雲臨東堂幸臣離班桃仁懷劍執紙而入稱有所啟抽劍擊雲雲以几拒班桃仁進而殺之立馮跋為主即位偽諡為惠懿皇帝始垂以丙戌之歲建號中山至馮跋之歲歲在己酉二十四年
