body:
  text: 十六國春秋後趙錄石勒字世龍上黨武鄉羯人父周曷朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好騎射幼而力耕每聞鞞鐸之聲或在前後歸以告其母母曰作勞耳鳴非不祥也會并州刺史司馬騰執諸胡山東賣充軍實將詣冀州兩胡一枷勒亦在中東至中原賣與茌平人師權為奴每夜於野嘗聞鼓角之聲諸奴亦聞歸以白懽懽奇而免之鄰於馬牧率汲桑往來勒以能相馬自託於桑而傭於武安臨水為遊軍所囚會有群鹿旁過軍人競逐之勒乃獲免俄而見一老父謂勒曰向群鹿者我也君應為中州主故相救耳勒拜而受命遂招集王陽夔安等十八騎復東如赤龍諸苑中乘苑馬遠掠繒寶以賂汲桑石勒永興元年關東所在盜起二年陽平人公師蕃等自稱將軍起兵趙魏眾至數萬勒與汲桑率牧人乘苑馬數百騎以赴之桑始命勒以石為姓以勒為名永嘉元年勒歸劉淵拜為輔漢將軍晉平王淵薨聰襲位劉曜王彌圍洛陽勒帥精騎二萬會之王彌既平洛陽將先誅勒勒請彌燕于己營手斬彌而并其眾將軍郭默獲沙門竺浮圖澄以其有道術進之于勒試之有效甚尊重之前趙嘉平二年張賓說勒曰邯鄲襄國趙之舊都依山憑險形勢之固可擇此二邑而都然后命將四出授以奇略王業可圖石勒於是進據襄國聰授勒都督幽冀并營四州諸軍事冀州牧進封本郡公邑萬戶三年以征虜將軍為魏郡太守鎮鄴三臺篡奪之謀兆於此矣前趙嘉麟元年劉琨遣姚澹帥眾來討勒與戰澹軍大敗琨長史李宏以并州來降七月劉聰疾甚以勒為大將軍錄尚書事受遺輔政勒固辭乃止曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔漢故事劉曜聞平樂之言停太宰之授勒大怒曰趙王趙帝孤自取之名號大小豈爾所呼耶征虜虎與左右長史張敬張賓等上號曰大司馬雖位冠九台非伯者之號請改稱大將軍大單于領冀州牧趙王在鄴故事以二十四郡戶二十九萬為趙國十一月勒即位改元稱為趙王元年始建社稷立宗廟主書司典故人出內重其禁法不得侮易衣冠華族號胡為國人二年令曰國人不聽報嫂及在喪婚娶至於燒葬令如本俗八月始置軒縣之樂八佾之舞作金銀大輪黃屋左纛天子禮樂於斯備矣三年黎陽民陳武妻產三男一女上書自陳令曰昔周之興也四乳八子今武妻一乳四子可謂度過姬祥美加曩日其賜乳婦一人穀百石雜繒十四疋庶以肅迎嘉祥冬十月勒親與鄉老齒坐懽飲語及平生勒曰李陽壯士也孤方取之何以不來父老歸語令速來漚麻池之忿是布衣之恨孤方崇信于天下寧讎四夫乎令曰武鄉吾之豐沛也其復之三世十一月李陽至勒與酣謔引陽臂笑謂之曰卿雖老臂中猶有力頗復與人鬭孤往日厭鄉老拳卿亦飽孤毒手因賜甲第一區拜為都尉陽與勒鄰居歲長爭漚麻池迭相毆擊四年二月拜子宏為世子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國后大驚曰此法當失何以得成天下至留侯諫乃曰賴有大此侯耳其天資英達如此八年八月脩三臺三月以世子衛將軍宏鎮鄴大和十年劉曜圍洛陽襄國大震勒統步騎四萬赴金墉濟自大碣先是流凘風猛軍至冰泮清和濟畢流澌大至勒以為神靈之助命曰靈昌津戰于西門曜軍大清石堪執曜送之二年曜子熙等去長安奔于上邽車騎虎剋上邽遣主簿趙封奉傳國玉璽送之秦隴西建平元年二月車騎石虎等上尊號勒不許固請勒號趙天王行皇帝事大赦八月群臣又固請以名位不正宜即尊號九月僭即皇帝位大赦改年正月勒南郊有白氣自壇屬天勒大悅四月勒如鄴議營新宮廷尉續咸諫曰臣聞唐虞之治采椽茅次土階三尺美彰于詩書漢文惜百金不營露臺稱之於千古迨夏商之瓊臺瑤陛楚章華秦阿房資財內竭華夷外叛勒詔曰且勑停作以申吾直臣之氣九月以太尉中山王虎為大司馬程遐開府議同是月大霖雨中山西北暴水漂流巨木萬餘根集于堂陽勒大悅謂公卿曰此非為災天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌略邁于高皇雄藝卓犖超絕魏武三五以來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦已太過朕若逢高皇當北面而事之然猶與韓彭競健而爭先耳倘遇光武當並驅于中原未知鹿死誰手大丈夫行事當礨礨落落如日月皎然終不能如曹孟德司馬仲達欺他孤兒寡婦狐媚以取天下也朕在二劉之間耳軒轅豈所擬乎群臣皆稱萬歲四年雍州刺史石生上言西鄉行死蛇鼠鬭於安定府間二日蛇死臨涇馬生角長安城中鷄鳴音皆曰基慈安定廳事前後聞誦書聲求之不得七日乃止隕石于肥鄉六月勒寢疾召中山王虎太子宏中常侍嚴震等侍疾禁中七月薨于西閣偽諡明皇帝號高祖石宏字大雅勒第三子母程夫人右光祿遐之妹建平元年立為太子虛衿愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上得天下孝文以玄默守之聖人之後必世勝殘天之道也勒大悅程遐言於勒曰中山怏怏不可以輔少主乞早除之以便大計勒不從石宏勒薨虎執政臨軒召子冀州刺史遂兵入禁宿衛文武無不奔散宏大懼策拜中山王虎為丞相以十三郡封為魏王又加九錫虎偽讓后乃受之延熙元年七月改頓邱為魏國沿魏郡至黎陽十月宏齎璽綬親詣魏公喻禪意虎曰宏昏昧愚暗處喪無禮不可以君臨萬國奉承宗廟便當廢之云何禪讓十一月廢宏為海陽王宏就車容色自若幽宏及太程后南陽王恢于崇訓宮尋殺之時年二十二石虎字季龍勒之從子勒父朱幼而子之故或謂之勒弟晉永興中與勒相失嘉平元年劉琨送勒母王及虎于葛陂時年十七性殘忍好馳獵諠遊無紀度尤善彈數彈人軍中每患之勒白王曰此是凶暴無使軍人殺之聲名可惜宜自除也王曰快牛犢子小時多能破車為復小忍勿怯之至十八檢攝恭謹嚴重受士弓馬迅捷勇冠當時勒深喜焉拜征虜將軍性酷虐無道軍中勇幹策略與己侔者輒因事害之至於降城陷壘坑斬士女鮮有遺類勒屢加責誨而行意自若然御眾嚴而不煩莫敢犯者指授攻討所向無前故勒寵信彌隆仗以專征之任既廢殺宏稱居攝趙天王建武元年正月大赦改元虎荒遊廢政外耽營繕使太子還省者以書奏事選守牧祀郊廟惟征伐刑斷乃親覽之三月南遊臨江而還東大震是日觀省臺城賜匠有差九月遷都鄴宮石虎三年徙洛陽橦簴九龍翁仲等于鄴是歲太武殿東西宮皆就太武殿基二丈八尺下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧起靈風臺九殿於顯陽后選召百官州郡民女以充之后庭服綺縠玩珍奇者萬餘人內置女官十八等教宮人星占及馬步射置女太史於靈臺仰觀災祥以考外太史之虛實禁郡國不得私學星讖左校令成公段造庭燎于崇杠之末高十餘丈上盤置燎下盤置人絙繳上下虎試而悅之三年太保安夔等文武五百九人上皇帝尊號安等方入而庭燎油灌下盤死者七人虎大怒腰斬成公段于閶闔門即天王位南郊大赦親王貶為郡公藩王為縣侯太子遂總百揆其后荒酒淫色驕恣無道或盤遊于田懸管而入或夜百騎宿于宮臣家淫其妻妾裝飾宮人美淑者斬首洗血置于盤上傳共視之又納諸比丘尼有姿色者與其交褻而殺之合牛羊肉煮而食之亦賜左右欲以識其味也虎荒耽內遊威刑失度遂以事為可或呈之虎怒曰小事何足呈也時有所不聞復怒曰何以不呈請責杖捶月至再三遂甚慍私謂中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對事發幽遂于東宮殺之及妃張氏并男女二十六人盡賜死合一棺埋之誅其宮臣友黨二百餘人立河閒公宣為太子建武六年追尊號考樂平敬公為太宗孝皇帝八年六月上黨孟門上有神人之像坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌產一狼子日噬虎腦而殺之后三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津探石為中濟石無大小輒隨流用工五百餘萬不成虎如靈昌津沉璧告誠璧浮於渚水波上騰津所殿觀莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人成長安未央宮又發司豫荊兗二十六萬人成洛陽宮十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下宜父慈子和深以慎之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而去韜怒增之十丈宣聞之恚甚謂楊柸牟成等曰韜凶豎悖逆敢違我如是汝等能殺之者吾入宮盡以韜之國分封汝等韜既死主上必親臨喪因行大事無不濟矣楊柸等許諾八月殺韜宣奏之虎哀絕久之乃蘇召太子宣鏁繫于郊北火焚殺之議立太子於東堂虎曰吾欲以純灰三斛洗君服穢惡故生凶子兒年三十便欲殺父今世乃十歲比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月享群臣於太武殿前佛圖澄殿上褰衣而行吟曰棘子成林將壞人衣虎發石而視之有棘子生焉冉閔小字棘奴也十二月辛巳雷大霖雨虎問佛圖澄澄曰其為我乎至戊子而澄卒大寧元年正月虎僭即皇帝位于郊大赦改年二月有沙門從雍州來稱見佛圖澄西入關虎掘之無尸唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨於金華殿世子即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于蕩陰石閔為前鋒都督太后命授遵丞相加九錫增封十郡己丑安陽亭貫甲曜兵入自鳳陽門升太武前殿盡哀退如東閣群臣敦勸即位大赦封世為譙王邑萬戶廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王沖為太保石閔為都督中外諸軍事錄尚書事甲午太武殿災諸門觀閣蕩然其乘御服燒者太半光燄照天月餘乃滅己未雨血周徧鄴城六月葬虎顯原陵偽諡武皇帝廟號太祖十一月石閔劫司空李農及右衛王基密謀共廢遵閔使將軍蘇彥周成帥甲士三十八人執遵于南臺如意觀遵時方與婦人彈碁問周成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能幾時遵殺之于琨華殿誅鄭太后張皇后遵字大祗虎第九子凡在位者百八十三日鑒即位大赦以石閔為將軍封武德王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農等于琨華殿不克禁中擾亂鑒偽不知夜斬松等於西中華門龍驤將軍孫伏都劉銖等結羯士三千人伏于胡天亦欲誅閔等時鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見而問其故伏都曰閔農等反已在東掖門臣嚴帥衛士謹先啟知鑒曰卿好陳力勿憂無報也伏都等攻閔不剋閔農攻斬伏都等自鳳陽門至琨華橫尸相枕諸胡羯無少長皆斬之死者二十餘萬人于時高鼻多鬚至有濫死者初青龍元年正月石閔欲滅二石之號議曰孔子曰易姓而王七月者七十有三國繼趙李讖書炳然且德星鎮衛宜改號大魏易姓李氏又大赦閏月改元廢鑒殺之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字大郎虎第三子也石閔字永曾虎之養孫也父瞻字宏武本姓冉名良魏郡內黃人其先漢黎陽騎都督累世牙門勒破陳午於河內獲瞻時年十二長而勇悍便弓馬臨陣不顧勒奇之曰此兒壯健可嘉命虎子之歷位左積射將軍封西華侯閔幼而果銳虎撫之如孫及長身長八尺善謀勇力絕人虎即位封為脩武侯歷位北中郎將虎之敗於昌黎閔軍獨全由此功名大顯石閔永興元年閏月司徒申鍾司空郎闇等四十八人上尊號於閔僭皇帝位于南郊大赦改元號稱大魏復姓冉氏追尊祖隆元皇帝考瞻烈祖高皇帝尊母王氏為太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆封為縣公新興王祗聞石鑒之死稱尊號於襄國改年永寧石祗遣相國汝陰王石琨帥眾十萬伐鄴六月進據邯鄲閔盡眾拒之琨軍大敗二年三月閔攻襄國百餘日祗怯乃去皇帝之號改稱趙王遣太尉張奉乞師于慕容雋中軍張春請救于姚弋仲三月祗相國汝陰王琨自冀州救祗弋仲復遣子襄帥騎三萬八千雋遣將軍悅綰帥甲士三萬勁卒十三萬四方攻之祗衝其后閔師大敗閔與千萬騎奔還鄴祗使劉顯帥眾十萬追奔伐鄴閔盡眾出戰大敗之追奔至於陽平顯懼密使請降求殺石祗為效四月劉顯殺祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于冀州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥眾伐常山太守蘇彥告難閔帥八千救彥敗顯于常山追奔及于襄國顯大將軍曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其民于鄴三月慕容雋已剋幽薊略地至于冀州閔帥騎擊之與慕容恪遇於魏昌城恪方陣而前閔眾寡不敵所乘赤馬曰朱龍日行千里潰圍東奔行二十餘里馬無故而死遂為恪所擒送之于薊雋立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲篡逆我一時英雄何為不可作帝王耶雋怒鞭之三百遣慕容評帥眾圍鄴五月送閔於龍城告廆皝廟而殺之鄴中饑人相食虎時宮人被食略盡冉智尚幼蔣幹遣詹事劉猗奉表降雋八月長水校尉馬願龍驤將軍田香開門降評蔣幹懸縋而下奔于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊初慕容雋斬閔於遏陘山山左右七里草木悉枯蝗蟲大起自五月不雨至于十二月雋遣使者祀之諡曰武悼天王其日大雨雹是歲太和八年也
