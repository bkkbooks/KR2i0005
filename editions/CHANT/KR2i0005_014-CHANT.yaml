body:
  text: 十六國春秋西秦錄乞伏國仁隴西鮮卑人其先自漢北南出太陰山五世有祐鄰者晉太始初率戶五萬遷居高平川鄰卒子結權立遷於牽屯結權卒子利那立利那卒弟祁埿立祁埿卒利那子述延立遷於苑川述延卒祁埿子傉太寒立石勒之滅劉曜也懼而遷於麥田元孤山太寒卒子司繁立秦始皇中遷於度堅山建元七年秦將王統來伐繁率騎三萬拒統於苑川統潛襲度堅山部民五萬餘落悉降於統司繁乃詣統歸降苻堅拜南單于留之長安後以為鎮西將軍鎮勇士川甚有威惠之稱司繁卒國仁即位聞堅征晉奔敗國仁收眾至十餘萬又聞堅為姚萇所殺於是自稱大都督大將軍大單于領秦河二州牧改秦建元二十一年為建義元年置武陵苑川等十一郡築勇士都城以都之乞伏國仁三年苻登遣使拜仁大將軍苑川王四年六月薨偽諡曰烈王廟號烈祖乞伏乾歸國仁弟雄武有度略仁薨群僚以仁子公府幼稚乃立乾歸為將軍大單于河南王大赦改四年為太初元年立邊氏為后以南川侯出連乞都為丞相九月遷於金城乞伏乾歸二年正月苻登遣使拜為大將軍金城王六年立子熾盤為太子七年登遣使授左丞相河南王假黃鉞加九錫之禮十月氐王楊定步騎四萬來伐乾歸勒眾而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月僭稱秦王大赦八年呂光來伐歸乃稱蕃遣子勃勃為質既而悔之十三年春征西大將軍姚碩德率眾來伐入自南安峽歸次於隴西以拒碩德興潛師繼發乾歸聞兵將至率輕騎數千候興俄與中軍相失為興追騎所逼戰敗遁歸苑川乃率騎數百馳上允吾禿髮利鹿孤逆歸之於晉興乾歸將叛謀泄懼為利鹿孤所害謂其子熾盤曰姚興將盛吾將歸之今送汝兄弟及汝母為質於是送熾盤兄弟於西平乾歸遂奔長安姚興大悅拜持節都督河南詣軍事河州刺史歸義侯十四年遣乾歸還鎮苑川盡以部民配之十八年正月乾歸至長安十九年五月苑川地震裂正月又朝長安二十年姚興慮乾歸終為西州之患留拜主客尚書以其子熾盤為西夷校尉行河州刺史二十一年熾盤以長安亂將始乃招結諸部築城於嵻㟍山以據之更始元年乾歸隨姚興如平流熾盤攻枹罕剋之遂遣使來告乾歸乾歸奔還苑川遂如抱罕留熾盤鎮之乾歸將眾二萬遷於度堅山諸將勸稱王七月僭稱秦王大赦改年置百官公卿以下皆復本位四年五月乾歸畋於五谿山有梟集於其手乾歸惡之六月為兄子公府所殺公府出奔熾盤遷於抱罕遣弟廣武將軍智達追擒公府於嵻㟍山南轘裂之八月葬乾歸於抱罕陵仍偽諡武元王廟號高祖乞伏熾盤乾歸長子乾歸薨自稱大將軍河南王改元為永康元年以尚書令翟勒為相國封拜各有差乞伏熾盤二年熾盤討吐谷渾別統旁行長柳川掘達於渴渾川大破之俘獲男女二萬三千五年正月有五色雲起於南山盤大悅謂群臣曰吾今年應有所定王業成矣於是繕甲整兵以伺四方之隙五月聞傉檀西征率步騎二萬襲樂傉檀降遂并南涼兵強地廣十月僭即秦王位置百官立妻禿髮氏為王后四年熾盤子元基自長安逃歸拜尚書僕射建宏元年立第二子慕末為太子領撫軍大將軍都督諸軍事改元赦熾盤寢疾顧命太子慕末乃薨於外寢六月葬武平陵諡文昭王廟號太祖乞伏慕末乞伏慕字安石熾盤之第二子幼而好學有文才建宏元年立為太子熾盤薨僭即秦王位大赦改年為承宏元年二月立萬載為太子三年九月部民多叛慕末焚城邑毀寶器率戶五千東如封為赫連定所拒遂圍安南十一月魏遣尚書庫結率騎五千迎慕末衛軍吉毗固諫以為不宜遂內徒徙之庫結引還四年赫連定遣其叔北平公韋代率眾一萬攻南安城內大饑人相食傳侍中乞伏延祚吏部尚書乞伏跋跋踰城奔末乃銜璧出降送於上邽及宗族五百餘人悉為赫連所誅自國仁建義元年乙酉歲至辛未四十七年
