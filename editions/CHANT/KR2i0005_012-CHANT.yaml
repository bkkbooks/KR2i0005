body:
  text: 十六國春秋南涼錄禿髮烏孤河西鮮卑人也八世祖疋孤率其部自塞北遷於河西孤子壽闐立壽闐卒孫樹機能立壯果多謀略太始中殺秦州刺史胡烈於萬斛堆敗涼州刺史蘇榆於金山又殺涼州刺史楊欣於舟嶺盡有涼州之地武帝為之旰食能死從弟務丸代立丸死孫推斤立斤死子思復鞬立部眾轉盛遂據涼土鞬卒子烏孤襲位養民務農修結鄰好呂光封烏孤廣武郡公益州牧左賢王禿髮烏孤太初元年正月改元自稱大將軍大單于西平王以弟鹿孤為驃騎將軍傉檀為車騎將軍二年改稱武威王三年正月徙于樂都八月孤因酒走馬馬倒傷脇笑曰幾使呂光父子大喜俄而患甚顧謂群臣曰方難未靖宜立長君言終而薨在王位三年偽諡武王廟號烈祖利鹿孤烏孤弟太初三年八月即位大赦改治西平建和元年正月大赦改年延耆老訪政利鹿孤二年群臣固請即尊號不許九月僭稱河西王三年三月寢疾令曰昔我諸兄弟傳位非子者蓋以泰伯三讓周道以興故也武王創踐賓歷垂諸樊之試終能克昌家業者其在車騎乎吾寢疾惙願是將不濟內外多虞國機務廣其令車騎經惣百揆以成先王之志薨諡康王葬西平陵傉檀利鹿孤弟也少機警有才略建和三年襲位僭號涼王遷於樂都改為宏昌元年秦遣使拜車騎將軍廣武公傉檀利四年六月秦遣河右諸軍事涼州刺史鎮姑臧七月讌群臣於宣德堂仰視而歎曰古人言作者不居居者不作信矣前昌松太守孟禕進曰張文王築城苑繕宗廟構此堂為貽厥之資萬世之業秦師濟河然後瓦解此堂之建年垂百載十有二主唯信順可以久安仁義可以永固願大王勉之檀曰非君無以聞讜言也八月以鎮南大將軍文支鎮姑臧檀遷於樂都雖受制于秦車服禮制一如王也十一月遷於姑臧嘉平元年十一月僭即涼王位於南郊大赦改年嘉平置百官立世子虎臺為大子二年正月以子明德歸南中郎將領昌松太守歸雋爽聰悟檀甚寵之年始十三命為昌高殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲征西乙弗孟愷諫曰連年不收上下饑弊南逼熾盤北迫蒙遜今遠征雖剋後患必深傉檀曰孤將略地卿無阻眾謂其太子虎臺曰今不種多年內外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮唯在熾盤彼名微眾寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾盤乘虛來襲旦而城潰安西樊泥自西平奔告傉檀謂眾曰今樂都為熾盤所陷卿等能與吾籍乙弗之資取契汗以贖妻子者是所望也遂引師而西眾多逃返遣征段苟追之苟亦不還於是將士皆散傉檀曰蒙遜熾盤昔皆委質於吾今而歸之不亦鄙乎四海之廣匹夫無容其身何其痛哉吾老矣寧見妻子而死遂歸熾盤六月至西平盤遣使郊迎以上賓之禮歲余為熾盤所鴆諡景王時年五十一虎臺亦為熾盤所害少子保周歸魏魏以為張掖王自烏孤太初元年歲在丁酉至檀薨之歲大有八歲
