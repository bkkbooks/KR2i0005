body:
  text: 十六國春秋後涼錄呂光字世明洛陽人其先自沛遷洛陽因家焉世為氐酋父婆樓字廣平疾命前秦官至太尉光以趙建武中生于枋頭夜有神光之異故名焉年十歲與諸兒童遊戲邑里為戰陣之法童兒咸推為主光身長八尺四寸目重瞳子左肘有肉印沉毅凝重寬簡有大量人莫之知唯王猛異之曰此非常人言之苻堅舉賢良除美陽令民夷憚愛鄰境肅清遷鷹揚將軍以功賜爵關內侯建元十九年以光為使持節都督西討諸軍事率將軍羌飛彭晃杜進康隆等率步騎七萬討西域十二月至龜茲龜茲王帛純捍命不降光軍其城南五里為一營深渠高壘廣設疑兵為木人被甲羅之壘上以為持久之計呂光二十年五月帛純乃傾國財寶請救于獪胡王遣弟吶龍侯將馗率騎二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入乃以革索羂策馬擲人多有中者眾甚憚之姑默宿尉頭等國及諸胡內外七十萬人光遷營相接陣為勾鏁之法精騎為遊軍彌逢其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安城等中塔廟千數帛純宮室壯麗煥若神居胡人奢侈富于生養家有蒲萄酒至千斛經十年不敗士卒淪沒酒贓者相繼諸國貢款屬路立帛純弟震為王以安之光撫寧西域威恩甚著秦以光為使持節散騎常侍都督玉門巴西諸軍事安西將軍西域校尉進封順鄉侯二十一年正月大饗文武博議進止眾咸請還光從之三月引還以駞二萬餘頭致外國珍異千餘品駿馬萬餘匹而還九月光入姑臧自領涼州刺史護西校尉太安元年苻丕以光為車騎大將軍梁州牧領護西域大都督酒泉公光始聞苻堅為姚萇所害奮袂哀怒三軍縞素大臨于城南傳檄諸州期孟冬大舉誁堅為文昭皇帝十月大赦境內改建元為太安十一月群寮勸進曰長𧉮未殄方掃國難宜進位元台十二月上光為侍中中外都督隴右諸軍大將涼州牧酒泉公三年八月廿露降逍遙園白鷰翔于酒泉眾鷰成列而從之麟嘉元年正月麟見金澤縣百獸從之于是群寮奉表請崇進名號二月僭即王立于南郊大赦改元置官司丞郎以下猶攝州縣事三年九月太廟新成追尊父為景昭王祖為宣公曾祖為恭公高祖為敬公龍飛元年五龍見于浩亹群臣咸賀勸光稱號六月僭即天王位于南郊大赦改年備置群司立世子紹為太子四年九月光寢疾十二月疾甚立太子紹為天王光自號太上皇帝以子纂為太尉宏為司徒詔曰吾疾病不濟吾終之後使纂統六軍宏管朝政汝恭己無為委重二兄庶可以濟今外有強寇民心未寧汝兄弟輯睦貽厥萬世若內相圖則禍不旋踵纂宏泣曰不敢有二心薨葬高陵諡武皇帝廟號太祖呂纂字永緒光之長庶子母趙淑媛少便弓馬好書太安元年至于姑臧光臨薨執手戒之曰汝性麤武深為吾憂開基既難守成不易善輔永業勿聽讒言光薨紹祕不發喪纂排閣入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大統纂曰臣雖長陛下國家之適不可以私愛而亂大倫驍騎呂超謂紹曰纂臨喪不哀步高視遠觀其舉止恐成大變宜早除之纂聞超謀遂率壯士數百踰北城攻廣夏門入自青角門昇謙光殿紹登紫閣自殺呂超出奔廣武纂遂朁天王大赦改龍飛四年為咸寧元年諡紹隱王呂纂纂遊田無度荒耽酒色常與左右因醉馳獵于坑澗之間殿中侍御史王回扣馬諫不納番采太守呂超擅伐鮮卑思盤思盤訴超于纂纂召超入朝怒曰卿恃兄弟桓桓欲欺吾也要當殺卿然後天下可定超頓首曰不敢纂引諸臣宴于內殿呂隆屢勸纂酒已至昏醉乘步輓車將超等遊于內至琨華堂東閣超取劍擊纂纂下車擒超超刺纂洞胸奔于宣德堂將軍魏益入斬纂首以徇隆既纂位諡靈帝葬白石陵呂隆字永基光弟寶之子既殺纂遂僭即王位大赦改咸寧三年為神鼎元年二月追尊父寶為文皇帝超有佐命之勳拜為侍中都督中外詣軍事輔國大將軍錄尚書封安定公二年秦遣鴻臚恒敦拜隆征北大將軍都督河西諸軍涼州牧建康公呂隆三年隆以二涼之逼遣齎珍寶請迎于泰遣尚書左僕射齊難率步騎四萬來迎隆率戶一萬隨難東遷既至長安秦以隆為散騎常侍尚書公如故超為安定太守其後坐與姚興少子廣平公弼謀反誅呂光以乙酉歲據涼州至于是歲歲在癸卯凡一十九年
