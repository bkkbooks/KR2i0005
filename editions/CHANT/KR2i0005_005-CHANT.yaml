body:
  text: 十六國春秋後秦錄姚弋仲南安赤亭羌人也其先有虞氏之苗裔昔夏禹封舜少子于西戎世為羌長其後燒當雄于洮罕之間當七世孫填虞虞九世孫遷郍率種人內附漢朝嘉之假冠軍將軍羌校尉歸順王處之于赤亭郍元孫柯為魏征西將軍綏戎校尉西羌都督柯生弋仲少而聰猛英果雄毅永嘉之亂戎夏襁負隨之者數萬自稱雍州刺史護羌校尉扶風公劉曜以弋仲為平西將軍石虎廢石宏自立弋仲稱疾不賀虎累召之乃赴姚弋仲太寧元年拜侍中征西大將軍石祗尊號于襄國以仲為右丞相石祗為劉顯所殺仲乃與燕連和有子四十二人常誡諸子曰我死之後汝歸晉家竭盡臣節乃使使降晉晉永和七年拜仲使持節六夷大都督督江淮諸軍事儀同三司大單于封高陵郡公八年薨時年七十三後仲薨柩為苻生所得生以王禮葬之于天水萇稱尊號追謚景元皇帝廟號始祖陵曰高陵姚襄字景國弋仲第五子雄武多才藝能明察善撫納士民愛敬之咸請為嗣仲以襄非適不許石祗僭號以襄為使持節驃騎將軍護烏丸校尉晉遣使拜襄持節平北將軍并州刺史即丘縣公弋仲薨率戶六萬南至榮陽晉處襄于譙城遣王弟為任單騎渡淮見豫州刺史謝尚一面交款便若平生楊州刺史殷浩憚其威名遣謝方討襄逆擊破之鼓行濟淮屯于盱眙朝廷大震襄方軌引北自稱大將軍大單于據許昌自許遂攻洛陽踰月不剋晉征西大將軍桓溫自江陵伐襄溫至伊水襄徹圍之為溫所敗襄奔還洛陽率數千騎奔于北山百姓隨襄者四千餘戶襄尋從北山將圍關中進屯杏城遣輔國將軍姚蘭略地鄜城苻生遣苻飛龍拒戰率眾西引與苻堅戰于三原為堅所殺時年二十七萇僭尊號追謚魏武王姚萇字子茂弋仲之第二十四子少聰哲多權略不修行業兄襄為苻堅所殺萇率諸弟降于苻生堅以萇為揚武將軍步兵校尉潞州之戰累有殊功遷左衛將軍累授幽州刺史苻堅伐晉以萇為龍驤將軍督益梁二州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事以委卿堅左將軍竇衝進曰王者無戲言此將不祥之徵也堅默然姚萇白雀元年慕容泓起兵叛堅堅遣子叡討之以萇為司馬既而為泓所敗叡死之萇遣參軍姜協謝罪堅怒殺之萇懼奔于渭北歸者五萬餘家咸推萇為盟主自稱大將軍大單于萬年秦王大赦改元稱制行事二年六月慕容沖入長安司隸崔翼尚書趙遷等數百人來奔萇聞苻堅在五將山遣驍騎吳忠率騎圍之萇自故縣如新平吳忠執堅送之萇將求禪代堅不許慕容沖遣率騎大將軍尚書令高蓋求戰于新平大破蓋率麾下數千人來降建初元年僭即皇帝位于長安大赦改年國號大秦改長安為常安追尊考弋仲為景元皇帝妣曰德皇后子興為皇太子秋七月萇如安定二年徙秦州三萬戶于安定八月以太子興鎮長安四年十月立社稷于長安六年大敗苻登于長安七年三月萇寢疾遣鎮東姚砍德守長安召太子興詣行在所八年十月萇如長安至于新支堡疾篤輿疾而進十二月至長安召太尉姚旻僕射尹緯私受遺詔輔政萇曰吾氣力轉微將不能復臨天下卿等善相吾子謂興曰有毀此諸人者慎勿受之撫骨肉以仁接大臣以禮待物以信遇民以恩四者既備吾無恨矣庚子薨于永安宮年六十四謚武昭皇帝葬原陵廟號太祖姚興字子略萇之少子萇薨秘不發喪皇初元年乃發喪行服即位于槐里大赦改元七月如徑陽與苻登徙陰密三萬戶于長安二年以叔父緒為晉王征西將軍碩德為隴西王弟崇為齊公顯為常山公姚興三年以緒為并冀二州牧鎮蒲坂四年二月遣齊公崇伐洛陽宏始元年九月大赦改元冬十月剋洛陽以東平紹為都督山東諸軍事豫州牧鎮洛陽四年五月遣大將軍隴西王碩德率步騎六萬伐呂隆於涼州先是吐蕃傉檀據西平沮渠蒙遜據張掖李暠據燉煌各制方城共相侵伐碩德從金城濟河直趣廣武蒼松至隆城下隆遣弟輔國超龍驤邈等率眾拒碩德碩德大破之生擒邈傉檀蒙遜李嵩等各脩表奉獻九月隆奉表請降興答報嘉美以隆為鎮西將軍涼州刺史建康公十一月鳩摩羅什至長安七年正月興如逍遙園引諸沙門聽什說佛經九年以太子泓錄尚書燕王慕容超遣使稱蕃十年與魏通和貢馬千匹十一年蜀譙縱遣使稱蕃十六年五月與寢疾於內太子泓以兵屯東華門侍疾于諮議堂尚書廣平公弼潛謀為亂招集數千人持兵於第興疾損升前殿百官咸會征虜劉羗泣曰陛下寢疾數旬奈何忽有斯事興曰朕過庭無訓使諸子不穆愧于四海興以弼文武兼才未忍致法免其尚書令以公就第興怒乃收弼囚之十二月興疾甚遣收廣平公弼第中甲杖納之武庫於是弼黨率甲士攻端門殿中上將軍歛曼高勒兵拒戰不得入遂燒端門興力疾臨前殿賜弼死丁未薨於殿年五十三謚文桓皇帝廟號高祖墓曰偶陵姚泓字元子興長子也孝友寬和而無經世之用又多疾病興將以為嗣而疑焉久之乃立為太子泓嘗受經博士淳于岐岐病泓親省疾拜于床下自是公侯見師傅皆拜焉興如平涼留泓總後事馮翊人劉厥聚眾據萬年以叛泓遣鎮軍彭白狼率東宮禁兵討之斬厥赦其餘黨興薨泓即位大赦改元為永和元年廬於諮議堂既葬乃親庶政內外官寮增位一級令文武各盡直言勿有所諱仇池公楊盛攻陷祁山遂逼秦川泓遣姚平救之盛引退姚嵩與平追盛及于竹領姚讚率隴西太守姚秦都略陽太守王煥以禁兵赴之讚為盛所敗秦都王煥皆戰死讚至秦州退還仇池先是天水冀縣石鼓鳴聲聞數百里野雉皆雊秦州地震者三十二殷殷有聲者八山崩舍壞咸以為不祥及嵩將出群僚固諫不聽識者以為秦州泓之故鄉將滅之徵也赫連勃勃攻陷陰密執秦州刺史姚軍都坑將士五千餘人進兵侵雍遂據抄掠郿城姚紹及征虜尹昭鎮軍姚洽等率步騎五萬討之戰于馬鞍坂勃勃兵敗走還尋而晉相劉裕總大軍伐泓次于彭城遣檀道濟王鎮惡入自淮肥攻漆兵項城沈林子自抃入河攻倉垣泓將王苟生以漆丘降鎮惡徐州刺史姚掌以項城降道濟晉師遂入潁口所至多降服姚紹聞晉師之至也馳還長安言於泓曰晉師巳過許昌豫州安定孤遠卒難救衛宜遷諸鎮戶內實京畿可得精兵十萬足以橫行天下假使二寇交侵無能為也如其不爾晉侵豫州勃勃寇安定君將若之何吏部郎懿橫又以齊公姚恢有忠勳於國家未有殊賞今致之死地安定人人自危恐必生變宜徵還朝廷以慰其心泓並不從晉師至城皋征南姚洸時鎮洛陽部將趙元說洸曰今寇偪巳深百姓駭懼眾寡勢殊難以應敵宜攝諸戍兵士固守金墉以待京師之援不可出戰如戰不捷大事去矣金墉既固帥無損敗吳寇終不敢越金墉而西困之於堅城之下可以坐制以弊洸用姚禹閻恢之譖卒遣元出戰會陽城城皋滎陽虎牢諸城悉皆降於道濟元戰敗死于柏谷道濟進至洛陽洸懼出降泓母弟懿嶮薄用其司馬孫申暢謀欲襲長安誅姚紹廢泓而自立遂舉兵僭號傳檄州郡時征北姚恢亦率安定鎮戶三萬八千焚燒室宇以車為方陣自北雍州州趨長安自稱大都督建義大將軍移檄欲除君側之惡軍勢甚盛泓見內外離叛晉師漸逼歲旦朝群臣于前殿悽然流涕群臣皆泣姚紹率輕騎先赴難姚讚亦率諸軍還長安遂擊殺恢及其三弟泓乃進紹太宰太將軍大都督中外諸軍事假黃鉞改封魯公率武衛姚鸞等距晉師于潼關道濟固壘不戰紹遣左長史姚洽等屯于河北欲絕道齊租輸為沈林子所敗眾皆沒焉紹忿恚發病嘔血而死泓遣使乞師于魏魏遺司徒南平公拔拔等進據河內為泓聲援劉裕次于陝城泓使姚裕率步騎八千距之泓躬將大眾繼發裕為沈田子所敗泓退次于灞上姚讚距晉師于關西姚難屯于香城時大霖雨渭水汎溢王鎮惡水陸兼進追及姚難泓自灞上還軍次于石橋以援之晉師進據鄭城泓便姚裕尚書龐統屯兵宮中姚洸屯于澧西尚書姚白瓜徙四軍雜戶入長安姚丕守渭橋胡翼度屯石積姚讚屯灞東泓軍于逍遙園鎮惡夾渭進兵破姚丕于渭橋泓自赴之逼水地狹因丕之敗遂相踐而退姚諶姚烈姚寶等皆死于陣泓單馬還宮鎮惡入自平朔門泓與姚裕數百騎出奔于石橋讚聞泓敗召將士告之皆以戈擊地攘袂大哭胡翼度棄眾奔晉讚迄率諸軍會泓于石橋晉師已固諸門讚軍不得入眾皆驚散泓計無所出謀欲降晉其子佛念年十二謂泓曰陛下今雖降晉劉裕待人無禮終必不全願自我決憮然不答遂登宮墻自投而死平原公璞并州刺史尹昭以蒲坂降晉東平讚率宗室子弟百餘人亦隆于裕裕盡殺之九月裕至長安送泓于建康市而戮時年三十建康百里之內草木燋死自姚萇白雀元年歲在甲申至于是歲在丙辰三十有三歲
