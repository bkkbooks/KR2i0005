body:
  text: 十六國春秋前燕錄慕容廆字奕落環昌黎棘城人昔高辛氏遊於海濱留少子厭越以君北夷世居遼左號曰東胡秦漢之際為匈奴所敗分保鮮卑山因復以為號曾祖莫護跋魏初率其諸部入居遼西從司馬宣王討公孫淵有功拜率義王始建國於棘城之北見燕代少年多冠步搖苻意甚好之遂歛髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉祖木延左賢王從毋丘儉征高麗有功加號大都督又涉歸以全柳城之勳進拜單于遷邑遼東於是漸變胡風自云慕二儀之德繼三光之容遂以慕容為姓慕容廆廆身長八尺有大度晉安北將軍張華一見奇之謂曰君後必為命世之器匡難濟時者也涉卒弟耐立將謀殺廆廆亡潛於遼東徐郁家太康元年國人殺耐迎廆立之太康十年又遷于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王浚承制以廆為散騎常侍冠軍將軍前鋒大都督大單于皆讓不受擢舉賢才官方授仕魯國孔慕宿德清望請為賓友平原劉讚儒學該通引為東庠祭酒其世子皝率國冑受業焉大興四年晉遣謁者拜廆使持節督幽平東夷諸軍事車騎將軍平州牧封遼東郡公丹書鉄券承制海東咸和元年加侍中位特進八年夏五月薨于文德殿年六十五葬于青山晉遣使者贈車騎大將軍開府儀同三司諡襄公皝為燕王追諡武宣王雋稱尊武宣帝廟號高祖慕容皝字元真廆第二子小字萬年長七尺八寸雄毅善權略博學多材藝晉建武元年振武將軍永昌初拜左賢王太寧末拜平北將軍朝鮮公咸和八年六月即遼東公位行平州刺史督攝部內九年八月晉遣謁者拜皝鎮軍大將軍平州刺史大單于遼東公承制一如廆故事慕容皝七年七月立子雋為世子四年以左司馬封奕為長史九月奕等以皝任重位輕宜稱燕王於是上議十月僭即燕王位于文德殿大赦境內改備群司以封奕為相國追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人段氏為王后世子雋為太子是歲棘城黑石谷有大石自立而行八年七月晉使鴻臚郭忱持節拜皝侍中大都督河北諸軍事大將軍燕王其餘官皆如故封諸功臣百餘人九年遷都龍城十二年四月黑龍一白龍一見于龍山皝率群寮觀之去龍二百步祭以太牢二龍交首嬉翔解角而去皝大悅赦境內號新宮曰和龍立龍翔佛寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教冑子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗群僚于承乾殿右長史宋諺性貪賜布百疋令自負而歸以愧其心十五年八月皝因見白兔馳射之馬倒被傷輦而還宮引太子雋囑以後事謂曰今中原未平方建大事委賢任哲此其時也恪智勇無濟力堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山諡文明王雋稱尊追尊曰文明皇帝廟號太祖陵曰龍平慕容雋字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善為文雅好辭賦至於器物車室皆著讚以為勸戒皝之八年晉遣使者拜皝燕王以雋為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內依春秋列國故事稱元年正月聞趙魏大亂乃嚴兵將為進取之計七月晉使謁者陳沈拜雋都督河北諸軍事幽冀并平四州牧大將軍燕王承制封拜一如廆皝故事慕容雋元璽元年正月司南車成雋大悅告于皝廟四月遣輔國恪相國奕討冉閔戰于魏昌廉臺閔師大敗擒送至關大將軍蔣幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國奕等一百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月剋節輔弼評等送閔后董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蔣幹先以送晉雋欲神其事業言歷運在己乃詐云得之賜閔妻號奉璽君封冉智為海濱侯以輔弼評為同州刺史鎮鄴十月輔國恪等五百五人奉皇帝璽十一月僭即皇帝位于正陽前殿大赦改年時晉遣使詣雋謂之曰還白汝天子我承人乏為中國所推已為帝矣庚午書曰追崇祖考古人之令典尊武宣王為高祖武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后升平元年正月復立中山王暐為皇太子赦其境內改年曰光壽初廆有駿馬曰赭白有奇相逸力石虎之伐棘城皝將出避難欲乘之馬悲鳴蹄齧人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之旨也乃止虎尋奔退皝益奇之至是年四十九歲而駿逸不虧雋比之鮑氏驄命鑄銅以圖其像親為銘讚雋勒其旁置之薊城東掖門是月像成而馬死十一月自薊遷鄴三月入鄴宮大赦繕宮殿復銅雀臺以吳王垂為東夷校尉平州刺史鎮遼東二年三月常山寺大樹自拔根出得璧二十七圭七十三光色精奇有異常雋以為岳神之命遣尚書郎段勤以太牢祀之五月遼西獲黑兔三年三月雋夜夢石虎齧其臀寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉楊約數其殘酷之罪鞭而投之漳水十二月雋寢疾謂大司馬恪曰吾患惙然恐不濟脩短命也復何所恨但二寇未除景茂沖幼慮其未堪家國多難吾欲遠追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘去暴不可以亂正統雋怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也雋曰若汝行周公之事吾復何憂四年正月雋薨于應福前殿年五十三偽諡景昭皇帝廟號烈祖葬龍陵雋雅好文籍性嚴重未曾以慢臨朝雖閑居晏處亦無懈怠之色慕容暐字景茂雋之第三子元璽三年封中山王尋立為皇太子光壽四年僭即帝位大赦改元建熙元年以太原王恪為太宰錄尚書行周公事專百揆上庸王評為太傅贊朝政司空陽騖為太保吳王垂為河南大都督十州諸軍事兗州牧鎮梁國慕容暐四年正月暐南郊十月太尉奕迎神於和龍初暐委政太宰恪專受經于博士王勸助教尚鋒秘書郎杜詮並以明經講論左右至是通諸經祀孔子於東堂以勸為國子祭酒鋒國子博士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱相女有聲與人相接數日而去十年四月立貴妃可朱渾氏為皇后六月晉大司馬桓溫率眾五萬來伐遂至枋頭吳王垂大敗斬獲三萬餘級溫奔還淮南垂既敗溫威德彌振太大傅評大不平之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國將軍王猛鎮南將軍楊安率眾六萬來伐以太傅評下邳王厲等帥精兵三十萬拒秦師于潞州州郡盜賊大起鄴中怪異非常十月評及猛戰于潞州評師敗績單騎遁還猛乘勝追奔長驅至鄴十月苻堅帥眾會猛來攻拔鄴城外亂散騎侍郎徐蔚等率扶餘高句麗及上黨質民子弟五百人夜開城門引納秦師暐與大傅評左衛將軍孟高等數十騎出奔昌黎堅遣將軍郭慶帥騎五千追之及暐于高陽秦將巨武執暐將縛之暐曰汝何小人而敢縛天子武曰我梁山巨武受詔縛賊何謂天子耶執暐送鄴堅問其奔狀暐曰狐死首丘欲歸死于先人陵墓耳堅哀而釋之令還宮率文武出降堅入鄴宮昇正陽殿徙暐及王公巳下并諸鮮卑四萬餘戶于長安封暐新興郡侯邑五千戶尋拜尚書堅征臺城為平南將軍別部都督淮南之敗隨堅還長安既而吳王垂攻苻丕于鄴中山王沖起兵關中暐謀殺堅事發為堅所誅年三十五歲僭稱尊號為諡幽皇帝
