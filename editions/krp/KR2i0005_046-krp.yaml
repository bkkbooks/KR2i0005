body:
  text: 十六國春秋卷四十六後燕録四慕容寶慕容寶字道祐小字庫勾垂之第四子也元璽元年生於信都少而輕果無志操好人佞已秦苻堅時為太子洗馬萬年令堅淮肥之役以寶為陵江將軍及為太子砥礪自修敦崇儒學工談論尤善屬文曲事垂左右以求美譽故垂以為克保家業甚見寵愛朝士亦翕然稱之永康元年夏四月垂死壬寅寶匿喪而還遂以晉太元二十一年嗣即偽位尊段氏為太后大赦境内殊死已下改元永康五月辛亥以范陽王徳為都督冀兖青徐荆豫六州諸軍事車騎大將軍冀州牧鎮鄴遼西王農為都督并雍益梁秦涼六州諸軍事并州牧鎮晉陽又以太尉安定王厙傉官偉為太師扶餘王餘蔚為太傅左光禄大夫段崇為太保其餘拜授各有差甲寅以趙王麟領尚書左僕射高陽王隆領尚書右僕射長樂公盛為司隸校尉宜都王鳳為冀州刺史乙丑寶逼殺太后段氏六月癸酉魏太祖遣冠軍將軍王建等三軍擊廣寗太守劉亢埿死之徙其部落於平城上谷太守開封公詳棄郡走詳皝之曾孫也丁亥遵垂遺命校閱戸口罷諸軍營封蔭之戸分屬郡縣定士族舊籍明其官儀而法峻政嚴上下離徳百姓思亂十室而九時平視收合餘黨保高唐寶遣高陽王隆將兵討之東土之民素懷隆惠迎候者屬路秋七月隆進軍臨河視棄高唐遁走遣建威將軍進等濟河追之斬視於濟北平喜奔彭城遼西王農悉將部曲數萬口之并州并州素乏儲偫是嵗旱霜民不能供其食又遣諸部䕶軍分監諸胡由是民夷俱怨潛召魏軍會魏中書侍郎上谷張恂勸取中原太祖善之八月庚寅太祖治兵於東郊己亥大舉來伐親勒六軍步騎數十萬南出馬邑踰句注一作涇旌旗駱驛二千餘里鼓行而前民屋皆震左將軍雁門李栗將五萬騎為前驅别遣將軍封真等三軍從東道出軍都襲幽州圍薊乙亥寶立妃段氏為皇后䇿為皇太子盛會進爵為王九月章武王宙奉垂及成哀段后喪葬於龍城宣平陵寶詔宙悉徙高陽王隆參佐部曲家屬還中山戊午魏兵進次陽曲乘西山臨觀晉陽命諸將引騎環城圍脅大譟而去寶遣遼西王農及驃騎將軍李晨逆戰敗績奔還晉陽司馬慕輿嵩閉門拒之農大懼棄城夜將妻子率騎數千東走行及潞川為魏中領將軍長孫肥追軍所及妻子軍士一時盡没農被創獨與三騎逃歸中山太祖遂取并州初建臺省置刺史太守尚書郎以下官悉用儒生為之士大夫詣軍門者無少長皆引入存慰使人人盡言少有才用咸加擢叙寶在中山聞魏兵將至引羣臣議於東堂中山尹苻謨曰今魏軍强盛千里轉鬭乘勝而來勇氣百倍若逸之使騎入平原形勢彌盛殆難為敵宜杜險以拒之中書令眭邃曰魏多騎兵徃來剽鋭馬上齎糧不過旬日宜令郡縣聚民千家為一堡深溝高壘清野以待之彼至無所掠資食無出不過六旬自然窮退尚書封懿曰今魏師數十萬天下之勍敵也百姓雖欲營聚不足以自固是聚糧集兵以資强冦且揺動衆心示之以弱不如阻闗拒戰計之上也趙王麟曰魏今乘勝氣鋭其鋒不可當宜自完守設備待其敝而乘之可也於是修城積粟為持久之計命遼西王農出屯安喜軍事動静悉以委麟己未魏遣輔國將軍奚牧略地晉川一作汾川獲寶丹陽王買徳及離石䕶軍高秀和於平陶以張恂等為諸郡太守招撫離散勸課農桑冬十月太祖使冠軍將軍于栗磾寧朔將軍公孫蘭帥步騎二萬潛自晉陽一作太原從韓信故道開井陘路己酉太祖自井陘趨中山李先奔降太祖以為征東左長史十一月庚子朔太祖進攻常山抜之執太守茍延自常山以東守宰或走或降諸郡縣皆望風奔附惟中山鄴信都三城固守不下魏别命征東大將軍東平公拓跋儀將五萬騎南攻鄴冠軍將軍王建左將軍李栗等攻信都下令軍之所行不得傷民棗栗戊午太祖進兵中山見道路修理大悦賜栗磾名馬己未引騎圍之太祖謂諸將曰吾量寶不能出戰必當憑城自守偷延日月急攻則傷士久守則費糧不如先平鄴信都然後還取中山於計為便若移軍逺去寶必散衆求食民間如此則人心離阻攻之易克諸將稱善高陽王隆守南郭帥衆力戰自旦至晡殺傷數千人魏兵乃退丁卯魏引兵而南章武王宙自龍城還聞有魏冦馳入薊州與鎮北將軍陽城王蘭垂之從弟也乘城固守魏别將石河頭攻之不克退屯漁陽魏軍於魯口城博陵太守申永奔河南高陽太守崔宏奔海渚太祖素聞宏名遣騎追獲以為黄門侍郎博陵令屈遵降魏以為中書令范陽王徳使南安王青等青詳之兄也夜擊魏軍於鄴下破之魏兵退屯新城青等請追擊之别駕韓􅒲曰古人先計而後戰魏軍不可擊者四懸軍野客利在野戰一也深入近畿頓兵死地二也前鋒既敗後陳方固三也彼衆我寡四也官軍不宜動者三自戰其地一也動而不勝衆心難固二也城隍未修敵來無備三也今魏無資糧不如深溝固壘以老之徳從之乃召青還十二月魏遼西公賀賴盧率騎二萬會東平公儀攻鄴别部大人没根有膽勇太祖惡之没根懼誅己丑將兵數十人來降寶以為鎮東大將軍封雁門公没根求還襲魏寶難與重兵給百餘騎没根效其號令夜入魏營至中伏太祖乃覺狼狽驚走没根以所從人少不能壞其大衆多得首虜而還永康二年春正月范陽王徳求救於秦秦兵不出鄴中恟懼魏廣川太守賀賴盧自以太祖之舅不受東平公儀節度由是與儀有隙儀司馬丁建陰與徳通從而搆間之射書入城中言其狀甲辰風霾晝晦賴盧營有火建言於儀曰賴盧燒營為變矣儀以為然引兵退賴盧聞之亦退建率其衆詣徳降且言儀師老可以敗之徳遣桂陽王鎮南安王青帥騎七千追擊魏兵大破之寶使左衞將軍慕輿騰攻博陵殺魏所置中山太守及高陽諸縣令長抄掠租運時魏冠軍王建等攻信都六十餘日不下士卒多死庚申太祖自中山進軍來攻壬戌引騎圍之其夜冀州刺史宜都王鳳踰城奔走歸於中山癸亥寶輔國將軍張驤䕶軍將軍徐超率將吏以下舉信都降魏寶聞魏攻信都乃趣博陵之深澤屯滹沱水遣趙王麟攻楊城殺常山守兵三百餘人寶悉出珍寶及宫人招募郡縣羣盜無賴者多應之因以擊魏二月己巳朔太祖還屯陽城没根兄子醜提為并州監軍聞其叔降燕懼誅率所部兵還國作亂魏欲北還遣其國相涉延求和於燕且請以其弟為質寶聞魏有内難不許使冗從僕射蘭真責魏負恩悉發其衆出拒步卒十二萬騎三萬七千次於鉅鹿之曲陽柏津塢臨滹沱水北以邀之丁丑魏兵進至新梁營於水南寶憚魏師之盛乃遣征北大將軍高陽王隆潛師夜濟募勇敢萬餘人襲擊魏營寶陳於營北以為之援募兵因風縱火燒宫燎及行宫急擊魏兵魏兵大亂太祖驚起不及衣冠棄營跣走軍人遂有亡奔者言魏兵敗於柏肆寶别將乞特真率百餘人至其帳下得太祖衣鞾既而募兵無故自驚互相斫射太祖於營外望見之乃擊皷收衆左右及中軍將士稍稍來集魏設竒陣多布火炬於營外縱騎衝之募兵大敗斬首萬餘擒將軍高長等四千餘人餘衆奔還寶陳寶引兵復渡水北戊寅魏兵方軌而至對營相持上下兇懼三軍奪氣農麟勸寶走中山寶乃引歸魏兵隨而追之燕兵屢敗寶懼棄大衆率騎二萬奔還時大風雪涷死者相枕於道寶恐為魏兵所及命士卒皆棄袍仗戎器數十萬寸刃無還寶尚書閔亮秘書監崔逞太常孫沂殿中侍御史孟輔等竝降於魏其餘將卒䧏魏及為魏所繫虜者甚衆魏兵進攻中山屯芳林園己卯夜寶尚書郎慕輿皓謀弑寶立趙王麟妻兄蘇泥告之寶使高陽王隆收皓皓與同謀數千人斬闗奔魏麟懼不自安三月寶以儀同三司武鄉張崇為司空初清河王會聞魏兵東下表求赴難寶許之會初無去意使征南將軍厙傉官偉建威將軍餘崇嵩之子也將兵五千為前鋒偉等頓盧龍城近百日無食噉牛馬且盡會猶不發寶怒累詔切責會不得已以治行簡練為名復留月餘時道路不通偉欲輕軍前行通道偵魏强弱且張聲勢諸將皆畏避不欲行餘崇奮臂曰今巨冦滔天京都危逼匹夫猶思致命以救君父諸君荷國寵任而更惜生乎若社稷傾覆臣節不立死有餘辱諸君安居於此崇請當之偉喜簡步騎五百人崇進至漁陽遇魏千餘騎崇謂其衆曰彼衆我寡不擊則不得免乃鼓譟直進手殺數十人魏騎潰去崇亦引還斬首獲生具言敵中闊狹衆心稍振會乃上道徐進是月始達薊城魏圍中山既久城中將士皆思出戰高陽王隆言於寶曰諱涉珪也雖屢獲小利然頓兵經年兇勢阻屈士馬死傷大半人心思歸諸部離解正是可擒之時也加之舉城思奮若因我之鋭乘彼之衰往無不克如其持重不決將士氣喪日益困逼事久變生後雖悔之不可得已寶然之趙王麟每阻其議隆成列而罷者前後數四寶使人請於魏欲還其弟元觚割常山以西與魏求和自守常山以東太祖許之寶復不與己酉太祖如盧奴辛亥進次中山命諸將圍之給事黄門侍郎張衮言於太祖曰寶憑三世之資城池之固雖皇威振赫勢必擒殄然窮兵極武非王者所宜昔酈生一説田横委質魯連飛書聊將授首臣誠徳非古人才無竒略仰憑靈威庶必有感太祖從之乃遺寶書喻以成敗寶見書大懼時寶將士數千人俱自請於寶曰今坐守窮城終於困弊臣等願得一出樂戰而陛下毎抑之此為坐自摧敗也且受圍歴時無他竒變徒望積久冦賊自退今内外之勢强弱懸絶彼必不肯自退明矣宜從衆一決寶許之隆退而勒兵被甲上馬詣門俟命麟復固止衆大忿恨隆涕泣而退是夜麟以兵劫左衞將軍北地王精使率禁兵弑寶精以義拒之麟怒殺精將妻子出奔西山依丁零餘衆於是城中人情駭振寶不知麟所之初寶聞魏之來伐也使清河王會率幽并之衆赴中山麟既叛寶恐其奪會軍將遣兵迎之麟侍郎段平子自丁零奔還說麟招集丁零謀襲會軍東據和龍寶乃召高陽王隆及遼西王農謀去中山走保龍城隆曰先帝沐風櫛雨以成中興之業崩未期年而天下大壞豈得不謂之孤負邪今外冦方盛而内難復起骨肉乖離百姓疑懼誠不可以拒敵北遷舊都亦事之宜然龍川地狹民貧若以中國之衆一作意字取足其中復朝夕望有大功此必不可若節用愛民務農訓兵數年之中公私充實而趙魏之間苦厭冦暴民思燕徳庶幾返斾克復故業如其未能則憑險自固猶足以優遊養鋭耳寶曰卿言盡理朕一從卿意耳壬子夜寶與太子策遼西王農高陽王隆長樂王盛等萬餘騎出赴會軍河間王熙渤海王朗博陵王鑒皆幼不能出城隆還入迎之自為鞁乘俱得免難寶别將李沈王次多張超賈歸等降魏樂浪王惠中書侍郎韓範員外郎段宏太史令劉起等帥工伎三百奔鄴中山城内無主百姓惶惑東門不閉太祖欲夜入城據守冠軍王建貪而無謀志在虜掠乃言恐士卒肆掠盜亂府庫請竢明旦乃止開封公詳一作普隣從寶不及城中立以為主遂閉門拒守魏盡衆攻之連日不抜使人登巢車臨城招諭其衆曰慕容寶捐城奔走已棄汝去汝曹百姓將誰為守何不識天命空自取死乎皆曰羣小無知但恐復如參合之衆故茍延旬日之命耳太祖聞之顧視王建而唾其面使中領將軍長孫肥左將軍李栗將三千騎追寶至范陽不及破其新城戍俘掠千餘人癸丑寶出中山與趙王麟遇於􅛪城麟不意寶至驚駭率其衆奔蒲陰復出屯望都土人頗供給之開封公詳遣兵掩擊麟獲其妻子麟脱走入山甲寅寶至薊殿中親近散亡略盡惟高陽王隆所領數百騎為宿衞清河王會帥步騎二萬列陣而進迎寶薊南乙卯詔解會兵以屬隆隆固辭乃減會兵分給農隆又遣西河公厙傉官驥帥兵三千助守中山丙辰寶盡徙薊中府庫北趨龍城魏石河頭引兵追之戊午及於夏謙澤寶不欲戰會固請逆擊之寶許之遂整陳與魏戰農隆等將南來騎衝之魏兵大敗追奔百餘里斬首數千級隆又獨追數十里而還會既退魏兵矜狠滋甚夏四月寶宿廣都黄榆谷會遣其黨仇尼歸等帥壯士二十餘人分道襲農隆殺隆於帳下農被創逃遁會欲棄隆喪建威將軍餘崇涕泣固請聴載車後會復勒兵攻寶自稱皇太子盡收乘輿服御後宫子女分給將士寶責讓之會命軍士向寶大譟城中將士莫不憤憾侍御郎高雲襲擊敗之會逃奔中山開封公詳執而殺之丁丑大赦凡與會同謀者皆除罪復舊職論功行賞拜將軍封侯者數百人以農為左僕射尋拜司空領尚書令寶嘉餘崇之忠拜中堅將軍使典宿衞贈高陽王隆為司徒以高雲為建威將軍封夕陽公甲申太祖以軍食不繼命征東大將軍東平公儀去鄴圍徙屯鉅鹿積租楊城開封公詳出步卒六千人伺間襲魏諸屯魏遣中領將軍長孫肥等輕騎挑戰偽退詳帥衆追肥太祖自以虎隊五千横截其後斬首五千生擒七百人皆宥而遣之五月戊戌厙傉官驥入中山與開封公詳相攻死之詳盡滅厙傉官氏又殺中山尹苻謨夷其族中山城無定主民恐魏兵乘之男女結盟人自為戰詳自謂能却魏兵威徳已振乃僭稱尊號改元建始置百官以新平公可足渾譚為車騎大將軍尚書令殺拓跋觚以安衆心庚子太祖以中山城内為詳所脅而大軍迫之欲降無路乃密招諭之甲辰耀兵揚武以示城内命諸軍南徙罷圍以待其變是時鄴中官屬勸范陽王徳稱尊號有自龍城來者知寶猶存乃止秋七月詳殺可足渾譚詳嗜酒奢淫不恤士民殺戮無度所誅王公以下五百餘人内外震局莫敢忤視城中飢窘詳不聴民出採死者相枕舉城皆謀迎趙王麟詳遣輔國將軍烏丸張驤帥五千餘人出城求食督租於常山之靈夀殺害吏民麟帥丁零之衆入驤軍潛襲其衆復入中山城門不閉執詳斬之及其親黨三百餘人麟復僭稱尊號聴人四出採人既得飽求與魏戰麟不從稍復窮餒魏軍魯口遣長孫肥帥騎七千襲中山入其外郛麟以步騎四千追肥至派水肥自魏昌迎擊麟敗失鎧騎二百肥亦中流矢各引而還八月丙寅朔寶以司空遼西王農為都督中外諸軍事大司馬録尚書事魏自魯口進軍常山之九門時大疫人馬牛多死太祖問疫於諸將對曰在者纔十四五中山飢疫尤甚麟猶拒守諸將咸思北還太祖覘知其意因謂之曰斯固天命將若之何四海之人皆可與為國在吾所以撫之耳何恤乎無民諸將乃不敢復言魏遣撫軍大將軍略陽公遵襲中山芟其禾䒩入郛而還九月中山飢甚麟率三萬餘人出據新市甲子晦魏遣趙武進軍討之太史令晁崇諫曰不吉太祖曰其義若何對曰昔紂以甲子亡謂之疾日兵家忌之不可出兵太祖曰紂以甲子亡周武不以甲子興乎崇無以對遂進軍新市冬十月丙寅麟退阻派水依漸洳澤漸子廉切洳而據切以自固甲戌太祖臨麟營戰於義臺塢大破之斬首九千餘級麟與數十騎馳取妻子入西山奔鄴甲申魏克中山所署公卿尚書將吏士卒降者二萬餘人其將張驤李沈慕容文等先嘗降魏尋皆亡還是日入城復獲之皆赦而不問得燕所傳皇帝璽綬圖書府庫珍寶簿列以巨萬計班賞羣臣將士有差發開封公詳冢斬其尸收殺觚者高霸程同皆夷五族以大刄剉之燕人有自中山至龍城者言太祖衰弱司徒徳完守鄴城會徳表至勸寶南還於是大簡士馬將復取中原遣鴻臚魯邃册拜徳為丞相冀州牧南夏公侯牧守皆聴承制封拜十一月癸丑大赦十二月調兵悉集戒嚴在頓遣將軍啓崙南視形勢永康三年春正月啓崙還至龍城言中山已陷寶命罷兵遼西王農言於寶曰今遷都尚新未可南征宜因成師襲厙莫奚取其牛馬以充軍資更審虚實俟明年而議之寶從之己未北行庚申渡澆洛水會南燕王徳遣侍郎李延詣寶言魏主西上中國空虚延追寶及之大喜即日引還辛酉寶還龍城宫詔諸軍就頓不聴罷散文武將士皆以家屬隨駕遼西王農長樂王盛切諫以為兵疲力弱魏新得志未可與戰宜且養兵觀隙更俟他年寶將從之撫軍將軍慕輿騰進曰今師衆已集宜乘新定之機以成進取之功百姓可與樂成難與圖始惟當獨決聖慮不宜廣採異同以沮大計寶曰吾計決矣敢諫者斬二月乙亥寶出就頓留盛統後事己卯寶發兵龍城以慕輿騰為前軍大司馬遼西王農為中軍寶為後軍步騎三萬相去各一頓連營百里壬午次於乙連長上段速骨宋赤眉等因衆心之憚征役遂謀作亂速骨等皆高陽王舊隊共逼立隆子高陽王崇為主殺司空樂浪威王宙中牟熙公段誼及宗室諸王河間王熙素與崇善崇擁佑之故得獨免寶將十餘騎奔遼西王農營農將出迎左右抱其腰止之曰宜小澄清不可便出農引刀將斫之遂出見寶又馳信追慕輿騰癸未寶農引兵還趣大營討速骨等農營兵亦厭征役皆棄仗走騰營亦潰寶農奔還龍城長樂王盛聞亂引兵出迎寶農僅而得免尚書頓丘王蘭汗潛與速骨等通謀引兵營龍城之東城中留守兵至少盛徙内近城之民得丁夫萬餘乘城以禦之速骨等同謀纔百餘人餘皆為所驅脅莫有鬭志三月甲午速骨等將攻城遼西王農恐不能守且為蘭汗所誘夜潛出赴之冀以自全明旦速骨等攻城城上拒戰甚力速骨之衆死者以百數速骨乃將農循城農素有忠節威名城中之衆恃以為强忽見在城下無不驚愕喪氣遂皆逃潰速骨入城縱兵殺掠死者狼籍寶與慕輿騰餘崇張真李旱趙恩等輕騎南奔速骨幽農於殿内長上阿交羅速骨之謀主也以高陽王崇幼弱更欲立農崇親信鬷讓出力犍等聞之丁酉殺羅及農速骨即為之誅讓等農故吏左衞將軍宇文抜亡奔遼西庚子蘭汗襲擊速骨并其黨盡殺之廢高陽王崇奉太子䇿承制大赦遣使迎寶及於薊城寶欲還北長樂王盛等皆曰汗之忠欵虚實未明今單馬赴之萬一汗有異志悔之無及不如南就范陽王合衆以取冀州若其不捷收南方之衆徐歸龍城以俟後圖未為晚也寶從之夏四月壬戌寶從間道過鄴鄴人請留寶不許南至黎陽伏於河西遣扶風公慕輿騰與長樂王盛招集散亡於冀州盛以騰素暴横為民所怨乃殺之行至鉅鹿説諸豪傑皆願起兵奉寶段儀段溫收部曲於内黄衆皆嚮會克期將集寶以蘭汗祀燕宗廟所為似順意欲還龍城不肯留冀州乃北行至建安抵民張曹家曹素武健請為寶合衆盛亦勸寶宜且駐留徐察汗之情狀寶乃遣冗從僕射李旱先往見汗寶留頓石城會汗遣左將軍蘇超奉迎陳汗忠欵寶以汗垂之季舅盛之妃父也謂必無他不待旱還遂行盛流涕固諫寶不聴留盛在後盛與將軍張真等下道避匿丁亥寶至索莫汗陘去龍城四十里城中皆喜汗惶懼欲自出請罪兄弟共諫止之汗乃遣弟加難帥五百騎出迎又遣兄提閉門止仗禁人出入城中皆知其將為變而無如之何加難見寶於陘北拜謁已從寶俱進潁陰公餘崇密勸寶勿前寶不從行數里乃先執崇殺之引寶入龍城外邸遂為汗所弑諡曰靈帝殺獻哀太子䇿及王公卿士已下百餘人汗自稱大都督大將軍大單于昌黎王改元青龍以提為太尉加難為車騎將軍封河間王熙為遼東公如杞宋故事初皝之遷於龍城也植松為社主及秦滅燕大風吹拔之後數年社處忽有松二根生焉遼川無桑及廆通於晉求種江南平州一作遼州之桑悉由吳來廆終而桑死垂以吴王中興桑乃復生寶之將敗大風悉抜其樹盛僭偽位追諡寶曰惠愍皇帝廟號烈宗十六國春秋卷四十六
