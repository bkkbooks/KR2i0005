body:
  text: 十六國春秋卷五十七後秦録五姚興中𢎞始五年春正月興立昭儀張氏為皇后封子懿為上庸公弼為廣平公洸為陳留公宣為長樂公諶為博陵公愔為南陽公璞為平原公質為范陽公逵為清河公裕為隴西公國兒為章武公二月興遣兼大鴻臚梁斐以新平張構為副拜秃髪傉檀為車騎將軍廣武公沮渠蒙遜為鎮西將軍沙州刺史西海侯李暠為安西將軍髙昌侯遣鎮逺將軍荆州刺史趙曜率衆二萬西屯金城建節將軍王松怱帥騎助吕隆守姑臧松怱至魏安為傉檀弟文真所圍衆潰執松怱送於傉檀傉檀大怒送松怱還歸罪文真深自陳謝興下書録馬嵬戰時將吏盡擢叙之其堡戸給復二十年興性儉約車馬無金玉之飾自下化之莫不敦尚清素然雅好遊畋頗損農要京兆杜延以僕射齊難無匡輔之益著豐草詩箴之馮翊相雲作徳獵賦以諷興皆覽而善之賜以金帛終弗能改晉順陽太守彭泉以郡來降興遣楊佛嵩率騎五千與鎮逺將軍趙曜迎之遂䧟南鄉擒建威將軍劉嵩畧地至梁園而還秋七月秃髪傉檀及沮渠蒙遜互出兵攻吕隆隆患之秦之謀臣言於興曰隆藉先世之資専制一方今雖饑窘尚能自支若將來豐贍終非吾有凉州險絶土田饒沃世難先違道隆一作清後服不如因其饑弊而取之興遂遣兼散騎常侍席確詣凉州徴隆弟超入侍隆遣之乃因超表請内徙興遣尚書左僕射齊難及鎮西將軍姚詰鎮逺將軍一作左賢王乞伏乾歸鎮逺將軍趙曜等帥歩騎四萬迎隆於河西八月難等至姑臧隆素車白馬迎於道旁隆因勸難攻沮渠蒙遜蒙遜使臧莫孩拒之前軍敗績難乃與䝉遜結盟而還以司馬王尚行凉州刺史配兵三千鎮姑臧尚綏撫遺黎導以信義百姓懐其恵化翕然歸之以將軍閻松為倉松太守郭將為番禾太守分戍二城徙隆宗室僚屬及民萬户於長安以隆為散騎常侍超為安定太守自餘文武隨才擢叙沮渠䝉遜遣弟拏貢其方物𢎞始六年春二月南凉秃髪傉檀畏秦之强乃去年號罷尚書丞郎官遣叅軍閔尚一作闗尚入貢興許之求領凉州興不許北部鮮卑並遣使貢欵桓𤣥遣使來聘請辛恭靖何澹之興留恭靖而遣澹之謂曰桓𤣥不推計厯運將圖簒逆天未忘晉必將有義舉以吾觀之終當傾覆卿今馳往必逢其敗相見之期遲不云逺未㡬恭靖誑守者踰墻而逃歸於江東安帝嘉之拜諮議叅軍尋而病卒三月丙寅魏擒興寜北將軍太平太守衡譚掠三千餘衆而去興遣大將軍隴西公碩徳及别將姚歛成姚夀都等率衆三萬伐仇池公楊盛於仇池夀都等入自宕昌歛成從下辯而進盛遣其弟夀拒歛成從子斌拒夀都夀都逆擊擒斌盡俘其衆楊夀等懼帥衆請降碩徳還師晉汝南太守趙䇿委守來奔冬十一月鳩摩羅什至長安𢎞始七年春正月興居羅什於逍遥園以國師禮待之奉之如神甚見優寵親帥羣臣如逍遥園引諸沙門於澄𤣥堂聽什演說佛經遂大營塔寺起逍遥宫殿庭左右有樓閣髙百尺相去四十丈以麻繩大一圍兩頭各經樓上㑹日令二人各從樓内出從繩上行以為佛神相遇什七嵗出家日誦千言率多諳解無不究通兼辨夏言既覽舊經多有乖謬不與梵本相應興使沙門僧䂮僧遷法歛道流道標道恒僧叡僧肇曇順等八百餘人更出大品什持胡本興執舊經以相考校其新文異舊者皆㑹於理義續出諸經并諸論三百餘卷今之新經皆什所譯興既託意於佛公卿已下莫不欽附沙門自逺而至者五千餘人有大道者五十人起造浮圖於永貴里立波若臺於中宫作須彌山四面有崇巖峻壁珍禽異獸山林草木精竒怪異仙人佛象人所未識見者皆以為竒時沙門坐禪者恒有千數州郡化之奉佛者十室而九夏五月隴西公碩徳及冠軍將軍徐洛生等帥衆伐仇池公楊盛頻敗盛兵遣建武將軍趙琨自宕昌而進又遣其將軍歛俱冦漢中拔固城徙流民郭陶等三千餘家於闗中秋七月楊盛請降遣子難當及僚佐子弟數十人為質碩徳引還署盛為使持節散騎常侍都督益寧二州諸軍事征南大將軍開府益州牧武都侯時劉裕誅桓𤣥迎復安帝𤣥衛將軍新安王桓謙臨原王桓怡雍州刺史桓蔚左衛將軍桓謐中書令桓𦙍將軍何澹之等來奔裕遣叅軍衡凱之詣常山公顯請通和好顯遣其司馬吉黙報之自是聘使不絶晉求南鄉等諸郡興許之羣臣咸諫以為不可興曰天下之善一也劉裕拔起細㣲能討誅桓𤣥匡輔晉室内釐庶政外修封疆吾何惜數郡不以成其羙乎遂割南鄉順陽新野舞隂等十二郡歸晉𢎞始八年夏六月隴西公碩徳自上邽入朝興為之大赦及歸送之至雍乃還班告境内及在朝文武立名不得同叔父緒及碩徳名以彰殊禮太史令郭黁言於興曰戌亥之嵗當有妖冦起於西北宜慎其鋒起兵如流沙死者如亂麻戎馬悠悠㑹隴頭鮮卑烏桓居不安國朝夕疲於奔命時所在有泉水湧出𫝊云飲則愈病後多無驗屢有妖人自稱神女乃命戮之有雀數萬頭鬬於興廟毛羽折落多有死者月餘乃止識者曰今雀鬬廟上子孫當有爭亂者乎又興殿後有聲如牛吼有二狐入長安一登興殿屋走入宫一入於市求之不得興大閱自杜郵至於羊牧秃髪傉檀獻馬三千匹羊三萬頭興以為忠乃署傉檀為都督河右諸軍事車騎大將軍凉州刺史鎮姑臧徴凉州刺史王尚還長安涼州人申屠英等遣主簿胡威詣長安請留尚興弗許引威見之威流涕謂興曰臣州奉戴王化於兹五年土宇僻逺王威不接銜膽棲冰孤城獨守者仰恃陛下靈威俯仗良牧仁政克自保全以至今日忽違天人之心以華土資戎狄若傉檀才望應代臣豈敢言竊聞乃以臣等貿馬三千匹羊三萬口如所𫝊實者是為賤人貴畜無乃不可乎茍以馬供軍國直煩尚書一符臣州三千餘家戸輸一匹朝下夕辦何故以一方委此姦胡昔漢武傾天下之資力開建河西隔絶諸戎以斷匃奴右臂所以終能屠大宛王母寡今陛下方布政玉門化流西域奈何以五郡之地資之玁狁忠誠華族棄之虐虜豈惟臣州士民墜於塗炭恐方為聖朝旰食之憂興悔之遣西平車普馳止王尚復遣使諭傉檀㑹傉檀已至姑臧普先以狀告之傉檀遽逼遣王尚遂入姑臧尚既至長安坐匿吕氏宫人擅殺逃人薄禾等禁止南臺凉州别駕宗敞治中張穆主簿邊憲胡威等上疏理尚曰臣州荒裔鄰帶冦讐居㤗無垂拱之安運否離傾覆之難自張氏頽基徳風絶而莫扇吕數將終梟鴞以之翻翔羣生嬰罔極之痛西夏有焚如之禍幸皇鑒降眷純風逺被刺史王尚受任垂滅之州䇿成難全之地一作際輕身率下躬儉節用勞逸豐約與衆同之勸課農桑時無廢業然後振王威以掃不庭廻天波以蕩氛穢則羣逆冰摧不俟朱陽之曜若秋霜隕籜豈待勁風之威何定逺之足髙營平之獨羙經始甫爾㑹朝算改授使希世之功不終於必成易失之機踐之而莫展當其時而明其事者誰不慨然既逺役遐方劬勞於外雖效未酬恩而在公無闕自至京師二旬於今出車之命莫逮萋菲之責惟深以取吕氏宫人裴氏及殺逃人薄禾等為南臺所禁天鑒𤣥鏡蹔免囹圄譏繩之文未離簡墨裴氏年垂知命首髪二毛嫠居本家不在尚室年邁姿陋何用送為邊藩要捍衆力是寄禾等私逃罪應憲墨以殺止殺安邊之義也假若以不送裴氏為罪者正闕奚官之一女子耳論勲則功重言瑕則過㣲而執憲者吹毛求疵忘勞記過斯先哲所以泣血於當年㣲臣所以仰天而洒淚且尚之奉國厯事二朝能否效於既往優劣簡在聖心就有㣲過功足相補宜𢎞罔極之施以彰覆載之徳一作恩臣等生自西州無翰飛之益久沈偽政絶進趨之途及皇化既沾投竿之心㝠發遂䇿名委質位忝吏端主辱臣憂故重繭披欵惟陛下亮之興覽之大悅謂黄門侍郎姚文祖曰卿知宗敞乎文祖曰與臣州里西方之英儁也興曰有表理王尚文義甚佳當王尚研思耳文祖曰尚在南臺禁止不與賔客交通敞寓於楊桓非尚明矣興曰若爾桓為措思乎文祖曰西方評敞甚重優於楊桓敞昔與吕超周旋陛下可試問之興因召超謂曰宗敞文才何如可是誰軰超曰敞在西方時論甚羙方敞魏之陳徐晉之潘陸興即以表示超曰凉州小地寜有此才乎超曰臣以敞餘文比之未足稱多琳琅出於崑嶺明珠生於海濱若必以地限人則文命大夏之棄夫姬昌東夷之擯士但當問其文彩何如不以區宇格物興大悅乃赦尚之罪以為尚書冬十一月乞伏乾歸來朝𢎞始九年春正月興朝羣臣於正徳殿以乞伏乾歸寖强難制留為主客尚書署其世子熾磐行西夷校尉監其部衆夏四月晉以平北將軍苻宣為梁州督䕶將兵入漢中梁州别駕吕瑩漢中徐逸席難起兵應宣南梁州刺史王敏攻之宣求援於仇池公楊盛盛遣軍臨濜口南敏退屯武興盛復通於晉夏六月興以太子泓録尚書事秋七月慕容超遣御史中丞封愷來聘請母及妻復遣中書令韓範奉表稱藩八月興使員外散騎常侍韋宗報聘於超冬十月興河州刺史彭奚念叛降於秃髪傉檀興以乞伏熾磐行河州刺史慕容超復使左僕射張華給事中宗正元獻大樂伎一百二十人於秦興還超母妻厚其資禮而遣之燕司徒北地王慕容鍾右僕射濟陽王慕容嶷髙都公慕容始皆來奔華山地湧沸廣袤百餘歩燒生物皆熟厯五月乃止蠕蠕社崙與興和親送馬八千匹始濟河興安北將軍劉勃勃忿興與魏交好乃殺髙平公没奕干以叛收其衆數萬邀留社崙馬侵掠嶺北諸鎮改姓赫連氏僭稱大夏天王先是魏太祖遣賀狄干送馬千匹求婚於秦興許之以魏别立后遂止狄干而絶婚故有柴璧之戰至是興復與魏通和乃遣使請以駿馬千匹贖狄伯支等而遣賀狄干還魏魏許之放狄伯支姚伯禽唐小方姚梁國康宦等還長安興皆復其爵位故勃勃因之而叛九月蜀譙縱略有益寜之地僭稱尊號晉襄城太守劉敬宣帥衆五千伐之縱遣使詣秦稱藩𢎞始十年春三月秃髪傉檀沮渠蒙遜迭相攻擊傉檀遂東招河州刺史西𦍑彭奚念奚念阻兵以叛夏五月蜀譙縱又與盧循潛通上表請桓謙為助欲順流東伐劉裕興以問謙謙曰臣之累世著恩荆楚若得因巴蜀之資順流東下民必翕然響應興曰小水不容巨魚若縱之才力自足辦者亦不假君以為羽翼宜自求多福遂遣之謙至成都虚懐下士縱疑之置於龍格使人守之謙泣謂諸弟曰姚主之言神矣興以傉檀内外多難欲因而取之使尚書郎韋宗往覘時勢復使中軍將軍廣平公弼後軍將軍歛成鎮逺將軍乞伏乾歸等率歩騎三萬伐傉檀左僕射齊難等率歩騎二萬討赫連勃勃吏部尚書尹昭諫曰傉檀恃其嶮逺輕敢違逆不若詔沮渠蒙遜及李暠使相攻擊待其困斃然後取之不必煩中國之兵此卞莊之舉也興不從弼等濟自金城部將姜紀言於弼曰今王師聲討勃勃傉檀猶豫未為嚴防請給輕騎五千襲掩其壘則山澤之民皆為吾有孤城獨守可坐而克也弼不聽進拔昌松長驅至姑臧傉檀嬰城自固出竒兵擊弼弼敗退據西苑傉檀遣鎮北俱延鎮逺敬歸等來追弼復大敗失甲士七千餘弼固壘不出傉檀攻之不克狄七月興遣衛大將軍常山公顯率騎二萬為諸軍節度至髙平聞弼敗績兼道赴之顯遣善射者孟欽等五人挑戰於凉風門弦未及發傉檀材官將軍宋益等率衆迎擊斬欽於陣顯乃委罪歛成遣使謝傉檀撫慰河外引師而還傉檀遣徐宿詣興謝罪赫連勃勃聞秦兵且至退保河曲左僕射齊難以勃勃既逺縱兵野掠勃勃潛師襲擊斬首七千餘人難引而還追至木城遂為勃勃所擒復虜將士萬三千人八月劉敬宣既入峽遣巴東太守温祚以二千人出外水自帥益州刺史鮑陋輔國文處茂龍驤時延祖由墊江轉戰而前攻縱敗之縱遣使乞師於興興遣平西將軍姚賞南梁州刺史王敏率衆二萬赴之敬宣等引還𢎞始十一年春正月興遣弟平北將軍冲征虜將軍狄伯支輔國將軍歛曼嵬鎮東將軍楊佛嵩率歩騎四萬討赫連勃勃進至嶺北冲欲回師襲擊長安伯支不從而止懼其謀洩遂鴆殺伯支以滅口譙縱遣使貢其方物興遣兼司徒韋華持節䇿拜縱為大都督相國蜀王加九錫備物典䇿一如魏晉故事承制封拜悉如王者之儀二月興如平凉馮翊人劉厥聚衆數千據萬年作亂太子泓遣鎮軍將軍彭白狼帥東宫禁兵討之斬厥赦其餘黨諸將咸請露布表言廣其首級泓不許曰主上委吾後事不能式遏冦逆當責躬請罪尚敢驕矜自為功乎興自平凉如朝那聞冲謀逆賜死以庶人禮葬之三月興還長安夏四月赫連勃勃帥騎二萬來攻掠取平凉雜胡七千餘户進屯依力川六月南燕慕容超為劉裕所伐遣尚書令韓範詣秦乞師興遣衛將軍强帥歩騎一萬隨範往就東平公紹於洛陽并兵救燕勃勃襲擊敗之强還長安秋七月興自將討勃勃至貳城遣安逺將軍詳及輔國將軍歛曼嵬鎮軍將軍彭白狼分督租運諸軍未集而勃勃率騎乘虚奄至興欲留歩軍輕就詳營衆咸惶懼羣臣固以為不可興弗納尚書郎韋宗希㫖勸興行蘭臺侍御史姜楞越次而進曰韋宗傾險不忠沮敗國計宜光腰斬以謝天下脫車駕動軫六軍駭懼人無守志取危之道也宜遣單使以徴詳等興黙然右僕射韋華等諫曰若車駕輕動衆心駭懼必不戰自潰詳營亦未必可至也惟陛下圖之興遂遣别將姚榆生逆之勃勃伏兵夾擊禽之又遣左將軍姚文宗率禁兵拒戰中壘將軍齊莫統氐兵為之後繼文宗與莫皆勇果兼人以死力戰勃勃乃退留禁兵五千配詳助守貳城興還長安譙縱遣其侍中譙良太常楊軌來朝請大舉入冦江東縱以桓謙為荆州刺史譙道福為梁州刺史帥衆二萬東冦江陵興遣前將軍茍林率騎兵㑹之桓謙於道召募義舊民投之者二萬餘人進屯支江林亦進屯江津謙江右貴族部曲徧於荆楚晉之將士多懐異心晉荆州刺史劉道䂓㑹諸將士告之曰桓謙今在近道聞諸長者頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門逹旦不閉衆咸憚服莫有去者㑹雍州刺史魯宗之自襄陽奔赴道䂓單馬迎之遂留守江陵委以心腹自率軍攻謙諸將皆曰今逺出討謙其勝難必茍林在江津伺人動静若來攻城宗之未必能固脫有蹉跌大事去矣道䂓曰茍林愚愞無他竒計以吾去未逺必不敢向城吾今取謙往至便克沈疑之間已自還返謙敗則林破膽矣豈暇復來攻城乎且宗之獨守何為不支數日乃馳往攻謙水陸並進謙等舟師大陳兼列歩騎以待之大戰於支江謙衆敗績乘輕舸奔就茍林道軌追獲斬之還至湧口討林林懼引歸道䂓遣諮議叅軍劉遵率衆來追俘獲數千餘人九月劉遵斬林於巴陵冬十月興以國用不足増闗津之稅鹽竹山木皆有賦焉羣臣咸諫以為天植品物以養羣生王者子育萬邦不宜節約以奪其利興曰能踰闗梁通利於山水者此皆豪富之家吾損有餘以補不足有何不可遂行之𢎞始十二年春二月西秦乞伏乾歸以衆叛攻䧟金城執太守任蘭蘭厲色責乾歸以背恩負義乾歸怒而囚之蘭遂不食而死三月赫連勃勃遣尚書胡金纂將萬餘騎攻平凉興如貳城因救平凉纂衆大敗生擒纂勃勃又遣兄子羅提攻䧟定陽執北中郎將姚廣都坑將士四千餘人興將曹熾曹雲王肆佛等各將數千戸避勃勃内徙興處肆佛於湟山澤熾雲於陳倉勃勃冦隴右攻䧟白崖堡遂趨清水略陽太守姚夀都委守奔秦州勃勃虜其衆一萬六千户而去興自安定追之至夀渠川不及引還夏六月晉河間王子司馬國璠章武王子司馬叔道來奔興謂之曰劉裕方誅桓𤣥匡復晉室卿等何故來對曰裕與不逞之徒削弱王室臣宗門有能自修立者莫不害之方為國患甚於桓𤣥是以避之來實非欵誠所以避死耳興嘉之拜國璠建義將軍楊州刺史叔道平南將軍兗州刺史賜甲第於長安秋九月西秦乞伏乾歸來攻失略陽南安隴西諸郡十六國春秋卷五十七
