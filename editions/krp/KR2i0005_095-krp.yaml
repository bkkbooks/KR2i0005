body:
  text: 十六國春秋卷九十五北涼録二沮渠茂䖍一作牧犍沮渠茂虔䝉遜之第三子也初為酒泉太守後遷燉煌蒙遜病甚國人共議以世子菩提幼弱而菩提之兄茂虔聰頴好學和雅有度量乃立為世子加中外大都督大將軍錄尚書事及䝉遜卒遂僭即河西王位於謙光殿大赦境内殊死已下改元永和一作承光立子封壇為世子加撫軍大將軍錄尚書事以燉煌闞駰為姑臧太守張湛為兵部尚書燉煌劉昞索敞陰興為國師助教金城宗欽為世子洗馬趙柔為金部郎廣平程駿駿從弟𢎞為世子侍講遣使請命於魏先是世祖遣李順迎䝉遜女為夫人會蒙遜卒茂虔稱受先王遺意遣左丞宋繇送妹興平公主於魏世祖拜為左昭儀謂李順曰卿言䝉遜死今則驗矣又言茂䖍立何其妙哉朕克涼州亦當不逺於是賜絹百疋廐馬一乘進號安西將軍寵待彌厚政事無巨細皆與之參决因遣順拜茂䖍為使持節侍中都督涼沙河三州西域羌戎諸軍事車騎將軍開府儀同三司領䕶西戎校尉涼州刺史河西王以宋繇為河西王右相茂䖍以無功受賞乃留順上表乞安平一郡世祖優詔不許冬十月茂䖍尊劉昞為國師親拜之命官屬以下皆北面受業永和二年夏四月茂虔遣使上表於宋幷告嗣位曰臣聞功以濟物為務一作高字非竹帛無以述徳名以當實為美非諡號無以休終先臣蒙遜西復涼城澤憺崐裔芟夷羣暴清灑區夏暨運鍾有道備大宋之宗臣爵班九服享惟永之丕祚功名昭著克固貞節考終由正而請銘之路無階懿跡雖𢎞而述叙之美有闕臣子感痛咸用不安謹按諡法克定禍亂曰武善聞周達曰宣先臣廓清河外勲光天府標榜稱迹實並斯義輒上諡為武宣王若允天聴垂之史筆則幽顯荷榮始終無恨今遣使臣上表以聞五月戊寅宋遣使下詔曰故使持節侍中都督秦河沙涼四州諸軍事車騎大將軍開府儀同三司領䕶匈奴中郎將西夷校尉涼州牧河西王䝉遜才兼文武勲濟西服爰自萬里欵誠夙著方仗忠果翼宣逺略奄至薨殞悽悼於懷便遣使弔祭并加顯諡嗣子茂䖍纂戎前軌乃心彌彰宜䝉寵授紹兹藩業可持節散騎常侍都督涼秦河沙四州諸軍事征西大將軍領䕶匈奴中郎將西夷校尉涼州刺史河西王悉如故永和三年春正月西中郎將沮渠唐兒上言曰十五日有一父老見於燉煌東門投書忽然不見求之不獲其書一紙八字滿之文曰涼王三十年若七年茂虔訪於奉常張慎慎曰昔虢之將亡神降於莘深願殿下崇徳修政以享三十年之祚若盤於逰田荒於酒色臣恐七年將有大變茂虔聞之不悦永和四年春三月大雷震電又於震所得石丹書曰河西河西三十年破帶石樂七年帶石山名在姑臧南山祀傍泥陷不通茂虔征南大將軍沮渠董來曰祀豈有知乎遂毁祀伐木通道而行永和五年夏六月茂虔遣鎮西將軍沮渠旁周詣魏入貢世祖遣侍中古弼尚書李順賜其侍臣衣服有差并徵世子封壇入侍秋七月茂虔遣封壇如魏八月復遣使如宋奉表獻其方物并獻周生子十三卷時務論十二卷三國總略二十卷俗問十一卷十三州志十卷文檢六卷四科傳四卷燉煌實録十卷涼書十卷漢皇徳傳二十五卷亡典七卷魏駁九卷謝艾集八卷古今字二卷乘丘先生三卷周髀一卷皇帝王厯三合紀一卷趙􅜫傳并甲寅元厯一卷孔子贊一卷合一百五十四卷又求晉趙起居注諸雜書數十種帝皆與之冬十一月世祖以其妹武威公主妻茂虔茂虔遣右相宋繇隨順詣平城奉表入謝并請公主及母后妃定號永和六年春正月李順自河西還魏世祖問之曰昔與卿密圖期之無逺但以頃年東伐未遑西顧荏苒之間遂及於此今和龍已平三方無事比繕甲治兵指䇿河右掃蕩萬里今其時也卿往復積嵗洞鑒廢興若朕此年行師當克以否順曰臣疇昔所啓以今觀之私謂如然但民勞既久未獲寧息不可頻動以增勞瘁西征之議請俟他年世祖乃止永和七年春正月茂䖍朝羣臣於謙光殿有狐在於東序門者不見其入左右以告命禽之不獲二月端門崩初茂䖍為酒泉太守起浮圖於中街有石像在焉是月見有流血夏五月太廟階陷六月當陽城門崩先是魏每遣使者詣西域常詔茂䖍發導䕶送出流沙使者自西域還至姑臧一作武威茂䖍左右有告魏使者曰我君承蠕蠕可汗妄言去嵗魏天子自來伐我士馬疫死者大半復大敗而還我擒其長弟樂平王丕我君大喜宣言於國又聞可汗遣使告西域諸國稱魏已削弱今天下惟我為强若更有魏使勿復供奉西域諸國頗有二心使還具以狀聞世祖遣尚書賀多羅使涼州且觀虚實多羅還亦言茂䖍雖外修臣禮而内實乖悖世祖欲討之以問崔浩浩曰茂䖍逆心已露不可不討官軍往年北伐雖不克獲實無所損於時行者内外戰馬三十萬匹計在道死傷不滿八千常嵗羸死亦不減萬匹而逺夷乘虚遽謂衰耗不能復振今出其不意大軍猝至彼必驚駭騷擾不知所為擒之必矣且茂虔劣弱諸弟驕恣争權縱横民心離解加比年已來天災地變都在秦涼誠滅亡之國也世祖曰善吾意亦以為然於是大集公卿議於西堂𢎞農王奚斤等三十餘人皆曰茂虔西垂下國雖心不純臣然繼父位已來職貢不乏朝廷接以蕃禮妻以公主今其罪惡未彰宜加寛宥恕其微愆且國家新征蠕蠕士馬疲敝不可大舉謂宜羈縻又聞其土地鹵瘠難得水草大軍既至不得久停彼聞軍來嬰城固守攻則難抜野無所掠終無克獲此危道也初崔浩薦尚書李順使涼州以後凡十二返世祖以為能蒙遜數與順遊宴對其羣下時為驕慢之語恐順洩之隨以金寶納於順懷順亦為之隠浩潛知之密以白世祖世祖未之信也至是議伐涼州順與尚書古弼曰自温圍水以西至於姑臧地皆枯石絶無水草彼人言姑臧城南天梯山上冬有積雪深至丈餘春夏消釋下流成川居民引以灌溉彼聞軍至決此渠口水不通流必致絶乏環城百里之内地不生草人馬饑渴難以久留斤等之議是也世祖乃退命崔浩以其前言與斤等共相詰難諸人無復他言但云彼無水草浩曰漢書地理志稱涼州之畜為天下饒若無水草畜何以蕃又漢人為居終不於無水草之地築城郭建郡縣也且雪之消液纔能歛塵何得通渠引漕灌溉數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辨浩曰汝曹受人金錢欲為人遊説謂我不見便可欺耶世祖隠聴聞之乃出見斤等辭㫖嚴厲形於神色羣臣不敢復言唯唯而已羣臣既出振威將軍代人伊馥言曰涼州若果無水草彼何以為國衆議皆不可用宜從浩言世祖從之夏五月丁丑治兵于西郊六月甲辰發平城使侍中宜都王穆夀輔皇太子諱晃監國決留臺事内外聴焉又使大將軍樂安王一作長樂王稽敬輔國大將軍建寧王崇將二萬人屯於漠南以備柔然命公卿為書以讓茂䖍數其十二辠曰王外從正朔内不捨僭罪一也民籍地圖不登公府任土作貢不入司農罪二也既荷王爵又受偽官取兩端之榮邀不二之賞罪三也知朝廷志在懷逺固違聖略切稅商胡以斷行旅罪四也揚言西戎髙自驕大罪五也坐自封殖不欲入朝罪六也北托叛虜南引仇池憑援谷渾提挈為姦罪七也承勅過限輒假征鎮罪八也欣敵之全幸我之敗侮慢王人供不以禮罪九也既婚帝室寵踰功舊乃恣慾情烝淫其嫂罪十也既違伉儷之體不篤婚姻之義公行酖毒規害公主罪十一也防備王人候守闗要有如寇讐罪十二也為臣如是其可恕乎先令後誅王者之典也若親帥羣臣委贄逺迎謁拜馬首上䇿也六軍既臨面縛輿櫬又其次也如其守迷窮城不時悛悟身死族滅為世大戮宜思厥中自求多福也秋七月世祖自雲中濟河己巳至上郡屬國城乃大饗羣臣講武馬舍壬午留輜重部分諸軍使撫軍大將軍永昌王健尚書令鉅鹿公劉絜都督諸軍與常山王素為前鋒兩道並進驃騎大將軍樂平王丕太宰陽平王杜超督平涼鄜城諸軍以為後繼平西將軍賀源為之鄉道因問源以取涼州方略源曰姑臧城旁有四部鮮卑皆臣祖父舊民臣願處軍前宣國威信示以禍福必相率歸命外援既服然後取其孤城如反掌耳世祖曰善八月甲午永昌王健獲河西器甲及牛羊畜產二十餘萬茂虔聞有魏師驚曰何為乃爾用左丞姚定國計不肯出迎求援於柔然遣弟征南大將軍董來將兵萬餘人拒戰於城南望風奔潰魏尚書令劉絜用卜者言以為日辰不利歛兵不追董來遂得入城世祖大怒丙申魏常山王赤壁率衆至姑臧遣使諭茂虔出降茂虔聞柔然欲入魏邊為寇冀幸世祖東還遂嬰城固守兄子祖踰城出降世祖其知其情乃分軍圍之中軍將軍賀源前作平西又作安逺引兵招慰諸部下三萬餘落故世祖得專攻姑臧無復外慮世祖見姑臧城外水草豐饒遂恨李順謂崔浩曰卿昔所言今果驗矣浩曰臣言不敢不實𩔖皆如此初世祖將伐涼州太子亦以為疑至是乃賜太子詔曰姑臧城東西門外涌泉合於城北其大如河自餘溝渠流入漠中一作澤中其間乃無燥地澤草茂盛可供大軍數年人之多言亦可惡也故有此勅以釋汝疑九月丙戌姑臧城潰茂虔兄子萬年率麾下出降是日茂虔率左右文武五十人面縛請降世祖釋其縛待以藩臣之禮收其城内戸口二十餘萬倉庫珍寶不可勝計使張掖公秃髪保周龍驤將軍穆熊中軍將軍賀源分狥諸部雜夷一作胡字降者又數十萬世祖置酒姑臧謂羣臣曰雀公智略有餘吾不復以為竒伊馥弓馬之士而所見乃與崔公同此深可奇也冬十月辛酉世祖東還留樂平王丕及征西將軍賀多羅鎮涼州徙茂虔宗族及吏民三萬餘戸於平城世祖猶以妹婿禮待之拜茂虔征西大將軍河西王如故又為武宣王䝉遜置守墓三十家涼州自張氏以來號為多士茂虔尤喜文學其臣闞駰張湛劉昞索敞陰興宗欽趙柔程駿程𢎞皆禮而用之初魏軍未入之前茂虔使人砍開府庫取金銀珠玉及珍寶器物不更封閉百姓因之入盜巨細蕩盡有司求賊不得既而所親人及守藏者告之乃窮竟其事搜其家中悉得所藏器物又告茂䖍父子多畜毒藥前後隠竊殺人乃有百數姊妹皆為左道朋行淫佚曾無愧顔於是賜左昭儀沮渠氏死并誅其宗族又有人言茂虔猶與故臣民交通潛謀反叛世祖詔司徒崔浩就公主第賜茂䖍死茂䖍與公主訣良久乃自裁葬以王禮諡曰哀王自䝉遜永安元年嵗在辛丑僭立至宋元嘉十七年嵗在庚辰是為魏太延五年而茂䖍亡凡三十九年十六國春秋卷九十五
