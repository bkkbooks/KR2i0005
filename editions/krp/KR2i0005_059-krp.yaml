body:
  text: 十六國春秋卷五十九後秦録七姚泓姚泓字元子興之長子也孝友温和明識寛裕而無經世之畧又愞弱多病興欲以為嗣狐疑不决久之立為太子興每征伐遊巡常留總後事博覽經𫝊尤善談論雅好詩詠尚書王尚黄門郎叚章尚書郎富允文以儒術侍講胡義周夏侯稚以文章游集受經於博士淳于岐岐病在家泓以師者人之表範傳先聖之訓加在三之義不可不重乃親詣省疾拜於床下自是公卿見師傅莫不下拜時尚書王敏右丞郭播以刑政過寛議欲峻制泓曰人情挫辱則激厲之心生政教煩苛則茍免之行立上之化下如風靡草君等叅贊朝化𢎞昭政軌不務仁恕之道惟欲嚴法酷刑豈是安上馭下之理乎敏等乃止初興如平凉馮翊劉厥聚衆數千據萬年叛泓遣鎮軍將軍彭白狼率東宫禁兵討之斬厥赦其餘黨諸將咸勸泓曰殿下神算電發蕩平醜逆宜露布表言廣其首級以慰逺近之情泓曰主上委吾後事使吾式遏冦逆吾綏理失和以長冦姦方當引咎責躬歸罪行間安敢過自矜誕以重罪責乎左僕射韋華聞之謂河南太守慕容筑曰皇太子實有恭恵之徳社稷之福也泓弟廣平公弼有奪嫡之謀泓恩撫如初未嘗見於顔色東平公紹每為弼羽翼泓亦推心宗事弗以為嫌紹亦感之歸心於泓守其忠烈永和元年春正月興卒泓秘不發䘮捕南陽公愔及建康公吕隆大將軍尹元等皆誅之命齊公恢殺安定太守吕超恢初猶豫久乃殺之泓疑恢有隂謀恢自是懐貳隂聚兵甲欲謀作亂泓既發䘮僭即皇帝位大赦境内殊死已下改元永和廬於諮議堂既葬即吉乃親庶政内外百僚增位一等下令文武各盡直言凡政有不便於時事有益於宗廟者其各極言勿有所隠初興徙李閠𦍑三千餘户於安定尋徙新支至是𦍑酋党容率所部叛還泓遣撫軍將軍讚討之容懼請降徒其酋豪數百户於長安餘悉遣歸李閠北地太守毛雍據趙氏塢以叛東平公紹討擒之時長樂公宣鎮李閠未知雍敗遣部將姚佛生等來衛長安衆既發宣叅軍韋宗姦謟好亂聞毛雍叛說宣曰主上新立威徳未著勃勃强盛侵害必深國家之難未可量也殿下居維城之任不可不為深慮邢望地形險固總三方之要若能據之虚心撫集非但克固維城亦伯王之資也宣從之率戸三萬八千棄李閠南保邢望宣既南移諸𦍑據李閠以叛東平公紹進討破之宣詣紹歸罪紹怒殺之初宣在邢望泓遣姚佛生諭宣佛生反贊成宣計紹數其罪并殺之泓下書士卒死王事者贈以爵位永復其家將封宫臣十六人五等子男撫軍將軍讚諫曰東宫文武自當有守忠之誠未有赫然之效何受封之多乎泓曰懸爵於朝所以勸懲來效標明盛徳元子遭家不造與宫臣同此百憂獨享其福得不愧於心乎讚黙然東平公紹進曰陛下不忘報徳封之是也古者敬其事命之以始可須來春然後議之乃止夏四月西秦乞伏熾磐遣别將曇逹等來攻上邽上邽刺史姚艾不能守遁走五月并州定陽二城胡數萬落叛泓入於平陽攻立義將軍成都於匃奴堡推匃奴曹𢎞為大單于所在寇掠殘賊無遺征東將軍懿自蒲坂討之戰於平陽大破之執𢎞送長安徙其豪右萬五千於雍州仇池公楊盛攻䧟祁山執建節將軍王總進逼秦州後將軍平救之盛引退平與上邽守將嵩追盛及於竹嶺撫軍將軍讚率隴西太守姚秦都略陽太守王煥以禁兵赴之讚至清水嵩為盛所敗嵩與秦都王煥皆戰死讚至秦州退還仇池先是天水冀縣石鼓鳴聲聞數百里野雉皆雊秦州地震者三十二所殷殷有聲者八處巖嶺崩墜人舍傾壊咸以為不祥及嵩將出羣僚固諫止之嵩曰若有不祥此乃命也安所逃乎遂及於難識者以為秦州泓之故鄉今失秦州將滅之徴也赫連勃勃率騎四萬襲上邽二旬克之攻䧟隂密執秦州刺史姚軍都一作平都坑將士五千餘人軍都瞋目厲聲數勃勃殘忍之罪不為之屈勃勃怒殺之又殺將軍姚良子及將士萬餘人既克隂密遂進兵侵雍嶺北雜户悉奔五將山征北將軍恢棄安定率户五千奔新平安定人胡儼華韜等率衆拒恢恢單騎奔歸長安立節將軍彌姐成建武將軍裴岐為儼所殺勃勃使鎮東將軍羊茍兒等率鮮卑五千餘人鎮安定鎮西將軍諶委鎮東走勃勃據雍抄掠郿城東平公紹及征虜將軍尹昭鎮軍將軍姚洽等率歩騎五萬討之征北將軍恢以精騎一萬為之後繼軍次横水勃勃退保安定胡儼閉門拒之殺羊茍兒及所將鮮卑數千人復以安定來降紹進兵躡勃勃戰於馬鞍陂敗之追至朝那不及而還楊盛復遣兄子倦入冦長虵平陽氐茍渇聚衆千餘據五丈原以叛遣鎮逺將軍姚萬恢武將軍姚難等討之為渇所敗鎮西將軍諶等討渇擒之泓使輔國將軍歛曼嵬前將軍姚光兒討楊倦於陳倉倦奔散闗勃勃復遣兄子提南侵池陽車騎將軍姚裕前將軍彭白狼建義將軍虵𤣥擊郤之秋九月晉太尉劉裕總督大軍來伐師次彭城遣冠軍將軍檀道濟龍驤將軍王鎮惡入自淮淝攻漆丘項城新野太守朱超石寜朔將軍胡藩趨陽城振武將軍沈田子建威將軍傅𢎞之趨武闗建武將軍沈林子彭城内史劉遵考將水軍出石門自汴入河攻倉垣以冀州刺史王仲徳督前鋒諸軍開鉅野入河泓别將王茍生以漆丘降鎮惡徐州刺史姚掌以項城降道濟遂入頴口諸屯守將皆望風欵附惟新蔡太守董遵固守不降道濟攻拔之縛遵而致諸軍門遵厲色言曰王者伐國待士以禮君奈何以不義行師以非禮待國士乎道濟怒殺之進克許昌獲頴州太守姚坦及大將軍楊業沈林子自汴入河襄邑人董神虎聚衆千餘降裕板為叅軍加揚武將軍領兵從戎林子與神虎共攻倉垣克之兗州刺史韋華以郡降神虎伐其功擅還襄邑林子執數其罪殺之東平公紹聞晉師之至還長安言於泓曰晉兵已過許昌豫州安定孤逺卒難救衛宜遷諸鎮戸内實京畿可得精兵十萬足以横行天下假使二冦交侵猶不亡國如其不爾晉侵豫州夏冦安定將若之何事機已至宜在速决左僕射梁喜曰齊公恢雄勇有威名為嶺北所憚鎮人已與勃勃深仇理應守死無貳勃勃終不能越安定逺冦京畿若無安定虜馬必至於郿城今闗中兵馬足以拒晉無為預自削弱也泓從之吏部郎懿横宻言於泓曰恢於廣平之難有忠勲於陛下自陛下龍飛紹綂未有殊賞以答其意今外則致之死地内則不豫朝權安定人自以孤危逼冦思欲南遷者十室而九若恢擁精兵數萬鼓行而向京師得不為社稷之憂乎宜徴還朝廷以慰其心泓曰恢若懐不逞之心徴之適所以速禍耳不從王仲徳水軍入河將逼滑臺魏兗州刺史尉建畏愞帥衆棄城北渡仲徳入滑臺宣言曰晉本欲以布帛七萬疋假道於魏不謂魏之守將棄城遁去太宗諱嗣聞之遣叔孫建公孫表自河内向枋頭因引兵濟河斬尉建於城下投尸於河呼仲徳軍人問以侵冦之狀仲徳使司馬竺和之對曰劉太尉使王征虜自河入洛清掃山陵非敢為冦於魏也魏之守將自棄滑臺去王征虜借空城以息兵行當西引於晉魏之好無廢也何必揚旗鳴鼓以耀威乎太宗使建以問裕裕遜辭謝之曰洛陽晉之舊都而𦍑據之晉欲修復山陵久矣諸桓宗族司馬休之兄弟魯宗之父子皆晉之蠧也而𦍑收之以為晉患今晉將伐之欲假道於魏非敢為不利也冬十月晉師進至成臯征南將軍陳留公洸時鎮洛陽馳使請救泓遣越騎校尉閻生率騎三千赴之武衛將軍姚益男將歩卒一萬助守洛陽又遣征東將軍并州牧懿南屯陜津為之聲援寜朔將軍趙𤣥為洸部將說洸固守金墉可以坐制其弊洸司馬姚禹與道濟濳通主簿閻恢楊䖍等皆禹之黨嫉𤣥忠誠咸共毁之洸遂遣𤣥率精兵千餘南守柏谷塢廣武將軍石無諱東戍鞏城以拒晉師㑹陽城及成臯滎陽虎牢諸城悉降道濟等長驅而進無諱至石闗奔還𤣥為晉司馬滎陽毛徳祖所殺姚禹踰城奔道濟甲子進逼洛陽丙寅洸遂出降道濟獲四千餘人議者欲盡坑之以為京觀道濟曰伐罪弔民正在今日皆釋而遣之時閻生至新安益男至湖城聞洛陽已䧟留屯不進十二月征東將軍并州牧懿嶮薄惑於信受司馬孫暢姦巧傾佞好亂樂禍說懿襲長安誅東平公紹廢泓而代之懿以為然乃帥衆至陜津散榖以賜河北夷夏欲虚損國儲招納和戎諸𦍑樹已私恵懿左常侍張敞侍郎左雅固諫曰殿下以母弟之親居方面之重安危休戚與國同之漢有七國之難實頼梁王今吴冦内侵四州傾没西虜擾邊秦凉覆敗朝廷之危有同累卵正是諸侯勤王之日且榖者國之本也而殿下無故散之虚損國儲將若之何若朝廷問殿下者何辭以報懿怒鞭殺之泓聞之召紹等宻謀於朝堂紹曰懿性識鄙淺從物遷移造此謀者必孫暢耳但馳使徴暢遣撫軍將軍讚據陜城臣向潼闗為諸軍節度若暢奉詔而至臣當遣懿帥河東見兵共平吴冦如其逆釁已成違拒詔勅便當名其罪於天下聲鼓以擊之泓曰叔父之言社稷之計也乃遣讚及冠軍將軍司馬國璠建義將軍虵𤣥屯陜津武衛將軍姚驢屯潼闗懿遂舉兵稱帝傳檄州郡欲運匃奴堡穀以給鎮人寜東將軍姚成都拒之懿乃卑辭招誘深自結託送佩刀為誓成都不從送以呈泓懿遣驍騎將軍王國率甲士數百攻成都成都擊擒之遣使讓懿曰明公以母弟之親受推轂之寄今社稷危如綴旒宜恭恪憂勤匡輔王室而更包藏奸宄謀危宗廟三祖之靈其肯佐明公乎此鎮之糧一方所寄鎮人何功而欲給之王國為虵畫足國之罪人已就囚執聽詔而戮之成都方糾合義衆以懲明公之罪復須大兵悉集當與明公㑹於河上耳相見在近明公其三思之於是宣告諸城諭以順逆曉以禍福秣馬厲兵徴發義租河東之兵無詣懿者懿深患之亦發諸城兵惟臨晉數千戸叛以應懿成都引兵濟自蒲津擊臨晉叛户大破之懿等震懼鎮人安定郭純王奴等起兵圍懿紹入蒲坂執懿囚之誅孫暢等是年泓尚書東武侯敞敞弟鎮逺將軍僧光右將軍定世自洛陽奔降於魏永和二年春正月朔旦泓朝羣臣於前殿以内外離叛晉師漸逼悽然流涕羣臣皆泣時征北將軍齊公恢帥安定鎮戸三萬八千焚燒屋舍以車為方陣自北雍州趨長安自稱大都督建義大將軍移檄州郡欲除君側之惡揚威將軍姜紀率衆奔之建節將軍彭完都聞恢將至棄隂宻奔還長安恢至新支姜紀說恢曰國家重將大兵皆在東方京師空虚公可亟引輕兵徑襲事必克矣恢不從乃南攻郿城鎮西將軍諶為恢所敗恢勢彌盛長安大震泓馳使徴紹遣車騎將軍裕及輔國將軍胡翼度屯灃西扶風太守姚雋安夷䕶軍姚墨蠡建威將軍姚娥都揚威將軍彭虵皆懼降恢東平公紹聞恢之叛率輕騎先來赴難使鎮軍將軍姚洽及冠軍將軍司馬國璠將歩卒三萬赴長安恢從曲牢進屯杜城紹與恢相持於靈臺撫軍將軍讃聞恢漸逼留寜朔將軍尹雅為𢎞農太守守潼闗亦率諸軍還長安泓謝讃曰元子不能崇明徳義導率羣下至禍起蕭墻變自同氣既上負祖宗亦無顔見諸父懿始搆逆滅亡恢復擁衆内叛將若之何讚曰懿等所以敢稱兵内侮者由臣等輕弱無防遏之方故也因攘袂大泣曰臣與大將軍不滅此賊終不持面復見陛下泓於是班賜將士而遣之恢衆見諸軍悉集咸有懼心部將齊黄等棄恢詣大軍降恢進軍逼紹讚自後要擊大破之殺恢及其三弟泓哭之悲慟葬以公禮二月晉龍驤將軍王鎮惡至宜陽紀事本末云進軍澠池遣其司馬毛徳祖攻𢎞農太守尹雅於蠡吾城衆潰徳祖使騎追雅獲之既而殺晉守者奔固潼闗冠軍將軍檀道濟及建武將軍沈林子自陜北渡河拔襄邑堡泓建威將軍河北太守薛帛先據解縣林子至馳往襲之帛棄軍奔河東宋書作闗中林子收其兵糧又攻并州刺史河東太守尹昭於蒲坂不克使將軍茍卓攻匃奴堡為泓寜東將軍成都所敗泓遣武衛將軍姚驢救蒲坂輔國將軍胡翼度據潼闗辛酉滎陽守將傅洪以虎牢降魏泓進紹太宰大將軍大都督都督中外諸軍事假黄鉞改封魯公侍中司𨽻宗正節録並如故朝之大政皆往叅决紹固辭弗許又改封讚為東平公其餘將士封賞有差遣紹率武衛將軍姚鸞等歩騎五萬拒守潼闗又遣武衛將軍姚驢與并州刺史尹昭為表裏之勢夾攻道濟道濟深壁不戰沈林子謂道濟曰蒲坂城堅池濬非旦夕可拔攻之則傷衆守之則引日不如棄之先事潼闗潼闗天阻形勢之地且鎮惡孤軍勢危力寡若使姚紹據之則難圖矣及其未至當并力爭之若潼闗事㨗尹昭可不戰而自服也道濟從之三月棄蒲坂南向潼闗東平公讚率禁兵七千自渭北而東進據蒲津庚辰劉裕使扶風太守沈田子及司馬傅𢎞之率衆萬餘人入上洛所在城鎮多委奔長安田子等進次青泥魯公紹方陣而前以拒道濟道濟固壘不戰紹乃攻其西營不克遂以大衆逼之道濟帥王敬沈林子等逆衝紹軍將士驚散引還定城據險固守遣武衛將軍姚鸞屯兵大路以絶道濟糧道時裕别將姚珍入自子午竇覇入自洛谷衆各數千人泓遣鎮逺將軍姚萬拒覇鎮北將軍姚疆拒珍姚鸞遣寜朔將軍𢎞農太守尹雅與道濟司馬徐琰戰於潼闗南為琰所敗執送劉裕裕以雅前叛欲殺之雅曰雅前日已當死幸得脫至今本在望外死固甘心然夷夏雖殊君臣之義一也明公將以大義行師豈可使秦無守節之臣乎裕嘉其志尚赦之泓遣給事黄門侍郎姚和都屯嶢栁以備沈田子魯公紹謂諸將曰道濟等逺來送死兵力不多嬰壘自固正欲曠日持久以待後援吾欲分軍徑據閿鄉絶其糧道不出一月道濟之首可懸麾下濟等既没裕計自阻諸將咸以為然輔國將軍胡翼度曰軍勢宜集不可以分若偏師不利人心駭懼何可以戰紹乃止泓以晉師之逼遣使乞師於魏太宗使羣臣議之皆曰潼闗天險劉裕以水軍攻之甚難若登岸北侵其勢便易裕聲言伐秦其志難測且秦婚姻之國不可不救也宜發兵斷河上流勿使得西軍諮祭酒崔浩曰裕圖秦久矣今姚興死子泓愞劣國内多難裕乘其危而伐之其志必取若遏其上流裕心忿戾必上岸北侵是我代秦受敵也今柔然冦邊民食又乏若復與裕為敵發兵南赴則北冦愈深救北則南州復危非良計也不若假之水道聽裕西上然後屯兵以塞其東使裕克㨗必徳我之假道也不㨗吾不失救秦之名此策之得者也且南北異俗借使國家棄恒山以南裕必不能以吴越之兵與吾爭河北之地安能為吾患乎夫為國計者惟社稷是利豈顧一女子乎議者猶曰裕西入闗則恐吾斷其後腹背受敵北上則姚氏必不出闗助我其勢必聲西而實北也於是遣司徒南平公長孫嵩督山東諸軍事又遣正直將軍安平公乙㫋眷進據河内游擊將軍王洛生屯於河東振威將軍娥清冀州刺史阿薄干將歩騎十萬屯於河北為泓聲援先是劉裕與王鎮惡等期若克洛陽須待大軍未可輕前至是鎮惡等乘利輕趨潼闗為紹所拒久之乏食衆心疑懼欲棄輜重還赴大軍沈林子按劔怒曰相公勤王志清六合今許洛已定闗右將平事之濟否係於前鋒奈何阻乘勝之氣棄垂成之功乎且大軍尚逺賊衆方盛雖欲求還亦不可得下官受命前驅誓在盡命今日之事當為將軍辦之然二三君子或同業艱難或荷思罔極以此退撓亦何靣以見相公旗鼔耶鎮惡等馳使告裕且乞糧援時裕軍入河魏軍屯河岸軍不得進裕呼所遣人開舫北戸指河上魏軍示之曰我語令勿進而輕佻深入岸上如此何由得遣軍糧鎮惡乃親至𢎞農督人租稅百姓競送義粟軍食復振魏以數千騎縁河隨裕軍西行軍人於南岸牽百丈風水迅急有漂渡北岸者輒為魏所殺畧裕遣軍擊之裁登岸則退走則復來夏四月裕遣白直隊主丁旿帥仗士七百人車百乘渡北岸去水百餘歩為卻月陣兩頭抱河車置七仗士事畢使堅一白眊魏軍見數百人歩牽車上不解其意皆未動裕先命寜朔將軍朱超石戒嚴二千人白眊既舉超石帥衆馳往赴之並齎大弩百張一車葢二十人設彭排於轅上魏軍見營陣既立乃進圍之長孫嵩帥三萬騎來助四面肉薄攻營弩不能制時超石别齎大鎚及矟千餘張乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四人魏軍不能當一時奔潰死者相積臨陣斬阿薄干魏軍退遁平城超石帥寜朔將軍胡藩寜逺將軍劉榮祖追擊又破之殺獲千餘太宗乃恨不用崔浩之言泓建威將軍河北太守薛帛據河曲以叛紹分道置諸軍為犄角之勢遣輔國將軍胡翼度據東原武衛將軍姚鸞營於大路與晉軍相接丙子夜沈林子簡其軍中精銳朱逺等銜枚夜襲鸞營鸞衆大潰戰死士卒死者九千餘人撫軍將軍東平公讚屯河上以斷水道遣恢武將軍姚難運蒲坂榖以給軍士至香城林子擊敗之讚單馬奔還定城泓遣鎮西將軍諶屯嶢栁黄門侍郎和都討薛帛於河東聞晉師之要難也乃兼道赴救未至而難敗因破裕别將於河曲遂屯蒲坂大將軍魯公紹遣左長史鎮軍將軍姚洽宋書作姚伯子及寜朔將軍安夷宋書作蠻䕶軍姚墨蠡宋書作黙騾河東太守唐小方等帥騎三千屯河北之九原阻河為固欲絶道濟諸縣租輸洽辭曰夫小敵之堅大敵之擒也今兵衆單弱而逺在河外雖明公神武然鞭短勢殊恐無所及紹不聽沈林子率衆八千要洽於河上擊破之斬洽及墨蠡小方殺獲殆盡林子因啓劉裕曰紹氣葢闗中今兵屈於外國危於内恐其凶命先盡不得以膏血祭斧耳紹聞洽死忿恚發病託撫軍將軍東平公讚以後事使恢武將軍姚難屯闗西嘔血而死讚既代紹守嶮衆力益盛引兵襲林子林子復擊破之時泓各置闗以守嶮一作峽劉裕遣檀道濟王鎮惡或據山為營或平地結壘大小七十營濱帶河嶮泓亦保據山原陵阜之上各設營壘今舊跡尚存秋七月己亥劉裕次於陜城沈田子傅𢎞之入武闗戍將皆委城遁走田子等進屯青泥泓使給事黄門侍郎和都屯嶢桞以拒之裕至閿鄉遣沈林子率精兵萬餘越山開道㑹沈田子於青泥將攻嶢桞泓欲自將以禦裕軍恐田子等來襲其後欲先擊滅田子然後傾國東出乃遣車騎將軍裕率歩騎八千奄至青泥躬率大衆繼發田子本為疑兵所領裁千餘人聞泓至欲出擊之傅𢎞之以衆寡不敵止之田子曰兵貴用竒不必在衆且今衆寡相援當作懸勢不兩立若彼結圍既固則吾無所逃矣不如乘其始至營陣未立先薄擊之可以有功遂率所領先進𢎞之後繼泓兵圍數重田子撫慰士卒曰諸君冐險逺來正求今日之戰生死一决封侯之業於此在矣士卒皆踴躍豉譟執短兵奮擊泓兵大敗斬首萬餘級得其乘輿服御泓奔還㶚上初劉裕以沈田子等衆少遣沈林子將兵自秦嶺往助之至則已破相與追之闗中郡縣多濳送欵於田子辛丑裕至潼闗以寜朔將軍朱超石為河東太守使與振武將軍徐猗之會薛帛於河北共攻蒲坂東平公讚拒裕於闗西姚難屯於香城裕遣王鎮惡王敬自秋社西渡渭以逼難軍鎮東將軍平原公璞及黄門侍郎姚和都擊猗之等於蒲坂猗之敗死超石棄衆奔還潼闗讚遣司馬休之及司馬國璠自軹闗向河内濳引魏軍以躡裕後姚難既為鎮惡所逼自香城引兵而西時大霖雨渭水汎溢讚等不得北渡鎮惡水陸兼進追及難軍泓自㶚上引兵還次石橋以為之援讚退屯鄭城鎮北將軍姚疆率部人數千與難合陣於涇上以拒鎮惡鎮惡遣毛徳祖進擊破疆疆力戰死之難遁還長安裕遂進據鄭城泓使裕及尚書龎綂屯兵宫中征南將軍陳留公洸屯兵灃西尚書姚白𤓰徙四軍雜户入長安姚丕守渭橋胡翼度屯石積東平公讚屯㶚東泓軍逍遥園王鎮惡率水軍自河入渭泝流而上所乘皆䝉衝小艦行船者悉在艦内北土素無舟檝泓軍見艦進而外無有行船人莫不驚以為神壬戌鎮惡至渭橋令軍士食畢皆持仗登岸後登者斬衆既登岸渭水流急艦皆隨流逐去倐忽不知所在泓所將尚數萬人鎮惡諭士卒曰吾屬本家在江南此是長安城北門去家萬里而遥舟檝衣糧並已隨流今進而戰勝則功名俱顯不勝則骸骨不返無他岐矣卿等勉之乃身先士卒衆遂騰躍争進大破丕軍於渭橋泓引兵赴之逼水地狹為丕敗兵所蹂踐不戰而潰鎮西將軍諶及前軍將軍烈左衛將軍寳安散騎常侍王帛建武將軍進揚威將軍蚝尚書右丞孫𤣥等皆死於陣泓單馬還宫鎮惡入自平朔門泓與裕等數百騎出奔石橋東平公讚聞泓敗召將士告之衆皆以刀擊地攘袂大泣胡翼度先與劉裕隂通是日棄衆奔裕讚夜帥諸軍將㑹泓於石橋晉師已固圍之讚軍不得入衆皆驚散泓計無所出謀欲詣軍門降泓子佛念年十二謂泓曰陛下今雖降晉晉人將逞其欲終必不全願自裁决泓憮然不答佛念遂登宫牆自投而死八月癸亥泓將妻子羣臣詣壘門請降鎮惡乃以屬吏城中夷晉六萬餘户皆以國恩慰撫之號令嚴肅百姓安堵九月裕至長安鎮惡迎於㶚上裕勞之曰成吾覇業者真卿也鎮惡再拜謝曰此明公之威諸將之力也鎮惡何功之有焉裕笑曰卿欲學馮異耶鎮惡性貪泓府庫盈積鎮惡盗取不可勝紀裕以其功大不問又盗藏泓偽輦裕使人覘之鎮惡剔取其金銀棄輦於垣側裕收彛器渾儀土圭紀里鼓指南車及秦始皇玉璽送之建康其餘金玉繒帛珍寳皆以頒賜將士泓鎮東將軍平原公璞與并州刺史尹昭以蒲坂降撫軍將軍東平公讚率宗室子弟百餘人亦詣軍門降裕盡殺之餘宗遷於江南送泓建康市而戮之時年三十在位二年泓既被戮建康百里之内草木皆燋死自姚萇以晉孝武太元九年嵗在甲申僭立至泓三世以晉安帝義熈十三年嵗在丙辰而滅凡三十二年十六國春秋卷五十九
