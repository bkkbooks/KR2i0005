body:
  text: 十六國春秋卷四十二前秦録十趙俱趙俱南安𦍑酋也一云天水人洪自稱大單于三秦王改姓苻氏以俱為從事中郎及健之世遷河内太守光禄大夫尋以洛州刺史出鎭宜陽俱從弟右僕射韶中䕶軍誨有寵於生生即位乃以俱為尚書令俱固辭以疾謂韶誨曰汝等不復顧祖宗欲為滅門之事毛梁何罪而誅之吾何功而代之汝等可自為吾其死矣遂以憂卒雷弱兒雷弱兒南安𦍑酋也洪稱秦王以弱兒為輔國將軍健嗣位以弱兒為太尉俄遷大司馬初晉揚州刺史殷浩隂遣人誘弱兒等使殺秦王健許以關右之任弱兒偽許之且請兵應接浩聞張遇作亂徤兄子輔國將軍黄眉自洛陽西奔以為弱兒等事已成遂自夀春率衆七萬北伐欲進據洛陽修復園陵吏部尚書王彪之上㑹稽王昱箋以為弱兒等容有詐謀未應輕進不從浩遂為姚襄所襲走􅍖譙城襄浩相持秦人遂收漁人之利弱兒之計也其後桓温来伐健遣太子萇帥雄菁等拒之戰於藍田為温所敗温進次灞上萇等退屯城南健悉發精兵三萬遣弱兒與萇合兵拒之温不得前師還乏食僅入潼關健賞拒温之功以弱兒為丞相及徤寢疾受遺輔政弱兒性剛鯁好直諫以生嬖臣趙韶董榮奸佞亂政每公言於朝見之常切齒韶榮恨之譖之於生生遂殺之并其九子二十七孫弱兒推誠苻氏年髙有功生既殺之於是諸𦍑皆有離心叛者相繼魚遵魚遵馮翊人也洪稱秦王以遵為右將軍領右長史健代洪綂衆時杜洪據長安健規取之悉衆而西以遵為前鋒行至盟津為浮橋以濟所過城邑無不降附健即位論功以遵為太子太師俄遷左僕射司空及賞拒桓温功進為太尉健寢疾以遵為太師録尚書事受遺輔政生夢大魚食蒲又長安謠東海大魚化為龍男皆為王女為公乃誅遵并其七子十孫追諡曰廣寗公王墮王墮字安生京兆霸城人也博學有雄才明天文圖緯洪征梁犢以墮為司馬謂洪曰䜟言苻氏應王公其人也洪深然之及為宰相著匪躬之節健常嘆曰天下群官皆如王令君者隂陽曷不和乎甚見敬重生既嗣位殘虐無道殺戮大臣墮性剛峻疾惡雅好直言右僕射董榮侍中强國等皆以佞幸進疾之如仇讐每於朝見之際略不與言人或謂之曰董尚書貴幸一時無比公宜小降意接之墮曰董龍榮之小字也是何雞狗而令國士與之言乎榮聞而慙恨㑹有天變榮與强國言於生曰今天譴甚重宜以貴臣應之生曰貴臣惟有大司馬及司空耳榮國曰大司馬國之懿戚不可加刑乃殺王墮將刑榮謂之曰君今復敢比董龍於雞狗乎墮瞋目而叱之强平强平略陽氐人健之妻弟也皇始元年以平為太傅生即位以為左光禄大夫平雅好直言不避權佞㑹有日蝕之變極言切諌生怒誣以妖言鑿其頂而殺之趙煥趙煥父琨為秦尚書皇始元年晉梁州刺史司馬勲入攻秦州獲琨殺而棄其尸煥求父尸不得悲號不已俄有群烏悲鳴從山而来来而復返煥隨烏至山尋求之果得父尸杜慈杜慈仕生為尚書郎生夀光年中每宴集後入者皆斬之慈奔馳疲倦假寢省中夢一人乘黑驢曰寧留而獨死將去而獨生慈聞驚覺取馬遁走乃獲免餘皆被斬吕婆樓吕婆樓字廣平略陽氐人也其先吕文和自沛避難徙焉因世居之遂為酋豪秦王健立以為散騎常侍後進侍中尚書與東海王堅友善及生嗣位薛讃權翼密説堅曰主上猜忌暴虐中外離心方今宜主秦祀者非殿下而誰願早為計勿使他姓得之堅以問婆樓婆樓曰僕刀鐶上人耳不足復辦大事僕里舍有王猛其人謀略不世出殿下宜請而咨之堅因婆樓以見猛一見如舊任為謀主生既殘虐無度梁平老等亟以為言堅深然之於是清河王法與平老等帥壯士濳入雲龍門堅與婆樓帥麾下繼進斬生於别室堅遂稱大秦天王以婆樓為司𨽻校尉後守太尉卒其子光後稱涼王别有傳樊世樊世本氐豪也佐健定關中有大功拜特進姑臧矦負氣倨傲王猛親幸用事勲舊多忌之者世於衆辱猛曰吾輩與先帝共興事業而不預事權君無汗馬之勞何敢專管大任吾輩耕之而君食之耶猛曰方當使君為宰夫安直耕稼而已一云非徒使君耕之又將使君炊之世大怒曰要當懸汝頭於長安城門不爾者吾終不處於世也猛以白堅堅曰必湏殺此老氐然後百僚可肅㑹世入言事堅謂猛曰吾欲以楊璧尚主璧何如人也世勃然曰楊璧臣之婿也婚已乆定陛下安得令之尚主乎猛讓世曰陛下帝有四海而君敢競婚是為二天子也安有上下世怒欲起撃猛左右止之世遂醜言大罵堅由此發怒命斬之西廐王猛王猛字景略北海劇人也家於魏郡少貧賤以鬻畚為業嘗貨畚於洛陽有一人貴買其畚而云無直自言家去此無遠可隨我取直猛利其貴而從之行不覺遠忽至深山其人止猛且住樹下當先啟道来湏臾猛進見一公踞胡床而坐鬚髪悉白侍從十許人有一人引猛云大司馬可進猛因進拜老公公曰王公何緣拜也乃十倍償畚直遣人送之既出顧視乃嵩髙山也猛瓌姿儁偉博學好兵書謹重嚴毅氣度雄遠細事不干其慮自不叅其神契略不交通是以浮華之士咸輕而笑之猛悠然自得不以屑意少游鄴都時人莫識惟髙平徐綂見而竒之召為功曹遁而不應隐於華山懐佐世之志希龍顔之主歛翼待時候風雲而後動桓温入關猛被褐詣之一面談當世之事捫蝨而言旁若無人温察而異之問曰吾奉天子之命帥鋭師十萬杖義討逆為百姓除殘賊而三秦豪傑未有至者何也猛曰公不遠數千里深入宼境長安咫尺而不渡灞水百姓未見公心故也所以不至温默然無以酬之將還賜猛車馬拜髙官都䕶請與俱南猛還山咨師師曰卿與桓温豈並世哉在此自可富貴何為遠也乃止苻堅將有大志聞猛名遣吕婆樓招之一見便若平生語及廢興大事異符同契若𤣥德之遇孔明也及堅僭立以猛為中書侍郎時始平多枋頭西歸之人豪右縱横劫盗充斥乃轉為始平令猛下車明法峻刑澄察善惡禁勒强豪鞭殺一吏百姓上書訟之有司劾奏檻車徴下廷尉詔獄堅親問之曰為政之體德化為先蒞任未幾而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君剪除兇猾始殺一姦餘尚萬數若以臣不能窮殘盡暴肅清軌法者敢不甘心鼎鑊以謝孤負酷政之刑臣實未敢受之堅謂群臣曰王景略固是夷吾子産之儔也赦之遷為尚書左丞咸陽内史京兆尹未幾除吏部尚書太子詹事又遷尚書左僕射輔國將軍司𨽻校尉加騎都尉居中宿衛時年三十六歳中五遷權傾内外宗戚舊臣皆害其寵尚書仇騰丞相長史席寳數譛毁之堅大怒出騰為甘松䕶軍寳白衣領長史爾後上下咸服莫敢有言頃之遷尚書令太子太傅加散騎常侍猛頻表累讓堅竟不許又轉司徒録尚書事餘並如故猛辭以無功不拜後帥諸軍討慕容暐軍禁嚴明師無私犯猛未至鄴劫盗公行及至遠近帖然燕人安之軍還以功進封清河郡侯賜美女五人上女妓十二人中妓三十八人馬百匹車十乗上疏固辭不受時既留鎭冀州堅遣猛於六州之内聼以便宜從事簡召英俊以補關東守宰授訖言䑓除正居數月上疏曰臣前所以朝聞夕拜不顧艱虞者正以方難未夷軍機貴速庶竭命戎行甘馳驅之役敷宣王化盡筋骨之效黽俛從事叨據負乘可謂恭王命於濟時俟太平於今日聖德格於皇天威靈被於八表𢎞化已熈六合清泰竊敢披貢丹誠請避賢路設官分職各有司存豈應孤任愚臣以速傾敗東夏之事非臣區區所能康理願徙授親賢濟臣顛墜若以臣有鷹犬㣲勤未肯捐棄者乞待罪一州效盡力命徐方始賔淮汝防重六州處分府選便宜輙以悉停督任不可虛曠深願時降神規堅不許遣侍中梁讜詣鄴諭㫖猛視事如前俄入為丞相中書監尚書令太子太傅司𨽻校尉持節常侍將軍矦如故稍加都督中外諸軍事猛表讓乆之堅曰卿昔螭蟠布衣朕龍潜弱冠属世事紛紜厲士之際顛覆厥徳朕竒卿於暫見儗卿於卧龍卿亦異朕於一言廽考槃之雅志豈不精契神交千載之㑹雖傅巖入夢姜公悟兆今古一時亦不殊也自卿輔政幾將二紀内釐百揆外蕩群兇天下向定彝倫始叙朕且欲從容於上望卿勞心於下𢎞濟之務非卿而誰不許數年復授司空猛復上疏辭曰臣聞乾象盈虛惟后則之位稱以才官非則曠鄭武翼周仍世載詠王叔昧寵政替身亡斯成敗之殷監為臣之烱戒竊惟鼎宰崇重叅路太階宜妙盡時賢對揚休命魏祖以文和為公貽笑孫后千秋一言致相匈奴哂之臣何庸狷而應斯舉不但取嗤遠隣實令為虜輕秦昔東野窮馭顔子知其將敝陛下不復料度臣之才力私懼敗亡是及且上虧憲典臣何顔處之雖陛下私臣其如天下何願廻日月之鑒矜臣後悔使上無過授之謗臣䝉覆燾之恩堅竟不從猛乃受命軍國内外萬機之務事無巨細莫不歸之宰政公平流放尸素㧞幽滯顯賢才外修兵革内崇儒學勸課農桑教以廉耻無罪而不刑無才而不任庻績咸熈百揆時叙兵强國富垂及升平猛之力也堅常從容謂猛曰卿夙夜匪懈憂勤萬機若文王得太公吾將優游以卒歳猛曰不圖陛下知臣之過臣何足以儗古人堅曰以吾觀之太公豈能過也常勅太子宏長樂公丕等曰汝事王公如事吾也其見重如此廣平麻思流寄關右因母亡歸葬請還冀州猛謂思曰便可速裝是暮已符鄉發遣及始出關郡縣已被符管攝其令行禁整事無留滯皆此𩔖也性剛明清肅於善惡尤分㣲時一餐之惠睚眦之忿靡不報焉時論頗以此少之其年寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河嶽諸祀莫不周備猛疾未瘳乃大赦境内殊死以下及疾甚因上疏謝恩并言時政得失多所𢎞益堅覽之流涕悲慟左右疾篤親臨省視問以後事猛曰晉雖僻陋吳越乃正朔相承親仁善隣國之寳也臣没之後願不以晉為圖鮮卑羗虜我之仇讐終為人患宜漸除之以便社稷言終而死時年五十一歳堅哭之慟比歛三臨謂太子宏曰天不欲我平一六合耶何奪吾景略之速也贈侍中尚書餘悉如故給東園温明秘器帛三千疋糓萬石遣謁者僕射監䕶䘮事葬禮一依漢大將軍故事謚曰武矦朝野巷哭三日梁平老梁平老略陽氐人也才識明敏令行禁止堅以其有王佐之才傾身禮之素與友善生嗣位為特進領御史中丞生乗醉多所殺戮群臣得􅍖一日如度十年平老謂堅曰主上失德上下嗷嗷人懐異志燕晉二方伺隙而動恐禍發之日家國俱亡此殿下之事也宜早圖之堅心然之遂與定議殺生堅即位以為尚書左僕射進使持節都督北蕃將軍事鎭北大將軍戍朔方之西以備匈奴尋加開府儀同三司封朔方矦建元八年十一月卒諡曰桓平老在鎭十餘年鮮卑匈奴憚而愛之其子成歴位中壘將軍兗州刺史轉南中郎將都督荆揚州諸軍事荆州刺史領䕶南蠻校尉配兵一萬鎭襄陽尋遷衛軍將軍屯兵洛澗淮南之敗為晉所殺梁讜梁讜字伯言略陽氐人也愽學有雋才仕健為著作郎稍遷至中書令堅既即位出為安遠將軍幽州刺史鎭薊城未幾進位侍中讜與弟熈俱以文藻清麗見重一時時人為之語曰關東堂堂二申兩房未若二梁瓌文綺章陸績陸績字處黙西平人也身長八尺腰帶十圍清辨善談論雄武便弓馬孝友貞亮聲髙一時仕堅為荆州刺史鄧羗鄧羗安定人也驍勇善騎射生時為建節將軍生每欲殺之惜其雄武出為行咸陽太守堅即位遷驍騎將軍領御史中丞羗性鯁直不撓與王猛恊規齊志疾惡糾案無所顧忌權貴歛跡姦猾屛氣尋進尚書復為建節將軍討平李儼以功遷建武將軍洛州刺史王猛伐燕師次潞川遣將軍徐成覘燕軍形要失期當斬羗止之曰今賊衆我寡詰朝將戰成大將也宜且宥之猛曰若不殺成軍法不立羗固請曰成羗之部將也雖違期應斬羗願與成效戰以贖之猛弗許羗怒還營嚴鼔勒兵將以攻猛猛問其故羗曰奉詔討遠賊今有近賊自相殺欲先除之猛謂羗義而有勇使語之曰將軍止吾今赦之成既免羗詣猛謝猛執其手曰吾試將軍耳將軍於部將尚耳况國家乎吾不復憂賊矣猛遂陳兵渭源嚴誓將士時燕兵甚盛猛望見而惡之謂羗曰今日之事非將軍不能破勍敵成敗之機在此一舉將軍勉之羗曰若能以司𨽻見與者君勿以為憂猛曰此非吾之所及也必以安定太守萬户矦相處羗不悦而退俄而兵交猛召羗羗寢而不應猛馳就許之羗乃大飲帳中與徐成奔赴評軍斬將搴旗殺傷甚衆燕軍大敗鄧羗請部將以撓法狥私也勒兵欲攻王猛無上也臨戰預求司𨽻要君也有此三者罪孰大焉猛能容其所短收其所長若馴猛虎馭悍馬以成大功詩曰采葑采菲無以下體猛之謂矣長驅至鄴㧞之進為使持節征虜將軍散騎常侍安定太守邑三千户封眞定侯猛以潞川之功請以羗為司𨽻堅下詔曰司𨽻校尉董牧王畿吏責甚重非所以優禮名將光武不以吏事處功臣實貴之也羗有廉李之才朕方委以征伐之事北平匈奴南盪揚越羗之任也司𨽻何足以嬰之其進號鎭軍將軍位特進後從行唐公洛征伐有功遷并州刺史陽平國常侍巴夷㓂亂復以鎭軍將軍領䕶羗校尉率甲士五千討之遂平益州勒銘㟭山振旅而還堅引見於東堂謂之曰將軍之先仲華遇漢世祖於前將軍復逢朕於後何鄧氏之多幸乎羗曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑曰將軍蓋以自况非直將軍之幸亦朕之遇賢也進車騎將軍并州刺史羗有子數人皆以義烈稱其少子翼為河間相慕容垂圍鄴以翼為後軍將軍冀州刺史眞定矦翼泣對使者曰先君忠於秦室翼豈可先叛乎忠臣不事二君自古通義未敢聞命垂復遣使諭之曰吾與車騎結異姓兄弟卿亦猶吾之子弟安得辭乎翼曰冀州宜受任親賢翼請他役效命垂乃用為建武將軍河間太守尚書左丞皆有聲稱卒於趙郡内史張平張平代郡人一云譙國銍人初仕石虎為部將閔之亡也平帥所部稱藩於燕既而結援於秦擢授大將軍冀州牧平既跨有新興雁門西河等諸郡衆十餘萬拜置征鎭自號并州刺史一作豫州刺史宼掠秦境堅遣車騎大將軍晉公桺率兵禦之桺等敗績堅自將兵討之前鋒鄧羌分㨿汾上獲其養子蚝平衆大潰懼而請降堅赦之仍署為右將軍先是平養一狗名曰飛鷰形若小驢忽夜上㕔事屋上行行聲如平常平甚惡之會晉遣叅軍桓宣就平授平節度加四品將軍即其所部扞禦北方頃之豫州刺史祖逖出屯蘆州遣叅軍殷乂詣平乂意輕平視其屋云當持作馬廏見大鑊欲鑄作鐡器命破之平曰此是帝王大鑊天下定後方當用之奈何打破乂曰卿能保頭不而惜大鑊耶平大怒於坐斬乂阻兵固守歳餘逖攻平破之平尋没於秦張蚝張蚝本姓弓上黨泫人也膂力過人能却曵牛走城無髙下皆可超越張平愛之養以為子淫於平妾平知而責之蚝慙乃割隂以自誓遂為閹人銅䑓之戰一作銅壁蚝單馬大呼出入秦陣者四五堅募人生致之鷹揚將軍吕光刺蚝中之前鋒鄧羌擒之以獻平懼請䧏堅拜平左將軍以蚝為虎賁中郎將甚見寵愛常侍左右尋加廣武將軍同前將軍楊安攻㧞苻庾於陜城王猛督諸將伐燕蚝以虎牙將軍受猛節制楊安攻晉陽不克猛使蚝為地道帥壯士數百濳入城中大呼斬關克之是時猛衆止六萬而燕師三十萬蚝與徐成等跨馬運矛馳赴燕陣出入數四旁若無人殺傷甚衆戰至日中燕兵大敗乘勝逐北猛遂滅燕以功進蚝位為前將軍晉叛臣王瑾固守夀春為大司馬桓温所圍遣使請救堅遣蚝與王鑒率歩騎二萬救之鑒㨿洛澗蚝屯八公山桓温遣將夜襲鑒蚝鑒蚝退屯慎城建元十二年蚝以前禁將軍同鄧羌等帥歩騎二十萬與行唐公洛會兵攻代昭成帝逆戰不勝退遁隂山後度漠南為子所弑蚝與李柔勒兵赴之部衆逃潰遂平代地振旅而還十四年堅以蚝為并州刺史十五年入為後將軍十八年晉楊亮攻涪城堅遣蚝帥兵救之蚝出斜谷亮引兵退建元末堅大舉伐晉蚝以驃騎將軍為前鋒敗謝石於淝南謝𤣥謝琰勒兵數萬陳以待之蚝退列陣逼淝水晉師不得渡陽平公融因謝𤣥之請渡軍却陣勢不能止遂至大敗堅至洛陽遣蚝率羽林五千戍并州長樂公丕率男女六萬進如潞川蚝同并州刺史王騰迎入晉陽始知堅凶問發䘮舉哀丕即偽位進蚝為侍中司空封上黨郡公王永宣檄州郡推蚝為中軍都督其見重如此蚝方面之勲不逮鄧羌而時人咸曰鄧羌張蚝俱萬人敵也李威李威字伯龍漢陽人茍太后之姑子也少與魏王雄友善結為刎頸交苻生屢欲殺堅頼威營救得免堅深德之事威如父及即位以威為左僕射威得幸於茍太后初謀弑生及誅堅兄清河公法皆威與太后濳决大謀雅重王猛之賢勸堅以國事任之堅嘗謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子産也猛以兄事之進領䕶軍封建寧侯匈奴石賢王曹轂叛秦率衆二萬宼掠杏城堅自將討之使威以衛大將軍同王猛輔太子宏守長安時征北將軍淮南公㓜帥杏城之衆乗虛来襲威撃斬之堅還以功拜太尉尋加侍中建元十年卒諡曰烈公初茍太后少寡威有辟陽之寵史官載之卒後堅收起居注及著作所録而觀之見其事甚慚乃焚其書而大檢史官將加其罪著作郎趙泉車敬等已死乃止徐嵩徐嵩字元髙建武將軍冀州刺史盛之子也少以清白著稱初舉賢良為郎中稍遷長安令貴戚子弟犯法者嵩一皆考竟請托路絶堅甚竒之謂其叔父成曰人為長吏故當應耳此年少落落有端貳之才遷守始平郡甚有威惠長安之敗嵩以中壘將軍㨿險自固及登嗣位拜為鎮軍將軍雍州刺史太初二年姚萇遣姚方成攻雍州城䧟執而數之嵩厲色謂方成曰汝姚萇罪應萬死主上止黄眉之斬而宥之叨㨿内外位為列將榮寵極矣曾不如犬馬識所養之恩親為大逆汝曹羌軰豈可以人理期也何不速殺我早見先帝取姚萇於地下治之方成怒三斬嵩漆其首為便器登哭之哀慟贈車騎大將軍儀同三司諡曰忠武薛强薛强字威明河東汾隂人也祖興晉尚書右僕射冀州刺史安邑公父濤襲爵位梁州刺史京師傾覆皆以義烈著聞强幼有大志懐軍國籌略與北海王猛同志友善桓温入關中猛以巾褐詣之温曰江東無卿比也秦國定多竒士如卿軰尚有幾人吾欲與之俱南猛曰公求可以撥亂濟時者友人薛威明其人也温曰聞之乆矣方致聘命强聞之自南山来謁與猛皆署軍謀祭酒强察温有大志而無成功乃勸猛止俄而温敗及堅僭位猛見委任陽平公融為書將以車馬聘强猛以為不可屈乃止堅如河東伐張平自與數百騎馳至强壘下欲與相見强使主簿責之因慷慨宣言曰此城終無生降之臣但有死節之將耳諸將咸請攻之堅曰湏吾平晉自當面縛舍之以勸事君者後堅伐晉軍敗强遂總宗室强兵威振河輔破慕容永於陳州姚興聞而憚之遣使重加禮命徴拜右光禄大夫七兵尚書封馮翊郡公輔佐户尚書年九十卒贈輔國大將軍司徒公諡曰宣崔宏崔宏字𤣥伯清河東武城人魏司空林六世孫也祖悦仕石虎官至司徒右長史關内侯父清仕慕容暐為黄門侍郎並以才學著稱宏少有雋才號曰冀州神童陽平公融牧冀州心禮敬之拜陽平國侍郎領冀州從事管征東記室出總庻事入為賓友衆務修理處斷無滯堅聞而竒之徴為太子舍人辭以母疾不就左遷著作郎後長樂公丕牧冀州引為征東功曹太原郝軒名知人稱宏有王佐之才近代所未有也堅亾避亂齊魯之間為丁零翟釗及晉叛將張願所留縶郝軒歎曰以斯人而遇斯時不因扶揺之勢而與燕雀飛沈豈不惜哉慕容垂以為吏部尚書左丞髙陽内史所歴著稱立身雅正與世不群雖在兵亂猶厲志操篤學無倦不以資産為意妻子不免饑寒魏太祖征慕容寳軍次中山宏棄郡東走海濱為追騎所執送於軍門遂留仕魏本圖不遂乃作詩以自傷而不行於時蓋懼罪也後仕太宗爵至上公詳見魏書本傳姜宇姜宇字子居天水冀北人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰慧美丰儀每夜專讀書睡則懸頭於屋梁逹旦而止不識竒之將妻以女其妻不聼識乃置酒引宇令女濳觀之問女曰姜宇文士才明吾欲以汝妻之汝母難宇家之牧人汝意云何女曰觀宇之姿才豈終復為人牧羊者哉遂妻之宇後仕堅屯騎南巴二校尉遷涼寧二州刺史歴京兆尹御史中丞淮南之敗宇以尚書領前將軍與河間公琳撃慕容冲為冲所殺索泮索泮字德林燉煌人也世為冠族少時游俠及長變節好學有佐世才器張天錫輔政以泮為冠軍記室參軍天錫即位拜司兵歴位禁中録事執法御掾州府肅然郡縣歛迹遷羽林左監有勤幹之稱出為中壘將軍西郡武威太守典戎校尉政務寛和夷夏懐其惠天錫甚敬之後從天錫歸仕於秦堅見而歎曰涼州信多君子既而以泮河西德望拜為别駕尋遷建威將軍西郡太守淮南之敗吕光叛㨿姑臧泮城守不降光攻而獲之讓泮曰孤既平西域將赴難京師梁熈無狀絶孤歸路此朝廷之罪人卿何意阻郡固迷自同元惡泮厲色責光曰將軍受詔討叛胡可受詔亂涼州耶梁公何罪而將軍害之泮但苦力寡不能固守以報君父之仇耳豈肯如逆氐彭濟望風反叛主滅臣死禮之常也光怒命誅之乃就刑於市神色不變其弟菱有雋才仕天錫為執法中郎冗從右監堅世至伏波將軍典農都尉與泮俱被害楊安楊安者名將也其功幾與鄧羌相埒而不與佐命之列即建元以前征討之任亦未之及自匈奴右賢王曹轂之叛也堅自帥中外精鋭討之於是以安為前鋒都督安時已拜前將軍矣轂遣弟活拒戰於同川安大敗之斬活并四千餘級轂懼而請降次年遣安同輔車王猛帥衆二萬入宼荆州轉攻南鄉掠安陽民萬餘户而還三年李儼為張天錫所攻退守枹罕遣使請救堅復遣安帥騎二萬㑹王猛以救之與天錫將楊遹戰於枹罕之東破軍殺將師還拜前將軍如故是歳晉公柳叛於蒲坂魏公庾等起兵應之堅命諸將分討叛者而勅安與張蚝頓兵陜城三十里外堅壁勿動俟秦雍已平然後併力取之已而王猛攻蒲坂誅苻柳因遣鄧羌助安攻陜城㧞之執庾送長安遷鎭南將軍六年堅遣安等十將帥歩騎六萬伐燕俱受王猛節度安攻晉陽晉陽兵多糧足乆之不下王猛助之遂為地道以入執其刺史慕容莊師還論破鄴功賜爵博平郡矦進吏部尚書七年復以安為使持節都督益梁州諸軍事梁州刺史尋加都督南秦州諸軍事鎭仇池九年晉梁州刺史楊亮遣子廣襲仇池安擊敗之乘勝逐北諸城奔潰進㧞漢川轉攻梓潼降其太守周􅡟别將取梁益二州卭柞夜郎皆来歸附堅以安為右大將軍益州牧鎭成都十年蜀人張育等起兵自稱蜀王與巴獠酋帥張重等五萬餘人進圍成都俄而育重争權自相舉兵堅遣鄧羌帥騎助安襲撃育敗之安復敗張重於成都南斬重羌擊斬育益州遂平頃之以安為荆州刺史移鎭樊鄧十四年長樂公丕攻襄陽遣安帥樊鄧之衆為前鋒丕後䧟襄陽堅以中壘將軍梁成為南中郎將都督荆揚州諸軍事荆州刺史代安鎭樊鄧楊定堅傳作佛奴之孫楊定仇池公楊纂之族也父名佛奴奔䧏於秦堅以其女妻定拜定為尚書後為領軍將軍淮南之敗關中擾亂定盡心力奉事堅堅死乃將家属奔隴右復收集其舊衆聞丕即位遣使迎之丕以定為驃騎大將軍雍州牧徙治歴城去仇池百二十里置倉儲於百頃招合夷夏得千餘家自稱龍驤將軍仇池公進平天水略陽郡遂有秦州之地自稱秦州刺史隴西王登稱尊號以定為大將軍益州牧俄加左丞相上大將軍都督中外諸軍事後與乞伏乾歸戰軍敗見殺定無子其叔父佛狗之子盛先守仇池自稱征西將軍秦州刺史仇池公諡定為武王髙泰髙泰字子伯渤海蓚人瞻之從子也仕燕為車騎從事中郎慕容垂之奔於秦也泰坐免官尚書右丞申紹言於慕容評曰今吳王出奔外口藉藉宜徴王僚属之賢者顯進之粗可銷謗評曰誰可者紹曰髙泰其領袖也乃以泰為尚書郎秦遣黄門郎石越聘燕慕容評示之以奢欲以誇燕之昌盛泰言於評曰越言誕而視遠非求好也乃觀釁也宜耀兵以示之用折其謀今乃示之以奢益為其所輕矣評不從泰遂謝病歸家陽平公融嘗坐擅起學宫為有司所糾劾遣主簿李纂詣長安自理纂憂懼道卒融問申紹誰可使者紹曰燕尚書郎髙泰清辨有膽智可使也先是丞相王猛及融屢辟泰泰皆不從至是融謂泰曰君子救人之急卿不得復辭泰乃從命至長安猛見之笑曰髙子伯於今乃来何其遲也泰曰罪人来受刑何問遲速猛曰何謂也泰曰昔魯僖公以泮宫發頌齊宣王以稷下垂聲今陽平公開建學宫追蹤齊魯未聞明詔褒美乃更煩有司舉劾明公阿衡聖朝勸懲如此下吏何所逃其罪乎猛曰是吾過也事遂得釋猛乃歎曰髙子伯豈陽平所宜吏乎入言於堅堅召見與語悦之問以為治之本對曰治本在得人得人在審舉審舉在核眞未有官得其人而國家不治者也堅曰可謂辭簡而理博矣以為尚書郎泰固請還州堅許之及秦之敗秦征東府官属疑泰燕之舊臣有二心泰懼與同郡虞曹從事吳韶逃於渤海韶曰燕軍近在肥鄉卿宜從之泰曰吾以避禍耳去一君事一君吾所不為也申紹聞而歎曰去就以道可謂君子矣子湖等見燕傳趙整趙整字文業一名正略陽清水人或云濟隂人年十八為堅著作郎後遷黄門侍郎武威太守為人無鬚而瘦有妻妾而無兒時人謂為閹然而情度敏逹學兼内外性好幾諫無所廻避建元中慕容垂夫人叚氏得幸於堅堅與之同輦遊於後庭整作歌以諷之云不見雀来入燕室但見浮雲蔽白日堅改容謝之命夫人下輦堅與群臣飲酒以秘書監朱肜為酒正令人以極醉為限整乃作酒德歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂䘮殷邦桀傾夏國由此言之前危後則又云穫黍西秦採麥東齊春封夏發鼻納心迷堅大悦命整書之以為酒戒自是每宴群臣禮飲而已堅後分氐户於諸鎭以四帥子弟三千户配長樂公丕鎭鄴親送丕於灞上流涕而别諸戎子弟離其父兄者皆悲泣號慟酸感行人整因侍宴援琴而歌曰阿得脂阿得脂博勞舊父是仇綏尾長翼短不能飛遠徙種人留鮮卑一旦緩急語阿誰一作當語誰堅笑而不納末年堅寵惑鮮卑惰於政治整又援琴而歌曰㫺聞孟津河千里作一曲此河本是清是誰亂使濁堅動容曰是朕也又歌曰北園有一樹一作棗布葉垂重䕃外雖饒棘刺内實有赤心堅笑曰將非趙文業耶其調戲機捷皆此𩔖也整博聞强記能属文好直言上書及面諌前後五十餘事官至秘書侍郎後因關中佛法之盛願欲出家堅惜而未許及堅死方遂其志更名道整因作頌曰我生何以晩泥洹一何早歸命釋迦文今来授大道後遁迹商洛山專精經律晉雍州刺史郄恢欽其風尚逼共同遊終於襄陽時年六十餘矣朱肜朱肜京兆人隠居不仕堅以王猛為輔國將軍司𨽻校尉侍中中書令猛上疏辭謝因薦肜以自代堅不許而以肜為尚書侍郎領太子庻子建元七年以肜為羽林左監同楊安徐成等伐仇池公楊纂戰於陜中纂兵大敗面縛出降肜等振旅而還以功拜秘書監楊安鎭仇池進攻漢川堅遣肜率卒二萬為前鋒晉梁州刺史楊亮帥巴獠之衆来拒戰於青谷亮師不利安乗勝攻㧞漢中轉攻梓潼太守周􅡟固守涪城遣人送母妻自漢水趨江陵肜邀而獲之􅡟遂降肜益州刺史周仲孫勒兵拒安於緜竹聞堅將毛當將至成都乃率騎奔南中肜等遂陷益州堅以楊安鎭成都肜引兵還仍為秘書監次年有人於堅明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見肜固請誅鮮卑堅不從建元十二年以前將軍從征代有功十六年堅作教武堂於渭城命太學生明隂陽兵法者教授諸將肜切諌曰陛下東征西伐所向無敵四海之地十得其八雖江南未服蓋不足言是宜偃武修文乃更始立學舍教人戰鬭之事殆非所以馴致昇平也堅乃止堅宴群臣於逍遙園令將軍講武文官賦詩有洛陽少年者長不滿四尺而聰博善属文因肜上逍遙戲馬賦堅覽而竒之曰此文綺藻清麗長卿儔也因善肜之能得士十八年堅欲大舉伐晉肜進曰陛下應天順時恭行天罰必有征無戰萬里風披晉王自當束首軍門堅大悦遂鋭意攻晉卒致敗滅王嘉王嘉字子年隴西安陽人也輕舉止醜形貎外若不足而聰睿内明本滑稽好語笑不食五糓不衣美麗清虛服氣不與世人交逰隱於東陽谷鑿崖為穴而居之諸有從其學者人各一穴遂至百餘穴石虎之末棄其徒衆至長安濳隱終南山結菴廬而止之門人聞而復隨乃遷於倒虎山一名𤣥象山在覆車山北堅累徴不起公侯以下咸躬往叅詣好尚之士無不師宗之問其當世事者皆隨問而對好為譬喻狀如戲調言未然之事辭如䜟記不可領解事過多驗初堅將欲南征遣使者問其休咎嘉曰金剛火彊乃乗使者馬正衣冠徐徐東行數百歩策馬馳反因脱衣服棄冠履而歸下馬踞牀一無所言使者還告堅不悟復遣問之曰吾世祚云何嘉曰未央咸以為言明年癸未敗於淮南所謂未年而有殃也人候之者至心則見之不至心則隱形不見衣服在架履杖猶存或取其衣者終不及企而取之衣架踰髙而屋亦不大履杖諸物亦如之姚萇入長安禮嘉如堅故事逼以自隨每事諮之萇後與登相持問嘉曰吾得殺苻登定天下不嘉曰略得之萇怒曰得當云得何略之有遂斬之先是釋道安謂嘉曰世事如此行將及人相與去乎嘉答曰卿且先行我有小債未了不得俱去俄而道安亾至是而嘉戮死所謂負債者也登聞嘉死設壇哭之贈太師諡曰文及萇死萇子興字子略方殺登略得之謂也嘉之死有人於隴上見之乃遺書於萇其所造牽三歌䜟事過皆驗累世猶傳之又著拾遺録十卷其記事詭怪今行於世張忠張忠字巨和中山人也永嘉之亂隱於泰山恬静寡慾清虛服氣飱芝餌石修道養之法冬則緼袍夏則帶索端拱若尸無琴書之適不修經典勸教但以至道虛無為宗其居也依崇巖幽谷鑿地為窟室弟子亦居窟室相去六十餘歩五日一朝其教以形不以言弟子受業觀形而退立道壇於窟上每旦朝拜之食用瓦器鑿石為釡泰山人於今猶法之左右居人贈之衣食一無所受好事少年或問以水旱之祥忠曰天不言而四時行焉萬物生焉隂陽之事非窮山野叟所能知之其遣諸外物皆此𩔖也年在期頥而視聼無爽堅遣使者徴之使者至忠沐浴而起謂弟子曰吾餘年無幾不可以逆時主之意浴訖就車及至長安堅賜以衣服及冠辭曰年朽髪落不堪冠衣請以野服入覲從之及見堅謂之曰先生考槃山林研精道素獨善之美有餘兼濟之功未也故遠屈先生將任以齊尚父忠曰昔因喪亂避地泰山與鳥獸為侣以全朝夕之命属堯舜之世思一奉聖顔年衰志謝不堪展效尚父之况非敢竊儗山林之性情存巖岫乞還餘齒歸死岱宗堅安車送之行至華隂山歎曰我東嶽道士没於西嶽命也奈何行五十里及關而死使者馳驛白之堅遣黄門侍郎韋華持節策弔祀以太牢褒賜命服諡曰安道先生法喜法喜兜佉勒人齠年離俗聰慧夙成研諷經典專精致業遍通三藏闇誦增一阿含難經博識洽聞靡所不綜國内遠近咸所推服少而遍逰諸國嘗謂𢎞法之體宜宣布未聞故遠渉流沙懐道東入秦建元中来至長安學業既優道聲甚盛堅深見禮接先是中土未有四含堅武威太守趙整欲請出經時慕容冲已叛起兵撃堅關中擾動整慕法情深忘身為道乃請安公等於長安城中集義學僧請法喜譯出中增一二阿含并先所出毘曇心三法度等凢一百六卷佛念傳譯惠嵩筆受自夏及春綿延二載文字方具及姚萇宼逼關内人情危阻法喜乃辭還西域不知所終曇邕曇邕本姓楊略陽氐人也一云關中人居貧篤學遇髙陽僧富見其採薪為燭以照讀書遂資其衣食邕後仕秦為衛將軍形長八尺雄武過人建元十九年從堅南征為晉所敗還至長安遂舍族出家僧朗僧朗京兆人少事佛圖澄碩學淵通尤明氣緯秦皇始元年移卜泰山隱於金輿谷之崑崙山中因謂之朗公谷與隱士張忠為林下之契每共逰處忠常穴居而朗居崑崙大起殿舍連樓疊閣雖素飾不同並以静外致稱堅欽其德素遣賜襯遺并致書曰皇帝敬問泰山朗和尚大聖應期靈權超逸䕃盖十方化融無外若四海之養群生等天地之育萬物養生存死澄神寂妙朕以虛薄生與聖會而隔以萬機不獲輦駕今遣使者安車相請應冀靈光逈盖京邑并奉紫金數斤供度形像繢綾三十疋奴子三人可備洒掃至人無違幸望相納想必𤣥鑒見朕意焉朗答書於堅曰如来永世道風濳淪忝在出家栖心山嶺精誠㣲薄未能𢎞匠不悟陛下遠問山川詔命慇懃實感恩㫖氣力㣲虛未堪䟦渉願廣開法輪顯􅍖天祚䝉重惠賜即為設施福力之功無不蒙頼貧道才劣不勝所重堅復敦請再三既至遂以師禮事之堅後沙汰衆僧乃别詔曰朗法師戒德氷霜學徒清秀崑崙一山不在搜例慕容垂慕容德並皆致禮及姚秦時興復遣使遺書曰皇帝敬問泰山朗和尚勤神履道飛聲映世休聞遠振常無己巳朕京西夏思濟大猷今關中未平事唯左右已命元戎克寧伊洛冀因斯㑹東封廵狩憑靈仗威湏見指授今遣使者送金浮屠三級經一部寳臺一區庻望𤣥鑒照朕意焉垂及德亦各有書與朗見垂傳建興四年及德傳二年孟欽孟欽洛陽人也有左慈劉根之術百姓惑而赴之堅召至長安惡其惑衆命陽平公融誅之俄而欽至融留之遂大宴群僚酒酣目左右収欽欽化為旋風飛出第外頃之有告在城東者融遣騎追之垂及忽然已遠或有兵衆拒戰或前至溪澗騎不得過遂不知所在堅末年復見於青州樂安男朗尋之入於海島僧渉公僧渉公者西域人一云本蜀人不知何姓少為沙門以堅建元十一年至長安虛静服氣不食五糓日行五百里言未然之事騐若指掌有秘呪能下神龍時天大旱堅命呪龍請雨龍便下鉢中其雨霈然堅及群臣親就鉢中觀之咸歎其異堅奉為國神士庻皆投身接足自是無復災旱之憂至十六年十二月無疾而死堅哭之甚慟卒後五日堅以其神異試開棺視之不見尸骸所在惟有殮被存焉至十七年自正月不雨至於六月堅減膳徹懸以迎和氣至七月降雨堅謂中書監朱肜曰渉公若在豈使朕焦心於雲漢哉此公其大聖人乎肜曰斯術幽遠亦曠古之竒也其思仰如此徐義徐義髙陸人一云咸陽人初仕堅征東參軍丕嗣位進為吏部尚書封縣公尋加右光禄大夫侍中司空俄拜右丞相義少奉佛法時兵革蜂起為慕容永所獲乃械􅑾其兩足編髪於樹將加刑戮至夜義專念觀世音經有頃忽夢人謂之曰今事急矣何暇眠乎義便驚起見防守者並疲而寢乃試自奮動手忽開裂械於重禁之中髪既得解足亦得脱而走百餘歩若有人導之者遂隱草中聞追兵交馳秉燭悉無見者迨明賊散義歸投鄴寺得免於難因奔楊佺期佺期以為洛陽令釋道安釋道安姓魏氏常山扶柳人也年十二出家逰學至鄴遇佛圖澄見而賞與語終日因事為師澄講論往復疑端鋒起安挫鋭解紛行有餘力石氏之亂與弟子惠遠等四百餘人渡河南逰夜行値雷雨乗電光而進前行得人家見門裏有一馬樁樁之間懸一馬兜可容一斛安使呼林百升百升謂是神人厚相賞接既而弟子問何以知其姓字安曰兩木為林兜容百升也後避地南投襄陽復宣佛法時襄陽習鑿齒鋒辯天逸籠罩當時其先藉安高名及聞安至即往修造既坐稱言四海習鑿齒安曰彌天釋道安時人以為名對常註諸經恐不合理乃誓曰若所説不甚違理願見瑞相乃夢見梵道人頭白眉長語安云君註經甚合道理我不得入泥洹住抂西城當相助𢎞道可時時設食識者知安所夢賓頭盧也堅素聞安名每云襄陽有釋道安是神氣清足方欲致之以輔朕躬後遣苻平南攻襄陽安與朱序俱獲送於堅堅謂僕射權翼曰朕以十萬之師取襄陽惟得一人半翼曰誰耶堅曰安公一人習鑿齒半人也既至住長安五重寺初堅承石氏之亂至是户民殷富四方略定惟建業一隅未能克復每與侍臣談語未嘗不欲平一江左堅弟陽平公融及朝臣並切諌終不能廻㑹堅出逰東苑命安同輦權翼諫曰臣聞天子法駕侍中陪乗清道而行進止有度三代末主或虧大倫適一時之情書惡来世故班姬辭輦垂美無窮道安毁形賤士不宜參穢神輿堅勃然作色曰安公道㝠至境德為時尊朕舉天下之重未足以易之非公輿輦之榮未稱其意此乃朕之願也命翼扶安上輦於是翼跽而掖之先是群臣以堅信重安謂安曰主上欲有事於東南公何不為蒼生致一言也安因此極諌堅終不納詳具堅本傳羅什在西國聞安風範謂是東方聖人初安生而左臂有一皮廣一寸許著手可得上下之唯不得出手時人謂之即手菩薩畢覽畢覽東平人少奉佛法仕堅為冠軍將軍隨慕容垂北征没虜單馬逃竄虜騎追將及覽至心彌念觀世音遂得免難逃入山林迷惑失道又專心持念中夜見一道人法服持錫示以途徑安然至家桑虞桑虞字子深魏郡人仁孝自天年十四䘮父毁瘠過禮日以米百粒用糝藜藿其姊諭之曰汝毁瘠如此必至滅性滅性不孝宜自割抑虞曰藜藿雜米足以勝哀諸兄仕於石氏咸登顯位惟虞耻臣非𩔖隂欲避地海東會丁母憂遂止哀毁骨立廬於墓側五年後勒以為武城令虞以密邇黄河走海㣲近將伸前志欣然就職石虎時太守劉徴甚器重之徴遷青州刺史請虞為長史帶領河北郡遇疾還鄴令虞監行州府属虎死國中大亂朝廷以虞名父之子必能立功海岱濳遣東莱華挺授虞寧朔將軍青州刺史虞曰功名非吾志也乃附使者啟讓刺史避居海右不交境外雖歴偽朝而不豫亂人以此髙之虞五世同居閨門邕穆堅青州刺史朗甚器重之嘗詣虞家升堂拜其母時人以為榮王兗王兗本新平氐也仕堅為中山太守固守博陵為秦拒燕丕即位以兗為平州刺史先是慕容麟攻兗於博陵至是糧盡矢竭功曹張猗踰城而出聚衆應麟兗臨城數之曰卿秦之民也吾卿之君也卿起衆應賊號稱義兵何名實相違之甚也卿兄往合鄉宗親逐城主天地不容為世大戮身滅未幾卿復續之卿見為吾吏親尋干戈競為戎首為爾君者不亦難乎今人何取卿一切之功寧能忘卿不忠不孝之事古人有言求忠臣必出於孝子之門卿母在城棄而不顧何忠義之可望惡不絶世卿之謂也不圖中州禮義之邦而卿門風若此卿棄老母如脱屣吾復何論哉既而城䧟兗及固安侯鑒並為麟所殺茍輔茍輔南安人也為堅新平太守姚萇率衆攻之輔度不能守議欲出降郡人遼西太守馮傑蓮芍令馮羽尚書郎髙義汶山太守馮苗諫曰天下䘮亂忠臣乃見昔田單守一城而存齊今秦之所有猶連州累鎮郡國百城奈何遽為叛臣乎輔喜曰此吾志也但恐乆而無救郡人横被無辜諸君能爾吾豈顧生哉於是憑城固守後萇為土山地道輔亦於内為之或戰地下或戰山上萇衆死者萬有餘人輔乃詐降萇將入覺之引退輔馳出追擊斬獲萬計至是糧盡矢竭外援不至萇遣使謂輔曰吾方以義取天下豈仇忠臣乎卿但率見衆男女還吾湏此城置鎮輔以為然率男女萬五千口出城萇圍而坑之男女無遺獨馮傑子終得脫奔長安堅追贈輔等官爵皆諡曰節愍侯以終為新平太守初石虎末清河崔悦為新平相為郡人所殺悦子掖後仕堅為尚書郎自表父仇不同天地請還冀州堅愍之禁錮新平人缺其城角以耻之新平酋望深以為耻故相率拒萇以立忠義竇衝竇衝武都人趙公雙之叛堅遣楊成世等討之為雙所敗堅乃命衝以左禁將軍率羽林騎七千繼發雙乗勝至榆眉衝撃敗之師還進位左將軍行唐公洛以和龍叛自稱大將軍大都督秦王堅遣衝及吕光帥歩騎四萬進討戰於中山執洛及其將蘭殊堅欲伐晉以姚萇為龍驤將軍仍謂萇曰朕本以龍驤建業龍驤之號未嘗假人今以相授衝曰王者無戲言此將不祥之徴也堅黙然平陽太守慕容冲起兵二萬進攻蒲坂堅使衝討之大破於河東沖又遣將髙盖夜襲長安攻䧟南門衝與前禁將軍李辨擊走之斬首千八百級堅後為姚萇所殺衝奔據兹川有衆數萬聞長樂公丕即位遣使上表於丕丕以衝為梁州牧開府儀同三司是時左丞相王永傳檄四方共討姚萇豪傑嚮應冠軍鄧景擁衆五千據彭城與衝相為首尾聲勢甚振萇衆大懼會永與暮容永戰於襄陵敗死丕南走授首於晉南安王登具丕凶問乃稱尊號以衝為車騎大將軍南秦州牧攻萇汧雍二城克之斬其將姚元平張略等又與萇戰於汧東為萇所敗進大司馬驃騎大將軍前鋒大都督督隴東諸軍事率見衆為先驅自繁川趣長安尋拜右丞相衝矜才尚人自請封天水王登不許遂自稱秦王建立年號登攻之於野人堡衝請救於姚萇萇遣其子興攻胡空堡以救之衝遂與萇連和登為姚興所殺南安强熈等推衝為盟主所在擾亂興率諸將攻之衝走汧川汧川氐仇執送於興王永王永丞相猛子也清修好學堅以為扶風太守其弟皮凶險無行建元十一年為散騎侍郎謀反事洩堅以猛故赦皮不殺徙置朔方之北而因以永為幽州刺史永長於撫字甚得人心堅自淮南之敗垂萇繼叛亂者四起而永意氣彌勵與平州刺史苻冲率二州之衆以討暮容垂垂遣其將平視迎擊永遣昌黎太守宋敞逆戰於范陽敞兵敗績平視進據薊南永求救於振威劉庫仁庫仁遣其妻兄公孫希帥騎三千救之大破平視於薊南永乗勝長驅進據唐城與慕容麟相持慕容垂復遣慕容佐與平視共攻薊永力戰屢敗乃使宋敞燒和龍及薊城宫室帥衆三萬奔壺關長樂公丕時在鄴城將西赴長安永遣使招之丕率鄴中男女六萬餘口西如潞川驃騎張蚝刺史王騰迎入晉陽永留刺史苻冲守壺關自率衆一萬赴丕丕始知長安不守及堅凶問乃發䘮即皇帝位大赦改元以永為使持節侍中都督中外諸軍事車騎大將軍尚書令進封清河公尋加司徒録尚書事左丞相宣檄四方共討姚萇於是天水羌延馮翊寇明河東王昭新平張晏京兆杜敏扶風馬郎建忠髙平牧官都尉王敏等咸承檄起義各有衆數萬遣使應丕皆就拜將軍郡守封列侯冠軍丕留王騰守晉陽楊輔戍壺關率衆數萬進據平陽慕容永遣使假道東還丕不許乃使永與苻纂攻之以俱石子為前鋒都督與慕容永戰於襄陵石子大敗永死之皮時為略陽太守以郡降於姚萇徐成徐成嵩之叔也純直端亮素為王猛所知長不滿六尺醜極當時猛伐燕時成以射聲校尉為鄧羌部將猛使成候燕軍虛實期以日中及昏而返猛欲殺之以正軍法鄧羌請之不得幾欲勒兵攻猛其愛成若是從羌奮撃燕軍出入燕陣旁若無人以功拜并州刺史尋加鷹揚將軍帥歩騎三萬攻㧞劍閣進位右將軍姚萇来伐秦遣成等討之為萇所敗獲而弗殺遂降於萇萇之將斃也其子興殺之郭慶郭慶不知何許人以逰撃將軍從王猛伐燕㧞取晉陽二州燕遣太傅慕容評率衆四十萬来援評憚猛不敢進屯於潞川猛留將軍毛當戍晉陽進師與評相持遣慶以鋭卒五千夜從間道出評營後放火燒營火見鄴中暐懼遣使讓評催之使戰評遂大敗猛乗勝攻鄴暐出奔晉陽慶率騎追之暐遇盗失馬歩走慶追及於髙陽執送於堅追評至於遼海縛送之其部將朱嶷追慕容桓於遼東獲而殺之諸州牧守及六夷渠帥盡降於秦論功以慶為持節都督幽州諸軍事幽州刺史鎮薊賜爵襄城侯王綂王綂擢之子也擢奔降於秦秦王健以為尚書堅立之二年以綂為扶風内史建元七年遷益州刺史與别將楊安攻克仇池拜平遠將軍南秦州刺史尋攻隴西鮮卑乞伏司繁於度堅山降其部落五萬餘户九年復從楊安入宼漢川綂以銳卒二萬為前鋒進平益州遂代安鎮仇池十二年堅遣武衛茍萇等伐張天錫綂率涼州之衆為萇後繼天錫詣降綂還秦州堅以其弟廣為益州刺史晉梁州刺史楊亮帥衆五萬伐蜀遣巴郡太守費綂等將水陸三萬為前鋒亮次巴郡廣遣巴西太守康囬拒之别遣王虬帥蜀漢之衆三萬北救長安以江夏太守李丕為益州刺史守成都身帥所部奔還隴西遂以依綂聞丕即位統兄弟咸遣使詣丕請討姚萇丕大悅以綂為鎮西大將軍廣為安西將軍皆進位州牧廣後攻河州牧毛興於枹罕為興所敗亡奔秦州隴西鮮卑匹蘭執之送詣姚萇興既敗廣進據平陽復謀伐綂綂亦以秦州降萇萇後寢疾召其子興詣行營姚方成言於興曰今寇敵未滅王綂等皆有部曲終為人患不如除之興遂殺綂及廣等萇聞之怒曰王綂兄弟吾之州里吾方用之奈何輙殺之也長孫嵩長孫嵩代人也寛雅有器量年十四代父綂軍堅時諸部乖亂使劉庫仁攝國事嵩與元他等率部衆歸之及劉顯之難乃率舊人及鄉邑七百餘家歸魏見魏書列傳夏黙䕶磨那申香夏黙乞活人堅以為佐鎮郎䕶磨那胡人堅以為右鎮郎申香奄人堅以為拂盖郎黙等身長一丈八尺一作三尺並多力善射三人每食飯一石肉三十斤許謙許謙字元遜代人也少有文才善天文圖䜟之學堅從弟行唐公洛鎮和龍請謙之鎮未幾以繼母老辭還鄉里後仕于魏太祖裴詵裴詵河西解縣人晉武威太守粹之子也仕晉太常卿避地涼州堅充河西詵與兄子慬自河西歸桑梓復居解縣洗馬川遂號洗馬裴慬仕秦大鴻臚生二子天恩天夀韋羆韋羆京兆杜陵人也仕堅丞相長史為王猛所器重遂以女妻焉後為東海太守堅滅奔於江左杜胄杜胄京兆人晉征南將軍預孫也仕堅太尉長史子嶷為慕容垂秘書監仍喬居趙郡宼修之寇修之字延期上谷人也仕堅至東莱太守堅滅奔魏何熙仲何熙仲仕秦記室叅軍撰秦書八卷多記苻健等事韋逞母宗氏韋逞母宋氏不知何郡人也家世儒學宋氏以幼喪母其父躬自養之及長授以周官音義謂之曰吾家世學周官傳業相繼此又周公所製經紀典誥百官品物備於此矣吾今無男可傳汝可受之勿令絶世属天下䘮亂宋氏諷誦不輟其後石虎徙之山東宋氏與夫俱在徙中乃推鹿車背負父所授書到冀州依膠東富人陳安夀夀養䕶之逞時年少宋氏晝則採樵夜則教逞然紡績無廢夀每歎曰學家多士大夫得無是乎逞遂學成名立仕秦為太常堅常幸其太學問博士經典乃憫禮樂遺缺時博士盧壼對曰廢學既乆書傳零落比年綴撰正經粗集惟周官禮注未有其師竊見太常韋逞母宋氏世學家女傳其父業得周官音義今年八十視聼無闕自非此母無可以傳授後主於是就宋氏家立講堂書堂置生員百二十人隔絳紗幔而受業焉拜宋氏爵號為宣文君賜侍婢十人周官學復行於世時稱韋氏宋母焉竇滔妻蘇氏竇滔妻蘇氏始平武功人陳留令蘇道賢之第三女也名蕙字若蘭善属文智識精明儀容妙麗年十六歸於竇滔滔甚敬之及堅時滔為秦州刺史被徙流沙蘇氏思之因織錦為廻文詞多不載十六國春秋卷四十二
