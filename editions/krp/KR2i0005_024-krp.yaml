body:
  text: 十六國春秋卷二十四前燕錄二慕容皝上慕容皝字元貞小字萬年廆第二子單于妃叚氏所生也龍顔版齒身長七尺八寸雄毅善權畧尚經學多材藝尤善天文國人稱之廆為遼東公立為世子晉建武元年拜冠軍將軍永昌初拜左賢王封望平侯率衆征伐累立奇功太寧末拜平北將軍進封朝鮮公咸和八年夏五月廆卒皝嗣遼東公位以平北將軍行平州刺史督攝部内赦繫囚以左長史裴開為軍諮祭酒郎中令高詡為𤣥莵太守以帶方太守王誕為左長史誕以遼東太守陽鶩為才而讓之皝從之以誕為右長史六月遣長史渤海王濟等告喪於晉秋八月初宇文逸豆歸既殺乞得歸自立至是皝率騎討之軍於廣安逸豆歸懼請和遂築榆隂安晉二城而還皝初嗣位用法嚴峻國人多不自安主簿皇甫真切諫不聽庶兄建威将軍翰驍武有雄才素為皝所忌同母弟征虜將軍仁廣武將軍昭竝有寵於廆皝亦不平之至是竝懼恐不自容翰出奔叚遼仁勸昭舉兵廢皝事覺先賜昭死遣使案檢仁之虚實遇於險瀆仁知事發殺皝使者東據平郭皝遣軍諮祭酒封奕慰撫遼東又以庶弟建武將軍幼稚廣威將軍軍弟名寧逺將軍汗司馬遼東佟壽等討之仁盡衆拒戰皝兵大敗幼稚軍皆為仁所獲壽嘗為仁司馬遂没於仁襄平令王永將軍孫機舉兵遼東叛以應仁東夷校尉封抽護軍平原乙逸遼東相太原韓矯𤣥莵太守高詡等皆棄城奔還仁於是盡有遼東之地封奕不得入與汗俱還叚遼及鮮卑諸部竝為仁援皝追思皇甫真之言以為平州别駕咸和九年春正月皝遣軍諮祭酒封奕攻卑木堤於白狼揚威將軍淑虞攻烏丸悉羅侯於平岡皆破斬之材官將軍劉佩攻乙連不克三月叚遼遣兵寇徒河皝别将張萌逆擊敗之遼復遣弟蘭與慕容翰共寇柳城柳城都尉石琮與城大慕輿埿并力拒守蘭等不克而退遼怒切責蘭等必令拔之休息二旬復益兵來攻士皆重袍䝉楯作飛梯地道四面俱進晝夜不息圍守二旬琮埿拒守彌固殺傷千餘人卒不能拔皝遣寧逺將軍汗及封奕等共救之皝戒汗曰賊衆氣鋭難與爭鋒宜顧萬全慎勿輕進必須兵集陣整然後擊之汗性驍果以千餘騎為前鋒直進封奕止之汗不從與蘭遇於牛尾谷汗兵大敗死者大半奕整陣力戰故得不没夏四月仁自稱平州刺史遼東公秋八月王濟還遼東晉成帝詔遣侍御史王齊祭遼東公廆又遣謁者徐孟閭丘幸等持節拜皝鎮軍大將軍平州刺史大單于遼東公持節都督承制封拜一如廆故事船下馬石津皆為仁所留冬十一月皝自征遼東甲申至襄平遼東人王岌密信請降師進入城仁所署東夷校尉翟楷遼東相龎鍳單騎遁走皝欲悉坑遼東民高詡諫止之仁所署居就令劉程以城降新昌人張衡執縣宰以降斬仁所置守宰分徙遼東大姓於棘城以杜羣為遼東相安輯遺民置和陽武次西樂三縣而歸十二月仁遺兵襲新昌督護新興王寓擊走之遂徙新昌入襄平咸康元年春正月置左右司馬以司馬韓矯軍諮祭酒封奕為之秋七月立子儁為世子遣右司馬封奕率兵襲擊宇文别部涉奕干一作渉夜干大獲而還涉奕干率騎追戰於渾水又敗之冬十月慕容仁遣王齊等南還齊等自海道趣棘城遇風不至十二月齊等至棘城皝始拜朝命咸康二年春正月皝將乗海討仁襲其不意羣下咸諫以海道危阻宜從陸路皝曰舊海水無冰一作陵下同自仁反已來三凍皆成昔光武合滹沱之冰以成大業天其或者欲乗此而克之乎吾計決矣沮謀者斬壬午皝親率三軍從昌黎踐冰而進仁不虞皝至軍去平郭七里候騎乃告仁狼狽出戰為皝所擒殺之赦吏民之為仁所詿誤者遼東遂平皝引而還因遣使上表於晉曰臣躬征平郭逺假陛下之威將士竭命精誠感靈海為結冰凌行海中三百餘里臣自立國以來及問諸故老初無海水冰凍之歲今遣使以聞夏四月立耤田於朝陽門東置官司以主之六月叚遼遣中軍將軍李詠夜襲武興遇雨而還都督張萌追擊擒之遼别遣弟蘭帥歩騎數萬屯於曲水亭將攻柳城西曲水宇文逸豆歸入寇安晉以為蘭聲援皝率步騎五萬擊之師次柳城蘭不戰而遁皝引兵北趣安晉逸豆歸棄輜重走皝遣右司馬封奕率輕騎追擊大破之收其軍實館穀二旬而還皝謂諸將曰二虜恥無功而歸必將復至宜於柳城左右設伏以待之乃遣封奕率騎數千潛伏於馬兠山七月叚遼果將數千騎来襲寇抄奕夾擊大破之斬其將榮伯保九月皝遣兼長史劉斌兼郎中令遼東楊景送王齊徐孟等還建康因遺書於侍中顧和云今致繡靴一緉復致書於大司馬桓温温答皝書曰承將軍厲奮戎武激揚士卒鼓角長嗚摧折姦宄冬十月使世子儁伐叚遼諸城右司馬封奕攻宇文别部皆大㨗而歸十二月立納諫之木以開讜言之路咸康三年春正月徙昌黎郡築好城於乙連東使折衝將軍蘭勃戍之以逼乙連又城曲水以為勃援夏四月乙連飢甚叚遼以車數千輛輸乙連粟蘭勃要擊獲之六月遼又遣從弟揚威將軍屈雲將精騎夜襲皝子遵於興國城與遵大戰於五官水上雲敗斬之盡俘其衆初北平陽裕事叚疾陸眷及遼五世皆見尊敬遼數與皝相攻裕諫曰親仁善鄰國之寳也況慕容氏與我世婚迭為甥舅皝有才德而我與之搆怨戰無虚日百姓凋敝利不補害臣恐社稷之憂將由此始願兩追前失通好如初以安國息民遼不從出裕為北平相秋九月鎮軍左長史封奕等以皝任重位輕宜稱燕王皝從羣議一作上議遂以咸康三年冬十月丁卯僭即王位於文德殿大赦境内殊死已下改備羣司以封奕為相國韓壽為司馬裴開為奉常陽鶩為司𨽻王寓為太僕李洪為大理杜羣為納言令宋詼劉瞻一作睦石琮為常伯皇甫真陽協為冗騎常侍宋晃平熙張泓為將軍封裕為記室監自餘文武授任各有差起文昌殿乗金根車駕六馬出入稱警蹕十一月甲寅追尊父廆為武宣王母叚氏為武宣后立夫人叚氏為王后世子儁為王太子皆如魏武晉文輔政故事皝以叚遼屢為邊患遣揚烈將軍宋囘稱藩於趙乞師討遼自請盡帥國中之衆㑹之并以弟寧逺將軍汗為質趙王石虎大悦厚加慰答辭其質遣還期以明年大舉咸康四年春正月皝遣都尉趙槃如趙請聽師期虎將擊叚遼募驍勇者三萬餘人悉拜龍騰中郎帥舟師十萬步騎七萬伐之三月趙槃還至棘城皝引兵攻掠令支以北諸城叚遼遣弟蘭來拒大戰敗之斬級數千餘户及畜産萬計以歸夏四月癸丑晉遣使者䇿拜皝為征北大将軍幽州牧領平州刺史加散騎常侍増邑萬戸持節都督單于公餘悉如故五月趙王虎至徐無遼奔密雲山虎進入令支怒皝之不㑹師先攻段遼而自專其利率衆來伐皝聞趙師之至嚴兵設備罷六卿納言常伯冗騎常侍等官虎至於棘城戎卒數十萬燕人振恐皝謂内史高詡曰將若之何對曰趙兵雖強然不足憂但堅守以拒之無能為也虎遣使四出招誘民夷皝成周内史崔燾居就令游泓武原令常霸東夷校尉封抽護軍將軍宋晃等凡三十六城皆叛應之冀陽流寓之士殺太守宋燭迎降燭晃之從兄也營丘内史鮮于屈亦遣使降趙武寧令廣平孫興曉喻吏民收屈數其罪而殺之閉城拒守朝鮮令昌黎孫泳一作永帥衆拒趙大姓王清等密謀内應泳收斬之同謀數百人惶懼請罪泳皆赦之與同拒守樂浪太守鞠彭以境内皆叛選鄉里壯士二百餘人共還棘城戊子趙兵進次棘城皝欲出亡帳下折衝將軍慕輿根諫曰趙強我弱大王一舉足則趙之氣勢遂成使趙人收畧國民兵強穀足不可復敵竊謂趙人正欲大王如此耳奈何入其計中乎今固守堅城其勢百倍縱其急攻猶足支持觀形察變間出求利如事之不濟不失於走奈何望風委去為必亡之理乎皝乃止然猶懼形於色𤣥菟大守河間劉佩曰今強寇在外衆心恟懼事之安危係於一人大王此際無所推委當自強以勵將士不宜示弱今事急矣臣請出擊之縱無大㨗足以安衆乃將敢死數百騎出衝趙兵所向披靡斬獲而還於是士氣百倍一作自倍皝問計於相國封奕奕曰石虎凶虐已甚民神共疾禍敗之至其何日之有今空國逺來攻守勢異戎馬雖强無能為患頓兵積日釁隙自生但堅守以俟之耳皝意乃安趙兵四面蟻附圍守旬餘左右或勸皝降皝曰孤方取天下何謂降也慕輿根等晝夜力戰凡十餘日趙兵不能克壬辰遣子蕩寇將軍恪等率騎二千晨出擊之趙兵驚擾皆棄甲逃潰恪等乗勝追擊趙兵大敗斬獲三萬餘級皝分兵討諸叛城皆下之拓境至凡城崔燾常霸奔鄴封抽宋皝游泓奔高句驪皝賞鞠彭孫泳慕輿根等而治諸叛者誅滅甚衆功曹長史劉翔為之申理多所全活築戍凡城而還冬十二月段遼降皝遣使詐降於趙請兵應接石虎遣征東将軍麻秋率衆三萬迎之以尚書左丞遼故臣陽裕為秋司馬皝自率諸軍迎遼遼密與皝謀覆趙軍皝遣恪伏精騎七千於密雲山大敗麻秋於三藏口死者什六七秋單騎遁免一作步走得免獲其司馬陽裕將軍鮮于亮擁段遼及其部衆以歸待遼以上賓之禮以陽裕為郎中令鮮于亮為左常侍咸康五年夏四月皝前軍師將軍評廣威將軍恪折衝將軍慕輿根輕車將軍慕輿埿襲趙遼西斬趙積弩將軍呼延晃建威將軍張支等掠千餘户而歸段遼謀叛皝誅之及其黨與數十人送遼首於趙趙王虎使鎮逺將軍石城入寇凡城不克進䧟廣城五月魏昭成帝韓什翼㨗遣使求婚皝以其妹興平公主妻之其年皝伐髙句驪兵及新城高句驪王釗乞盟乃還又使子蕩寇將軍恪平狄將軍霸等擊宇文别部霸年十三勇冠三軍十六國春秋卷二十四
