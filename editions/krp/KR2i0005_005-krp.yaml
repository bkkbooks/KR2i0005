body:
  text: 十六國春秋卷五前趙錄五劉曜上劉曜字永明淵之族子也少孤見養於淵幼而聰慧有膽量年八嵗從淵獵於西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若淵異之曰此吾家千里駒也從兄為不亡矣及長身長九尺三寸垂手過膝生而眉白目有赤光鬚髯不過百餘根皆長五尺志性不恒拓落髙亮與衆不羣好讀書廣覽不精思章句工草隷善屬文雄武過人鐵厚一寸射而洞之於時號為神射尤好兵書略皆闇誦常輕侮吳鄧而自比樂毅蕭曹時人莫之許也惟聰每曰永明世祖魏武之流何數公足道哉弱冠遊於洛陽坐事當誅乃與曹恂亡奔劉綏綏匿之於書匱載送於王忠忠送之朝鮮嵗餘饑窘遂變姓名客為縣卒朝鮮令崔岳見而異之給以衣食恩顧甚厚曹恂雖於屯厄之中事曜有君臣之禮曜甚徳之後遇赦放歸自以形質異衆恐不容於世嘗隠居於菅涔之山以琴書自娛夜中忽有二童子入跪曰菅涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光澤非常赤玉為室背上有銘云神劍御除衆毒曜遂服之劍隨四時變為五色淵聰之世頻歴顯職及粲嗣立拜相國都督中外諸軍事鎮長安光初元年冬十月靳準之亂曜自長安奔赴次於赤壁太保呼延晏太傅朱紀太尉范隆等自平陽奔之共上尊號遂以晉太興元年僭即皇帝位大赦境内殊死以下惟準一門不在赦例改元光初以朱紀領司徒呼延晏領司空太尉范隆以下悉復本官遣使拜石勒為大司馬大將軍加九錫增封十郡進爵趙公勒進攻靳準於平陽巴及羌羯降者七萬餘落勒皆徙之於所部郡縣曜使征北將軍雅鎮北將軍䇿進屯汾隂與勒為犄角之勢靳準遣侍中卜泰送乘輿服御請降於勒勒囚泰送於曜曜謂泰曰先帝末年實亂大倫羣閹撓政誅戮忠良誠是義士匡討之秋司空執心忠烈行伊霍之權拯濟塗炭使朕及此勲髙古人徳格天地朕方寧濟大難終不以非命及君子賢人司空若執忠誠早迎大駕者當悉以政事相委况免死乎卿為朕入城以朕此意布之司空宣之朝士泰還平陽具宣曜㫖準自以殺曜母兄沉吟未决十二月準左右車騎將軍喬泰王騰衛將軍斬康及將軍馬忠等殺準推尚書令斬明為盟主遣卜泰奉傳國六璽降曜曜大悅謂泰曰使朕獲此神璽而成帝王者子也石勒聞之怒甚增兵攻明明出戰屢敗嬰城固守遣使求救於曜曜使雅等迎之明率平陽士女萬五千人來奔曜命誅明收靳氏男女無少長皆斬之曜誅靳氏見康女有姿容將納為后女曰陛下既滅其父母兄弟復何用妾為妾聞逆人之誅也尚汚宫伐樹而况其子女乎因號泣請死秉操益堅曜哀之免康一子使雅迎母胡氏之䘮於平陽還葬粟邑墓號陽陵諡曰宣明皇太后追尊髙祖父亮為景皇帝曾祖父廣為獻皇帝祖防為懿皇帝考闕為宣成皇帝光初二年春二月斬勒左長史王修於市以其外表納欵内覘强弱也夏四月曜徙都長安起光世殿於前紫光殿於後立妃羊氏為皇后即故恵帝后子熙為皇太子封子襲為長樂王闡為太原王冲為淮南王敞為齊王髙為魯王徽為楚王徴諸宗室皆進封郡王五月陳安自稱秦州刺史叛降於曜六月繕宗廟社稷南北郊於長安下令曰蓋聞王者之興必禘始祖一作世祖我皇家之先出自夏后居於北夷世跨燕朔光文以漢有天下嵗久恩徳結於庶民故立漢祖宗之廟以懐民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖亟議以聞於是太保領司空呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勲功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙以水行承晉金行國號曰趙曜從之於是牲牡尚黑旗幟尚𤣥冒頓配天淵配上帝自稱大趙大赦境内殊死以下冬十二月黄石屠各路松多起兵於新平扶風聚衆數千附於南陽王司馬保保使其將楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據隂宻松多進據草壁秦隴氐羌多歸附之曜遣車騎將軍雅平西將軍厚攻楊曼於陳倉二旬不克曜自率中外精銳赴之行次雍城太史令弁廣明言於曜曰昨夜妖星犯月師不宜行乃止勅雅等攝圍固壘以待大軍是月地震長安尤甚時曜后羊氏有殊寵頗與政事隂有餘之徵也光初三年春正月曜自雍城攻陳倉楊曼王連謀曰諜者適還云其五牛旗建多言胡主自來其鋒恐不可當吾糧廩既少無以支久若頓軍城下圍攻百日不待兵刃吾已自滅不如率見衆以一戰如其勝也闗中不待檄而至如其敗也一等殞耳早晚無在遂盡衆背城而陳為曜所敗王連戰死楊曼奔南氐遂進攻草壁陷之松多奔隴城進㧞隂宻又陷安定司馬保懼遷於桑城曜振旅歸長安署雅為大司徒二月曜左中郎將宋始振威將軍宋恕及别將尹安趙慎等四軍屯洛陽晉司州刺史李矩襲克金墉使潁川太守郭黙將兵入洛陽始等懼叛降於後趙石勒曜署廣平王岳為征東大將軍鎮洛陽會三軍疫甚移屯澠池石勒遣石生馳應始等軍勢甚盛岳乃班師鎮於陜城於是河南之民皆相率歸於李矩洛陽遂空夏四月長安雨雹大如雞子西明門内大樹風吹折經一宿樹撥變為人形髪長一尺鬚眉長三寸皆黄白色有歛手之狀亦有兩脚著履之形惟無目鼻每夜有聲十日而生柯條遂成大樹枝葉甚茂五月陳安表請擊晉别將張瞻曜以安為大將軍擊瞻殺之六月丙辰將軍解虎及長水校尉尹車謀反潛結巴酋句徐庫彭等事覺虎車皆伏誅乃囚徐彭等五千一作五十餘人於阿房將殺之光祿大夫游子逺諫曰聖王用刑惟誅元惡而已不宜多殺争之不從子逺叩頭流血曜大怒以為助逆幽之於獄盡殺庫彭等尸諸街巷之中十日乃投於水於是巴氐盡叛推巴歸善王句渠知為主四山羌氐巴羯應之者三十餘萬一作四十三輔大亂城門晝閉曜甚患之欲大興師往伐子逺又從獄中上表諫諍曜怒甚手毁其表曰大荔奴不憂命在旦夕猶敢如此嫌死晩邪叱左右速殺之大司徒中山王雅太傅領司徒朱紀太保領司空呼延晏侍中司徒郭汜等諫曰子逺幽囚禍在不測猶不忘諫諍所謂忠於社稷不知死之將至陛下縱不能用奈何殺之若子逺朝誅臣等亦當夕死以彰陛下之過天下之人皆當去陛下蹈四海而死耳陛下復與誰居乎曜意乃解赦之秋七月復勅内外戒嚴親討渠知游子逺又諫曰陛下誠能納臣愚計不勞大駕一月之中可使清定曜曰卿試言之子逺曰羌夷之叛匪有大度窺竊神器也但逼於陛下嚴刑峻網耳今死者不可追生者猶可安莫若大赦諸逆人若沒奚官者悉令還之使迭相撫育聽其復業與小人更始彼生路既開人情豈有樂禍好死者邪且小人聚居必有他心今無刑辟之懼以恩信懐之不降何待若諸酋長自以罪重不即下者請假臣弱卒五千人為陛下梟之不勞大軍此可定矣不爾者今賊黨既盛彌川被谷雖以天威臨之恐非年嵗之可殄也曜大悅即日大赦以子逺為車騎大將軍開府儀同三司都督雍秦征討諸軍事軍屯雍城降者十餘萬進軍安定氐羌悉下惟句氏宗黨五千餘家保於隂宻進攻滅之遂振旅循隴右秦州刺史陳安郊迎先是上邽氐羌十餘萬落保險不服其酋大虛除權渠自號秦王曜復遣子逺將兵討之權渠率衆阻險自固子逺進兵至其壁下權渠率衆來拒五戰皆敗權渠恐懼欲降其子伊餘大言於衆曰往日劉曜自來猶無若我何况此偏師而欲降之何其怯也遂率勁卒五萬晨壓子逺壘門左右勸進擊之子逺曰吾聞伊餘有專諸之勇慶忌之㨗當今無敵况士馬之强復非其匹且其父新敗怒氣方盛又西戎剽勁其鋒銳不可當不如緩之使其氣竭而後擊之此曹劌之勝也乃堅壁不戰伊餘有驕色子逺候其無備夜分誓衆秣馬蓐食晨值大風黄霧晝昏子逺曰天贊我也躬先士卒掃壁而出遲明伏而戰一作復之生擒伊餘於陣悉俘其衆權渠大懼被髪割面請降子逺啟曜以權渠為征西將軍西戎公分徙伊餘兄弟及其部落二十餘萬口於長安西戎之中權渠最彊部落皆稟其命而為冦暴權渠既降莫不歸附曜大悅拜子逺為大司徒錄尚書事八月曜讌羣臣於東堂語及平生泫然流涕遂下書曰蓋裒徳惟舊聖后之所先念恵錄孤明王之盛典是以世祖草創河北致封嚴尤之孫魏武勒兵宋梁追慟橋公之墓前新贈大司徒烈愍公崔岳中書令曹恂晉陽太守王忠太子洗馬劉綏等或識朕於童齓之中或濟朕於艱窘之極言念君子實傷我心詩不云乎中心藏之何日忘之岳漢昌之初雖有裒贈屬否運之際禮章莫備今可贈岳使持節侍中大司徒遼東公恂大司空南郡公綏左光祿大夫平昌公忠鎮軍將軍安平侯竝加散騎常侍但皆丘墓夷滅申哀莫由其速班訪岳等子孫授以茅土稱朕意焉九月曜立太學於長樂宫東小學於未央宫西簡百姓年二十五已下十三已上神志可教者千五百人擇朝賢宿儒明經篤學以教之以中書監劉均領國子祭酒置崇文祭酒秩次國子散騎侍郎董景道以明經擢為崇文祭酒冬十一月曜召搆殿巧手三千人發陽平等十郡牛車五千乘運土築建徳殿臺命起酆明觀立西宫建凌烟一作霄臺於鎬池又於霸陵西南營夀陵侍中喬豫和苞上疏諫曰臣聞人主之興作也必仰準乾象俯順人時是以衛文承亂亡之後宗廟社稷漂流無所而猶上憲營室構作楚宫彼其急也猶尚若兹故能興康叔武公之迹以延九百之慶前奉詔書將營酆明觀市道蒭蕘咸非之曰以一觀之費足以平凉州矣今又奉勅㫖復欲擬阿房而建西宫模瓊臺而起凌烟此其功費億萬酆明也若以給軍則可以吞吳蜀而剪齊魏矣陛下何為於中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉過貴能改終之實難又伏聞勅㫖將營建夀陵周廻四里下深二十五丈以銅為棺槨黄金飾之恐此功費非國内所能辦也且臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之於終也如是秦皇下錮三泉周輪七里身亡之後毁不旋踵闇主之於終也如此向魋石槨孔子以為不如速朽王孫倮葬識者嘉其矯世自古無不亡之國不掘之墓聖王知厚葬之招害也故不為之臣子之於君父陵墓豈不欲髙峻如山岳哉但以保全始終安固萬世為優耳自䘮亂以來漢帝諸陵咸見踐辱惟霸陵獨全此雖太宗之至達抑亦釋之之功興亡奢儉冏然於前惟陛下覽之曜大悅即日下詔曰二侍中懇懇有古人之風烈矣可謂社稷之臣也非二君朕安聞此言乎夫以孝明於承平之世四海無虞之日尚納鍾離一言而罷北宫之役况朕之闇𦕈當今之極弊可不敬從明誨其悉罷宫室諸役夀陵制度一遵霸陵之法詩不云乎無言不酬無徳不報今封豫安昌子苞平輿子竝領諫議大夫仍敷告天下使知區區之朝朝夕冀聞其過也自今法政有不便於時不利社稷者其詣闕極言勿有所諱省酆水囿以與貧民十六國春秋卷五
