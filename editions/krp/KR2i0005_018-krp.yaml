body:
  text: 十六國春秋卷十八後趙錄八石世石世字大業虎之㓜子劉曜㓜女安定公主所生也宣等被殺張豺勸立之虎死即偽位尊母劉氏為皇太后劉氏臨朝稱制進張豺為丞相豺辭不受請以彭城王遵義陽王鑒為左右丞相以慰其心劉氏從之豺與太尉張舉謀誅司空李農舉素與農善密以豺謀告之農懼將騎百餘奔廣宗帥乞活數萬家堡上白劉氏使張舉統宿衛精卒圍之豺以張離為鎮軍大將軍監中外諸軍事司𨽻校尉以為已副鄴中羣盗大起迭相刦掠彭城王遵先鎮闗右至是聞䘮屯於河内時冠軍大將軍姚弋仲車騎大將軍蒲洪安西將軍劉寧征虜將軍石閔武衛將軍王鸞寧西將軍王午立義將軍段勤及石榮王鐵等討梁犢還遇遵於李城共說遵曰殿下長而且賢先帝亦有意以殿下為嗣但以末年惽惑為張豺所誤今女主臨朝奸臣用事上白相持未下京師宿衛空虚殿下若聲張豺之罪鼔行而討之其誰不倒戈開門以迎殿下者耶遵從之五月遵自李城舉兵還趣鄴洛州刺史劉國等率洛陽之衆往㑹之傳檄至鄴張豺大懼馳召上白之軍丙戌遵次於蕩隂戎卒九萬石閔為前鋒都督豺將出拒之耆舊羯士皆曰天子兒來奔䘮吾當出迎之不能為張豺守城也踰城而出豺斬之不能止張離亦率龍騰二千斬闗迎遵劉氏懼召張豺入對之流涕曰先帝梓宮未殯而禍難繁興至此今皇嗣冲㓜託之將軍將軍將若之何欲加遵重官能彌之乎一云可以彌否豺惶怖失守無復籌計但云唯唯劉氏乃下令以遵為丞相領大司馬大都督督中外諸軍錄尚書事加黄鉞九錫増封十郡委以阿衡之任己丑遵北至安陽亭張豺懼而出迎遵命執之庚寅遵貫甲曜兵入自鳳陽門升太武前殿擗踴盡哀退如東閣斬豺於平樂市夷其三族假劉氏令曰嗣子幼冲先帝私恩所授皇業至重非所克堪其以遵嗣位遵偽讓至三羣臣敦勸乃受之僭即尊位于太武前殿大赦殊死已下罷上白之圍辛夘封世為譙王邑萬戸待以不臣之禮廢太后劉氏為太妃尋皆殺之世立凡三十三日石遵石遵字大祗虎第九子也初封齊王虎僣立改封彭城王虎死世嗣偽位遵廢世自立尊母鄭氏為皇太后立妃張氏為皇后故燕王斌子衍為皇太子大司馬義陽王鑒為侍中太傅沛王冲為太保樂平王苞為大司馬汝陰王琨為大將軍武興公閔為都督中外諸軍事輔國大將軍錄尚書事輔政李農歸請罪遵復其位待之如初遵立七日甲午鄴中暴風拔樹震雷雨雹大如盂升水火俱下災太武暉華殿及宮内府庫至于閶闔諸門觀閣蕩然無餘乗輿服御燒者太半光燄照天金石皆盡火月餘乃滅乙未雨血周遍鄴城時沛王冲鎮薊聞遵殺世自立謂其寮佐曰世受先帝之命遵輙廢而殺之罪逆莫大其勑内外戒嚴孤将親討之于是留寜北將軍沐堅戍幽州帥衆五萬自薊南下𫝊檄燕趙所在雲集比至常山衆十餘萬軍次苑鄉遇遵赦書冲謂左右曰皆吾弟也死者不可復追何為復相殘乎吾將歸矣冲將陳暹曰彭城簒弑自尊為罪大矣王雖北斾臣將南轅俟平京師擒彭城然後奉迎大駕冲乃復進遵馳遣王擢以書喻冲冲弗聼遵假武興公閔黄鉞金鉦與司空李農等率精卒十萬討之戰于平棘冲兵大敗獲冲于元氏賜死坑其士卒三萬餘人是月遵遣中黄門竺昌蒲請道安入華林園廣修房舍安以石氏之末國運衰危乃西適牽牛山六月晉征西大將軍桓溫聞趙之亂出屯安禄遣諸將經營河北遵揚州刺史王浹舉夀春歸晉秋七月晉征北大將軍褚裒上表請伐趙即日戒嚴直指泗口朝議以裒事任貴重不宜深入可先遣偏師裒重陳前所遣前鋒督䕶王頥之等徑造彭城示以威信後遣督䕶麋嶷進軍下邳賊即奔潰嶷率所領據其城池今宜速發以成聲勢于是除裒征討大都督率衆三萬徑進彭城使西中郎將陳逵進據夀春河朔士庶歸降者日以千計裒撫納之甚得其歡心又遣督䕶王龕伐沛獲遵偽相支重郡中二千餘人歸降魯郡山有五百餘家亦建義請援遵以李農一作李莬為南討大都督率騎二萬拒之裒遣王龕李邁領銳卒三千來迎龕等違裒節度軍次代阪為農所敗李邁死之士卒死傷大半龕執節不撓尋亦被害裒遂不能進八月退屯廣陵陳逵聞之懼焚夀春積聚毁城遁還樂平王苞時鎮長安謀率闗右之衆攻鄴左長史石光司馬曹曜等固諌苞怒誅光等百餘人苞性貪而無謀雍州豪帥知其無成竝馳使告晉晉梁州刺史司馬勲率衆赴之仇池公楊初襲破西城九月勲出駱谷破遵長城戍壁于懸鉤去長安二百餘里遣治中劉煥攻長安斬京兆太守劉秀離又拔賀城三輔豪傑多殺太守令長以應勲凡三十餘壁衆五萬人苞乃輟攻鄴之謀使其將麻秋姚國等率騎拒勲遵遣車騎將軍王朗率精騎二萬外以討勲為名因刼苞送鄴勲以兵少未能自固畏朗不敢進冬十月遵將石遇攻宛陷之執南陽太守郭啟司馬勲釋懸鉤復攻拔宛殺遵南陽太守袁景退還梁州初遵之發李城也謂武興公閔曰努力事成當以爾為儲貳既而立太子衍閔甚失望自以勲髙一時規専朝政遵忌而不任閔素驍勇屢立戰功夷夏宿將皆畏憚之既為都督總内外兵機乃懐撫殿中將士及故東宮髙力萬餘人皆奏為殿中員外將軍爵闗外侯賜以宮女樹已之恩遵弗之猜而更題名善惡以挫抑之衆咸怨怒中書令孟凖左衛將軍王鸞勸遵稍奪閔兵機閔益恨望凖等咸勸誅之十一月丙辰遵召義陽王鑒樂平王苞汝隂王琨淮南王昭入議于鄭太后前曰閔不臣之迹漸著今欲誅之如何鑒等皆曰宜然太后曰李城還兵無棘奴豈有今日小驕縱之何可遽殺也鑒出遣宦者楊環馳以告閔閔遂刼司空李農及右衛將軍王基宻謀廢遵使將軍蘇彦周成率甲士三千人執遵于南臺如意觀遵方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能㡬時遂殺之于琨華殿并誅鄭太后張皇后及太子衍上光禄大夫張斐中書令孟凖左衛將軍王鸞等遵在位一百八十三日石鑒石鑒字大朗一作郎遵之兄虎第三子也初封義陽王殺遵自立年號青龍大赦殊死已下以武興公閔為大將軍封武徳王司空李農為大司馬竝錄尚書事張舉為太尉郎闓為司空秦州刺史劉羣為尚書左僕射侍中盧諶為中書監鑒使樂平王苞及中書令李松殿中將軍張才等夜攻閔及農于琨華殿不克禁中擾亂鑒恐閔為變偽若不知者夜斬松才于西中華門并誅苞新興王祗虎之子也時鎮襄國與姚弋仲蒲洪等通和連兵移檄中外欲共誅閔農鑒遣汝陰王琨為大都督與太尉張舉及侍中呼延盛率步騎七萬人討祗等中領軍石成侍中石啟前河東太守石暉謀誅閔農閔農皆殺之龍驤將軍孫伏都劉銖等結羯士三千人伏于胡天亦欲誅閔農鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見伏都毁閣道臨問其故伏都曰閔農等仄已在東掖門臣欲嚴率衛士討之謹先啟知鑒曰卿是功臣好為官陳力朕從臺上觀卿勿慮無報也於是伏都銖等率衆攻閔農不克屯于鳳陽門閔農率衆數千毁金明門而入鑒懼閔農殺已馳招閔農開門内之謂曰孫伏都反卿宜速討之閔農攻斬伏都等伏都有膂力善尺牘自鳳陽門至琨華横尸相枕流血成渠宣令内外諸夷敢稱兵仗者斬胡人或斬闗或踰城而出者不可勝數閔使尚書王朗一作簡少府王鬰帥衆數千守鑒于御龍觀懸食以給之下令城中曰近日孫劉搆逆支黨伏誅良善一無與也今日已後與官同心者留不同心者各任所之𠡠戒城門不復相禁于是趙人百里内悉入城胡羯去者填門閔知胡人不為己用頒令内外趙人斬一胡首送鳯陽門者文官進位三級武官立拜牙門一日之中斬胡首數萬人閔親率趙人以誅胡羯無貴賤男女少長皆斬之胡人死者二十餘萬於時有髙鼻多鬚者無不濫死尸諸城外悉為野犬豺狼所食其屯戍四方者閔皆以書命趙人為將帥者誅之太宰趙鹿太尉張舉中軍將軍張春光禄大夫石岳撫軍將軍石寜武衛將軍張季及諸公侯卿校龍騰等萬餘人出奔襄國汝陰王琨奔據冀州撫軍將軍張沈據滏口張賀度據石瀆建義將軍段勤末杯之子據黎陽寜南將軍楊羣據桑壁劉國據陽城段龕蘭之子據陳留姚弋仲據混橋蒲洪據枋頭衆各數萬皆不附于閔王朗麻秋自長安赴洛陽秋承閔書誅朗部胡千餘人朗奔襄國秋帥衆奔蒲洪姚弋仲子曜武將軍益武衛將軍若帥禁兵數千斬闗奔灄頭弋仲帥衆討閔軍於混橋汝隂王琨及張舉王朗率衆七萬伐鄴閔帥騎千餘拒之戰于城北閔執兩刅矛馳騎撃之所向摧陷斬首三千級琨等大敗奔歸冀州閔與李農率騎三萬討張賀度于石瀆鑒宻遣宦者齎書召撫軍張沈等使乗虚􅊞鄴宦者以告閔農閔農馳還廢鑒殺之誅虎孫二十八人盡殪石氏鑒在位一百三日虎小男混永和八年將妻妾數人奔京師𠡠收付廷尉俄而斬之于建康市虎十三子五人為冉閔所殺八人自相殘害混至此又死初䜟言滅石者陵尋而石閔徙封蘭陵公虎惡之改蘭陵為武興郡至是終為閔所滅始勒以晉成帝咸和三年嵗在戊子僭立二主四子凡二十三年以晉穆帝永和六年嵗在庚戍滅十六國春秋卷十八
