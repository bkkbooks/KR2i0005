body:
  text: 十六國春秋卷十二後趙録二石勒中晉愍帝建興元年夏四月勒使虎攻鄴三臺鄴潰北中郎將劉演奔廩丘劉琨遂以演為兖州刺史鎮廩丘將軍謝胥田青郎牧等率三臺流民皆降于勒勒以桃豹為魏郡太守撫之勒襲苑鄉執游綸以為主簿攻龍驤將軍乞活李惲於上白惲敗死之將坑其降卒見郭敬而識之署上將軍悉免降人配之王浚復以烏丸薄盛為青州刺史使棗嵩督諸軍屯易水召叚疾陸眷欲與之共擊勒疾陸眷不至浚重賂魏穆帝諱猗盧時晉封為代公大單于共討疾陸眷穆帝遣子六修將兵會之為疾陸眷所敗五月勒使孔萇擊定陵殺兖州刺史田徽青州刺史薄盛執渤海太守劉既率户五千降勒山東郡縣相繼為勒所取劉聰授勒侍中征東大將軍餘如故拜勒母王氏為上黨國太夫人妻劉氏上黨國夫人章綬首飾一同王妃叚末杯任弟亡歸遼西勒大怒所經令尉皆殺之烏丸審廣漸裳郝襲背王浚密遣使來附勒厚加撫納司冀漸寧人始租賦立太學簡明經善書吏署為文學掾選將佐子弟三百人教之勒謂張賔曰鄴魏之舊都吾將營建既風俗殷雜須賢望以綏之誰可任者賔曰晉故東萊太守南陽趙彭忠亮篤敏有佐時良幹將軍若任之必能允副神規勒于是徴拜彭為魏郡太守彭至入見泣而辭曰臣往曽䇿名晉室食其禄矣犬馬戀主切不敢忘誠知晉之宗廟鞠為茂草亦猶洪川東逝往而不返明公應符受命可謂攀龍之㑹但受人之榮復事二姓臣志所不為爾豈惟愚臣之狷志恐亦明公之所不許有死而已未敢聞命若賜臣餘年全臣一介之願者明公大造也勒黙然張賔進曰自將軍神旗所經衣冠之士靡不變節未有能以大義進退者至如此賢以將軍為髙祖自擬為四公所謂君臣相知此亦足成將軍不世之髙何必吏之勒大悦曰右侯之言得孤心矣于是賜安車駟馬養以禄秩辟其子明為㕘軍勒以虎為征虜將軍魏郡太守代桃豹鎮鄴三臺虎簒奪之萌兆于此矣冬十一月幽州牧王浚以其父字處道自謂應當塗髙之䜟謀稱尊號前渤海太守劉亮北海太守王摶司空掾髙柔切諫浚皆殺之燕國霍原志節清髙屢辭徴辟浚以尊號事問之原不答浚誣原與羣盜通殺而梟其首於是士民駭怨而浚矜豪日甚不親政事所任皆苛刻小人棗嵩朱碩貪横尤甚北州童謠曰府中赫赫朱丘伯十囊五囊入棗郎又幽州童謠曰幽州城門似藏户中有伏尸王彭祖浚始者惟恃鮮卑烏丸以為强既而皆叛加以亢旱災蝗士卒衰弱勒欲襲之未知虚實將遣使覘之㕘佐皆曰宜如羊祜與陸抗故事致書相聞時張賔有疾勒就謀之賔曰王浚假三部之力稱制南面雖曰晉藩實懐僭逆之志必思恊英雄圖濟事業將軍威聲振于海内去就為存亡所在為輕重浚之欲得將軍猶楚之欲招韓信也今以將軍之威權譎遣使無誠欵之形脱生猜疑圖之兆露後雖竒畧無所設也夫立大事者必先為之卑當稱藩推奉尚恐未信羊陸之事臣未見其可勒曰善十二月勒遣舍人王子春董筆等多齎珍寶偽卑辭推奉浚為天子曰勒本小胡出自戎裔值晉綱弛馭海内饑亂流離屯厄竄命冀州竊相保聚以救性命今晉祚淪夷逺播吳會中原無主蒼生無繫伏惟明公殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀命興義兵誅討暴亂者正為明公驅除爾伏願明公殿下應天順人踐登皇祚勒奉戴明公如天地父母明公察勒微心亦當慈盼如子也又遺尚書棗嵩書而厚賂之浚以疾陸眷新叛士民多棄已去聞勒之附己甚喜謂子春等曰石公一時英武據趙舊都成鼎峙之勢何為稱藩于孤其可信乎子春對曰石將軍英才儁拔士馬雄盛實如聖㫖仰惟明公中州貴望累葉重光出鎮藩嶽威振八表固以胡越欽風戎夷歌徳豈惟區區小府而敢不歛衽神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝哉誠以帝王不可以智力爭故也石將軍之擬明公猶隂精之比太陽江河之比洪海爾項藉子陽覆車不逺是石將軍之明鑒所以逺過於人也明公又何怪乎且自非世族為輔佐名臣則有之矣未有為帝王者也石將軍非惡帝王不為而讓于明公也顧以帝王自有厯數非智力之所取雖强取之必不為天人之所許爾願明公勿疑浚大悦封子春等為列侯遣使報勒答以方物浚司馬游統時鎮范陽叛浚隂馳使降勒勒斬其使送於浚以表誠實浚雖不罪統益信勒為忠誠不復設備建興二年春正月壬辰王子春等與王浚使者至襄國勒命匿勁卒精甲虚府羸師以示之北面拜使而受浚書浚遺勒麈尾勒陽不敢執懸之于壁朝夕拜之曰我不得見王公見王公所賜如見王公也復遣董肇奉表於浚期以三月中旬親詣幽州奉上尊號亦修箋於棗嵩乞并州牧廣平公以見必信之誠也勒將圖浚引子春問之子春曰幽州去歳大水人不粒食浚積穀百萬不能贍恤刑政苛酷賦役殷煩賊害賢良誅斥諫士下不堪命流叛畧盡鮮卑烏丸離貳于外棗嵩田矯貪暴于内人情沮擾甲士羸弊而浚猶置立臺閣布列百官自言漢髙魏武不足為比又幽州謠怪特甚聞者莫不為之寒心浚意氣自若曽無懼容此亡期之至也勒撫几笑曰王彭祖真可擒也浚使者還幽州具陳勒形勢寡弱欵誠無二浚大悦以勒為信然日益驕怠不復設備二月勒募一作纂兵戒期將襲王浚懼劉琨及鮮卑烏丸為其後患猶豫未發張賔進曰夫襲敵國當出其不意今軍嚴經日而不行者豈顧有三方之慮乎勒曰然為之奈何賔曰彭祖之據幽州惟仗三部今皆離叛還為冦讐此則外無聲援以抗我也幽州饑儉人皆蔬食衆叛親離甲旅寡弱此則内無彊兵以禦我也況三方勇智無及將軍者若大軍在郊必土崩瓦解今三方未靖且彼未謂將軍便能懸軍千里以取幽州也輕軍往返不出二旬縦使三方有動勢足旋趾一云比其謀議出師吾已還矣且劉琨王浚雖同名晉藩實為仇敵若修箋于琨送質請和琨必喜我之服快浚之亡終不救浚而襲我也用兵貴神速勿後時也勒曰吾所未了右侯已了吾復何疑于是輕騎襲幽州以火宵行至於柏人殺主簿游綸以其兄統在范陽恐洩軍謀故也遣張慮奉牋於劉琨自陳罪過深重請討浚以自效琨既素疾浚大悦乃移檄州郡稱已與代公猗盧也方謀討勒勒走伏無地求拔幽都效善將來今當便遣六修猗盧子南襲平陽除僭偽之逆𩔖降知死之逋羯順天副民翼戴皇家斯乃曩年積誠靈祐之所致也其聴所請受任通和三月勒軍至易水浚督䕶孫緯疑其詐馳白浚將引軍拒勒游統禁之浚不聴使勒直前將佐咸曰勒貪而無信必有詐計請出擊之浚怒曰石公來正欲奉戴我爾敢言擊者斬衆遂不敢復諫乃盛張設以待勒壬申勒晨至薊叱門者開門猶疑有伏兵先驅牛羊數千頭聲言上禮實欲填諸街巷使兵不得發浚始懼或坐或起勒既入城便縦兵大掠左右復請禦之浚猶不許及勒登㕔事浚乃走出堂皇勒衆執以見勒召浚妻與之並坐立浚于前浚罵曰胡奴調汝公何凶逆如此勒使徐光讓之曰君位冠元台爵列上公據幽都驍悍之國跨全燕突騎之鄉手握强兵坐觀京師傾覆曽不救援乃欲自尊為天子非凶逆乎又專任姦暴殺害忠良肆情縦欲毒徧燕壤自貽于此誰之罪也并責以百姓餒乏積粟五十萬斛而不振給遂使别將王洛生以五百騎先送浚于襄國浚自投于水束而出之收浚麾下精兵萬人盡坑之焚燒宫殿停薊二日孫緯率衆遮擊勒僅而得免分遣流民各還桑梓擢荀綽裴憲等官資給車服數朱碩棗嵩田矯等以納賄亂政為幽州患責游統以不忠所事皆斬之遷烏丸審廣漸裳郝襲靳市等於襄國署晉尚書燕國劉翰為寧朔將軍行幽州刺史戍薊置守宰以撫之劉翰不欲從勒乃奔叚疋磾勒還襄國斬浚于市浚不為之屈大罵而死遣東曹掾傅遘兼左長史封王浚首獻捷于劉聰聰以平幽州之勲遣使人栁純持節署勒大都督督陜東諸軍事驃騎大將軍東單于侍中使持節開府校尉二州牧公如故加金鉦黄鉞前後鼓吹二部増封十二郡勒固辭受二郡而已勒封左長史張敬等十一人為伯子侯文武進位有差夏襄國大饑穀二升直銀一斤肉一斤直銀一兩秋九月支雄攻北中郎將劉演於廩丘為演所敗演將軍韓𢎞潘良襲頓丘克之斬勒所署太守邵攀支雄追擊𢎞等殺潘良于廩丘冬十月劉琨遣樂平太守焦球攻勒常山斬太守邢泰琨司馬温嶠西討山胡勒將逯明要之敗嶠於潞城勒以幽冀漸平始命州郡閲實人户口每户出帛二疋穀二斛勒將陳午以浚儀叛勒逯明攻甯黑於荏平降之因破東燕酸棗而還徙降人二萬餘户于襄國建興三年秋七月勒使將軍葛薄冦陷濮陽殺太守韓𢎞九月劉聰使大鴻臚范龕持節策命勒賜以弓矢加崇為陜東伯得専征伐拜封刺史將軍守宰列侯歳盡集上署勒長子興為上黨國世子加翼軍將軍為驃騎副貳劉琨遣王旦攻中山逐勒所署太守秦固勒將劉勔拒之旦敗勔執之於望都闗建興四年夏四月勒襲浚假署綏節將軍邵續於樂陵續盡衆逆戰敗走以孤危無援權附於勒勒以續子乂為都䕶既而浚所假署渤海太守東萊劉𦙍棄郡依續謂續曰凡立大功必仗大義君晉之忠臣奈何從賊以自汚乎夫田單包胥齊楚之小吏爾猶能存已滅之邦全喪敗之國今將軍仗精鋭之衆居全盛之勢如何墜將成之功于一簣委忠信之人于豺狼乎且項羽袁紹非不强也髙祖縞冠人應如響曹公奉帝而諸侯綏穆何者葢順逆之理殊自然之數定也況凶人惡𩔖屯結無賴雖有吞噬之威終有庖宰之患而欲托根結援無乃殆哉續曰若如君言計將安出𦙍曰琅邪王以聖徳欽明創基江左中興之隆可企踵而待今為將軍計莫若抗大順以激義士之心奉忠正以勵軍人之志夫機事在密時至難違存亡廢興在此舉矣會叚匹磾在薊以書邀續同歸江東續從之其下皆曰今棄勒歸匹磾其如乂何續泣曰我出身為國豈得顧子而為叛臣哉殺異議者數人遣劉𦙍還江東舉兵叛勒勒聞之大怒殺乂遣兵圍續續懼求救于匹磾磾遣弟文鴦救之文鴦未至勒已率八千騎圍續勒素畏鮮卑及聞文鴦至乃棄攻具東走續與文鴦追勒至安陵不及虜勒所署官并驅三千餘家又遣騎人散勒北邊掠常山二千餘家勒大敗而還章武人王脊起兵于科斗壘擾亂勒河間渤海諸郡南和令趙領等率廣川渤海千餘家背勒歸之勒以揚武將軍張夷為河間太守㕘軍臨深為渤海太守各率步騎三千以鎮撫之使長樂太守程遐屯于昌亭為之聲援徙平原烏丸展廣劉哆等部落三萬餘户于襄國使虎襲乞活王平于梁城敗績而歸五月劉琨將討勒復以劉演為輔國將軍魏郡太守領勇士千餘人行北中郎將兖州刺史鎮廩丘勒率衆攻之演出拒戰勒退支雄逯明擊甯黑于東武陽陷之黑赴河而死徙其衆萬餘于襄國虎圍劉演于廩丘演求救于邵續續使文鴦救演虎退至盧闗津以避之文鴦弗能進屯于景亭兖豫豪右張平等起兵救演虎夜棄營設伏於外揚聲將歸河北平等以為信然入于空營虎迴擊敗之廩丘陷没演奔文鴦軍獲演弟啓送于襄國勒以琨撫存其母徳之賜啓田宅令儒官授之以經六月大蝗食百草無遺秋七月河東平陽大蝗中山常山尤甚中山丁零翟鼠叛勒攻中山常山勒率騎討之獲其母妻而還鼠保子胥闗遂奔代郡冬十月勒攻樂平太守韓據于坫城據請救於劉琨琨自以士衆新合欲因其鋭氣討勒將軍姬澹衛雄諫曰此雖晉民乆淪異域未習明公之威信難以法御恐其難用今内收鮮卑之餘穀外抄胡賊之牛羊且閉闗守險務農息兵待其服化感義然後用武則功可立也琨不從悉發其衆命姬澹率步騎二萬為前驅琨屯廣牧為之聲援勒聞澹至將逆擊之或諫曰澹兵馬精盛其鋒不可當不若且引兵避之深溝髙壘以挫其鋭攻守勢殊必獲萬全勒曰澹大衆逺來體疲力竭犬羊烏合號令不齊可一戰而擒之何强之有今冦敵垂至胡可捨去大軍一動豈易中還若澹乗我之退而追逼之顧逃潰不暇焉得深溝髙壘乎此為不戰而自滅亡之道也立斬諫者以孔萇為前鋒都督令三軍後出者斬勒先據險要設疑兵于山上前分二伏出輕騎與澹戰偽為不勝收衆而北澹縦兵追之入于伏中前後伏發遂夾擊之澹軍大敗獲鎧馬萬計澹帥千餘騎奔代郡韓據棄城奔劉琨并土震駭十一月司空長史李𢎞以并州降勒劉琨進退失據不知所為叚匹磾遣信邀之己未琨率衆従飛狐奔叚匹磾勒分徙陽曲樂平户于襄國置守宰而還孔萇追姬澹于桑乾至于代郡殺之十二月勒遣兼長史張敷獻捷于劉聰勒征樂平南和令趙領復合廣川平原渤海河間數千户奔于邵續勒攻下冀州諸縣以右司馬程遐為寧朔將軍監冀州七郡諸軍事司冀并兖州流民數萬户在遼西迭相招引民不安業孔萇等攻馬嚴馮䐗乆而不下勒問計于張賔賔曰馮䐗等本非明公之深仇遼西流民皆有戀本之思今宜班師息甲差選良牧守任之以龔遂之事不拘常制奉宣仁澤揚威奮武則幽冀之冦可翹足而靜遼西流民將相率而至矣勒曰右侯之計是也召萇等歸以武遂令李回為易北督䕶振武將軍兼髙陽太守馬嚴士衆多李潛軍人回先為潛府左長史素服回威徳多叛嚴歸之嚴以部衆離二懼奔於幽州赴水而死馮䐗率衆降勒回徙居易京流民降者歳常數千勒甚嘉之封回弋陽子邑三百户加賔邑一千户進位前將軍固辭不受晉元帝建武元年夏六月勒遣石虎圍祖逖於譙城晉南中郎將王含遣㕘軍桓宣救之未至虎已為逖所敗已巳帝𫝊檄天下曰逆賊石勒肆虐河朔逋誅厯載游䰟縦逸復遣凶黨石虎犬羊之衆越河南渡縦其鴆毒平西將軍祖逖帥衆討擊應時潰散今遣車騎將軍琅邪王裒等九軍鋭卒三萬水陸四道徑造賊塲受逖節度有能梟虎首者賞絹三千疋金五十斤封縣侯食邑三千户又賊黨能梟送虎首封賞亦同之秋七月大旱河朔大蝗初穿地而生二旬則化狀若蠶七八日而卧四日蜕而飛彌亘百里唯不食三豆及麻并冀青雍等四州尤甚勒又競取百姓禾時人謂之胡蝗虎濟自長夀津冦陷梁國内史荀闔死之時劉琨與叚匹磾期共討勒匹磾推琨為大都督㰱血載書檄其兄遼西公疾陸眷及叔父涉復辰弟末杯等俱集襄國琨匹磾進屯固安以會衆軍勒使㕘軍王續齎金寶遺末杯以間之末杯既思有以報勒又忻于厚賂乃説辰眷等曰以父兄而從子弟恥也且幸而有功匹磾獨收之吾屬何有哉各引兵還琨匹磾遂以勢弱不能獨留亦退如薊邵續使兄子濟攻勒渤海虜三千餘人八月劉聰將趙固以洛陽歸晉恐勒襲之遣㕘軍髙少奉書推崇勒請師討聰勒以大義讓之固深恚恨與郭黙攻掠河内汲郡九月勒殺京兆太守華輯冬十月虎攻臨淮平原内史劉遐棄郡走遐性果毅尤便弓馬開豁勇壯值天下亂遂為塢主每擊賊率壯士陷堅摧鋒莫此當時方之飛羽邵續深器異之以女妻焉壁于河濟之間遐妻驍果有父風遐為虎所圍妻單將數騎拔遐出于萬衆之中其後田防等欲為亂遐妻止之不従乃密起火燒營甲仗多盡太興元年春正月遼西公疾陸眷卒其子幼叔父截附真自立為單于夏四月乙酉西平地震如雷叚末杯殺截附真紀事本末作涉復辰立忽跋隣為單于叚匹磾自幽州攻末杯末杯率衆迎擊匹磾而敗走之匹磾奔還幽州太尉劉琨子羣為末波所執末波厚禮之許以琨為幽州刺史共結盟而襲匹磾密遣使齎羣書請琨為内應為匹磾邏騎所得琨時屯故征北府小城不知也因來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公爾琨曰與公同盟志奬王室仰憑威力庶雪國家之恥若兒書密達亦終不以一子之故負公而忘義也匹磾雅重琨初無害琨意將聴還屯中弟叔軍好學有智謀為匹磾所信任謂匹磾曰吾胡夷爾所以能服晉人者畏吾衆也今我骨肉搆禍是其良圖之日若有奉琨以起者吾族盡矣匹磾遂留琨被拘經月其所署代郡太守辟閭嵩與琨所署鴈門太守王據後將軍韓據左長史楊橋等連謀密作攻具欲襲匹磾而韓據女為匹磾兒妾聞其謀而告之匹磾於是執王據辟閭嵩及其徒黨悉誅之㑹王敦密使匹磾殺琨匹磾又懼衆反已遂稱有詔收琨琨聞敦使至謂其子曰處仲使來而不告我是殺我也死生有命但恨讐恥不雪無以下見二親爾因欷歔不能自勝匹磾稱詔遂縊殺之并殺其子姪四人琨將佐相繼降勒末杯遣弟騎督擊匹磾於幽州匹磾率其部衆數千將奔邵續勒將石越要之於鹽山大敗之匹磾退保幽州越中流矢死勒為之屏樂三月贈越平南將軍曹嶷據有青州五月叛漢歸晉又以建康懸逺勢援不接懼勒襲之復遣使通和于勒勒授嶷東州大將軍青州牧封琅邪公秋七月劉聰疾甚驛召勒為大將軍録尚書事受遺詔輔政勒固辭乃止尋又遣使持節署勒大將軍持節鉞都督侍中校尉幽冀二州牧公如故増封十郡勒辭不受八月劉聰死子粲嗣位治兵于上林將謀討勒大將軍靳準殺粲于平陽勒命張敬率騎五千為前鋒討凖勒統精鋭五萬繼之進據襄陵北原羌羯降者四萬餘落凖數挑戰勒堅壁以挫之是時冀徐青三州大蝗冬十月劉曜自長安屯于蒲阪復僭偽號署勒大司馬大將軍加九錫増封十郡并前十三郡進爵趙公勒召幽冀之衆十餘萬人造攻車飛梯進攻凖於平陽小城晉遣騎萬五千曳柴揚塵曀於山谷尋汾州向平陽内外擊之勒師敗績俄而平陽大户周置等帥雜户五一作六千降勒巴帥及諸羌羯降者十餘萬落勒皆徙之於所部郡縣十一月斬凖使侍中卜泰送乗輿服御請和於勒勒與劉曜競有招懐之計乃囚泰送曜使知城内無歸曜之意以挫其軍勢曜潛與泰結盟使還平陽宣慰諸屠各勒疑泰與曜有謀欲斬泰以速降之諸將皆曰今斬卜泰凖必不復降就令泰宣漢要盟于城中使相率誅靳凖凖必懼而速降矣勒初未許乆之乃從諸將議遣之十二月泰入平陽與凖左右車騎將軍喬泰馬忠王騰衛將軍靳康等起兵殺凖推尚書令靳明為主因遣卜泰及卜𤣥奉𫝊國六璽降曜勒大怒遣令史羊升使平陽責明殺凖之狀明怒斬升勒怒甚進軍攻明明出戰勒擊敗之枕尸二里明築城門堅守不復出戰是年晉彭城内史周撫殺沛國内史周黙帥衆降勒勒檄虎率幽冀州兵會攻平陽靳明屢敗遣使求救于漢劉曜遣征東將軍劉暢征北將軍劉雅鎮北將軍劉策救之勒命舍師于蒲上明率平陽士女萬五千人奔漢勒焚平陽宫室使裴憲石㑹修復永光宣光二陵收漢主粲已下百餘口葬之置戍而歸徙渾儀樂器于襄國時劉曜西奔粟邑平陽已東地盡為勒有勒於離石縣荒廢處置永石郡又别置武鄉郡十六國春秋卷十二
