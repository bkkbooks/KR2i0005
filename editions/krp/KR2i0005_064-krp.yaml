body:
  text: 十六國春秋卷六十四南燕錄二慕容超慕容超字祖明備德兄北海王納之子也納一作汭納沈靜深邃外訥内敏苻堅破鄴以納為廣武太守數嵗去官與母公孫氏就弟備德家於張掖備德從堅南征留金刀辭母而去備德與燕王垂起兵於山東張掖太守苻昌收納及備德諸子皆誅之公孫氏以老獲免納妻段氏以懷娠未决囚之於郡獄獄掾呼延平備德之故吏也嘗有死罪備德免之竊將公孫氏及段氏逃於𦍑中段氏生超年十嵗而公孫氏病臨死授超以金刀曰聞汝伯已中興於鄴都吾朽病將没相見理絶若天下太平汝得東歸當以此刀還汝伯也呼延平又將超母子奔於吕光及吕隆降秦超又隨凉州民徙於長安未幾平卒超號慟經旬超母謂之曰吾母子得全濟者呼延氏之力也惠而不報天不佑人平今雖死吾欲為汝納其女以荅厚恩於是娶之超至長安自以諸父在東恐為秦人所録乃陽一作佯狂行乞於市秦人賤之惟東平公姚紹見而異焉言於姚興曰慕容超姿幹瓌偉殆非真狂願微加爵祿以羈縻之興召見與語超深自晦匿故為謬對或問而不答興大鄙之因謂紹曰諺云妍皮不裹癡骨徒妄語耳乃罷遣之由是得往來無禁濟隂人宗正謙善卜相西至長安賣卜於路超行而見之因就謙相謙奇其姿貌超乃内斷於心備德聞納有遺腹子在秦遣濟隂呉辯潛往視之辯因宗正謙以告超超不敢告母妻潛變姓名與謙俱歸至諸闗禁自稱張伏生二十日始達梁父及至廣固呈以金刀具宣祖母臨終之言備德撫之號慟超身長八尺腰帶九圍精彩秀發容止可觀姿器魁傑有𩔖備德備德甚加禮遇始名之曰超封北海王拜侍中驃騎大將軍司隸校尉開府置吏妙選時賢為僚佐備德無子欲以超為嗣乃為超起第於萬春門内朝夕觀之超亦深達備德㫖入則盡歡承奉出則傾身下士由是内外譽望翕然歸美焉未幾立為太子備德既死超遂以晉義熙元年僭嗣偽位大赦境内殊死已下改元太上尊備德后段氏為皇太后以北地王鍾為都督中外諸軍錄尚書事海南王法為征南大將軍都督徐兗揚南兗四州諸軍事加桂陽王鎮開府儀同三司以尚書令封孚為太尉鞠仲為司空樂浪王惠為司徒潘聰為左光祿大夫段宏為右光祿大夫封嵩為尚書左僕射濟陽王凝為右僕射自餘文武拜授各有差超復引公孫五樓任為腹心乃其所親信也備德故大臣段宏及北地王鍾等皆不自安求補外職乃以宏為徐州刺史鍾為青州牧時以公孫五樓為武衞將軍領屯騎校尉内參政事太尉封孚言於超曰臣聞親不處外羈不處内載記作五大不在邊五細不在内鍾國之宗臣社稷所賴宏外戚懿望百姓具瞻正應參翼百揆不宜逺鎮外方今鍾等出藩五樓内輔臣竊未安超新即位忌鍾等權逼以問五樓五樓欲專擅朝政不欲鍾等在内屢有間言孚說竟不行鍾宏皆不能平相謂曰黄犬之皮恐當終補狐裘也五樓聞之嫌隙漸搆太上二年夏無雲而雷秋八月先是超自長安行至梁父南海王法時為兗州刺史鎮南長史悅壽還謂法曰向見北海王子天資𢎞雅神爽高邁始知天族一作天授多竒玉林皆寳法曰昔成方遂詐稱衛太子人莫辯之安知非此族乎超聞而恚忿形於言色法亦怒處之外館超既與法有隙結憾彌深及備德死法又不奔喪至是超遣使讓之法常懼禍至遂與北地王鍾徐州刺史段宏等謀反超知而徴之法與鍾並稱疾不赴收其黨侍中河間王統右衛將軍東陽王根散騎常侍段封誅之車裂左僕射封嵩嵩弟西中郎將封融奔魏超尋遣桂陽王鎮等攻鍾於青州闕二字王昱等攻段宏於徐州右僕射濟陽王凝及中書令韓範攻法於兗州一作梁父昱等攻㧞莒城段宏奔魏封融又集羣盜襲石城塞殺鎮西大將軍餘鬱青土振懼人懷異議凝將謀殺韓範襲擊廣固範潛知之勒兵攻凝凝奔梁父範并將其衆進攻梁父克之凝出奔秦法出奔魏桂陽王鎮攻㧞青州鍾殺其妻子為地道而出與高郡公始單馬奔秦於時超不恤政事惟畋遊是好變更舊制朝野失望百姓苦之僕射韓􅒲切諫不納冬十月太尉封孚卒超又欲議復肉刑九等之選乃下書於境内曰陽九數躔永康多難自北都傾䧟典章淪滅律令法憲靡有存者綱理天下此焉為本既不能道之以德必須齊之以刑且虞舜大聖猶命咎繇作士刑之不可以已也如是先帝季興大業草創兵革尚繁未遑修制朕猥以不德嗣承大統撫御寡方致蕭墻釁發遂戎馬生郊典儀寢廢今四境無虞所宜修定尚書可召集公卿至如不忠不孝若封嵩之輩梟斬不足以痛之宜致烹轘之法亦可附之條律納以大辟之科肉刑者乃先聖之經不刋之典漢文易之輕重乖度今犯罪彌多死者稍衆肉刑之於化也濟育既廣懲慘尤深光壽建熙中二祖已議復之未及而晏駕其令博士已上參考舊事依吕刑及漢魏晉律令消息增損議成燕律五刑之屬三千而罪莫大於不孝孔子曰非聖人者無法非孝者無親此大亂之道也轘裂之刑烹煮之戮雖不在五刑一作品之例然亦行之自古渠彌之轘著之春秋哀公之烹爰自中代世宗都齊亦愍刑罰失中咨嗟寢食王者之有刑糾猶人之有左右手焉故孔子曰刑罰不中則民無所措手足是以蕭何定法令而受封叔孫通以制儀為奉常立功立事古之所重其明議損益以成一代凖式周漢有貢士之條魏立九品之選二者孰愈亦可詳聞羣下議多不同乃止十二月丁未熒惑太白皆入於羽林又合於壁占曰燕亡是年高句驪遣使獻千里馬生熊皮障泥於超超大悅荅以水牛能言鳥太上三年春正月超冦淮北徐州至下邳秋七月遣御史中丞封愷使於秦超母妻既先在長安為姚興所拘質至是使愷請焉愷至於秦秦主興曰昔苻氏之敗太樂諸伎悉入於燕燕今稱藩送伎若不可使送呉口千人所請乃可得也愷還超下書使羣臣詳議左僕射段暉曰太上囚楚高祖不廻今陛下嗣守社稷不宜以私親之故遂降尊號且太樂諸伎皆是前世伶人一作先代遺音不可與彼使移風易俗不如掠呉口與之尚書張華曰若使侵掠呉邊必成隣怨此既能往彼亦能來兵連禍結非國家之福也昔孫權重黎庶之命屈已以臣魏惠施惜愛子之頭捨志以尊齊況陛下慈親在人一云慈德在秦掌握方寸崩亂豈可靳惜虛名不為之降屈乎宜暫降統天之號以申至孝之情權變之道典謨所許中書令韓範智能廻物辯足傾人昔與姚興俱為苻氏太子舎人可遣將命降號修和必得如志所謂屈於一人之下伸於萬人之上也超大悅曰張尚書得吾心矣遂遣韓範聘於姚興奉表稱藩範至長安興見之謂曰封愷前來燕王與朕抗禮今卿至也欵然而附為依春秋以小事大之義為當專以孝敬為母屈也範曰昔周爵五等公侯異品小大之禮因之而生今陛下命世龍興光宅西秦本朝主上承祖宗遺烈定鼎東齊中分天曜南面並帝通聘結好義尚謙冲使至矜誕茍折行人殊似呉晉爭盟滕薛競長恐傷大秦堂堂之盛有損皇燕巍巍之美彼我俱失竊未安之興怒曰若如卿言便是非為大小而來範曰雖由大小之義亦由寡君純孝過於重華願陛下體敬親之道沛然垂慈愍之心興曰吾久不見賈生自謂過之今不及矣於是為範設舊交之禮申叙平生謂範曰燕王在此朕亦見之風表乃可於機辯未也範曰大辯若訥聖人美之況爾日龍潛鳳戢和光同塵若使負日月而行則無繼天之業矣興笑曰可謂使乎延譽者也範乘間逞說興乃大悅賜範千金許以超母妻還之時濟陽王凝自梁父奔秦言於興曰燕王稱藩本非推德權為母屈耳古之帝王尚興師徴質豈可虛還其母乎母若一還必不復臣也宜先質一作制其送伎然後歸之興意乃變因謂範曰朕歸燕王家屬必矣然今天時尚熱當俟秋涼八月秦使兼員外散騎常侍韋宗來聘超與羣臣議見宗之禮張華曰陛下前既奉表今宜北面受詔封逞曰大燕七聖重光奈何一旦為豎子屈節超曰朕為太后屈願諸君勿言遂北面受詔贈宗以千金冬十月遣左僕射張華給事中宗正元入秦報聘并送大樂伎一百二十人興大悅延華入讌酒酣樂作秦黄門侍郎尹雅謂華曰昔殷之將亡樂師歸周今皇秦道盛燕樂來庭廢興之兆見於此矣華曰自古帝王為道不同權譎之理會於功成故老子曰將欲取之必先與之今總章西入必由余東歸禍福之驗此其兆乎興怒曰昔齊楚競辯二國興師卿乃小國之臣何敢抗衡朝士華遜辭曰奉使之始實願交歡上國上國既遺小國之臣辱及寡君社稷臣亦何心而不仰酬興善之於是還超母妻厚其資禮而遣之十一月張華發長安宗正元先馳反命超大悅遣征虜將軍公孫五樓率騎二千迎於境上超親率六宫迎之於馬耳闗太上四年春正月超以母妻之歸大赦境内殊死已下追尊父北海穆王納為穆皇帝立母段氏為皇太后居長樂宫妻呼延氏為皇后祀於南郊柴燎爓起而烟不出靈臺令張光私告人曰今火盛而烟滅國其亡乎超將登壇有獸大如馬狀𩔖鼠而色赤集於圜丘之側俄而不知所在須臾大風暴起天地晝昏其行宫羽儀帷幄盡皆壞裂超懼宻問太史令成公綏綏曰陛下信用姦臣誅戮賢良賦歛煩多事役殷苦之所致也超懼大赦譴責公孫五樓等俄而復用之是嵗廣固地震天齊水湧井水溢汝水竭河濟凍合而澠水不冰超惡之問於太史令李宣宣曰澠水無冰良由逼帶帝京近日故也超大悅賜宣朝服一具高句驪復遣使至獻千里人十人千里馬一疋兗州人王滿一作蒲率衆二千來降獻美女馬馬鬛去地九寸拜滿長水校尉封廪丘公太上五年春正月正旦超朝會羣臣於東陽殿聞樂作歎音佾不備悔送伎於秦遂議入冦掠晉人以補伎領軍將軍韓􅒲載記作韓謨諫曰先帝以舊京傾没戢翼三齊茍時運未可上智輟謀今陛下嗣守成䂓宜閉闗養銳以伺賊隙恢復先業而更結怨南隣廣樹仇釁可乎超曰我計已定不與卿言二月遣將軍慕容興宗斛糓提公孫歸等率騎冦宿豫㧞之陽平太守劉千載濟隂太守徐阮竝為所執大掠而歸簡男女二千五百付太樂教之時公孫五樓為侍中尚書令左衛將軍專總朝政宗族親戚並居顯要夾輔左右王公内外無不憚之超論宿豫之功封兄公孫歸為冠軍將軍常山公叔父公孫頽為武衛將軍興樂公斛榖提等並為郡縣公桂陽王鎮諫曰臣聞懸賞待勲非功不侯今公孫歸結禍延兵殘賊百姓陛下封之無乃不可乎夫忠言逆耳非親不發臣雖庸朽忝國戚藩輒盡愚欵惟陛下圖之超怒不答自是百僚杜口莫敢開言尚書都令史王儼謟事五樓遷尚書郎出為濟南太守入為尚書左丞時人為之語曰欲得侯事五樓又遣公孫歸等率騎三千入冦南陽載記作濟南執太守趙光一作元俘掠男女千餘人而還夏四月晉丞相劉裕率舟師北伐以丹陽尹孟昶監中軍留府事署劉敬宣中軍諮議參軍加冠軍將軍浮淮入泗五月進至下邳留船艦輜重步軍進至琅邪所過築城留守或謂裕曰燕人若嚴守大峴或堅壁清野大軍深入無所資糧不惟無功何能自反裕曰不然吾慮之熟矣鮮卑貪婪畧不及逺既幸其勝且愛其榖一云惟利虜獲退惜禾苗謂我孤軍深入不能持久不過進據臨朐退守廣固必不能守險清野師一入峴吾何患焉敢為諸君保之超聞有晉師引見羣臣於東陽殿會議拒師之䇿征虜將軍公孫五樓曰呉兵輕果所利在速戰初鋒勇鋭不可與爭宜據大峴使不得入曠日延時阻其銳氣然後徐簡精騎二千循海而南絶其糧運别敕段暉率兗州之衆緣山東下腹背擊之此上䇿也各命守宰依險自固校其資儲之外餘悉焚蕩芟除禾苗使寇至無資堅壁清野以俟其釁彼僑軍深入士卒無食求戰不得旬日之間可以坐制此中䇿也縱賊入峴出城逆戰此下䇿也超曰吾京都殷盛戸口衆多非可以一時入守青苗布野非可以卒芟今嵗星居齊以天道推之不戰自克客主勢殊以人事言之彼逺來疲敝勢不能久吾據五州之彊帶山河之固戰車萬乘鐵馬萬羣麥禾布野奈何芟苖徙民先自蹙弱乎設使芟苗城守以全性命朕所不能不如縱令過峴至於平地徐以鐵騎衝之衝一作踐此成禽耳輔國將軍廣甯王寗一作寧賀賴盧苦諫不從退謂五樓曰上不用吾計亡無日矣太尉桂陽王鎮曰若如聖㫖必須平原用馬為便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔安成君不守井陘之闗終屈於韓信諸葛瞻不據束馬之險卒禽於鄧艾臣以為天時不如地利阻守大峴䇿之上也超又不從鎮出謂韓􅒲曰主上既不能逆戰却敵又不肯徙民清野延敵入腹坐待攻圍酷似劉璋矣今年國滅吾必死之卿等中華之士復為文身乎超聞之大怒收鎮下獄乃攝莒城梁父二戍修城隍簡士馬蓄精銳以待之劉裕過大峴超兵不出乃舉手指天喜形於色曰吾事濟矣左右曰公未見敵而先喜何也裕曰兵已過險士有必死之志餘糧棲畝軍無匱乏之憂虜已入吾掌中勝可必矣六月己巳裕師次東莞超留羸老守廣固遣左將軍段暉輔國將軍賀賴盧征虜將軍公孫五樓等將步騎五萬進據臨朐既聞晉軍之盛大懼自率步騎四萬就暉等於臨朐臨朐有巨蔑水去城四十里超謂公孫五樓曰今宜進據川源晉軍至而失水亦不能戰矣五樓馳騎據之及至裕前鋒通典作龍驤將軍孟龍符領騎居前已據川源五樓戰敗而還裕以車四千乘為左右翼方軌徐進車張幰御者執矟以騎為遊軍軍令嚴肅比及臨朐超兵四面而至裕命劉敬宣與兗州刺史劉藩并州刺史劉道憐等拒之戰於臨朐南日已向昃勝負未決參軍胡蕃言於裕曰燕悉兵出戰臨朐城中留守必寡今以竒兵從間道往取其城而斬其旗幟此韓信所以破趙也裕乃遣蕃及諮議參軍檀韶建威將軍向彌潛師出燕兵之後襲攻臨朐聲言輕兵自海道至矣彌擐甲先登遂㧞之斬其牙旗超大懼單騎奔段暉於城南裕因縱兵奮擊暉衆大敗裕軍斬暉等大將十餘人超奔還廣固裕軍獲其玉璽御輦豹尾等乘勝逐北直至廣固彌又先登丙子克其大城超徙郭内人入保小城裕築長圍守之圍高三丈穿塹三重撫納降附採㧞賢俊華夷大悅因齊地糧儲悉停江淮漕運六月超使尚書郎張綱乞師於秦赦桂陽王鎮進錄尚書都督中外諸軍事引見謝之且問計於羣臣曰朕嗣守成業不能委賢任善而專固自由覆水不收悔將何及智士逞謀必在事危忠臣立節亦在急難諸君其勉思六竒共濟艱運鎮曰百姓之心係於一人今陛下躬率六軍身先奔敗羣臣離心士卒喪氣内外之情不可復恃如聞西秦自有内患恐不暇分兵救人正當更決一戰以爭天命散卒還者尚有數萬可悉出金帛宫女餌令一戰若天命助我必能破賊如其不濟死亦未晩不可閉門坐受圍擊司徒樂浪王惠曰不然晉軍乘勝氣勢百倍吾以敗軍之將禦之不亦難乎秦雖與勃勃相持不足為患且二國連横勢如唇齒今有冦難秦必救我但自古乞援不遣大臣則不能得重兵是以趙隸三請楚師不出平原一使援至從成尚書令韓範德望具瞻燕秦所重宜遣乞援以濟時艱超於是從惠計復遣韓範與王簿乞師於秦超尚書畧陽桓遵及弟京兆太守桓苖苗或作留踰城出降遵苗皆超所委任以為心腹者也或有竊告裕軍曰燕人張綱有巧思若得張綱為攻具者廣固乃可㧞也秋七月綱自長安還太山太守申宣執之送之於裕先是裕嘗修攻具城上人曰汝不得張綱何能為也及至升諸樓車以示之使周城呼曰劉勃勃大敗秦軍無兵相救城内莫不失色劉毅遣上黨太守趙恢以千餘人援裕裕夜潛遣軍會之明旦恢衆五千方道而進每晉使將到輒復如是北方之民執兵負糧歸裕者日以千數裕圍城益急超既求救不獲綱反見虜甚怒乃引伏弩射之裕軍少退左僕射張華中丞封愷並為裕所執裕令華愷與超書勸令早降超乃遺裕書請為藩臣割大峴以南地為界并獻馬千匹以通和好不聽江南繼兵相尋而至八月封融詣裕軍降九月尚書張俊自秦還亦降於裕因說裕曰燕人所以固守者外仗韓範冀得秦援範既時望又與姚興相昵若勃勃敗後秦必救燕宜宻信誘範㗖以甘言重利範來則燕人絶望自然降矣裕從之表範為散騎常侍且遺範書以招之時姚興遣將軍姚强率步騎一萬隨範就姚紹於洛陽并兵來援因遣使謂裕曰慕容氏相與隣好今晉攻之以窮告急秦已遣鐵騎十萬遥屯洛陽晉軍不還便當長驅而進矣裕呼秦使者謂之曰語爾姚興我克燕之後息兵三年當取闗洛虜能自送便可速來今其時矣錄事參軍劉穆之聞有秦使馳入見裕而秦使者已去裕以所言告穆之穆之尤之曰日常事無大小必賜預謀此宜善詳云何遽爾答之此言不足威敵適足以怒之若廣固未㧞西𦍑奄至不審明公何以待之裕笑曰此是兵機非卿所解故不以相語耳夫兵貴神速彼若審能赴救必畏我知寧容先遣信命逆設此言是自張大之辭也晉師不出為日久矣𦍑見伐齊殆將内懼自保不暇何能救人邪會姚興為勃勃所敗追强還兵韓範歎曰天滅燕矣長水校尉王滿勸範奔秦範曰劉裕起布衣誅桓𤣥復晉室今興師伐燕所向崩潰此殆天授非人力也燕亡則秦為之次矣吾不可以再辱會得裕書遂降於裕裕謂範曰卿欲立申包胥之功何以虛還也範曰自亡祖司空世荷燕寵故泣血秦庭冀匡禍難屬西朝多故丹誠無效可謂天喪敝邑而贊明公智者見機而作敢不至乎翼日裕將範循城城中人情離駭無復固志裕謂範曰卿宜至城下告以禍福範曰雖䝉殊寵猶未忍謀燕裕嘉之而不强左右勸超誅範家以止後叛超知敗在旦夕又以其弟􅒲盡忠無二並範家赦之冬十月段宏自魏奔裕十二月乙巳太白犯虛危靈臺令張光勸超出降超怒手殺之是嵗東萊雨血廣固城門鬼夜哭太上六年春正月甲寅正旦超登天門朝羣臣於城上殺馬以享將士文武皆有遷授乙卯超幸姬魏夫人從超登城見晉師之盛方奏樂乃握超手而相對泣曲終不已韓􅒲諫曰陛下遭百六之會正當勉力自强以壯士民之志而反對女子悲泣何其鄙也超拭目謝之曰孤以先世基業締造甚艱今外寇如此恐一旦不守是以泣耳尚書令董銑勸超出降超大怒繫之於獄二月輔國將軍賀頼盧征虜將軍公孫五樓為地道出擊晉師晉師不利河間人𤣥文說裕曰昔石虎攻曹嶷瞻氣者以為澠水帶城非可攻㧞若塞五龍口城當自䧟石虎從之而嶷請降降後五日大雨雷電震開後慕容恪之攻圍段龕十旬不㧞塞城而龕降降後無幾又震開之今舊基猶存宜加修築裕從其言塞之超及城内男女悉患脚弱病者大半出降相繼超輦而登城尚書悅壽說超曰天地不仁助冦為虐戰士尫病日就凋隕守困窮城外援絶望天時人事亦可知矣茍厯運有終堯舜避位轉禍為福聖達所先宜追許鄭之蹤以存宗廟之重超歎曰廢興命也吾寧奮劒而死不能銜璧而生於時張綱為裕造衝車覆以板屋被以牛皮并設諸竒巧城上火石弓矢無所施用又為飛樓懸梯木幔之屬遥臨城上攻城之士遂得肆力超大怒懸其母於城上支解之裕圍廣固累月將㧞之夜佐吏並集忽有鳥大如鵝蒼色飛入裕帳坐衆咸駭愕以為不祥參軍胡蕃獨起賀曰蒼黑者胡虜之色鵝者我也胡虜歸我大吉之徵也衆乃大悅丁亥裕悉衆攻城或曰今日往亡不利行師一云今往亡之日兵家所忌裕曰我往彼亡何為不利遂四面急攻之殺傷甚衆廣固鬼夜哭不止有流星長十餘丈隕於廣固悅壽開門納晉軍超與左右數十騎踰城突圍出奔為追軍所執裕數以不降之罪超神色自若一無所言惟以母託劉敬宣而已蕭方等三十國春秋曰美哉其言也言必及親終不忘孝可謂人之將死其言也善乎裕忿廣固久不下欲盡坑之以妻女賞將士韓範諫曰晉室南遷中原鼎沸士民無援强則附之既為君臣必須為之盡力彼皆衣冠舊族先帝遺民今王師弔伐而盡坑之使安所歸乎竊恐西北之人無復來蘇之望矣裕改容謝之然猶斬鮮卑王公已下三千餘人没入家口萬餘以妻女為軍賞夷其城隍獲生口萬餘馬二千疋並獲金鉦輦豹尾舊式猶存送超詣建康市斬之時年二十六在位六年韓範後為劉穆之所惡譖於裕被殺始德以晉安帝隆安四年嵗在庚子僭號居齊土至超二世以晉義熙六年嵗在庚戌為劉裕所滅凡十一年十六國春秋卷六十四
