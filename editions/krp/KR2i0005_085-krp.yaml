body:
  text: 乞伏國仁乞伏國仁隴西鮮卑人也其先有如弗斯引出連叱盧三部自漠北南出太隂山遇一巨蟲於路狀若神龜大如陵阜乃殺馬而祭之祝曰若善神也便當開路若惡神也遂塞不通俄而不見乃有一小兒在焉時又有乞伏部有老父無子者請養為子衆咸許之老父欣然自以為有所依憑字之曰紇干紇干者夏言依倚也年十歳驍勇善騎射彎弓五百斤四部服其雄武推為統主號之曰乞伏可汗託鐸莫何託譯者言非神非人之稱也其後國仁五世祖祐隣者晋泰始初率户五千遷於夏縁部衆稍盛鮮卑鹿結七萬餘落屯於高平川與祐隣迭相攻擊鹿結敗南奔畧陽祐隣盡并其衆因居高平川祐隣死子結權立徙於牽屯結權死子利那立擊鮮卑吐頼於烏樹山討尉遲渴權於大非川并收其衆三萬餘落利那死弟祁埿立祁埿死利那子述延立討鮮卑莫侯於苑川大破之降其衆二萬餘落因居苑川侵併隣部士馬強盛以叔父軻埿為師傅委以國政弗斯引烏埿為左輔將軍鎮蔡園川出連髙胡為右輔將軍鎮至便川叱盧那胡為率義將軍鎮牽屯山述延死子傉大寒立會䂖勒滅劉曜懼而遷於麥田無孤山晋記作元孤山大寒死子司繁立秦皇始中遷於度堅山建元七年秦將益州刺史王綂來伐司繁帥騎三萬拒綂於苑川綂潜襲度堅山部衆五萬餘落悉降於綂司繁歎謂左右曰智不拒敵德不撫衆劍騎未交而本根已敗見衆分散勢亦難全若奔諸部必不我容吾將為呼韓邪之計矣乃擁部落亦詣綂降堅堅大悅署為南單于畱之長安以司繁從叔吐雷為勇士䕶軍撫其部衆俄而鮮卑勃寒侵斥隴右堅以司繁為使持節都督征討西胡諸軍事鎮西將軍討之勃寒懼而請降遂使司繁鎮勇士川甚有威惠司繁卒子國仁立堅興壽春之役徴為前將軍領先鋒騎會國仁叔父歩頹叛於隴右堅遣國仁還討之步頹聞之大喜迎國仁於路國仁置酒髙會攘袂大言曰苻氏徃因趙石之亂遂妄竊名號窮兵黷武跨僣八州疆宇旣寧冝綏以德方虛廣威聲勤心逺畧騷動蒼生疲敝中國違天怒人將何以濟且物極則虧禍盈而覆者天之道也以吾量之是役也難以免矣吾當與諸君共成一方之業及堅敗歸國仁遂廹脅部落有不從者擊而併之衆至十餘萬建義元年苻堅為姚萇所殺國仁謂其豪帥曰苻氏以髙世之資而困於烏合之衆可謂天也夫守常迷運先逹恥之見機而作英豪之舉吾雖薄德藉累世之資豈可覩時來之運而不作乎遂以晋孝武太元十年自稱大都督大將軍大單于領秦河二州牧改秦建元二十一年為建義元年署置官屬以其將乙旃童埿童一作音為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔弟乾歸為上將軍自餘拜授各有差乃分其地置武城武陽安固武始漢陽天水畧陽漒川甘松匡朋白馬苑川十二郡築勇士都城以居之鮮卑匹蘭帥衆五千來降建義二年春正月南安祕宜帥諸𦍑胡五萬餘人來擊四靣而至國仁謂諸將曰先人有奪人之心不可坐待其至宜抑威餌敵羸師以張之軍法所謂怒我而怠㓂也於是勒衆五千襲其不意大敗之祕宜奔還南安秋七月祕宜與其弟莫侯悌眷率衆三萬餘户來降國仁拜秘宜鎮東將軍東秦州刺史悌眷鎮南將軍南梁州刺史建義三年春三月秦苻登遣使署國仁使持節大都督都督雜夷諸軍事大將軍大單于苑川王夏五月國仁帥騎三萬襲鮮卑大人宻貴裕茍提倫等三部於六泉秋七月髙平鮮卑沒弈干東胡金熈連兵來襲相遇于渴渾川大戰敗之斬級三千獲馬五千疋沒弈干及熈奔還三部振懼率衆迎降署宻貴為建義將軍六泉侯裕茍為建忠將軍蘭泉侯提倫為建節將軍鳴泉侯是年國仁造刀一口銘曰建義𨽻書建義四年春三月國仁建威將軍叱盧烏孤䟦擁衆叛保牽屯山國仁率騎七千討之斬其部將叱羅侯降者千餘戶䟦大懼請降復其官爵夏四月討鮮卑越質叱黎於平襄大破之獲其子詰歸弟子復半及部落五千餘人而還六月國仁死在位四年偽謚宣烈王廟號烈祖乞伏乾歸乞伏乾歸國仁之弟也雄武英傑沈雅有度畧國仁死羣臣咸以國仁子公府尚幼宜立長君共推乾歸為大都督大將軍大單于河南王大赦境内改元太初秋七月立妻邉氏為王后署置百官倣漢制以南川侯出連乞都為丞相鎮南將軍南梁州刺史悌眷為御史大夫金城邉苪為左長史東秦州刺史祕宜為右長史武始翟勍為左司馬翟瑥為右司馬畧陽王松壽為主簿從弟軻弹為梁州牧弟益州為秦州牧屈眷為河州牧自餘封拜各有差九月乾歸遷都金城太初二年春正月秦苻登遣使署乾歸為大將軍大單于金城王時晋太元十四年也夏四月南羗獨如率衆七千來降休官阿敦侯年二部各擁五千餘落據牽屯山為其邉害乾歸討破之悉降其衆於是聲振邉疆鮮卑豆畱䩭叱豆渾及南丘鹿結并休官曷呼奴盧水尉地㧞竝率衆來降乾歸皆署其官爵冬十一月枹罕羗彭奚念帥衆來附乾歸以奚念為北河州刺史太初三年夏四月吐谷渾王視連遣使稱臣於乾歸貢其方物乾歸拜視連為沙州牧白蘭王秋九月視連死子視羆立視羆英果有雄畧以其父祖慈仁為四隣所侵嘗從容謂博士騫苞曰易云動静有常剛柔斷矣先王以仁宰世不任威刑所以剛柔靡斷取輕隣敵當仁不讓豈宜拱黙者乎今將秣馬厲兵爭衡中國先生以為何如苞曰大王之言高世之畧秦隴英豪所願聞也於是虛襟撫納衆赴如歸冬十月乾歸遣使拜視羆為使持節都督罷涸已西諸軍事沙州牧白蘭王視羆不受謂使者曰自晋道不綱姦雄競逐劉石虐亂秦燕䟦扈河南王處形勝之地宜當糾合義兵以懲不順奈何私相假署擬僣羣兇寡人承五祖之休烈控弦之士二萬方欲掃氛秦隴清彼沙凉然後飲馬涇渭戮問鼎之豎以一丸泥封東闗閉燕趙之路迎天子于西京以盡遐藩之節終不能如季孟子陽妄自尊大為吾白河南王何不立勲帝室䇿名王府建當年之功畱芳來葉耶使還言之乾歸大怒然惮其彊猶與結好十一月隴西太守越質詰歸㨿平襄叛自稱建國將軍右賢王太初四年春正月乾歸率衆擊詰歸敗之詰歸東奔隴山旣而擁衆來降乾歸以宗女妻之署立義將軍秋七月秦苻登驃騎將軍沒奕干遣使結好以二子為質請共擊鮮卑大兠國乾歸許之遂與沒奕干攻大兠于安陽城大兠退固鳴蟬堡乾歸攻䧟之大兠㣲服遁走收其部衆而還歸沒奕干二子沒奕干尋叛東合劉衞辰八月乾歸率騎一萬討沒奕干沒奕干奔他樓城乾歸射之中目冬十月三河王吕光遣弟右將軍吕寳乘虛攻金城乾歸聞之引還為寳所襲敗於鳴雀峽退屯青岸太初五年秋八月呂寳進攻乾歸乾歸使北河州刺史彭奚念斷其歸路躬貫甲胄連戰敗之寳及將士投河死者萬餘人光又遣子虎賁中郎將吕纂襲擊彭奚念纂復敗績奔遁太初六年春正月休官權千成為秦所逼遣使請降乾歸署為東秦州刺史休官大都統顯親公夏六月乾歸立其子熾磐為太子熾磐勇畧明决過於其父太初七年春正月秦苻登遣使署乾歸假黄鉞大都督都督隴右河西諸軍事左丞相大將軍河南王領秦梁益凉沙五州牧加九錫之禮夏六月苻登為姚興所逼遣其子汝隂王崇為質於乾歸請救進封乾歸梁王命置官司納其妹東平長公主為梁王后乾歸遣前將軍乞伏益州冠軍將軍翟瑥率騎士二萬救之聞登為秦所殺引還冬十月秦苻崇為乾歸所逐奔隴西王楊定定畱司馬邵疆守秦州率歩騎四萬與崇共攻乾歸乾歸遣凉州牧軻弹秦州牧益州立義將軍詰歸率騎三萬拒之具翟瑥傅益州與定戰敗於平川軻弹詰歸欲引兵退冠軍翟瑥奮劍止之軻弹率騎往赴益州詰歸亦勒兵繼進定遂大敗斬定及崇首虜萬七千級於是盡有隴西巴西之地太初八年春正月乾歸自稱秦王赦其境内殊死已下以太子熾磐領尚書令出連乞都為丞相左長史邉芮為尚書左僕射右長史袐宜為右僕射翟瑥為吏部尚書翟勍為主客尚書杜宣為兵部尚書王松壽為民部尚書樊謙爲三公尚書方𢎞麴景爲侍中自餘拜授皆如魏武晋文故事然猶稱大將軍大單于邉芮等領府佐如故夏四月索虜秃髪如茍率戸二萬來降乾歸妻以宗女六月遷都於西城秋七月三河王吕光率衆十萬來伐左輔將軍宻貴周右衞將軍莫者羖羝言於乾歸曰光旦夕將至陛下以命世雄姿開業洮罕剋剪羣凶威振遐邇將鼔淳風於東夏建八百之鴻慶不忍小屈與姦豎競於一時若機事不㨗恐非國家之利也宜遣愛子以退之乾歸乃稱藩於光遣子勅勃載記作勃勃為質旣而悔之殺貴周及羖羝大初九年春正月休官權萬世帥衆來降冬十月凉州牧乞伏軻弹與秦州牧乞伏益州不平軻弹奔凉是歳乾歸所署立義將軍越質詰歸帥戸二萬叛降於秦顯親公權千成帥衆攻秦上邽不克退保畧陽姚碩德撃之千成亦降太初十年春正月凉王呂光以乾歸數反覆舉兵來伐使呂延爲前鋒羣臣咸勸其東奔成紀以避其銳乾歸不從謂諸將曰昔曹孟德敗袁本初於官渡陸伯言摧劉𤣥德於白帝皆以權畧取之軍之勝敗在於巧拙不在衆寡光雖舉全州之軍而無經逺之畧不足惮也且其精銳盡在吕延延勇而無謀易以奇䇿制之延軍若敗光亦遁還乘勝追奔可以得志衆咸曰非所及也二月光軍於長最遣子吕纂帥步騎三萬攻金城乾歸率衆二萬救之未至纂等㧞金城光别將梁恭等以甲卒萬餘出陽武下峽與秦州刺史沒奕干攻其東以為犄角之勢呂延以枹罕之衆攻䧟臨洮武始河闗乾歸泣謂諸將曰今事勢窮踧逃命無所死中求生正在今日凉軍雖四靣而至然相去遼逺山河旣阻力不周接敗其一軍衆軍自退乃縱反間紿延稱秦王乾歸衆潰東奔成紀延信之引騎輕進遂大敗之斬延於陣夏六月乾歸徴北河州刺史彭奚念為鎮衞將軍以鎮西將軍屋列破光一作屋𢎞為河州牧定州刺史翟瑥為晋興太守鎮枹罕冬十月秦長水校尉姚珍來奔乾歸以女妻之太初十一年春正月乾歸遣秦州牧益州攻凉支陽鸇武允吾三部皆克之虜萬餘人而還夏六月禿髪烏孤遣使來結和親凉散騎常侍郭黁來奔乾歸以爲建忠將軍兼散騎常侍秋九月乾歸遣秦州牧益州武衞將軍慕兀載記作慕容允冠軍將軍翟瑥率騎二萬伐吐谷渾冬十月益州等與吐谷渾王視羆戰於度周川大破之視羆退保白蘭山遣使謝罪貢其方物以子宕豈為質乾歸以宗女妻之太初十二年夏四月鮮卑疊掘河内率戶五千自魏來降乾歸以河内爲疊掘都綂以宗女妻之秋七月丞相南川宣公出連乞都卒冬十月乾歸以金城太守辛靜爲右丞相太初十三年春正月乙亥乾歸所居金城南景門無故自崩甚惡之遂遷都苑川大赦境内夏五月秦姚興遣征西姚碩德率衆五萬來伐入自南安峡乾歸率諸將拒之次於隴西興復遣别將潜師繼發秋七月乾歸聞興將至謂諸將曰吾自開建以來屢摧勍敵乘機藉筭舉無遺䇿今姚興盡中國之師軍勢甚盛山川阻狹無縱騎之地宜引師平川伺其殆而擊之存亡之機在斯一舉諸君勠力勉之若梟剪姚興闗中之地盡吾有也於是遣武衞將軍慕兀等屯守秦軍樵採路絶秦姚興潜引兵來救乾歸聞之復使慕兀率中軍二萬遷屯栢陽鎮軍將軍羅敦率外軍四萬遷屯侯辰谷自率輕騎數千前候軍勢㑹大風昏霧遂與中軍相失爲追騎所逼入於外軍旦與秦戰爲興所敗遁歸苑川部衆三萬六千皆降於秦興進軍枹罕乾歸遂走金城謂諸豪帥曰吾才非命世謬為諸君所推心存撥亂而德非時雄叨竊名號已踰一紀負乘致㓂傾喪若斯今衆已散敗勢不得安吾欲西保允吾以避其鋒若方軌西邁理難俱濟卿等畱此各以其衆降秦保全妻子勿吾隨也羣下咸曰昔古公杖䇿豳人歸懐𤣥德南奔荆楚襁負分岐之感古人所悲况臣等義深父子而有心離背死生願從陛下乾歸曰自古無不亡之國不敗之家廢興命也茍天未亡我庻幾異日克復舊業復與卿等相見有期德之不建何爲俱死公等自愛吾今將寄食於人以終餘年乃大哭而别遂帥騎數百馳至允吾乞降於武威王利鹿孤利鹿孤遣車騎傉檀迎之置於晋興待以上賓之禮秦兵旣退南羗梁弋等宻遣使來招乾歸將應之其臣屋引阿洛以告晋興太守隂暢暢馳白利鹿孤利鹿孤遣弟吐雷率騎三千屯捫天嶺乾歸懼爲利鹿孤所殺謂太子熾磐曰吾不能負荷大業致兹顛覆以利鹿孤義兼親好兾存唇齒之援乃忘義背親謀人父子忌吾威名勢不全立今姚氏方強吾將歸之若盡室俱去必爲追騎所及吾送汝兄弟及汝母爲質彼必不疑吾既在長安彼終不敢害汝也於是送熾磐兄弟於西平八月乾歸南奔枹罕遂降於秦冬十一月乾歸至長安姚興見而大悅署爲持節都督河南諸軍事鎮逺將軍河州刺史封歸義侯乆之熾磐欲逃詣乾歸武威王利鹿孤遣兵追獲將殺之廣武公傉檀勸曰子而歸父無足深責宜宥之以示大度利鹿孤從之太初十四年春二月秦姚興遣乾歸還鎮苑川盡以其故部衆配之夏四月乾歸至苑川以邉芮爲長史王松壽爲司馬翟勍爲尚書令公卿大將已下悉降號僚佐偏裨太初十五年夏四月熾磐自西平奔歸苑川南凉王傉檀歸其妻子乾歸使熾磐入朝於秦姚興署爲振忠將軍興晋太守尋遣使者加乾歸散騎常侍左賢王太初十六年秋七月秦遣乾歸以所部甲卒隨齊難等迎吕隆於河西冬十一月討叛羗党龍頭於滋川㧞之太初十九年秋九月攻仇池楊盛將苻帛於皮氏堡克之盛率兵來救戰於竹嶺爲盛所敗晋義熈元年春正月自此以後四年竝從建康年號乾歸朝於秦吐谷渾將大孩一名烏紇堤屢冦乾歸邉境乾歸怒率騎討之大孩大敗俘斬萬餘口而還大孩走保南凉死於胡園視羆世子樹洛干帥其餘衆數千家奔歸莫何川自稱大都督車騎大將軍大單于吐谷渾王化行所部衆庶樂業號爲戊寅可汗沙漒雜種莫不歸附乃宣言曰孤先祖避地於此曁孤七世思與羣賢共康休緒今士馬桓桓控弦數萬孤將振威梁益稱覇西戎觀兵三秦逺朝天子諸君以爲何如衆咸曰此盛德之事也願大王自勉乾歸聞而甚忌之秋八月乾歸率衆攻仇池爲楊盛所敗尋復率衆攻盛將楊玉於西陽堡克之義熈二年秋七月苑川地震裂生毛狐雉入於寢内百草皆自反乾歸甚惡之冬十二月復入朝於秦義熈三年春正月秦姚興慮乾歸寖強難制終爲西州之患因其朝也畱爲主客尚書以世子熾磐爲建武將軍行西夷校尉監撫其部衆鎮苑川秋七月秃髪傉檀叛秦遣使來邀熾磐斬其使送之長安秦甚嘉之冬十一月秦河州刺史彭奚念叛降秃髪傉檀秦以熾磐行河州刺史義熈四年夏五月秦遣乾歸以鎮逺將軍從廣平公弼等帥步騎襲傉檀冬十月熾磐以秦政寖衰兵亂將始且畏秦之攻襲乃招結諸部二萬七千築城於嵻㟍山而㨿之十一月熾磐攻彭奚念於枹罕爲奚念所敗而還更始元年春三月熾磐入秦見太原公懿於上邽彭奚念乘虛來襲熾磐聞之怒不告懿而歸擊奚念破之遂圍枹罕乾歸從秦王興如平凉熾磐攻枹罕克之遂遣使告乾歸乾歸逃還苑川鮮卑大恱堅有衆五千自龍馬苑來降夏四月乾歸如枹罕畱熾磐鎮之收其部衆得二萬人徙都度堅山秋七月羣下勸乾歸稱王乾歸以寡弱弗許固請曰夫道應符厯雖廢必興圖籙所棄雖成必敗本初之衆非不多也魏武運籌四州瓦解尋邑之兵非不盛也世祖龍申亡新鳥散固天命不可虛邀符籙不可妄冀姚數將終否極斯泰乘機撫運實係聖人今見衆三萬足可疆理秦隴清蕩洮河陛下應運再興四海鵠望豈宜固守謙冲不以社禝爲本願時即大位允副羣心乾歸從之遂以晋義熈五年僣稱秦王赦其境内改元更始置百官公卿已下悉復本位冬十月復立夫人邉氏爲王后世子熾磐爲太子領冠軍大將軍仍命熾磐爲都督中外諸軍録尚書事以屋引破光爲河州刺史鎮枹罕以南安焦遺爲太子太師與叅軍國大謀錄其子華爲尚書民部郎更始二年春正月遣熾磐討諭薄地延師次煩于地延率衆出降署爲尚書徙其部衆於苑川三月遣隴西羗昌何攻秦金城郡㧞之以驍騎將軍乞伏務和爲東金城太守秋七月乙丑乾歸討越質屈機等十餘部降其衆二萬五千徙於苑川八月乾歸復都苑川九月攻秦畧陽南安隴西諸郡皆克之徙民萬五千戸於苑川及枹罕冬十月鮮卑僕渾羗句豈輸報鄧若等帥戸二萬來䧏更始三年春二月乾歸徙鮮卑僕渾部三千餘戶於度堅城以子勅勃爲秦興太守鎮撫之秦姚興力未能西討恐更爲邉害遣太常索稜爲太尉領隴西内史使來招諭乾歸感之遣使送所掠守宰謝罪乞降秦復遣使署乾歸爲使持節散騎常侍都督隴西嶺北䕶羗匃奴雜胡諸軍事征西大將軍河州牧大單于河南王太子熾磐假節鎮西將軍左賢王平昌公乾歸方圖河右權宜受之復稱藩于秦夏四月乾歸徙羗句豈等部衆五千餘戶於疊蘭城以兄子阿柴爲興國太守鎮撫之五月復以子木奕干爲武威太守鎮嵻㟍城秋七月遣平昌公熾磐及次子中軍將軍審䖍率步騎一萬伐秃髪傉檀八月熾磐率師濟河敗傉檀太子虎䑓於嶺南獲牛馬十萬餘而還冬十月攻秦畧陽太守姚龍於栢陽堡剋之十一月進攻南平太守王憬於永洛一作水洛城又克之徙民四千餘戸於苑川三千餘戶於譚郊遣中軍將軍審䖍帥衆二萬城譚郊十二月西羗彭利髪㨿枹罕自稱大將軍河州牧乾歸率騎三萬討之戰於枹罕不克更始四年春正月乾歸復討利髪師次奴葵谷利髪棄其部衆南奔乾歸遣兄子振威將軍公府追擊至於清水斬之乾歸入枹罕收羗戸一萬三千以審䖍爲河州刺史鎮枹罕而還二月戊巳乾歸徙都譚郊命平昌公熾磐鎮苑川因率騎二萬討吐谷渾支綂阿若干于赤水大破之樹奕干請降乾歸拜爲平狄將軍赤水都䕶又以其弟吐䕶真爲捕虜將軍層城都尉阿若干爲䕶軍都尉夏五月熾磐率衆攻秃髪傉檀三河太守呉隂於白土克之以出累代爲太守六月乾歸畋於五谿有梟集於其手心甚惡之遂爲兄子公府所弑并殺諸子十餘人公府奔固大夏熾磐遣其弟廣武將軍智逹陽武將軍木奕干率騎三千討之以其弟曇逹爲鎮東將軍鎮譚郊驍騎將軍婁機鎮苑川熾磐帥文武及民二萬餘戸遷於枹罕先是乾歸未亡時枹罕金城見䑕有數萬頭將諸小䑕各銜馬屎羣移而渡洮灑二水悉止枹罕自是二年而熾磐徙居之秋七月智逹等擊破公府於大夏公府奔疊蘭城就其弟阿柴智逹等攻㧞之斬阿柴父子五人公府奔嵻㟍南山追獲之并其四子轘之於譚郊八月塟乾歸於枹罕僞諡武元王廟號高祖在位二十四年十六國春秋卷八十五
