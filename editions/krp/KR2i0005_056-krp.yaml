body:
  text: 十六國春秋卷五十六後秦録四姚興上姚興字子略萇之長子也苻堅時為太子舍人萇在馬牧興自長安冐難奔萇萇立為皇太子萇出征討常留統後事及鎮長安甚有威恵與中書舍人梁喜洗馬范朂等講論經籍不以兵難廢業時人化之晉太元十八年冬十二月萇死興秘不發䘮以叔父緒鎮安定碩徳鎮隂宻弟崇守長安碩徳將佐言於碩徳曰公威名素重部曲最强今易世之際朝廷必相猜疑非永安之道也不如且奔秦州觀望事勢碩徳曰太子志度寛明必無他慮今苻登未滅而骨肉相攻所謂追二袁之蹤授首於人吾有死而已不忍為也遂往見興興優禮而遣之皇初元年春正月興自稱大將軍以尹緯為長史狄伯支為司馬率衆伐苻登咸陽太守劉忌奴據避世堡以叛興襲擒之夏四月苻登自六陌趨廢橋始平太守姚詳據馬嵬堡拒之登衆甚盛興慮詳不能遏乃自將精騎廹登遣尹緯領歩卒赴詳詳用緯計據廢橋以抗登登兵争水不能得渇死者十二三因急攻緯緯將出戰興遣狄伯支謂緯曰兵法不戰而制人者葢為此也苻登窮冦宜持重以待之不可輕戰緯曰先帝登遐人情擾懼今不因思奮之力梟殄逆豎大事去矣緯敢以死爭遂與登戰大破之其夜衆潰登單騎奔雍五月辛丑興始發䘮行服僭即皇帝位於槐里大赦境内殊死已下改元皇初遂如安定先是苻登使弟安成王廣守雍太子崇屯胡空堡及聞登敗皆棄城走登無所投據遂奔平凉收集餘衆入馬毛山秋七月興自安定如涇陽與登戰於山南斬登散其歩衆使歸農業徙隂宻三萬戸於長安以登后李氏賜姚晃分大營戸為四寘四軍以鎮之安南將軍强熈鎮逺將軍楊多叛推竇衝為盟主所在擾亂興帥諸將討之軍次武功多兄子良國殺多而降衝弟彰武與衝離貳衝奔强熈熈聞興將至率户三千奔於秦州衝復走汧川汧川氐仇髙執送之衝從弟綂率其餘衆來降冬十二月興遣使與燕結好送太子慕容寳之子敏於燕皇初二年春正月封叔父征虜將軍緒為晉王征西將軍碩徳為隴西王弟中軍將軍崇為齊公右將軍顯為常山公又封叔父征南將軍靖等及功臣尹緯齊難楊佛嵩等並為公侯其餘文武封爵各有差夏五月鮮卑薛勃屯於貳城為魏所伐遣使請救興使弟齊公崇率衆赴之魏軍引還薛勃復叛崇伐而執之大收其士馬而還秋七月魏太祖拓跋珪因慕容寳入冦遣右司馬許謙詣秦乞師八月興遣鎮東將軍楊佛嵩入援於魏而佛嵩稽緩不進太祖乃命許謙為書以遺佛嵩曰夫仗順以翦逆乘義而攻昧未有非其運而顯功無其時而著業慕容氏無道侵我疆埸師老兵疲天亡期至是以遣使命軍必望克赴將軍據方召之任總熊虎之師事與機㑹今其時也因此而舉役不再駕千載之勲一朝可立然後髙㑹雲中進師三魏舉觴稱夀不亦綽乎佛嵩乃倍道兼行及至謙與佛嵩盟曰昔殷湯有鳴條之誓周武有河陽之盟所以藉神靈昭忠信夫親仁善鄰古之令軌㰱血割牲以敦永穆今既盟之後言歸於好分災恤患休戚是同有違此盟神祗斯殛寳既敗走佛嵩乃還是月興追尊庶母孫氏為皇太后配饗太廟皇初三年楊盛保仇池遣使請命拜使持節鎮南將軍仇池公鮮卑越質詰歸率户二萬叛乞伏乾歸來降興處之成紀拜使持節鎮西將軍平襄公隴西王碩徳討平凉胡金豹於洛城克之初上邽姜乳據本州以叛自稱秦州刺史碩徳進兵討之乳率衆來降興以碩徳為秦州牧領䕶東𦍑校尉徙鎮上邽徴乳為尚書安南將軍强熈及畧陽豪族權干城帥衆三萬共圍上邽碩徳擊破之熈南奔仇池遂假道奔晉碩徳西討千城於畧陽干城來降興令郡國各嵗貢清行孝亷一人時慕容永既為慕容垂所滅其所署河東太守栁恭等各阻兵自守興遣晉王緒討之恭等依河拒守緒不得濟鎮東將軍汾隂薛疆先據楊氏堡引緒從龍門濟河遂入蒲坂恭勢屈請降徙新平安定新户六千於蒲坂遂以緒為并冀二州牧鎮蒲坂皇初四年秋九月興母虵氏卒鮮卑薛勃復叛奔嶺北上郡貳川雜胡皆應之遂圍安逺將軍詳於金城興遣齊公崇及尹緯討之薛勃自三交趨金城崇列營犄之而租運不繼三軍大饑緯言於崇曰輔國將軍彌姐髙地建節將軍杜成等皆諸部之豪位班三品督運稽留令三軍乏絶宜眀寘刑書以懲不肅遂斬之諸部大震租入者五十餘萬興率歩騎二萬親討薛勃勃懼棄其餘衆奔髙平公没奕干干執而送之興泫氏男買得欲因興葬母虵氏殺興㑹有告之者興未之信遣李嵩詐往買得具以告嵩嵩還以聞興乃賜買得死誅其黨與興下書禁百姓造錦繡及滛祀興率衆冦晉湖城晉宏農太守陶仲山華山太守董邁皆降遂至陜城進冦上洛拔之遣齊公崇冦洛陽晉河南太守夏侯宗之固守金墉攻之不克乃䧟柏谷徙流民西河嚴彦河東裴岐韓襲等二萬餘戸而還興下書令士卒戰亡者守宰所在埋藏之求其親近為之立後武都氐屠飛啖鐡等殺隴東太守姚廻掠三千餘家據方山以叛東平公紹等討之斬飛鐡遣司馬狄伯支迎流民曹㑹牛夀萬餘戸於漢中興留心政事包容廣納一言之善咸見禮異京兆杜瑾馮翊吉黙始平周寳等上陳時事皆擢叙美官天水姜龕東平淳于岐馮翊郭髙等皆耆儒碩徳經明行修各門徒數百教授長安諸生自逺而至者萬數千人興每於聽政之暇引龕等於東堂講論道藝錯綜名理給事黄門侍郎吉成詵中書侍郎王尚尚書郎馬岱等以文章雅正叅管機宻於是學者咸勸儒風盛焉皇初五年興長水校尉姚珍奔西秦是年興建南臺武庫朝堂於長安又立西宫名宫門曰黄龍門𢎞始元年秋七月遣齊公崇鎮東將軍楊佛嵩冦洛陽晉河南太守隴西辛恭靖嬰城自守雍州刺史楊佺期請救於魏八月魏太祖遣太尉穆崇將六萬騎救之九月興班命郡國百姓因荒自賣為奴婢者悉免為良人興以日月薄蝕災𤯝屢見去皇帝之號降稱天王下詔令羣公卿士將牧守宰各降一等太尉公趙旻等五十三人上疏諌曰伏惟陛下勲格皇天功濟四海威靈振於殊域聲教暨於遐方雖成湯之隆殷基武王之崇周業未足比喻方當廓靖江吴告成中岳豈宜過垂冲損違皇天之眷命乎興曰殷湯夏禹徳冠百王然猶順守謙冲未居崇極况朕寡昧安可處之乃遣旻告於社稷宗廟大赦境内殊死已下改元𢎞始賜孤獨鰥寡粟帛有差年七十已上加衣杖簡省法令清察獄訟守令之政績者賞之貪殘者誅之始平太守周班槐里令李􅒷皆以黷貨伏誅於是逺近肅然冬十月辛恭靖固守洛陽百餘日魏救未至崇等遂拔洛陽恭靖被執送至長安見興不拜興謂恭靖曰朕將任卿以東南之事可乎靖厲色曰吾寜為國家鬼不為羌賊臣興怒囚之别室自淮南已北諸城多送任請降乃以東平公紹為都督山東諸軍事豫州牧鎮洛陽興下書聽祖父母昆弟得相容隠晉王緒隴西王碩徳以興降號同讓王爵興弗許京兆韋華晉帝紀作韋禮譙郡夏侯軌始平龎眺等率襄陽流民一萬餘戸叛晉來奔興引見東堂謂華曰晉自南遷承平已久今政教風化何如華曰晉主雖有南面之尊而無總御之實宰輔執政政出多門權去公室遂成習俗刑網峻急風俗奢宕自桓温謝安已後未見寛猛之中興大悅拜華中書令興如河東時晉王緒鎮河東興待以家人之禮下書封先朝舊臣姚驢磑趙惡地王平馬萬載黄世等為五等子男命百僚舉殊才異行之士刑政有不便於時者悉除之兵部郎金城邊熈上陳軍令煩苛宜遵簡約興覽之稱善乃依孫吴誓衆之法以損益之興立律學於長安召郡縣散吏以授之其通眀者還之郡縣論决刑獄若州郡縣所不能决者讞之廷尉興嘗臨諮議堂聽斷疑獄於時號無寃滯晉王緒隴西王碩徳固讓王位許之緒碩徳威權日盛興恐姦佞小人從中沮惑乃簡清正君子為之輔佐興以司𨽻校尉郭撫扶風太守强超長安令魚佩槐里令彭明倉部郎王年等清勤貞白下書褒羙之增撫邑一百戸賜超爵闗内侯佩等進位二級𢎞始二年夏五月興遣使聘魏魏遣謁者僕射張濟報聘於興興遣征西大將軍隴西公碩徳率隴右諸軍入自南安陜伐西秦西秦王乞伏乾歸帥軍來拒次於隴西秋七月興潛引軍赴之乾歸敗走降其部衆三萬六千收鎧馬六萬匹軍無私掠百姓懐之興進軍枹罕乾歸奔金城班賜王公已下徧於卒伍興之西伐髙平公沒奕干欲乘虛襲安定長史皇甫序切諫止之干自恨失言隂欲殺序八月乾歸以窮蹙來降拜鎮逺將軍都督河南諸軍事河州刺史歸義侯使還鎮苑川復以其故部衆配之冬十月興下書將帥遭大䘮非在疆場險要之所皆聽奔赴及朞乃從王役臨戎遭䘮聽假百日若身為邊將家有大變交代未至敢輙去者以擅去官罪罪之十一月興遣晉將劉暠等二百三十七人歸於建康魏軍襲没奕干干棄其部衆率數千騎與劉勃勃魏書作赫連屈丏奔於秦州興見勃勃儀貌竒之拜驍騎將軍魏軍進次瓦亭長安大震諸城閉門固守魏平陽太守王塵一作貳塵入侵河東興於是練兵講武大閲於城西幹勇壯異者召入殿中引見羣臣於東堂大議伐魏之䇿羣臣咸諫以為不可興不從司隷校尉常山公顯進曰陛下天下之鎮不宜親行可使諸將分討授以廟算之勝一作䇿興曰王者正以廓土靖亂為務吾焉得而辭之𢎞始三年春三月連理樹生於廟庭逍遥園有葱變為茝咸以為羙瑞興令占之曰應有智人來入中國夏五月魏安人焦朗遣使說隴西公碩徳曰吕氏自武王棄世兄弟相攻政綱不立兢為威虐百姓饑饉死者過半今乘其簒奪之際取之易於反掌不可失也碩徳言於興遂帥歩騎六萬伐凉遣乞伏乾歸率騎七千從之秋七月碩徳從金城濟河直趨廣武徑倉松至姑臧部將姚方國言於碩徳曰今授師三千後無繼援師之難也宜曜勁鋒示其威武彼以我逺來必决死拒戰可一戰而平也凉王吕隆遣輔國吕超龍驤吕邈等逆戰大敗生擒邈俘斬萬計隆嬰城固守别將吕他等率衆二萬五千以東苑來降先是吐蕃秃髪傉檀據西平沮渠䝉遜據張掖李暠據燉煌各制方域與吕隆共相攻伐至是各遣使修表奉獻八月凉將姜紀率數十騎來奔說碩徳曰吕隆孤城無援明公以大軍臨之其勢必請降然彼徒文降而已未肯遂服也請給紀歩騎三千與王松怱因焦朗華純之衆伺其釁隙隆不足取也不然今秃髪在南兵强國富若兼姑臧而據之威勢益盛沮渠䝉遜李暠不能抗必將歸之如此則為國家之大敵矣碩徳乃表紀為武威太守配兵三千屯據晏然碩徳圍姑臧累月城中多謀外叛碩徳撫納夷夏分置守宰節食聚粟為持久之計九月吕隆遣使奉貢請降興答報嘉羙拜隆鎮西大將軍凉州刺史建康公是年河東蒲坂阿育王寺時出光明人咸異之掘得佛骨於石凾中照燿殊常𢎞始四年春二月癸丑立子泓為太子大赦境内殊死已下賜男子為父後者爵一級三月晉襄城太守司馬休之中郎劉敬宣髙雅之俱奔洛陽各以子弟為質并求救於興興與之符信使於闗東募兵得數千人復還屯彭城間夏四月西秦乞伏乾歸遣其子熾磐來朝興署為興晉太守五月興大發諸軍遣弟安北將軍義陽公平尚書右僕射狄伯支等率歩騎四萬伐魏平等軍次河東興遣光逺將軍党娥立節將軍雷星建忠將軍王次多等帥杏城及嶺北突騎自和寜赴援越騎校尉唐小方積弩將軍姚梁國一作良國率闗中勁卒為平後繼晉公緒統河東見兵為前鋒節度東平公紹率洛東之兵始平太守詳率朔方見騎並集平望以㑹於興司隷校尉常山公顯及尚書令晃輔太子泓守長安髙平公沒奕干權鎮上邽中軍將軍廣陵公欽權鎮洛陽興帥戎卒四萬七千自長安赴平平攻魏乾壁六十餘日壁中衆少失井䧟之六月太祖將兵逆擊遣毘陵王順及豫州刺史長孫肥等三軍六萬騎為先鋒秋七月太祖躬帥將士親征八月次於永安平募遣驍將帥精騎二百覘魏虛實長孫肥逆擊盡擒之匹馬不返平遂退走太祖急追之乙巳及於柴壁平嬰城固守魏軍圍之興乃悉舉其衆救平將據天渡運糧餽平太祖聞興將至問尚書右兵中郎中山李先曰興屯天渡平據柴壁相為表裏今欲殄之計將安出先曰臣聞兵以正合戰以竒勝如聞姚興欲屯兵天渡利其糧道及其未到之先遣竒兵先邀天渡柴壁左右嚴設伏兵備其表裏然後以陛下神䇿觀時而動興欲進不得退又乏糧夫髙者為敵所棲深者為敵所因一作囚兵家所忌今秦皆犯之可不戰而取也太祖從之乃増築重圍内以防平出外以拒興入魏廣武將軍安同曰汾東有䝉坑東西三百餘里蹊徑不通興來必從汾西直臨柴壁如此則虜聲勢相接重圍雖固不能制也不如為浮梁渡汾西築圍以拒之虜至無所施其智力矣太祖以為然遂截汾曲為南北浮橋乘西岸築圍興至蒲坂憚魏之强久乃進兵甲子太祖帥歩騎三萬餘人渡䝉坑南四十里逆擊興興晨行北引未及安營魏軍猝至興衆怖擾太祖遣毘陵王順以精騎衝擊獲興甲騎數百斬首千餘級興退南走四十餘里魏引兵還平亦不敢出但使人燒圍數百歩而已魏知興氣已挫乃分兵四據險要南絶䝉坑之口東杜新坂之隘守天渡屯賈山令平水陸絶路將坐甲而擒之又縁汾帶岡樹栅數十重一作里以衛芻牧者使平不得近柴壁九月興從汾西北下營憑壑為壘欲以自固又遣數千騎乘西岸闚視魏軍一作營乃束柏材從汾水上流縱之欲以毁浮橋一作梁魏軍皆鉤取以為薪蒸太祖度興必攻西圍乃命修塹増廣之至夜興攻西圍梯短不及棄之塹中而還又分其衆臨汾為壘叩逼水門與平相望魏因截水中興内外隔絶士卒䘮氣冬十月平糧盡矢竭勢甚窘急夜悉衆突西南圍求出興列兵汾水西舉烽皷譟為平接應太祖簡諸軍精銳屯於汾西固守南橋絶塞水口興夜聞聲望平力戰突免平聞外皷望興攻圍引接故但呌呼虚相應和莫敢逼圍平不得出計窮力盡乃將二妾帥麾下三十騎赴汾水死興安逺將軍不蒙世揚威將軍雷重等將士四千餘人多從平赴水太祖使善游者泅水鉤捕無一人得免平衆三萬餘人皆歛手受縛又擒尚書右僕射狄伯支越騎校尉唐小方積弩將軍姚梁國立節將軍雷星建義將軍康宦北中郎將康猥興從子伯禽已下四品將軍已上四十餘人獲先亡臣王次多靳懃等並斬以狥興逺來赴救自觀其窮力不能救舉軍慟哭聲振山谷數日不止頻遣使求和於魏太祖不許興乃下書令軍士戰没者皆厚加褒贈魏軍乘勝進攻蒲坂晉公緒固守不戰㑹柔然謀伐魏太祖聞之戊申引兵而還庚戌興徙河西豪右萬餘户於長安十二月晉輔國將軍袁䖍之寧朔將軍劉夀冠軍將軍髙長慶龍驤將軍郭恭等貳於桓𤣥懼而來奔興臨東堂引見謂䖍之等曰桓𤣥雖名晉臣其實晉賊才度定何如其父卒能辦成大事否䖍之曰𤣥藉世資雄據荆楚屬晉朝失政盗竊宰衡安忍無親多忌好殺位不才授爵以愛加無公平之度以臣觀之不如其父逺矣今已握朝權必將簒逆既非命世之才正可為他人驅除耳此天以機便授之陛下願速加經畧廓清吴楚興大悅以䖍之為大司馬餘皆拜授有差䖍之固辭請疆場自效改授假節寕南將軍廣州刺史十六國春秋卷五十六
