body:
  text: 十六國春秋卷八十蜀錄四閻彧一作式閻彧天水人也特初起兵數遣彧至羅尚求寛流民限期乃版為始昌令及特承制任為謀主雄即王位累遷尚書令時建國草創素無法紀諸將恃恩各争班位彧上疏曰夫為國制法動尚仍舊漢晉故事惟太尉大司馬執兵太傅太保父兄之官論道之職司空司徒掌五教九土之差秦置丞相總領萬機漢武之末遂一作越以大將軍統政今國業初建凡百未備諸公大將班位有差降而競請私置不與典故相應宜立制度以為楷式雄從之其後去雄依太尉離於梓潼部人訇琦張金茍等叛殺離彧亦被害雄甚悼之尹奉尹奉南安人晉永昌元年以零陵太守為寧州刺史南夷校尉加安西將軍奉威刑緩鈍政治不立為大將軍夀所破遂舉州降時晉咸和八年也雄遷奉於蜀南中盡為雄有其後奉仕李氏位至衞將軍右丞相王載王載字元始新都人也有才智幹略娶寧州刺史李毅女秀載將家避地在南適毅亡州文武以秀明達有父風一作才遂推領州事又以載領南夷校尉龍驤將軍秀奬厲督戰食糧已盡但茹草炙鼠為食秀伺夷怠緩輙出軍掩破之載後為漢嘉太守太傅驤攻破朱提等郡載懼以郡迎降仕雄至騎都尉龍驤長史李釗李釗字世康廣漢郪人也祖旦字欽宗光禄郎中主事父毅字允剛厯寧州刺史加龍驤將軍封成都内侯釗世秉儒學有格望以父任為謁者僕射除夀林侯相不就為尚書外兵郎晉光熙三年毅為叛夷所攻疾病困於窮城不能討戰上表請援時雄寇蜀郡救兵不得進釗聞父阨表求赴難馳至牂牁夷復斷道停住交州以寧州城中無糓父疾病未知吉凶遂不食糓惟茹草首尾三年得至寧州父已喪文武復偪釗領州府事懐帝乃除釗平寇將軍領安夷䕶軍西夷校尉大得衆心及王遜為寧州刺史表釗為朱提太守尋遷越巂治南廣以禦雄數破雄軍殺大將樂初雄玉衡十三年太傅驤與任囘分兵攻朱提越嶲城陷被獲尋而自蜀逃歸遜仍以釗守越嶲雄復遣驤及任囘攻之釗自南秦與漢嘉太守王載並力來拒戰於温水敗績遂以二郡迎降釗到成都雄待遇甚厚朝廷儀式喪紀之禮皆决於釗命班以師禮事之范長生賁范長生涪陵丹輿人也一名延久又名九重又名支字元夀巖居穴處求道養志甚有名德兼善天文頗曉術數年過百嵗萟林伐山云長生先事劉𤣥德至特時一百三十餘年為蜀人所重奉之如神雄欲迎致立為君長而臣之長生固辭曰推步太元五行大㑹甲子祚終於李非吾節也雄即成都王位長生自西山乘素輿詣成都雄迎之於門執版延接即日拜丞相尊之曰范賢故又名賢勸雄稱尊尋加長生天地太師之號封西山侯以雄玉衡八年卒子賁嗣賁初為侍中後嗣父爵為丞相晉永和三年勢為大司馬桓温所滅其遺黨故尚書僕射王誓鎮西將軍鄧定平南將軍王潤將軍隗文蕭恭文等舉兵反衆各萬餘温自擊定使袁喬擊文皆破之使益州刺史周撫鎮彭模斬王誓王潤温留成都三十日振旅還江陵尋而鄧定隗文等入據成都征虜將軍楊謙棄涪城退保德陽遂陷日南殺督䕶劉雄共立賁為帝而奉之以父長生為雄國師蜀民愛之賁由是以妖異惑衆聚至數千蜀人相率歸附後二年周撫與龍驤朱燾擊賁斬之益州遂平楊褒楊褒略陽人仕特將兵都尉雄稱尊號累遷左僕射尚書令直言敢諫無所忌諱雄初得蜀用度不足諸將每進金銀珍寳多有以得官者褒諫曰陛下為天下主當網羅四海英豪何以有官爵買金銀耶雄遜辭謝之後雄因酒醉推中書令杖太史令褒奏曰天子穆穆諸侯皇皇安有天子而為􅒬也雄慙而止雄無事小出褒於後持矛馳馬過雄雄怪問之對曰夫統天下之重者如臣乘惡馬而持矛急之則慮自傷緩之則懼其失是以馬馳而不制也雄悟即還遂不復出晏平三年冬十二月褒卒贈丞相太師諡曰莊譙秀一作焦譙秀字元彦巴西人也祖周以儒學著稱顯名蜀朝秀少而静黙不交于世知天下將亂預絶人事雖内外宗親不與相見郡察孝亷州舉秀才皆不從及雄據蜀略有巴西太傅驤驤子夀皆慕秀名具束帛安車徵之亦不應一云或以禮招或以威迫而秀終不應命嘗冠弁弊衣躬耕山藪龔壯常歎服焉桓温滅蜀上疏薦之朝廷以秀年在篤老兼道逺故不徵遣使勅所在四時存問尋而范賁蕭敬相繼作亂秀避難宕渠川中鄉人宗族依憑之者以百數秀年出八十衆人以其篤老欲代之負擔秀拒曰各有老弱當先營䕶吾氣力自堪此不以垂朽之年累諸君也年九十餘無疾而卒龔壯龔壯字子偉巴西處士也潔已自守與鄉人譙秀齊名父叔皆為特所殺壯欲復仇力弱不能故積年不除喪夀戍漢中與期有隙數以禮聘壯壯雖不應聘恐其見害乃不得已往見之夀因問以自安之䇿壯說曰巴蜀之民本皆晉臣節下若能發兵西取成都稱藩于晉誰不争為節下奮臂前驅者哉且舍小從大以危易安莫大之策也惟將軍圗之夀以為然遂率衆攻成都克之既即偽位以安車束帛聘為太師壯誓志不仕其所贈遺一無所受特聽縞巾素帶居師友之列㑹天久雨百姓饑墊壯上書説夀歸晉允天心應人望永為國藩如此則名垂不朽福流子孫夀省書内慙遂秘藏之夀又遣使入胡欲連衡為寇約分天下壯切諫曰陛下與胡通孰若與晉通胡豺狼國也既滅晉不得不北面事之若與之争天下則強弱異勢此虞虢之成範已然之明戒願陛下熟慮之羣臣咸以壯言為然夀乃止壯因作詩七篇託言應璩以諷夀夀報曰省詩知來意若今人所作乃賢哲之話言也若古人所作則死鬼之常辭耳壯以為人之行莫大於忠孝既假夀弑期以報父叔之仇又欲使其歸順朝廷以明臣節夀既不從乃詐稱耳聾手不制物辭疾歸家唯研考典籍覃思文章以經史自娛終身不復至成都至勢嘉寧初卒壯每歎中夏多經學而巴蜀鄙陋兼遭李氏之難無復學徒乃著邁徳論文多不載張寳張寳略陽人仕雄為别將天水訇琦等叛殺太尉離寳弟全在琦中雄謂寳曰汝能得梓潼我以李離之官賞汝寳素兇勇乃反為奸先殺人而亡奔梓潼琦等信之委以心腹㑹益州刺史羅尚遣使至梓潼慰勞琦等琦等出迎寳從後閉門琦等奔巴西遂得梓潼雄即日拜寳為太尉李洪李洪廣漢人聚流民數千入定陵作亂自稱李勢子太和中因刺史劉季連失於撫綏巴西人趙續伯蜀人李金銀等共推洪為主言當以聖道王年號鳳凰私署百官妖惑百姓季連討斬之李高李高隴西人也詐稱李雄子攻破涪城梁州刺史楊亮棄郡遁走犍為太守周楚遣其子帥兵討平之劉𤣥劉𤣥漢昭烈帝之曽孫甘陵王永之孫也永以咸熙元年東遷洛陽拜奉車都尉封為鄉侯值永嘉大亂劉氏子孫絶滅唯𤣥奔蜀雄署為安樂公以嗣後主後永和三年討勢孫盛參戎行見𤣥於成都云十六國春秋卷八十
