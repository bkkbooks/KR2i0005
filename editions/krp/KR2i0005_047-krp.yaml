body:
  text: 十六國春秋卷四十七後燕録五慕容盛慕容盛字道運寶之庶長子也秦建元中生於長安少沈敏多謀略建元末苻堅誅慕容氏盛潛奔於中山王沖及沖稱尊號有自得之志賞罰不均政令不明盛年十三謂叔父柔曰夫十人之長亦須才過九人然後得安今中山王智不先衆才不逮人功未有成先自驕大以盛觀之鮮不覆敗俄而沖為段木延所殺盛隨永東如長子謂柔曰主上已中興幽冀東西未一吾屬﨑嶇於鋒刃之間居嫌疑之地愚則為人所猜智則危甚巢幕當如鴻鵠高飛一舉萬里不可坐待網罟也於是與柔及弟會間行同歸於垂遇盜陜中盛曰我六尺之軀入水不溺在火不焦汝欲當我鋒乎試竪爾手中箭百步我若中之宜慎爾命如其不中當束身相授盜乃竪箭盛一發中之盜曰郎貴人之子故相試耳資而遣之嵗餘永誅儁之子孫男女無遺盛既至垂問以西事畫地成圖垂笑曰昔魏武撫明帝之首遂乃侯之祖之愛孫有自來矣於是封長樂公歴位散騎常侍左將軍驍勇剛毅有伯父全之風烈寶即偽位領北中郎鎮鄴進爵為王拜征北大將軍司隸校尉尚書左僕射寶自和龍南伐盛留統後事及段速骨作亂馳出迎衞寶幾為速骨所獲賴盛以免盛屢進竒策於寶寶不能從是以屢敗寶既如龍城留盛在後寶為蘭汗所殺盛馳進赴哀將軍張真固諫以為不可盛曰我今投命告以哀窮汗性愚淺必顧念婚姻不忍害我旬月之間足以展吾情志遂入赴喪汗以為侍中左光禄大夫親待如舊汗兄提弟加難勸汗殺盛汗不從提驕狠荒淫事汗多無禮盛因而間之由是汗兄弟浸相嫌忌太原王竒楷之子汗之外孫也汗亦宥之以為征南將軍得入見盛遂相與謀盛潛使竒逃去起兵奇起兵於建安衆至數千汗遣蘭提討之盛謂汗曰善駒小兒未能辦此豈非有假托其名欲為内應者乎太尉素驕難信不宜委以大衆汗因發怒罷提兵更遣撫軍將軍仇尼慕率衆討竒是時龍城自夏不雨至於秋七月汗日詣燕諸廟及寶神座頓首禱請委罪於蘭提加難蘭提及加難聞之怒且懼誅乙巳相與率所部兵背汗襲仇泥慕軍敗之汗大懼遣子穆將兵討之穆謂汗曰慕容盛我之仇讐竒今起兵盛必為應兼内有蕭墻之難不宜養心腹之疾請先除之汗欲誅盛先引見察之盛妃知之密以告盛於是偽稱疾篤不復出入汗亦止不殺李旱衞雙劉忠張豪張真等皆盛之舊昵也蘭穆竝引以為腹心旱等出入至盛所與盛潛結大謀丁未穆討蘭提加難等破之庚戌大饗將士汗穆等皆醉盛夜如厠袒而踰墻入於東宫與李旱等誅穆時軍未解嚴皆聚在穆舍聞盛得出衆皆踴躍鼔譟大呼進攻汗斬之汗子魯公和陳公揚分屯令支白狼盛遣李旱張真襲誅之蘭提加難亡匿捕得斬之於是内外帖然士女喜悦宇文抜率壯士數百來赴盛拜抜為大宗正辛亥告成於太廟令曰賴五祖之休文武之力社稷幽而復顯不獨孤以眇𦕈之身免不同天之責凡在臣民皆當明目當世因大赦盛謙抑自卑不稱尊號遂以長樂王攝行統事諸王降爵為公以東陽公根為尚書左僕射衞倫陽璆王騰魯恭為尚書悦真為侍中陽哲為中書監張通為中領軍自餘文武各復舊位初太原王竒舉兵建安將討蘭汗南北之人翕然嚮應汗遣兄子企討竒竒擊滅之匹馬不返進屯乙連盛既誅汗命奇罷兵奇不受命遂用丁零嚴生烏丸王龍之謀勒兵叛盛甲寅引兵三萬餘人進至横溝去龍城十里盛出兵擊敗之執竒而還斬龍生等百餘人遂賜竒死桓王之嗣遂絶東陽公根等九十八人固請上尊號盛不許八月以河間公熙為侍中都督中外諸軍事驃騎大將軍中領軍司隸校尉陽城公元為衞將軍元寶之子也又以劉忠為左將軍張豪為後將軍竝賜姓慕容氏李旱為中常侍輔國將軍衞雙為前將軍張順為鎮西將軍張真為右將軍皆封郡公乙亥步兵校尉馬勒等謀反伏誅事連驃騎將軍高陽公崇與崇弟東平公澄皆賜死是月暴風拔闕前七大樹九月乙未以東陽公根為尚書令張通為左僕射衞倫為右僕射慕容豪為幽州刺史鎮肥如冬十月癸酉羣臣復上尊號丙子盛僭即尊位於承乾殿大赦殊死已下改元建平追尊伯考獻莊太子全為獻莊皇帝寶后段氏為皇太后太妃丁氏為獻莊皇后諡太子策為獻哀太子十二月己亥幽州刺史豪尚書左僕射張通鎮西將軍張順坐謀反誅長樂元年春正月戊辰昌黎尹留忠謀反伏誅事連東陽公根尚書段成皆坐死遣中衞將軍衞雙就誅忠弟幽州刺史志於凡城以衞將軍平原公前作陽城公元為司徒尚書令壬午右將軍張真城門校尉和翰坐謀反誅癸未大赦改元長樂有犯罪者毎十日一自決之無撾撻之罰而獄情多實高句驪王安遣使貢方物夏四月甲午有異雀素身緑首集於端門棲翔東園二旬而去以異雀故大赦殊死已下改東園為白雀園盛聴詩歌及周公之事顧謂羣臣曰周公之輔成王不能以至誠感上下誅兄弟以杜流言猶擅美譽於經傳歌絃至於我之太祖桓王承百王之季主在可奪之年二㓂闚𨵦難過往日臨朝輔政羣臣緝穆經略外敷闢地千里以禮讓維宗親徳刑制羣后敦穆一作睦雍熙時無二論勲道之茂豈可與周公同日而言乎而燕詠闕而不論盛徳掩而不述非所謂也乃命中書更為燕頌以述恪之功焉又引中書令常忠尚書陽璆秘書監郎敷於東堂問曰古來君子皆謂周公忠聖豈不謬哉璆曰周公居攝政之重而能達君臣之名及流言之謗致烈風以悟主道契神靈義光萬代故累葉有以稱其高後王無以奪其美盛曰常令以為何如忠曰昔武王疾篤周公有請命之誠流言之際義感天地楚撻伯禽以訓就王徳周公為臣之忠聖達之美詩書以來所未有也盛曰異哉二君之言朕見周公之詐未見其忠聖也昔武王得九齡之夢白文王文王曰我百爾九十吾與爾三焉及文王之終已驗武王之壽矣武王之算未盡而求代其死是非詐乎若惑於天命是不聖也據攝天位而丹誠不見致兄弟之間有干戈之事夫文王之化自近及逺故曰刑于寡妻至於兄弟周公親遺聖父之典而蹈嫌疑之蹤戮罰同氣以逞私忿何忠之有乎但時無直筆之史後儒承其謬談故也忠曰啓金縢而反風亦足以明其不詐遭流言之變而能以大義滅親終安宗國復子明辟輔成大業以致太平制禮作樂流慶無窮亦不可謂非至徳也盛曰卿徒因成文而未原大理朕今相為論之昔周自后稷積徳累仁至於文武以大聖應期遂有天下生靈仰其徳四海歸其仁成王雖幼統洪業而卜世修長加以吕召毛畢為之師傅若無周公攝政王道足以成也周公無故以安危為己任專臨朝之權缺北面之禮管蔡忠存王室以為周公代主非人臣之道故言公將不利於孺子周公當明大順之節陳誠義以曉羣疑而乃阻兵都邑擅行誅戮不臣之罪彰於海内方貽王鴟鴞之詩歸非於主是何謂乎又周公舉事稱告二公二公足明周公之無罪而坐觀成王之疑此則二公之心亦有猜於周公也但以疎不間親故寄言於管蔡可謂忠不見於當時仁不及於兄弟知羣望之有歸天命不在己然後返政成王以為忠耳大風抜木之徵乃皇天祐存周道不忘文武之徳是以赦周公之始愆欲存周室之大美考周公之心原周公之行乃天下之罪人何至徳之謂也周公復位二公所以杜口不言其本心者以明管蔡之忠也又謂常忠曰伊尹周公孰賢忠曰伊尹非有周公之親而功濟一代太甲亂徳放於桐宫思愆改善然後復之使主無怨言臣無流謗道存社稷美溢來今臣謂伊尹之勲有高周旦盛曰伊尹以舊臣之重顯阿衡之任太甲嗣位君道未洽不能竭忠輔導而放黜桐宫事同夷羿何周公之可擬乎郎敷曰伊尹處人臣之位不能匡制其君恐成湯之道墜而莫就是以居之桐宫與小人從事使知稼穡之艱難然後返之天位此其忠也盛曰伊尹能廢而立之何不能輔之以至於善乎若太甲性同桀紂則三載之間未應便成賢后如其性本休明義心易發當務盡匡䂓之理以弼成君徳安有人臣幽主而據其位者哉且臣之事君惟力是視奈何挾智藏仁以成君惡夫太甲之事朕已鑒之矣太甲至賢之主也以伊尹歴奉三朝績無異稱將失顯祖委授之功故匿其日月之明受伊尹之黜所以濟其忠貞之美夫非常之人然後能立非常之事非常人所見也亦猶泰伯之三讓人無徳而稱焉敷曰泰伯三以天下讓至仲尼而後顯其至徳太甲受謗於天下遭陛下乃申其美因而談讌賦詩賜金帛各有差乙未散騎常侍餘超左將軍高和等坐謀反誅秋七月己未遣拜范陽盧溥為幽州刺史辛酉下詔曰法例律公侯有罪得以金帛贖此不足以懲惡而利於王府甚無謂也自今皆令立功以自贖勿復輸金帛八月遼西太守李朗在郡十年威制境内恐盛疑之累徵不赴以母在龍城未敢顯叛乃陰召魏兵將為自安之計許以郡降因表請發兵詣龍城以拒冦盛曰此必詐也召其使而詰之果無事實盡滅其族丁酉遣輔國將軍李旱率騎討之師次建安召旱旋師羣臣莫測其故九月辛未復遣之朗聞其家被誅擁二千餘戸以自固及聞旱中路而還謂有内變不復設備留其子養守令支躬迎魏師於北平旱候知之壬子襲克令支遣廣威將軍孟廣平率騎追朗及於無終斬之旱既斬朗盛謂羣臣曰前以追旱還者正為此耳朗新叛逆必忌官威一則鳩合同𩔖刼害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必克之理也羣臣皆曰非所及也冬十月甲午中衞將軍衞雙有罪賜死李旱自遼西還聞盛殺衞雙懼棄軍奔走至板陘復還歸罪盛復其爵位謂侍中孫勍曰旱總三軍之任荷專征之重不能杖節死綏無故逃亡考之軍正罪在不赦昔先帝蒙塵衆情離貳骨肉忘親股肱失節旱以刑餘之體效力盡命忠欵之至精貫白日朕故録其忘身之功免其丘山之罪耳十二月甲午征虜將軍燕郡太守高湖帥戸二千降魏丙午封弟淵為章武公䖍為博陵公子定為遼西公丁未太后段氏卒諡曰惠徳皇后長樂二年春正月壬子大赦去皇帝之號貶稱庶人天王魏遣材官將軍和拔襲幽州刺史盧溥戊午克之禽溥及其子煥送平城車裂之盛遣廣威將軍孟廣平援之無及斬魏遼西守宰而還高句驪王安事燕禮慢二月丙申盛率衆三萬伐之以驃騎大將軍熙為前鋒襲其新城南蘇二城皆克之開境七百餘里散其積聚徙五千餘户於遼西三月辛卯襄平令段登等謀反伏誅夏四月前將軍段璣太后段氏之兄子也為段登辭所連及五月壬子逃奔遼西戊寅段璣復還歸罪盛赦之賜號曰思悔侯使尚公主入直殿内六月甲子大赦冬十二月壬辰立燕臺統諸部雜夷丁酉尊獻莊丁氏為皇太后立遼西公定為皇太子大赦殊死已下引見百僚於東堂考詳器藝超拔者十有二人命百司舉文武之士才堪佐世者各一人讌羣臣於新昌殿盛曰諸卿各言其志朕將覽之七兵尚書丁信年十五盛之舅子也進曰在上不驕高而不危臣之願也盛笑曰丁尚書年少安得長者之言乎盛以威嚴馭下驕暴少親多所猜忌羣臣有纎介之嫌皆先事誅之宗族親舊人不自保故信言及之長樂三年秋七月盛討厙莫奚大虜獲而還八月丁亥左將軍國與殿中將軍秦輿段讚等謀率禁兵襲盛事覺誅之死者五百餘人盛懲其父寶以懦弱失國遂峻刑極威安忍無親纎微嫌忌莫不裁之於未萌防之於未兆是以親戚亦皆離貳舊臣莫不夷滅壬辰夜前將軍思悔侯段璣與輿子興讚子泰等因衆心揺動潛入禁中鼔譟大呼盛聞變起率左右出戰衆皆披潰璣被創匿廂屋間俄而有一賊從闇中擊傷盛足盛被傷遂輦升前殿申約禁衞召叔父河間公熙屬以後事熙未至而盛已死時年二十九在位四年偽諡昭武皇帝墓號興平陵廟號中宗十六國春秋卷四十七
