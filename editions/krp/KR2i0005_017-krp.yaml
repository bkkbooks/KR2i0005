body:
  text: 十六國春秋卷十七後趙錄七石虎下建武十二年夏五月尚書朱軌與中黄門嚴生不協㑹大雨霖道路陷滯不通生因譖軌不修道路訕謗朝政虎怒囚之冠軍將軍蒲洪諌曰臣聞聖王之御天下也土階三尺茅茨不剪食不累味刑措而不用亡君之馭海内也傾宮瓊臺一作榭象箸玉杯截脛剖心脯賢刳孕故其亡也忽焉今陛下既有襄國鄴宮足康帝宇又修長安洛陽宮殿將何以用之盤于田游耽于女色三代之亡恒必由此而忍為獵車千乗環數千里以養禽獸奪人妻女十餘萬口以盈後宮聖帝明王之所為固若是乎尚書朱軌納言大臣今以道路不修將加酷法此自陛下徳政失和隂陽災沴天降霖雨七日乃霽霽方二日雖有鬼兵百萬亦未能去道路之塗潦而况人乎刑政如此其如史筆何其如四海何願止作徒罷苑囿出宮女赦朱軌以副衆望虎省之不恱憚其强直寢而不納弗之罪也為之停長安洛陽作役於是立私議之條偶語之律聼吏告其君奴告其主威刑日濫公卿以下朝㑹昃目吉凶之問自此而絶不敢復相過從談語六月將軍王擢撃張重華襲武衛執䕶軍曹權胡宣徙七千餘戸于雍州又使凉州刺史麻秋征西將軍張伏都一作孫伏都攻金城太守張冲降之重華遣中堅將軍謝艾將步騎五千來拒秋敗奔還是年虎晝寢永安宮夢羣羊從東北負魚而來鄴東北土髙丈餘木斗滿其上寤而問佛圗澄澄曰此不祥也鮮卑其有中原乎建武十三年春正月虎率三公九卿躬耕藉田於桑梓苑鄴城南地多桑梓因以築之故名桑梓苑苑有臨漳宮三月三日及始蠶之日虎率皇后及夫人採桑於此虎后杜氏祠先蚕於近郊遂如襄國謁勒墓夏四月遣凉州刺史麻秋等伐張重華以中書監石寧為征西將軍率司并州兵二萬餘人為秋後繼凉將宋秦等率戸二萬來降河湟間氐羌十餘萬落與張據相首尾麻秋憚之不進凉别將張瑁自間道引兵截秋軍後秋退凉將謝艾乗勝追撃將軍杜勲魚汲死之失軍士三千餘人秋單馬奔大夏尋與石寧進次曲栁劉寧王擢進攻始興武街重華使將軍牛旋楊康等來禦與寧戰於沙阜寧等敗績引還金城秋七月虎復遣征西將軍張伏都將軍劉渾率步騎二萬㑹秋等長驅濟河以撃重華遂城長最重華大懼復遣謝艾帥衆來拒八月戊午秋逆戰敗績退歸金城九月地震天裂七丈又雨血于鄴城廣十餘里虎貪而無禮既據十州之地聚斂金帛及外國所獻珍異府庫財物不可勝紀猶自以為不足悉發前代帝王及先賢陵墓取其寳貨邯鄲城西石子㟠上有趙簡子墓虎令發之初得炭深丈餘次得木板厚一尺積板厚八尺乃及泉其水清冷非常作絞車以牛皮囊汲之月餘而水不盡不可發而止又使掘秦始皇冢取銅柱鑄以為器時沙門吳進言于虎曰胡運將衰晉當復興宜苦役晉人以厭其氣虎使尚書張郡一作羣又作麟發近郡男女十六萬人車十萬乗運土築華林苑及長墻一作塘於鄴北廣長數十里又因沙門言以五月發五百里内男女六十一作千萬人重修芳林園至八月天暴雨雪雪深三尺大寒行旅作役凍死者數千人太史奏作役非時天降此變虎乃誅尚書令宋一作朱軌以塞天災又於華林苑中千金堤上作兩銅龍相向吐水以注天泉池通御溝中又種名果竒花民間有名果虎作蝦蟆車四圍掘根面去一丈深一丈合土載之植之無不生又有西王母棗冬夏有葉九月生華十二月乃熟三子一尺又有羊角棗亦三子一尺勾鼻桃重二斤半春李冬花春熟安石榴子大如椀盞其味不酸趙攬申鍾石璞等上疏言天文錯亂蒼生彫敝及因引見又面諌辭㫖甚切虎大怒曰使苑墻朝成吾夕没無恨矣促張郡使燃燭夜作起三觀四門三門通漳水皆為鐵扉暴風大雨死者數萬人揚州獻黄鵠雛五頸長一丈聲聞十餘里泛之于𤣥武池中俄化為龜故或又名𤣥武池以此郡國前後送蒼麟十六白鹿七虎命司虞張昌柱調之以駕芝蓋大朝㑹列之於殿庭又鑿北城引水于芳林園城崩壓死者百餘人是時虎在鄴有一妖馬尾有燒狀入中央門出顯陽門東首東宮皆不得入走向東北俄爾不見佛圖澄聞而嘆曰災其及矣秋九月命太子宣出祈福于山川因行遊獵宣乗大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門虎於後宮升陵霄觀望之笑曰我家父子如此自非天崩地陷當復何愁但抱子㺯孫日為樂爾宣馳逐終夕所在陳列行宮四面各以百里為度驅圍禽獸至暮皆集行宮文武跪立圍守重行烽炬星羅光燭如晝命勁騎百餘馳射其中宣與嬖姬顯徳美人乗軺車一作輦臨觀嬉娛忘反獸盡而止或獸有屏一作迸又作奔逸當坐守者有爵則奪馬步驅一日無爵則鞭之一百峻制嚴刑文武戰懐士卒饑凍死者萬有餘人宣弓馬衣食皆號為御有亂其間者以冐禁罪罪之所過三州十五郡資儲皆無孑遺虎復命秦公韜出自并州遊於秦雍亦如之宣數惡韜秉政終有代己之意是行也嫉之彌甚宦者趙生得幸于宣而無寵于韜微勸宣除之於是相圖之計起矣冬十月麻秋又襲張重華將張瑁於河陜敗之斬首三千餘級枹罕䕶軍李逵率衆七千來降自河以南氐羌始皆來附建武十四年夏四月秦公韜有寵于虎欲立之以太子宣長猶豫未决宣甞忤㫖虎怒曰悔不立韜也韜由是益驕五月熒惑入婁犯填星占者以為災在趙兵大起國有䘮六月韜起堂於太尉府號曰宣光殿梁長九丈宣見之大怒斬匠截梁而去韜怒増之至十丈宣聞之恚甚謂所幸力士鉅鹿楊杯及牟皮牟成趙生等曰韜凶豎勃逆敢違我如是汝等能殺之者吾入西宮當盡以韜之國邑分封汝等韜死主上必親臨䘮吾因行大事無不濟矣杯等許諾秋七月宣將殺韜乃先詣寺與佛圖澄同坐塔上一鈴獨鳴澄謂宣曰解鈴音乎鈴云胡子洛度宣變色曰是何言歟澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎及韜後至澄熟視良乆韜懼而問澄澄曰怪公血臭故相視爾虎夢龍飛西南自天落地旦而召澄問之澄曰脇下有賊不出十日自浮屠以西此殿以東當有血流慎勿東行杜后曰和尚耄耶何處有賊澄易語云六情所受悉皆是賊耄但使少者不惽惽即好爾自此以後澄便寓言不復彰顯八月社日東南有黄黒雲大如數畆稍分為三狀若匹布東西經天色黒而青酉時貫日日没後分為七道每相去數十丈間有白雲如魚鱗子時乃滅韜素解天文見而惡之顧謂左右曰此變不小當有刺客起于京師不知誰定當之是夜韜與僚屬讌於東明觀樂奏酒酣愀然長嘆曰人居世無常别易㑹難各付一杯開意為吾飲令必醉知後㑹復何期而不飲乎因泫然流涕左右莫不歔欷因宿于佛寺中宣遣楊杯牟皮牟成趙生等十餘人夜縁獼猴梯而入斫殺韜於精舍置其刀箭而去旦日宣奏之虎哀驚氣絶久之方蘇將出臨其䘮司空李農諌曰害秦公者未知何人恐在蕭墻之内慮生非常鑾輿不宜輕出虎以佛圖澄先誡乃止遂嚴兵發哀于太武殿宣乗素車從千人往臨韜䘮不哭直言呵呵使舉衾觀尸大笑而去收大将軍記室參軍鄭靖尹武等將委之以罪虎疑宣殺韜欲召之懼其不入乃詐言其母杜氏哀過危惙宣不謂見疑入朝中宮因而留之建興人史科知其謀告稱韜死夜宿東宮長上楊杯家杯夜與五人從外來相與語曰大事已定但願大家老夀吾等何患不富貴語訖便入科寢闇中杯不見也科尋出逃匿俄而杯與二人出求科不得杯曰宿客聞人向語當殺之斷口舌今而得去作大亊矣一云敗乃事矣科踰墻獲免虎馳使收楊杯牟皮趙生等杯皮皆亡去執趙生詰之生具首服虎悲怒彌甚幽宣于席庫以鐵環穿其頷而鏁之作數斗木槽和以羮飯以猪狗法令食之取殺韜刀箭䑛其上血哀號之聲震動宮殿佛圖澄諌曰宣韜皆陛下之子今為韜殺宣是重禍也陛下若含怒加慈者福祚猶長尚有六十餘嵗如必誅之宣當為彗星下掃鄴宮也虎不從乃積柴於鄴北樹標其上標末置轆轤穿之以繩倚梯柴積送宣于標所使韜所幸宦者郝稚劉覇拔其髮抽其舌牽之登梯上於柴積郝稚以繩貫其頷轆轤絞上劉覇斷其手足斫眼潰腹如韜之傷四靣縱火煙炎際天虎築中臺從昭儀已下數千人登中臺以觀之火滅取灰分置諸門交道中殺其妻子二十九人宣少子年纔數嵗虎素愛之抱之而泣兒曰非兒罪虎欲赦之大臣不聼遂於抱中取而殺之兒挽虎衣大呌至於帶絶時人莫不為之流涕虎因此發病廢其母杜氏為庶人誅其四率已下三百人宦者五十人皆車裂節解棄之漳水洿其東宮以養猪牛東宮衛士十餘萬人皆謫戍凉州先是散騎常侍趙攬言於虎曰中宮將有變宜防之及宣殺韜虎疑其知而不告亦誅之貴嬪栁氏尚書耆之女也以才色特幸坐其二兄有寵於宣亦殺之虎追念其姿色復納耆少女於芳林園九月虎議立太子太尉張舉曰燕公斌彭城公遵竝有武藝文徳陛下神齒已衰四海未一請擇二公而樹之虎曰卿言正合吾意戎昭將軍張豺曰燕公母賤又甞有過彭城公母前以太子事廢之今復立之恐不能無㣲恨陛下宜審思之初虎之破上邽也張豺獲劉曜㓜女安定公主年十二有殊色納于虎虎嬖之生子世封齊公豺以虎年長多疾欲立世為嗣冀劉氏為太后已得輔政乃說虎曰陛下再立儲宮其母皆出自娼賤故禍亂相尋今宜擇母貴子孝者立之虎曰卿且勿言吾知太子處矣虎再與羣臣議於東堂曰吾欲以純灰三斛自滌其腸何為専生惡子兒年二十餘輒欲殺公今世方十嵗比其二十吾已老矣乃與張舉李農定議𠡠公卿上疏請立世為太子大司農曹莫不肯署名虎使張豺問其故莫頓首曰天下重器不宜立少故不敢署虎曰莫忠臣也然未達朕意張舉李農知吾意矣可令諭之遂立世為皇太子以昭儀為皇后召太常條攸光禄勲杜嘏謂之曰煩卿傅太子實希改轍吾之相託卿宣明之署攸為太傅嘏為少傅冬十月虎使苻健冦竟陵十一月享羣臣於太武前殿佛圖澄殿上褰衣而行吟曰殿乎殿乎棘子成林將壊人衣虎令發石下而視之有棘子生焉冉閔小字棘奴故澄言及之十二月辛巳大雨霖虎問佛圖澄澄曰其為我乎至戊子而澄卒是年造刀一口長五尺銘曰皇帝石氏𨽻書太寧元年春正月虎疾瘳遂以晉永和五年僭即皇帝位於南郊大赦境内改元太寧百官増位一等諸子進爵為王以尚書張良為右僕射故東宮髙力等萬餘人謫戍凉州行達雍城不在赦例𠡠雍州刺史張茂送之茂皆奪其馬使之步推鹿車致糧戌所髙力督定陽梁犢等因衆心之怨謀起兵東還隂令胡人頡獨鹿微告戍者戍者皆踴躍大呼犢乃自稱晉征東大將軍率衆攻㧞下辨逼張茂為大都督大司馬載以軺車安西將軍劉寧自安定撃之為犢所敗秦雍間城戍無不摧陷斬二千石長史長驅而東髙力等皆多力善射一以當十雖無兵甲所在掠民斧施一丈柯攻戰若神所向奔潰戍率皆随之比至長安衆已十萬樂平王苞時鎮長安盡銳拒之一戰而敗犢遂東出潼闗進趣洛陽虎遣李農為大都督行大將軍事統衛軍將軍張賀度征西將軍張良征虜將軍石閔等率步騎十萬討之戰于新安農等大敗又戰于洛陽又敗退壁成臯犢遂東掠滎陽陳留諸郡虎大懼以燕王斌為大都督督中外諸軍事帥精騎一萬統冠軍大將軍姚弋仲車騎將軍蒲洪等討之弋仲將輕騎八千餘人至鄴求見虎時寢疾未之見也引入領軍省賜以己所御食弋仲怒曰國家有賊召我擊之官當見我面授方畧破賊而以食食我我來覔食耶且主上不見我我何以知其存亡也欲引還虎力疾見之弋仲讓虎曰兒死愁耶何為而病兒㓜時不擇善人教之使至于為逆既為逆而誅之又何愁焉且汝久病所立㓜兒汝若不愈天下必亂當先憂此勿憂賊也犢等窮困思歸相聚為盗所過殘暴何所能至老羌為汝一舉了之弋仲性狷直人無貴賤皆汝之虎亦不之責於坐授使持節征西大將軍賜以鎧馬弋仲曰汝看老羌堪破賊否乃被鎧跨馬于中庭因策馬南馳不辭而出遂與斌等擊犢于滎陽大破之斬犢首而還盡滅其餘黨虎命弋仲履劍上殿入朝不趨進封平西郡公蒲洪為侍中車騎大將軍開府儀同三司都督秦雍州諸軍事雍州刺史進封畧陽郡公二月晉征北大將軍褚裒使部將王龕來伐拔其沛郡獲將軍支重始平人馬昻起兵于洛氏葛谷自稱將軍樂平王苞攻滅之誅三千餘家熒惑犯積尸又犯昴月熒惑北犯河鼓洛陽一作濟陽城西北九里石牛左青山硤上夜忽鳴喚聲聞三十里遣人打落兩耳及尾以鐵釘釘四脚夏四月乙卯虎病甚以彭城王遵為大將軍鎮闗右燕王斌為丞相錄尚書事張豺為鎮衛大將軍領軍將軍吏部尚書竝受遺詔輔政劉后惡斌輔政恐不利于太子與張豺謀去之矯詔稱斌無忠孝之心免官歸第尋復使豺弟雄矯詔殺之乙丑彭城王遵自幽州至鄴𠡠朝堂受拜配禁兵三萬遣之遵涕泣而去是日虎疾小瘳問遵至未左右答曰去已乆矣虎曰恨不見之虎臨西閣龍騰中郎三百餘人列拜于前虎曰何所求也皆曰聖體不安宜令燕王入宿衛典禁兵一作兵馬或言乞以為皇太子虎不知斌之已廢責曰燕王不在内耶呼來左右言王酒病不能入虎曰促持輦迎之當付璽綬亦竟無行者尋惽眩而入戊辰劉后矯詔以豺為太保都督中外諸軍錄尚書事加千兵百騎如霍光輔漢故事侍中徐統嘆曰禍將作矣吾無為豫之仰藥而死己巳虎薨於金華殿及遵僭立葬於顯原陵偽諡武皇帝廟號太祖虎以晉咸康元年僭位至晉太和五年死在位十五年十六國春秋卷十七
