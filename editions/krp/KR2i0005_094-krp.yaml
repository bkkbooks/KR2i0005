body:
  text: 十六國春秋卷九十四北涼錄一沮渠䝉遜沮渠䝉遜本張掖臨松盧水胡人也匈奴有左沮渠右沮渠之官蒙遜之先世曾為此職故遂以官為氏世居盧水為酋豪高祖暉仲歸曾祖遮皆雄健有勇力祖祁復延封北地王北一作狄又作乞父法𢎞襲爵苻堅時以為中田䕶軍卒䝉遜代領部曲雄桀多策略好學涉獵書史頗曉天文滑稽善權變數為諸胡所推服梁熙吕光皆竒而憚之故常遊飲以自晦光之王於涼土使䝉遜自領營人配箱直又以蒙遜伯父羅仇為西平太守仇弟麴粥為三河太守光遣其子慕璝率仇粥征河南王乞伏乾歸於枹罕前軍敗績麴粥言於羅仇曰主上昏耄驕縱諸子朋黨相傾讒人側目今軍敗將死正其智勇猜忌之時可不懼乎吾兄弟素為所憚必不見容與其死之無名不若勒衆向西平出苕藋奮臂大呼涼州不足定也羅仇曰誠如汝言然吾家世以忠孝著於西土一方所推寧使人負我我不忍負人也未幾光果聴讒以敗軍之罪殺仇及粥䝉遜以仇粥之喪歸葬諸部多其姻族會葬者凡萬餘人䝉遜哭謂衆曰昔漢祚中微吾之乃祖翼奬竇融保寧河右吕王昏耄荒虐無道多殺不辜豈可坐觀成敗不上繼先祖安民之志下使二父有恨黄泉衆咸稱萬嵗遂結謀起兵殺光中田䕶軍馬邃進攻臨松郡殺縣令井祥以盟一旬之間衆至萬餘屯據金山光遣吕纂逆擊蒙遜於忽谷䝉遜敗績將六七人逃入山中家戸悉亡散時從兄晉昌太守男成聞䝉遜起兵亦合衆數千還屯樂綰殺酒泉太守疊滕一作壘澄䝉遜乃收集部曲投之共推建康太守段業為使持節大都督龍驤大將軍涼州牧建康公改吕光龍飛二年為神璽元年業以蒙遜為鎮西將軍張掖太守男成為輔國將軍酒泉太守軍國之事悉以委之神璽二年夏四月段業將遣䝉遜攻光西郡太守吕純衆咸疑之䝉遜曰此郡據嶺之要不可不取業曰卿言是也遂遣之經旬不克乃引水灌城城潰執純以歸於是晉昌太守王徳燉煌太守孟敏皆以郡降業業封蒙遜為臨池侯以徳為酒泉太守敏為沙州刺史徙男成為晉昌太守六月業遣男成及王徳攻光常山公吕𢎞𢎞引兵棄張掖東走業遂徙治張掖議欲追擊之䝉遜諫曰歸師勿遏窮寇弗追此兵家之法也不如縱之以為後圖業曰一日縱敵悔將何及遂率衆追之為𢎞所敗賴䝉遜救以免業嘆曰孤不能用子房之言以至於此冬十月業築西安城以别將臧莫孩為太守蒙遜曰莫孩勇而無謀知進不知退此乃為之築冡非築城也業不從尋為吕纂所破䝉遜懼業不能容己每匿智以避之天璽元年春二月業僭稱涼王赦其境内改元天璽以䝉遜為尚書左丞梁中庸為右丞夏五月三河王吕光遣其二子紹纂來攻業請救於秃髪烏孤烏孤遣弟利鹿孤及楊軌救之紹等引軍而南業將擊之䝉遜諫曰楊軌恃鮮卑一作虜騎之强有窺覦之心紹纂深入置兵死地必決戰求生不可敵也今不戰則有泰山之安戰則有累卵之危業曰卿言是也按兵不戰紹亦難之各引兵歸天璽二年春正月前晉昌太守唐瑶叛歸李暠酒泉太守王徳亦叛自稱河州刺史業使蒙遜討之徳焚城將部曲奔唐瑶䝉遜追至沙頭大破之虜其妻子部曲而還夏四月業懼䝉遜雄武微欲逺之乃以蒙遜從叔益生為酒泉太守䝉遜為臨池太守以門下侍郎馬權代䝉遜為張掖太守權每輕侮䝉遜䝉遜譖而殺之因謂男成曰段業愚暗非濟世之才信讒愛佞無鑒㫁之明向所憚者惟索嗣馬權今皆誅之䝉遜欲除業以奉兄何如男成曰業羈旅孤飄為吾家所建立恃吾兄弟猶魚之有水人既親之背之不祥乃止永安元年春正月䝉遜既為業所憚内不自安求為西安太守業亦以䝉遜有大志懼為朝夕之變喜其出外許之䝉遜期與男成同祭蘭門山宻遣司馬許咸告業曰男成欲謀叛許以取假日作逆若求祭蘭門山臣言驗矣至期果然夏四月業收男成逼令自殺男成曰䝉遜欲謀叛先已告臣臣以兄弟之故隠忍不言以臣今在恐部衆不從故與臣克期祭山返相誣告其意欲王之殺臣也臣若朝死䝉遜必夕發乞詐言臣死暴臣罪惡䝉遜必反臣然後奉王命投袂討之事無不捷業不從竟殺之䝉遜聞男成死泣告衆曰男成忠於段王而段王無故枉見屠害諸君能為報仇乎且州土兵亂似非段王所能濟也吾所以初奉之者以之為陳吳耳而信䜛多忌枉害忠良豈可安枕卧觀使百姓罹於塗炭男成素得衆心衆皆憤泣争奮比至氐池衆逾一萬鎮軍將軍臧莫孩率所部來降羌胡多起兵嚮應之者䝉遜進壁侯塢業先疑右將軍田昂幽之於内至是召昂謝而赦之使與武衞將軍梁中庸等攻䝉遜於侯塢業别將王豐孫言於業曰西平諸田世有反者昂貌恭而心狠志大而情險不可信也業曰吾疑之久矣但非昂無可以討蒙遜者豐孫言既不從昂至侯塢䝉遜自氐池逆之昂率騎五百降於䝉遜軍遂大潰中庸亦率衆來降五月蒙遜至張掖田昂兄子承愛斬闗内之業左右散走䝉遜大呼曰鎮西何在軍人曰在此業曰孤單瓢一作飄一已為貴門所推願丏餘命投身嶺南庶得東還與妻子相見䝉遜不許遂斬之業京兆人也博涉史傳有尺牘之才為杜進記室從征塞表儒素長者無他權略威禁不行羣下擅命尤信卜筮讖記巫覡徴祥故為奸佞所誤男成弟富占將軍俱傫帥戸五百䧏於河西王利鹿孤六月梁中庸房晷田昂等共推蒙遜為使持節大都督大將軍涼州牧張掖公大赦境内殊死已下改元永安白帖作永和署置百官從兄伏奴為鎮軍將軍張掖太守和平侯弟挐為建忠將軍都谷侯田昂為鎮南將軍西郡太守臧莫孩為輔國將軍房晷為左長史梁中庸為右長史張騭為左司馬謝正禮為右司馬擢任賢才文武咸悦是月燉煌太守李暠亦起兵自號冠軍大將軍西胡校尉沙州刺史太守如故稱元庚子與䝉遜相抗秋七月秦姚興遣隴西公姚碩徳攻吕隆於姑臧䝉遜因遣從事中郎李興聘於秦以通和好八月蒙遜所部酒泉涼寧二郡叛降於西涼李暠又聞吕隆降秦大懼遣建忠將軍挐牧府長史張濳見碩徳於姑臧請軍迎接率部人東遷碩徳大悦拜潛張掖太守挐建康太守潛勸䝉遜東遷挐私謂䝉遜曰吕氏猶存姑臧未拔碩徳糧竭將還必不能久何故違離桑梓受制於人乎輔國將軍臧莫孩曰建忠之言是也蒙遜乃斬張潛因下書曰孤以虛薄猥忝時運未能𢎞闡大猷戡蕩羣孽使桃蟲鼔翼東京封豕烝涉西裔戎車屢動干戈未戢農失三時之業百姓戸不粒食可蠲省百徭專功南畝明設科條務盡地力九月遣子奚念為質於河西王利鹿孤利鹿孤不受曰奚念年少可遣挐也冬十月䝉遜復遣使上疏於利鹿孤曰臣前遣奚念具披誠欵而聖㫖未昭復徵臣弟挐臣竊以為茍有誠信則子不為輕若其不信則弟不為重今寇難未夷不獲奉詔願陛下亮之利鹿孤怒遣昌松侯一作張松秃髪俱延興城侯禿髪文支將騎一萬來襲擊之至萬嵗臨松執從弟鄯善茍子虜其民六千餘戸十二月䝉遜遣從叔孔遮入朝於利鹿孤許以挐為質利鹿孤乃歸其所掠召俱延等還永安二年春二月蒙遜與西平侯秃髪傉檀共攻涼州為吕隆所破冬十月西涼李暠遣唐瑶及應揚將軍宋繇攻酒泉獲太守益生十二月䝉遜所署西郡太守梁中庸奔於李暠是年大風震電於震所得石册永安三年春正月蒙遜下令曰養老乞言晉文納輿人之誦所以能招禮英竒致時雍之美也况孤薄徳寡昧智不經逺可不思聞讜言以自鏡哉内外臣僚其各搜揚賢雋廣進芻蕘以匡孤不逮永安四年春二月吕隆以䝉遜傉檀交侵遣弟吕超求迎於秦夏六月䝉遜遣輔國將軍臧莫孩襲北山虜大破之虜其民五千戸而還秋八月秦姚興遣尚書左僕射齊難等率衆迎隆隆勸難引兵來伐難從之蒙遜使臧莫孩敗其前軍難乃結盟而還䝉遜遣弟建忠將軍挐入貢於秦是時䝉遜伯父中田䕶軍親信臨松太守孔篤竝驕奢侵害百姓苦之蒙遜曰亂吾國者二伯父也何以綱紀百姓乎皆逼之令自殺冬十月秦遣鴻臚梁斐張構等拜䝉遜鎮西大將軍開府儀同三司沙州刺史西海侯時秦亦拜秃髪傉檀為車騎將軍封廣武公䝉遜聞之不悦謂斐等曰傉檀上公之位而身為侯者何也構對曰傉檀輕狡不仁欵誠未著故朝廷以重爵虚名羈縻之褒其歸善即叙之義耳將軍忠貫白日勲髙一時當入諧鼎味匡贊帝室安可以不信相待也聖朝爵必稱功官不越徳如尹緯姚晃佐命初基齊難徐洛元勲驍將竝位纔二品爵止侯伯將軍何以先之乎昔竇融殷勤固讓不欲居舊臣之右不意將軍忽有此問蒙遜曰朝廷何不即以張掖見封而更逺封西海耶構曰張掖規畫之内將軍已自有之所以逺授西海者盖欲廣大將軍之國耳䝉遜大悦乃拜受之永安五年春二月䝉遜襲狄洛磐於番禾不克遷其民五百餘戸而還是年造刀一百口銘曰永安隸書永安六年秋八月西涼李暠遷都酒泉漸逼蒙遜䝉遜攝軍以禦之永安七年夏六月南涼秃髪傉檀率衆來攻䝉遜嬰城固守傉檀至赤泉虜掠而去秋八月蒙遜襲西涼李暠於酒泉至安彌一作安珍去城六十里暠乃覺引軍出戰遂大破之暠閉城自守䝉遜亦引而歸永安八年春二月兩月一作日竝出山崩地震折木太史令劉梁言於䝉遜曰辛酉金也地動於金金動尅木大軍東行無前之徵時張掖城每有光色蒙遜曰王氣將成百戰百勝之象也遂攻秃髪傉檀於均石大戰破之進攻西郡太守楊統於日勒抜之統降拜為右長史寵待踰於功舊永安九年酒泉南有銅駝山言犯之者輒大雨雪䝉遜遣工取之得銅萬斤永安十年春二月張掖太守句呼勒出奔李暠秋七月䝉遜以羅仇子成都為金山太守麴粥子鄯善為西郡太守句呼勒自西涼奔還待之如初䝉遜率騎二萬東征次於丹嶺北虜大人思盤率部落三千來降時木連理生於永安永安令張披上書曰異枝同榦遐方有齊化之應殊本同心上下有莫二之固盖至道之嘉祥大同之美徵也䝉遜曰此皆二千石令長匪躬濟時所致豈吾薄徳之所能感也永安十一年春三月䝉遜率騎三萬伐秃髪傉檀次於西郡大風從西北來氣有五色俄而晝昏進至顯美徙數千户而還傉檀率衆來追及於窮泉䝉遜將擊之諸將皆曰賊已安營不可犯也䝉遜曰傉檀謂吾逺來疲敝必輕而無備及其壁壘未成可一鼔而擒也遂進擊之傉檀大敗乘勝至於姑臧夷夏䧏者萬數千戸傉檀懼嬰城固守遣使請和以子染干為質許之掠八千餘戸而歸傉檀南奔樂都魏安人侯謀等閉門作亂遣使來降焦朗亦據姑臧自稱大都督龍驤大將軍臣於西涼李暠秋八月䝉遜率騎二千伐李暠敗暠子歆於馬廟擒其將朱元虎遂引兵還既而以元虎歸暠永安十二年春二月焦朗猶據姑臧䝉遜率騎攻抜其城執朗而歸宥之於是大饗文武將士於謙光殿班賜金馬各有差署弟建忠將軍挐為䕶羌校尉秦州刺史封安平侯鎮姑臧遂伐南涼圍樂都三旬不克南涼王秃髪傉檀以子安周為質引還未幾傉檀復率衆來攻䝉遜擊之進圍樂都傉檀勢窮請降以子染干為質乃還是月挐死以從祖益子為鎮東將軍䕶羌校尉秦州刺史鎮姑臧秋七月䝉遜遣沮渠百年襲西涼李暠暠子歆邀擊之失甲士數千百年為歆所擒𤣥始元年冬十月䝉遜遷都姑臧十一月僭即河西王位於謙光殿大赦境内殊死已下改元𤣥始置百官丞郎官如吕光為三河王故事繕宫殿起城門諸觀𤣥始二年春正月尊母車氏為王太后立妻孟氏為王后夏四月立子政徳為世子加鎮衞大將軍錄尚書事南涼王秃髪傉檀來伐䝉遜敗之於若厚塢又敗之於若涼進圍樂都二旬不克傉檀湟河太守秃髪文支據湟川來降鎮軍將軍成宜侯亦率衆來降䝉遜署文支為鎮東大將軍廣武太守成宜侯為振威將軍湟川太守以殿中將軍王建為湟河太守秋八月䝉遜復率衆伐傉檀傉檀懼以太尉俱延為質乃還因下書曰古先哲王應期撥亂者莫不經略八表然後光闡純風孤雖智非靖難職在濟時而狡虜傉檀鴟峙舊京毒加夷夏東苑之戮酷甚長平邊城之禍害深玁狁每念蒼生之無辜是以不遑寧處身披甲胄體倦風塵雖傾其巢穴傉檀猶未授首其弟文支追項伯歸漢之義據彼重藩請為臣妾自西平巳南連城繼順惟傉檀窮獸守死樂都四支既落命豈久全五緯之會巳應清一之期無賒方散馬金山黎元永逸可露布逺近咸使聞知冬十月䝉遜西如苕藋遣冠軍將軍沮渠伏恩率騎一萬襲卑和烏啼二虜大破之俘獲二千餘戸而還是年䝉遜母車氏卒𤣥始三年夏秃髪烏孤孫承鉢利鹿孤孫副周皆來奔降冬十二月晉益州刺史朱齡石遣使來聘諭以朝廷威徳𤣥始四年春三月䝉遜率衆伐西秦乞伏熾磐於廣武郡克之遣别將運糧於湟河以糧運不繼遂自廣武如湟河渡浩亹熾磐遣將軍乞伏魁尼寅邀之於浩亹䝉遜擊斬之熾磐又遣將軍王衡折斐麴景等率騎二萬據勤姐嶺䝉遜且戰且前大破之擒折斐等七百餘人乃以弟漢平為折衝將軍湟河太守引還夏五月䝉遜遣舍人黄迅報聘益州因上表於朝廷曰上天降禍四海分崩靈耀擁於南裔蒼生没於醜虜陛下累聖重光道邁周漢純風所被八表宅心臣雖被髪邊徼才非時儁謬為河右遺黎推為盟主臣之先人世荷恩寵雖歴夷嶮執義不回傾首朝陽乃心王室去冬益州刺史朱齡石遣使詣臣始具朝廷休問承車騎將軍劉裕秣馬揮戈以中原為事可謂天贊大晉篤生英輔臣聞少康之興大夏光武之復漢業皆奮臂一呼攘袂而起衆無一旅地不滿百猶能成配天之功著車攻之詠况陛下據全楚之地擁荆揚之鋭而可晏然垂拱棄二京以資戎虜若六軍北軫尅復有期臣請率河西戎卒為晉右翼驅除戎虜時赫連勃勃遣御史中丞烏落孤來結盟䝉遜遣弟湟河太守漢平蒞盟於夏西秦乞伏熾磐率衆二萬襲湟河漢平力戰固守遣司馬隗仁夜出擊之熾磐大敗斬首數百將引兵去漢平長史焦㫤將軍段景密信招之熾磐復進攻圍益急漢平納㫤景之説面縛出降隗仁不屈為熾磐所擒將斬之其將段暉固請得免尋遁還姑臧拜髙昌太守𤣥始五年春正月䝉遜率衆攻西秦進次石泉熾磐遣乞伏曇達來拒䝉遜引還遣使與通和好三月䝉遜西祀金山遣沮渠廣宗率騎一萬襲烏啼虜大破之西至苕藋遣前將軍沮渠成都一作城都將騎五千襲卑和虜自率中軍三萬為之後繼卑和虜率衆迎降遂循海而西復如金山以歸𤣥始六年夏四月西域貢吞刀吐火秘幻竒術起遊林堂於内苑圖列古聖賢之像秋九月堂成遂大宴羣臣談論經𫝊𤣥始七年夏五月䝉遜下書曰頃自春大旱害及時苗碧原青野倐為枯壤將刑政失中下有寃獄乎役賦繁重上天所譴乎内省多缺孤之罪也書不云乎百姓有過罪子一人可大赦境内殊死已下免百姓夏税秋糧翼日㴻雨大降䝉遜聞劉裕滅姚泓怒甚門下校書郎劉祥言事於䝉遜䝉遜曰汝聞劉裕入闗敢研研然也研研即倔强之貌遂殺之其峻暴如是顧謂左右曰古之行師不犯嵗鎮所在姚氏舜後軒轅之苗裔今嵗星在軒轅而裕滅之亦不能久守闗中也秋九月䝉遜遣張掖太守廣宗詐降以誘李歆歆發兵來應䝉遜伏兵於蓼泉歆覺之引去䝉遜追及之與戰敗於解支澗一作西支澗復收散卒欲戰前將軍成都諌曰臣聞髙祖有彭城之敗終成大漢今宜旋師以為後圖䝉遜從之城建康而還冬十月故秦將姚艾來奔䝉遜引兵迎之既至署為征南將軍羣臣上書曰設官分職所以經國濟時恪勤官次所以緝熙庶政當官者以匪躬為務受任者以忘身為效自皇綱初震戎馬生郊公私草創未遑舊式而朝士多違憲制不遵典章或公文御案在家卧署或事無可否望空而過至令黜陟絶於皇朝駁議寢於聖世清濁共流能否相雜人無競勸之心茍為度日之事豈憂公忘私奉上之道也今皇化日隆遐邇寧泰宜振肅綱維申修舊則䝉遜納之命征南將軍姚艾尚書左丞房晷撰朝堂制行之旬日百姓振肅是年晉遣使拜䝉遜為涼州刺史䝉遜稱藩故有是命𤣥始八年秋八月太史令張衍言於䝉遜曰今嵗臨澤城西當有破兵蒙遜乃遣世子政徳屯兵若厚塢䝉遜西至白岸謂張衍曰吾今年當有所定但太嵗在申月又建申未可西行且可一作當南行要其歸會主而勿客以順天心計在臨機慎勿露也遂遣兵伐西涼李歆於酒泉先攻浩亹音閣門而蛇盤於帳前䝉遜笑曰前一為騰蛇通典作塍蛇今盤在吾帳前天意欲吾迴師先定酒泉也遂燒攻具而還潛次於川巖聞歆徵兵欲乘虚攻張掖䝉遜曰歆已入吾計中但恐聞吾迴軍必不敢前兵事尚權乃露布西境稱得浩亹將進軍黄谷歆聞之引兵入都瀆澗䝉遜潛軍逆擊敗之於懷城歆退走追至臨澤斬歆及兄弟三人進克酒泉百姓安堵如故軍無私掠以子茂䖍為酒泉太守涼之舊臣皆隨才擢叙九月歆弟燉煌太守恂據郡自稱冠軍大將軍冬十月䝉遜遣世子政徳攻之恂閉門拒守𤣥始九年春三月䝉遜自率衆攻燉煌乃築長堤引水灌城數十日不下攻之益急恂乞降不許恂武衞將軍宋承廣武將軍張𢎞等舉城來降殺恂而屠其城獲其弟子寶囚於姑臧李氏由是遂亡於是鄯善王比龍入朝西域三十六國皆詣䝉遜稱臣貢獻冬十月己亥宋遣使拜䝉遜為鎮軍大將軍開府儀同三司涼州刺史十一月遣右衞將軍鄯善建節將軍茍生率衆伐西秦西秦王乞伏熾磐遣征北將軍没奕干等率步騎五千來拒鄯善等敗於五澗茍生為其所虜𤣥始十年春正月饗羣臣於謙光殿䝉遜曰南方有惡氣經天暴兵象也不出一旬必有寇至命治兵東苑以備之未幾乞伏熾磐遣騎五千來襲至於猻猢嶺聞有備而去秋八月䝉遜遣前將軍成都率衆一萬耀兵嶺南遂屯五澗九月乞伏熾磐遣征北將軍出連䖍一作没奕干等帥精騎五千一作六千來擊冬十月成都為出連䖍所破掠民三千餘户而去十二月晉昌太守唐契據郡以叛遣世子政徳討之𤣥始十一年春正月蒙遜遣使詣宋貢其方物宋以䝉遜為使持節都督涼秦河沙四州諸軍事驃騎大將軍涼州牧河西王夏四月政徳攻晉昌克之唐契及弟和甥李寶同奔伊吾招集流民歸附者二千餘人遂臣於柔然秋七月柔然來攻䝉遜遣政徳拒之政徳輕騎進戰軍敗見殺冬十月立次子興國為世子大赦境内殊死已下文武進位一等𤣥始十二年秋八月西秦乞伏熾磐遣太子暮末等率步騎三萬出貂渠谷來攻遂陷白草嶺及臨松郡徙民二萬餘口而去𤣥始十三年夏四月乞伏熾磐遣平逺將軍叱盧犍等來攻執蒙遜從弟成都及從子白蹄頗羅等徙民五千餘戸而去𤣥始十四年秋八月乞伏熾磐率衆來攻至廉川其太子暮末等率步騎三萬攻西安不克又攻番禾䝉遜發兵禦之因遣使説夏主赫連勃勃使乗虚襲枹罕熾磐聞之引兵而去冬十二月䝉遜遣使入貢於魏是歳魏始光三年也𤣥始十五年春二月魏世祖諱燾遣行人持節册拜䝉遜為河西王承𤣥元年夏六月䝉遜遣兵伐西秦時乞伏熾磐死暮末即位遣使詣䝉遜許歸成都以求和親䝉遜遣使入西秦弔祭暮末厚資成都遣將軍王伐送之䝉遜猶疑之執伐以歸既而遣還并遺暮末甚厚於是大赦境内殊死已下改元承𤣥秋九月暮末遣使報聘冬十月西秦涼州牧乞伏千年來奔十二月䝉遜復率衆伐西秦至磐夷西秦相國乞伏元基等將騎一萬五千來拒䝉遜還攻西平暮末遣騎來援䝉遜乃引而還承𤣥二年夏五月乞伏暮末遷保定連蒙遜遣世子興國攻之六月暮末率衆迎擊至於冶城興國戰敗被擒殺軍士三千餘人追擊䝉遜至譚郊吐谷渾王慕璝遣其弟没利延帥騎來援暮末遣輔國大將軍段暉逆擊之大敗而歸秋七月遣使送穀三十萬斛以贖世子興國於西秦暮末不許蒙遜乃立興國弟菩提為世子冬十一月䝉遜復遣使詣宋入貢獻青雀頭黛百斤并求周易及子集諸書詔竝給之合四百七十五卷又就司徒王𢎞求搜神記𢎞寫與之十二月䝉遜下書曰乞伏暮末頻年失信終日言笑要當一舉勦其巢穴軍次沃干嶺枹罕城中餓死大半承𤣥三年冬十月蒙遜復遣尚書郎宗舒左常侍髙猛等入貢於魏因上表曰伏惟陛下天縱叡聖徳超百王陶育齊于二儀洪基隆于三代然鍾運多難九服紛擾神旗暫擁車書未同上靈降祐祚歸有道純風一鼔殊方革面羣生幸甚率土齊歡臣誠弱才效無可錄幸遇重光思竭力命自欣投老得觀盛化冀終餘年憑倚皇極前後奉表貢使相望去者杳然寂無旋返未審津塗寇險竟不仰達為天朝髙逺未䝉齒錄屏營戰灼無地自措往年侍郎郭秪等還奉被詔書三接之恩始隆萬里之心有賴今極難之餘開泰惟始誘勸既加引納彌篤老臣見存遐外無棄仰荷愷悌之仁俯蹈康哉之詠然商胡後至奉公卿書援引厯數安危之機勵以竇融知命之美顧惟情願實深悚惕何者臣不自揆逺託大蔭庶微誠上宣天鑒下降若萬國來庭百辟陛賀高蹈先至之端獨步知機之首但世難尚殷情願未遂章表頻修滯懷不暢許身為國欵誠莫表致惑羣后貽慮公卿辭㫖紛紜抑引重沓不在同奬之例未達拱辰之心延首一隅低回四極臣歴觀符瑞候察天時未有過於皇魏踰於陛下加以靈啓聖姿㓜登天位美詠侔於成康道化踰於文景方將振神綱以掩六合灑𤣥澤以潤八荒况在秦隴荼炭之餘直是老臣盡效之會舒等既至世祖與之飲宴執崔浩之手以示之曰汝所聞崔公此則是也才略之美當今無比朕動止咨之預陳成敗若合符契未嘗失也自此以後貢使相望義和元年夏六月赫連定畏魏之逼擁秦民十餘萬口自冶城濟河欲擊䝉遜而奪其地定濟未半吐谷渾王慕璝襲擊敗之執定以歸於是蒙遜大赦境内殊死已下改元義和以世子菩提為冠軍將軍河西王世子秋八月乙酉䝉遜遣子安周入侍於魏九月世祖欲精簡行人報使䝉遜以問崔浩浩曰蒙遜稱藩欵著河右若俾遐域流通殊荒畢至宜令清徳重臣奉詔褒慰尚書李順即其人也世祖曰順納言大臣固不宜先為此使若䝉遜執玉帛而朝於朕復何以加之浩曰邢貞使吳亦魏之太常茍事是宜無嫌於重爾日之行豈吳王入覲時也世祖從之乃以順兼太常持節拜䝉遜為假節加侍中都督涼州西域羌戎諸軍事太傅行征西大將軍涼州牧涼王加九錫之禮使浩為册書以褒賞之册曰昔吾皇祖胄自黄軒總御羣才攝服戎夏叠曜重光不殞其舊逮於太祖應期協運大業惟新奄有區宇受命作魏降及太宗廣闢崇基政和民阜朕承天緒思廓宇縣然時運或否雰霧四張赫連跋扈於闗西大檀陸梁於漢北戎夷負阻江淮未賓是用自東征西戎軒屢動一作駕賴宗廟靈長將士宣力克剪兇渠震服彊獷四方漸泰表裏無塵王先識機運經略深逺與朕協同厥功洪茂當今運鍾時季僭逆憑陵有土者莫不跨峙一隅有民者莫不榮其私號不遵衆星拱極之道不慕細流歸海之義而王深悟大體率由典章任土貢珍愛子入侍勲義著焉道業存焉惟王乃祖乃父有土有民論功徳則無二於當時言氏族則始因於世爵古先帝王褒賢賞徳莫不胙土分民建為藩輔是以周成命太公以表東海襄王錫晉文大啟南陽是用割涼州之武威張掖燉煌酒泉西海金城西平七郡封王為涼王受兹素土苴以白茅用建冢社為魏室藩輔盛衰存亡與魏升降夫功高則爵尊徳厚則任重又加命王入贊百揆謨謀幃幄出征不懷登攝侯伯其以太𫝊行征西大將軍仗鉞秉旄鷹揚河右逺袪王略懷柔荒隅北盡於窮髪南極於庸岷西被於崑嶺東至於河曲王實征之以夾輔皇室又命王建國署將相羣卿百官承制假授除文官刺史以還武官撫軍以下建天子旌旗出入警蹕如漢初諸侯王故事欽哉惟時往踐乃職祇服朕命協亮天工俾九徳咸事無忝庶官用終爾顯徳對揚我皇祖之休烈義和二年冬十二月李順復奉使至涼䝉遜遣中兵校郎楊定歸謂順曰年衰多疾舊患動發腰髀不隨不堪拜伏比三五日消息小差自當相見順曰王之老疾朝廷所知以王祇執臣禮别有詔㫖豈得自安不見詔使明日䝉遜延順入至庭中箕坐隠几無動起之狀順正色大言曰不謂此叟無禮乃至於此今不憂覆亡而敢凌侮天地魂魄逝矣何用見之握節將出䝉遜使定歸追止之曰太常既雅恕衰疾傳聞朝廷有不拜之詔是以敢自安耳若太常曰爾拜爾跪而不祇命斯小臣之罪矣順益怒曰齊桓公九合諸侯一匡天下周天子賜胙命曰伯舅無下拜桓公猶不敢失臣禮下拜登受今王雖功髙勲厚未如小白之勤朝廷雖相崇重未有不拜之詔而遽自偃蹇妄為尊大此乃速禍之道非圖久安之計若朝廷震怒遂相吞滅悔亦何及豈社稷之福乎䝉遜謝曰太常規之以古烈懼之以天威敢不翹悚敬聴休命遂拜伏盡禮禮畢䝉遜曰夫恃徳者昌恃力者亡朝廷頃來征伐屢克境宇已博但當循理此民亦足興治然專務討擊恐不可常勝順曰昔太祖廓定洪基造有區夏太宗承統王業惟新自聖上臨御志寧四海是以戎車屢駕親冐風霜滅赫昌於三秦走蠕蠕於漠北闢地開邊隸首不紀僵屍截馘所在成觀除蕩暴虐存恤黎庶威振八荒聲被九域自古以來用兵之美未有如今日之盛者也是以遐方荒俗之氓莫不翹足抗手歛袵屈膝天兵四臨昭徳伐罪何云恃力夫聖王之用兵也征南蠻則北狄怨討西戎則東夷恨天子安得已哉蒙遜曰誠如來言則涼土之民亦願魏帝逺至何為復遞驛告驚不舍晝夜意君之所言殆為虚事順曰苗民叛帝舜而親暴君有扈違后啓而從逆主咸懾逼於近地牽制於凶威自古而然豈獨涼民也初罽賓沙門曇無䜟東如鄯善自云能使鬼治病且有秘術令婦人多子與鄯善王㬅頭陀林淫通發覺亡奔涼州䝉遜甚重之號曰聖人無䜟以男女交接之術教授婦女䝉遜諸女及子婦皆往受術世祖聞之遣使來迎且告蒙遜曰若不遣䜟便即加兵䝉遜事䜟日久未忍聴去至是復使李順命䝉遜曰聞彼曇無䜟法師博通多識羅什之流秘呪神驗澄公之匹朕思欲講道願一奉見可馳驛送之蒙遜與李順宴於新樂門上謂順曰西番老臣䝉遜奉事朝廷不敢違失而天子信納佞言茍見蹙迫前遣表求留曇無䜟而今使來徵索此是門師當與之俱死實不惜殘年人生一死詎覺幾時順曰王欵誠先著遣愛子入侍朝廷欽王忠績故顯加殊禮而王以一胡道人虧山岳之功不忍一朝之忿損由來之美吐所不當言豈朝廷相待之厚意耶竊為大王不取也且主上虚襟之至𢎞文之所知也𢎞文䝉遜所遣聘魏之使也蒙遜曰太常口美如蘇秦但恐情不副辭耳仍留不遣後竟發覺其事考訊殺之順還世祖問與䝉遜往復之辭及政教得失順曰䝉遜控制河西踰三十年經涉艱難粗識機變綏集荒裔羣下畏服雖不能貽厥孫謀此亦足以終其一世前嵗表許十月送曇無䜟及臣往迎便事乖本意不忠不信於是而甚然禮者徳之輿敬者身之基也蒙遜無禮不敬而能久享祿福以臣觀之不復年矣世祖曰若如卿言則效在無逺其子必易世易世之後早晚一作何時當滅順曰䝉遜諸子臣略見之皆庸才也不能保一隅如聞燉煌太守牧犍即茂䖍器性粗立若繼蒙遜者必此人也然比之於父皆云不及此殆天之所以資聖明也世祖曰朕方有事東方未暇西略如卿所言不過數年之外不足為晚且停前計以為後圖䝉遜末年荒淫猜虐忍於刑戮羣下苦之閨庭之中略無風紀義和三年夏四月䝉遜寢疾左右常白日見鬼以劍擊之未幾薨於路寢五月葬元陵私諡曰武宣王廟號太祖蒙遜以晉安帝隆安五年嵗在辛丑自稱張掖公至義熙八年僭稱涼王後八年而宋氏受禪以宋元嘉十年嵗在癸丑卒在偽位三十三年時年六十六子茂䖍嗣先是䝉遜王有涼土專𢎞事佛於涼州南百里崖中大造形像千變萬化驚人眩目有土聖僧可如人等常自經行無時暫舍遥見則行人至便止觀其面貌狀如其中泥塑形像人咸異之乃羅土於地後往看之足跡隠隠今見如此十六國春秋卷九十四
