body:
  text: 十六國春秋卷五十二後燕錄十光祚光祚清河人本宦者仕苻堅為冗從僕射初垂在長安堅嘗與之交手語垂出祚言於堅曰陛下頗疑慕容垂乎垂非久為人下者也堅以告垂及堅敗苻丕自鄴奔晉陽祚遂奔晉晉以祚為河北郡守營於濟北之濮陽羈屬温詳詳敗詣軍門降垂赦之撫待如舊垂見祚流涕沾衿曰秦王待我理深吾事之亦盡淮南之敗吾效忠節但為公猜忌懼死而負之每思疇昔之恩未嘗中夜忘寢祚亦欷歔悲動左右因賜祚金帛祚固辭垂曰卿猶復疑耶祚曰臣昔者惟知忠於所事不意陛下至今懐之臣敢逃其死垂曰此乃卿之忠固吾之所求也前言戲之耳待之彌厚以為中常侍趙秋趙秋字子武汲郡朝歌人也少而輕財好施隣人李𤣥度母死家貧無以葬秋謂其兄曰赴死生救不足人一作仁之本也家有二牛即以一牛與之𤣥度得以葬母他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十以後當富貴不可言勿忘𤣥度也俄而不見後事垂為冠軍將軍行參軍事苻堅淮南之敗秋以千餘騎奔垂仍說垂曰明公當紹復燕祚著於圖讖今天時已至尚復何待若殺秦王據鄴都鼓行而西三秦亦非苻氏之有也垂不從悉以兵授堅及垂至鄴苻丕聞其北來疑欲為亂身自出迎秋勸垂於坐取丕垂亦不納垂後發兵于鄴農亦起兵列人應之使秋說屠各及東夷烏丸各帥步衆數千來援農以垂未至不敢行賞秋曰軍無賞士不往今之來也皆為建功規利宜承制封拜以廣中興之業農從之於是赴者相繼眭邃眭邃字懐道趙郡髙邑人也父邁晉東海王司馬越軍謀掾後沒石勒為徐州刺史邃仕垂為從事中郎農至高邑遣邃出近違期不還長史張攀言於農曰邃目下參佐敢欺妄不還請迴軍討之農不應勑備假板以邃為髙陽太守參佐家在趙北者悉假署遣歸退謂攀曰君所言殊誤當今豈可使自相魚肉吾北還邃等自當迎於道左君但觀之及垂至中山農以前驅先進邃等皆來迎候上下如初攀乃服農之智畧仕寶中書令寶逼殺太后段氏不肯成喪邃以大義切諫具段后錄寶不得已從之乃成喪髙展髙展渤海蓨人也漢太傅裒之後其父慶仕燕太子詹事歴位司空慶生三子泰敬展展仕寶為黄門郎泰仕於秦見前秦錄髙湖湖弟恒恒弟韜髙湖字大淵父泰吏部尚書中書令湖少機敏有器度與弟一作兄韜俱知名於時雅為鄉人崔逞所敬異少歴顯職為散騎常侍垂遣太子寶等伐魏湖言於垂曰魏燕之與國世為婚姻彼有内難燕實赴之燕有所求彼無違者其德施厚矣和好多年行人相繼間以求馬不獲遂留其弟曲在於我非彼之失政當修敦舊好乂寧國家奈何復令太子率衆逺伐且拓跋魏太祖諱涉珪也雄略有謀險阻艱難備甞之矣兵精馬強未易輕也皇太子富於春秋志果氣銳輕敵好勝難可獨行兵凶戰危今委之專征必小魏而輕之萬一不如所欲傷威毁重願陛下深以為慮言頗切厲垂怒詔免湖官寶果敗於參合寶立起為征虜將軍燕郡太守寶走和龍兄弟交爭湖見其衰亂遂率户三千降魏任為寧西右將軍湖弟恒字叔宗仕垂鉅鹿太守率户二千亦降於魏恒弟韜少以英朗知名同郡封懿雅相推敬仕垂為太尉從事中郎魏武平中山以為丞相參軍早卒湖即北齊獻武王髙歡髙祖也詳見北齊書崔蔭崔蔭字世祿清河東武城人仕垂為長史章武王宙之鎮滑臺也垂以蔭為宙司馬先是陳留王紹為征南將軍太原王楷為征西將軍樂浪王温為征東將軍皆以蔭為之參佐䕃材幹明敏強正善規諫四王皆嚴憚之所至簡刑法輕賦役流民歸之户口滋息崔逞崔逞字叔祖清河東武城人魏中尉琰之五世孫也曽祖諒晉中書令祖遇仕石虎為特進父瑜黄門郎逞少好學有文才遭亂孤貧躬耕於野而講誦不輟慕容暐時郡舉上計掾補著作郎撰燕記遷黄門侍郎苻堅滅燕以為齊郡太守堅敗仕晉歴清河平原太守為丁零翟釗所虜授中書令及垂滅釗以為秘書監寶走和龍為留臺吏部尚書趙王麟殺詳自立逞乃攜妻子亡歸於魏先是張衮常與太祖言每稱逞之才可大用太祖得之甚喜以為尚書使錄三十六曹委以政事逞兄適字寧祖亦有名於時仕垂尚書左丞范陽昌黎二郡太守逞亦不得其死崔模崔模字思範清河東武城人父遵仕垂至少府卿叔父整廣川太守模至熙末年南渡河外為劉裕滎陽太守戍虎牢後歸仕魏官至中尉崔懿崔懿字世茂博陵安平人也仕垂位秘書監子遭字景遇位鉅鹿令其孫綽少孤學行脩明有名於世封懿封懿字處德渤海蓨人也曽祖釋晉東夷校尉祖悛父放仕儁為渤海太守暐吏部尚書兄孚仕超太尉懿雋偉有才氣能屬文與孚雖器有長短然名位略齊懿仕秦渤海太守撫軍麟狥清河執之以歸任為本郡歴位中書令户部尚書寶敗歸魏魏以懿為給事黄門侍郎都坐大官封章安侯問以燕氏舊事懿應對疎慢坐廢於家撰燕書十卷頗行於世封愷封愷字思悌奕之孫也父勸仕垂位至太常卿侍中愷給事黄門侍郎散騎常侍度支尚書坐司馬氏事死愷妻盧𤣥女也愷子伯達棄母及妻李氏南奔河表改婚房氏伯達子休傑後還祖母盧氏猶存垂百嵗矣而母李氏已先死矣封衡封衡字百華中書監裕之子也輕財好施年十餘嵗見一老父荷擔於路引歸問之謂其父曰宣子一飯著名春秋斯老父也宜給宅一區奴一口日供贍以終其年裕髙其志而從之及長身長八尺有智略仕垂為右司馬轉安東將軍垂攻鄴久不下衡請灌之以漳水垂以為然遂拔鄴城外郛翟斌恃功驕恣要請為尚書令垂將許之衡厲色止之曰馬能千里不免羈絆明畜生不可以人御也斌戎狄小人遭時際會兄弟封王自驩兠以來未有此福忽履盈忘止復有斯求魂爽錯亂必死不出年也垂從之斌果潛通苻丕事發伏誅衡後歴位中山尹吏部尚書宋隠宋隠字處道西河介休人也曽祖奭晉昌黎太守後為廆長史祖活中書監父恭尚書令徐州刺史儁徙都於鄴恭始家於廣平之列人隠性至孝年十三便有成人之志專精好學不以兵難易操仕垂歴尚書郎太子中舍人本州别駕隠叔父洽為垂尚書魏太祖圍中山洽率所領專守北圍當洽所統魏軍士多所傷殺太祖特深忿恨城陷被殺子順訓並下腐刑趙思趙思亦宦者仕寶為中黄門令寶之自龍城奔黎陽也寶叔冀州牧范陽王德自鄴徙居滑臺稱燕王置百官寶遣思召德弟鍾奉迎鍾本勸德稱帝聞思來惡之執以付獄而馳白德德與羣下議奉迎事其黄門侍郎張華等皆沮之徳乃遣其將慕輿䕶率壯士數百隨思而北聲言迎衞實謀弑之初寶既遣思後知德已攝位稱制懼而北奔䕶至黎陽無所見執思以還德以思閑習典故將任之思求還就寶德不許固留之思怒曰周室衰微晉鄭夾輔漢有七國之難實賴梁王殿下親則叔父位為上台不能率先羣后以匡王室而幸根本之傾為趙王倫之事思雖無申胥哭楚之効尤慕龔君賓不生莽世德怒殺之詳具南燕錄李系李系趙郡平棘人也仕垂散騎常侍東武城令治有能名魏太祖定中原以系為平棘令年老卒於家贈寧朔將軍趙郡太守平棘男李先李先字容仁中山盧奴人也祖重晉平陽太守大將軍右司馬父樊石虎樂安太守左中郎將先少好學善占候之術師事清河張御御竒之仕苻丕尚書左主客郎慕容永聞其名迎為謀主勸永據長子城永遂稱制以先為黄門郎秘書監髙密侯垂滅永徙先於中山後歸仕魏屈遵屈遵字子度一作子皮昌黎徒河人也博學多才藝為慕容永尚書僕射武垣公永滅垂以為博陵令魏太祖南伐軍次魯口博陵太守申永南奔河外髙陽太守崔宏東走海濱一作渚屬城長吏率多逃竄遵獨告其吏民曰往年寶師大敗今兹垂征不還天之棄燕人弗支也魏主神武命世寛仁善納御衆百萬號令若一此湯武之師吾欲歸命爾等勉之勿遇嘉運而為禍先遂歸魏以為中書令出納號令摠攝文誥皆信委之賈彞賈彞字彥倫本武威姑臧人六世祖敷魏幽州刺史廣川都亭侯子孫因以家之遂為廣川人父為苻堅鉅鹿太守坐訕謗繫獄彞年十嵗詣長安訟父獲伸逺近嘆之皆曰此子英俊賈誼之後莫之與京弱冠仕垂遼西王農記室參軍魏太祖聞其名嘗遣使求之垂彌増器重更加寵秩遷驃騎長史帶昌黎太守垂遣太子寶伐魏敗於參合彞及從兄代郡太守潤等被執後數年遁歸又為屈丐所執年六十卒張蒲張蒲字𤣥則河内修武人也本名謨後改為蒲漢太尉延之後父攀仕垂御史中丞兵部尚書以清方稱蒲少有父風頗涉文史端謹方正為寶陽平河間二郡太守尚書左丞魏太祖定中山寶官司叙用多降品秩素聞蒲名仍拜尚書左丞餘崇餘崇字子厚其父嵩仕垂光祿大夫平視叛於魯口嵩以鎮東將軍討之軍敗見殺崇仕寶為建威將軍寶被圍于中山清河王會表求赴難使崇為前鋒率騎五百伺魏強弱遇魏千餘騎鼔譟直進手殺數十人魏騎潰去崇亦引還勇冠一時衆心稍振後會使壯士襲殺髙陽王隆欲棄喪走龍城崇涕泣固諫乃聽載軍後寶嘉其忠拜中堅將軍封潁陰公蘭汗之亂隨寶入龍城密言於寶曰觀加難形色禍變甚逼宜留三思奈何徑前寶不從行數里加難遂先執崇崇大呼罵曰汝家幸緣肺腑䝉國寵榮覆宗不足以報今乃敢謀簒逆此天地所不容計旦暮即屠滅但恨不得手膾汝曹爾加難殺之平視平視燕國薊人也仕垂寧朔將軍幽州刺史遷征東將軍參合之敗視舉兵魯口以叛博陵武邑長樂三郡皆起兵應之視弟翰亦起兵遼西從子冀州刺史喜切諫不聽時燕兵新敗諸將討之不克垂自率軍擊之軍至魯口視將妻子及翰等十餘人渡河而走垂引軍還視復收合餘黨保據髙唐建威將軍進擊斬之鄭豁鄭豁滎陽開封人也五世祖渾魏將作大匠豁仕垂至太常卿吕顯吕顯字子明本東平夀張人也其先石勒時徙居幽州顯少好學性亷直鄉人有忿爭者皆就質焉垂以為河間太守後率郡歸魏宇文活撥宇文活撥河南略陽人也其先南單于之逺屬世為雄一曰擁部大人活撥仕垂為唐郡内史遼東公魏平中山活撥入魏為第一客谷衮谷衮昌黎人也膂力兼人彎弓三百斤勇冠當時仕垂至廣武將軍酈紹酈紹范陽涿鹿人也仕寶濮陽太守魏太祖定中山以郡迎降盧偃盧偃范陽涿鹿人也父諶晉司空劉琨從事中郎偃與子邈並仕於垂偃為營丘太守邈為范陽太守皆以儒雅見稱盧晏盧晏博學善隸書有名於世仕垂給事黄門侍郎營丘成周二郡太守子夀太子洗馬燕滅入魏為魯郡太守仇欵仇欵馮翊重泉人也石虎末徙鄴南枋頭仕暐為烏丸䕶軍長水校尉生二子長曰嵩小曰騰嵩仕垂殿中侍御史徙居中山初嵩長女有姿色充冉閔宫闈閔破遂入於儁轉賜盧豚生子魚後有寵於魏韋閬韋閬字友觀京兆杜陵人也世為三輔冠族祖楷晉建威將軍長樂清河二郡太守父逵仕垂吏部郎大長秋卿閬少有器望值慕容氏政亂避地薊城魏徵拜咸陽太守轉武都太守卒於官晁崇晁崇字子業遼東襄平人也家世史官崇善天文術數知名於時仕垂太史郎從寶敗於參合因留仕魏太祖甚見親待詳具魏書段乾段乾鴈門原平人仕垂廣武令子霸魏太祖略地至鴈門霸年幼見執因被宫刑乾乃率鄉曲歸降於魏公孫表公孫表字𤣥元燕郡廣陽人也好縱横刑名之言為慕容沖尚書郎垂破長子隨入中山仕為從官寶走乃歸魏為博士歴太宗時為大將被僇死詳見魏書劉生劉生頗解卜筮慕容氏嫁女于魏遂為公主家臣仍隨入魏賜妻生子房諶一作湛房謀清河東武城人也仕垂為太尉掾隨慕容氏遷於齊子孫因以家焉遂為清河繹幕人王憲王憲字顯則北海劇人祖猛為苻堅丞相父休河東太守憲幼孤隨伯父永在鄴丕稱尊號以永為丞相永為慕容永所殺憲奔清河匿於民家垂引為安南將軍河州刺史張珍張珍字文表中山無極人仕寶度支尚書楊結楊結清河人也仕垂至中山相生二子珍繼皆知名於世許茂許茂髙陽新城人也仕垂為髙陽太守王髙王髙魏郡人家貧徒有四壁夫婦二人晝則傭耕夜則伐草燒磚以臥陳刃陳刃河北人仕垂失其官爵盧副鳩盧副鳩昌黎徒河人也仕垂為尚書令臨澤公房堪房堪常山人仕垂貴鄉太守十六國春秋卷五十二
