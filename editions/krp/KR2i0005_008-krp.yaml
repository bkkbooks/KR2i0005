body:
  text: 十六國春秋卷八前趙錄八劉宣劉宣字士則淵之從祖也初為北部都尉右賢王樸鈍少言好學修潔師事樂安孫炎沉精積思不舍晝夜好讀毛詩左氏傳炎每歎曰宣若遇漢武當踰於金日磾也學成而返不出門閭者蓋數年每讀漢書至蕭何鄧禹傳未嘗不反覆詠之曰大丈夫若遭二祖終不令兩公獨擅美於前矣并州刺史王廣言之於武帝帝召見嘉其占對因曰吾未見宣謂廣言虛耳今見其進止風儀真所謂如珪如璋觀其質性足能撫集本部乃以宣為右部都尉特給赤幢曲蓋蒞官清恪所部懐之淵即王位宣之謀也故特荷尊重勲戚莫二軍國内外靡不任之仕至丞相太尉劉盛劉盛淵之族人也仕為領右衛將軍封安昌王少時不好讀書惟讀孝經論語曰誦此能行足矣安用多誦而不行乎李熹見之歎曰望之如可易及至肅如嚴君可謂君子矣淵以其忠篤故臨終委以重任衛尉西昌王劉銳等耻不預顧命乃相與謀說和殺聰盛執正不從和怒命左右刃之劉翼劉翼仕淵為别將驍勇過人膂力善射能一手舉殿柱跳過平陽門時人擬之飛羽淵甚器異之以為征虜將軍劉𦙍劉𦙍字義孫曜之世子前妃卜氏所生光祿大夫卜泰之甥也美姿貌善機對年十嵗身長七尺五寸眉鬢如畫聰奇之謂曜曰此兒神氣非義真之比也義真曜子儉字當應為卿之冢嫡卿可思文王廢伯邑考立武王之意曜曰臣藩國之嗣僅能守祭祀足矣不可亂長幼之倫也聰曰卿勲格天地國兼百城當世祚太師受專征之任五侯九伯得專征之者卿之子孫也奈何言同諸藩國乎義真既不能逺追太伯髙讓之風吾當為卿更以一國封之於是封儉為臨海王立𦙍為世子靳準之亂𦙍沒於黑匿郁鞠部至曜光初七年𦙍自言於郁鞠郁鞠大驚資給衣馬遣子送之曜對𦙍悲泣𦙍雖少離屯難流躓殊荒而風骨俊茂爽朗卓然身長八尺三寸髪與身齊多力善射騎㨗如風雲曜因以重之羣臣亦屬意焉曜顧謂朝臣曰義孫可謂嵗寒而不凋湼而不淄者矣義光雖先已樹立然冲幼儒謹不堪今世之多難懼非所以上固社稷下愛義光義孫年長明徳又故世子且材器過人渉歴艱阻朕欲逺追周文近蹤光武使宗廟有太山之安義光饗無疆之福於諸卿意何如太傅呼延晏等咸曰陛下逺擬周漢為國家無窮之計豈惟臣等頼之實宗廟四海之慶也左光祿大夫卜泰太子太傅韓廣等進曰陛下若以廢立為是不應降日月之明垂訪羣下若以為疑固樂聞異同之言臣竊以為廢太子非也昔周文定嗣未建之前則可光武以母失恩而廢其子豈足為聖朝之模範誠以東海纂統何必不如明帝皇子𦙍文武才略神度𢎞逺信髙絶於時足以擬蹤周發然太子孝友仁慈志尚冲雅亦足以堂負聖基為承平賢主况儲宫者民人所繫豈可輕動陛下誠實爾者臣等有死而己未敢奉詔曜黙然𦙍前泣曰慈父之於子也當務存鳲鳩之仁今黜熙而立臣臣何敢自安陛下茍以臣為頗堪驅䇿豈不能輔熙以承聖業乎必欲以臣代熙臣請效死於此以明赤心不敢聞命因歔欷流涕悲感朝臣曜亦以太子羊氏所生羊有寵哀之不忍廢乃止追諡𦙍母卜氏為元悼皇后嘉𦙍舅卜泰之公忠拜上光祿大夫儀同三司領太子太傅封𦙍為永安王署侍中衛大將軍都督二宫禁衛諸軍事開府儀同三司錄尚書事領太子太傅號曰皇子命熙於𦙍盡家人之禮尋遷大司馬徙封南陽王以漢陽諸郡十三為國置單于臺於渭城置左右賢王已下皆以胡羯鮮卑氐羌豪傑為之拜𦙍為大單于都督及曜之末闗中擾亂遂為石虎所殺淵后單氏單氏單徵之女北海王乂之母也以淵河瑞二年立為皇后淵死聰即偽位改元光興尊為皇太后單氏年少姿色絶麗聰遂蒸之乂屢以為言單氏慚恚而死聰后呼延氏呼延氏武元皇后匈奴中人淵后之從父妹也有美色恭孝稱於宗族淵后愛聰姿色故以配焉遂以光興元年立為皇后先是聰以弟乂為帝太弟后每謂聰曰父終子紹古今之大典陛下自承髙祖之嗣太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當徐為之計后曰事久變生太弟見粲兄弟竝大必有不安之志矣或有小人搆間其中未必不禍發於今日也妾聞陛下說隱公一何相似竊為陛下寒心聰心然之后至嘉平二年春正月卒諡曰武元皇后聰后劉氏劉氏武宣皇后新興人偽太保劉殷小女名娥字麗華童齒聰慧膚髪異常晝營女工夜誦書傳母恒止之敦玩彌厲每與諸兄弟辯論經義理致超然兄常深歎之性孝友美風儀進止如珪璋焉聰既僭立納為右貴妃未㡬立為皇后聰將起䳨儀殿於後庭廷尉陳元達鎖腰切諫聰大怒曰朕將營二宫豈問汝䑕子乎命左右將斬之后時在後堂聞之宻遣中常侍私勅左右停刑於是手疏啟曰伏聞勅㫖將為營殿今宫室已備無煩更營且四海未一禍難猶繁宜愛民力廷尉之言社稷之計也陛下當加爵賞而反欲誅之四海謂陛下何如哉夫忠臣進諫者固不顧其身也而人主拒諫者亦不顧其身也陛下為妾營殿而殺諫臣使忠良結舌者由妾逺近怨怒者由妾公私困弊者由妾社稷阽危者由妾天下之罪皆萃於妾妾何以當之妾觀自古敗國䘮家未始不由婦人每覽古事忿之不已何意今日妾自為之使後人視妾猶妾之視前人也妾復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之變色大司徒任顗等復叩頭流血固請不已乃徐曰朕比來微得風患喜怒過差不復自制元達忠臣也朕未之察諸公乃能破首明之誠得輔弼之義也朕愧戢於心何敢忘之命顗等冠履就坐引元達而謝之以后表示之曰外輔如公等内輔如后朕復何憂后聰明善幾諫聰所為不道多䂓正之及死偽諡武宣皇后其姊英字麗芳亦聰敏涉學而文詞機辯曉達政事尤過於娥初與娥同召拜左貴嬪尋卒偽追諡武徳皇后曜后羊氏羊氏獻文皇后即晉恵帝后也名獻容太山南城人祖瑾父𤣥之以晉太安元年立為皇后后初入宫衣中忽有火光衆咸怪之洛陽之陷遂沒於曜曜僭偽位立為皇后因問之曰吾何如司馬家兒羊后曰陛下開基之聖主彼亡國之暗夫何可竝言彼貴為帝王有一婦一子及身三耳曾不能庇之使妻子辱於庶人之手妾於爾時實不欲生何圖復有今日妾生於髙門意謂世間男子皆然自奉巾櫛已來始知天下自有丈夫耳曜甚寵愛之遂干預政事生三子以曜光初五年卒偽諡獻文皇后曜后劉氏劉氏獻烈皇后少孤為叔父侍中大司徒劉昶所養曜光初八年立為皇后明年寢疾及篤曜親省臨之問其所欲言劉氏泣曰妾叔父昶無子妾少養於叔父恩撫甚隆無以報徳願陛下貴之妾叔皚女芳有徳色願以備後宫曜許之言終而卒偽諡獻烈皇后曜后劉氏劉氏名芳侍中劉皚一作愷女年十三長七尺八寸垂手過膝髪與身齊先皇后劉氏死曜追念之遂以光初十年立為皇后姿徳才色邁於别宫十六國春秋卷八
