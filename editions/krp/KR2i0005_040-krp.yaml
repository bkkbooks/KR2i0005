body:
  text: 十六國春秋卷四十前秦錄九苻登苻登字文高堅之族孫也父敞健之世為太尉司馬隴東太守建節將軍頴川王為生所殺堅即偽位追贈右將軍凉州刺史以登兄同成嗣登少而雄勇有壯氣麤險不修細行故堅弗之竒也長而折節謹厚頗覽書傳建元初封南康王拜殿中將軍稍遷羽林監揚武將軍長安令坐事黜為狄道長及關中亂去縣奔于枹罕遂歸河州牧毛興以為長史時興鎭上邽同成言于興請以登為司馬常在營部登度量不群好為竒略同成常謂之曰汝聞不在其位不謀其政無數于時將為博識者不許吾非疾汝恐或不喜人妄豫耳自是可止汝後得意自可專志時人聞同成言多以為疾登而抑蔽之登乃屏迹不妄交遊興有事則召之戲謂之曰小司馬可坐評事登出言輒析理中興内服焉然敬憚而不能委任太安二年姚萇作亂遣其弟碩德率衆伐毛興相持久之登克南安夷夏歸之者三萬餘戸遂進攻碩德于秦州姚萇自率衆來救登與戰于胡奴坂一作阜大破之斬首二萬餘級將軍啖青射萇中之萇創重走保上邽碩德代綂其衆毛興將死告同成曰與卿累年共擊逆羗事終不克何恨之深可以後事付卿小弟司馬殄碩德者必此人也卿可總攝司馬事既而氐羗襲殺臨清伯衛平推登代之遂專綂征伐時歲旱衆饑道殣相望登每戰殺賊名為熟食謂軍人曰汝等朝戰暮便飽肉何憂於饑士衆從之噉死人肉輙飽健能鬬姚萇聞之急召碩德曰汝不來必為苻登所食盡碩德于是下隴奔長安十一月丕尚書寇遺奉渤海王懿濟北王㫤自杏城奔南安登乃具丕凶問於是為丕發䘮行服三軍縞素登請立懿為主衆咸曰渤海王雖先帝之子然年在幼冲未堪多難國亂而立長君春秋之義也今三虜跨僣冦旅殷强豺狼梟獍舉目而是自古厄運之極莫甚于斯大王挺劍西州鳳翔秦隴偏師蹔接姚萇奔潰一戰之功可謂光格天地宜龍驤武奮拯㧞舊京以社稷宗廟為先不可顧曹臧呉札一介㣲節以失圖運之機不建中興之業也乃為壇于隴東僣即皇帝位大赦境内改太安二年為太初元年置百官十二月立世祖堅神主于軍中載以輜軿羽葆青盖車建黄旗武賁之士三百人以衛之將戰必告凡所欲為必啟主而後行繕甲纂兵將引師而東乃告堅神主曰維曾孫皇帝臣登以太皇帝之靈恭踐寶位昔五將之難賊羗肆害于聖躬實登之罪也今收合義旅衆餘五萬精甲勁兵足以立功年榖豐穰足以資贍即日星馳電邁直造賊庭奮不顧命隕越為期庶上報皇帝酷怨下雪人民大耻惟帝之靈降鑒厥誠因欷㱆流涕將士莫不悲慟皆刻鉾鎧為死休字示以戰死為志每戰以長矟鉤刃為方圓大陣知一作如有厚薄從中分配故人自為戰所向無前初長安之將敗也堅中壘將軍徐嵩屯騎校尉胡空各聚衆五千據險築堡以自固既而受姚萇官爵及萇害堅嵩等以王禮葬堅于二堡之間至是各帥衆降登拜嵩鎮軍將軍雍州刺史空輔國將軍京兆尹登復改葬堅以天子之禮太初二年春正月立妃毛氏為皇后渤海王懿為皇太弟遣使拜東海王纂為使持節侍中都督中外諸軍事太師領大司馬進封魯王纂弟師奴為撫軍大將軍并州牧朔方公纂怒謂使者曰渤海王世祖之孫先帝之子南安王何以不立而自尊乎長史王旅諫曰南安已立理無中改今賊虜未平不可宗室之中自為仇敵願大王遠蹤光武推聖公之義梟二虜之後徐更議之纂乃受命於是盧水胡彭沛榖屠各董成張龍世新平𦍑雷惡地等皆附于纂有衆十餘萬纂遣師奴攻上郡𦍑酋金大黒金洛生等逆戰大破之斬首五千八百級三月登以竇衝為車騎大將軍南秦州牧楊定為大將軍益州牧楊璧為司空梁州牧乞伏國仁為大將軍大單于范川王夏四月楊定與魯王纂共攻姚碩德戰於涇陽碩德大敗姚萇自隂密救之纂退守敷陸五月竇衝攻萇汧雍二城克之斬其將軍姚元平張略等又與萇戰于汧東為萇所敗秋七月登進次瓦亭萇攻彭沛榖堡陷之榖奔杏城八月登征虜將軍馮翊太守蘭犢帥衆二萬自頻陽入和寜與魯王纂首尾將圖長安朔方公師奴勸其兄纂稱尊號纂不從乃殺纂自立為秦公犢遂與師奴絶九月萇軍于泥源師奴逆戰大敗亡奔鮮卑其衆多潰登進據胡空堡戎夏歸之者十有餘萬冬十二月姚萇遣將軍姚方成攻陷雍州刺史徐嵩堡執嵩而數之嵩罵不絶口方成怒斬之悉坑戎士以妻子賞軍太初三年春二月登帥衆下隴入朝那夏五月太弟懿卒諡曰獻哀姚萇據武都與登自春相持屢戰互有勝負至是各解圍歸關西豪傑以萇久無成功多來附登登軍中大饑取甚以供軍士秋八月登立子崇為皇太子弁為南安王尚為北海王冬十月姚萇退還安定登就食新平留大軍于胡空堡帥衆萬餘圍萇營四面大哭哀聲動人萇惡之乃命三軍哭以應登登乃引還十二月登以頴川王同成為太尉太初四年春正月登以河南王乞伏乾歸為大將軍大單于金城王二月登留輜重于大界自將輕騎萬餘攻安定𦍑宻造堡克之將軍竇洛竇干等謀反發覺出奔于萇登進討彭池不克攻彌姐營及繁川諸堡皆克之夏四月登與萇連戰萇屢敗乃遣中軍姚崇襲大界登引師邀擊之大敗崇于安邱俘斬二萬五千秋七月登進攻萇石將軍吳忠唐匡于平凉克之以尚書苻願為前禁將軍滅𦍑校尉戍平凉八月登進據茍頭原以逼安定萇留尚書令姚晃守安定率衆三萬夜襲登輜重于大界營克之殺毛后及南安王弁北海王尚擒名將數十人驅掠男女五萬餘口而去登收合餘衆屯胡空堡九月楊定攻隴冀克之斬萇從弟常執邢奴定自稱秦州牧隴西王登因其所稱而授之冬十月遣使齎書加竇衝大司馬驃騎大將軍前鋒大都督督隴東諸軍事雍州牧楊定為左丞相上大將軍都督中外諸軍事秦梁二州牧楊璧為大將軍都督隴右諸軍事南秦益二州牧遣衝率見衆為先驅自繁川趨長安登帥衆從新平逕據新豐之千户因使定率隴上之軍為其後繼璧留守仇池又約監河西諸軍事并州刺史楊政都督河東諸軍事冀州刺史楊楷各帥所綂大會長安政楷皆河東人初丕敗政楷收集流民數萬戸政據河西楷據湖陜之間遣使請命于登因而授之十二月姚萇遣將軍王破虜略地秦州楊定及破虜戰于清水格奴坂大敗之登攻張龍世于鴦泉堡姚萇救之引還萇密遣東門將軍任甕宗度詐為内應遣使招許開門納之登以為然征東將軍雷惡地將兵在外聞之馳騎見登曰姚萇多計略善御人必為奸變不可信也願深宜詳思登乃止萇聞惡地之詣登也謂諸將曰此羗多奸智今其詣登事必無成登聞萇懸門以待之大驚謂左右曰雷征東其殆聖乎㣲此公朕幾為豎子所誤登以安成王廣為司徒太初五年春三月萇攻陷新羅堡扶風太守齊益男棄郡奔還登將軍路祡强武等並帥衆降萇登攻萇天水太守張業生于隴東萇救之不克而還夏四月鎮東將軍魏掲飛自稱衝天王帥氐胡數萬攻萇安北將軍姚當成于杏城為萇所殺秋七月馮翊人郭質起兵于廣鄉以應登移檄三輔曰義感君子利動小人吾属生逄先帝堯舜之化累世受恩非常伯納言之子即卿校牧守之𦙍而可坐視豺狼忍害君父祼尸荐棘痛結幽泉山林無松隧之兆靈主無清廟之頌賊臣莫大之甚自古所未聞雖茹荼之苦銜蓼之辛何以諭之姚萇窮凶肆虐毒被人神於圖䜟厯數萬無一分而敢妄竊重名厚顔瞬息日月固所不照二儀實亦不育皇天雖欲絶之亦將假手于忠節凡百君子皆夙漸神化有懐義方與其含耻而存孰若蹈道而沒乎衆咸然之獨鄭縣人荀曜不從聚衆數千應萇登以質為平東將軍馮翊太守質遣歩將伐曜大敗而歸質乃東引楊楷以為應援十二月質與荀曜戰于鄭東為曜所敗衆皆潰散乃奔洛陽太初六年春三月登自雍攻萇安東將軍金温一作榮于范氏堡克之進渡渭水攻京兆太守韋範于叚氏堡不克進據曲牢夏四月荀曜有衆一萬據逆萬堡宻信召登約為内應登自曲牢向繁川次于馬頭原五月萇帥騎來拒大戰敗之斬其右將軍載記作尚書呉忠萇収衆復戰登敗退屯于郿秋七月進攻新平萇率衆來救登遂引還冬十二月復攻安定萇如隂宻以拒之為萇所敗登退據路承堡太初七年春正月登立昭儀隴西李氏為皇后三月姚萇寢疾見堅為祟秋七月登聞之大喜秣馬厲兵告堅神主曰曾孫登自受任執戈幾將一紀未嘗不上天錫祐皇鑒垂矜所在必克賊旅冰摧今太皇帝之靈降災疢于逆𦍑以形𩔖推之醜虜必將不振登當因其隕斃順行天誅拯復梓宫謝罪清廟於是大赦境内百僚進位二等與萇將姚崇爭麥于清水累為崇所敗進逼安定去城九十餘里八月萇疾小瘳率衆拒登登引兵出營將逆戰萇遣安南將軍姚熙隆别攻登營登懼退還萇夜引軍旁出過登營三十餘里以躡登後旦而候人告曰賊諸營已空不知所向登驚曰彼為何人去令吾不知來令我不覺謂其將死忽然復來朕與此𦍑同世何其厄哉遂罷師還雍萇亦還安定冬十月巴蜀人在關中者皆叛萇據𢎞農來附登以竇衝為右丞相衝徙屯華隂晉河南太守楊佺期擊敗之衝走太初八年右丞相竇衝矜才尚人自請封天水王登不許夏六月衝叛自稱秦王改元元光秋七月登攻衝于野人堡衝求救于姚萇萇遣太子興將兵攻胡空堡救之登解衝圍引兵還赴胡空堡衝遂與萇連和㑹萇疾甚還長安尋卒太初九年春正月登聞姚萇死喜曰姚興小兒吾將折杖以笞之於是大赦盡衆而東留司徒安成王廣守雍太子崇守胡空堡遣使拜金城王乞伏乾歸為左丞相河南王領秦梁益凉河五州牧加九錫二月攻屠各姚奴帛蒲二堡克之夏四月登自甘泉向關中興追登不及數十里登從六陌趨廢橋興始平太守姚詳據馬嵬橋來拒復遣尹緯將兵救詳緯據廢橋待之登爭水不得衆渇死者什二三與緯大戰為緯所敗其夜奔潰登單騎奔雍太子崇及安成王廣聞敗皆棄城走登至無所歸遂奔平凉収集遺衆入馬毛山秋七月興攻登于馬毛登遣子汝隂王宗為質于河南王乞伏乾歸以請救進封乾歸梁王納其妹為梁王后乾歸遣前將軍乞伏益州等帥騎一萬救之登引衆出迎乾歸兵興自安定如涇陽與登戰于山南為興所敗死之時年五十二在位九年太子崇奔于湟中僭稱尊號改元延初諡登曰高皇帝廟號太宗冬十月崇為梁王乾歸所逐奔於隴西王楊定定留司馬邵彊守秦州帥衆二萬與崇共攻乾歸乾歸遣凉州牧乞伏軻彈等帥騎二萬拒之定與崇皆被殺自苻健皇始元年歲在辛亥晉永和七年至登五世是歲歲在甲午凡四十四年以晉太元十九年滅十六國春秋卷四十
