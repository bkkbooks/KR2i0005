body:
  text: 十六國春秋卷七十一前凉録二張實張實一作宴字安遜軌之世子也學尚明察敬賢愛士晉舉秀才除尚書郎永嘉元年固辭驍騎将軍請還凉州帝許之改授議郎及至姑臧以討曹袪功封建武亭侯遷西中郎将進爵福禄縣侯建興二年夏五月軌卒長史張璽等表實嗣攝父位冬十月愍帝因下策書曰維乃父武公著勲西夏頃逆賊狡猾侵逼近畿義兵鋭卒萬里相尋奉貢逺珍府無虛嵗方委專征蕩清九域昊天不吊凋余藩后朕用悼厥心惟爾雋劭英毅宜世表西海今授使持節都督凉州諸軍事西中郎将凉州刺史領䕶羗校尉西平公徃欽哉其闡𢎞先緒俾屏王室建興三年冬十月蘭池長趙嬰一作奭上言軍士張氷於青澗水中得一玉璽鉗鈕光照水外文曰皇帝行璽羣僚上慶稱德實曰是非人臣所得留孤常忿袁本初擬肘諸君何忽有此言遣使送於京師建興四年春二月實下令國中曰忝紹前蹤庶幾刑政不為百姓之患而比年以來饑旱頻仍殆由庶事有闕竊慕箴誦之言以補不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者答以筐篚謗言於市者報以羊米賊曹佐髙昌隗瑾進言曰聖王将舉大事必崇三訊之法朝置諌官以匡佐大理疑承輔弼以補缺拾遺今事無巨細盡决獨慮興軍布令朝中不知若有謬缺則下無分謗羣僚畏威面從而已如此惡專歸於上雖賞之千金終不敢言也謂宜少損聦明開納羣言凡百政事皆延訪羣下使各盡所懐然後采而行之則嘉言自至何必賞也實悦從之増瑾位三等賜帛四十疋冬十一月劉曜攻逼長安實遂遣督䕶王該等率歩騎五千人入援京師并送諸郡貢計獻名馬方珍經史圖籍帝嘉之拜都督陕西諸軍事以實弟茂為秦州刺史是年分金城之令居楊枝二縣又立永登縣合三縣立廣武郡建武元年春正月實猶稱建興五年黄門郎史淑侍御史王冲自長安奔凉州稱愍帝将降於劉曜前一日使淑等齎詔於實曰天歩危運禍降晉室京師傾䧟先帝晏駕賊庭朕流漂宛許爰暨舊京羣臣以宗廟無主歸之於朕遂以冲𦕈之身託於王公之上自踐寳位四載於茲不能剪除巨冦以救危難元元兆庶仍遭塗炭皆朕不明所致羯賊劉聰僣稱大號禍加先帝肆殺藩王深惟仇恥枕戈待旦劉曜自去年九月率其蟻衆乘虛深冦刼質羗胡攻沒北地麴允總戎在外六軍敗績侵逼京城矢流宫闕胡崧等雖赴國難殿而無效圍塹十重外救不至粮盡人窮遂為降虜仰慙乹靈俯痛宗廟君世篤忠貞勲隆西夏四海具瞻朕所憑頼今進君大都督凉州牧侍中司空承制行事琅邪王宗室親賢逺在江表今朝廷播越社稷倒懸朕已詔琅邪王時攝大位君其恊賛琅邪共濟艱運若不忘主宗廟有頼明便出降故夜見公卿属以後事宻遣黄門郎史淑侍御史王冲齎詔假授臨出寄命君其勉之淑等至姑臧實大臨三日以天子蒙塵謙一作冲讓不拜實叔父肅時為建威将軍西海太守聞京師危逼請為先鋒入援實以其年老弗許及聞京師䧟沒乃悲憤而卒實自稱侍中司空大都督凉州牧承制行事遣太府司馬韓璞滅冦將軍田齊撫戎將軍張閬前鋒督䕶隂預率歩騎一萬東赴國難命討虜將軍陳安故太守賈騫隴西太守呉紹各統郡兵為璞等前驅戒璞曰前遣諸將多違機信所執不同致有乖阻且内不和親焉能服物今遣卿督五將兵事當如一體不得令乖異之間逹孤耳也復遺相國南陽王司馬保書曰王室有事不忘投驅孤州逺域首尾多難是以前遣賈騰一作騫瞻公舉動中被符命勅騰還軍忽聞北地䧟沒冦逼長安胡崧不進麴允持金五百請救於崧遂决遣騰等進軍度嶺㑹聞朝廷傾覆為忠不逹於主遣兵不及於難痛慨之深死有餘責今更遣韓璞等唯公命是從璞等卒不能進而還次南安諸羗斷路相持百餘日粮盡矢竭璞殺駕車牛以饗士泣謂衆曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從吾令乎曰諾乃鼓譟進戰㑹撫戎將軍張閬率金城軍繼至夾擊大破之斬首數千級時焦崧陳安舉兵冦隴右東與劉曜相持秦雍之人死者十八九惟凉州獨全先是永嘉中長安謡曰秦川中血沒腕惟有凉州倚柱觀一作㸔至是謡言驗矣太興元年春三月焦崧陳安舉兵逼上邽南陽王保遣使告急於實實遣金城太守竇濤為輕車將軍督威逺將軍宋毅及和苞張閬宋輯辛韜張選董廣歩騎二萬赴之軍次新陽㑹愍帝凶問至素服舉哀大臨三日時保謀稱尊號破羗都尉張詵言於實曰南陽王國之䟽属忘莫大之耻而亟欲自尊天不授其圖籙德不足以應運終非濟時救難者也晉王明德昵藩先帝憑属宜表稱聖德勸即尊位一作號傳檄諸藩副言相府則欲競之心息未合之徒散矣實從之於是馳檄天下推崇晉王為天子遣牙門蔡忠奉表江南勸即尊位比至元帝已即位於建康改年太興然實竟不用江東年號猶稱建興六年是嵗實造刀一百口無故盡生文曰霸太興二年夏四月南陽王保聞愍帝崩自稱晉王改元建康署置百官遣使拜實征西大将軍開府儀同三司増邑三千戸陳安叛保自稱秦州刺史氐羗多應之保窘迫遂去上邽與别將張春還南安祁山實遣將軍韓璞率歩騎五千赴援安退保綿諸保歸上邽未幾復為安所敗遣使詣實乞師實復遣威逺將軍宋毅赴之安乃退太興三年春正月晉王保為劉曜所逼遷於桑城張春謀奉保將奔於實實以其宗室之望若至河右必動物情遣將軍隂鑒一作監逆保聲言翼衛實禦之也㑹鑒未至而保遇害其衆散奔凉州者萬餘人實自恃險逺衆強轉為驕恣時祁山地震從中陶原坂三里冐覆下川忽如見掩坂上草木存焉實寢見所住屋梁間有人像而無頭久之乃滅實甚惡之先是謡曰蛇利砲蛇利砲公頭墜地而不覺夏六月京兆人劉𢎞挾左道客居凉州天梯第五山燃燈懸鏡於山穴中為光明以惑百姓從受道者千有餘人實左右皆事之帳下閻渉一作沙牙門趙卬等皆𢎞鄉人𢎞謂之曰天與我神璽應王凉州渉卬信之宻與實左右十餘人謀殺實奉𢎞為主實弟茂潜知其謀請誅𢎞等實令牙門將史初收之未至渉等不知以其夜懐刅而入斬實於外寢𢎞見史初至謂曰使君已死殺我何為初怒截其舌而囚之轘於姑臧市誅其黨與數百人實時年五十在位六年𦵏寧陵私謚昭公晉元帝冊贈大司焉凉州牧賜諡曰元公及祚僣號追尊曰明王廟號髙祖張茂張茂字成遜實同母弟也虚靖好學不以世利營心建興元年南陽王保辟從事中郎又薦為給事黄門侍郎散騎侍郎中壘將軍皆不就二年徴為侍中以父疾固辭尋拜平西將軍秦州刺史加散騎常侍領雍州牧皆不受太興三年夏六月實既被殺左司馬隂元等以實子駿幼冲宜立長君乃推茂為大都督太尉凉州牧茂不從但受使持節平西將軍行都督凉州諸軍事䕶羗校尉凉州牧西平公乃誅閻渉趙卬及黨與數百人大赦境内秋九月立實子駿為世子撫軍將軍武威太守西平公太興四年春二月茂築靈鈞臺周輪八十餘堵基髙九仞武陵人閻曽夜叩府門呼曰武公遣我來言何故勞百姓而築臺乎姑臧令辛巖以曽為妖妄請殺之茂曰吾信勞民曽稱先君之命以規諌我何謂妖乎太府主簿馬魴諌曰今世難未夷唯當𢎞尚道素不宜勞役崇飾臺榭且比年以來轉覺衆務日紛一作奢於徃毎所經營輕違雅度實非士民所望於明公也茂曰吾過也吾過也命止作役永昌元年冬十二月茂使將軍韓璞帥衆取隴西南安之地以置秦州又分武興金城西平安固為定州太寧元年秋劉曜自隴上西擊凉州遣將軍劉咸一作威攻韓璞於冀城呼延寔攻寧羗䕶軍隂鑒于桑壁曜自将戎卒二十八萬軍於河上列營百餘里金鼔之聲沸河動地臨洮人翟楷石琮等逐令長以縣應曜曜揚聲欲百道俱濟直抵姑臧河西大震參軍馬岌勸茂親出拒之長史汜褘怒曰亡國之人復欲干亂大事宜斬岌以安百姓岌曰汜公書生糟粕刺舉近才不惟國家之急且明公父子欲為朝廷誅劉曜旰食有年矣今大賊自至不煩逺師遐邇之情共觀明公此舉宜立信勇之驗以副秦隴之望力雖不敵勢不可以不出茂曰馬生之言得之矣乃出次石頭問於參軍陳珍曰劉曜以乘勝之師握三秦之鋭繕兵積年士卒習戰若以精騎奄尅南安席捲河外長驅而至者計將何出珍曰曜雖乘威怙衆恩德未結於下又其闗東離貳内患未除兵士雖多精卒寡少大抵皆氐羗烏合之衆安能舎腹心之疾増隴上之戍曠日持久與我争衡河西耶若二旬不退珍請率敝卒數千為明公擒之茂大悦以珍為平虜將軍率歩騎一千八百救韓璞曜隂欲引歸聲言要先收隴西然後廽滅桑壁珍募發氐羗之衆擊曜走之剋復南安茂深嘉之拜折衝將軍尋遣使稱藩於曜獻馬牛羊珍寳不可勝計曜遣大鴻臚田崧拜茂使持節假黄鉞侍中都督凉南北秦梁益巴漢隴右西域雜夷匈奴諸軍事太師大司馬凉州牧西域大都䕶䕶羗校尉封凉王加九錫之禮茂復大城姑臧修靈鈞臺别駕呉紹諌曰伏惟明公所以修城築臺者盖懲既徃之患耳愚以為㤙德未洽於近侍雖處層臺亦無所益適足以疑羣下徒見不安之意而失士民繫託之心示怯弱之形乖匡霸之勢遐方異境窺我齷齱必有乗人之規将何以佐天子霸諸侯乎願止役省勞與下休息而更興工動衆百姓豈所望於明公哉茂曰亡兄一旦失身於物王公設險武夫重閉亦逹人之至戒也且忠臣義士豈不欲全節義於亡兄哉直以危機宻發雖有賁育之勇無所復施今國家未靖不可拘繫常言以太平之理責人於迍邅之世紹無以對遂卒為之茂雅有志操能斷大事凉州大姓賈摹一作模寔之妻弟也勢傾西土摹兄弟遂謀害茂先是謡曰手莫頭圖凉州茂以為信誘而殺之於是豪右屏跡威著凉域茂嘗謂馬岌曰劉曜自古可方誰等輩也岌曰曹孟德之流茂黙然岌曰孟德公族也劉曜戎狄難易不同曜殆過之茂曰曜可方呂布闗羽而云孟德不及豈不過哉岌曰孟德挾天子令諸侯仗大義討不庭曜一小人卒用烏合之衆而能建威名成大逆天下莫之當其不優歟茂曰天生曜以滅中國殆不可以人事論也太寧二年春正月黄霧四塞夏五月甲申茂寢疾臨終執世子駿手泣曰昔吾先人以孝友見稱自漢初以來世執忠順今雖華夏大亂皇輿播遷汝當謹守臣節無或失墜吾遭擾攘之運承先人餘德假攝此州以全性命上欲不負晉室下欲保完百姓因下令曰吾官非王命位由私議茍以集事豈敢榮之氣絶之日當以白帢入棺勿以朝服殮以彰吾志是日薨時年四十八在位五年劉曜遣使贈茂太宰謚成烈王及祚僣號追尊曰成王廟號太宗十六國春秋卷七十一
