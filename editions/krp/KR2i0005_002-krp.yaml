body:
  text: 十六國春秋卷二前趙錄二劉聰上劉聰字𤣥明一名載淵第四子也母張氏懐聰在孕夢日入懐寤以告淵淵曰此吉徵也慎勿言自是十五月而生聰夜有日一作白光之異形體非常左耳有一白毫長二尺餘甚光澤幼而敏悟好學博士朱紀大奇之年十四究通經書百家之言孫吳兵法靡不誦之工草隷書尤善屬文著述懐詩百餘篇賦頌五十餘篇十五習擊刺猿臂善射彎弓三百斤膂力驍㨗冠絶一時太原王渾見而悅之謂淵曰此兒吾所不能測也弱冠遊於京師當時名士莫不交結樂廣張華尤器異之晉新興太守郭熙一作頤辟為主簿任以郡事舉良將入為驍騎别部司馬齊王司馬冏以為國中尉出為左部司馬尋遷右部都尉善於撫綏五部豪右無不歸之太宰河間王司馬顒表為赤沙中郎將聰以淵在鄴懼為成都王司馬穎所害乃亡奔穎穎甚悅拜為積弩將軍㕘前鋒戰事淵為北單于立為右賢王隨還右部及即大單于位更拜鹿蠡王淵稱大號拜大司馬徙封楚王淵死子和嗣立西昌王銳帥馬景攻聰於單于臺聰貫甲以待之銳等馳入南宫乃追殺和及銳等羣臣勸聰即尊位聰以北海王乂皇后單氏之子也以位讓之乂與公卿涕泣固請聰久而許之曰乂及羣公正以四海未定禍難尚殷貪孤年長故耳此國家之事孤何敢辭今便欲逺遵魯隠俟乂年長當以大業歸之載記云待乂年長復子明辟光興元年秋聰僭即皇帝位於光極前殿大赦境内殊死以下改元光興尊母單氏為皇太后母張氏為帝太后以乂為帝太弟領大單于大司徒立妻呼延氏為皇后封子粲為河内王署使持節撫軍大將軍都督中外諸軍事易為河間王翼為彭城王悝為髙平王遣使拜蒲洪平逺將軍以石勒為并州刺史封汲郡公餘悉如故冬十月遣河内王粲及征東大將軍王彌龍驤將軍曜等帥衆四萬長驅入洛川遂出轘轅掠梁陳汝穎間陷壘壁百餘時匈奴劉虎居朔方肆盧川自號鐵弗氏與白部鮮卑帥衆來附聰以虎為宗室封樓煩公十一月聰自以越次而立忌其嫡兄恭因恭寢穴其壁間刺而殺之以司空景為大司馬左僕射劉殷為大司徒右僕射王育為大司空十二月偽太后單氏卒尊母張氏為皇太后單后即乂之母也年少美色聰蒸焉乂屢言之單后慚恚而死聰後知其故乂寵因是漸衰然猶追念單氏未便廢斥聰后呼延氏屢以為言於是相圖之計起矣乂舅光祿大夫單冲泣謂乂曰疎不間親主上有意於河内王久矣殿下何不避之乂曰河瑞之末主上自惟嫡庶之分以大位讓乂乂以主上齒長故相推奉天下者髙祖之天下兄終弟及何為不可粲兄弟既壯猶今日也且子弟之間親疎詎㡬主上寧可有此意乎聰安北大將軍趙固與晉車騎將軍王申始相拒於延津時黄霧晝昏人不相見固軍大敗始遂攻劉曜王彌於瓶壘大破之俘斬千餘級嘉平元年夏四月趙固及平北大將軍王桑攻裴盾殺之五月署衛尉呼延晏使持節前鋒大都督前軍大將軍配禁兵二萬七千自宜陽入洛陽命王彌及始安王曜鎮軍將軍石勒引兵㑹之晏進河南晉師前後十二敗死者三萬餘人彌等未至晏留輜重於張方故壘癸未先至洛陽甲申攻平昌門克之丙戌焚東陽宣陽諸門及諸府寺晉懐帝遣河南尹劉黙拒之敗於社門六月丁亥朔晏以外繼不至出自東陽門俘掠王公已下子女二百餘人而還懐帝具船於洛水將濟河東遁晏盡焚之還於張方故壘時城内饑甚人自相食百官分散莫有固志庚寅司空荀藩及弟光祿大夫荀組奔轘轅太子左率溫畿夜開廣莫門奔小平津辛卯王彌至宣陽門壬辰始安王曜至西明門丁酉彌晏尅宣陽門入南宫升太極前殿縱兵大掠悉收宫人珍寳懐帝開華林園門出河隂藕池欲奔長安晏兵追執之幽於端門曜自西明門入屯武庫戊戌殺晉太子詮吳王晏竟陵王楙尚書左僕射和郁右僕射曹馥尚書閭丘冲袁粲王緄河南尹劉黙及諸王公已下三萬餘人於洛水北築為京觀遂發掘諸陵焚燒宗廟宫府皆盡逼辱后妃曜納恵帝羊皇后遷懐帝及侍中庾珉等并傳國璽於平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府丁未聰大赦改元嘉平以帝為特進左光祿大夫封平阿公以侍中庾珉王雋為光祿大夫秋七月晉太尉征西大將軍南陽王司馬模使牙門趙染戍蒲阪染求馮翊太守不得怒率衆歸聰聰以染為平西將軍八月聰遣趙染與安西將軍雅帥騎二萬攻模於長安河内王粲始安王曜帥大衆繼之染敗模於潼闗將軍吕毅死之長驅至下邽凉州將北宫純自長安率衆迎降進圍長安模遣淳于定出戰敗績模倉庫空虛士卒離散軍諮祭酒韋輔曰事急矣早降可以免禍模從之降於染染箕踞攘袂數模之罪送之於粲九月粲殺模及其子范陽王黎以模妃劉氏賜别將張本為妻送衛將軍梁汾長史魯繇兼散騎常侍杜驁辛謐及北宫純等於平陽聰以粲之害模也大怒粲曰臣殺模本不以其晚識天命之故但以晉氏肺腑洛陽之難不能死節天下之惡一也故誅之聰曰雖然吾恐汝不免誅降之殃也夫天道至神理無不報時闗西饑饉白骨蔽野士民存者百無一二冬十月署始安王曜為車騎大將軍開府儀同三司雍州牧更封中山王鎮長安王彌為大將軍封齊公石勒為幽州牧十一月彌為石勒所殺因并其衆表彌叛狀聰大怒遣使讓勒專害公輔有無上之心又恐勒之有二志也即以彌部衆配之加勒鎮東大將軍督并幽二州諸軍事領并州刺史以慰其心曜既據長安安定太守賈疋與諸氐羌皆送任子於聰惟雍州刺史麴特新平太守竺恢馮翊太守索綝固守不降安夷䕶軍麴允頻陽令梁肅自京兆南山將奔安定遇疋任子於隂宻擁還臨涇謀復晉室推疋為平西將軍率衆五萬攻曜於長安扶風太守梁綜及麴特竺恢等亦率衆十萬㑹之曜遣劉雅趙染攻疋雅等先攻竺恢不克疋要擊大敗之曜又盡長安銳卒與疋等戰於黄丘曜衆大敗身中流矢退走疋追之至於甘泉一作渠旋自渭橋襲梁州刺史彭蕩仲殺之後蕩仲子天䕶率羣胡攻疋疋遂敗走夜墮澗中為天䕶所殺聰以天䕶為梁州刺史杜人王秃紀持及麴特等擊河内王粲於新豐粲還平陽曜攻陷池陽掠萬餘人歸長安十二月晉閻鼎等奉秦王業為皇太子入於雍城兵勢大振闗西胡晉翕然響應嘉平二年春正月聰后呼延氏卒諡曰武元甲戌聰以司空王育尚書令任顗女為左右昭儀中軍大將軍王彰中書監范隆左僕射馬景女皆為貴人右僕射朱紀女為貴妃皆金印紫綬聰將納太保劉殷女太弟乂固諫聰以問於太宰延年太傅景景等對曰臣常聞太保自云劉康公之後與陛下殊源納之何害聰悅使兼大鴻臚李𢎞一作恒拜殷二女英娥為左右貴嬪位在昭儀上又納殷女孫四人皆為貴人位次貴嬪謂𢎞曰此女輩姿色超世女徳冠時且太保於朕實自不同卿意安乎𢎞曰太保𦙍自有周與聖源實别陛下正以姓同為恨耳且魏司空東萊王基當世大儒豈不達禮乎為子納司空太原王沉女以其姓同而源異故也聰大悅賜𢎞黄金六十斤曰卿當以此意諭我子弟輩於是六劉之寵傾於後宫聰希復出外事皆中黄門納奏左右貴嬪决之二月聰假懐帝儀同三司封會稽郡公庾珉等以次加秩聰引帝入讌從容謂帝曰卿昔為豫章王時朕與王武子造卿武子稱朕於卿卿言聞其名久矣以卿所製樂府歌示朕因謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛徳頌卿稱善者久之又引朕射於皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀研卿頗記否帝曰臣安敢忘之但恨爾日不早識龍顔耳聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受厯一作應天受命故為陛下自相驅除耳且臣家若能奉武皇帝之業九族敦睦陛下何由得之至日夕乃出聰喜以小劉貴人賜帝謂帝曰此名公之孫也今特以相妻卿善遇之拜劉為會稽國夫人三月聰遣鎮北將軍靳冲冦太原平北將軍卜珝率衆繼之不克遂圍晉陽魏穆帝拓䟦猗盧遣兵來救乙未冲兵敗走卜珝之卒先奔冲歸罪於珝輒斬之聰聞而大怒曰此人朕所不得加刑冲何人哉遣御史中丞浩衍持節斬冲聰又納舅子輔漢將軍張寔二女徽光麗光為貴人太后張氏之意也夏四月聰封子敷為渤海王驥為濟南王鸞為燕王鴻為楚王勱為齊王權為秦王操為魏王持為趙王左都水使者襄陵王攄坐魚蟹不供將作大匠望都公靳陵坐溫明徽光二殿未成皆斬於都市聰遊獵無度晨出暮歸觀魚於汾水以燭繼晝中軍大將軍王彰切諫曰今大難未夷餘晉假息陛下不懼白龍魚服之禍至昏夜忘歸陛下當思先帝創業之艱難嗣承之不易鴻基已奠四海屬情何可墜之於垂成隳之於將就比觀陛下所為臣實痛心疾首且愚人歸漢之心未專思晉之心猶盛劉琨咫尺刺客縱横帝王輕出一夫敵耳願陛下改往修來則億兆幸甚聰大怒命斬之上夫人王氏彰女也叩頭乞哀乃囚之詔獄太后張氏以聰刑罰過差三日不食太弟乂子粲竝輿襯切諫聰怒曰我豈紂桀幽厲乎汝輩何以生來哭人太宰延年太保殷及公卿列侯百有餘人皆免冠涕泣固諫曰光文皇帝以聖武膺期創建鴻祚而六合未一夙世升遐陛下睿徳自天龍飛紹統東平洛邑南定長安真可謂功髙周成徳超夏啟往也唐虞今則陛下歴觀書記未有其比而頃來以小務不供亟斬王公直言忤㫖遽囚大將遊獵無度機管不修臣等竊所未解此臣等相與破肝糜胃忘寢與食也聰慨然曰朕昨大醉非其本心微公等言之朕不聞過各賜帛百疋使侍中持節赦彰曰先帝頼君如左右手君著勲再世朕敢忘之此段之過希君蕩然君能盡懐憂國朕所望也今進君驃騎將軍定襄郡公後有不逮幸數匡之雍州刺史麴特等圍長安數月中山王曜連戰敗績驅掠士女八萬餘口退奔平陽五月聰貶曜為龍驤大將軍行大司馬使河内王粲攻司徒傅祗於三渚右將軍劉參攻郭黙於懐城會祗病卒城陷粲遷祗子暢及其孫純粹并士女二萬餘户於平陽聰贈祗太保純粹皆給事中以其忠於主也謂暢曰尊公雖不達天命然各忠其主吾亦有以亮之但晉主已降天命非人所支而䖍劉南鄙沮亂邊萌此其罪也以元惡之種而贈同勲舊逆臣之孫而荷榮禁闥卿知皇漢之徳𢎞曠否暢曰陛下每嘉先臣不以小臣之故而虧其忠節及是恩也自是明主伐國弔民之義臣輒同萬物未敢謝生於自然六月聰欲立貴嬪劉英為皇后張太后欲立貴人張徽光聰不得已許之英尋卒大昌文獻公劉殷卒聰以河間王易為車騎將軍彭城王翼為衛將軍竝典禁兵宿衛髙平王悝為征南將軍鎮離石濟南王驥為征西將軍築西平城以居之魏王操為征東將軍鎮蒲子安北大將軍雍州刺史趙固平北大將軍豫州刺史王桑欲引兵歸平陽軍中乏糧士卒相食乃自䂭磽津西渡攻掠河北郡縣使人自懐求迎於聰聰遣鎮逺將軍梁伏疵將兵迎之未至長史臨深將軍牟穆帥衆一萬叛歸劉演固隨疵而西桑引其衆歸青州固遣兵追之殺桑於西梁桑將張鳯率其餘衆歸演聰以固為荆州刺史領河南太守鎮洛陽晉平北將軍劉琨移檄州郡期以十月會平陽擊聰琨素奢豪喜聲色河南徐潤以音律得幸干預政事䕶軍令狐盛數以為言勸琨殺之琨不從潤譖盛於琨曰盛將勸公稱帝矣琨竟收盛殺之盛子泥遂奔於聰具言虛實聰大悅遣河内王粲中山王曜等攻并州以令狐泥為鄉導屬上黨太守龔醇帥衆降聰雁門烏丸復反琨聞之親帥兵東出收兵於常山及中山使部將郝詵張喬將兵來拒戰於武灌喬等敗死晉陽危懼太原太守髙喬并州别駕郝聿以晉陽降粲秋八月庚戌琨還救晉陽不克乃與左右數十騎攜其妻子奔於趙郡之亭頭遂如常山粲曜入晉陽壬子令狐泥殺琨父母粲曜送尚書盧志侍中許遐太子右衛率崔瑋於平陽聰復以曜為車騎大將軍以前將軍劉豐為鎮北大將軍并州刺史鎮晉陽九月聰以盧志為太弟太師崔瑋為太傅許遐為太保髙喬令狐泥郝聿皆為武衛將軍己卯聰衛尉梁汾奔長安辛巳前雍州刺史麴特討河内王粲於三輔粲敗走闗中擾亂冬十月乙酉聰封子恒為代王逞為吳王朗為潁川王臯為零陵王旭為丹陽王京為蜀王坦為九江王晃為臨川王丁亥以司空王育為太保驃騎大將軍王彰為太尉尚書令任顗為司徒左僕射馬景為司空右僕射朱紀為尚書令中書監范隆為左僕射前軍大將軍呼延晏為右僕射先是劉琨與穆帝猗盧也時稱代王結為兄弟至是乃告急於穆帝且乞師焉穆帝遣長子賔六須一作六修及桓帝子普根將軍衛雄范班箕澹等率衆數萬為前鋒以攻晉陽琨收散卒千餘為之鄉導穆帝自帥衆二十萬繼之至於狼猛一作盆城曜及賔六須戰於汾東曜兵敗績墜馬中流矢身被七創討虜將軍傅虎以馬授曜驅令渡汾自還戰死曜入晉陽夜與大將軍河内王粲鎮北大將軍豐等掠晉陽百姓踰䝉山遁走十一月穆帝帥騎來追戰於藍谷粲兵敗績斬征虜將軍邢延及劉儒劉豐簡金張平等三千餘級伏屍數百里甲午粲等遁還穆帝因大獵夀陽山陳閱皮肉山為之赤琨自營門步入拜謝固請進軍穆帝曰吾不早來致卿父母見殺誠以相愧今卿已復州境吾既逺來士馬疲敝且待後舉劉聰未可滅也遺琨馬牛羊各千餘疋車百乘而去留其將箕澹段繁等戍晉陽十二月聰立張貴人徽光為皇后以其父寔為左光祿大夫嘉平三年春正月丁丑朔聰大會羣臣於光極殿逼懐帝著青衣行酒侍中光祿大夫庾珉王雋等不勝悲憤因之號哭聰惡之有告珉等謀以平陽應劉琨者二月丁未聰鴆殺帝於平陽誅珉雋等故晉臣五十餘人復以會稽國劉夫人為貴人大赦境内殊死已下先是侍中隴西辛勉隨帝至平陽聰欲署為光祿大夫固辭不受聰遣黄門侍郎喬秉賫藥酒逼之勉曰大丈夫豈以數年之命而虧髙節事二姓見武皇帝哉引藥將飲秉遽止之曰主上相試耳君真髙士也歎息而去聰嘉其貞節深敬異之為築室於平陽西山月致酒米勉亦辭而不受乙亥太后張氏卒諡曰光獻張皇后不勝哀丁丑亦卒諡曰孝武己卯定襄忠穆公王彰卒三月聰立左貴嬪劉娥為皇后為之起䳨儀樓於後庭廷尉陳元達諫曰臣聞古之聖王愛國如家故皇天亦祐之如子夫天生蒸民而樹之君使司牧之非以兆民之命窮一人之欲也晉氏闇虐視百姓如草芥故上天勦絶其祚眷祐皇漢蒼生引領庶㡬息肩懐更生之望有日矣我髙祖光文皇帝靖言惟兹痛心疾首故身衣大布居不重茵先皇后嬪服無綺綵重逆羣臣之請乃建南北二宫今光極之前足以朝羣臣饗萬國矣昭徳溫明已後足以容六宫列十二等矣陛下龍興已來外殄二京不世之冦内興殿觀四十餘所加之軍旅數興餽運不息饑饉疾疫死亡相繼兵疲於外民怨於内為之父母固若是乎伏聞詔㫖將營鷃儀中宫新立誠臣等樂為子來者也竊以大難未夷宫宇麤給今之新營尤實非宜况有晉遺𩔖西據闗中南擅江表李雄奄有巴蜀王浚劉琨窺窬肘腋石勒曹嶷貢稟漸踈陛下釋此不憂乃更為中宫作殿豈目前之所急乎昔太宗承髙祖之業恵吕息役之後四海之富天下之殷粟帛流衍尚惜百金之費輟露臺之役歴代比美迹垂不朽故能斷獄四百擬於成康陛下承荒亂之餘所有之地不過太宗之二郡戰守之備非特匈奴南越而已孝文之廣思費如此陛下之狹欲損如此愚臣所以敢昧死犯顔色冐不測之禍也聰大怒曰朕為萬㡬主將營一殿何問汝䑕子乃敢妄言沮衆不殺此䑕子朕殿何當得成命左右曳出斬之并其妻子梟首東市使羣䑕共穴時聰在逍遥園李中堂元達先鎖腰而入即以鎖鎖堂下樹呼曰臣所言者社稷之計而陛下殺臣若死者有知臣當上訴陛下於天下訴陛下於先帝朱雲有言臣得與龍逢比干遊於地下足矣未審陛下何如主耳左右曳之不能動聰怒甚大司徒任顗光祿大夫朱紀左僕射范隆驃騎大將軍河間王易等叩頭流血曰元達為先帝所知受命之初即引置門下盡忠竭慮知無不言臣等竊祿茍安每見之未嘗不發愧今所言雖狂直願陛下容之因諫諍而斬列卿其如後世何聰黙然劉后在後堂聞之宻遣中常侍私勅左右停刑手疏切諫具劉后傳聰怒乃解引元達而謝之易逍遥園為納賢園李中堂為愧賢堂夏四月壬申愍帝即位於長安聰遣中山王曜及司隷校尉喬智明虎牙將軍李景年等冦長安平西將軍趙染帥衆赴之晉安夷䕶軍始平太守一作大都督麴允據黄白城以拒之五月曜等進屯蒲坂時允累為曜等所敗晉遣安東將軍索琳為征東大將軍將兵助允六月晉平北將軍劉琨與穆帝會於陘北謀擊聰秋七月琨進據藍谷穆帝乃遣普根屯於北屈琨遣監軍韓據自西河而南將攻西平聰遣大將軍粲等拒琨驃騎大將軍易等拒普根蕩晉將軍蘭陽等助守西平琨等聞之引兵還聰使諸軍仍屯所在為進取之計九月趙染謂曜曰麴允率大衆在外長安空虛可襲而取之既得長安黄白城自服願大王以重衆守此染請輕騎襲之曜乃承制加染前鋒大都督安南大將軍以精騎五千配之進攻長安王師敗於渭陽將軍王廣死之庚寅染夜入長安外城帝奔射雁樓染焚燒龍尾及諸營殺掠千餘人辛卯旦退屯逍遥園壬辰將軍麴鑒自阿城帥衆五千來救癸已染引兵退鑒追擊之與曜遇於零武鑒兵大敗曜自恃連勝不為設備冬十一月麴允引兵襲曜連戰敗之殺冠軍大將軍喬智明曜退入粟邑遂歸平陽十二月曜忌河南魏浚素得衆心乃率軍圍浚於石梁兗州刺史劉演河内太守一作河州郭黙遣軍救之曜分兵逆擊戰於河北伏兵深隠處邀擊演黙軍大破之盡虜其騎浚夜遁走為曜所獲殺之浚族子該隨浚赴難先領兵守金墉城故得無他曜引還餘衆復依該時杜預子尹為𢎞農太守屯宜陽界一泉塢水經註作一合塢數為曜兵所抄掠尹要該共拒之該遣其將馬瞻三百人赴尹瞻知其無備夜襲殺尹迎該入塢塢人振懼竝服從之遂與李矩郭黙相結以拒曜兵又與河北尹任愔相連後漸饑弊曜兵攻之日至欲率衆南徙衆不從該遂單騎奔南陽馬瞻帥餘衆降曜十六國春秋卷二
