body:
  text: 十六國春秋卷四十一前秦錄九苻雄苻雄字元才洪之季子也少善兵書而多謀畧便弓馬有政術好施下士石氏建武中以功拜龍驤將軍雄醜形貌頭大而足短軍中呼之為大頭龍驤石虎將麻秋鎭枹罕冉閔之亂秋歸鄴雄擊獲之洪以秋為軍師將軍秋因宴鴆洪將併其衆世子健収秋斬之健以人心思晉遂稱晉官爵以雄為輔國將軍時杜洪據長安健欲取之遣雄帥衆五千自潼關入自帥大衆隨雄而進雄大敗洪將張先先遁歸長安雄長驅而進遂狥地渭北所過城邑無不歸附趙將石寜獨據上邽不下雄擊斬之健既據長安自稱天王大單于以雄為都督中外諸軍事丞相領車騎大將軍雍州牧東海公雄力言于健請正尊號健從之即皇帝位雄進爵為王晉鎮西謝尚攻張遇於許昌健遣雄略地關東帥步騎二萬救之尚敗奔還雄乘勢逐北殺傷大半遂徙遇及陳潁許洛之民五萬餘戸於關中轉攻王擢於隴上擢奔凉州雄屯隴東張重華拜擢為征虜將軍一作征東大將軍使與其將張𢎞宋修連兵伐雄雄與衛將軍菁率衆拒之敗之於龍黎斬首萬二千級獲修𢎞送長安尋與菁帥步騎四萬屯隴東是時張遇欲引關中諸將以雍州歸晉事覺伏誅而孔特等起兵應遇衆至數萬雄乃帥騎還長安遣菁略上洛郡雄與子法分討孔特等誅之進克司竹晉大司馬桓温來伐别將司馬勲出子午道健遣雄同太子萇等帥衆拒之戰於藍田為温弟冲所敗退屯城南尋帥騎七千襲破司馬勲於子午谷又與桓温戰于白鹿原温兵不利死者萬餘人温還雄遂攻喬秉於雍以疾卒于軍徤哭之嘔血曰天不欲吾平四海耶何奪元才之速也贈魏王諡曰敬武葬禮依晉安平獻王故事雄以佐命元勲權侔人主而謙恭汎愛遵奉法度故健重之常曰元才吾之姬旦也子堅襲爵及堅僭即帝位尊諡曰文桓皇帝苻菁苻菁健兄子也健既代洪綂衆稱晉官爵以菁為揚武將軍時杜洪據長安健欲䂓取洪遣菁帥衆七千自軹關入河東臨别執菁手曰若事不㨗汝死河北我死河東不復相見既濟焚橋菁轉戰而前與洪將張先戰於渭北擒之諸城盡陷所至降附健入長安自稱天王以菁為衛大將軍平昌公宿衛二宫健即皇帝位菁進爵為王遣菁同東海王雄略地關東大敗晉師張重華遣其將張𢎞宋修帥衆會王擢來伐菁與雄拒之大敗凉兵虜其二將苻飛為楊初所敗菁與雄帥歩騎四萬屯於隴東雄還長安菁遂掠地上洛晉大司馬桓温來伐菁同太子萇帥衆拒之温轉戰而前次於灞上與萇等相持會温軍乏食徙關中戸口而歸菁等尾擊之温復大敗健賞拒温之功以菁為司空未幾進位太尉尚書令健寢疾菁勒兵入東宫將殺生而自立時生侍疾西宫菁以健為己卒攻東掖門健聞變登端門陳兵自衛衆見健惶懼皆捨仗逃散徤執菁數而殺之餘無所問苻黄眉苻黄眉健之兄子也神噐秀㧞雄勇多竒略初為健輔車將軍遣鎮洛陽皇始三年張遇之亂黄眉自洛陽來奔健以為衛大將軍淮南王生素與黄眉友善及即位封為廣平王時生用法嚴酷生舅强平直諫忤旨生怒殺之黄眉同苻飛鄧羗以太后故叩頭切諫生弗聽出黄眉為左馮翊姚襄略地關中生遣黄眉及建節將軍鄧𦍑率歩騎萬五千禦之襄深溝固壘不戰𦍑説黄眉曰傷弓之鳥落於虛發襄頻為桓温張平所敗鋭氣䘮矣今固守不戰是窮宼也然其為人彊狠易以剛動若鼔譟揚旌長驅直壓其壘門襄必怒而出師一戰成禽耳黄眉從之遣𦍑先引騎三千軍於壘門挑戰襄怒盡鋭出戰𦍑偽不勝引騎而退襄追之於平原𦍑廻騎逆擊黄眉帥大衆繼至大戰斬之盡俘其衆黄眉等振旅而還黄眉既立大功生不加賞每於衆中辱之黄眉怒謀殺生自立事覺伏誅其王公親戚多有死者苻法苻法字永則小字阿法雄庶長子也為生後將軍封清河王生殘虐滋甚宗室勲舊殺害略盡一夕對侍婢曰阿法兄弟亦不可信明當除之是夜法夢神告之曰旦將禍及汝門惟先覺者可以免之寤而心悸會侍婢來告乃與特進梁平老强汪等帥壯士數百潛入雲龍門堅與吕婆樓帥麾下數百鼔譟繼進引生置於别室斬之法固以位讓堅堅乃去皇帝之號稱大秦天王即位於太極殿以法為使持節侍中都督中外諸軍事丞相録尚書事東海公堅母以法長且賢又得衆心懼終為變出遊宣明䑓見法重門高第車馬轔集恐終不利於堅乃與衛軍李威謀賜法死堅性仁孝於法尤為友愛與法訣於東堂慟哭嘔血諡曰獻哀公封其子陽為東海公敷為清河公陽後謀反事洩堅問其反狀陽曰禮云父母之仇不同天地臣父哀公死不以罪齊襄公復九世之仇而况臣也臣亦為父復仇耳堅流涕謂陽曰哀公之薨事不在朕卿寜不知之乃赦不殺徙陽於高昌陽勇力兼人尋復徙鄯善後劫鄯善之相欲求東歸鄯善王殺之苻融苻融字博休堅之季弟也少而岐嶷夙成魁偉美姿度健封融安樂王融上疏固辭健深竒之曰且成吾兒箕山之操乃止生愛其器貌常侍左右未弱冠便有台輔之望長而令譽彌高朝野所属堅僭號改封陽平公拜侍中中書監左僕射尋除中軍將軍聰辨明慧下筆成章至於談𤣥論道雖道安無以出之耳聞則誦目過不忘時人儗之王粲嘗著浮屠賦壯麗清贍世咸珍之未有升高不賦臨䘮不誄朱彤趙整等稱其妙速膂力雄勇騎射擊刺百夫之敵也銓總内外刑政修理進才理滯可方王景略尤善斷獄奸無所容故為堅所委任後為司𨽻校尉京兆人董豐游學三年而返過宿妻家是夕妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠誣引殺妻融察而異之問曰汝行往還頗有怪異及卜筮否豐曰初將發夜夢乘馬南渡水反而北渡復自北而南馬停水中鞭䇿不去俯而視之見兩日在於水下馬左白而濕右黒而燥寤而心悸竊以為不祥還之夜復夢如初問之筮者筮者云憂獄訟遠三枕避三沐既至妻為具沭夜授豐枕豐憶筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣周易坎為水離為馬乘馬南渡旋北而南者從坎至離三爻同變變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏詰其夫婦人被流血而死坎二隂一陽離二陽一隂相承易位離下坎上既濟文王遇之囚羑里有禮而生無禮而死馬左而濕濕水也左水右馬馮字也两日昌字也其馮昌殺之乎於是推騐獲昌而詰之昌具首服曰本與其婦謀殺董豐期以新沐枕枕為驗是以誤中婦人融在冀州有老母遇劫於路母揚聲唱盗行人為逐之既擒劫者劫者反誣行人為盗時日垂暮母及路人莫知孰是乃俱送之融見而笑曰此易知耳可二人並走先出鳳陽門者非盗既而還入融正色謂先出者曰汝真是盗何以誣人其發奸摘伏如此所在盗賊止息路不拾遺堅及朝臣雅皆歎服州郡疑獄莫不折之於融融觀色察形無不盡其情狀雖鎭關東朝之大事莫不馳驛與議性至孝初留冀州遣使參問其母動止或日有再三堅以為煩月聽一使後上疏請還侍養堅遣慰諭不許久之徴拜侍中中書監都督中外諸軍事車騎大將軍司𨽻校尉太子太傅領宗正録尚書事尋轉司徒苦讓不受融為將善謀略好施愛士專方征伐必有殊功堅既有意荆揚時慕容垂姚萇等常説堅以平吳封禪之事堅謂江東可平寢不暇旦融每諫曰知足不辱知止不殆窮兵極武未有不亡且國家戎族也正朔㑹不歸今江東雖不絶如綖然天之所相終不可滅堅曰帝王厯數豈有常哉惟德之所授耳汝所以不如吾者正病此不逹變通大運劉禪可非漢之遺祚然終為中國之所併吾將任汝以天下之事奈何事事折吾沮壊大謀汝尚如此况於衆乎及堅鋭意攻晉融又切諫曰陛下聽信鮮卑𦍑虜諂謏之言採納良家少年利口之説臣恐非但無成大事去矣垂萇皆我之仇讐思聞風塵之變冀因之以逞其凶德少年等皆富足子弟希閑軍旅茍說佞諂之言以會陛下之意不足採也堅亦弗納遂以融為征南大將軍率騎冦樊鄧戰於淮水敗績融馳騎略陣馬倒被殺軍遂大敗堅奔至淮南次於長安東之行宫哭融而後入告罪於太廟贈融大司馬諡曰哀公垂萇之叛悼恨彌深苻朗苻朗字元逹堅之從兄子也性宏逹神氣爽邁幼懐遠操不屑時榮堅嘗目之曰吾家千里駒也徵拜使持節都督青徐兖三州諸軍事鎭東將軍青州刺史封樂安男朗固辭不得已起而就官既為方伯有若素士耽玩經籍手不釋卷每談虛語𤣥不覺日之將夕登涉山水不知老之將至在任甚有稱績後晉遣淮南太守高素伐青州朗遣使詣謝𤣥於彭城求降𤣥表朗許之詔加員外散騎侍郎既至揚州風流邁於一時超然自得多所凌忽所與晤言不過一二人而已驃騎長史王忱江東之儁秀聞而詣之朗稱疾不見沙門什法汰問曰見王吏部兄弟未朗曰吏部為誰非人靣而狗心狗靣而人心兄弟者乎王忱醜而才慧國寳美貌而才劣於弟故朗云然汰悵然自失其忤物侮人皆此𩔖也謝安常設宴請之朝士盈坐並杌褥壺席朗每事欲誇之唾則令小兒跽而張口既唾而含出頃復如之坐者以為不及之遠也尤善識味鹹酢及肉皆别所由會稽王司馬道子為朗設盛饌極江左精麗食訖問曰關中之食孰若此答曰皆好惟鹽味小生耳既問宰夫皆如其言或人殺雞以食之既進朗曰此雞棲恒半露檢之果驗又食鵝肉知黒白之處人或不信記而試之無毫釐之差時人咸以為知味後數年王國寳譛而殺之王忱將為荆州刺史待殺朗而後發臨刑意色自若為詩曰四大起何因聚歛無窮已既適一生中又入一死理㝠心乘和暢未覺有終始如何箕山夫奄焉處東市曠此百年期遠同嵇叔子命也歸自天委化任㝠紀著苻子數十篇行於世亦老莊之流也苻宏苻宏堅長子也堅自稱大秦天王立宏為皇太子建元元年匈奴曹轂劉衛辰帥衆冦杏城索虜烏延等亦起兵叛通於衛辰堅帥中外精鋭討之使衛大將軍李威左僕射王猛輔太子宏留守長安堅平定朔方廵撫諸夷振旅而還六年堅復遣丞相王猛督諸將率歩騎六萬向鄴乃留李威輔太子宏守長安躬率精鋭十萬為之後繼七日而至安陽猛潜往迎之因謂堅曰監國幼冲鑾駕遠臨脱有不虞悔之何及乃并軍攻鄴㧞之遂平燕冀其後堅議大舉伐晉群臣各有異同庭議者久之太子宏進曰吳今得歲不可伐也且晉主無罪人為之用謝安桓冲兄弟皆一方之雋才君臣戮力阻險長江未可圖也但可厲兵積粟以待暴主一舉而滅之今若動而無功則威名損於外資財竭于内是故聖王之行師也内斷必誠然後用之彼若憑長江以固守徙河北百姓於江南增城清野杜門不戰我已疲矣彼未引弓土下氣厲不可久留陛下將若之何堅曰往年車騎滅燕亦犯歲而㨗之天道幽遠非汝所知也昔始皇之滅六國其王豈皆暴乎且吾内斷於心久矣舉必克之何為無功吾方命蠻夷以攻其内精甲勁兵以攻其外如此安有不克沙門道安曰太子之言是也願陛下納之堅不從卒有淮南之敗慕容冲遣偽尚書令高盖引兵攻渭北諸壘太子宏與戰於成貳壁斬首虜二萬堅屢為慕容冲所敗固守長安城中有書曰古苻傳賈録載帝入五將久長得乃留太子宏守長安付以後事將中山公詵張夫人率騎數百如五將宣告州郡期以孟冬救長安宏尋將母妻宗室男女數千騎出奔百僚逃散是歲晉太元十年也宏之奔也先歸南秦州刺史楊璧於下辯璧拒之乃奔武都氐豪强熙假道歸晉朝廷處宏於江州歴位輔國將軍桓𤣥簒位以宏為涼州刺史𤣥滅義熙初謀叛冦湘中伏誅苻暉苻暉堅第二子也堅即位封為平原公建元十六年堅以諸氐種𩔖繁滋分十五萬户使諸宗親各領之散居要鎮如古諸侯以暉為都督豫洛荆南兖東豫揚六州諸軍事鎮東大將軍豫州牧鎮洛陽配氐户三千二百合淝之敗丁零翟斌起兵叛秦攻暉於洛陽堅驛書使慕容垂將兵討之暉遣使讓垂趨使進兵垂南結丁零殺苻飛龍盡坑其衆暉又遣驍將毛當擊翟斌為斌所敗當死之暉率洛陽陜城之衆歸長安會慕容冲引師來攻去長安二百餘里城内戒嚴堅乃拜暉使持節散騎當侍都督中外諸軍事車騎大將軍司𨽻校尉錄尚書配兵五萬拒冲河間公琳以中軍大將軍為暉後繼冲令婦人乘牛厲衆掲竿為旗揚土為塵督厲其衆晨攻暉營暉出拒戰冲揚塵鼓譟暉師敗績冲遂據阿房屢敗暉兵堅讓之曰汝吾之才子也擁大衆屢為白虜小兒所摧何用生為暉恚憤自殺苻琳苻琳字永瑶堅第五子也封河間公有文武才藝引弓五百斤射洞犂耳至於山水文詠皆綺藻清麗高歩一時慕容冲冦亂長安堅以琳為中軍大將軍率衆三萬擊冲於灞水之上為冲所敗中流矢死苻詵苻詵堅之少子也封中山公最有寵於堅堅與群臣議大舉伐晉詵諫曰臣聞季梁在隨楚人憚之宫竒在虞晉不窺兵國有人焉故也及謀之不用而亡不淹歲前車之覆軌後車之明鑒陽平公國之謀主而陛下違之晉有謝安桓冲而陛下伐之是行也臣竊惑焉堅曰國有元龜可以决大謀朝有公卿可以定進否孺子言焉將為戮也不聽竟為晉所敗堅後自縊於新平佛寺詵亦自殺苻雅苻雅堅之踈族也權略無方雄毅厚重人稱其有良將之才在生世已為右衛將軍堅即位封西縣侯出為秦州刺史建元七年以雅為使持節都督秦晉涼雍州諸軍事秦州牧初仇池公楊世以地降堅堅署為平南將軍秦州刺史仇池公世死子纂代立遂受晉朝爵命而絶於堅世弟綂驍武得衆心起兵武都與纂争分堅遣雅等率歩騎七萬先取仇池進圍寜益雅進次鷲陜纂率衆五萬來拒晉梁州刺史楊亮遣督䕶郭寳率騎千餘救纂戰於陜中為雅所敗纂収衆奔還雅進攻楊綂綂帥武都之衆迎降纂將碩密亦詣雅降請為内應纂懼靣縛出降雅釋其縛送之長安苻洛苻洛堅之從弟也為安北將軍幽州刺史封行唐公以北討大都督帥幽冀兵十萬擊代有功加征北將軍洛兄重為豫州刺史北海公鎮洛陽建元十四年重以洛陽謀反堅曰吕光忠正必不同也命光収重檻送長安赦之以公就第其後二年春正月堅復以重為鎮北大將軍鎮薊洛勇而多力能坐制奔牛射洞犂耳堅深忌之故常為邊牧自以有滅代之功求開府儀同三司不得由是怨憤三月堅以洛為使持節郡督益寜西南夷諸軍事征南大將軍益州牧使從伊闕自襄陽遡漢而上洛謂官属曰孤於帝室至親也主上不能以將相任孤而常擯棄邊鄙今又投之西裔復不聽過京師此必有伏計欲使梁成沉孤於漢水矣為宜束手就縛為追晉陽之事以匡社稷耶諸君意何如其治中平規妄陳祥瑞勸洛舉兵詳具堅傳洛因攘袂大言曰孤計决矣拒謀者斬於是自稱大都督大將軍秦王以平規為輔國將軍幽州刺史為其謀主𤣥菟太守吉貞為左長史遼東太守趙讃為左司馬昌黎太守王緼為右司馬遼西太守王琳北平太守皇甫傑牧官都尉魏敷等為從事中郎分遣使者徵兵於鮮卑烏丸高句麗百濟新羅休忍等諸國遣兵三萬助北海公重戍薊諸國皆曰吾為天子守藩不能從行唐公為逆洛懼欲止猶豫未决王緼王琳皇甫傑魏敷知其無成潜欲告之洛皆殺之吉貞趙讃曰今諸國不從事乖本圖明公若憚益州之行者當遣使奉表乞留主上亦不慮不從平規曰今事形頗露何可中止宜聲言受詔盡幽并之兵南出常山陽平公必郊迎因而執之進據冀州總關東之衆以圖西土天下可指麾而定也洛從之帥衆七萬發和龍堅召群臣謀之歩兵校尉吕光曰行唐公以至親為逆此天下所共疾怨願假臣步騎五萬取之如拾遺耳堅曰重洛兄弟據南北一隅兵賦全資未可輕也光曰彼衆廹於兇威一時蟻聚耳若以大軍臨之勢必瓦解不足憂也堅乃遣使讓洛還和龍當以幽州永為世封洛謂使者曰汝還白東海王幽州褊狹不足以容萬乘須王秦中以承高祖之業若能迎駕潼關者當位為上公爵歸本國堅怒遣左將軍竇衝及吕光帥步騎四萬討之右將軍都貴馳傳詣鄴率冀州兵三萬為前鋒以陽平公融為大都督授之節度使石越率騎一萬自東萊出石逕襲和龍北海公重亦盡薊城之衆會洛兵于中山有衆十萬與衝等戰于中山大敗執洛及其將蘭殊送之長安吕光斬重於幽州石越克和龍斬平規堅赦蘭殊徙洛於西海後為梁熙所殺健后強氏健后强氏略陽人左光禄大夫强平之姊也健僣號天皇立為天皇后及徤寢疾强后欲立少子晉王栁徤以䜟文有三羊五眼遂立生為太子生既嗣位尊為皇太后生荒耽淫虐刑殺不道其舅强平切諫忤旨生怒誣以妖言欲殺之廣平王黄眉等侍讌禁中叩頭請曰平太后之弟也陛下縱欲殺平獨不念太后乎生弗聽乃鑿其頂而殺之太后遂以憂憤卒諡曰明德皇后生后梁氏生后梁氏略陽人左僕射梁安之女也初為淮南王妃生嗣偽位遂以壽光元年立為皇后會有客星孛大角熒惑入東井占曰不出三年國有大喪生曰朕與皇后對臨天下遂殺梁后以應之堅太后茍氏太后茍氏略陽氐人堅所生母也以堅永興元年尊為皇太后堅殺生以位讓其兄清河王法法不受群臣復固請於堅太后泣謂群臣曰社稷事重小兒自知不能他日有悔失在諸君群臣固請堅既即位署法為丞相東海公太后以法長且賢素得衆心疑忌特甚後遊宣明臺見法之第門車馬輻輳懼終為變遂與李威謀賜法死陽平公融太后少子也甚愛之出鎭冀州比發三至灞上其夕又竊如融所内外莫知是夜堅寢於前殿太史令魏延上言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅推問之驚曰天道與人何其不遠遂重星官後有司奏人有盗其母之錢而逃者請投之四裔大后聞而怒曰三千之罪莫大于不孝當棄之市朝奈何投之方外方外豈有無父母之鄉乎於是轘而殺之建元十一年以疾卒追諡曰明德皇后堅夫人張氏堅夫人張氏不知何許人明辨有才識堅將入冦江左群臣切諫不聽張氏進曰妾聞天地之生萬物王者之治天下皆因其自然而順之故功無不成是以黄帝服牛乘馬因其性也禹濬九川障九澤因其勢也后稷播種百榖因其時也湯武帥天下而攻桀紂因其心也皆有因則成無因則敗今朝野之人皆言晉不可伐陛下獨决意行之妾不知陛下何所因也書曰天聰明自我民聰明天猶因民而况於人主乎妾又聞王者出師必上觀天道下順人心今人心既不然矣請騐之天道諺云雞夜鳴者不利行師犬羣嘷者宫室必空兵動馬驚軍敗不歸自秋冬以來衆雞夜鳴羣犬哀嘷廐馬驚逸武庫兵器自動有聲吉凶之理非㣲此皆非出師之祥也如妾所論願陛下詳而思之堅曰軍旅之事非婦人所當豫也遂興兵南伐張氏請從其夜堅夢葵生城内明以問之張氏曰若征軍遠行難為將也堅又夢地東南傾復以問云江左不可平也君無南行必敗之象也堅不從果大敗於壽春單騎遁還顧謂張氏曰朕若用朝臣之言豈見今日之事耶當何靣目復臨天下也澘然流涕及堅死張氏乃自殺丕后楊氏丕后楊氏仇池氐人征東左司馬楊膺之妹也初為長樂公妃太安初立為皇后慕容永殺丕據長子即皇帝位改元中興將以楊氏為上夫人楊氏不從引劍刺永為永所殺登既嗣位追諡曰哀平皇后登后毛氏登后毛氏武都人河州牧毛興之女也美而勇壯善騎射太初二年立為皇后其四年登留毛氏及輜重于大界營姚萇率兵襲之營壘既䧟萇入其營毛氏猶彎弓跨馬率壯士數百與萇交戰殺賊七百餘人衆寡不敵為萇所執毛氏有姿色萇欲納之毛氏罵曰天子皇后安肯為賊𦍑所辱何不速殺我因仰天大哭曰姚萇無道汝先已害天子今又欲辱皇后皇天后土寜容汝乎萇怒殺之十六國春秋卷四十一
