body:
  text: 十六國春秋卷三十五前秦録三苻生苻生字長生健之第三子也封淮南王幼而麤暴昏醉無賴祖洪甚惡之生無一目為兒童時年七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也洪懼跣而掩其口謂其父健曰此兒狂勃宜早除之不然長大必破人家健將殺之健弟雄止之曰兒長成自當修改何可遽爾如此健乃止及長力舉千鈞雄勇好殺手格猛獸走及奔馬擊刺騎射冠絶一時桓温來伐生單馬入陣搴旗斬將者前後十數初健之長子萇既死母強氏意在少子栁健以䜟有三羊五眼之言故立為太子皇始五年六月健卒僭即皇帝位大赦境内改元壽光羣臣奏曰先帝晏駕甫爾而即改元非禮也生怒窮推議主得右僕射叚純殺之秋七月尊母強氏為皇太后立妻梁氏為皇后以太子門大夫南安趙韶為右僕射太子舍人趙誨為中䕶軍著作郎董榮為尚書並以佞倖進也八月生封所善衞大將軍黄眉為廣平王前將軍飛為新興王徴吕婆樓為侍中左大將軍大司馬武都王安領太尉晉王栁為征東大將軍并州牧鎭蒲阪魏王庾為鎭東大將軍豫州牧鎭陜城自餘封授有差初生將強懷與桓温戰没其子延未及封而健死㑹生出遊懷妻樊氏於道上書論懷忠烈請封其子生怒射而殺之中書監胡文中書令王魚言於生曰比頻有客星孛於大角熒惑入於東井大角為帝坐東井秦之分野於占不出三年國有大喪大臣戮死願陛下逺追周文修徳以禳之惠和羣臣以成康哉之美生曰皇后與朕對臨天下可以應大喪矣毛太傅梁車騎梁僕射受遺輔政可以應大臣矣九月殺皇后梁氏及太傅録尚書毛貴后之舅也車騎將軍尚書令梁楞左僕射梁安冬十一月以吏部尚書辛牢守尚書令右僕射趙韶為左僕射尚書董榮為右僕射中䕶軍趙誨為司𨽻校尉十二月殺丞相雷弱兒及其九子二十七孫於是諸羗皆有離心生雖在諒闇遊飲自若荒耽淫虐殺戮無道常彎弓露刅以見朝臣錘鉗鋸鑿可以害人之具備置左右即位未幾后妃公卿已下至於僕𨽻凡殺五百餘人截脛拉脇鋸項刳胎者比比有之壽光二年春正月嬖臣右僕射董榮言於生曰日蝕之變宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空乃殺司空王墮洛州刺史杜郁墮之甥也左僕射趙韶惡之譖於生以為贰於晉殺之壬戌宴羣臣於太極殿酣飲樂奏生親歌以和之命尚書令辛牢為酒監既而怒曰何不強人酒而猶有坐者引弓射牢殺之百竂大懼莫不引滿昏醉汚服失冠蓬頭僵仆生乃大樂二月生聞張祚見殺𤣥靚幼沖命征東大將軍晉王栁遣叅軍閻負梁殊使涼以書喻之負殊至姑臧𤣥靚年幼不見殊等涼州牧張瓘見之曰孤之本朝世執忠節逺宗大晉臣無境外之交二君何以來辱負殊曰晉王與君鄰藩義好有自來矣雖山河阻絶然風通道㑹不欲使羊陸二公獨美於前主上以欽明紹統八表宅心光被四海功格天地晉王思與張王齊曜大明交玉帛之好兼與君公同金蘭之契是以不逺而來君何怪焉瓘曰羊陸一時之事亦非純臣之義也本朝六世重光固忠不貳若與苻征東通使是上違先公純誠之志下乖河右遵奉之情其可乎負殊曰昔微子去殷項伯歸漢雖背君違親前史美其先覺亡晉之餘逺逃江㑹天命去之淪絶已久故尊先王翻然改圖北靣二趙盖神筭無方見機而作也今大秦威徳方盛君公若欲自尊河右則衆旅非秦之敵如欲宗歸遺晉則深乖先君雅㫖曷若逺蹤竇融附漢之規近述先王歸趙之事垂祚無窮永延遐祉乎瓘曰中州無信好食誓言往與石氏通好使車適返戎騎已至中國之風誡在昔日不足復論通和之事也負殊曰三王異政五帝殊風趙多姦詐秦崇信義豈得一槩待之乎張光楊初皆擅兵一方不供王貢先帝命將擒之赦其難恕之罪寵以爵封之榮今上道合二儀慈𢎞山海信符陰陽御物無際不可以二趙相况也瓘曰必如君言秦之威徳無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰先帝以大聖神武開構鴻基強燕納欵八州效順主上欽明道必隆世慨徽號擁於河西正朔未加吳㑹以吳必須兵服涼可以義懷故遣行人先申大好如君公未達天命正可緩江南數年之命廻師西斾恐涼州弗可保也瓘曰我跨據三州帶甲十萬西包葱嶺東阻大河伐人有餘而况自守何畏於秦負殊曰貴州山河之固孰若崤函五郡之衆孰若秦雍杜洪張琚因趙氏之成資據天阻之險固䇿三秦之鋭藉陸海之饒勁士風集驍騎如雲兵強財富自謂天下可平闗中可守有囊括宇内席卷四海之志先帝戎旗西指冰消雲散人詠來蘇旬月之間不覺易主燕雖虎視闗東猶以地勢之義逆順之理北面稱藩貢不踰月致肅慎楛矢通九夷之珍單于屈膝名王内附主上若以貴州不服赫然奮怒控弦百萬鼓行西濟未知貴州將何以抗之盍追先王臣趙故事世享大美為秦西藩瓘曰然秦之徳義加於天下江南何以不賔負殊曰文身之俗負阻江山道汚先叛化盛後賔自古而然豈但今也故詩曰蠢爾蠻荆大邦為仇言其不可以徳義懷也瓘曰秦據漢舊都地兼將相文武輔臣領袖一時者誰也負殊曰皇室懿藩忠若公旦者則大司馬武都王安征東大將軍晉王栁文武兼才神器秀㧞入可允釐百工出能折衝萬里者衞大將軍廣平王黄眉後將軍清河王法龍驤將軍東海王堅之兄弟其耆年碩徳徳侔尚父者則太師録尚書事廣寗公魚遵清素剛嚴骨硬貞亮者則左光禄大夫強平金紫光禄大夫程肱牛夷博聞多識探賾索幽者則中書監胡文中書令王魚黄門侍郎李柔雄毅厚重權智無方者則左衞將軍李威右衞將軍雅才識明達令行禁止者則特進領御史中丞梁平老特進光禄大夫强汪侍中尚書吕婆樓文史富贍鬰為文宗者則尚書右僕射董榮秘書監王颺著作郎梁讜驍勇多竒略攻必取戰必克闗張之流萬人之敵者則前將軍新興王飛建節將軍鄧羗立忠將軍彭越安逺將軍范俱難建武將軍徐盛常伯納言卿校牧守則人皆文武莫非才賢其餘懷經世之才藴佐時之略守南山之操遂而不奪者王猛朱肜之倫相望於巖谷濟濟多士焉可罄言姚襄張平一時之傑各擁數萬狼顧偏方委忠獻欵請為臣妾小不事大春秋所誅惟君公圖之瓘曰兹事當决之於王非身所了負殊曰涼王雖英睿夙成然年在幼沖君公居伊霍之任安危所係見機之義實在君公耳瓘新輔政河西所在兵起懼秦師之至乃以𤣥靚之命遣使稱藩生因其所稱官爵而授之燕王慕容儁遣將軍慕輿長卿等帥衆七千人自軹闗攻幽州刺史强晉書作張哲於裴氏堡晉將軍劉晉書作王度帥衆四千攻青州刺史王晉書作袁朗於盧氏堡生遣前將軍新興王飛拒度建節將軍鄧羗拒長卿飛未至而度退羗及長卿戰於堡南大破之獲長卿及甲首二千七百餘級姚襄帥衆萬餘攻平陽太守産於匈奴堡晉王栁救之為襄所敗引還蒲阪襄進攻堡克之殺産盡坑其衆遣使從生假道將還隴西生將許之東海王堅諫曰姚襄人傑也今還隴西必為深患不如誘以厚利伺隙撃之生乃止遣使拜襄官爵襄不受斬其使者焚所送章册宼掠河南生怒命大將軍張平討之襄乃卑辭厚幣與平結為兄弟更與秦通和三月生發三輔人治渭橋金紫光禄大夫程肱以妨農害時上疏切諫生怒殺之夏四月長安大風發屋㧞樹行人顛頓宫中奔擾或稱賊至宫門晝閉五日乃止生推告賊者殺之刳出心胃生舅左光禄大夫强平切諌曰元正盛旦日有蝕之正陽神朔昏風大起兼之水旱不時獸災未息此皆由陛下不勉強於政事乖和氣所致也願陛下務養元元平章百姓棄纎芥之嫌含山岳之過致敬宗廟愛禮公卿去秋霜之威垂三春之澤則奸囘寢止妖祲自消乾靈祗祐皇家永保無窮之美矣生怒以為妖言鑿其頂而殺之衞將軍廣平王黄眉前將軍新興王飛建節將軍鄧羗侍讌禁中以平太后之弟叩頭固諫生弗許出黄眉為左馮翊飛為右扶風羗行咸陽太守猶惜其驍勇故皆弗殺五月太后強氏以憂憤卒諡曰明徳六月生下書曰朕受皇天之命承祖考之業君臨萬邦子育百姓嗣統以來有何不善而謗讟之音扇滿天下殺不過千而謂之殘虐行者比肩未足為希方當峻刑極罰復如朕何時虎狼大暴從潼闗西至於長安晝則斷道夜則發屋不食六畜專務食人自元年秋至於二年夏凡殺七百餘人百姓苦之皆廢耕桑相聚邑居為害滋甚内外恟懼秋七月羣臣奏請禳災生曰野獸饑則食人飽自當止終不能累年為患也何禳之有且天豈不愛羣生而年年降罰正以百姓犯罪者多將助朕專殺而施刑敎故耳但勿犯罪何為怨天而尤人哉冬十月生如阿房遇兄與妹俱行者逼令為非禮固執不從生怒殺之尚書僕射賈𤣥石形貎美偉生與妻樓上望見𤣥石在庭中妻曰此何人也生曰汝欲得也乃誅𤣥石甞讌羣臣於咸陽故城有後至者皆斬之生夜食棗多至旦而有疾召太醫令程延使診之延曰陛下無他疾食棗多耳生怒曰嘻汝非聖人安知吾食棗乃殺之又使太醫某合安胎藥問人參好惡并藥分多少曰雖小小不具自可堪用生以為譏其目鑿其目出然後斬之常從輿上溲便輦者謂之天雨壽光三年春二月太白犯東井有司奏曰東井秦之分野太白罰星必有暴兵起於京師生曰太白入井必將渴耳何所怪乎夏四月姚襄將圖闗中自北屈進屯杏城遣輔國將軍姚蘭略地敷城曜武將軍姚益生左將軍王欽盧招動定陽北地芹川諸羗胡皆應之有衆二萬七千進據黄落生遣衞大將軍廣平王黄眉平北將軍道龍龍驤將軍東海王堅建節將軍鄧羗率步騎萬五千禦之生將飛龍擊蘭擒之襄深溝高壘固守不戰羗説黄眉曰傷弓之鳥落於虚發襄頻為桓温張平所敗鋭氣已竭今固壘不戰是窮㓂也然其為人强狠易以剛動若鼓譟揚旗壓其壘門彼必忿怒而出可一戰擒也黄眉從之五月羗帥騎三千壓於襄壘襄果怒盡鋭出戰羗偽不勝引騎而退襄追之至於三原羗廻騎拒襄俄而黄眉與堅大衆繼至襄兵大敗時襄所乘駿馬曰黧眉騧日行千里是戰也馬倒擒而斬之盡俘其衆弟萇帥衆來降襄載其父弋仲之柩在軍中生以王禮葬弋仲於孤磐亦以公禮葬襄廣平王黄眉等振旅還長安生不之賞數衆辱之黄眉怒謀殺生自立事覺伏誅事連王公親戚多有死者生夢大魚食蒲又長安謡曰東海有魚化為龍男便為王女為公問在何所洛門東東海堅所封也時為龍驤將軍第在洛門之東生不知是堅以謡夢之故誅侍中太師録尚書事廣寗公魚遵并其七子十孫時又謡曰百里望空城鬰鬰何青青瞎兒不知法仰不見天星於是悉壞諸空城以禳之法是苻法也金紫光禄大夫牛夷懼不免禍求為荆州出鎭上洛生不許曰公忠肅篤敬宜左右朕躬豈有外鎭之理改為中軍將軍引見調之曰牛性遲重善持轅軛雖無驥足動負百石夷曰雖服大車未經峻壁願試重載乃知勲績生笑曰何其快也公嫌所載輕乎朕將以魚公爵位處公夷懼歸而自殺生荒暴日滋殘虐彌甚躭湎於酒無復晝夜羣臣朔望朝謁漏盡請見生曰日知盡乎須待飲訖罕有見者或日暮不出百僚饑弊或至申酉乃出臨朝輒怒色厲惟行殺戮連月昏醉弗堪省覽往往寢落醉中决事左右因以為奸賞罰無凖因醉問左右曰自吾臨天下以來汝等外間何所聞乎或對曰陛下聖明宰世子育百姓賞必當功刑必當罪天下唯歌太平未聞有怨生怒曰汝媚我也引而斬之他日又問或對曰陛下刑罰微過又怒曰汝謗我也亦斬之所幸妻妾小有忤㫖輒便殺之流其尸於渭水或使宫人與男子裸交於殿前引羣臣臨而觀之或生剥牛羊驢馬活爓雞豚鵝鴨數十為羣縱之殿前或剥死囚面皮令其歌舞臨觀以為嬉樂宗室勲舊親戚忠良殺害略盡王公在位者悉以疾告歸人情危駭道路以目羣臣奔走草野皆曰從虎口出左右得保一日如度十年自以眇目所諱言者殘缺傷毁偏隻少無不足不具之𩔖皆不得道左右忤㫖誤犯而死者不可勝紀六月太史令康權言於生曰昨夜三月並出孛星入於太微連於東井自去月上旬沈隂不雨迄至於今將有下人謀上之禍深願陛下修徳以消之生怒以為妖言撲而殺之生夜坐對侍婢曰阿法兄弟亦不可信明當除之侍婢以告堅及堅兄清河王法法遂與特進領御史中丞梁平老特進光禄大夫强汪帥壯士數百人潛入雲龍門堅與侍中尚書吕婆樓帥麾下三百餘人鼓譟繼進宿衞將士皆舍仗歸堅生猶昏醉寢而未寐堅衆既至生驚問左右曰此輩何等人左右曰賊也生曰賊也何不拜之堅兵皆笑生又大言何不速拜不拜者斬之堅衆引生置於别室廢為越王尋而殺之時年二十三在位三年諡曰厲王封生子馗為越王以嗣之十六國春秋卷三十五
