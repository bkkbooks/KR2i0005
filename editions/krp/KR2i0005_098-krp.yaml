body:
  text: 十六國春秋卷九十八北燕錄一馮䟦馮䟦字文起長樂信都人小字乞直伐一作代其先畢萬之後也子孫食采馮鄉因以為氏永嘉之亂䟦祖父和避地上黨父安雄武有局量慕容永僭號長子以安為征東將軍永為垂所滅安東徙和龍一作昌黎家於長谷䟦幼而頴異及長懿重少言仁厚有大度飲酒至一石不亂母弟素弗次丕次𢎞皆任俠放逸不修行業惟䟦恭慎勤於家産父母器之既而家於昌黎遂同夷俗所居上毎有雲氣狀若樓閣時咸異之嘗夜見天門開神光赫然燭於庭中永康末慕容寶僭號署為殿中左監稍遷衞中郎將中衞將軍初弟素弗與從兄萬泥及諸少年游於水濱有一金龍浮水而下素弗與萬泥曰頗有見否萬泥等皆曰無所見也乃取龍而示之咸以為非常之瑞慕容熙聞而求焉素弗秘之熙怒及即偽位密欲誅䟦兄弟䟦後又犯熙禁乃懼禍及遂與諸弟亡命山澤毎夜獨行猛獸為之避路是時賦役煩數民不堪命䟦兄弟謀曰熙今昏虐彌甚兼忌吾兄弟既還首無路不可坐受誅滅不若因民之怨共舉大事可以建公侯之業事若不成死未晚也遂與萬泥等二十二人結盟䟦與二弟乘車使婦人御之潛入龍城匿於北部司馬孫䕶之家因而殺熙立夕陽公高雲為主䟦進為使持節侍中都督中外諸軍事征北大將軍開府儀同三司録尚書事封武邑公事無大小皆决於䟦兄弟初䟦讌羣僚忽有血流其左臂䟦惡之從事中郎王垂因説符命之應䟦戒其勿言太平元年高雲為幸臣離班桃仁所殺䟦升洪光門以觀變帳下督張泰李桑言於䟦曰此豎勢何所至請為公斬之乃㧞劒而下桑斬班於西門泰殺仁於庭中羣僚請䟦為主䟦曰范陽公素弗才略非凡志於靖難掃清兇桀皆公勲也索弗辭曰臣聞父兄之有天下傳之於子弟未聞子弟藉父兄之業而先之者今鴻業未建危甚綴旒天工無曠業係大兄願上順皇天之命下副黎庶之心䟦猶弗許羣臣固請乃許之遂以晉太元二十年僭即天王位於昌黎大赦境内殊死已下乃下詔曰義貴適時不必改作故陳氏代姜不徙齊號宜即國號曰燕建元太平分遣使者巡行郡國觀察風俗追尊祖和為元皇帝父安為宣皇帝尊母張氏為皇太后立妻孫氏為皇后子永為太子署素弗為侍中車騎大將軍錄尚書事仍范陽公𢎞為侍中征東大將軍尚書右僕射汲郡公從兄萬泥為驃騎大將軍幽平二州牧廣川公務銀提為上大將軍遼東太守營丘公孫䕶為侍中尚書令陽平公張興為衞將軍尚書左僕射永寧公郭生為鎮東大將軍領右衞將軍陳留公從兄子乳陳為征西大將軍并青二州牧上谷公姚昭為鎮南大將軍司隸校尉上黨公馬弗勤為吏部尚書廣宗公王難為侍中撫軍將軍潁川公自餘拜授文武進位各有差太平二年春二月加廣川公萬泥開府儀同三司萬泥與乳陳自以宗室至親並有大功謂當入為公輔久而不得二人皆憾阻兵俱叛䟦命將討之俘斬無遺遂平萬泥等秋八月䟦下書曰昔高祖為義帝舉哀天下歸其仁吾與髙雲義則君臣恩踰兄弟其以禮葬雲及其妻子立雲廟於韮町置園邑二十家四時供薦冬十一月以范陽公素弗為大司馬改封遼西公以汲郡公𢎞為驃騎大將軍改封中山公太平三年春正月䟦下書曰自頃多故事難相尋賦役繁苦百姓困窮宜加寛宥務從簡易前朝苛政皆悉除之守宰當垂仁惠無得侵害百姓蘭臺都官明加澄察於是上下肅然蝚蠕勇斛律一作柔然可汗斛律遣使獻馬三千疋求䟦女樂浪公主䟦命羣臣議之遼西公素弗等議曰前代舊事皆以宗女妻六夷宜許以妃嬪之女樂浪公主不宜下降非𩔖䟦曰女生從夫千里非逺朕方崇信殊俗柰何欺之乃以樂浪公主妻之遣遊擊將軍秦都率騎二千送女歸於蠕蠕厙莫奚虞出厙真率三千餘落請交市獻馬千疋許之處之於營丘分遣使者巡行郡國孤老久病不能自存者賑穀帛有差孝弟力田閨門和順者皆褒顯之昌黎郝越營丘張買成周刁温建徳何纂皆以賢良擢叙秋七月遣太常丞劉軒徙北部人五百户於長谷為祖父園邑以太子永領大單于置四輔都尉䟦勵意農桑勤心政事乃下書省徭役薄賦斂墯農者戮之力田者褒賞命尚書紀達為之條制毎遣守宰必親見東堂問為政事之要令極言無隠以觀其志自是朝野競勸太平四年太平五年有三石其形若輪大六圍見於山澗月餘而滅太平六年夏五月河間人禇匡言於䟦曰陛下至徳應期龍飛東夏一作遼碣舊邦宗族傾首朝陽以日為嵗若聴臣往迎致之不逺䟦曰隔絶殊域阻迴數千里如何可致匡曰章武郡臨海船楫可通出於遼西臨渝不為難也䟦許之署匡為遊擊將軍中書侍郎厚加資遣匡尋與䟦從兄買從弟睹自長樂率五千餘戸歸於和龍署買為衞尉封陽城伯睹為太常封髙城伯契丹厙莫奚來奔署其大人為歸善王䟦又下書曰今疆宇無虞百姓寧業而田畆荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益為資生之本此土桑少人未見其利可令百姓人植桑一百根柘二十根又下書曰聖人制禮送終有度重其衣衾厚其棺椁將何用乎人之亡也精魂上歸於天骨肉下歸於地朝終夕壞無寒煖之期衣以錦繡服以羅紈寧有知乎厚於送終貴而改葬皆無益於亡者徒有損於生人是以祖考因舊立廟皆不改營陵寢申下境内自今皆令奉之䟦弟丕先是避亂在髙句驪䟦召之以為左僕射封常山公秋八月辛丒魏太宗諱嗣使謁者于什門載記作耿貳來聘至於和龍䟦遣黄門郎常陋迎之於道䟦為不稱臣怒而不見及至䟦又遣陋勞之什門忿而不入曰大魏皇帝有詔須馮主出受然後敢入䟦使人牽逼令入見䟦不拜䟦使人按其項什門曰馮主拜受詔吾自以賓主致敬何苦見逼也散騎常侍申秀言於䟦曰陛下接之以禮而敢驕蹇若斯不可容也中給事馮懿以傾佞得幸又盛稱其陵傲以激怒䟦䟦曰彼各為其主耳匹夫尚不可屈况一方之主乎乃幽執什門欲降之什門於羣衆之中回身背䟦披褲後襠以辱之終不肯降䟦遂留之不遣久之隨身衣冠弊壞略盡蟣虱流溢䟦遺以衣服拒而不受和龍人嘆曰雖古烈士無以過也冬十月䟦與夏主赫連勃勃連和勃勃遣御史中丞烏落孤來蒞盟十二月遼西公素弗卒比葬䟦七臨之是年䟦造刀一口銘曰太平隸書太平七年冬十一月井竭三日而復䟦殺尚書令孫䕶弟昌黎尹伯仁及叱支乙㧞等乃進䕶左光祿大夫開府儀同三司錄尚書事以慰其心未幾酖而殺之又殺遼東太守務銀提皆以怨望有叛謀也太平八年䟦下書曰武以平亂文以經務寧國濟俗實所憑焉自頃喪難禮壞樂崩閭閻絶諷誦之音後生無庠序之教子衿之歎復興於今豈所以穆章王化一作風化崇闡斯文可營建太學以長樂劉軒營丘張熾成周翟崇為博士郎中簡二千石已下子弟年十三已上者教之冬十月初䟦别將厙傉官斌降魏既而復叛來歸太宗遣驍騎將軍延普渡濡水擊斌㧞之遂攻䟦幽州刺史漁陽公厙傉官昌征北將軍闗内侯厙傉官提等皆斬之生擒厙傉官女生太平九年夏四月䟦遣王特兒等入貢於晉魏章武太守捕之五月晉青州刺史申永遣使浮海來聘䟦使中書郎李扶報之時自三月不雨至於六月䟦减膳徹懸大赦境内殊死已下冬十一月蝚蠕大檀遣使獻馬三千疋羊萬口䟦厚禮其使而遣之太平十年夏四月和龍有赤氣四塞蔽日自寅至申太史令張穆言於䟦曰此兵氣也今大魏威制六合而聘使隔絶自古未有隣國接境不通和好違義怒隣取敗之道竊懼大軍猝至必致吞滅宜還前使修好結盟䟦曰吾方思之五月太宗東巡至於濡源及甘松遣征東大將軍長孫道生安東將軍李先給事黄門侍郎奚觀率精騎二萬來伐又遣驍騎將軍延普幽州刺史尉諾自幽州引兵北趨遼西為之聲援太宗屯突門嶺以待之道生率師襲乙連城克之悉虜其衆進攻和龍李先乃言於道生曰宜密使人人備青草一束各五尺圍用填城塹攻其西南絶其外援勒兵急攻賊必可擒也道生不從䟦遣單于右輔古泥率步騎二千候之去城十五里遇軍奔還又遣征南大將軍姚昭及將軍皇甫軌等拒戰軌中流矢死䟦嬰城固守魏攻之不克道生等以䟦有備掠其民萬餘家而去太平十一年春三月穴國遣使來朝其人多穴居多猪羊少牛馬夏衣魚皮冬衣猪毛至於漁獵常持藥草自鄣令人不見俗無尊卑之别寒則入穴聚太平十二年太平十三年䟦境内地震山崩洪光門鸛鵲折又地震右寢壞䟦問太史令閔尚曰比年屢有地動之變卿可明言其故尚曰地陰也主百姓震有左右比震皆向右臣懼百姓將西移也䟦曰吾亦其慮之於是分遣使者巡行郡國問所疾苦孤老不能自存者賜以穀帛有差太平十四年宿庫一作渾地燃一旬而滅觸地生蛆月餘乃止太平十五年和龍城地徧生白毛長一尺二寸月餘而亡是嵗遼西太守髙讃潛謀叛逆事洩伏誅太平十六年夏自春不雨至於五月有司奏右部王荀妻產妖傍人莫覺俄而失之乃暴荀妻於社大雨普洽御覽作十五年太平十七年春二月北部人趙夀女既嫁化為男子娶妻而無子䟦問羣臣曰此何祥也尚書左丞傅權對曰西漢之末雌雞化為雄陰變為陽君替臣僭之象卒有婦人專寵王莽簒立況今女化為男臣將為君之徵也䟦曰將何以禳之權曰桑榖生朝太戊修徳而殷道以興熒惑守心宋景責躬而延齡二紀惟修身崇善可以轉禍為福耳太平十八年秋八月太子永卒立次子翼為太子䟦戒之曰吾聞君子以學為本不學無以立尊敬師傅人倫之始汝其夙夜䖍䖍欽承明訓太平十九年春二月丁零氐楊道來降先是太平初楊道獵於白鹿山為契丹所獲流漂塞外至大難北及大黎國逐水草而居射獵為業至十月乃収葦為城水澆令凍髙一大五尺東北七十八里西南二十餘里名陵城遂居於其中有衆千餘至是來降太平二十年太平二十一年春二月有飄風從征南大將軍上黨公姚昭宅至司徒中山公𢎞宅而散太平二十二年秋八月䟦寢疾召中書監申秀侍中楊哲於内寢謂之曰吾患當不濟卿等善相吾子㕘決萬機九月疾甚輦而臨軒命太子翼攝國事勒兵聴政以備非常䟦妾宋夫人規立其子受居惡翼聴政謂之曰主上疾將瘳奈何便欲代父臨天下乎翼性仁弱遂還東宫一日三往省疾宋夫人矯詔遏絶内外遣閽寺傳問而已翼及諸子大臣皆不得見惟中給事胡福獨得出入專掌禁衞福慮宋夫人遂成其謀乃言於司徒錄尚書事中山公𢎞曰主上疾甚宋夫人專擅羣佞用事恐一旦不諱國家殊未得安不可不為之計也𢎞深然之於是與壯士數十人裹甲入禁中為亂宿衞左右皆不戰而散宋夫人命開東閣𢎞家僮庫斗頭勁捷有勇力踰閣而入至於皇堂射殺女御一人䟦驚懼而死𢎞遂即天王位遣使巡城告曰天降禍凶大行崩背太子不侍疾羣公不奔喪疑有逆謀圖危社稷吾備介弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宫兵出戰敗績兵皆奔散𢎞遣使賜翼死䟦有子百餘人𢎞皆殺之命宗正馮哲黄門盧昭典葬事於東宫葬䟦於長谷陵偽謚文成皇帝廟號太祖十六國春秋卷九十八
