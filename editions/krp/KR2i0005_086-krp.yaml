body:
  text: 十六國春秋卷八十六西秦録二乞伏熾磐乞伏熾磐乾歸長子也性勇果英毅臨機能斷權畧過人初乾歸為姚興所敗熾磐質於秃髮利鹿孤後自南平逃而降興興署為振忠將軍興晉太守又拜建武將軍行西夷校尉畱其部衆鎮苑川及乾歸返政復立熾磐為太子領冠軍大将軍都督中外諸軍録尚書事後乾歸稱藩於秦興遣使署熾磐假節鎮西將軍左賢王平昌公尋進號撫軍大將軍乾歸死遂襲偽位自稱大將軍河南王大赦境内改元永康九月署尚書令翟勍為相國侍中太子詹事麴景為御史大夫段暉為中尉弟延祚為禁中録事樊謙為司直罷尚書令僕射尚書六卿侍中散騎常侍黄門郎等官置中左右常侍侍郎各三人永康二年春三月熾磐遣龍驤將軍智逹平東將軍王松夀討吐谷渾樹洛干於澆河大破之獲其將呼那烏提虜三千餘戸而還又遣鎮東將軍曇逹與平東將軍王松壽率騎一萬東討休官權小郎呂破胡於白石川大破之進㨿白石城䧏其衆萬餘人顯親公休官權小成呂奴迦等二萬餘戸叛㨿白坑負固不服曇逹進攻克之斬小成奴迦及首級四千七百隴右休官悉䧏秦太尉索稜以隴西來降熾磐以稜爲太傅夏四月遣安北將軍烏地延冠軍將軍翟紹討吐谷渾别綂句勤一作旁於泣勤川大破之俘虜甚衆秋七月熾磐率諸將討吐谷渾别綂支旁於長柳川虜旁及其民五千餘戸而還九月擊吐谷渾别綂掘逵於渴渾川大破之俘獲男女二萬三千冬十月掘逵率其餘衆來䧏永康三年春正月有五色雲起於南山熾磐以爲已瑞大悅謂羣臣曰吾今年應有所定王業成矣於是繕甲整兵以待四方之隙夏五月熾磐聞南凉秃髪傉檀西征乙弗㧞劍而起曰可以行矣羣臣咸以爲不可太府主簿焦襲曰傉檀不顧近患而貪遠利我今伐之絶其西路使不得還救則虎臺傉檀子獨守窮城可坐擒也此天亡之時必不可失熾磐從之率步騎二萬襲樂都秃髪虎臺憑城拒守熾磐四靣攻之一句而克遂入樂都論功行賞將士各有差遣平遠將軍犍䖍率騎五千追傉檀以鎮南將軍謙屯爲都督河右諸軍事凉州刺史鎮樂都秃髪赴單爲西平太守鎮西平赴單烏孤之子也趙恢爲廣武太守鎮廣武曜武將軍王基爲晋興太守鎮浩亹徙虎臺與其文武及百姓萬餘戸於枹罕六月傉檀勢屈請䧏旣至遣使郊迎待以上賔之禮秋七月署傉檀爲驃騎大將軍左南公南凉文武隨才銓擢冬十月熾磐旣兼傉檀兵強地廣復稱秦王署置百官十一月立妃秃髪氏爲王后永康四年春三月河西王沮渠蒙遜攻㧞廣武郡熾磐遣將軍魋尼寅邀於浩亹為蒙遜所擊死之又遣將軍折斐等率騎二萬㨿勒姐嶺復爲蒙遜所擒夏四月熾磐子元基一作元方自長安逃歸以爲尚書左僕射五月熾磐率衆三萬攻湟河沮渠漢平遣司馬隗仁乗夜襲擊大敗熾磐將引還先遣老弱漢平長史焦昶將軍叚景潜召熾磐熾磐復攻之昶景因說漢平出䧏仁勒壯士百餘㨿南門樓三日不下力屈擒之熾磐怒欲斬之散騎常侍武威叚暉諫曰仁臨難不畏死忠臣也宜宥之以勵事君乃囚之隗仁在西秦五年叚暉又爲之說熾磐免之使還姑臧六月以左衞將軍匹逵爲湟河太守因討乙弗窟乾䧏其三千餘戸而還署尚書右僕射出連䖍爲都督嶺北諸軍事凉州刺史以凉州刺史謙屯爲鎮軍大將軍河州牧秋七月以秦州刺史曇逹爲尚書令光禄勲王松壽爲秦州刺史冬十一月熾磐遣尚書令曇逹秦州刺史王松夀等率騎一萬討南羗彌姐康薄於赤水䧏之遂以王孟保爲略陽太守鎮赤水永康五年春正月熾盤攻秦洮陽公彭利和於漒川次師沓中沮渠蒙遜率衆攻石泉來援熾磐聞而引還二月尚書令曇逹與凉州刺史出連䖍率騎五千救石泉蒙遜聞曇逹等至亦引兵去遂遣使來聘與熾磐結和親夏四月曇逹王松壽等率騎一萬擊秦上邽進㨿蒲水秦州刺史姚艾率衆來拒大戰破之艾奔上邽曇逹進屯大利破黄石大羗二戍徙其民五千餘戸於枹罕冬十月使秦州刺史王松夀鎮馬頭以逼秦之上邽十二月遣使詣太尉劉裕求擊秦以自效裕拜熾磐平西將軍河南公永康六年春二月遣安東將軍木奕干率騎五千討吐谷渾樹洛干於塞上破其弟阿柴於堯扞川俘獲五千餘口而還樹洛干奔保白蘭山慚憤發疾而死熾磐聞而喜曰此虜矯矯所謂有豕白蹢也徃嵗曇逹東征姚艾敗走今年木奕干西討黠虜遠逃境宇稍清姦凶方殄股肱惟良吾無患矣秋七月相國翟勍卒八月以尚書令曇逹爲左丞相子左僕射元基爲右丞相御史大夫麴景爲尚書令侍中翟紹爲左僕射冬十月遣曇逹元基東討秦故將姚艾艾遣使稱藩熾磐以爲征東大將軍秦州牧徴王松壽爲尚書右僕射永康七年春正月以木奕干爲沙州刺史鎮樂都二月乙弗鮮卑烏地延率戸二萬來䧏署爲建義將軍地延尋死弟他子立以子軻蘭質於西平他子從弟提孤等率戶五千以西遷叛凉州刺史出連䖍遣使諭之提孤等歸䧏熾磐以提孤姦猾終爲邉患稅其部中戎馬六萬疋後二歳提孤等扇動部落西奔出塞他子率戸五千入居西平冬十月姚艾叛秦䧏西河王䝉遜蒙遜率衆迎之艾叔父儁言於衆曰秦王寬仁有雅度自可安居事之何爲從凉主西遷衆咸以爲然相率逐艾推儁爲主復遣使請䧏熾磐大悅徴儁爲侍中中書監征南將軍封隴西公邑一千戶以左丞相曇逹都督洮罕以東諸軍事征東大將軍秦州牧鎮南安冬十一月熾磐東巡十二月徙上邽民五千餘戸於枹罕永康八年夏四月使征西將軍他子率騎五千討吐谷渾覔地於弱水南大破之覔地率衆五千來䧏拜弱水䕶軍秋九月左衞將軍匹逵建威將軍梯君等討彭利和於漒川大破之利和单騎奔仇池獲其妻子徙羗豪三千戶於枹罕漒川羗三萬餘戸皆安堵如故冬十月以尚書右僕射王松壽爲益州刺史鎮漒川建𢎞元年春正月立次子暮末爲太子仍兼領撫軍大將軍都督中外諸軍事大赦境内改元建𢎞其臣佐等多所封授秋七月甲辰宋初受禪詔以熾磐爲安西大將軍秦王九月振武將軍王基等襲河西王蒙遜胡園戍俘二千餘戶而還建𢎞二年春正月遣征北將軍木奕干輔國將軍右丞相元基率騎攻上邽遇霖雨而還夏四月吐谷王阿柴遣使來䧏熾磐署阿柴爲征西大將軍開府儀同三司安州牧白蘭王秋七月河西王蒙遜率衆來伐使征北將軍木奕干等帥步騎拒之斬首二千而還冬十二月遣征西將軍他子等率騎二萬擊契汗秃真於羅川建𢎞三年春正月征西他子等大破契汗禿真獲男女二萬口牛羊五十餘萬頭禿真率騎數千西奔其别部樹奚帥戶五千來䧏夏四月乙亥以折衝將軍是辰爲西胡校尉築列渾城於汁羅以鎮之秋九月遣征北將軍出連䖍等率騎六千擊沮渠城都於五澗冬十月出連䖍與城都戰擒之十二月徴秦州牧曇逹爲左丞相征東大將軍建𢎞四年春三月熾磐謂其羣臣曰今宋雖奄有江南夏人雄㨿闗中皆不足與也獨魏主奕世英武賢能爲用且䜟云恒代之北當有真人吾將舉國而事之乃遣尚書郎莫者阿胡積弩一作射將軍又寅等入見於魏貢黄金二百斤并陳伐夏方略太宗許之建𢎞五年夏四月熾磐遣鎮南將軍吉毗等帥步騎一萬南伐白茍車孚崔提旁爲四國皆來䧏附秋七月遣太子暮末率征北將軍木奕干等歩騎三萬出貂渠谷攻河西白草嶺臨松郡皆破之徙民二萬餘口而還建𢎞六年夏四月遣平逺將軍叱盧犍等襲河西戰於臨松擒其將沮渠白蹄徙其民五千餘戶於枹罕秋七月遣鎮南將軍吉毗等南擊黒水羗酋丘擔大破之冬十月丘擔率衆來䧏熾磐署擔爲歸善將軍拜折衝將軍信帝爲平羗校尉以鎮之建𢎞七年春正月熾磐復遣使如魏請用師於夏秋八月熾磐伐河西至亷川遣太子暮末等率步騎三萬攻西安不克又攻番禾河西王沮渠蒙遜發兵來禦夏主赫連昌遣征南大將軍呼盧古將騎二萬攻苑川車騎大將軍韋代將騎三萬攻南安熾磐聞之引還九月徙其境内老弱畜産於澆河及莫河仍寒川畱左丞相曇達守枹罕韋代攻㧞南安獲秦州刺史翟爽南安太守李亮吐谷渾掘逵等帥部衆二萬餘落叛奔昴川附於吐谷渾王慕璝冬十月左丞相曇逹與夏呼盧古戰於嵻㟍山曇達兵敗十一月呼盧古韋代進攻枹罕熾磐遷保定連呼盧古入南城鎮東將軍趙壽生帥死士三百人力戰却之呼盧古韋代又攻沙州刺史出連䖍於湟河䖍遣後軍將軍萬年擊敗之又攻西平執安西將軍庫洛干阬戰士五千餘人掠其民二萬餘戸而去十二月征南將軍吉毗鎮南漒隴西人辛澹帥戸三千㨿城逐毗毗走還枹罕澹南奔仇池建𢎞八年春正月山羗率衆叛二月熾磐遣左丞相曇逹招慰武始諸羗征南將軍吉毗招慰洮陽諸羗羗人執曇逹送夏吉毗爲羗所擊奔還士馬死傷者什有六七三月熾磐以輔國將軍叚暉爲凉州刺史鎮樂都平西將軍麴景爲沙州刺史鎮西平寧朔將軍出連輔政爲梁州刺史鎮赤水夏六月熾磐還枹罕秋七月熾磐謂羣臣曰孤知赫連氏必無成冐險歸魏今果如孤言八月熾磐遣叔父平逺將軍埿頭弟安遠將軍安度爲質於魏又使中書侍郎王愷丞相從事中郎烏訥闐奉表貢其方物九月氐王楊𤣥遣將軍苻白作圍梁州刺史出連輔政於赤水城中粮盡民執輔政以䧏輔政至􅶴谷逃還冬十月熾磐以驍騎將軍吳漢爲平南將軍梁州刺史鎮南漒十二月梁州刺史吳漢爲羣羗所攻帥戸二千奔還枹罕建𢎞九年春正月商州刺史領澆河太守姚濬叛䧏河西熾磐以尚書焦嵩代濬帥騎三千討之二月嵩爲吐谷渾元緒所執夏五月熾磐寢疾謂太子暮末曰吾死之後汝能保境則善矣沮渠城都爲䝉遜所親重汝宜歸之熾磐在位八年而宋氏受禪以元嘉五年六月卒暮末嗣立僞諡文昭王塟於武平陵廟號太祖乞伏暮末暮一作慕乞伏暮末字安石熾磐第二子也以元熈元年立爲太子領撫軍大將軍都督中外諸軍事熾磐卒暮末即位大赦境内改元永𢎞一作洪署右丞相元基爲侍中相國都督中外諸軍録尚書事鎮軍大將軍河州牧謙屯爲驃騎大將軍徴安北將軍凉州刺史叚暉爲輔國大將軍御史大夫叔父右禁將軍千年爲鎮北將軍凉州牧鎮湟河以征北將軍木奕干爲尚書令車騎大將軍以征南將軍吉毗爲尚書僕射衞大將軍秋七月河西王沮渠蒙遜因秦喪來伐西平太守麴承謂之曰殿下若先取樂都則西平必爲殿下之有西平茍望風請服亦明主之所疾也蒙遜乃釋西平攻樂都相國元基帥騎三千救之甫入城而西河兵至攻其外城剋之絶其水道城中饑渴死者大半東羗乞提從元基救樂都隂與河西通謀下繩引内其兵登城百有餘人鼔譟燒門元基率左右奮擊河西兵退暮末大懼八月遣使詣蒙遜許歸沮渠城都以求和蒙遜引還遣使入秦弔祭暮末厚資城都遣將軍王伐送之䝉遜疑之使恢武將軍沮渠竒珍伏兵於捫天嶺執代并其騎士三百人旣而䝉遜遣尚書郎王杼送伐還秦并遺暮末馬千疋及錦罽銀繒九月暮末遣記室郎中馬艾如河西報聘冬十月凉州牧千年嗜酒殘虐不恤政事暮末遣使讓之千年懼奔河西暮末以叔父光禄大夫沃陵爲凉州牧鎮湟河永𢎞二年春正月暮末遣征虜將軍出連輔政等守西平政等未至䝉遜率衆㧞之執太守麴承二月立妃梁氏爲王后子萬載爲太子殺尚書隴西辛進并其五族二十七人追恨其射傷母靣也夏五月河西王䝉遜率衆來伐暮末畱相國元基守枹罕遷保定連南安太守翟承伯等㨿罕开谷以應蒙遜暮末擊破之進至冶城西安太守莫者幼眷㨿汗川以叛暮末討之爲幼眷所敗還於定連䝉遜進至枹罕遣太子興國攻定連六月暮末逆擊興國於冶城擒之追擊䝉遜至於譚郊吐谷渾王慕璝遣其弟沒利延將騎五千㑹䝉遜來伐暮末遣輔國大將軍叚暉邀擊之復大破之秋七月䝉遜遣使送榖三十萬斛來贖世子興國暮末不許尋以興國爲散騎常侍以妹平昌公主妻之冬十月暮末弟軻殊羅烝熾磐左夫人暮末禁之因與叔父什寅謀叛暮末收其黨與殺之并殺什寅秃髪氏十二月地震野草皆自反永𢎞三年春三月什寅母弟前將軍白飬及鎮衞將軍去列以什寅之死頗有怨言暮末皆殺之秋九月西秦自正月不雨至於九月兼之政刑酷濫内外崩離部民流叛者不可勝計冬十月暮末爲河西王䝉遜所逼遣中書侍郎王愷從事中郎烏訥闐請迎於魏世祖許以平凉以東安定以西封之暮末乃焚城邑毁寳器帥戶萬五千東如上邽至高田谷時給事黃門侍郎郭恒謀刼沮渠興國以叛事覺誅之夏主赫連定聞暮末將至發兵來拒暮末畱保南安其故地皆入於吐谷渾冬十一月世祖遣尚書庫結率騎五千來迎暮末衞大將軍吉毗固諫以爲不宜内徙暮末從之庫結引還南安諸羗萬餘人謀叛推安南將軍都督八郡諸軍事廣甯太守焦遺爲主遺不從乃刼遺族子長城䕶軍焦亮爲主率衆攻南安暮末請救於氐王楊難當難當遣將軍苻獻帥騎三千救之暮末與之合擊諸羗諸羗潰散亮奔廣甯暮末進軍攻之以手令與焦遺使取亮十二月遺斬亮首出降暮末進遺號鎮國將軍秦略陽太守𢎞農楊顯以郡降夏永𢎞四年春正月夏主赫連定擊暮末將姚獻獻敗遂遣叔父北平公韋代率衆一萬攻南安城内大饑人相食侍中征虜將軍出連輔政侍中右衞將軍乞伏延祚吏部尚書乞伏䟦踰城奔夏暮末窮蹙輿櫬出䧏并沮渠興國送於上邽夏六月夏主殺暮末及其宗族五百人時魏神䴥四年也先是熾磐都長安端門外有一井人常宿汲水亭之下而夜聞磕磕有聲驚起照視瓮中如血中有丹魚長可三寸而有寸光東羗西虜共相攻伐至是而亡國仁以孝武太元十年僣位至暮末四世凡四十六年十六國春秋卷八十六
