body:
  text: 十六國春秋卷九十二西凉録二李歆李歆字士業暠第二子也為撫軍將軍領護羌校尉監前鋒諸軍事暠死左長史宋繇等上為大都督大將軍領護羌校尉凉州牧凉公大赦境内殊死已下改元嘉興尊母尹氏為太后以宋繇為武衛將軍廣夏太守軍諮祭酒録三府事索仙為征虜將軍張掖太守三月河西王沮渠䝉遜遣張掖太守沮渠廣宗詐降於歆以誘之歆遣武衛將軍温宜等率兵往赴親勒大軍為之後繼䝉遜率衆三萬設伏於蓼泉歆聞之引兵還䝉遜率衆來追歆親貫甲與戰於解支澗大破之追奔百餘里俘斬七千餘級䝉遜城建康置戍而去嘉興二年秋九月沮渠䝉遜復率衆來伐歆將出拒之左長史張體順固諫乃止䝉遜大芟秋麥而去是歳歆遣使告晉嗣位冬十月晉拜歆為使持節都督七郡諸軍事鎭西大將軍護羌校尉涼州牧酒泉公嘉興三年夏六月歆用刑過嚴又好治宫室繕築不止從事中郎張顗一作顯上疏切諫曰涼土三分勢不乆立并兼之本實在農戰懷遠之略莫如寛簡今入歳已來隂陽失序屢有賊風暴雨犯傷和氣是宜減膳徹懸側身修道一作過而更繁刑峻法宫室是務人力殘凋百姓愁悴致災之咎實此之由昔文王以百里而興二世以天下而亡前車之軌得失昭然太祖以天挺神姿應桓文之運流標萬里爲西夏所推左取酒泉有易俯拾右開西域兵不血刃實爲殿下開創崇規貽厥孫謀者也殿下不能奉承先志混一涼土侔蹤張后將何以下見先王乎沮渠䝉遜胡夷之傑内修政事外理英賢攻戰之際身同一作均士卒百姓懷之咸樂爲用臣謂殿下非但不能平殄䝉遜亦懼䝉遜方爲社稷之憂歆覽之不悅主簿汜稱又上疏諫曰臣聞天之子愛人主憂勤至矣故政之不修則垂災譴以戒告之改者雖危必昌宋景是也其不改者雖安必亡虢公是也殿下嗣位以來元年三月癸卯燉煌謙德堂陷八月效穀地裂二年元日昏霧四塞四月日亦無光二旬乃復十一月狐上南門今兹春夏地頻五震六月隕星於建康臣雖學不稽古敏謝仲舒頗亦聞道於先師且行年五十有九請爲殿下略言耳目之所聞見不復能逺論書𫝊之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熈旣爲涼州藉秦氏兵亂規有全涼之地外不撫百姓内多爲聚歛尋以滅亡建元十九年姑臧南門崩隕石於閑豫堂二十年而吕光東反子敗於前身戮於後叚業因羣凶創亂稱制此方三年之中地震五十餘所旣而先王龍興於𤓰州䝉遜簒弑於張掖此皆目前之成事亦殿下之所聞知效榖先王鴻漸之地謙德即尊之室基陷地裂大凶之徵也日者太陽之精中國之象赤而無光中國將爲外㓂之所陵滅諺曰野豕入家主人將去今狐上南門亦變異之大也又狐者禍也天意若曰將有首禍入居於此城南靣而君者也昔春秋之世星隕於宋襄公卒爲楚所禽地者至静安敦之象當靜而動反亂天常天意若曰有人將震動中國中國若不修德將有宋襄之禍今蠻夷益盛中國益㣲臣䝉先朝布衣之眷輒自同子弟之親是以不避忤上之誅昧死而進愚欵願殿下親仁善隣養威觀釁罷宫室之務止遊畋之娛宫嬪妃婌諸夷子女躬受分田身勸蠶績以清儉素德爲榮息兹奢靡之費百姓租稅專擬軍國虛衿下士廣招賢俊修秦氏之術以强國富俗待國有數年之積庭盈文武之臣然後命韓白爲前驅納子房之妙算一鼓可以平定姑臧長驅可以飲馬涇渭方南靣而爭天下豈䝉遜之足憂不然臣恐社禝之危必不出紀歆亦不納嘉興四年夏六月晉恭帝禪位於宋秋七月歆遣使貢獻於宋甲辰宋詔以歆爲都督高昌等十郡諸軍事征西大將軍酒泉公歆將謀東伐張體順切諫止之又聞沮渠䝉遜攻秦浩亹命中外戒嚴將攻張掖尹太后以爲不可具太后傳宋繇亦固諫歆怒不聽繇退而歎曰大事去矣吾見師之出不見師之還也歆遂率歩騎三萬東出䝉遜聞之曰歆已入吾計中然聞吾旋師必不敢前乃露布西境云已剋浩亹將進攻黄峪歆聞之喜進次都瀆澗䝉遜自浩亹來拒戰於懐城敗績勒衆復戰敗於蓼泉爲䝉遜所殺歆子重耳脫身奔於江左遂仕於宋後復歸魏爲魏𢎞農太守歆諸弟驍騎將軍酒泉太守翻擊虜將軍新城太守豫征西將軍燉煌太守恂領羽林右監密左將軍眺右將軍亮等皆西奔燉煌尋棄燉煌奔入北山䝉遜入酒泉禁兵侵掠士民安堵以宋繇爲吏部郎中委之選舉涼之舊臣有才望者咸禮而用之尹太后及諸女死於伊吾先是暠甞夢爲涼公領涼州牧代沮渠氏至是歆爲䝉遜所殺歆之未敗也有一大蛇從南門而入至於恭徳殿前又有䨇雉飛出宫内通街大樹上有烏鵲爭巢鵲為烏所殺又燉煌父老令狐熾家見一白頭翁衣帢而謂之曰南風動吹長木胡桐椎不中轂言訖忽然不見歆小字桐椎至是而亡自暠僭位元年歳在庚子至歆爲䝉遜所滅歳在庚申凡二十一年案唐書暠本老子之裔也暠子歆歆子重耳魏𢎞農太守重耳子熈金門鎭將家于武川熈子天賜爲幢主天賜子虎爲後周太祖宇文㤗開國功臣魏賜姓大野氏官至太尉號爲柱國宇文氏受魏禪時虎已卒追錄佐命功封唐國公以其子昞襲封隋代周復姓李氏昞官至隋安州總管柱國大將軍昞生子淵襲封唐公後賴次子秦王世民之力代隋而為天子是爲唐髙祖秦王四征宼盜以壹天下是爲太宗遡長發之祥則暠之於唐其猶周之后稷矣髙祖武德元年追謚皇髙祖熈曰宣簡公皇曾祖天賜曰懿王皇祖虎曰景皇帝廟號太祖皇考昞曰元皇帝廟號世祖與武昭王祖父並祀以天子之禮太宗子髙宗治追號老子爲太上𤣥元皇帝尊宣簡公為宣皇帝懿王爲光皇帝髙宗孫𤣥宗隆基加宣皇帝曰獻祖光皇帝曰懿祖尋加𤣥元號曰大聖祖又追號聖祖父周大夫敬曰先天太皇逺祖咎繇曰德明皇帝西涼武昭王曰興聖皇帝十六國春秋卷九十二
