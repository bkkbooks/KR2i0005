body:
  text: 十六國春秋卷六十七夏錄二赫連昌赫連昌字還國一名折勃勃之第三子也鳳翔元年封太原公為前將軍鎮潼闗後率衆襲殺太子璝遂立為太子身長八尺魁岸美姿貌真興七年秋八月勃勃死昌即偽位於永安殿大赦境内殊死已下改元承光承字一作永自餘文武進位各有差承光二年春正月西秦王乞伏熾磐遣使如魏請舉兵來伐夏六月世祖諱燾詔問公卿今當用兵赫連蝚蠕一作蠕蠕二國何先長孫嵩長孫翰奚斤皆曰赫連土著未能為患不如先伐蝚蠕若追而及之可以大獲不及則獵於隂山取其禽獸皮角以充軍實太常崔浩曰不然蝚蠕烏集獸逃舉大衆追之則不能及輕兵追之又不足以制敵赫連氏土地不過千里政刑殘暴人神所棄宜先伐之尚書劉潔武京侯安原請先伐燕世祖乃自雲中西廵至五原因畋於隂山東至和兠山而還秋七月查城劉渚川有青石大如馬頭浮在水逆流而行人見而送之八月世祖還平城九月世祖聞勃勃諸子相攻闗中大亂國人不安乃欲伐之長孫嵩等皆曰彼若城守以逸待勞大檀聞之乘虛入冦此危道也崔浩曰往年以來熒惑再守羽林皆成鈎已而行其占秦亡又今年五星并出東方利以西伐天應人和時會並集不可失也嵩固爭之世祖大怒責嵩在官貪汚命武士頓辱之於是遣司空奚斤率義兵將軍封禮等督四萬五千人襲蒲坂勑黑矟將軍新安侯于栗磾與宋兵將軍交趾侯周幾率萬人襲陜城以河東太守薛謹為鄉導世祖欲以中書博士平棘李順總前驅之兵訪於崔浩曰朕前北征李順獻䇿數事實合經畧大謀今欲使總攝前驅之事卿以為何如浩曰順誠有籌畧實如聖㫖然臣與之姻婚深知其為人果於去就不可專任世祖乃止冬十月丁巳世祖發平城十一月臨雲中至君子津會天暴寒數日冰合戊寅帥輕騎二萬濟河來襲統萬壬午值冬至日昌方燕羣臣魏師奄至上下驚擾進次黒水去城三十餘里昌乃出戰世祖馳往擊之昌敗與數十騎退走入城門未及閉内三郎豆代田率衆乘勝入宫焚其西門宫門閉代田踰宫門而出世祖拜代田勇武將軍魏軍夜宿城北癸未分兵四出剽掠居民殺獲萬餘得生口牛馬十餘萬世祖謂諸將曰統萬未可得也今若窮兵極武非弔民之道明年當與卿等取之乃徙萬餘戸於平城𢎞農太守曹達聞周幾將至不戰而走幾乘勝長驅遂入三輔會幾卒於軍中蒲坂守將東平公乙升聞奚斤將至遣使詣統萬告急使至統萬見魏軍已圍其城還告乙升曰統萬已敗矣乙升懼棄蒲坂西走斤追敗之乙升奔長安斤遂克蒲坂收其資器百姓安堵如故昌弟助興先守長安乙升至復與助興棄長安西奔安定十二月奚斤又西據長安秦雍氐羗皆詣斤乞降斤悉安撫之承光三年春正月乙酉世祖還平城統萬徙民在道傷死能至平城者十纔六七己亥世祖如幽州昌弟平原公定帥衆二萬向長安世祖聞之伐木隂山大造攻具再謀伐昌二月世祖還平城三月丙子世祖遣高涼王禮鎮長安又詔執金吾桓貸造浮橋於君子津夏四月魏司空奚斤與平原公定相持於長安世祖欲乘虛伐統萬簡兵練士部分諸將命司徒長孫翰廷尉長孫道生宗正娥清等將歩騎三萬為前驅常山王素太僕丘堆將軍元太毗等將歩兵三萬為後繼南陽王伏真執金吾桓貸將軍姚黄眉等將歩騎三萬部送攻具將軍賀多羅將精騎三千為前候五月發兵平城命龍驤將軍代人陸俟督諸軍鎮大磧以備柔然辛巳濟君子津壬午至㧞隣山築城舎輜重以輕騎三萬倍道兼行羣臣咸諫曰統萬城堅非旦夕可㧞今輕軍討之進不可克退無所資不若與歩兵攻具一時俱往世祖曰夫用兵之術攻城最下必不得已然後用之今以歩兵攻具一時俱進彼必懼而堅守若攻不時㧞則食盡兵疲外無所掠進退無路非上䇿也朕以輕騎直抵其城下彼先聞有歩兵而徒見騎至必當寛弛吾且羸師以誘之若得一戰擒之必矣所以然者吾之軍士去家二千餘里復有黄河之險所謂置之死地而後生者也故以之攻城則不足決戰則有餘矣遂行六月戊戌軍至統萬次於黒水分軍伏於深谷而以少衆至其城下昌將狄子玉出降言夏主聞有魏師遣使召平原公定定曰統萬城堅未易攻㧞待我擒奚斤等然後徐往内外擊之何有不濟故夏主堅守以待之世祖聞之怒甚退軍城北示之以弱遣宗正娥清及永昌王徤等分騎五千西掠居民會軍士有得罪亡入昌城言官軍糧盡士卒食菜輜重在後歩兵未至宜急擊之昌信其言甲辰引歩騎三萬出城逆戰魏司徒長孫翰等皆言夏兵歩陣難䧟宜避其鋒且縱歩兵一時奮擊世祖曰不然吾逺來求賊惟恐不出今既出矣乃避而不擊彼奮我弱非計也遂收軍偽北引而疲之昌以為退鼓譟而前舒陣為兩翼行五六里世祖衝之昌陳兵不動稍復前行會有風雨從東北來揚沙晦冥宦者趙倪頗曉方術言於世祖曰今風雨從賊上來我向之彼背之天不助人且將士饑渴願陛下攝騎避之更俟後日崔浩叱之曰是何言歟吾千里制勝一日之中豈得變易賊貪進不止後軍已絶宜分軍隠出奄擊不意風道在人豈有常也世祖曰善乃分騎為左右隊以掎之世祖馬蹶而墜幾為昌兵所執拓䟦齊以身捍蔽決死力戰昌兵乃退世祖騰馬得上刺昌尚書斛黎文殺之又殺騎兵十餘人流矢中掌奮擊不輟昌兵大潰不及入城將麾下數百騎西南走遁遂奔上邽魏乘勝追逐至於城北殺昌弟河南公滿及兄子䝉遜死者萬餘人世祖微服逐奔者入其城拓䟦齊固諫不聽乃與數人從世祖入城昌衆覺之諸門悉閉世祖因與齊等入其宫中得婦人裙繫之槊上世祖乘之而上僅乃得免會日已暮昌尚書僕射問至䟦城奉昌母出走長孫翰將八千騎追昌至於高平不及而還乙巳世祖入城獲昌所署公卿將校及其諸母姊妹妻妾宫人以萬數馬三十餘萬匹牛羊數千萬頭府庫珍寳車旗器物不可勝計以昌宫人及生口金銀珍玩布帛頒賜將士各有差時魏騎都尉代人來大千共長孫道生與昌交戰道生馬倒為昌所擊大干馳救昌衆散走大千扶道生上馬得免初勃勃性豪侈好治宫室築統萬城高十仞基厚三十歩上廣十歩宫墻五仭其堅可以厲刀斧臺榭壯大飛閣相連皆雕鏤圖畫被以綺繡飾以丹青窮極文采世祖顧謂羣臣曰蕞爾小國而用民如此雖欲不亡其可得乎擒昌尚書王買徳薛超太史令張淵徐辯復以淵辯為太史令得故晉將毛修之及西秦將軍厙洛干乃歸庫洛干於秦以毛修之善烹調用為大官令世祖見著作郎天水趙逸所為文譽勃勃太過怒曰此豎無道何敢如是誰所為耶當速推之崔浩曰文士褒貶多過其實蓋非得已不足罪也乃止世祖納勃勃三女為貴人宜城王司空奚斤與平原公定猶相拒於長安世祖命宗正娥清太僕丘堆帥騎五千畧地闗右定聞統萬已破西奔上邽斤追至雍不及而還清等攻貳城守將堅守不下清等攻㧞之世祖詔斤等班師斤上疏言赫連昌亡保上邽鳩合餘燼未有蟠據之資今因其危滅之為易請益鎧馬平昌而還世祖曰昌亡國叛夫擊之勞傷將士且可息兵取之不晩斤抗表固請乃許之給斤兵萬人遣將軍劉拔送馬三千匹并留娥清丘堆使共擊之辛酉世祖自統萬東還以常山王素為征南大將軍假節與執金吾桓貸莫雲留鎮統萬秋七月蠕蠕冦雲中聞昌已破懼而引還承光四年春二月魏平北將軍尉眷攻昌於上邽昌退屯平涼司空奚斤進軍安定與娥清丘堆軍合時安頡為監軍侍御史斤以馬多疫死士卒乏糧乃深壘自固遣丘堆與義兵將軍封禮督租於民間士卒暴掠不設警備昌襲擊之堆敗以數百騎還城昌遂驕矜乘勝日至城下抄掠芻牧者不得出諸將患之監軍安頡曰本受詔誅賊今反為賊所困退守窮城若不為賊殺當坐法誅進退皆無生路而王公諸將晏然曾不為計將何以報恩塞責斤曰今若出戰軍士無馬以歩擊騎力誠不足終無捷理當須京師救騎至然後歩陳擊於内騎兵襲於外所謂萬全之計也頡曰今猛冦遊逸於外而吾等兵疲力屈士有饑色不一決戰則死在旦夕何救騎之可待也等於就死當以戰死寧可坐而受困乎斤猶以馬少為辭頡曰今兵雖無馬但歛諸將所乘馬可得二百騎頡請募壯勇敢死士出擊之縱不能破敵亦可以挫其銳且赫連昌狷而無謀好勇而輕進每自出挑戰衆皆識之若伏兵掩擊昌可擒也斤猶難之頡乃隂與尉眷等謀選騎待之既而昌來攻壘頡出應之昌自出陳前搏戰軍士識其貌爭往赴之會天大風揚塵晝晦士衆皆亂昌退走頡等追擊之昌馬蹶而墜頡遂擒之三月癸酉世祖使侍中古弼迎昌辛巳弼等以昌至於平城館之於西宫門内器用皆給以乘輿之副又以妹始平公主妻之假常忠將軍賜爵會稽公以安頡為建節將軍賜爵西平公尉眷為寧北將軍進爵漁陽公世祖常使昌侍從左右與之單騎深入山澗共逐一鹿昌素有勇名諸將咸以為不可世祖曰天命有在亦何所懼親遇如初進封秦王後坐謀反被誅十六國春秋卷六十七
