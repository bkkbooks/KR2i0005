body:
  text: 十六國春秋卷七十四前凉録五張𤣥靚一作𤣥靖張𤣥靚字元安重華之少子母郭夫人所生也祚既被殺宋混張琚等上𤣥靚為持節大將軍凉州牧䕶𦍑校尉西平公時始年七嵗廢和平之號復稱建興四十三年大赦境内及張瓘至姑臧推𤣥靚為使持節大都督大將軍凉王自為衛將軍領兵萬人使持節都督中外諸軍事尚書令凉州牧張掖郡公行大將軍事以宋混為尚書僕射改易僚属隴西李儼據郡不受瓘命誅大姓彭姚自立於隴右奉中興年號百姓歸之𤣥靚遣将軍牛霸率衆討之未至而西平衛綝亦據郡叛霸衆大潰单騎奔還瓘欲先誅綝以兄珪在綝中為疑綝亦以弟在瓘中故彼我經年不相伐西平郭勛解天文不應州郡之命綝禮聘之勛曰張氏應衰衛氏當興豈得以一弟而滅一門宜速伐瓘綝將從之瓘遣弟琚領大衆擊綝敗之西平田旋復要酒泉太守馬基背瓘起兵以應綝旋謂基曰綝擊其東我等絶其西不出六旬天下可定斯閉口捕舌也基許之瓘遣司馬張姚王國將兵二千人擊基敗之斬基旋二人之首傳至姑臧自是瓘兄弟強盛負其勲力有簒奪之謀矣永和十二年春二月秦征西大將軍晉王苻桞遣參軍閻負梁殊使凉以書説𤣥靚負殊至姑臧張瓘見之曰我晉臣也臣無境外之交二君何以來辱負殊曰晉王與君隣藩雖山河阻絶風通道㑹故來脩好君何怪焉瓘曰吾盡忠事晉於今六世矣若與苻征東通使是上違先君之志下墮士庶之節其可乎負殊曰晉室衰微墜失天命固已久矣是以凉之先王北面二趙惟知機也今大秦威德方盛凉王若欲自帝河右則非秦之敵欲以小事大則曷若捨晉事秦長保福禄乎瓘曰中州好食言向者石氏使車適返而戎騎已至吾不敢信也負殊曰自古帝王居中州者政化各殊趙為奸詐秦敦信義豈得一槩待之乎張先楊初皆阻兵不服先帝討而擒之赦其罪戾寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰江南文身之俗道汚先叛化隆後服主上以為江南必須兵服河右可以義懐故遣行人先申大好若君不達天命則江南可延數年之命而河右恐非君之土也瓘曰我跨據三州帶甲十萬西包葱嶺東距大河伐人有餘况於自守何畏於秦負殊曰貴州山河之固孰若殽函民物之饒孰若秦雍杜洪張琚因趙氏成資兵强財富有嚢括闗中席捲四海之志先帝戎旗西指氷消雲散旬月之間不覺易主主上若以貴州不服赫然奮怒控弦百萬鼓行而西未知貴州將何以待之瓘笑曰茲事當决之於王非身所了負殊曰凉王雖英睿夙成然年在㓜冲君居伊霍之任國家安危繫君一舉耳瓘懼乃以𤣥靚之命遣使稱藩於秦秦因𤣥靚所稱官爵而授之右將軍宋熈請取天龜觀壊以為宅𤣥靚不許升平元年夏五月東苑大冢上忽有地䧟為澤地燃廣袤數丈六月大風震雷晦𡨕宫中水深四尺執法御史杜逸言於瓘曰此皆變之大者可移之族人升平二年夏五月凉州牧瓘猜忌苛虐專以愛憎為賞罰無復綱紀郎中殷邭陳損益諫之瓘怙惡不改升平三年輔國將軍宋混賦性忠鯁瓘惮而惡之欲殺混及其弟澄因廢𤣥靚而自立徴兵數萬集於姑臧混知之與澄及左右壯士楊和等四十餘騎掩入南城中宣告諸營曰張瓘謀逆被太后詔令誅之俄而衆至二千瓘帥衆出戰混擊敗之瓘麾下𤣥臚刺混不能穿甲混擒之衆悉散去瓘與弟琚皆自殺混夷其宗族入見𤣥靚遂以混為使持節都督中外諸軍事車騎大将軍酒泉郡侯假節代瓘輔政混請𤣥靚去凉王之號復稱凉州牧混謂𤣥臚曰卿刺我幸而不傷今我輔政卿其懼乎臚曰臚受瓘恩比時唯恨刺節下不深耳竊無所懼混義之任為心膂是年六月大雨震雷晦𡨕平地水深六尺宫中四尺升平四年夏四月驃騎大將軍宋混卒以其弟澄為領軍將軍輔政秋九月右司馬張邕惡澄專擅起兵攻澄殺之遂滅其族𤣥靚乃以邕為中䕶軍叔父天錫為中領軍同輔政升平五年冬十月邕自以功大驕矜滛縱又通馬氏樹黨專權多所刑殺國人患之復思為亂天錫腹心郭増劉肅二人並年十八九因寢謂天錫曰國家事欲未靖天錫曰何謂也二人曰今䕶軍出入有似長寧天錫大驚曰吾早疑之未敢出口計當云何肅曰政當速除之耳天錫曰安得其人肅曰肅即是也天錫曰汝年少更求可與謀者肅曰趙白駒及肅二人足以辦之矣十一月天錫從兵士四百人與邕俱入朝肅與白駒剔刀鞘出刅從天錫入值邕於門下肅斫之不中白駒繼之又不剋二人與天錫俱入禁中邕得逸去因帥甲士三百餘人反攻禁門天錫上屋大呼謂將士曰張邕凶逆所行無道諸宋何罪盡誅滅之傾覆國家肆亂社稷我不惜死實懼大人廢祀事不獲已故耳我家門戶事而將士豈可以干戈相向今之所取邕身而已他無所問天地有靈吾不食言邕衆聞之乃悉散走邕以劍自刎而死於是悉誅邕黨𤣥靚以天錫為使持節冠軍大將軍都督中外諸軍事輔政𤣥靚年既幼冲性又仁弱天錫既克邕專掌朝政十二月始改建興四十九年奉升平年號隆和元年春正月晉詔以𤣥靚為大都督督隴右諸軍事凉州刺史䕶𦍑校尉西平公復改南州為祁連郡興寧元年秋八月駿妻馬氏卒𤣥靚以生母郭夫人為太妃郭氏以天錫專政與大臣疎宗張欽等謀誅之事泄欽等被殺𤣥靚懼以位讓天錫天錫不受右將軍劉肅一作濟南等議以𤣥靚幼冲國家多難須立長君勸天錫自立閏月天錫遣肅等夜率兵入禁門潜弑𤣥靚宣言暴薨時年十四在位九年葬平陵私謚曰冲王孝武帝賜謚曰敬悼公張天錫張天錫字純嘏駿之少子也小名獨活初字公純嘏入朝人笑其三字因自改焉母曰劉羙人𤣥靚死國人立之謁於太廟尊嫡母嚴氏為太王太后生母劉氏為王后時年十八自號使持節大都督大將軍䕶𦍑校尉凉州牧西平公凉王遣司馬綸騫奉章請命并送御史俞歸還京師興寧二年春二月詔以天錫為大都督大將軍督隴右闗中諸軍事䕶𦍑校尉凉州刺史西平公夏六月秦遣大鴻臚囘國拜天錫為大將軍凉州牧西平公興寧三年春正月天錫驕恣媱昏不恤民務元日與嬖幸䙝飲既不受羣僚朝賀又不朝於永訓宫從事中郎張慮輿櫬切諫且求大覲天錫不納少府長史紀錫上疏諍時政曰臣聞東野善驟而敗其駕秦氏富強而覆其國馬力已盡求之勿休人既勞竭役之無已故也造父之御不盡其馬明王之治必恤其民天錫亦不從太和元年冬十月天錫遣使至秦境上告絶於秦天錫數宴園池政事頗廢蕩難將軍校書祭酒索商上書極諌天錫答曰吾非好行行有得也觀朝榮則敬才秀之士翫芝蘭則愛德行之臣覩松竹則思貞操之賢臨清流則貴亷潔之行覽蔓草則賤貪穢之吏逄颷風則惡兇狡之徒若引而申之觸𩔖而長之庶無遺漏矣初隴西李儼以郡降秦既而復通於天錫十二月𦍑歛岐自稱益州刺史率略陽四千家叛秦就儼太和二年春三月天錫帥諸軍攻儼使别駕楊遹為監前鋒軍事前將軍向金城晉興相常據為使持節征東將軍向左南游擊將軍張綂向白土天錫自將三萬人次倉松夏四月天錫進攻儼大夏武始二郡皆下之常據敗儼兵于葵谷天錫進屯左南儼懼退守枹罕遣其兄子純謝罪於秦且請救於秦秦遣王猛及楊安王撫邵𦍑等帥歩騎二萬救儼猛使邵𦍑追歛岐王撫守侯和𦍑衡守白石猛與楊安救枹罕天錫遣楊遹逆戰於枹罕東遹大敗殺士卒七千餘級猛遂與天錫相持於城下因遺天錫書曰吾受詔救儼不令與凉州戰今當深壁髙壘以聽後詔曠日持久恐二家俱弊非良策也若將軍退舎吾執儼而東將軍徙民西旋不亦可乎天錫謂諸將曰猛書如此吾本來討叛不來與秦戰遂引兵歸太和三年天錫别置臨松郡太和四年春立子大懐為世子是時姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震陷裂水出天錫素服避正殿引咎責罪太和五年晉復遣使拜天錫都督隴右闗中諸軍事大將軍凉州牧西平公咸安元年時天錫之八年也火燃於地中三十餘所而天錫荒於聲色不恤政事夏四月秦王猛破天錫于枹罕獲燉煌隂據及甲士五千人苻堅乃遣據率其甲士還凉州使著作郎閻負梁殊送之因命王猛為書諭天錫曰昔貴公稱藩劉石者惟審於強弱也今論凉土之力則損於徃時語大秦之德則非二趙之匹而將軍翻然自絶無乃非宗廟之福也歟夫以秦之威旁振無外可以囘弱水使東流返江河使西注闗東既平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不逺宜深筭妙慮自求多福無使六世之業一旦而墜地也天錫大懼遣使稱藩於秦秦遣使拜天錫使持節都督河右諸軍事驃騎大將軍開府儀同三司凉州牧西平公咸安二年天錫母劉氏卒先是天錫遣使者孟公明持節以蒲輪𤣥纁徴燉煌處士郭瑀瑀字元瑜少有超俗之操東游張掖師事郭荷盡傳其業精通經理雅辨談論多才藝善属文荷卒瑀以為父生之師成之君爵之而五服之制師不服重盖聖人謙也遂服斬衰廬墓三年禮畢隱於臨松之薤谷鑿石窟而居之服栢實以輕身作春秋墨説孝經錯緯弟子著録千餘人天錫備禮徴之遺瑀書曰先生潜光九臯懐真獨逺心與至境𡨕符志與四時消息豈知蒼生倒懸四海待拯者乎孤忝承時運負荷大業思與賢明同賛帝道昔傅説龍翔殷朝尚父鷹揚周室孔聖車不停軌墨子駕不俟旦皆以黔首之禍不可以不救君不得獨立道由人𢎞故也况今九服分為戰埸二都盡為㓂穴天子僻陋江東名儒淪於異域創毒之甚開闢未聞先生懐濟世之才坐觀而不救其於仁智孤竊惑焉故遣使者虛左授綏鶴企先生乃眷下國公明至山瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀歎曰吾逃禄非逃罪也豈得隱居行義害及門人乃出而就徴及至姑臧值天錫母卒瑀括髪入吊三踊而出還於南山寧康元年春正月天錫以世子大懐為使持節鎮西將軍髙昌郡公更立嬖妾焦氏之子大豫為世子以焦氏為左夫人秋七月大水地震西平五十日地動樓崩八月天錫寢疾羙人閻姬薛姬皆自殺冬十月天錫疾瘳大赦境内追悼二姬葬以夫人禮寧康二年秋七月初安定梁景燉煌趙肅並以門胄總角與天錫友昵張邕之誅景肅有勲天錫深徳之賜姓張氏又改其子以為己子天錫諸子皆以大為字故名景子曰大奕肅子曰大城景肅等俱參政事人情怨憤從弟從事中郎張憲輿櫬切諫不納寧康三年苻堅強盛毎有兼并之志屢來攻之兵無寧嵗又以河州刺史李辯領晉興太守還鎮枹罕徙凉州治金城天錫大懼乃立壇於姑臧刑三牲率典軍將軍張寧中堅將軍馬芮等遥與晉三公盟誓獻書於大司馬桓温期以明年夏誓同大舉都㑹上邽乃遣從事中郎韓博奮節將軍康妙奉表并送盟文博有口才温甚器之嘗大㑹温使司馬刁彛嘲戱之彛謂慱曰君是韓盧後耶博曰卿是韓盧後温笑曰刁以君姓韓故相問耳他自姓刁那得是韓盧後博曰明公脱未之思爾短尾者則為刁也闔坐歎服太元元年夏五月天錫在位十三年秦苻堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍茍萇左將軍毛盛中書令梁熈歩兵校尉姚萇等將兵臨西河尚書郎閻負梁殊奉詔徴天錫入朝若有違王命即進師撲討是時秦歩騎十三萬又命秦州刺史茍池河州刺史李辯凉州刺史王統帥三州之衆為萇後繼秋七月負殊至姑臧天錫㑹官属議之曰今入朝必不返如其不從秦兵必至將若之何禁中録事席仂曰先公既有故事以愛子為質賂以重寳以退其師然後徐為之計此孫仲謀屈伸之法也衆以仂為老怯咸怒曰吾世事晉朝忠節著於海内今一旦委身於賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境内外兵右招西域北引匈奴以拒之何據知其不㨗也天錫自以晉之列藩志在保境攘袂大言曰吾計决矣言降者斬使謂負殊曰君欲生歸乎死歸乎負等辭氣不屈天錫怒縛之軍門命軍士交射之曰射而不中不與我同心者也毋嚴氏泣曰秦王以一州之地横制天下東平鮮卑南取巴蜀兵不留行汝若降之猶可延數年之命今以蕞爾一隅抗衡大國又殺其使者亡無日矣天錫不聽使龍驤將軍馬建帥衆二萬拒之八月梁熈姚萇王統李辯濟自清石津攻驍烈將軍梁濟於河㑹城濟帥衆降甲申茍萇濟自石城津與梁熈等㑹攻拔纒縮城馬建懼自楊非退屯清塞天錫又遣征東將軍常據率衆三萬軍於洪池自將餘衆五萬軍於金昌安西將軍燉煌宋皓言於天錫曰臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓為宣威將軍廣武太守辛章保城固守與晉興相彭知正西平相趙疑謀曰馬建出於行陣必不為國家用秦軍深入吾等相與率三郡精卒斷其粮運决一朝命矣常據亦欲先擊姚萇須天錫命故止姚萇率甲士三千為前鋒馬建帥萬人拒戰大敗迎降餘衆散走常據席仂皆戰死癸巳秦兵入清塞天錫復遣司兵趙充哲中衛將軍史景等帥勁勇五萬與萇戰於赤岸復為秦兵所破充哲戰死景亦沒於陣時有風昏闇天錫大懼出城自戰城中又叛天錫窘逼乃與數千騎奔還姑臧甲午秦兵至姑臧納左長史馬芮之言素車白馬面縛輿櫬降於軍門茍萇釋縛焚櫬送於長安凉州郡縣悉降於秦九月苻堅以梁熈為凉州刺史鎮姑臧徙豪右七千餘戸於闗中餘皆安堵如故封天錫為歸義侯侍中比部尚書遷右僕射初秦兵將征天錫先為築第於長安至則居之先是駿初立時凉州謡曰劉新婦簸米石新婦炊羖羝蕩滌簸張兒張兒食之口正披是時姑臧及諸郡國童兒皆歌之謂劉曜石虎並來伐凉不克至堅而降之也又天錫所居西昌門及平章殿無故而崩又夢一緑色狗其形甚長從城東南入欲咋之天錫床上避匝乃堕地後茍萇來破姑臧著緑地錦袍從東南門入皆如所夢旬日而國亡又楊樹生松天戒若曰松不改柯易葉楊者柔脆之物也此永乆之業將集危亡之地也又天水太守史稷暴疾而卒五旬乃蘓云見凉州謙光殿中皆生白𤓰至是秦使中書令梁熈等來伐熈小字白𤓰其後天錫為苻融征南司馬從堅至夀陽一作春堅軍敗績乃於陣南奔建康詔曰昔孟明不替終顯厥功豈以一𤯝而廢才用其以天錫為左員外散騎常侍又詔曰故太尉西平公張軌著德遐域世襲前勞強兵縱害遂至失守散騎常侍天錫㧞迹登朝先祀淪替用増矜慨可復天錫西平郡公爵俄拜金紫光禄大夫天錫少有文才流譽逺近雖遐方殊數亦邁人之傑也聞皇京多才欽羡彌至猶在江渚司馬著作未詳姓氏徃詣之言容鄙陋無可觀聽心甚悔來以遐外可以自固王珣有雋才羙譽當時聞而造焉既至天錫見其風神清令言語如流陳説古今無不貫悉又諳人物氏族中來皆有証據乃遂訝服及歸朝後甚被寵遇朝士以其國亡身虜多共毁之然甚為孝武所器毎入言論無不竟日於時㑹稽王道子一作孝武問其西土所出何物為羙一作可貴對曰桑甚甘香鴟鴞革響淳酪養性人無妬心其後形神昏喪雖處列位不復被齒遇隆安中㑹稽世子元顯用事常延致之以為戯弄以其家貧拜廬江太守本官如故桓𤣥時欲招懐四夷乃用天錫為䕶𦍑校尉凉州刺史尋卒贈鎮西将軍金紫光禄大夫謚悼公子大豫後逃奔河西當吕光時起兵攻姑臧不克為光所殺詳具光傳自張軌以晉永寧九年辛巳嵗牧凉州至天錫亡敗之嵗嵗在丙午凡八主一作九七十六年十六國春秋卷七十四
