body:
  text: 十六國春秋卷八十四後涼錄四吕緯吕緯纂之弟也封隴西公鎮北城初秃髪傉檀率衆襲姑臧緯固守北城兵不得入及纂為超等所害或説緯曰超陵天逆上士衆不附明公以介弟之親仗大義之名投戈而起且姜紀焦辯在南城楊桓田誠在東苑皆吾黨也何患不濟緯遂嚴兵謂叔父巴西公他曰隆超弑逆所宜擊之昔田氏之亂孔子鄰國之臣猶抗言於哀公況今蕭墻有難而可坐觀乎他將從之他妻梁氏止之曰緯超俱兄弟之子何為舍超助緯自為禍首乎他乃謂緯曰超舉事已成據武庫擁精兵圖之甚難且吾老矣無能為也超聞登城告他曰纂信讒言將滅超兄弟超以身命之切且懼社稷覆亡故出萬死之計為國家唱義叔父當有以亮之超弟邈有寵於緯因説緯曰纂殘國破家誅戮兄弟隆超此舉應天人之心正欲尊立明公耳方今明公先帝之長子當主社稷四海顒顒人無異議隆超雖不達臧否終不以孽代宗更圖異望也願公勿疑緯信之乃與隆超結盟單馬入城超執而殺之他尋叛降于秦吕訓吕訓光子也光征西域留於仇池其後仕楊難當為建忠將軍王師北伐訓衞倉儲以俟既剋難當署為駙馬都尉奉朝請徙居内郡光妻石氏光妻石氏略陽氐人也初光之征西域留石氏於仇池麟嘉元年光僣稱涼王於姑臧石氏與子紹及弟德世來自仇池光乃迎於城東遂冊立為王后纂後簒位尊為王太后纂妻楊氏纂妻楊氏𢎞農人尚書右僕射楊桓之女也咸寧元年立為皇后楊氏美艷有義烈纂為超所刺楊氏命禁兵討之殿中皆其黨與莫有應者將軍魏益多入斬纂首楊氏泣曰人已死如土石無所復知何忍復殘其形骸乎益多罵之楊氏與婢十數人殯纂于城西將出宫超恐其挾珍寶出外使人搜索之楊氏厲聲責曰爾兄弟不能和睦手刅相屠我旦夕死人用金寳何為超慚而退又問楊氏玉璽所在楊氏怒曰已毁之矣超見其有色欲納之謂其父桓曰后若自殺禍及卿宗桓以言告楊氏楊氏曰大人本賣女與氐以圖富貴一之已甚其可復使女辱于二氐乎桓不能強遂自殺諡曰穆后紹美人張氏張氏燉煌人本隠王紹之美人也清辨有操行姿色壯麗年十四紹見殺便請為沙門隆見而悦之欲汚其行遣中書郎裴敏説之張氏善言名理敏為之屈隆親逼之張氏斂袵曰欽樂至道故投身空門恐一旦辱於人誓不改節今見逼如此豈非命也於是升門樓自投于地二踵俱折口誦佛經顔色自若俄然而卒吕憲妻符氏吕憲纂之從叔也為建節將軍遼東太守妻符氏年十五有姿色憲卒自殺郭黁郭黁西平人也少明式易善天文占候仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡内二月十五日失囚者東軍當至涼祚必終凝乃申約屬縣至十五日鮮卑折掘送馬於凝凝疑其非駿幽之内厩鮮卑懼而夜遁凝以告黁黁曰是也國家將亡不可復久苻堅末年當陽門震涼州刺史梁熙問黁曰其祥安在黁曰為四夷之事也當有外國二王來朝主上一當反國一死此城嵗餘而鄯善及前部王朝於苻堅前部王西歸鄯善王死於姑臧及光王河西西海太守王楨以郡叛黁勸光襲之光左丞寶曰千里襲人自昔所難況王者之師天下所聞何可僥倖以邀成功黁不可從誤人大事黁曰若其不捷黁自伏鈇鉞之誅如其剋也左丞為無謀矣光從而剋之遂比之京管叅預機宻遷散騎常侍兼太常光將伐乞伏乾歸黁諫曰今太白未出不宜行師往必無功終當覆敗太史令賈曜以為必有秦隴之地及克金城光使曜詰黁黁宻謂曜曰昨有流星東墜當有伏尸死將雖得此城憂在不守正月上旬河冰將解若不早渡恐有大變後二日而敗問至光引軍渡河既訖冰泮國人服其神騐甚信重之後以光年老知其將敗㑹熒惑守東井謂僕射王詳一作祥曰於天文涼之分野將有大兵且主上老病太子沖闇太原公纂等凶悍一旦不諱禍亂必起以吾二人久居内要彼常切齒將為誅首恐禍及人深宜慮之田胡王乞基部落最強二苑之人多其故衆吾今欲與公共唱大義推乞基為主則二苑之衆盡為我有剋城之後徐更議之詳以為然黁遂以二苑之衆夜燒洪範門使詳為内應事洩黁據東苑以叛百姓聞黁起兵皆言聖人起事事無不成故相率從之如不及旬日之間有衆數千光孫八人年㓜悉在乳母抱中先在東苑黁之叛也悉虜而獲之及纂擊破黁軍黁恚甚盡投王孫於鋒刅之上枝分節解飲其血以盟衆覩者盡皆掩目寒心不忍視之而黁悠然自若遂與光相持時有逃人奔於黁稱吕綂病死黁曰未也光綂之命盡在一時後綂死三日而光死黁嘗曰涼州謙光殿當有索頭鮮卑居之其後秃髪傉檀沮渠蒙遜迭據姑臧終如黁言黁性褊酷不為士庶所附戰敗奔降西秦乾歸敗入仕姚興為太史令黁以滅姚者晉遂將妻子南奔為追兵所殺杜進杜進略陽氐也初為光禆將從伐西域討平龜兹及光引還涼州刺史梁熙責光擅命還師遣子𦙍率衆來拒光遣進等為前鋒迎撃𦙍將麾下數百騎來奔進追擒之胡夷欵附光之定河西也進功居多表為輔國將軍武威太守封武始侯進既居都尹權高一時出入羽儀與光相亞光甥石聰至自闗中光曰中州人言吾政化何如聰曰但聞有杜進耳實不聞有舅也光黙然因此誅進張資張資仕光為中書監博學多才藝文翰温雅光甚器之資病光博營救療有外國道人羅義云能差資病光喜給賜甚厚鳩摩羅什知義誑詐乃告資曰義不能為益徒煩費耳㝠運雖隠可以事試也遂以五色絲作繩結之燒為灰末投之水中灰若出水還成結者病不可愈須臾灰聚浮出復繩本形義療無效少日資死光悼惜之任射任射者光時得罪自匿為王欣家奴發覺應死射有竒巧王爾一作肅魯般之儔也故赦之及大殿嵗久傾敗光募能正者射運巧致思不煩大工土木俱正竇茍竇茍略陽氐也以壯勇知名從光攻龜兹登雲梯入地道或時墮落蘇而復上光深竒之後以強弩將軍從中郎將方攻乞伏乾歸又從太原公纂率步騎五千南討彭奚念皆無所獲光親討乾歸茍又從纂率步騎三萬攻拔金城以功遷左衞將軍賜爵闗内侯侯瑾侯瑾字子瑜能解鳥語光大安三年常出門見白雀巢陽川與黑雀列行慨然歎曰今天下大亂君子小人相共居焉遂去不知所之齊從齊從魏安人也仕光為左衞將軍守融明觀紹初嗣立纂與𢎞率壯士攻洪範門從逆問之曰誰也衆曰太原公從曰國有大故主上新立太原公行不由道夜入禁城將為亂耶因抽劍直前斫纂中額纂左右擒之纂曰義士也赦之勿殺及即偽位謂從曰卿前斫我一何甚也從泣曰隠王先帝所立陛下雖應天順時而微心未達此時惟恐陛下不死何謂甚也纂嘉其忠因善遇之宋歆宋歆姑臧人也仕為燉煌太守以德惠下境内肅清乃結同心之梨歆詣酒泉獻之光嘉其美瑞賞帛五十疋宗燮宗燮燉煌人仕纂為騎都尉尚書僕射大司馬𢎞起兵東苑刼尹文楊桓為謀主請燮俱行燮曰老臣受先帝大恩位為列棘不能隕身授命死有餘罪而復從殿下親為戎首者豈天地所容乎且臣耄矣智不能謀衆不足恃將焉用之𢎞曰君為義士我為亂臣乃止十六國春秋卷八十四
