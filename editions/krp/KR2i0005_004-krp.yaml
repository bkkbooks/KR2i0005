body:
  text: 十六國春秋卷四前趙錄四劉聰下麟嘉二年春正月朔日黑霧四塞終日竟夜著人如墨五日乃止石人言於宣光陵二月雨血於東宫其日又雨血於光極殿東宫四門無故自壊後内史女人化為丈夫癸亥大將軍東平王約卒一指猶煖遂不殯殮至於甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返於不周見諸王公卿將相死者悉在大有人民宫室壯麗號曰䝉珠離國淵謂約曰東北有遮須夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害吾家死亡略盡但可永明輩十數人在耳汝且還後年當來見汝不久約拜謝而歸道遇一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以小女相妻約歸置皮囊於机上俄而蘇活謂左右曰机上取囊來左右取得開之有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王嵗在攝提當相見也馳使奏呈聰曰若審如此吾不懼死也後聰死與此玉并葬焉時東宫鬼哭赤虹經天南有一岐三日竝照各有兩珥五色甚鮮客星犯紫微入於天獄而滅雨血平陽廣袤十里太史令康相言於聰曰虵虹見彌天一岐南徹三日竝照客星入紫微此皆大異其徵不逺也今虹達東西者許洛以南不可圖也一岐南徹者李氏當仍跨巴蜀司馬叡終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太隂之變其在漢域乎漢既據中原厯命所屬紫宫之異亦不在他此之深重何可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代趙魏皆有將大之氣願陛下以東夏為憂勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之銳燕之突騎自上黨而來曹嶷率三齊之衆為之後繼陛下將何以抗之紫宫之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以逺追秦皇漢武循海之事内為髙祖圖楚之計無不克矣聰覽之不悅是月使從弟暢帥步騎三萬攻滎陽太守李矩屯於韓王故壘相去七里遣使招矩時暢兵卒至矩未及為備遣使奉牛酒詐降於暢藏匿精勇暢見其老弱不復設備大饗渠帥人皆醉飽矩欲夜襲之士卒恇懼矩乃遣其將郭誦禱於子産祠曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言曰東里有教當遣神兵相助將士聞之皆踊躍争進矩選勇敢千人使誦將之帥督䕶楊璋等夜掩擊暢營俘斬首虜數千級獲鎧馬甚多先是郭黙聞矩被攻遣弟芝帥衆援之既而聞破暢兵芝復馳赴矩矩與芝馬五百匹分軍為三道追擊暢兵暢復大敗奔還僅以身免三月相國粲使其黨王平謂太弟乂曰適奉中詔云京師將有變勅裹甲以備非常乂以為信然命東宫官屬皆裹甲以居粲遣使馳告靳準王沉等曰向也王平告云東宫隂備非常將若之何準白之聰曰太弟將為亂已裹甲矣聰大驚曰寧有是邪沉等同聲曰臣等聞之久矣但恐言之陛下弗信也聰乃使粲以兵圍東宫粲遣王沉靳準收氐羌酋長十餘人窮問之皆懸首髙格燒鐵灼目酋長自誣與乂同造逆謀聰謂沉等曰而今而後知卿等忠於朕也當念知無不言勿恨往日言而不用也於是誅乂素所親厚大臣及東宫官屬皆沉準素所憎怨者數十人夏四月廢乂為北部王粲尋使準賊殺之坑士衆萬五千餘人平陽街巷為之一空乂形神秀爽寛仁有器度故士心多歸附之聰聞其死哭之悲慟曰吾兄弟止餘二人而不相容安得使天下知吾心邪氐羌叛者十餘萬落以靳準行車騎大將軍討平之六月境内大蝗平陽雍冀尤甚靳準捕之震其二子而死河汾大溢漂沒千餘家東宫灾門閤宫殿蕩然秋七月立晉王粲為皇太子大赦境内殊死已下以粲領相國大單于總攝朝政如前八月聰安北大將軍趙固襲衛將軍華薈於臨潁殺之固與長史周振有隙振宻譖固於聰先是李矩之破暢也於帳中得聰宻詔令暢既克矩還過洛陽收固斬之以振代固矩送以示固固斬振父子帥騎一千歸降於矩冬十一月聰校獵上林令愍帝行車騎大將軍戎服執㦸前導行三驅之禮觀者皆指帝曰此故長安天子也聚而觀之故老或歔欷流涕一作悲泣太子粲言於聰曰昔周武王豈樂殺紂乎正恐同惡相求為患故也今司馬氏跨據江東趙固李矩同惡相濟興兵聚衆者皆以子業為名不如早除之以絶其望聰曰吾前殺庾珉輩而民心猶如是吾未忍復殺也且小觀之十二月聰享羣臣於光極前殿欲觀晉臣在朝者乃使帝行酒洗爵已而更衣又使帝執蓋多有涕泣或至失聲者尚書郎辛賔起而抱帝大哭聰怒曰前殺庾珉輩故不足為戒邪命引出斬之趙固與河内太守郭黙攻聰河東至於絳邑右司隷部民盜牧馬負妻子奔之者三萬餘人騎兵將軍劉勲追討之殺萬餘人固黙引歸劉頡邀擊之為固所敗聰使太子粲及征北將軍劉雅等帥步騎十萬伐固次於小平津固揚言曰要當生縛劉粲以贖天子聰聞而惡之粲表於聰曰子業若死民無所望則不為李矩趙固之用不攻而自破矣戊戌殺愍帝於平陽帝之䝉塵也侍中許肅冐難侍左右帝臨崩言欲見許侍中肅馳詣相見帝已不能語肅曰未審陛下尚識臣否帝猶執肅手流涕肅歔欷登牀帝遂投於其懐抱之中肅晝夜號泣聰外欲明已不害乃偽責諸臣欲盡誅之羣臣逃竄惟肅獨曰備位故臣願乞得殯殮就戮聰許之事訖詣聰曰國亂不能匡君亡弗能死舉目莫非愧耻所以忍辱正為山陵未畢耳微情已敘甘就刑戮聰義而免之雅等遂進攻洛陽趙固奔陽城山麟嘉三年春二月李矩使郭黙郭誦救趙固屯於洛口一作洛陽潛遣耿稚張皮等簡精卒千人夜濟河來襲粲營貝丘王翼光自厘城覘知之乃以告粲請為之備粲曰征北南渡趙固望聲逃竄彼方憂自固何暇來此邪且聞上身在此自當不敢北視况敢濟乎毋為驚動將士是夜稚等飛梯騰栅十道進攻粲衆驚擾一時奔潰死傷大半粲勒兵於東北穿栅而去奔保陽鄉稚等據其營壘獲器械軍資不可勝計及旦粲見稚等兵少更與雅馳還栅於壘外聰聞粲敗使太尉范隆帥騎赴之稚等大懼遂與雅相持粲悉衆攻稚苦戰二十餘日不能下李矩率兵來援使壯士三千汎舟迎之粲與雅等臨河列陣作長鈎以鈎船連戰數日不得渡矩夜遣部將格增潛濟入稚營壘與稚選精騎千餘殺所獲牛馬焚燒器械突圍而出趨北山南奔虎牢騎兵將軍劉勲追之至於河陽稚師大敗死者五千五百人投河死者千餘人三月聰所居螽斯則百堂灾焚子會稽王𠂻以下二十一人聰聞之自投於牀哀塞氣絶良久乃蘇自此鬼哭宫中至於九月夜聲不絶平陽西明門牡自亡霍山崩聰署驃騎大將軍濟南王驥為大將軍都督中外諸軍事錄尚書衛大將軍齊王勱為大司徒夏四月中常侍王沉養女年十四有妙色聰立以為左皇后尚書令王鑒中書監崔懿之中書令曹恂等諫曰臣聞王者立后將以上配乾坤之性象二儀敷育之義上承宗廟母臨天下匹配后土執饋皇姑必擇世徳名宗幽閑令淑乃副四海之望稱神祗之心是故周文造周姒氏以興闗睢之化饗則百世之祚永孝成帝任心縱欲以趙飛燕為后使皇統絶滅社稷為傾有周之隆如彼大漢之禍如此自麟嘉以來亂淫於色中宫之位不以徳舉縱沉之女弟刑餘小醜猶不可以汚清廟而塵瓊寢况其家婢邪六宫妃嬪皆公子公孫奈何一旦以婢主之何異象榱玉簣而對腐木朽楹哉臣恐非國家之福也聰覽之大怒使中常侍宣懐謂太子粲曰鑒等小子慢侮國家狂言自口無復君臣上下之禮其速考竟於是收鑒等送獄金紫光祿大夫王延馳將入諫門者弗通鑒等臨刑王沉以杖叩之曰庸奴復能為惡乎乃公何與汝事鑒瞋目叱之曰豎子滅皇漢者正坐汝䑕輩與靳準耳要當訴汝於先帝取汝於地下治之準謂鑒曰吾受詔收君有何不善君言漢滅由吾何也鑒曰汝殺皇太弟使主上獲不友之名國家畜養汝輩何得不滅懿之謂準曰汝梟聲獍形必為國患汝既食人人亦當食汝皆斬於東市五月聰立中常侍宣懐養女為中皇后六月鬼哭於光極殿又哭於建始殿雨血平陽廣袤十里聰晝見東平王約時約已死聰甚惡之謂太子粲曰吾寢疾惙頓怪異特甚往以約之言為妖比累日見之此兒必來迎吾也何圖人死定有神靈如是吾不悲死也但今世難未夷非諒闇之日朝終夕殮旬日而葬徵大司馬曜為丞相石勒為大將軍竝錄尚書輔政勒固辭仍以曜為丞相領雍州牧勒為大將軍領幽冀二州牧勒亦不受以上洛王景為太宰濟南王驥為大司馬昌國公任顗一作劉顗為太師朱紀為太常呼延晏為太保竝錄尚書事范隆守尚書令儀同三司靳準為大司空領司𨽻校尉皆迭决尚書奏事聰以晉太興元年秋七月癸亥薨於建始殿在位九年甲子粲即偽位葬聰於宣光陵諡曰昭武皇帝廟號烈宗劉粲劉粲字士光少而儁傑才兼文武自為宰相威福任情疎逺忠賢昵近奸佞任情嚴刻無復恩恵拒諫餙非好興宫室相國之府彷彿紫宫在位無㡬作兼晝夜饑困窮叛死亡相繼粲弗之恤也既嗣偽位尊聰后靳氏為皇太后號樊氏為𢎞道皇后宣氏為𢎞徳皇后王氏為𢎞孝皇后太后等皆年未盈二十竝有國色粲晨夜烝淫於内多行無禮無復哀戚立妻靳氏為皇后子元公為太子大赦境内改年漢昌八月雨血於平陽靳準將有異謀私謂粲曰如聞諸公欲行伊霍之事謀先誅太保及臣以大司馬統萬機陛下若不先之臣恐禍之來也不晨則夕粲弗納準懼其言之不從謂聰二靳氏曰今諸公侯欲廢帝立濟南王恐吾家無復種矣盍言之於帝二靳乘間言之粲從之收太宰上洛王景太師昌國公任顗大司馬濟南王驥大司徒齊王勱等皆殺之太傅朱紀太尉守尚書令范隆出奔長安又誅驥同母弟車騎大將軍吳王逞粲大閲於上林謀討石勒以丞相曜為相國都督中外諸軍事仍鎮長安靳準為大將軍錄尚書事粲沉荒酒色遊讌後庭軍國之事皆决於準準矯粲命以從弟斬明為車騎將軍斬康為衛將軍及將作亂以金紫光祿大夫王延耆徳時望謀之於延延弗從馳將告之遇靳康劫之以歸準怒殺之遂勒兵入宫升光極殿使甲士執粲數而殺之諡曰隠帝劉氏男女無少長皆斬於東市發掘永光宣光二陵斬聰尸焚燒宗廟鬼大哭聲聞百里征北將軍雅出奔西平準自號大將軍漢天王置百官謂安定胡嵩曰自古無無徳為天子者今以傳國璽付汝還如晉家嵩不敢受準怒殺之遣使告司州刺史李矩曰劉淵屠各小醜因大晉事故之際作亂幽并矯稱天命至使二帝幽沒虜庭輒帥衆扶侍梓宫請以上聞矩馳表於晉詔遣太常韓𦙍等奉迎紫宫未至而準已為石勒劉曜所沒尚書北宫純胡崧等招集晉人堡於東宫靳康攻滅之十六國春秋卷四
