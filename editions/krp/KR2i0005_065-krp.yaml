body:
  text: 十六國春秋卷六十五南燕錄三慕容鍾慕容鍾字道明德之從弟也少有識量喜怒不形於色機神秀發言㫖清辯至於臨難對敵知勇兼濟累進竒䇿備德頗從之率皆中焉由是政無巨細悉以委之遂為佐命元勲封北地王超既嗣位猜虐日甚政出權門公孫五樓等䂓挾威權慮鍾抑己固勸超誅之鍾懼遂與段宏等謀叛事敗奔秦姚興拜為始平太守封歸義侯封孚封孚字處道渤海蓚人也祖悛振威將軍父放吏部尚書皆顯名於燕世孚幼而聰敏和裕有士君子之稱仕垂散騎常侍轉留臺尚書及寳僭立累遷吏部尚書蘭汗之亂南奔辟閭渾渾表為渤海太守德至莒城孚遂出降德曰孤得青州不以為喜喜於得卿也常外總機事内參宻謀雖位任崇重而謙虛博納深得大臣體度超既嗣位政出權嬖盤於遊畋多違舊章軌憲日敝殘虐滋甚孚屢與韓􅒲盡言匡救超不能納其後臨軒問孚曰朕可方前世何主孚曰桀紂之主超大慚怒孚徐歩而出不為改容司空鞠仲失色謂孚曰與天子言何其亢厲宜應還謝孚曰行年七十墓木已拱惟求死所耳竟不謝超以其時望特優容之太上三年卒於家時年七十一追贈太師諡曰文穆其所著文章多傳於世封嵩封嵩渤海人也仕備德為左司馬遷尚書左僕射德又以韓􅒲為尚書右僕射時嵩􅒲年並三十又以嵩弟融為西中郎將􅒲弟軌為北中郎將嵩等俱拜德臨軒詔令四人同入嵩等至殿方謝德顧曰所謂躍二龍於長衢騁雙驥於千里朝野榮之超初嗣位大旱太后段氏告超曰左僕射封嵩教殷丹下車訪問民間疾苦丹常具陳孝婦不當死以致亢旱當誅姑女改葬孝婦丹如其言應時雨注後超信任姦邪不恤政事嵩遂與南海王法等謀反征南司馬卜珍言於超曰左僕射封嵩數與法往來疑有奸超收嵩下廷尉辭及段太后太后懼泣告超曰嵩教遣黄門令牟常說吾云帝非太后所生恐依永康故事我婦人識淺恐帝見殺即以語法法為謀見誤知復何言超聞而大怒乃車裂嵩於東門之外融叛出奔於魏杜𢎞杜𢎞平原人也仕德為從事中郎先是德母及兄納一作光皆在長安德遣𢎞如長安存問消息𢎞曰臣至長安若不奉太后動止便即西如張掖以死為效但臣父雄今年踰六十未沾榮貴乞本縣之祿以申烏鳥之情中書令張華曰杜𢎞未行而求祿要君之罪大矣不可使也德曰吾方散所輕之財招所重之死況為親尊而可吝乎且𢎞為君迎親為父求祿雖外如要君内實忠孝何罪之有乃以雄為平原令𢎞至張掖為賊所殺德聞而悲之厚撫其妻子王始王始萊蕪人德建平四年以妖術惑衆至數千人聚於太山萊蕪谷自稱太平皇帝署置公卿百官號其父固為太上皇兄林為征東將軍弟泰為征西將軍德遣車騎將軍桂陽王鎮討禽之斬於都市臨刑人皆罵之曰何為妖妄自貽族滅或問其父兄今並何在始曰太上皇帝䝉塵於外征東征西亂兵所害朕躬雖存復何聊賴其妻趙氏怒之曰君正坐此口過以至於此奈何臨死復爾狂言始曰皇后何不達天命自古豈有不破之家不亡之國邪行刑者以刀鐶築之始仰視曰朕即崩矣終不改帝號也德聞而笑之謂左右曰熒惑之人死猶狂語何可不殺張瑛張瑛幽薊人也為辟閭渾參軍常與渾作檄辭多不遜渾敗德擒而讓之瑛神色自若徐對曰渾之有臣如韓信之有蒯通通遇漢祖而䝉恕臣遭陛下而嬰戮比之古人竊為不幸防風之誅臣實甘之但恐堯舜之化未𢎞於四海耳德初善其言後竟殺之王鸞王鸞一作尹鸞濟南人也身長九尺腰帶十圍貫甲跨馬不據鞍由蹬德一見而竒其魁偉賜之以食乃進一斛餘德驚曰所噉如此非耕所能飽且才貌不凡堪為貴人可先以司縣試之也於是拜為逢陵長鸞到官政理修明大收民譽徴為東萊太守龎世龎世不知何處人仕德為光祿勲奏案豪强苛克人物咸懼疾之及卒門無弔客時人為之謡曰龎家之巷車馬轔轔泥丸之日無弔賔弔賔不至何所因由性苛克寡所親桓敞或作垣字桓敞略陽桓道人也族姓豪强石虎時自略陽徙鄴敞仕苻氏為長樂國郎中令德入青州以敞為車騎長史超襲偽位其長子遵次子苗復見委任遵為尚書苗為京兆太守劉裕圍廣固遵苗踰城歸順並以為太尉行參軍張華張華清河東武城人也有機辨仕德為給事黄門侍郎中書令屢進直言仕超至左僕射奉使至秦辭令不屈後為劉裕所獲張恂張恂清河東武城人也仕慕容氏散騎常侍父悕為儁尚書右僕射恂隨德南渡因家於齊郡之臨淄後歸仕魏劉昶劉昶本平原人也世仕慕容氏昶從德南渡河因家於北海之都昌縣子奉伯為超東牟令後歸劉裕為北海太守傅融傅融本清河人六世祖伷伷子遘仕後趙至太常融隨徳南徙渡河遂家於磐陽為鄉里所重性豪爽不拘小節尤善屬文李根李根遼東襄平人也仕寳至中書監與子後智等隨徳南徙渡河居於青州數世無名位三齊豪門以此多輕之王牢王牢太原祁人也髙祖宏河東太守緜竹侯牢仕慕容氏為上谷太守隨徳南渡居青州因以家焉張幸張幸清河東武城人也仕超東牟太守後率戸歸魏冷平冷平臨淄人太上二年有司奏沙門僧智夜入平舎滛其寡嫂李氏平與弟安國殺之郡縣按平兄弟欲以一人坐殺人論死而平安國各引自殺讓生競死義形急難且手殺罪人宜並加原宥超詔俱赦之高軌高軌本渤海蓚人也隨徳渡河徙青州因居北海之劇縣王景暉王景暉秦太史令高魯之甥也初同魯在秦魯遣暉隨徳使劉藻獻玉璽於徳遂留仕徳後著南燕錄六卷行於世墓容氏段豐妻慕容氏徳之女也少有才慧善書史能鼓琴徳既僭位署為平原公主年十四適於豐豐為人所譖被殺慕容氏寡居歸將改適壽光公餘熾慕容氏謂侍婢曰我聞忠臣不事二君烈女不更二夫段氏既遭無辜已不能同死豈復有心於重行哉今主上不顧禮義逼我改嫁我若不從則違嚴君之命矣於是尅日交禮慕容氏姿容婉麗服飾光華熾覩之甚喜經宿慕容氏偽辭以疾熾亦不之逼三日歸第沐浴置酒言笑自若至夕宻書其裙帶曰死後當埋我於段氏側若魂魄有知當歸彼矣遂於浴室自縊而死反葬男女覩者數萬人莫不歎息曰貞哉公主路經餘熾宅前熾聞輓歌之聲慟絶良久十六國春秋卷六十五
