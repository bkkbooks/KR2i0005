body:
  text: 十六國春秋卷七十八蜀錄三李班李班字世文蕩第四子也少而聰慧見養於雄初署平南將軍年十六立為太子謙虚博納敬愛儒賢自何㸃李釗班皆師事之又引名士王嘏及隴西董融天水文夔等以為賓友每觀書傳謂融等曰吾每觀周景王太子晉魏太子丕吳太子登文章識鑒超然卓絶未嘗不有慙色何古賢之高朗後人之莫逮也為性汎愛動修軌度失在輕躁雅好田獵時諸李子弟皆尚奢靡而班常戒厲之每朝有大議雄輙令豫之班以古者墾田均平貧富獲所今貴者廣占荒田貧者種殖無地富者以已所餘而賣之此豈王者大均之義乎雄深納之雄少數攻戰多被傷痍至是寢疾舊痕皆膿潰雄子越等皆惡而逺之獨班晝夜侍側不脫衣冠親為吮膿殊無難色每甞藥流涕其誠孝如此雄死遂嗣偽位以建寧王夀錄尚書事輔政政事皆委於夀及司徒何㸃尚書令王瓌等班居中行喪禮一無所預秋九月雄子車騎將軍越鎮江陽奔喪至成都以班非雄所生意甚不平與弟安東將軍期宻謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葭萌班以未塟不忍即遣推誠居厚無所疑間一云心無纎介遣玝出屯於涪時有白氣二道帶天太史令韓豹奏曰宫中有陰謀兵氣戒在親戚深宜慎之班不悟冬十月癸亥越期因班夜哭弑之於殯宫并殺班仲兄領軍將軍都矯太后任氏令罪狀班而廢之時年四十七在位一年衆欲立越越奉期而立之期既即位諡班曰戾太子及夀立追諡曰哀皇帝子幽顒為期所殺李期李期字世運雄第四子也其母冉氏賤雄妻任氏養以為子少聰慧攻學問容貌都雅弱冠能屬文輕財好施虚心接引又多才蓺蚤有名譽初為建威將軍雄令諸子及宗室子弟各以恩信募合部衆多者纔得數百人而期獨得千餘人遷安東將軍凡所表薦多納用之故長吏列署頗出其門越既殺班乃讓位於期遂以十月甲子僣即皇帝位進夀梁州刺史大都督東羌校尉中䕶軍徙封漢王以兄越為相國封建寧王加大司馬大將軍與夀並錄尚書事以仲兄霸為鎮南中領軍弟保為鎮西北夷校尉汶山太守從兄始為征東代越鎮江陽皆進大將軍丙寅塟雄於安都陵征東始欲與夀共攻期夀不敢發始怒反譛夀於期請殺之期欲藉夀討玝故不許乃遣夀將兵向涪夀先遣使告玝説以去就利害開其去路玝遂棄城與其將焦㑹羅凱等並奔降晉期即拜夀為梁州刺史屯涪城玉恒元年春正月立妻閻氏為皇后大赦境内殊死已下改元玉恒以衛將軍尹奉為右丞相驃騎將軍尚書令王瓌為司徒司隸校尉景騫為尚書令征南將軍費黑為司隸班舅羅演為僕射秋九月班舅羅演與漢王相天水上官澹等謀殺期立班子幽事覺期殺演澹及班母羅氏琀子礹稚妻昝氏期自以謀大事既果輕諸舊臣外則信任尚書令景騫尚書姚華田褒内則信任中常侍許涪等慶賞刑威希復闗之卿相皆決于數人而已褒無他才蓺雄時常勸立期故寵待甚厚由是紀綱法度蕩然隳紊雄業衰矣玉恒二年冬十月期以從子尚書僕射武陵公戴有雋才忌之誣以謀反下獄賜死十一月晉遣建威將軍司馬勲安集漢中期遣漢王夀攻之城陷遂置守宰戍南鄭而還雄子鎮南大將軍霸鎮北大將軍保不病而死皆云期鴆殺之於是大臣危懼人不自安而期志益廣忽慢公卿政刑失措是年天雨大魚於宫中其色黄又宫中豕犬交木冬華連年災火雨血地震生毛鷓鴣集於城下玉恒三年春三月大風拔樹發屋期驕虐日甚多所誅殺籍沒資財婦女以充後宫内外恟恟道路以目諫者獲罪人懐茍免漢王夀素貴重有威名期及建寧王越等皆忌之夀懼不免每當入朝嘗詐為邊書辭以警急密問龔壯謀以自安遂與長史略陽羅恒巴西解思明謀攻成都期頗聞之數遣中常侍許涪至夀所伺其動静又鴆殺夀養弟安北將軍攸於是與越及景騫田褒姚華潛謀襲夀欲因燒市橋而發兵夀聞大懼且疑許涪往來之數也乃率步騎一萬餘人自涪向成都表稱騫等亂政興晉陽之甲以除君側之惡以李奕為先登越等請散財募士格戰期謂夀不自將不許及夀到成都期不虞其卒至既不設備壽世子勢為翊門校尉開門納之遂剋成都屯兵宫門期遣侍中勞夀夀奏相國建寧王越尚書令河南公景騫尚書田褒姚華中常侍許涪征西將軍李遐及將軍李西等皆懐奸亂政謀傾社稷大逆不道罪合夷滅期從之於是殺騫越等縱兵大掠三日乃定夏四月夀矯太后任氏令廢期為卭都縣公幽之别宫期嘆曰天下主乃當為小縣公不如死也自縊而死五月誅始等兄弟十餘人期年二十五在位三年諡曰幽公及塟賜鸞輅九旒餘如王禮徙其妻子於越嶲又使人就越嶲殺之李夀李壽字武考特季弟驤之少子也有局幹愛尚禮容敏而好學雅量豁然志度少異於諸子雄甚竒其才以為足荷重任拜前將軍督巴西諸軍事遷征東將軍時年十九聘處士譙秀以為賓客盡其讜言在巴西威惠並著驤死遷大將軍大都督侍中錄尚書總統封扶風公尋以大將軍征寧州攻圍百餘日悉平諸郡雄大悅進封建寧王以南中十三郡為建寧國既而雄疾病侍奉左右及死受遺輔政期之殺班也征東大將軍始初欲奉夀共圖討期夀不敢發始怒說期殺夀期憚玝在北欲藉夀討玝故不許改封夀為漢王食梁州五郡領梁州刺史代玝治涪城夀威名逺振深為李越景騫等所憚每深憂之既屯涪城嵗終當入朝覲常自危懼一作危嫌輙造漢中守將張才急書告邊疆寇警不時充斥不可曠鎮故得不朝咸康三年冬北入漢中破走司馬勲壽見期越兄弟十餘人年方壯大并有強兵懼不自全乃數聘命巴西龔壯壯往見夀是時岷山崩江水竭夀緣劉向之言而惡之每問壯以自安之術壯以特殺其父及叔欲假手報仇未有其由因說立事何如舍小從大以危易安開國裂土長為諸侯名高桓文勲流百代矣夀從之陰與長史羅恒解思明共謀據成都稱藩歸順㑹養弟攸從成都病還死道中乃佯言越藥殺之又詐造妹夫任調書言期越當廢夀以惑羣下羣下信之乃誓文武許賞以城中資財得數千人南襲成都剋之獲期越誅宗族十餘人縱兵士虜掠民家至乃姦淫雄女及李氏諸婦多所殘害數日乃定漢興元年夏羅恒與解思明李奕王利等勸夀稱鎮西將軍益州牧成都王以龔壯為長史告下又勸令送卭都公於建康任調與司馬蔡興侍中李艷及張烈等勸夀稱帝夀亦生心乃命筮之占者曰可數年天子調喜曰一日尚足況數年乎思明曰數年天子孰與百世諸侯夀曰朝聞道夕死可矣任侯之言策之上也遂以晉咸康四年背思明所陳之計僭即皇帝位於南郊大赦境内殊死已下改元漢興國號曰漢以董皎為相國羅恒馬當為股肱李奕任調李閎為爪牙解思明為謀主以安車束帛聘龔壯為太師壯誓不仕夀所贈遺一無所受特聽縞巾素帶居師友之位拔擢幽滯處之顯列改立宗廟追尊父驤為獻皇帝母昝氏為皇太后立妻閻氏為皇后世子勢為太子更以驤為始祖特雄舊廟為大成廟下書言與期越别族分寧州興古永昌雲南朱提越嶲河陽六郡為漢州又分漢德縣以為梓潼郡割巴郡之宕渠宣漢漢昌三縣置宕渠郡尋省以縣並屬巴西郡凡諸制度多有改易遂以董皎為丞相羅恒為尚書令解思明為廣漢太守任調為鎮北將軍梁州刺史東夷校尉李奕為鎮西將軍西夷校尉更代諸郡及卿佐皆用宿人及已叅佐省交州以從子權為鎮南將軍寧州刺史於是成都諸李子弟無復秉兵馬形勢者雄時舊臣近親及六郡士民皆見踈斥秋七月奕從兄廣漢太守乾與大臣通謀欲廢夀夀懼使子廣與大臣盟於前殿徙乾為漢嘉太守以李閎為征東將軍荆州刺史移鎮巴郡閎恭之子也八月蜀中久雨禾稼損傷百姓饑疫夀命群臣極言得失草莽臣龔壯上封事曰臣聞有陰德者必有陽報故于公理獄高門待封伏惟獻皇帝寛仁厚惠宥罪甚衆靈德洪洽誕鍾陛下陛下天性忠篤愛遺建節志齊周霍誠貫神明而志緒違理顛覆顧命管蔡既興讒諛滋蔓大義滅親撥亂反正上指星辰昭告天地歃血盟衆舉國稱藩天應人悅白魚登舟霆震助威烈風順義神人誠允日月光明而論者未諭權宜稱制今淫雨汜濆垂向百日禾稼損傷加之饑疫百姓愁望天其或者將以監示陛下故也又前日之舉止以救禍陛下之心本無大圖今久不變天下之人誰復分明知陛下本心者哉且𤣥宫之䜟難知而盟誓顧違一旦疆邊有急内外騷動不可不深思長久之策永為子孫之計也愚謂宜遵前盟誓結援吳㑹以親天子彼必不愛高爵重位以報大功雖降階一等永為靈德宗廟相承福祉無窮君臣銘勲于上生民寧息于下通天下之高理𢎞信愼之美義垂拱南面歌詩興禮上與彭韋争美下與齊晉抗衡不亦休哉論者或言二州附晉則榮六郡人事之不便昔公孫述在蜀羈客用事劉備在蜀楚士多貴及漢征蜀殘民大半吳鄧西伐舉國屠滅誰復别楚蜀者乎論者或不逹安固之基惜其名位在昔諸侯自有卿相司徒司空宋魯皆然及漢藩王亦有丞相今義歸彼但當崇重豈當減削昔劉氏郡守令長方仕州郡國亡主易故也今日義舉主榮臣頼寧可同日而論乎論者又謂臣當為法正臣蒙陛下大恩覆臣如天養臣如地恣臣所安至於榮祿無論漢晉臣皆不處臣復何為當侔法正乎論者或言晉家必責質任及徵兵伐胡何以應之案晉不煩尺兵一國來附威卷四海廣地萬里何任之責胡之在北亦此之憂今平居有東北之虞縱令徵兵但援漢川猶差二門耳臣附託深重忘疾病之穢實感殊遇冀以微言少補明時嘗懼殞歿不寫愚心辜負恩顧謹進悾悾伏願罪戮封上夀覽之不悅然拘前言秘而不宣九月僕射任顔謀反伏誅顔任太后之弟也因盡殺雄諸子納等漢興二年春二月晉以南蠻校尉南郡太守庾翼鎮江陵遣武昌太守陳囂為輔國將軍梁州刺史趣子午又遣參軍李松伐巴郡至江陽夏四月執夀征東將軍荆州刺史閎巴郡太守黄植初夀許自牛鞞以東土斷與閎執政者以為不可乃止復不益兵故閎覆沒閎弟艷以是怨故與朝右有隙是時夀疾病羅恒解思明等復議奉晉計尋而巴郡破夀以為附晉晉當以兵威故不能自斷遂輟計五月拜奕鎮東將軍代閎守巴郡六月晉廣州刺史鄧嶽將兵擊寧州建寧太守孟彦率州人縛寧州刺史霍彪舉建寧降晉夀遣右將軍李位都討之秋七月癸卯大風暴雨震其端門夀深自悔責命羣臣極盡忠言勿拘忌諱漢興三年春三月丁卯右將軍李位都攻拔丹川晉守將孟彦劉齊李秋等皆死之先是趙王石虎遺夀書欲與之連横入寇約中分江南夀大悦遣散騎常侍王嘏中常侍王廣使于趙龔壯切諫不聽至是下書曰吳㑹遺燼久逋天誅今將大興百萬躬行天罰乃大修船艦嚴兵繕甲吏卒皆備糇糧秋九月以尚書令馬當為六軍大都督假節鉞營東場大閱軍士七萬餘人舟師泝江而上過成都鼔譟盈江夀登城觀之有吞噬江南之志羣臣咸諫曰我國小衆寡且吳㑹險逺圖之未易解思明又切諫懇至夀不從於是命羣臣議其利害龔壯復上疏切諫以為不如通晉羣臣皆以壯之言為然叩頭泣諫夀乃止士衆咸稱萬嵗冬十二月遣鎮東大將軍李奕攻牂牁太守謝恕恕保城拒守積日不拔㑹奕糧盡引還轉寇巴東守將勞揚戰敗死之夀將閎至自成都初閎為晉所獲逃奔於趙夀致書於石虎以請之署曰趙王石君虎不悦付中外議中書監王波議以為不若為書遺之并致楛矢石弩於夀遂遣閎還閎至夀乃下書曰羯使來庭貢其楛矢漢興四年春正月夀以太子勢領大將軍錄尚書事夀承雄寛惠儉約得蜀人心又新行簒奪因循雄政未逞其志欲㑹李閎與王嘏等從鄴還盛稱石虎威彊宫觀壯麗鄴中殷實且言趙王虎虐用刑法王遜亦以殺罰御下並能控制邦域城鎮心欣慕之民有小過輙殺以立威名又以郊甸未實都邑空虚工匠器械事用未足乃徙傍郡户三丁已上者以實成都興尚方御府發州郡工巧以充之廣修宫室引水入城務於奢侈又廣太學起讌殿百姓疲於使役吁嗟滿道思亂者十室而九矣尚書左僕射蔡興切諌夀以為誹謗殺之右僕射李嶷數以直言忤㫖夀積忿非一託以他罪下獄誅之秋七月遣尚書廣漢李擴一作攄為御史入南中擴祖毅晉故寧州刺史以向與南人有舊故遣之擴從兄演自越嶲上書勸夀歸正返本釋帝稱王夀怒殺之以威龔壯解思明等漢興五年冬十月夀下書令州郡各舉明經者封好學侯漢興六年夏四月夀寢疾五月疾篤常見李期蔡興為祟秋八月卒亥卒是嵗晉康帝建元元年也時年四十四在位六年諡曰昭文廟號中宗塟安昌陵夀初為王好學愛士庶幾善道每覽良將賢相建功立事者未嘗不反覆嘆咏故能征伐四剋拓地千里雄既垂心於上夀亦竭誠於下號為賢相及即偽位多所更易常慕漢武魏明之為人恥聞父兄時事上書者不得言先世政敎自以為勝之也李勢李勢字子仁夀之長子也初夀妻閻氏無子驤殺李鳳為夀納鳳女生勢期愛勢姿貌拜翊軍將軍漢王世子前作翊門校尉勢身長七尺九寸腰帶十四圍善于俯仰時人異之夀死僭即帝位太和元年春正月大赦境内改元太和尊嫡母閻氏為皇太后母李氏為太后妻李氏為皇后拜弟廣為大將軍大都督錄尚書事封漢王其餘子弟及文武進位各有差夏四月太史令韓皓上言熒惑守心乃宗廟禮廢之譴勢命羣臣議之相國董皎侍中王嘏等以為景武創業獻文承基至親不逺無宜疏絶乃更令祭祀始祖特太宗雄同號曰漢王是月晉遣征西將軍領南蠻校尉庾翼率益州刺史周撫西陽太守曹據來伐破别將李桓於江陽乃為檄示勢曰告巴蜀士民夫昏明代運否終則泰賢哲覩機以知變不肖滅亡以取禍昔皇運中消乾綱暫弛曜勒窮兇肆暴神州李劉啟逆竊逼岷川翼以不才任符分陜未能仰宣皇化招攜以禮而使三邦之民制於犬羊之羣元元之命懸於豺狼之口所以假寐永歎疢如疾首者也凡百黎民秋毫不犯檄到勉思良圖自求多福無使蘭艾同焚永作鑒誡信誓之明有如皎日太和二年秋八月漢王廣以勢無子求為太弟勢不許馬當解思明諫曰陛下兄弟不多若復有所廢將益孤危固請許之未幾疑馬當等與廣有謀命相國董皎收馬當解思明斬之夷其三族遣太保李奕襲廣於涪城貶為臨卭侯廣尋自殺思明有計謀彊於諫諍被収歎曰國之不亡以我數人在也今其殆矣言笑自若而死馬當素得民心及其死士卒無不哀之自此之後無復紀綱及諫諍者冬十二月勢將爨頠奔附于晉嘉寧元年秋九月巴東太守楊謙擊勢將申陽走之獲别將樂髙冬十月天大雨血於江南數畝許鎮東大將軍太保奕自晉夀舉兵反寇陷巴東蜀人多有從者衆至數萬勢登城拒戰奕單騎突門門者射而殺之衆乃潰散勢既誅奕大赦境内改元嘉寧蜀土先是無獠至此始從山出自巴西至犍為梓潼布滿山谷十餘萬落不可禁制大為民患勢既驕奢貪吝性愛財色常殺人而取其妻又納奕女為后耽於淫樂不恤國事夷獠叛亂軍守離缺境土減削加之饑饉宇内蕭條更多忌害誅戮大臣刑獄酷濫人懷危懼斥外父祖舊臣親信近習左右因行威福修飾屋宇羣下諫諍一無所納又常居内罕見公卿史臣屢陳灾譴乃加董皎為太師以名位優之實欲與分灾𤯝嘉寧二年春正月乙卯晉遣安西將軍荆州刺史桓温帥征虜將軍益州刺史周撫輔國將軍南郡太守譙王司馬無忌建武將軍江夏相袁喬等來伐先是温謀伐蜀衆咸以為不可袁喬勸之曰夫經略大事固非常情所及智者了於心胸然後舉無遺策耳紀事本末作不必待衆言皆合也今為天下之難者胡蜀二寇而已蜀雖險固方胡為弱將欲除之先從易者今遡流萬里經略天險彼或有備必不可剋然蜀人自以斗絶一方恃其完固不修攻戰之具若以精卒一萬輕車速進比彼聞之我已入其險要李勢君臣不過自力一戰擒之必矣論者恐大軍既西胡必覬覦此又似是而非何者胡聞萬里征伐以為内有重備必不敢動縱復越逸江渚諸軍足以守境此無憂矣且蜀土富貴號稱天府昔諸葛武侯欲以抗衡中國今誠不能為害然勢據上流易為寇盜若襲而取之有其人衆此國之大利也温從之使喬以江夏相領水軍二千人為前鋒自將大衆為之後繼軍次青衣勢大發軍拒守遣叔父右衞將軍福與從兄鎮南將軍權前將軍昝堅等帥數千人自山陽趨合水拒温謂温從歩道而上諸將皆欲設伏江南以待晉師昝堅不從率諸軍自江北鴛鴦碕渡向犍為三月温至彭模去勢已近議欲分為兩軍異道俱進以分蜀兵之勢袁喬曰今懸軍深人萬里之外置之死地士無返顧之心勝則大功可立不勝則噍類無遺當併力合衆以取一戰之捷若分軍為兩則衆心不一萬一偏敗大事去矣不如全軍而進棄去釜甑齎三日糧以示無還心勝可必也温從之留叅軍孫盛周楚將羸兵守輜重温自將歩卒直抵成都右衞將軍福等進攻彭模孫盛奮擊走之温進遇權三戰三捷勢兵敗散自間道歸成都鎮東將軍位都迎詣温降昝堅至犍為知與温異道自沙頭津濟比至温已軍於成都之十里陌堅衆自潰勢悉衆出戰於成都之笮橋文選註作柞字温前鋒不利叅軍龔䕶戰死矢及温馬首衆懼欲退而鼓吏誤鳴進鼓袁喬拔劍督士卒力戰遂大破之温乘勝長驅至于城下縱火燒其城門勢衆大懼無復鬭志中書監王嘏散騎常侍常璩等勸勢出降勢以問侍中馮孚孚言昔吳漢征蜀盡誅公孫氏今晉下書不赦諸李雖降恐無全理勢乃夜開東門與昝堅走九十里至晉夀葭萌城丁亥勢使散騎侍郎王㓜送降文於温曰偽嘉寧二年三月十七日略陽李勢叩頭死罪伏惟大將軍節下先人播流特險因釁竊有汶蜀勢以闇弱復統末儲偷安荏苒未能改圖猥煩朱軒踐冒險阻將士狂愚干犯天威仰慙俯愧精魂飛散甘受斧躓以釁軍鼔伏惟大晉天網恢𢎞澤及四海恩過陽日逼迫倉卒自投草野即日到白水城謹遣私署散騎常侍王㓜奉牋以聞并勅州郡投戈釋仗窮池之魚待命漏刻勢尋輿櫬面縛軍門温解其縛焚其櫬遷勢及叔父福等十餘人於建康封為歸義侯晉升平五年卒宕渠即古賨國今有賨城秦始皇時有長人長五丈見於宕渠秦太史令胡母敬曰五百年後其地必有異人為大人者及雄稱尊號祖先出自宕渠有識者皆以為應之譙周亦云我死後三十年當有異人入蜀蜀由之亡蜀亡之嵗去周三十二年又著䜟云廣漢城北有大賊曰流曰特攻難得嵗在𤣥宫自相剋又曰宋岱不死則孫阜不交市三旬之間流離之首懸于轅門又惠帝之世蜀童謡曰郫城堅盎底穿郫中細子李特細又曰江橋頭闕下市成都北門十八子又曰巴郡葛當下美巴郡皮又曰有客有客來侵門陌其氣欲索至是而悉應焉先是勢未亡時頻有怪異宫人張氏有冶容勢寵之一夕化為大斑理蛇長丈餘送于苑中夜復來寢牀下勢懼遂殺之復有鄭美人勢亦寵之化為雌虎一夕食勢寵姬未幾而死成都北鄉有人望見女子避入草中往視見物如人有身形頭目無手足而動揺不能言又有驢無皮毛袒肉飲食數日而死涪陵民樂氏婦頭上生角長三寸凡三截之又馬氏婦姙身兒從腋下生其母無恙兒亦長育廣漢馬生角長大各半寸有馬生駒一頭兩身相著六耳無目二隂一牡一牝李漢家舂米米自臼中跳出遂斂於箕中又跳出瀉於簟中又跳出有猿居鳥巢至城下大雨血地仍震又連生毛鷓鴣集于城下江源又生草高七八尺華葉皆赤青如牛角天譴甚多不能悉紀特以晉太和元年嵗在辛酉起兵至勢嘉寧二年時晉永和三年嵗在壬戌而降於晉凡六世合四十七年十六國春秋卷七十八
