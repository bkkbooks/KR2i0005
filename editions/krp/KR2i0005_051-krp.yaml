body:
  text: 十六國春秋卷五十一後燕錄九垂后先段氏垂后段氏遼西鮮卑段末杯之女也垂為吳王時立為王妃生子令寶段氏才髙性烈自以貴姓不尊事太后可足渾氏渾氏銜之儁又素不平於垂中常侍湼皓因希儁㫖告段氏及吳國典書令遼東髙弼為巫蠱欲以連汚垂遂收段氏及弼下大長秋廷尉考治一作騐段氏及弼志氣確然終無撓辭拷掠甚急垂愍之私使人謂段氏曰人生會當一死何堪楚毒如此不若引服段氏嘆曰吾豈愛死者耶若自誣以惡逆上辱祖宗下累於王固不為也辨荅益明故垂得以免禍而段氏竟死于獄中垂出為平州刺史還鎮遼東垂以段氏女弟為繼室可足渾氏黜之以其妹長安君妻垂垂不悅由是渾氏益惡之密謀殺垂垂遂奔秦及即位追諡段氏曰成昭皇后垂后後段氏垂后段氏字元妃遼西鮮卑光祿大夫段儀之女也少而婉慧有節操嘗謂其妹季妃曰我終不作凡人妻季妃曰妹亦不為庸夫婦隣人聞而笑之内黄人張定善相見儀二女大驚曰君家大興當由二女儀深異之至年二十餘而不嫁儀子倫謂儀曰張定何知而拒求者儀曰吾女輩志行不凡故且踟蹰以擇良配既而垂納元妃為繼室遂有殊寵及僭即帝位冊拜為皇后范陽王亦聘季妃姊妹皆為皇后卒如其言先段氏生子令寶元妃生子朗鑒愛諸姬生子麟農隆柔熙寶初為太子有美稱已而荒怠中外失望元妃嘗言于垂曰太子資質雍容柔而不斷遭承平之世足為神明之主今國步艱難恐非濟世之雄陛下託之以大業妾未見克昌之美遼西髙陽二王陛下之賢子宜擇一人付之趙王麟奸詐彊愎陛下一旦不諱必為國家之患此陛下之家事宜早圖之垂不悅寶善事垂左右左右多譽之故垂以為賢其後元妃又言之垂謂之曰汝欲使我為晉獻公乎元妃泣而退告其妹季妃曰太子不才天下所知吾為社稷計言之主上乃比吾為驪戎之女何其苦哉主上百年之後太子必喪社稷范陽王有非常器度若燕祚未盡其在王乎寶及麟聞之深以為恨及垂死寶嗣位使麟謂元妃曰后嘗謂主上不能嗣守大業今竟能否宜早自裁以全段宗元妃怒曰汝兄弟尚逼殺其母況能保守先業乎吾豈愛死但念國亡不久耳遂自殺寶議以元妃謀廢嫡統無母后之道不宜成喪羣臣咸以為然中書令眭邃颺言於朝曰子無廢母之義漢世安思閻后親廢順帝猶得配享太廟況先后曖昧之言虚實尚未可知宜依閻后故事寶從之乃成喪追尊諡曰成哀皇后其後麟果作亂寶亦被殺徳復僭稱尊號終如元妃之言寶后段氏寶后段氏遼西鮮卑人前將軍段璣之姑也初進為昭儀生子䇿字道符䇿於諸子中最少寶甚寵愛之封濮陽公年十二美姿貌而蠢弱不慧時寶冡嗣未定欲立太子而垂意屬於清河公會寶意不在會猶豫未決庶長子長樂公盛潛知之稱䇿堪為儲貳寶遂立䇿為太子立段氏為皇后後盛嗣位尊段氏為皇太后長樂二年冬十一月丁未卒諡曰惠德皇后追諡䇿曰獻哀太子盛妃蘭氏盛妃蘭氏尚書頓丘王蘭汗之女也寶為汗所殺盛馳進赴哀汗妻乙氏及盛妃皆涕泣請盛於汗妃復頓頭於諸兄弟汗惻然哀之遣其子迎盛舍於宫中親待如舊先是汗之當國也盛從寶出亡妃奉事丁氏愈謹及盛誅汗以妃當從坐欲殺之丁氏以妃有保全之功固爭之得免然終不得為后獻莊太妃丁氏太妃丁氏盛伯獻莊太子全之妃七兵尚書丁信之姑也盛即尊位尊為獻莊皇后尋進為皇太后及盛死羣臣共白丁氏以國家多難宜立長君而熙素得幸于丁氏遂命立熙後熙寵幸苻貴人丁氏怨恚詛呪與丁信密謀廢熙迎立章武公淵熙聞之大怒逼丁氏令自殺葬以后禮諡曰獻幽皇后熙昭儀大苻氏熙昭儀大苻氏故中山尹苻謨之長女也名曰娀娥納為貴人未幾進為昭儀熙甚幸之乃為昭儀鑿曲光海清涼池季夏盛暑士卒不得休息暍死者大半苻氏美而豔好微行游宴熙弗之禁也請謁必從刑賞大政無不由之俄而有疾龍城人王榮自言能療之未幾而卒熙忿榮之妄立於公車門支解而焚之偽追諡昭儀為愍皇后熙后小苻氏熙后小苻氏苻謨之幼女也名曰訓英納為貴嬪寵愛踰於其姊尋立為皇后后好游田熙從之北登白鹿山東過青嶺南臨滄海百姓苦之士卒為豺狼所害及涷死者五千餘人及熙伐髙句驪以苻氏從至於遼東為衝車地道以攻之城且陷熙曰待剗平寇城朕當與后乘輦而入不聽將士先登由是城内嚴備攻之不克熙乃引還又為苻后起承華殿髙承光一倍負土於北門土與穀同價宿衞典軍杜靜載棺詣闕上書極諫熙大怒斬之苻后嘗季夏思凍魚膾仲冬思生地黄皆下有司切責之不得則加之以大辟其虐也如此未幾苻后死熙悲號躃踊若喪考妣擁其尸而哭之曰體已就冷命遂斷矣於是僵仆氣絶久而復蘇大殮既訖復啟其棺而與之交接服斬縗食粥制百僚於宫内設位哭臨令沙門素服使有司案檢哭者有淚以為忠孝如其無也則加以罪羣臣震懼莫不含辛以為淚髙陽王隆妃張氏熙之嫂也美姿容有巧思熙將以為苻氏之殉欲以罪殺之乃毁其襚鞾中得敝氊誣以蠱呪遂賜死三女叩頭求哀熙不許制公卿已下至兵民户率營墓費殫竭府庫下錮三泉周輪數里内則圖畫尚書八座之象熙謂監作者曰汝等善為之朕將隨后入此陵矣識者以為不祥右僕射韋璆一作玲等並懼為殉沐浴俟命號苻氏墓曰徽平陵及葬熙被髪徒跣步從苻后喪轜車髙大毁北門而出長老竊相謂曰慕容氏自毁其門將不久也會中衞將軍馮跋等閉門作亂熙置后柩於南苑收髪貫甲馳還赴難攻其北門不克尋為跋等所殺及雲僭立熙與苻后共葬之於徽平陵十六國春秋卷五十一
