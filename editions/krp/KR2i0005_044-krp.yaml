body:
  text: 十六國春秋卷四十四後燕録二慕容垂中燕元年春正月乙酉朔苻丕大會賔客請農等不得始覺有變遣人四出求之三日知其在列人已起兵矣垂既濟河下令曰吾本外假秦聲内規興復亂法者軍有常刑奉命者賞不踰日天下既定封爵有差不相負也鳳及王騰段延聞垂濟河皆勸翟斌遣使推垂為盟主垂拒之曰吾父子寄命秦朝危而獲濟荷主上不世之恩蒙更生之惠雖曰君臣義深父子豈可因其小隙便懷二三吾本救豫州不來赴君君既建大事成享其福敗受其禍吾無預焉斯議何為而及於我垂欲襲據洛陽故見苻暉以臣節退且未審斌之誠欵故以此言拒之丙戌垂至洛陽暉閉門拒守不與垂通斌又遣長史河南郭通説垂垂猶未許通曰將軍所以拒通者豈非以翟斌兄弟山野異𩔖無奇才逺略必無所成故邪獨不念將軍今日憑之可以濟大業乎垂乃許之斌遂率衆會垂勸稱尊號垂曰新興矦國之正統孤之君也若以諸君之力得平闗東當以大義諭秦奉迎返正無上自尊非孤心也乃謀於衆曰洛陽四面受敵北阻大河至於控馭燕趙非形勝之便不如北取鄴都據之而制天下衆咸以為然引兵而東遣建威將軍王騰起浮橋於石門故扶餘王榮陽太守餘蔚及昌黎鮮卑衞駒各帥其衆來降農西招厙傉官偉於上黨東引乞特歸於東阿各帥衆數萬赴之衆至十餘萬丕遣石越率精騎討農皆勸農逆擊之農曰我無伏兵彼有鋭甲不如待暮一戰而擒之也至暮農鼓譟出陳遂大破之斬越及將士數百垂引兵至滎陽羣臣朝於清陽宫固請即尊垂以暐在長安依晉愍帝在平陽中故事遂以太元九年自稱大將軍大都督燕王承制行事令稱統府府置四佐王公已下稱臣文表奏疏封拜官爵一如王者以弟徳為車騎大將軍范陽王兄子楷為征西大將軍太原王翟斌為建義大將軍封河南王翟檀為柱國大將軍封𢎞農王餘蔚為征東大將軍統府左長史仍封扶餘王衞駒為鷹揚將軍鳳為建策將軍帥衆二十餘萬自石門濟河長驅向鄴庚戌至鄴改秦建元二十年為燕元年服色朝儀皆如舊章以前岷山公厙傉官偉為左長史前尚書段崇為右長史滎陽鄭豁等為從事中郎農等亦引兵會垂於鄴皆因其所稱之官而授之立寶為世子農為驃騎將軍麟為撫軍將軍隆為冠軍將軍紹為鎮南將軍陳留王溫為前將軍樂浪王宙為征虜將軍章武王又封從弟拔等十七人及甥宇文翰舅子蘭審皆為王其餘宗族及功臣封公者三十七人侯伯子男者八十九人可足渾譚集兵得二萬餘人攻拔野王亦引兵會鄴平幼及弟叡視亦帥衆數萬會垂於鄴苻丕聞之遣侍郎姜讓誚垂且説之曰往嵗大駕失據君保衞鑾輿勤王誠義邁蹤前烈宜述修前規終忠貞之節奈何棄崇山之功為此過舉過貴能改先賢嘉事宜深詳思悟今猶未晚也垂謂讓曰孤受主上不世之恩故欲安全長樂公使盡衆赴京師然後修復國家之業與秦永為鄰好何故闇於機運不以鄴城見歸也大義滅親況於意氣之顧公若逆而不反者孤當窮極兵勢耳今事已然恐單馬乞命亦不可得也讓厲色責之曰將軍不容於家國投命聖朝燕之尺土將軍豈有分乎主上與將軍風殊𩔖别臭味不同奇將軍於一見託將軍以斷金寵踰功舊任齊宗藩自古君臣際遇有如是之甚者耶方付將軍以六尺之孤託將軍以萬里之命奈何因王師小敗遽有異圖夫師起無名終則弗成天之所廢人不能支將軍起無名之師而欲興天所廢竊未見其可長樂公主上之元子也徳邁唐衞任居陜東為朝廷之維城寧可束手輸將軍以百城之地乎大夫死王事國君死社稷將軍欲裂冠毁冕拔本塞源者自可任將軍之兵勢奚更云云但惜將軍以七十之年懸首白旗髙世之忠忽為逆鬼竊為將軍痛之垂黙然左右勸垂殺之垂曰古者兵交使在其間犬固吠非其主何罪禮而遣之因遺書於丕又上表於苻堅曰臣才非古人禍生肘腋身當時難歸命聖朝陛下恩深周漢猥叨顧遇位為列將爵忝通侯誓在戮力輸誠常恐不及去夏桓沖送死一擬雲消迴討鄖城俘馘萬計斯誠陛下神筭之竒頗亦愚臣忘死之效方將飲馬於桂洲懸旌於閩會不圖天助亂徳大駕班師陛下單馬奔臣臣奉衛匪貳豈惟陛下聖明鑒臣單心皇天后土實亦知之臣奉詔北巡受制長樂然丕外失衆心内多猜忌令臣野次外庭不聴謁廟丁零逆豎冦逼豫州丕迫臣單赴限以師程惟給弊卒二千盡無兵仗復令飛龍潛為刺客及至洛陽平原公暉復不信納臣竊惟進無淮陰功髙之慮退無李廣失利之愆懼有青蠅交亂黑白丁零夷夏以臣忠而見疑乃推臣為盟主臣受託善始不遂令終泣望西京揮涕即邁軍次石門所在雲赴雖復周武之會於孟津漢祖之集於垓下不期之會實有甚焉欲令長樂公盡衆赴難以禮發遣而丕固守匹夫之志不達變通之宜臣息農收集故營以備不虞而石越傾鄴城之衆輕相掩襲兵陣未交越已隕首臣既單車懸軫歸者如雲斯實天符非臣之力且鄴者臣國舊都應即惠及然後西面受制永守東藩上成陛下遇臣之意下全愚臣感報之誠今進師圍鄴并喻丕以天時人事而丕不察機運杜門自守時出挑戰鋒戈屢交恒恐飛矢誤中以傷陛下天性之念愚臣此誠未簡天聴輙遏兵止鋭未敢窮攻夫運有推移去來常事惟陛下察之堅報曰朕以不徳忝承靈命君臨萬邦三十年矣遐方幽裔莫不來庭惟東南一隅敢違王命朕爰奮六師恭行天罰而𤣥機不弔王師敗績賴卿忠誠之至輔翼朕躬社稷之不隕者卿之力也詩云中心藏之何日忘之方任卿以元相爵卿以郡侯庶𢎞濟艱難敬酬勲烈何圖伯夷忽毁氷操柳惠倐為淫夫覽表惋然有慚朝士卿既不容於本朝匹馬而歸命朕則寵卿以將位禮卿以上賓任同舊臣爵齊勲輔㰱血斷金披心輸赤謂卿食葚懷音保之偕老豈意畜水覆舟養獸返害悔之噬臍將何所及誕言駭衆誇擬非常周武之事豈卿庸人所可論哉失籠之鳥非羅所羈脫網之鯨豈罟所制翹陸任懷何煩聞也念卿垂老老而為賊生為叛臣死為逆鬼侏張幽顯布毒存亡中原士女何痛如之朕之厯運興廢豈復由卿但長樂平原以未立之年遇卿於兩都慮其經略未稱朕心所恨者此焉而已壬子垂攻鄴抜其外郛丕固守中城闗東六州郡縣多送任請降癸丑垂以陳留王紹行冀州刺史屯廣阿二月垂引丁零烏丸之衆二十餘萬為飛梯地道攻鄴不拔乃築長圍守之分遣老弱於魏郡肥鄉築新興城以置輜重范陽王徳擊秦枋頭取之置戍而歸時東胡王晏據館陶為鄴中聲援鮮卑烏丸及郡民據塢壁不從者尚衆垂遣太原王楷陳留王紹討之王晏詣軍門降鮮卑烏丸塢民降者數十萬口楷等留其老弱置守宰以撫之發其丁壯十餘萬與晏俱詣鄴三月厙傉官偉帥營部數萬至鄴垂封偉為安定王夏四月垂遣樂浪王溫督諸軍攻信都不克丙辰遣撫軍將軍麟益兵助之垂以鄴城猶固會寮佐議之右司馬封衡請引漳水灌之垂從其議引水灌城不没者尺餘垂因行圍飲於華林園秦人密兵出擊矢下如雨幾不得出冠軍將軍隆將騎衝之僅而得免麟抜常山苻亮符謨皆降攻圍中山秋七月抜之執苻鑒麟威聲大振留屯中山垂遣寧朔將軍平視擊秦幽州刺史王永克之進據薊南是時翟斌恃功驕縱要求無厭又以鄴城攻久不下潛有二心太子寶請除之垂曰河南之盟不可負也若其為難罪由於斌今事未有形而殺之人必謂我忌憚其功能吾方收攬豪傑以隆大業不可示人以狹失天下之望也藉彼有謀吾以智防之無能為也范陽王徳陳留王紹驃騎將軍農皆曰翟斌兄弟恃功而驕必為國患垂曰驕則速敗焉能為患彼有大功當聴其自斃耳禮遇彌重斌潛諷丁零及西人請斌為尚書令垂詔羣僚議之安東將軍封衡厲色切諫垂猶隠忍容之下令曰翟王之功宜居上輔但臺既未建此官不可便置耳待六合廓清更當議之斌怒密與苻丕通謀使丁零夜決防潰水事泄垂殺斌及其弟檀敏餘皆赦之斌兄子真夜率其部衆北走邯鄲引兵還向鄴圍欲與丕内外相應垂令太子寶與冠軍將軍隆擊破之真還走邯鄲太原王楷陳留王紹言於垂曰丁零非有大志但寵過為亂耳今急攻之則聚屯為冦緩之則自散散而擊之蔑不克也垂從之八月真自邯鄲北走垂使太原王楷驃騎將軍農率騎追之甲寅及於下邑楷欲逆戰農曰士卒饑倦且視賊營不見丁壯殆有他伏楷不從進戰為真所敗真北趨中山屯於承營時鄴中芻糧俱盡削松木以飼馬垂謂諸將曰苻丕窮冦守死不降丁零叛擾乃我心腹之疾吾欲遷師新都開其逸路進以謝秦王疇昔之恩退以嚴擊真之備丙寅夜垂引師去鄴北鎮新城秦幽州刺史王永求救於振威劉庫仁庫仁遣妻兄公孫希帥騎三千救之平視敗奔薊南希長驅據唐城遂與撫軍將軍麟相持冬十月翟真在承營與公孫希等遥相首尾苻丕遣僕射光祚將兵數百赴中山與真相結又遣陽平太守邵興將騎數千招集冀州郡縣與祚期會襄國兵勢復振冀州郡縣皆觀望成敗趙郡趙粟起兵應興垂遣冠軍將軍隆龍驤將軍張崇將兵擊興命驃騎將軍農自清河引兵會之隆與興戰於襄國大破之追至廣阿遇農執之光祚聞之從西山遁還鄴隆進擊趙粟等皆破之冀州郡縣復歸於垂劉庫仁聞公孫希已破平視欲大舉兵救丕發雁門上谷代郡兵屯繁畤燕太子太保慕輿句之子文零陵公慕輿䖍之子常時在庫仁所知三郡兵不樂逺征因作亂夜攻庫仁殺之竊其駿馬奔垂公孫希之衆聞亂自潰十一月農自信都西擊丁零翟遼於魯口真之從兄也破之遼退屯無極農屯藁城以逼之十二月遂與麟合兵襲遼大破之遼單騎奔真農復攻破翟嵩於黄泥堡丕固守鄴城請援於晉垂怒謂范陽王徳曰苻丕吾縱之不能去方引晉師規固鄴都不可置也乃復進師攻鄴開其西奔之路燕二年春正月垂將有北都中山之意驃騎將軍農率衆數萬迎之羣僚聞暐為苻堅所殺勸垂即位垂以沖稱號闗中不許帶方太守王佐與寧朔將軍平視共攻薊城王永兵屢敗二月永使昌黎太守宋敞燒和龍及薊城宫室帥衆三萬奔壺闗佐等入薊農引兵會麟於中山共攻翟真農等先帥騎數千至承營觀察形勢真望見陳兵而出諸將欲退農曰丁零非不勇勁而翟真懦弱今簡精鋭望真所在而衝之真走衆必散矣乃邀門而蹙之可盡殺也使驍騎將軍國帥百餘騎衝之真走其衆争門自相蹈藉死者大半遂抜承營外郛時垂攻鄴久不下將北詣冀州命撫軍將軍隆屯信都樂浪王溫屯中山召驃騎將軍農還鄴於是逺近聞之以燕為不振頗懷去就農至高昌假從事中郎睦邃為髙陽太守㕘佐家在趙北者悉假署遣歸凡舉補太守三人長吏二十餘人翟真夜襲中山樂浪王溫擊破之自是不敢復至夏四月晉龍驤將軍劉牢之率衆救苻丕進至鄴垂逆戰敗績遂徹鄴圍退屯新城乙卯垂自新城北走牢之與沛郡太守田次之引兵追之丕發兵繼後一作進庚申追及於董唐淵垂曰秦晉瓦合相待為强一勝則俱豪一失則俱潰非同心也今兩軍相繼勢既未合宜急擊之牢之軍疾趨二百里至五橋澤中争趨輜重為垂所擊牢之敗績士卒稍亂徳及隆復迴軍要擊至於五丈原斬首數千級牢之䇿馬跳五丈澗得脫會丕救至因入臨漳招集亡散兵復少振垂與苻丕相持經年鄴中饑甚幽冀亦大饑人相食邑落蕭條垂之軍士多餓死乃禁民養蠶以桑葚為軍糧垂將北趨中山以驃騎將軍農為前驅前所假授吏眭邃等皆來迎候上下如初五月翟真去承營徙屯行唐真司馬鮮于乞殺真盡誅翟氏自立為趙王營人攻乞走之迎立真從弟成為主翟遼奔黎陽其衆多降於垂閏月庚戌垂至常山圍翟成於行唐命帶方太守王佐鎮龍城六月高句驪冦遼東垂平北將軍佐遣司馬郝景率衆救之為句驪所敗遼東𤣥莬盡没秋七月建節將軍餘巖叛自武邑驅掠四千餘人北趨幽州垂馳使敕幽州刺史寧朔將軍平視曰固守勿戰俟吾北破丁零當自討之視違命拒戰為巖所敗巖乘勝入薊掠千餘戸而去所過冦暴遂據令支癸酉翟成長史鮮于肆一作得斬成出降垂入行唐悉坑其衆八月苻丕棄鄴城奔於并州垂以兄一作弟子魯陽王和為南中郎將鎮鄴遣驃騎將軍農出蠮螉塞歴凡城趨龍城會兵討餘巖撫軍將軍麟冠軍將軍隆狥渤海執渤海太守封懿懿放之子也因屯歴口冬十一月繹幕人蔡匡據城以叛垂遣麟及隆共攻之太山太守任泰潛師救匡至匡壘南八里麟等覺之諸將以匡未下外敵奄至甚患之隆曰匡恃外敵故不時下今計泰之兵不過數千人及其未合擊之泰敗匡自降矣乃釋匡擊泰大破之斬首千餘級匡懼請降隆殺之且屠其壘農至龍城休養士馬十餘日諸將皆曰殿下之來取道甚速今已至此久留不進何也農曰吾速來者恐餘巖過山鈔盜侵掠良民耳巖才不踰人誑誘饑兒烏集為羣非有綱紀吾已扼其喉久將離散無能為也今此田善熟未收而行徒自耗損當俟收畢往即梟之亦不出二旬耳頃之農將步騎三萬攻令支巖衆震駭稍稍踰城歸附巖計窮力竭出城詣降農斬巖兄弟進伐髙句驪復遼東𤣥莵二郡還屯龍城上疏請繕修陵廟垂以農為使持節都督幽平二州北狄諸軍事幽州牧鎮龍城徙平州刺史帶方太守王佐鎮平郭先是幽冀流民多入高句驪農以驃騎司馬范陽龎淵為遼東太守招撫之麟攻王兖於博陵城中矢盡粮竭功曹張猗踰城而出聚衆應麟十二月麟抜博陵執兖及苻鑑殺之壬辰垂北如中山丙申遂定都於中山苻定據信都未下垂以從弟北地王精為冀州刺史帥衆討之是年造刀一口長三尺六寸銘其背曰威逺隸書十六國春秋卷四十四
