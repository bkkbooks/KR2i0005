body:
  text: 十六國春秋卷三前趙錄三劉聰中嘉平四年春正月辛未日隕於地又有三日相承出於西方而東行平陽地震崇明觀陷為池水赤如血赤氣亘天有赤龍奮迅而去流星起於牽牛入紫㣲龍形逶迤其光照地落於平陽北十里視之則有肉長三十步廣二十七步臭聞於平陽肉旁常有哭聲晝夜不止聰甚惡之延公卿已下問曰朕之不徳致有斯異其各極言勿有所隠一作諱廷尉陳元達及博士張師等進曰星變之異其禍將及一作行及臣恐後庭有三后之事亡國䘮家靡不由此願陛下慎之聰曰此隂陽之理何闗人事癸未劉后産一地一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉后卒乃失此肉哭聲亦止諡曰武宣自是嬖寵競進後宫無序矣夏四月聰以驃騎大將軍河間王易為太尉初置相國官上公有殊勲徳者死乃贈之於是大定百官置太師丞相自大司馬以上七公位皆上公綠綟綬逺遊冠置輔漢都䕶中軍上軍輔軍鎮衛京左右前後上下軍輔國冠軍龍驤虎牙十六大將軍營各配兵二千以諸子為之又置左右司隷各領户二十餘萬萬户置一内史凡内史四十三單于左右輔各主六夷十萬落萬落置一都尉省吏部又置左右選曹尚書竝典選舉自司隷以下大官皆位次僕射置御史大夫及州牧位皆亞公以子始安王粲為丞相領大將軍錄尚書事進封晉王食邑五郡江都王延年為錄尚書六條事汝隂王景為太師王育為太傅任顗為太保馬景為大司徒朱紀為大司空中山王曜為大司馬五月曜與趙染復攻長安六月曜進屯渭汭染進屯新豐晉征東大將軍索綝自長安將兵出拒之染狃於累㨗有輕綝之色長史魯徽諫曰今司馬鄴君臣自以逼僭王畿强弱不敵將致死拒我將軍冝整陳案兵擊之不可輕也困獸猶鬬况於國乎染曰以司馬模之彊我取之如拉朽索綝小豎豈能汚吾馬蹄刀刃邪晨帥精騎數百馳出擊之曰要當禽綝而後食乃與綝戰於城西染遂大敗單馬而歸悔曰吾不用徽言以至於此何面目見之也先命斬徽徽臨刑謂染曰將軍違謀取敗乃復忌前害勝誅戮忠良以逞愚忿猶有天地將軍其得死於枕席乎徽遂見殺曜染復與將軍殷凱率衆數萬向長安安夷䕶軍麴允逆戰於馮翊允敗收兵夜襲凱營凱敗被禽死之曜還攻河内太守郭黙於懐城收其米粟八十萬斛列三屯圍之欲使黙食盡饑死黙送妻子為質并請糴於曜糴畢復嬰城固守曜怒沈黙妻子於河而攻之黙遣弟芝求救於劉琨琨知黙狡猾留芝而緩其救黙更遣人告急會芝出城落馬使强與俱歸乃復遣芝質於石勒勒以黙多詐封黙書於曜黙使人伺得勒書欲突圍投李矩於新鄭矩使其甥郭誦迎之誦兵少不敢進會劉琨遣參軍張肇帥鮮卑范勝等五百餘騎詣長安黙時被圍道阻不通還過矩營矩謂肇曰黙是公家所授公家之事知無不為屠各舊畏鮮卑遂邀肇為聲援肇許之曜等望見鮮卑不戰而退誦潛遣輕舟濟河使勇士夜襲懐城大破曜軍黙遂率其屬歸矩與矩并力拒曜聰遣使謂曜曰今長安假息劉琨遊魂此國家所尤宜先除也郭黙小醜何足以勞公神略可留征虜將軍貝丘王翼光守之公其還也曜於是歸屯蒲阪秋七月趙染冦北地晉領軍將軍安夷䕶軍麴允率衆來拒染旦將攻城中弩而死冬十一月以晉王粲為相國大單于總百揆省丞相以并相國遂徵中山王曜輔政是時平陽地震烈風㧞樹發屋汾水大溢流漂數百家光義人羊充妻産子二頭其兄竊而食之三日而死建元元年春正月聰以太廟新成大赦境内改年建元三月雨血於左司隷寺覆地其月又雨血於東宫延明殿徹瓦在地者深五寸太弟乂惡之以問太傅崔瑋太保許遐瑋遐等說乂曰主上往日以殿下為太弟者欲以安衆心耳其志在晉王久矣王公已下莫不希㫖附之相國之位自漢魏以來非復人臣之官主上本發明詔置之為贈官今復以晉王居之羽儀威重踰於東宫萬機之事無不由之諸王皆置營兵以為羽翼事勢已去殿下不得立明矣然非徒不得立已也不測之禍厄在旦夕不如早為之計今四衛精兵不減五千餘營諸王皆年齒尚幼可奪而取之相國輕佻正煩一刺客耳大將軍無日不出其營可襲而得也茍殿下有意二萬精兵指顧可得鼓行入雲龍門宿衛之士孰不倒戈奉迎殿下者大司馬不慮其為異也乂弗從乃止夏四月東宫舍人荀裕告瑋遐等勸乂謀反乂不從之狀聰於是收瑋遐於詔獄假以他事殺之使冠軍或作冠威將軍卜抽將兵監守東宫禁乂不聽朝賀乂憂懼不知所為上表自陳乞為黔首并除諸子之封褒美晉王粲宜登儲副抽抑而弗通聰如䕶軍靳凖第納其二女為貴嬪大曰月光小曰月華皆國色也五月立月光為皇后青州刺史曹嶷攻汶陽闗公丘陷之殺齊郡太守徐浮執建威將軍劉宣齊魯之間郡縣壘壁降者四十餘所嶷遂略地西下祝阿平隂自鎮臨淄有衆十餘萬臨河置戍於是遂有雄據全齊之志石勒以嶷之懐貳也表請討之聰又憚勒之滅嶷不可復制弗許中山王曜濟自盟津將攻河南遂進攻李矩於滎陽矩遣將軍李平師於城臯曜覆而滅之矩懼送質請降聰以皇后靳氏為上皇后左貴妃劉氏為左皇后右貴妃劉氏一作月華為右皇后左司隷陳元達以三后竝立非禮也極言切諫聰不納乃以元達為右光祿大夫外示優崇實奪其權於是太尉范隆大司空呼延晏尚書令王鑒等皆抗表遜位以讓元達聰復以元達為御史大夫儀同三司中山王曜攻長安頻為王師所敗曜曰彼猶强盛弗可圖矣引師而還是月雨血於東宫宣光陵石人皆行數步宫中鬼夜哭三日而聲向右司隷寺乃止上皇后靳氏有穢行陳元達奏之聰不得已廢之靳氏慚恚自殺靳有殊寵聰迫於元達之諫故廢既而追念其姿色深仇元達六月大司馬中山王曜進攻上黨秋八月癸亥敗劉琨之衆於襄垣曜欲進攻陽曲聰遣使謂之曰長安擅命國家之深耻也宜以為先陽曲一委驃騎天時人事其應至矣公其亟還曜遂廻滅郭邁朝於聰還屯蒲阪平陽地震雨血於東宫廣袤頃餘九月聰使大鴻臚邊鴻賜石勒弓矢册命勒為陜東伯得專征伐拜刺史將軍守宰列侯盡嵗集上冬十月中山王曜進軍屯於粟邑遂攻北地晉愍帝以麴允為大都督驃騎將軍禦之曜進㧞馮翊馮翊太守梁肅奔萬年時百官饑乏採以自存愍帝屢徵兵於相國司馬保保左右皆曰蝮虵螫手壯士斷腕今胡冦方盛且宜斷隴道以觀其變從事中郎裴詵曰今虵已螫頭頭可斷乎保乃以鎮軍將軍胡崧行前鋒都督須諸軍集乃發麴允欲奉帝往就保索綝曰保得天子必逞其私志乃止曜進攻上郡上郡太守張禹奔於允吾於是闗右翕然所在應曜遂進據黄阜十二月聰武庫陷入地一丈五尺是年并州祭酒桓囘於途遇一老父問之云昔樂工成憑今居何職我與其人有舊為致清談得察孝廉君若相見令知消息囘問姓字曰吾吳郡麻子軒也言畢而失囘見憑具宣其意憑歎曰昔有此人計去世近五十年矣中郎荀彦舒聞之為造祝文令憑設酒飯祀於通衢之下麟嘉元年春正月中常侍王沉宣懐俞容中宫僕射郭猗中黄門陵修等皆寵幸用事聰乃立市於後宫與宫人讌戲或三日不醒或百日不出自去冬不視朝政事一委相國粲惟生殺拜除乃使沉等入白之沉等多不白聰率以私意决之故勲舊功臣或弗敘錄而奸佞小人有數日便至二千石者軍旅嵗興將士無錢帛之賞後宫之家賜賚及於僮僕動至數千萬沉等車服第舍皆踰於諸王子弟中表布衣為内史令長者三十餘人奢僭貪殘賊害良善靳準合宗内外諂以事之郭猗與準皆有憾於太弟乂謂相國粲曰太弟於主上之世猶懐不逞之志此乃殿下父子之深仇四海蒼生之重怨也而主上過垂寛仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下光文帝之世孫主上之嫡子凡在含齒孰不係仰萬機事大何可與人且臣聞太弟與大將軍謀因以三月上已大讌作亂事成許以主上為太上皇大將軍為皇太子乂又許衛軍為大單于二王已許之矣二王居不疑之地竝握重兵以此舉事事無不成臣謂二王兹舉禽獸之不若也背父親人人豈親之今又茍貪一切之利事成之後主上豈有全理殿下兄弟固不待言東宫相國單于當在武陵兄弟何肯與人也今禍期甚迫事淹變生宜蚤圖之春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啟主上主上性敦友于謂臣言不實以臣刀鋸之餘而䝉主上殿下成造之恩故不憚逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄宻表其狀殿下倘不信臣言可召大將軍從事中郎王皮及衛軍司馬劉惇假之恩顧通其歸善之路因以問之必可知也粲許之猗宻謂皮惇曰二王逆狀主上及相國具知之矣卿同之乎二人驚曰無之猗曰兹事已决吾憐卿親舊并見族耳因歔欷流涕皮惇大懼叩頭求哀猗曰吾為卿計卿能用之乎二人皆曰謹奉教猗曰相國問卿卿但云有之若責卿何不先啟卿即荅曰臣誠負死罪然仰惟主上寛仁殿下敦睦恐言成詿偽則陷於誣譖不測之誅故不敢言耳皮惇許諾粲召問之二人至不同時而辭若畫一粲以為信然初靳準從妹為乂孺子淫於侍人乂怒殺之屢以嘲準準深慚恚嘗說粲曰東宫萬機之副殿下宜自居之以領相國使天下早有所係至是準又說粲曰昔孝成拒子政之言使王氏卒成簒逆可乎粲曰何可之有準曰然誠如聖㫖下官急欲有所言矣但以徳非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之準曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟為變期以季春若使太弟得天下殿下無容足之地矣粲曰為之奈何準曰卒聞太弟為變恐主上必不信如下官愚意宜緩東宫之禁錮勿絶太弟之賔客使輕薄之徒得與交遊太弟雅好待士必不以此為嫌輕薄小人不能無迎合太弟之心為之謀者小人有始無終不能如貫髙之流也然後下官為殿下露表其罪殿下與太宰拘其賔客與太弟交通者考問之窮其事迹獄詞既具主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣粲然之乃命冠軍卜抽引兵去東宫二月聰出臨上秋閣誅特進綦毋達大中大夫公師彧尚書王琰田歆少府陳休左衛卜崇大司農朱誕等皆羣閹所惡也侍中卜幹泣諫曰陛下方隆武宣之化故使幽谷無考槃奈何一旦先誅忠良將何以垂之於後昔秦愛三良而殺之君子知其不霸以晉厲之無道尸三卿之後猶有不忍之心陛下如何忽信左右愛憎之言欲一日尸卿大夫七人皆國之忠良無乃不可乎詔尚在臣所未敢宣露乞垂昊天之澤廻雷霆之威藉使休等有罪陛下直欲誅之不暴明其罪何以示四海此豈是帝王三訊之意邪意或作法字願陛下熟思之因叩頭流血王沉叱幹曰卜侍中欲拒詔乎聰拂衣而入免幹為庶人太宰河間王易及大將軍渤海王敷御史大夫陳元達金紫光祿大夫西河王延等皆詣闕表諫曰臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟螣王化之蟊賊也故文王以多士基周桓靈以羣閹亡漢國之興亡未有不由於此自古明王之世未嘗有宦者與政武元安順豈足為故事乎今王沉等處常伯之位乃握生死予奪於中勢傾内外愛憎任之矯弄詔㫖欺誣日月内諂陛下外佞相國威權之重侔於人主王公見之駭目卿宰望塵下車銓衡迫之以勢選舉不復以實士因屬舉政由賄成多樹姦徒殘流海内知王琰等忠臣為國盡節懼其姦萌發露陷之極刑陛下不垂三察猥加誅戮怨感穹蒼痛入九泉四海悲惋賢愚傷懼沉等皆刀鋸之餘背恩忘義之𩔖豈能如士人君子感恩展效以荅乾澤也陛下何故親近之何故貴任之昔齊桓公任易牙而亂孝懐委黄皓而滅此皆覆車於前殷鑒不逺比年地震日蝕雨血火灾皆沉等之由願陛下割剪凶醜與政之流引尚書御史朝省萬機相國與公卿五日一入會議政事使大臣得極其言忠臣得逞其意則衆灾自弭和氣呈祥况今遺晉未殄巴蜀不賔石勒潛據趙魏曹嶷欲王全齊陛下心腹四支何處無患乃復以沉等助亂大政誅巫咸戮扁鵲臣恐遂成膏肓之疾後雖療之不可及已一作其如病何請免沉等官付有司定罪聰以表示沉等笑曰是兒等為元達所引遂成癡也寢之沉等頓首泣曰臣等小人過䝉陛下識㧞幸得備灑掃宫閤而王公朝士疾臣等如仇讐又深恨陛下願收大造之恩以臣等膏鼎鑊皇朝上下自然雍穆矣聰曰此等狂言恒然卿何足恨乎更以訪粲粲盛稱沉等忠清乃心王室聰大悅封沉等為列侯河間王易又詣闕上疏固諫聰大怒手裂其表三月易恚忿而死易素忠直元達倚之為援得盡諫諍及聞其卒哭之悲慟歸而自殺夏五月丁丑大司馬中山王曜冦上郡上郡太守韋藉率衆奔南鄭秋七月曜逼長安復冦北地北地太守麴昌告急於大都督麴允允次於黄白城遣兵來救曜聞之轉冦上郡允乃去黄白而軍於靈武以兵弱不進曜遂圍北地是時北地饑甚人相噉食羌酋大軍須運糧以給昌將軍劉雅擊敗之昌復遣使求救於允允帥步騎三萬來援去城數十里曜等繞城放火烟塵蔽天乃縱反間詐允曰郡城已陷焚燒向盡往無及也允信之衆懼而潰遂追戰於磻石谷允敗績奔靈武昌突圍赴長安北地遂陷初麴允告急於安定太守焦嵩嵩毒侮允曰須允困極當救之耳京都既陷嵩亦為曜所滅曜進至涇陽渭北諸城悉潰獲晉建威將軍魯充散騎常侍梁緯少府皇甫陽等曜素聞充賢募生致之既見因賜之酒謂曰吾得子天下不足定也充曰身為晉將國家䘮敗不敢求生若䝉公恩速死為幸曜曰義士也賜之劍令自殺梁緯妻隴西辛氏有美色曜既殺緯見辛氏將妻之使人扶取因據地大哭曰妾聞男以義烈女不再醮妾夫已死義不獨生且一婦人而事二姓明公又安用之也乞即就死下事舅姑遂號哭不止曜曰貞女也其任之亦自殺皆以禮葬之聰立樊氏為上皇后樊氏即故張后侍婢也時四后之外佩皇后璽綬者復有七人朝廷内外無復綱紀阿䛕日進賄賂公行軍旅所在饑疫相仍後庭賞賜動至千萬大將軍敷屢涕泣切諫聰不納怒曰爾欲速使乃公死乎何以朝夕生來哭人敷憂忿發病而死六月河東大蝗惟不食黍豆司隷靳準帥部民收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽饑甚民流叛死亡者什有五六石勒遣其將石越帥騎二萬屯於并州招撫流民一作撫懐叛者聰使黄門侍郎喬詩讓勒勒不奉命潛結曹嶷䂓為鼎峙之勢司隷部人奔於冀州者二十萬户秋七月犬與豕交於相國府門乂交於宫門又交於司隷御史門有豕著進賢冠升聰御坐犬冠武弁帶綬與豕竝升俄而鬬死殿上宿衛之人莫有見其入者而聰昏虐彌甚不知戒懼八月聰讌羣臣於光極殿引見太弟乂容貌毁悴髩髪蒼然涕泣陳謝聰亦對之悲慟乃縱酒極歡待之如初九月中山王曜逼長安内外斷絶晉鎮西將軍安定太守焦嵩平東將軍宋哲新平太守竺恢引兵來救散騎常侍華輯監京兆馮翊𢎞農上洛四郡兵東屯霸上皆畏曜兵强竝不敢進相國司馬保遣鎮軍將軍前鋒都督胡崧帥城西諸郡兵入援屯遮馬橋擊曜於靈臺破之崧恐國威復振則麴索勢盛乃帥城西諸郡兵屯渭北不進遂還槐里冬十月曜攻陷長安外城麴允索綝與公卿退守長安小城以自固時城中饑甚人皆相食死者大半逃亡不可復制惟凉州義衆千餘守死不移太倉有麴數十餅麴允屑之為粥以供帝膳至是復盡十一月帝泣謂允曰今窘急如此外無救援勢不自支死於社稷是朕事也朕念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意决矣因歎曰誤我事者麴索二公也使侍中宋敞紀事本末作宗敞奉牋降曜索綝乃潛留敞使其子說曜曰今城中食猶足支一嵗未易可尅也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未嘗以詭譎欺人一作敗人必窮兵極勢然後取之今索綝所說如是天下之惡一也輒相為戮之若審兵食未盡者便可勉强固守如其糧竭兵微亦宜早悟天命孤恐霜威一振玉石俱摧甲午敞隨使者至曜營乙未愍帝肉袒牽羊輿襯銜璧出降於東門羣臣號泣攀輿執帝之手帝亦悲不自勝御史中丞馮翊吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事虜賊乎乃自殺曜受璧焚襯使敞奉帝還宫初有童謡曰天子何在豆田中時王浚在幽州以豆有藿殺隠士霍原以應之及帝如曜營營實在城東豆田壁丁酉遷帝及司徒梁汾驃騎麴允奮威索綝等諸臣百餘人於其營辛丑至於平陽壬寅聰臨光極殿帝稽顙於前以為光祿大夫封懐安侯麴允伏地慟哭扶不能起聰大怒幽之於獄允發憤自殺聰聞其死嘉其忠烈贈車騎將軍諡節愍侯允金城人與游氏世為豪族西州為之語曰麴與游牛羊不數頭南開朱門北望青樓至是自殺聰以索綝不忠於本朝戮之於東市尚書梁允侍中梁濬散騎常侍嚴敦左丞相臧振黄門侍郎任播張偉杜曼及諸郡守竝為曜所殺華輯奔南山聰以曜為使持節假黄鉞大都督陜西諸軍事太宰秦王使相國粲告㨗於太廟大赦境内改元麟嘉十六國春秋卷三
