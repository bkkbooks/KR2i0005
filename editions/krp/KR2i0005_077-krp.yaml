body:
  text: 十六國春秋卷七十七蜀錄二李流李流字𤣥通特第四弟也少好學便弓馬東羌校尉何攀見而竒之稱流有賁育之勇舉為東羌督䕶及避地益州益州刺史趙廞甚器異之乃使庠収合部衆流亦招鄉里子弟得數千人及庠為廞所殺流從特安慰流民破常俊於緜竹平趙廞於成都朝廷論功拜奮威將軍武陽鄉侯特初承制以流為鎮東將軍居東營號為東督䕶常統鋭衆與益州刺史羅尚相持尚不能破特既見殺蜀人多叛流與特子蕩雄収集餘衆還於赤祖流自稱大都督大將軍益州牧保東營蕩雄保北營時荆州刺史宋岱率水軍三萬助尚次於墊江前鋒建平太守孫阜攻破德陽獲特所署太守任臧守將騫碩等退屯涪陵縣三月尚遣督䕶常深軍毗橋又遣牙門左汜黄誾何沖三道攻之進次繁城緜竹守將詣降涪陵民藥紳杜阿等亦起兵應尚流與其弟驤拒深使蕩雄拒紳何沖乘虚攻北營氐符成隗伯石定在營中叛應之攻蕩雄蕩母羅氏擐甲拒戰伯手刅羅傷其面晉書作目羅氏壯氣益烈時成伯戰於内沖等攻其外自晨至日中營垂欲破㑹驤破深柵深士衆星散蕩雄亦攻破紳各引兵還與沖等戰大破之成伯率其黨突出詣尚流等乗勝進抵成都尚復閉城自守蕩馳馬逐北為傁長矛所樁死朝廷復遣侍中燕國劉沈假節統益州刺史羅尚梁州刺史許雄等軍討流行次長安河間王司馬顒請留沈為軍師遣席薳代之流以特蕩繼死而岱阜將至甚懼太守李含又勸流降流將從之驤與雄迭諫不納夏五月流遣子世及含子胡為質於阜阜不許胡兄離為梓潼太守聞父舅欲降自梓潼馳還欲諫不及退與雄謀襲阜軍曰若功成事濟當為人主要三年一更一作約與君三年迭為主雄曰與君計雖定老子不從一作今計可定二翁不從將若之何離曰今當制之若不可制便行大事雖君叔父勢不得已老父在君夫復何言雄大喜乃共誘說六郡流民曰吾屬前已殘暴蜀民今一旦束手便為魚肉惟有同心襲阜以取富貴耳衆皆從之雄遂與離襲破阜軍死者甚衆㑹宋岱卒於墊江荆州軍退轉攻尚流慙其短大竒雄才軍事悉以任雄雄進攻尚軍尚保太城中六月雄從帛羊頹渡江攻殺汶山太守陳圖遂取郫城秋七月朔雄入據郫城流盡移營屯之三蜀百姓皆保險結塢或南入寧州或東下荆州城邑皆空野無烟火流虜掠無所得士衆饑乏惟涪陵民千餘家在江西依青城山處士范長生平西參軍涪陵徐輿說尚求為汶山太守欲邀結長生等與尚犄角討流尚不許輿怨之乃求使江西叛降於流流以輿為安西將軍輿說長生使資給流軍糧長生從之流軍得以復振九月流疾篤謂諸將曰驍騎髙明仁愛識量多竒固足以濟大事然前軍英武殆天所相可共受事於前軍以為成都王也遂死時年五十六諸將共立雄為主雄僭稱尊號追諡流曰秦文王以其子龍嗣李雄李雄字仲雋特第三子也母羅氏夢雙虹自地升天一虹中斷既而生蕩後羅氏因汲水忽然如寐又夢大蛇繞身遂有孕十四月而生雄常言吾二兒若有先亡在者必大貴蕩竟前死雄身長八尺三寸容貌魁偉少時廣漢太守辛冉見而竒之曰此相當貴又有術士相之曰此君將貴其相有四目如重雲鼻如飛龍口如方器耳如相望法為大貴位過三公不疑也雄少有烈氣每周旋鄉里識達之士皆器重之太康中有劉化者道術士也每謂鄉里曰闗隴之士皆當南移李氏子中惟仲雋天姿竒異有大貴之表終為人主也鄉里人多善之與叔父庠並以氣烈聞人争歸之特起兵於蜀稱益州牧承制以雄鎮梓潼拜前將軍流亦素重雄有長者之德每云興吾家者必此人也勅諸子尊奉之及流死雄自稱大都督大將軍益州牧都郫城乃募武都人朴泰鞭之見血使紿羅尚曰李驤與雄以饑餓孤危日鬭争相咎驤欲將民江西食糓若潜軍入郫城我為内應城可得也尚以為然大與金寶泰曰今事故未立效後取未晚也又求遣人自隨覘伺尚益信之悉出精兵使隗伯等將之從泰攻郫泰約舉火為應驍騎將軍驤於道設伏泰以長梯倚城而舉火隗伯兵見火起皆争緣梯上泰又以繩汲上伯軍百餘人皆斬之驤因縱兵内外逆擊大破之追奔逐北夜至城下詐稱萬嵗曰已得郫城矣入少城尚乃覺之退保太城隗伯創甚雄生獲之伯女為梁雙妻時雙為雄用故赦不殺既而復叛驤别攻犍為斷尚運道獲郡守龔恢恢先為天水西縣令任囘為吏囘問曰識故吏否恢曰識汝耳郡吏星散惟功曹楊渙侍衞囘謂渙曰卿義人也吾力恐不能救龔君不能免卿也宜早去渙曰背主求生何如守義而死遂并見殺雄以李溥為犍為太守初尚之在郫城也與雄攻戰郫令犍為張昕欽明每摧破雄雄衆戰之而昕等救助不能并心為雄所殺雄常言使羅尚將皆如張昕軰吾族早無遺矣時牙門左汜亦有戰功尚不益其兵糓汜甚恚恨以母喪歸尚累召不往尚怒曰微左汜當不復滅賊乎遂殺之雄聞汜死大小相賀冬十二月雄急攻尚尚糧運不繼軍士無食留牙門張羅固守尚委城由牛鞞水夜遁比雄覺去已逺倉卒失節鉞羅從後得之并獲資應乃開門納雄遂剋成都盡有其地雄軍甚饑餒率衆就糓於郪山掘野芋而食之蜀民流散東下江陽南陵七郡建興元年春正月羅尚迯至江陽遣使表狀詔尚權統巴東巴郡涪陵以供軍賦尚遣别駕李興詣鎮南將軍劉𢎞求糧𢎞綱紀以運道阻逺且荆州自空乏欲以零陵米五千斛與尚𢎞曰天下一家彼此無異吾今給之則無西顧之憂矣遂以三萬斛給之尚賴以自存雄以西山范長生有名徳為蜀民所重欲迎以為君而臣之長生固辭雄乃深自挹損不敢稱制事無巨細皆決於李國李離兄弟國等有智謀凡事必諮而後行然國離事雄彌謹楊驤楊珪等諸將固請雄即尊位遂以晉永興元年冬十月僭稱成都王即位於南郊大赦境内殊死已下改元建興除晉法約法七章以叔父驤為太傅庶兄始為太保折衝將軍離為太尉從弟建威將軍雲為司徒翊軍將軍璜為司空材官將軍國為太宰閻彧為尚書令楊褒為左僕射楊驤為右僕射楊發為侍中楊珪為尚書楊洪為益州刺史徐輿為鎮南將軍王達為軍師其餘文武拜授各有差追尊曽祖虎巴郡桓王祖慕隴西襄王父特成都景王母羅氏為王太后追諡世父輔為齊烈王仲父庠為梁武王仲父流為秦文王兄蕩為廣漢壯文公十一月羅尚移屯巴郡遣兵攻掠蜀中斬雄從祖冉獲驤妻昝氏及子夀等十二月太尉離寇漢中殺都戰帥趙汶轉寇梁州晏平元年春三月范長生自西山詣成都雄門迎執板延坐拜為丞相尊之曰范賢從弟置流子也以不陪列殺之夏六月長生勸雄稱尊號雄於是以晉光熙元年僣即皇帝位大赦境内殊死已下改元晏平國號大成華陽國志作國號太武晉載記作改年曰太武追尊父特為景皇帝廟號始祖母羅氏為皇太后秋七月遣太傅驤冦漢安冬十月加范長生天地太師封西山侯復其部曲不豫軍征租稅一入其家諸將恃恩互争班位尚書令閻彧上疏請考漢晉故事立百官制度雄從之是年造刀五百口銘其文曰騰馬隸書晏平二年春二月闗中一作秦州流民鄧定訇氐等二千餘家饑饉流入漢中保於城固漸為抄盜梁州刺史張殷遣巴西太守張燕帥牙門武肇漢國郡丞宣定討之鄧定窘急偽乞降於燕併餽金銀於燕燕喜為之緩師定又宻遣氐結雄夏五月雄遣太尉離太宰國司徒雲司空璜等帥衆二萬救之離等至先攻殷營營破次攻定又破之燕懼戰將百餘騎遁走離等大破州軍進次漢中逼之漢中太守杜孟治一作正沖又作正叔遣牙門蔡松覘離形勢松退告孟治曰州軍已破賊衆不可待也孟治懼護軍欲城守謂孟治曰賊來雖衆客氣之常奈區區有東南之偪必不分兵於外不過迎援定氐耳孟治曰不然雄冒稱帝王縱横天下以遣重衆必取漢中雖有牢城不可與戰是待冦也乃開門退走䕶軍北還孟治入大桑谷民數千家車數千輛一夜行纔數十里而梓潼荆子以父與孟治有隙合宗族子弟追之及於谷口孟治棄子走荆子追獲其子及吏民千餘家惟漢國功曹毌丘建荷擔杖曰吾雖不肖一國大夫國亡不能存終不属賊也餓死谷中孟治走至魏興張殷亦棄官而遁時晉材官將軍梁州刺史張光方欲赴州不得止於魏興乃㑹諸郡守共謀進取張燕倡言曰漢中荒敗迫近大賊克復之事當俟英雄孟治曰張燕受賊金銀不時進討阻兵緩冦致喪漢中寔燕之罪也光於是發怒呵燕令出斬之以狥離等攻陷南鄭引兵而還盡徙漢中民於蜀漢中民句方白落帥吏民還守南鄭雄復遣太尉離寇梁州晏平三年冬十二月尚書令楊褒卒先是南土頻嵗饑疫死者十萬餘計南夷校尉李毅曲加撫集雄攻之固守不降雄復誘建寧夷使為寇掠㑹毅病卒城陷殺壯士三千餘人送婦女千口於成都漢中流民逼李鳳寇掠東走荆沔時有白烏赤足來翔雄以問范長生長生曰烏有反哺之義必有逺人懐惠而來者果闗中流民相繼請降晏平四年冬十月太尉離據梓潼其部將略陽羅羨晉載記作天水張金茍訇琦等殺離及尚書令閻彧以梓潼歸羅尚尚遣平西叅軍向奮屯安漢之宜福折衝將軍張羅屯平無以逼雄雄帥太傅驤司徒雲司空璜攻奮不克雲璜力戰死之十二月琦等送離母子於尚尚斬之分其室晏平五年春正月太宰大將軍國鎮巴西帳下天水文碩殺國以巴西降羅尚夏五月雄引歸成都初譙周有子居巴西巴西太守馬脫殺之其子登詣鎮南將軍劉𢎞請兵以復仇𢎞無兵與之乃表登為揚烈將軍梓潼内史使自募巴蜀流民得二千人西上至巴郡從羅尚求益兵不得遂進攻宕渠斬馬脱剖其肝而食之梓潼降登登進據涪城雄自率衆攻之為登所敗張羅進據犍為之合水巴蜀為之語曰譙登治涪城文碩在巴西張羅守合水巴氐那得前冬十月羅尚卒太傅驤攻譙登於涪城益州刺史皮素次巴東勅平西將軍張順楊顯救登尚子宇及㕘佐素疾登不給其糧素怒至涪欲治其罪執事懐懼十二月素至巴郡宇使降人天水趙攀閻蘭等夜襲殺素建平都尉暴重殺宇及攀巴郡大亂不果救登驤知登食盡援絶攻涪愈急登固守不下士卒皆熏鼠而食餓死甚衆無一人離叛者驤子夀先在登所登乃遣之歸三府官屬表巴東監軍冠軍將軍南陽韓松為益州刺史治巴東玉衡元年春正月乙亥太傅驤攻拔涪城執登遂乘勝遣太保始督部將李鳳等進攻巴西討文碩殺之巴西梓潼復為雄有雄大恱大赦境内殊死已下改元玉衡譙登至成都雄欲宥之登詞氣慷慨涕泣唏嘘無復降臣折情雄乃殺之囚其軍士卑奴虜而連陰雨百餘日雄終以登為枉而所領無辜怨氣感天下赦出登軍士湮沒者二月氐符成隗文作亂宜都西上巴東雄衆攻棘道走犍為太守魏紀殺江陽太守姚襲三月氐隗文等反於巴東秋八月己亥梁州太守王鑒粗暴郡民毛深王騰及陰平都尉董沖逐出之遂以郡叛相率歸雄是嵗母羅氏卒雄姨弟任小受巴郡太守張羅募手刅雄頭雄幾死玉衡二年春正月流民楊武大略漢中吏民來奔梁州人張咸等起兵逐氐王楊茂搜茂搜去咸以其衆歸雄於是南徳漢嘉涪陵逺人相繼而至漢中之地皆為雄有遂分漢嘉蜀二郡立沈黎漢原二郡下寛大之令新附者悉假復除玉衡三年春三月西夷校尉向沈卒涪陵多疫癘蜀郡太守江夏鄭融宜都太守犍為楊芬西夷司馬巴郡常歆都安令蜀郡常倉𢎞等共推汶山太守蘭繼為西夷校尉時中原喪亂江東有事救援無所顧望融等率吏民北出枳欲下巴東雄遣李恭費黑邀擊獲之扶風鄧芝等各率流民前後數千家來歸玉衡四年春正月雄以鳳為征北將軍梁州刺史任囘為鎮南將軍南夷校尉寧州刺史㳟為征東將軍南蠻校尉荆州刺史雄虚已好賢隨才授任皆得其用益州遂定太傅驤養民於内鳳等招懐於外刑政寛和一作簡獄無滯囚興學校置史官其賦民男丁嵗糓三斛女丁半之疾病又半之户調絹不過數丈綿數兩事少役稀民多富實時天下大亂而蜀獨無事年糓屢熟乃至閭門不閉路不拾遺天水陳安舉隴右來降武都氐王楊茂搜奉貢稱臣杜􅋶自湘州遣使求援涼州刺史張駿遣使交好晉平夷太守朱提雷炤殺南廣太守孟桓帥二郡三千餘家叛降漢嘉夷王沖遣子為質頃之與建寧爨亮偕來歸附巴郡嘗告急云有晉兵雄曰吾嘗憂石勒跋扈琅邪微弱恐為侵逼以為耿耿不圖今日乃能舉兵使人欣然雄意在招懐逺方國用不足諸將每進金銀得官者朝無威儀爵位濫溢吏無祿秩取給於民軍無部伍號令不肅初僕射楊褒每切諫之雄不能改玉衡五年春正月立妻任氏為皇后玉衡六年雄復於陽闕更置墊江縣亦屬巴郡玉衡七年玉衡八年夏四月范長生卒以其子侍中賁為丞相冬十二月雄梁州刺史鳳在北屢立戰功雄兄蕩子稚在晉夀害其功大鳳以巴西叛太傅驤討之久住梓潼不敢進兵雄自至涪城督驤討鳳斬之以夀為前將軍都督巴西諸軍梁州刺史鎮巴西玉衡九年冬十月雄使征東大將軍恭及將軍羅演寇巴東玉衡十年春晉江陽太守廬州侯馥招降夷獠修繕舟艦為進取之計預白寧州刺史王遜請軍移牂牁太守謝恕俱出涪陵不能自前征東大將軍恭帥衆攻馥衆寡不敵為㳟所破獲生虜馥送雄雄下廷尉責之馥曰事君有死無二其次破家與國今縱不死又無益國灰沒其分守心而已無他顧望雄必欲臣之使馥同郡人張迎曉諭之馥怒罵迎曰吾等國亡不能存大難不能死低眉海内何面目相見也且王寧州治亂才也以吾有桑梓之恥故逺上尚書遣吾討賊受命之日實忘寢食但裁船未辦請軍未至牽揣不及為他所先當滅身隕碎以謝不及冀上不負日月下不愧王侯吾豈茍生如卿兒女之人乎迎還白雄雄義而赦之時雄衆寇所獲犍為太守建寧魏紀漢國太守梓潼文琰巴郡太守巴西黄龕永昌謝俊牂牁文猛皆區區稽顙無如馥者數年卒玉衡十一年氐王楊難敵及弟堅頭爲劉曜所破奔葭萌遣子入質玉衡十二年春二月隴西賊帥陳安復來歸附夏五月雄將張龍寇巴東建平太守栁純擊走之玉衡十三年春正月時晉太寧元年也雄遣太傅驤與鎮南將軍任囘冦臺登將軍司馬玟死之又分兵冦朱提越嶲二郡越嶲太守西夷校尉李釗漢嘉太守王載皆以郡叛降於驤夏五月驤等進軍由小㑹攻南夷校尉寧州刺史王遜遜使將軍姚嶽一作崇下同爨琛等悉衆拒之戰於螗螂一作堂狼驤軍不利又遇霖雨引還嶽追至瀘水士衆争濟溺水死者千有餘人嶽以道逺不敢渡水而還遜以嶽不窮追也大怒囚羣帥執嶽鞭之恚忿益甚髪上衝冠冠為之裂夜中而卒秋七月初氐王楊難敵奔葭萌趙主劉曜遣鎮西將軍劉厚追擊之難敵送任請降於雄雄安北將軍稚蕩之第二子也時守葭萌受其賂賄不送難敵於成都及趙兵退稚即遣還武都難敵遂據險不服稚自悔失計連白雄請討雄許之羣臣多諫雄不從遣稚兄侍中中領軍琀統稚攻難敵由白水道遣征東將軍夀與稚弟玝由陰平入二道討難敵難敵等先拒夀玝夀玝不得進而琀稚長驅至下辨大為難敵所破琀稚皆死死者數千人雄深自悔責以謝百姓玉衡十四年春正月雄后任氏無子將立蕩子班為太子雄有妾子十餘人羣臣咸欲立雄所生雄曰起兵之初舉手扞頭本不希帝王之業值天下喪亂晉氏播蕩羣情義舉志濟塗炭而諸君遂見推逼處王公之上本之基業功由先帝吾兄適統丕祚所歸恢懿明叡殆天所命大事垂成薨於戎陣朕常悼之且班姿性仁孝好學夙成必能負荷大任孫仲謀割有江東伯符兆基子止侯爵國志恥之宣公舍子立弟君子以為知人吾欲彌縫國志之恥以繼宣公之美太傅驤與司徒王達諫曰先王樹冢適者所以明定分而防簒逆誠不可不慎也吳子舍其子而立其弟所以有專諸之禍宋襄不立與夷而立穆公卒有宋督之變猶子之言豈若子也深願陛下思之雄不從竟立班為太子使任后母之驤退而流涕曰亂自此始矣冬十二月張駿遣㕘軍傅頴治中張淳修好於雄乃遺雄書勸去尊號稱藩於晉雄引見復書曰吾過為士大夫所推然本無心於帝王也貴州將令行河沙常所希冀進思為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室凌遲德聲不振引領東望有年月矣㑹獲來貺情在闇室有何已已知欲逺遵楚漢尊崇義帝春秋之義於斯莫大頴等還涼復命駿重其言使聘相繼建寧爨亮益州太守李逷梁州太守董慬以興古叛降於雄玉衡十五年玉衡十六年秋九月雄將張龍寇涪陵執太守趙俊晉帝紀作謝俊玉衡十七年春正月越嶲斯叟反寧州秀才龎遺起義兵應之攻圍鎮南將軍任囘及太守李謙等雄遣征南將軍羅恒費黑救之寧州刺史尹奉遣禆將姚嶽朱提太守楊術援遺戰於臺登嶽等敗績術力戰死夏四月斯叟破秋九月謙移郡民於蜀冬十月雄將張龍復寇涪陵涪陵太守巴西趙弼為龍所擒玉衡十八年玉衡十九年春雄以中原喪亂頻遣使朝貢欲與穆帝分天下先是張駿領秦梁遣傅頴來假道通表京師雄弗許至是年又遣治中從事張淳奉貢稱藩託以假道雄大悅謂淳曰貴主英名葢世土險兵強何不稱帝自娛一方淳曰寡君以乃祖乃父世濟忠良未能雪天下之深恥解蒼生之倒懸日昃忘食枕戈待旦以琅邪中興江東故萬里翼戴將成桓文之事何自娱之有邪雄有慙色曰我乃祖乃父本亦晉臣遭天下大亂與六郡流民避難此地為衆所推遂有今日琅邪若能中興大晉於中夏者亦當率衆附之耳乃厚禮而遣之淳遂通表京師玉衡二十年秋太傅驤死追贈相國諡曰漢獻王其子夀以喪還雄拜玝征北將軍梁州牧代夀又以太子班行撫軍將軍修晉夀軍屯尋拜夀為都督中外諸軍事大將軍領中䕶軍西夷校尉錄尚書總統如驤故事冬十月夀督征南將軍費黑征東將軍任邵攻陷巴郡太守楊謙退保建平夀别遣費黑冦建平建平監軍毌丘奥退屯宜陽一作宜都玉衡二十一年春正月夀引還遣任邵屯巴東雄以子越為車騎將軍屯廣漢秋七月夀攻陰平武都氐王楊難敵降之冬十月城涪縣玉衡二十二年秋七月丙寅雄遣大將軍夀冦寧州以征東將軍費黑為司馬與任攀等為前鋒由廣漢入又遣鎮南將軍任囘子調由越嶲征木落以分寧州之援冬十月夀黑至朱提朱提太守犍為董炳嬰城自守寧州刺史尹奉遣建寧太守霍彪大姓爨琛等引兵助之時夀已圍城欲逆拒彪黑曰料城中食少彪等雖至齎糧不多宜縱彪入城共消其糓猶嫌其少何為拒之夀以為然引兵而退彪等入城攻久不下夀欲急攻之黑曰南中險阻反亂難服當以日月制之待其智勇俱困然後取之溷牢之物何足汲汲也夀不從攻之果不克乃悉以軍事委黑自引而還玉衡二十三年春正月雄復遣大將軍夀等攻朱提朱提太守董炳及建寧太守霍彪皆詣軍門降威振南中一作十三郡三月寧州刺史尹奉舉州來降遷奉於蜀遂有南中之地雄於是大赦境内殊死已下以夀領寧州刺史復置南廣郡以興古太守朱提李播為太守秋七月建寧牂牁二郡謀叛夀復擊取之使班討平寧州夷以班為撫軍將軍玉衡二十四年春正月雄分寧州置交州以霍彪為寧州刺史爨琛為交州刺史封夀為建寧王三月夀還夏五月雄寢疾生瘍於頭召大將軍建寧王夀受遺詔輔政六月丁卯雄卒時晉成帝咸和八年也雄年六十一在位三十年偽諡武帝廟號太宗冬十二月丙寅塟安都陵太子班嗣十六國春秋卷七十七
