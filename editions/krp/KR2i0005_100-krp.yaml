body:
  text: 十六國春秋卷一百北燕錄三馮素弗馮素弗䟦之長弟也慷慨有大志姿貌魁偉雄傑不羣任俠放蕩不拘小節故時人未之竒也惟王齊見而異之曰撥亂才也惟結交時豪為務不以產業經懷弱冠自詣慕容熙尚書左丞韓業求婚業怒而拒之復求尚書郎髙邵女邵亦弗許南宫令成藻豪俊士也有高名素弗造焉藻命門者弗納素弗逕入與藻對坐傍若無人談飲連日藻始竒之曰吾逺求騏驥不知近在東隣何識子之晚也當世俠士莫不歸之及熙僭號為侍御郎小帳下督慕容雲時遷昌黎尹撫軍大將軍尋轉司隸校尉䟦僭偽位素弗所建之業居多進侍中車騎大將軍錄尚書事封范陽公加大司馬錄尚書如故改封遼西公身為宰輔謙虚恭謹非禮不動雖厮飬之賤皆與之抗禮車服屋宇務於儉約修已率下百僚憚之初為京尹及鎮營丘百姓歌之嘗謂韓業曰君前既不顧今將自取何如業拜而陳謝素弗曰既往之事豈復與君計之待業彌厚好存亡繼絶申㧞舊門問侍中楊哲曰秦趙勲臣子弟今安在乎哲曰皆在中州唯桃豹孫鮮在焉素弗乃召鮮為左常侍論者美其有宰相之度以䟦太平六年死䟦哭之哀慟比𦵏七臨馮萬泥馮萬泥䟦之從弟也初仕慕容雲為尚書令轉幽冀二州牧鎮肥如及䟦僭位署為驃騎大將軍幽平二州牧封廣川公萬泥抗表請代䟦曰猥以不徳謬為羣賢所推思與兄弟同兹休戚今方難未夷維城任重非明徳懿親孰克居之且折衝禦侮為國藩屏雖有他人不如我弟兄豈得如所陳也於是加開府儀同三司後與兄子乳陳反叛伏誅馮乳陳馮乳陳䟦從兄子也性甚麄獷勇氣過人慕容雲時仕至中軍將軍并州牧鎮白狼䟦之興建大業有功力焉及即偽位署為征西大將軍并青二州牧封上谷公乳陳與萬泥自以宗室至戚素有大功謂當入為公輔䟦以二藩任重久而弗徵並懷怨憾乃密遣人告萬泥曰乳陳有至謀願與叔父圖之萬泥遂奔白狼阻兵以叛䟦遣汲郡公𢎞與衞將軍張興帥步騎二萬討之𢎞先遣使諭之曰昔者兄弟乘風雲之運撫翼而起羣公以天命所鍾人望攸屬逼奉主上光踐寶位裂土疏爵當與兄弟共之奈何欲尋干戈於蕭牆棄友于而為閼伯過貴能改善莫大焉宜舍兹嫌同奬王室萬泥欲降乳陳按劍怒曰大丈夫生死有命決之今日何謂降也遂尅期出戰興謂𢎞曰賊明日出戰今夜必來襲擊我營宜命三軍以備不虞𢎞乃密嚴仍令人課草一束畜火伏兵以待之是夜萬泥乳陳果遣壯士千餘人來斫營衆火俱起伏兵邀擊俘斬無遺乳陳等懼而出降𢎞皆斬之馮崇馮崇𢎞之長子也嫡妃王氏所生封長樂公崇於兄弟中最長𢎞僭偽位立慕容氏為王后廢王氏不得立又黜崇令鎮肥如崇母弟廣平公朗樂陵公邈相謂曰今國家將亡大運有在人無知愚皆知之王復受慕容氏之譛吾兄弟死無日矣於是相與出奔遼西説崇降魏崇從之會世祖遣給事中王徳詣崇陳示成敗崇遂遣邈如魏舉郡乞降世祖復遣兼鴻臚李繼持節拜崇假節侍中都督幽平二州東夷諸軍事車騎大將軍領䕶東夷校尉幽平二州牧封遼西王錄其國尚書事食遼西十郡承制假授文官尚書武官征虜以下賜崇功臣爵秩各有差馬弗勤馬弗勤䟦之僭立署弗勤為吏部尚書封廣宗公初慕容熙之敗也工人李訓竊寶而迯貲至巨萬行貨於弗勤弗勤以訓為方略令既而失志之士書之於闕下碑遼西公素弗言之於䟦請免弗勤官仍推罪之䟦曰大臣無忠清之節貨賂公行於朝雖由吾不明所致弗勤宜肆諸市朝以正刑憲但大業草創彝倫未叙弗勤㧞自寒微未有君子之志其特原之李訓小人汚辱朝士可東市考竟於是上下肅然請賕路絶孫䕶孫䕶仕慕容氏為比部尚書累遷尚書左僕射䟦之潛至龍城也匿於其室及僭偽號署為侍中尚書令封陽平公䕶里有犬與豕交䕶見而惡之召太史令閔尚筮之尚曰犬豕異𩔖而交違性失其於洪範為犬禍將勃亂失衆以至敗亡明公位極冢宰遐邇具瞻諸弟並封列侯貴傾王室妖見里庭不為他也願明公戒盈滿之失修尚恭儉則妖怪可消永享元吉䕶黙然不悦昌黎尹孫伯仁䕶弟叱支叱支弟乙㧞等俱有才力以騎勇聞䟦之起兵勲力居多並冀開府不得遂有怨言毎於朝饗之際常㧞劍擊柱曰建興大業有殊功焉而滯於散將豈是漢祖河山之義乎䟦怒殺之於是進䕶左光祿大夫開府儀同三司錄尚書事以慰其心䕶自三弟誅後常怏怏有不悦之色䟦怒酖之姚昭姚昭䟦僭位元年署鎮南大將軍領司隸校尉封上黨公後為征南大將軍與皇甫執率兵拒魏魏以有備引還䟦之末年有飄風入於昭宅至司徒中山公𢎞宅而散昭家人問太史令閔尚尚曰風者天之號令所以吹塵去穢除奸慝之禍也君侯當修徳以禳之庶可以免禍昭不聴及𢎞簒立以昭為大司馬昭貪暴無已其子肇諫曰大人不聞飄風之怪乎亦不納未幾𢎞乃殺昭及子姪四十餘人蝚蠕斛律蝚蠕斛律䟦之婿本塞北夷也初遣使獻馬三千疋求婚於䟦䟦以樂浪公主妻之既而斛律將嫁女於燕斛律兄子步鹿真謂斛律曰幼女逺嫁憂思請以大臣樹黎等女為媵斛律不許鹿真出謂樹黎曰斛律欲以汝女為媵逺適他國樹黎恐與鹿真謀使勇士夜伏於斛律穹廬之後候其出而執之與女皆送於燕斛律至和龍䟦乃館之於遼東待之以客禮賜爵上谷公納其女為昭儀久之斛律上書請還塞北䟦曰今棄國萬里又無内應若以重兵相送則粮運難繼兵少則勢不能固不足成功且千里襲國古人為難况數千里乎斛律固請曰不煩大衆願給步騎三百足矣得達勅勒國人必欣然來迎䟦許之乃遣單于前輔萬陵率騎三百送之陵憚逺役至黑山殺斛律而還務銀提務銀提初仕慕容雲為司隸校尉遷尚書令以䟦太平元年署為上大將軍遼東太守封營丘公自以功在孫䕶張興之右而出為邊郡抗表具陳頗有恨言密謀外叛䟦怒殺之竇表竇表本扶風平陵人漢大將軍竇武之曾孫崇為遼西太守子孫因以居焉遂為遼西遼陽人父堪慕容氏時漁陽太守表仕𢎞為成周太守後竟歸魏子冏舉秀才早卒李崇李崇范陽人也祖產父績二世知名於慕容氏崇仕䟦吏部尚書石城太守魏世祖至和龍崇帥十餘郡歸降㳺幼㳺幼廣平任人也父鱓仕慕容熙樂浪太守幼仕䟦至廣平太守髙策高策遼東新昌人也仕䟦散騎常侍有功封新昌侯子育為𢎞建徳令孫敬仁孫敬仁字元和仕䟦為司隸功曹生二子苑尉有名於魏十六國春秋卷一百
