body:
  text: 十六國春秋卷九十六北涼錄三沮渠無諱沮渠無諱茂虔之次弟也封安彌縣侯為征西將軍沙州刺史都督建康以西諸軍事領酒泉太守茂䖍之敗無諱擁家戸西就從弟燉煌太守唐兒魏使弋陽公元潔守酒泉無諱使唐兒保燉煌自與弟張掖太守宜得攻酒泉元潔輕之出城與語為無諱所執潔所部相率固守遂攻㧞之進攻張掖魏遣撫軍大將軍永昌王健督諸將擊破之尋復率兵圍張掖不克退保臨松得四萬餘戸還據酒泉世祖不復加討但以詔諭之是時永昌王健鎮涼州無諱饑甚懼不自立欲引衆西行使中尉梁偉詣健求奉酒泉又送元潔及統帥兵士於健世祖遣兼鴻臚持節册拜無諱為征西大將軍涼州牧酒泉王世祖以無諱終為邊患遣鎮南將軍南陽公奚眷討酒泉無諱戰敗遂率衆萬餘家棄燉煌謀渡流沙遣弟樂都太守安周西擊鄯善鄯善王比龍懼欲降會魏使者至勸令拒守安周與戰連旬不克退保東城明年無諱將萬餘家棄燉煌西就安周未至鄯善王畏之將四千餘家西奔且末其世子乃從安周國中大亂無諱因據鄯善其士卒經流沙渴死者大半李寶自伊吾帥衆二千人據燉煌繕修城府安集故民初茂䖍之亡也涼州人闞爽據髙昌自稱太守寶舅唐契為柔然所逼擁衆西趣高昌欲奪其地柔然遣其將阿若追擊之契敗死契弟和収餘衆奔車師前部王伊洛時安周屯横截城和攻㧞之又㧞髙寧白力二城遣使請降於魏唐契之攻闞爽也爽遣使詐降於無諱欲與之共擊契無諱乃留安周住鄯善自率衆從焉耆東北趣髙昌比至契已死爽遂閉門拒之無諱怒遣部將衞興奴詐誘襲之遂屠其城爽奔蠕蠕無諱留屯髙昌時前部王伊洛世為東部落帥規欲歸魏無諱斷路伊洛與無諱連戰破之乃遣常侍汜雋奉表詣建康貢獻方物宋主詔曰往年狡虜縱逸侵害涼土河西王茂䖍遂至不守淪陷寇逆累世著誠以為矜悼次弟無諱克紹遺業保據方隅外結鄰國内輯民庶係心闕庭踐修貢職宜加朝命以褒篤勲可持節散騎常侍都督涼河沙三州諸軍事征西大將軍領䕶匈奴中郎將西夷校尉涼州刺史河西王未幾而卒其子乾夀代領部曲伊洛遣使前後招諭乾夀率户五百餘家奔於伊洛沮渠宜得魏書作儀徳沮渠宜得茂䖍之第六弟也封武興縣侯為征東將軍秦州刺史都督丹嶺以西諸軍事領張掖太守姑臧既陷世祖使鎮南將軍南陽公奚眷擊張掖宜得乃燒倉庫西奔酒泉奚眷復進攻酒泉㧞之宜得復収餘衆奔晉昌就唐兒於燉煌與兄無諱伐酒泉復據之世祖遂置守將戍張掖沮渠安周沮渠安周茂䖍之第七弟也封屋蘭縣侯為樂都太守初茂䖍之敗魏使鎮北將軍封沓擊樂都安周南奔吐谷渾封沓掠其民數千戸而去世祖復遣征南將軍奚眷討之安周遂率户五千人伐鄯善鄯善王比龍堅守不即下安周攻之益急鄯善王西奔且末遂與其兄無諱據鄯善及無諱卒安周乃奪其子乾夀兵規領部曲因而自立遣使詣建康入貢宋主詔曰故征西大將軍河西王無諱弟安周才略沈到世篤忠欵統承遺業民衆懷歸雖亡士喪師孤立異所而能招率殘寡攘寇自全宜加榮授垂軌先烈可使持節散騎常侍都督涼河沙三州諸軍事領西域戊己校尉涼州刺史河西王其後遂為蠕蠕所并沮渠唐兒沮渠唐兒茂䖍之從弟也為燉煌太守姑臧既破無諱收合遺民西就唐兒於燉煌唐兒拒而不納無諱乃留從弟天周守酒泉復與宜得引兵討唐兒唐兒將萬餘人出戰大敗為無諱所執殺之沮渠天周沮渠天周茂䖍之從弟也為武威太守唐兒被殺天周保據酒泉世祖遣鎮南將軍奚眷率兵圍之城中糧盡饑甚萬餘口皆餓死天周乃殺妻以食戰士食盡城陷為魏所執送於平城殺之俘獲男女四千餘人沮渠萬年沮渠萬年茂䖍兄子也姑臧未破之先萬年與祖率所領降魏及城陷沮渠宗族皆被殺惟萬年及祖以先降獲免拜萬年張掖王祖廣武公萬年後為冀定二州刺史復坐謀叛與祖俱賜死沮渠秉沮渠秉字季義蒙遜之幼子也仕魏為東雍州刺史險詖多詐志行不端後與河東薛安都潛結異謀世祖聞之召還付其兄弟扼而殺之沮渠安陽侯沮渠安陽侯者蒙遜從弟也失其名氏封為安陽縣侯故以侯稱為人强志疎通涉略書記初曇無䜟入河西闡𢎞佛法安陽侯乃銳意内典奉持五戒所讀衆經即能諷誦常以為務學多聞大士之盛業少時常渡流沙至于闐國於瞿摩帝大寺遇天竺法師佛䭾斯那咨問道義斯那本學大乘天才秀發誦半億偈明了禪師故四方諸國號為人中師子安陽從受禪秘要治病經因其梵本口誦通利既而東歸於髙昌得觀音彌勒二觀經各一卷及還河西即譯出禪要轉為漢文及魏并吞西涼乃南奔於宋晦志卑身不交世務常遊止塔寺以居士自卑初出觀音彌勒二經丹陽尹孟顗見而善之深加接賞後竹園寺慧濬尼尼姓陳山陰人復請出禪經安陽既通習積久臨筆無滯旬有七日出為五卷頃之又於鍾山定林寺譯出佛母般泥洹經一卷安陽居絶妻拏無欲營利從容法侣宣通正法是以黑白咸敬而嘉焉後以疾終䝉遜母車氏車氏不知何許人以䝉遜𤣥始元年立為王太后既而寢疾蒙遜昇南景門散錢以賜百姓因下書曰孤庶憑祖廟之靈乾坤之佑濟否剝之運會拯遺黎之毒一作荼蓼上望掃清氛穢下冀保寧家福而太后不豫涉嵗彌增將刑戮有濫衆有怨乎賦役繁重時不堪乎羣望不潔神所譴乎内省諸身未知罪之攸在可大赦殊死已下俄而車氏卒䝉遜哀毁過禮詳具䝉遜傳蒙遜妻孟氏孟氏武威人以䝉遜𤣥始元年立為王后孟氏有勇力䝉遜寢於新臺閹人王懷祖擊之傷其左足孟氏禽而斬之夷其三族茂䖍之敗隨入平城未幾而卒世祖詔以王太妃之禮葬之茂䖍妻拓䟦氏拓䟦氏魏世祖之妹武威公主也茂䖍先娶李暠女為婦永和五年魏遣奉常李順以公主妻之茂䖍遣右相宋繇奉表詣謝獻馬五百疋黄金五百斤繇又表請公主及茂䖍母后妃定號世祖使羣臣議之皆曰母以子貴妻從夫爵茂䖍母宜稱河西國太后公主於其國内可稱王后於京師則稱公主世祖從之後茂䖍淫於嫂李氏兄弟三人傳嬖之李氏與茂䖍姊共毒公主世祖遣解毒醫乘𫝊救之得愈遂徵李氏茂䖍不遣厚資給之使居酒泉及姑臧潰公主同茂䖍徙於平城為之築第以居之未幾茂䖍謀為叛逆詔於公主第賜死葬以王禮及公主卒詔與茂䖍合葬公主無男有女以國甥親寵得襲母爵為武威公主十六國春秋卷九十六
