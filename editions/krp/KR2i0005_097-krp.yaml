body:
  text: 十六國春秋卷九十七北涼錄四曇無䜟無一作摩䜟一作懴曇無䜟本天竺人六嵗喪父隨母傭織毾㲪為業見沙門法明道俗所崇豐於利養其母羡之遂以䜟為其弟子十嵗與同學數人誦呪聰敏出羣日萬餘言初學小乘兼覽五明緒論講說精辨莫能酧抗後得樹皮湼槃經本䜟讀之驚悟慚恨至年二十誦大小乘經二百餘萬言䜟從兄善調象騎殺所乘白耳大象王怒誅之令曰敢有視者夷其三族親屬莫敢往者䜟哭而葬之王怒欲誅䜟䜟曰王以法故誅之我以親故葬之並不違大義何為見怒傍人莫不為之寒心䜟神色自若王竒其志操赦而留之後隨王入山王渴須水不能即得䜟乃密呪石為出水因贊曰大王惠澤所感遂使枯石生泉隣國聞者莫不歎服是時雨澤甚調百姓稱詠王悅其道術深加優寵頃之王意稍怠待之漸薄䜟以久處致厭辭往罽賓賫大湼槃前分十卷并菩薩戒經菩薩戒本等彼國多學小乘不信湼槃乃適龜兹尋至姑臧止於傳舍慮失經本枕之而寢有人牽之在地䜟驚謂是盜者如此三夕聞空中語曰此如來解脱之藏何以枕之䜟乃慙悟置之髙處夜有盜者數過提舉不動明旦䜟持經去不覺為重盜者見之驚謂聖人悉來拜謝時蒙遜據有涼州自稱為王乃聞䜟名召與相見接待甚厚䝉遜素奉大法志在𢎞通欲請出經本䜟以未參土言又無傳譯恐言乖於理不許即翻於是學語三年遍曉華言方譯初本分為十卷沙門惠嵩道朗獨步河西值其宣出經藏深相推重轉易梵文嵩公筆受道俗數百人疑難縱横䜟臨機釋滯清辨若流兼富於文藻辭製華密朗更請廣出諸經次譯大集大雲悲華地持優婆塞戒金光明海龍王菩薩戒本等六十餘萬言猶以湼槃經本品數未足復還西域尋究值其母亡遂留嵗餘後於于闐更得經本中分還至姑臧譯之後又遣使于闐尋得後分於是續譯為三十三卷以𤣥始三年初就翻譯至𤣥始十年冬十月二十三日三方竟時魏泰常七年也䜟云此經梵本三萬五千偈於此方減百萬言今所出者止一萬餘偈䜟嘗告蒙遜曰有鬼入聚落必多灾疫䝉遜不信欲躬見之䜟即以術加䝉遜蒙遜見而驚怖䜟曰宜潔誠齋戒神呪驅之乃讀呪三日曰鬼已去矣境中有見鬼者云見數百疫鬼奔驟而逝境内獲安䝉遜益加敬事至承𤣥二年䝉遜濟河伐乞伏暮末於枹罕以世子興國為前驅為暮末所禽蒙遜大怒謂事佛無應即欲遣斥沙門五十已下皆令罷道䝉遜為母造丈六石像遂涕泣流淚䜟又極言切諫乃改心悔悟義和三年䜟因請西行尋湼槃後分䝉遜怒其欲去密圖害之偽以資糧遣發厚贈寶貨臨發之日䜟流涕謂使者曰業期至矣雖上聖不能逃非愛死而固欲相逺也以本有心誓義不能停比發果遣刺客於路殺之一云栲訊殺之時年四十九是嵗魏延和二年即宋元嘉十年也道進道進或作法進又云法迎本姓唐張掖人幼而精苦習誦有超邁之徳為蒙遜所重嘗從曇無䜟求授菩薩戒䜟曰當自悔七日乃來既而詣䜟䜟忽怒進曰此宿障也遂精修三年夢中感釋迦世尊為授戒法是夕十餘人同夢如進所見於是復詣䜟望見大喜曰善哉已感戒矣今為汝作證及䝉遜卒子景環為胡寇所破問進曰今欲轉略髙昌為可克否進曰必捷但憂災餓耳迴軍即定後三年景環卒弟安周立是嵗饑荒死者甚衆進屢從安周求乞以賑貧民國用稍竭遂不復求乃浄洗浴取刀鹽至窮窟饑人所聚處次第授以三歸便掛衣鉢著樹投身餓者前云施汝共食衆雖饑困義不忍受乃自割肉拄鹽以啖之兩肱肉盡心悶不能自割因語饑人云汝取我皮肉猶足數日存活若王使來必當將去但取藏之饑者悲悼無能取者須臾弟子皆至王使亦來舉國奔赴號呌相屬因輿還宫安周勅以三萬斛麥施饑者别發倉廪以賑貧民明日氣絶馬權馬權盧水胡人也雋爽有逸氣武略過人兄為涼將綦母翊所殺權後殺翊剖其肝而食之仕段業為門下侍郎甚見親重後業憚䝉遜雄武微欲逺之遂以權代為張掖太守權每輕侮蒙遜䝉遜亦懼而怒之乃譖於業曰天下不足慮惟當憂馬權耳業果信讒而殺之梁中庸梁中庸燉煌人也初仕段業為尚書右丞武衞將軍䝉遜進壁侯塢中庸率衆來奔因與房晷等共推蒙遜為涼州牧張掖公䝉遜署中庸為右長史遷西郡太守未幾奔西涼李暠䝉遜聞之笑曰吾與中庸義深一體而不相信但自負耳孤豈在此一人耶乃盡歸其妻孥暠問中庸曰我何如索嗣中庸曰未可量也暠曰嗣才度若敵我者我何能於千里之外挼長繩絞其頸耶中庸曰智有長短命有成敗殿下之與索嗣得失之理臣實未之能詳若以身死為負計行為勝則公孫瓚豈賢於劉虞耶暠黙無以應張穆張穆燉煌人也博通經史才藻清贍䝉遜克姑臧擢拜中書侍郎委以機密之任後䝉遜伐卑和虜率衆來降遂循海而南至於鹽池祀西王母於寺中有𤣥石神圖乃命穆為之賦銘之於寺前張譚張譚字元慶武威姑臧人也為和寧令政以徳化為本不務威刑民有過者誦孝經及忠臣孝子傳訓導之百姓愛之如父母號曰慈君隗仁隗仁䝉遜時任為沮渠漢平司馬乞伏熾磐率衆襲湟河漢平面縛請降仁勒壯士百餘據南門樓上三日不下衆寡不敵為熾磐所擒怒欲斬之散騎常侍段暉諫曰仁臨難履危奮不顧命忠臣也宜宥之以厲事君熾磐乃執之而歸在熾磐所五年暉又為之固請得還及至姑臧䝉遜執其手曰卿孤之蘇武也以為髙昌太守仁為政有威惠之稱然頗以愛財為失劉昞劉昞字彥明一作延明燉煌人初仕西涼李暠䝉遜克酒泉拜為秘書郎中專管註記䝉遜下令曰秘書郎中劉彥明學冠當時道先區内可授𤣥處光生之號拜以三老之禮築陸沈觀於西苑以居之躬往禮焉䝉遜嘗讌羣臣於逰林堂談論經傳顧謂昞曰仲尼何如人也昞曰聖人也䝉遜曰夫聖人者不凝滯於物而能與世推移畏於匡辱於陳伐樹削迹聖人固若是乎昞不能對䝉遜曰卿知其外未知其内昔魯人有浮海而失津者至於亶州見仲尼及七十二子逰於海中與魯人木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有羣燕數萬銜土培城魯侯信之大城曲阜既訖而齊寇至攻魯不克而返此所以稱聖人也昞學徒數百毎月䝉遜使人致以羊酒茂䖍尊為國師親自致拜命官屬以下皆北面受業焉張湛張湛字子然一字仲𤣥燉煌酒泉人魏執金吾恭九世孫也祖質仕涼位至金城太守父顯有逺略李暠據有西夏引為功曹甚器異之嘗稱之曰吾之臧子原也位至酒泉太守湛弱冠知名涼土好學能属文沖素有大志仕䝉遜黄門侍郎兵部尚書闞駰闞駰字𤣥陰燉煌人祖倞有名西土父玖為一時秀士官至會稽令駰博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳學者藉以通經撰十三州志行於世䝉遜甚器重之常侍左右訪以政治損益拜秘書考課郎中給文吏三十人典校經籍刋定諸子三十餘卷加奉車都尉茂䖍待之彌重拜大行遷尚書姑臧太守家甚貧敝不免饑寒性能多食一飯至三升乃飽卒無後胡叟胡叟字倫許安定臨涇人也世有冠冕為西夏著姓叟少聰敏年十二辨疑釋理知名鄉國孤飄坎壈未有仕路遂入漢中劉義隆梁秦二州刺史馮翊吉翰以叟才士頗相接引授叟末佐不稱其懷未幾翰遷益州叟隨入蜀多為豪雋所尚時沙門法成鳩率僧衆千人鑄丈六金像義隆惡其惑衆將加大辟叟聞之即赴丹陽啓申其美遂得免焉復還於蜀法成感之遺其珍物值直千金一作千餘疋叟曰緯蕭何人能棄明珠吾為徳請財何為也一無所受在益州五六年北至楊難當乃西入河西會䝉遜卒茂䖍遇之不甚加禮叟亦本無附之之意乃為詩示所知廣平程伯達其略云羣犬吠新客佞閽排疎賓直途既以塞曲路非所遵望衞惋祝鮀眄楚悼靈均何用宣憂懷托翰寄輔仁伯達見詩謂叟曰涼土雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰征之士貴主奉正朔而弗淳慕仁義而未允地僻陋而僭徽號居小事大寧若兹乎徐偃之轍故不旋踵吾之擇木夙在大魏與子暫違非久濶也嵗餘茂䖍果破降於魏叟既歸魏惟以酒自適謂其友金城宗舒曰我此生活似勝焦先矣年八十乃卒宗欽宗欽字景若金城人也父爕字文友吕光太常卿欽少而好學有儒者之風博綜羣言聲著河右仕䝉遜為中書郎世子洗馬上東宫侍臣箴甚見親重其箴曰恢恢𤣥古悠悠生民五材迭用經叙彝倫匡父維子弼君伊臣顛而能扶屈而能申昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改步是以令問宣流英風逺布及于三季道喪純遷桀起瓊臺紂醊糟山周滅妖姒羿喪以田險詖蔽乎耳目鄭衞陳乎其前怙非肆虐異端是纒豈伊害身厥𦙍殱焉茫茫禹跡畫為九區昆蟲鳥獸各有巢居雲歌唐后垂拱美虞疎網改祝殷道攸敷龍盤應徳隨蛇銜珠勿謂無心識命不殊勿謂理絶千載同符於昭儲后運應𤣥籙夕惕乾乾虚衿逺矚外撫幽荒内懷㷀獨猶懼思不逮逺明不遐燭君有諍臣廷立謗木本支克昌永符天祿微臣作箴敢告在僕欽在河西時撰涼記十卷記蒙遜事無足可稱欽弟舒字景泰仕䝉遜庫部郎中與欽同歸魏趙柔趙柔字元順金城人也少以徳行才學知名於河西常得人所遺金珠一貫價直數百縑覔其主還之仕茂䖍為金部郎中世祖平涼州隨之徙平城後仕魏厯郡守孫通孫通咸陽石安人仕䝉遜為中書舍人沮渠氏滅入魏因居北邊子騰貴顯王㮙王㮙不知何許人仕蒙遜為尚書郎送戎罽千疋銀三百斤轉張掖太守以黷貨聞索敞索敞字巨振燉煌人䝉遜時任為劉昞助教專心經籍盡能傳昞之業後以喪服散在衆篇遂撰比為喪服要記其名字論文多不載陰興陰興燉煌人也為劉昞助教與敞齊名以文學見舉毎見昞必巾衣而入鹿夀興鹿夀興濟陰乘氏人仕茂䖍為庫部郎世祖平涼州因隨入魏趙􆁄趙􆁄河西燉煌人善天文術算撰甲寅元厯一卷行於世十六國春秋卷九十七
