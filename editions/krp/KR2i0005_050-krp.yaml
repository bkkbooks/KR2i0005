body:
  text: 十六國春秋卷五十後燕録八慕容永慕容永字叔明廆弟運之孫也暐為苻堅所滅永隨暐徙於長安家貧夫妻常賣鞾於市以供衣食及堅之兵敗于晉也燕故大司馬中山王沖時為平陽太守其兄故濟北王泓時為北地長史各起兵據郡叛堅泓破秦兵于華澤而沖為秦將竇衝所敗沖奔子泓泓謀臣髙葢等以泓素望不如沖且持法太峻乃共殺泓立沖為皇太弟承制置百官以永為右僕射其明年進據阿房城稱帝改元更始沖少長尊貴及是復有自得之意而毒暴異常堅既出奔五將山沖入長安縱兵大掠死者不可勝紀遂據長安樂之忘歸且以垂之威名夙著跨據山東憚不敢進乃課農築室為持久之計衆咸怨之沖左將軍韓延及許木末因衆心不悅攻沖殺之立沖將段隨為燕王改元昌平初沖之入長安也王嘉謂之曰鳳凰鳳凰何不髙飛還故鄉何故在此取滅亡沖小字鳳凰故嘉云然永與左僕射慕容恒潛謀襲殺段隨立宜都王子顗為燕王改元建明率鮮卑男女四十餘萬口乘輿服御禮樂器物去長安而東于是長安空虚恒以永為武衞將軍恒弟䕶軍將軍韜陰有二志誘顗殺之于臨晉恒怒去之永與武衛將軍刁雲率衆攻韜韜遣司馬宿勒黎逆戰永執而戮之韜懼出奔恒營恒立沖之子瑶一作望為帝改元建平諡沖曰威皇帝衆悉去瑶奔永永執瑶殺之立泓子忠為帝改元建武忠以永為丞相太尉守尚書令封河東公永持法寛平鮮卑安之東至聞喜知垂已稱尊號託以農要弗進築燕熙城以自固刁雲等又殺忠推永為持節大都督督中外諸軍事大將軍大單于雍秦梁涼四州牧録尚書事河東王稱藩于垂既而遣使詣秦求假道東歸秦主丕弗許與戰于襄陵秦兵大敗遂進據長子僭即帝位改元中興悉誅儁及垂之子孫男女無遺轉寇河南河南太守楊佺期擊破之其後復率衆向洛陽豫州刺史朱序自河陰北濟與永偽將王次等相遇乃戰于沚水次敗走斬其部將勿支㕘軍趙睦江夏相恒不才追永破之於太行永退屯上黨時楊楷聚衆數千在湖陜聞永敗遣任子詣序乞降序追永至上黨之白水與永相持會垂破丁零翟釗於滑臺釗求救于永永不出救釗敗奔降于永垂遂攻永永率衆逆戰軍敗奔還長子垂復進軍圍之將士開門納垂兵垂兵入城永奔北門前驅執永數而戮之沖及永本稱西燕立國九年為垂所滅故附垂錄慕容令慕容令垂之世子母先段氏所生也垂為太傅評所忌恐其見害内以為憂而未敢告諸子令潛知之請曰尊比者如有憂色豈非以主上幼沖太傅嫉賢功髙望重愈見猜耶垂曰然吾竭力致命以破強寇本欲保全家國豈知功成之後反令身無所容汝既知吾心何以為吾謀令曰主上闇弱委任太傅一旦禍發疾于駭機今欲保族全身不失大義莫若逃龍城遜辭謝罪以待主上之察若周公之居東庶幾感悟而得還此幸之大者也如其不然則内撫燕代外懐羣夷守肥如之險以自保亦其次也垂曰善乃微服出鄴將趣龍城追騎及之會日暮乃止令謂垂曰本欲保東都以自全今事已泄謀不及設秦王方招延英傑不如往歸之垂曰今日之計舍此安之遂與令等奔秦詳具垂錄苻堅以垂為冠軍將軍復愛令等之才甚禮遇之每見必屬目王猛伐洛陽引令為參軍以為鄉導猛素勸堅除垂父子堅不從乃令人詭𫝊垂語于令曰吾已東還汝可為計也令疑之躊躇終日無所復審遂將舊騎奔樂安王臧於石門暐以令叛而復還其父為秦所厚疑為反間徙之沙城在龍都東北六百里令自度終不能免密謀起兵沙城中讁戍士數千人令皆厚撫之乃殺牙門孟媯城大涉圭懼請自效令信之引置左右遂帥讁戍士東襲威德城殺城郎慕容倉進據其城部署官屬遣人招東西諸戍翕然嚮應鎮東將軍渤海王亮鎮龍城令將襲之其弟麟以告亮亮閉城拒守涉圭因侍直擊令令單馬遁走其黨皆潰涉圭追令至薛黎澤擒而殺之詣龍城白亮亮為之誅涉圭收令屍而葬之慕容麟慕容麟垂之少子諸姬所生也素不為垂所愛垂之奔秦以麟嘗告變于燕立殺其母然猶不忍殺之置之外舍希得侍見垂殺苻飛龍麟屢進策啟發垂意於是竒之寵待同于諸子署為撫軍將軍垂既僭位進衞大將軍封趙王太子寶之守中山麟以尚書右僕射錄留臺尚書事是時丁零鮮于乞阻兵謀叛麟出討之悉擒其衆尋率騎會魏擊叛者拓跋窟咄敗之引還復率衆會魏討王敏于上谷斬之擊劉顯于彌澤破之後又擊破許謙徙其民於龍城復率衆會髙陽王隆擊王祖于魯口降之及寶參合之敗麟將慕輿嵩潛謀作亂欲奉麟為主事洩嵩等伏誅麟與寶自相猜疑既而寶即位魏攻圍中山麟屢撓戰計以致覆師後寶襲擊魏軍大敗而還麟遂作亂將妻子出奔寶敗于魏棄中山走麟尋襲殺開封公詳而自立于中山詳具寶錄為魏所敗奔至鄴勸叔父范陽王德稱尊號德以麟為司空領尚書令未幾謀反德殺之慕容農慕容農字道厚小字惡奴垂第三子也年九嵗問太史令黄泓曰俗稱參辰相見萬人相食各自一宿何為如是泓曰昔髙辛氏有二子長曰伯閼主辰次曰實沈主參日尋干戈自相征討後帝不臧使伯閼主辰實沈主參别而離之相見則爭故代傳言然農曰天有定宿以人甄之而成憎愛二子之前參辰何云泓不能對垂深竒之後隨父亡秦見秦之恃其強大宫室奢侈乃私言于垂曰自王猛之死秦之法制日以頽靡今又重之以奢侈殃將至矣圖讖之言行當有驗大王宜結納英傑以承天意時不可失也垂笑曰天下事非爾所及也及垂起兵攻鄴農與楷等為苻丕所留聞垂誅苻飛龍乃奔列人止于烏桓魯利家利為之置饌農笑而不食利謂其妻曰惡奴郎貴人也家貧無以饌之奈何妻曰郎有雄才大志今無故而來必將有異非為飲食來也君亟出逺望以備非常利從之農謂利曰吾欲集兵列人以圖興復卿能從我乎利曰生死惟郎是從農乃詣烏桓張驤說之曰王家已舉大事翟斌等咸相推奉逺近嚮應故來相告耳驤再拜曰得舊主而事之敢不盡死於是農驅列人居民為士卒斬桑榆為兵裂襜裳為旗使趙秋說屠各畢聰聰與屠各卜勝張延李白郭超及東夷餘和敕勃易陽烏丸劉大各帥部衆數千赴之農假張驤輔國將軍劉大安逺將軍魯利建威將軍農自將攻破館陶收其軍資器械遣蘭汗段讚慕輿悕略取康臺牧馬數千疋於是步騎雲集衆至數萬驤等共推農為驃騎大將軍監統諸軍隨才部署上下肅然農以垂未至不敢行賞趙秋勸農承制封拜以收衆心農從之赴者相繼垂聞而善之農西招厙傉官偉於上黨東引乞特歸於東阿北召光烈將軍平叡及叡兄汝南太守幼於燕國偉等皆應之又遣蘭汗等攻拔頓丘農號令嚴整軍無私掠士女喜悅苻丕使石越討之農曰越有智勇之名今不南拒大軍而來此是畏王而陵我也必不設備可以計取之衆請治列人城農曰善用兵者結士以心不以異物今起義兵惟敵是求當以山河為城池何列人之足治也越至列人西使趙秋及參軍綦母滕擊越前鋒破之參軍太原趙謙言於農曰越甲仗雖精人心危駭此易破也宜急擊之農曰彼甲在外我甲在心晝戰則士卒見其外貌而憚之不如待暮擊之可以必克令戰士嚴備以待毋得妄動越立柵自固農笑謂諸將曰越兵精士衆不乘其初至之銳以擊我方更立柵吾知其無能為也向暮農鼓譟出陳於城西牙門劉木請先攻越柵農笑曰凡人見美食誰不欲之何得獨請然汝猛銳可嘉當以先鋒惠汝木乃帥壯士四百騰柵而入越兵披靡農等大衆隨之越等大敗斬越及驍將毛當遂引兵會垂攻鄴垂使農東狥清河平原徵督租賦農明立約束均適有無軍令嚴整無所侵暴由是糓粟屬路軍資豐贍垂甚悅之既即尊位封遼西王尋為使持節都督幽平二州北狄諸軍事幽州牧鎮龍城農創立法制事從寛簡清刑獄省賦役勸課農桑居民富贍四方流民前後至者數萬餘口在龍城五年庶政修舉乃上表曰臣頃因征即鎮所統將士安逸積年青徐荆雍餘寇尚繁願時代還展竭微效生無餘力沒無餘恨臣之志也乃召農還轉侍中司隸校尉及還中山以農為都督兖豫荆徐雍五州諸軍事鎮鄴寶嗣偽位推為都督雍益并梁秦涼六州諸軍事并州牧移鎮晉陽魏兵來伐中山被圍日久將士皆思出城一戰而衞大將軍麟每沮其議農部將谷會歸說農曰城中之人皆涉珪參合所殺者父子兄弟泣血踴躍欲與魏戰而為衞軍所抑主上當北遷皆曰得慕容氏一人奉而立之以與魏戰死無所恨大王幸而留此以副衆望擊退魏軍撫寧畿甸奉迎大駕亦不失為忠臣也農欲殺歸而惜其材力謂之曰必如此以望生不如就死遂與寶等奔赴清河王會後會作亂夜遣壯士襲農農被重創骨破見腦寶手自裹創僅而獲濟進為左僕射尋拜司空領尚書令復以大司馬領中軍趣鄴次於乙連長上將士作亂為鬷讓所殺追諡曰桓烈慕容隆慕容隆字道興垂之中子也為冠軍將軍封高陽王後代農為都督幽平二州諸軍事征北大將軍幽州牧錄畱臺尚書事鎮龍城隆因農舊制修而廣之遼碣遂安參合之敗垂自欲率衆討魏乃召隆還隆引龍城之甲入中山軍容精整燕人之氣稍振是時燕兵新敗皆畏魏不敢進惟龍城之兵勇銳爭先寶嗣偽位以隆領尚書右僕射率兵討克平視于髙唐魏太祖攻常山隆拒守南郭帥衆力戰魏乃退及圍中山城中將士皆思出戰每為趙王麟所抑隆成列而罷者前後數四寶終不許諸將固請擊之隆退而勒兵召參佐謂之曰皇威不振寇賊内侮臣子同恥義不顧生今幸而破賊吉還固善若其不幸亦使吾志節獲伸卿等有北見吾母者為吾道此情也被甲上馬詣門俟命麟復固止隆涕泣而還寶欲走保和龍遼東髙撫善卜筮素為隆所信厚私謂隆曰殿下北行終不能達太妃亦不可得見若使主上獨往殿下潛留于此必有大功隆曰國有大難主上䝉塵且老母在北吾得北首而死猶無所恨卿是何言也乃徧召僚佐問其去畱惟司馬魯恭參軍成岌願從餘皆欲畱隆並聽之遂與寶等出走會軍引魏兵來躡其後會整陳力戰隆復率騎衝之追奔百里隆又獨追數十里而還謂故吏畱臺治書陽璆曰中山城中積兵數萬不得展吾意今日之㨗令人遺恨因慷慨流涕清河王會自以退魏之功矜狠日甚隆屢訓責之深懐忿恚夜遣壯士襲殺隆于帳下及會被殺寶槩封功臣追贈隆司空諡曰康子崇嗣慕容鳳慕容鳳字道翔宜都王桓之子也桓好修宫室時鳳年八嵗左右抱之隨桓周行殿觀桓謂之曰此第好否鳳笑謂其父曰此本石家諸王故第今王修之何足為好鳳因言曰今王之味一作膳兼列百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞桓時鎮遼東燕之亡為秦將朱嶷所殺鳳年十一但泣而不言嘗告其母曰昔張良養士以擊秦王復君之仇也先王之事豈可一日忘之遂陰有復仇之志鮮卑丁零有氣幹者皆傾身禮之與之交結權翼見而謂之曰兒方以才望自顯勿效爾父不識天命鳳厲色曰先王欲建忠而不遂此乃人臣之節君侯之言豈奬勸將來之義乎翼改容謝之言于苻堅曰慕容鳳慷慨有才氣但狼子野心恐終不為人用耳不如早除之無使貽後患堅不從及堅淮南之敗垂起兵濟河將趣洛陽鳳勸丁零翟斌奉垂為盟主斌遂率衆歸垂垂拜鳳為建䇿將軍垂既僭位襲父爵仍為宜都王轉冠軍將軍鳳每進戰奮不顧身前後大小二百五十七戰未嘗無功垂戒之曰今大業甫濟汝當先自愛使為車騎將軍之副以抑其銳垂克長子遂以鳳為雍州刺史鎮守之寶嗣偽位遷冀州刺史戍信都甚著惠威百姓懐之魏太祖來伐鳳踰城奔中山慕容温慕容温儁第四子也初封帶方王暐為苻堅所敗隨入長安及垂起兵攻鄴温亦引兵會之拜前將軍改封樂浪王尋遷征東將軍屯兵中山時中山兵力甚弱丁零四布分據諸郡温謂諸將曰以吾之衆攻則不足守則有餘驃驍撫軍首尾相應會須滅賊但應聚糧厲兵以俟時耳於是撫舊懐新勸課農桑民歸附者日月相繼郡縣壘壁爭送軍粮倉庫充溢屢出竒兵擊破翟真真不敢入境為寇遂大營宫室于中山極其壯麗又遣兵一萬運粮以餉垂及垂北如中山謂諸將曰樂浪王招流散實倉廩外給軍粮内營宫室雖古蕭何何以加之歴位司隸校尉尚書右僕射冀州刺史其後翟遼遣丁零故堤詐降於温為温帳下乙酉刺温殺之并其長史司馬驅帥守兵二百户奔西燕遼西王農邀擊刺温者於襄國盡獲之惟堤走免諡曰悼慕容楷慕容楷垂兄太宰恪之長子也與垂同避難於秦苻堅任為積弩將軍甚見寵遇建元末苻堅大舉入寇楷與其弟紹私言於垂曰主上驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之淮南之敗垂起兵向鄴楷為苻丕所留聞垂殺飛龍乃與弟紹同奔辟陽發兵應之拜征西將軍襲爵太原王時東胡王晏與鮮卑烏丸等阻兵不服垂遣楷與紹討之楷謂紹曰鮮卑烏丸及冀州之民本皆燕臣今大業始爾人心未洽所以小異惟宜綏之以德不可鎮之以威吾當止一處為軍聲之本汝巡撫民夷示以大業彼必聽從楷乃屯於辟陽紹率騎數百往說王晏為陳禍福晏隨紹詣楷降鮮卑烏丸及塢民降者數十萬口垂大悅曰汝兄弟才兼文武足以繼先王矣及丁零翟真叛走邯鄲楷率騎追之戰于下邑為真所敗垂即尊位遷左僕射及克東阿署為兖州刺史權鎮東阿垂率諸將攻翟遼復以楷為前鋒都督遼之故衆皆燕趙人聞楷至皆曰太原王子吾之父母也相率歸附遼懼遣使請降歴冀州牧進位司空以建興十年六月卒諡曰元子竒嗣竒見盛錄慕容紹慕容紹楷之弟恪次子也隨暐入秦任為陽平國常侍時秦封略既廣而征伐不息紹私於兄楷曰秦恃其強大務戰不休北戍雲中南守蜀漢轉運萬里道殣相望兵疲于外民困于内危亡近矣冠軍叔仁智度英拔必能恢復燕祚吾屬但當愛身以待時耳及堅淮南之敗垂起兵向鄴紹盜丕駿馬與楷奔於辟陽率衆會之垂以紹為鎮南將軍封陳留王後剋歴城青兖徐州郡縣壁壘多降以紹為青州刺史鎮之尋遷尚書右僕射參合之敗為魏所殺諡曰悼慕容會慕容會字道通寶第二庶子也建興初與其兄盛歸自長子封清河公未幾進爵為王歴位征北大將軍幽平二州牧會母賤而年長多材藝有雄略垂深竒之時寶國嗣未定垂每以為憂然已屬意于會矣寶之北伐使會代攝東宫事總錄禮遇一同太子及垂親率軍伐魏以龍城舊都宗廟所在復使㑹鎮幽州委以東北之任國官府佐髙選一時才俊以崇威望垂臨死顧命以會為寶嗣而寶寵愛少子濮陽公䇿意不在會長樂公盛又自以與會同年恥為之下乃稱䇿宜為儲貳而非毁會寶大悅訪於趙王麟麟復希㫖贊成之遂立䇿為皇太子會聞之心已愠懟寶詔會遣章武王宙徙髙陽王隆參佐家屬還中山會遂違詔多留部曲不時即遣宙年長屬尊會每事陵侮之見者知其有異志矣永康二年魏伐中山城中危急會表求赴難寶又詔會率幽州之衆入援會復稽留不進寶怒累詔切責月餘始發時有趙王麟之叛寶以會軍在近恐麟奪會軍先據龍城乃遣人迎之而自奔龍城會傾身納誘繕甲厲兵帥歩騎二萬列陣而進迎寶薊南寶怪會容止怏怏殊有恨色密造隆及農言之隆農俱曰會一年少專任方面習驕所致豈有他也臣等當以禮責之寶雖從之然猶詔解會軍分屬農隆二王是時魏兵追寶及于夏謙澤會言于寶曰臣撫教士卒惟敵是求今大駕䝉塵人思效命而虜敢自送衆心憤恨兵法曰歸師勿遏又曰置之死地而後生今我皆得之何患不剋若其捨去賊必乘人或生餘變寶乃從之會遂整陳逆擊魏兵魏兵大敗死者數千人會以退魏之功矜狠滋甚隆農屢訓責之益懐忿恚又以隆農嘗鎮龍城屬尊位重名望素出己右恐至龍城權政不復在己又知終無為嗣之望遂謀作亂幽并之兵皆懐會威德不樂屬二王請於寶曰清河王天資神武權略過人臣等與之誓同生死感王恩澤勇氣自倍願陛下與皇太子留駕薊宫使王統臣等進解京師之圍然後奉迎車駕寶左右皆惡會言于寶曰清河王不得為太子神色甚不平且其才武過人善收人心陛下若從衆請臣恐解圍之後必有衞輒之事寶乃謂衆曰道通年少不及二王豈可當專征之任且朕方親統六師仗會以為羽翼何可離左右也衆不悅而退左右勸寶殺會其黨侍御史仇泥歸聞而告會曰左右密謀如是主上將從之大王所恃者父也父已異圖所仗者兵也兵已去手進退路窮欲於何所自容乎盍若誅二王廢太子大王自處東宫兼領將相以匡復社稷此上䇿也會猶豫未決寶謂農隆曰觀道通志趣必反無疑宜早除之不然恐成大禍農曰今寇敵内侮中土分亂社稷之危有如累卵會撫鎮舊都安衆寧境京師有難萬里星赴其威名之重可以震服戎狄逆跡未彰宜自隱忍而遽相誅戮豈徒傷父子至恩亦恐大損威望寶曰道通逆志已成卿等仁慈不忍早殺恐一旦為變必先害諸父然後及吾事敗之後當思朕言至時勿悔自負也農隆固諫乃止會聞之益懼後寶宿廣栁黄榆谷會遣仇泥歸吳提染干等率壯士二千餘人分道襲農隆殺隆于帳下農被重創執仇泥歸逃入山中會以仇泥歸被執事終顯發乃夜詣寶曰農隆謀逆臣已除之寶意在誅會陽為好言以安之曰吾固疑二王久矣除之甚善會乃立仗嚴備引道欲棄隆喪建威將軍餘崇涕泣固請乃聽載隨軍農出自歸寶呵之曰何以自負耶命執之行十餘里寶顧召羣臣食且議農罪會就坐寶目左衞將軍慕輿騰使斬會傷其首不能殺會復走赴其軍勒兵攻寶寶率數百騎馳二百里晡時至龍城會遣騎追至石城不及復遣仇泥歸等攻龍城寶夜遣兵襲擊破之會遣使請誅左右佞臣并求為太子不許會盡收乘輿器服以後宫分給將帥署置百官自稱皇太子錄尚書事引兵向龍城以討慕輿騰為名頓兵城下寶臨西門會乘馬遥與寶語寶責讓之會命軍士向寶大譟以耀威武城中將士莫不憤怒向暮出戰大破之會兵死傷大半復走還營侍御郎髙雲夜率敢死士百餘人襲會敗之衆皆逃散會單馬奔至中山踰圍而入為開封公詳所殺寶殺會母及其三子慕容懿慕容懿太傅評之孫也為鎮西大將軍幽州刺史封上庸公出鎮肥如慕容雲之亂懿以令支奔降於魏魏以懿為征東將軍平州牧昌黎王後坐謀反伏誅十六國春秋卷五十
