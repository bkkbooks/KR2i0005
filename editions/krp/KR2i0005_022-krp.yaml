body:
  text: 十六國春秋卷二十二後趙錄十二張賔張賔字孟孫趙郡中山人也父瑶中山太守賓少好學博涉經史不為章句闊逹有大志一作節嘗謂昆弟曰吾自言智算鑒識不後子房但不遇髙祖耳為中山王帳下都督非其好也以病免歸永嘉之際天下大亂石勒為劉淵輔漢將軍與諸將下山東賓謂所親曰吾歴觀諸將多矣無如此胡將軍者可與共成大事乃提劍詣軍門大呼請見勒亦未之竒也後數以策干勒已而皆如所言由是竒之引為謀主動静咨之機不虚發算無遺策成勒之基業賓功居多及為右長史大執法封濮陽侯任遇優顯寵冠當時羣臣莫及而謙虚敬順開襟下士士無賢不肖造之者莫不得盡其情肅清百僚屏絶私昵以身帥物入則盡規出則歸美勒甚重之每朝必為之正容貌簡辭令呼曰右侯而不敢名勒常嘆曰吾每臨大事吾意未了右侯已了及卒勒親臨哭之哀慟左右贈散騎常侍右光禄大夫儀同三司諡曰景將𦵏送於正陽門望之流涕顧左右曰天不欲成吾事耶何奪吾右侯之早也程遐代為右長史勒每與遐議有所不合輒嘆曰右侯捨我去令我與此輩共事豈非酷乎因流涕彌日郭敬郭敬字季子鄔人也初勒微時敬常識之厚加資贍給以衣服東瀛公司馬騰執諸胡於山東賣充軍實勒亦在其中敬以勒託之族兄陽陽等時為解請得免饑寒及貴後率兵襲苑鄉斬乞活李悍於上白將坑其降卒見敬而識之曰汝郭季子耶敬叩頭曰是也勒下馬執其手泣曰今日相遇豈非天耶因賜衣服鎧馬署為上將軍悉赦降卒以配之尋遷荆州監軍使帥兵冦襄陽勒以驛書𠡠敬退屯樊城戒之使偃蔵旗幟寂若無人彼若使人觀察則告之曰汝宜自愛堅守後七八日大騎將至相禁不復得走矣敬使人浴馬於津周而復始晝夜不絶值諜還告晉南中郎將周撫撫以為勒軍大至懼而奔於武昌敬遂入襄陽軍無私掠百姓安之中州流民悉降於勒晉别將魏遐率其兄該部衆自石城降敬敬毁襄陽遷其百姓於沔北樊城以戍之遂署敬為荆州刺史汲桑汲桑平陽人一云清河貝丘人年二十餘力能扛百鈞呼聞數里時人服之常事成都王司馬頴頴之死也桑載頴棺於軍每事啓而後行與勒率馬牧人乗苑馬數百騎投公孫藩於清河藩死退還苑中更聚衆刼掠郡縣自稱大將軍劉淵永鳳元年桑又起兵趙魏上郡自稱趙王聲言為成都王頴報仇以勒為前驅所向輒克遂進攻鄴晉將茍晞撃敗之奔於樂陵為乞活田甄所殺先是洛中謡曰元超兄弟大落度上桑打椹為茍作至是而桑敗死桑嘗六月盛暑而重裘累茵使人扇之患不清凉乃斬扇者時軍中為之謡曰士為將軍何可羞六月重茵被衲裘不識寒暑斷他頭徐光徐光字季武頓丘人也父聰以牛醫為業光㓜好學有文才嘉平中王陽攻頓丘時年十三掠之而令主秣馬光但書柱為詩賦而不親馬事陽怒撻之光啼哭徹夜不止左右以白陽陽令召光付紙筆光立為頌陽竒之賜衣因以語勒勒授記室參軍光春耕服介幘青縑袴褶勒如苑鄉召光光醉不至勒以光物情所凑常不平之因此發怒退為牙門勒自苑鄉如鄴光侍直愠然攘袂振紛仰視不顧勒因而惡之讓光曰何負於卿而敢怏怏耶於是幽光并其妻子於襄陽國詔獄光在獄中註解經史十萬餘言劉曜進圍洛陽百餘日不解勒乃赦光署為叅軍召而問之光曰曜以疲卒十餘萬圍堅城今以我初銳撃其衰怠其勢必舉於是勒兵四出晝夜兼行六日行千里至洛陽與曜大戰執之尋遷中書令領秘書監光嘗勸勒除虎威權以安太子勒不聼及死虎總朝政以私憾殺之王洛生王洛生仕勒為部將王浚之執命洛生將五百騎送於襄國洛生性勇悍勒欲挫其雄豪幽之於獄洛生在獄自刺腹五寸肥盛不陷重以刀潰其腹出胃而死李陽李陽武鄉人也勒幼時與陽隣居相近陽性剛愎每嵗與勒争漚麻池共相打撲互有勝負勒既貴後召其父老悉赴襄國齒坐歡飲陽獨不来勒謂父老曰李陽壯士也孤方任之何以不来漚麻布衣之恨孤方崇信於天下寧仇匹夫乎乃使人召之既至引入言及平生酒酣牽陽臂曰卿雖老臂中由有力頗復與人鬭否孤往日數得卿尊拳卿亦數飽孤毒手中興書云宣陽肘曰卿年老臂中故有力不復與人鬬耶孤往日數厭卿老拳卿亦快得孤毒手因大笑賜里第一區即日拜奉車都尉除始興太守因下令曰武鄉吾之豐沛也萬嵗之後魂靈當歸之其復之三世張越張越上黨武鄉人勒之姊夫也仕勒為廣威將軍越與諸將蒲博勒親臨觀之戯言忤勒勒大怒叱力士折其脛而殺之王謨王謨字思賢甕鼻言不清暢容貌尫短畧無威儀將拜曲陽令勒疑之以問長史張賓賓曰請試可否勒從之由是政教修明百城尤最出為都部從事守令去官者十五人樊坦樊坦京兆人仕勒為參軍清慎自守擢章武内史入辭勒勒見坦衣服弊壊大驚曰樊參軍貧甚耶朝服何以壊惡至此坦性疎朴謬誤一作率然對曰頃遭羯胡無道資財蕩盡是以窮弊勒笑曰羯賊乃爾大膽暴掠君物盡耶今當相償耳坦大懼流汗不敢謝勒曰孤律自防俗士不闗卿輩老書生也因賜車馬衣服裝錢三百萬以勵貪俗恕而不罪徐龕徐龕太山人也勇果薄行舊為刼盗者無不歸之公行抄掠迅如風雨太興元年為晉太山太守周撫叛於寒山龕部將于藥斬撫及朝廷論功而彭城内史劉遐先之龕怒以郡叛自號安北將軍兖州刺史冦掠濟岱攻破東莞太守侯史旄而據其塢勒遣石虎伐之龕懼求降于晉元帝許焉既而復叛歸勒帝問將帥誰可討龕於王導導以太子左衛率羊鑒龕之州里冠族必能制之鑒深辭才非將帥郄鑒亦表鑒非可使導不從以鑒為征虜將軍征討都督督徐州刺史蔡豹臨淮太守劉遐武威將軍侯禮鮮卑段文鴦討之敗龕於檀丘龕遣使請救於勒并陳討豹之計勒辭以外難而多所邀求遂使王步都率數百騎為前鋒張景為之後繼步都等淫暴無厭龕甚患之景至東平龕疑其来襲己也乃斬步都等三百餘人復詣晉求降勒大怒命景守據險要帝亦惡龕反覆不受其降𠡠豹鑒以時進討鑒猶疑憚頓兵下邳不進鑒遂免官以豹代領其兵豹進據卞城欲以逼龕龕復降勒時石虎屯鉅平將以攻豹豹乃夜遁退守下邳龕襲豹輜重於檀丘將軍劉寵陸黨力戰而死未㡬龕復叛勒降晉勒復遣虎帥精騎四萬撃之龕堅守不戰虎築長圍守之城陷被執送於襄國勒囊盛龕於百尺樓自上㩧殺之命步都等妻子刳而食之桃豹桃豹字安步范陽人也少時以膽力勇騎聞於鄉里嘗攘臂大言曰大丈夫遭魏太祖不封萬戸侯位上將軍者非丈夫也時𩔖笑之豹罵曰爾輩䑕子安知君子豹變之意乎乃入中原為勒别將襲祖逖於蓬闗獲其督䕶陳超遂為十八騎之雄留守陳州故城住西臺豹事勒甚謹歴魏郡太守鎮撫都督轉豫州刺史虎僭立署為横海將軍累遷至太保卒張樓張樓陽平人也為臨水長嚴政酷刑殘忍無恵時人苦之為之謡曰陽平張樓頭如箱見人切齒劇虎狼魏豹魏豹字叔虎范陽人也累遷太山太守所在有治名豹嬖妾先死豹後守於廪丘而妾見形與豹言論翼日而卒張彌張彌字巨秦汲郡人也永嘉中與梁臣戍武徳城勒攻之城潰彌隨例當坑乃大呼曰官當活健兒何以殺也勒曰有何健兒而求活也彌曰武徳西城上大呼督戰時警備嚴設使賊不入正是張彌勒笑曰降兒能爾正是竒健乃赦之以為牙門將軍虎建武二年彌率衆一萬徙洛陽鍾簴九龍翁仲銅駝飛㢘於鄴鍾一没於河彌募浮没三百人入河繋以竹絙牛百頭轆轤引之乃出造萬斛舟載以渡之以四輪纒輞車轍廣四尺深二尺運至鄴都張謐張謐冀州人也美姿貌幼有逸氣太守陸雲見而異之謂儔侶曰吾聞冀州多名士故不虚也仕勒為司馬裴憲裴憲字景思河東聞喜人也父楷憲少而頴悟好交輕俠弱冠便折節嚴重修尚儒學足不踰國者數年陳郡謝鯤頴川庾凱皆雋朗士也見而竒之相謂曰裴憲鯁亮宏達通機識變不知其何如父至於深𢎞保素不以物累攖心其殆過之王浚假節承制以憲為尚書郎及浚為勒所破麾下精兵萬人棗嵩等争詣軍門謝罪饋賂交錯惟憲及從事中郎荀綽恬然私室獨不至勒素聞其名召而讓之曰王浚虐暴幽州人鬼同疾孤恭行乾罸一作憲拯兹黎庶討而誅之覉舊咸歡慶謝交路二君獨與之同惡傲威誠信阻絶防風之戮將誰歸乎憲神色侃然泣而對曰請就辟有司不拜而出勒深嘉之待以賔禮勒乃籍没將佐親戚家貲皆至巨萬惟憲綽家止有書百餘袠鹽米各十餘斛而已勒聞之謂長史張賔曰名不虚也吾不喜得幽州喜得二子以憲為從事中郎綽為叅軍憲復出為長樂太守及勒僭號遷尚書叅預機事時制度草創憲與王波為之撰朝儀典章文物擬於王者勒大恱署大中大夫進司徒憲又撰東耕儀中書令徐光奏議以東耕儀親耕宜改服幘勒從之虎彌加禮重憲有二子挹㲄竝以文才知名㲄仕虎為太子中庶子散騎常侍挹㲄俱豪俠躭酒好臧否人物與河間郝魚有隙魚竊乗㲄馬奔段遼為人所獲魚誣㲄使己以虎當襲鮮卑告之為備虎時適謀伐遼而與魚詞正合悉誅挹㲄憲亦坐免未㡬復以為右光禄大夫司徒太傅封安定郡公憲歴官無幹績之稱然在朝𤣥黙未嘗以物務經懐但以徳重名髙動見尊禮終于石氏之世傅暢傅暢字世道北地泥陽人也祖嘏魏太守父祗晉右僕射中書監暢年五嵗父友見而戱之解暢衣取其金環以與侍者暢不之惜即以賞之年未弱冠甚有重名永嘉之亂遂没于勒勒以為大將軍右司馬諳識朝儀恒居機要勒甚器重之作晉諸公叙讚二十卷又為公卿故事九卷行于世以勒建平元年卒續咸續咸字孝宗上黨人也性孝謹敦厚履道貞素好學師事京兆杜預専春秋鄭氏易教授常數十人博覽羣言髙才善文論又修陳杜律明達刑書永嘉中歴位廷尉東平太守劉琨承制并州以為從事中郎後没于勒勒以為理曹叅軍持法詳平國人稱其清裕比之于公著逺遊志異物志汲冢古文釋皆十卷行于世年九十七至虎世而死贈儀同三司張躍張躍字世淵清河武城人也學敏才達雅善清談勒偉其儀辨拜世子衛軍長史勑世子𢎞曰張長史人之表範汝其師之盧諶盧諶字子諒范陽涿人也祖珽晉衛尉卿父志魏郡太守永嘉初遷尚書諶清敏有理思善屬文好莊老洛陽既陷随父北依并州刺史劉琨為劉粲所虜粲據晉陽留諶為叅軍琨收散卒引魏穆帝攻粲粲敗諶得赴琨父母兄弟在平陽者俱為劉聰所殺建興末随琨投段疋磾疋磾自領幽州取諶為别駕疋磾既害琨尋亦䘮敗時江南阻絶往投段末波於遼西流離世故二十餘年虎破遼西復為所得以為中書侍郎國子祭酒侍中中書監屬冉閔誅石氏諶随閔軍於襄國為軍士所殺時年六十七諶名家子早有聲譽才行髙潔為一時所重每謂諸子曰吾身没之後但稱晉司空從事中郎耳撰祭法註莊子及文集行于世中原䘮亂公卿人士殺之殆盡惟諶與河東裴憲渤海石樸滎陽鄭系頴川荀綽清河崔恱北地傅暢中山劉羣竝淪陷非所終至顯官恒以為辱薛閭訓薛閭訓字祖明樂安人也仕晉為主簿後没于勒任為幽州刺史邴輔邴輔櫟陵人也好學多才藝巧思機智妙於當時襄國宮殿臺榭皆輔所營造勒恱之以為材官將軍申錄申錄字道時為廣昌令白鳥巢其庭樹甘露降其㕔事後仕至三公周延一作周雅又作周承周延仕至記室叅軍初為館陶令斷官絹數百疋下獄詔以八座議宥之後每設大㑹使俳優著㠹幘黄絹單衣一優問曰汝為何官在我輩中一優答曰我本為館陶令計二十數單衣正坐取是故入汝輩中以為大笑韋謏韋謏字憲道京兆人也雅好儒學尤善著述羣言秘要無不綜覽先仕劉曜為黄門郎後遂仕於虎署散騎常侍歴守七郡皆以清化著名徴為廷尉識者擬之于張前後四登九列六在尚書三為侍中再為太子太傅封京兆公好陳軍國之宜多見允納虎嘗微行謏直言切諌著伏林三千餘言遂演為典林二十三篇凡所著述及集記世事數十萬言皆深博有才義然性不嚴重每狥己之功論者亦以是少之嘗謂其子伯陽曰我髙我曽重光累徽我祖我考父父子子汝為我對正值惡抵伯陽曰伯陽之不肖誠如尊教尊亦正值軟抵耳謏慚無言時人傳之以為嗤笑冉閔之世進位光禄大夫時閔拜其子𦙍為大單于以降胡一千處之麾下謏諌曰胡羯皆我之仇敵今来歸附茍存性命耳萬一為變悔之何及請誅屏降胡去單于之號以防微杜漸閔方欲撫納羣胡聞之大怒收謏誅之其子伯陽亦遇害既而羌胡擾亂道路交錯閔思謏言追贈大司徒邢嘏邢嘏河間鄚人也隐居髙尚勒頻徴不至乃聚衆數百叛勒勒攻之嘏懼来降任為征北參軍嘏無子其姪蓋以旁宗入嗣宣咸宣咸隴西人仕虎至太僕卒于官後五年虎夢見咸涕泗囑其子奮曰非心慮所達也虎寤咸夢之言而有感問左右曰奮今何在左右對曰為趙郡守於是即擢拜廷尉轉為太常才力不及父遂因咸夢而登列卿郭穆郭穆字景通北平人仕晉為清河太守賜爵闗内侯後没於勒仕至輕車將軍沐堅沐堅字壁强河間人也初仕虎為小掾稍遷至寧北將軍沛王長史石氏之亂彭城王遵廢世自立沛王冲起兵于薊將以討遵乃留堅戍幽州堅時監作水田御下苛刻百姓怨毒乃為堅形以刃矛斫刺呪令倒斃尋而得病若被捶割於是遂殞張進張進元城屠各人也為刺奸外部都督給事舉刺不避豪右軍中憚之號曰張霹靂趙明趙明字顯昭南陽人也虎攝位拜為尚書及誅勒諸子明諌曰明帝功格皇天為趙之太祖安可以絶之虎曰吾之家事幸卿不須言也以直言忤㫖故十年不遷貞固之風時論常比之蘇則孟卓一作趙孟卓孟卓字君偉廣平人也少修清苦之操有一單裳十年不澣雖處困厄晏如也仕勒為右執法郎劉羣劉羣字公度中山魏昌人晉太尉廣武侯琨之子也随父在晉陽遭逢冦亂為偏軍將軍數從征討性清慎有裁斷得士衆心及琨被害與從事中郎盧諶等依末波虎滅遼西羣與内弟崔恱及盧諶等同時陷没虎皆優禮之署羣為中書令累遷秦州刺史尚書左僕射冉閔僭立加行臺都督尚書左僕射如故閔敗為燕所執遂遇害羣從弟啟啟弟述與羣俱在末波中後亦竝没于虎虎以啟為尚書僕射後歸仕晉從中軍殷浩北伐為姚襄所陷述為虎侍中随啟歸晉拜驍騎將軍王安王安本胡人也在雍丘祖逖甚愛之謂安曰石勒是汝種𩔖厚資遣之遂仕勒為左衛將軍約後為勒所殺安乃嘆曰豈可使祖士雅無後乎乃往觀刑竊取逖庶子道重匿之及石氏亡復歸江南陳武陳武字國武本胡人育於臨水令陳君陳君竒之起議欲易其故字武長跪自啟曰里語有之亭都鼠數聞長者謂今當易字寔有私心嘗聞長卿慕藺相如之行故字相如往往鄉里乆聞故老之說稱漢使蘇武執中守志不服單于流於漠北擁節牧羊寄秋雁以訴心因行雲而託誠髙山仰止意竊慕之陳君嘉其志遂名之曰武又欲令字仲顯其本是胡人而勒虎諱胡曰國因字之曰國武劉光劉光安定人也一云侯子光弱冠美姿儀自稱佛太子云從大秦國来當王小秦國易姓名為李氏一作子楊遊于鄠縣爰赤眉家頗見其妖怪事㣲有驗赤眉敬信之妻以二女轉相扇惑京兆樊一作綏經竺龍嚴謀謝樂子等衆至數千人聚於杜陽山僭稱大皇帝建元龍興赤眉與經為左右丞相龍諶為左右大司馬樂子為大將軍虎鎮西將軍石廣撃斬之光頸無血十餘日面色無異於生解飛解飛不知何許人仕虎為尚方令侍中御史機巧若神妙思竒發虎至性好佛衆巧奢麗不可勝紀飛嘗為虎作檀車廣丈餘四輪作金佛像坐於車上九龍吐水灌之又作一木道人恒以手摩佛心腹之間又十餘木道人長二尺餘皆被袈裟繞佛行當佛前輒揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止又有指南車及司理車又有舂車木人及作行碓于車上動則人蹋碓行十里成米一斛又有磨車置石磨于車上行十里輒磨一一作十斛此車皆以朱彩為飾唯用將軍一人車行則衆巧竝發車止亦止皆飛與尚方令朱猛變所造虎以其搆思精㣲賜飛爵闗内侯賞賜甚厚虎後又納飛言于鄴正南投石于河以起飛橋功費數千萬億橋竟不成役夫饑甚乃止孫輝孫輝字光休晉中書令顗之少子也顗避地河朔邑居武遂生輝輝仕虎射聲校尉其子緯字元文幽州都督緯生周字季冶後燕髙陽王文學輝兄烈避趙王倫之亂徙居昌黎遂稱昌黎孫氏烈生岳仕前燕侍中歴幽州刺史右將軍郭機𢎞𫝊作權郭機鄔譚部人也初降于勒勒問曰卿若得吾者當殺吾否機曰若登時得至尊必殺不疑也勒曰卿健兒也引為参軍與共言事後為河東王生前鋒將軍率鮮卑涉璝部衆二萬撃虎與虎將石廣戰於潼闗廣等敗績既而鮮卑密通于虎生遂敗死機將餘衆據上邽歸晉麻秋麻秋太原胡人也仕勒為征東將軍虎世為凉州刺史率衆伐凉互有勝敗秋植性虓險鴆毒有兒啼母輒恐之曰麻胡来啼聲遂絶冉閔之亂率衆奔鄴秦苻洪使子雄迎撃獲之以為軍師將軍因宴鴆洪為秦世子健所殺張才張才鄔譚部人也善碁博蹴踘鬬雞諸伎身長八尺飲酒石餘不亂歴位殿中將軍冀州刺史義陽王鑒殺遵自立復欲殺閔乃使才等于夜刺之不克被執斬于中華門蔡裔蔡裔仕虎振武將軍少有武力呼聲若雷嘗有盗入室裔撫床一呼賊衆皆殞時人憚之十六國春秋卷二十二
