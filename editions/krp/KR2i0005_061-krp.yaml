body:
  text: 十六國春秋卷六十一後秦録九吉成詵吉成詵南安人也建初元年萇攻拔秦州刺史王統羌胡應之者二萬餘户詵因進曰臣州人殷地險雋傑如林用武之國也王秦州不能收拔賢才三分鼎足而坐玩珠玉以至於此陛下宜散秦州金帛以施六軍旌賢表善以副鄙州之望萇善之擢為尚書郎萇與苻登累年相持左僕射尹緯尚書令姚晃謂詵曰苻登窮冦厯年未滅姦雄梟峙所在糾扇夷夏皆貳將若之何詵曰主上權畧無方信賞必罰賢能之士咸懐樂推豈慮大業不成氐賊不滅乎緯曰登窮冦未滅姦雄扇合吾等寜無懼乎詵曰三秦天府之國主上十分已有其八今所在可慮者苻登楊定雷惡地耳自餘𤨏𤨏焉足論哉然惡地地狹衆寡不足為憂苻登藉烏合犬羊偷存􅖍息料其智勇非至尊之匹霸王之起必有驅除然後克定大業耳昔漢魏之興皆十有餘年乃能同一海内五六年間未為久也主上神畧内明英武外發可謂無敵於天下取登有餘力願布徳行仁招賢納士厲兵秣馬以候天時如其鴻業不建者請腰斬詵以謝明公緯言之於萇萇大悅賜詵爵關内侯遷給侍黄門侍郎詵風韻秀發確然不羣毎以天下是非為已任京兆韋髙放浪不覊慕阮籍之為人居母䘮彈琴飲酒詵聞而嘆曰吾當私刄斬之以崇風教遂拔劔求髙髙懼而逃匿終身不敢見詵尹緯尹緯字景亮天水人也族人尹赤為襄司馬緯少有大志不營産業身長八尺腰帶十圍氣岸魁梧議論爽慨毎覽書傳至宰相立勲之際嘗輟書而嘆苻堅時以尹赤降襄諸尹皆禁錮不仕緯晩乃為吏部郎晉書作令吏風志豪邁郎皆憚之堅末年妖星見於東井緯知堅將滅心竊自喜踴躍向天再拜既而流涕長歎友人略陽桓識怪而問之緯曰天時如此正是霸王龍飛之秋吾徒杖䇿之日然知已難遭恐不得展吾才志是以欣懼交懐耳既而為萇别騎校尉萇如馬牧緯與尹詳龎演等扇動諸豪共推萇為盟主遷為右司馬及苻堅敗萇遣緯說堅求禪代事堅問緯曰卿於朕何官緯曰尚書郎堅嘆曰卿宰相之才王景略之儔也而朕不知亡也不亦宜乎緯性剛簡清亮慕張子布之為人馮翊段鏗性傾巧萇愛其博識引為侍中緯以為不可萇不從緯屢衆中辱鏗鏗心不平之萇聞而謂緯曰卿性不好學何為憎學者緯曰臣不憎學憎鏗不正耳萇曰卿好不自知毎比蕭何真何如也緯曰漢祖與蕭何俱起布衣是以相貴陛下起貴中是以賤臣萇曰卿實不及胡為不知緯曰陛下何如漢祖萇曰朕實不如漢祖卿逺蕭何故不如甚也緯曰漢祖所以勝陛下者以能逺段鏗之徒故耳萇黙然出鏗為北地太守萇死緯與興滅苻登成興之事業皆緯之力也厯位輔國將軍司隷校尉尚書左右僕射封清河侯友人隴西牛夀帥漢中流民歸興因謂緯曰足下平生自謂時明也才足以立功立事道消也則追二疏朱雲發其狂直不能如胡廣之徒洿隆隨俗今遇其時矣正是垂名竹素之日可不勉歟緯曰吾之所庶㡬如是但未能委宰衡於夷吾識韓信於覊旅以斯為愧耳立功立事竊謂未負昔言興聞而謂緯曰君與夀言何其誕哉立功立事自謂何如古人緯曰臣實未愧古人何則遇時來之運則輔翼太祖開晉書作建八百之基及陛下龍飛之始剪滅苻登盪清秦雍生極端右死饗廟庭古之君子正當爾耳興大悅及死興甚悼之贈司徒配饗於萇廟謚曰忠成侯趙遷趙遷天水人苻堅時仕洛州刺史南巴校尉慕容冲襲長安遷遂奔萇仕為尚書左僕射萇與羣臣宴酒酣言於遷曰諸卿皆與朕北面秦朝今忽為羣臣得無恥乎遷曰天不恥以陛下為子臣等何恥為臣萇大笑未㡬卒於長安及泓為劉裕所滅乃徙其子孫於建康薛辯薛辯字允白其先自蜀徙於河東之汾隂因以家焉遂為汾隂人祖陶一作濤與薛祖薛洛等分綂部落故號世薛父疆復代領部衆而祖洛子孫日以微劣疆遂總攝三營善於撫綏夷民歸之者甚衆厯石虎苻堅世常憑河以自固興既僭立遂歸仕興為鎮東將軍入為尚書辯㓜而雋爽倜儻多大畧關中豪傑多歸慕之疆卒辯襲統其營任為尚書郎建威將軍太子中庻子河北太守後稍憍慠頗失民心劉裕平泓遂舉營降胡辨胡辨凉州西河人為世大儒苻堅建元末東徙洛陽隨講授弟子千有餘人關中後進多往從之興勅關尉曰諸生咨訪道義修已勵身往來出入勿拘常限於是學者咸勸儒風遂盛辨少好學博綜經史風韻髙爽氣幹不羣嘗夜讀書以燭繼晝為世大儒索盧曜索盧曜燉煌人仕萇為騎都尉萇與苻登累年相持曜乃自請刺登萇曰卿以身殉難將為誰乎曜曰事成甚幸不成臣死之後深以友人隴西辛暹仰托明公萇遣之事發為登所殺萇厚加禮贈以暹為驍騎都尉王奚王奚不知何許人驍勇有膂力善騎射仕興為䕶羌校尉赫連勃勃入冦貳城奚聚衆三千屯於勅竒堡勃勃因進攻之短兵接戰奚為勃勃所傷退而自固勃勃復斷其水堡人窘廹執奚出降勃勃謂之曰卿忠臣也朕方與卿共平天下奚曰若䝉大恩速死為恵乃與所親數十人自刎而死狄伯竒狄伯竒天水人伯支之弟也仕為秘書郎中竒少遊獵曽得一豹見其文彩炳煥遂自感歎始學藝書獨擅其技時人莫及梁國兒梁國兒西胡人也膂力善騎射仕萇為鎮北將軍守忠不二身先士卒隨萇征伐前後屢有大功封平輿侯興嗣立進位侍中性尤曠逹不拘小節乃於平涼作壽冡毎將妻妾入冡飲讌酒酣升靈牀而歌時人或譏之國兒不以為意年八十餘而卒王滿聰王滿聰仕興為城門校尉興好遊畋常從朝門遊於文武苑及昏而還將自平朔門入前驅既至聰被甲持杖閉門拒之曰今已昏闇奸良不辨有死而已門不可開興乃迴從朝門而入明日召聰謂之曰卿社稷之臣也朕首嘉焉其進位二等司馬休之司馬休之字季預少仕晉清塗以功拜龍驤將軍襄城太守鎮厯陽桓𤣥率衆來攻休之力戰不克乃㩦子侄奔慕容超後還晉厯後將軍㑹稽内史都督荆雍梁秦寜益六州諸軍事平西將軍荆州刺史劉裕攻荆州休之時屯江陵以兵拒裕戰於江津敗績遂與雍州刺史魯宗之奔於秦興尋署休之為荆州刺史任以東南之事休之固辭請與魯宗之等擾動襄陽淮漢遂署為鎮軍將軍揚州刺史宗之等並有拜授休之將行侍御史唐盛言於興曰據符䜟所記司馬氏應復河洛今使休之擅兵於外既得躍鱗南翔恐非復池中之物也不如以髙爵厚禮留之京師不宜放之興曰昔文王卒免羑里髙祖不斃鴻門茍天命所在誰能違之司馬氏脫如符䜟之言留之適足為患遂遣之裕既平泓休之奔魏未至道卒韓延之韓延之字顯宗南陽赭陽人魏司徒暨之後也少以義烈著聞仕晉建威將軍荆州從事厯平西府録事叅軍自以世仕晉臣不臣劉氏以裕父名翹字顯宗遂自字顯宗名兒為翹後裕攻襄陽延之與司馬休之俱奔於秦興署為安逺將軍雍州刺史及裕入闗遂奔降魏裕招延之延之復書甚烈見晉書索稜索稜字孟則燉煌人也好學博文萇甚器重之委以機宻文章詔檄皆稜之文也後為平原太守以徳化民畏而愛之歌曰懿矣明守庶績允釐剖符作宰實獲我思興時為太常興以勃勃乾歸作亂西北傉檀䝉遜阻兵河右欲求重將鎮撫二方而難其人遂以稜為太尉領隴西内史綏誘西秦政績既羙乾歸感而歸之未㡬稜以隴西之衆降於熾磐茍和茍和略陽人征北將軍齊公恢之舅也泓時仕為立節將軍恢阻兵謀叛諸將多有應之者惟和守忠不二泓召而謂之曰衆人咸懐去就卿何能自安耶和曰若天縱妖賊得肆其逆節者舅甥之理不待奔馳而加親如其罪極逆消天盈其罰者守忠執志臣之體也違親叛君臣之所恥泓善其忠加金章紫綬趙𤣥趙𤣥天水人也仕泓為寜朔將軍立志忠誠善撫士卒陳留公洸鎮洛陽𤣥時為部將晉遣檀道濟來伐師至城臯𤣥因說洸曰今晉冦益深人情駭懼衆寡勢殊難以應敵宜攝諸戍兵士固守金墉以待京師之援不可出戰戰若不捷大事去矣金墉既固師無損敗晉終不敢越金墉而西困之於堅城之下是我不戰而坐收其敝也洸司馬姚禹及主簿閻恢楊䖍等與道濟濳通嫉𤣥守正咸共毁之言於洸曰殿下以英武之畧受任方面今嬰城示弱得無為朝廷所責乎洸以為然遣𤣥帥精兵千餘南守柏谷塢𤣥泣謂洸曰𤣥受三帝重恩所守止有死耳但明公不用忠臣之言為姦孽所誤後必悔之恐無及耳未㡬道濟等長驅而進𤣥與龍驤司馬毛徳祖戰於柏谷衆寡不敵為徳祖所敗被十餘創據地大呼𤣥司馬騫鑒冐刃抱𤣥而泣𤣥曰吾創已重君宜速去鑒曰若將軍不濟當與俱死去將安之皆死於陣孫讚孫讚咸陽石安人仕泓為安定䕶軍赫連勃勃來侵人懐危懼亡奔相屬讚獨率衆拒守城䧟為勃勃所殺徐衆徐衆本羌氐泓之女婿也長安既破衆率其餘黨連營叛走鎮西中兵叅軍寜逺劉營祖與擅道濟等攻營破之斬首俘馘不可稱計十六國春秋卷六十一
