body:
  text: 十六國春秋卷七十二前凉録三張駿張駿字公庭一作彦寔之世子永嘉元年生幼而竒偉建興四年封霸城侯十嵗能属文卓越不覊而滛縱過度常夜微行於邑里國中化之及統任年十八先是愍帝使者黄門郎史淑侍御史王冲在姑臧左長史汜褘右長史馬謨等諷淑冲令拜駿使持節大都督大將軍領䕶羗校尉凉州牧西平公大赦境内置前後左右四率官繕南宫劉曜又遣使拜駿上大將軍凉州牧凉王冬十二月凉州别將隴西辛晏阻兵於枹罕不服駿讌羣臣於閑豫堂遣武威太守竇濤等率兵討之從事劉慶諌曰霸王不以喜怒興師不以乾沒取勝必須天時人事相得然後乃起辛晏父子安忍凶狂其亡可待奈何以饑年大舉猛寒攻城乎昔周武廽戈以須亡殷之期曹公緩袁氏使自斃何獨殿下以旋兵為恥也駿納之乃止駿遣參軍王隲聘於趙劉曜謂之曰貴州必欲追蹤竇融欵誠和好卿能保之乎隲曰不能曜侍中徐邈曰君來結好而云不能保何也隲曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵丘之㑹驕而矜誕叛者九國趙國之化常如今日可也若政教陵遲尚未能察邇者之變况鄙州乎曜顧謂左右曰此凉州之君子也擇使可謂得人矣册府元龜作此凉州髙士使乎得人矣乃厚其禮而遣之太寧三年春正月駿猶稱建興十二年親耕藉田二月始承元帝凶問大臨三日㑹有黄龍見於揖次之嘉泉左長史汜禕言於駿曰案建興之年是少帝始起之號帝以凶終理應改易朝廷越在江南音問隔絶宜因龍興改號以章休徴駿不從辛晏以枹罕來降拜為䕶軍復有河南之地咸和元年冬十二月駿懼為劉曜所逼使將軍宋輯魏纂將兵徙隴西南安二千餘戸於姑臧復遣使修好於成主李雄咸和二年夏五月駿聞劉曜為後趙石勒所敗乃去曜官爵復稱晉大將軍凉州牧遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等帥衆數萬東㑹將軍韓璞自大夏攻掠秦州諸郡曜遣子南陽王劉𦙍率歩騎四萬迎擊屯於狄道枹罕䕶軍辛晏告急秋七月駿使韓璞辛巖救之璞進渡沃干嶺辛巖曰我握衆數萬藉氐羗之鋭宜速戰以滅之不可以久乆則變生璞曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可輕動輕動不㨗為禍更深吾將乆而斃之且劉曜與石勒相攻𦙍必不能乆與我相守也乃與𦙍夾洮相持積七十餘日軍粮竭乏冬十月璞遣辛巖督運於金城劉𦙍聞之大悦謂其將士曰韓璞之衆十倍於我羗胡皆叛不為之用吾粮廩將懸難以持乆今虜分兵運粮此天授吾也若敗辛巖璞等自潰彼衆我寡宜以死戰戰而不㨗當無疋馬得還宜厲爾戈矛竭汝智力士衆咸奮於是使冠軍將軍呼延那鷄率親御郎三千絶其運路𦙍自率騎三千襲巖於沃干嶺敗之遂潜逼璞營璞軍大潰死者二萬餘人面縛歸罪駿曰孤之罪一作過也將軍何辱皆赦之𦙍乗勝追奔濟河攻㧞令居斬首二萬級進據振武河西大震駿遣皇甫該禦之金城太守張閬枹罕䕶軍辛晏帥其衆數萬降𦙍遂失河南之地咸和三年秋九月雨水大赦境内㑹劉曜東討石勒長安空虚大蒐講武將襲秦雍理曹郎中索詢諌曰曜雖東征其子𦙍猶守長安險阻路遥為主人甚易𦙍若輕騎憑氐羗以拒我者則奔突難測輟彼東合而逆戰者則冦我未已頃年頻出戎馬生郊外有饑羸内資虚耗豈是殿下子物之謂耶駿曰毎患忠言不獻面從背違吾政教缺然而莫我匡者卿盡辭䂓諌深副孤之望也以羊酒禮之咸和四年春正月趙太子熈一作毗聞曜為石勒所擒大懼與南陽王𦙍等率衆奔上邽諸征鎮皆委城奔潰咸和五年夏五月駿因曜之亡復收河南地至於狄道置武衛石門侯和漒川甘松五屯䕶軍與石勒分境六月勒稱天王遣鴻臚孟毅拜駿征西大將軍凉州牧加五一作九錫之命駿恥為之臣不受留毅不遣初駿之立也姑臧謡曰鴻從南來雀不驚誰謂孤雛尾翅生髙舉六翮鳯凰鳴至是復有河南之地秋休屠王羗叛趙來奔趙河東王石生擊破之駿大懼遣孟毅還使長史馬詵稱臣於勒兼貢方物時西域諸國獻汗血馬火浣布犎牛孔雀巨象及諸珍異二百餘品西域長史李栢請擊叛將趙真為真所敗議者以柏造謀致敗請誅之駿曰吾毎念漢世宗之殺王恢不如秦穆公之赦孟明竟以減死論羣心咸悦駿觀兵新鄉狩於北野因討軻沒虜破之下令境中曰昔鯀殛而禹興芮誅而缺進唐帝所以殄洪災晉侯所以成五伯法律犯死罪朞親不得在朝今盡聽之唯不宜内叅宿衛耳於是刑清國富是年駿夣一人眉髪皓白自稱子瑜曰地上之事付汝地下之事付我駿寤問之有侯子瑜先死得其曽孫亮以為祈連令咸和六年春正月有彩虹五里隆隆如鐘鼓之聲又有石隕於破胡燋而碎聲如擊鼔聞七百里其處氣上黒如烟首如赤一作熒駿少而滛佚常夜出㣲行姦亂邑里少年皆化之性又貪惏以糓帛付民嵗收倍利利不充者簿賣田宅以償之咸和七年羣僚勸駿稱凉王領秦凉二州牧署置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境内皆稱之為王羣僚又請立世子駿不從中堅將軍宋輯言於駿曰禮急儲君者盖重宗廟之故周成漢昭立於襁褓誠以國嗣不可曠儲宫當素定也昔武王始有國元王作儲君建興之初先王在位殿下正名統况今社稷彌崇聖躬介立大業遂殷繼貳缺然哉臣竊以為國有累卵之危而殿下以為安踰泰山非所謂也駿納之遂立重華為世子咸和八年冬十二月駿初遣參軍傅穎假道於蜀通表京師李雄弗許至是又遣治中從事張淳稱藩於蜀託以假道雄大悦淳因雄之有憾於南氐楊初也因説雄曰南氐無狀屢為邊害宜先討百頃次平上邽二國并勢席捲三秦東清許洛掃氛燕趙拯二帝梓宫於平陽返皇輿於洛邑此英霸之舉千載一時寡君所以遣下臣冐險通誠不逺萬里者以陛下義聲逺播必能愍寡君勤王之志天下之善一也惟陛下圖之雄怒偽許之將使盗覆淳於東峽蜀人橋賛宻以告淳淳謂雄曰寡君使下臣行無迹之地通百蠻之域萬里表誠於建康者誠以陛下嘉尚忠義矜戮力之臣能成人之美節故也若欲殺臣者當顯之都市宣示衆目云凉州不忘舊德通使琅邪為表忠誠假途於我主聖臣明發覺殺之如此則義聲逺著天下畏威今使盗殺之江中威刑不顯何足以揚休烈示天下乎雄大驚曰安有此耶當相放還河右耳雄司𨽻校尉宣一作景騫言於雄曰張淳壯士宜留任之雄曰壯士豈為人留且試以卿意觀之騫謂淳曰卿體豐大暑熱可且遣下吏先徃少住須凉淳曰寡君以皇輿幽辱梓宫未返天下之恥未雪蒼生之命倒懸故遣淳來表誠大國所論事重非下吏所能傳使下吏可了則淳本亦不來雖火山湯海猶將赴之無所辭難豈寒暑之足惮哉雄曰此人矯矯不可得用也乃謂淳曰貴主英名盖世土險兵強何不稱帝自娯一方淳曰寡君以乃祖乃父世篤忠貞未能雪天人之大恥解衆庶之倒懸日昃忘食枕戈待旦以琅邪中興江東故萬里翼戴將成桓文之事何言自娯耶雄有慚色曰我乃祖乃父亦是晉臣徃與六郡避難此都為同盟所推遂有今日琅邪若能中興大晉於中州者亦當率衆輔之淳還厚為之禮而遣之淳至龍鶴募兵通表卒致命於建康朝廷嘉之初建興中燉煌計吏耿訪到長安既而遇賊不敢進反奔漢中因東渡江以太興二年至京都屢上書以本州未知中興宜遣天使乞為鄉導撫慰凉州時連有難許而未行至是始以訪守治書御史拜駿鎮西大將軍校尉刺史公如故選隴西賈陵等十二人配之訪停梁州七年以驛道不通召還訪以詔書付賈陵託為賈客以達之是嵗陵始至凉州駿受詔遣部曲督王豐等報謝并遣陵歸上䟽稱臣猶稱建興二十一年而不奉正朔咸和九年春三月詔遣耿訪王豐齎印綬授駿為大將軍都督陜西雍秦凉州諸軍事自是毎嵗使者徃來不絶駿讌羣臣於閑豫堂議欲嚴刑峻制衆咸以為宜參軍黄斌進曰臣未見其可駿問其故斌曰夫法制所以經綸邦國篤俗齊物既立必行不可窪隆也若尊親犯令即法不行矣駿性嚴猛乃屏几改容曰夫法惟上行制無髙下且微黄生吾不聞過矣可謂忠之至也即於坐擢為燉煌太守是年天雨五糓于武威燉煌植之悉生因名天麥初軌及二子寔茂雖保據河右属天下之亂所在征伐軍旅之事無嵗亡之及駿嗣位境内漸平駿有計略於是厲操改莭勤脩庶政總御文武咸得其用逺近嘉謀多所延納號稱賢君咸康元年夏四月寧戎校尉張瓘敗趙將王擢於三交城駿遣西胡校尉沙州刺史楊宣率衆越流沙伐龜茲鄯善宣以部將張植為前鋒所向風靡軍次焉耆國國王龍熈拒戰於賁崙城為植所敗進屯鐡門未至十餘里熈又率衆先要之於遮留谷植將至或曰漢祖畏於栢人岑彭死於彭亡今谷名遮留殆將有伏植单騎嘗之果有伏發植馳擊敗之進據尉犂熈率其衆四萬人肉袒詣宣降於是西域諸國及前部于闐王並遣使詣姑臧奉貢冬十二月鄯善王元禮一作孟獻女姝好號曰美人立賔遐觀以處之是年得玉璽於河其文曰執萬國建無極時駿盡有隴西之地分武威武興西平張掖酒泉建康西海西郡湟河晉興廣州廣州晉書地理志作湏武合十一郡為凉州以世子重華為五官中郎將凉州刺史分金城興晉武始南安永晉大夏武城漢中八郡為河州以寧戎校尉張瓘為刺史分燉煌晉昌髙昌三郡及西域都䕶戊巳校尉玊門大䕶軍三營為沙州以西胡校尉楊宣為刺史駿自稱大都督將軍假凉王督攝三州事又於姑臧城南築城起謙光殿於其中畫以五色飾以金玉窮珍極巧殿之四面各起一殿東曰宜陽青殿以春三月居之南曰朱陽赤殿夏三月居之西曰政刑一作正徳白殿秋三月居之北曰𤣥武黒殿冬三月居之章服器物皆依方色其傍皆有直省内官寺署一同方色及末年任所遊處不復依四時而居駿士馬强盛雖稱臣於晉不行中朝正朔舞八佾建豹尾車服旌旗一如王者置百官官號府寺皆擬天朝而微異其名始設祭酒郎中大夫舎人謁者等官官僚莫不稱臣又有閑豫堂前有閑豫池池中有五龍晝日見彩移時乃滅水通變色遂鑄銅龍於其上初戊巳校尉趙真不附於駿駿擊擒之以其地為髙昌郡咸康二年夏五月雨雪降霜駿避正殿素服命羣僚極言得失境内大饑糓價踊貴市長譚詳請出倉糓與百姓秋收三倍徴之從事隂據諫曰昔西門豹宰鄴積之於人解扁蒞東封之邑計入三倍文侯以豹有罪而可賞扁有功而可罰今詳欲因人之饑以要三倍反裘傷皮未足喻之駿納之咸康三年駿遣參軍麴䕶等上䟽曰東西隔塞踰歴年載夙承聖德心繫本朝而江呉一作湖寂蔑餘波莫及雖肆力脩塗同盟靡恤奉詔之日悲喜交并天㤙光被褒崇輝渥即以臣為大將軍都督陜西秦雍凉州諸軍事休寵振赫萬里懷戴嘉命顯至銜感屏營伏惟陛下天資岐嶷堂構晉室遭家不造播幸呉楚宗廟有黍離之哀園陵有殄廢之痛普天咨嗟含氣悲傷臣專命一方職在斧鉞遐域僻陋勢極秦隴勒雄既死人懷反正謂季龍李期之命皆不崇朝而皆簒繼凶逆鴟目有年東西遼曠聲援不接遂使桃蟲鼓翼四夷諠譁向義之徒更思背誕鉛刀有干將之志螢燈希日月之光是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懐目前之安替四祖之業馳檄布告徒設空文臣所以宵吟荒漠痛心長路者也且兆庶離主漸冉經世先老消落後生靡識忠良受梟懸之罰羣凶貪縱横之利懐君戀故日月告流雖時有尚義之士畏逼首領哀歎窮廬臣聞少康中興由於一旅光武嗣漢衆不滿百祀夏配天不失舊物况以荆揚慓悍臣州突騎吞噬遺羯在於掌握哉願陛下敷𢎞臣慮永念先績敇司空鑒征西亮等汎舟江沔使首尾俱至也自後駿遣使多為石虎所獲不達京師後駿又遣䕶𦍑參軍陳寓從事徐虓華馭等至京師征西大將軍庾亮上䟽言陳寓等冐險逺至宜蒙銓叙詔除寓西平相虓等為縣令咸康四年咸康五年冬十月駿以右長史任處領國子祭酒立辟雍明堂而行禮十一月以世子重華行凉州事咸康六年命西曹椽集閣内外事付索綏以著凉春秋駿復遣别駕馬詵入貢於趙表辭蹇傲趙王虎大怒欲斬詵侍中石璞切諫止之咸康七年駿作薤露行曰在晉之二世皇道昧不明主暗無良臣奸亂起朝廷七柄失其所權綱喪典刑愚猾竊神器牝鷄又晨鳴哲婦逞幽虐宗祀一朝傾儲君縊新昌帝執金墉城禍釁萌宫掖邉馬動北坰三方風塵起玁狁竊上京義士扼素腕感慨懐憤盈誓心蕩衆㓂積誠徹昊靈又作東門行曰勾芒遇春正衡紀運玉瓊明庶起祥風和氣翕來征慶雲䕃八極甘雨潤四坰昊天降靈澤朝日耀華精嘉苖布原野百卉敷時榮鳩鵲與鶖黄間闗相和鳴菉萍覆靈沼香花揚芳塵春遊誠可樂感此白日傾休否有終極落葉思本莖臨川悲逝者節變動中情咸康八年春正月駿遣其將和驎謝艾討南𦍑于闐大破之建元元年駿田於建西䃋石縣秋九月改䃋石縣為金澤縣置狄道縣分属凉州又以狄道縣立武始郡建元二年秋八月天有大聲下震地孟池縣有怪夜室如晝曉起視西北間有光明照地武威姑臧人有白興者以女為妾其妻妒之興怒以妻為婢為女給使郡縣以聞駿大驚曰自古所未聞也將為怪乎乃於姑臧市轘而殺之是月沈隂昏瞑霧霾四塞永和元年冬十月駿復遣兵伐焉耆降之永和二年夏五月戊子駿有疾夢出遊不識其處見一𤣥龜向之張口而言曰更九日當有嘉問遂經九日六月丙戌薨於正德殿在位二十二年時年四十私謚曰文公晉穆帝遣使册贈大司馬謚曰忠成公秋七月葬大陵及祚僣號追尊文王廟號世祖十六國春秋卷七十二
