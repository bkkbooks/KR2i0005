body:
  text: 十六國春秋北燕録馮跋字文起長樂信都人其先畢萬之後也子孫食釆馮鄉因以氏焉晉永嘉之亂祖父和避地上黨父安雄有器量為慕容永將永滅跋東徙和龍家長谷中跋夜夢天門開神光赫然燭於庭中永康末拜中衛將軍建始元年與二弟結謀襲殺慕容熙立高雲為主正始元年以跋為中外都督開府儀同三司録尚書事封武邑公馮跋太平元年雲為其幸臣離班桃仁所殺帳下督張秦李桑誅班及仁群臣推跋為主僭即天王位大赦令曰義貴適時不必改作故陳氏伐薑不徙齊號即號燕國改為太平元年追尊祖和為元皇帝父安為宣帝子永為太子三年七月以太子永領大單于內置四輔七年建大學以長樂劉軒營丘張熾成周翟崇為博士簡二千石已下子弟年十五以上教之十四年宿軍地燃一旬乃滅十七年二月北郭人趙壽女既嫁化為男娶妻而無子跋問諸群臣曰此何祥尚書左丞傅權對曰漢世雌雞為雄陰變為陽君替僭之象卒有婦人專寵王莽篡位今女為男臣將無君之徵跋曰將何以禳之權曰桑穀生朝太戊修德而殷道中興熒惑守心宋景責躬延齡二紀唯修身崇善可以轉禍為福十八年八月立子翼為太子跋戒之曰吾聞君人以學為本不學無以立尊敬師傅人倫之始汝其夙夜虔虔欽承明訓二十二年八月跋寢疾召中書監申秀侍中楊哲於內寢謂之曰吾患當不濟卿等善相吾子參決萬機九月跋疾甚輦而臨軒命太子翼勒兵聽政以備非常宋夫人規立其子受惡翼聽政謂之曰上欲將瘳奈何便欲代父臨天下乎翼性仁弱遂還東宮一日三省疾宋夫人矯絶內外遣閽寺傳問而已翼及大臣皆不得見跋弟宏於是與壯士數千人裹甲入禁中宿衛皆不戰而敗宋夫人命閉東閣宏家僮庫斗頭徑捷有勇力踰閣而入至於皇堂射殺御女一人跋驚懼而薨宏遣修城告曰天降凶禍大行崩背太子不侍疾群公不奔喪疑有逆謀圖危社稷吾備太弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宮兵出戰敗退兵皆奔散宏遣使賜死命宗正馮哲黃門盧招典葬事於東宮葬跋於長谷陵偽諡大成皇帝廟號太祖馮宏字文通跋之季弟高雲篡位拜中領軍封汲郡公太平元年拜尚書右僕射改封中山公遷尚書令司徒録尚書事宏即天王立馮宏大興元年正月壬午朔大赦改年二月立夫人慕容氏為皇后二年正月立少子王仁為太子六月有鼠集城西盈數里地中西行至水前銜馬尾後者迭銜相尾而渡識者以為民遷之象七月魏師來伐神高八月召城邊東營丘城周四郡並降魏九月魏師還宏徙民四萬餘戶而西三年六月魏永昌王來伐五年四月遣右衛孫德乞師於宋十二月又遣尚書楊伊請迎於句麗六年三月端門崩四月魏又遣侍中建興公虞弼東平公鵝青來攻剋白狼句麗將葛居孟光率衆數萬隨楊伊來迎屯於臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒衆攻宏宏引句麗兵入自東門與生戰於闕下生中流矢卒句麗軍既入城取武庫甲以給其衆城內美女皆句麗軍人所掠五月乙卯宏率龍城萬戶東徙焚燒宮殿火一旬不絶令婦人被甲居中楊伊等勒精兵於外而居光率騎後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徵宏於句麗後二年為句麗所殺偽諡昭成皇帝自馮跋太平元年歲在乙酉至宏滅亡之歲丙子二十八載
