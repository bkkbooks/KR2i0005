body:
  text: 十六國春秋北涼録沮渠蒙遜臨松盧水胡人其先世為胸奴左沮渠遂以官為氏遜好學涉群史雄烈有英略後龍飛二年遜伯父羅仇麴粥從呂光征河南光前軍大敗皆為呂光所殺宗部會葬者萬餘人遜哭謂衆曰昔漢祚中微吾之乃祖翼獎竇融保寧河右呂王耄荒虐民無道豈可坐觀成敗不上繼先祖安民之志下使二父有恨黃泉衆咸稱萬歲遂立盟約一旬之間衆至萬餘與從兄男成推光建康太守段業為涼州牧康公改龍飛二年為神璽元年業以遜為張掖太守男成為輔國大將軍委以軍國之任沮渠蒙遜永安元年三月遜以為業所憚內不自安請為安西太守四月業收男成賜死遜聞男成死泣告衆曰男成忠于段公枉見屠害諸軍能為報仇乎成素自恩信衆皆憤泣而從之比至氐池衆踰一萬業遣右將軍田昂武衛將軍梁中庸等攻侯塢遜自氐池救之昂率騎五百歸遜軍遂大潰中庸來奔五月遜至張掖田昂兄子承愛斬關納遜業左右散走遜大呼曰鎮西何在軍人曰在此業曰孤單飄一己為貴門所推可見乞餘命投身嶺南庶得東遷與妻子相見遜遂斬之六月右長史梁中庸等推遜為大將軍梁州牧大赦改元永安四年秦鴻臚梁裴拜遜鎮西大將軍開府儀同三司沙州牧西海公九年二月兩月並出正始元年冬十月遷都姑臧十一月僭即河西王位于謙光殿大赦改元置百官始如呂光為三河王故事二年四月立子德政為世子三年二月與西秦通和遜西巡遂循海至鹽池祀王母寺寺中有元石圖命中書侍郎張穆為賦銘于寺前十四年起遊林堂于內苑圖列古聖賢之像九月堂成遂宴群臣談論經傳顧謂郎中劉炳曰仲尼何如人也炳曰聖人也遜曰聖人者不凝滯于物而能與世推移畏于匡辱于陳伐樹削迹聖人固若是乎炳不能對遜曰卿知其外未知其內昔魯人有浮海而失津者至于亶州仲尼及七十二子遊于海中與魯人木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群燕數萬銜土培城魯侯信之大城曲阜訖而齊寇至攻魯不剋而還此其所以稱聖也義和元年十二月魏遣太常李慎拜遜太傳涼州牧涼王加九錫之禮三年夏四月遜寖疾立子茂虔為世子薨于路寢五月葬元陵諡武宣王廟號太祖然沮渠茂虔遜第三子聰穎好學和雅有度義和三年立為世子加中外都督大將軍録尚書遜薨僭即河西王位大赦改年為永和元年立子封疆為世子加撫軍大將軍録尚書事三年五月西中郎將燉煌太守沮渠唐兒上言曰十五日有一老父見于郡城東門投書忽然不見其書一紙八字滿之文曰涼王三十年若七年虔訪于奉常張慎曰昔虢將亡神降于莘深願陛下剋念修政以副三十年之慶若盤于遊田荒于酒色臣恐七年將有大變虔不悅七年正月朝群臣于謙光殿有狐在于東序門首不見其入左右以告禽之不獲二月端門崩初虔為酒泉太守起浮屠于中街有石象在焉是月目流血五月太廟基陷六月當陽門崩魏常山王赤堅率衆至姑臧虔嬰城拒守九月面縳出降魏釋其縳徙虔及宗室士民十萬戶于平城拜虔征西大將軍王如故八年賜死諡哀王自遜永安元年歲在辛丑至是歲庚寅三十九載
