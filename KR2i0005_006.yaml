body:
  text: 十六國春秋蜀録李特字元休巴西宕渠人其先廩君之苗裔秦併天下以為黔中郡薄賦斂之口歲出錢四十巴人謂賦為賨因謂之賨人焉及高祖為漢王始募賨人平定三秦既而不願出關求還鄉里高祖以其功復同豐沛更名其地為巴郡土有鹽鐵丹漆之利民用敦阜俗性剽勇善歌舞高祖愛其舞詔樂府習之今巴渝舞是也其後繁昌分為數十姓及魏武剋漢中特祖父虎將五百家歸魏魏武嘉之遷略陽拜虎等為將軍徙內者亦萬餘家散居隴右諸郡及三輔宏農所在號巴氏虎子慕為東羌獵將慕生有五子輔特庠流驤特身長八尺雄武善騎射沉毅有大度元康中氐齊萬年反關西擾亂天水洛陽扶國始平諸郡皆被兵頻歲大饑流移就穀相與入漢川者數萬家特至劍閣顧盼嶮阻曰劉禪有如此之地而面縛于人豈非庸才耶同移者閻式等咸歎異之初流民既至漢中上書求寄食巴蜀朝廷從之由是散在梁益不可禁止永康元年詔徵益州刺史趙廞為大長秋以成都內史耿滕代廞廞遂謀叛潛有劉氏割據之志滕率衆入州廞遣衆迎之戰于西門滕敗走廞獲殺之廞自稱大將軍益州牧特弟李庠與兄弟及妹夫李舍任回等以四千騎歸廞廞以庠為滅寇將軍使斷北道庠素東羌之良將曉兵法部陳肅然廞惡其齊整殺之復以特為督將特兄弟既怨廞引兵歸綿竹廞恐朝廷討己遣長史費遠等督萬餘人斷北道次綿竹之石亭密收合得七千餘人夜襲遠軍遠軍大潰因放火燒之死者十八九進攻成都廞聞兵至驚怕不知所為李苾等夜斬關走文武盡散廞獨與妻子乘小船走至廣都為其下人朱竺所殺先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願為亂事終無成願欲征之惠帝遣常為平西將軍益州刺史率七千餘人入蜀特等聞尚來甚懼使其弟驤于道奉迎并貢寶物尚甚悅李特冬十月六郡流人推特行鎮北軍承制封拜其弟流行鎮東將弟驤驍騎將軍少子雄為前將軍以相統領進兵攻尚于成都頻為特所敗乃阻長圍緣水作營自都安至犍為七百里與特相拒大安二年部下推特為大將軍大赦改元為建初元年益州從事任胡說尚曰特既凶逆侵暴百姓今又分散人衆在諸堡驕怠無備是天亡之時也可告諸村密刻期日內外擊之破之必矣尚從之遣大衆奄襲特營尚出逆戰到官桑特軍敗績死之雄稱成都王追諡景王及稱尊號追尊曰景皇帝廟號始祖李流字元通特第四子也少好學便弓馬東羌校尉何攀稱流有賁育之勇舉為東羌校尉平趙廞于成都晉朝論功拜奮威將軍封武陽侯建初元年特既見殺流自稱大將軍益州牧九月流疾篤謂諸將曰驍騎高明仁愛識量多奇固足以濟大事然前軍英武殆天所相可共受事於前軍以為成都王也遂薨年五十六諸將共立雄為主雄稱尊追諡流秦文王子龍嗣李雄字仲雋特第三子母羅氏夢雙虹自門升天一虹中斷既而生蕩後羅氏汲忽然如寐夢大爻蛇繞其身遂有孕十四月而生雄常言二子若有先亡在者必大貴蕩以李流世卒雄長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如龜龍口方如器耳如相望法為大貴位過三公不疑雄少有烈氣有識者皆器重之特稱益州牧以雄鎮梓潼又拜前將軍流薨雄稱大將軍益州牧治郫城以西山范長生岩居冗處求道養志之士雄欲迎為君而臣之長生固辭曰推步大元五行大會甲子祚鍾于李非吾節也建興元年十月雄即成都王位於南郊大赦改元約法七章以叔父驤為太傅兄虎威為太保李雄晏平元年三月范長生乘素輿詣成都雄迎于大門執版延坐長生請雄對坐即拜丞相尊曰范賢長生勸雄稱尊號夏六月僭即帝位大赦改元國號大成追尊父特為景帝母羅氏為太皇后十月加丞相范長生為天地太師之號封西山侯玉衡五年正月立妻任氏為皇后八年四月范長生卒以其子侍中賁為丞相長生善天文有術數民奉之如神十四年立兄子班為太子二十四年五月雄寢疾六月丁卯薨年六十一諡武皇帝廟號太宗十月葬安都陵太子班襲位李期字世運雄第四子聰慧好學弱冠能屬文雄薨班即位雄子車騎將軍越自江陽奔喪與期以班非雄所生而嗣位心不平十月因夜哭臨越殺班於殯宮班字世文雄兄蕩第四子雄妻任氏無子養班為子越既殺班于是矯太后令罪狀諡厲太子立期為主甲子期僭即皇帝位玉衡元年正月大赦改元立妻閻氏為后四月大將軍漢王壽率步騎一萬自涪向成都期不虞至預不設備至師剋城屯兵宮門殺相國建寧王越尚書令景騫尚書曰襄等廢期為卭都縣公幽之別宮期自殺年二十五諡曰幽公李壽字武考特季弟驤之少子少尚禮容敏而好學雄奇其才器以為足荷重任封為建寧王雄薨期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人并有強兵懼不自全陰謀據成都稱藩於晉乃誓文武得數千人襲成都剋之縱兵虜掠數曰乃定僭即皇帝位於南郊大赦改咸康四年為漢興元年追尊父驤為獻皇帝李壽三年六月壽下書曰吳會遺燼久逋天誅今將大興百萬躬行罰九月大閲軍士七萬餘人舟師泝江而上過成都鼓譟盈江壽登城觀之群臣曰國小衆寡吳會險遠圖之未易叩頭泣諫乃止其人咸稱萬歲十月講禮於太學舉明經者封好學侯四年以太子勢領大將軍録尚書事六年分寧州乾右永昌雲南朱提越巂河陽六為郡為漢州四月壽寢疾常見李期為祟八月薨年四十諡昭文皇帝廟號中宗葬安昌陵李勢字子仁壽之長子身長七尺九寸腰帶十四圍善于俯仰時人異之壽既薨僭即帝位大赦改元太和元年正月尊母閻氏為皇太后妻季氏為皇后李勢嘉寧二年晉征西將軍荊州刺史桓溫來伐勢大發軍禦之鎮東李位都逆往降溫達成都之十里陌勢衆自潰三月溫至城下縱火燒其大城門勢衆惶懼無復固志勢乃夜開東門走九百里至晉壽然後送降文于溫勢尋輿襯面縛軍門溫解縛焚襯送勢及叔父福等十餘人于建康晉封為歸義侯升平五年卒常璩字道將蜀成都人少好學著華陽國志十篇序開闢以來迄于李勢皆有條理云宕渠古賨國今有賨城秦始皇時有長人長五丈見宕渠秦史胡母敬曰五百年其地必有異人為大人者及雄之稱尊號祖先出向自宕渠有識者皆以為應之譙周云我死後三十年當有異人入蜀又著讖云廣漢城北有大賊曰流曰特攻難得歲在元宮自相剋又惠帝之世蜀童謠曰江橋頭闕下市成都北門十八字至是而應焉李特以晉永和元年歲在辛酉起兵至勢喜寧二年晉永和三年歲在壬戌而降晉合四十七年
