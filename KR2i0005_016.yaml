body:
  text: 十六國春秋夏錄赫連勃勃朔方人匈奴左賢王去卑之後劉元海之族也曾祖名武前趙嘉平中以宗室封樓煩公拜安北將軍丁零中郎將祖豹子後趙建武中拜平北將軍左賢王父衛辰苻堅以為西單于督攝河西諸虜屯於代來城因秦末兵亂遂有朔方之地控弦之士三萬八千姚萇拜辰大將軍河西王大單于魏師來伐辰遣子力侯提率騎二萬拒戰河東為魏所敗遂乘勝濟河攻剋代來執辰殺之勃勃辰第三子奔秦高平公沒奕於奕於妻之以女姚興以勃勃為持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崙獻馬八千匹於秦濟河至大城勃勃留之召其眾二萬襲殺高平公沒奕於而并其眾眾至數萬自稱天王大單于大赦改宏始十年為龍昇元年置百官以匈奴夏后氏之苗裔僭稱大夏以大兄右地代為丞相代公發領北民夷十萬於朔方黑渠之界營起京城大赦改龍昇七年為鳳翔元年令曰朕之皇祖北遷幽朔改姓姒氏後從母為劉氏從母姓非禮也古之氏族無常王者繫天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意支庶非正統者以鐵伐為氏庶朕宗族子孫剛銳如鐵皆堪伐人二年立夫人梁氏為后立子璝為太子赫連勃勃四年九月劉裕滅秦入於長安十二月裕留子義真鎮長安而還勃大悅遂圖進取之計遣太子璝率騎二萬南伐長安五年義真遺龍驤將軍沈田子率眾逆戰璝擊敗之退屯列迴堡八月勃勃進據咸陽劉裕大懼乃召義真東鎮洛陽勃勃入長安正月群臣勸勃勃稱皇帝三月築壇於霸上即皇帝位大赦改鳳翔六年為昌武元年冬十月太子璝領太將軍雍州牧錄南臺尚書事鎮長安十一月勃勃還統萬所建宮殿苑囿大成遂大赦改昌武二年為真興元年刻石都南頌紀功德四月追尊父衛辰曰桓皇帝廟號太祖母苻氏為皇太后神父豹曰宣皇帝曾祖武曰景皇帝高祖訓芝曰元皇帝五月雨魚於統萬二年十月起沖天臺於統萬年山欲登之以望長安六年勃勃將廢太子璝為秦王以酒泉公倫為大子璝聞將廢己率眾七萬北伐倫倫率騎三萬拒之戰於平為璝所敗倫死之太原公昌率騎一萬襲殺璝率眾八萬五千歸於統萬勃大悅立昌為太子七月勃勃寢疾甚輦昇永安殿召群臣囑以後事薨於永安殿年四十五諡武烈皇帝葬嘉平陵廟號世祖赫連昌一名折勃勃之第三子身長八尺魁岸美姿貌勃勃薨即位於永安臺大赦改真興七年為永光元年七月查城劉暏川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乘虛來伐赫連昌三年五月戰於黑渠為魏所敗昌與數千騎奔還魏追騎亦至昌留河內公費連鳥提守高平徙諸城民七萬戶于安定以都之四年二月魏軍至安定攻城三月城潰昌奔秦州魏東平公鵝青追擒之送於魏魏封昌秦王尚始平公主為魏所殺赫連定勃勃第五子風翔二年封平原公雍州牧鎮長安率眾赴安進封平原大將軍領司徒昌為魏所擒定遂率遣眾數萬據平原僭稱皇帝大赦改承光四年為勝光元年進征南大將軍白蘭王吐谷渾莫潰為開府儀同三司河南王赫連定十月畋于陰盤登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日乎使天假朕年尚與諸卿建王季之業俄而有狐群百數鳴于定傍令射之無所獲定惡之曰此大不嘉咄咄天道復何言哉三年秋魏軍來襲十月剋安定進攻平原十一月定遂掠民五萬戶西奔上邽四年河南王莫璝因戎狄之眾東面以爭天下魏遣益州刺史沒利延寧州刺史拾虎率騎三萬來伐遂擒定送于魏勃勃初號龍昇元年歲在丁未至是歲在辛未二十五年也
