body:
  text: 十六國春秋前涼録張軌字士彥安定烏氏人漢常山王耳十七世孫祖烈魏外黃令父溫太官令母隴西辛氏軌少好學明經與同郡皇甫士安友善拜太子舍人與京兆杜預以聽注易遣之太康中為尚書郎太子洗馬中庶子遷散騎常侍征西將軍司馬軌以晉室多難陰圖保據河西追竇融故事筮之遇泰之觀軌喜曰霸者之兆乃求為涼州公卿亦舉軌拜涼州刺史課農桑拔賢才置崇文祭酒徵九郡胄子五百人立學校以教之永興二年拜西安將軍封樂卿侯惠帝崩遣長史北宮純司馬纂別駕陰監奉表京師是歲大城姑臧其城本胸奴所築也南北七里東西三里地有龍形故名臥龍城張軌永嘉四年十一月黃龍出臨羌河發水升天身長十餘丈五年帝遣使拜車騎大將軍開府儀同三司榮命未至而劉曜攻陷長安遷晉帝于平陽建興元年晉愍帝即位于長安遣使者拜軌鎮西大將軍開府儀同三司加侍中封西平郡公固讓不受二年進拜太尉涼州牧以軌年老多疾拜子晏行撫軍副涼州刺史五月軌寢疾立子晏為世子己丑薨于正寢年六十葬建陵册贈侍中太尉諡武穆張祚僭號追尊武王廟號太宗張宴字遜軌之世子也學尚明察敬賢愛士晉舉秀才除尚書郎永嘉元年固辭驍騎將軍請還涼州帝許之改授議郎西中郎將建興元年長史張璽等表晏嗣位十月帝遣使受西中郎將涼州刺史西平公張宴二年十一月帝將降劉曜進宴侍中司空涼州牧三年始知劉曜逼遷天子平陽大臨三日五年南陽王寶聞愍帝崩自稱晉王年號建康置百官遣使拜宴征西大將軍開府儀同三司增邑三千戶六年六月京兆人劉宏挾左道以眩惑百姓密與宴左右十餘人謀殺宴皆懷刀入內斬宴于外寢時年五十葬寧陵晉王寶册贈宴大司馬涼州牧諡元公張祚僭號追尊曰明王廟號高祖母弟茂嗣以宴子幼嗣茂茂字成遜宴之母弟虛靖好學不以勢利為心建興元年相國南陽王寶辟從事中郎又薦為給事黃門侍郎皆不就二年徵為侍中又以疾固辭四年拜秦州刺史加散騎常侍領雍州皆不受宴左司馬陰元年以宴既被害子駿沖幼宜立長君乃推茂為大都督太尉涼州牧茂不從以平西將軍行都督涼州諸軍事護羌校尉涼州牧西平公大赦境內九月立宴子駿為世子三年劉曜遣鴻臚拜茂太師涼王四年茂寢疾執駿手泣曰吾先人以孝友見稱自漢以來世執忠順汝謹守忠節毋或失墮薨于正寢年四十八劉曜遣使贈太宰諡成烈王張祚僭號追尊曰成王廟號太宗張駿字公庭宴之世子永嘉元年生幼而奇侯十歲能屬文茂之四年拜使持節大都督大將軍涼州牧西平公大赦境內劉曜遣使拜大將軍涼州牧張駿元年正月親耕籍田二月始承晉元帝崩問大臨三日四年十二月劉曜為賊所擒曜太子毗及劉胤等率衆奔上邽六年二月石勒稱天王遣使拜駿征西大將軍涼州牧加五錫之禮八年群寮勸駿稱涼王置百官駿曰此非人臣所言敢有此言罪在不赦又請立世子乃立重華為世子十二月鄯善王元禮獻女姝好號曰美人立賓遐觀以處之十四年五月雨雪降霜駿避正殿素服命群寮極言得失十五年以右長史任處領國子祭酒立辟雍明堂而行禮焉命西曹掾集閣內外事付索綏以著涼春秋十一月以世子重華行涼州事十九年田于建西踰玉右縣九月改玉右縣為金澤縣二十一年始置百官官號皆擬天朝車服旌旗一如王者酒泉太守馬岌上言酒泉南山既崑崙之體周穆王見西王母樂而忘歸即謂此山有石室玉堂珠璣鏤飾煥若神宮禹貢崑崙在臨江之西即此明矣宜立西王母祠以裨朝廷無疆之福駿從之二十二年六月薨于正德前殿年四十晉遣策贈大司馬諡忠成公七月葬大陵張祚僭號追尊文王廟號世祖張重華字泰臨駿第二子寬和懿重沉毅少言駿薨右長史任處上華為使持節大都督太尉涼州牧護羌校尉西平公假涼王大赦境內張重華三年九月晉遣使者拜侍中大都督隴右諸軍事大將軍涼州刺史領護羌校尉西平公重華以位號未稱怒不受詔群寮上重華為丞相涼王雍秦涼三州牧五年重華宴群寮于間豫庭論講經義顧問索綏曰孔子婦誰家女老聃父字為何四皓既安太子仕乎還山乎綏曰孔子婦姓幵官氏老聃父名乾字元杲胎刖無耳一目不明孤單年七十二無妻與鄰人益壽氏老女野合懷胎八十年乃生老子四皓還否臣尚未悉重華曰卿不知乎四皓死于長安有四皓冢為不還山也七年十月垂華寢疾臨春坊遣左長史馬岌策拜子靈曜為世子大赦境內十一月薨于平草殿年二十七葬顯陵張祚僭號追諡桓王廟號世祖張祚字太伯駿之長庶子搏學雄武有政治之才駿之二十一年拜延興太守封寧侯重華薨子靈曜嗣七年十一月右長史趙長等矯稱遺令以祚為使持節都督中外諸軍事撫軍大將軍輔政十二月趙長等議以靈曜沖幼世難未夷宜立長君廢曜為寧涼侯立祚為大將軍護羌校尉涼州牧趙長等議僭即王位于謙光殿大赦改元為和平元年立妻辛氏為皇后子太和為太子封弟天錫為長寧侯重華少子元靖為涼武侯置百官二月尊祖父郊祀天地張祚二年有神降于元武殿自稱元冥與人交語祚日夜祈之神言語福利祚甚信之征東張瓘遣兵傳檄廢祚還第復立靈曜八月祚收瓘弟琚及其子嵩等驍騎將軍宋混兄修素與祚有隙大懼祚疑之混西奔招合夷晉衆生萬餘人還向姑臧祚遣陽秋胡將靈曜于苑拉其腰而殺之埋于沙坑九月宋混次于武始大澤為靈曜發哀閏月混至姑臧祚登神雀觀張琚張嵩煞祚守卒死者四百餘人斬西門關納混領軍趙長開宮門以應琚長馳入殿中大呼稱萬歲祚以長敗賊下觀勞之長奮槊刺祚中額奔入萬秋閣為廚士徐里所殺以庶人禮葬之天錫即位備禮改葬于愍陵追諡威王封子廷堅為金澤侯張元靖字元安重華少子母郭夫人和平二年宋混張琚等上元靖為大將軍涼州牧護羌校尉西平公時年七歲張瓘至姑臧推元靖為大將軍涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公張元靖四年五月東苑大冢上忽有地東天澤地燃廣袤數丈執法御史灶逸言于瓘曰此皆變之大者可移之族瓘徵兵數萬集于姑臧謀討宋氏混與弟澄及左右壯士楊和等四十餘騎奔入南門申令諸營曰張瓘得罪被太后詔誅之俄而衆至二千擁瓘率衆出戰混擊敗之衆悉去瓘自殺混入見元靖以混為使持節中外都督諸軍事驃騎大將軍酒泉郡侯輔政五年六月大旱令諸祈雨之官皆詠雲漢詩儒林祭酒索綏曰雲漢陳周宣之美非旱之文昔神鼎之出漢虞丘不賀今辭與事違恐非致澤之意也綏字士艾燉煌人父戢晉司徒綏家貧好學舉孝廉為記室祭酒母喪去官又舉秀才著涼春秋五十卷又作六夷頌苻命傳十餘篇以著述之功封平樂亭侯六年宋混卒天錫以使持節都督諸軍輔政八月右將軍齊南等議以靖多難務須立長君勸天錫自立閏月天錫遣肅等夜害元靖時年十四葬平陵諡沖王張天錫字公純嘏駿之少子母曰劉美人元靖即位一十八謁于太廟尊母劉氏為太后元年四月秦遣鴻臚回國拜天錫大將軍涼州牧西平張天錫三年姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震陷裂水出天錫避正殿引咎責謝晉遣使拜右關中諸軍大將軍涼州牧西平公八年郡國火燃于泥中三十所苻堅復有兼并之規天錫大懼遣從事中郎韓博奉表于晉又與桓溫書剋其年大舉都會上邽十年以世子懷為使持節鎮西將軍高昌郡公次子大豫為世子豫母焦氏為左夫人七月大水地震西平五十日中地十動土樓崩天錫疾美人閻姬薛姬皆自殺二姬因色並有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊若不諱妾請效死于前灑掃于地下無他志十月天錫疾瘳大赦境內追悼二姬葬以夫人禮十三年五月苻堅遣武衛將軍句長等率衆來伐天錫遣中衛將軍史景等拒戰赤岸為秦所敗天錫納左長馬苪之言面縛降秦東徙長安拜歸義侯北部尚書遷右僕射隨苻堅敗于淮南又昔為員外散騎常侍復本封薨贈鎮西將軍諡悼公張軌以晉永寧九月辛巳歲牧涼州至天錫敗亡之歲歲在丙午八主七十六年
