body:
  text: 十六國春秋前趙録劉淵字元海新興胸奴人先夏后氏之苗裔曰淳維世居北狄千有餘歲至冒頓襲破東胡西走月氐服丁零內侵燕代控弦四十萬漢祖患之使劉敬奉公主以妻冒頓約為兄弟故子孫遂冒姓為劉氏建武初入居西河美稷后漢中年單于羌渠使子於扶羅將兵助漢討平黃巾會羌渠為國人所殺於扶羅以其衆留漢自立為單于屬董卓之亂寇掠太原河東屯於河內於扶羅死弟呼廚泉立以於扶羅子豹為左賢王即元海之父也魏武分其衆為五部以賢王豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉雖分屬五部皆家於晉陽汾澗之濱豹妻呼延氏魏嘉平中祈子於龍門有一白魚頂有一角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢所見魚變為人左手把一物大如雞子光景非常授呼延氏曰此是日精服之生貴子寤以告豹豹曰吉徵也自是十五月而生淵劉淵淵生左手有文曰淵海遂以為名幼而好學不舍晝夜嘗謂同門生朱紀范隆等曰吾每觀書傳常鄙隨陸之無武絳灌之無文一物之不知固君子恥之也二生遇高皇不能建封侯之業兩公屬太宗不能開庠序之美惜哉於是文學武事並皆工絶猿臂善射膂力過人身八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸太原王渾虛襟友之命子濟拜焉咸熙中為侍子在洛陽晉文帝深待之時來萊王彌等皆憑結渾又屢言之晉帝帝召見與言大悅之后謂王濟曰劉元海容貌風儀譏談鑒智雖金日磾無以加也會父豹卒帝以淵代為左部帥轉寧朔將軍監五部軍事大安中惠帝失政諸王迭相殘廢州郡奸豪所在蜂起從祖北部都尉左賢王劉宣等議曰今司馬氏骨肉相殘興復在此時矣左賢王淵姿器絶人幹宇超世天若不恢崇單于終不虛生此人也於是共推劉淵為大單于劉淵曰當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟德所授耳今見衆十餘萬皆一當晉十鼓行摧亂晉猶拉枯耳上可成漢高之業下不失為魏武何呼邪韓足道哉宣等稱善元熙元年遷於左國城晉人東附者數萬宣等上尊號淵曰今晉氏猶在四方未定可仰尊高祖法且稱漢王權停皇帝之號待宇宙混一當更議之十月為壇南郊即漢王位改晉永興元年為元熙元年大赦天下追尊劉禪為孝懷皇帝立高祖以下三祖五宗之神主而祭之置百官以劉宣為丞相拜授各有差四部之東萊王彌起兵青徐遣使來降拜鎮東大將軍青州刺史東萊郡公四月汲桑叛自稱趙王選置州郡十一月石勒及胡部等帥衆來降永鳳元年七月鳳凰集於蒲子丞相劉宣等六十四人上尊號十月僭即皇帝位於南郊大赦改元以衛軍和為大將軍撫軍總為車騎大將軍建武曜為龍驤大將軍河瑞元年遷都平陽汾水得玉璽大赦改元二年以大司馬梁王和為皇太子八月淵寢疾以劉洋為太尉延年為太宰司徒總為大司馬大單于並録尚書事置單于于平西薨于光極殿太子和即位聰自西明門攻斬和于西室九月葬淵于永光陵諡曰光文皇帝廟號高祖劉聰字元明一名載淵第四子母張夫人孕夢日入懷寤而告淵淵曰吉徵也自是十五月而生聰夜有日光之異左耳有一白毫長二尺餘幼而聰悟究通經書百家之言孫吳兵法靡不誦之猿臂善射彎弓三百斤膂力驍捷冠絶一時劉聰永嘉四年僭即帝位於光極前殿大赦改元光興元年以衛尉呼延晏為使持節前鋒大都督配禁兵二萬七千自宜陽入洛川命東萊王彌劉曜及鎮軍石勒進軍會之晏比及南王師前后十二敗晉師長驅圍洛陽陷之聰兵大掠幽晉帝于端門害太子及百官已下三萬餘人於洛水北築為京觀遷帝及太后侍中庾珉等于平陽大赦改元嘉平元年二月內晉帝進號儀同三司會稽郡公聰引帝入宴謂曰卿為豫章王時朕曾與王武子相造武子示朕於卿卿言聞其名久矣以卿所作樂府歌文示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓鐵硯頗憶否帝曰臣安敢忘之但恨爾日不早識龍顏耳聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受曆故為陛下自相驅除耳且臣家若能奉武皇之業九族敦睦陛下何由得之三年春正月宴于光極前殿逼晉帝行酒庾珉王雋等起而大哭聰惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏為皇后四月愍帝即位於長安車騎曜等攻長安河東地震雨于平陽建元元年正月黑霧四塞人如黑五日而止辛酉時日落地三月相承出於西方東行平陽地震崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落於平陽北十里視之則肉臭聞於平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后産一蛇一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為四相大單于總百揆十二月宣光陵石人皆行數步宮中鬼器聲武庫陷入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一決于粲立市於后庭與宮人宴戲或三日不醒秋七月河東大蝗唯不食粟豆司隸靳準率部民收而埋之器聲聞於十餘里后乃鑽土飛出復食黍豆大司馬曜攻陷長安外城九月犬與豕交于宮門有豕著進賢冠升聰御坐犬冠武冠帶綬與豕並升俄而鬭死殿上宿衛莫有見其入者長安饑甚死者過半麴允為粥以攻帝膳帝泣曰今窘厄如此外無救援勢不自知乃使侍中宋敞奉箋降曜敞隨使者至帝肉袒牽羊輿櫬𠾑璧出降東門曜受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至於平陽聰臨光極殿帝稽顙與麴允伏地大哭扶不能起聰大怒允自殺以帝為光祿大夫懷安侯以大司馬曜假黃鉞大都督陝西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車駕大將軍戎服執戟前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣使帝執蓋多有涕泣或有失聲者尚書郎辛賓起而抱帝大哭引出斬之戊戍愍帝崩於平陽三年聰所居螽斯則百堂災焚其子會稽王哀已下二十有一人聰聞哀塞自此鬼哭宮中至至九月夜聲不絶四月尚書令王監崔懿之等極諫聰大怒收監等殺之秋七月鬼器於光極殿聰晝見東平王約甚惡之徵秦王曜為丞相録尚書事固辭仍以丞相領雍州牧靳準為大司空領司隸校尉癸亥薨于建始殿甲子粲即位大赦改元漢昌葬宣光陵諡曰武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳準為大將軍領尚書事粲荒耽酒色遊宴后庭軍國之事一決於準準遂勒兵入宮執粲數而殺之追諡靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里準自號漢大王置百官遣使稱藩于晉相國曜自長安赴難永嘉元年十二月大將軍東平王約卒一指猶暖遂不殯斂至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室壯麗號曰蒙珠離國淵謂約曰東北遮須夷國無主久待汝父為之汝父二年當來后國中大亂相殺害吾家死亡略盡但可永明輩數十人在耳汝但還后年當來見汝不遲不久約拜辭而歸道過一國曰猗尼渠余國引約入宮與皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎后年來必見過當以相妻約歸置皮囊於機下俄而蘇謂左右曰機上取囊來左右取得開有一方白玉題文曰猗尼渠余國天王敬信遮須夷國天王歲在攝提當相見馳使奏呈聰曰若當如此吾不懼死也及聰以戊寅歲薨與此玉并葬焉劉曜字永明淵之族子少孤見養於淵幼而聰慧性拓落高亮與衆不群鐵厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長三尺光初元年十月太保呼延晏等自平陽來奔上尊號於曜僭即皇帝位十二月靳準左右軍騎喬太王騰等殺準奉六璽來降二年夏四月徙都長安立子熙為皇太子六月繕宗廟社稷南北郊于長安令曰蓋王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下歲久恩德結于庶民故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其議以聞於是太保呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中山之屬城陛下勳功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門內大樹風吹折經一宿樹撥撥變為人形髮長一尺鬚眉三寸皆黃白色有斂手之狀亦有兩腳著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂劉曜四年將於霸陵西南營壽陵侍中喬豫杏苞上疏諫曰臣等伏聞勑旨將營建壽陵周圍四里下深二十五丈以銅為棺槨黃金飾之臣聞堯葬穀林市不改肆顓頊葬高陽下不及泉聖王之於終也如是秦始皇下錮三泉周輪七里身亡之後毀不旋踵暗王之於終也如此後喪亂以來漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之達至然抑亦釋之之功興亡奢儉炯然於前唯陛下覽之曜大悅終南山崩所得白玉方尺有字曰皇王皇亡敗趙昌以為己瑞郡臣咸賀中書監劉均曰山崩石壞國傾民亂皇王皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜憮然改容五年曜后羊氏卒故晉惠后也洛陽之陷納之六年正月天裂廣一丈餘長五十丈十一年七月石虎率衆四萬人寇擾河東進蒲坂曜選中外精鋭自潼關北濟虎懼引師而還曜追而敗之枕尸一百餘里虎奔朝歌遂攻石生於金墉分遣諸將攻討汲郡河內十二月勒自帥衆拒之陳於洛西曜性少酗酒末年尤甚將戰飲數斗常乘赤馬無故踏頓乃乘小馬北出復飲斗餘至西陽門撝陳就平勒將石堪因而乘之師遂大潰曜昏醉奔退而馬陷石渠墜於冰上為堪所執勒將還襄國喻曜使與太子毗書令速降曜但勑與諸臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗太司馬南陽王胤等議欲西保秦州遂相率奔上邽石虎乘勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載
