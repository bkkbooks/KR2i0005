body:
  text: 十六國春秋南燕錄慕容德字元明皝之少子皝每對諸宮人言婦人妊娠夢日入懷必生天子公孫夫人方妊夢日入臍中獨善而不敢言晉咸康二年晝寢生德左右以告方寢而起皝曰此皃易生似鄭莊公長必有大德遂以德為名年十二而皝薨哀毀過禮年十八長八尺二寸額上有日角偃月重文元璽初封梁公建熙初進號安北將軍封范陽王入為魏尹秦滅燕徙於長安秦伐涼德請征自效後為張掖太守苻堅伐晉垂請德為副堅敗德乃隨垂如鄴垂稱燕王復封范陽王建興元年為司隸校尉八年拜司徒垂臨薨謂太子寶曰鄴是舊都宜委范陽王永康元年以德鎮鄴及寶失中山自龍城奔鄴以德為丞相領冀州牧承制南夏德兄子麟自義臺來奔因說德曰中山既沒魏必乘勝攻鄴雖糧儲素積而城大難固且人情沮動不可以戰及魏軍未至擁眾南渡就魯陽王和據滑臺而聚兵積穀伺隙而動計之上也魏雖拔中山勢不久留不過驅掠而返人不樂徙理自生變然後振威以拔之魏則內外受敵使戀舊之士有所依憑廣開恩信招集遺黎可一舉而取之先是慕容和亦勸德南徙於是許之慕容德隆安元年正月德率戶四萬三千車二萬七千乘自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昏日流凘冰合是夜濟訖冰亦尋消德大悅改黎陽津為天子津德入滑臺趙王麟等九十八人上言今中土傾陷龍都蕭條趙魏遺黎鵠企澤皋伏願仰承俯順以承宗廟謹上皇帝尊號德許之令曰假順來議且以燕元故事統苻行帝制奏詔而已改永康三年為元年大赦殊死巳下置百官封進有差寶自龍城南奔至黎陽城西數里伏於河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表即自南征段速骨作逆於乙連今失據來此呼丞相奏迎鍾馳使白狀寶遣思之後見採樵者知德稱帝懼而北奔初苻登既滅登弟廣率所部二千來降拜冠軍將軍處之乞活堡至是復叛稱秦王德留撫軍曾陽王和守滑臺德率眾攻廣斬之和長史季辨殺和以滑臺降魏德曰苻廣雖平撫軍失據進有強敵退無所托計將安出尚書潘聰曰滑臺四通八達非帝主之居青齊沃壤號曰東秦地方二千里戶餘十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門朗公報曰山西絕俗之士不應預聞朝議但有待之累非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可謂興邦之術矣撫又問以年世朗以周易筮之曰燕衰庚戌撫曰幾何曰年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫不敢言德大悅三月德引師而南五月次薛城八月入廣固即皇帝立於南郊大赦改元為建平元年又曰漢宣憫吏民犯諱故改名朕今增一備字以為復名庶開臣子避諱之路於是敘賞有差新舊咸悅十月太極端門並就以公工張剛為材官將軍上方令二年十月徐州刺史潘聰青州刺史鞠仲來朝讌於延賢堂酒酣德笑謂群臣曰朕雖寡薄恭己南面在上不驕夕惕於位可稱自古何等王也仲曰陛下中興之聖后少康光武久之儔也顧命左右賜仲帛千匹仲疑多陳讓德曰卿知調朕朕不知戲卿乎卿飾對非實故亦虛言相賞賞不謬加何足謝也韓范進曰臣聞天子無戲言忠臣無妄對今日之論可謂君臣俱失德大悅賜範絹五十匹三年三月德如齊城登營丘望見晏嬰塚顧左右曰禮大夫不通城葬平仲古之一賢人達者而生安近巿死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不遠門者猶冀悟平生意也德悅之三月以大牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢否故事謨歷對詳辨畫地成圖德深嘉之拜尚書郎五年二月夜地震在栖之雞皆驚攪飛散三月德疾動經旬幾於不振會前尚書右丞曹默自冀州來奔以白酒解之乃瘳以默為御史中丞封永熙侯六年正月兄子超自秦還九月汝水竭十一月德疾篤夢皝曰汝既無子何不早立超為太子不爾惡人生心戊午引見群臣於東陽殿議立超為太子俄而震起百寮驚越德亦不安還宮疾甚呼叚后公主及超申以後事執超手曰德若至曉更見公卿顧託以汝死無所恨數目視公主欲有所言竟遂不能段后大言今日董中書造誥之超開目頷之是夕薨於顯安宮年七十為十餘棺夜分出四門潛瘞山谷莫知其屍所在虛葬於東陽陵諡獻武皇帝廟號世宗在位五年慕容超字祖明德兄北海王納之子秦滅燕以納為廣武太守數歲去官與母公孫太妃就弟德家於張掖德從苻堅南征留金刀辭母而去及垂起兵山東張掖太守苻昌誅納及德之諸子公孫太妃以耆不合刑納妻段氏以懷妊未決執於郡獄獄掾呼延平德之故吏也將公孫及段氏逃於羗中而生超焉公孫氏臨卒授超金刀曰聞汝伯已中興於鄴都吾朽病將沒相見理絕汝脫得東歸可以此刀還汝叔也後因呂隆歸秦秦徙涼州民於長安超因而東歸母超曰母子得全濟者呼延氏之力也惠而不報天不祐人乎今雖死吾欲為汝納其女以答厚惠於是納之超至長安佯狂行乞由是往來無禁濟陰人宗正謙善卜相西至長安賣於路超行而遇之因就謙相謙奇其姿貌超乃內斷於心不告母妻辭母詣霸上乃與謙俱歸至諸關禁自稱張伏生二十日達梁父建平六年四月至廣固呈以金刀且宣祖母臨終之言德撫之號慟超身長八尺腰九圍姿器魁傑有類於德德愛之名之曰超封北海王拜侍中驃騎大將軍司隸校尉開府置佐十一月立為太子己未僭即皇帝位大赦改建平六年為太上元年慕容超三年七月遣中書令韓範聘秦姚興許還超母妻八月秦使兼員外散騎常侍韋宗還聘贈以千金超復遣右僕射張華給事中宗正元聘秦送太樂伎一百二十人姚興大悅還超母妻十月華發長安宗正元聘先反命超悅遣征虜公孫五樓率騎二千迎於境上超親率六宮迎於馬耳關四年正月大赦尊父北海穆王為穆皇帝母段氏為皇太后居長樂宮妻呼延氏為皇后五年二月晉相劉裕率眾來伐三月晉師渡淮超聞晉軍之盛自率眾四萬拒戰大敗奔還廣固徙郭內民入保小城晉攻陷大城長圍列守超請為藩臣以大峴為界裕不許六年正月超登天門朝群臣於城上殺馬以饗將士文武皆有遷授二月尚書悅壽開門納晉師超出奔為晉師所執送建康市斬之時年二十六殺鮮卑王公已下三千餘人以男女萬餘口為軍賞始建平元年歲在己亥僭號居齊王為劉裕所滅在己酉年二十一年
