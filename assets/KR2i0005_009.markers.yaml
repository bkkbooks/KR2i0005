  - {type: variant, offset: 292, length: 1, content: 梁, krp: 王秉追之戰於七里澗又敗之遂走渡河與其黨劉靈王桑等自軹闗如平陽歸淵淵聞而大悅遣侍}
  - {type: variant, offset: 294, length: 1, content: 庸, WYG: 兼御史大夫郊迎致書於彌曰以將軍有不世之功超時之徳故有此迎耳遲望將軍之至孤今親行將軍之館輒拂席洗爵敬待將軍彌至見淵勸稱尊號淵謂彌曰孤本謂將軍如竇周等耳今真吾孔明仲達也烈祖有云吾之有將軍如魚之有水也署為司隷校尉加侍中特進靈為安北將軍桑為散騎常侍彌固辭使隨劉曜冦河南又與石勒攻臨漳永嘉初冦上黨圍壺闗東海王司馬越遣淮南内史王曠安豐太守衛乾等討之與彌戰於髙都長平間大敗之死者十六七淵拜彌侍中都督青徐兗豫荆揚六州諸軍事征東大將軍青州牧封東萊公遂與劉曜石勒}
