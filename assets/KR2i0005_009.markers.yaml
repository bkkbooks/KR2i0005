  - {type: variant, offset: 407, length: 1, content: 赦, WYG: 事事業甫爾便相攻討何面目見主上乎平洛之功誠在將軍然劉曜皇族宜小下之晉二王平吳之鑒其則不逺願明將軍深以為慮縱將軍阻兵不還其若子弟宗族何彌曰善微子吾不聞此過也於是詣曜謝罪彌曰下官聞過乃是張長史之功曜謂嵩曰君為朱建矣豈况范生乎各賜嵩黄金百斤及石勒已吾之讌嵩固阻彌不行彌不能聽竟為勒所襲殺嵩遂歸仕於淵劉殷劉殷字長盛新興人也七嵗䘮父哀毁過禮服䘮三年未嘗見齒曾祖母王氏盛冬思芹而不言食不飽者一旬矣殷怪而問之王氏言其故殷時年九嵗乃詣澤中慟哭曰殷罪釁深重㓜丁艱罰王母在堂無旬月之養殷為人子而所思無獲皇天后土願垂哀愍聲不絶者半日於是忽若有人云止止聲殷收淚視地見有芹生焉因得斛餘而歸食而不減及至芹生乃盡又嘗夜夢人謂之曰西籬下有粟寤而掘之得十五鍾銘曰七年粟百石以賜孝子劉殷自是食之七年方盡郡命主簿州辟從事皆以供養無人辭不赴命司空齊王司馬攸辟為掾征南將軍羊祜召㕘軍事皆以疾辭同郡張宣子識達之士也勸殷就徵殷曰當今二公有晉之棟楹也吾方希達如榱椽耳不憑之豈能立乎吾今王母在堂既應他命無容不竭臣禮便不得就養子輿所以辭齊大夫也良以色養無主故耳宣子曰如子所言豈庸人所識哉而今而後吾子當為吾師矣遂以女妻之宣子者荆州豪族家富於財其妻怒之曰我女年始十四姿識如此何慮不得為公侯妃而遽以妻劉殷乎宣子曰非爾所及也戒其女曰劉殷至孝㝠感學識超世此人終當逺達為世名公汝其謹事之張氏性亦婉順事王母以孝聞奉殷如君父焉既而曾祖母死殷夫婦毁瘠㡬至滅性時柩殯在室而西隣失火風飈甚盛夫婦叩殯號哭火越燒東家後有二白鳩巢其樹庭自是名譽益著及為聰相不犯顔忤㫖然因事進䂓補益甚多聰每與羣臣議論政事殷無所是非羣臣出殷獨留後為聰暢敷條理商確事宜聰未嘗不從之有子七人五子各授一經一子授太史公一子授漢書一門之内七業俱興北州之學殷門為盛嘗戒其子孫曰事君之法當務㡬諫凡人尚不可面斥其過而况萬乘乎夫㡬諫之功無異犯顔但不彰君之過所以為優耳一云犯顔之禍將彰君過宜上思周召咨商之義下念鮑勛觸鱗之誅官至侍中太保錄尚書事賜劍履上殿入朝不趨乘輿入殿然殷在公卿間常恂恂有卑讓之色故能處驕暴之國保其富貴不失令名以夀考終殷以聰嘉平二年卒追諡曰大昌文獻公王延王延字元夀一作延元西河人也性至孝九嵗䘮母㡬至滅性每至忌月悲號三旬事後母卜氏以孝聞卜氏遇之無道恒取補􅓙及敗麻頭與延貯衣其姑聞而問之延知而不言供事彌謹延既孤貧晝則傭賃夜則讀書遂究覽經史皆通大義卜氏嘗盛冬思生魚敕延求之延求魚不獲卜氏杖之流血延尋汾河扣凌而哭忽有一魚躍出冰上長五尺延取以饋母卜氏食之積日不盡於是心悟撫如已子延事親色養夏則扇枕冬則以身温被隆冬盛寒體無全衣而親極滋味後母終服䘮居於墓側非其蠶不衣非其耕不食屬天下亂隨淵遷於平陽農蠶之暇訓誘宗族侃侃不倦年至六十方仕於淵及聰嗣位拜金紫光祿大夫劉粲之立靳準作亂自稱漢天王置百官以延耆徳碩望謀之於延將以為左光祿延弗從乃罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也準怒殺之陳元達陳元達字長宏後部人也本姓髙以生月妨父故}
