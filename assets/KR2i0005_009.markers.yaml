  - {type: variant, offset: 409, length: 0, content: '', WYG: 云陳少孤貧有志操常躬耕兼誦詩書樂道行詠忻忻如也至年四十不與人交通淵之為左賢王聞而招之}
  - {type: variant, offset: 409, length: 0, content: '', krp: 云陳少孤貧有志操常躬耕兼誦詩書樂道行詠忻忻如也至年四十不與人交通淵之為左賢王聞而招之}
  - {type: variant, offset: 410, length: 0, content: '', WYG: 達不荅及淵僭號人或謂之曰往劉公相屈君蔑而不顧今稱號㡣飛君其懼乎元達笑曰是何言邪彼人姿度卓犖有籠羅宇宙之志吾固知之久矣然往日所以不往者以期運未至不能無事喧喧彼自有以亮吾矣卿但識之不過二三日驛書必至其暮果徵為黄門郎人曰君殆聖乎既至引見淵曰卿若早來豈直為郎官而已元達曰臣惟性之有分盈分者顛臣若早叩天門者恐大王賜處於九卿納言之間此則非臣之分臣將何以堪之是以抑情盤桓待分而至大王無過授之謗小臣免招冦之禍不亦可乎淵乃大悅元達在位忠謇屢進讜言退而削草雖子弟莫得知也聰既嗣位轉為廷尉聰將為劉氏起鷃儀樓於後庭元達鎖腰切諫聰大怒命左右將出斬之大司徒任顗等叩頭流血請免劉氏亦手疏切諫聰意乃解引元達而謝之每謂元達曰卿當畏朕而反使朕畏卿邪元達叩頭謝曰臣聞師臣者王友臣者伯臣誠愚闇無可採也幸邀陛下垂齊桓納九九之義故使微臣得盡愚忠昔世宗遥可汲黯之奏故能恢隆漢道桀紂誅諫幽厲弭謗是以三代之亡也忽焉陛下以大聖應期挺不世之量能逺捐商周覆國之弊近模孝武光漢之美則天下幸甚遷為左司隷聰欲立左右貴嬪為左右皇后元達以三后竝立殊非典禮極言諫之聰不納乃轉為右光祿大夫於是太尉范隆等皆抗表遜位請讓元達聰復以為御史大夫儀同三司元達素與太宰河間王劉易善引之為援得盡諫諍及聞易死哭之悲慟曰人之云亡邦國殄悴吾既不復能言安用此黙黙茍生乎歸而自殺時人莫不寃之王廣王廣字廣之不知何許人}
