  - {type: variant, offset: 393, length: 0, content: '', WYG: 曹嶷為鎮東將軍給兵五千東狥青州且多齎金寳還鄉里招誘亡命并迎其室淵許之嶷自大}
  - {type: variant, offset: 393, length: 0, content: '', krp: 曹嶷為鎮東將軍給兵五千東狥青州且多齎金寳還鄉里招誘亡命并迎其室淵許之嶷自大}
  - {type: variant, offset: 394, length: 0, content: '', WYG: 引兵而東所至皆下遂克東平進攻琅邪會淵死聰即位彌與劉曜等率衆四萬長驅入洛川復出轘轅掠梁陳汝潁間進屯陽翟遣弟璋與石勒共冦徐兗因破越軍復與曜冦襄城進逼京邑縱兵大掠曜禁之不從乃斬其牙門王延以狥彌怒與曜阻兵相攻死者千餘人彌長史張嵩勸小下之於是詣曜謝罪結分如初既而彌說曜曰洛陽天下之}
  - {type: page-break, offset: 394, content: '', id: KR2i0005_WYG_009-4b, image: WYG0463/WYG0463-0372d.png}
  - {type: variant, offset: 394, length: 0, content: '', krp: 引兵而東所至皆下遂克東平進攻琅邪會淵死聰即位彌與劉曜等率衆四萬長驅入洛川復出轘轅掠梁陳汝潁間進屯陽翟遣弟璋與石勒共冦徐兗因破越軍復與曜冦襄城進逼京邑縱兵大掠曜禁之不從乃斬其牙門王延以狥彌怒與曜阻兵相攻死者千餘人彌長史張嵩勸小下之於是詣曜謝罪結分如初既而彌說曜曰洛陽天下之}
  - {type: variant, offset: 395, length: 4, content: 庸等推遜, WYG: 山河四塞城池宫室不假修營宜勸主上自平陽徙都之曜以天下未定洛陽四面受敵不可固守不從彌䇿焚燒而去彌怒罵曰屠各子豈有帝王之意乎汝奈天下何引衆東屯項城曜初以彌不待已至先入洛陽怨之至是嫌隙遂搆洛川之戰百官殱滅殆盡惟司隷校尉劉暾以鄉里宿望得免於難因說彌曰今羣雄競起九州幅裂有不世之功者宇内不容將軍自興兵以來何攻不克何戰不勝而復與始安王相失宜思文種之禍以范蠡為師且將軍可無帝王之意東據本州徐觀事勢上可以混一天下下可以成鼎峙之業豈失孫劉乎蒯通有言將軍宜圖之彌以為然拜暾}
  - {type: page-break, offset: 395, content: '', id: KR2i0005_WYG_009-5a, image: WYG0463/WYG0463-0373a.png}
  - {type: variant, offset: 395, length: 4, content: 庸等推遜, krp: 山河四塞城池宫室不假修營宜勸主上自平陽徙都之曜以天下未定洛陽四面受敵不可固守不從彌䇿焚燒而去彌怒罵曰屠各子豈有帝王之意乎汝奈天下何引衆東屯項城曜初以彌不待已至先入洛陽怨之至是嫌隙遂搆洛川之戰百官殱滅殆盡惟司隷校尉劉暾以鄉里宿望得免於難因說彌曰今羣雄競起九州幅裂有不世之功者宇内不容將軍自興兵以來何攻不克何戰不勝而復與始安王相失宜思文種之禍以范蠡為師且將軍可無帝王之意東據本州徐觀事勢上可以混一天下下可以成鼎峙之業豈失孫劉乎蒯通有言將軍宜圖之彌以為然拜暾}
  - {type: punctuation, offset: 403, content: 、, id: KR2i0005_CHANT_009-bkkpn84}
  - {type: variant, offset: 403, length: 0, content: '', WYG: 封齊公初石勒惡彌驍勇外相親而内相忌常宻為之備彌破洛陽多遺勒美女寳貨以相結納會勒擒茍晞以為左司馬彌心惡之乃以書賀勒曰公獲茍晞而用之何其神妙使晞為公左彌為公右天下不足定也勒愈忌欲隂圖之劉暾又勸彌使召曹嶷藉其衆以誅勒乃為書使暾詣青州召嶷引兵會已且詐要勒共向青州暾至東阿為勒遊騎所獲見彌與嶷書大怒乃潛殺暾會彌將徐邈髙}
