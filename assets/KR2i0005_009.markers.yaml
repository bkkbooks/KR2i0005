  - {type: variant, offset: 413, length: 2, content: 年秦, WYG: 十一位為卿將當受禍耳不爾者亦為猛獸所害吾亦未見子之令終也璞曰吾禍在江南甚營之未見免兆雖然在南猶可延期住此不過時月珝曰子勿為公吏可以免諸璞曰吾之不能免公吏猶子之不能免卿將也珝曰吾此雖有帝王子終不復奉二京矣琅邪可奉卿謹奉之主晉祀者必此人也珝遂隠於龍門山淵僭號徵拜大司農侍中固以疾辭淵曰人各有心卜珝之欲在吾朝何異髙祖四公哉可遂其髙志後復徵為光祿大夫珝謂使者曰非吾死所也及聰嗣位徵為太常時劉琨據并州聰問何時可平珝荅曰并州陛下之分今兹克之必矣聰戲曰勝吾勞先生一行可也珝曰臣所以行不及裝者正為是也聰大悅署珝使持節平北將軍將行謂其妹曰此行也死自吾分慎勿紛紜遂從鎮北將軍靳冲攻晉陽一作大原不克珝卒先降冲遽収珝斬之聰聞之大怒曰此人朕所不得加刑冲何人哉遣御史中丞浩衍持節斬之趙染趙染新豐人初為晉南陽王司馬模牙門將戍蒲坂求馮翊太守不得而怒率衆歸聰聰以為平西將軍次於新豐東晉將索綝率兵討之染有輕敵之意長史魯徽諫曰困獸猶鬬况於國乎染曰綝小豎豈能汚吾馬蹄刀劍也帥精騎逆戰於城西敗績悔曰吾不用魯徽之言以至於是乃斬徽臨刑謂染曰將軍愎諫違謀戅而取敗乃復忌前害勝誅戮忠良以逞過忿亦何顔面瞬息世間哉袁紹為之於前將軍繼之於後覆亡敗䘮亦當相尋所恨不得一見大司馬而死死者無知則已若其有知下見田豐為徒當訴將軍於黄泉使將軍不得眠牀枕而死及死叱行刑者曰令吾面東向大司馬劉曜聞之曰蹄涔不容尺鯉染之謂也後染冦北地夢魯徽大怒引箭射之染驚怖而寤旦將攻城中伏弩卒范隆范隆字𤣥嵩父方魏雁門太守隆方孕十五月而生四嵗亡父既又䘮母哀號之聲感動行路單孤無緦功之親疎族范廣册府云廣史不載官愍而養之迎歸教書為立祠堂隆好學修謹事廣如父博通經籍無所不覽著春秋三傳撰三禮吉凶宗紀甚有條義恵帝時天下大亂隠迹不應州郡辟命晝耕夜讀頗習秘厯隂陽之學知并州將有氛祲彌不復仕與上黨朱紀友善共紀遊山見一老父於窮澗之濵老父曰二公何為在此隆等拜之仰視不見遂與紀依於淵淵以隆為大}
