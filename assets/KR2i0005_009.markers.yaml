  - {type: variant, offset: 410, length: 0, content: '', krp: 達不荅及淵僭號人或謂之曰往劉公相屈君蔑而不顧今稱號㡣飛君其懼乎元達笑曰是何言邪彼人姿度卓犖有籠羅宇宙之志吾固知之久矣然往日所以不往者以期運未至不能無事喧喧彼自有以亮吾矣卿但識之不過二三日驛書必至其暮果徵為黄門郎人曰君殆聖乎既至引見淵曰卿若早來豈直為郎官而已元達曰臣惟性之有分盈分者顛臣若早叩天門者恐大王賜處於九卿納言之間此則非臣之分臣將何以堪之是以抑情盤桓待分而至大王無過授之謗小臣免招冦之禍不亦可乎淵乃大悅元達在位忠謇屢進讜言退而削草雖子弟莫得知也聰既嗣位轉為廷尉聰將為劉氏起鷃儀樓於後庭元達鎖腰切諫聰大怒命左右將出斬之大司徒任顗等叩頭流血請免劉氏亦手疏切諫聰意乃解引元達而謝之每謂元達曰卿當畏朕而反使朕畏卿邪元達叩頭謝曰臣聞師臣者王友臣者伯臣誠愚闇無可採也幸邀陛下垂齊桓納九九之義故使微臣得盡愚忠昔世宗遥可汲黯之奏故能恢隆漢道桀紂誅諫幽厲弭謗是以三代之亡也忽焉陛下以大聖應期挺不世之量能逺捐商周覆國之弊近模孝武光漢之美則天下幸甚遷為左司隷聰欲立左右貴嬪為左右皇后元達以三后竝立殊非典禮極言諫之聰不納乃轉為右光祿大夫於是太尉范隆等皆抗表遜位請讓元達聰復以為御史大夫儀同三司元達素與太宰河間王劉易善引之為援得盡諫諍及聞易死哭之悲慟曰人之云亡邦國殄悴吾既不復能言安用此黙黙茍生乎歸而自殺時人莫不寃之王廣王廣字廣之不知何許人}
  - {type: variant, offset: 411, length: 1, content: 安, WYG: 嘉之亂聚族避世仕淵為西揚州刺史魯陽侯一作并州及聰嗣位蠻賊梅芳扇動山夷攻圍廣城一百二十日外救不至糧食罄絶雞犬雀鼠靡有孑遺將士泣謂廣曰將軍忠於本朝故有今難豈有背將軍者哉城陷被禽將士相枕而死者五十人一作五千蠻囚廣將詣芳廣有女容質甚麗慷慨有丈夫之節芳見其美色納之甚有寵入經一旬女於闇室伺芳睡引刀擊芳不中芳驚起曰何故反邪女罵曰蠻畜我欲誅反賊何等謂我反乎吾聞父仇不同天母仇不同地汝反逆無狀害人父母而復以無禮陵人吾所以不死者正欲誅汝耳今死自吾分不待汝殺我但恨不得梟汝首於通衢以塞大耻辭氣猛厲色無變容言終自殺芳止之不可時年十五卜珝卜珝字子玉匈奴後部人也少好談易郭璞見而歎曰吾所不如也然而不免兵厄珝曰吾大厄在}
