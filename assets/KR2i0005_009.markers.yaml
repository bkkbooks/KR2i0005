  - {type: variant, offset: 426, length: 1, content: 開, WYG: 平羌校尉討叛羌矢盡不屈節仗劍而死董景道董景道字文博𢎞農人也少而好學晝夜誦讀博通五經尤明春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義專遵鄭氏著禮通論非駁諸儒演廣鄭㫖永平中知天下將亂隠於商洛山衣木葉食樹菓彈琴歌笑以自娛毒蛇猛獸皆繞其旁是以淵及聰屢徵皆礙而不得進景道私以此自喜至曜光初中出山廬於渭汭曜徵為太子少傅散騎常侍復辭曰余在萬山中草木可以庇風雨石田可以具饘粥朝家事非山野小人所願聞也更移窮谷中人悉不見後曜置崇文祭酒復以明經擢景道為之亦不就竟以夀終王育王育字伯春京兆人也少孤貧為人傭牧羊豕每過小學必歔欷流涕暇時拾薪以顧書生抄書板截蒲以學書日夜不止忘失羊豕其主笞之育甚有慙色將鬻已以償之同郡許子章敏達之士也聞而嘉之代育償羊豕給其衣食使與子同學遂博通經史身長八尺餘鬚長三尺容貌絶異音聲動人子章以兄女妻之别為立宅分之家産育受之無愧色然行已任性不與俗偶妻䘮弔者不過四五人皆鄉閭名士太守杜宣命為主簿及宣左遷萬年令杜令王攸詣宣宣不出迎攸怒曰卿往為二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使吾畏死鷂邪育執刀叱攸曰主辱臣死自古而然我}
