  - {type: variant, offset: 404, length: 0, content: '', krp: 輒帥所部兵數千人去彌彌益衰弱勒右長史張賔勸勒乘彌小衰誘而取之因請彌燕於已吾彌謂勒實親已不復疑也長史張嵩切諫不聽勒伏兵襲殺之已吾前作已營劉靈劉靈陽平人也少貧賤年二十餘厠役於縣力制奔牛走及馳馬時人雖異之莫能舉也嘗撫膺而歎曰天乎何當亂也及公師藩起兵自稱將軍與王彌冦掠趙魏進攻洛陽彌軍敗績乃言於靈曰晉兵尚强歸無所厝劉元海昔為質子我與之周旋京師深有分契今稱漢王將歸之可乎靈然之遂與彌俱降於淵淵署為平北將軍與石勒帥衆三萬冦魏郡汲郡頓丘百姓望風降附所在克㨗遷安北大將軍冀}
  - {type: variant, offset: 405, length: 1, content: 牧, WYG: 刺史屯廣宗晉王浚遣别將祁𢎞襲擊殺之張嵩一作暠張嵩隴西人也事母至孝母死既葬廬於墓側哀感幽顯嵗餘而墓地自裂棺亦自破母遂蘇活嵩初為王彌長史彌之與劉曜相攻也嵩切諫曰明公與國家共興}
  - {type: variant, offset: 405, length: 1, content: 牧, krp: 刺史屯廣宗晉王浚遣别將祁𢎞襲擊殺之張嵩一作暠張嵩隴西人也事母至孝母死既葬廬於墓側哀感幽顯嵗餘而墓地自裂棺亦自破母遂蘇活嵩初為王彌長史彌之與劉曜相攻也嵩切諫曰明公與國家共興}
