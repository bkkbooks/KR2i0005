  - {type: variant, offset: 403, length: 0, content: '', krp: 封齊公初石勒惡彌驍勇外相親而内相忌常宻為之備彌破洛陽多遺勒美女寳貨以相結納會勒擒茍晞以為左司馬彌心惡之乃以書賀勒曰公獲茍晞而用之何其神妙使晞為公左彌為公右天下不足定也勒愈忌欲隂圖之劉暾又勸彌使召曹嶷藉其衆以誅勒乃為書使暾詣青州召嶷引兵會已且詐要勒共向青州暾至東阿為勒遊騎所獲見彌與嶷書大怒乃潛殺暾會彌將徐邈髙}
  - {type: variant, offset: 404, length: 0, content: '', WYG: 輒帥所部兵數千人去彌彌益衰弱勒右長史張賔勸勒乘彌小衰誘而取之因請彌燕於已吾彌謂勒實親已不復疑也長史張嵩切諫不聽勒伏兵襲殺之已吾前作已營劉靈劉靈陽平人也少貧賤年二十餘厠役於縣力制奔牛走及馳馬時人雖異之莫能舉也嘗撫膺而歎曰天乎何當亂也及公師藩起兵自稱將軍與王彌冦掠趙魏進攻洛陽彌軍敗績乃言於靈曰晉兵尚强歸無所厝劉元海昔為質子我與之周旋京師深有分契今稱漢王將歸之可乎靈然之遂與彌俱降於淵淵署為平北將軍與石勒帥衆三萬冦魏郡汲郡頓丘百姓望風降附所在克㨗遷安北大將軍冀}
