  - {type: variant, offset: 757, length: 358, content: 錫之禮三年夏四月遜寖疾立子茂虔為世子薨于路寢五月葬元陵諡武宣王廟號太祖然沮渠茂虔遜第三子聰穎好學和雅有度義和三年立為世子加中外都督大將軍錄尚書遜薨僭即河西王位大赦改年為永和元年立子封疆為世子加撫軍大將軍錄尚書事三年五月西中郎將燉煌太守沮渠唐兒上言曰十五日有一老父見于郡城東門投書忽然不見其書一紙八字滿之文曰涼王三十年若七年虔訪于奉常張慎曰昔虢將亡神降于莘深願陛下剋念脩政以副三十年之慶若盤于遊田荒于酒色臣恐七年將有大變虔不悅七年正月朝群臣于謙光殿有狐在于東序門首不見其入左右以告禽之不獲二月端門崩初虔為酒泉太守起浮屠于中街有石象在焉是月目流血五月太廟基陷六月當陽門崩魏常山王赤堅率眾至姑臧虔嬰城拒守九月面縳出降魏釋其縳徙虔及宗室士民十萬戶于平城拜虔征西大將軍王如故八年賜死諡哀王自遜永安元年歲在辛丑至是歲庚寅三十九載, WYG: ''}
