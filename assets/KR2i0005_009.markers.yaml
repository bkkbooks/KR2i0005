  - {type: variant, offset: 428, length: 1, content: 儀, WYG: 君以非罪黜降如日月之蝕耳小縣令敢輕辱我君汝謂我刀鈍邪敢如是乎前將殺之宣懼徒跣挽育乃止由是知名司徒王渾辟為掾除南武陽令為政清約盜賊奔竄遷并州督䕶成都王司馬穎鎮鄴表育為振武將軍拜淵為北單于㕘丞相軍事使鳩合義衆以赴國難育說穎曰元海今去恐不復至臣請為殿下促之穎以為然以育為破虜將軍使追之淵遂拘育為右光祿大夫河瑞之末遷右僕射及聰僭位歴位大司空太保太傅卒劉敏元劉敏元字道光北海人也勵已修學不以險難改心永嘉之亂自齊西奔}
