  - {type: variant, offset: 417, length: 1, content: 梁, WYG: 紀為太常竝封公隆後累遷尚書令儀同三司曜既僭立進為太尉卒贈太師崔遊崔遊字子相上黨人少好學儒術甄明恬静謙退自少及長口未嘗言及財利魏末察孝廉除相府舍人出為氐池長甚有恵政以病免歸泰始初武帝錄叙文帝故府僚屬就家拜郎中不就年七十餘篤學不倦淵師事之從受毛詩京氏易馬氏尚書既僭偽位徵為御史大夫固辭不受卒於家時年九十三撰䘮服圖行於世韋忠韋忠字子節平陽人少慷慨有不可奪之志好學博通性不虛諾閉門修已不交當世每至吉凶親䘮贈遺一無所受年十二䘮父哀慕毁瘠杖而能起晉司空}
  - {type: page-break, offset: 417, content: '', id: KR2i0005_WYG_009-16b, image: WYG0463/WYG0463-0378d.png}
  - {type: variant, offset: 417, length: 1, content: 梁, krp: 紀為太常竝封公隆後累遷尚書令儀同三司曜既僭立進為太尉卒贈太師崔遊崔遊字子相上黨人少好學儒術甄明恬静謙退自少及長口未嘗言及財利魏末察孝廉除相府舍人出為氐池長甚有恵政以病免歸泰始初武帝錄叙文帝故府僚屬就家拜郎中不就年七十餘篤學不倦淵師事之從受毛詩京氏易馬氏尚書既僭偽位徵為御史大夫固辭不受卒於家時年九十三撰䘮服圖行於世韋忠韋忠字子節平陽人少慷慨有不可奪之志好學博通性不虛諾閉門修已不交當世每至吉凶親䘮贈遺一無所受年十二䘮父哀慕毁瘠杖而能起晉司空}
  - {type: variant, offset: 419, length: 2, content: 拜遜, WYG: 秀弔之匍匐號訴哀感旁人秀出而語曰此子長大必為佳器歸而命子頠造焉服闋廬於墓側家貧藜藿不充妻子不免於饑寒及頠為僕射言之於司空張華華辟之辭疾不赴人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠慾而無厭棄典禮而附賊后若此豈大丈夫之所宜行邪裴常有心託我恐洪濤蕩嶽餘波見漂况可臨尾閭而窺沃焦哉太守陳楚迫為功曹會山羌破郡楚攜子出走賊射之中三創忠冐刃伏楚以身捍之泣曰忠願以身代君乞諸君哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸仕聰為}
  - {type: page-break, offset: 419, content: '', id: KR2i0005_WYG_009-17a, image: WYG0463/WYG0463-0379a.png}
