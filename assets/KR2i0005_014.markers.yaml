  - {type: variant, offset: 956, length: 235, content: 熾盤討吐谷渾別統旁行長柳川掘達於渴渾川大破之俘獲男女二萬三千五年正月有五色雲起於南山盤大悅謂群臣曰吾今年應有所定王業成矣於是繕甲整兵以伺四方之隙五月聞傉檀西征率步騎二萬襲樂傉檀降遂并南涼兵強地廣十月僭即秦王位置百官立妻禿髮氏為王后四年熾盤子元基自長安逃歸拜尚書僕射建宏元年立第二子慕末為太子領撫軍大將軍都督諸軍事改元赦熾盤寢疾顧命太子慕末乃薨於外寢六月葬武平陵諡文昭王廟號太祖乞伏慕末乞伏慕字安石熾盤之第二子幼而好學有文才建宏元年立為太子熾盤薨僭即秦王位大赦改年為承宏元, WYG: 時}
