  - {type: variant, offset: 936, length: 18, content: 以尚書令翟勒為相國封拜各有差乞伏熾盤, WYG: 幽𢎞及太后程氏并秦王宏南陽王恢於崇訓宫未幾密遣人賊殺之是時西羌大都督姚弋仲稱疾不賀虎累馳召之及至正色謂虎曰弋仲常謂大王命世英雄奈何把臂受托而返奪之耶虎曰吾豈樂此哉顧海陽年少恐不能了家事故代之爾心雖不平然察其誠實亦不之罪也𢎞在位}
