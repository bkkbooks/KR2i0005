  - {type: variant, offset: 5, length: 1, content: 西, WYG: 卷十四後趙録四石𢎞石𢎞字大雅勒之第二子也幼有孝行以恭謹自守受經於杜嘏誦律於續咸勒曰今世非承平不可專以文業教也於是使劉徴任潘授以兵書王陽教之擊刺立為世子領中領軍尋署衛將軍使領開府辟召後鎮鄴勒僭位立為太子虚襟愛士好為文詠其所親昵莫非儒素勒謂中書令徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以𤣥黙守之聖人之後必有勝殘去殺者天之道也勒甚悦光因説曰皇太子仁孝温恭中山王雄暴多詐陛下一旦不諱臣恐社稷非太子所有也宜漸奪中山王威權使太子早㕘朝政勒納之左僕射程遐言於勒曰中山王勇悍機畧羣臣莫及觀其志度自陛下之外視之蔑如兼以專征歳乆威振内外性又殘賊安忍無賴諸子並長皆預兵權陛下在自當無他恐其怏怏不可輔少主也宜早除之以便大計勒曰今天下未平兵難未巳大雅沖幼宜任彊輔中山王佐命功臣親同魯衛方當委以伊霍之任何至如卿所言也卿正恐輔幼主之日不得獨擅帝舅之權爾吾亦當㕘卿於顧命勿過懼也遐泣曰臣所慮者至公陛下乃以私計拒之豈明主開襟納説忠臣必盡之義乎中山王雖為皇太后所養非陛下天屬不可以親義期也仗陛下神規微建鷹犬之效陛下酬其父子恩榮亦已足矣而志願無極魏任司馬懿父子終於鼎祚淪移以此而觀中山豈將來有益者乎臣因縁多幸託𤓰葛於東宫臣而不竭言於陛下更誰言之陛下若不除中山臣已見社稷不復血食矣勒不聴遐退告徐光曰主上向言如是太子必危將若之何光曰中山王常切齒於吾二人恐非但國危亦將為家禍當為安國寧家之計不可坐而受禍也他日光復乗間言於勒曰陛下廓平八州帝有海内而陛下神色若有不怡者何也勒曰今吳蜀未平書軌不一司馬家猶不絶于丹陽吾恐後世謂吾不應符籙不以吾為受命之主每一思之不覺見於神色光曰臣以陛下為憂腹心之患而何暇更憂四支乎何則魏承漢運為正朔帝王劉備雖紹興巴蜀亦不可謂漢不滅也吳雖跨據江東豈有虧魏美陛下包括二都平蕩八州彼司馬家兒復何異𤣥徳李氏亦猶孫權帝王之統不在陛下竟欲安歸此四支之輕患爾中山王藉陛下指授神畧所向輒克天下皆言其英武亞于陛下兼其殘暴多姦見利忘義無伊霍之忠父子並據權位勢傾王室觀其耿耿常有不滿之心近于東宫侍讌有輕皇太子之色陛下隠忍容之臣恐陛下萬年之後宗社必生荆棘此腹心之重疾也惟陛下圖之勒黙然而竟不從及勒死虎執太子𢎞使臨軒收程遐徐光下廷尉召其子􅃉將兵入宫宿衛文武靡不奔散𢎞大懼自陳劣弱不堪重寄乃讓位于虎虎曰君薨而世子立理之常也臣安敢奸之𢎞泣涕固讓虎怒曰若其不堪重任天下自當有大義何足預論遂以晉咸和八年逼立之大赦改元曰延熈文武百寮進位一等誅程遐徐光八月𢎞策拜虎為丞相魏王大單于加九錫以魏郡等十三郡為國總攝百揆虎偽固讓乆乃受命赦其境内殊死已下立妻鄭氏為魏王后子􅃉為魏太子加使持節侍中大都督中外諸軍事大將軍録尚書事次子宣為使持節車騎大將軍冀州刺史封河間王韜為前鋒將軍司𨽻校尉封樂安王遵齊王鑒代王苞樂平王徙太原王斌為章武王勒文武舊臣皆補左右丞相閒任虎之府僚舊昵悉署臺省禁要更命太子宫曰崇訓宫勒妻劉氏已下皆徙居之簡勒宫人美淑及車馬珍寳服御之上者皆入丞相府署鎮軍將軍􅇪安領左僕射尚書郭殷為右僕射劉氏與彭城王堪密謀堪請出兖州據廪丘挾南陽王恢為盟主宣太后詔討虎事洩虎炙殺堪徴恢還襄國因廢劉氏尋逼殺之尊𢎞母程氏為皇太后冬十月河東王生鎮闗中朗鎮洛陽起兵于二鎮以討丞相虎生自稱}
