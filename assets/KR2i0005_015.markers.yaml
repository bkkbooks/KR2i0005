  - {type: variant, offset: 258, length: 3, content: 博士簡, WYG: 太史令虎還自令支過易京惡其固而毁之因謁石勒墓朝其羣臣于襄國建徳前殿復從征文武有差至鄴設飲至之禮賜俘徧于丞郎以劉羣一作臺為中書令盧諶為中書侍郎蒲洪以功拜使持節都督六夷諸軍事冠軍將軍封西平郡公石閔言于虎曰蒲洪雄俊驍果其諸子竝非常才宜宻除之虎不納待之愈厚虎謀伐昌黎遣渡遼將軍曹伏將青州之衆渡海戍蹋頓城無水而還因戍于海島運糓三百萬斛以給之又以船三百艘運糓三十萬斛詣髙句驪使典農中郎將王典率衆萬餘屯田海濱又令青州造船千艘以謀撃燕掠縁海諸縣所在殺戮五月使太子宣率步騎}
