  - {type: variant, offset: 255, length: 2, content: 翟崇, WYG: 内史崔燾居就令游泓武原内史一作令史常覇東夷校尉封抽䕶軍宋晃等皆應之凡得三十六城戊子進逼棘城不拔壬辰引退皝遣子恪率胡騎三千晨出挑戰諸門皆若有師出者四面如雲虎大驚棄甲逃遁惟游撃將軍石一作冉閔一軍獨全于是召趙攬復}
