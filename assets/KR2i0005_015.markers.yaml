  - {type: variant, offset: 5, length: 0, content: '', WYG: 卷十五後趙錄五石虎上石虎字季龍勒之從子也祖曰㔨邪父曰寇覔寇覔有四子虎第四勒父曷朱㓜而子之故或謂之為勒弟也年六七嵗有善相者遇之於路曰此兒貌竒有壯骨貴不可言晉永興中與勒相失永嘉五年劉琨送勒母王氏及虎於葛陂時年十七矣性殘忍好馳獵遊蕩無度能左右射尤善彈數彈人為軍中患勒怒之白母王氏曰此兒兇暴無度一作頓使軍人殺之聲名可惜不若自除之勒母曰徤犢走車破轅良馬須逸鞭汎駕然後能負重致逺且當小忍勿便殺也一云快牛為犢子小時多能破車為復小忍勿却之至年十八稍檢攝恭謹嚴重愛士身長七尺五寸趫㨗便弓馬勇冠當時至於降城陷壘不復别斷善惡坑斬士女鮮有遺𩔖勒雖屢加誨責而行意自若然御衆甚嚴莫敢犯者指授攻討所向無前故勒寵信彌隆委以專征之任所在立功將佐親戚莫不敬憚勒深嘉之拜征虜將軍性尤酷虐所為無道軍中有勇幹策略與已齊者因獵戯輒以事害之前後所殺甚衆勒之居襄國劉聰以虎為魏郡太守鎮鄴三臺後封繁陽侯食邑三千戸勒即大單于趙王位署為單于元輔都督禁衛諸軍加侍中開府進封中山公及勒僭稱尊號授太尉守尚書令進封中山王食邑萬戸虎自以勲髙一時謂勒即位之後大單于必在已而更以授其子𢎞乃深恨之私謂其子􅃉曰主上自都襄國以来端拱指授以吾身當矢石二十餘年南擒劉岳}
