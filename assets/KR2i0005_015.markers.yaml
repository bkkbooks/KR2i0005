  - {type: variant, offset: 15, length: 0, content: '', WYG: 衛國有田疇不闢桑業不修者貶其守宰而還是年奉天竺佛圖澄於鄴城建武二年春正月使牙門將張彌徙洛陽鍾虡九龍翁仲銅駝飛㢘于鄴虎大恱為之赦二嵗刑賚百姓糓帛百官爵一級下書曰三載考績黜陟幽明斯則先王之令典政事之通塞魏始建九品之制三年一清定之雖未盡𢎞美亦縉紳之清律人倫之明鏡從爾以来遵用無改先帝創臨天下黄紙再定至于選舉銓為首格自不清定三載于兹主者其更銓論務揚清激濁使九流咸允也吏部選舉可依晉氏九班選制永為揆法選畢經中書門下宣示三省然後施行之其著此詔書于令銓衡不奉行者御史彈坐以聞冬十一月索頭郁鞠率衆三萬來降虎署郁鞠等十三人為親通趙王皆封列侯散其部衆于冀青等六州時衆役煩興軍旅不息加以乆旱糓貴百姓饑饉野無生草金一斤直米二斗銀一兩一作斤直肉一斤流亡死者十有六七百姓嗷然無所生賴或掘野䑕捕蟄鷰而食之虎使令長率丁壯随山澤採橡一作捕魚以濟老弱而復為權豪所侵人無所得又料殷富之家配饑人以食之公卿以下出糓以助賑給姦吏因之侵奪無已雖有貸贍之名而無其實先是孟津河東去鄴城五里有濟北郡糓城縣糓城山是黄石公所𦵏處有人登此山見崩土中有文石石文鮮明詣鄴獻之使採取以治宮殿遂免糓城令以不奏聞故也虎大起宮殿于鄴都遂于鄴西文昌故殿處造東西太武二殿採糓城山文石為基一基下五百武直宿衛屈柱跌瓦悉鑄銅為之金漆圖飾焉又徙長安雒陽銅人置諸宮前以華其國城之西北有三臺皆因城為基巍然崇舉其髙若山又建九華宮以三三為位謂之九華沈約詩曰徘徊九華宮即此宮也北建逍遥樓東北建披雲樓城門上建玳瑁樓純用金銀裝飾懸五色珠簾白玊鈎帶内有瑜石床以玳瑁為龜甲文鋪以十色錦繡故名玳瑁樓其太武殿懸紫綬于梁柱綴玊璧于綬又造東西宮鄴宮南面三門西鳳陽門髙二十五丈上有層樓向陽安金鳳凰二頭于其上鎮之其頭髙一丈六尺東城上立東明觀觀上加金博山謂之鏘天北城上有齊午樓超出羣榭孤髙特立其城東西七里南北五里飾表以塼百步一樓凡諸宮殿門臺隅雉皆加觀榭層甍疊宇飛檐拂雲圖以丹青色以輕素門窓戸宇朱柱白璧未到鄴城六七十里遥望苕亭便見此門巍若仙居鄴城東門石橋有兩石柱製作精妙柱側悉鏤雲炬上作蟠螭甚有形勢}
