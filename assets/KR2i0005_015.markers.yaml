  - {type: variant, offset: 19, length: 0, content: '', WYG: 中東西七十五步南北六十五步皆以漆灌瓦金鐺銀楹珠簾玊璧窮極伎巧又于太武殿前起樓髙四十丈結珠為簾垂五色玊珮風至鏗鏘和鳴清雅盛夏之時登髙樓以望四極奏金石絲竹之樂以日繼夜于樓下開馬埒射塲週迴四百步皆文石丹砂及彩畫于埒旁聚金玊錢貝之寳以賞百戯四廂置錦幔屋柱皆隐起為龍鳳百獸之形雕琢衆玊以飾楹柱夜中往往有光明集諸羌氐于樓上或時亢旱舂雜寳異香為屑使數百人于樓上吹散之名曰芳塵臺上有銅龍腹可盛數百斛酒使胡人于樓上噀酒風至望之如露名曰粘雨臺引以灑塵樓上戯笑之聲音震鄴中又造梁馬臺一名笑馬臺一名戯馬臺一名閱馬臺在城中漳水之南約次為臺基髙五丈列觀其上虎常于此臺練簡騎卒武牙宿將雲騰黒矟騎五千每月朔晦閱馬于此臺虎毎講武于其下升觀以望之乃于漳水之南張幟鳴鼔列騎星羅虎登臺射􅐴箭一發五字水經作放鳴鏑之矢五千騎一時奔走從漳水之南齊至于臺下隊督以下皆有班賚虎又射一箭五千騎又一時奔走至于漳水之北其五千流散攢促若數萬人騎皆以黒矟從事故以黒矟為號又以介羽漆砂即名鬭鷄臺以鬬鷄為戯其北有臨漳宮東有永樂宮西有黎園宮東南有赤橋宮西北有紫陌宮又有御龍宣武凌霄如意四觀皆虎遊獵燕息之所又有聖夀堂用玊珂八百具抱桂丁香末以塗壁胡桃油以塗瓦垂金鈴萬餘箇若㣲風至則聲聞十餘里又于銅雀臺更増二丈立一屋連棟接檐彌覆其上盤迴隔之名曰命子窟又于屋上起五層樓髙十五丈去地二十丈又作銅雀于樓巔舒翼若飛南列金雀臺髙八丈有屋一百九間北曰氷井臺亦髙八丈有屋百四十間上有氷室室有數井井深十五丈冬月蔵氷三伏之日以氷賜大臣及蔵石墨石墨可書又燃之難盡亦謂之石炭又有粟窖及監以備不虞今窖上猶有石銘存焉又起靈風臺九殿于顯陽殿後選百官州郡民女以充之又于正㑹殿南面臨軒殿上施白玊床流蘇帳皆竊擬禮制整法服冠通天佩玊璽𤣥衣纁裳畫日月火龍黼黻華􅆉粉米改車服着逺遊冠臨軒大㑹着丹紗袍獵着金縷合歡袴改虎頭鞶囊為龍頭鞶囊又改直盪冠為龍騰冠以絳幘于襄國又作金華殿殿前有白龍鐏作金龍于東廂西向龍口又安玊盤受玊十斛又安金博山蟬翼單紗裏服天曉行禮公執圭卿執羔大夫執雁士執雉一如舊禮充庭車馬四月八日九龍銜水浴太子之象太武殿前溝水注之浴時溝中}
