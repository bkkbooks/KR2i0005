  - {type: variant, offset: 227, length: 1, content: 以, WYG: 􅃉潛謀為逆乃稱疾不視事詳具􅃉𫝊虎聞􅃉有疾欲往視之先遣所親任女尚書往察􅃉呼前與語抽劍撃之虎聞大怒收中庶子李顔等誅之幽􅃉于東宮廢為庶人其夜殺􅃉并其妃張氏及男女二十六人合一棺埋之宮臣支黨二百餘人皆伏誅廢􅃉母鄭氏為東海太妃立河間公宣為天王皇}
