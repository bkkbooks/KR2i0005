  - {type: variant, offset: 245, length: 0, content: '', WYG: 皝不㑹兵攻遼而自專其利謀將伐之佛圖澄曰燕福徳之國未可加兵虎作色曰以此攻城何城不克以此衆戰誰能禦之區區小豎何所逃也太史令趙攬固諌曰燕地嵗星所守行師無功必受其禍虎怒鞭之出為肥如}
