  - {type: variant, offset: 5, length: 0, content: '', krp: 卷十五後趙錄五石虎上石虎字季龍勒之從子也祖曰㔨邪父曰寇覔寇覔有四子虎第四勒父曷朱㓜而子之故或謂之為勒弟也年六七嵗有善相者遇之於路曰此兒貌竒有壯骨貴不可言晉永興中與勒相失永嘉五年劉琨送勒母王氏及虎於葛陂時年十七矣性殘忍好馳獵遊蕩無度能左右射尤善彈數彈人為軍中患勒怒之白母王氏曰此兒兇暴無度一作頓使軍人殺之聲名可惜不若自除之勒母曰徤犢走車破轅良馬須逸鞭汎駕然後能負重致逺且當小忍勿便殺也一云快牛為犢子小時多能破車為復小忍勿却之至年十八稍檢攝恭謹嚴重愛士身長七尺五寸趫㨗便弓馬勇冠當時至於降城陷壘不復别斷善惡坑斬士女鮮有遺𩔖勒雖屢加誨責而行意自若然御衆甚嚴莫敢犯者指授攻討所向無前故勒寵信彌隆委以專征之任所在立功將佐親戚莫不敬憚勒深嘉之拜征虜將軍性尤酷虐所為無道軍中有勇幹策略與已齊者因獵戯輒以事害之前後所殺甚衆勒之居襄國劉聰以虎為魏郡太守鎮鄴三臺後封繁陽侯食邑三千戸勒即大單于趙王位署為單于元輔都督禁衛諸軍加侍中開府進封中山公及勒僭稱尊號授太尉守尚書令進封中山王食邑萬戸虎自以勲髙一時謂勒即位之後大單于必在已而更以授其子𢎞乃深恨之私謂其子邃曰主上自都襄國以来端拱指授以吾身當矢石二十餘年南擒劉岳}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 走索頭東平齊魯西定秦雍剋殄十有三州成大趙之業者我也大單于之望當以授我今乃以與黄吻小一作婢兒每一憶此令人氣塞不能寢食待主上晏駕之後不足復留種也建武元年春正月虎廢勒子𢎞羣臣已下勸其稱尊號虎下書曰王室多難海陽自棄四海任重故俛從推逼朕聞道合乾坤者稱皇徳協人神者稱帝皇帝之號非所敢稱一作聞且可稱居攝趙天王以副天人之望于是大赦境内殊死已下改元建武以夔安為侍中太尉守尚書令郭殷為司空韓晞為左僕射魏槩馮莫張崇曹顯為尚書申鍾為侍中郎闓為光禄大夫王波為中書令自餘文武封拜各有差立子􅃉為太子虎以䜟文天子當從東北來于是備法駕行自信都而還以應之分癭陶之栁鄉立停駕縣又分司州之河南河東𢎞農滎陽兖州之陳留東}
  - {type: page-break, offset: 6, content: '', id: KR2i0005_WYG_015-3a, image: WYG0463/WYG0463-0436a.png}
  - {type: page-break, offset: 6, content: '', id: KR2i0005_WYG_015-3b, image: WYG0463/WYG0463-0436b.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 走索頭東平齊魯西定秦雍剋殄十有三州成大趙之業者我也大單于之望當以授我今乃以與黄吻小一作婢兒每一憶此令人氣塞不能寢食待主上晏駕之後不足復留種也建武元年春正月虎廢勒子𢎞羣臣已下勸其稱尊號虎下書曰王室多難海陽自棄四海任重故俛從推逼朕聞道合乾坤者稱皇徳協人神者稱帝皇帝之號非所敢稱一作聞且可稱居攝趙天王以副天人之望于是大赦境内殊死已下改元建武以夔安為侍中太尉守尚書令郭殷為司空韓晞為左僕射魏槩馮莫張崇曹顯為尚書申鍾為侍中郎闓為光禄大夫王波為中書令自餘文武封拜各有差立子邃為太子虎以䜟文天子當從東北來于是備法駕行自信都而還以應之分癭陶之栁鄉立停駕縣又分司州之河南河東𢎞農滎陽兖州之陳留東}
  - {type: variant, offset: 7, length: 6, content: 錄馮跋字文起, WYG: 為洛州又改陳留郡為建昌郡屬洛州虎諱言勒呼馬勒曰轡羅勒曰香菜時徐州從事蘭陵朱縱殺刺史郭祥以彭城歸晉虎遣將軍王朗討一作撃之縱奔淮南虎荒淫廢政外躭營繕使太子􅃉省可尚書奏事選牧守祀郊廟惟征伐刑斷乃親覽之鸛雀臺崩殺典匠少府任汪復使修之倍于常度夏四月癸夘虎率衆南遊至臨江而還有游騎十餘疋至歴陽歴陽太守袁躭甚懼表聞于晉不言騎多少京師大震遣司徒王導加大司馬假黄鉞都督征討諸軍事以禦之癸丑晉帝觀兵于廣莫門分命諸將遣將軍劉仕救歴陽平西將軍趙𦙍屯慈湖龍驤將軍路永戍牛渚建武將軍王允之戍蕪湖司空郄鑒使廣陵相陳光帥衆衛京師俄聞趙騎至少又退向東陽戊午解嚴遂以桓宣為都督江沔前鋒征討諸軍事平北將軍司州刺史假節鎮襄陽虎後遣征虜將軍石遇率騎七千渡沔寇中廬圍桓宣于襄陽輔國左將軍毛寳南中郎將王國征西司馬王愆期等率荆州之衆來援屯于章山遇三面為地窟攻城宣募精勇出其不意殺傷數百多獲鎧馬攻守二旬遇軍饑疫不克而還宣遣步騎收南陽諸郡百姓陷没者八千餘人詔以宣為南陽襄陽新野南鄉四郡諸軍事梁州刺史毛寳為征虜將軍戍邾城虎以租入殷廣轉輸勞煩令中倉嵗入百萬斛餘皆儲之水次晉將軍淳于安攻琅邪費縣俘獲數千人虎下書令刑贖之家得以錢代財帛無錢聴以糓麥皆随時價輸水次倉秋八月冀州八郡雨雹大傷秋稼糓價騰貴銀一斤值米二斗下書深自咎責遣御史所在發水次倉麥以給秋種尤甚之處差復一年鸛雀臺成賜匠各有差九月虎遷都鄴宮尚書請太常告廟虎曰古者將舉大事必告宗廟而不列社稷尚書可詳議以聞公卿乃請使太尉告社稷從之時自去年至九月十一月不雨及入鄴宮澍雨周洽虎大恱赦殊死已下始制散騎常侍已上得乗軺軒王公郊祀乗副車駕四馬龍旂八旒朔望朝㑹節乗軺軒冬十月羌薄句大猶保險未服遣子章武王斌帥精騎二萬并秦雍二州兵討平之虎如}
