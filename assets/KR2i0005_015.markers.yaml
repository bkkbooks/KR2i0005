  - {type: variant, offset: 20, length: 0, content: '', krp: 安銅龍以疏其水相去六七步注之斷水又安銅龜飲穢水出後脚下入諸公主第溝水亦出建春門又有皇后浴室三間徘徊側宇櫨檘隠起雕彩刻鏤極盡粲麗室中臨池上有石床别為浴臺有四時浴室皆用瑜石珷玞為堤岸或以琥珀車渠為瓶杓夏則引外溝水以納于池池中皆以紗縠為囊盛百雜香漬于水底或用葛為囊嚴氷之時作銅屈龍數千枚各重數十斤燒如火色投于水中則池水恒溫引浴室中名曰燋龍温池又用文錦步障縈蔽浴所與宮人寵嬖者解媟服宴戯彌于日夜名曰清嬉浴室浴罷洩水于宮外水流之所名温香渠渠外之人爭来汲取得升合以歸其家人莫不怡恱浴室中種二長生樹枝條交于棟上團團作車蓋形冬日不凋葉大如掌至八九月乃生華花色白子赤大如橡子不中啖也世人謂之西王母長生樹又安槃帶十斛于二樹之間冬月施蜀一作熟錦流蘇斗帳又用明光錦以白縑為裏名曰複帳帳之四角安純金銀鑿鏤香爐爇以百和香安金蓮花以冠帳頂帳之四面皆作十二章相采色燿爛又作沈一作流蘇帳帳頂亦安金蓮花花中懸金薄織成綩囊褁受三升以沈香注帳之四面上有十二香囊彩色亦同又安純金龍頭銜五色沈蘇或用黄綈博山文錦或用紫綈及大小明光錦大約春秋施錦帳表以五色絲為裌帳夏用單紗羅或綦文單羅或縠文羅為單帳織錦羅在中尚方三署皆數百人錦有大登髙小登髙大明光小明光大博山小博山大茱茰小茱茰大交龍小交龍葡萄文錦班文錦鳳凰錦朱雀錦韜文錦桃核文錦其御罽有豹頭文罽鹿子罽花罽或青綈或白綈或黄綈或緑綈或紫綈或蜀綈工巧百數不可盡名又作雲母五明金薄莫難扇此一扇之名也薄打純金如蟬翼二面彩漆圖畫列仙竒異鳥獸其五明方中辟方三寸或五寸随扇大小雲母帖其中細縷縫其際雖掩盡而彩色明徹㸔之如謂可取故名莫難也虎出時常以此扇挾乗輿或用象牙及桃枝扇其上或作緑沈色或作木蘭色或作紫紺色或作鬰金色又作金銀鈕屈膝屏風衣以白縑畫文人義士仙人禽獸之像讚者皆三十二言髙施則八尺下施則四尺或施六尺随意所欲髙下文駕有金銀輦雲母輦數百乗皇后出乗嵩輅或乗文武玊輅或乗朱漆卧輦以雲母代紗中外四梁皆通徹明亮虎正㑹上御食遊槃兩重皆金銀參帶百二十醆彫飾竝同其叅帶之間茱茰盡㣲如被髮近看乃得見動遊帶則員轉也御床獨方三丈其餘床皆局脚髙下六尺後宮别妾房中有小形玉床又有轉開床以射鳥獸其作褥周三丈用錦縁之作席以錦雜以五香施以五彩綫編蒲皮縁之名五彩席所以祭天御坐几悉雕漆畫皆為五彩色又有三人臺及宮内中鏡有徑二三尺者純金蟠龍雕飾又有大小鏡二萬餘枚又為曲鏡又以胡粉和椒塗壁名曰椒房後庭服綺縠玩珍竒者萬餘人内置女官十有八等教宮人星占及馬步射置女太史于靈臺仰觀災祥以考外太史之虚實禁郡國不得私學星䜟敢有犯者斬正㑹置三十部女鼓吹三十步輙置一部一部十二人皆在平閣上去地丈餘又置女尚書官屬皆着紫袴佩玉羽儀雜伎工巧皆與外侔正㑹殿前作樂髙絙龍魚鳳凰安息五案之屬莫不}
