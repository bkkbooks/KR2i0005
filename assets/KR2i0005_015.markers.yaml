  - {type: variant, offset: 223, length: 0, content: '', WYG: 􅃉為天王皇太子諸子為王者皆貶封郡公宗室為王者降為縣侯百官封署各有差太原徙人有一作十五百餘戸叛入黒羌武鄉長城徙人韓强獲𤣥玉璽方四寸七分龜鈕金文詣鄴獻之拜强騎都尉復其一門使人採藥于華山上得玉版一枚其色黒文曰嵗在申酉不絶如綫嵗在壬子真人乃見虎以為應符之兆大恱夔安等又勸進曰臣等謹案大趙水徳𤣥龜者水之精也玉者古之寳也分之數以象七政寸之紀以凖四極昊天成命不可乆違輙下史官擇吉日具禮儀謹昧死上皇帝尊號虎下書曰過相褒美猥見推逼覽増恧然非所望也其亟止兹議今東作告始自非京城内外皆不得表慶中書令王波上𤣥璽頌以美之虎以石𢎞時造此璽强遇而獻之太子􅃉既總百揆淫虐無道河間公宣樂安公韜皆有寵于虎􅃉疾之如仇虎又荒躭内遊威刑失度􅃉以事為可呈呈之虎恚曰此小事何足呈也時有所不聞復恚曰何以不呈誚責笞捶月至再}
