  - {type: variant, offset: 227, length: 1, content: 以, krp: 邃潛謀為逆乃稱疾不視事詳具邃𫝊虎聞邃有疾欲往視之先遣所親任女尚書往察邃呼前與語抽劍撃之虎聞大怒收中庶子李顔等誅之幽邃于東宮廢為庶人其夜殺邃并其妃張氏及男女二十六人合一棺埋之宮臣支黨二百餘人皆伏誅廢邃母鄭氏為東海太妃立河間公宣為天王皇}
  - {type: variant, offset: 230, length: 2, content: 永領, WYG: 宣母杜昭儀為天王皇后冬十一月乙丑太白犯嵗星于營室是年虎將李穆率騎五千送魏烈帝于}
  - {type: variant, offset: 230, length: 2, content: 永領, krp: 宣母杜昭儀為天王皇后冬十一月乙丑太白犯嵗星于營室是年虎將李穆率騎五千送魏烈帝于}
  - {type: variant, offset: 233, length: 0, content: '', WYG: 寗其故部落多歸附之國人復奉烈帝為代王城盛樂而居之以其弟昭成帝什翼犍為質於趙建武四年春正月虎將伐鮮卑段遼于遼西募有勇力者三萬人皆拜龍騰中郎㑹遼遣從弟段屈雲襲幽州幽州刺史李孟退奔易京虎以桃豹為横海將軍王華為渡遼將軍統舟師十萬出漂渝津支雄為龍驤將軍姚弋仲為冠軍將軍統步騎十萬為前鋒以伐段遼三月進次金臺支雄前驅入薊段遼所署漁陽太守馬鮑代相張牧上谷相侯龕等四十餘城竝率衆來降北平相陽裕帥其民千餘家登燕山以自固雄攻安次斬其部大人􅄼樓竒遼懼率妻子宗族豪大千餘家棄令支奔密雲山遼左長史劉羣右長史盧諶司馬崔恱等封其府庫遣使請降虎遣將軍郭泰麻秋等帥輕騎二萬追遼及之戰于宻雲獲其母妻斬級三千遼單馬竄險保於平崗遣子乞特真送表及獻名馬虎納之遂入令支遷其戸二萬餘于雍司兖豫四州士大夫之有才行者皆擢敘之先是北}
