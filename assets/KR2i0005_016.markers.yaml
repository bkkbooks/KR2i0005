  - {type: variant, offset: 192, length: 0, content: '', WYG: 人出車一乗牛二頭米各十五斛絹十匹諸役調有不辦者皆以斬論將圖江表百姓窮窘率多鬻子以充軍須猶不能給乃自經于道樹死者相望而求發無已㑹青州上言濟南平陵城西北石虎一作獸一夕忽移於城東南善石溝上有狼狐千餘迹随之迹皆成蹊虎大恱曰石虎者朕也自西北徙而東南者天意欲使朕平蕩江南也天命不可違其𠡠諸州兵明年悉集朕當親董六軍以奉天命羣臣皆賀上皇徳頌者一百七人時妖怪尤多上黨孟門上有神人之象坐于山上三日而去遣使以太牢祀之武鄉送雄虎變為雌産一狼子即噬虎腦而殺之後三日狼子亦死石然于泰山八日而滅東海有大石自立旁有血流鄴西山石間血流出長十餘步廣二尺餘太武殿初成圖畫自古聖賢忠臣孝子烈士貞女皆變為胡狀旬餘頭悉縮入肩中惟􅃣㠹彷彿㣲出虎大惡秘而不言佛圖澄對之流涕建武九年夏五月虎帥衆伐慕容皝為皝所敗時晉建元元年也秋七月晉都督江荆等諸軍事庾翼以滅胡取蜀為己任遣使東約慕容皝西約張駿刻期大舉朝議多以為難惟車騎將軍庾氷意與之同而桓溫等贊成之至是詔議經畧中}
