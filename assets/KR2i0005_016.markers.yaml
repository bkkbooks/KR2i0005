  - {type: variant, offset: 120, length: 0, content: '', WYG: 討之資青冀幽州為東征之計皆三五發卒諸州軍造甲者五十餘萬人船夫十七萬人為水所没猛獸所食者三分居一兼之公侯牧宰競興私利侵擾黎元庶民失業得農桑者十室而三貝丘人李𢎞因衆心之怨自言姓名應䜟連結姦黨署置百僚事發誅之連坐者數千家虎馳獵無度晨出夜歸又多輕行躬察作所侍中韋謏諌曰臣聞千金之子坐不垂堂萬乗之主行不履危陛下雖天生神武雄據四海乾坤冥讚萬無所慮者也然白龍魚服有豫且之禍海若潛游罹葛陂之酷願陛下清宮蹕路思二神為先鑒不可忽天下之重輕行斤斧之間猝有狂夫之變龍騰之勇不暇施也智士之計豈及設哉又自古聖}
