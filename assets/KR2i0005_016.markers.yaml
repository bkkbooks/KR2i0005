  - {type: variant, offset: 450, length: 1, content: 裕, WYG: 虎以平西將軍張伏都為使持節都督征討諸軍事帥步騎三萬撃凉州張駿伏都濟河與駿將謝艾戰于河西大敗而還虎雖昏虐無道而頗慕經學遣國子博士詣洛陽寫石經校中經於秘書國子祭酒聶熊注糓梁春秋列于學宮大司馬幽州牧燕公斌淫酒荒獵常懸管而入所聚羣兇因以肆虐征北將軍張賀度嚴衛馳白之虎遣尚書張離持節召斌鞭之三百免官歸第建武十年春正月虎饗羣臣於太武前殿有白鴈數百翔集馬道之南虎命射之皆不獲時諸州兵集者百餘萬太史令趙攬宻言於虎曰白鴈集庭宮室將空之象也不宜南行虎信之乃臨宣武觀大閱而解嚴復以燕公斌為使持節侍中大司馬錄尚書事置左右戎昭曜武將軍位在左右衛上東宮置左右統將軍位在四率上置上中光禄大夫位在左右光禄上置鎮衛將軍位在車騎將軍上二月遣使徴天水楊軻軻少好易長而不娶學業精養徒從數百常食麤飲水衣褐緼袍人不堪其憂而軻悠然自得疎賓異客音㫖未嘗交也雖受業門徒非入室弟子莫得親言欲所論授須旁無雜人授入室弟子令逓相宣授劉曜僭號徴拜太常固辭不受曜亦敬而不逼遂隠於隴山勒既禽曜秦人東徙軻}
