  - {type: variant, offset: 5, length: 0, content: '', WYG: 卷十六後趙錄六石虎中建武五年春正月虎下書令諸郡國立五經博士初勒置大小學博士于是復置國子博士助教虎以吏部選舉斥外耆徳而勢門童㓜多為美官免郎中魏􅿩一作象為庶人}
  - {type: variant, offset: 5, length: 0, content: '', krp: 卷十六後趙錄六石虎中建武五年春正月虎下書令諸郡國立五經博士初勒置大小學博士于是復置國子博士助教虎以吏部選舉斥外耆徳而勢門童㓜多為美官免郎中魏􅿩一作象為庶人}
  - {type: variant, offset: 6, length: 2, content: 錄赫, WYG: 四月辛未晉征西將軍庾亮遣叅軍趙松擊巴郡江陽獲蜀將李閎黄桓等又欲率衆十萬移鎮石城遣諸軍羅布江沔為伐趙之規帝下其議時晉咸康五年也丞相王導請許之太尉郄鑒以為資用未備不可大舉太常蔡謨議曰時有否泰道有屈伸暴逆之冦雖終滅亡然當其强盛皆屈而避之是以髙祖受黜于巴漢忍辱于平城也若爭强于鴻門則亡不終日故蕭何曰百戰百敗不死何待原始要終期于大濟而已豈與當亡之寇爭遲速之間哉夫惟鴻門之不爭故垓下莫能與之爭文王身圮于羑里故道泰于牧野句踐見屈于㑹稽故威伸于强吳今日之事亦由此矣賊假息之命垂盡而豺狼之力尚强宜抗威以待時或曰抗違待時時已可矣愚以為時之可否在胡之强弱胡之强弱在虎之能否虎之能否可得而言也一作矣自勒初起虎常為爪牙百戰百勝遂定中原境土所據同于魏世勒死之日將相内外悉欲誅之虎獨起于衆異之中殺嗣主誅寵臣内難既定千里逺出一攻而拔金墉再戰而斬石生禽彭彪殺石聰滅郭權還據根本内外竝定四方鎮守不失尺土詳察此事豈能乎將不能也假令不能者為之其濟乎將不濟也胡前攻襄陽而不能拔誠有之矣不信百戰之効而執一攻之驗棄多從少于理安乎譬若射者百發而一不中可謂之拙乎且不拔襄陽者非虎之身也桓平北守邉之將爾賊一作胡前攻之爭疆場爾得之為喜不得則止非其所急也今征西之往則異于是何者重鎮也名將也中國之人所聞而歸心也今而西渡實有席卷河南之勢賊所大懼豈與桓宣同哉虎必率其精兵身來拒戰若欲與戰戰何如石生若欲城守守何如金墉若欲阻沔沔何如大江蘇峻何如虎凡此數者宜詳校之愚謂石生猛將闗中精兵今征西之戰不能勝也金墉險固劉曜十萬所不能拔今征西之守不能勝也又是時兖州洛陽闗中皆舉兵撃虎比今三處反為其用方之於前倍半之舉也昔石生不能敵其半而征西欲當其倍愚所疑也蘇峻之强不及虎沔水之險不及大江大江不能禦峻而以沔水禦虎又所疑也昔祖士雅在譙佃于城北慮賊来攻因以為資故豫安軍以禦其外糓將熟賊果至丁夫戰于外老弱穫于内多持炬火急則燒糓而走如此數年竟不得其利是時賊惟據沔北方之于今四分之一爾士雅不能捍其一而征西欲禦其四又所疑也或云賊若多来則必無糧然致糧之難莫過崤函虎昔涉此險深入敵國平闗中而後還今至襄陽路既無險又行其國内自相供給方之于前難易百倍前已經至難而謂今不能濟其易又所疑也然此所論但說征西既至之後爾尚未論道路之虜也自沔以西水急岸髙魚貫泝流首尾百里若賊無宋襄之義及我未陣而撃之將若之何今王士與賊水陸勢異便習不同冦若送死雖開江延敵以一當千猶吞之有餘宜誘而致之以保萬全棄江逺進以我所短撃彼所長恐非廟勝之算也朝議同之故亮不果移鎮亮弟懌時為輔國將軍梁州刺史假節鎮魏興遣牙門霍佐迎將士妻子佐驅三百餘口奔降于虎燕復遣别將來攻遼西虎以石成為鎮逺將軍帥積弩將軍呼延晃建威將軍張支等撃之晃支為燕所殺俘獲數千家而去秋七月虎以太子宣為大單于建天子旌旗八月以夔安為征討大都督統石鑒石閔李農張貉一作張賀度下同李莵五將軍帥步騎五萬冦荆揚北鄙九月石閔敗晉師于沔隂殺將軍蔡懐夔安李農攻陷沔南太子宣將朱保敗晉師于白石殺將軍鄭豹談𤣥郝莊随相蔡熊等五人張貉攻邾城敗晉征虜將軍毛寳于邾西寳求救于庾亮亮以城固不時遣軍邾城遂陷死者萬餘人西陽太守樊峻與毛寳率左右突圍出走赴江溺死夔安進據胡亭因冦江夏晉義陽將軍黄冲歴陽太守鄭進以郡迎降安等進圍石城竟陵太守李陽拒戰安敗失首虜五千餘級乃潛師而退遂掠漢東擁七萬餘家遷于幽冀是時豪戚侵恣賄託公行虎患之乃擢殿中御史李巨一作李宸為御史中丞特加親任自此百僚震懾州郡肅清虎曰朕嘗謂良臣如猛獸髙步通衢而豺狼避路信矣哉李巨是也賞賜甚厚巨竟以疾卒鎮逺將軍王擢表雍秦二州族望自東徙一作簡已來遂在戍役之所一作例既衣冠華胄宜蒙優免從之自是皇甫胡梁韋杜牛辛等十有七姓蠲其兵貫一同華族華族一作舊族随才銓敘思欲還桑梓者聴之其非此等不得為例冬十月以撫軍將軍李農為使持節監遼西北平諸軍事征東將軍營州牧鎮令支農率衆三萬與征北大將軍張舉攻燕凡城虎以遼西廹近燕境數遭攻襲乃徙其民于冀州之南十二月丁丑太保桃豹卒建武六年春二月虎將石成與慕容皝戰於遼西大敗引歸夏六月大旱白虹經天自正月至六月不雨虎遣太子宣詣臨漳滏口祈之乆而不降乃下書曰朕在位六載不能上和乾象下濟黎元以致星虹之變其令百僚各上封事解西山之禁蒲葦魚鹽除嵗供之外皆無所困公侯卿牧不得規占山澤奪百姓之利又下書曰前以豐國澠池二治初建徙刑徒配之權救時務而主遂為恒法致起怨聲自今犯罪流徒皆當申奏不得輒配也京獄見囚非手殺人一皆原遣又命佛圖澄自行祈雨俄有白龍降于祈所其日㴻雨方數千里是年大收秋七月虎遺漢主李夀書欲與之}
