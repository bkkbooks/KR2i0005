  - {type: variant, offset: 452, length: 0, content: '', WYG: 長安至是虎備𤣥纁束帛安車徴之不應親駕往視亦髙卧不起廹之乃發既見不拜與語不言命舍於永昌乙第有司以軻倨傲請從大不敬論虎不從下書任軻所向軻在永昌虎每有饋餼輙口授弟子使為表謝其文甚美覽者嘆其有深致虎欲觀其真趣乃宻令美女夜以動之軻蕭然不顧又使人將其弟子盡行遣魁壯羯士衣甲持刀臨之以兵并竊其所賜衣服軻視而不言了無懼色常卧土牀覆以布被裸寢其中下無茵褥潁川荀鋪好竒之士也造而談經瞑目不答發軻被露其形大笑之軻神體頺然無驚怒之狀於是咸以焦光之徒未有能量其深淺也後上疏陳鄉思求還虎送以安車蒲輪蠲十戸供之自歸秦州教授不絶其後秦州兵亂軻弟子以牛負軻西奔為戍軍追禽遂為所害夏四月凉州牧張駿遣將張瓘攻王擢於三交城擢敗奔還太子宣淫虐日甚莫敢以告領軍將軍王朗言于虎曰今隆冬雪寒而皇太子使人斫伐宮材引于漳水功役數萬士衆吁嗟陛下因出遊罷之虎如其言宣知朗所為怒欲殺之而無因㑹熒惑守房太史令趙攬承宣㫖言于虎曰昴者趙之分也熒惑所在其主惡之房為天子其殃不小宜以貴臣姓王者當之虎曰誰可當者攬乆而對曰無復貴于王領軍也虎意惜朗且猜之曰更言其次攬無以對因曰其次惟中書監王波爾虎乃下詔追波前議楛矢事腰斬之并其三子投尸漳水以厭熒惑之變尋愍波之無罪追贈司空封其孫為侯平北將軍尹農攻燕凡城不尅而還黜為庶人時大旱自正月不雨至六月又白虹出自太社經鳳陽門東南連天十餘刻而滅虎下書曰蓋古明王之理天下也政以均平為首化以仁恵為先一作本故能允協人和緝熈神物朕以眇薄君臨萬邦夕惕朝乾思遵古烈是以每下書蠲除徭役休息黎元庶俯懐百姓仰禀三方而中年以来變𤯝彌顯天文錯亂時氣不應斯由人怨於下譴感皇天雖朕之不明亦羣后不能翼奬之所致也昔楚相修政洪災旋弭鄭卿勵道氛祲自消皆股肱之良用康羣變而羣公卿士各懐道迷邦拱黙成敗豈所望于台輔百司哉其各上封事極言無隠於是閉鳳陽門惟元日乃開立二畤於靈昌津祠天及五郊李夀以建寧上庸漢固巴徴梓潼五郡來降冬十一月虎初起河橋於靈昌津上採石為中濟石無大小下輙流去工五百餘萬而橋經年不成虎如靈昌津親閱作工遣散騎侍郎崔收沈璧於河明日所沉之璧流于渚上波蕩上岸地震水涌樓臺殿觀莫不傾壊壓死者百餘人虎恚甚遂斬工匠罷作而還太子詹事孫珍問侍中崔約曰吾患目疾何方療之約素狎珍戯之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白宣宣於兄弟中最胡狀目深聞之大怒誅約父子珍遂有寵于宣頗預朝政公卿已下憚珍側目建武十一年春正月虎}
