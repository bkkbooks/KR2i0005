  - {type: variant, offset: 118, length: 0, content: '', WYG: 王華帥舟師自海道襲燕安平破之又遣北中郎將始築盧奴小城興起北榭立宮造殿建武八年夏四月虎志在窮兵以國内馬少乃下令禁民畜馬匿者腰斬收百姓馬四萬餘疋以入公府秋七月虎大興宮室自襄國起閣道至鄴二百里中四十里輒一宮有一夫人侍婢數十黄門宿衛虎下輦即止凡虎所起内外大小行宮夾道樹榆盛暑之月人行其下冬十二月作臺觀行宮四十餘所又營長安洛陽二宮作者四十餘萬人鄴城東七里有赤橋之宮勑}
