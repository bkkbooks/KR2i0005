  - {type: variant, offset: 13, length: 0, content: '', WYG: 今以制詔與之彼必酬反取誚戎裔不若直書答之因請以挹婁國所獻楛矢石弩遺夀曰使其知我能服遐荒也虎從之於是遣閎歸報備物以酬之閎既至蜀漢李夀欲誇其境内下詔曰羯使来庭貢其方物虎聞之怒甚黜王波以白衣領職虎以秦公韜為太尉與太子宣迭日省可尚書奏事専决刑賞不復啟白司徒申鍾諌曰慶賞刑威后皇攸執名器至重不可假}
