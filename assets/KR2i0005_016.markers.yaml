  - {type: variant, offset: 193, length: 0, content: '', WYG: 翼欲悉衆北伐表桓宣督諸軍趨丹水溫為前鋒水督帥衆入臨淮竝為所統虎汝南太守戴開帥數千人奔降丁丑康帝詔曰慕容皝摧殄羯冦乃云死没八萬餘人將自其天亡之始也中原之事宜加籌量且戴開已帥部黨歸順宜加慰勞又檄石虎文曰石勒因釁前覆舊京窮凶極逆偽號累祀百姓受灰没之酷王室有黍離之哀不為少康之隆孰能祀夏不有宣王之興誰克舊物羯帥石虎僭襲凶葉負恃其衆陸梁河朔每念頫之士懐仁抱義食胆飲血罹其禍酷心存倒懸而力不能奮今遣使持節荆州刺史亭都侯翼髙旗連雲組練映日運孫吳之籌按尚父之畧莫不張膽咀鐵人思自奮以此衆戰其猶烈火之燔秋蓬衡颷之掃落葉也八月太白犯嵗星嵗星在軫虎遣寧逺將軍劉寧攻武都狄道陷之太子宣討鮮卑斛糓提大破之斬首三萬級中謁者令申扁有寵於虎宣亦昵之扁聰辨明斷専掌機宻之任虎既不省奏案太子宣荒酒内淫秦}
