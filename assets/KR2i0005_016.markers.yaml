  - {type: variant, offset: 9, length: 3, content: 勃勃朔, WYG: 兵入冦約中分江南九月尚書令夔安卒虎將討慕容皝命司冀青徐幽并雍七州兼復之家五丁取三四丁取二合鄴城舊軍滿五千萬具船萬艘自河通海運糓豆千一百萬斛於樂安城以供一作􅇱軍征之用一作調徙遼西北平漁陽萬餘戸於兖豫雍洛四州之地自幽州以東至白狼大興屯田以國内馬少悉括取民馬有敢私匿者腰斬凡收百姓馬四萬餘疋以入于公虎僭位之後有所調用皆選司擬官經令僕而後行不得其人按為令僕之責尚書及郎不坐至是吏部尚書劉真以為失銓考之體上書言之虎怒責王者加真光禄大夫金章紫綬虎如宛陽大閱于曜武場冬十月慕容皝襲幽冀幽州刺史石光擁兵數萬閉城不出皝入自蠮螉塞戍將當道者皆斬之直抵薊城進破武遂津入髙陽所至焚燒積聚畧三萬餘家而去光坐愞弱徴還賜徴士辛謐几杖衣服糓五百斛𠡠平原為起甲第是月挹婁國一名慎肅氏遣使通貢虎召其使而問之答曰每候牛馬向西南眠者三年矣是知有大國所在故重譯来云初李壽將李閎自晉来奔夀致書請之題曰趙王石君虎不恱付外議之多有異同中書監王波議曰今李閎以死自誓若得返魂蜀漢當鳩率宗族混同王化若遣而果也則不煩一旅坐定梁益若有前却不過失一亡命之夫爾于趙何損夀既號竝日月跨僭一}
