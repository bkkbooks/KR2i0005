  - {type: variant, offset: 14, length: 0, content: '', WYG: 所以防微杜漸以示軌儀太子國之儲貳朝夕視膳不當豫政庶人􅃉往以聞政致敗殷鑒不逺宜革而弗遵且二政分權鮮不階禍周有子頽之釁鄭有叔段之難此皆由寵之不道所以亂國害親惟陛下覽之虎不從凉州牧張駿憚虎之盛遣别駕馬詵来朝虎初大恱及覽其表辭頗蹇傲由是大怒欲斬詵侍中石璞諌止之詳具璞𫝊建武七年冬十月}
