  - {type: variant, offset: 155, length: 2, content: 建元, WYG: 成紀平庄人也家世農民少慷慨讀書曰大丈夫當軒冕杖節安能久執犁鋤乎遂東遊京師頗學書字讀魏書見許褚而歎之乃自字虎侯遇晉室䘮亂遂憑結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫結奔及馳馬仕晉南陽王模帳下都尉模之敗也安歸模世子保於秦州保命安統精騎千餘以討叛羌寵遇甚厚保將張春等疾之譖安有異志請除之保不許春等輒伏刺客刺安安被創馳隴城遣使詣保貢獻不絶自號秦州刺史稱藩於曜舉兵攻張春春奉保之南安祁山安退屯緜諸保歸上邽未㡬張春楊次與别將楊韜不協勸保誅韜且請擊安保皆不從春怒幽保殺之立保宗室子瞻為嗣稱大將軍安乃表曜請討瞻等曜以安為大將軍擊瞻殺之春奔枹罕執楊次於保柩前斬之因以祭保遂奉保䘮以天子禮葬於上邽及曜克安定振旅而循隴右安乃郊迎後又請朝於曜曜時疾篤辭而不許安怒以曜為已卒大掠而歸氐羌多應之安士馬强盛衆}
