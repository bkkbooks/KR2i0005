  - {type: variant, offset: 148, length: 0, content: '', WYG: 王延年王延年字季海江都人性至孝年十五䘮二親每言及之未嘗不嗚咽悲慟每忌日三日不食奉叔父}
  - {type: variant, offset: 148, length: 0, content: '', krp: 王延年王延年字季海江都人性至孝年十五䘮二親每言及之未嘗不嗚咽悲慟每忌日三日不食奉叔父}
  - {type: variant, offset: 149, length: 5, content: 功賜爵關內, WYG: 孝聞子良孫及弟從子為賊所掠延年追而請之賊以良孫歸延年延年復拜請曰我以少孤為叔父所養此叔父之孤孫也願以子易之賊曰君義士也乃俱免之後仕至太宰王雋王雋字𤣥英上郡人也有幹藝之稱雋年八嵗隨兄宻子元直西如凉州路中糧匱宻留元直於途乞丐民間比還雋為賊所掠元直逃免宻乃將元直追賊叩頭求哀曰人情自當皆愛其子但此弟未生家君見背遺孤相長以至於今請以元直易雋賊相謂曰以子易弟義之大也於是以雋授宻而去宻後亡雋勺水不入口者五日雖服䘮三年而心䘮六載喬智明喬智明字元達匈奴前部人少䘮二親哀毁過禮仕淵為折衝將軍遷廷尉轉冠軍大將軍領單于右輔聰嗣位仍署冠軍大將軍加司隷校尉嘉平三年從中山王曜攻長安城陷不為設備為晉將麴允所襲殺喬晞喬晞前部人仕淵冠軍將軍使帥衆冦西河攻介休介休令賈潭築營自固有八門城髙九尺及陷抗節不降曰吾為晉守不能全之豈茍求生以事賊虜何面目以視息世間哉晞怒將殺之部將尹崧曰將軍舍之以勸事君晞不聽遂殺之其妻宗氏年二十餘有姿色晞欲納焉宗氏罵曰屠各奴何有害人之夫而欲加無禮於其婦乎何不速殺我遂仰天大哭晞亦殺之淵聞而大怒曰使天道有知喬晞望有種乎追還降秩四等收潭及宗氏尸葬之賈潭晉書作賈渾陳安陳安字虎}
