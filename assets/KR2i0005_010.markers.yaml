  - {type: variant, offset: 980, length: 228, content: 守成不易善輔永業勿聽讒言光薨紹祕不發喪纂排閣入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大統纂曰臣雖長陛下國家之適不可以私愛而亂大倫驍騎呂超謂紹曰纂臨喪不哀步高視遠觀其舉止恐成大變宜早除之纂聞超謀遂率壯士數百踰北城攻廣夏門入自青角門昇謙光殿紹登紫閣自殺呂超出奔廣武纂遂朁天王大赦改龍飛四年為咸寧元年諡紹隱王呂纂纂遊田無度荒耽酒色常與左右因醉馳獵于坑澗之間殿中侍御史王回扣馬諫不納番采太守呂超擅伐鮮卑思盤思盤訴超于纂纂召超入朝怒曰卿恃兄弟桓桓欲欺吾也要當殺卿然後, WYG: 未弭}
