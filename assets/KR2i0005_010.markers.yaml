  - {type: variant, offset: 237, length: 1, content: 持, WYG: 貴人欲以寔為司徒太保皆垂涕固辭身騎瘠馬妻乘敗車卜崇卜崇仕聰左衞將軍為人清直不與世浮沈與少府陳休素惡中常侍王沈等諂佞用事雖在公座未嘗與語沈等深嫉之侍中卜幹謂之曰沈等勢力足以囘天地卿輩自料親賢孰與竇武陳蕃崇應之曰吾輩年踰五十職位已崇惟欠一死耳死於忠義乃為得所安能俛首低眉以事閹豎乎去矣卜公勿復有言沈等遂譖之於聰以與太弟乂通謀聰臨上秋閣收崇斬之休亦見害呼延寔呼延寔匈奴中人仕曜為征南將軍曜之攻氐羌楊難敵也軍中大疫曜亦寢疾欲還恐難敵躡其後因與羌和署難敵為武都王時秦州刺史陳安欲窺虛實詐言請朝曜以疾篤不許乘馬輿還使寔監輜重於後安遂帥精騎邀擊之寔進退無路與長史魯憑俱沒於安安囚寔而謂之曰劉曜已死子尚誰佐孤當與足下共定大業寔叱之曰狗輩汝荷人榮寵處不疑之地前背司馬保今復如此汝自視智能何如主上憂汝不}
