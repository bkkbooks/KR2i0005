  - {type: variant, offset: 1270, length: 154, content: 十月剋洛陽以東平紹為都督山東諸軍事豫州牧鎮洛陽四年五月遣大將軍隴西王碩德率步騎六萬伐呂隆於涼州先是吐蕃傉檀據西平沮渠蒙遜據張掖李暠據燉煌各制方城共相侵伐碩德從金城濟河直趣廣武蒼松至隆城下隆遣弟輔國超龍驤邈等率眾拒碩德碩德大破之生擒邈傉檀蒙遜李嵩等各脩表奉獻九月隆奉表請降興答報嘉美以隆為鎮西將軍涼州刺史建康公, WYG: ''}
