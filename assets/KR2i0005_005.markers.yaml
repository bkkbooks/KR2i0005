  - {type: variant, offset: 1558, length: 1, content: 忽, WYG: 為於中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉過貴能改終之實難又伏聞勅㫖將營建夀陵周廻四里下深二十五丈以銅為棺槨黄金飾之恐此功費非國内所能辦也且臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之於終也如是秦皇下錮三泉周輪七里身亡之後毁不旋踵闇主之於終也如此向魋石槨孔子以為不如速朽王孫倮葬識者嘉其矯世自古無不亡之國不掘之墓聖王知厚葬之招害也故不為之臣子之於君父陵墓豈不欲髙峻如山岳哉但以保全始終安固萬世為優耳自䘮亂以來漢帝諸陵咸見踐辱惟霸陵獨全此雖太宗之至達抑亦釋之之功興亡奢儉冏然於前惟陛下覽之曜大悅即日下詔曰二侍中懇懇}
