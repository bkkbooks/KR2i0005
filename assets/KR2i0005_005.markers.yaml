  - {type: variant, offset: 924, length: 1, content: 于, WYG: 大赦境内殊死以下惟準一門不在赦例改元光初以朱紀領司徒呼延晏領司空太尉范隆以下悉復本官遣使拜石勒為大司馬大將軍加九錫增封十郡進爵趙公勒進攻靳準於平陽巴及羌羯降者七萬餘落勒皆徙之於所部郡縣曜使征北將軍雅鎮北將軍䇿進屯汾隂與勒為犄角之勢靳準遣侍中卜泰送乘輿服御請降於勒勒囚泰送於曜曜謂泰曰先帝末年實亂大倫羣閹撓政誅戮忠良誠是義士匡討之秋司空執心忠烈行伊霍之權拯濟塗炭使朕及此勲髙古人徳格天地朕方寧濟大難終不以非命及君子賢人司空若執忠誠早迎大駕者當悉以政事相委况免死乎卿為朕入城以朕此意布之司空宣之朝士泰還平陽具宣曜㫖準自以殺曜母兄沉吟未决十二月準左右車騎將軍喬泰王騰衛將軍斬康及將軍馬忠等殺準推尚書令斬明為盟主遣卜泰奉傳國六璽降曜曜大悅謂泰曰使朕獲此神璽而成帝王者子也石勒聞之怒甚增兵攻明明出戰屢敗嬰城固守遣使求救於曜曜使雅等迎之明率平陽士女萬五千人來奔曜命誅明收靳氏男女無少長皆斬之曜誅靳氏見康女有姿容將納為后女曰陛下既滅其父母兄弟復何用妾為妾聞逆人之誅也尚汚宫伐樹而况其子女乎因號泣請死秉操益堅曜哀之免康一子使雅迎母胡氏之䘮於平陽還葬粟邑墓號陽陵諡曰宣明皇太后追尊髙祖父亮為景皇帝曾祖父廣為獻皇帝祖防為懿皇帝考闕為宣成皇帝光初二年春二月斬勒左長史王修於市以其外表納欵内覘强弱也夏四月曜徙都}
