  - {type: variant, offset: 375, length: 542, content: 遣使拜襄持節平北將軍并州刺史即丘縣公弋仲薨率戶六萬南至榮陽晉處襄于譙城遣王弟為任單騎渡淮見豫州刺史謝尚一面交款便若平生楊州刺史殷浩憚其威名遣謝方討襄逆擊破之鼓行濟淮屯于盱眙朝廷大震襄方軌引北自稱大將軍大單于據許昌自許遂攻洛陽踰月不剋晉征西大將軍桓溫自江陵伐襄溫至伊水襄徹圍之為溫所敗襄奔還洛陽率數千騎奔于北山百姓隨襄者四千餘戶襄尋從北山將圍關中進屯杏城遣輔國將軍姚蘭略地鄜城苻生遣苻飛龍拒戰率眾西引與苻堅戰于三原為堅所殺時年二十七萇僭尊號追謚魏武王姚萇字子茂弋仲之第二十四子少聰哲多權略不修行業兄襄為苻堅所殺萇率諸弟降于苻生堅以萇為揚武將軍步兵校尉潞州之戰累有殊功遷左衛將軍累授幽州刺史苻堅伐晉以萇為龍驤將軍督益梁二州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事以委卿堅左將軍竇衝進曰王者無戲言此將不祥之徵也堅默然姚萇白雀元年慕容泓起兵叛堅堅遣子叡討之以萇為司馬既而為泓所敗叡死之萇遣參軍姜協謝罪堅怒殺之萇懼奔于渭北歸者五萬餘家咸推萇為盟主自稱大將軍大單于萬年秦王大赦改元稱制行事二年六月慕容沖入長安司隸崔翼尚書趙遷等數百人來奔萇聞苻堅在五將山遣驍騎吳忠率騎圍之萇自故縣如新平吳忠執堅送之萇將求禪代堅不許慕容沖遣率騎大將軍尚書令高蓋求戰于新平大破蓋率麾下數千人來降建初, WYG: 太興}
