  body:
  - {type: punctuation, offset: 5, content: ．, id: KR2i0005_CHANT_005-bkkpn1}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 卷五前趙錄五劉曜上劉曜字永明淵之族子也少孤見養於淵幼而聰慧有膽量年八嵗從淵獵於西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若淵異之曰此吾家千里駒也從兄為不亡矣及長身長九尺三寸垂手過膝生而眉白目有赤光鬚髯不過百餘根皆長五尺志性不恒拓落髙亮與衆不羣好讀書廣覽不精思章句工草隷善屬文雄武過人鐵厚一寸射而洞之於時號為神射尤好兵書略皆闇誦常輕侮吳鄧而自比樂毅蕭曹時人莫之許也惟聰每曰永明世祖魏武之流何數公足道哉弱冠遊於洛陽坐事當誅乃與曹恂亡奔劉綏綏匿之於書匱載送於王忠忠送之朝鮮嵗餘饑窘遂變姓名客為縣卒朝鮮令崔岳見而異之給以衣食恩顧甚厚曹恂雖於屯厄之中事曜有君臣之禮曜甚徳之}
