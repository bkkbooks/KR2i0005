  - {type: variant, offset: 1220, length: 1, content: 隴, WYG: 冦暴權渠既降莫不歸附曜大悅拜子逺為大司徒錄尚書事八月曜讌羣臣於東堂語及平生泫然流涕遂下書曰蓋裒徳惟舊聖后之所先念恵錄孤明王之盛典是以世祖草創河北致封嚴尤之孫魏武勒兵宋梁追慟橋公之墓前新贈大司徒烈愍公崔岳中書令曹恂晉陽太守王忠太子洗馬劉綏等或識朕於童齓之中或濟朕於艱窘之極言念君子實傷我心詩不云乎中心藏之何日忘之岳漢昌之初雖有裒贈屬否運之際禮章莫備今可贈岳使持節侍中大司徒遼東公恂大司空南郡公綏左光祿大夫平昌公忠鎮軍將軍安平侯竝加散騎常侍但皆丘墓夷滅申哀莫由其速班訪岳等子孫授以茅土稱朕意焉九月曜立太學於長樂宫東小學於未央宫}
