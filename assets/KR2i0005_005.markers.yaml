  - {type: variant, offset: 962, length: 0, content: '', WYG: 封子襲為長樂王闡為太原王冲為淮南王敞為齊王髙為魯王徽為楚王徴諸宗室皆進封郡王五月陳安自稱秦州刺史叛降於曜六月繕宗廟社稷南北郊於長安下令曰蓋聞王者之興必禘始祖一作世祖我皇家之先出自夏后居於北夷世跨燕朔光文以漢有天下嵗久恩徳結於庶民故立漢祖宗之廟以懐民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖亟議以聞於是太保領司空呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勲功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙以水行承晉金行國號曰趙曜從之於是牲牡尚黑旗幟尚𤣥冒頓配天淵配上帝自稱大趙大赦境内殊死以下冬十二月黄石屠各路松多起兵於新平扶風聚衆數千附於南陽王司馬保保使其將楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據隂宻松多進據草壁秦隴氐羌多歸附之曜遣車騎將軍雅平西將軍厚攻楊曼於陳倉二旬不克曜自率中外精銳赴之行次雍城太史令弁廣明言於曜曰昨夜妖星犯月師不宜行乃止勅雅等攝圍固壘以待大軍是月地震長安尤甚時曜后羊氏有殊寵頗與政事隂有餘之徵也光初三年春正月曜自雍城攻陳倉楊曼王連謀曰諜者適還云其五牛旗建多言胡主自來其鋒恐不可當吾糧廩既少無以支久若頓軍城下圍攻百日不待兵刃吾已自滅不如率見衆以一戰如其勝也闗中不待檄而至如其敗也一等殞耳早晚無在遂盡衆背城而陳為曜所敗王連戰死楊曼奔南氐遂進攻草壁陷之松多奔隴城進㧞隂宻又陷安定司馬保懼遷於桑城曜振旅歸長安署雅為大司徒二月曜左中郎將宋始振威將軍宋恕及别將尹安趙慎等四軍屯洛陽晉司州刺史李矩襲克金墉使潁川太守郭黙將兵入洛陽始等懼叛降於後趙石勒曜署廣平王岳為征東大將軍鎮洛陽會三軍疫甚移屯澠池石勒遣石生馳應始等軍勢甚盛岳乃班師鎮於陜城於是河南之民皆相率歸於李矩洛陽遂空夏四月長安雨雹大如雞子西明門内大樹風吹折經一宿樹撥變為人形髪長一尺鬚眉長三寸皆黄白色有歛手之狀亦有兩脚著履之形惟無目鼻每夜有聲十日而生柯條遂成大樹枝葉甚茂五月陳安表請擊晉别將張瞻曜以安為大將軍擊瞻殺之六月丙辰將軍解虎及長水校尉尹車謀反潛結巴酋句徐庫彭等事覺虎車皆伏誅乃囚徐彭等五千一作五十餘人於阿房將殺之光祿大夫游子逺諫曰聖王用刑惟誅元惡而已不宜多殺争之不從子逺叩頭流血曜大怒以為助逆幽之於獄盡殺庫彭等尸諸街巷之中十日乃投於水於是巴氐盡叛推巴歸善王句渠知為主四山羌氐巴羯應之者三十餘萬一作四十三輔大亂城門晝閉曜甚患之欲大興師往伐子逺又從獄中上表諫諍曜怒甚手毁其表曰大荔奴不憂命在旦夕猶敢如此嫌死晩邪叱左右速殺之大司徒中山王雅太傅領司徒朱紀太保領司空呼延晏侍中司徒郭汜等諫曰子逺幽囚禍在不測猶不忘諫諍所謂忠於社稷不知死之將至陛下縱不能用奈何殺之若子逺朝誅臣等亦當夕死以彰陛下之過天下之人皆當去陛下蹈四海而死耳陛下復與誰居乎曜意乃解赦之}
