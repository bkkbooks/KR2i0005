  - {type: variant, offset: 1996, length: 1027, content: 千餘人進兵侵雍遂據抄掠郿城姚紹及征虜尹昭鎮軍姚洽等率步騎五萬討之戰于馬鞍坂勃勃兵敗走還尋而晉相劉裕總大軍伐泓次于彭城遣檀道濟王鎮惡入自淮肥攻漆兵項城沈林子自抃入河攻倉垣泓將王苟生以漆丘降鎮惡徐州刺史姚掌以項城降道濟晉師遂入潁口所至多降服姚紹聞晉師之至也馳還長安言於泓曰晉師巳過許昌豫州安定孤遠卒難救衛宜遷諸鎮戶內實京畿可得精兵十萬足以橫行天下假使二寇交侵無能為也如其不爾晉侵豫州勃勃寇安定君將若之何吏部郎懿橫又以齊公姚恢有忠勳於國家未有殊賞今致之死地安定人人自危恐必生變宜徵還朝廷以慰其心泓並不從晉師至城皋征南姚洸時鎮洛陽部將趙元說洸曰今寇偪巳深百姓駭懼眾寡勢殊難以應敵宜攝諸戍兵士固守金墉以待京師之援不可出戰如戰不捷大事去矣金墉既固帥無損敗吳寇終不敢越金墉而西困之於堅城之下可以坐制以弊洸用姚禹閻恢之譖卒遣元出戰會陽城城皋滎陽虎牢諸城悉皆降於道濟元戰敗死于柏谷道濟進至洛陽洸懼出降泓母弟懿嶮薄用其司馬孫申暢謀欲襲長安誅姚紹廢泓而自立遂舉兵僭號傳檄州郡時征北姚恢亦率安定鎮戶三萬八千焚燒室宇以車為方陣自北雍州州趨長安自稱大都督建義大將軍移檄欲除君側之惡軍勢甚盛泓見內外離叛晉師漸逼歲旦朝群臣于前殿悽然流涕群臣皆泣姚紹率輕騎先赴難姚讚亦率諸軍還長安遂擊殺恢及其三弟泓乃進紹太宰太將軍大都督中外諸軍事假黃鉞改封魯公率武衛姚鸞等距晉師于潼關道濟固壘不戰紹遣左長史姚洽等屯于河北欲絕道齊租輸為沈林子所敗眾皆沒焉紹忿恚發病嘔血而死泓遣使乞師于魏魏遺司徒南平公拔拔等進據河內為泓聲援劉裕次于陝城泓使姚裕率步騎八千距之泓躬將大眾繼發裕為沈田子所敗泓退次于灞上姚讚距晉師于關西姚難屯于香城時大霖雨渭水汎溢王鎮惡水陸兼進追及姚難泓自灞上還軍次于石橋以援之晉師進據鄭城泓便姚裕尚書龐統屯兵宮中姚洸屯于澧西尚書姚白瓜徙四軍雜戶入長安姚丕守渭橋胡翼度屯石積姚讚屯灞東泓軍于逍遙園鎮惡夾渭進兵破姚丕于渭橋泓自赴之逼水地狹因丕之敗遂相踐而退姚諶姚烈姚寶等皆死于陣泓單馬還宮鎮惡入自平朔門泓與姚裕數百騎出奔于石橋讚聞泓敗召將士告之皆以戈擊地攘袂大哭胡翼度棄眾奔晉讚迄率諸軍會泓于石橋晉師已固諸門讚軍不得入眾皆驚散泓計無所出謀欲降晉其子佛念年十二謂泓曰陛下今雖降晉劉裕待人無禮終必不全願自我決憮然不答遂登宮墻自投而死平原公璞并州刺史尹昭以蒲坂降晉東平讚率宗室子弟百餘人亦隆于裕裕盡殺之九月裕至長安送泓于建康市而戮時年三十建康百里之內草木燋死自姚萇白雀元年歲在甲申至于是歲在丙辰三十有三歲, WYG: ''}
