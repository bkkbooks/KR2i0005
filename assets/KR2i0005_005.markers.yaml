  - {type: variant, offset: 965, length: 2, content: 萇如, WYG: 復勅内外戒嚴親討渠知游子逺又諫曰陛下誠能納臣愚計不勞大駕一月之中可使清定曜曰卿試言之子逺曰羌夷之叛匪有大度窺竊神器也但逼於陛下嚴刑峻網耳今死者不可追生者猶可安莫若大赦諸逆人若沒奚官者悉令還之使迭相撫育聽其復業與小人更始彼生路既開人情豈有樂禍好死者邪且小人聚居必有他心今無刑辟之懼以恩信懐之不降何待若諸酋長自以罪重不即下者請假臣弱卒五千人為陛下梟之不勞大軍此可定矣不爾者今賊黨既盛彌川被谷雖以天威臨之恐非年嵗之可殄也曜大悅即日大赦以子逺為車騎大將軍開府儀同三司都督雍秦征討諸軍事軍屯雍城降者十餘萬進軍}
