  - {type: variant, offset: 809, length: 4, content: 西寶寬雅, WYG: 漢陽諸郡十三為國置單于臺於渭城置左右賢王已下皆以胡羯鮮卑氐羌豪傑為之拜𦙍為大單于都督及曜之末闗中擾亂遂為石虎所殺淵后單氏單氏單徵之女北海王乂之母也以淵河瑞二年立為皇后淵死聰即偽位改元光興尊為皇太后單氏年少姿色絶麗聰遂蒸之乂屢以為言單氏慚恚而死聰后呼延氏呼延氏武元皇后匈奴中人淵后之從父妹也}
