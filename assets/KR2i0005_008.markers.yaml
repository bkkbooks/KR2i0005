  - {type: variant, offset: 76, length: 0, content: '', WYG: 嵗身長七尺五寸眉鬢如畫聰奇之謂曜曰此兒神氣非義真之比也義真曜子儉字當應為卿之冢嫡卿可思文王廢伯邑考立武王之意曜曰臣藩國之嗣僅能守祭祀足矣不可亂長幼之倫也聰曰卿勲格天地國兼百城當世祚太師受專征之任五侯九伯得專征之者卿之子孫也奈何言同諸藩國乎義真既不能逺追太伯髙讓之風吾當為卿更以一國封之於是封儉為臨海王立𦙍為世子靳準之亂𦙍沒於黑匿郁鞠部至曜光初七年𦙍自言於郁鞠郁鞠大驚資給衣馬遣子送之曜對𦙍悲泣𦙍雖少離屯難流躓殊荒而風骨俊茂爽朗卓然身長}
