  - {type: variant, offset: 850, length: 2, content: 滅二, WYG: 養曜光初八年立為皇后明年寢疾及篤曜親省臨之問其所欲言劉氏泣曰妾叔父昶無子妾少養於叔父恩撫甚隆無以報徳願陛下貴之妾叔皚女芳有徳色願以備後宫曜許之言終而卒偽諡獻烈皇后曜后劉氏劉氏名芳侍中劉皚一作愷女年}
