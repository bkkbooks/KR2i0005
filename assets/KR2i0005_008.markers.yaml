  - {type: variant, offset: 58, length: 5, content: 世亭侯父昶, WYG: 昌王少時不好讀書惟讀孝經論語曰誦此能行足矣安用多誦而不行乎李熹見之歎曰望之如可易及至肅如嚴君可謂君子矣淵以其忠篤故臨終委以重任衛尉西昌王劉銳等耻不預顧命乃相與謀說和殺聰盛執正不從和怒命左右刃之劉翼劉翼仕淵為别將驍勇過人膂力善射能一手舉殿柱跳過平陽門時人擬之飛羽淵甚器異之以為征虜將軍劉𦙍劉𦙍}
