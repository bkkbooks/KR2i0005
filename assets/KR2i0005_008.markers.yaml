  - {type: variant, offset: 841, length: 1, content: 歲, krp: 立為皇后先是聰以弟乂為帝太弟后每謂聰曰父終子紹古今之大典陛下自承髙祖之嗣太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當徐為之計后曰事久變生太弟見粲兄弟竝大必有不安之志矣或有小人搆間其中未必不禍發於今日也妾聞陛下說隱公一何相似竊為陛下寒心聰心然之后至嘉平二年春正月卒諡曰武元皇后聰后劉氏劉氏武宣皇后新興人偽太保劉殷小女名娥字麗華童齒聰慧膚髪異常晝營女工夜誦書傳母恒止之敦玩彌厲每與諸兄弟辯論經義理致超然兄常深歎之性孝友美風儀進止如珪璋焉聰既僭立納為右貴妃未㡬立為皇后聰將起䳨儀殿於後庭廷尉陳元達鎖腰切諫聰大怒曰朕將營二宫豈問汝䑕子乎命左右將斬之后時}
  - {type: variant, offset: 843, length: 1, content: 庚, WYG: 後堂聞之宻遣中常侍私勅左右停刑於是手疏啟曰伏聞勅㫖將為營殿今宫室已備無煩更營且四海未一禍難猶繁宜愛民力廷尉之言社稷之計也陛下當加爵賞而反欲誅之四海謂陛下何如哉夫忠臣進諫者固不顧其身也而人主拒諫者亦不顧其身也陛下為妾營殿而殺諫臣使忠良結舌者由妾逺近怨怒者由妾公私困弊者由妾社稷阽危者由妾天下之罪皆萃於妾妾何以當之妾觀自古敗國䘮家未始不由婦人每覽古事忿之不已何意今日妾自為之使後人視妾猶妾之視前人也妾復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之變色大司徒任顗等復叩頭流血固請不已乃徐曰朕比來微得風患喜怒過差不復自制元達忠臣也朕未之察諸公乃能破首明之誠得輔弼之義也朕愧戢於心何敢忘之命顗等冠履就坐引元達而謝之以后表示之曰外輔如公等内輔如后朕復何憂后聰明善幾諫聰所為不道多䂓正之及死偽諡武宣皇后其姊英字麗芳亦聰敏涉學而文詞機辯曉達政事尤過於娥初與娥同召拜左貴嬪尋卒偽追諡武徳皇后曜后羊氏羊氏獻文皇后即晉恵帝后也名獻容太山南城人祖瑾父𤣥之以晉太安元年立為皇后后初入宫衣中忽有火光衆咸怪之洛陽之陷遂沒於曜曜僭偽位立為皇后因問之曰吾何如司馬家兒羊后曰陛下開基之聖主彼亡國之暗夫何可竝言彼貴為帝王有一婦一}
