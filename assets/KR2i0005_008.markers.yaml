  - {type: variant, offset: 845, length: 1, content: 至, WYG: 及身三耳曾不能庇之使妻子辱於庶人之手妾於爾時實不欲生何圖復有今日妾生於髙門意謂世間男子皆然自奉巾櫛已來始知天下自有丈夫耳曜甚寵愛之遂干預政事生三子以曜光初五年卒偽諡獻文皇后曜后劉氏劉氏獻烈皇后少孤}
