  - {type: variant, offset: 841, length: 1, content: 歲, WYG: 立為皇后先是聰以弟乂為帝太弟后每謂聰曰父終子紹古今之大典陛下自承髙祖之嗣太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當徐為之計后曰事久變生太弟見粲兄弟竝大必有不安之志矣或有小人搆間其中未必不禍發於今日也妾聞陛下說隱公一何相似竊為陛下寒心聰心然之后至嘉平二年春正月卒諡曰武元皇后聰后劉氏劉氏武宣皇后新興人偽太保劉殷小女名娥字麗華童齒聰慧膚髪異常晝營女工夜誦書傳母恒止之敦玩彌厲每與諸兄弟辯論經義理致超然兄常深歎之性孝友美風儀進止如珪璋焉聰既僭立納為右貴妃未㡬立為皇后聰將起䳨儀殿於後庭廷尉陳元達鎖腰切諫聰大怒曰朕將營二宫豈問汝䑕子乎命左右將斬之后時}
