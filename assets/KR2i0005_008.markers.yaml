  - {type: variant, offset: 84, length: 1, content: 少, WYG: 且材器過人渉歴艱阻朕欲逺追周文近蹤光武使宗廟有太山之安義光饗無疆之福於諸卿意何如太傅呼延晏等咸曰陛下逺擬周漢為國家無窮之計豈惟臣等頼之實宗廟四海之慶也左光祿大夫卜泰太子太傅韓廣等進曰陛下若以廢立為是不應降日月之明垂訪羣下若以為疑固樂聞異同之言臣竊以為廢太子非也昔周文定嗣未建之前則可光武以母失恩}
