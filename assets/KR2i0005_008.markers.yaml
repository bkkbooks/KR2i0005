  - {type: punctuation, offset: 178, content: 、, id: KR2i0005_CHANT_008-bkkpn32}
  - {type: variant, offset: 178, length: 597, content: 涼公領秦涼二州牧大赦改年追尊祖弇涼公父昶涼簡公以瑤為征東將軍李暠二年正月于南門起靜恭堂以議朝政圖讚自古聖帝明王忠臣孝子烈士貞女親為序頌以作鑒戒五年正月立泮宮增高門學生四百人四月燉煌有葛緣木而生作黃鳥之形世子譚卒九月立第二子歆為世子正月大赦改元為建初元年三月讌于曲水命群寮賦詩暠親為之敘文寫諸葛亮訓厲以戒諸子十三年正月寢疾顧命長史宋繇曰吾終之後嗣子猶卿子也善相輔導二年薨于恭德殿年六十葬建世陵諡昭武王廟號太祖初暠為群雄所推定千里之地謂張氏之業不足成河西十郡歲月而一既而傉檀入姑臧蒙遜基宇稍廣於是慨然著述志賦初河右不生楸槐張駿之世取秦隴植之皆死至是而酒泉言西北有槐生焉乃作槐樹賦又作婦辛氏誄其余賦數十篇李歆字士業暠第二子暠薨左長史宋繇等上為大將軍涼公領涼州牧護羌校尉大赦改年為嘉興元年李歆七月歆聞蒙遜南伐西秦中外戒嚴將攻張掖尹太后以為不可宋繇亦諫歆怒不從遂率步騎三萬東伐次于都瀆澗蒙遜自浩亹來戰于懷城歆敗左右勸還歆曰吾違太后明誨遠取敗辱不殺此胡復何面目以見母也勒眾復戰敗于蓼泉為遜所殺歆弟驍騎將軍翻擊虜將軍豫等西奔燉煌蒙遜遂入酒泉翻及燉煌太守恂興諸子等棄燉煌奔于北山郡人朱承張宏等以恂在郡有惠密信招恂恂率千騎入于燉煌朱承張宏等推恂為涼州刺史遜率眾二萬攻恂朱承等開門出降恂自殺恂暠之第六子也遜復翻子寶徙于姑臧歲餘北奔伊吾後二十餘年至魏太平三年寶至伊吾率流人反虜騎南襲燉煌據之遣使降魏魏以寶為使持節侍中, WYG: ''}
