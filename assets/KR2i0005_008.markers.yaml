  - {type: variant, offset: 8, length: 4, content: 李暠宇元, WYG: 八劉宣劉宣字士則淵之從祖也初為北部都尉右賢王樸鈍少言好學修潔師事樂安孫炎沉精積思不舍晝夜好讀毛詩左氏傳炎每歎曰宣若遇漢武當踰於金日磾也學成而返不出門閭者蓋數年每讀漢書至蕭何鄧禹傳未嘗不反覆詠之曰大丈夫若遭二祖終不令兩公獨擅美於前矣并州刺史王廣言之於武帝帝召見嘉其占對因曰吾未見宣謂廣言虛耳今見其進止風儀真所謂如珪如璋觀其質性足能撫集本部乃以宣為右部都尉特給赤幢曲蓋蒞官清恪所部懐之淵即王位宣之謀也故特荷尊重勲戚莫二軍國内外靡不任之仕至丞相太尉劉}
