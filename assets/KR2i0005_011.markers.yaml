  - {type: variant, offset: 2198, length: 3, content: 倍負土, WYG: 人之故而縦垂亡之虜得無為王彭祖所怨且有後憂必不可許疾陸眷不從送鎧馬二百五十疋金銀各一簏并以末杯三弟為質而請末杯諸將並勸勒殺末杯以挫之勒曰不然遼西鮮卑健國也與我素無怨讐為王浚所使爾今殺一人而結怨一國非計也歸之必深徳我不復為浚用矣乃納其質厚以金帛報之遣虎與疾陸眷盟于渚陽結為兄弟疾陸眷等引歸王昌等不能獨留亦引兵還薊勒召末杯與之讌飲誓為父子署為使持節安北將軍北平公時佛圖澄力勸勒遣杯還遼西杯感勒厚恩在塗日南向而拜者三由是叚氏專心附勒王浚之勢遂衰游綸張豺請降稱藩勒將襲幽州務養將士權宜許之皆署為將軍遣衆㓂信都殺冀州刺史王象王浚復以邵舉行冀州刺史保信都又遣天水將軍祁𢎞討勒及于廣宗時大霧四塞𢎞引軍就道卒與勒遇為勒所殺勒遣㕘軍閻宗獻捷}
