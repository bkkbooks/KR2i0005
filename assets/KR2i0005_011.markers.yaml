  - {type: variant, offset: 118, length: 2, content: 建熙, WYG: 彌同冦洛陽晉師屢敗死者甚衆洛陽遂空勒引兵還時有田六出者愍懐太子妃王氏進賢侍兒也勒掠進賢渡孟津欲妻之進賢罵曰我皇太子婦司徒公女義不為逆胡所辱胡羌小子敢干我乎言畢投河六出曰大既有之小亦宜然復投河中劉聰署勒征東大將軍幽州牧并州刺史勒固辭不受秋七月平陽李洪聚衆數千壘于舞陽茍晞假洪雍州刺史勒進冦穀陽殺冠軍將軍王滋九月勒攻王讚於陽夏擒之以為從事中郎癸亥襲破陽夏至于䝉縣執大將軍茍晞及豫章王端鎖晞頸以為左司馬河東太守鄧攸時亦被擒勒宿忌諸官長二千石聞攸在營馳召將殺之攸至門門幹乃攸為郎時幹識攸攸求紙筆作辭幹候勒和悦致之勒重其辭乃命勿殺長史張賔先與攸比舍重攸名操因稱攸於勒勒召至幕下與語悦之以為參軍給車馬勒每東征西伐置攸車營中勒夜禁火犯之者死攸與胡隣轂胡夜失火燒車吏按問胡乃誣攸攸度不可與爭遂對以弟婦散發温酒為辭勒赦之既而胡人深感自縳詣勒以明攸而隂遺攸馬驢諸胡莫不歎息宗敬之及勒過泗水乃斫壊車以牛馬負妻子而逃勒與王彌外相親而内相忌彌納劉暾之説將先誅勒東王青州乃為書使暾徴其將曹嶷於齊且邀勒共向青州暾至東阿為勒遊騎所獲得彌所與嶷書潛殺暾而彌不知㑹彌將髙梁徐邈輒引所部兵去彌兵漸弱及聞勒獲晞彌心惡之偽卑辭使賀勒曰公獲茍晞而赦之何其神也使晞為公左彌為公右天下不足定也勒謂張賔曰王彌位重而言卑恐其遂成前狗意也賔曰觀王公有青州之心桑梓本邦固人情之所樂明公獨無并州之思乎王公遲迴未發者懼明公踵其後已有規明公之志但未獲便爾今不圖之恐曹嶷復至共為羽翼後雖悔之其何所及邈等既去軍勢稍弱觀其控御之懐猶盛可誘而滅之也勒從之時勒與乞活陳午相攻于蓬闗彌亦與劉瑞相持甚急彌請救于勒勒未之許張賔進曰明公常恐不得王公之便今天以王公授我矣陳午小豎何能為冦王公人傑將為我害當早除之勒因迴軍擊瑞斬之彌大悦謂勒深心推奉不復相疑勒引師攻陳午於魯口一作肥澤午司馬上黨李頭説勒曰公天生神武當平定四海四海士庶皆仰屬明公望濟於塗炭有與公爭天下者公不早圖之而返攻我曹流人我曹鄉黨終當奉戴何遽見逼乎勒心然之詰朝引退乃問計於張賔賔曰英雄不並立宜早除之冬}
