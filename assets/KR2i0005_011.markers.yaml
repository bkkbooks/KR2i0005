  - {type: variant, offset: 2140, length: 1, content: 三, WYG: 鼎沸戰爭方始明公雖擁精兵遊行覊旅人無定志非所以保萬全制四方也夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二邑而都之然後命將四出授以竒畧推亡固存兼弱攻昧則羣凶可除王業可圖矣勒曰右侯之計是也遂進據襄國賔復言於勒曰今我都此越石彭祖所深忌也恐城塹未固資儲未廣二冦交至送死于我聞廣平諸縣秋稼大成可分遣諸將收掠野穀且遣使至平陽具陳鎮此之意勒然之于是上表劉聰分命諸將攻冀州郡縣壁壘多降運糧以輸襄國先是勒為郭敬客時襄國有謠曰革在左力在右讓去言或入口至是勒始都之秋七}
