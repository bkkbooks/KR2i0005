  - {type: variant, offset: 123, length: 0, content: '', WYG: 其有道術甚尊重之畧毎從征伐豫剋勝負勒疑而問曰孤不覺卿有出衆智謀而毎知軍行吉凶何也畧曰將軍天挺神武幽靈所助有一沙門智術非常云將軍當畧有區夏已應為師臣前後所白皆其言也勒喜曰天賜吾也遂召見之問曰佛道有何靈驗澄知勒不逹深理正可以道術為徴言曰至道雖逺亦可以近事為證即取鉢盛水燒香呪之須㬰鉢中生青蓮花光彩曜日勒遂信服澄因進曰夫王者徳化洽於宇内則四靈表瑞政敝道消則彗孛見于上恒象著見休咎隨行斯乃古今之常徴天人之明誡也勒于是敬信甚篤茍晞王讚潛謀叛勒勒遂攻陽夏滅王讚馳襲䝉城執茍晞及弟純月餘殺之以將軍左伏肅為前鋒都尉十一月勒引兵攻掠豫州諸郡臨江而還屯于葛陂降諸夷楚署將軍二千石以下税其義穀以供軍士初勒被鬻平原與母王氏相失劉琨得之至是遣長史張儒并其従子虎送之于勒因遺勒書曰將軍誕稟雄姿勇畧自然大呼于紛擾之中奮臂於駭亂之際發迹河朔席捲兖豫飲馬江淮折衝漢沔自古名將未足為諭所以攻城而不有其民畧地而不有其土聚徒百萬而莫為己用翕爾雲合忽復星散周流天下而無容足之地百戰百勝而無尺寸之功將軍豈知其然乎存亡決在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖剋而終必殄滅者也昔赤眉盛于東海黄巾連帶三州張昌李辰僭逆荆豫或擁衆百萬横逸宇宙所以一旦敗亡正以兵出無名聚而為亂劉聰父子戎狄凡才乗釁肆毒冦虐人神殺父害弟偷竊位號自古及今豈有聰比而可以正天下者乎見將軍明鑒灼然所宜懸了者也況附聰之弊漸以彰著資財不為己用名位不可得守有若晨霜秋露雰霧之氣雖朝凝而夕消暫見而尋没也今將軍附賊而望為民主不亦難乎將軍以天挺之資一作質威振宇内擇有徳而推崇隨時望而歸之勲義堂堂長享遐貴背聰則禍除向主則福至採納往誨翻然改圖天下不足定螘冦不足掃成敗之數有似呼吸吹之則寒嘘之則温今相授侍中持節}
