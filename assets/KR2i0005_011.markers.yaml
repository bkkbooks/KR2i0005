  - {type: variant, offset: 121, length: 1, content: 年, WYG: 月勒詭請王彌讌於已營彌將行長史張嵩諫曰石公卑甚言甘不可信也願公勿往自可保固恐有専諸孫峻之禍及爾彌曰石勒一豎子爾何能為也不聴遂入酒酣勒手斬彌而并其衆啓聰稱彌叛逆之狀聰大怒遣使讓勒専害公輔有無君之心然猶加勒鎮東大將軍督并幽二州諸軍事領并州刺史持節征討都督校尉開府幽州牧公如故時將軍郭黒畧獲天竺沙門佛圖澄}
