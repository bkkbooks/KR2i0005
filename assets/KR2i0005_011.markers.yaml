  - {type: variant, offset: 2113, length: 2, content: 五年, WYG: 追奔百里前及勒軍軍中振擾謂王師大至勒結陣待之瞻懼有伏兵不敢進擊退保夀春夏六月勒自葛陂北行所過路次皆堅壁清野虜掠無獲軍中大饑士卒相食行至東燕聞汲郡向冰聚衆數千壁于枋頭勒將於棘津北渡恐冰邀之集諸將問計張賔曰如聞冰船盡在瀆中未上枋内可簡壯勇者千人詭道潛渡襲其船以濟大軍大軍既濟冰必可擒也勒從之秋七月使支雄孔萇等自汶石津縳筏潛渡取其船勒引兵自酸棗向棘津濟河冰聞勒軍至始欲内其船會雄等已渡屯其壘門下船三}
