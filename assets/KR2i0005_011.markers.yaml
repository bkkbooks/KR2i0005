  - {type: variant, offset: 2143, length: 6, content: 史丞梁延年夢, WYG: 守阮豹率遼西公鮮卑務塵世子叚疾陸眷疾陸二字一作就六與眷弟匹磾文鴦從弟末杯部衆五萬餘攻勒於襄國時城隍未修乃于襄國築隔城重柵設鄣以待之疾陸眷屯於渚陽勒分遣諸將連出挑戰頻為疾陸眷所敗勒走南陽復帥衆攻冀州疾陸眷大造攻具將以攻勒勒聞之甚懼顧謂諸將佐曰今城塹未固糧儲不多冦來轉逼彼衆我寡恐攻圍不解外無救援内糧罄絶縦孫吳重生不能固也吾將簡練將士大陳于野與之決戰何如諸將皆曰宜固守以疲冦彼師老自退追而擊之蔑不剋矣勒顧謂張賔孔萇曰君以為何如賔萇俱曰聞疾陸眷剋來}
