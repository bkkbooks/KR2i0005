  - {type: variant, offset: 55, length: 1, content: 破, WYG: 獨立乎曰不能勒曰如其不能者兵馬當有所屬今部落皆已受單于賞募往往聚議欲叛部大而歸單于矣宜早為之計㔨督等素無智略懼部衆之貳已也從之冬十月㔨督等隨勒單騎歸于劉淵淵署㔨督為親漢王莫突為都督部大以勒為輔一作䕶漢將軍平晉王以統之勒於是命㔨督為兄賜姓石氏名之曰㑹言其遇已也烏丸張伏利度有衆二千壁於樂平淵屢招不至勒偽獲罪於淵往奔伏利度伏利度喜結為兄弟使勒帥諸胡冦掠所向無前諸胡畏服勒知衆心附已乃因會執伏利度謂諸胡曰今起大事我與伏利度誰堪為主諸胡咸推勒勒於是釋伏利度帥其部衆歸淵淵加勒督山東征討諸軍事以伏利度之衆配之十二月戊寅并州}
