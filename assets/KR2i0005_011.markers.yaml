  - {type: variant, offset: 128, length: 641, content: 敗桓溫于枋頭威名大震太傅上庸王評深忌之垂遂出奔秦苻堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹苻堅敗于淮南垂軍獨全堅以千餘騎奔之世子寶言于垂曰國家傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬堅垂至澠池言于堅曰王師不利壯境之民或因此輕重請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諫曰垂爪牙名將今之韓白且世豪東夏志不為人下頃以避禍歸誠非慕德而至也恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信況萬乘之主乎翼曰陛下重小信而輕忽社稷臣見往不見其還關東之變垂其首乎自涼馬臺結草筏而渡至安陽修箋于長樂公丕垂至館之于鄴西會苻暉告丁零翟斌聚眾四千謀逼洛陽丕于是配垂兵二千遣廣武將軍苻飛龍率氐騎一千為垂之副丕戒飛龍曰垂為三軍之統卿為垂謀之主苻暉告急簡書相尋垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋眾三萬至洛陽苻暉閉關門拒守不與文通翟斌率眾會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸軍之力得平關東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大將軍燕王承制行事翟斌為建義將軍封河南王弟德為范陽王眾至二十萬濟自石門長驅攻鄴慕容垂元年正月朝群寮于清陽宮以暐在長安依晉愍帝在平陽中宗稱王改年建武故事改秦建元為燕元元年立太子寶為燕太子攻拔鄴郡丕固守中城垂漸而圍之于魏郡肥鄉築新興以置輜重進師攻鄴開其西奔之路二年三月丕棄鄴奔并州以魯陽王和為南, WYG: 領䕶匈奴}
