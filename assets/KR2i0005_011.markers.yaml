  - {type: variant, offset: 48, length: 5, content: 兒闊達好奇, WYG: 胡狀貌竒異志度非常其終不可量也勸邑人厚遇之時多嗤笑惟鄔人郭敬陽曲甯驅以為信然並加資贍勒亦感其恩為之力耕毎聞鼓角之聲或在前後勒私異之歸以告母母曰作勞耳鳴非不祥也因於所耕地得一刀銘曰石氏昌隷書私心自喜居與邑人李陽相近陽性剛愎毎輕勒與爭漚麻池共相打揲互有勝負太安中并州饑亂勒與諸小胡亡散乃自鴈門還依甯驅北澤都尉劉監欲縳賣之賴驅匿之獲免於是潛詣納降都尉李川路逢郭敬泣拜言饑寒敬對之流涕以帶貨鬻食之并給以衣服勒謂敬曰今者大饑不可守窮諸胡饑甚宜誘將冀州就穀因執賣之可以兩濟敬深然之會建威將軍閻粹説并州刺史東瀛公司馬騰執諸胡于山東賣充軍賞一作實騰使將軍郭陽張隆虜羣胡將詣冀州兩胡一枷勒時年二十餘亦在其中數為隆所毆辱敬先以勒囑其族兄陽及兄子時是以陽時每為解請道路饑病賴陽時而濟東至平原賣與荏平人師懽為奴有一老父謂勒曰君魚龍髮際上四道已成當貴為人主甲戌之歳王彭祖浚字彭祖可圖也勒曰若如公言弗敢忘徳忽然不見每屯耕於野常聞鞞鐸音勒以告諸奴諸奴亦聞之因曰吾幼來在家恒聞如是諸奴歸以告懽懽亦竒其狀貌而免之懽家隣於馬牧勒與牧帥魏郡汲桑往來勒以能相馬自託於桑嘗傭於武安臨水為遊軍所囚會有羣鹿旁過軍人競逐之勒乃獲免俄而又見一老父謂勒曰向來羣鹿者我也君應為中州主一云列國主故相救爾勒拜而受命遂招集王陽􅇪安支雄冀保吳豫劉膺桃豹逯明等八騎為羣盜後郭敖劉徴劉寶張曀僕呼延莫郭黒畧張越孔豚趙鹿支屈六等又赴之號為十八騎復東如赤龍騄驥諸苑中乗苑馬逺掠繒寶以賂汲桑永興元年成都王司馬頴敗乗輿於蕩隂逼帝如鄴宫王浚以頴幽辱天子使鮮卑擊之頴懼挾恵帝南奔洛陽帝復為張方所逼遷於長安闗東所在兵起皆以誅頴為名河間王司馬顒懼東師之盛欲輯懐東夏乃奏議廢頴是歳劉淵稱漢王於黎亭其二年頴故帳下督公孫藩樓機郝昌等自稱將軍起兵趙魏之清河鄃縣欲以攻鄴衆至數萬勒與汲桑帥牧人乗苑馬數百騎赴之桑始命勒以石為姓勒為名藩拜勒為前隊督從攻掠郡縣殺二千石長吏轉前攻平昌公司馬模于鄴模使將軍馮嵩逆戰敗之藩濟自白馬而南模甚懼廣平太守焦國丁邵率衆救模范陽王司馬虓又遣兖州刺史濮陽太守茍晞救之藩衆散走勒與汲桑亡潛苑中頴之將如河北也汲桑以勒為伏夜牙門帥牧人刼掠郡縣繫囚又招山澤亡命多起附勒勒率以應之屯於平石晉懐帝永嘉元年春三月公孫藩既死汲桑逃還苑中復聚衆刼掠自稱大將軍聲言為成都王頴報仇誅東海王越東瀛公騰為名乃出成都王棺載之車中毎事啓靈以行軍令桑以勒為前鋒屢有戰功署為掃虜將軍忠明亭侯遂與張泓故將李豐等進攻鄴城署勒為前鋒都督夏五月桑攻破魏郡太守馮嵩長驅至鄴時鄴中府庫虛竭而東瀛公晉書作新蔡王騰資用甚饒性尤吝嗇無所振恵臨急乃賜將士米各數升帛各丈尺是以人不為用桑遂入鄴攻騰騰曰孤在并州七年胡圍城不能克汲桑小賊何足憂也及勒等至騰不能守率輕騎而走為李豐所殺騰子虞有勇力騰之被害虞逐豐投水死是日虞及弟矯紹并鉅鹿太守崔曼車騎長史羊桓従事中郎蔡充等又為豐餘黨所害諸名家流移依鄴者死亡畧盡遂燒鄴宫火旬日不滅殺萬餘人掠婦女珍寶以巨萬計濟自延津南擊兖州太傅東海王越甚懼使撫軍兖州刺史茍晞及陳留内史王讚等來討桑勒攻幽州刺史石尠於樂陵尠與戰敗死乞活田禋帥衆五萬救尠勒逆敗禋與晞等相持于平原陽平間數月大小三十餘戰互有勝負晉山陽公劉秋死之山陽公漢獻帝曽孫也秋七月己酉朔越懼進次官渡為晞聲援以討桑勒命晞為前鋒桑素憚晞乃於城外為柵自守晞將至頓軍休士先遣單馬示以禍福桑衆大震八月己夘朔晞擊敗桑勒于鄴九月戊申晞追擊桑勒于東武陽大破之陷其九壘死者萬餘人桑與勒弃柵宵遁退保清淵嬰城固守乃收餘衆將奔劉淵冀州刺史丁紹邀之于赤橋又大敗之桑奔馬牧勒奔樂平胡部大張㔨督馮莫突等擁衆數千壁於上黨勒往従之深為所昵因説㔨督等曰劉單于舉兵擊晉部大拒而不從自度}
