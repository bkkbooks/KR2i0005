  - {type: variant, offset: 941, length: 271, content: 聞垂疾皆引歸及垂于平城夏四月薨于上谷之俎陽年七十二諡武成皇帝廟號世祖慕容寶字道祜垂第四子元璽四年生于信都少輕果無志操好人從巳段后諫垂曰太子資質雍容柔而不斷非濟世之雄遼西高陽陛下嗣之賢者宜擇一樹之垂不納謂曰汝謂我為晉獻公乎建興十一年四月僭即皇帝位大赦改元為永康元年慕容寶寶遣將軍趙王麟逼段后曰常謂主上不能嗣守太統今竟能不宜早自裁以全段氏后怒曰汝兄弟上逼殺母豈能保守社稷吾豈惜死念國滅不久遂自殺八月立妃段氏為皇后濮陽公榮為皇太子二年正月魏使修和寶不許二月魏攻中山其夜尚書慕容皓謀殺寶立趙王麟寶與太子榮等萬騎就清河會于薊以開封公慕容詳守中山五月中山, WYG: ''}
