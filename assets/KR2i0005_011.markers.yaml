  - {type: variant, offset: 2187, length: 10, content: 月苻后起承華殿高弘光, WYG: 公安我辭爾更遣􅇪安問澄澄曰已獲杯矣未幾末杯逐北入其壘門伏兵俱出遂生擒之疾陸眷等衆皆奔散萇乗勝追擊枕尸三十餘里獲鎧馬五千疋疾陸眷收其餘衆還屯渚陽勒質末杯遣間使求和于疾陸眷疾陸眷許之文鴦諫曰今以末杯}
