  - {type: variant, offset: 2142, length: 0, content: '', WYG: 劉聰署勒使持節散騎常侍都督冀幽并營四州雜夷征討諸軍事冀州牧進封本國上黨郡公食邑五萬户開府幽州牧東夷校尉如故冬十二月廣平游綸張豺擁衆數萬受冀州刺史王浚假署保據苑鄉勒使􅇪安支雄等七將攻之破其外壘浚遣督䕶王昌中山}
