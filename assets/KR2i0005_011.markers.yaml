  - {type: variant, offset: 2105, length: 0, content: '', WYG: 三月癸丑鎮東大將軍琅邪王睿上尚書檄四方以討勒檄書朝夕繼至勒集將佐議之右長史刁膺請先送欵于帝一作睿求掃平河朔以自贖俟其軍退徐更圖之勒愀然長嘯中堅將軍􅇪安勸勒就髙避水勒曰將軍何怯乎孔萇支雄等三十餘人進曰}
  - {type: page-break, offset: 2105, content: '', id: KR2i0005_WYG_011-22a, image: WYG0463/WYG0463-0397a.png}
  - {type: variant, offset: 2105, length: 0, content: '', krp: 三月癸丑鎮東大將軍琅邪王睿上尚書檄四方以討勒檄書朝夕繼至勒集將佐議之右長史刁膺請先送欵于帝一作睿求掃平河朔以自贖俟其軍退徐更圖之勒愀然長嘯中堅將軍䕫安勸勒就髙避水勒曰將軍何怯乎孔萇支雄等三十餘人進曰}
  - {type: variant, offset: 2106, length: 1, content: 凍, WYG: 吳軍未集萇等請各將三百步卒乗船三十餘道夜攻一作登夀春斬吳將頭據城食粟要以今年破丹陽定江南盡生縛取司馬家兒輩勒笑曰是勇將之計也各賜鎧馬一匹顧謂張賔曰於君意何如賔曰將軍攻陷京師囚執天子殺害王公妻畧妃主擢將軍之髮不足以數將軍之罪奈何復還相臣奉乎去年既誅王彌不宜來此營建今天降霖雨于數百里中示將軍不應留此也鄴有三臺之固西接平陽山河四塞有喉衿之勢宜北徙據之伐叛懐服經營河朔河朔既定天下無處將軍之右者矣晉之保夀春懼將軍往擊之爾彼卒聞迴軍必欣于敵去喜於自全何暇追襲吾後為吾不利耶將軍宜使輜重從北道先發將軍引大軍向夀春輜重既逺大軍徐還何憂進退無地乎勒攘袂鼓髯曰張君計是也責刁膺曰君共相輔佐當規成功業如何忽忽便相勸孤降此計應斬然素知君怯特相宥爾於是黜膺為將軍擢賔為右長史加中壘將軍號曰右侯勒引兵發葛陂還河北過枋頭枋頭人夜欲斫營佛圖澄謂郭黑畧曰須㬰賊至可令公知果如其言有備不敗勒遣石虎率騎二千向夀春遇晉運船獲米布數十艘將士爭取之不復設備晉伏兵大發為紀瞻敗于巨靈口赴水}
