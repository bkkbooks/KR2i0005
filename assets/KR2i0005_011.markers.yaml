  - {type: variant, offset: 115, length: 0, content: '', WYG: 遣使授勒持節平東大將軍校尉都督王如故己酉勒入冦鄴魏郡太守王粹死之進冦趙郡殺冀州西部都尉馮沖攻乞活赦亭田禋於中丘皆殺之永嘉三年春三月淵授勒安東大將軍開府置左右長史司馬從事中郎夏四月勒進軍攻鉅鹿常山殺二郡守將陷冀州郡縣堡壁百餘衆至十餘萬集衣冠文物别為君子營引趙郡張賔為謀主始署軍功曹以刁膺張敬為股肱􅇪安孔萇為爪牙支雄呼延莫王陽桃豹逯明吳豫等為將帥使别將張斯率騎詣并州山北諸郡縣說諸胡羯曉以安危諸胡懼勒威名多來降附秋九月進軍常山分遣諸將攻中山博陵髙陽諸縣降者數萬人晉安北將軍王浚遣天水將軍祁𢎞帥鮮卑叚務勿塵等十餘萬騎來討大敗勒於飛龍山死者萬餘勒退屯黎陽浚因分遣諸將攻諸未下及叛者降三十餘壁置守宰以撫之冬十一月勒冦信都陷長樂殺冀州刺史安北將軍王斌因屠黎陽王浚自領冀州詔車騎將軍王堪北中郎將裴憲自洛陽帥衆討勒勒燒營并粮迴軍拒之次于黄牛壘魏郡太守劉矩以郡降勒冀州郡縣百餘壁皆陷没勒使矩統其壘衆為中軍左翼勒至黎陽裴憲棄軍奔淮南王堪退保倉垣十二月淵授勒鎮東大將軍}
