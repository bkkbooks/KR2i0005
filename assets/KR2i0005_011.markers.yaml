  - {type: variant, offset: 1213, length: 833, content: 麟出據新市魏師戰于義臺敗績南奔魏入中山寶遣御史中丞兼鴻臚魯遂持節受司空范陽王德丞相冀州牧丞制南夏封公封侯牧守三年二月寶發龍城以撫軍慕容騰為前軍步騎三萬將南伐次于乙連長上段速骨宋赤眉因民之憚遠役殺司空樂浪王宙眾既幸亂投仗奔走寶馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寶還于薊寶欲北還盛等咸以汗忠款虛實未明宜就范陽王德寶從之乃自薊而南四月寶至鄴鄴中遺民固請留之寶不從南至黎陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超寶具申款誠忠節無差寶于是命發汗遣弟難率五百騎迎寶至龍城汗引寶入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌黎王年號青龍七月長樂公盛襲誅汗盛即位偽諡寶惠愍皇帝廟號烈祖慕容盛字道運寶之庶長子秦建元十年生于長安二十年苻堅誅慕容氏盛東奔既至垂問以西事畫地圖垂笑謂之曰昔魏武撫明帝之首遂乃侯之祖之愛孫有由來矣于是封長樂公建興六年領北中郎鎮薊進爵為王及寶為蘭汗所殺盛馳訃哀因潛結大眾謀討茌及江等斬之慕容盛建平元年七月告成宗廟大赦改元青龍謙損自卑不稱尊號以長樂王稱制諸王貶爵為公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僭即皇帝位正月朝群臣于承乾殿大赦改建平元年為長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右將軍慕容國謀率禁兵襲盛前將軍段機等因眾心阻動潛于禁中鼓譟大呼盛聞變率左右出戰眾皆披潰俄有一賊從闇中擊傷足遂取輦昇前殿召叔公河間公熙囑以後事熙未至而薨年二十九偽諡昭武皇帝廟號中宗慕容熙字道文一名長生垂之少子燕元二年生于長生建興八年封河間王永康初隨寶奔龍城拜司隸校尉長樂元年遷僕射中外都督領中領軍昌黎尹盛薨僭即皇位大赦改長樂三年為光始元年慕容熙二年正月熙引見州郡耆舊予言問以民間疾苦司隸部民劉瓚對問稱旨拜帶方太守是春大治宮室至四月立苻貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑內又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為苻昭儀鑿曲光海青涼池季夏暑熱士卒不得休息渴, WYG: 疫}
