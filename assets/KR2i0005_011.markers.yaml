  - {type: variant, offset: 2399, length: 361, content: 此陵轜車高大毀北門而出中衛將軍馮跋左衛將軍張興先皆坐事亡奔以熙政之虐也與跋從兄萬泥等三十二人結盟推夕陽公慕容雲為主發尚方徒五千人分屯四門入宮受甲閉門拒守中黃門趙洛生奔告熙熙曰此鼠盜耳勝還當誅之乃收髮貫甲馳還赴難夜至龍城攻北門不剋遂入龍騰苑左右潰散熙微服逃于林中為人執送雲等殺之年三十二葬衡平陵諡曰昭文皇帝慕容雲字子雨寶之養子祖父高和句麗之支庶自云高陽氏之苗裔故以高為氏寶之為太子雲以武藝給侍東宮永康初拜侍御郎以疾去官及熙葬后馮跋詣之告以大謀雲懼跋等強之四月即天王位復姓高氏大赦改建始元年為正始元年國仍號大燕以馮跋為侍中都督中外諸軍錄尚書事武邑公慕容歸為遼東公立燕之宗社慕容雲三年冬十月雲臨東堂幸臣離班桃仁懷劍執紙而入稱有所啟抽劍擊雲雲以几拒班桃仁進而殺之立馮跋為主即位偽諡為惠懿皇帝始垂以丙戌之歲建號中山至馮跋之歲歲在己酉, WYG: 地}
