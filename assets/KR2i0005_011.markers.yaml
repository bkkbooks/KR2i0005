  - {type: variant, offset: 20, length: 9, content: 阿六敦母蘭淑儀垂少, WYG: 匐勒上黨武鄉羯人也其先匈奴别部羌渠之胄分散居于上黨羯室因號羯胡祖耶奕干父周曷朱一名乞翼加並為部落小卒勒生時赤光滿室白氣自天屬于中庭見者咸異之年十四隨邑人行販洛陽倚嘯上東門王衍見而竒之顧謂左右曰向者胡雛吾觀其聲視}
