  - {type: variant, offset: 115, length: 0, content: '', krp: 遣使授勒持節平東大將軍校尉都督王如故己酉勒入冦鄴魏郡太守王粹死之進冦趙郡殺冀州西部都尉馮沖攻乞活赦亭田禋於中丘皆殺之永嘉三年春三月淵授勒安東大將軍開府置左右長史司馬從事中郎夏四月勒進軍攻鉅鹿常山殺二郡守將陷冀州郡縣堡壁百餘衆至十餘萬集衣冠文物别為君子營引趙郡張賔為謀主始署軍功曹以刁膺張敬為股肱䕫安孔萇為爪牙支雄呼延莫王陽桃豹逯明吳豫等為將帥使别將張斯率騎詣并州山北諸郡縣說諸胡羯曉以安危諸胡懼勒威名多來降附秋九月進軍常山分遣諸將攻中山博陵髙陽諸縣降者數萬人晉安北將軍王浚遣天水將軍祁𢎞帥鮮卑叚務勿塵等十餘萬騎來討大敗勒於飛龍山死者萬餘勒退屯黎陽浚因分遣諸將攻諸未下及叛者降三十餘壁置守宰以撫之冬十一月勒冦信都陷長樂殺冀州刺史安北將軍王斌因屠黎陽王浚自領冀州詔車騎將軍王堪北中郎將裴憲自洛陽帥衆討勒勒燒營并粮迴軍拒之次于黄牛壘魏郡太守劉矩以郡降勒冀州郡縣百餘壁皆陷没勒使矩統其壘衆為中軍左翼勒至黎陽裴憲棄軍奔淮南王堪退保倉垣十二月淵授勒鎮東大將軍}
  - {type: variant, offset: 116, length: 0, content: '', WYG: 汲郡公持節都督王如故勒固讓公不受與閻羆攻暏圈苑市二壘皆陷之羆中流矢死勒并統其衆潛自石橋濟河攻陷白馬坑男女三千餘口乙亥夜洛陽有白氣如帶自地升天南北各二十丈永嘉四年春正月王彌以三千衆會勒攻冦徐豫兖州二月勒東襲鄄城兖州刺史袁孚戰敗為其部下所殺因攻倉垣襲陷白馬殺車騎將軍王堪遂北濟河攻冀州廣宗清河平原陽平諸郡民從之者九萬餘口夏五月勒冦汲郡執汲郡太守胡寵復南濟河滎陽太守裴純奔建康六月幽并司冀秦雍等六州大蝗食草木牛馬毛皆盡秋七月劉聰圍河内太守裴整勒率騎會之攻冠軍將軍梁巨于武徳懐帝遣征虜將軍宋抽救巨勒留諸將守武徳與平北大將軍王桑逆擊巨于長陵巨懼請降勒勿許巨踰城遁走為軍士所執勒馳如武徳坑降卒萬餘數梁巨罪而殺之王師退還河北諸堡壁大震皆請降送任九月河内人樂仰執裴整叛降於勒時劉淵死劉聰即位授勒征東大將軍并州刺史汲郡公持節開府都督校尉王如故勒固辭將軍乃止冬十月漢河内王劉粲始安王劉曜及王彌率衆四萬攻洛陽勒留長史刁膺統步卒九萬徙輜重于重門率輕騎二萬會粲等于大陽敗晉監軍裴邈于澠池長驅入洛川粲出轘轅掠梁陳汝潁間勒出成􅆏闗壬寅勒圍陳留太守王讚于倉垣為讚所敗退走河北屯汶石津壬子東海王司馬越羽檄徴天下兵帝謂使者曰為我語諸征鎮若今日尚可救緩則無及矣既而莫有至者勒攻陷襄城太守崔曠于繁昌殺之將至宛北攻幽州幽州刺史王浚遣鮮卑叚文鴦帥騎救之退還河北浚又遣别將王甲始帥遼西鮮卑萬餘騎敗勒於汶石津勒乃燒船棄營引兵向柏門迎重門輜重合于石門濟河攻豫州刺史馮嵩于陳郡不克引兵而北將趣南陽時雍州流民京兆王如舉兵反于宛殺害令長自號大將軍領司雍二州牧大掠漢沔長安侯脱馮翊嚴嶷南安一作新平龎寔等各起兵江淮間受聰官位各帥其黨攻諸城鎮多殺令長以應之未幾衆至四五萬如等聞勒之往懼遣衆一萬屯襄城拒勒勒擊敗之盡俘其衆進至南陽遂屯宛北侯脱據宛王如據襄如素與脱不協懼勒之攻襄遣使送珍寶車馬犒師結為兄弟勒亦假其彊而納之乃説勒曰侯脱雖名漢臣其實漢賊如常恐其來襲兄宜備之勒素怒脱貳已憚如唇齒故不攻之及聞如言甚悦遂夜令三軍蓐食俟雞鳴而駕後出者斬晨壓苑門攻之旬有二日而克嚴嶷率衆救脱至則無及遂降于勒勒斬脱囚嶷送于平陽盡并其衆軍勢彌盛南冦襄陽攻拔江西壘壁三十餘所留刁膺守襄陽躬帥精騎三萬還攻王如憚如之盛遂趣襄城如知之遣弟璃率騎二萬五千詐言犒師實欲襲勒勒逆擊滅之復屯江西十一月東海王司馬越専權擅政懐帝惡之乃詔征東大將軍青州刺史茍晞曰朕以不徳戎車屢興上懼宗祖之累下愍兆庶之困當賴方岳為國藩鎮公威振赫然梟斬藩桑走降喬朗魏植之徒復以誅除豈非髙識明㫁朕用委成加以王彌石勒為社稷之憂故有詔委統六州而公謙分小節稽違大命非所謂與國同憂也今復遣詔便施檄六州協同大舉剪除國難稱朕意焉晞得詔遂移檄諸征鎮州郡曰天步艱險禍難殷流劉元海造逆于汾隂石世龍階亂于三魏荐食畿甸覆喪鄴都結壘近郊仍震兖豫害二刺史殺二都督郡守官長堙没數十百姓流離肝腦塗地晞以虛薄負荷國重是以弭節海隅援枹曹衛猥被中詔委以闗東督統諸軍欽承詔命剋今月二日當西濟黎陽即日得滎陽太守丁嶷白事李惲陳午等救懐諸軍與羯大戰皆見破散懐城已陷河内太守裴整為賊所執宿衛闕乏天子蒙難宗廟之危甚于累卵承問之日憂嘆累息晞以為先王選用明徳庸以章服所以藩固王室無俾城壊是以舟檝不固齊桓責楚襄王逼狄晉文致討夫翼奬王家勠一作宣力帝室雖蹈湯火大義所甘加諸方牧俱受榮寵義同畢力以報國恩晞雖不武首啓秣馬裹戎糧以俟方鎮凡我同盟宜同赴救顯立名節在此行矣勒得移檄乃大怒曰誓不與此賊共生天壤間也十二月勒遣别將曹嶷破琅邪北攻齊地茍純閉城自守嶷衆轉盛連營數十里茍晞還登城望之乃有懼色與嶷連戰嶷輒破敗後簡精鋭與嶷大戰㑹大風揚塵晞遂敗績棄城夜走嶷追至東山部衆皆降于嶷晞單騎奔髙平收邸閣召募得數千餘人永嘉五年春正月勒謀據江漢右長史張賔以為不可勸勒北還勒弗從以賔為參軍都尉領記室位次司馬専居中總事懐帝慮勒南冦使王導率衆討勒勒軍糧不繼死疫太半納張賔之䇿乃焚輜重裹糧卷甲渡沔癸酉轉冦江夏江夏太守楊岠一作岷棄郡奔武昌勒因進攻夏口晉明威將軍朱伺鐵面自衛以弩的射勒大帥數人皆被殺軍士並以磊石弓箭如雨所向摧破勒衆抛船上岸於水邊作陳逐水上下以邀伺軍伺身被數十箭氣色不變諸將尋至勒兵崩退皆棄船投水死者百數勒還長沙伺追至蒲圻不及而返二月勒北冦新蔡殺新蔡王確於南頓朗陵公何襲廣陵公陳軫上黨太守羊綜廣平太守邵肇等率衆降勒進陷許昌殺平東將軍王康又攻汝南汝南王祐奔建康夏四月戊子太傅東海王越率洛陽之衆二十餘萬討勒越薨于軍軍人推太尉王衍為主率衆東下勒輕騎追之及於東郡苦縣甯平城衍遣將軍錢端出兵拒勒為勒所敗端死衍軍大潰于是數十萬衆勒分騎圍而射之相踐如山王公士庶死者十餘萬無一人得免者遂執衍及襄陽王範任城王濟武陵王澹澹子散騎常侍哀王喆西河王喜新野王劭梁懐王禧一無懐字齊王超吏部尚書劉望廷尉諸葛銓尚書鄭豫豫州刺史劉喬太𫝊長史庾凱等坐之幕下問以晉故衍具陳禍敗之由云計不在已且自言少無宦情不豫世事因勸勒稱尊號冀以自免勒曰君少壯登朝名蓋四海身居重任何得言無宦情耶破壊天下非君而誰命左右扶出衆人畏死多自陳説獨襄陽王範神色儼然意氣自若顧呵之曰今日之事何復紛紜勒甚竒之謂孔萇曰吾行天下多矣未嘗見此輩人當可存乎萇曰彼皆晉之王公終不為吾用勒曰雖然要不可加以鋒刃於是引諸王公卿士於外夜使人排牆填殺之剖越柩焚其屍曰此人亂天下吾為天下報之故焚其骨以告天地王彌弟璋焚其餘衆并食之左衛將軍何倫右衛將軍李惲聞越之死秘不發喪奉越妃裴氏及世子毗出自洛陽從者傾城所經暴掠勒逆毗於洧倉軍復大潰執毗及宗室四十八王并公卿士皆斬之何倫奔下邳李惲殺妻子奔廣宗裴妃為人所掠賣於}
