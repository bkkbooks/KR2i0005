  - {type: variant, offset: 1130, length: 0, content: '', WYG: 千人鎮洛金墉城曜攻之不能下不覺勒軍卒至天曉復來攻城勒自統中軍步騎四萬直赴金墉濟自大堨先是流澌風猛軍至而冰泮清和濟畢流澌大至勒以為神靈之助命曰靈昌津勒顧謂徐光曰曜盛兵成皋闗上計也阻洛水其次也坐守洛陽此成擒爾十二}
