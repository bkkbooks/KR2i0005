  - {type: variant, offset: 41, length: 0, content: '', WYG: 為王后世子為王太子拜王修及劉茂皆為將軍封列侯修舍人曹平樂從修至粟邑因留仕漢言于曜曰大司馬遣修等來外表至䖍内覘大駕强弱俟其復命將襲乗輿時漢兵寔殘弊懼修宣之大怒乃追汜等還斬修於粟邑停太宰之授三月勒還至襄國劉茂逃歸言修死狀勒大怒誅曹平樂三族贈修太常又知追停太宰趙王之授怒甚下令曰孤兄弟之奉劉氏一作家於人臣之道過矣彼之基業皆孤所為若微孤兄弟豈得南面稱朕哉今既得志便欲相圖天不助惡使假手靳凖孤惟事君之體當資舜事瞽䏂之義故復推崇今主修好如初何圖長惡不悛殺奉誠之使帝王之起復何常耶趙王趙帝孤自取之名號大小豈爾所節乎於是置太醫尚}
