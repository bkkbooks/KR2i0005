  - {type: variant, offset: 246, length: 2, content: 承制, WYG: 趙王依漢昭烈在蜀魏王在鄴故事以河内魏郡汲郡頓丘平原清河鉅鹿常山中山長樂樂平十一郡并前趙國廣平陽平章武渤海河間上黨定襄范陽漁陽武邑燕國樂陵十三郡合二十四郡户二十九萬為趙國封内依舊改為内史凖禹貢復冀州之境}
