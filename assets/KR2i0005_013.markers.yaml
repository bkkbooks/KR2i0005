  - {type: variant, offset: 2212, length: 0, content: '', krp: 初郭敬之退據樊城也晉師復戍襄陽夏四月敬又攻陷之留戍而歸勒時㫁寒食忽暴風大雨雷震建徳殿端門襄國市西門倒殺五人雹起西河介山大者如彈丸平地水深三尺洿下丈餘行人禽獸死者萬數厯太原樂平武鄉趙郡廣平鉅鹿千餘里樹木摧折禾稼蕩然勒大驚正服于東堂問徐光曰厯代已來有斯災幾也光對曰周漢魏晉皆有之雖天地之常事然明主未始不為一變所}
  - {type: variant, offset: 2213, length: 5, content: 男女萬餘口, WYG: 敬天之怒也俗以介子推五月五日燒死世人}
  - {type: variant, offset: 2213, length: 5, content: 男女萬餘口, krp: 敬天之怒也俗以介子推五月五日燒死世人}
  - {type: variant, offset: 2219, length: 0, content: '', WYG: 其忌故不舉餉食去年禁寒食非也且介子推帝鄉之神也厯代所尊或者以為未宜替也一人吁嗟王道尚為之虧況羣神怨憾而不怒干上帝乎縦不能令天下同爾介山左右晉文之所封也宜任百姓奉之勒乃下書曰寒食既并州之舊風朕生其俗不能異也前者外議以子推諸侯之臣王者不應為祀一作忌字故從其議儻或由之而致斯災乎子推雖朕鄉之神非法食者亦不得亂也尚書其速檢舊典定議以聞有司奏以子推厯代攸尊請普復寒食更為植嘉樹立祠堂給户奉祀黄門郎韋謏駁曰按春秋藏冰失道隂氣發洩為雹自子推已前雹者復何所致也此是隂陽乖錯所為爾且子推賢者曷為暴虐如此求之冥趣必不其然今雖為冰室懼所藏之冰不在固隂互寒之地多皆川池之側氣洩為雹也以子推忠賢令緜介之間奉之為允於天下則不通矣勒從之於是遷冰室於重隂凝寒之所并州復寒食如初勒令太子𢎞省可尚書奏事使中常侍嚴震參決一作綜可否惟征伐刑㫁大事乃呈之自是震威權之重侔于主相中山王虎之門可設雀羅虎愈怏怏不悦秋七月勒荆州刺史郭敬南掠江西晉太尉陶侃遣其子平西㕘}
