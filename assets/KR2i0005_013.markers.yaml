  - {type: variant, offset: 2082, length: 0, content: '', krp: 癸巳劉徴復冦婁縣掠武進乙未司徒郄鑒擊却之勒南郊有白氣自壇屬天勒大悦還宫赦四歳刑遣使封張駿武威郡公食涼州諸郡勒親耕耤田還宫赦五歳刑賜公卿以下金帛有差三月壬戌朔日有食之勒以日蝕避正殿三日令羣公卿士各上封事禁州郡諸祠堂非正典者皆除之其能興雲致雨有益百姓者郡縣更立祠堂殖嘉樹凖嶽凟已下為差等勒如鄴擬營新宫廷尉續咸上書切諫曰臣聞唐虞之治采椽茅茨土階三尺彰美于詩書漢文惜百金不營露臺稱之于千古迨夏商之瓊臺瑤陛楚之章華秦之阿房資財内竭華夷外叛勒大怒曰不斬此老臣朕宫何由得成也勑御史收之中書令徐光進曰陛下天資聰睿超邁唐虞而更不欲聞忠臣之言豈夏癸商辛之君耶咸言可用用之不可用亦當容之奈何一旦以直言斬列卿乎勒歎曰為人君不得自専如是豈不識此言之忠乎向戲之爾匹夫家資滿百匹尚欲市别宅況有天下之富萬乗之尊乎此宫終當繕之且勑停作以伸吾直臣之義也因賜咸絹百匹稻百斛又下書令公卿百寮咸荐賢良方正直言秀異至孝亷清各一人對策上第者拜議郎中第中郎下第郎中仍令舉人得遞相荐引廣招賢之路起明堂辟雍靈臺於襄國城西秋七月大雨霖中山西北暴水流漂巨木百餘萬根集于堂陽勒大悦謂公卿曰諸卿知不此非為災也天意欲吾營鄴都爾於是令少府任汪都水使者張漸等監營鄴宫勒親授規模時蜀梓潼建平漢固三郡巴蠻來降勒以成周土中漢}
  - {type: variant, offset: 2083, length: 1, content: 相, WYG: 舊京復欲有移都之意乃命洛陽為南都置行臺治書侍御史於洛陽以太尉中山王虎為大司馬程遐為開府儀同建平三年春正月勒饗髙句驪宇文屋孤使因大㑹羣臣於建徳前殿酒酣謂中書令徐光曰朕可方自古開基何等主也對曰陛下神武謀畧過于漢髙雄藝卓犖超絶魏祖自三五已來無可比者其軒轅之亞乎勒笑曰人豈不自知卿言太過朕若遇漢髙祖當北面事之與韓彭競鞭而爭先爾若遇光武當並驅中原未知鹿死誰手大丈夫行事當礌礌落落如日月皎然終不能如曹孟徳司馬仲達欺人一作他孤兒寡婦狐媚以取天下也朕當在二}
