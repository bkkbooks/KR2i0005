  - {type: variant, offset: 2226, length: 1, content: 歲, WYG: 春正月勒遣使致帛修好於晉晉下詔焚之夏四月天靜無風而塔上一鈴獨鳴佛圖澄嘆曰鈴音云國有大喪不出今年矣五月有流星大如象尾足似蛇形自北極西南流五十餘丈光明燭地墜於河聲聞九百餘里黑龍見鄴井中勒親往觀之有喜色朝羣臣於鄴命郡國立學官每郡置博士祭酒二人弟子百五十人三考修成顯升台府於是擢拜太學生五人為佐著作郎録述時事六月大旱勒親臨廷尉録囚徒五歳刑已下皆輕決遣之重者賜酒食聴沐浴一須秋論還未及宫澍雨大降時淳觚白羌婦産一卵大如盂剖之有虫如巨蟻二足立行雍州刺史石生上言西鄉行屍蛇與鼠鬬于安定府間二日蛇死臨涇馬生角長安城中雞鳴音皆曰基慈安定㕔事前後有天神降聞誦書聲一作諷詠經音求之不得七日乃止時有𫝊者並皆訛廢隕石于肥鄉縣令韓強}
