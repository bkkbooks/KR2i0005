  - {type: variant, offset: 1906, length: 0, content: '', krp: 人侯二十四人縣公二十六人侯二十二人其餘文武封拜各有差侍中任潘等㕘議以趙承金為水徳旗幟尚𤣥牲牡尚白子社丑臘勒從之勒下書曰自今有疑難大事八座及委丞郎齊詣東堂詮詳平決其有軍國要務須啟者有令僕尚書隨局入陳勿避寒暑昏夜也勒以祖約不忠於本朝薄其為人不見者乆之右僕射程遐言于勒曰天下初定當顯明順逆故漢髙祖斬丁公赦季布也大王自起兵以來見忠于事君者無不褒擢背叛不臣者無不誅夷此天下所以歸伏盛徳也今祖約猶存臣竊惑之且約大引賔客又占奪先人鄉里田地地主多怒安西將軍姚弋仲亦以為言勒従之乃詐約曰祖侯逺來未得歡喜可集子弟一時俱會至日勒辭之以疾令遐請約及其宗室約知禍及大飲致醉既至於市抱其外孫而泣遂誅之并殺其親屬中外百餘人婦女妓妾班賜諸臣夏五}
