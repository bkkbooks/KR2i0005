  - {type: variant, offset: 1126, length: 1, content: 匹, WYG: 餘縣進攻蒲阪劉曜遣河間王劉述發氐羌之衆屯秦州以備張駿楊難敵自將中外精鋭水陸俱進以救蒲阪自衛闗北濟虎懼引退曜追擊之八月戰于髙候虎敗石瞻死之枕尸二百餘里失其資仗不可勝計虎奔朝􅃚一作朝歌曜濟自大陽圍石生於金墉決千金堨以灌之分遣諸將攻汲郡河内勒滎陽太守尹矩野王太守張進等皆降于曜襄國大震冬十一月勒欲自將救洛陽左右長史司馬郭敖程遐等固諫曰劉曜乗勝雄盛難與爭鋒金墉糧豐攻之未可卒拔曜懸軍千里勢不支乆不可親動動無萬全大業去矣勒大怒按劍叱遐等出乃赦徐光召而問之曰劉曜乗髙候之勢圍守洛陽庸人之情皆謂其鋒不可當然曜帶甲十萬攻一城而百日不克師老卒怠以我初鋭擊之可一戰而擒也若洛陽不守曜必送死冀州自河已北席卷南向吾事去矣程遐等不欲我行卿以為何如光曰曜乗髙候之勢不能進臨襄國更守金墉此其無能為可知也懸軍}
