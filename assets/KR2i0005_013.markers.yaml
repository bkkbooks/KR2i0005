  - {type: variant, offset: 2212, length: 0, content: '', WYG: 初郭敬之退據樊城也晉師復戍襄陽夏四月敬又攻陷之留戍而歸勒時㫁寒食忽暴風大雨雷震建徳殿端門襄國市西門倒殺五人雹起西河介山大者如彈丸平地水深三尺洿下丈餘行人禽獸死者萬數厯太原樂平武鄉趙郡廣平鉅鹿千餘里樹木摧折禾稼蕩然勒大驚正服于東堂問徐光曰厯代已來有斯災幾也光對曰周漢魏晉皆有之雖天地之常事然明主未始不為一變所}
