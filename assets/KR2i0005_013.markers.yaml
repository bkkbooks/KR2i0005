  - {type: punctuation, offset: 263, content: 「, id: KR2i0005_CHANT_013-bkkpn63}
  - {type: variant, offset: 263, length: 0, content: '', WYG: 此真髙人矣不如是安足貴乎嘉其清苦數賜穀帛每臨朝嗟慨以勵羣臣三月趙將尹安宋始宋恕趙慎四軍並據洛陽各相疑阻莫有固志司州刺史李矩潁川太守郭黙各遣千騎至洛以鎮之安等乃同謀叛降于勒勒遣石生率騎五千赴之矩黙軍皆退安等復叛勒遣使乞降於黙黙又帥步騎五百入洛陽石生以四將相謀不能自安乃虜宋始一軍渡河而北河南之民相率歸于李矩勒親帥大衆襲矩矩假為滎陽太守招懐離散逺近多附之乃遣老弱入山令所在牛馬散野因設伏以待之勒軍士爭取牛馬伏發齊呼聲動山谷勒衆大敗失首虜甚衆勒乃還夏五月晉徐州刺史蔡豹敗徐龕于檀丘龕帥衆叛勒復降于晉勒大怒命張敬據守要害時大雨霖}
