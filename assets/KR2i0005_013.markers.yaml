  - {type: variant, offset: 275, length: 3, content: 儲素積, WYG: 饋豹逖遣韓潛及别將馮鐵衛策等邀擊于汴水盡獲之豹宵遁屯東燕城逖使潛進屯封丘以逼之馮鐵據二臺逖鎮雍丘數遣兵要截勒兵勒屯戍漸蹙候騎常獲濮陽人逖厚待遣歸咸感逖恩徳率鄉里五百家降逖勒又遣精騎萬人拒逖為逖所破勒鎮戍歸逖者甚多逖將平中原善于撫綏自河以南多叛勒歸逖勒患之不敢窺兵河南乃下書曰祖逖屢為邊患逖北州士民望也倘有首丘之思其下幽州成􅆏縣使修逖祖父墓置守冢二家冀逖如趙佗感恩撤其邊寇逖聞之甚悦勒因與逖書求通使及互市逖不報書}
