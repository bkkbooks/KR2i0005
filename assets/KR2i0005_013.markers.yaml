  - {type: variant, offset: 246, length: 2, content: 承制, krp: 趙王依漢昭烈在蜀魏王在鄴故事以河内魏郡汲郡頓丘平原清河鉅鹿常山中山長樂樂平十一郡并前趙國廣平陽平章武渤海河間上黨定襄范陽漁陽武邑燕國樂陵十三郡合二十四郡户二十九萬為趙國封内依舊改為内史凖禹貢復冀州之境}
  - {type: variant, offset: 249, length: 2, content: 夏德, WYG: 至盟津西達龍門東至于河北至于塞垣以大單于鎮撫百蠻罷并朔司三州通置部司以監之伏願欽若昊天垂副羣望也勒西向而讓者五南向而讓者四百僚皆叩頭固請勒乃許之戊寅僭即趙王位大赦境内殊死已下均百姓田租之半賜孝弟力田死義之孤帛各有差孤老鰥寡穀人二石大酺七日依春秋列國漢初侯王每世稱元改稱趙王元年時晉太興二年也始建社稷立宗廟營東西公署従事中郎裴憲㕘軍傅暢杜嘏並領經學祭酒理曹㕘軍上黨續咸及庾景為律學祭酒任播崔濬為史學祭酒中壘將軍支雄游擊將軍王陽並領門臣祭酒専明胡人辭訟以張離張良劉羣劉謨等為門生主書司典胡人出内重其法禁不得陵侮衣冠華族號胡為國人遣使循行州郡勸課農桑朝㑹始用天子禮樂饗其羣下衣冠儀物從容可觀矣加張賔大執法専總朝政位冠僚首署虎為單于元輔都督禁衛諸軍事尋加驃騎將軍侍中開府賜爵中山公自餘羣臣授位進爵各有差署前將軍李寒領司兵勲敎國子擊刺戰射之法命記室佐明楷程機撰上黨國記大中大夫傅彪賈滿江軌撰大將軍起居注㕘軍石泰石同石謙孔隆撰大單于志羣臣議請論功勒下令曰自孤起軍十六年于兹矣文武將士従孤征伐者莫不䝉犯矢石備嘗艱苦其在葛陂之役厥功尤著宜為賞之所先若身見存爵封輕重隨功位為差死事之孤賞加一等庶足以慰答存亡申孤之心也勒遣使乞和於魏請為兄弟平文帝諱鬱律斬其使以絶之是年塗中有大石二丈許自立勒命㫁之有魚羊之文於是字𤣥羊先是太康中有山石似蹲狗之狀行者過輒咬之趙王二年春正月勒下書禁國人不聴執一作報嫂及在喪婚娶至於燒葬令如本俗叚末杯攻叚匹磾破之匹磾謂平北將軍冀州刺史邵續曰吾本夷狄以慕義破家君不忘乆要請相與共擊末杯君之恵也續曰賴公威徳續得效節今公有難豈敢不俱遂共擊末杯大破之匹磾與弟文鴦攻薊勒知續勢孤遣中山公虎將兵乗虚圍厭次孔萇攻續别營十一皆下之二月辛未虎至城下掠其居人續自出擊虎虎伏騎㫁其後遂執續使降續呼}
