  - {type: variant, offset: 271, length: 3, content: 攻鄴雖, WYG: 而不設備文鴦夜擊之大敗而歸秋七月祖逖將韓潛與勒將桃豹分據陳川故城豹居西臺潛居東臺豹由西門潛由東門出入相守四旬逖以布囊盛土如米狀使千餘人運以上臺又令數人擔米偽為疲極而息于道豹兵逐之皆棄擔而走豹兵乆饑得米以為逖士衆豐飽益懼無復膽氣勒將劉夜堂以驢千頭運}
