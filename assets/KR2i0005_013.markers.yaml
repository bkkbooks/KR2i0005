  - {type: variant, offset: 983, length: 2, content: 潘聰, WYG: 蔡豹屯於譙城虎進攻豹豹夜遁退守下邳為徐龕所敗虎引軍城封丘而還徙朝臣掾屬以上士族者三百户於襄國崇仁里置公族大夫以領之勒宫殿及諸門始就制法令甚嚴十一月中山公虎擊託候部掘咄哪於岍北大破之俘獲牛馬二十餘萬勒清定五品以張賓領選後更定九品署張班為左執法郎孟卓為右執法郎典定士族副選舉之任命公卿及州郡歳各舉秀才至孝亷清潔賢良直言武勇之士各一人置署都部從事各一部一州秩二千石職凖丞相司直趙王三年春正月勒下令曰去年水出巨材所在山積将皇天欲孤繕修宫宇也其擬洛陽之太極起建徳殿遣從事中郎任汪帥使工匠五千採木以供之二月黎陽人陳武妻一産三男一女武㩦其妻子詣㐮國上書自陳勒下令曰昔周之興也四乳八子今武妻一乳四子可為慶過姬祥美比曩日二儀諧暢和氣所致其賜乳婢一口榖一百石雜綵四十匹庶以肅迎嘉祥三月中山公虎攻撫軍将軍幽州刺史叚匹磾於厭次孔萇攻拔匹磾部内諸城匹磾召弟文鴦還厭次虎先縱騎抄掠城左右文鴦登城臨見不勝其忿欲出擊之言于匹磾曰我以勇聞故為民所倚仗今見民被掠而不救是怯也民失所望誰復為我致死乎遂帥壮士数千騎出戰殺傷甚衆馬乏伏不能起虎呼之曰大兄與我俱是夷狄乆欲與兄同為一家今天不違願於此得相見何為復戰請釋杖鴦罵曰汝為冦賊當死日乆吾兄不用吾策故令汝得至此我寧闘死不為汝屈遂下馬苦戰槊折執刀力戰不已自辰至申勒兵四面觧馬羅披自鄣前捉鴦鴦力竭殺數人而後被執城内奪氣匹磾欲單騎歸朝邵續之弟樂安内史洎勒兵不聼洎復欲執臺使王英送扵虎匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦已甚矣復欲執天子使者我雖夷狄所未聞也因謂英曰匹磾世受重恩不忘忠孝今日事逼欲歸罪朝廷而見逼廹忠欵不遂若得假息未死之日心不忘本遂渡河南既而勢窮泊及兄子緝竺等輿櫬出降匹磾朝服持節賔從出見虎曰我受晉恩志在滅汝不幸䘮國因以至此既不能死又不能為汝敬也勒與虎素與匹磾結為兄弟虎即起拜之送之襄國勒署匹磾為冠軍將軍文鴦為左中郎将衛麟為右中郎将皆金章紫綬散諸流民三萬餘户復其本業置守宰以撫之於是冀并幽州遼西巴西諸屯結皆陷于勒匹磾不為勒禮常著朝服戴晋冠持晋莭乆之與文鴦邵續等謀于國中推為盟主事露被殺文鴦邵續亦遇鴆死秋七月從事中郎劉奥坐營建徳殿并木斜縮斬于殿中尋悔之贈太常建徳校尉王和掘得員石銘曰律權石重四鈞同律度量衡有新氏造議者未詳或以為瑞參軍續咸曰王莾時物也其時兵亂之後典度堙滅遂命下禮官為凖程定式又得一鼎容四斗中有大錢三十文曰一當百百當千千當萬鼎銘十三字篆書不可曉藏之扵永豐倉因此令公私行錢而人情不樂乃出公絹市錢限中絹疋一千二百下絹八百然百姓私買中絹四千下絹二千巧利者賤買私錢貴賣于官坐死者十數人而錢終不行勒徙洛陽銅馬翁仲二於襄國列之永豐門冬十月勒悉召武郷耆舊赴襄國既至親與郷老齒坐歡飲語及平生因以武郷比之豐沛萬世之後䰟靈當歸之其復之三世十一月勒以百姓始復業其資儲未豐於是重制禁釀郊祀宗廟皆用醴酒行之數年無復釀者尋署虎為車騎将軍率騎三萬討鮮卑鬱粥於離石俘獲男女及牛馬十餘萬鬱粥奔烏丸悉降其衆城趙王四年春二月勒世子興死立子𢎞為世子署為領中領軍遣中山公虎統中外精卒四萬擊徐龕龕堅守不戰虎築室返耕列長圍守之夏四月晋鎮北将軍劉隗降勒拜鎮南将軍封為列侯是時祖逖已死其弟約代兄領豫州鎮譙以術士戴洋為中典軍庚辰禺中時忽有大風起自東南折木洋謂約曰十月必有賊到譙城東至厯陽當嚴守以備之六月大旱秋七月虎攻陷太山執守将徐龕送之于襄國勒盛之以囊於百尺樓自上㩧殺之坑其降卒三千人晉兖州刺史郄鑒為虎所逼懼自鄒山退屯下邳一作合肥八月琅邪内史一作太守孫黙以郡叛降扵勒冬十月三日勒遣别将冦河南騎兵至譙城東戴洋言于祖約曰賊必向城父可遣騎水南追之步軍于水北㫁其要路賊必自敗約竟不從乃掠城父婦女輜重而還約将魯延請追之洋曰不可約又不聼使兄子智與延追之勒将偽棄婦女輜重走智與延等争物復還掩擊智延僅以身免士卒皆死遂陷城父約不能禦退屯夀春勒将轉冦陳留拔之徐兖間壘壁多送任請降皆就拜守宰先是清河張披為程遐長史遐甚委昵之張賔舉為别駕引叅政事遐疾披去已又惡賔之權盛勒世子𢎞即遐之甥也自以有援欲收威重於朝乃使𢎞之母譖之曰張披與張賔為遊俠門客百餘乘物望皆歸之非社稷之計也宜除披以便國家勒以為然至是急召披不時至因此殺之賔知遐之間已遂弗敢請十二月濮陽景侯張賔卒勒哭之慟乃以程遐為右長史總執朝政自是朝臣莫不震懼赴于程氏矣勒征虜將軍石他敗王師於酇西執将軍衛榮而歸境内大疫死者十有二三乃罷徽文殿作遣将軍王陽屯扵豫州有闚􅎿之志於是兵難日尋梁鄭之間騷然震動是年魏平文帝崩烈帝立諱賀傉未親政事太后臨朝遣使與勒通和時人謂之女國使趙王五年春三月勒冦彭城下邳徐州刺史卞敦與征北将軍王􅃉退保盱眙夏四月勒遣使結好於慕容廆廆執送建康五月大旱佛圖澄於石井崗掘得死龍長尺餘漬之以水良乆乃蘓既而呪之祭之以酒龍騰空而上須臾天遂晦暝雨乃大降因名龍崗秋八月勒遣中山公虎統中外步卒一作騎四萬擊安東将軍}
