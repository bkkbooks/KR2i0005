  - {type: variant, offset: 2078, length: 0, content: '', krp: 太子𢎞為皇太子自餘文武封進各有差又定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛淑儀視子容華美人視男務簡賢淑不限員數其年造刀一口用}
  - {type: variant, offset: 2079, length: 0, content: '', WYG: 百金工用萬人頭尖長三尺六寸銘曰建平𨽻書勒遣荆州監軍郭敬與南蠻校尉董幼寇襄陽晉南中郎將周撫不能自固率所領退歸武昌襄陽遂陷中州流民悉降于勒平北將軍魏該弟遐等率其部衆自石城降敬敬遂毁襄陽徙其百姓於沔北樊城以戍之署敬為荆州刺史秦州牧休屠王羌叛勒刺史臨深遣司馬管光帥州軍討之為羌所敗隴右大擾氐羌悉叛勒遣河東王生進據隴城王羌兄子擢與羌有仇生乃賂擢與猗擊之羌敗奔涼州徙秦州夷豪五千餘户于雍州勒下書曰自今諸有處法悉依科令吾所忿戮怒發中㫖者若徳位已高不宜行一作訓罰或服勤死事之孤邂逅罹譴門下皆各列奏之吾當思擇而行也堂陽人陳猪妻一産三男賜其衣帛廩食乳婢一口復三歳勿事時髙句驪肅慎致其楛矢宇文屋孤並獻名馬涼州牧張駿遣長史馬詵奉圖送欵入貢稱臣髙昌于闐鄯善大宛遣使各獻方物晉荆州牧陶侃遣兼長史王敷來聘致江南之珍寳竒獸秦州送白虎白鹿荆州送白雉白兔濟隂木連理甘露降苑鄉勒以休瑞並臻遐方慕義赦三歳一作四歳刑已下均百姓去}
