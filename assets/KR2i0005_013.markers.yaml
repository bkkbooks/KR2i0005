  - {type: variant, offset: 255, length: 0, content: '', WYG: 勉奉匹磾為主勿有二心時尚書吏部郎劉𦙍聞虎攻厭次言于元帝曰北方藩鎮皆没惟餘邵續而已如使復為石虎所制則孤}
  - {type: variant, offset: 255, length: 0, content: '', krp: 勉奉匹磾為主勿有二心時尚書吏部郎劉𦙍聞虎攻厭次言于元帝曰北方藩鎮皆没惟餘邵續而已如使復為石虎所制則孤}
  - {type: variant, offset: 256, length: 2, content: 臺來, WYG: 士之心阻歸本之路愚謂宜存救援帝將遣兵救之聞續陷没而止匹磾自薊還未至厭次知續已没衆懼而散復為虎所遮文鴦以親兵數百力戰始得入城與續子緝兄子存竺等嬰城固守虎送續於襄國勒使徐光讓之曰國家應符撥亂八表宅心遺晉怖威逺竄揚越而續蟻封海阿跋扈王命以吾為不足為君耶何無上之甚也國有常刑於汝甘乎續對曰晉末饑亂}
