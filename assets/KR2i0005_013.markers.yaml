  - {type: variant, offset: 1128, length: 1, content: 年, WYG: 時亡攻戰之利今以大王威畧鸞旗親駕彼必望旌奔敗平定天下在今一舉此之機㑹所謂天授授而弗應禍之攸集勒笑曰光言是也以問佛圖澄澄言於勒曰昨輪鈴音云秀支替戾岡僕谷劬秃當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬秃當捉也言軍出捉曜也又令童子潔齊七日取麻油合臙脂自研于掌中舉手示童子粲然有輝童子驚曰有軍馬甚衆見一人長大白晳以朱絲縛其肘澄曰此即曜也大軍若出必擒劉曜勒甚悦乃使内外戒嚴有諫者斬留世子𢎞與澄共鎮襄國命石堪石聰及豫州刺史桃豹等各統見衆㑹滎陽使石虎進據石門以右衛將軍石􅃉都督中軍事時石生為衛將軍領}
  - {type: page-break, offset: 1128, content: '', id: KR2i0005_WYG_013-25a, image: WYG0463/WYG0463-0423c.png}
