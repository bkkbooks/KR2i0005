  - {type: variant, offset: 1896, length: 0, content: '', WYG: 大單于封秦王斌為左衛將軍封太原王小子恢為輔國將軍封南陽王中山公虎為太尉守尚書令中山王養子石生封河東王石堪封彭城王虎子邃為冀州刺史封齊王加散騎常侍武衛將軍宣為左將軍挺為侍中封梁王署左長史郭敖為尚書左僕射右長史程遐為右僕射領吏部尚書左}
