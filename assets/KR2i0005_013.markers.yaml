  - {type: variant, offset: 735, length: 242, content: 居青齊沃壤號曰東秦地方二千里戶餘十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門朗公報曰山西絕俗之士不應預聞朝議但有待之累非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可謂興邦之術矣撫又問以年世朗以周易筮之曰燕衰庚戌撫曰幾何曰年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫不敢言德大悅三月德引師而南五月次薛城八月入廣固即皇帝立於南郊大赦改元為建平元年又曰漢宣憫吏民犯諱故改名朕今增一備字以為復名庶開臣子避諱之路於是敘賞有差新舊咸悅十月太極端門並就以公工張剛為材官將軍上方令二年, WYG: 冬}
