  - {type: variant, offset: 2078, length: 0, content: '', WYG: 太子𢎞為皇太子自餘文武封進各有差又定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛淑儀視子容華美人視男務簡賢淑不限員數其年造刀一口用}
