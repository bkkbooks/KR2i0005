  - {type: variant, offset: 1147, length: 0, content: '', WYG: 可以賀我矣乃統步騎入自宣陽門升故太極前殿己夘虎引步卒三萬自城北而西攻其中軍石堪石聰等各以精騎八千自城西而北擊其前鋒大戰于西陽門勒躬貫甲胄出自閶闔門夾擊之曜軍大潰石堪執曜送之以徇于軍斬首五萬餘級枕尸于金谷獲名馬二百疋赤剡金銀步乂弓鞬三十具勒下令曰所欲擒者一人爾今已獲之其勑將士抑鋒止鋭縦其歸命之路乙酉勒乃旋師使右衛將軍石逺等帥騎衛曜而北晉冠軍將軍趙𦙍遣將軍甘留討祖約于厯陽約舉兵逆戰敗以左右百餘人奔降于勒其將牽騰帥衆降于蘇峻勒使王波讓約曰卿逆極勢窮方來歸命吾朝豈逋逃之藪耶而卿敢有靦面目也示之以前後檄書乃赦之太和二年春正月具}
