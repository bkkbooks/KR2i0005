  - {type: variant, offset: 1149, length: 1, content: 夫, WYG: 懼帥百官去長安奔于上邽勒遣中山公虎討之將軍蔣英辛恕擁衆數十萬據長安遣使降勒勒遣石生帥洛陽之衆赴之勒巡行冀州諸郡引見髙年孝弟力田文學之士班賜穀帛有差令逺近牧守宣告屬城諸所欲言靡有隠諱使知區區之朝虚渴讜言也秋八月曜南陽王劉𦙍率衆數萬自上邽趣長安隴東諸郡夷夏皆起兵應之𦙍軍于仲橋石生嬰城自守虎率騎二萬救之九月虎大破𦙍兵于義渠𦙍奔還上邽虎乗勝追擊枕尸千里上邽潰執太子熈南陽王𦙍及王公卿校以下三千餘人皆殺之徙其臺省文武闗東流民秦雍大族九千餘人于襄國遂屠上邽盡滅劉氏又坑五郡各五千餘人于洛陽遣主簿趙封送𫝊國璽金璽太子玉璽各一於勒進攻集木且羌于河西尅之俘獲數萬秦隴悉平遂置永石郡于河西國虎又攻氐帥蒲洪羌酋姚弋仲俱降之虎表洪監六夷諸軍事弋仲為六夷左都督徙氐羌十五萬落于司冀二州是年勒遣使求和於魏烈帝諱翳槐遣弟昭成帝諱什翼􅛳如襄國從者五千餘家建平元年春二月勒羣臣議以勒功業既隆祥符並萃宜時革徽號以答乾坤之望於是虎等奉皇帝璽綬上尊號勒}
