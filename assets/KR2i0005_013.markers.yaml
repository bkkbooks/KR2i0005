  - {type: variant, offset: 2228, length: 0, content: '', WYG: 長城縣西山巖谷闕中得𤣥璽一枚方四寸厚二寸獻之中山王虎以為縣瑞秋七月勒如灃水宫因寢疾而還召中山王虎與太子𢎞中常侍嚴震等侍疾禁中虎矯命絶𢎞震及内外羣臣親戚皆不得入疾之増損莫有知者時秦王宏彭城王堪將兵在外又矯詔召還襄國勒疾小瘳見宏驚曰秦王何故來耶吾使王處藩鎮正備今日有召王者耶將自來也有召者當按誅之虎大懼曰秦王思慕暫歸爾今即遣之仍留不遣數日復問之虎曰奉詔即遣今已半道矣更諭宏在外遂不遣之廣阿有蝗虎密遣其子冀州刺史􅃉率騎三千遊于蝗所俄而黄霧四塞人不相見熒惑入昴星隕于鄴大如象尾東北六十里初赤黑黄雲如幕長數十疋交錯聲如雷震墜地氣熱如火塵起連天良乆時有耕者往視之土猶燃沸見有一大石方尺餘青色而且輕擊之其音如磬戊辰勒疾轉篤遺令三日而葬内外百寮既葬除服無禁婚娶祭祀飲酒食肉征鎮牧守不得輒離所司以奔喪歛以時服載以常車無藏金寳無内器玩大雅沖幼恐非能搆荷朕志中山已下其各司所典無違朕命大雅與斌宜善相保司馬氏汝曹之殷鑒其務於敦睦也中山王宜深三思周霍勿為將來口實遂以是日死時年六十在位十五年勒死夜瘞山谷莫知其所}
