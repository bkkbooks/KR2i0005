  - {type: variant, offset: 2220, length: 2, content: 賞始, WYG: 斌及南中郎將桓宣乗虚攻拔樊城悉俘其衆敬旋師救樊宣追戰於􅄺水敬軍敗績宣亦死傷大半盡收所掠而去侃復遣兄子南陽太守臻竟陵太守李陽共攻新野拔之敬懼遁走遂平襄陽侃因留宣戍之勒如鄴臨虎第謂之曰功力不可並興待宫殿成後當為王起第勿以卑小悒悒也虎免冠拜謝勒曰與王共有天下何所謝也勒為虎名故改稱白虎幡為天鹿幡}
