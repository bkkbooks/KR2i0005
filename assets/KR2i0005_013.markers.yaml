  - {type: variant, offset: 989, length: 2, content: 鞠仲, krp: 曹嶷嶷議欲徙海中保根余山會疾疫甚計未及就虎進圍廣固東萊太守劉巴長廣太守吕披皆以郡降虎以石他為征東將軍擊羌胡於河西左軍將軍石挺濟師于廣固嶷遂出降送於襄國殺之虎欲盡殺嶷衆青州刺史劉徴曰今留徴使牧民也無民焉牧徴將歸爾乃坑其衆三萬留男女七百口配徴使鎮廣固青州諸郡縣壘壁盡陷勒司州刺史石生遣騎攻揚武將軍郭誦於陽翟誦多計畧輒設伏以破生騎虜掠無所得生怒乃自率四千餘騎暴掠諸縣因攻誦壘接戰須㬰退軍堮坂誦率勁勇五百追生及於磐脂故亭生復大敗進冦襄城俘獲千餘而還冬十一月勒以㕘軍樊坦清貧擢授章武内史趙王六年春正月勒將兵都尉石瞻冦下邳敗晉將軍劉長遂冦蘭陵攻彭城内史劉續續敗遁走東莞太守竺珍東海太守蕭誕以郡降勒二月朔勒親臨大小學考諸學生經義尤髙者賞帛有差勒手不能書目不識字然雅好文學雖在軍旅之中常令儒生誦讀春秋史漢諸𫝊而聴之皆解其意每以己意論古帝王善惡朝賢儒士聴者莫不歸美嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何以遂得天下及聞留侯諫乃曰賴有此爾其天資英達如此勒徴徐揚州兵㑹將兵都尉石瞻于下邳因冦兖州兖州刺史劉遐懼自下邳退保泗口石生攻趙河南太守尹平于新安斬之陷壘壁十餘掠五千餘户而歸自是劉石禍結兵戈日交河東𢎞農間民不聊生矣夏四月以右常侍霍皓為勸課大夫與典農使者朱表典勸都尉陸充等循行州郡核定户籍勸課農桑農桑最修者賜爵五大夫使石生自延夀闗出冦許潁俘獲萬餘降者二萬生遂進陷康城復攻揚武將軍郭誦於陽翟誦與戰生大敗死者千餘生收散卒退守康城勒汲郡内史石聰聞生敗馳救之進攻潁川太守郭黙俘獲男女二千餘人攻陷司州刺史李矩勒又遣别將石良帥精騎五千掩襲矩營矩逆戰不利執矩外甥郭誦之弟元遣元作書以遺矩曰去年東平曹嶷西賔猗盧直諱矩如牛角何不歸命復遺誦麈尾馬鞭以示慇懃因與誦書曰賔禮貴弟相同㫁金往物為信矩以示誦誦曰昔王陵之母在賊猶不改意弟當何論不答冬十月石生屯據洛陽豫州刺史祖約退保夀春趙王七年春正月勒數出遊獵每亟馳騁將狩於近郊主簿程琅諫曰劉馬刺客雜布如雲一作林變起倉卒帝王亦一夫之敵爾孫策之禍可不慮乎枯木朽株盡能為害馳騁之弊今古戒之勒勃然曰吾幹力自可足能裁量但知卿文書事不須白此輩也馳逐自若是日逐獸草間有木馬誤觸之即死勒亦幾殆體小不穏還宫歎曰程琅忠臣也不用其言以至于此吾之不善追之何及乃賜琅朝服錦絹爵闗内侯於是朝臣謁見忠言競進矣二月勒加宇文乞得歸官爵使之擊慕容廆乞得歸為燕所敗棄軍走三月北羌王盆句除附于劉曜勒將石他自雁門出上郡襲之俘斬三千餘落獲牛馬羊百餘萬而歸晉都尉魯潛以許昌叛降於勒夏四月勒將兵都尉石瞻一作石良冦晉兖州刺史檀斌於鄒山斌力戰死勒西夷中郎將王騰襲殺并州刺史崔琨上黨内史王脊據并州叛降劉曜五月石生屯洛陽冦掠河南司州刺史李矩潁川太守郭黙軍數敗又乏食乃遣使附於趙劉曜遣將劉岳帥衆萬五千東㑹矩黙共攻生克孟津石梁二戍俘斬五千餘級進圍生于金城虎帥步騎四萬入自成皋闗與岳戰于洛西岳兵敗績身中流矢退保石梁虎作塹柵環圍之遏絶内外岳衆饑甚殺馬食之虎又擊斬其鎮東呼延謨曜自將兵救岳虎帥騎三萬逆戰曜前軍劉黒擊破虎部將石聰于八特阪六月虎拔石梁執岳及其將佐八十餘人氐羌三千餘人皆送襄國坑其士卒九千餘人擊斬王騰於并州坑其士卒七千餘人郭黙復為石聰所敗棄妻子南奔建康李矩以劉岳之敗大懼所領將士有隂欲歸勒者矩知衆之去已乃率衆自滎陽遁歸矩長史崔宣率衆二千降勒於是盡有司兖豫三州之地青徐濵淮諸郡縣皆}
