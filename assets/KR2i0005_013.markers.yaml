  - {type: variant, offset: 1437, length: 454, content: 執超手曰德若至曉更見公卿顧託以汝死無所恨數目視公主欲有所言竟遂不能段后大言今日董中書造誥之超開目頷之是夕薨於顯安宮年七十為十餘棺夜分出四門潛瘞山谷莫知其屍所在虛葬於東陽陵諡獻武皇帝廟號世宗在位五年慕容超字祖明德兄北海王納之子秦滅燕以納為廣武太守數歲去官與母公孫太妃就弟德家於張掖德從苻堅南征留金刀辭母而去及垂起兵山東張掖太守苻昌誅納及德之諸子公孫太妃以耆不合刑納妻段氏以懷妊未決執於郡獄獄掾呼延平德之故吏也將公孫及段氏逃於羗中而生超焉公孫氏臨卒授超金刀曰聞汝伯已中興於鄴都吾朽病將沒相見理絕汝脫得東歸可以此刀還汝叔也後因呂隆歸秦秦徙涼州民於長安超因而東歸母超曰母子得全濟者呼延氏之力也惠而不報天不祐人乎今雖死吾欲為汝納其女以答厚惠於是納之超至長安佯狂行乞由是往來無禁濟陰人宗正謙善卜相西至長安賣於路超行而遇之因就謙相謙奇其姿貌超乃內斷於心不告母妻辭母詣霸上乃與謙俱歸至諸關禁自稱張伏生二十日達梁父建平六年四月至廣固呈以金刀且宣祖母臨終之言德撫之號慟超身長八尺腰九圍姿器魁傑有類於德德愛之名之曰超封北海王拜侍中, WYG: ''}
