  - {type: variant, offset: 279, length: 1, content: 城, WYG: 聼其互市收利十倍逖牙門将童建殺新蔡内史周密降勒勒斬之送首于逖曰天下之惡一也叛臣逃吏吾之深仇将軍之惡猶吾惡也逖深徳之遣叅将王愉使勒贈以方物修結和好勒厚賔其使遣左常侍董樹報聘以馬百疋金五十斤答之自是勒之叛歸逖者逖皆不納禁諸将不得侵暴勒民兖豫之間稍得休息八月常山崩陷千餘家勒始制軒轅之樂八佾之舞作金根}
