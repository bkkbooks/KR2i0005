  - {type: variant, offset: 42, length: 2, content: 妊夢, WYG: 御府諸令命㕘軍鼂讚成正陽門俄而門崩勒大怒斬讚既怒刑倉卒尋亦悔之賜以棺服贈大鴻臚夏四月晉太山太守徐龕自稱交州刺史冦掠濟岱叛降于勒龍驤將軍陳川以浚儀降勒晉北平將軍祖逖攻川於蓬闗勒遣虎將兵五萬救川戰于浚儀逖兵敗績退屯梁國勒又遣桃豹將兵至蓬闗逖退屯淮南虎使揚武將軍左伏肅攻之徙川部衆五千户于廣宗留豹守川故城勒増置宣文宣敎崇儒崇訓十餘小學於襄國四門簡將佐豪右子弟百餘人以教之且備擊柝之衛置挈壺署鑄豐貨錢河西鮮卑}
