  - {type: variant, offset: 259, length: 0, content: '', WYG: 控無所保合鄉宗庶全老幼屬大王龍飛之始委命納質精誠無感不䝉慈恕言還遺晉仍荷寵授擔節盡忠實無二心且受彼厚榮而復二三其趣者恐亦不容于明朝矣周文王生于東夷大禹出于西羌帝王之興蓋惟天命所屬徳之所招當何常耶伏惟大王聖武自天道隆虞夏凡在含生孰不延首神化恥隔皇風而況囚乎使囚去真即偽不得早叩天門者大王負囚囚不負大王也釁鼓之刑囚之恒分天實為之謂之何哉勒曰其言慨至孤愧之多矣夫忠於其君者乃吾之所求也命張賔延之于館厚撫之尋以為從事中郎}
