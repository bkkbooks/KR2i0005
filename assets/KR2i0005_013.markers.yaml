  - {type: variant, offset: 1055, length: 4, content: 匹仲疑多, WYG: 餘人京師大震加司徒王導大司馬假黄鉞都督中外征討諸軍事以禦之軍於江寧厯陽内史蘇峻遣其將韓晃擊聰走之十二月晉濟㟭太守劉闓將軍張闔等叛殺下邳内史夏侯嘉以下邳降勒石瞻攻河南太守王羡於邾城拔之晉彭城内史劉續復據蘭陵石城石瞻瞻一作攻陷之勒令州郡有墳發掘不掩覆者推勘之骸骨暴露者縣為備棺衾之具以牙門將王波為記室㕘軍典定九流始立秀孝試經之制趙王九年春二月中山公虎率騎五千侵魏煬帝諱紇􅃚禦之於句注陘北魏兵敗績徙都大甯以避之是嵗勒復擊破趙兵涼州牧張駿聞之乃去趙官爵復從晉制太和元年春二月荏平勒别𫝊作莊平令師懽獲黑兔獻之於勒勒下令曰案記應白兔為瑞此黑兔何祥外檢舊典程遐等以為黑兔見水徳之祥往公孫臣以為漢家土行當有黄龍為瑞後黄龍見于成紀遂從土徳今大趙龍飛革命之祥於晉以水承金夫兔隂精之獸𤣥為水色黑色見以表應行以推之此示殿下宜速副天人之望也於是以晉咸和三年改元太和大赦境内殊死已下夏四月石堪攻宛南陽太守王國以郡降堪進攻祖約於夀春屯師淮上晉南陽都尉董幼叛率襄陽之衆降堪祖約諸將佐皆遣使附勒約將潁川}
