  - {type: variant, offset: 527, length: 0, content: '', WYG: 不足平也帝稱善孔恂楊珧駿之弟也進曰吾觀劉淵之才當今恐無其比陛下若輕其衆不足以集事若假之威權平吳之後恐其不復北渡也非我族𩔖其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝黙然及秦凉覆沒帝問將於上黨李熹熹曰陛下誠能發匈奴五部之衆假劉淵一將軍之號使將之而西樹機能之首可指期而梟也孔恂曰李公之言未盡殄患之理也熹勃然曰夫以匈奴之勁悍劉淵之曉兵奉宣聖威何不盡之有恂曰淵果能平凉州斬樹機能則凉州之難方更深耳蛟龍得雲雨非復池中物也帝乃止後王彌從洛陽東歸與淵言别淵餞之九曲之濵泣謂彌曰王渾李熹以鄉曲見知每相稱薦一作達讒間因之而進深非吾願適足為吾患耳因歔欷流涕時齊王司馬攸在九曲比聞而馳遣視之見淵在焉言於帝曰陛下不除劉淵臣恐并州不得久安王渾曰淵乃長者臣請為陛下保明之且大晉方以信懐殊俗奈何以無形之疑殺人侍子乎何徳度之不𢎞也帝曰渾言是也㑹}
