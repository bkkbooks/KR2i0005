  - {type: variant, offset: 784, length: 1, content: 改, WYG: 下令曰昔我太祖髙皇帝以神武應期廓開大業太宗孝文皇帝重以明徳昇平漢道世宗孝武皇帝拓土攘夷地過唐日中宗孝宣皇帝􅊧揚雋乂多士盈朝是我祖宗道邁三王功髙五帝故卜年倍於夏商卜世過於姬氏而元成多僻哀平短祚賊臣王莽淊天簒逆我世祖光武皇帝誕資聖武恢復鴻基祀漢配天不失舊物俾三光晦而復明神器幽而復顯顯宗孝明皇帝肅宗孝章皇帝累葉重暉炎光再闡自和安已後皇綱漸頽天步艱難國統頻絶黄巾海沸於神州一作人州羣閹毒流於四海董卓因之肆其狂悖曹操父子凶逆相尋故孝愍委棄萬乘一作國昭烈播越岷蜀冀否終有泰旋軫舊京何圖天未悔禍後帝窘辱自社稷淪䘮宗廟之不血食四十年於兹矣今天誘其𠂻悔禍皇漢使司馬氏父子兄弟迭相殘滅黎庶塗炭靡所控訴一作告孤今猥為羣公所推紹修三祖之業顧兹尫闇戰惶靡厝但以大耻未雪社稷無主銜胆棲冰勉從衆議乃赦其境内遂以}
