  - {type: variant, offset: 635, length: 0, content: '', WYG: 今去育請為殿下促之不然懼不復至也穎然之以育為破虜將軍使追之淵遂拘育以為右光祿大夫淵至左國城右賢王劉宣等上大單于之號二旬之間有衆五萬都於離石以子聰為鹿蠡王遣左於陸王劉宏率精騎五千㑹穎將王粹拒東瀛公騰粹已為騰所敗宏無及而歸王浚使將軍祈𢎞率鮮卑攻鄴穎敗挾天子南奔洛陽東瀛公騰乞師於魏桓帝姓拓跋諱猗㐌時為代公以擊淵桓帝與弟穆帝諱猗盧合兵擊淵於西河上黨大破之與騰盟於汾東而還桓帝使輔相衛雄段繁於參合陂西累石為亭樹碑以紀行焉淵聞穎去鄴歎}
