  - {type: variant, offset: 1074, length: 2, content: 母張, WYG: 也淵以其無才行終身不遷官侍中劉乘素不善於聰衛尉西昌王銳恨不㕘顧命乃相與謀說和曰先帝不惟輕重之勢而使三王總强兵於内大司馬握十萬勁卒屯於近郊陛下今便為寄主耳禍難未可測也願蚤為之計和即攸之甥也遂深然之辛巳夜召領武衛將軍安昌王盛安邑王欽及領左衛將軍馬景等告之盛曰先帝尚在殯宫四王未有逆節今忽一旦自相魚肉臣恐人不食陛下之餘且四海未定大業甫爾願陛下以上成先帝鴻基為志塞耳勿聽讒}
