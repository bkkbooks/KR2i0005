  - {type: variant, offset: 1229, length: 258, content: 二敗晉師長驅圍洛陽陷之聰兵大掠幽晉帝于端門害太子及百官已下三萬餘人於洛水北築為京觀遷帝及太后侍中庾珉等于平陽大赦改元嘉平元年二月內晉帝進號儀同三司會稽郡公聰引帝入讌謂曰卿為豫章王時朕曾與王武子相造武子示朕於卿卿言聞其名久矣以卿所作樂府歌文示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銕硯頗憶否帝曰臣安敢忘之但恨爾日不早識龍顏耳聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受曆故為陛下自相驅除耳且臣家若能奉武皇之業九族敦睦陛下何由得之三年, WYG: 六國}
