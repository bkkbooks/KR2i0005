  - {type: variant, offset: 973, length: 0, content: '', WYG: 河瑞封子裕為齊王隆為魯王秋八月淵復遣楚王聰及征東大將軍王彌進攻洛陽始安王曜與趙固等為之後繼九月丙寅聰圍浚儀晉太傅越遣平北將軍曹武征虜將軍宋抽將軍彭黙等拒之丁丑為聰所敗太傅越入保京城聰等長驅至西明門越率兵禦之戰於宣陽門外大破之晉征西大將軍南陽王司馬模一作平昌公遣將軍淳于定吕毅等破劉芒蕩五斗叟竝斬之又遣車騎將軍王堪平北將軍曹武自長安討聰堪等敗績奔還京師聰自恃連勝怠不設備𢎞農太守垣延詐降夜襲聰軍聰大敗而還淵素服迎師冬十月復大發卒遣楚王聰始安王曜汝隂王景征東大將軍王彌等帥精騎五萬冦洛陽使大司空雁門剛穆公呼延翼率步騎繼之丙辰聰等至宜陽朝廷以漢兵新敗不意其復至大懼辛酉聰進屯西明門䕶軍賈𦙍北宫純等夜帥勇士千餘人薄之戰於大夏門斬聰征虜將軍呼延顥聰衆遂潰壬戌廻軍屯洛水尋進屯宣陽門曜屯上東門彌屯廣陽門景攻大夏門乙丑呼延翼為其部下所殺衆自大陽潰歸淵勅聰等還師聰表稱晉兵微弱不可以翼顥死故還師固請留攻洛陽淵許之戊寅聰親祈嵩嶽山令平晉將軍安陽哀王厲冠軍將軍呼延朗等督攝留軍晉太傅越遣㕘軍孫詢將軍丘光樓裒等率帳下勁卒三千自宣陽門乘虛出擊斬朗於陳聰聞而馳還厲懼聰之罪已也赴水而死王彌謂聰曰今軍既失利洛陽守備猶固運軍在陜糧食不支數日殿下不如與龍驤還平陽裹糧發卒徐為後舉下官當於兗豫之間收兵積穀伏聽嚴期不亦可乎聰自以請留未敢擅還宣于修之言於淵曰嵗在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵馳遣黄門郎傅詢召聰等還師十一月甲申楚王聰始安王曜歸於平陽王彌出師轘轅流民之在潁川襄城汝南南陽河南者數萬家素為居民所苦皆燒城邑殺}
  - {type: page-break, offset: 973, content: '', id: KR2i0005_WYG_001-15a, image: WYG0463/WYG0463-0323c.png}
