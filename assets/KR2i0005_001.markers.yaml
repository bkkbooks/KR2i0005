  - {type: variant, offset: 960, length: 0, content: '', WYG: 春正月辛丑晉志作庚子朔熒惑犯紫㣲太史令宣于修之言於淵曰陛下雖龍興鳳翔奄受大命然遺晉未殄皇居仄陋紫宫之變猶鍾晉氏不出三年必尅洛陽蒲子崎嶇難以久安平陽氣象方昌兼以陶唐舊都願陛下上迎乾象下協坤祥請徙都之於是}
