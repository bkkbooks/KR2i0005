  - {type: variant, offset: 633, length: 0, content: '', WYG: 淵時在鄴遂使其黨呼延攸詣鄴以謀告之淵白穎請歸㑹葬穎弗許淵令攸先歸告宣等使招集五部引㑹宜陽諸胡聲言應穎實欲叛之及穎為皇太弟以淵為太弟屯騎校尉恵帝伐穎次於蕩隂穎假淵輔國將軍都督北城守事及六軍敗績穎復以淵為冠軍將軍封盧奴伯既而并州刺史東瀛公騰安北將軍幽州刺史王浚遣烏桓騎攻穎於鄴穎師戰敗淵說穎曰今二鎮䟦扈衆十餘萬恐非宿衛及近郡士民所能禦也淵請為殿下還說五部鳩合義衆以赴國難穎曰五部之衆果可保發不縱能發之鮮卑烏丸勁速如風雲何易可當邪吾欲奉乘輿還洛陽避其鋒銳徐傳檄天下以順逆制之君意何如淵曰殿下武皇帝之子有大勲於王室威恵光洽四海欽風孰不願為殿下盡死力者何難發之有王浚豎子東瀛疎屬豈能與殿下争衡邪殿下一發鄴宫示弱於人洛陽可復至乎縱至洛陽威權不復在殿下也紙檄尺書誰為人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之淵請為殿下以二部摧東瀛三部梟王浚二豎之首可指日而懸矣穎大悅拜淵為北單于㕘丞相軍事時穎振武將軍王育說穎曰}
