  - {type: variant, offset: 837, length: 0, content: '', WYG: 淵率衆攻東瀛公騰騰遣將軍聶𤣥擊之戰於大陵𤣥兵敗績騰懼帥并州二萬餘户下山東淵遂所在為冦攻擊郡縣騰復乞師於桓帝衛操勸桓帝助之桓帝率精騎數千救騰斬淵將綦母豚淵南走蒲子十二月淵遣建武將軍曜冦太原取泫氏屯留長子中都皆陷之又遣冠軍將軍喬晞攻西河取介休元熙二年春東瀛公騰遣司馬瑜周良石鮮等討淵次於離石城淵遣武牙將軍劉欽等六軍拒之瑜等}
  - {type: page-break, offset: 837, content: '', id: KR2i0005_WYG_001-10b, image: WYG0463/WYG0463-0321b.png}
  - {type: variant, offset: 837, length: 0, content: '', krp: 淵率衆攻東瀛公騰騰遣將軍聶𤣥擊之戰於大陵𤣥兵敗績騰懼帥并州二萬餘户下山東淵遂所在為冦攻擊郡縣騰復乞師於桓帝衛操勸桓帝助之桓帝率精騎數千救騰斬淵將綦母豚淵南走蒲子十二月淵遣建武將軍曜冦太原取泫氏屯留長子中都皆陷之又遣冠軍將軍喬晞攻西河取介休元熙二年春東瀛公騰遣司馬瑜周良石鮮等討淵次於離石城淵遣武牙將軍劉欽等六軍拒之瑜等}
  - {type: variant, offset: 838, length: 0, content: '', WYG: 戰皆敗欽振旅而歸是嵗離石大饑遷於黎亭以就邸閣穀留太尉宏䕶軍將軍馬景守離石使大司農卜豫運糧給之元熙三年冬十二月淵以前將軍景為使持節征討大都督大將軍邀擊并州刺史劉琨於板橋為琨所敗琨進據晉陽淵侍中劉殷右光祿大夫王育進諫曰殿下自起兵已來漸已一周而顓守偏方王威未震誠能命將四出决機一戰一作擲梟劉琨定河東建帝號鼓行而南尅長安而都之以闗中之衆席卷洛陽如指掌耳此髙皇帝之所以創起鴻基尅殄彊楚者也淵悅曰此孤心也元熙四年春三月淵侵汲郡略有頓丘河内之地遂還離石與劉琨相去三百里琨宻遣間其}
