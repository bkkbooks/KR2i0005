  - {type: variant, offset: 1682, length: 1895, content: 蛇一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為四相大單于總百揆十二月宣光陵石人皆行數步宮中鬼器聲武庫陷入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一決于粲立市於后庭與宮人宴戲或三日不醒秋七月河東大蝗唯不食粟豆司隸靳準率部民收而埋之器聲聞於十餘里后乃鑽土飛出復食黍豆大司馬曜攻陷長安外城九月犬與豕交于宮門有豕著進賢冠昇聰御坐犬冠武冠帶綬與豕並昇俄而鬭死殿上宿衛莫有見其入者長安饑甚死者過半麴允為粥以攻帝膳帝泣曰今窘厄如此外無救援勢不自知乃使侍中宋敞奉牋降曜敞隨使者至帝肉袒牽羊輿櫬𠾑璧出降東門曜受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至於平陽聰臨光極殿帝稽顙與麴允伏地大哭扶不能起聰大怒允自殺以帝為光祿大夫懷安侯以大司馬曜假黃鉞大都督陝西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車駕大將軍戎服執戟前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣使帝執蓋多有涕泣或有失聲者尚書郎辛賓起而抱帝大哭引出斬之戊戍愍帝崩於平陽三年聰所居螽斯則百堂災焚其子會稽王哀已下二十有一人聰聞哀塞自此鬼哭宮中至至九月夜聲不絕四月尚書令王監崔懿之等極諫聰大怒收監等殺之秋七月鬼器於光極殿聰晝見東平王約甚惡之徵秦王曜為丞相錄尚書事固辭仍以丞相領雍州牧靳準為大司空領司隸校尉癸亥薨于建始殿甲子粲即位大赦改元漢昌葬宣光陵諡曰武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳準為大將軍領尚書事粲荒躭酒色遊宴后庭軍國之事一決於準準遂勒兵入宮執粲數而殺之追諡靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里準自號漢大王置百官遣使稱藩于晉相國曜自長安赴難永嘉元年十二月大將軍東平王約卒一指猶煖遂不殯歛至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室壯麗號曰蒙珠离國淵謂約曰東北遮須夷國無主久待汝父為之汝父二年當來后國中大亂相殺害吾家死亡略盡但可永明輩數十人在耳汝但還后年當來見汝不遲不久約拜辭而歸道過一國曰猗尼渠余國引約入宮與皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎后年來必見過當以相妻約歸置皮囊於機下俄而蘇謂左右曰機上取囊來左右取得開有一方白玉題文曰猗尼渠余國天王敬信遮須夷國天王歲在攝提當相見馳使奏呈聰曰若當如此吾不懼死也及聰以戊寅歲薨與此玉并葬焉劉曜字永明淵之族子少孤見養於淵幼而聰慧性拓落高亮與眾不群鐵厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長三尺光初元年十月太保呼延晏等自平陽來奔上尊號於曜僭即皇帝位十二月靳準左右軍騎喬太王騰等殺準奉六璽來降二年夏四月徙都長安立子熙為皇太子六月繕宗廟社稷南北郊于長安令曰蓋王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下歲久恩德結于庶民故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其議以聞於是太保呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中山之屬城陛下勳功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門內大樹風吹折經一宿樹撥撥變為人形髮長一尺鬚眉三寸皆黃白色有歛手之狀亦有兩腳著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂劉曜四年將於霸陵西南營壽陵侍中喬豫杏苞上疏諫曰臣等伏聞勑旨將營建壽陵周圍四里下深二十五丈以銅為棺槨黃金飾之臣聞堯葬穀林市不改肆顓頊葬高陽下不及泉聖王之於終也如是秦始皇下錮三泉周輪七里身亡之後毀不旋踵闇王之於終也如此後喪亂以來漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之達至然抑亦釋之之功興亡奢儉炯然於前唯陛下覽之曜大悅終南山崩所得白玉方尺有字曰皇王皇亡敗趙昌以為己瑞郡臣咸賀中書監劉均曰山崩石壞國傾民亂皇王皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜憮然改容五年曜后羊氏卒故晉惠后也洛陽之陷納之六年正月天裂廣一丈餘長五十丈十一年七月石虎率眾四萬人寇擾河東進蒲坂曜選中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸一百餘里虎奔朝歌遂攻石生於金墉分遣諸將攻討汲郡河內十二月勒自帥眾拒之陣於洛西曜性少酗酒末年尤甚將戰飲數斗常乘赤馬無故蹋頓乃乘小馬北出復飲斗餘至西陽門撝陣就平勒將石堪因而乘之師遂大潰曜昏醉奔退而馬陷石渠墜於冰上為堪所執勒將還襄國喻曜使與太子毗書令速降曜但勑與諸臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗太司馬南陽王胤等議欲西保秦州遂相率奔上邽石虎乘勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載, WYG: ''}
