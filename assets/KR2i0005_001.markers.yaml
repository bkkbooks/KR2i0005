  - {type: variant, offset: 964, length: 0, content: '', WYG: 二月晉左積弩將軍朱誕來奔具陳洛陽孤弱勸淵攻之淵以誕為前鋒都督遣滅晉大將軍景為大都督將兵攻洛陽一作黎陽晉遣車騎將軍王堪將兵迎擊夏四月景敗堪於延津沈男女三萬餘人於河澗淵聞之怒曰景何面目復見朕乎且天道豈能容之吾所欲除者止司馬氏耳細民何罪黜景為平虜將軍淵以王彌為侍中都督征東大將軍青州牧與楚王聰共攻上黨圍壺闗以石勒為前鋒都督晉并州刺史劉琨遣䕶軍黄肅韓述來救聰敗述於西澗勒敗肅於封田皆殺之晉太傅越遣淮南内史王曠將軍施融曹超等將兵拒聰曠既濟河欲長驅而前融曰彼乘險間出我雖有百萬之衆猶是一軍獨受敵也且當阻水為固以量勢形然後圖之曠怒曰君欲沮衆邪融退曰彼善於用兵曠闇於事勢吾屬今必死矣曠等踰太行與聰遇戰於長平間曠兵大敗融超皆死遂破陳留長子斬獲萬九千級上黨太守龎淳以壺闗降五月}
  - {type: page-break, offset: 964, content: '', id: KR2i0005_WYG_001-14a, image: WYG0463/WYG0463-0323a.png}
  - {type: page-break, offset: 964, content: '', id: KR2i0005_WYG_001-14b, image: WYG0463/WYG0463-0323b.png}
