  - {type: variant, offset: 636, length: 0, content: '', WYG: 不用吾言逆自奔潰真奴才也然吾與之有言矣不可以不救於是命右於陸王劉景左獨鹿王劉延年等率步騎二萬討鮮卑烏丸宣等固諫曰晉人無道奴隷御我是以右賢王猛不勝其憤屬晉綱未弛大事不遂右賢塗地單于之耻也今司馬氏父子兄弟自相魚肉此天厭晉徳授之於我單于積徳在躬為晉人所服方當興我邦族復呼韓邪之業鮮卑烏丸我之氣𩔖可以為援奈何拒之而拯仇逆今天假手於我不可違也違天不祥逆衆不濟天與不取反受其咎願單于勿疑淵曰善}
