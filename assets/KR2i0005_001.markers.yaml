  - {type: variant, offset: 896, length: 0, content: '', WYG: 春正月淵遣撫軍將軍聰等十將南據太行輔漢將軍石勒等十將東下趙魏夏四月王彌帥衆冦掠青徐兗豫四州兗州刺史茍晞與之連戰不能克丁亥轉冦許昌太傅東海王越遣司馬王斌帥甲士五千人往衛京師五月彌入自轘轅敗官軍於伊北壬戌進至洛陽屯於津陽門司徒王衍帥衆禦之甲子衍與王斌等出戰彌敗歸淵淵遣侍中御史大夫郊迎及至拜司隷校尉加侍中特進秋}
