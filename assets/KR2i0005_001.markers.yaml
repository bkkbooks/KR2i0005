  - {type: variant, offset: 956, length: 0, content: '', WYG: 十二月乙亥以大將軍和為大司馬封梁王尚書令歡樂為大司徒封陳留王后父御史大夫呼延翼為大司空封雁門郡公聰為楚王乂為北海王曜為始安王景為汝隂王延年為江都王洋為長樂王賢為曲陽王其餘宗室以親疎為等悉封郡縣王異姓以勲謀為差悉封郡縣公侯是年造刀一口長三尺九寸文曰滅賊隷書}
