  - {type: 'tls:seg', offset: 15, content: '', id: KR2i0005_CHANT_003-1a.4}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 西染遂大敗單馬而歸悔曰吾不用徽言以至於此何面目見之也先命斬徽徽臨刑謂染曰將軍違謀取敗乃復忌前害勝誅戮忠良以逞愚忿猶有天地將軍其得死於枕席乎徽遂見殺曜染復與將軍殷凱率衆數萬向長安安夷䕶軍麴允逆戰於馮翊允敗收兵夜襲凱營凱敗被禽死之曜還攻河内太守郭黙於懐城收其米粟八十萬斛列三屯圍之欲使黙食盡饑死黙送妻子為質并請糴於曜糴畢復嬰城固守曜怒沈黙妻子於河而攻之黙遣弟芝求救於劉琨琨知黙狡猾留芝而緩其救黙更遣}
  - {type: page-break, offset: 19, content: '', id: KR2i0005_WYG_003-3b, image: WYG0463/WYG0463-0337b.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 西染遂大敗單馬而歸悔曰吾不用徽言以至於此何面目見之也先命斬徽徽臨刑謂染曰將軍違謀取敗乃復忌前害勝誅戮忠良以逞愚忿猶有天地將軍其得死於枕席乎徽遂見殺曜染復與將軍殷凱率衆數萬向長安安夷䕶軍麴允逆戰於馮翊允敗收兵夜襲凱營凱敗被禽死之曜還攻河内太守郭黙於懐城收其米粟八十萬斛列三屯圍之欲使黙食盡饑死黙送妻子為質并請糴於曜糴畢復嬰城固守曜怒沈黙妻子於河而攻之黙遣弟芝求救於劉琨琨知黙狡猾留芝而緩其救黙更遣}
