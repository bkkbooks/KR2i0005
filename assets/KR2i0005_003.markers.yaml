  - {type: variant, offset: 175, length: 0, content: '', WYG: 宫相國單于當在武陵兄弟何肯與人也今禍期甚迫事淹變生宜蚤圖之春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啟主上主上性敦友于謂臣言不實以臣刀鋸之餘而䝉主上殿下成造之恩故不憚逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄宻表其狀殿下倘不信臣言可召大將軍從事中郎王皮及衛軍司馬劉惇假之恩顧通其歸善之路因以問之必可知也粲許之猗宻謂皮惇曰二王逆狀主上及相國具知之矣卿同之乎二人驚曰無之猗曰兹事已决吾憐卿親舊并見族耳因歔欷流涕皮惇大懼叩頭求哀猗曰吾為卿計卿能用之乎二人皆曰謹奉教猗曰相國問卿卿但云有之若責卿何不先啟卿即荅曰臣誠負死罪然仰惟主上寛仁殿下敦睦恐言成詿偽則陷}
  - {type: page-break, offset: 175, content: '', id: KR2i0005_WYG_003-10a, image: WYG0463/WYG0463-0340c.png}
