  - {type: variant, offset: 20, length: 3, content: 昔高辛, WYG: 告急會芝出城落馬使强與俱歸乃復遣芝質於石勒勒以黙多詐封黙書於曜黙使人伺得勒書欲突圍投李矩於新鄭矩使其甥郭誦迎之誦兵少不敢進會劉琨遣參軍張肇帥鮮卑范勝等五百餘騎詣長安黙時被圍道阻不通還過矩營矩謂肇曰黙是公家所授公家之事知無不為屠各舊畏鮮卑遂邀肇為聲援肇許之曜等望見鮮卑不戰而退誦潛遣輕舟濟河使勇士夜襲懐城大破曜軍黙遂率其屬歸矩與矩并力拒曜聰遣使謂曜曰今長安假息劉琨遊魂此國家所尤宜先除也郭黙小醜何足以勞公神略可留征虜將軍貝丘王翼光守之公其還也曜於是歸屯蒲阪秋七月趙染冦北地晉領軍將軍安夷䕶軍麴允率衆來拒染旦將攻城中弩而死冬十一月以晉王粲為相國大單于總百揆省丞相以并相國遂徵中山王曜輔政是時平陽地震烈風㧞樹發屋汾水大溢流漂數百家光義人羊充妻産子二頭其兄竊而食之三日而死建元元年春正月聰以太廟新成大赦境内改年建元三月雨血於左司隷寺覆地其月又雨血於東宫延明殿徹瓦在地者深五寸太弟乂惡之以問太傅崔瑋太保許遐瑋遐等說乂曰主上往日以殿下為太弟者欲以安衆心耳其志在晉王久矣王公已下莫不希㫖附之相國之位自漢魏以來非復人臣之官主上本發明詔置之為贈官今復以晉王居之羽儀威重踰於東宫萬機之事無不由之諸王皆置營兵以為羽翼事勢已去殿下不得立明矣然非徒不得立已也不測之禍厄在旦夕不如早為之計今四衛精兵不減五千餘營諸王皆年齒尚幼可奪而取之相國輕佻正煩一刺客耳大將軍無日不出其營可襲而得也茍殿下有意二萬精兵指顧可得鼓行入雲龍門宿衛之士孰不倒戈奉迎殿下者大司馬不慮其為異也乂弗從乃止夏四月東宫舍人荀裕告瑋遐等勸乂謀反乂不從之狀聰於是收瑋遐於詔獄假以他事殺之使冠軍或作冠威將軍卜抽將兵監守東宫禁乂不聽朝賀乂憂懼不知所為上表自陳乞為黔首并除諸子之封褒美晉王粲宜登儲副抽抑而弗通聰如䕶軍靳凖第納其二女為貴嬪大曰月光小曰月華皆國色也五月立月光為皇后青州刺史曹嶷攻汶陽闗公丘陷之殺齊郡太守徐浮執建威將軍劉宣齊魯之間郡縣壘壁降者四十餘所嶷遂略地西下祝阿平隂自鎮臨淄有衆十餘萬臨河置戍於是遂有雄據全齊之志石勒以嶷之懐貳也表請討之聰又憚勒之滅嶷不可復制弗許中山王曜濟自盟津將攻河南遂進攻李矩於滎陽矩遣將軍李平師於城臯曜覆而滅之矩懼送質請降聰以皇后靳}
