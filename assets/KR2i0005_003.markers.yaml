  - {type: variant, offset: 171, length: 3, content: 遷邑遼, WYG: 二王已許之矣二王居不疑之地竝握重兵以此舉事事無不成臣謂二王兹舉禽獸之不若也背父親人人豈親之今又茍貪一切之利事成之後主上豈有全理殿下兄弟固不待言}
