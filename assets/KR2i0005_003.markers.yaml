  - {type: variant, offset: 176, length: 0, content: '', krp: 誣譖不測之誅故不敢言耳皮惇許諾粲召問之二人至不同時而辭若畫一粲以為信然初靳準從妹為乂孺子淫於侍人乂怒殺之屢以嘲準準深慚恚嘗說粲曰東宫萬機之副殿下宜自居之以領相國使天下早有所係至}
  - {type: variant, offset: 177, length: 1, content: 漸, WYG: 準又說粲曰昔孝成拒子政之言使王氏卒成簒逆可乎粲曰何可之有準曰然誠如聖㫖下官急欲有所言矣但以徳非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之準曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟為}
  - {type: page-break, offset: 177, content: '', id: KR2i0005_WYG_003-11a, image: WYG0463/WYG0463-0341a.png}
  - {type: variant, offset: 177, length: 1, content: 漸, krp: 準又說粲曰昔孝成拒子政之言使王氏卒成簒逆可乎粲曰何可之有準曰然誠如聖㫖下官急欲有所言矣但以徳非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之準曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟為}
  - {type: variant, offset: 179, length: 2, content: 胡風, WYG: 期以季春若使太弟得天下殿下無容足之地矣粲曰為之奈何準曰卒聞太弟為變恐主上必不信如下官愚意宜緩東宫之禁錮勿絶太弟之賔客使輕薄之徒得與交遊太弟雅好待士必不以此為嫌輕薄小人不能無迎合太弟之心為之謀者小人有始無終不能如貫髙之流也然後下官為殿下露表其罪殿下與太宰拘其賔客與太弟交通者考問之窮其事迹獄詞既具主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣粲然之乃命冠軍卜抽引兵去東宫二月聰出臨上秋閣誅特進綦毋達大中大夫公師彧尚書王琰田歆少府陳休左衛卜崇大司農朱誕等皆羣閹所惡也侍中卜幹泣諫曰陛下方隆武宣之化故使幽谷無考槃奈何一旦先誅忠良將何以垂之於後昔秦愛三良而殺之君子知其不霸以晉厲之無道尸三卿之後猶有不忍之心陛下如何忽信左右愛憎之言欲一日尸卿大夫七人皆國之忠良無乃不可乎詔尚在臣所未敢宣露乞垂昊天之澤廻雷霆之威藉使休等有罪陛下直欲誅之不暴明其罪何以示四海此豈是帝王三訊之意邪意或作法字願陛下熟思之因叩頭流血王沉叱幹曰卜侍中欲拒詔乎聰拂衣而入免幹為庶人太宰河間王易及大將軍渤海王敷御史大夫陳元達金紫光祿大夫西河王延等皆詣闕表諫曰臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟螣王化之蟊賊也故文王以多士基周桓靈以羣閹亡漢國之興亡未有不由於此}
