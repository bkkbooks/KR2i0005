  - {type: variant, offset: 652, length: 434, content: 追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人段氏為王后世子雋為太子是歲棘城黑石谷有大石自立而行八年七月晉使鴻臚郭忱持節拜皝侍中大都督河北諸軍事大將軍燕王其餘官皆如故封諸功臣百餘人九年遷都龍城十二年四月黑龍一白龍一見于龍山皝率群寮觀之去龍二百步祭以太牢二龍交首嬉翔解角而去皝大悅赦境內號新宮曰和龍立龍翔佛寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教冑子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗群僚于承乾殿右長史宋諺性貪賜布百疋令自負而歸以愧其心十五年八月皝因見白兔馳射之馬倒被傷輦而還宮引太子雋囑以後事謂曰今中原未平方建大事委賢任哲此其時也恪智勇無濟力堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山諡文明王雋稱尊追尊曰文明皇帝廟號太祖陵曰龍平慕容雋字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善為文雅好辭賦至於器物車室皆著讚以為勸戒皝之八年晉遣使者拜皝燕王以雋為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內依, WYG: ''}
  - {type: variant, offset: 652, length: 434, content: 追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人段氏為王后世子雋為太子是歲棘城黑石谷有大石自立而行八年七月晉使鴻臚郭忱持節拜皝侍中大都督河北諸軍事大將軍燕王其餘官皆如故封諸功臣百餘人九年遷都龍城十二年四月黑龍一白龍一見于龍山皝率群寮觀之去龍二百步祭以太牢二龍交首嬉翔解角而去皝大悅赦境內號新宮曰和龍立龍翔佛寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教冑子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗群僚于承乾殿右長史宋諺性貪賜布百疋令自負而歸以愧其心十五年八月皝因見白兔馳射之馬倒被傷輦而還宮引太子雋囑以後事謂曰今中原未平方建大事委賢任哲此其時也恪智勇無濟力堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山諡文明王雋稱尊追尊曰文明皇帝廟號太祖陵曰龍平慕容雋字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善為文雅好辭賦至於器物車室皆著讚以為勸戒皝之八年晉遣使者拜皝燕王以雋為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內依, krp: ''}
