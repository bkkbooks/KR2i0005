  - {type: variant, offset: 1088, length: 502, content: 列國故事稱元年正月聞趙魏大亂乃嚴兵將為進取之計七月晉使謁者陳沈拜雋都督河北諸軍事幽冀并平四州牧大將軍燕王承制封拜一如廆皝故事慕容雋元璽元年正月司南車成雋大悅告于皝廟四月遣輔國恪相國奕討冉閔戰于魏昌廉臺閔師大敗擒送至關大將軍蔣幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國奕等一百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月剋節輔弼評等送閔后董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蔣幹先以送晉雋欲神其事業言歷運在己乃詐云得之賜閔妻號奉璽君封冉智為海濱侯以輔弼評為同州刺史鎮鄴十月輔國恪等五百五人奉皇帝璽十一月僭即皇帝位于正陽前殿大赦改年時晉遣使詣雋謂之曰還白汝天子我承人乏為中國所推已為帝矣庚午書曰追崇祖考古人之令典尊武宣王為高祖武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后升平元年正月復立中山王暐為皇太子赦其境內改年曰光壽初廆有駿馬曰赭白有奇相逸力石虎之伐棘城皝將出避難欲乘之馬悲鳴蹄齧人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之旨也乃止虎尋奔退皝益奇之至是年四十九歲而駿逸不虧雋比之鮑氏驄命鑄銅以圖其像親為銘讚雋勒其旁置之薊城東掖門是月像成而馬死十一月自薊遷鄴, WYG: 卷}
