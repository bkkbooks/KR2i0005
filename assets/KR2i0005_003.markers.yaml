  - {type: variant, offset: 198, length: 6, content: 姓慕容廆廆身, WYG: 元達所引遂成癡也寢之沉等頓首泣曰臣等小人過䝉陛下識㧞幸得備灑掃宫閤而王公朝士疾臣等如仇讐又深恨陛下願收大造之恩以臣等膏鼎鑊皇朝上下自然雍穆矣聰曰此等狂言恒然卿何足恨乎更以訪粲粲盛稱沉等忠清乃心王室聰大悅封沉等為列侯河間王易又詣闕上疏固諫聰大怒手裂其表三月易恚忿而死易素忠直元達倚之為援得盡諫諍及聞其卒哭之悲慟歸而自殺夏五月丁丑大司馬中山王曜冦上郡上郡太守韋藉率衆奔南鄭秋七月曜逼}
