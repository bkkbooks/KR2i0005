  - {type: variant, offset: 311, length: 0, content: '', WYG: 升聰御坐犬冠武弁帶綬與豕竝升俄而鬬死殿上宿衛之人莫有見其入者而聰昏虐彌甚不知戒懼八月聰讌羣臣於光極殿引見太弟乂容貌毁悴髩髪蒼然涕泣陳謝聰亦對之悲慟乃縱酒極歡待之如初九月中山王曜逼長安内外斷絶晉鎮西將軍安定太守焦嵩平東將軍宋哲新平太守竺恢引兵來救散騎常侍華輯監京兆馮翊𢎞農上洛四郡兵東屯霸上皆畏曜兵强竝不敢進相國司馬保遣鎮}
