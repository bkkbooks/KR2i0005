  - {type: variant, offset: 310, length: 0, content: '', WYG: 梁緯少府皇甫陽等曜素聞充賢募生致之既見因賜之酒謂曰吾得子天下不足定也充曰身為晉將國家䘮敗不敢求生若䝉公恩速死為幸曜曰義士也賜之劍令自殺梁緯妻隴西辛氏有美色曜既殺緯見辛氏將妻之使人扶取因據地大哭曰妾聞男以義烈女不再醮妾夫已死義不獨生且一婦人而事二姓明公又安用之也乞即就死下事舅姑遂號哭不止曜曰貞女也其任之亦自殺皆以禮葬之聰立樊氏為上皇后樊氏即故張后侍婢也時四后之外佩皇后璽綬者復有七人朝廷内外無復綱紀阿䛕日進賄賂公行軍旅所在饑疫相仍後庭賞賜動至千萬大將軍敷屢涕泣切諫聰不納怒曰爾欲速使乃公死乎何以朝夕生來哭人敷憂忿發病而死六月河東大蝗惟不食黍豆司隷靳準帥部民收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽饑甚民流叛死亡者什有五六石勒遣其將石越帥騎二萬屯於并州招撫流民一作撫懐叛者聰使黄門侍郎喬詩讓勒勒不奉命潛結曹嶷䂓為鼎峙之勢司隷部人奔於冀州者二十萬户秋七月犬與豕交於相國府門乂交於宫門又交於司隷御史門有豕著進賢}
