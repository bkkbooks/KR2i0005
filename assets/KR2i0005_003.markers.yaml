  - {type: variant, offset: 192, length: 1, content: 容, WYG: 餘背恩忘義之𩔖豈能如士人君子感恩展效以荅乾澤也陛下何故親近之何故貴任之昔齊桓公任易牙而亂孝懐委黄皓而滅此皆覆車於前殷鑒不逺比年地震日蝕雨血火灾皆沉等之由願陛下割剪凶醜與政之流引尚書御史朝省萬機相國與公卿五日一入會議政事使大臣得極其言忠臣得逞其意則衆灾自弭和氣呈祥况今遺晉未殄巴蜀不賔石勒潛據趙魏曹嶷欲王全齊陛下心腹四支何處無患乃復以沉等助亂大政誅巫咸戮扁鵲臣恐}
