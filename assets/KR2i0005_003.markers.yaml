  - {type: variant, offset: 158, length: 0, content: '', WYG: 驃騎將軍禦之曜進㧞馮翊馮翊太守梁肅奔萬年時百官饑乏採以自存愍帝屢徵兵於相國司馬保保左右皆曰蝮虵螫手壯士斷腕今胡冦方盛且宜斷隴道以觀其變從事中郎裴詵曰今虵已螫頭頭可斷乎保乃以鎮軍將軍胡崧行前鋒都督須諸軍集乃發麴允欲奉帝往就保索綝曰保得天子必逞其私志乃止曜進攻上郡上郡太守張禹奔於允吾於是闗右翕然所在應曜遂進據黄阜十二月聰武庫陷入地一丈五尺是年并州祭酒桓囘於途遇一老父問之云昔樂工成憑今居何職我與其人有舊為致清談得察孝廉君若相見令知消息囘問姓字曰吾吳郡麻子軒也言畢而失囘見憑具宣其意憑歎曰昔有此人計去世近五十年矣中郎荀彦舒聞之為造祝文令憑設酒飯祀於通衢之下麟嘉元年春正月中常侍王沉宣懐俞容中宫僕射郭猗中黄門陵修等皆寵幸用事聰乃立市於後宫與宫人讌戲或三日不醒或百日不出自去冬不視朝政事一委相國粲惟生殺拜除乃使沉等入白之沉等多不白聰率以私意决之故勲舊功臣或弗敘錄而奸佞小人有數日便至二千石者軍旅嵗興將士無錢帛之賞後宫之家賜賚及於僮僕動至數千萬沉等車服第舍皆踰於諸王子弟中表布衣為内史令長者三十餘人奢僭貪殘賊害良善靳準合宗内外諂以事之郭猗與準皆有憾於太弟乂謂相國粲曰太弟於主上之世猶懐不逞之志此乃殿下父子之深仇四海蒼生之重怨也而主上過垂寛仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下光文帝之世孫主上之嫡子凡在含齒孰不係仰萬機事大何可與人且臣聞太弟與大將軍謀因以三月上已大讌作亂事成許以主上為太上皇大將軍為皇太子乂}
