  - {type: variant, offset: 187, length: 2, content: 德繼, WYG: 世未嘗有宦者與政武元安順豈足為故事乎今王沉等處常伯之位乃握生死予奪於中勢傾内外愛憎任之矯弄詔㫖欺誣日月内諂陛下外佞相國威權之重侔於人主王公見之駭目卿宰望塵下車銓衡迫之以勢選舉不復以實士因屬舉政由賄成多樹姦徒殘流海内知王琰等忠臣為國盡節懼其姦萌發露陷之極刑陛下不垂}
