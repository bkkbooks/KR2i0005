  - {type: variant, offset: 14, length: 4, content: 環昌黎棘, WYG: 於平陽北十里視之則有肉長三十步廣二十七步臭聞於平陽肉旁常有哭聲晝夜不止聰甚惡之延公卿已下問曰朕之不徳致有斯異其各極言勿有所隠一作諱廷尉陳元達及博士張師等進曰星變之異其禍將及一作行及臣恐後庭有三后之事亡國䘮家靡不由此願陛下慎之聰曰此隂陽之理何闗人事癸未劉后産一地一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉后卒乃失此肉哭聲亦止諡曰武宣自是嬖寵競進後宫無序矣夏四月聰以驃騎大將軍河間王易為太尉初置相國官上公有殊勲徳者死乃贈之於是大定百官置太師丞相自大司馬以上七公位皆上公綠綟綬逺遊冠置輔漢都䕶中軍上軍輔軍鎮衛京左右前後上下軍輔國冠軍龍驤虎牙十六大將軍營各配兵二千以諸子為之又置左右司隷各領户二十餘萬萬户置一内史凡内史四十三單于左右輔各主六夷十萬落萬落置一都尉省吏部又置左右選曹尚書竝典選舉自司隷以下大官皆位次僕射置御史大夫及州牧位皆亞公以子始安王粲為丞相領大將軍錄尚書事進封晉王食邑五郡江都王延年為錄尚書六條事汝隂王景為太師王育為太傅任顗為太保馬景為大司徒朱紀為大司空中山王曜為大司馬五月曜與趙染復攻長安六月曜進屯渭汭染進屯新豐晉征東大將軍索綝自長安將兵出拒之染狃於累㨗有輕綝之色長史魯徽諫曰今司馬鄴君臣自以逼僭王畿强弱不敵將致死拒我將軍冝整陳案兵擊之不可輕也困獸猶鬬况於國乎染曰以司馬模之彊我取之如拉朽索綝小豎豈能汚吾馬蹄刀刃邪晨帥精騎數百馳出擊之曰要當禽綝而後食乃與綝戰於}
