  - {type: variant, offset: 319, length: 0, content: '', WYG: 胡崧帥城西諸郡兵入援屯遮馬橋擊曜於靈臺破之崧恐國威復振則麴索勢盛乃帥城西諸郡兵屯渭北不進遂還槐里冬十月曜攻陷長安外城麴允索綝與公卿退守長安小城以自固時城中饑甚人皆相食死者}
