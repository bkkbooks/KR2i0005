  - {type: variant, offset: 325, length: 0, content: '', WYG: 可復制惟凉州義衆千餘守死不移太倉有麴數十餅麴允屑之為粥以供帝膳至是復盡十一月帝泣謂允曰今窘急如此外無救援勢不自支死於社稷是朕事也朕念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意决矣因歎曰誤我事者麴索二公也使侍中宋敞紀事本末作宗敞奉牋降曜索綝乃潛留敞使其子說曜曰今城中食猶足支一嵗未易可尅也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未嘗以詭譎欺人一作敗人必窮兵極勢然後取之今索綝所說如是天下之惡一也輒相為戮之若審兵食未盡者便可勉强固守如其糧竭兵微亦宜早悟天命孤恐霜威一振玉石俱摧甲午敞隨使者至曜營乙未愍帝肉袒牽羊輿襯銜璧出降於東門羣臣號泣攀輿執帝之手帝亦悲不自勝御史中丞馮翊吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事虜賊乎乃自殺曜}
