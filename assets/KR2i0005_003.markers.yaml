  - {type: variant, offset: 1591, length: 950, content: 月入鄴宮大赦繕宮殿復銅雀臺以吳王垂為東夷校尉平州刺史鎮遼東二年三月常山寺大樹自拔根出得璧二十七圭七十三光色精奇有異常雋以為岳神之命遣尚書郎段勤以太牢祀之五月遼西獲黑兔三年三月雋夜夢石虎齧其臀寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉楊約數其殘酷之罪鞭而投之漳水十二月雋寢疾謂大司馬恪曰吾患惙然恐不濟脩短命也復何所恨但二寇未除景茂沖幼慮其未堪家國多難吾欲遠追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘去暴不可以亂正統雋怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也雋曰若汝行周公之事吾復何憂四年正月雋薨于應福前殿年五十三偽諡景昭皇帝廟號烈祖葬龍陵雋雅好文籍性嚴重未曾以慢臨朝雖閑居晏處亦無懈怠之色慕容暐字景茂雋之第三子元璽三年封中山王尋立為皇太子光壽四年僭即帝位大赦改元建熙元年以太原王恪為太宰錄尚書行周公事專百揆上庸王評為太傅贊朝政司空陽騖為太保吳王垂為河南大都督十州諸軍事兗州牧鎮梁國慕容暐四年正月暐南郊十月太尉奕迎神於和龍初暐委政太宰恪專受經于博士王勸助教尚鋒秘書郎杜詮並以明經講論左右至是通諸經祀孔子於東堂以勸為國子祭酒鋒國子博士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱相女有聲與人相接數日而去十年四月立貴妃可朱渾氏為皇后六月晉大司馬桓溫率眾五萬來伐遂至枋頭吳王垂大敗斬獲三萬餘級溫奔還淮南垂既敗溫威德彌振太大傅評大不平之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國將軍王猛鎮南將軍楊安率眾六萬來伐以太傅評下邳王厲等帥精兵三十萬拒秦師于潞州州郡盜賊大起鄴中怪異非常十月評及猛戰于潞州評師敗績單騎遁還猛乘勝追奔長驅至鄴十月苻堅帥眾會猛來攻拔鄴城外亂散騎侍郎徐蔚等率扶餘高句麗及上黨質民子弟五百人夜開城門引納秦師暐與大傅評左衛將軍孟高等數十騎出奔昌黎堅遣將軍郭慶帥騎五千追之及暐于高陽秦將巨武執暐將縛之暐曰汝何小人而敢縛天子武曰我梁山巨武受詔縛賊何謂天子耶執暐送鄴堅問其奔狀暐曰狐死首丘欲歸死于先人陵墓耳堅哀而釋之令還宮率文武出降堅入鄴宮昇正陽殿徙暐及王公巳下并諸鮮卑四萬餘戶于長安封暐新興郡侯邑五千戶尋拜尚書堅征臺城為平南將軍別部都督淮南之敗隨堅還長安既而吳王垂攻苻丕于鄴中山王沖起兵關中暐謀殺堅事發為堅所誅年三十五歲僭稱尊號為諡幽皇帝, WYG: ''}
