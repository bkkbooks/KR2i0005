  - {type: variant, offset: 8, length: 5, content: 慕容廆字奕, WYG: 三劉聰中嘉平四年春正月辛未日隕於地又有三日相承出於西方而東行平陽地震崇明觀陷為池水赤如血赤氣亘天有赤龍奮迅而去流星起於牽牛入紫㣲龍形逶迤其光照地}
