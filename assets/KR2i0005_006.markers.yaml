  - {type: variant, offset: 430, length: 2, content: 庠素, WYG: 路游子逺諫曰臣聞聖主明王忠臣孝子之於終葬也棺足周身槨足周棺藏足周槨而已不封不樹為無窮之計伏惟陛下聖慈幽被神鑒洞逺每以清儉恤下為先社稷資儲為本今二陵之費至以億計計六萬夫百日作所用六百萬工二陵皆下錮一作洞三泉上崇百尺積石為山增土為阜周廻二里發掘古塜以千百數督追役徒繼以脂燭役夫呼嗟氣塞天地暴骸原野哭聲盈衢臣竊謂無益於光帝先后而徒䘮國家之儲力陛下脫仰尋堯舜之軌者則功不盈百萬費亦過千計下無怨骨上無怨人先帝先后有太山之安陛下饗舜禹周公之美惟陛下察焉曜不納乃使征}
