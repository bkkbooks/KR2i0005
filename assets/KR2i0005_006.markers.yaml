  - {type: variant, offset: 1225, length: 609, content: 月范長生乘素輿詣成都雄迎于大門執版延坐長生請雄對坐即拜丞相尊曰范賢長生勸雄稱尊號夏六月僭即帝位大赦改元國號大成追尊父特為景帝母羅氏為太皇后十月加丞相范長生為天地太師之號封西山侯玉衡五年正月立妻任氏為皇后八年四月范長生卒以其子侍中賁為丞相長生善天文有術數民奉之如神十四年立兄子班為太子二十四年五月雄寢疾六月丁卯薨年六十一諡武皇帝廟號太宗十月葬安都陵太子班襲位李期字世運雄第四子聰慧好學弱冠能屬文雄薨班即位雄子車騎將軍越自江陽奔喪與期以班非雄所生而嗣位心不平十月因夜哭臨越殺班於殯宮班字世文雄兄蕩第四子雄妻任氏無子養班為子越既殺班于是矯太后令罪狀諡厲太子立期為主甲子期僭即皇帝位玉衡元年正月大赦改元立妻閻氏為后四月大將軍漢王壽率步騎一萬自涪向成都期不虞至預不設備至師剋城屯兵宮門殺相國建寧王越尚書令景騫尚書曰襄等廢期為卭都縣公幽之別宮期自殺年二十五諡曰幽公李壽字武考特季弟驤之少子少尚禮容敏而好學雄奇其才器以為足荷重任封為建寧王雄薨期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人并有強兵懼不自全陰謀據成都稱藩於晉乃誓文武得數千人襲成都剋之縱兵擄掠數曰乃定僭即皇帝位於南郊大赦改咸康四年為漢興元年追尊父驤為獻皇帝李壽三年六月壽下書曰吳會遺燼久逋天誅今將大興百萬躬行罰九月大閱軍士七萬餘人舟師泝江而上過成都鼓譟盈江壽登城觀之群臣曰國小眾寡吳會險遠圖之未易叩頭泣諫乃止其人咸稱萬歲十月講禮於太學舉明經者封好學侯四年以太子勢領大將軍, WYG: 司}
