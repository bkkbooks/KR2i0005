  - {type: variant, offset: 483, length: 0, content: '', krp: 級安馳還赴救貢逆擊敗之俄而武騎大至安衆大潰收餘騎八千奔保隴城貢乃留武督後衆躬先士卒戰輒敗之遂圍安於隴城秋七月大雨霖震曜父墓門屋大風飄發曜父寢堂於垣外五十餘步曜避正殿素服哭於東堂五日乃使子鎮軍將軍襲太常梁胥等繕復之松栢衆木植已成林至是悉枯死光初七年春正月天裂廣一丈餘長五十丈時四方交戰兵革相尋署大司馬雅為太宰加劍履上殿入朝不趨讚拜不名給千兵百騎甲仗百}
  - {type: variant, offset: 484, length: 1, content: 斷, WYG: 入殿增班劍六十人前後鼓吹各二部三月曜親征陳安圍隴城别遣兵圍上邽安頻出挑戰屢擊敗之斬獲八千餘級右軍將軍劉幹攻平襄克之隴上諸縣悉降曲赦隴右殊死已下惟陳安趙募不在赦例安留楊伯支姜冲兒等守隴城自率精騎數百突圍而出欲引上邽平襄之衆還解隴城之圍安既出知上邽被圍平襄已敗乃南走陜中曜使將軍平先丘中伯率勁騎追安頻戰敗之俘斬四百餘級安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八虵矛近則刀矛俱發輒害五六人逺則雙帶鞬服左右馳射而走平先亦壯徤絶人勇㨗如飛與安搏戰三交遂奪其虵矛而退㑹日暮雨甚安棄馬與左右五六人步踰山嶺匿於溪澗翼日尋之不知所在會連雨始霽安遣其將石容覘曜兵曜輔威將軍呼延清紀事本末作呼延青人獲之拷問安所在容卒不肯言清遂殺容乃尋其徑迹獲安於澗曲斬之曜大悅楊伯支斬姜冲兒以隴城降别將宋亭斬趙募以上邽降徙秦州大姓楊姜諸族二千餘户於長安氐羌悉下竝送質任以赤亭羌酋姚弋仲為平西將軍封平襄公邑於隴上時征東大將軍岳與凉州刺史張茂相持於河上曜自隴上西擊凉州遣將軍劉咸攻韓璞於冀城呼延晏攻寧羌䕶軍隂鑒於桑壁親帥戎卒二十八萬五千軍於河上列營百餘里金鼓之聲振地河水為沸自古軍旅之盛未有斯比張茂臨河諸戍皆望風奔遁臨洮人翟楷石琮等逐令長以應曜曜又揚聲欲百道俱濟直抵姑臧凉州大震人無固志茂遣平虜將軍陳珍帥步騎一千五百救韓璞曜諸將佐咸欲速濟曜曰吾軍勢雖盛不踰魏武之東也然畏威而來者三分有二中軍宿衛皆已疲老其實難用張氏以吾新平陳安師徒殷盛以形勢言之非彼五郡之衆所能抗也必怖而歸命受制稱藩吾復何求今但案甲勿動以吾威聲振之若出中旬張茂之表不至者吾為負卿矣茂懼果遣使稱藩獻馬一千五百疋牛三千頭羊十萬口黄金三百八十斤銀七百斤女伎二十人及諸珍寳珠玉方域美貨不可勝紀曜大悅使大鴻臚田崧拜茂使持節假黄鉞侍中都督凉南}
