  - {type: variant, offset: 18, length: 2, content: 先廩, WYG: 盡乎時羣臣咸賀以為勒滅之徵曜大悅齋七日而後受之於太廟水經註作於龍門河水中得一玉璽文曰云云曜以為天錫神璽齋九日而受於太廟大赦境内以終為奉瑞大夫中書監領國子祭酒劉均進曰臣聞國主山川故山崩川竭國君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其灾也如是今朝臣皆言祥瑞臣獨言非誠上忤聖㫖下違衆議然臣不達大理竊所未同何則玉之於山石也猶}
