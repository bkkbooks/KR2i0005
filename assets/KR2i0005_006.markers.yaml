  - {type: variant, offset: 25, length: 2, content: 併天, WYG: 雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也咢者嵗之次名作咢也言嵗馭作咢酉之年當有敗軍殺將之事困謂困敦嵗在子之年名𤣥囂亦在子之次言嵗馭於子國當䘮亡赤牛奮靷謂赤奮若在丑之嵗名也牛謂牽牛東北維之宿丑之分也言嵗在於丑當滅亡盡無復遺也此其誡悟蒸蒸欲陛}
