  - {type: variant, offset: 30, length: 1, content: 黔, WYG: 嘉祥尚願陛下夕惕而荅書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾奏均狂言瞽說誣妄一作罔祥瑞請依大不敬論曜曰此之灾瑞誠不可不深戒朕之不徳收均忠恵多矣何罪之有乎光初五年春正月鎮北將軍并州牧安定王策獻玉璽一枚文曰趙盛二月曜親征氐羌楊難敵難敵率衆來拒前鋒撃敗之退保仇池諸氐羌多降於曜曜復討故晉王司馬保部將楊韜於南安韜懼與隴西太守梁勛來降皆封列侯使侍}
