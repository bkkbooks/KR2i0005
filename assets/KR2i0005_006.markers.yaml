  - {type: variant, offset: 483, length: 0, content: '', WYG: 級安馳還赴救貢逆擊敗之俄而武騎大至安衆大潰收餘騎八千奔保隴城貢乃留武督後衆躬先士卒戰輒敗之遂圍安於隴城秋七月大雨霖震曜父墓門屋大風飄發曜父寢堂於垣外五十餘步曜避正殿素服哭於東堂五日乃使子鎮軍將軍襲太常梁胥等繕復之松栢衆木植已成林至是悉枯死光初七年春正月天裂廣一丈餘長五十丈時四方交戰兵革相尋署大司馬雅為太宰加劍履上殿入朝不趨讚拜不名給千兵百騎甲仗百}
