  - {type: variant, offset: 426, length: 0, content: '', krp: 張明等率步騎三萬一作二萬進攻曜曜衛軍將軍呼延瑜逆擊斬之悉俘其衆安懼馳還上邽曜至自南安安}
  - {type: variant, offset: 427, length: 2, content: 斷北, WYG: 將軍劉烈趙罕襲􅛪城克之西州一作隴上氐羌悉歸附安安士馬雄盛有衆十餘萬自稱使持節大都督假黄鉞大將軍雍凉秦梁四州牧凉王以趙募為相國休屠王石武以桑城來降曜大悅署為使持節都督秦州隴上雜夷諸軍事平西大將軍秦州刺史封酒泉王夏四月甲午曜后羊氏卒偽諡獻文皇后羊氏内有特寵外㕘朝政生三子熙襲闌曜始禁無官者不聽乘馬祿八百石已上婦女乃得衣錦繡自季秋農功畢乃聽飲酒非宗廟社稷之祭不得殺牛犯者皆以死論曜臨太學引試學生之上第者拜郎中武功男子蘇撫陜男子伍長平竝化為女子石言於陜若言勿東者十二月曜將葬其父及妻親往粟邑以䂓度之負土為墳其下周圍二里上髙百尺作者繼以脂燭怨呼之聲盈於}
