  - {type: variant, offset: 5, length: 0, content: '', krp: 卷四}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 趙錄四劉聰下麟嘉二年春正月朔日黑霧四塞終日竟夜著人如墨五日乃止石人言於宣光陵二月雨血於東宫其日又雨血於光極殿東宫四門無故自壊後内史女人化為丈夫癸亥大將軍東平王約卒一指猶煖遂不殯殮至於甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返於不周見諸王公卿將相死者悉在大有人民宫室壯麗號曰䝉珠離國淵謂約曰東北有遮須夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害吾家死亡略盡但可永明輩十數人在耳汝且還後年當來見汝不久約拜謝而歸道遇一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以小女相妻約歸置皮囊於机上俄而蘇活謂左右曰机上取囊來左右取得開之有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王嵗在攝提當相見也馳使奏呈聰曰若審如此吾不懼死也後聰死與此玉并葬焉時東宫鬼哭赤虹經天南有一岐三日竝照各有兩珥五色甚鮮客星犯紫微入於天獄而滅雨血平陽廣袤十里太史令康相言於聰曰虵虹見彌天一岐南徹三日竝照客星入紫微此皆大異其徵不逺也今虹達東西者許洛以南不可圖也一岐南徹者李氏當仍跨巴蜀司馬叡終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太隂之變其在漢域乎漢既據中原厯命所屬紫宫之異亦不在他此之深重何可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代趙魏皆有將大之氣願陛下以東夏為憂勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之銳燕之突騎自上黨而來曹嶷率三齊之衆為之後繼陛下將何以抗之紫宫之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以逺追}
