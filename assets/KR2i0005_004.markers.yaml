  - {type: variant, offset: 7046, length: 273, content: 王持節雍州牧因其所稱而授之九月丕下書鮮卑慕容永我之騎將首亂京畿禍傾社稷其遣丞相王永帥禁衛虎旅夫而取之十月與慕容永戰于襄陵王師大敗丕懼帥其眾數千南奔東垣晉揚威將軍馮該自陝要擊斬之送丕首于江東苻登稱尊號諡為哀平皇帝苻登字文高丕之族子父敞太尉司馬登少勇有壯氣建元元年初拜殿中將遷羽林監長安令坐事黜為狄道長太平二年與姚萇戰于格奴坂大破之十一月丕于渤海王懿自吉城奔登登乃具丕死聞于是為丕發喪行服為壇于隴東僭即皇帝位改太平二年為太初元年十二月立堅神主于軍中引師而告堅神主曰今收合義旅眾餘五萬星夜電邁直造賊庭庶上報皇帝酷怨下雪人民大恥苻登二年登次于瓦亭九月進據, WYG: 定}
