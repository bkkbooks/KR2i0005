  - {type: variant, offset: 6120, length: 229, content: 流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜從何出也吾不用王景略陽平公之言使白虜敢至于此長樂公苻丕在鄴糧竭馬又無草削松木而食之會丁零叛慕容垂引師去鄴始具西問知長安危逼乃遣從弟求救于謝元二十一年慕容冲僭稱尊號于阿房改年更始冲率眾登城堅身貫甲冑督戰拒之飛矢滿身流血被體時雖兵寇危逼馮翊諸堡璧猶有負糧冒難而至者多為賊所殺先是每夜有人周城大呼曰楊定健兒應屬我宮殿臺觀應坐我父子同出不共汝旦尋而不見人跡城中有書曰右苻傳賈錄載帝出五將久長得又謠曰堅入五將山長得堅大信之告其, WYG: 常侍宣懐謂}
