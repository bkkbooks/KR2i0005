  - {type: variant, offset: 6097, length: 11, content: 姜宇與苻琳率眾三萬擊冲, WYG: 衛大將軍齊王勱為大司徒夏四月中常侍王沉養女年十四有妙色聰立以為左皇后尚書令王鑒中書監崔懿之中書令曹恂等諫曰臣聞王者立后將以上配乾坤之性象二儀敷育之義上承宗廟母臨天下匹配后土執饋皇姑必擇世徳名宗幽閑令淑乃副四海之望稱神祗之心是故周文造周姒氏以興闗睢之化饗則百世之祚永孝成帝任心縱欲以趙飛燕為后使皇統絶滅社稷為傾有周之隆如彼大漢之禍如此自麟嘉以來亂淫}
