  - {type: variant, offset: 4439, length: 452, content: 自成都堅引見東堂謂之曰將軍之先仲華遇漢世祖於前將軍復逢朕於後何鄧氏之多幸羗曰臣常謂光武之遇仲華非獨仲華遭光武堅笑曰將軍蓋以自況非直將軍之幸亦朕之遇賢十一年正月以安車蒲輪徵隱士樂陵王勸為國子祭酒堅雅好文學英儒畢集純博之精莫如勸也終于太子少傅五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋吳越乃正朔相承臣歿之後願不以晉為圖鮮卑羗虜我之仇讎終為大患宜漸除之以復社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故諡武侯朝禁巷哭三日十二年正月癸巳高陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼州刺史張天錫雖稱藩受位而臣道未純可遣步兵校尉姚萇等自石城津伐天錫天錫率勁勇五萬來拒戰于赤岸涼師大潰天錫率騎數千奔還姑臧致牋請降于萇甲午大軍至姑臧天錫乘素車白馬面縛舁襯降于軍門萇釋縛焚櫬送之長安諸郡縣悉降涼州平九月以梁熙為持節西中郎將涼州刺史鎮姑臧徙豪右七千餘戶於關中封天錫重光縣之東寧節二百戶號歸義侯拜北部, WYG: 失聲者}
