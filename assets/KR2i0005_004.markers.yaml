  - {type: variant, offset: 556, length: 3260, content: 而西言終而死年六十六健僭位偽諡惠武帝苻健字建業洪第三子也初母羌氏夢大羆而孕健及長勇果便弓馬好施善事人甚為石虎父子所親愛虎雖外禮苻氏心實忌之乃陰殺其諸兄而不害健及洪死健嗣位去秦王之號稱晉征西大將軍都督關西諸軍事雍州刺史於是盡眾西行至盟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安於是長史賈元碩等依諸葛亮劉備故事表健為秦王元碩等為上尊號健偽讓再三乃從之苻健皇始元年正月僭即天王位于南郊大赦改晉永和七年為皇始元年追尊父洪為大祖武惠皇帝繕宗廟社稷於長安立妾強氏為天王皇后子長為天王太子靚為平原公生為淮南公弟雄丞相為東海公其餘封授各有差是年野蠶成繭野禾被原百姓採野繭而衣野粟而食關西家給人足二年正月丞相雄等固請宜依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僭即皇帝位于太極殿大赦諸公進爵為王立五等之封以次進之三年正月下書曰其自公卿巳下歲舉賢良方正孝廉清才多略博學秀才異行各一人或獻書規諫或面陳朕過其悉以聞必懼貴賤四年丞相東海王雄卒贈相國進封魏王諡敬武王雄字元才洪之季子也建武中拜龍驤將軍雄頭大足短故軍中稱為大頭龍驤健甚重之曰元才吾之姬旦五年四月立淮南王生為皇太子六月健寢疾引太師兼尊丞相雷弱兒太傅毛貴司空王隨等囑以後事受遺輔政乙酉薨于太極前殿年四十九葬原陵偽諡明皇帝廟號世宗永興初追尊曰景明皇帝號高祖苻生字長生健第三子幼而麤暴昏醉無賴祖洪甚惡之無一目七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚耶洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僭即皇帝位大赦改年群臣奏先帝晏駕甫爾不宜改號生怒不從窮推議主苻生壽光元年七月殺右僕射段純以太子門大夫趙韶為僕射太子舍人趙誨為中護軍著作郎佐董榮為尚書共以佞倖進也九月中書監胡文中書令王魚言于生曰比頻有客星孛於大角熒惑入于東井大角為帝座東井秦之分野不出三年國有大喪大臣戮死願陛下遵追周文脩德以攘之生曰皇后與朕對臨天下亦足以塞大喪之變於是殺皇后梁氏誅太傅錄尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羌悉叛弱兒南安羌酋也生雖在諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿巳下至于僕隸誅五百餘人二年正月嬖臣右僕射董榮言于生曰日蝕之災宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戌饗群臣于太極前殿飲酒樂奏生歌以和之命尚書令辛牢與勸既而怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昏醉污服失冠蓬頭僵仆生以為樂三年四月姚襄遣蘭等帥眾二萬七千進據黃洛生遣兵苻黃眉東海王堅建節將軍鄧羌等步騎萬五千以討之羌偽不勝引騎而退襄追之至於三原羗迴騎拒襄大戰獲襄襄有駿馬日行千里是戰也馬倒而擒之眉等振旅而歸初長安謠曰東海大魚化為龍男便為主女為公問在何所洛門東東海苻堅封也時為龍驤將軍第在洛門之東生荒暴日滋殘虐彌甚群臣朔望漏盡詣見生日盡午須待宴訖或日暮而不出百僚饑弊或至申酉間方出臨朝輒怒色厲惟行殺戮或連月昏醉弗堪省覽或使宮人與男子裸交於殿前引群臣臨而觀之或生剝牛羊驢馬活爓雞鴨三五十為群放之殿中或生剝死囚面皮令其歌舞觀以為樂宗舊勳親戚忠良殺害略盡朝士奔走草野皆曰從虎口出左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信當除之是夜清河王苻法夢神告曰且將禍集汝門惟先覺者可以免之寤而心悸會侍婢來告乃與特進梁平老強汪等帥壯士數百人潛入雲龍門東海王堅與呂婆樓帥麾下三百餘人鼓噪繼進宿衛將士皆捨杖歸堅生猶昏寢不寤堅眾既至生驚問左右曰此輩何等人引生置別室廢為越王俄而殺之時年二十三偽諡厲王封子馗為越侯苻堅字永固健弟雄之子趙建武中母荀氏祈子於西門豹祠歸而夜夢與神交遂孕十二月而生堅有神光之異自天燭庭背有赤文隱起成字曰草付臣又土王咸陽必祕而莫之傳也姿貌魁傑臂垂過膝目有紫光祖洪奇而愛之名堅頭因而謂健曰此兒頭大重身長任大足短安下非常相趙石光祿大夫司隸校尉高平徐統有知人之鑒遇堅於路異之執其手曰苻郎此官之御街小兒敢戲於此不畏司隸縛耶堅曰司隸縛罪人不縛小兒戲也統顧左右曰此兒有霸王之相後遇之統下車謂曰苻郎當大貴但僕不及見如何堅曰若如公言不敢忘德八歲請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成健之入關也次于曲沃夢天神遣使者朱衣赤冠命拜堅為龍驤將軍旦而為壇於曲沃健泣謂堅曰先王昔受此號汝父次為之今若復為神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅既殺苻生苻堅永興元年六月去皇帝之號僭稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公為永安公苻侯為太尉諸王皆貶爵為公苻柳為尚書令封弟融為陽不公雙河南公子丕為長樂公暉為平原公熙為廣平公李威為左僕射梁平老為右僕射席寶為丞相長史王猛為中書令侍郎權翼為黃門郎諸公卿為生所誅者悉復本官十月丞相東海公法以疑忌賜死荀太后之意也堅性友愛與法訣於東堂慟哭嘔血二年四月堅如龍門五畤六月如河東祀后土八月自臨晉登龍門顧謂群臣曰美哉山河之固雄翼對曰吳起有言在德不在險深願陛下追蹤唐虞懷遠以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪南北郊六月甘露降乃大赦改年八月堅下書曰咸陽內史猛吉彰出納所在著績有臥龍之才宜入贊百揆絲綸王言可徵拜侍中中書令領京兆尹中丞鄧羌性鯁直與猛協規齊志於是百僚肅整豪右屏氣風化大行堅嘆曰吾今始知天下之有法也以猛為吏部尚書遷太子詹事十一月以猛為司隸侍中領遷如故猛上疏曰伏見陽平公融明德懿親光祿西河任群忠貞淑慎處士朱彤博識德辨並宜左右彌綸暉贊九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明晢朝野所望豈容致辭所舉融等尋別銓授于是以融為侍中中書兼右僕射任群為光祿大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳳凰集于東闕大赦其境內初將為赦與左僕射猛右僕射融密議於露堂悉屏左右堅自為赦文猛融進紙筆有一大蒼蠅入自牗間鳴聲甚大集于筆端驅而復來堅所聽之久而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融猛曰事何從而泄於是勑外推窮之咸言有一小人衣黑大呼於市曰官今大赦須臾不見堅嘆曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見于成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大將軍涼州牧西平公建元元年正月雍州秀才段鏗對策上第拜吏部郎中孝廉通經者十餘从皆拜令長五年六月晉大司馬桓溫伐燕次于枋頭燕師屢敗遣散騎侍郎藥嵩來乞于堅請割武牢以西之地八月遣將軍苟池洛州刺史邵羗帥步騎救燕敗歸是月京兆尹王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛討逆十曰易簡宏大堅納之以攸為諫議大夫十一月燕車騎吳王垂奔秦桓溫既走慕容暐悔割河滄之地以賂秦乃曰行人失辭分災救患理之常也堅大怒六年令輔國王猛帥鎮南陽安虎牙將軍張蚝建節鄧羗等步騎六萬討平燕冀八月猛攻剋壺關暐遣太傅上庸王評等帥四十萬屯於潞州猛覘知評賣水鬻薪不撫將士有可乘之會大笑謂楊安等曰慕容評真奴才雖億兆之眾尚不足為慮況十萬乎今破之必矣甲戌陳于渭原猛誓眾曰王景略受國厚恩任兼內外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎眾皆勇奮破釜棄糧大呼競進猛望評師之眾惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉將軍其勉之羗曰若以司隸見與者公無以為憂猛曰此非吾所及也必以安定太守萬戶侯相處羗不悅而退俄而兵交猛召羗寢而不應猛乃馳就許之於是大飲帳中與張蚝徐成等跨馬運矛馳入評軍出入數四傍若無人搴旗斬將殺傷甚眾戰及日中燕師敗績進師圍鄴七日堅至于安陽故宅引諸耆老語及祖父舊事泫然流涕乃停信宿猛潛如安陽迎堅堅謂之曰昔亞夫不出軍迎漢文將軍何以臨敵而背眾乎猛曰臣每覽亞夫之事常謂前卻人主以此而為名將竊未多之臣奉陛下神算孽垂亡之虜若摧枯拉朽何足憂也戊寅剋鄴慕谷暐出奔將軍郭慶執暐於高陽送之辛巳堅入鄴宮大赦閱其圖籍凡郡百五十七縣一千五百七十九戶二百四十五萬八千九百六十九口九百九十八萬七千九百三十五以王猛為使持節都督關東六州諸軍事, WYG: ''}
  - {type: variant, offset: 556, length: 3260, content: 而西言終而死年六十六健僭位偽諡惠武帝苻健字建業洪第三子也初母羌氏夢大羆而孕健及長勇果便弓馬好施善事人甚為石虎父子所親愛虎雖外禮苻氏心實忌之乃陰殺其諸兄而不害健及洪死健嗣位去秦王之號稱晉征西大將軍都督關西諸軍事雍州刺史於是盡眾西行至盟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安於是長史賈元碩等依諸葛亮劉備故事表健為秦王元碩等為上尊號健偽讓再三乃從之苻健皇始元年正月僭即天王位于南郊大赦改晉永和七年為皇始元年追尊父洪為大祖武惠皇帝繕宗廟社稷於長安立妾強氏為天王皇后子長為天王太子靚為平原公生為淮南公弟雄丞相為東海公其餘封授各有差是年野蠶成繭野禾被原百姓採野繭而衣野粟而食關西家給人足二年正月丞相雄等固請宜依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僭即皇帝位于太極殿大赦諸公進爵為王立五等之封以次進之三年正月下書曰其自公卿巳下歲舉賢良方正孝廉清才多略博學秀才異行各一人或獻書規諫或面陳朕過其悉以聞必懼貴賤四年丞相東海王雄卒贈相國進封魏王諡敬武王雄字元才洪之季子也建武中拜龍驤將軍雄頭大足短故軍中稱為大頭龍驤健甚重之曰元才吾之姬旦五年四月立淮南王生為皇太子六月健寢疾引太師兼尊丞相雷弱兒太傅毛貴司空王隨等囑以後事受遺輔政乙酉薨于太極前殿年四十九葬原陵偽諡明皇帝廟號世宗永興初追尊曰景明皇帝號高祖苻生字長生健第三子幼而麤暴昏醉無賴祖洪甚惡之無一目七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚耶洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僭即皇帝位大赦改年群臣奏先帝晏駕甫爾不宜改號生怒不從窮推議主苻生壽光元年七月殺右僕射段純以太子門大夫趙韶為僕射太子舍人趙誨為中護軍著作郎佐董榮為尚書共以佞倖進也九月中書監胡文中書令王魚言于生曰比頻有客星孛於大角熒惑入于東井大角為帝座東井秦之分野不出三年國有大喪大臣戮死願陛下遵追周文脩德以攘之生曰皇后與朕對臨天下亦足以塞大喪之變於是殺皇后梁氏誅太傅錄尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羌悉叛弱兒南安羌酋也生雖在諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿巳下至于僕隸誅五百餘人二年正月嬖臣右僕射董榮言于生曰日蝕之災宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戌饗群臣于太極前殿飲酒樂奏生歌以和之命尚書令辛牢與勸既而怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昏醉污服失冠蓬頭僵仆生以為樂三年四月姚襄遣蘭等帥眾二萬七千進據黃洛生遣兵苻黃眉東海王堅建節將軍鄧羌等步騎萬五千以討之羌偽不勝引騎而退襄追之至於三原羗迴騎拒襄大戰獲襄襄有駿馬日行千里是戰也馬倒而擒之眉等振旅而歸初長安謠曰東海大魚化為龍男便為主女為公問在何所洛門東東海苻堅封也時為龍驤將軍第在洛門之東生荒暴日滋殘虐彌甚群臣朔望漏盡詣見生日盡午須待宴訖或日暮而不出百僚饑弊或至申酉間方出臨朝輒怒色厲惟行殺戮或連月昏醉弗堪省覽或使宮人與男子裸交於殿前引群臣臨而觀之或生剝牛羊驢馬活爓雞鴨三五十為群放之殿中或生剝死囚面皮令其歌舞觀以為樂宗舊勳親戚忠良殺害略盡朝士奔走草野皆曰從虎口出左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信當除之是夜清河王苻法夢神告曰且將禍集汝門惟先覺者可以免之寤而心悸會侍婢來告乃與特進梁平老強汪等帥壯士數百人潛入雲龍門東海王堅與呂婆樓帥麾下三百餘人鼓噪繼進宿衛將士皆捨杖歸堅生猶昏寢不寤堅眾既至生驚問左右曰此輩何等人引生置別室廢為越王俄而殺之時年二十三偽諡厲王封子馗為越侯苻堅字永固健弟雄之子趙建武中母荀氏祈子於西門豹祠歸而夜夢與神交遂孕十二月而生堅有神光之異自天燭庭背有赤文隱起成字曰草付臣又土王咸陽必祕而莫之傳也姿貌魁傑臂垂過膝目有紫光祖洪奇而愛之名堅頭因而謂健曰此兒頭大重身長任大足短安下非常相趙石光祿大夫司隸校尉高平徐統有知人之鑒遇堅於路異之執其手曰苻郎此官之御街小兒敢戲於此不畏司隸縛耶堅曰司隸縛罪人不縛小兒戲也統顧左右曰此兒有霸王之相後遇之統下車謂曰苻郎當大貴但僕不及見如何堅曰若如公言不敢忘德八歲請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成健之入關也次于曲沃夢天神遣使者朱衣赤冠命拜堅為龍驤將軍旦而為壇於曲沃健泣謂堅曰先王昔受此號汝父次為之今若復為神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅既殺苻生苻堅永興元年六月去皇帝之號僭稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公為永安公苻侯為太尉諸王皆貶爵為公苻柳為尚書令封弟融為陽不公雙河南公子丕為長樂公暉為平原公熙為廣平公李威為左僕射梁平老為右