  - {type: variant, offset: 3821, length: 4, content: 開府儀同, WYG: 討平之六月境内大蝗平陽雍冀尤甚靳準捕之震其二子而死河汾大溢漂沒千餘家東宫灾門閤宫殿蕩然秋七月立晉王粲為皇太子大赦境内殊死已下以粲領相國大單于總攝朝政如前八月聰安北大將軍趙固襲衛將軍華薈於臨潁殺之固與長史周振有隙振宻譖固於聰先是李矩之破暢也於帳中得聰宻詔令暢既克矩還過洛陽收固斬之以振代固矩送以示固固斬振父子帥騎一千歸降於矩冬十一月聰校獵上林令愍帝行車騎大將軍戎服執㦸前導行}
