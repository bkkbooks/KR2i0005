  - {type: variant, offset: 6595, length: 1, content: 才, WYG: 威福任情疎逺忠賢昵近奸佞任情嚴刻無復恩恵拒諫餙非好興宫室相國之府彷彿紫宫在位無㡬作兼晝夜饑困窮叛死亡相繼粲弗之恤也既嗣偽位尊聰后靳氏為皇太后號樊氏為𢎞道皇后宣氏為𢎞徳皇后王氏為𢎞孝皇后太后等皆年未盈二十竝有國色粲晨夜烝淫於内多行無禮無復哀戚立妻靳氏為皇后子元公為太子大赦境内改年漢昌八月雨血於平陽靳準將有異謀私謂粲曰如聞諸公欲行伊霍之事謀先誅太保及臣以大司馬統萬機陛下若不先之臣恐禍之來也不晨則夕粲弗納準懼其言之不從謂聰二靳氏曰今諸公侯欲廢帝立濟南王恐吾家無復種矣盍言之於帝二靳乘間言之粲從之收太宰上洛}
