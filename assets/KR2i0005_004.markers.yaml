  - {type: variant, offset: 5157, length: 1, content: 波, WYG: 勲追討之殺萬餘人固黙引歸劉頡邀擊之為固所敗聰使太子粲及征北將軍劉雅等帥步騎十萬伐固次於小平津固揚言曰要當生縛劉粲以贖天子聰聞而惡之粲表於聰曰子業若死民無所望則不為李矩趙固之用不}
  - {type: variant, offset: 5157, length: 1, content: 波, krp: 勲追討之殺萬餘人固黙引歸劉頡邀擊之為固所敗聰使太子粲及征北將軍劉雅等帥步騎十萬伐固次於小平津固揚言曰要當生縛劉粲以贖天子聰聞而惡之粲表於聰曰子業若死民無所望則不為李矩趙固之用不}
  - {type: variant, offset: 5159, length: 1, content: 沔, WYG: 而自破矣戊戌殺愍帝於平陽帝之䝉塵也侍中許肅冐難侍左右帝臨崩言欲見許侍中肅馳詣相見帝已不能語肅曰未審陛下尚識臣否帝猶執肅手流涕肅歔欷登牀帝遂投於其懐抱之中肅晝夜號泣聰外欲明已不害乃偽責諸臣欲盡誅之羣臣逃竄惟肅獨曰備位故臣願乞得殯殮就戮聰許之事訖詣聰曰國亂不能匡君亡弗能死舉目莫非愧耻所以忍辱正為山陵未畢耳微情已敘甘就刑戮聰義而免之雅等遂進攻洛陽趙固奔陽城山麟嘉三年春二月李矩使郭黙郭誦救趙固屯於洛口一作洛陽潛遣耿稚張皮等簡精卒千人夜濟河來襲粲營貝丘王翼光自厘城覘知之乃以告粲請為之備粲曰征}
