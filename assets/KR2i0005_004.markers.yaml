  - {type: variant, offset: 3882, length: 552, content: 賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗為散騎常侍安定太守真定郡侯邑三千戶賞潞州之功七月七日堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙司隸高平徐統往在鄴都識朕於童稚每思其殷勤之言勿敢忘也可召其孫子詣行所八年五月以高平徐攀為瑯琊太守攀統之少子以舊恩拔之也六月冀州牧猛入為丞相中書監司隸校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼓鳴彗出於箕尾長十餘丈或名蚩尤旗經太微掃東井自夏及秋冬不滅太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分害深禍大十年之後燕滅秦之象二十年之後燕當為岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲踢太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與苻雄結刎頸之交苻生屢欲誅堅賴威之免堅深德之事威如父誅苻生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅嘗謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子產猛兄事之夏四月堅下書曰巴夷嶮逆寇亂益州招引吳軍為唇齒之勢特進鎮軍將軍護羗校尉鄧可帥甲士五萬星夜赴討五月蜀人張育楊光等起兵二萬以應巴獠晉威遠將軍桓石虔帥眾二萬入據墊江張育自號蜀王稱蕃于晉八月鄧羗敗晉師于涪西擊張育楊光屯於綿竹皆斬之益州平羗勒銘于岷山而還, WYG: ''}
