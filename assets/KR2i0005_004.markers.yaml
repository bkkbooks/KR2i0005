  - {type: variant, offset: 4437, length: 1, content: 羗, WYG: 聰享羣臣於光極前殿欲觀晉臣在朝者乃使帝行酒洗爵已而更衣又使帝執蓋多有涕泣或}
  - {type: variant, offset: 4437, length: 1, content: 羗, krp: 聰享羣臣於光極前殿欲觀晉臣在朝者乃使帝行酒洗爵已而更衣又使帝執蓋多有涕泣或}
