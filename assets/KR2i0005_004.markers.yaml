  - {type: variant, offset: 5311, length: 764, content: 高陽公苻方衛軍梁成平南慕容暐冠軍慕容垂步騎二十五萬為前鋒甲子堅發長安戎長戎卒六十餘萬騎二十七萬前後千里九月堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽冀之眾至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝玄豫州刺史桓伊水陸七萬敗堅于肥水堅為流矢所中單騎遁還於淮北顧謂夫人張氏曰朕若用朝臣之言豈見今日之事即當何面目復臨天下乎潛然流涕堅諸軍悉潰惟慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及關而垂有二志說堅請巡撫燕岱并求拜墓堅許之權翼固諫以為不可堅不從堅至自淮南次于長安東之行宮入告罪于大廟丁零翟斌反于河南長樂公苻丕遣慕容垂及苻飛龍討之垂南結丁零殺飛龍盡坑其眾垂引丁零烏丸之眾二十餘萬為飛梯地道以攻鄴城慕容暐弟泓先為北城長史聞垂攻鄴亡命奔關東收諸馬牧鮮卑眾至數千還屯華陰暐乃潛使諸弟及宗人起兵于外堅遣將軍強永率騎擊之為泓所敗泓眾遂盛自稱大都督雍州牧濟北王推叔父垂為丞相大司馬冀州牧吳王堅謂權翼曰吾不從卿言鮮卑至是關東之地吾不復與之爭若將泓何翼曰寇不可長慕容正可據山東為亂不暇近逼今暐及宗族種類盡在京師鮮卑之眾布於畿甸實社稷之憂宜遣重將討之堅乃以廣平公熙鎮蒲坂苻叡為都督配兵五萬姚萇為司馬討泓于華澤平陽太守慕容冲起兵河東有眾二萬進攻蒲堅命竇衝討之苻叡勇果輕敵至華澤敗績被殺堅大怒萇懼誅遂叛竇衝擊慕容冲于河東大破之冲奔于泓泓至十萬餘遣使謂堅曰秦師傾敗將興復大燕吳王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅怒召昭責之暐叩頭流血陳謝堅久之曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使眾兵還長安恕其反叛之罪而暐遣使謂泓曰今秦數已終當不復能久立吾既籠中之人必無還理勉建大業以興復為務泓於是進向長安改年曰燕興堅率步騎二萬討姚萇于北地姚萇率眾七萬來攻堅為萇所敗聞慕容冲去長安一百餘里引師而歸使苻方戍驪山拜苻暉, WYG: ''}
