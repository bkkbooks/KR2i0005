  - {type: variant, offset: 2494, length: 947, content: 號安等方入而庭燎油灌下盤死者七人虎大怒腰斬成公段于閶闔門即天王位南郊大赦親王貶為郡公藩王為縣侯太子遂總百揆其后荒酒淫色驕恣無道或盤遊于田懸管而入或夜百騎宿于宮臣家淫其妻妾裝飾宮人美淑者斬首洗血置于盤上傳共視之又納諸比丘尼有姿色者與其交褻而殺之合牛羊肉煮而食之亦賜左右欲以識其味也虎荒耽內遊威刑失度遂以事為可或呈之虎怒曰小事何足呈也時有所不聞復怒曰何以不呈請責杖捶月至再三遂甚慍私謂中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對事發幽遂于東宮殺之及妃張氏并男女二十六人盡賜死合一棺埋之誅其宮臣友黨二百餘人立河閒公宣為太子建武六年追尊號考樂平敬公為太宗孝皇帝八年六月上黨孟門上有神人之像坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌產一狼子日噬虎腦而殺之后三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津探石為中濟石無大小輒隨流用工五百餘萬不成虎如靈昌津沉璧告誠璧浮於渚水波上騰津所殿觀莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人成長安未央宮又發司豫荊兗二十六萬人成洛陽宮十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下宜父慈子和深以慎之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而去韜怒增之十丈宣聞之恚甚謂楊柸牟成等曰韜凶豎悖逆敢違我如是汝等能殺之者吾入宮盡以韜之國分封汝等韜既死主上必親臨喪因行大事無不濟矣楊柸等許諾八月殺韜宣奏之虎哀絕久之乃蘇召太子宣鏁繫于郊北火焚殺之議立太子於東堂虎曰吾欲以純灰三斛洗君服穢惡故生凶子兒年三十便欲殺父今世乃十歲比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月享群臣於太武殿前佛圖澄殿上褰衣而行吟曰棘子成林將壞人衣虎發石而視之有棘子生焉冉閔小字棘奴也十二月辛巳雷大霖雨虎問佛圖澄澄曰其為我乎至戊子而澄卒大寧元年正月虎僭即皇帝位于郊大赦改年二月有沙門從雍州來稱見佛圖澄西入關虎掘之無尸唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨於金華殿世子即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于蕩陰石閔為前鋒都督太后命授遵丞相加九錫增封十郡己丑安陽亭貫甲曜兵入自鳳陽門升太武前殿盡哀退如東閣群臣敦勸即位大赦封世為譙王邑萬戶廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其, WYG: ''}
