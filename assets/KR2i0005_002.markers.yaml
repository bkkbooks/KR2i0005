  - {type: variant, offset: 4494, length: 5, content: 至于冀州閔, WYG: 不過太宗之二郡戰守之備非特匈奴南越而已孝文之廣思費如此陛下之狹欲損如此愚臣所以敢昧死犯顔色冐不測之禍也聰大怒曰朕為萬㡬主將營一殿何問汝䑕子乃敢妄言沮衆不殺此䑕子朕殿何當得成命左右曳出斬之并其妻子梟首東市使羣䑕共穴時聰在逍遥園李中堂元達先鎖腰而入即以鎖鎖堂下樹呼曰臣所言者社稷之計而陛下殺臣若死者有知臣當上訴陛下於天下訴陛下於先帝朱雲有言臣得與龍逢比干遊於地下足矣未審陛下何如主耳左右曳之不能動聰怒甚大司徒任顗光祿大夫朱紀左僕射范隆驃騎大將軍河間王易等叩頭流血曰元達為先帝所知受命之初即引置門下盡忠竭慮知無不言臣等竊祿茍安每見之未嘗不發愧今所言雖狂直願陛下容之因諫諍而斬列卿其如後世何聰黙然劉后在後堂聞之宻遣中常侍私勅左右停刑手疏切諫具劉后傳聰怒乃解引元達而謝之易逍遥園為納賢園李中堂為愧賢堂夏四月壬申愍帝即位於長安聰遣中山王曜及司隷校尉喬智明虎牙將軍李景年等冦長安平西將軍趙染}
