  - {type: variant, offset: 4489, length: 4, content: 剋幽薊略, WYG: 來外殄二京不世之冦内興殿觀四十餘所加之軍旅數興餽運不息饑饉疾疫死亡相繼兵疲於外民怨於内為之父母固若是乎伏聞詔㫖將營鷃儀中宫新立誠臣等樂為子來者也竊以大難未夷宫宇麤給今之新營尤實非宜况有晉遺𩔖西據闗中南擅江表李雄奄有巴蜀王浚劉琨窺窬肘腋石勒曹嶷貢稟漸踈陛下釋此不憂乃更為中宫作殿豈目前之所急乎昔太宗承髙祖之業恵吕息役之後四海之富天下之殷粟帛流衍尚惜百金之費輟露臺之役歴代比美迹垂不朽故能斷獄四百擬於成康陛下承荒亂之餘所有之}
