  - {type: variant, offset: 4119, length: 3, content: 姓冉氏, WYG: 晉室推疋為平西將軍率衆五萬攻曜於長安扶風太守梁綜及麴特竺恢等亦率衆十萬㑹之曜遣劉雅趙染攻疋雅等先攻竺恢不克疋要擊大敗之曜又盡長安銳卒與疋等戰於黄丘曜衆大敗身中流矢退走疋}
