  - {type: variant, offset: 1477, length: 749, content: 神武籌略邁于高皇雄藝卓犖超絕魏武三五以來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦已太過朕若逢高皇當北面而事之然猶與韓彭競健而爭先耳倘遇光武當並驅于中原未知鹿死誰手大丈夫行事當礨礨落落如日月皎然終不能如曹孟德司馬仲達欺他孤兒寡婦狐媚以取天下也朕在二劉之間耳軒轅豈所擬乎群臣皆稱萬歲四年雍州刺史石生上言西鄉行死蛇鼠鬭於安定府間二日蛇死臨涇馬生角長安城中鷄鳴音皆曰基慈安定廳事前後聞誦書聲求之不得七日乃止隕石于肥鄉六月勒寢疾召中山王虎太子宏中常侍嚴震等侍疾禁中七月薨于西閣偽諡明皇帝號高祖石宏字大雅勒第三子母程夫人右光祿遐之妹建平元年立為太子虛衿愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上得天下孝文以玄默守之聖人之後必世勝殘天之道也勒大悅程遐言於勒曰中山怏怏不可以輔少主乞早除之以便大計勒不從石宏勒薨虎執政臨軒召子冀州刺史遂兵入禁宿衛文武無不奔散宏大懼策拜中山王虎為丞相以十三郡封為魏王又加九錫虎偽讓后乃受之延熙元年七月改頓邱為魏國沿魏郡至黎陽十月宏齎璽綬親詣魏公喻禪意虎曰宏昏昧愚暗處喪無禮不可以君臨萬國奉承宗廟便當廢之云何禪讓十一月廢宏為海陽王宏就車容色自若幽宏及太程后南陽王恢于崇訓宮尋殺之時年二十二石虎字季龍勒之從子勒父朱幼而子之故或謂之勒弟晉永興中與勒相失嘉平元年劉琨送勒母王及虎于葛陂時年十七性殘忍好馳獵諠遊無紀度尤善彈數彈人軍中每患之勒白王曰此是凶暴無使軍人殺之聲名可惜宜自除也王曰快牛犢子小時多能破車為復小忍勿怯之至十八檢攝恭謹嚴重受士弓馬迅捷勇冠當時勒深喜焉拜征虜將軍性酷虐無道軍中勇幹策略與己侔者輒因事害之至於降城陷壘坑斬士女鮮有遺類勒屢加責誨而行意自若然御眾嚴而不煩莫敢犯者指授攻討所向無前故勒寵信彌隆仗以專征之任既廢殺宏稱居攝趙天王建武元年正月大赦, WYG: ''}
