  - {type: variant, offset: 4117, length: 1, content: 魏, WYG: 夫封平阿公以侍中庾珉王雋為光祿大夫秋七月晉太尉征西大將軍南陽王司馬模使牙門趙染戍蒲阪染求馮翊太守不得怒率衆歸聰聰以染為平西將軍八月聰遣趙染與安西將軍雅帥騎二萬攻模於長安河内王粲始安王曜帥大衆繼之染敗模於潼闗將軍吕毅死之長驅至下邽凉州將北宫純自長安率衆迎降進圍長安模遣淳于定出戰敗績模倉庫空虛士卒離散軍諮祭酒韋輔曰事急矣早降可以免禍模從之降於染染箕踞攘袂數模之罪送之於粲九月粲殺模及其子范陽王黎以模妃劉氏賜别將張本為妻送衛將軍梁汾長史魯繇兼散騎常侍杜驁辛謐及北宫純等於平陽聰以粲之害模也大怒粲曰臣殺模本不以其晚識天命之故但以晉氏肺腑洛陽之難不能死節天下之惡一也故誅之聰曰雖然吾恐汝不免誅降之殃也夫天道至神理無不報時闗西饑饉白骨蔽野士民存者百無一二冬十月署始安王曜為車騎大將軍開府儀同三司雍州牧更封中山王鎮長安王彌為大將軍封齊公石勒為幽州牧十一月彌為石勒所殺因并其衆表彌叛狀聰大怒遣使讓勒專害公輔有無上之心又恐勒之有二志也即以彌部衆配之加勒鎮東大將軍督并幽二州諸軍事領并州刺史以慰其心曜既據長安安定太守賈疋與諸氐羌皆送任子於聰惟雍州刺史麴特新平太守竺恢馮翊太守索綝固守不降安夷䕶軍麴允頻陽令梁肅自京兆南山將奔安定遇疋任子於隂宻擁還臨涇謀}
