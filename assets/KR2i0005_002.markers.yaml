  - {type: variant, offset: 4485, length: 1, content: 慕, WYG: 聰立左貴嬪劉娥為皇后為之起䳨儀樓於後庭廷尉陳元達諫曰臣聞古之聖王愛國如家故皇天亦祐之如子夫天生蒸民而樹之君使司牧之非以兆民之命窮一人之欲也晉氏闇虐視百姓如草芥故上天勦絶其祚眷祐皇漢蒼生引領庶㡬息肩懐更生之望有日矣我髙祖光文皇帝靖言惟兹痛心疾首故身衣大布居不重茵先皇后嬪服無綺綵重逆羣臣之請乃建南北二宫今光極之前足以朝羣臣饗萬國矣昭徳溫明已後足以}
