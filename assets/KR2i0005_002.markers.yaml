  - {type: variant, offset: 4500, length: 0, content: '', krp: 衆赴之晉安夷䕶軍始平太守一作大都督麴允據黄白城以拒之五月曜等進屯蒲坂時允累為曜等所敗晉遣安東將軍索琳為征東大將軍將兵助允六月晉平北將軍劉琨與穆帝會於陘北謀擊聰秋七月琨進據藍谷穆帝乃遣普根屯於北屈琨遣監軍韓據自西河而南將攻西平聰遣大將軍粲等拒琨驃}
  - {type: variant, offset: 4501, length: 0, content: '', WYG: 大將軍易等拒普根蕩晉將軍蘭陽等助守西平琨等聞之引兵還聰使諸軍仍屯所在為進取之計九月趙染謂曜曰麴允率大衆在外長安空虛可襲而取之既得長安黄白城自服願大王以重衆守此染請輕騎襲之曜乃承制加染前鋒大都督安南大將軍以精騎五千配之進攻長安王師敗於渭陽將軍王廣死之庚寅染夜入長安外城帝奔射雁樓染焚燒龍尾及諸營殺掠千餘人辛卯旦退屯逍遥園壬辰將軍麴鑒自阿城帥衆五千來救癸已染引兵退鑒追}
