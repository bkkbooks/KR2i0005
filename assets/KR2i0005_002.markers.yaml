  - {type: variant, offset: 330, length: 911, content: 襲位劉曜王彌圍洛陽勒帥精騎二萬會之王彌既平洛陽將先誅勒勒請彌燕于己營手斬彌而并其眾將軍郭默獲沙門竺浮圖澄以其有道術進之于勒試之有效甚尊重之前趙嘉平二年張賓說勒曰邯鄲襄國趙之舊都依山憑險形勢之固可擇此二邑而都然后命將四出授以奇略王業可圖石勒於是進據襄國聰授勒都督幽冀并營四州諸軍事冀州牧進封本郡公邑萬戶三年以征虜將軍為魏郡太守鎮鄴三臺篡奪之謀兆於此矣前趙嘉麟元年劉琨遣姚澹帥眾來討勒與戰澹軍大敗琨長史李宏以并州來降七月劉聰疾甚以勒為大將軍錄尚書事受遺輔政勒固辭乃止曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔漢故事劉曜聞平樂之言停太宰之授勒大怒曰趙王趙帝孤自取之名號大小豈爾所呼耶征虜虎與左右長史張敬張賓等上號曰大司馬雖位冠九台非伯者之號請改稱大將軍大單于領冀州牧趙王在鄴故事以二十四郡戶二十九萬為趙國十一月勒即位改元稱為趙王元年始建社稷立宗廟主書司典故人出內重其禁法不得侮易衣冠華族號胡為國人二年令曰國人不聽報嫂及在喪婚娶至於燒葬令如本俗八月始置軒縣之樂八佾之舞作金銀大輪黃屋左纛天子禮樂於斯備矣三年黎陽民陳武妻產三男一女上書自陳令曰昔周之興也四乳八子今武妻一乳四子可謂度過姬祥美加曩日其賜乳婦一人穀百石雜繒十四疋庶以肅迎嘉祥冬十月勒親與鄉老齒坐懽飲語及平生勒曰李陽壯士也孤方取之何以不來父老歸語令速來漚麻池之忿是布衣之恨孤方崇信于天下寧讎四夫乎令曰武鄉吾之豐沛也其復之三世十一月李陽至勒與酣謔引陽臂笑謂之曰卿雖老臂中猶有力頗復與人鬭孤往日厭鄉老拳卿亦飽孤毒手因賜甲第一區拜為都尉陽與勒鄰居歲長爭漚麻池迭相毆擊四年二月拜子宏為世子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國后大驚曰此法當失何以得成天下至留侯諫乃曰賴有大此侯耳其天資英達如此八年八月脩三臺三月以世子衛將軍宏鎮鄴大和十年劉曜圍洛陽襄國大震勒統步騎四萬赴金墉濟自大碣先是流凘風猛軍至冰泮清和濟畢流澌大至勒以為神靈之助命曰靈昌津戰于西門曜軍大清石堪執曜送之二年曜子熙等去長安奔于上邽車騎虎剋上邽遣主簿趙封奉傳國玉璽送之秦隴西建平元年二月車騎石虎等上尊號勒不許固請勒號趙天王行皇帝事大赦八月群臣又固請以名位不正宜即尊號九月, WYG: ''}
