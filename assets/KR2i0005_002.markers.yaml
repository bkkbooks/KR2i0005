  - {type: variant, offset: 4391, length: 3, content: 單于冀, WYG: 難未夷餘晉假息陛下不懼白龍魚服之禍至昏夜忘歸陛下當思先帝創業之艱難嗣承之不易鴻基已奠四海屬情何可墜之於垂成隳之於將就比觀陛下所為臣實痛心疾首且愚人歸漢之心未專思晉之心猶盛劉琨咫尺刺客縱横帝王輕出一夫敵耳願陛下改往修來則億兆幸甚聰大怒命斬之上夫人王氏彰女也叩頭乞哀乃囚之詔獄太后張氏以聰刑罰過差三日不食太弟乂子粲竝輿襯切諫聰怒曰我豈紂桀幽厲乎汝輩何以生來哭人太宰延年太保殷及公卿列侯百有餘人皆免冠涕泣固諫曰光文皇帝以聖武膺期創建鴻祚而六合未一夙世升遐陛下睿徳自天龍飛紹統東平洛邑南定長安真可謂功髙周成徳超夏啟往也唐虞今則陛下歴觀書記未有其比而頃來以小務不供亟斬王公直言忤㫖遽囚大將遊獵無度機管不修臣等竊所未解此臣等相與破肝糜胃忘寢與食也聰慨然曰朕昨大醉非其本心微公等言之朕不聞過各賜帛百疋使侍中持節赦彰曰先帝頼君如左右手君著勲再世朕敢忘之此段之過希君蕩然君能盡懐憂國朕所望也今進君驃騎將軍定襄郡公後有不逮幸數匡之雍}
