  - {type: variant, offset: 4467, length: 0, content: '', krp: 雖不達天命然各忠其主吾亦有以亮之但晉主已降天命非人所支而䖍劉南鄙沮亂邊萌此其罪也以元惡之種而贈同勲舊逆臣之孫而荷榮禁闥卿知皇漢之徳𢎞曠否暢曰陛下每嘉先臣不以小臣之故而虧其忠節及是恩也自是明主伐國弔民之義臣輒同萬物未敢謝生於自然六月聰欲立貴嬪劉英為皇后張太后欲立貴人張徽光聰不得已許之英尋卒大昌文獻公劉殷卒聰以河間王易為車騎將軍彭城王翼為衛將軍竝典禁兵宿衛髙平王悝為征南將軍鎮離石濟南王驥為征西將軍築西平城以居之魏王操為征東將軍鎮蒲子安北大將軍雍州刺史趙固平北大將軍豫州刺史王桑欲引兵歸平陽軍中乏糧士卒相食乃自䂭磽津西渡攻掠河北郡縣使人自懐求迎於聰聰遣鎮逺將軍梁伏疵將兵迎之未至長史臨深將軍牟穆帥衆一萬叛歸劉演固隨疵而西桑引其衆歸青州固遣兵追之殺桑於西梁桑將張鳯率其餘衆歸演聰以固為荆州刺史領河南太守鎮洛陽晉平北將軍劉琨移檄州郡期以十月會平陽擊聰琨素奢豪喜聲色河南徐潤以音律得幸干預政事䕶軍令狐盛數以為言勸琨殺之琨不從潤譖盛於琨曰盛將勸公稱帝矣琨竟收盛殺之盛子泥遂奔於聰具言虛實聰大悅遣河内王粲中山王曜等攻并州以令狐泥為鄉導屬上黨太守龔醇帥衆降聰雁門烏丸復反琨聞之親帥兵東出收兵於常山及中山使部將郝詵張喬將兵來拒戰於武灌喬等敗死晉陽危懼太原太守髙喬并州别駕郝聿以晉陽降粲秋八月庚戌琨還救晉陽不克乃與左右數十騎攜其妻子奔於趙郡之亭頭遂如常山粲曜入晉陽壬子令狐泥殺琨父母粲曜送尚書盧志侍中許遐太子右衛率崔瑋於平陽聰復以曜為車騎大將軍以前將軍劉豐為鎮北大將軍并州刺史鎮晉陽九月聰以盧志為太弟太師崔瑋為太傅許遐為太保髙喬令狐泥郝聿皆為武衛將軍己卯聰衛尉梁汾奔長安辛巳前雍州刺史麴特討河内王粲於三輔粲敗走闗中擾亂冬十月乙酉聰封子恒為代王逞為吳王朗為潁川王臯為零陵王旭為丹陽王京為蜀王坦為九江王晃為臨川王丁亥以司空王育為太保驃騎大將軍王彰為太尉尚書令任顗為司徒左僕射馬景為司空右僕射朱紀為尚書令中書監范隆為左僕射前軍大將軍呼延晏為右僕射先是劉琨與穆帝猗盧也時稱代王結為兄弟至是乃告急於穆帝且乞師焉穆帝遣長子賔六須一作六修及桓帝子普根將軍衛雄范班箕澹等率衆數萬為前鋒以攻晉陽琨收散卒千餘為之鄉導穆帝自帥衆二十萬繼之至於狼猛一作盆城曜及賔六須戰於汾東曜兵敗績墜馬中流矢身被七創討虜將軍傅虎以馬授曜驅令渡汾自還戰死曜入晉陽夜與大將軍河内王粲鎮北大將軍豐等掠晉陽百姓踰䝉山遁走十一月穆帝帥騎來追戰於藍谷粲兵敗績斬征虜將軍邢延及劉儒劉豐簡金張平等三千餘級伏屍數百里甲午粲等遁還穆帝因大獵夀陽山陳閱皮肉山為之赤琨自營門步入拜謝固請進軍穆帝曰吾不早來致卿父母見殺誠以相愧今}
