  - {type: variant, offset: 4473, length: 1, content: 焚, WYG: 復以會稽國劉夫人為貴人大赦境内殊死已下先是侍中隴西辛勉隨帝至平陽聰欲署為光祿大夫固辭不受聰遣黄門侍郎喬秉賫藥酒逼之勉曰大丈夫豈以數年之命而虧髙節事二姓見武皇帝哉引藥將飲秉遽止之曰主上相試耳君真髙士也歎息而去聰嘉其貞節深敬異之為築室於平陽西山月致酒米勉亦辭而不受乙亥太后張氏卒諡曰光獻張皇后不勝哀丁丑亦卒諡曰孝武己卯定}
