  - {type: variant, offset: 4091, length: 2, content: 郎闇, WYG: 荀藩及弟光祿大夫荀組奔轘轅太子左率溫畿夜開廣莫門奔小平津辛卯王彌至宣陽門壬辰始安王曜至西明門丁酉彌晏尅宣陽門入南宫升太極前殿縱兵大掠悉收宫人珍寳懐帝開華林園門出河隂藕池欲奔長安晏兵追執之幽於端門曜自西明門入屯武庫戊戌殺晉太子詮吳王晏竟陵王楙尚書左僕射和郁右僕射曹馥尚書閭丘冲袁粲王緄河南尹劉黙及諸王公已下三萬餘人於洛水北築為京觀遂發掘諸陵焚燒宗廟宫府皆盡逼辱后妃曜納恵帝羊皇后遷懐帝及侍中庾珉}
