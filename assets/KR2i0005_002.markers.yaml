  - {type: variant, offset: 2228, length: 265, content: 虎荒遊廢政外耽營繕使太子還省者以書奏事選守牧祀郊廟惟征伐刑斷乃親覽之三月南遊臨江而還東大震是日觀省臺城賜匠有差九月遷都鄴宮石虎三年徙洛陽橦簴九龍翁仲等于鄴是歲太武殿東西宮皆就太武殿基二丈八尺下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧起靈風臺九殿於顯陽后選召百官州郡民女以充之后庭服綺縠玩珍奇者萬餘人內置女官十八等教宮人星占及馬步射置女太史於靈臺仰觀災祥以考外太史之虛實禁郡國不得私學星讖左校令成公段造庭燎于崇杠之末高十餘丈上盤置燎下盤置人絙繳上下虎試而悅之三年太保安夔等文武五百九人上皇帝, WYG: 光興}
