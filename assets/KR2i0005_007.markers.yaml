  - {type: variant, offset: 2740, length: 0, content: '', WYG: 各以精騎八千自城西而北擊曜前鋒曜性少而酗酒末年尤甚至是將戰飲酒數斗常乘赤馬無故蹋頓乃乘小馬比出復飲酒斗餘至西陽門撝陣就平石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜於冰上被創十餘通中者三為堪所執勒遂大破曜軍斬首五萬餘級下令曰所欲擒者一人耳今已獲之其勅將士抑鋒止銳縱其歸命之路曜見勒曰石王頗憶重門之盟否勒使徐光謂曜曰今日之事天使其然復云何邪乃幽曜於河南丞廨乙酉勒班師使征東將軍石邃將兵衛送襄國曜創甚載以馬輿使金創醫李永與同載療之北苑市三老孫機上禮求見曜勒許之機進酒於曜曰僕谷王闗右稱帝皇當持重保土疆輕用兵敗洛陽祚運窮天所亡開大分持一觴曜曰何以健邪當為翁滿飲勒聞之悽然改容曰亡國之人足令老叟數之已亥舎曜於襄國永豐小城給其妓妾嚴兵圍守遣岳震等乘馬從男女衣㡊以見曜曜曰吾謂卿等久為灰土石王仁厚乃全宥至今邪而我殺石他負盟之甚今日之禍自其分耳留宴終日而去勒使曜與太子熙書諭令速降曜但勅熙與諸大臣匡維社稷勿以吾易慮也勒見而惡之久之為勒所殺明年春正月太子熙一作毗聞曜被擒大懼與大司馬南陽王𦙍及太尉汝南王咸等議欲西保秦州尚書胡勲曰今雖䘮主國尚全完將士情一未有離叛且可并力}
