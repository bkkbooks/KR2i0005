  - {type: variant, offset: 2186, length: 528, content: 二千擁瓘率眾出戰混擊敗之眾悉去瓘自殺混入見元靖以混為使持節中外都督諸軍事驃騎大將軍酒泉郡侯輔政五年六月大旱令諸祈雨之官皆詠雲漢詩儒林祭酒索綏曰雲漢陳周宣之美非旱之文昔神鼎之出漢虞丘不賀今辭與事違恐非致澤之意也綏字士艾燉煌人父戢晉司徒綏家貧好學舉孝廉為記室祭酒母喪去官又舉秀才著涼春秋五十卷又作六夷頌苻命傳十餘篇以著述之功封平樂亭侯六年宋混卒天錫以使持節都督諸軍輔政八月右將軍齊南等議以靖多難務須立長君勸天錫自立閏月天錫遣肅等夜害元靖時年十四葬平陵諡沖王張天錫字公純嘏駿之少子母曰劉美人元靖即位一十八謁于太廟尊母劉氏為太后元年四月秦遣鴻臚回國拜天錫大將軍涼州牧西平張天錫三年姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震陷裂水出天錫避正殿引咎責謝晉遣使拜右關中諸軍大將軍涼州牧西平公八年郡國火燃于泥中三十所苻堅復有兼并之規天錫大懼遣從事中郎韓博奉表于晉又與桓溫書剋其年大舉都會上邽十年以世子懷為使持節鎮西將軍高昌郡公次子大豫為世子豫母焦氏為左夫人七月大水地震西平五十日中地十動土樓崩天錫疾美人閻姬薛姬皆自殺二姬因色竝有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊若不諱妾請效死于前灑掃于地下無他志十月天錫疾瘳大赦境內追悼二姬葬以夫人禮十三年, WYG: 於}
