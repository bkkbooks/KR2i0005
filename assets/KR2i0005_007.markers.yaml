  - {type: variant, offset: 2741, length: 0, content: '', WYG: 險力不能拒走未晚也𦙍怒以為沮衆斬之遂率百官奔上邽汝隂王厚安定王䇿皆棄郡奔遁闗中擾亂將軍蔣英辛恕擁衆數十萬據長安遣使招勒勒遣石生率洛陽之衆赴之秋八月南陽王𦙍率衆數萬自上邽趨長安隴東武都安定新平北地扶風始平諸郡夷夏皆起兵應𦙍𦙍次仲橋石生嬰城固守勒使石虎率騎二萬來援九月}
