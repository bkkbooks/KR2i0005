  - {type: variant, offset: 144, length: 9, content: 課農桑拔賢才置崇文, WYG: 李矩潁川太守郭黙軍數敗又乏食遣使降曜曜遣中山王岳攻石生於洛陽配以近郡甲士五千宿衛精卒一萬濟自孟津鎮東將軍呼延謨率荆司之衆自崤澠而東欲會矩黙共攻石生岳克孟津石梁二戍斬獲五千餘級進圍石生於金墉勒遣石虎率步騎四萬入自成臯闗岳陳兵以待之戰於洛西岳師敗績身中流矢退保石梁虎作塹栅列圍遏絶内外岳衆饑甚殺馬以食將士呼延謨為虎所殺曜自將出救虎帥騎三萬來拒曜前軍將軍劉黑撃虎將石聰於八特阪大破之曜次於金谷夜中無故大驚士卒潰散乃退如澠池夜又驚潰遂歸長安六月虎㧞石梁岳被執并執將佐八十餘人及氐羌三千餘人皆送襄國坑士卒九千人遂攻王騰於并州執騰殺之坑士卒七千餘人曜至自澠池素服郊次哭七日乃入城因憤恚成疾秋九月武功豕生犬上邽馬生牛及諸妖變不可勝紀曜命公卿各舉博識直言之士一人司空劉均舉㕘軍臺産曜親臨東堂遣中黄門䇿問之産極言其故曜覽而嘉之引見東堂訪以政事得失産流涕歔欷具陳灾變之禍政化之闕辭甚懇至曜改容禮之即拜博士}
