  - {type: variant, offset: 2733, length: 2, content: 中衛, krp: 南陽王𦙍率步騎四萬撃之夾洮相持七十餘日冠軍}
  - {type: variant, offset: 2737, length: 2, content: 史景, WYG: 呼延那雞率親御郎二千騎絶其運路𦙍濟師逼之璞軍大潰還奔凉州𦙍追及於令居斬級二萬張閬辛晏率衆來降曜皆拜將軍封列侯遂略河南地光初十三年秋七月石勒遣石虎率衆二萬出軹闗來攻河東應之者五十餘縣進次蒲阪曜將東救蒲阪懼張駿楊難敵乘虛來襲遣河間王述發氐羌之衆屯於秦州曜盡中外精銳水陸赴之自衛闗北濟虎懼引師而退追之八月及於髙候大戰破之斬將軍石瞻枕尸一百餘里收其資仗以萬億計虎奔朝歌遂濟自大陽攻石生於金墉决千金堤一作堨以灌之滎陽野王皆降襄國大震分遣諸將攻討汲郡河内諸郡冬十二月石勒自率衆來拒陳於洛西曜自恃連勝不撫士卒專與嬖臣飲博左右或諫曜怒以為妖言斬之時與石虎對軍大風㧞樹昏霧四塞聞虎進據石門續知勒自率大衆已濟河始議增滎陽戍杜黄馬闗俄而洛水候者與勒前鋒交戰擒羯送之曜問曰大胡自來邪其衆㡬何羯曰大胡自來軍勢甚盛不可當也曜色變使攝金墉之圍陳於洛西衆十餘萬南北十餘里勒望見之喜謂左右曰可以賀我矣乃帥步騎四萬入洛陽城虎引步騎三萬自城北而西攻曜中軍石堪石聰}
