  - {type: variant, offset: 752, length: 571, content: 平西將軍行都督涼州諸軍事護羌校尉涼州牧西平公大赦境內九月立宴子駿為世子三年劉曜遣鴻臚拜茂太師涼王四年茂寢疾執駿手泣曰吾先人以孝友見稱自漢以來世執忠順汝謹守忠節毋或失墮薨于正寢年四十八劉曜遣使贈太宰諡成烈王張祚僭號追尊曰成王廟號太宗張駿字公庭宴之世子永嘉元年生幼而奇侯十歲能屬文茂之四年拜使持節大都督大將軍涼州牧西平公大赦境內劉曜遣使拜大將軍涼州牧張駿元年正月親耕籍田二月始承晉元帝崩問大臨三日四年十二月劉曜為賊所擒曜太子毗及劉胤等率眾奔上邽六年二月石勒稱天王遣使拜駿征西大將軍涼州牧加五錫之禮八年群寮勸駿稱涼王置百官駿曰此非人臣所言敢有此言罪在不赦又請立世子乃立重華為世子十二月鄯善王元禮獻女姝好號曰美人立賓遐觀以處之十四年五月雨雪降霜駿避正殿素服命群寮極言得失十五年以右長史任處領國子祭酒立辟雍明堂而行禮焉命西曹掾集閣內外事付索綏以著涼春秋十一月以世子重華行涼州事十九年田于建西踰玉右縣九月改玉右縣為金澤縣二十一年始置百官官號皆擬天朝車服旌旗一如王者酒泉太守馬岌上言酒泉南山既崑崙之體周穆王見西王母樂而忘歸即謂此山有石室玉堂珠璣鏤飾煥若神宮禹貢崑崙在臨江之西即此明矣宜立西王母祠以裨朝廷無疆之福駿從之二十二年六月薨于正德前殿年四十晉遣策贈大司馬諡忠成公七月葬大陵張祚僭號追尊文王廟號世祖張重華字泰臨駿第二子寬和懿重沉毅少言駿薨右長史任處上華, WYG: 后叔父昶}
